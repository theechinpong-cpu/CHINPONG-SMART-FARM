                options: [
                    { th: "She does homework now.", en: "She does homework now.", isCorrect: false, detail: { th: "นี่คือบอกนิสัย ไม่ใช่สิ่งที่กำลังทำ", en: "This shows habit, not current action." } },
                    { th: "She is doing homework right now.", en: "She is doing homework right now.", isCorrect: true, detail: { th: "ใช้ Present Continuous สำหรับเหตุการณ์ขณะนี้", en: "Uses Present Continuous for now." } },

                options: [
                    { th: "Mother quickly dinner cooks.", en: "Mother quickly dinner cooks.", isCorrect: false, detail: { th: "วางกริยาไว้หลังสุดไม่ได้ในภาษาอังกฤษ", en: "Cannot put verb at the end." } },
                    { th: "Mother cooks dinner quickly.", en: "Mother cooks dinner quickly.", isCorrect: true, detail: { th: "Adverb วางท้ายประโยคเพื่อขยายกริยา", en: "Adverb at the end modifies the verb." } },
                    { th: "Mother cooks quickly dinner.", en: "Mother cooks quickly dinner.", isCorrect: false, detail: { th: "ไม่ควรวางคั่นระหว่างกริยากับกรรม", en: "Avoid splitting verb and object." } },

                    { th: "I don't drink milk every day.", en: "I don't drink milk every day.", isCorrect: true, detail: { th: "ใช้ do not (don't) ถูกต้องตามประธาน I", en: "Uses 'don't' correctly for subject 'I'." } },
                    { th: "I doesn't drink milk.", en: "I doesn't drink milk.", isCorrect: false, detail: { th: "doesn't ใช้กับ He/She/It", en: "'doesn't' is for He/She/It." } },
                    { th: "I no drink milk.", en: "I no drink milk.", isCorrect: false, detail: { th: "ภาษาอังกฤษแบบไม่ถูกต้อง", en: "Incorrect English." } }
                ],
                hint: { th: "ใช้กริยาช่วย do", en: "Use auxiliary verb 'do'." }
            },
            {
                id: 24,
                category: "Structure",
                q: { th: "แปลประโยค: 'สุนัขตัวสีขาวกำลังวิ่งอยู่ในสวน'", en: "Translate: 'The white dog is running in the garden'" },
                options: [
                    { th: "Dog color white is running.", en: "Dog color white is running.", isCorrect: false, detail: { th: "ภาษาไทยแปลตรงตัวเกินไป", en: "Too literal translation from Thai." } },
                    { th: "The white dog is running in the garden.", en: "The white dog is running in the garden.", isCorrect: true, detail: { th: "การวาง Adj (white) หน้าคำนามถูกต้อง", en: "Adj (white) placed correctly before noun." } },

            },

                category: "Structure",

                options: [
                    { th: "Do she play the piano?", en: "Do she play the piano?", isCorrect: false, detail: { th: "She ต้องใช้กับ Does", en: "'She' requires 'Does'." } },
                    { th: "Does she play the piano every Sunday?", en: "Does she play the piano every Sunday?", isCorrect: true, detail: { th: "การใช้ Does ขึ้นต้นประโยคคำถามถูกต้อง", en: "Correct use of 'Does' for a question." } },
                    { th: "Does she plays the piano?", en: "Does she plays the piano?", isCorrect: false, detail: { th: "เมื่อมี Does กริยาห้ามเติม s", en: "After 'Does', verb must be base form." } },
                    { th: "She play piano Sunday?", en: "She play piano Sunday?", isCorrect: false, detail: { th: "ขาดกริยาช่วย", en: "Missing auxiliary verb." } }

                hint: { th: "ประธาน She ใช้ Do หรือ Does?", en: "Does subject 'She' take 'Do' or 'Does'?" }
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let categoryScores = { "Intonation": 0, "Travel": 0, "Structure": 0 };
        let categoryTotals = { "Intonation": 8, "Travel": 10, "Structure": 7 };
        let isEnglish = false;

        const langBtn = document.getElementById('langToggle');
        const nextBtn = document.getElementById('nextBtn');
        const quizContainer = document.getElementById('quizContainer');

        function updateLang() {
            langBtn.innerText = isEnglish ? "สลับเป็นภาษาไทย" : "Switch to English";
            renderQuestion();
        }

        langBtn.onclick = () => {
            isEnglish = !isEnglish;
            updateLang();
        };

        function renderQuestion() {
            const data = quizData[currentQuestion];
            document.getElementById('categoryLabel').innerText = data.category;
            document.getElementById('questionCounter').innerText = `${currentQuestion + 1} / 25`;
            document.getElementById('questionText').innerText = isEnglish ? data.q.en : data.q.th;
            document.getElementById('progressBar').style.width = `${((currentQuestion) / 25) * 100}%`;

            const optionsBox = document.getElementById('optionsContainer');
            optionsBox.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-blue-300 hover:bg-blue-50 transition font-medium";
                btn.innerText = isEnglish ? opt.en : opt.th;
                btn.onclick = () => handleAnswer(index, btn);
                optionsBox.appendChild(btn);
            });

            document.getElementById('feedbackArea').classList.add('hidden');
            nextBtn.classList.add('hidden');
        }

        function handleAnswer(index, btn) {
            const data = quizData[currentQuestion];
            const allBtns = document.getElementById('optionsContainer').children;
            
            // Disable all buttons after click
            for (let b of allBtns) b.disabled = true;

            const selectedOpt = data.options[index];
            const feedbackArea = document.getElementById('feedbackArea');
            const feedbackClue = document.getElementById('feedbackClue');
            const feedbackDetail = document.getElementById('feedbackDetail');

            if (selectedOpt.isCorrect) {
                btn.classList.add('correct');
                score++;
                categoryScores[data.category]++;
                feedbackClue.innerText = isEnglish ? "Correct! ✨" : "ถูกต้อง! ✨";
                feedbackArea.className = "mt-6 border-2 p-4 rounded-xl correct";
            } else {
                btn.classList.add('incorrect');
                feedbackClue.innerText = isEnglish ? "Not quite... 💡" : "ยังไม่ถูกนะ... 💡";
                feedbackArea.className = "mt-6 border-2 p-4 rounded-xl incorrect";
                // Show correct one
                for (let i = 0; i < data.options.length; i++) {
                    if (data.options[i].isCorrect) {
                        allBtns[i].classList.add('correct');
                    }
                }
            }

            feedbackDetail.innerText = isEnglish ? selectedOpt.detail.en : selectedOpt.detail.th;
            feedbackArea.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('questionSection').classList.add('hidden');
            const resultSection = document.getElementById('resultSection');
            resultSection.classList.remove('hidden');
            document.getElementById('finalScore').innerText = `${score} / 25`;
            document.getElementById('progressBar').style.width = `100%`;

            const analysisBox = document.getElementById('analysisBox');
            analysisBox.innerHTML = '<h3 class="font-bold text-lg border-b pb-2">Category Analysis / วิเคราะห์รายหมวดหมู่:</h3>';

            let report = "";
            for (let cat in categoryScores) {
                let percent = (categoryScores[cat] / categoryTotals[cat]) * 100;
                let status = percent >= 60 ? 
                    (isEnglish ? "Excellent! / ทำได้ดีมาก" : "ยอดเยี่ยมมาก!") : 
                    (isEnglish ? "Needs Improvement / ควรปรับปรุง" : "จุดอ่อนที่ต้องเสริม");
                let color = percent >= 60 ? "text-green-600" : "text-red-600";
                
                analysisBox.innerHTML += `
                    <div class="flex justify-between items-center">
                        <span class="font-semibold">${cat}</span>
                        <span class="${color}">${categoryScores[cat]}/${categoryTotals[cat]} (${percent.toFixed(0)}%) - ${status}</span>
                    </div>
                `;
                report += `${cat}: ${percent.toFixed(0)}%, `;
            }

            // Simulate Email Sending
            alert(`🎉 Quiz Finished! / จบการทดสอบแล้ว!\nSending report to: thee.chinpong@hmail.com\nScore: ${score}/25\nDetails: ${report}`);
            console.log("Email simulated to thee.chinpong@hmail.com with scores: ", categoryScores);
        }

        // Initialize
        renderQuestion();
    </script>
