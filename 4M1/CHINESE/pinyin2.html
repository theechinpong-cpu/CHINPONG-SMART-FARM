<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบ HSK 1 ชุดที่ 2 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; line-height: 1.6; padding: 20px; background-color: #f9f9f9; max-width: 800px; margin: auto; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2980b9; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question { background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #2980b9; background: white; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #2980b9; color: white; }
        .btn-speak { background: #f1c40f; border: none; padding: 5px 10px; border-radius: 4px; font-size: 14px; margin-left: 10px; cursor: pointer; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; padding: 15px; border-radius: 5px; border-left: 5px solid #333; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="summary">
        <h2>สรุปเนื้อหาและเทคนิคการจำ HSK 1 (ชุดที่ 2)</h2>
        <p>ชุดนี้เน้นการสร้างประโยคสื่อสารพื้นฐานโดยใช้คำศัพท์ HSK 1 ทั้งหมด เป็นการฝึกโครงสร้างประโยคแบบง่าย เช่น ประธาน + กริยา + กรรม</p>
    </div>

    <div id="exam-area"></div>

    <script>
        function speakChinese(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        const quizData = [
            { q: "แปลประโยค '我喜欢看书' (Wǒ xǐhuan kàn shū)", hanzi: "我喜欢看书", options: ["ฉันชอบอ่านหนังสือ", "ฉันชอบดูทีวี", "ฉันชอบเรียนภาษาจีน", "ฉันชอบฟังเพลง"], answer: 0, explanation: "wǒ (ฉัน) xǐhuan (ชอบ) kàn (อ่าน/ดู) shū (หนังสือ)" },
            { q: "แปลประโยค '今天天气很好' (Jīntiān tiānqì hěn hǎo)", hanzi: "今天天气很好", options: ["วันนี้อากาศดีมาก", "เมื่อวานอากาศดี", "วันนี้ฝนตก", "พรุ่งนี้อากาศร้อน"], answer: 0, explanation: "jīntiān (วันนี้) tiānqì (อากาศ) hěn (มาก) hǎo (ดี)" },
            { q: "แปลประโยค '他是我的老师' (Tā shì wǒ de lǎoshī)", hanzi: "他是我的老师", options: ["เขาเป็นครูของฉัน", "เขาเป็นนักเรียนของฉัน", "เธอเป็นหมอของฉัน", "เขาเป็นเพื่อนของฉัน"], answer: 0, explanation: "tā (เขา) shì (เป็น) wǒ de (ของฉัน) lǎoshī (ครู)" },
            { q: "แปลประโยค '我想吃米饭' (Wǒ xiǎng chī mǐfàn)", hanzi: "我想吃米饭", options: ["ฉันอยากกินข้าวสวย", "ฉันอยากกินผลไม้", "ฉันอยากดื่มน้ำ", "ฉันอยากกินเนื้อ"], answer: 0, explanation: "xiǎng (อยาก) chī (กิน) mǐfàn (ข้าวสวย)" },
            { q: "แปลประโยค '再见' (Zàijiàn)", hanzi: "再见", options: ["ลาก่อน", "ขอบคุณ", "ไม่เป็นไร", "สวัสดี"], answer: 0, explanation: "zài (อีกครั้ง) jiàn (พบ) คือการลาเพื่อพบกันใหม่" },
            { q: "แปลประโยค '你会说汉语吗？' (Nǐ huì shuō Hànyǔ ma?)", hanzi: "你会说汉语吗？", options: ["คุณพูดภาษาจีนเป็นไหม", "คุณชื่ออะไร", "คุณชอบภาษาจีนไหม", "คุณเป็นครูใช่ไหม"], answer: 0, explanation: "huì (เป็น/สามารถ) shuō (พูด) Hànyǔ (ภาษาจีน)" },
            { q: "แปลประโยค '妈妈在学校' (Māma zài xuéxiào)", hanzi: "妈妈在学校", options: ["แม่อยู่ที่โรงเรียน", "แม่อยู่ที่บ้าน", "แม่ไปร้านค้า", "แม่ไปโรงพยาบาล"], answer: 0, explanation: "māma (แม่) zài (อยู่ที่) xuéxiào (โรงเรียน)" },
            { q: "แปลประโยค '现在几点？' (Xiànzài jǐ diǎn?)", hanzi: "现在几点？", options: ["ตอนนี้กี่โมง", "วันนี้วันอะไร", "พรุ่งนี้กี่โมง", "เมื่อวานกี่โมง"], answer: 0, explanation: "xiànzài (ตอนนี้) jǐ (เท่าไร) diǎn (โมง)" },
            { q: "แปลประโยค '我有很多书' (Wǒ yǒu hěn duō shū)", hanzi: "我有很多书", options: ["ฉันมีหนังสือเยอะมาก", "ฉันไม่มีหนังสือ", "ฉันชอบอ่านหนังสือ", "ฉันมีหนังสือเล่มเดียว"], answer: 0, explanation: "yǒu (มี) hěn duō (เยอะมาก) shū (หนังสือ)" },
            { q: "แปลประโยค '请喝茶' (Qǐng hē chá)", hanzi: "请喝茶", options: ["เชิญดื่มชา", "เชิญกินข้าว", "เชิญนั่ง", "เชิญเข้ามา"], answer: 0, explanation: "qǐng (เชิญ) hē (ดื่ม) chá (ชา)" },
            { q: "แปลประโยค '这是什么？' (Zhè shì shénme?)", hanzi: "这是什么？", options: ["นี่คืออะไร", "นั่นคืออะไร", "ใครคืออะไร", "นี่ที่ไหน"], answer: 0, explanation: "zhè (นี่) shì (คือ) shénme (อะไร)" },
            { q: "แปลประโยค '我不去商店' (Wǒ bù qù shāngdiàn)", hanzi: "我不去商店", options: ["ฉันไม่ไปร้านค้า", "ฉันไปร้านค้า", "ฉันไม่ชอบร้านค้า", "ฉันอยู่ที่ร้านค้า"], answer: 0, explanation: "bù (ไม่) qù (ไป) shāngdiàn (ร้านค้า)" },
            { q: "แปลประโยค '你在做什么？' (Nǐ zài zuò shénme?)", hanzi: "你在做什么？", options: ["คุณกำลังทำอะไร", "คุณจะไปไหน", "คุณกินอะไร", "คุณชอบอะไร"], answer: 0, explanation: "zài (กำลัง) zuò (ทำ) shénme (อะไร)" },
            { q: "แปลประโยค '他不是学生' (Tā bú shì xuésheng)", hanzi: "他不是学生", options: ["เขาไม่ใช่นักเรียน", "เขาไม่ใช่ครู", "เขาไม่ไปโรงเรียน", "เขาไม่ใช่เพื่อนฉัน"], answer: 0, explanation: "bú shì (ไม่ใช่) xuésheng (นักเรียน)" },
            { q: "แปลประโยค '我们去学校' (Wǒmen qù xuéxiào)", hanzi: "我们去学校", options: ["พวกเราไปโรงเรียน", "พวกเราไปร้านค้า", "พวกเราไปโรงพยาบาล", "พวกเราไปบ้าน"], answer: 0, explanation: "wǒmen (พวกเรา) qù (ไป) xuéxiào (โรงเรียน)" },
            { q: "แปลประโยค '苹果很好吃' (Píngguǒ hěn hǎochī)", hanzi: "苹果很好吃", options: ["แอปเปิลอร่อยมาก", "แอปเปิลไม่หวาน", "แอปเปิลผลใหญ่", "แอปเปิลมีสีแดง"], answer: 0, explanation: "píngguǒ (แอปเปิล) hěn (มาก) hǎochī (อร่อย)" },
            { q: "แปลประโยค '我爸爸是医生' (Wǒ bàba shì yīshēng)", hanzi: "我爸爸是医生", options: ["พ่อของฉันเป็นหมอ", "พ่อของฉันเป็นครู", "พ่อของฉันเป็นนักเรียน", "พ่อของฉันอยู่ที่โรงพยาบาล"], answer: 0, explanation: "bàba (พ่อ) shì (เป็น) yīshēng (หมอ)" },
            { q: "แปลประโยค '下午见' (Xiàwǔ jiàn)", hanzi: "下午见", options: ["เจอกันตอนบ่าย", "เจอกันตอนเช้า", "เจอกันพรุ่งนี้", "เจอกันตอนเย็น"], answer: 0, explanation: "xiàwǔ (ช่วงบ่าย) jiàn (พบ/เจอกัน)" },
            { q: "แปลประโยค '这杯水冷' (Zhè bēi shuǐ lěng)", hanzi: "这杯水冷", options: ["น้ำแก้วนี้เย็น", "น้ำแก้วนี้ร้อน", "น้ำแก้วนี้อร่อย", "น้ำแก้วนี้ไม่หวาน"], answer: 0, explanation: "zhè (นี้) bēi (แก้ว) shuǐ (น้ำ) lěng (เย็น)" },
            { q: "แปลประโยค '我有三只猫' (Wǒ yǒu sān zhī māo)", hanzi: "我有三只猫", options: ["ฉันมีแมว 3 ตัว", "ฉันมีแมว 2 ตัว", "ฉันมีแมว 1 ตัว", "ฉันมีแมวเยอะ"], answer: 0, explanation: "yǒu (มี) sān (3) zhī (ตัว) māo (แมว)" },
            { q: "แปลประโยค '请坐' (Qǐng zuò)", hanzi: "请坐", options: ["เชิญนั่ง", "เชิญดื่ม", "เชิญยืน", "เชิญไป"], answer: 0, explanation: "qǐng (เชิญ) zuò (นั่ง)" },
            { q: "แปลประโยค '他们在哪儿？' (Tāmen zài nǎr?)", hanzi: "他们在哪儿？", options: ["พวกเขาอยู่ที่ไหน", "พวกเขาไปไหน", "พวกเขากินอะไร", "พวกเขาทำอะไร"], answer: 0, explanation: "tāmen (พวกเขา) zài (อยู่ที่) nǎr (ไหน)" },
            { q: "แปลประโยค '今天是星期一' (Jīntiān shì xīngqī yī)", hanzi: "今天是星期一", options: ["วันนี้เป็นวันจันทร์", "วันนี้เป็นวันอาทิตย์", "วันนี้เป็นวันเสาร์", "วันนี้เป็นวันศุกร์"], answer: 0, explanation: "jīntiān (วันนี้) shì (เป็น) xīngqī yī (วันจันทร์)" },
            { q: "แปลประโยค '你会写汉字吗？' (Nǐ huì xiě hànzì ma?)", hanzi: "你会写汉字吗？", options: ["คุณเขียนอักษรจีนเป็นไหม", "คุณอ่านอักษรจีนเป็นไหม", "คุณชอบอักษรจีนไหม", "คุณเรียนอักษรจีนไหม"], answer: 0, explanation: "huì (เป็น) xiě (เขียน) hànzì (อักษรจีน)" },
            { q: "แปลประโยค '我不看电视' (Wǒ bú kàn diànshì)", hanzi: "我不看电视", options: ["ฉันไม่ดูทีวี", "ฉันไม่ฟังเพลง", "ฉันไม่อ่านหนังสือ", "ฉันไม่ไปไหน"], answer: 0, explanation: "bú kàn (ไม่ดู) diànshì (ทีวี)" }
        ];

        const area = document.getElementById('exam-area');
        
        quizData.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<p><strong>ข้อที่ ${index + 1}: ${item.q} <button class="btn-speak" onclick="speakChinese('${item.hanzi}')">🔊 ฟังเสียง</button></strong></p>`;
            
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            
            item.options.forEach((opt, oIdx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = function() {
                    const feedback = qDiv.querySelector('.feedback');
                    feedback.style.display = 'block';
                    if(oIdx === item.answer) {
                        feedback.style.background = '#d4edda';
                        feedback.innerHTML = '<strong>✅ ถูกต้อง!</strong><br>' + item.explanation;
                    } else {
                        feedback.style.background = '#f8d7da';
                        feedback.innerHTML = '<strong>❌ ยังไม่ถูกต้อง</strong><br>' + item.explanation;
                    }
                    const buttons = optDiv.querySelectorAll('button');
                    buttons.forEach(b => b.disabled = true);
                };
                optDiv.appendChild(btn);
            });
            
            qDiv.appendChild(optDiv);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            qDiv.appendChild(feedbackDiv);
            area.appendChild(qDiv);
        });
    </script>
</body>
</html>
