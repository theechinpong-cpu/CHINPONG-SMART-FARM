<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบ HSK 1 ชุดที่ 3 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; line-height: 1.6; padding: 20px; background-color: #f9f9f9; max-width: 800px; margin: auto; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2980b9; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question { background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #2980b9; background: white; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #2980b9; color: white; }
        .btn-speak { background: #f1c40f; border: none; padding: 5px 10px; border-radius: 4px; font-size: 14px; margin-left: 10px; cursor: pointer; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; padding: 15px; border-radius: 5px; border-left: 5px solid #333; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="summary">
        <h2>สรุปเนื้อหา HSK 1 (ชุดที่ 3: ฝึกฟังประโยค)</h2>
        <p>ชุดนี้เน้นการฝึกทักษะการฟังพินอินจากประโยคยาว โดยทุกประโยคประกอบด้วยคำศัพท์ HSK 1 เท่านั้น</p>
        <p><strong>เทคนิคการจำ:</strong> เมื่อกดฟัง ให้ลองเขียนพินอินที่ได้ยินลงในกระดาษก่อนเลือกคำตอบ เพื่อเช็คความแม่นยำของวรรณยุกต์ครับ</p>
    </div>

    <div id="exam-area"></div>

    <script>
        function speakChinese(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        const quizData = [
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我喜欢看书", options: ["wǒ xǐhuan kàn shū", "wǒ xǐhuān kàn shū", "wǒ xǐhuan kǎn shū", "wǒ xǐhuàn kǎn shū"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "今天天气很好", options: ["jīntiān tiānqì hěn hǎo", "jīntián tiānqǐ hěn hǎo", "jīntiān tiānqí hěn hǎo", "jīntiān tiānqì hén hǎo"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "他是我的老师", options: ["tā shì wǒ de lǎoshī", "tā shì wǒ de lǎoshǐ", "tā shí wǒ de lǎoshī", "tā shì wó de lǎoshī"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我想吃米饭", options: ["wǒ xiǎng chī mǐfàn", "wǒ xiāng chī mǐfàn", "wǒ xiǎng cī mǐfàn", "wǒ xiǎng chī mǐfán"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "你会说汉语吗", options: ["nǐ huì shuō hànyǔ ma", "nǐ huǐ shuō hànyǔ ma", "nǐ huì shuǒ hànyǔ ma", "nǐ huì shuō hànyú ma"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "妈妈在学校", options: ["māma zài xuéxiào", "māma zǎi xuéxiào", "māma zài xuéxiǎo", "māma zài xuéxiào"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "现在几点了", options: ["xiànzài jǐ diǎn le", "xiànzǎi jǐ diǎn le", "xiànzài jǐ diǎn lè", "xiànzài jǐ diān le"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我有很多书", options: ["wǒ yǒu hěn duō shū", "wǒ yǒu hén duō shū", "wǒ yǒ hěn duō shū", "wǒ yǒu hěn duó shū"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "请喝茶", options: ["qǐng hē chá", "qǐng hě chá", "qǐng hē chǎ", "qīng hē chá"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "这是什么", options: ["zhè shì shénme", "zhè shí shénme", "zhè shì shénmè", "zhě shì shénme"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我不去商店", options: ["wǒ bù qù shāngdiàn", "wǒ bú qù shāngdiàn", "wǒ bù qú shāngdiàn", "wǒ bù qù shāngdiǎn"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "你在做什么", options: ["nǐ zài zuò shénme", "nǐ zǎi zuò shénme", "nǐ zài zuó shénme", "nǐ zài zuò shénmè"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "他不是学生", options: ["tā bú shì xuésheng", "tā bù shì xuésheng", "tā bú shì xuéshēng", "tā bú shì xuéséng"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我们去学校", options: ["wǒmen qù xuéxiào", "wǒmén qù xuéxiào", "wǒmen qù xuéxiǎo", "wǒmen qú xuéxiào"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "苹果很好吃", options: ["píngguǒ hěn hǎochī", "píngguò hén hǎochī", "píngguǒ hěn hǎocī", "píngguǒ hén hǎochī"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我爸爸是医生", options: ["wǒ bàba shì yīshēng", "wǒ bǎba shì yīshēng", "wǒ bàba shí yīshēng", "wǒ bàba shì yīshěng"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "下午见", options: ["xiàwǔ jiàn", "xiàwū jiàn", "xiàwǔ jiǎn", "xiáwǔ jiàn"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "这杯水冷", options: ["zhè bēi shuǐ lěng", "zhè béi shuǐ lěng", "zhè bēi shuǐ lēng", "zhè bēi shuǐ lěng"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我有三只猫", options: ["wǒ yǒu sān zhī māo", "wǒ yóu sān zhī māo", "wǒ yǒu sán zhī māo", "wǒ yǒu sān zhǐ māo"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "请坐", options: ["qǐng zuò", "qǐng zuó", "qīng zuò", "qǐng zuǒ"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "他们在哪儿", options: ["tāmen zài nǎr", "tāmén zài nǎr", "tāmen zài nár", "tāmen zǎi nǎr"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "今天是星期一", options: ["jīntiān shì xīngqī yī", "jīntián shì xīngqī yī", "jīntiān shì xīngqí yī", "jīntiān shì xīngqī yí"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "你会写汉字吗", options: ["nǐ huì xiě hànzì ma", "nǐ huǐ xiě hànzì ma", "nǐ huì xié hànzì ma", "nǐ huì xiě hànzǐ ma"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "我不看电视", options: ["wǒ bú kàn diànshì", "wǒ bù kàn diànshì", "wǒ bú kǎn diànshì", "wǒ bú kàn diànshǐ"], answer: 0 },
            { q: "ฟังประโยคแล้วเลือกพินอินที่ถูกต้อง", hanzi: "他有很好看书", options: ["tā yǒu hěn hǎokàn shū", "tā yǒu hén hǎokàn shū", "tā yǒu hěn hǎokán shū", "tā yóu hěn hǎokàn shū"], answer: 0 }
        ];

        const area = document.getElementById('exam-area');
        
        quizData.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<p><strong>ข้อที่ ${index + 1}: <button class="btn-speak" onclick="speakChinese('${item.hanzi}')">🔊 ฟังเสียงประโยค</button></strong></p>`;
            
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            
            item.options.forEach((opt, oIdx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = function() {
                    const feedback = qDiv.querySelector('.feedback');
                    feedback.style.display = 'block';
                    if(oIdx === item.answer) {
                        feedback.style.background = '#d4edda';
                        feedback.innerHTML = '<strong>✅ ถูกต้อง!</strong> พินอินที่ถูกต้องคือ: ' + item.options[item.answer];
                    } else {
                        feedback.style.background = '#f8d7da';
                        feedback.innerHTML = '<strong>❌ ยังไม่ถูกต้อง</strong> พินอินที่ถูกต้องคือ: ' + item.options[item.answer];
                    }
                    const buttons = optDiv.querySelectorAll('button');
                    buttons.forEach(b => b.disabled = true);
                };
                optDiv.appendChild(btn);
            });
            
            qDiv.appendChild(optDiv);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            qDiv.appendChild(feedbackDiv);
            area.appendChild(qDiv);
        });
    </script>
</body>
</html>
