<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียน HSK 1 พร้อมลำดับขีด</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        .container { display: flex; flex-direction: column; align-items: center; font-family: 'Kanit'; }
        #target-writer { width: 300px; height: 300px; border: 1px solid #ccc; }
        .info { margin: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ฝึกเขียน: <span id="char">我</span></h2>
        <div id="target-writer"></div>
        <div class="info">
            <button onclick="writer.animateCharacter()">ดูวิธีเขียนตามลำดับ (1, 2, 3...)</button>
            <p>คลิกปุ่มเพื่อดู Animation ลำดับขีดที่ถูกต้อง</p>
        </div>
    </div>

    <script>
        // Instance ของตัวเขียนอักษร
        const writer = HanziWriter.create('target-writer', '我', {
            width: 300,
            height: 300,
            padding: 5,
            showOutline: true,
            strokeAnimationSpeed: 1, // ความเร็วในการเขียน
            delayBetweenStrokes: 500 // หน่วงเวลาให้เห็นลำดับชัดๆ
        });
    </script>
</body>
</html>
