<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 Whiteboard</title>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        /* Whiteboard Style */
        .whiteboard { width: 100px; height: 100px; border: 2px solid #333; background: #fff; cursor: crosshair; touch-action: none; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนระบบ Whiteboard แบบเขียนได้จริง</h2>
    <table>
        <thead>
            <tr>
                <th>1. ลำดับ</th>
                <th>2. อักษร</th>
                <th>3. Animation</th>
                <th>4. พินอิน</th>
                <th>5. คำแปล</th>
                <th>6. ไกด์ไลน์ฝึกเขียน</th>
                <th>7. เขียนลงไปได้จริง</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { id: 2, hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { id: 3, hanzi: "他", pinyin: "tā", meaning: "เขา" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td style="font-size:24px;">${word.hanzi}</td>
                <td><button onclick="alert('แสดงAnimationลำดับขีด')">ดู</button></td>
                <td>${word.pinyin}</td>
                <td>${word.meaning}</td>
                <td><div style="width:100px; height:100px; border:1px dashed #ccc; background:#eee;"></div></td>
                <td><canvas id="canvas-${word.id}" class="whiteboard"></canvas></td>
            `;
            tbody.appendChild(row);

            // ระบบเขียนได้จริง (Whiteboard Engine)
            const canvas = document.getElementById(`canvas-${word.id}`);
            const ctx = canvas.getContext('2d');
            let drawing = false;

            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', (e) => {
                if (!drawing) return;
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            });
        });
    </script>
</body>
</html>
