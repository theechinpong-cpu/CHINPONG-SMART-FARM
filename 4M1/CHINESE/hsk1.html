<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 ฝึกเขียนมืออาชีพ</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .whiteboard { width: 100px; height: 100px; border: 2px dashed #aaa; background: #fff; cursor: crosshair; margin: 0 auto; }
        .btn { padding: 5px 10px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนตัวอักษรจีน (Professional Suite)</h2>
    <table>
        <thead>
            <tr>
                <th>เลขลำดับ</th>
                <th>ตัวอักษร</th>
                <th>Stroke Order</th>
                <th>พินอิน</th>
                <th>คำแปล</th>
                <th>สีปากกา</th>
                <th>ช่องฝึกเขียน (Whiteboard)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { id: 2, hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { id: 3, hanzi: "他", pinyin: "tā", meaning: "เขา" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td style="font-size:24px; font-weight:bold;">${word.hanzi}</td>
                <td><button class="btn" onclick="playAnim('${word.hanzi}')">ดูขีด</button></td>
                <td>${word.pinyin}</td>
                <td>${word.meaning}</td>
                <td>
                    <select id="color-${word.hanzi}" onchange="updateColor('${word.hanzi}')">
                        <option value="#000000">ดำ</option>
                        <option value="#ff0000">แดง</option>
                        <option value="#0000ff">น้ำเงิน</option>
                    </select>
                </td>
                <td><div id="board-${word.hanzi}" class="whiteboard"></div></td>
            `;
            tbody.appendChild(row);

            // สร้าง Whiteboard สำหรับเขียน
            const writer = HanziWriter.create(`board-${word.hanzi}`, word.hanzi, {
                width: 100, height: 100, padding: 10,
                strokeColor: '#000000', showCharacter: false, showOutline: true
            });
            window[`writer_${word.hanzi}`] = writer;
        });

        function playAnim(char) { window[`writer_${char}`].animateCharacter(); }
        function updateColor(char) {
            const color = document.getElementById(`color-${char}`).value;
            window[`writer_${char}`].updateColor('strokeColor', color);
        }
    </script>
</body>
</html>
