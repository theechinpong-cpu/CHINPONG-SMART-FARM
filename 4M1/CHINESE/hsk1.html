<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียน HSK 1 (Professional Edition)</title>
    <style>
        body { font-family: 'Kanit'; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        .wrapper { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #canvas-container { position: relative; width: 300px; height: 300px; border: 1px solid #999; background: white; }
        #canvas-container svg { width: 100%; height: 100%; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #28a745; color: white; }
        button.stop { background: #dc3545; }
    </style>
</head>
<body>

    <h2>ฝึกเขียน: 我 (wǒ) - ฉัน</h2>
    <div class="wrapper">
        <div id="canvas-container">
            <!-- SVG สำหรับแสดงลำดับขีดและตาราง -->
            <svg id="svg-engine" viewBox="0 0 1024 1024">
                <!-- ตารางฝึกเขียน (Guideline) -->
                <line x1="512" y1="0" x2="512" y2="1024" stroke="#eee" stroke-width="10"/>
                <line x1="0" y1="512" x2="1024" y2="512" stroke="#eee" stroke-width="10"/>
                <line x1="0" y1="0" x2="1024" y2="1024" stroke="#eee" stroke-width="10"/>
                <line x1="1024" y1="0" x2="0" y2="1024" stroke="#eee" stroke-width="10"/>
                <!-- เส้นอักษรจะถูกใส่ที่นี่ -->
                <g id="stroke-layer"></g>
            </svg>
        </div>
        <div class="controls">
            <button onclick="play()">เล่น</button>
            <button class="stop" onclick="pause()">หยุด</button>
            <button onclick="reset()">เริ่มใหม่</button>
        </div>
    </div>

    <script>
        // ข้อมูลพิกัดอักษร (SVG Path) ของตัว "我"
        const paths = [
            "M230,225c5,5,10,15,10,30c0,10-5,40-10,60",
            "M150,350c30-10,120-20,200-20",
            "M350,150c-20,100-30,250-40,350",
            "M420,120c10,50,40,150,70,250",
            "M500,200c50,20,150,80,200,150",
            "M600,100c-20,100-30,200-40,300"
        ];

        let strokeIndex = 0;
        let isRunning = false;
        let timer = null;
        const layer = document.getElementById('stroke-layer');

        function play() {
            if (isRunning) return;
            isRunning = true;
            renderNext();
        }

        function renderNext() {
            if (strokeIndex < paths.length && isRunning) {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", paths[strokeIndex]);
                p.setAttribute("stroke", "black");
                p.setAttribute("stroke-width", "50");
                p.setAttribute("fill", "none");
                layer.appendChild(p);
                
                strokeIndex++;
                timer = setTimeout(renderNext, 1000); // จังหวะการเขียน
            } else {
                isRunning = false;
            }
        }

        function pause() {
            isRunning = false;
            clearTimeout(timer);
        }

        function reset() {
            pause();
            strokeIndex = 0;
            layer.innerHTML = "";
        }
    </script>
</body>
</html>
