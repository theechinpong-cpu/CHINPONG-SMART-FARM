<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Custom Timeline Engine</title>
    <style>
        body { font-family: 'Kanit'; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        .canvas-area { position: relative; width: 300px; height: 300px; background: white; border: 2px solid #333; }
        canvas { position: absolute; top: 0; left: 0; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>ฝึกเขียน: 我</h2>
    <div class="canvas-area">
        <canvas id="guideLayer" width="300" height="300"></canvas>
        <canvas id="drawLayer" width="300" height="300"></canvas>
    </div>

    <div class="controls">
        <button onclick="togglePlayback()" id="btnPlay">เล่น / หยุด</button>
        <button onclick="resetEngine()">เริ่มใหม่</button>
    </div>

    <script>
        // 1. DATA: กำหนด Path ลำดับขีด (สมมติพิกัด)
        const strokes = [
            { start: [150, 50], end: [100, 150] }, // ขีดที่ 1
            { start: [100, 100], end: [200, 100] }, // ขีดที่ 2
            // คุณสามารถใส่พิกัดเพิ่มได้เรื่อยๆ ที่นี่
        ];

        let isPlaying = false;
        let currentStroke = 0;
        let progress = 0; // 0 to 1
        const drawCtx = document.getElementById('drawLayer').getContext('2d');

        // 2. ENGINE: ควบคุมการวาดด้วยเวลา (Timeline)
        function animate() {
            if (!isPlaying) return;

            if (currentStroke < strokes.length) {
                const s = strokes[currentStroke];
                progress += 0.01; // ปรับความเร็วที่นี่ (ยิ่งน้อยยิ่งช้า)

                // คำนวณจุดปัจจุบัน
                let x = s.start[0] + (s.end[0] - s.start[0]) * progress;
                let y = s.start[1] + (s.end[1] - s.start[1]) * progress;

                drawCtx.lineTo(x, y);
                drawCtx.stroke();

                if (progress >= 1) {
                    currentStroke++;
                    progress = 0;
                    drawCtx.beginPath(); // เริ่มเส้นใหม่
                }
                requestAnimationFrame(animate);
            }
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            if (isPlaying) animate();
        }

        function resetEngine() {
            isPlaying = false;
            currentStroke = 0;
            progress = 0;
            drawCtx.clearRect(0, 0, 300, 300);
            drawCtx.beginPath();
        }

        // วาดไกด์ไลน์ (Background)
        const gCtx = document.getElementById('guideLayer').getContext('2d');
        gCtx.strokeStyle = "#ddd";
        gCtx.lineWidth = 2;
        gCtx.strokeRect(50, 50, 200, 200); // ช่องฝึกเขียน
    </script>
</body>
</html>
