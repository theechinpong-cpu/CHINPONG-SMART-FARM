<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียน HSK 1</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        .stroke-box { width: 80px; height: 80px; cursor: pointer; border: 2px solid #333; display: inline-block; margin: 10px; background: #fff; }
    </style>
</head>
<body>
    <h2>HSK 1 - ฝึกเขียนตัวอักษรจีน (คลิกที่ช่องสีขาว)</h2>
    <div id="container"></div>

    <script>
        window.onload = function() {
            const char = "我";
            const container = document.getElementById('container');

            for (let i = 0; i < 5; i++) {
                const boxId = `box-${i}`;
                const div = document.createElement('div');
                div.id = boxId;
                div.className = 'stroke-box';
                container.appendChild(div);

                // สร้าง Writer
                const writer = HanziWriter.create(boxId, char, {
                    width: 80, height: 80, padding: 5,
                    strokeColor: '#000', showCharacter: false, showOutline: true
                });

                // ใช้ state object แยกกันในแต่ละกล่อง
                let state = { currentStroke: 0 };

                div.addEventListener('click', function() {
                    // ดึงข้อมูลใหม่ทุกครั้งที่คลิกเพื่อความชัวร์
                    HanziWriter.getCharacterData(char).then(function(data) {
                        if (state.currentStroke < data.strokes.length) {
                            writer.showStroke(state.currentStroke);
                            state.currentStroke++;
                        } else {
                            state.currentStroke = 0;
                            writer.hideCharacter();
                        }
                    });
                });
            }
        };
    </script>
</body>
</html>
