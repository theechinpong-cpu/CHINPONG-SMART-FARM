<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียน HSK 1</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .stroke-box { width: 80px; height: 80px; cursor: pointer; border: 1px solid #ccc; display: inline-block; }
    </style>
</head>
<body>

    <h2>HSK ระดับ 1 - ฝึกเขียนตัวอักษรจีน</h2>
    <table id="hskTable">
        <thead>
            <tr>
                <th>ลำดับ</th>
                <th>คำศัพท์</th>
                <th>พินอิน</th>
                <th>ช่องฝึกเขียน (คลิกเพื่อเพิ่มเส้น)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ" },
            { id: 2, hanzi: "你", pinyin: "nǐ" },
            { id: 3, hanzi: "他", pinyin: "tā" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = `<tr>
                <td>${word.id}</td>
                <td>${word.hanzi}</td>
                <td>${word.pinyin}</td>
                <td>
                    ${[1, 2, 3, 4, 5].map(i => `<div id="box-${word.id}-${i}" class="stroke-box"></div>`).join('')}
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // Initialize Hanzi Writer
        words.forEach(word => {
            [1, 2, 3, 4, 5].forEach(i => {
                const writer = HanziWriter.create(`box-${word.id}-${i}`, word.hanzi, {
                    width: 80, height: 80, padding: 5, strokeColor: '#000000',
                    showCharacter: false, showOutline: true
                });
                
                let currentStroke = 0; // ตัวแปรเก็บจำนวนขีดที่แสดง
                
                document.getElementById(`box-${word.id}-${i}`).addEventListener('click', () => {
                    // แสดงเส้นถัดไปทีละ 1 เส้น
                    writer.showStroke(currentStroke);
                    currentStroke++;
                    
                    // ถ้าครบทุกขีดแล้ว ให้ Reset เมื่อคลิกอีกครั้ง (เลือกได้ตามต้องการ)
                    if (currentStroke >= 10) { // เลข 10 คือจำนวนขีดสูงสุดโดยประมาณ
                        currentStroke = 0;
                        setTimeout(() => writer.hideCharacter(), 500);
                    }
                });
            });
        });
    </script>
</body>
</html>
