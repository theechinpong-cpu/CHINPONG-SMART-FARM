<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียนแบบมีไกด์</title>
    <style>
        #canvas { border: 2px solid #333; background-color: #fff; position: relative; }
        .wrapper { position: relative; width: 300px; height: 300px; }
    </style>
</head>
<body>

    <h2>ฝึกเขียนอักษร: 一 (หนึ่ง)</h2>
    <div class="wrapper">
        <canvas id="guideCanvas" width="300" height="300" style="position: absolute; z-index: 1;"></canvas>
        <canvas id="userCanvas" width="300" height="300" style="position: absolute; z-index: 2;"></canvas>
    </div>

    <script>
        const guideCanvas = document.getElementById('guideCanvas');
        const gCtx = guideCanvas.getContext('2d');
        const userCanvas = document.getElementById('userCanvas');
        const uCtx = userCanvas.getContext('2d');

        // 1. วาดเส้นจางๆ (Guide) ให้เด็กเห็นก่อน
        gCtx.strokeStyle = '#e0e0e0'; // สีเทาจาง
        gCtx.lineWidth = 10;
        gCtx.lineCap = 'round';
        gCtx.moveTo(50, 150);
        gCtx.lineTo(250, 150);
        gCtx.stroke();

        // 2. Logic การเขียนของเด็ก
        let drawing = false;
        userCanvas.addEventListener('mousedown', () => drawing = true);
        userCanvas.addEventListener('mouseup', () => { drawing = false; uCtx.beginPath(); });
        userCanvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = userCanvas.getBoundingClientRect();
            uCtx.lineWidth = 10;
            uCtx.strokeStyle = '#000'; // สีดำเข้มที่เด็กเขียน
            uCtx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            uCtx.stroke();
            uCtx.beginPath();
            uCtx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });
    </script>
</body>
</html>
