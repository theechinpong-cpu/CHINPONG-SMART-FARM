<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 Professional</title>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .whiteboard { width: 100px; height: 100px; border: 2px solid #333; background: #fff; cursor: crosshair; touch-action: none; }
        select { padding: 5px; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนตัวอักษรจีน (Professional Whiteboard)</h2>
    <table>
        <thead>
            <tr>
                <th>ลำดับ</th>
                <th>อักษรจีน</th>
                <th>พินอิน</th>
                <th>คำแปล</th>
                <th>สีปากกา</th>
                <th>กระดานฝึกเขียน</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { id: 2, hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { id: 3, hanzi: "他", pinyin: "tā", meaning: "เขา" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td style="font-size:24px;">${word.hanzi}</td>
                <td>${word.pinyin}</td>
                <td>${word.meaning}</td>
                <td>
                    <select id="color-${word.id}">
                        <option value="black">ดำ</option>
                        <option value="red">แดง</option>
                        <option value="blue">น้ำเงิน</option>
                    </select>
                    <button onclick="clearCanvas(${word.id})">ล้าง</button>
                </td>
                <td><canvas id="canvas-${word.id}" class="whiteboard" width="100" height="100"></canvas></td>
            `;
            tbody.appendChild(row);
            initCanvas(word.id);
        });

        function initCanvas(id) {
            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d');
            let drawing = false;

            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.strokeStyle = document.getElementById(`color-${id}`).value;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            });
        }

        function clearCanvas(id) {
            const canvas = document.getElementById(`canvas-${id}`);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
