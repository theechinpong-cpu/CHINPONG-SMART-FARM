<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 Professional Training</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th { background: #2c3e50; color: white; padding: 15px; }
        td { border: 1px solid #edf2f7; padding: 10px; text-align: center; }
        .stroke-box { width: 80px; height: 80px; cursor: pointer; background: #fff; border: 1px solid #e2e8f0; border-radius: 4px; transition: 0.3s; }
        .stroke-box:hover { border-color: #3498db; background: #f0f7ff; }
        .hanzi-cell { font-size: 24px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนตัวอักษรจีน (Professional Edition)</h2>
    <table id="hskTable">
        <thead>
            <tr>
                <th>ลำดับ</th>
                <th>อักษร</th>
                <th>พินอิน</th>
                <th>การใช้งาน</th>
                <th>ช่องฝึกเขียน (คลิกเพื่อเริ่ม)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ" },
            { id: 2, hanzi: "你", pinyin: "nǐ" },
            { id: 3, hanzi: "他", pinyin: "tā" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td class="hanzi-cell">${word.hanzi}</td>
                <td>${word.pinyin}</td>
                <td>คลิกช่องขวาเพื่อเริ่ม</td>
                <td><div id="container-${word.id}" style="display:flex; gap:5px;"></div></td>
            `;
            tbody.appendChild(row);

            const container = document.getElementById(`container-${word.id}`);
            
            // สร้างช่องฝึก 5 ช่องต่อ 1 ตัวอักษร
            for(let i = 1; i <= 5; i++) {
                let box = document.createElement('div');
                box.id = `box-${word.id}-${i}`;
                box.className = 'stroke-box';
                container.appendChild(box);

                // สร้าง Writer instance แบบมืออาชีพ
                const writer = HanziWriter.create(box.id, word.hanzi, {
                    width: 80, height: 80, padding: 5,
                    strokeColor: '#2c3e50',
                    showCharacter: false, 
                    showOutline: true,
                    strokeAnimationSpeed: 0.5
                });

                // การสั่งงานที่เสถียร
                box.addEventListener('click', () => {
                    writer.animateCharacter();
                });
            }
        });
    </script>
</body>
</html>
