<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CHINPONG SMART FARM - HSK 1 Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        .anim-box { width: 100px; height: 100px; cursor: pointer; }
        .board-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .board { 
            width: 100px; height: 100px; border: 2px solid #333; position: relative;
            background-image: linear-gradient(to right, #ddd 1px, transparent 1px), 
                              linear-gradient(to bottom, #ddd 1px, transparent 1px);
            background-size: 50px 50px; cursor: crosshair;
        }
        canvas { position: absolute; top: 0; left: 0; }
        .btn-clear { cursor: pointer; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>HSK 1 - ระบบฝึกเขียนมาตรฐาน (CHINPONG SMART FARM)</h2>
    <table>
        <thead>
            <tr>
                <th>1. ลำดับ</th><th>2. อักษร</th><th>3. Animation</th><th>4. พินอิน</th><th>5. แปล</th><th>6. ฝึกเขียน</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { id: 2, hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { id: 3, hanzi: "他", pinyin: "tā", meaning: "เขา" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td style="font-size:24px;">${word.hanzi}</td>
                <td><div id="anim-${word.id}" class="anim-box"></div></td>
                <td>${word.pinyin}</td>
                <td>${word.meaning}</td>
                <td>
                    <div class="board-wrapper">
                        <div class="board" id="board-${word.id}">
                            <canvas id="canvas-${word.id}" width="100" height="100"></canvas>
                        </div>
                        <button class="btn-clear" onclick="clearCanvas('${word.id}')">ล้าง</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);

            // 1. Animation
            const writer = HanziWriter.create(`anim-${word.id}`, word.hanzi, {
                width: 100, height: 100, padding: 5, strokeColor: '#3498db', showOutline: true
            });
            setTimeout(() => writer.animateCharacter(), 500);
            document.getElementById(`anim-${word.id}`).onclick = () => writer.animateCharacter();

            // 2. Whiteboard
            const canvas = document.getElementById(`canvas-${word.id}`);
            const ctx = canvas.getContext('2d');
            let drawing = false;

            canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
            canvas.onmousemove = (e) => { 
                if(!drawing) return; 
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); 
            };
            canvas.onmouseup = () => drawing = false;
        });

        // ฟังก์ชันล้างกระดาน
        function clearCanvas(id) {
            const canvas = document.getElementById(`canvas-${id}`);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
