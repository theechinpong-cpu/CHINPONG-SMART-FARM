<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียน HSK 1</title>
    <style>
        .stroke-box { width: 80px; height: 80px; border: 2px solid #333; display: inline-block; margin: 10px; cursor: pointer; }
        .stroke-box img { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <h2>ฝึกเขียน HSK 1</h2>
    <div id="container"></div>

    <script>
        // เปลี่ยนจากใช้ Library มาเป็น URL ของไฟล์ SVG ขีดเขียนโดยตรง
        // นี่คือ URL มาตรฐานจากฐานข้อมูล MakeMeAHanzi
        const charData = {
            "我": "https://raw.githubusercontent.com/skishore/makemeahanzi/master/graphics/我.svg"
        };

        const container = document.getElementById('container');
        for (let i = 0; i < 5; i++) {
            const div = document.createElement('div');
            div.className = 'stroke-box';
            div.innerHTML = `<img src="${charData['我']}" alt="เขียนตามเส้น">`;
            container.appendChild(div);
        }
    </script>
</body>
</html>
