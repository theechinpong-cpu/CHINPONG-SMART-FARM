<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียน HSK 1</title>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        /* Whiteboard ที่รวมไกด์ไลน์ */
        .whiteboard-container { position: relative; width: 100px; height: 100px; border: 2px solid #333; margin: 0 auto; background: white; }
        .guide-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background-image: linear-gradient(to right, #eee 1px, transparent 1px), linear-gradient(to bottom, #eee 1px, transparent 1px); background-size: 50px 50px; }
        .draw-layer { position: absolute; top: 0; left: 0; width: 100px; height: 100px; cursor: crosshair; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนระบบ Whiteboard ที่แม่นยำ</h2>
    <table>
        <thead>
            <tr>
                <th>1. ลำดับ</th><th>2. อักษร</th><th>3. Animation</th><th>4. พินอิน</th><th>5. แปล</th><th>6. ไกด์ไลน์</th><th>7. ฝึกเขียน</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { id: 1, hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { id: 2, hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { id: 3, hanzi: "他", pinyin: "tā", meaning: "เขา" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td style="font-size:24px;">${word.hanzi}</td>
                <td><button onclick="alert('แสดงระบบแสดงลำดับขีดแยก')">ดู</button></td>
                <td>${word.pinyin}</td>
                <td>${word.meaning}</td>
                <td><div class="guide-layer"></div></td>
                <td>
                    <div class="whiteboard-container">
                        <div class="guide-layer"></div>
                        <canvas id="canvas-${word.id}" class="draw-layer" width="100" height="100"></canvas>
                    </div>
                </td>
            `;
            tbody.appendChild(row);

            // แก้ไขปัญหาปากกาไม่ตรงด้วยการคำนวณ Offset ที่แม่นยำ
            const canvas = document.getElementById(`canvas-${word.id}`);
            const ctx = canvas.getContext('2d');
            let drawing = false;

            function draw(e) {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            canvas.addEventListener('mousedown', (e) => {
                drawing = true;
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            });
            canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseleave', () => drawing = false);
        });
    </script>
</body>
</html>
