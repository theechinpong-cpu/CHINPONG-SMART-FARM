        let currentPage = 0;
        const itemsPerPage = 5;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        }

        function renderPage() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            const start = currentPage * itemsPerPage;
            const pageWords = allWords.slice(start, start + itemsPerPage);

            pageWords.forEach(word => {
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td>${word.id}</td>
                    <td class="char-cell" onclick="speak('${word.hanzi}')">${word.hanzi}</td>
                    <td><div id="anim-${word.id}" class="anim-box"></div></td>
                    <td>${word.pinyin}</td>
                    <td>${word.meaning}</td>
                    <td>
                        <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                            <div class="board"><canvas id="canvas-${word.id}" width="100" height="100"></canvas></div>
                            <button class="btn-clear" onclick="clearCanvas('${word.id}')">ล้าง</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);

                const writer = HanziWriter.create(`anim-${word.id}`, word.hanzi, { 
                    width: 100, height: 100, strokeColor: '#c0392b', showOutline: true 
                });
                document.getElementById(`anim-${word.id}`).onclick = () => writer.animateCharacter();
            });
            document.getElementById('pageInfo').innerText = ` หน้าที่ ${currentPage + 1} / ${Math.ceil(allWords.length / itemsPerPage)} `;
        }

        function changePage(dir) {
            const maxPage = Math.ceil(allWords.length / itemsPerPage) - 1;
            currentPage = Math.max(0, Math.min(maxPage, currentPage + dir));
            renderPage();
        }

        function clearCanvas(id) {
            const canvas = document.getElementById(`canvas-${id}`);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        renderPage();
    </script>
