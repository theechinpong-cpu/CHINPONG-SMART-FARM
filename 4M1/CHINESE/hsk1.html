<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Stroke Engine</title>
    <style>
        #canvas { border: 2px solid #333; background-color: #fff; cursor: crosshair; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>

    <h2>ฝึกเขียนอักษร: 一 (หนึ่ง)</h2>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div class="controls">
        <button onclick="clearCanvas()">ล้างกระดาน</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // ตั้งค่าพู่กัน
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';

        // Event Listener สำหรับเมาส์และสัมผัส
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
