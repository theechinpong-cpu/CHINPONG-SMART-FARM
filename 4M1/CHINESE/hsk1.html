<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกเขียนสีสัน HSK 1</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .stroke-box { width: 80px; height: 80px; border: 1px solid #ccc; background: #fff; cursor: crosshair; margin: 0 auto; }
        .color-picker { margin-top: 5px; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนเปลี่ยนสีได้ (Professional Edition)</h2>
    <table>
        <thead>
            <tr>
                <th>อักษร</th>
                <th>พินอิน</th>
                <th>ช่องฝึกเขียน (คลิกเขียนตาม)</th>
                <th>เลือกสีปากกา</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { hanzi: "我", pinyin: "wǒ" },
            { hanzi: "你", pinyin: "nǐ" },
            { hanzi: "他", pinyin: "tā" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-size:28px;">${word.hanzi}</td>
                <td>${word.pinyin}</td>
                <td><div id="box-${word.hanzi}" class="stroke-box"></div></td>
                <td>
                    <select class="color-picker" id="color-${word.hanzi}" onchange="changeColor('${word.hanzi}')">
                        <option value="#2c3e50">ดำ (มาตรฐาน)</option>
                        <option value="#e74c3c">แดง</option>
                        <option value="#3498db">น้ำเงิน</option>
                        <option value="#27ae60">เขียว</option>
                    </select>
                </td>
            `;
            tbody.appendChild(row);

            // สร้าง Writer instance เริ่มต้น
            const writer = HanziWriter.create(`box-${word.hanzi}`, word.hanzi, {
                width: 80, height: 80, padding: 5,
                strokeColor: '#2c3e50', showOutline: true
            });
            
            // เก็บ reference ไว้ใช้ในฟังก์ชันเปลี่ยนสี
            window[`writer_${word.hanzi}`] = writer;
        });

        // ฟังก์ชันเปลี่ยนสีปากกา
        function changeColor(char) {
            const color = document.getElementById(`color-${char}`).value;
            window[`writer_${char}`].updateColor('strokeColor', color);
        }
    </script>
</body>
</html>
