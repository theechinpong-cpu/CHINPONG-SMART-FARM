<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CHINPONG SMART FARM - HSK 1 Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        .anim-box { width: 100px; height: 100px; cursor: pointer; }
        .board { width: 100px; height: 100px; border: 2px solid #333; position: relative; background-image: linear-gradient(to right, #ddd 1px, transparent 1px), linear-gradient(to bottom, #ddd 1px, transparent 1px); background-size: 50px 50px; cursor: crosshair; }
        canvas { position: absolute; top: 0; left: 0; }
        .btn-clear { cursor: pointer; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
        .pagination { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; cursor: pointer; }
        .char-cell { font-size: 28px; cursor: pointer; color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

    <h2>HSK 1 - ระบบฝึกเขียนมาตรฐาน (CHINPONG SMART FARM)</h2>
    <div class="pagination">
        <button onclick="changePage(-1)">หน้าก่อนหน้า</button>
        <span id="pageInfo"></span>
        <button onclick="changePage(1)">หน้าถัดไป</button>
    </div>
    
    <table>
        <thead>
            <tr><th>ลำดับ</th><th>อักษร (คลิกฟังเสียง)</th><th>Animation (แดงเข้ม)</th><th>พินอิน</th><th>แปล</th><th>ฝึกเขียน</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const allWords = [
            { id: 1, hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { id: 2, hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { id: 3, hanzi: "他", pinyin: "tā", meaning: "เขา" }
        ];
        for(let i=4; i<=150; i++) { allWords.push({id: i, hanzi: "学", pinyin: "xué", meaning: "เรียน" }); }

        let currentPage = 0;
        const itemsPerPage = 5;

        // ฟังก์ชันอ่านออกเสียง
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN'; // สำเนียงจีนมาตรฐาน
            window.speechSynthesis.speak(msg);
        }

        function renderPage() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            const start = currentPage * itemsPerPage;
            const pageWords = allWords.slice(start, start + itemsPerPage);

            pageWords.forEach(word => {
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td>${word.id}</td>
                    <td class="char-cell" onclick="speak('${word.hanzi}')">${word.hanzi}</td>
                    <td><div id="anim-${word.id}" class="anim-box"></div></td>
                    <td>${word.pinyin}</td>
                    <td>${word.meaning}</td>
                    <td>
                        <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                            <div class="board"><canvas id="canvas-${word.id}" width="100" height="100"></canvas></div>
                            <button class="btn-clear" onclick="clearCanvas('${word.id}')">ล้าง</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);

                // Init HanziWriter (สีแดงเข้ม #c0392b)
                const writer = HanziWriter.create(`anim-${word.id}`, word.hanzi, { 
                    width: 100, height: 100, strokeColor: '#c0392b', showOutline: true 
                });
                document.getElementById(`anim-${word.id}`).onclick = () => writer.animateCharacter();
                setTimeout(() => writer.animateCharacter(), 500);

                // Init Canvas
                const canvas = document.getElementById(`canvas-${word.id}`);
                const ctx = canvas.getContext('2d');
                let drawing = false;
                canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
                canvas.onmousemove = (e) => { if(drawing) { ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
                canvas.onmouseup = () => drawing = false;
            });
            document.getElementById('pageInfo').innerText = ` หน้าที่ ${currentPage + 1} / ${Math.ceil(allWords.length / itemsPerPage)} `;
        }

        function changePage(dir) {
            const maxPage = Math.ceil(allWords.length / itemsPerPage) - 1;
            currentPage = Math.max(0, Math.min(maxPage, currentPage + dir));
            renderPage();
        }

        function clearCanvas(id) {
            const canvas = document.getElementById(`canvas-${id}`);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        renderPage();
    </script>
</body>
</html>
