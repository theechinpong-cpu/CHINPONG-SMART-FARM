<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f8f9fa; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th { background: #2c3e50; color: white; padding: 15px; }
        td { border: 1px solid #edf2f7; padding: 10px; text-align: left; vertical-align: top; }
        .stroke-box { width: 80px; height: 80px; cursor: pointer; border: 1px solid #e2e8f0; display: inline-block; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนตัวอักษรจีน</h2>
    <table id="hskTable">
        <thead>
            <tr>
                <th>อักษร</th>
                <th>พินอิน</th>
                <th>ลำดับขีด (แนะนำ)</th>
                <th>ช่องฝึกเขียน</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const words = [
            { hanzi: "我", pinyin: "wǒ", sequence: "1.ขีดขวาง 2.ขีดตั้ง 3.ขีดตวัด" },
            { hanzi: "你", pinyin: "nǐ", sequence: "1.ขีดตั้ง 2.ขีดขวาง 3.ขีดเบี่ยง" },
            { hanzi: "他", pinyin: "tā", sequence: "1.ขีดตั้ง 2.ขีดขวาง 3.ขีดตั้ง" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-size:24px; font-weight:bold;">${word.hanzi}</td>
                <td>${word.pinyin}</td>
                <td style="font-size: 14px; color: #555;">${word.sequence}</td>
                <td><div id="container-${word.hanzi}" style="display:flex; gap:5px;"></div></td>
            `;
            tbody.appendChild(row);

            const container = document.getElementById(`container-${word.hanzi}`);
            for(let i = 1; i <= 3; i++) {
                let box = document.createElement('div');
                box.id = `box-${word.hanzi}-${i}`;
                box.className = 'stroke-box';
                container.appendChild(box);

                const writer = HanziWriter.create(box.id, word.hanzi, {
                    width: 80, height: 80, padding: 5, strokeColor: '#2c3e50',
                    showCharacter: false, showOutline: true
                });
                box.addEventListener('click', () => writer.animateCharacter());
            }
        });
    </script>
</body>
</html>
