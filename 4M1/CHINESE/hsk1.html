<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 ฝึกเขียน</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f8f9fa; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: center; }
        /* สไตล์สำหรับรูปภาพลำดับขีด */
        .order-img { width: 100px; height: 100px; display: block; margin: 0 auto; }
        .stroke-box { width: 80px; height: 80px; cursor: pointer; border: 1px solid #ccc; display: inline-block; }
    </style>
</head>
<body>

    <h2>HSK 1 - ฝึกเขียนตัวอักษรจีน</h2>
    <table>
        <thead>
            <tr>
                <th>อักษร</th>
                <th>พินอิน</th>
                <th>ลำดับขีด (รูปภาพชัดเจน)</th>
                <th>ช่องฝึกเขียน</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        // เปลี่ยนวิธี: ใช้ URL ภาพลำดับขีดมาตรฐานจากฐานข้อมูลที่ระบุขีด 1, 2, 3 ชัดเจน
        const words = [
            { hanzi: "我", pinyin: "wǒ", img: "https://www.archchinese.com/arch_images/stroke_order/我.gif" },
            { hanzi: "你", pinyin: "nǐ", img: "https://www.archchinese.com/arch_images/stroke_order/你.gif" },
            { hanzi: "他", pinyin: "tā", img: "https://www.archchinese.com/arch_images/stroke_order/他.gif" }
        ];

        const tbody = document.getElementById('tableBody');

        words.forEach(word => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-size:30px;">${word.hanzi}</td>
                <td>${word.pinyin}</td>
                <td><img src="${word.img}" class="order-img" alt="ลำดับขีด"></td>
                <td><div id="container-${word.hanzi}" style="display:flex; gap:5px;"></div></td>
            `;
            tbody.appendChild(row);

            // สร้างที่ฝึกเขียน
            const container = document.getElementById(`container-${word.hanzi}`);
            for(let i = 1; i <= 3; i++) {
                let box = document.createElement('div');
                box.id = `box-${word.hanzi}-${i}`;
                box.className = 'stroke-box';
                container.appendChild(box);
                const writer = HanziWriter.create(box.id, word.hanzi, {
                    width: 80, height: 80, padding: 5, showOutline: true
                });
                box.addEventListener('click', () => writer.animateCharacter());
            }
        });
    </script>
</body>
</html>
