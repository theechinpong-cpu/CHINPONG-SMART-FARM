<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - HSK 1 Master</title>
    <style>
        body { font-family: 'Kanit', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        canvas { border: 2px solid #ccc; background: #fff; margin: 10px 0; touch-action: none; }
        .controls { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="hanzi">我</h2>
        <p id="pinyin">wǒ | ฉัน</p>
        <canvas id="canvas" width="250" height="250"></canvas>
        <div class="controls">
            <button onclick="prevWord()">ก่อนหน้า</button>
            <button onclick="clearCanvas()">ล้าง</button>
            <button onclick="nextWord()">ถัดไป</button>
        </div>
    </div>

    <script>
        // 1. ฐานข้อมูล 150 คำ (ตัวอย่าง)
        const vocabulary = [
            { hanzi: "我", pinyin: "wǒ", meaning: "ฉัน" },
            { hanzi: "你", pinyin: "nǐ", meaning: "คุณ" },
            { hanzi: "他", pinyin: "tā", meaning: "เขา" }
            // เพิ่มอีก 147 คำที่นี่...
        ];

        let currentIndex = 0;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 2. ฟังก์ชันอัปเดตหน้าจอ
        function updateWord() {
            document.getElementById('hanzi').innerText = vocabulary[currentIndex].hanzi;
            document.getElementById('pinyin').innerText = `${vocabulary[currentIndex].pinyin} | ${vocabulary[currentIndex].meaning}`;
            clearCanvas();
        }

        // 3. ระบบวาด (Engine)
        let drawing = false;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function nextWord() { currentIndex = (currentIndex + 1) % vocabulary.length; updateWord(); }
        function prevWord() { currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length; updateWord(); }

        updateWord();
    </script>
</body>
</html>
