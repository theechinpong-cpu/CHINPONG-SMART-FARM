<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบ HSK 1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; line-height: 1.6; padding: 20px; background-color: #f9f9f9; max-width: 800px; margin: auto; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2980b9; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question { background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #2980b9; background: white; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #2980b9; color: white; }
        .btn-speak { background: #f1c40f; border: none; padding: 5px 10px; border-radius: 4px; font-size: 14px; margin-left: 10px; cursor: pointer; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; padding: 15px; border-radius: 5px; border-left: 5px solid #333; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="summary">
        <h2>สรุปเนื้อหาและเทคนิคการจำ HSK 1 (พระจอมเกล้าติวเตอร์)</h2>
        <p>การสอบ HSK 1 คือก้าวแรกที่สำคัญที่สุดในการเรียนภาษาจีน คำศัพท์ 150 คำแรกเป็นฐานรากที่จะช่วยให้คุณสื่อสารในชีวิตประจำวันได้</p>
        <p><strong>เทคนิคการจำ:</strong> จำพินอินควบคู่กับวรรณยุกต์เสมอ หัวใจของภาษาจีนคือจังหวะของเสียง หากจำวรรณยุกต์ผิด ความหมายเปลี่ยนทันทีครับ</p>
    </div>

    <div id="exam-area"></div>

    <script>
        function speakChinese(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        const quizData = [
            { q: "ตัวอักษร '爱' (รัก) มีพินอินที่ถูกต้องคือข้อใด?", hanzi: "爱", options: ["aì", "ài", "āi", "ǎi"], answer: 1, explanation: "ài (เสียง 4) คือคำว่ารัก (Love) วิธีจำ: ออกเสียงเหมือน 'อ้าย' ในภาษาไทยแต่เน้นเสียงลงต่ำ" },
            { q: "ตัวอักษร '杯子' (แก้ว) มีพินอินที่ถูกต้องคือข้อใด?", hanzi: "杯子", options: ["bēizi", "bèizi", "béizi", "bēizǐ"], answer: 0, explanation: "bēizi: bēi (ถ้วย) + zi (ปัจจัยท้ายคำนาม) คำนี้เป็นคำพื้นฐานที่ต้องจำวรรณยุกต์ให้แม่น" },
            { q: "พินอิน 'hànyǔ' ตรงกับตัวอักษรใด?", hanzi: "汉语", options: ["汉语", "很好", "好喝", "后面"], answer: 0, explanation: "汉语 (Hànyǔ): Hàn คือชื่อกลุ่มชนฮั่น, yǔ คือภาษา รวมกันเป็นภาษาจีนกลางครับ" },
            { q: "ตัวอักษร '吃' (กิน) ออกเสียงพินอินอย่างไร?", hanzi: "吃", options: ["cī", "chī", "chǐ", "cì"], answer: 1, explanation: "chī: เสียงพยัญชนะต้น ch ต้องม้วนลิ้นเล็กน้อย (Retroflex sound) ก่อนออกเสียงสระ i" },
            { q: "ตัวอักษร '电脑' (คอมพิวเตอร์) มีพินอินคือ?", hanzi: "电脑", options: ["diànnǎo", "diànnao", "diānnǎo", "diànnào"], answer: 0, explanation: "diànnǎo: diàn (ไฟฟ้า) + nǎo (สมอง) เป็นศัพท์บัญญัติยุคใหม่ของจีนครับ" },
            { q: "พินอิน 'duìbuqǐ' (ขอโทษ) วรรณยุกต์ที่ถูกต้องคือข้อใด?", hanzi: "对不起", options: ["duìbuqǐ", "duìbùqǐ", "duibùqǐ", "duìbuqī"], answer: 0, explanation: "duìbuqǐ: duì (4), bu (เสียงเบา), qǐ (3) เป็นการขอโทษแบบเป็นทางการที่ใช้บ่อยมาก" },
            { q: "ตัวอักษร '高兴' (ดีใจ) พินอินคือ?", hanzi: "高兴", options: ["gāoxīng", "gāoxìn", "gǎoxīng", "gāoxǐng"], answer: 0, explanation: "gāoxīng: gāo แปลว่าสูง xīng แปลว่ารุ่งเรือง รวมกันหมายถึงดีใจ/เบิกบาน" },
            { q: "ตัวอักษร '老师' (ครู) พินอินคือ?", hanzi: "老师", options: ["lǎoshī", "lāoshī", "lǎoshǐ", "lǎoshi"], answer: 0, explanation: "lǎoshī: lǎo (แก่/ผู้อาวุโส) + shī (อาจารย์) เป็นคำยกย่องครู" },
            { q: "พินอิน 'mǐfàn' ตรงกับความหมายใด?", hanzi: "米饭", options: ["ข้าวสวย", "ผลไม้", "น้ำ", "เนื้อ"], answer: 0, explanation: "mǐfàn: mǐ (ข้าวสาร) + fàn (ข้าวที่หุงสุกแล้ว) คือคำเรียกข้าวสวยครับ" },
            { q: "ตัวอักษร '漂亮' (สวย) พินอินคือ?", hanzi: "漂亮", options: ["piàoliang", "piàoliàng", "piāoliang", "piǎoliang"], answer: 0, explanation: "piàoliang: เป็นคำคุณศัพท์ใช้ชมความสวยงามของคนหรือสิ่งของ" },
            { q: "ตัวอักษร '认识' (รู้จัก) พินอินคือ?", hanzi: "认识", options: ["rènshi", "rènshì", "rènshǐ", "rēnshi"], answer: 0, explanation: "rènshi: rèn (จดจำ) + shi (รู้จัก) ใช้เมื่อเราพบใครเป็นครั้งแรก" },
            { q: "พินอิน 'shāngdiàn' (ร้านค้า) เสียงวรรณยุกต์คือ?", hanzi: "商店", options: ["shāngdiàn", "shàngdiàn", "shāngdiǎn", "shāngdiān"], answer: 0, explanation: "shāngdiàn: shāng (การค้า) + diàn (ร้าน) คือสถานที่ขายของครับ" },
            { q: "ตัวอักษร '睡觉' (นอนหลับ) พินอินคือ?", hanzi: "睡觉", options: ["shuìjiào", "shuìjiāo", "shuǐjiào", "shuijiao"], answer: 0, explanation: "shuìjiào: shuì (นอน) + jiào (การหลับ) เป็นคำกริยาแยก-รวมได้" },
            { q: "ตัวอักษร '天气' (อากาศ) พินอินคือ?", hanzi: "天气", options: ["tiānqì", "tiānqǐ", "tiǎnqì", "tiānqi"], answer: 0, explanation: "tiānqì: tiān (ฟ้า) + qì (ก๊าซ/สภาพอากาศ) ใช้พูดคุยเรื่องสภาพดินฟ้าอากาศ" },
            { q: "พินอิน 'xǐhuan' (ชอบ) ตัวอักษรคือ?", hanzi: "喜欢", options: ["喜欢", "想", "学习", "下雨"], answer: 0, explanation: "喜欢: เป็นกริยาแสดงความชอบ มักใช้คู่กับคำนาม" },
            { q: "ตัวอักษร '下午' (ช่วงบ่าย) พินอินคือ?", hanzi: "下午", options: ["xiàwǔ", "xiàwū", "xiāwǔ", "xiǎwǔ"], answer: 0, explanation: "xiàwǔ: xià (ล่าง/หลังจาก) + wǔ (เที่ยง) คือช่วงเวลาบ่ายครับ" },
            { q: "พินอิน 'xiānsheng' (คุณผู้ชาย) ตรงกับตัวอักษรใด?", hanzi: "先生", options: ["先生", "学生", "医生", "老师"], answer: 0, explanation: "xiānsheng: ในภาษาจีนคือการให้เกียรติเรียกคุณผู้ชาย" },
            { q: "ตัวอักษร '谢谢' (ขอบคุณ) พินอินคือ?", hanzi: "谢谢", options: ["xièxie", "xièxiè", "xiěxiè", "xiéxie"], answer: 1, explanation: "xièxie: คำพื้นฐานที่ต้องจำคือ ตัวหลังมักออกเสียงเป็นเสียงเบา (Neutral tone)" },
            { q: "ตัวอักษร '星期' (สัปดาห์) พินอินคือ?", hanzi: "星期", options: ["xīngqī", "xīngqǐ", "xǐngqī", "xīngqì"], answer: 0, explanation: "xīngqī: คำนี้ใช้สำหรับบอกวันและสัปดาห์ จำไว้ว่าเสียง 1 ทั้งคู่" },
            { q: "ตัวอักษร '医生' (หมอ) พินอินคือ?", hanzi: "医生", options: ["yīshēng", "yìshēng", "yīshěng", "yīshēng"], answer: 0, explanation: "yīshēng: yī (รักษา) + shēng (ชีวิต) รวมกันเป็นผู้รักษาชีวิต" },
            { q: "ตัวอักษร '医院' (โรงพยาบาล) พินอินคือ?", hanzi: "医院", options: ["yīyuàn", "yīyuán", "yǐyuàn", "yīyuǎn"], answer: 0, explanation: "yīyuàn: yī (รักษา) + yuàn (สถาบัน/院) เป็นที่รักษาพยาบาล" },
            { q: "ตัวอักษร '椅子' (เก้าอี้) พินอินคือ?", hanzi: "椅子", options: ["yǐzi", "yīzi", "yǐzǐ", "yizi"], answer: 0, explanation: "yǐzi: จำง่ายๆ ว่าเป็นคำนามสิ่งของมักลงท้ายด้วย zi" },
            { q: "พินอิน 'zàijiàn' (ลาก่อน) ตรงกับตัวอักษรใด?", hanzi: "再见", options: ["再见", "住", "做", "坐"], answer: 0, explanation: "再见: zài (อีกครั้ง) + jiàn (พบ) แปลตรงตัวว่าพบกันใหม่" },
            { q: "ตัวอักษร '怎么样' (เป็นอย่างไรบ้าง) พินอินคือ?", hanzi: "怎么样", options: ["zěnmeyàng", "zěnmeyáng", "zěnmeiyàng", "zěnmeyǎng"], answer: 0, explanation: "zěnmeyàng: เป็นคำถามยอดนิยมสำหรับถามถึงความรู้สึกหรือสถานการณ์" },
            { q: "ตัวอักษร '昨天' (เมื่อวาน) พินอินคือ?", hanzi: "昨天", options: ["zuótiān", "zuòtiān", "zuótiǎn", "zuotiān"], answer: 0, explanation: "zuótiān: zuó (วาน) + tiān (วัน) รวมเป็นเมื่อวานนี้" }
        ];

        const area = document.getElementById('exam-area');
        quizData.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<p><strong>ข้อที่ ${index + 1}: ${item.q} <button class="btn-speak" onclick="speakChinese('${item.hanzi}')">🔊 ฟังเสียง</button></strong></p>`;
            
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            item.options.forEach((opt, oIdx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    const feedback = qDiv.querySelector('.feedback');
                    feedback.style.display = 'block';
                    if(oIdx === item.answer) {
                        feedback.style.background = '#d4edda';
                        feedback.innerHTML = '<strong>✅ ถูกต้อง!</strong><br>' + item.explanation;
                    } else {
                        feedback.style.background = '#f8d7da';
                        feedback.innerHTML = '<strong>❌ ยังไม่ถูกต้อง</strong><br>' + item.explanation;
                    }
                    optDiv.querySelectorAll('button').forEach(b => b.disabled = true);
                };
                optDiv.appendChild(btn);
            });
            qDiv.appendChild(optDiv);
            qDiv.innerHTML += '<div class="feedback"></div>';
            area.appendChild(qDiv);
        });
    </script>
</body>
</html>
