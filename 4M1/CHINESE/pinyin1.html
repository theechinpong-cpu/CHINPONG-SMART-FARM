<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบ HSK 1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; line-height: 1.6; padding: 20px; background-color: #f9f9f9; max-width: 800px; margin: auto; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2980b9; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question { background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #2980b9; background: white; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #2980b9; color: white; }
        .btn-speak { background: #f1c40f; border: none; padding: 5px 10px; border-radius: 4px; font-size: 14px; margin-left: 10px; cursor: pointer; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; padding: 15px; border-radius: 5px; border-left: 5px solid #333; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="summary">
        <h2>สรุปเนื้อหาและเทคนิคการจำ HSK 1 (พระจอมเกล้าติวเตอร์)</h2>
        <p>หัวใจของภาษาจีนคือจังหวะของวรรณยุกต์ หากจำวรรณยุกต์ผิด ความหมายจะเปลี่ยนทันที ดังนั้นขอให้ใส่ใจเรื่องเสียงพินอินให้มากที่สุดครับ</p>
    </div>

    <div id="exam-area"></div>

    <script>
        function speakChinese(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        const quizData = [
            { q: "ตัวอักษร '爱' (รัก) มีพินอินที่ถูกต้องคือข้อใด?", hanzi: "爱", options: ["aì", "ài", "āi", "ǎi"], answer: 1, explanation: "คำตอบคือ ài (เสียง 4) อักษร 爱 (Ài) แปลว่ารัก พินอินที่ถูกต้องคือสระ ai ผันด้วยเสียงที่ 4 ครับ" },
            { q: "ตัวอักษร '杯子' (แก้ว) มีพินอินที่ถูกต้องคือข้อใด?", hanzi: "杯子", options: ["bēizi", "bèizi", "béizi", "bēizǐ"], answer: 0, explanation: "คำตอบคือ bēizi (เสียง 1 และเสียงเบา) หมายถึงแก้วน้ำ bēi คือถ้วย zi เป็นปัจจัยคำนามออกเสียงเบาครับ" },
            { q: "พินอิน 'hànyǔ' ตรงกับตัวอักษรใด?", hanzi: "汉语", options: ["汉语", "很好", "好喝", "后面"], answer: 0, explanation: "คำตอบคือ 汉语 (Hànyǔ) ซึ่งแปลว่าภาษาจีนครับ โดย hàn คือกลุ่มชาติพันธุ์ฮั่น yǔ คือภาษา" },
            { q: "ตัวอักษร '吃' (กิน) ออกเสียงพินอินอย่างไร?", hanzi: "吃", options: ["cī", "chī", "chǐ", "cì"], answer: 1, explanation: "คำตอบคือ chī เป็นการใช้เสียงพยัญชนะต้น ch ซึ่งต้องม้วนลิ้นเล็กน้อยครับ" },
            { q: "ตัวอักษร '电脑' (คอมพิวเตอร์) มีพินอินคือ?", hanzi: "电脑", options: ["diànnǎo", "diànnao", "diānnǎo", "diànnào"], answer: 0, explanation: "คำตอบคือ diànnǎo มาจาก diàn (ไฟฟ้า) + nǎo (สมอง) รวมกันเป็นสมองกลไฟฟ้าครับ" },
            { q: "พินอิน 'duìbuqǐ' (ขอโทษ) วรรณยุกต์ที่ถูกต้องคือข้อใด?", hanzi: "对不起", options: ["duìbuqǐ", "duìbùqǐ", "duibùqǐ", "duìbuqī"], answer: 0, explanation: "คำตอบคือ duìbuqǐ (4, เบา, 3) เป็นคำขอโทษที่พบบ่อยที่สุดครับ" },
            { q: "ตัวอักษร '高兴' (ดีใจ) พินอินคือ?", hanzi: "高兴", options: ["gāoxīng", "gāoxìn", "gǎoxīng", "gāoxǐng"], answer: 0, explanation: "คำตอบคือ gāoxīng (1, 1) แปลว่าดีใจหรือมีความสุขครับ" },
            { q: "ตัวอักษร '老师' (ครู) พินอินคือ?", hanzi: "老师", options: ["lǎoshī", "lāoshī", "lǎoshǐ", "lǎoshi"], answer: 0, explanation: "คำตอบคือ lǎoshī (3, 1) โดย lǎo แปลว่าแก่ (ในความหมายว่าอาวุโส) shī แปลว่าอาจารย์ครับ" },
            { q: "พินอิน 'mǐfàn' ตรงกับความหมายใด?", hanzi: "米饭", options: ["ข้าวสวย", "ผลไม้", "น้ำ", "เนื้อ"], answer: 0, explanation: "คำตอบคือ ข้าวสวย mǐ คือข้าวสาร fàn คืออาหารหุงต้มครับ" },
            { q: "ตัวอักษร '漂亮' (สวย) พินอินคือ?", hanzi: "漂亮", options: ["piàoliang", "piàoliàng", "piāoliang", "piǎoliang"], answer: 0, explanation: "คำตอบคือ piàoliang (4, เบา) ใช้บรรยายความสวยงามหรือสิ่งของที่ดูดีครับ" },
            { q: "ตัวอักษร '认识' (รู้จัก) พินอินคือ?", hanzi: "认识", options: ["rènshi", "rènshì", "rènshǐ", "rēnshi"], answer: 0, explanation: "คำตอบคือ rènshi (4, เบา) rèn แปลว่าจดจำ shì แปลว่ารู้แจ้งครับ" },
            { q: "พินอิน 'shāngdiàn' (ร้านค้า) เสียงวรรณยุกต์คือ?", hanzi: "商店", options: ["shāngdiàn", "shàngdiàn", "shāngdiǎn", "shāngdiān"], answer: 0, explanation: "คำตอบคือ shāngdiàn (1, 4) shāng คือการค้า diàn คือร้านครับ" },
            { q: "ตัวอักษร '睡觉' (นอนหลับ) พินอินคือ?", hanzi: "睡觉", options: ["shuìjiào", "shuìjiāo", "shuǐjiào", "shuijiao"], answer: 0, explanation: "คำตอบคือ shuìjiào (4, 4) แปลว่านอนหลับ โดย shuì คือนอน jiào คือการหลับครับ" },
            { q: "ตัวอักษร '天气' (อากาศ) พินอินคือ?", hanzi: "天气", options: ["tiānqì", "tiānqǐ", "tiǎnqì", "tiānqi"], answer: 0, explanation: "คำตอบคือ tiānqì (1, 4) tiān คือฟ้า qì คือก๊าซ/อากาศครับ" },
            { q: "พินอิน 'xǐhuan' (ชอบ) ตัวอักษรคือ?", hanzi: "喜欢", options: ["喜欢", "想", "学习", "下雨"], answer: 0, explanation: "คำตอบคือ 喜欢 (xǐhuan) แปลว่าชอบครับ" },
            { q: "ตัวอักษร '下午' (ช่วงบ่าย) พินอินคือ?", hanzi: "下午", options: ["xiàwǔ", "xiàwū", "xiāwǔ", "xiǎwǔ"], answer: 0, explanation: "คำตอบคือ xiàwǔ (4, 3) xià คือล่าง (หลัง) wǔ คือเที่ยงครับ" },
            { q: "พินอิน 'xiānsheng' (คุณผู้ชาย) ตรงกับตัวอักษรใด?", hanzi: "先生", options: ["先生", "学生", "医生", "老师"], answer: 0, explanation: "คำตอบคือ 先生 (xiānsheng) หมายถึงคุณผู้ชาย หรือคุณครูชายครับ" },
            { q: "ตัวอักษร '谢谢' (ขอบคุณ) พินอินคือ?", hanzi: "谢谢", options: ["xièxie", "xièxiè", "xiěxiè", "xiéxie"], answer: 1, explanation: "คำตอบคือ xièxie (4, เบา) ขอบคุณครับ ตัวที่สองมักออกเสียงเบา" },
            { q: "ตัวอักษร '星期' (สัปดาห์) พินอินคือ?", hanzi: "星期", options: ["xīngqī", "xīngqǐ", "xǐngqī", "xīngqì"], answer: 0, explanation: "คำตอบคือ xīngqī (1, 1) แปลว่าสัปดาห์ครับ" },
            { q: "ตัวอักษร '医生' (หมอ) พินอินคือ?", hanzi: "医生", options: ["yīshēng", "yìshēng", "yīshěng", "yīshēng"], answer: 0, explanation: "คำตอบคือ yīshēng (1, 1) หมอครับ" },
            { q: "ตัวอักษร '医院' (โรงพยาบาล) พินอินคือ?", hanzi: "医院", options: ["yīyuàn", "yīyuán", "yǐyuàn", "yīyuǎn"], answer: 0, explanation: "คำตอบคือ yīyuàn (1, 4) โรงพยาบาลครับ" },
            { q: "ตัวอักษร '椅子' (เก้าอี้) พินอินคือ?", hanzi: "椅子", options: ["yǐzi", "yīzi", "yǐzǐ", "yizi"], answer: 0, explanation: "คำตอบคือ yǐzi (3, เบา) เก้าอี้ครับ" },
            { q: "พินอิน 'zàijiàn' (ลาก่อน) ตรงกับตัวอักษรใด?", hanzi: "再见", options: ["再见", "住", "做", "坐"], answer: 0, explanation: "คำตอบคือ 再见 (zàijiàn) zài แปลว่าอีกครั้ง jiàn แปลว่าพบครับ" },
            { q: "ตัวอักษร '怎么样' (เป็นอย่างไรบ้าง) พินอินคือ?", hanzi: "怎么样", options: ["zěnmeyàng", "zěnmeyáng", "zěnmeiyàng", "zěnmeyǎng"], answer: 0, explanation: "คำตอบคือ zěnmeyàng (3, เบา, 4) เป็นคำถามเกี่ยวกับอาการหรือสภาพครับ" },
            { q: "ตัวอักษร '昨天' (เมื่อวาน) พินอินคือ?", hanzi: "昨天", options: ["zuótiān", "zuòtiān", "zuótiǎn", "zuotiān"], answer: 0, explanation: "คำตอบคือ zuótiān (2, 1) เมื่อวานนี้ครับ" }
        ];

        const area = document.getElementById('exam-area');
        quizData.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<p><strong>ข้อที่ ${index + 1}: ${item.q} <button class="btn-speak" onclick="speakChinese('${item.hanzi}')">🔊 ฟังเสียง</button></strong></p>`;
            
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            item.options.forEach((opt, oIdx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => {
                    const feedback = qDiv.querySelector('.feedback');
                    feedback.style.display = 'block';
                    if(oIdx === item.answer) {
                        feedback.style.background = '#d4edda';
                        feedback.innerHTML = '<strong>✅ ถูกต้อง!</strong><br>' + item.explanation;
                    } else {
                        feedback.style.background = '#f8d7da';
                        feedback.innerHTML = '<strong>❌ ยังไม่ถูกต้อง</strong><br>' + item.explanation;
                    }
                    optDiv.querySelectorAll('button').forEach(b => b.disabled = true);
                };
                optDiv.appendChild(btn);
            });
            qDiv.appendChild(optDiv);
            qDiv.innerHTML += '<div class="feedback"></div>';
            area.appendChild(qDiv);
        });
    </script>
</body>
</html>
