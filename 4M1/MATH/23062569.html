<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คณิตศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .summary-box { background: #e8f4fd; padding: 20px; border-left: 5px solid #3498db; margin-bottom: 20px; }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .options button { display: block; width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; }
        .correct { background: #2ecc71 !important; color: white; }
        .incorrect { background: #e74c3c !important; color: white; }
        .tip-box { background: #fff3cd; padding: 10px; margin-top: 10px; font-size: 0.9em; display: none; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="toggleLang()">Switch Language (TH/EN)</button>
    <div id="content">
        <h1>แบบทดสอบคณิตศาสตร์ ม.1 (ภาคเรียนที่ 1)</h1>
        <div class="summary-box" id="summary">
            <!-- Summary content injected via JS -->
        </div>
        <div id="quiz-area"></div>
        <div id="result-area" style="margin-top:20px; font-weight:bold;"></div>
    </div>
</div>

<script>
    let lang = 'th';
    const extraQuestions = [
    { q_th: "ค่าของ (-2)³ × (-2)² ÷ (-2)⁴ มีค่าเท่าใด?", q_en: "What is the value of (-2)³ × (-2)² ÷ (-2)⁴?", a_th: ["-2", "2", "-4", "4"], a_en: ["-2", "2", "-4", "4"], correct: 0, th: "ใช้สมบัติเลขยกกำลัง: ฐานเหมือนกันคูณกันนำเลขชี้กำลังมาบวก หารนำมาลบ", en: "Use power rules: same bases multiply/add exponents, divide/subtract", detail: "(-2)³⁺²⁻⁴ = (-2)¹ = -2" },
    { q_th: "ถ้า 3ˣ = 243 แล้ว x มีค่าเท่าใด?", q_en: "If 3ˣ = 243, what is x?", a_th: ["3", "4", "5", "6"], a_en: ["3", "4", "5", "6"], correct: 2, th: "เขียน 243 ในรูปเลขฐาน 3: 3×3×3×3×3 = 243", en: "Write 243 as base 3: 3×3×3×3×3 = 243", detail: "3⁵ = 243 ดังนั้น x = 5" },
    { q_th: "ผลลัพธ์ของ (¾ - ½) ÷ ⅛ คือเท่าใด?", q_en: "What is (¾ - ½) ÷ ⅛?", a_th: ["1", "2", "3", "4"], a_en: ["1", "2", "3", "4"], correct: 1, th: "ทำในวงเล็บก่อน: ¾ - ²⁄₄ = ¼", en: "Solve brackets first: ¾ - ²⁄₄ = ¼", detail: "¼ ÷ ⅛ = ¼ × ⁸⁄₁ = 2" },
    { q_th: "จำนวนในข้อใดมีค่าน้อยที่สุด?", q_en: "Which number is the smallest?", a_th: ["-⅓", "-¼", "-½", "-⅕"], a_en: ["-⅓", "-¼", "-½", "-⅕"], correct: 2, th: "บนเส้นจำนวน ยิ่งอยู่ทางซ้ายยิ่งน้อย (ติดลบมากค่าน้อย)", en: "On the number line, the further left the smaller (larger negative value)", detail: "-½ = -0.5 ซึ่งน้อยกว่า -0.33, -0.25, -0.2" },
    { q_th: "ถ้า A = -5, B = 3 แล้วค่าของ A² - B² คือเท่าใด?", q_en: "If A = -5, B = 3, what is A² - B²?", a_th: ["16", "34", "-16", "-34"], a_en: ["16", "34", "-16", "-34"], correct: 0, th: "แทนค่า: (-5)² - (3)²", en: "Substitute: (-5)² - (3)²", detail: "25 - 9 = 16" },
    { q_th: "เศษส่วนใดมีค่าเท่ากับ 0.8333...", q_en: "Which fraction equals 0.8333...?", a_th: ["⅚", "⅞", "⁵⁄₆", "⅔"], a_en: ["⅚", "⅞", "⁵⁄₆", "⅔"], correct: 0, th: "⁵⁄₆ = 5 ÷ 6 = 0.8333...", en: "⁵⁄₆ = 5 ÷ 6 = 0.8333...", detail: "⁵⁄₆ คือค่าทศนิยมซ้ำ" },
    { q_th: "ค่าของ √64 + ³√-27 คือเท่าใด?", q_en: "What is √64 + ³√-27?", a_th: ["5", "11", "-5", "-11"], a_en: ["5", "11", "-5", "-11"], correct: 0, th: "√64 = 8 และ ³√-27 = -3", en: "√64 = 8 and ³√-27 = -3", detail: "8 + (-3) = 5" },
    { q_th: "เส้นตรงสองเส้นที่ตัดกัน จะเกิดมุมตรงข้ามที่มีสมบัติอย่างไร?", q_en: "What is the property of vertically opposite angles?", a_th: ["รวมกันได้ 180°", "มีขนาดเท่ากัน", "รวมกันได้ 90°", "ไม่มีสมบัติใด"], a_en: ["Sum to 180°", "Are equal in size", "Sum to 90°", "None"], correct: 1, th: "มุมตรงข้ามที่เกิดจากเส้นตัดกันจะมีขนาดเท่ากันเสมอ", en: "Vertically opposite angles are always equal", detail: "สมบัติของเส้นขนานและเส้นตัด" },
    { q_th: "ผลรวมของมุมภายในรูปสามเหลี่ยมใดๆ คือเท่าใด?", q_en: "What is the sum of interior angles of any triangle?", a_th: ["90°", "180°", "270°", "360°"], a_en: ["90°", "180°", "270°", "360°"], correct: 1, th: "สมบัติเรขาคณิตพื้นฐาน: มุมภายในสามเหลี่ยมรวมกันได้ 180°", en: "Basic geometry: sum of triangle interior angles is 180°", detail: "คงที่เสมอสำหรับรูปสามเหลี่ยม" },
    { q_th: "ถ้า 2x + 5 = 15 แล้ว x มีค่าเท่าใด?", q_en: "If 2x + 5 = 15, what is x?", a_th: ["2", "3", "4", "5"], a_en: ["2", "3", "4", "5"], correct: 3, th: "ย้าย 5 ไปลบ: 2x = 10, แล้ว x = 10 ÷ 2", en: "Subtract 5: 2x = 10, then x = 10 ÷ 2", detail: "x = 5" },
    { q_th: "พื้นที่ของรูปสามเหลี่ยมที่มีฐาน 6 ซม. และสูง 4 ซม. คือเท่าใด?", q_en: "What is the area of a triangle with base 6 cm and height 4 cm?", a_th: ["10", "12", "24", "48"], a_en: ["10", "12", "24", "48"], correct: 1, th: "สูตร: ½ × ฐาน × สูง", en: "Formula: ½ × base × height", detail: "½ × 6 × 4 = 12" },
    { q_th: "(-1)¹⁰⁰ + (-1)¹⁰¹ มีค่าเท่าใด?", q_en: "What is (-1)¹⁰⁰ + (-1)¹⁰¹?", a_th: ["0", "2", "-2", "1"], a_en: ["0", "2", "-2", "1"], correct: 0, th: "เลขชี้กำลังคู่ได้ 1, เลขชี้กำลังคี่ได้ -1", en: "Even exponent = 1, odd exponent = -1", detail: "1 + (-1) = 0" },
    { q_th: "อัตราส่วน 2 : 5 คิดเป็นร้อยละเท่าใด?", q_en: "What percentage is the ratio 2 : 5?", a_th: ["20%", "40%", "50%", "25%"], a_en: ["20%", "40%", "50%", "25%"], correct: 1, th: "เปลี่ยนเป็นเศษส่วน: ²⁄₅ × 100", en: "Convert to fraction: ²⁄₅ × 100", detail: "(2 ÷ 5) × 100 = 40%" },
    { q_th: "รูปทรงเรขาคณิตใดมีปริมาตร = กว้าง × ยาว × สูง?", q_en: "Which shape has volume = length × width × height?", a_th: ["ลูกบาศก์", "ปริซึมสี่เหลี่ยม", "ทรงกลม", "กรวย"], a_en: ["Cube", "Rectangular prism", "Sphere", "Cone"], correct: 1, th: "ปริซึมสี่เหลี่ยม (ทรงสี่เหลี่ยมมุมฉาก)", en: "Rectangular prism", detail: "สูตรปริมาตรทรงสี่เหลี่ยมมุมฉาก" },
    { q_th: "ตัวหารร่วมมาก (ห.ร.ม.) ของ 12 และ 18 คือ?", q_en: "What is the HCF of 12 and 18?", a_th: ["2", "3", "6", "9"], a_en: ["2", "3", "6", "9"], correct: 2, th: "ตัวประกอบร่วมที่มากที่สุดของ 12 และ 18 คือ 6", en: "The greatest common factor of 12 and 18 is 6", detail: "12=6×2, 18=6×3" },
    { q_th: "ค่าของ | -10 + 4 | คือเท่าใด?", q_en: "What is the value of | -10 + 4 |?", a_th: ["-6", "6", "-14", "14"], a_en: ["-6", "6", "-14", "14"], correct: 1, th: "|-6| = 6", en: "|-6| = 6", detail: "ค่าสัมบูรณ์ของจำนวนลบคือจำนวนบวก" },
    { q_th: "ทศนิยม 0.125 ในรูปเศษส่วนคือ?", q_en: "What is 0.125 as a fraction?", a_th: ["⅛", "¼", "½", "¾"], a_en: ["⅛", "¼", "½", "¾"], correct: 0, th: "125/1000 = ⅛", en: "125/1000 = ⅛", detail: "หารด้วย 125 ทั้งเศษและส่วน" },
    { q_th: "มุมที่มีขนาด 90° เรียกว่ามุมอะไร?", q_en: "What is an angle of 90° called?", a_th: ["มุมแหลม", "มุมฉาก", "มุมป้าน", "มุมตรง"], a_en: ["Acute", "Right", "Obtuse", "Straight"], correct: 1, th: "มุมฉากคือมุม 90°", en: "A right angle is 90°", detail: "นิยามของมุมฉาก" },
    { q_th: "ถ้า x/4 = 3 แล้ว x เท่ากับ?", q_en: "If x/4 = 3, what is x?", a_th: ["¾", "1.33", "7", "12"], a_en: ["¾", "1.33", "7", "12"], correct: 3, th: "x = 3 × 4", en: "x = 3 × 4", detail: "x = 12" },
    { q_th: "รากที่สองที่เป็นบวกของ 144 คือ?", q_en: "What is the positive square root of 144?", a_th: ["12", "14", "72", "24"], a_en: ["12", "14", "72", "24"], correct: 0, th: "12 × 12 = 144", en: "12 × 12 = 144", detail: "√144 = 12" },
    { q_th: "เลขฐานสอง 101 มีค่าในฐานสิบเท่ากับ?", q_en: "What is binary 101 in decimal?", a_th: ["1", "3", "5", "6"], a_en: ["1", "3", "5", "6"], correct: 2, th: "(1×2²) + (0×2¹) + (1×2⁰)", en: "(1×2²) + (0×2¹) + (1×2⁰)", detail: "4 + 0 + 1 = 5" },
    { q_th: "ข้อใดเป็นจำนวนเฉพาะ?", q_en: "Which is a prime number?", a_th: ["1", "4", "7", "9"], a_en: ["1", "4", "7", "9"], correct: 2, th: "จำนวนเฉพาะมีตัวประกอบเพียง 1 และตัวมันเอง", en: "A prime has only 1 and itself as factors", detail: "7 เป็นจำนวนเฉพาะ" },
    { q_th: "ความน่าจะเป็นที่จะทอดลูกเต๋า 1 ลูกแล้วได้เลข 6 คือ?", q_en: "Probability of rolling a 6 on a die?", a_th: ["1/6", "1/2", "1/3", "1"], a_en: ["1/6", "1/2", "1/3", "1"], correct: 0, th: "โอกาสเกิด 1 หน้า จากทั้งหมด 6 หน้า", en: "1 favorable outcome out of 6", detail: "p = 1/6" },
    { q_th: "พหุนาม 2x + 3x มีผลลัพธ์เป็น?", q_en: "What is the result of 2x + 3x?", a_th: ["5x²", "5x", "6x", "6x²"], a_en: ["5x²", "5x", "6x", "6x²"], correct: 1, th: "นำสัมประสิทธิ์มาบวกกัน", en: "Add the coefficients", detail: "2+3 = 5, ได้ 5x" },
    { q_th: "มุมภายในรูปสี่เหลี่ยมรวมกันได้กี่องศา?", q_en: "Sum of interior angles of a quadrilateral?", a_th: ["180°", "270°", "360°", "540°"], a_en: ["180°", "270°", "360°", "540°"], correct: 2, th: "สี่เหลี่ยมแบ่งเป็น 2 สามเหลี่ยม (2 × 180°)", en: "Quadrilateral is 2 triangles (2 × 180°)", detail: "360°" }
    ];

    function renderQuiz() {
        const quizArea = document.getElementById('quiz-area');
        questions.forEach((q, index) => {
            let html = `<div class="question-container" id="q${index}">
                <p><strong>${index + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                <div class="options">
                    ${(lang === 'th' ? q.a_th : q.a_en).map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})">${opt}</button>`).join('')}
                </div>
                <div class="tip-box" id="tip${index}"></div>
            </div>`;
            quizArea.innerHTML += html;
        });
    }

    function checkAnswer(qIdx, aIdx) {
        const q = questions[qIdx];
        const container = document.getElementById(`q${qIdx}`);
        const buttons = container.querySelectorAll('button');
        
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (i === q.correct) btn.classList.add('correct');
            else if (i === aIdx) btn.classList.add('incorrect');
        });

        const tipBox = document.getElementById(`tip${qIdx}`);
        tipBox.style.display = 'block';
        tipBox.innerHTML = `<strong>Tutor's Secret Tip:</strong> ${lang === 'th' ? q.th : q.en}<br><small>${q.detail}</small>`;
    }

    function toggleLang() {
        lang = (lang === 'th' ? 'en' : 'th');
        document.getElementById('quiz-area').innerHTML = '';
        renderQuiz();
    }

    renderQuiz();
</script>

<p style="text-align:right; margin-top:20px; color:#555;">เขียนโดย พระจอมเกล้าติวเตอร์</p>

</body>
</html>
