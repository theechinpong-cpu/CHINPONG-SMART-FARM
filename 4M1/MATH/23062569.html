<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - คณิต ม.1 กลางภาค</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --light: #ecf0f1;
        }

        body { 
            font-family: 'Sarabun', sans-serif; 
            line-height: 1.6; 
            background: #f0f3f5; 
            color: var(--primary);
            margin: 0; padding: 20px;
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        /* Summary Section */
        .summary-header { border-bottom: 3px solid var(--secondary); margin-bottom: 25px; padding-bottom: 10px; }
        .summary-content { background: #fafafa; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #eee; }
        .thought-process { 
            background: #fff3cd; 
            padding: 15px; 
            border-left: 5px solid var(--warning); 
            margin: 15px 0; 
            font-weight: 500;
        }

        /* Language Toggle */
        .lang-bar { text-align: right; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; }
        .btn-lang { 
            background: var(--secondary); color: white; border: none; 
            padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold;
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-lang:hover { background: #2980b9; transform: translateY(-2px); }

        /* Quiz Layout */
        .question-container { 
            margin-bottom: 35px; padding: 25px; 
            border: 1px solid #e0e0e0; border-radius: 15px; 
            background: #fff; transition: 0.3s;
        }
        .question-container:hover { border-color: var(--secondary); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        
        .opt-btn { 
            padding: 15px; border: 2px solid #eee; background: white; 
            border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.2s;
            font-family: 'Sarabun', sans-serif;
        }
        .opt-btn:hover:not(:disabled) { background: #f8f9fa; border-color: var(--secondary); }
        
        .correct { background: var(--success) !important; color: white; border-color: #27ae60 !important; }
        .incorrect { background: var(--danger) !important; color: white; border-color: #c0392b !important; }

        /* Feedback Box */
        .feedback-box { 
            margin-top: 20px; padding: 15px; border-radius: 10px; display: none; 
            animation: fadeIn 0.5s;
        }
        .clue-tag { color: var(--danger); font-weight: bold; font-size: 1.1em; }

        /* Analysis Result */
        #result-container { 
            display: none; background: var(--primary); color: white; 
            padding: 30px; border-radius: 15px; margin-top: 40px; 
        }
        .score-display { font-size: 48px; text-align: center; margin: 20px 0; }
        .cat-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-bar">
        <button class="btn-lang" onclick="toggleLanguage()" id="langBtn">Language: TH</button>
    </div>

    <div id="summary-section">
        <div class="summary-header">
            <h1 id="title">สรุปบทเรียนคณิตศาสตร์ ม.1 (Semester 1)</h1>
        </div>
        <div class="summary-content" id="summaryText">
            </div>
    </div>

    <hr>
    <div id="quiz-area"></div>

    <div id="result-container">
        <h2 id="resTitle">วิเคราะห์ผลการเรียน</h2>
        <div class="score-display" id="totalScore">0/25</div>
        <div id="categoryAnalysis"></div>
        <div id="finalComment" style="text-align: center; margin-top: 20px; font-size: 1.2em;"></div>
    </div>

    <p style="text-align:right; margin-top:30px; font-weight:bold; color: var(--primary);">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</div>

<script>
    let currentLang = 'th';
    let userAnswers = new Array(25).fill(null); 
    let score = 0;

    const categories = [
        { id: 0, name: "จำนวนเต็ม (Integers)", questions: [0, 4, 11, 15, 23] },
        { id: 1, name: "ทศนิยมและเศษส่วน (Decimals & Fractions)", questions: [2, 3, 5, 12, 16] },
        { id: 2, name: "เลขยกกำลัง (Powers)", questions: [1, 11, 19, 20] },
        { id: 3, name: "เรขาคณิต (Geometry)", questions: [7, 8, 10, 13, 17, 24] },
        { id: 4, name: "สมการและความน่าจะเป็น (Equations & Stats)", questions: [9, 18, 21, 22] }
    ];

    const questions = [
        { q_th: "ค่าของ (-2)³ × (-2)² ÷ (-2)⁴ มีค่าเท่าใด?", q_en: "What is the value of (-2)³ × (-2)² ÷ (-2)⁴?", a_th: ["-2", "2", "-4", "4"], a_en: ["-2", "2", "-4", "4"], correct: 0, th: "ฐานเหมือนกันคูณกันเลขชี้กำลังบวกกัน หารกันเลขชี้กำลังลบกัน", en: "Multiplying same bases adds exponents; dividing subtracts them", detail: "(-2)³⁺²⁻⁴ = (-2)¹ = -2" },
        { q_th: "ถ้า 3ˣ = 243 แล้ว x มีค่าเท่าใด?", q_en: "If 3ˣ = 243, what is x?", a_th: ["3", "4", "5", "6"], a_en: ["3", "4", "5", "6"], correct: 2, th: "243 คือ 3 คูณกัน 5 ตัว", en: "243 is 3 multiplied by itself 5 times", detail: "3 × 3 × 3 × 3 × 3 = 243 ดังนั้น x = 5" },
        { q_th: "ผลลัพธ์ของ (¾ - ½) ÷ ⅛ คือเท่าใด?", q_en: "What is (¾ - ½) ÷ ⅛?", a_th: ["1", "2", "3", "4"], a_en: ["1", "2", "3", "4"], correct: 1, th: "ทำในวงเล็บโดยทำส่วนให้เท่ากันก่อน แล้วเปลี่ยนหารเป็นคูณกลับเศษเป็นส่วน", en: "Solve inside the brackets with common denominator, then multiply by the reciprocal", detail: "(3/4 - 2/4) = 1/4; 1/4 ÷ 1/8 = 1/4 × 8 = 2" },
        { q_th: "จำนวนในข้อใดมีค่าน้อยที่สุด?", q_en: "Which number is the smallest?", a_th: ["-⅓", "-¼", "-½", "-⅕"], a_en: ["-⅓", "-¼", "-½", "-⅕"], correct: 2, th: "บนเส้นจำนวน ยิ่งติดลบมาก ยิ่งอยู่ทางซ้าย ยิ่งมีค่าน้อย", en: "On a number line, larger negative numbers are further left and have smaller value", detail: "-½ = -0.5 ซึ่งมีค่าน้อยที่สุดเมื่อเทียบกับ -0.33, -0.25 และ -0.2" },
        { q_th: "ถ้า A = -5, B = 3 แล้วค่าของ A² - B² คือเท่าใด?", q_en: "If A = -5, B = 3, what is A² - B²?", a_th: ["16", "34", "-16", "-34"], a_en: ["16", "34", "-16", "-34"], correct: 0, th: "ระวังเรื่องเครื่องหมายเมื่อยกกำลังเลขลบ", en: "Be careful with signs when squaring negative numbers", detail: "(-5)² - (3)² = 25 - 9 = 16" },
        { q_th: "เศษส่วนใดมีค่าเท่ากับ 0.8333...", q_en: "Which fraction equals 0.8333...?", a_th: ["⅚", "⅞", "⁵⁄₆", "⅔"], a_en: ["⅚", "⅞", "⁵⁄₆", "⅔"], correct: 0, th: "ใช้การหารยาวหรือจดจำทศนิยมซ้ำที่เป็นพื้นฐาน", en: "Use long division or memorize basic recurring decimals", detail: "5 ÷ 6 = 0.8333..." },
        { q_th: "ค่าของ √64 + ³√-27 คือเท่าใด?", q_en: "What is √64 + ³√-27?", a_th: ["5", "11", "-5", "-11"], a_en: ["5", "11", "-5", "-11"], correct: 0, th: "รากที่สามของจำนวนลบได้ค่าลบ", en: "Cube root of a negative number is negative", detail: "8 + (-3) = 5" },
        { q_th: "เส้นตรงสองเส้นที่ตัดกัน จะเกิดมุมตรงข้ามที่มีสมบัติอย่างไร?", q_en: "What is the property of vertically opposite angles?", a_th: ["รวมกันได้ 180°", "มีขนาดเท่ากัน", "รวมกันได้ 90°", "ไม่มีสมบัติใด"], a_en: ["Sum to 180°", "Are equal in size", "Sum to 90°", "None"], correct: 1, th: "มุมตรงข้ามมีขนาดเท่ากันเสมอ", en: "Opposite angles are always equal", detail: "เป็นสมบัติพื้นฐานของการตัดกันของเส้นตรง" },
        { q_th: "ผลรวมของมุมภายในรูปสามเหลี่ยมใดๆ คือเท่าใด?", q_en: "What is the sum of interior angles of any triangle?", a_th: ["90°", "180°", "270°", "360°"], a_en: ["90°", "180°", "270°", "360°"], correct: 1, th: "สามเหลี่ยมรวมกันได้ครึ่งหนึ่งของวงกลมในแง่ของมุมระนาบ", en: "Triangle angles sum to half of a full turn (360°)", detail: "180° เสมอไม่ว่าเป็นสามเหลี่ยมชนิดใด" },
        { q_th: "ถ้า 2x + 5 = 15 แล้ว x มีค่าเท่าใด?", q_en: "If 2x + 5 = 15, what is x?", a_th: ["2", "3", "4", "5"], a_en: ["2", "3", "4", "5"], correct: 3, th: "ใช้การย้ายข้างและดำเนินการย้อนกลับ", en: "Use transposition and inverse operations", detail: "2x = 15 - 5 => 2x = 10 => x = 5" },
        { q_th: "พื้นที่ของรูปสามเหลี่ยมที่มีฐาน 6 ซม. และสูง 4 ซม. คือเท่าใด?", q_en: "What is the area of a triangle with base 6 cm and height 4 cm?", a_th: ["10", "12", "24", "48"], a_en: ["10", "12", "24", "48"], correct: 1, th: "สูตรคือ ½ × ฐาน × สูง", en: "The formula is ½ × base × height", detail: "½ × 6 × 4 = 12 ตร.ซม." },
        { q_th: "(-1)¹⁰⁰ + (-1)¹⁰¹ มีค่าเท่าใด?", q_en: "What is (-1)¹⁰⁰ + (-1)¹⁰¹?", a_th: ["0", "2", "-2", "1"], a_en: ["0", "2", "-2", "1"], correct: 0, th: "-1 ยกกำลังคู่ได้ 1, ยกกำลังคี่ได้ -1", en: "-1 to even power is 1, odd power is -1", detail: "1 + (-1) = 0" },
        { q_th: "อัตราส่วน 2 : 5 คิดเป็นร้อยละเท่าใด?", q_en: "What percentage is the ratio 2 : 5?", a_th: ["20%", "40%", "50%", "25%"], a_en: ["20%", "40%", "50%", "25%"], correct: 1, th: "ทำส่วนให้เป็น 100 หรือคูณด้วย 100", en: "Make denominator 100 or multiply by 100", detail: "(2/5) × 100 = 40%" },
        { q_th: "รูปทรงเรขาคณิตใดมีปริมาตร = กว้าง × ยาว × สูง?", q_en: "Which shape has volume = length × width × height?", a_th: ["ลูกบาศก์", "ปริซึมสี่เหลี่ยม", "ทรงกลม", "กรวย"], a_en: ["Cube", "Rectangular prism", "Sphere", "Cone"], correct: 1, th: "เป็นรูปทรงที่มีหน้าตัดเป็นรูปสี่เหลี่ยม", en: "A shape with a rectangular cross-section", detail: "สูตรพื้นที่ฐาน × สูง ของปริซึมสี่เหลี่ยม" },
        { q_th: "ตัวหารร่วมมาก (ห.ร.ม.) ของ 12 และ 18 คือ?", q_en: "What is the HCF of 12 and 18?", a_th: ["2", "3", "6", "9"], a_en: ["2", "3", "6", "9"], correct: 2, th: "เลขที่มากที่สุดที่หารทั้งสองจำนวนลงตัว", en: "The highest number that divides both", detail: "ตัวประกอบของ 12 คือ 1,2,3,4,6,12; ตัวประกอบของ 18 คือ 1,2,3,6,9,18 ตัวร่วมที่มากสุดคือ 6" },
        { q_th: "ค่าของ | -10 + 4 | คือเท่าใด?", q_en: "What is the value of | -10 + 4 |?", a_th: ["-6", "6", "-14", "14"], a_en: ["-6", "6", "-14", "14"], correct: 1, th: "หาผลลัพธ์ข้างในก่อน แล้วถอดค่าสัมบูรณ์ (ต้องเป็นบวกเสมอ)", en: "Solve inside first, then take absolute value (always positive)", detail: "|-6| = 6" },
        { q_th: "ทศนิยม 0.125 ในรูปเศษส่วนคือ?", q_en: "What is 0.125 as a fraction?", a_th: ["⅛", "¼", "½", "¾"], a_en: ["⅛", "¼", "½", "¾"], correct: 0, th: "0.125 คือ 125/1000", en: "0.125 is 125 out of 1000", detail: "125/1000 ทอนเป็นอย่างต่ำได้ 1/8" },
        { q_th: "มุมที่มีขนาด 90° เรียกว่ามุมอะไร?", q_en: "What is an angle of 90° called?", a_th: ["มุมแหลม", "มุมฉาก", "มุมป้าน", "มุมตรง"], a_en: ["Acute", "Right", "Obtuse", "Straight"], correct: 1, th: "เป็นมุมที่พบในมุมห้องหรือสันหนังสือ", en: "The angle found in corners of rooms or books", detail: "นิยามพื้นฐานของมุมฉาก" },
        { q_th: "ถ้า x/4 = 3 แล้ว x เท่ากับ?", q_en: "If x/4 = 3, what is x?", a_th: ["¾", "1.33", "7", "12"], a_en: ["¾", "1.33", "7", "12"], correct: 3, th: "ย้าย 4 ที่หารอยู่ไปคูณอีกฝั่ง", en: "Move 4 from divisor to multiplier on the other side", detail: "x = 3 × 4 = 12" },
        { q_th: "รากที่สองที่เป็นบวกของ 144 คือ?", q_en: "What is the positive square root of 144?", a_th: ["12", "14", "72", "24"], a_en: ["12", "14", "72", "24"], correct: 0, th: "อะไรเอ่ยคูณตัวเองได้ 144?", en: "What number times itself is 144?", detail: "12 × 12 = 144" },
        { q_th: "เลขฐานสอง 101 มีค่าในฐานสิบเท่ากับ?", q_en: "What is binary 101 in decimal?", a_th: ["1", "3", "5", "6"], a_en: ["1", "3", "5", "6"], correct: 2, th: "ใช้ค่าประจำหลัก 2², 2¹, 2⁰", en: "Use place values 2², 2¹, 2⁰", detail: "1(4) + 0(2) + 1(1) = 5" },
        { q_th: "ข้อใดเป็นจำนวนเฉพาะ?", q_en: "Which is a prime number?", a_th: ["1", "4", "7", "9"], a_en: ["1", "4", "7", "9"], correct: 2, th: "มีแค่ 1 และตัวมันเองที่หารลงตัว (1 ไม่ใช่จำนวนเฉพาะ)", en: "Only 1 and itself divide it (1 is not prime)", detail: "7 เป็นจำนวนเฉพาะ" },
        { q_th: "ความน่าจะเป็นที่จะทอดลูกเต๋า 1 ลูกแล้วได้เลข 6 คือ?", q_en: "Probability of rolling a 6 on a die?", a_th: ["1/6", "1/2", "1/3", "1"], a_en: ["1/6", "1/2", "1/3", "1"], correct: 0, th: "จำนวนเหตุการณ์ที่สนใจ / เหตุการณ์ทั้งหมด", en: "Interested outcomes / Total outcomes", detail: "มีเลข 6 เพียงหน้าเดียว จากทั้งหมด 6 หน้า" },
        { q_th: "พหุนาม 2x + 3x มีผลลัพธ์เป็น?", q_en: "What is the result of 2x + 3x?", a_th: ["5x²", "5x", "6x", "6x²"], a_en: ["5x²", "5x", "6x", "6x²"], correct: 1, th: "บวกลบพหุนามทำได้เฉพาะเอกนามที่คล้ายกัน", en: "Addition is only for like terms", detail: "(2+3)x = 5x" },
        { q_th: "มุมภายในรูปสี่เหลี่ยมรวมกันได้กี่องศา?", q_en: "Sum of interior angles of a quadrilateral?", a_th: ["180°", "270°", "360°", "540°"], a_en: ["180°", "270°", "360°", "540°"], correct: 2, th: "รูปสี่เหลี่ยมสร้างจากสามเหลี่ยม 2 รูป", en: "A quadrilateral is made of 2 triangles", detail: "2 × 180 = 360°" }
    ];

    const summaries = {
        th: `
            <h3>1. จำนวนเต็ม (Integers)</h3>
            <p>จำนวนเต็มประกอบด้วยจำนวนเต็มบวก ศูนย์ และจำนวนเต็มลบ บนเส้นจำนวนยิ่งไปทางขวาค่ายิ่งมาก</p>
            <div class="thought-process">💡 เทคนิค: เครื่องหมายเหมือนกันบวกกันสะสมค่า เครื่องหมายต่างกันหักล้างกัน ผลลัพธ์ตามตัวที่ค่ามากกว่า</div>
            
            <h3>2. เลขยกกำลัง (Powers)</h3>
            <p>ฐาน (Base) และ เลขชี้กำลัง (Exponent) บอกจำนวนครั้งที่ฐานคูณตัวเอง</p>
            <div class="thought-process">💡 เทคนิค: (ลบ)ยกกำลังคู่ได้บวก, (ลบ)ยกกำลังคี่ได้ลบ</div>
            
            <h3>3. เศษส่วนและทศนิยม</h3>
            <p>การเปรียบเทียบเศษส่วนต้องทำส่วนให้เท่ากัน (หา ค.ร.น.)</p>
            <div class="thought-process">💡 เทคนิค: การคูณทศนิยม ให้นับตำแหน่งรวมกันแล้วค่อยเติมจุด</div>
        `,
        en: `
            <h3>1. Integers</h3>
            <p>Integers include positive, zero, and negative values. Values increase as you move right on the number line.</p>
            <div class="thought-process">💡 Tip: Same signs add values; different signs subtract. The result takes the sign of the larger value.</div>
            
            <h3>2. Powers & Exponents</h3>
            <p>Indicates how many times a base is multiplied by itself.</p>
            <div class="thought-process">💡 Tip: (Negative)^Even = Positive, (Negative)^Odd = Negative</div>
        `
    };

    function renderSummary() {
        document.getElementById('summaryText').innerHTML = summaries[currentLang];
        document.getElementById('title').innerText = currentLang === 'th' ? "สรุปบทเรียนคณิตศาสตร์ ม.1 (ภาคเรียนที่ 1)" : "Grade 7 Math Summary (Semester 1)";
        document.getElementById('resTitle').innerText = currentLang === 'th' ? "วิเคราะห์ผลการเรียน" : "Learning Analysis";
    }

    function renderQuiz() {
        const quizArea = document.getElementById('quiz-area');
        quizArea.innerHTML = '';
        questions.forEach((q, index) => {
            const container = document.createElement('div');
            container.className = 'question-container';
            container.id = `q-box-${index}`;
            
            const questionText = currentLang === 'th' ? q.q_th : q.q_en;
            const options = currentLang === 'th' ? q.a_th : q.a_en;

            container.innerHTML = `
                <p><strong>ข้อที่ ${index + 1}:</strong> ${questionText}</p>
                <div class="options-grid">
                    ${options.map((opt, i) => `
                        <button class="opt-btn" id="btn-${index}-${i}" 
                            onclick="handleAnswer(${index}, ${i})"
                            ${userAnswers[index] !== null ? 'disabled' : ''}>
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="feedback-box" id="fb-${index}" style="${userAnswers[index] !== null ? 'display:block' : 'display:none'}">
                    <p><span class="clue-tag">Clue:</span> ${currentLang === 'th' ? q.th : q.en}</p>
                    <p style="color: #666; font-size: 0.9em;"><em>Detail: ${q.detail}</em></p>
                </div>
            `;
            quizArea.appendChild(container);

            // Re-apply styles if already answered
            if (userAnswers[index] !== null) {
                const selectedBtn = document.getElementById(`btn-${index}-${userAnswers[index]}`);
                const correctBtn = document.getElementById(`btn-${index}-${q.correct}`);
                if (userAnswers[index] === q.correct) {
                    selectedBtn.classList.add('correct');
                } else {
                    selectedBtn.classList.add('incorrect');
                    correctBtn.classList.add('correct');
                }
            }
        });
    }

    function handleAnswer(qIdx, aIdx) {
        userAnswers[qIdx] = aIdx;
        const q = questions[qIdx];
        const buttons = document.querySelectorAll(`[id^="btn-${qIdx}-"]`);
        
        buttons.forEach(btn => btn.disabled = true);
        
        const selectedBtn = document.getElementById(`btn-${qIdx}-${aIdx}`);
        const correctBtn = document.getElementById(`btn-${qIdx}-${q.correct}`);
        
        if (aIdx === q.correct) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('incorrect');
            correctBtn.classList.add('correct');
        }

        document.getElementById(`fb-${qIdx}`).style.display = 'block';
        checkCompletion();
    }

    function checkCompletion() {
        if (userAnswers.every(ans => ans !== null)) {
            showAnalysis();
            alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว (Simulated to thee.chinpong@hmail.com)");
        }
    }

    function showAnalysis() {
        const resContainer = document.getElementById('result-container');
        const analysisArea = document.getElementById('categoryAnalysis');
        resContainer.style.display = 'block';
        
        document.getElementById('totalScore').innerText = `${score} / 25`;
        
        analysisArea.innerHTML = '';
        categories.forEach(cat => {
            let catScore = 0;
            cat.questions.forEach(qIdx => {
                if (userAnswers[qIdx] === questions[qIdx].correct) catScore++;
            });
            const percent = (catScore / cat.questions.length) * 100;
            const statusColor = percent >= 60 ? '#2ecc71' : '#e74c3c';
            
            analysisArea.innerHTML += `
                <div class="cat-row">
                    <span>${cat.name}</span>
                    <span style="color:${statusColor}">${catScore}/${cat.questions.length} (${percent.toFixed(0)}%)</span>
                </div>
            `;
        });

        const totalPercent = (score / 25) * 100;
        const comment = document.getElementById('finalComment');
        if (totalPercent >= 60) {
            comment.innerHTML = `<span style="color:#2ecc71">🌟 ทำได้ดีมาก! คุณมีความเข้าใจในระดับมาตรฐาน</span>`;
        } else {
            comment.innerHTML = `<span style="color:#e74c3c">⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม: ลองเน้นบทเรียนที่เป็นสีแดงด้านบนนะ</span>`;
        }
        
        resContainer.scrollIntoView({ behavior: 'smooth' });
    }

    function toggleLanguage() {
        currentLang = currentLang === 'th' ? 'en' : 'th';
        document.getElementById('langBtn').innerText = `Language: ${currentLang.toUpperCase()}`;
        renderSummary();
        renderQuiz();
    }

    // Initial Render
    renderSummary();
    renderQuiz();
</script>

</body>
</html>
