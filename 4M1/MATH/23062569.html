<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คณิตศาสตร์ ม.1 - แบบทดสอบ 25 ข้อ</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; margin-bottom: 20px; }
        .q-box { margin: 20px 0; padding: 15px; border-bottom: 1px solid #eee; }
        .option { display: block; width: 100%; margin: 5px 0; padding: 8px; text-align: left; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        .tutor-tip { display: none; background: #fff3cd; padding: 10px; margin-top: 10px; font-size: 0.9em; border-left: 4px solid #f1c40f; }
    </style>
</head>
<body>

<div class="card">
    <h2>แบบทดสอบคณิตศาสตร์ ม.1 (25 ข้อ)</h2>
    <button class="btn" onclick="location.reload()">เริ่มทำใหม่</button>
    <div id="quiz-container"></div>
</div>

<script>
    const questions = [
        { q: "(-2)³ × (-2)² ÷ (-2)⁴ มีค่าเท่าใด?", a: ["-2", "2", "-4", "4"], correct: 0, tip: "เลขชี้กำลังคูณให้บวก หารให้ลบ" },
        { q: "ถ้า 3ˣ = 243 แล้ว x คือ?", a: ["3", "4", "5", "6"], correct: 2, tip: "3×3×3×3×3 = 243" },
        { q: "พื้นที่สามเหลี่ยมฐาน 6 สูง 4 คือ?", a: ["10", "12", "24", "48"], correct: 1, tip: "สูตรคือ 0.5 × ฐาน × สูง" },
        { q: "(-1)¹⁰⁰ + (-1)¹⁰¹ มีค่าเท่าใด?", a: ["0", "2", "-2", "1"], correct: 0, tip: "เลขชี้กำลังคู่ได้ 1 คี่ได้ -1" },
        { q: "ถ้า 2x + 5 = 15 แล้ว x คือ?", a: ["2", "3", "4", "5"], correct: 3, tip: "ย้าย 5 ไปลบ แล้วหารด้วย 2" },
        { q: "จำนวนในข้อใดมีค่าน้อยที่สุด?", a: ["-1/3", "-1/4", "-1/2", "-1/5"], correct: 2, tip: "ติดลบมาก ยิ่งน้อย" },
        { q: "(-5) + 8 มีค่าเท่าใด?", a: ["-3", "3", "13", "-13"], correct: 1, tip: "มีเงิน 8 เป็นหนี้ 5" },
        { q: "ตัวประกอบของ 12 คือข้อใด?", a: ["1, 2, 3, 4, 6, 12", "1, 2, 4, 8, 12", "2, 3, 4, 6", "1, 3, 4, 12"], correct: 0, tip: "เลขที่หาร 12 ลงตัว" },
        { q: "ห.ร.ม. ของ 12 และ 18 คือ?", a: ["2", "3", "6", "9"], correct: 2, tip: "เลขมากสุดที่หารทั้งคู่ลงตัว" },
        { q: "ทศนิยม 0.5 ในรูปเศษส่วนคือ?", a: ["1/4", "1/2", "3/4", "1/5"], correct: 1, tip: "5/10 ตัดทอนเป็นอย่างต่ำ" },
        { q: "มุมภายในรูปสามเหลี่ยมรวมกันได้?", a: ["90°", "180°", "270°", "360°"], correct: 1, tip: "สมบัติเรขาคณิตพื้นฐาน" },
        { q: "√64 มีค่าเท่าใด?", a: ["4", "6", "8", "16"], correct: 2, tip: "เลขอะไรคูณตัวเองได้ 64" },
        { q: "ถ้า x/4 = 3 แล้ว x คือ?", a: ["7", "10", "12", "16"], correct: 2, tip: "ย้าย 4 ไปคูณ 3" },
        { q: "(-10) - (-4) มีค่าเท่าใด?", a: ["-6", "6", "-14", "14"], correct: 0, tip: "ลบด้วยลบกลายเป็นบวก" },
        { q: "(-2) × (-3) × (-1) คือ?", a: ["-6", "6", "-5", "5"], correct: 0, tip: "ลบคูณลบได้บวก คูณลบอีกทีได้ลบ" },
        { q: "จำนวนเฉพาะที่น้อยที่สุดคือ?", a: ["0", "1", "2", "3"], correct: 2, tip: "1 ไม่ใช่จำนวนเฉพาะ" },
        { q: "5% ของ 200 คือ?", a: ["5", "10", "15", "20"], correct: 1, tip: "5/100 × 200" },
        { q: "3² + 4² มีค่าเท่าใด?", a: ["7", "14", "25", "49"], correct: 2, tip: "9 + 16" },
        { q: "มุมฉากมีกี่องศา?", a: ["45°", "90°", "180°", "360°"], correct: 1, tip: "มุมที่ตั้งฉากกัน" },
        { q: "(-2)⁴ มีค่าเท่าใด?", a: ["-8", "8", "-16", "16"], correct: 3, tip: "เลขชี้กำลังคู่ ผลลัพธ์เป็นบวก" },
        { q: "รูปสี่เหลี่ยมรวมมุมภายในได้?", a: ["180°", "270°", "360°", "540°"], correct: 2, tip: "2 เท่าของสามเหลี่ยม" },
        { q: "เศษส่วน 1/4 ของ 100 คือ?", a: ["20", "25", "40", "50"], correct: 1, tip: "100 หารด้วย 4" },
        { q: "อัตราส่วน 1:2 คิดเป็นร้อยละ?", a: ["25%", "50%", "75%", "100%"], correct: 1, tip: "1 ใน 2 ส่วน" },
        { q: "ปริมาตรทรงสี่เหลี่ยมคือ?", a: ["ก×ย", "2(ก+ย)", "ก×ย×ส", "ก+ย+ส"], correct: 2, tip: "พื้นที่ฐานคูณสูง" },
        { q: "ถ้า 5x = 25 แล้ว x คือ?", a: ["3", "4", "5", "6"], correct: 2, tip: "25 หารด้วย 5" }
    ];

    const container = document.getElementById('quiz-container');

    function loadQuiz() {
        questions.forEach((item, idx) => {
            let div = document.createElement('div');
            div.className = 'q-box';
            div.innerHTML = `<p>${idx+1}. ${item.q}</p>` + 
                item.a.map((opt, i) => `<button class="option" onclick="check(${idx}, ${i}, this)">${opt}</button>`).join('') +
                `<div class="tutor-tip" id="tip-${idx}"><strong>เทคนิค:</strong> ${item.tip}</div>`;
            container.appendChild(div);
        });
    }

    function check(qIdx, aIdx, btn) {
        let q = questions[qIdx];
        let parent = btn.parentElement;
        let btns = parent.querySelectorAll('.option');
        btns.forEach(b => b.disabled = true);
        
        if (aIdx === q.correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns[q.correct].classList.add('correct');
        }
        document.getElementById(`tip-${qIdx}`).style.display = 'block';
    }

    loadQuiz();
</script>

<p style="text-align:center; margin-top:20px; color:#888;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
