<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบคณิตศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .choice { display: block; margin: 5px 0; padding: 10px; background: #eee; cursor: pointer; border-radius: 5px; }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .tip { background: #fff3cd; padding: 10px; border-left: 5px solid #ffc107; margin-top: 10px; display: none; }
        #summary { margin-top: 30px; padding: 20px; border: 2px solid #3498db; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="toggleLang()">Switch Language (TH/EN)</button>
        <h1 id="title">ข้อสอบคณิตศาสตร์ ม.1</h1>
        <div id="quiz-area"></div>
        <div id="summary"></div>
    </div>

    <script>
        let lang = 'th';
    const questions = [
    { q_th: "ผลลัพธ์ของ (-15) + 20 - (-5) คือเท่าใด?", q_en: "What is the result of (-15) + 20 - (-5)?", a_th: ["0", "5", "10", "15"], a_en: ["0", "5", "10", "15"], correct: 2, th: "เปลี่ยนลบซ้อนลบเป็นบวก: (-15) + 20 + 5", en: "Change double minus to plus: (-15) + 20 + 5", detail: "(-15) + 20 = 5 และ 5 + 5 = 10" },
    { q_th: "จงหาค่าของ (-2) × (-3) × (-4)", q_en: "Find the value of (-2) × (-3) × (-4)", a_th: ["24", "-24", "12", "-12"], a_en: ["24", "-24", "12", "-12"], correct: 1, th: "คูณจำนวนลบ 3 ตัว ผลลัพธ์จะเป็นจำนวนลบ", en: "Multiplying three negative numbers results in a negative", detail: "(-2) × (-3) = 6 และ 6 × (-4) = -24" },
    { q_th: "เลขยกกำลังใดมีค่าเท่ากับ 81?", q_en: "Which exponent has a value of 81?", a_th: ["3³", "9²", "2⁶", "8²"], a_en: ["3³", "9²", "2⁶", "8²"], correct: 1, th: "9² คือ 9 × 9 = 81", en: "9² means 9 × 9 = 81", detail: "9² = 81" },
    { q_th: "ค่าของ 2³ × 2² คือเท่าใด?", q_en: "What is the value of 2³ × 2²?", a_th: ["2⁵", "2⁶", "4⁵", "4⁶"], a_en: ["2⁵", "2⁶", "4⁵", "4⁶"], correct: 0, th: "เลขฐานเหมือนกันคูณกัน ให้นำเลขชี้กำลังมาบวกกัน", en: "When multiplying same bases, add the exponents", detail: "2³⁺² = 2⁵ = 32" },
    { q_th: "ผลลัพธ์ของ 0.5 ÷ 0.25 คือเท่าใด?", q_en: "What is the result of 0.5 ÷ 0.25?", a_th: ["0.2", "2", "20", "0.02"], a_en: ["0.2", "2", "20", "0.02"], correct: 1, th: "ทำให้ตัวหารเป็นจำนวนเต็มโดยคูณ 100 ทั้งเศษและส่วน", en: "Make the divisor an integer by multiplying both by 100", detail: "0.5 ÷ 0.25 = 50 ÷ 25 = 2" },
    { q_th: "ส่วนกลับของ 3/4 คือเท่าใด?", q_en: "What is the reciprocal of 3/4?", a_th: ["4/3", "-3/4", "3/4", "1"], a_en: ["4/3", "-3/4", "3/4", "1"], correct: 0, th: "สลับเศษเป็นส่วน", en: "Swap the numerator and denominator", detail: "ส่วนกลับของ a/b คือ b/a" },
    { q_th: "ภาพด้านบนของรูปทรงลูกบาศก์ที่วางซ้อนกันคืออะไร?", q_en: "What is the top view of stacked cubes?", a_th: ["สี่เหลี่ยมจัตุรัส", "สามเหลี่ยม", "วงกลม", "ห้าเหลี่ยม"], a_en: ["Square", "Triangle", "Circle", "Pentagon"], correct: 0, th: "มองลงมาจากมุมสูงจะเห็นพื้นผิวระนาบเดียว", en: "Viewing from above reveals a flat 2D plane", detail: "การมองภาพฉายด้านบนของลูกบาศก์จะได้รูปสี่เหลี่ยมจัตุรัส" },
    { q_th: "การสร้างมุม 60° ใช้หลักการใด?", q_en: "What principle is used to construct a 60° angle?", a_th: ["รูปสามเหลี่ยมด้านเท่า", "รูปสามเหลี่ยมหน้าจั่ว", "วงกลม", "เส้นขนาน"], a_en: ["Equilateral triangle", "Isosceles triangle", "Circle", "Parallel lines"], correct: 0, th: "มุมภายในของรูปสามเหลี่ยมด้านเท่ามีขนาด 60°", en: "Interior angles of an equilateral triangle are 60°", detail: "การสร้างมุม 60° อาศัยการกางวงเวียนด้วยรัศมีคงที่" },
    { q_th: "(-100) ÷ (-4) มีค่าเท่ากับเท่าใด?", q_en: "What is (-100) ÷ (-4)?", a_th: ["-25", "25", "-400", "400"], a_en: ["-25", "25", "-400", "400"], correct: 1, th: "ลบหารลบ ได้ผลลัพธ์เป็นบวก", en: "A negative divided by a negative is positive", detail: "(-100) ÷ (-4) = 25" },
    { q_th: "(-2)⁴ มีค่าเท่าใด?", q_en: "What is (-2)⁴?", a_th: ["-16", "16", "-8", "8"], a_en: ["-16", "16", "-8", "8"], correct: 1, th: "เลขชี้กำลังเป็นจำนวนคู่ ผลลัพธ์จะเป็นบวก", en: "Even exponent results in a positive value", detail: "(-2) × (-2) × (-2) × (-2) = 16" },
    { q_th: "1/2 + 1/3 เท่ากับเท่าใด?", q_en: "What is 1/2 + 1/3?", a_th: ["2/5", "5/6", "1/6", "3/5"], a_en: ["2/5", "5/6", "1/6", "3/5"], correct: 1, th: "หา ค.ร.น. ของตัวส่วนคือ 6", en: "Find the least common multiple of the denominators: 6", detail: "3/6 + 2/6 = 5/6" },
    { q_th: "ค่าสัมบูรณ์ของ -15 เขียนแทนด้วยสัญลักษณ์ใดและมีค่าเท่าใด?", q_en: "What is the absolute value of -15?", a_th: ["-15", "15", "0", "|15|"], a_en: ["-15", "15", "0", "|15|"], correct: 1, th: "ค่าสัมบูรณ์คือระยะห่างจาก 0 มีค่าเป็นบวกเสมอ", en: "Absolute value is distance from 0, always positive", detail: "|-15| = 15" },
    { q_th: "(-5) × 0 × (-10) มีค่าเท่ากับเท่าใด?", q_en: "What is (-5) × 0 × (-10)?", a_th: ["50", "-50", "0", "5"], a_en: ["50", "-50", "0", "5"], correct: 2, th: "จำนวนใดก็ตามที่คูณกับ 0 จะได้ผลลัพธ์เป็น 0", en: "Any number multiplied by 0 equals 0", detail: "ผลคูณของ 0 กับจำนวนใดๆ คือ 0" },
    { q_th: "ทศนิยม 0.75 เปลี่ยนเป็นเศษส่วนอย่างต่ำได้เท่าใด?", q_en: "What is 0.75 as a fraction in simplest form?", a_th: ["75/100", "3/4", "1/2", "2/3"], a_en: ["75/100", "3/4", "1/2", "2/3"], correct: 1, th: "0.75 = 75/100 ทำเป็นอย่างต่ำโดยหารด้วย 25", en: "0.75 = 75/100, simplify by dividing by 25", detail: "75/100 = 3/4" },
    { q_th: "รูปเรขาคณิตสามมิติที่มีหน้าตัดเป็นวงกลมและฐานเป็นวงกลมคือ?", q_en: "What 3D shape has circular cross-sections and a circular base?", a_th: ["ทรงกระบอก", "พีระมิด", "กรวย", "ปริซึม"], a_en: ["Cylinder", "Pyramid", "Cone", "Prism"], correct: 0, th: "ทรงกระบอกมีหน้าตัดสองด้านที่ขนานและเท่ากันทุกประการ", en: "A cylinder has two congruent parallel circular bases", detail: "รูปทรงคือ ทรงกระบอก" },
    { q_th: "จำนวนเต็มลบที่มีค่ามากที่สุดคือจำนวนใด?", q_en: "What is the greatest negative integer?", a_th: ["-1", "0", "-100", "-0.1"], a_en: ["-1", "0", "-100", "-0.1"], correct: 0, th: "ยิ่งตัวเลขติดลบน้อย ยิ่งมีค่ามาก", en: "The closer a negative number is to zero, the greater it is", detail: "-1 คือจำนวนเต็มลบที่ใกล้ 0 ที่สุด" },
    { q_th: "(-3)³ มีค่าเท่าใด?", q_en: "What is (-3)³?", a_th: ["-27", "27", "-9", "9"], a_en: ["-27", "27", "-9", "9"], correct: 0, th: "เลขชี้กำลังเป็นเลขคี่ ค่าจะยังคงติดลบ", en: "Odd exponent means the result remains negative", detail: "(-3) × (-3) × (-3) = -27" },
    { q_th: "การแบ่งครึ่งมุม 90° จะได้มุมขนาดกี่องศา?", q_en: "Bisecting a 90° angle results in what angle?", a_th: ["30°", "45°", "60°", "20°"], a_en: ["30°", "45°", "60°", "20°"], correct: 1, th: "90° ÷ 2 = 45°", en: "90° ÷ 2 = 45°", detail: "มุมที่แบ่งครึ่งคือ 45°" },
    { q_th: "เลข 10⁰ มีค่าเท่าใด?", q_en: "What is 10⁰?", a_th: ["0", "1", "10", "100"], a_en: ["0", "1", "10", "100"], correct: 1, th: "สมบัติ: จำนวนใดที่ไม่ใช่ 0 ยกกำลัง 0 จะได้ 1", en: "Property: Any non-zero number to the power of 0 is 1", detail: "a⁰ = 1" },
    { q_th: "(-20) - (-10) มีค่าเท่าใด?", q_en: "What is (-20) - (-10)?", a_th: ["-10", "10", "-30", "30"], a_en: ["-10", "10", "-30", "30"], correct: 0, th: "ลบด้วยจำนวนลบ คือการบวกด้วยจำนวนบวก", en: "Subtracting a negative is the same as adding a positive", detail: "-20 + 10 = -10" },
    { q_th: "ข้อใดเปรียบเทียบทศนิยมได้ถูกต้อง?", q_en: "Which decimal comparison is correct?", a_th: ["0.1 > 0.01", "0.01 > 0.1", "0.5 < 0.2", "1.1 > 2.0"], a_en: ["0.1 > 0.01", "0.01 > 0.1", "0.5 < 0.2", "1.1 > 2.0"], correct: 0, th: "เปรียบเทียบจากหลักซ้ายสุด (หลักสิบส่วน)", en: "Compare from the leftmost digit (tenths place)", detail: "0.1 คือ 1/10 ส่วน 0.01 คือ 1/100" },
    { q_th: "สมบัติการสลับที่ของการบวกคือข้อใด?", q_en: "What is the commutative property of addition?", a_th: ["a + b = b + a", "a × b = b × a", "a - b = b - a", "a + b = c"], a_en: ["a + b = b + a", "a × b = b × a", "a - b = b - a", "a + b = c"], correct: 0, th: "สลับที่ตัวตั้งและตัวบวก ผลลัพธ์ยังคงเท่าเดิม", en: "Changing the order of addends doesn't change the sum", detail: "a + b = b + a" },
    { q_th: "มุมกลับ (Reflex Angle) มีขนาดอยู่ในช่วงใด?", q_en: "What is the range of a reflex angle?", a_th: ["< 90°", "90° - 180°", "180° - 360°", "> 360°"], a_en: ["< 90°", "90° - 180°", "180° - 360°", "> 360°"], correct: 2, th: "มุมที่กางมากกว่ามุมตรง แต่ไม่ถึงหนึ่งรอบ", en: "Angle greater than a straight angle but less than a full circle", detail: "180° < มุม < 360°" },
    { q_th: "2³ × 5⁰ มีค่าเท่าใด?", q_en: "What is 2³ × 5⁰?", a_th: ["8", "15", "0", "40"], a_en: ["8", "15", "0", "40"], correct: 0, th: "2³ = 8 และ 5⁰ = 1", en: "2³ = 8 and 5⁰ = 1", detail: "8 × 1 = 8" },
    { q_th: "จำนวนคู่บวกที่น้อยที่สุดคือจำนวนใด?", q_en: "What is the smallest positive even integer?", a_th: ["0", "2", "1", "-2"], a_en: ["0", "2", "1", "-2"], correct: 1, th: "จำนวนคู่บวกเริ่มนับจาก 2", en: "Positive even integers start counting from 2", detail: "จำนวนคู่บวกคือ {2, 4, 6, ...}" }
];
        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = questions.map((q, i) => `
                <div class="question-container" id="q${i}">
                    <p><strong>${i+1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                    ${(lang === 'th' ? q.a_th : q.a_en).map((a, j) => `
                        <div class="choice" onclick="check(${i}, ${j})">${a}</div>
                    `).join('')}
                    <div class="tip" id="tip${i}"><strong>${lang==='th'?'เฉลย: ':'Answer: '}</strong>${lang==='th'?q.th:q.en}<br>${q.detail}</div>
                </div>
            `).join('');
        }

        function check(qIdx, cIdx) {
            const q = questions[qIdx];
            const choices = document.getElementById('q'+qIdx).querySelectorAll('.choice');
            choices.forEach(el => el.style.pointerEvents = 'none');
            
            if(cIdx === q.correct) {
                choices[cIdx].classList.add('correct');
            } else {
                choices[cIdx].classList.add('wrong');
                choices[q.correct].classList.add('correct');
            }
            document.getElementById('tip'+qIdx).style.display = 'block';
        }

        function toggleLang() {
            lang = lang === 'th' ? 'en' : 'th';
            render();
        }

        render();
    </script>
</body>
</html>
