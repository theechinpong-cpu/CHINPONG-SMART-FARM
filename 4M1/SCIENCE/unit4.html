<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบวิทยาศาสตร์ ม.1: การดำรงชีวิตของพืช (ระดับยาก 50 ข้อ)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .question { margin-bottom: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { margin: 8px 0; cursor: pointer; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; display: block; margin: 20px auto; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>แบบทดสอบวิทยาศาสตร์ ม.1: การดำรงชีวิตของพืช (50 ข้อ)</h1>
    <div id="quiz-container"></div>
    <button onclick="checkAnswers()">ตรวจคำตอบ</button>
    <div id="result"></div>

    <script>
        const questions = [
            { q: "ในการทดลองสังเคราะห์ด้วยแสง ปัจจัยใดที่เป็นตัวจำกัด (Limiting factor) เมื่อความเข้มแสงอยู่ในระดับสูง?", o: ["อุณหภูมิ", "ความเข้มข้นของ CO2", "ปริมาณคลอโรฟิลล์", "ถูกทุกข้อ"], a: 1 },
            { q: "พืช CAM มีการปรับตัวอย่างไรในการลดการสูญเสียน้ำ?", o: ["เปิดปากใบกลางวัน", "ตรึง CO2 ตอนกลางคืน", "ไม่มีปากใบ", "สร้างสารพิษ"], a: 1 },
            { q: "เอนไซม์ Rubisco ในพืช C3 ทำหน้าที่อะไร?", o: ["ตรึง CO2", "ผลิตออกซิเจน", "ย่อยแป้ง", "สร้างน้ำ"], a: 0 },
            { q: "แรงดึงที่เกิดจากการคายน้ำ (Transpiration pull) มีผลต่อการเคลื่อนที่ของน้ำอย่างไร?", o: ["ดึงน้ำลงสู่ราก", "ดึงน้ำขึ้นจากรากสู่ใบ", "ทำให้น้ำหยุดนิ่ง", "ดันน้ำออกทางดอก"], a: 1 },
            { q: "ข้อใดคือหน้าที่ของโฟลเอ็ม (Phloem)?", o: ["ลำเลียงน้ำ", "ลำเลียงอาหาร", "พยุงลำต้น", "สะสมแป้ง"], a: 1 },
            { q: "ออกซิน (Auxin) กระตุ้นการเบนเข้าหาแสงโดยวิธีใด?", o: ["สะสมด้านมืด", "สะสมด้านสว่าง", "ยับยั้งการยืดตัว", "สร้างคลอโรฟิลล์"], a: 0 },
            { q: "ข้อใดคือส่วนประกอบที่เกิดจากเอนโดสเปิร์มในเมล็ดพืช?", o: ["อาหารสำหรับตัวอ่อน", "เปลือกหุ้มเมล็ด", "รากแก้ว", "ใบเลี้ยง"], a: 0 },
            { q: "การปฏิสนธิซ้อนเกิดขึ้นในกลุ่มพืชชนิดใด?", o: ["มอส", "เฟิร์น", "พืชดอก", "สน"], a: 2 },
            { q: "ธาตุอาหารหลักที่พืชต้องการมากที่สุด 3 ชนิด คือ?", o: ["N, P, K", "Ca, Mg, S", "Fe, Mn, Zn", "C, H, O"], a: 0 },
            { q: "กระบวนการหายใจของพืชเกิดขึ้นที่ใด?", o: ["คลอโรพลาสต์", "ไมโทคอนเดรีย", "นิวเคลียส", "แวคิวโอล"], a: 1 },
            { q: "ถ้าพืชขาดธาตุแมกนีเซียม จะส่งผลอย่างไร?", o: ["ใบเหลือง", "ดอกไม่บาน", "รากเน่า", "ลำต้นหัก"], a: 0 },
            { q: "เหตุใดใบไม้จึงมีสีเขียว?", o: ["คลอโรฟิลล์", "แคโรทีน", "แอนโทไซยานิน", "แสงอาทิตย์"], a: 0 },
            { q: "ข้อใดไม่ใช่ผลผลิตของการสังเคราะห์แสง?", o: ["น้ำตาล", "ออกซิเจน", "น้ำ", "คาร์บอนไดออกไซด์"], a: 3 },
            { q: "พืชใบเลี้ยงคู่มีลักษณะเส้นใบเป็นอย่างไร?", o: ["ขนาน", "ร่างแห", "เป็นแฉก", "ไม่เป็นระเบียบ"], a: 1 },
            { q: "การตอนกิ่งเป็นการสืบพันธุ์แบบใด?", o: ["อาศัยเพศ", "ไม่อาศัยเพศ", "เพาะเมล็ด", "กลายพันธุ์"], a: 1 },
            { q: "เซลล์คุมทำหน้าที่อะไร?", o: ["คายน้ำ", "ควบคุมการเปิดปิดปากใบ", "ลำเลียงน้ำ", "เก็บอาหาร"], a: 1 },
            { q: "ฮอร์โมนใดกระตุ้นการสุกของผลไม้?", o: ["ออกซิน", "เอทิลีน", "จิบเบอเรลลิน", "ไซโทไคนิน"], a: 1 },
            { q: "การเคลื่อนที่ของรากเข้าหาแหล่งน้ำเรียกว่า?", o: ["Phototropism", "Hydrotropism", "Geotropism", "Thigmotropism"], a: 1 },
            { q: "พืชที่ไม่มีดอกขยายพันธุ์ด้วยอะไร?", o: ["สปอร์", "เมล็ด", "ผล", "น้ำหวาน"], a: 0 },
            { q: "น้ำตาลที่พืชสร้างขึ้นถูกขนส่งในรูปของอะไร?", o: ["กลูโคส", "ซูโครส", "แป้ง", "เซลลูโลส"], a: 1 },
            { q: "ส่วนใดของดอกที่กลายเป็นผล?", o: ["ออวุล", "ละอองเรณู", "รังไข่", "กลีบดอก"], a: 2 },
            { q: "ข้อใดคือปัจจัยภายนอกที่มีผลต่อการสังเคราะห์แสง?", o: ["คลอโรฟิลล์", "แสง", "เอนไซม์", "อายุของใบ"], a: 1 },
            { q: "พืชทะเลทรายมีใบเป็นหนามเพื่ออะไร?", o: ["ป้องกันตัว", "ลดการคายน้ำ", "สะสมอาหาร", "รับแสง"], a: 1 },
            { q: "การเพาะเลี้ยงเนื้อเยื่อได้พืชที่มีลักษณะอย่างไร?", o: ["ต่างจากแม่", "เหมือนแม่ทุกประการ", "โตช้า", "มีดอกสีใหม่"], a: 1 },
            { q: "ข้อใดเป็นเนื้อเยื่อลำเลียงน้ำ?", o: ["ไซเล็ม", "โฟลเอ็ม", "เอพิเดอร์มิส", "คอร์เทกซ์"], a: 0 },
            { q: "การปฏิสนธิเกิดขึ้นบริเวณใดของดอก?", o: ["อับเรณู", "รังไข่", "ก้านชูเกสร", "กลีบเลี้ยง"], a: 1 },
            { q: "ไนโตรเจนสำคัญต่อพืชอย่างไร?", o: ["สร้างโปรตีน", "สร้างพลังงาน", "ช่วยคายน้ำ", "ป้องกันโรค"], a: 0 },
            { q: "ข้อใดไม่ใช่ส่วนประกอบของดอก?", o: ["กลีบเลี้ยง", "กลีบดอก", "ใบ", "เกสร"], a: 2 },
            { q: "พืชมีการหายใจในเวลาใด?", o: ["กลางวัน", "กลางคืน", "ตลอดเวลา", "ตอนสังเคราะห์แสง"], a: 2 },
            { q: "น้ำที่พืชดูดจากรากขึ้นสู่ใบอาศัยแรงอะไร?", o: ["แรงดึงจากการคายน้ำ", "แรงดันอากาศ", "แรงจากใบ", "แรงจากผล"], a: 0 },
            { q: "ข้อใดคือเซลล์สืบพันธุ์เพศผู้?", o: ["ละอองเรณู", "ไข่อ่อน", "ยอดเกสร", "ออวุล"], a: 0 },
            { q: "การหุบใบของไมยราบเมื่อถูกสัมผัสเป็นลักษณะใด?", o: ["Tropism", "Nasty", "Taxism", "Growth"], a: 1 },
            { q: "พืชต้องการ CO2 เพื่อนำไปสร้างสิ่งใด?", o: ["น้ำตาล", "โปรตีน", "ไขมัน", "วิตามิน"], a: 0 },
            { q: "ถ้าพืชไม่มีปากใบจะเป็นอย่างไร?", o: ["ไม่คายน้ำ", "ไม่ได้รับ CO2", "ตาย", "ถูกทุกข้อ"], a: 3 },
            { q: "ส่วนใดของรากที่มีการแบ่งเซลล์?", o: ["ปลายราก", "กลางราก", "โคนราก", "ผิวราก"], a: 0 },
            { q: "พืชใบเลี้ยงเดี่ยวมีระบบรากแบบใด?", o: ["รากแก้ว", "รากฝอย", "รากแขนง", "ไม่มีราก"], a: 1 },
            { q: "ความดันรากเกิดจากอะไร?", o: ["การดูดน้ำของราก", "การคายน้ำ", "การแบ่งเซลล์", "การหายใจ"], a: 0 },
            { q: "ออกซิเจนที่ปล่อยออกมาจากพืชมาจากไหน?", o: ["น้ำ", "CO2", "น้ำตาล", "ดิน"], a: 0 },
            { q: "การตอนกิ่งเหมาะกับพืชชนิดใด?", o: ["ไม้ยืนต้น", "ไม้ล้มลุก", "สาหร่าย", "มอส"], a: 0 },
            { q: "ข้อใดคือพืชใบเลี้ยงเดี่ยว?", o: ["มะม่วง", "ข้าว", "กุหลาบ", "ถั่ว"], a: 1 },
            { q: "การยืดตัวของเซลล์ถูกควบคุมโดยฮอร์โมนชนิดใด?", o: ["ออกซิน", "เอทิลีน", "กรดแอบไซซิก", "ไซโทไคนิน"], a: 0 },
            { q: "กระบวนการสร้างอาหารของพืชใช้พลังงานจากไหน?", o: ["แสง", "น้ำ", "ดิน", "ออกซิเจน"], a: 0 },
            { q: "การคายน้ำมีประโยชน์ต่อพืชอย่างไร?", o: ["ลดอุณหภูมิใบ", "ช่วยดูดน้ำ", "ถูกทุกข้อ", "ไม่มีประโยชน์"], a: 2 },
            { q: "ออวุลมีกี่เซลล์สืบพันธุ์?", o: ["1", "2", "3", "หลายเซลล์"], a: 0 },
            { q: "น้ำตาลในพืชถูกสะสมในรูปของอะไร?", o: ["แป้ง", "โปรตีน", "ไขมัน", "วิตามิน"], a: 0 },
            { q: "ข้อใดเกี่ยวข้องกับการสืบพันธุ์แบบอาศัยเพศ?", o: ["การผสมเกสร", "การแตกหน่อ", "การตัดชำ", "การเพาะเลี้ยงเนื้อเยื่อ"], a: 0 },
            { q: "พืชในป่าดิบชื้นมักมีปากใบอย่างไร?", o: ["จำนวนมาก", "จำนวนน้อย", "ไม่มีเลย", "ปิดตลอด"], a: 0 },
            { q: "รากฝอยมักพบในพืชชนิดใด?", o: ["พืชใบเลี้ยงเดี่ยว", "พืชใบเลี้ยงคู่", "สน", "เฟิร์น"], a: 0 },
            { q: "ส่วนใดของพืชทำหน้าที่สังเคราะห์แสงได้มากที่สุด?", o: ["ใบ", "ราก", "ดอก", "ลำต้น"], a: 0 },
            { q: "ถ้าไม่มีแสง พืชจะผลิตอาหารได้หรือไม่?", o: ["ได้", "ไม่ได้", "ได้บ้าง", "ไม่แน่ใจ"], a: 1 }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((item, index) => {
                let html = `<div class="question"><p>${index + 1}. ${item.q}</p>`;
                item.o.forEach((opt, i) => {
                    html += `<div class="option"><label><input type="radio" name="q${index}" value="${i}"> ${opt}</label></div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function checkAnswers() {
            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === item.a) score++;
            });
            document.getElementById('result').innerText = `คุณได้คะแนน: ${score} / ${questions.length}`;
            window.scrollTo(0, 0);
        }

        renderQuiz();
    </script>
</body>
</html>
