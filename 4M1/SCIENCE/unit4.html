    <script>

            { q: "กระบวนการสร้างอาหารของพืชใช้พลังงานจากไหน?", clue: "(ดวงอาทิตย์)", o: ["แสง", "น้ำ", "ดิน", "ออกซิเจน"], a: 0, exp: "พลังงานแสง", tip: "Tip: แสงคือพลังงาน" },
            { q: "การคายน้ำมีประโยชน์ต่อพืชอย่างไร?", clue: "(ลดอุณหภูมิ)", o: ["ลดอุณหภูมิใบ", "ช่วยดูดน้ำ", "ถูกทุกข้อ", "ไม่มีประโยชน์"], a: 2, exp: "ช่วยลดความร้อนและช่วยดูดน้ำ", tip: "Tip: ประโยชน์หลายต่อ" },
            { q: "ออวุลมีกี่เซลล์สืบพันธุ์?", clue: "(เซลล์ไข่)", o: ["1", "2", "3", "หลายเซลล์"], a: 0, exp: "1 เซลล์", tip: "Tip: เซลล์ไข่มี 1 อัน" },
            { q: "น้ำตาลในพืชถูกสะสมในรูปของอะไร?", clue: "(แป้ง)", o: ["แป้ง", "โปรตีน", "ไขมัน", "วิตามิน"], a: 0, exp: "แป้ง", tip: "Tip: แป้งไว้เก็บ" },
            { q: "ข้อใดเกี่ยวข้องกับการสืบพันธุ์แบบอาศัยเพศ?", clue: "(ละอองเรณูผสมไข่)", o: ["การผสมเกสร", "การแตกหน่อ", "การตัดชำ", "การเพาะเลี้ยงเนื้อเยื่อ"], a: 0, exp: "ผสมเกสร", tip: "Tip: อาศัยเพศ" },
            { q: "พืชในป่าดิบชื้นมักมีปากใบอย่างไร?", clue: "(จำนวนมาก)", o: ["จำนวนมาก", "จำนวนน้อย", "ไม่มีเลย", "ปิดตลอด"], a: 0, exp: "จำนวนมาก", tip: "Tip: ชื้นมากเปิดเยอะ" },
            { q: "รากฝอยมักพบในพืชชนิดใด?", clue: "(ใบเลี้ยงเดี่ยว)", o: ["พืชใบเลี้ยงเดี่ยว", "พืชใบเลี้ยงคู่", "สน", "เฟิร์น"], a: 0, exp: "ใบเลี้ยงเดี่ยว", tip: "Tip: รากฝอย = เดี่ยว" },
            { q: "ส่วนใดของพืชทำหน้าที่สังเคราะห์แสงได้มากที่สุด?", clue: "(ใบ)", o: ["ใบ", "ราก", "ดอก", "ลำต้น"], a: 0, exp: "ใบ", tip: "Tip: ใบมีคลอโรพลาสต์" },
            { q: "ถ้าไม่มีแสง พืชจะผลิตอาหารได้หรือไม่?", clue: "(ขาดพลังงาน)", o: ["ได้", "ไม่ได้", "ได้บ้าง", "ไม่แน่ใจ"], a: 1, exp: "ไม่ได้", tip: "Tip: ไม่มีแสงจบเห่" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((item, index) => {
                let html = `<div class="question">
                    <p><strong>ข้อ ${index + 1}:</strong> ${item.q} <span class="clue">${item.clue || ''}</span></p>`;
                item.o.forEach((opt, i) => {
                    html += `<div class="option">
                        <label><input type="radio" name="q${index}" value="${i}" onclick="selectOption(${index}, ${i})"> ${opt}</label>
                    </div>`;
                });
                html += `<div id="exp${index}" class="explanation"><strong>เฉลย:</strong> ${item.exp}<div class="tip">${item.tip}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function selectOption(qIndex, oIndex) {
            const options = document.getElementsByName(`q${qIndex}`);
            options.forEach(opt => opt.disabled = true);
            document.getElementById(`exp${qIndex}`).style.display = 'block';
            
            const selectedLabel = options[oIndex].parentElement;
            if (oIndex === questions[qIndex].a) {
                selectedLabel.style.color = "green";
                selectedLabel.style.fontWeight = "bold";
            } else {
                selectedLabel.style.color = "red";
                options[questions[qIndex].a].parentElement.style.color = "green";
                options[questions[qIndex].a].parentElement.style.fontWeight = "bold";
            }
        }

        renderQuiz();
    </script>
</body>
</html>
