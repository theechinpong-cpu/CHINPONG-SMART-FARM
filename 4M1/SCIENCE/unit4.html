<body>
    <h1>แบบทดสอบวิทยาศาสตร์ ม.1 (50 ข้อ)</h1>

    <script>
        const questions = [
            { q: "ในการทดลองสังเคราะห์ด้วยแสง ปัจจัยใดที่เป็นตัวจำกัด (Limiting factor) เมื่อความเข้มแสงอยู่ในระดับสูง?", clue: "(นึกถึงกฎของตัวจำกัดของแบล็กแมน)", o: ["อุณหภูมิ", "ความเข้มข้นของ CO2", "ปริมาณคลอโรฟิลล์", "ถูกทุกข้อ"], a: 1, exp: "เมื่อแสงมากพอแล้ว ความเข้มข้นของ CO2 มักจะกลายเป็นปัจจัยที่จำกัดอัตราเร็วที่สุด", tip: "Tip: ถ้าแสงถึงจุดอิ่มตัว CO2 มักเป็นพระเอกที่ตัดสินความเร็ว" },
            { q: "พืช CAM มีการปรับตัวอย่างไรในการลดการสูญเสียน้ำ?", clue: "(เน้นช่วงเวลาการเปิดปากใบ)", o: ["เปิดปากใบกลางวัน", "ตรึง CO2 ตอนกลางคืน", "ไม่มีปากใบ", "สร้างสารพิษ"], a: 1, exp: "พืช CAM ตรึงคาร์บอนตอนกลางคืนเพื่อเลี่ยงความร้อนกลางวันและลดการคายน้ำ", tip: "Tip: จำไว้ว่า CAM = กลางคืน (Night) นะครับ" },
            { q: "เอนไซม์ Rubisco ในพืช C3 ทำหน้าที่อะไร?", clue: "(เกี่ยวกับการตรึงคาร์บอน)", o: ["ตรึง CO2", "ผลิตออกซิเจน", "ย่อยแป้ง", "สร้างน้ำ"], a: 0, exp: "Rubisco คือเอนไซม์ที่ใช้ในขั้นตอนการตรึงคาร์บอนไดออกไซด์", tip: "Tip: Rubisco คือเอนไซม์ที่พบมากที่สุดในโลกเลยนะ" },
            { q: "แรงดึงที่เกิดจากการคายน้ำ (Transpiration pull) มีผลต่อการเคลื่อนที่ของน้ำอย่างไร?", clue: "(แรงดึงจากส่วนยอด)", o: ["ดึงน้ำลงสู่ราก", "ดึงน้ำขึ้นจากรากสู่ใบ", "ทำให้น้ำหยุดนิ่ง", "ดันน้ำออกทางดอก"], a: 1, exp: "การคายน้ำที่ใบสร้างแรงดึงน้ำจากรากขึ้นมาตามท่อลำเลียง", tip: "Tip: เปรียบเสมือนการดูดน้ำผ่านหลอดกาแฟครับ" },
            { q: "ข้อใดคือหน้าที่ของโฟลเอ็ม (Phloem)?", clue: "(เกี่ยวข้องกับการลำเลียงสารอาหาร)", o: ["ลำเลียงน้ำ", "ลำเลียงอาหาร", "พยุงลำต้น", "สะสมแป้ง"], a: 1, exp: "โฟลเอ็มคือท่อลำเลียงอาหาร (น้ำตาล) จากแหล่งผลิตไปส่วนต่างๆ", tip: "Tip: จำว่า 'โฟลเอ็ม = ฟู้ด (Food)'" },
            { q: "ออกซิน (Auxin) กระตุ้นการเบนเข้าหาแสงโดยวิธีใด?", clue: "(การสะสมของฮอร์โมน)", o: ["สะสมด้านมืด", "สะสมด้านสว่าง", "ยับยั้งการยืดตัว", "สร้างคลอโรฟิลล์"], a: 0, exp: "ออกซินจะย้ายไปสะสมด้านที่มืด ทำให้เซลล์ด้านนั้นยาวกว่าด้านที่มีแสง", tip: "Tip: ออกซินชอบหลบแสงครับ" },
            { q: "ข้อใดคือส่วนประกอบที่เกิดจากเอนโดสเปิร์มในเมล็ดพืช?", clue: "(อาหารของต้นอ่อน)", o: ["อาหารสำหรับตัวอ่อน", "เปลือกหุ้มเมล็ด", "รากแก้ว", "ใบเลี้ยง"], a: 0, exp: "เอนโดสเปิร์มคือเนื้อเยื่อที่สะสมอาหารไว้เลี้ยงต้นอ่อนพืชใบเลี้ยงคู่และเดี่ยวบางชนิด", tip: "Tip: คือกล่องข้าวของต้นอ่อนนั่นเอง" },
            { q: "การปฏิสนธิซ้อนเกิดขึ้นในกลุ่มพืชชนิดใด?", clue: "(พืชที่มีดอก)", o: ["มอส", "เฟิร์น", "พืชดอก", "สน"], a: 2, exp: "พืชดอกมีการปฏิสนธิซ้อน คือสเปิร์มตัวหนึ่งผสมไข่ อีกตัวผสมโพลาร์นิวคลีไอ", tip: "Tip: มีเฉพาะในพืชดอกเท่านั้น" },
            { q: "ธาตุอาหารหลักที่พืชต้องการมากที่สุด 3 ชนิด คือ?", clue: "(ปุ๋ย NPK)", o: ["N, P, K", "Ca, Mg, S", "Fe, Mn, Zn", "C, H, O"], a: 0, exp: "ไนโตรเจน (N) ฟอสฟอรัส (P) และโพแทสเซียม (K) เป็นธาตุหลัก", tip: "Tip: ดูข้างกระสอบปุ๋ยได้เลย!" },
            { q: "กระบวนการหายใจของพืชเกิดขึ้นที่ใด?", clue: "(แหล่งสร้างพลังงาน)", o: ["คลอโรพลาสต์", "ไมโทคอนเดรีย", "นิวเคลียส", "แวคิวโอล"], a: 1, exp: "ไมโทคอนเดรียทำหน้าที่ผลิตพลังงาน ATP จากการหายใจระดับเซลล์", tip: "Tip: โรงไฟฟ้าของเซลล์คือไมโทคอนเดรีย" },

            { q: "เหตุใดใบไม้จึงมีสีเขียว?", clue: "(รงควัตถุ)", o: ["คลอโรฟิลล์", "แคโรทีน", "แอนโทไซยานิน", "แสงอาทิตย์"], a: 0, exp: "คลอโรฟิลล์ดูดกลืนแสงสีอื่นและสะท้อนสีเขียวออกมา", tip: "Tip: สีเขียวมาจากคลอโรฟิลล์ล้วนๆ" },
            { q: "ข้อใดไม่ใช่ผลผลิตของการสังเคราะห์แสง?", clue: "(สารตั้งต้นคือสิ่งนี้)", o: ["น้ำตาล", "ออกซิเจน", "น้ำ", "คาร์บอนไดออกไซด์"], a: 3, exp: "CO2 คือสารตั้งต้น ไม่ใช่ผลผลิต", tip: "Tip: ผลลัพธ์ต้องได้น้ำตาลและออกซิเจน" },
            { q: "พืชใบเลี้ยงคู่มีลักษณะเส้นใบเป็นอย่างไร?", clue: "(ลักษณะร่างแห)", o: ["ขนาน", "ร่างแห", "เป็นแฉก", "ไม่เป็นระเบียบ"], a: 1, exp: "เส้นใบของพืชใบเลี้ยงคู่จะสานกันเป็นร่างแห", tip: "Tip: เห็นลายเหมือนร่างแหคือคู่แน่นอน" },
            { q: "การตอนกิ่งเป็นการสืบพันธุ์แบบใด?", clue: "(ไม่ต้องอาศัยเพศ)", o: ["อาศัยเพศ", "ไม่อาศัยเพศ", "เพาะเมล็ด", "กลายพันธุ์"], a: 1, exp: "การตอนกิ่งเป็นการขยายพันธุ์โดยใช้ส่วนของพืชแม่", tip: "Tip: เหมือนโคลนนิ่งตัวเองออกมา" },
            { q: "เซลล์คุมทำหน้าที่อะไร?", clue: "(เปิดปิดปากใบ)", o: ["คายน้ำ", "ควบคุมการเปิดปิดปากใบ", "ลำเลียงน้ำ", "เก็บอาหาร"], a: 1, exp: "เซลล์คุมควบคุมการเปิดปิดเพื่อแลกเปลี่ยนก๊าซและลดการคายน้ำ", tip: "Tip: คุมประตูเข้าออกคือเซลล์คุม" },

            { q: "การเคลื่อนที่ของรากเข้าหาแหล่งน้ำเรียกว่า?", clue: "(Hydro = น้ำ)", o: ["Phototropism", "Hydrotropism", "Geotropism", "Thigmotropism"], a: 1, exp: "การตอบสนองต่อสิ่งเร้าที่เป็นน้ำคือ Hydrotropism", tip: "Tip: Hydro แปลว่าน้ำ" },
            { q: "พืชที่ไม่มีดอกขยายพันธุ์ด้วยอะไร?", clue: "(พืชกลุ่มมอสเฟิร์น)", o: ["สปอร์", "เมล็ด", "ผล", "น้ำหวาน"], a: 0, exp: "พืชไร้ดอกเช่นเฟิร์นจะใช้สปอร์ในการแพร่พันธุ์", tip: "Tip: ลองหาจุดสีน้ำตาลใต้ใบเฟิร์นดูครับ" },
            { q: "น้ำตาลที่พืชสร้างขึ้นถูกขนส่งในรูปของอะไร?", clue: "(ชื่อน้ำตาลในท่อโฟลเอ็ม)", o: ["กลูโคส", "ซูโครส", "แป้ง", "เซลลูโลส"], a: 1, exp: "น้ำตาลที่ขนส่งในโฟลเอ็มคือซูโครส", tip: "Tip: สร้างกลูโคส แต่ส่งซูโครส" },
            { q: "ส่วนใดของดอกที่กลายเป็นผล?", clue: "(รังไข่)", o: ["ออวุล", "ละอองเรณู", "รังไข่", "กลีบดอก"], a: 2, exp: "หลังปฏิสนธิรังไข่จะขยายใหญ่ขึ้นกลายเป็นผล", tip: "Tip: ผลหุ้มเมล็ด (ออวุลเป็นเมล็ด)" },
            { q: "ข้อใดคือปัจจัยภายนอกที่มีผลต่อการสังเคราะห์แสง?", clue: "(สิ่งแวดล้อม)", o: ["คลอโรฟิลล์", "แสง", "เอนไซม์", "อายุของใบ"], a: 1, exp: "แสงเป็นปัจจัยภายนอก ส่วนคลอโรฟิลล์เป็นปัจจัยภายใน", tip: "Tip: แยกให้ออกอันไหนนอกอันไหนใน" },
            { q: "พืชทะเลทรายมีใบเป็นหนามเพื่ออะไร?", clue: "(ลดการคายน้ำ)", o: ["ป้องกันตัว", "ลดการคายน้ำ", "สะสมอาหาร", "รับแสง"], a: 1, exp: "ลดพื้นที่ผิวใบเพื่อลดการระเหยของน้ำ", tip: "Tip: ลดการคายน้ำคือหัวใจหลัก" },
            { q: "การเพาะเลี้ยงเนื้อเยื่อได้พืชที่มีลักษณะอย่างไร?", clue: "(เหมือนแม่)", o: ["ต่างจากแม่", "เหมือนแม่ทุกประการ", "โตช้า", "มีดอกสีใหม่"], a: 1, exp: "เป็นวิธีขยายพันธุ์ที่คงพันธุกรรมเดิมไว้ 100%", tip: "Tip: ก็อปปี้แม่มาเลย" },
            { q: "ข้อใดเป็นเนื้อเยื่อลำเลียงน้ำ?", clue: "(Xylem)", o: ["ไซเล็ม", "โฟลเอ็ม", "เอพิเดอร์มิส", "คอร์เทกซ์"], a: 0, exp: "ไซเล็ม (Xylem) ทำหน้าที่ขนส่งน้ำและแร่ธาตุ", tip: "Tip: Xylem ลำเลียงน้ำ" },

            { q: "ไนโตรเจนสำคัญต่อพืชอย่างไร?", clue: "(สร้างโปรตีน)", o: ["สร้างโปรตีน", "สร้างพลังงาน", "ช่วยคายน้ำ", "ป้องกันโรค"], a: 0, exp: "ไนโตรเจนเป็นส่วนประกอบของกรดอะมิโนและโปรตีน", tip: "Tip: ขาด N พืชก็แคระแกร็น" },
            { q: "ข้อใดไม่ใช่ส่วนประกอบของดอก?", clue: "(ใบ)", o: ["กลีบเลี้ยง", "กลีบดอก", "ใบ", "เกสร"], a: 2, exp: "ใบเป็นอวัยวะที่ใช้สังเคราะห์แสง ไม่ใช่ส่วนประกอบของดอก", tip: "Tip: ใบไม่ใช่ดอก" },
            { q: "พืชมีการหายใจในเวลาใด?", clue: "(เกิดขึ้นตลอดเวลา)", o: ["กลางวัน", "กลางคืน", "ตลอดเวลา", "ตอนสังเคราะห์แสง"], a: 2, exp: "พืชหายใจเหมือนสิ่งมีชีวิตทั่วไปตลอด 24 ชั่วโมง", tip: "Tip: หายใจเพื่อสร้างพลังงานนะ" },
            { q: "น้ำที่พืชดูดจากรากขึ้นสู่ใบอาศัยแรงอะไร?", clue: "(แรงดึงจากการคายน้ำ)", o: ["แรงดึงจากการคายน้ำ", "แรงดันอากาศ", "แรงจากใบ", "แรงจากผล"], a: 0, exp: "การคายน้ำสร้างแรงดึงมหาศาลดึงน้ำขึ้นสู่ยอด", tip: "Tip: แรงดึงน้ำคือตัวช่วยหลัก" },

            { q: "การหุบใบของไมยราบเมื่อถูกสัมผัสเป็นลักษณะใด?", clue: "(สิ่งเร้าสัมผัส)", o: ["Tropism", "Nasty", "Taxism", "Growth"], a: 1, exp: "เป็นการตอบสนองแบบ Nasty ที่ไม่ขึ้นกับทิศทางสิ่งเร้า", tip: "Tip: สัมผัสปุ๊บ หุบปั๊บ" },

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((item, index) => {
                let html = `<div class="question">
                    <p>${index + 1}. ${item.q} <span class="clue">${item.clue || ''}</span></p>`;
                item.o.forEach((opt, i) => {
                    html += `<div class="option">
                        <label><input type="radio" name="q${index}" value="${i}" onclick="lockOptions(${index})"> ${opt}</label>
                    </div>`;
                });
                html += `<div id="exp${index}" class="explanation">เฉลย: ${item.exp || 'รอคำอธิบาย'}<div class="tip">${item.tip || ''}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function lockOptions(index) {
            const options = document.getElementsByName(`q${index}`);
            options.forEach(opt => opt.disabled = true);
        }

        function checkAnswers() {
            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                document.getElementById(`exp${index}`).style.display = 'block';
                if (selected && parseInt(selected.value) === item.a) score++;
            });
            document.getElementById('result').innerText = `คุณได้คะแนน: ${score} / ${questions.length}`;
            window.scrollTo(0, 0);
        }

        renderQuiz();
    </script>
