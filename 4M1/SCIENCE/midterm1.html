<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังข้อสอบวิทยาศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f7f6; }
        .quiz-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; text-align: left; background: #fff; }
        .option:hover { background: #e9ecef; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb; }
        .wrong { background-color: #f8d7da !important; border-color: #f5c6cb; }
        .detail { margin-top: 10px; padding: 10px; background: #e7f3ff; border-left: 4px solid #2196F3; display: none; }
        .btn-lang { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>แบบทดสอบวิทยาศาสตร์: การสังเคราะห์ด้วยแสงและการปรับตัวของราก</h1>
    <button class="btn-lang" onclick="toggleLanguage()">สลับภาษา TH/EN</button>
    <div id="quiz-container"></div>

    <script>
        const questions = [
            { q_th: "หากพืชขาดการดูดซึมน้ำผ่านท่อ Xylem ผลผลิตใดในกระบวนการสังเคราะห์ด้วยแสงที่จะหายไปเป็นลำดับแรก?", q_en: "If a plant lacks water absorption through Xylem, which product of photosynthesis will be primarily absent?", a_th: ["ก๊าซคาร์บอนไดออกไซด์", "ก๊าซออกซิเจน", "น้ำตาลกลูโคส", "พลังงานแสง"], a_en: ["Carbon dioxide", "Oxygen", "Glucose", "Light energy"], correct: 1, th: "ออกซิเจนเกิดจากการแตกตัวของน้ำ", en: "Oxygen is derived from water photolysis.", detail: "น้ำเป็นสารตั้งต้นหลักในปฏิกิริยาใช้แสงเพื่อสร้างออกซิเจน" },
            { q_th: "สารใดทำหน้าที่เป็นตัวรับพลังงานแสงในคลอโรพลาสต์?", q_en: "Which substance acts as a light energy receiver in chloroplasts?", a_th: ["ไซโตพลาสซึม", "คลอโรฟิลล์", "แวคิวโอล", "ไมโทคอนเดรีย"], a_en: ["Cytoplasm", "Chlorophyll", "Vacuole", "Mitochondria"], correct: 1, th: "คลอโรฟิลล์อยู่ในคลอโรพลาสต์", en: "Chlorophyll is found in chloroplasts.", detail: "คลอโรฟิลล์ดูดกลืนแสงสีน้ำเงินและแดงเพื่อขับเคลื่อนกระบวนการสร้างอาหาร" },
            { q_th: "เหตุใดใบไม้จึงมักมีสีเขียว?", q_en: "Why do leaves generally appear green?", a_th: ["ดูดกลืนแสงสีเขียวได้ดีที่สุด", "สะท้อนแสงสีเขียวออกมา", "ดูดกลืนแสงสีแดงได้แย่ที่สุด", "ถูกสร้างจากสารสีเขียวทั้งหมด"], a_en: ["Absorbs green light best", "Reflects green light", "Absorbs red light worst", "Made entirely of green pigments"], correct: 1, th: "คลอโรฟิลล์สะท้อนแสงสีเขียว", en: "Chlorophyll reflects green light.", detail: "แสงสีเขียวถูกสะท้อนออก ทำให้ตาเรามองเห็นใบไม้เป็นสีเขียว" },
            { q_th: "ข้อใดกล่าวถึงแหล่งกำเนิดของคาร์บอนในน้ำตาลกลูโคสได้ถูกต้องที่สุด?", q_en: "Which statement best describes the carbon source in glucose?", a_th: ["ได้รับจากดินโดยตรง", "ได้รับจากอากาศทางปากใบ", "ได้รับจากการย่อยสลายน้ำ", "ได้รับจากปุ๋ยผ่านราก"], a_en: ["Obtained directly from soil", "Obtained from air via stomata", "Obtained from water breakdown", "Obtained from fertilizer"], correct: 1, th: "คาร์บอนไดออกไซด์เข้าทางปากใบ", en: "CO2 enters through stomata.", detail: "พืชตรึงคาร์บอนจาก CO2 เพื่อสร้างโครงสร้างน้ำตาล" },
            { q_th: "พืชสะสมอาหารในรูปใดเพื่อให้มีสถานะไม่ละลายน้ำ?", q_en: "In what form do plants store food to be insoluble?", a_th: ["น้ำตาลกลูโคส", "น้ำตาลซูโครส", "แป้ง", "โปรตีน"], a_en: ["Glucose", "Sucrose", "Starch", "Protein"], correct: 2, th: "พืชเปลี่ยนกลูโคสเป็นแป้ง", en: "Plants convert glucose to starch.", detail: "แป้งเป็นสารที่ไม่ละลายน้ำ เหมาะแก่การเก็บสะสม" },
            { q_th: "พืชชนิดใดมีรากหายใจเป็นลักษณะเด่น?", q_en: "Which plant is known for its respiratory roots?", a_th: ["แสม", "มันสำปะหลัง", "กล้วยไม้", "พริกไทย"], a_en: ["Mangrove (Sea Holly)", "Cassava", "Orchid", "Pepper"], correct: 0, th: "รากหายใจโผล่พ้นน้ำ", en: "Respiratory roots grow above water.", detail: "รากหายใจช่วยแลกเปลี่ยนก๊าซในดินที่มีออกซิเจนต่ำ" },
            { q_th: "รากพิเศษชนิดใดช่วยพืชในการไต่ระดับเพื่อรับแสง?", q_en: "Which special root helps plants climb for sunlight?", a_th: ["รากสะสมอาหาร", "รากค้ำจุน", "รากยึดเกาะ", "รากหายใจ"], a_en: ["Storage root", "Prop root", "Climbing root", "Respiratory root"], correct: 2, th: "รากยึดเกาะทำหน้าที่เกาะกำแพง", en: "Climbing roots attach to surfaces.", detail: "ช่วยพืชที่ต้องการแสงไต่ขึ้นสู่ที่สูง" },
            { q_th: "มันฝรั่ง จัดเป็นรากสะสมอาหาร ใช่หรือไม่?", q_en: "Is a potato classified as a storage root?", a_th: ["ใช่ เพราะเก็บแป้งไว้", "ไม่ใช่ เป็นลำต้นใต้ดิน", "ไม่ใช่ เป็นผล", "ใช่ เพราะอยู่ใต้ดิน"], a_en: ["Yes, it stores starch", "No, it's an underground stem", "No, it's a fruit", "Yes, it's underground"], correct: 1, th: "มันฝรั่งคือลำต้นใต้ดิน", en: "Potato is an underground stem.", detail: "รากสะสมอาหารคือแครอท/มันสำปะหลัง แต่มันฝรั่งเป็นลำต้น" },
            { q_th: "ถ้าเรานำพืชไปไว้ในที่มืดสนิท ผลลัพธ์ทางเคมีจะเป็นอย่างไร?", q_en: "What is the chemical result if a plant is kept in total darkness?", a_th: ["สร้างแป้งได้ปกติ", "ไม่มีพลังงานขับเคลื่อนการแตกตัวของน้ำ", "เพิ่มการดูดคาร์บอน", "ไม่มีผลต่อการสร้างอาหาร"], a_en: ["Produces starch normally", "No energy for water photolysis", "Increases carbon intake", "No effect on food production"], correct: 1, th: "ขาดแสง = ขาดพลังงาน", en: "Lack of light = lack of energy.", detail: "แสงคือพลังงานกระตุ้นปฏิกิริยาการแตกตัวของน้ำ" },
            { q_th: "ท่อลำเลียงใดทำหน้าที่ส่งซูโครสไปยังส่วนต่างๆ ของพืช?", q_en: "Which vessel transports sucrose to various plant parts?", a_th: ["Xylem", "Phloem", "Stomata", "Chloroplast"], a_en: ["Xylem", "Phloem", "Stomata", "Chloroplast"], correct: 1, th: "Phloem = ลำเลียงอาหาร", en: "Phloem = food transport.", detail: "Phloem ลำเลียงซูโครสที่ได้จากการสังเคราะห์ด้วยแสง" },
            { q_th: "ก๊าซออกซิเจนที่พืชปล่อยออกมา มีต้นกำเนิดมาจากสารใด?", q_en: "What is the origin of the oxygen released by plants?", a_th: ["คาร์บอนไดออกไซด์", "น้ำ", "ดิน", "ธาตุอาหารในอากาศ"], a_en: ["Carbon dioxide", "Water", "Soil", "Air nutrients"], correct: 1, th: "มาจากโมเลกุลน้ำ", en: "Comes from water molecules.", detail: "จากกระบวนการแตกตัวของน้ำในปฏิกิริยาใช้แสง" },
            { q_th: "โครงสร้างใดบนใบที่ทำหน้าที่เป็นทางเข้าของคาร์บอนไดออกไซด์?", q_en: "Which leaf structure serves as the entrance for carbon dioxide?", a_th: ["ผิวใบ", "ปากใบ", "ท่อลำเลียงน้ำ", "เส้นใบ"], a_en: ["Epidermis", "Stomata", "Xylem", "Veins"], correct: 1, th: "ปากใบคือช่องแลกเปลี่ยนก๊าซ", en: "Stomata exchange gases.", detail: "CO2 แพร่เข้าทางปากใบ" },
            { q_th: "การแปรรูปจากน้ำตาลกลูโคสเป็นซูโครส เกิดขึ้นเพื่อจุดประสงค์ใด?", q_en: "Why is glucose converted into sucrose?", a_th: ["เพื่อให้สะสมในรากได้", "เพื่อให้ลำเลียงได้สะดวก", "เพื่อให้พืชมีสีเขียว", "เพื่อให้ทนต่อความร้อน"], a_en: ["For root storage", "For easier transport", "To keep plants green", "To resist heat"], correct: 1, th: "ซูโครสเสถียรสำหรับการขนส่ง", en: "Sucrose is stable for transport.", detail: "กลูโคสไม่เสถียร พืชจึงเปลี่ยนเป็นซูโครสเพื่อส่งผ่านท่ออาหาร" },
            { q_th: "รากประเภทใดช่วยเพิ่มความมั่นคงในพืชที่อยู่ในดินโคลน?", q_en: "Which root type enhances stability in muddy soil?", a_th: ["รากค้ำจุน", "รากสะสมอาหาร", "รากหายใจ", "รากฝอย"], a_en: ["Prop root", "Storage root", "Respiratory root", "Fibrous root"], correct: 0, th: "รากค้ำจุนพยุงลำต้น", en: "Prop roots support the stem.", detail: "เช่น โกงกาง ที่มีรากค้ำจุนช่วยพยุงต้น" },
            { q_th: "คลอโรพลาสต์พบมากที่สุดที่บริเวณใดของใบ?", q_en: "Where are chloroplasts most abundant in a leaf?", a_th: ["ผิวใบด้านบน", "เซลล์ชั้นพาลิเซดมีโซฟิลล์", "ปากใบ", "ท่อลำเลียง"], a_en: ["Upper epidermis", "Palisade mesophyll", "Stomata", "Vascular tissue"], correct: 1, th: "Palisade mesophyll คือแหล่งสังเคราะห์แสงหลัก", en: "Palisade mesophyll is the main site.", detail: "เซลล์เรียงตัวหนาแน่นรับแสงได้ดี" },
            { q_th: "พลังงานในน้ำตาลกลูโคสจัดเป็นพลังงานรูปแบบใด?", q_en: "What form of energy is in glucose?", a_th: ["พลังงานแสง", "พลังงานเคมี", "พลังงานจลน์", "พลังงานศักย์ไฟฟ้า"], a_en: ["Light energy", "Chemical energy", "Kinetic energy", "Electrical potential"], correct: 1, th: "พลังงานเคมีในพันธะ", en: "Chemical energy in bonds.", detail: "พลังงานแสงถูกเปลี่ยนเป็นพลังงานเคมีที่กักเก็บในพันธะ" },
            { q_th: "หากพืชขาดแสงเป็นเวลานาน จะมีผลอย่างไรต่อการเจริญเติบโต?", q_en: "What happens if a plant lacks light for a long time?", a_th: ["พืชจะโตเร็วขึ้น", "พืชขาดพลังงานสร้างอาหาร", "พืชจะสะสมแป้งมากขึ้น", "พืชจะเปลี่ยนไปดูดซึมอาหารทางใบ"], a_en: ["Grows faster", "Lacks energy to make food", "Stores more starch", "Absorbs nutrients through leaves"], correct: 1, th: "ไม่มีพลังงาน = ไม่มีอาหาร", en: "No energy = no food.", detail: "พืชสร้างอาหารไม่ได้และจะตายในที่สุด" },
            { q_th: "ข้อใดคือพืชที่สะสมอาหารไว้ที่รากอย่างถูกต้อง?", q_en: "Which plant stores food in its roots?", a_th: ["ขิง", "เผือก", "มันสำปะหลัง", "มันฝรั่ง"], a_en: ["Ginger", "Taro", "Cassava", "Potato"], correct: 2, th: "มันสำปะหลังคือราก", en: "Cassava is a root.", detail: "ขิง/เผือก/มันฝรั่งเป็นลำต้นใต้ดิน" },
            { q_th: "กระบวนการออสโมซิสในรากพืชเกี่ยวข้องกับปัจจัยใดมากที่สุด?", q_en: "What is most involved in root osmosis?", a_th: ["แสง", "น้ำ", "แป้ง", "คาร์บอนไดออกไซด์"], a_en: ["Light", "Water", "Starch", "Carbon dioxide"], correct: 1, th: "ออสโมซิสคือน้ำ", en: "Osmosis involves water.", detail: "การแพร่ของน้ำผ่านเยื่อหุ้มเซลล์ราก" },
            { q_th: "เหตุใดแสมและลำพูจึงต้องมีรากพิเศษ?", q_en: "Why do mangroves need special roots?", a_th: ["เพื่อความสวยงาม", "เพื่อหาออกซิเจนในดินเลน", "เพื่อสะสมอาหาร", "เพื่อดักจับแมลง"], a_en: ["For aesthetics", "To find oxygen in mud", "To store food", "To catch insects"], correct: 1, th: "ดินเลนมีออกซิเจนต่ำ", en: "Muddy soil is low in oxygen.", detail: "ต้องโผล่พ้นน้ำเพื่อรับอากาศ" },
            { q_th: "ช่วงคลื่นแสงใดที่คลอโรฟิลล์ดูดกลืนได้ดีที่สุด?", q_en: "Which light wavelengths are best absorbed by chlorophyll?", a_th: ["เขียวและเหลือง", "แดงและน้ำเงิน", "เหลืองและส้ม", "ม่วงและเขียว"], a_en: ["Green and yellow", "Red and blue", "Yellow and orange", "Purple and green"], correct: 1, th: "แดงกับน้ำเงินดีที่สุด", en: "Red and blue are best.", detail: "เป็นช่วงคลื่นที่มีประสิทธิภาพสูงสุดในการสังเคราะห์ด้วยแสง" },
            { q_th: "ผลพลอยได้ (By-product) จากการสังเคราะห์ด้วยแสงที่ใช้ในตอนกลางคืนคือ?", q_en: "What by-product of photosynthesis is used at night?", a_th: ["น้ำ", "คาร์บอนไดออกไซด์", "ออกซิเจน", "แสง"], a_en: ["Water", "Carbon dioxide", "Oxygen", "Light"], correct: 2, th: "ออกซิเจนสำหรับการหายใจ", en: "Oxygen for respiration.", detail: "พืชใช้ออกซิเจนในกระบวนการหายใจระดับเซลล์" },
            { q_th: "รากประเภทใดที่มักพบในพืชอิงอาศัยอย่างกล้วยไม้?", q_en: "What root type is found in epiphytes like orchids?", a_th: ["รากยึดเกาะ", "รากค้ำจุน", "รากหายใจ", "รากสะสมอาหาร"], a_en: ["Climbing root", "Prop root", "Respiratory root", "Storage root"], correct: 0, th: "รากยึดเกาะต้นไม้ใหญ่", en: "Climbing/Anchoring root.", detail: "ใช้ยึดเกาะเพื่อให้ได้รับแสงและอากาศ" },
            { q_th: "แป้งและซูโครส ต่างกันอย่างไรในการทำงานของพืช?", q_en: "How do starch and sucrose differ in plants?", a_th: ["แป้งใช้ขนส่ง ซูโครสใช้เก็บ", "แป้งใช้เก็บ ซูโครสใช้ขนส่ง", "ไม่มีความต่าง", "แป้งคือพลังงาน ซูโครสคือแร่ธาตุ"], a_en: ["Starch for transport, sucrose for storage", "Starch for storage, sucrose for transport", "No difference", "Starch is energy, sucrose is mineral"], correct: 1, th: "แป้งเก็บ, ซูโครสส่ง", en: "Starch stores, sucrose transports.", detail: "พืชแปรรูปเพื่อเหมาะสมกับหน้าที่" },
            { q_th: "ปฏิกิริยา 'ไม่ใช้แสง' (Calvin Cycle) มีวัตถุประสงค์หลักคืออะไร?", q_en: "What is the main purpose of the Calvin Cycle?", a_th: ["แตกตัวน้ำ", "ตรึงคาร์บอนสร้างน้ำตาล", "รับพลังงานแสง", "ปล่อยออกซิเจน"], a_en: ["Split water", "Fix carbon to make sugar", "Receive light", "Release oxygen"], correct: 1, th: "ตรึงคาร์บอน", en: "Carbon fixation.", detail: "ใช้คาร์บอนไดออกไซด์เปลี่ยนเป็นน้ำตาล" }
        ];

        let currentLang = 'th';

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.innerHTML = `
                    <p><strong>ข้อที่ ${index + 1}: ${currentLang === 'th' ? q.q_th : q.q_en}</strong></p>
                    ${(currentLang === 'th' ? q.a_th : q.a_en).map((opt, i) => `
                        <button class="option" onclick="checkAnswer(${index}, ${i}, this)">${opt}</button>
                    `).join('')}
                    <div class="detail" id="detail-${index}">
                        <strong>${currentLang === 'th' ? 'เฉลย:' : 'Answer:'}</strong> ${currentLang === 'th' ? q.th : q.en}<br>
                        <em>${q.detail}</em>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function checkAnswer(qIndex, aIndex, btn) {
            const parent = btn.parentElement;
            const options = parent.querySelectorAll('.option');
            const detail = parent.querySelector('.detail');
            
            if (aIndex === questions[qIndex].correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                options[questions[qIndex].correct].classList.add('correct');
            }
            options.forEach(o => o.disabled = true);
            detail.style.display = 'block';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            renderQuiz();
        }

        renderQuiz();
    </script>
    <p style="text-align: right; margin-top: 40px;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
