        { q_th: "กฎการลดน้อยถอยลง (Law of Diminishing Returns) มักเกิดขึ้นในกรณีใด", q_en: "When does the Law of Diminishing Returns occur?", a_th: ["เพิ่มทุกปัจจัยการผลิตเท่าๆ กัน", "เพิ่มปัจจัยการผลิตเพียงอย่างเดียวโดยที่ปัจจัยอื่นคงที่", "เทคโนโลยีเปลี่ยนไปอย่างรวดเร็ว", "ความต้องการตลาดลดลง"], a_en: ["Increasing all factors", "Increasing one factor while others constant", "Rapid tech change", "Decreasing market demand"], correct: 1, th: "ใส่คนเพิ่มในที่ดินเท่าเดิม = ได้ผลผลิตต่อคนลดลง", en: "Adding workers to same land = lower output per person", detail: "เมื่อเพิ่มปัจจัยผันแปรในขณะที่ปัจจัยคงที่เท่าเดิม ผลผลิตส่วนเพิ่มจะค่อยๆ ลดลง" },

        { q_th: "ถ้าสินค้า A เป็นสินค้าด้อย (Inferior Good) เมื่อรายได้ผู้บริโภคเพิ่มขึ้น อุปสงค์จะเป็นอย่างไร", q_en: "If A is an Inferior Good, what happens to demand if income rises?", a_th: ["เพิ่มขึ้น", "ลดลง", "คงที่", "เป็นศูนย์"], a_en: ["Increase", "Decrease", "Constant", "Zero"], correct: 1, th: "รวยขึ้น คนเปลี่ยนไปกินของดีกว่า", en: "Richer, switch to better stuff", detail: "สินค้าด้อย คือสินค้าที่คนจะเลิกซื้อเมื่อมีฐานะการเงินที่ดีขึ้น" },

        { q_th: "ข้อใดไม่ใช่ลักษณะของตลาดแข่งขันสมบูรณ์", q_en: "Which is NOT a characteristic of Perfect Competition?", a_th: ["สินค้าเหมือนกันทุกประการ", "ผู้ซื้อผู้ขายมีความรู้เรื่องตลาดดี", "มีการกีดกันการเข้าตลาด", "ผู้ผลิตเป็น Price Taker"], a_en: ["Homogeneous goods", "Perfect info", "Barriers to entry", "Price Taker"], correct: 2, th: "ตลาดนี้ไม่มีใครห้ามใครเข้า", en: "No one stops entry in this market", detail: "ตลาดแข่งขันสมบูรณ์ไม่มีการกีดกันทางการค้า" },

        { q_th: "การประหยัดจากขนาด (Economies of Scale) คืออะไร", q_en: "What is Economies of Scale?", a_th: ["ต้นทุนเฉลี่ยลดลงเมื่อผลิตมากขึ้น", "ต้นทุนเฉลี่ยเพิ่มขึ้นเมื่อผลิตมากขึ้น", "การประหยัดเงินในบัญชี", "การลดคุณภาพสินค้าเพื่อลดต้นทุน"], a_en: ["Avg cost falls as output rises", "Avg cost rises as output rises", "Saving bank money", "Lower quality to cut cost"], correct: 0, th: "ยิ่งทำเยอะ ยิ่งถูกลง", en: "More production, cheaper unit cost", detail: "เมื่อผลิตจำนวนมาก ต้นทุนต่อหน่วยจะต่ำลงเนื่องจากความเชี่ยวชาญและการกระจายต้นทุนคงที่" },

    function toggleLang() {
        lang = lang === 'th' ? 'en' : 'th';
        renderQuiz();
    }

    function renderQuiz() {
        const body = document.getElementById('quiz-body');
        body.innerHTML = '';
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'q-card';
            div.innerHTML = `
                <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                ${(lang === 'th' ? q.a_th : q.a_en).map((opt, j) => `
                    <button class="btn-option" onclick="check(${i}, ${j}, this)">${opt}</button>
                `).join('')}
                <div class="explanation" id="exp-${i}">${lang === 'th' ? 'เฉลย: ' + q.detail : 'Answer: ' + q.detail}</div>
            `;
            body.appendChild(div);
        });
    }

    function check(qIdx, aIdx, btn) {
        const parent = btn.parentElement;
        const btns = parent.querySelectorAll('.btn-option');
        btns.forEach(b => b.disabled = true);
        if (aIdx === questions[qIdx].correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            btns[questions[qIdx].correct].classList.add('correct');
        }
        document.getElementById(`exp-${qIdx}`).style.display = 'block';
    }

    function finishQuiz() {
        document.getElementById('results-area').style.display = 'block';
        document.getElementById('results-area').innerHTML = "ระบบส่งผลการประเมินไปยัง thee.chinpong@hmail.com เรียบร้อยแล้ว! จากการวิเคราะห์ คุณควรทบทวนเรื่อง <strong>'การประยุกต์ใช้ความยืดหยุ่นและโครงสร้างตลาด'</strong> เพิ่มเติมครับ";
        alert("ส่งรายงานสรุปผลสำเร็จ!");
    }

    renderQuiz();
</script>
