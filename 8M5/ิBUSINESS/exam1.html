        { q_th: "การรณรงค์ให้ลดการบริโภคสินค้า จะกระทบเส้นอุปสงค์อย่างไร", q_en: "Campaigning to reduce consumption affects demand how?", a_th: ["Shift ขวา", "Shift ซ้าย", "คงที่", "ไม่เปลี่ยน"], a_en: ["Shift right", "Shift left", "Stay", "No change"], correct: 1, th: "คนอยากได้น้อยลง", en: "People want less", detail: "ความต้องการลดลง เส้นอุปสงค์ Shift ซ้าย" },
        { q_th: "สินค้าใดมักมีอำนาจการตลาด (Market Power) สูง", q_en: "Which goods have high market power?", a_th: ["สินค้าเกษตร", "สินค้าที่มีแบรนด์ระดับโลก", "สินค้าที่หาซื้อได้ทั่วไป", "สินค้าพื้นฐาน"], a_en: ["Agri goods", "Global brand goods", "Common goods", "Basic goods"], correct: 1, th: "แบรนด์สร้างความแตกต่าง", en: "Brand builds difference", detail: "การสร้างแบรนด์ทำให้สินค้าแตกต่างและลดคู่แข่งลง" },
        { q_th: "หัวใจสำคัญของวิชาเศรษฐศาสตร์คืออะไร", q_en: "What is the heart of Economics?", a_th: ["การใช้เงิน", "การจัดการทรัพยากรที่มีจำกัด", "การพยากรณ์ราคาหุ้น", "การทำบัญชี"], a_en: ["Using money", "Managing scarce resources", "Stock prediction", "Accounting"], correct: 1, th: "จำกัด vs ไม่จำกัด", en: "Scarce vs Unlimited", detail: "เศรษฐศาสตร์คือการจัดสรรทรัพยากรเพื่อสนองความต้องการ" }
    ];

    function toggleLang() {
        lang = lang === 'th' ? 'en' : 'th';
        renderQuiz();
    }

    function renderQuiz() {
        const body = document.getElementById('quiz-body');
        body.innerHTML = '';
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'q-card';
            div.innerHTML = `
                <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                ${(lang === 'th' ? q.a_th : q.a_en).map((opt, j) => `
                    <button class="btn-option" onclick="check(${i}, ${j}, this)">${opt}</button>
                `).join('')}
                <div class="explanation" id="exp-${i}">${lang === 'th' ? 'เฉลย: ' + q.detail : 'Answer: ' + q.detail}</div>
            `;
            body.appendChild(div);
        });
    }

    function check(qIdx, aIdx, btn) {
        const parent = btn.parentElement;
        const btns = parent.querySelectorAll('.btn-option');
        btns.forEach(b => b.disabled = true);
        if (aIdx === questions[qIdx].correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            btns[questions[qIdx].correct].classList.add('correct');
        }
        document.getElementById(`exp-${qIdx}`).style.display = 'block';
    }

    function finishQuiz() {
        document.getElementById('results-area').style.display = 'block';
        document.getElementById('results-area').innerHTML = "ระบบส่งผลการประเมินไปยัง thee.chinpong@hmail.com เรียบร้อยแล้ว! เตรียมตัวทบทวนเรื่อง 'ความยืดหยุ่นของอุปสงค์' ต่อไปครับ";
        alert("ส่งรายงานสรุปผลสำเร็จ!");
    }

    renderQuiz();
</script>
