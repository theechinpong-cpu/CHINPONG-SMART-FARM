<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทดสอบ สอวน. เคมี - ฉบับสมบูรณ์ 30 ข้อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .whiteboard-canvas { touch-action: none; border: 2px solid #e2e8f0; background: #ffffff; border-radius: 12px; width: 100%; height: 350px; cursor: crosshair; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto bg-slate-900 text-white p-6 rounded-2xl shadow-2xl mb-8">
        <h1 class="text-2xl font-bold">ระบบทดสอบความพร้อม สอวน. เคมี (ฉบับสมบูรณ์)</h1>
        <p class="text-slate-400 text-sm mt-1">Professional Simulation Platform - 30 Questions</p>
    </header>

    <main class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8">
        <section class="flex-1 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <div id="quiz-root">
                <h2 id="q-title" class="text-xl font-semibold mb-6 border-b pb-4">กำลังโหลดข้อสอบ...</h2>
                <div id="q-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div class="mt-8 flex justify-between">
                    <button id="prev-btn" onclick="prev()" class="px-6 py-2 bg-slate-200 rounded-lg hover:bg-slate-300">ย้อนกลับ</button>
                    <button id="next-btn" onclick="next()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">ถัดไป</button>
                </div>
            </div>
        </section>

        <aside class="w-full lg:w-96 flex-shrink-0">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-8">
                <h3 class="font-bold text-slate-700 mb-4">กระดานทดเลข</h3>
                <canvas id="whiteboard" class="whiteboard-canvas"></canvas>
                <button onclick="clearBoard()" class="w-full mt-4 bg-slate-800 text-white py-2 rounded-lg hover:bg-slate-700">ล้างกระดาน</button>
            </div>
        </aside>
    </main>

    <script>
        const questions = [
            { q: "1. ดาวเคราะห์ดวงใดได้ชื่อว่าเป็น 'ดาวเคราะห์สีแดง'?", a: ["โลก", "ดาวศุกร์", "ดาวอังคาร", "ดาวพฤหัสบดี"], c: 2 },
            { q: "2. ข้อใดคือสูตรเคมีของน้ำ?", a: ["CO2", "H2O", "O2", "NaCl"], c: 1 },
            { q: "3. ใครคือผู้ประดิษฐ์หลอดไฟคนแรกของโลก?", a: ["อัลเบิร์ต ไอน์สไตน์", "โทมัส อัลวา เอดิสัน", "นิโคล เทสลา", "กาลิเลโอ"], c: 1 },
            { q: "4. จังหวัดใดอยู่ใต้สุดของประเทศไทย?", a: ["สงขลา", "นราธิวาส", "ยะลา", "ปัตตานี"], c: 2 },
            { q: "5. อวัยวะใดในร่างกายมนุษย์ที่ทำหน้าที่กรองของเสียออกจากเลือด?", a: ["ตับ", "ปอด", "หัวใจ", "ไต"], c: 3 },
            { q: "6. วันสุนทรภู่ ตรงกับวันที่เท่าไหร่ของทุกปี?", a: ["24 มิถุนายน", "26 มิถุนายน", "28 มิถุนายน", "30 มิถุนายน"], c: 1 },
            { q: "7. สัตว์ชนิดใดจัดเป็นสัตว์เลี้ยงลูกด้วยนมที่อาศัยอยู่ในน้ำ?", a: ["ฉลาม", "วาฬ", "ปลากระเบน", "ม้าน้ำ"], c: 1 },
            { q: "8. ประเทศใดมีพื้นที่มากที่สุดในโลก?", a: ["แคนาดา", "สหรัฐอเมริกา", "จีน", "รัสเซีย"], c: 3 },
            { q: "9. ก๊าซชนิดใดที่พืชใช้ในการสังเคราะห์แสง?", a: ["ออกซิเจน", "ไนโตรเจน", "คาร์บอนไดออกไซด์", "ไฮโดรเจน"], c: 2 },
            { q: "10. พระพุทธเจ้าประสูติใต้ต้นอะไร?", a: ["ต้นโพธิ์", "ต้นไทร", "ต้นสาละ", "ต้นจิก"], c: 2 },
            { q: "11. 7 x 8 มีค่าเท่ากับเท่าไหร่?", a: ["54", "56", "62", "64"], c: 1 },
            { q: "12. ธงชาติไทยมีกี่สี?", a: ["2 สี", "3 สี", "4 สี", "5 สี"], c: 1 },
            { q: "13. ข้อใดคือหน่วยวัดกระแสไฟฟ้า?", a: ["โวลต์", "โอห์ม", "แอมแปร์", "วัตต์"], c: 2 },
            { q: "14. ทวีปที่ใหญ่ที่สุดในโลกคือทวีปใด?", a: ["แอฟริกา", "ยุโรป", "อเมริกาเหนือ", "เอเชีย"], c: 3 },
            { q: "15. พยัญชนะไทยมีทั้งหมดกี่รูป?", a: ["42 รูป", "44 รูป", "46 รูป", "48 รูป"], c: 1 },
            { q: "16. วิตามินใดช่วยป้องกันโรคเลือดออกตามไรฟัน?", a: ["วิตามิน เอ", "วิตามิน บี", "วิตามิน ซี", "วิตามิน ดี"], c: 2 },
            { q: "17. แม่น้ำสายที่ยาวที่สุดในโลกคือแม่น้ำสายใด?", a: ["แม่น้ำเจ้าพระยา", "แม่น้ำโขง", "แม่น้ำอเมซอน", "แม่น้ำไนล์"], c: 3 },
            { q: "18. กีฬาโอลิมปิกจัดขึ้นทุกๆ กี่ปี?", a: ["2 ปี", "3 ปี", "4 ปี", "5 ปี"], c: 2 },
            { q: "19. ส่วนประกอบใดของพืชที่ทำหน้าที่สืบพันธุ์?", a: ["ราก", "ลำต้น", "ใบ", "ดอก"], c: 3 },
            { q: "20. รุ้งกินน้ำมีทั้งหมดกี่สี?", a: ["5 สี", "6 สี", "7 สี", "8 สี"], c: 2 },
            { q: "21. ใครเป็นผู้แต่งเพลงชาติไทย (ทำนอง)?", a: ["พระเจนดุริยางค์", "ขุนวิจิตรมาตรา", "หลวงประดิษฐไพเราะ", "สุนทราภรณ์"], c: 0 },
            { q: "22. สัญลักษณ์ทางเคมีของทองคำคืออะไร?", a: ["Ag", "Fe", "Au", "Cu"], c: 2 },
            { q: "23. อุปกรณ์ใดใช้สำหรับวัดอุณหภูมิ?", a: ["บารอมิเตอร์", "เทอร์มอมิเตอร์", "ไฮโกรมิเตอร์", "ความดัน"], c: 1 },
            { q: "24. สัตว์ชนิดใดหายใจด้วยเหงือก?", a: ["กบ", "เต่า", "ปลา", "วาฬ"], c: 2 },
            { q: "25. กำแพงเมืองจีนสร้างขึ้นเพื่อป้องกันชนเผ่าใด?", a: ["ญี่ปุ่น", "มองโกล", "เวียดนาม", "ไทย"], c: 1 },
            { q: "26. ข้อใดคือจังหวัดที่มีพื้นที่มากที่สุดในประเทศไทย?", a: ["เชียงใหม่", "นครราชสีมา", "กาญจนบุรี", "ตาก"], c: 1 },
            { q: "27. เทศกาลลอยกระทง ตรงกับวันขึ้นกี่ค่ำ?", a: ["ขึ้น 8 ค่ำ เดือน 12", "ขึ้น 15 ค่ำ เดือน 11", "ขึ้น 15 ค่ำ เดือน 12", "แรม 1 ค่ำ เดือน 1"], c: 2 },
            { q: "28. ข้อใดเรียงลำดับจุดเดือดของสารประกอบไฮดริดของธาตุหมู่ 15 ได้ถูกต้องที่สุด?", a: ["PH3 < AsH3 < SbH3 < NH3", "NH3 < PH3 < AsH3 < SbH3", "PH3 > AsH3 > SbH3 > NH3", "NH3 > SbH3 > AsH3 > PH3"], c: 0 },
            { q: "29. ธาตุ X มีการจัดเรียงอิเล็กตรอนเป็น 2, 8, 8, 2 ธาตุนี้มีสมบัติทางเคมีคล้ายคลึงกับธาตุใดมากที่สุด?", a: ["He", "Mg", "Cl", "Ar"], c: 1 },
            { q: "30. 'กรุงเทพมหานคร' มีชื่อย่อภาษาอังกฤษว่าอะไร?", a: ["BKK", "GTM", "KRM", "BKM"], c: 0 }
        ];

        let currentIdx = 0;
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        let painting = false;

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            ctx.lineCap = 'round'; ctx.lineWidth = 3; ctx.strokeStyle = '#334155';
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.lineTo(x, y); ctx.stroke();
        }

        canvas.onmousedown = (e) => { painting = true; ctx.beginPath(); draw(e); };
        canvas.onmouseup = () => painting = false;
        canvas.onmousemove = draw;
        canvas.ontouchstart = (e) => { painting = true; ctx.beginPath(); draw(e); };
        canvas.ontouchend = () => painting = false;
        canvas.ontouchmove = draw;

        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function loadQ() {
            const q = questions[currentIdx];
            document.getElementById('q-title').innerText = q.q;
            const cont = document.getElementById('q-options');
            cont.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "p-4 border rounded-xl hover:bg-blue-50 text-left transition";
                btn.innerText = opt;
                btn.onclick = () => alert("คุณเลือกคำตอบที่ " + (i+1));
                cont.appendChild(btn);
            });
        }

        function next() { if(currentIdx < 29) { currentIdx++; loadQ(); } }
        function prev() { if(currentIdx > 0) { currentIdx--; loadQ(); } }

        loadQ();
    </script>
</body>
</html>
