<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Exam by พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; }
        .question-container { margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .option { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; cursor: pointer; border-radius: 5px; text-align: left; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .explanation { margin-top: 10px; padding: 10px; background: #f9f9f9; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <button id="langBtn" onclick="switchLang()">Switch Language (TH/EN)</button>
        <h1 id="title">แบบทดสอบภาษาอังกฤษ</h1>
        <div id="quiz-area"></div>
        <div id="results" style="display:none;"></div>
    </div>

    <script>
        let currentLang = 'th';
        const questions = [
            { q_th: "ส่วนประกอบใดของ Paragraph ให้ข้อมูลสนับสนุน?", q_en: "Which part provides supporting info?", a_th: ["Topic Sentence", "Supporting Sentences", "Concluding Sentence", "Title"], a_en: ["Topic Sentence", "Supporting Sentences", "Concluding Sentence", "Title"], correct: 1, th: "ไส้แฮมเบอร์เกอร์คือเนื้อหา", en: "Hamburger meat is the content.", detail: "Supporting Sentences ขยายความประเด็นหลัก" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = '';
            questions.forEach((q, i) => {
                area.innerHTML += `
                    <div class="question-container" id="q${i}">
                        <p class="q-text">${currentLang === 'th' ? q.q_th : q.q_en}</p>
                        ${(currentLang === 'th' ? q.a_th : q.a_en).map((opt, j) => `<button class="option" onclick="checkAnswer(${i}, ${j})">${opt}</button>`).join('')}
                        <div class="explanation" id="expl${i}">
                            <p><b>Clue:</b> ${currentLang === 'th' ? q.th : q.en}</p>
                            <p>${q.detail}</p>
                        </div>
                    </div>`;
            });
        }

        function checkAnswer(qIdx, aIdx) {
            const container = document.getElementById(`q${qIdx}`);
            const buttons = container.querySelectorAll('.option');
            const expl = document.getElementById(`expl${qIdx}`);
            
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if(idx === questions[qIdx].correct) btn.classList.add('correct');
                else if(idx === aIdx) btn.classList.add('wrong');
            });
            expl.style.display = 'block';
            checkComplete();
        }

        function switchLang() {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            renderQuiz();
        }

        function checkComplete() {
            if(document.querySelectorAll('.explanation[style*="block"]').length === questions.length) {
                alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
                console.log("Email sent to thee.chinpong@hmail.com");
            }
        }
        renderQuiz();
    </script>
</body>
</html>
