            { q_th: "ทำไมจดหมายเหตุของชาวต่างชาติจึงมีความสำคัญในประวัติศาสตร์ไทย", q_en: "Why are foreign chronicles important to Thai history?", a_th: ["เพราะบันทึกอย่างเป็นกลางเสมอ", "เพราะให้มุมมองจากคนภายนอกที่บันทึกเหตุการณ์", "เพราะเขียนขึ้นโดยได้รับคำสั่งจากกษัตริย์ไทย", "เพราะมีความแม่นยำทางปี พ.ศ. มากที่สุด"], a_en: ["Because they are always objective", "Because they provide external perspectives", "Because they were ordered by Thai kings", "Because they are most accurate on BE dates"], correct: 1, detail: "ช่วยให้เห็นภาพรวมของสังคมไทยผ่านเลนส์ของคนต่างวัฒนธรรม", tip: "มุมมองคนอื่นช่วยเติมเต็มภาพ", clue: "(หลักฐานประเภทจดหมายเหตุ)" },

            { q_th: "ทำไมเทคโนโลยี 'เหล็ก' จึงสำคัญต่อการเปลี่ยนแปลงทางสังคม", q_en: "Why was 'Iron' technology significant for social change?", a_th: ["เพราะทำให้เกิดแฟชั่นการแต่งกายใหม่", "เพราะเพิ่มประสิทธิภาพในการเกษตรและอาวุธ", "เพราะทำให้เกิดการเขียนจดหมาย", "เพราะไม่ต้องใช้ความร้อนสูงในการผลิต"], a_en: ["Because it created new fashion", "Because it increased agricultural and weapon efficiency", "Because it allowed letter writing", "Because it required less heat to produce"], correct: 1, detail: "เครื่องมือเหล็กแข็งแรงขึ้น ทำให้ขยายพื้นที่ทำกินได้มาก", tip: "เครื่องมือดี = ผลผลิตเพิ่ม", clue: "(เทคโนโลยีเครื่องมือ)" },

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                let html = `<div class="question-card" id="card${i}">
                    <p><b>ข้อที่ ${i + 1}:</b> <span class="q-text">${q.q_th}</span> <span class="clue">${q.clue}</span></p>`;
                q.a_th.forEach((opt, j) => {
                    html += `<label><input type="radio" name="q${i}" value="${j}" onclick="showDetail(${i}, ${j})"> <span class="opt-text">${opt}</span></label><br>`;
                });
                html += `<div id="d${i}" class="detail"><b>เฉลย (Answer):</b> <span class="a-text">${q.a_th[q.correct]}</span><br><b>คำอธิบาย:</b> <span class="d-text">${q.detail}</span><div class="tip">Tip: ${q.tip}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function toggleLang() {
            const isThai = document.querySelector('.q-text').innerText === questions[0].q_th;
            questions.forEach((q, i) => {
                document.querySelector(`#card${i} .q-text`).innerText = isThai ? q.q_en : q.q_th;
                const opts = document.querySelectorAll(`#card${i} input + .opt-text`);
                opts.forEach((opt, j) => opt.innerText = isThai ? q.a_en[j] : q.a_th[j]);
                document.querySelector(`#d${i} .a-text`).innerText = isThai ? q.a_en[q.correct] : q.a_th[q.correct];
                document.querySelector(`#d${i} .d-text`).innerText = isThai ? "English explanation placeholder" : q.detail;
            });
        }

        function showDetail(qIdx, aIdx) {
            const detailDiv = document.getElementById(`d${qIdx}`);
            const inputs = document.querySelectorAll(`input[name="q${qIdx}"]`);
            inputs.forEach(input => input.disabled = true);
            detailDiv.style.display = 'block';
            detailDiv.style.borderColor = (aIdx === questions[qIdx].correct) ? "#27ae60" : "#c0392b";
        }

        function checkFinal() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `<h2>คะแนนของคุณคือ: ${score}/25</h2><p>ระบบได้จำลองการส่งคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้วครับ</p>`;
            alert("บันทึกข้อมูลเรียบร้อย: " + score + "/25");
        }

        renderQuiz();

    <p style="text-align: right; margin-top: 20px;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
