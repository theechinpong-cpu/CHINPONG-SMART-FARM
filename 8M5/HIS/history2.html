            { q: "เหตุใดปราสาทหินในภาคอีสานจึงสะท้อนอิทธิพลขอมได้ชัดเจนกว่าที่อื่น", a: ["เพราะเป็นพื้นที่ราบสูงใกล้แหล่งหินทราย", "เพราะคนในพื้นที่อยากเป็นคนขอม", "เพราะขอมไม่ได้สร้างที่อื่นเลย", "เพราะเป็นศูนย์กลางการปกครองหลักของขอม"], correct: 0, detail: "สภาพภูมิศาสตร์เอื้อต่อการขนส่งและสร้างสถาปัตยกรรม", tip: "หินทรายคือวัสดุหลักของขอม", clue: "(ปัจจัยทางภูมิศาสตร์)" },
            { q: "การใช้เทคนิค 'เทียบเคียงหลักฐาน' (Cross-reference) ช่วยลดโอกาสเกิดข้อผิดพลาดได้อย่างไร", a: ["ทำให้ไม่ต้องอ่านเอกสารทั้งหมด", "ทำให้เห็นข้อมูลจากหลายมุมมองและหักล้างกันได้", "ทำให้งานวิจัยดูมีความน่าเชื่อถือ", "ทำให้ไม่ต้องใช้ภาษาต่างประเทศ"], correct: 1, detail: "ป้องกันการถูกหลอกโดยเอกสารเพียงฉบับเดียว", tip: "อย่าเชื่อพยานปากเดียว", clue: "(วิธีวิเคราะห์หลักฐาน)" },
            { q: "อิทธิพลด้าน 'ระบอบการปกครองแบบกษัตริย์' ของไทย รับมาจากใคร", a: ["จีน", "อินเดียผ่านเขมร", "ยุโรปผ่านอาณานิคม", "พม่าและลาว"], correct: 1, detail: "การรวมคติเทวราชามาจากพราหมณ์-ฮินดูของอินเดีย", tip: "เทวราชา = กษัตริย์คือสมมติเทพ", clue: "(อิทธิพลการเมือง)" },
            { q: "หลักฐานประเภท 'คำบอกเล่า' มักขาดความน่าเชื่อถือในเรื่องใด", a: ["ความรู้สึกนึกคิด", "การบอกเล่าประสบการณ์ชีวิต", "กาลเวลาที่แน่นอนและรายละเอียดเชิงปริมาณ", "ภาษาที่ใช้ในการสื่อสาร"], correct: 2, detail: "ความจำมนุษย์มักบิดเบือนเวลาเมื่อผ่านไปนานๆ", tip: "ความจำคนมีวันเสื่อม", clue: "(ความน่าเชื่อถือหลักฐาน)" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                let html = `<div class="question-card" id="card${i}">
                    <p><b>ข้อที่ ${i + 1}:</b> ${q.q} <span class="clue">${q.clue}</span></p>`;
                q.a.forEach((opt, j) => {
                    html += `<label><input type="radio" name="q${i}" value="${j}" onclick="showDetail(${i}, ${j})"> ${opt}</label><br>`;
                });
                html += `<div id="d${i}" class="detail"><b>เฉลย:</b> ${q.a[q.correct]}<br><b>คำอธิบาย:</b> ${q.detail}<div class="tip">Tip: ${q.tip}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function showDetail(qIdx, aIdx) {
            const detailDiv = document.getElementById(`d${qIdx}`);
            const inputs = document.querySelectorAll(`input[name="q${qIdx}"]`);
            inputs.forEach(input => input.disabled = true);
            detailDiv.style.display = 'block';
            detailDiv.style.borderColor = (aIdx === questions[qIdx].correct) ? "#27ae60" : "#c0392b";
        }

        function checkFinal() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `<h2>คะแนนรวมของคุณคือ: ${score}/25</h2><p>ระบบได้จำลองการส่งคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้วครับ</p>`;
            alert("บันทึกข้อมูลเรียบร้อย: " + score + "/25");
        }

        renderQuiz();
    </script>
    <p style="text-align: right; margin-top: 20px;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
