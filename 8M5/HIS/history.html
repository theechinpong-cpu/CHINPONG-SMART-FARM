<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบประวัติศาสตร์ ม.5 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .detail { background: #e8f8f5; padding: 10px; margin-top: 10px; border-left: 5px solid #27ae60; display: none; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #c0392b; font-weight: bold; }
        #result-box { padding: 20px; background: #fff; border-radius: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

    <h1>ข้อสอบประวัติศาสตร์ ม.5 โดย พระจอมเกล้าติวเตอร์</h1>
    <div id="quiz-container"></div>
    <button onclick="checkAnswers()" style="padding: 15px 30px; font-size: 16px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 5px;">ส่งคำตอบและตรวจผล</button>
    <div id="result-box"></div>

    <script>
        const questions = [
            { q_th: "พ.ศ. 2569 ตรงกับ ค.ศ. ใด", a_th: ["2026", "2030", "2035", "2040"], correct: 0, detail: "นำ 2569 ลบด้วย 543 จะได้ ค.ศ. 2026" },
            { q_th: "ข้อใดไม่ใช่เกณฑ์หลักในการแบ่งยุคก่อนประวัติศาสตร์", a_th: ["วัสดุเครื่องมือ", "เทคนิคการถลุงเหล็ก", "การปรากฏตัวอักษร", "ความซับซ้อนของสังคม"], correct: 2, detail: "ตัวอักษรเป็นเกณฑ์แบ่งสมัยประวัติศาสตร์ ไม่ใช่ก่อนประวัติศาสตร์" },
            { q_th: "หลักฐานชั้นต้นมีความน่าเชื่อถือสูงกว่าชั้นรองเพราะเหตุใด", a_th: ["เขียนโดยผู้เชี่ยวชาญ", "เป็นความเห็นที่เป็นกลาง", "เกิดร่วมสมัยกับเหตุการณ์", "ผ่านการตรวจสอบแล้ว"], correct: 2, detail: "หลักฐานชั้นต้นบันทึกจากผู้เห็นเหตุการณ์โดยตรง" },
            { q_th: "ข้อใดคือขั้นตอนแรกของวิธีการทางประวัติศาสตร์", a_th: ["การวิพากษ์หลักฐาน", "การตีความข้อมูล", "การตั้งประเด็นคำถาม", "การเรียบเรียงนำเสนอ"], correct: 2, detail: "การกำหนดหัวข้อ/คำถามสำคัญคือจุดเริ่มต้น" },
            { q_th: "การประเมินค่าของหลักฐานในเชิงวิพากษ์วิธีเน้นสิ่งใด", a_th: ["ความสวยงามของภาษา", "ความน่าเชื่อถือของเนื้อหา", "ชื่อเสียงของผู้แต่ง", "ความยาวของเอกสาร"], correct: 1, detail: "วิพากษ์คือการตรวจสอบความน่าเชื่อถือ" },
            { q_th: "ทฤษฎีถิ่นกำเนิดไทยที่อ้างว่าไทยมาจากเทือกเขาอัลไต ปัจจุบันได้รับความนิยมลดลงเพราะเหตุใด", a_th: ["ขาดหลักฐานทางโบราณคดี", "ขัดแย้งกับหลักภาษาศาสตร์", "เปลี่ยนไปเน้นการเคลื่อนย้าย", "ไม่เป็นไปตามหลักภูมิศาสตร์"], correct: 0, detail: "ไม่มีการค้นพบหลักฐานยืนยันการตั้งถิ่นฐานในพื้นที่นั้น" },
            { q_th: "อาณาจักรทวารวดีได้รับอิทธิพลศาสนาใดเป็นหลัก", a_th: ["พุทธมหายาน", "พุทธเถรวาทและพราหมณ์", "ฮินดู", "อิสลาม"], correct: 1, detail: "พบหลักฐานธรรมจักรและจารึกภาษาสันสกฤต" },
            { q_th: "การสร้างองค์ความรู้ใหม่ทางประวัติศาสตร์ควรยึดหลักใด", a_th: ["ความเชื่อมั่นในตำนาน", "การสรุปแบบเหมารวม", "ความสมเหตุสมผลของข้อมูล", "คำบอกเล่าของผู้ใหญ่"], correct: 2, detail: "ใช้หลักฐานยืนยันความสมเหตุสมผล" },
            { q_th: "รศ. 100 ตรงกับ พ.ศ. ใด (รศ. เริ่ม พ.ศ. 2325)", a_th: ["2425", "2445", "2450", "2460"], correct: 0, detail: "นำ 2325 บวก 100 ได้ 2425" },
            { q_th: "อิทธิพลของอินเดียที่ส่งผลต่อไทยมากที่สุดคือเรื่องใด", a_th: ["อาหาร", "ภาษาและความเชื่อ", "สถาปัตยกรรมตะวันตก", "การค้าแบบเสรี"], correct: 1, detail: "รับวัฒนธรรมด้านตัวอักษร ศาสนา และการปกครอง" },
            { q_th: "ข้อใดคือวิธีการประเมินหลักฐานภายนอก", a_th: ["ตรวจเนื้อหาข้างใน", "ตรวจสอบกาลเวลาและสถานที่", "ตีความหมายของข้อความ", "เปรียบเทียบกับหลักฐานอื่น"], correct: 1, detail: "ภายนอกเน้นตัววัตถุและอายุขัย" },
            { q_th: "หลักฐานทางประวัติศาสตร์ประเภทจารึกจัดเป็น", a_th: ["หลักฐานชั้นรอง", "หลักฐานไม่เป็นลายลักษณ์อักษร", "หลักฐานชั้นต้น", "หลักฐานประเภทตำนาน"], correct: 2, detail: "จารึกคือสิ่งที่บันทึกในยุคสมัยนั้น" },
            { q_th: "ข้อใดคือลักษณะเด่นของรัฐแบบจารีต", a_th: ["ยึดถือระบอบประชาธิปไตย", "อำนาจรวมศูนย์ที่กษัตริย์", "การจัดการแบบรัฐสวัสดิการ", "เน้นการค้าขายกับต่างชาติ"], correct: 1, detail: "รัฐจารีตเน้นอำนาจศักดิ์สิทธิ์และกษัตริย์" },
            { q_th: "การศึกษาประวัติศาสตร์ไทยในปัจจุบันเปลี่ยนไปอย่างไร", a_th: ["เน้นชาตินิยมรุนแรง", "มองผ่านเครือข่ายความสัมพันธ์", "จำกัดแค่ยุคสุโขทัย", "เชื่อถือตำนานมากกว่าหลักฐาน"], correct: 1, detail: "มองผ่านความเชื่อมโยงในอุษาคเนย์" },
            { q_th: "เมืองโบราณใดในภาคใต้ที่สะท้อนอิทธิพลศรีวิชัย", a_th: ["ตามพรลิงค์", "ทวารวดี", "หริภุญชัย", "ละโว้"], correct: 0, detail: "ตามพรลิงค์มีความสัมพันธ์ใกล้ชิดกับกลุ่มศรีวิชัย" },
            { q_th: "พุทธศักราชเริ่มนับเมื่อใด", a_th: ["พระพุทธเจ้าประสูติ", "พระพุทธเจ้าตรัสรู้", "พระพุทธเจ้าปรินิพพาน", "การทำสังคายนาครั้งแรก"], correct: 2, detail: "นับหลังปรินิพพาน 1 ปี" },
            { q_th: "ความเสื่อมของอาณาจักรโบราณมักเกิดจากสาเหตุใด", a_th: ["การเปลี่ยนเส้นทางการค้า", "ขาดแคลนทรัพยากร", "การรุกรานจากตะวันตก", "ภัยธรรมชาติเพียงอย่างเดียว"], correct: 0, detail: "การเปลี่ยนเส้นทางการค้าทำให้เศรษฐกิจถดถอย" },
            { q_th: "การวิพากษ์หลักฐานภายในมุ่งเน้นสิ่งใด", a_th: ["วัสดุที่ใช้เขียน", "ผู้เขียนเป็นใคร", "เนื้อหาที่สื่อความหมาย", "การเก็บรักษาเอกสาร"], correct: 2, detail: "ภายในดูที่สาระและเจตนา" },
            { q_th: "ข้อใดไม่ใช่ผลกระทบของการรับวัฒนธรรมอินเดีย", a_th: ["การปกครองแบบเทวราชา", "อักษรปัลลวะ", "ระบอบการเลือกตั้ง", "ศาสนาพราหมณ์-พุทธ"], correct: 2, detail: "การเลือกตั้งเป็นระบอบสมัยใหม่" },
            { q_th: "ยุคเหล็กมีลักษณะสำคัญอย่างไร", a_th: ["ใช้เครื่องมือหินขัด", "ใช้สำริดหล่อพระพุทธรูป", "เครื่องมือมีความคงทนสูง", "การทำเกษตรแบบยั่งยืน"], correct: 2, detail: "เหล็กแข็งแกร่งและใช้งานได้ดีกว่าหิน/สำริด" },
            { q_th: "วิธีการทางประวัติศาสตร์ช่วยฝึกทักษะใดมากที่สุด", a_th: ["การท่องจำ", "การคิดวิเคราะห์", "การเขียนวรรณกรรม", "การคำนวณสถิติ"], correct: 1, detail: "ฝึกการคิดเป็นเหตุเป็นผล" },
            { q_th: "การอพยพของกลุ่มคนในอดีตมักเป็นไปเพื่อเหตุผลใด", a_th: ["การท่องเที่ยว", "การหาแหล่งอาหารและปลอดภัย", "การขยายอาณาจักร", "การค้นหาความรู้"], correct: 1, detail: "ปัจจัยพื้นฐานคือการดำรงชีวิต" },
            { q_th: "ข้อใดคือแหล่งอ้างอิงที่ดีที่สุดในการเขียนประวัติศาสตร์", a_th: ["จดหมายเหตุรายวัน", "หนังสือเรียน", "ภาพยนตร์ประวัติศาสตร์", "รายการโทรทัศน์"], correct: 0, detail: "จดหมายเหตุคือหลักฐานชั้นต้น" },
            { q_th: "หลักฐานประเภทใดที่สะท้อนวิถีชีวิตชาวบ้านได้ดีที่สุด", a_th: ["ศิลาจารึกราชสำนัก", "พงศาวดารเมือง", "เครื่องมือเครื่องใช้ในชีวิตประจำวัน", "คำสั่งการปกครอง"], correct: 2, detail: "หลักฐานทางโบราณคดีบอกเล่าชีวิตจริง" },
            { q_th: "อาณาจักรละโว้มีความสัมพันธ์อย่างไรกับขอม", a_th: ["เป็นคู่ศัตรูถาวร", "รับอิทธิพลวัฒนธรรมและการเมือง", "ไม่เคยติดต่อกัน", "ขอมยึดครองถาวร"], correct: 1, detail: "มีร่องรอยการรับวัฒนธรรมและการปกครอง" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                let html = `<div class="question-card">
                    <p><b>ข้อที่ ${i + 1}:</b> ${q.q_th}</p>`;
                q.a_th.forEach((opt, j) => {
                    html += `<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
                });
                html += `<div id="d${i}" class="detail">เฉลย: ${q.a_th[q.correct]} - ${q.detail}</div></div>`;
                container.innerHTML += html;
            });
        }

        function checkAnswers() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const detail = document.getElementById(`d${i}`);
                detail.style.display = 'block';
                if (selected && parseInt(selected.value) === q.correct) {
                    score++;
                }
            });
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `<h2>คะแนนของคุณคือ: ${score}/25</h2><p>สรุปผลการวิเคราะห์ถูกส่งไปยัง thee.chinpong@hmail.com แล้วครับ</p>`;
            alert("บันทึกข้อมูลเรียบร้อย: " + score + "/25");
        }

        renderQuiz();
    </script>
</body>
</html>
