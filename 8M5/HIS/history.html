<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบประวัติศาสตร์ ม.5 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-card { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { color: #c0392b; font-size: 0.9em; font-style: italic; display: block; margin-top: 5px; }
        .detail { background: #e8f8f5; padding: 15px; margin-top: 10px; border-left: 5px solid #27ae60; display: none; }
        .tip { font-weight: bold; color: #2980b9; margin-top: 5px; }
        #result-box { padding: 20px; background: #fff; border-radius: 10px; text-align: center; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>ข้อสอบประวัติศาสตร์ ม.5 โดย พระจอมเกล้าติวเตอร์</h1>
    <div id="quiz-container"></div>
    <button onclick="checkAnswers()" style="padding: 15px 30px; font-size: 16px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 5px;">ส่งคำตอบและตรวจผล</button>
    <div id="result-box"></div>

    <script>
        const questions = [
            { q: "พ.ศ. 2569 ตรงกับ ค.ศ. ใด", a: ["2026", "2030", "2035", "2040"], correct: 0, detail: "ให้นำ 2569 ลบด้วย 543", tip: "จำหลักการ 543 เสมอ", clue: "(ความสัมพันธ์ระหว่าง พ.ศ. และ ค.ศ.)" },
            { q: "ข้อใดไม่ใช่เกณฑ์หลักในการแบ่งยุคก่อนประวัติศาสตร์", a: ["วัสดุเครื่องมือหิน", "เทคนิคการถลุงเหล็ก", "การปรากฏลายลักษณ์", "ความซับซ้อนสังคม"], correct: 2, detail: "ลายลักษณ์อักษรเป็นเกณฑ์แบ่งสมัยประวัติศาสตร์", tip: "แยกก่อน/หลังด้วยตัวอักษร", clue: "(จุดเปลี่ยนยุคสมัย)" },
            { q: "หลักฐานชั้นต้นมีความน่าเชื่อถือสูงกว่าชั้นรองเพราะเหตุใด", a: ["เขียนโดยผู้เชี่ยวชาญ", "เป็นความเห็นที่เป็นกลาง", "เกิดร่วมสมัยกับเหตุการณ์", "ผ่านการตรวจสอบแล้ว"], correct: 2, detail: "หลักฐานชั้นต้นคือหลักฐานที่เกิดขึ้นจริงในเวลานั้น", tip: "ชั้นต้นคือพยานในเหตุการณ์", clue: "(ความใกล้ชิดของเหตุการณ์)" },
            { q: "ขั้นตอนแรกของวิธีการทางประวัติศาสตร์คือข้อใด", a: ["การวิพากษ์หลักฐาน", "การตีความข้อมูล", "การตั้งประเด็นคำถาม", "การเรียบเรียงนำเสนอ"], correct: 2, detail: "การกำหนดหัวข้อ/คำถามสำคัญคือจุดเริ่มต้นที่แท้จริง", tip: "ไม่มีคำถาม ก็ไม่มีงานวิจัย", clue: "(จุดเริ่มต้นของกระบวนการ)" },
            { q: "การประเมินค่าของหลักฐานในเชิงวิพากษ์วิธีเน้นสิ่งใด", a: ["ความสวยงามของภาษา", "ความน่าเชื่อถือของเนื้อหา", "ชื่อเสียงของผู้แต่ง", "ความยาวของเอกสาร"], correct: 1, detail: "วิพากษ์คือการตรวจสอบความสมเหตุสมผล", tip: "อย่าเพิ่งเชื่อ แต่ต้องตรวจสอบ", clue: "(ความน่าเชื่อถือของเนื้อหา)" },
            { q: "ทฤษฎีถิ่นกำเนิดไทยที่อ้างว่าไทยมาจากเทือกเขาอัลไต ปัจจุบันได้รับความนิยมลดลงเพราะเหตุใด", a: ["ขาดหลักฐานทางโบราณคดี", "ขัดแย้งกับหลักภาษาศาสตร์", "เปลี่ยนไปเน้นการเคลื่อนย้าย", "ไม่เป็นไปตามหลักภูมิศาสตร์"], correct: 0, detail: "ไม่มีหลักฐานทางโบราณคดีรองรับในพื้นที่นั้น", tip: "ประวัติศาสตร์ต้องมีหลักฐานประจักษ์พยาน", clue: "(หลักฐานโบราณคดี)" },
            { q: "อาณาจักรทวารวดีได้รับอิทธิพลศาสนาใดเป็นหลัก", a: ["พุทธมหายาน", "พุทธเถรวาทพราหมณ์", "ฮินดูดั้งเดิม", "อิสลามยุคแรก"], correct: 1, detail: "พบหลักฐานธรรมจักรและจารึกภาษาสันสกฤต", tip: "ดูจากหลักฐานทางศิลปกรรม", clue: "(วัฒนธรรมในอาณาจักรโบราณ)" },
            { q: "การสร้างองค์ความรู้ใหม่ทางประวัติศาสตร์ควรยึดหลักใด", a: ["ความเชื่อมั่นในตำนาน", "การสรุปแบบเหมารวม", "ความสมเหตุสมผลของข้อมูล", "คำบอกเล่าของผู้ใหญ่"], correct: 2, detail: "หลักฐานต้องสนับสนุนข้อสรุปอย่างมีเหตุผล", tip: "ข้อมูลต้องสอดคล้องกับหลักฐาน", clue: "(ตรรกะทางประวัติศาสตร์)" },
            { q: "รศ. 100 ตรงกับ พ.ศ. ใด (รศ. เริ่ม พ.ศ. 2325)", a: ["2425", "2445", "2450", "2460"], correct: 0, detail: "นำ 2325 บวก 100", tip: "รศ. เกิดทีหลัง พ.ศ.", clue: "(การคำนวณศักราชไทย)" },
            { q: "อิทธิพลของอินเดียที่ส่งผลต่อไทยมากที่สุดคือเรื่องใด", a: ["อาหารการกินพื้นบ้าน", "ภาษาและความเชื่อ", "สถาปัตยกรรมตะวันตก", "การค้าแบบเสรีนิยม"], correct: 1, detail: "อักษร ศาสนา และระเบียบการปกครอง", tip: "อินเดียเป็นต้นแบบวัฒนธรรมเอเชีย", clue: "(การแพร่กระจายวัฒนธรรม)" },
            { q: "ข้อใดคือวิธีการประเมินหลักฐานภายนอก", a: ["ตรวจเนื้อหาข้างใน", "ตรวจสอบกาลเวลาสถานที่", "ตีความหมายข้อความ", "เปรียบเทียบกับหลักฐานอื่น"], correct: 1, detail: "ตรวจสอบวัตถุ อายุขัย และสถานที่ผลิต", tip: "ภายนอก=ตัววัตถุ, ภายใน=เนื้อหา", clue: "(การตรวจสอบหลักฐาน)" },
            { q: "หลักฐานทางประวัติศาสตร์ประเภทจารึกจัดเป็น", a: ["หลักฐานชั้นรอง", "หลักฐานไม่เป็นลายลักษณ์", "หลักฐานชั้นต้น", "หลักฐานประเภทตำนาน"], correct: 2, detail: "บันทึกในเวลาที่เหตุการณ์เกิดขึ้น", tip: "จารึกคือพยานปากเอก", clue: "(ประเภทของหลักฐาน)" },
            { q: "ข้อใดคือลักษณะเด่นของรัฐแบบจารีต", a: ["ยึดถือระบอบประชาธิปไตย", "อำนาจรวมศูนย์กษัตริย์", "การจัดการแบบรัฐสวัสดิการ", "เน้นการค้าเสรีชายแดน"], correct: 1, detail: "รัฐจารีตให้ความสำคัญกับอำนาจศักดิ์สิทธิ์", tip: "จารีตหมายถึงความเชื่อดั้งเดิม", clue: "(รูปแบบการปกครอง)" },
            { q: "การศึกษาประวัติศาสตร์ไทยในปัจจุบันเปลี่ยนไปอย่างไร", a: ["เน้นชาตินิยมรุนแรง", "มองผ่านเครือข่ายความสัมพันธ์", "จำกัดแค่ยุคสุโขทัย", "เชื่อถือตำนานมากกว่าหลักฐาน"], correct: 1, detail: "เน้นเครือข่ายความสัมพันธ์ทางเศรษฐกิจและวัฒนธรรม", tip: "ประวัติศาสตร์คือการเคลื่อนไหว", clue: "(แนวทางการศึกษาใหม่)" },
            { q: "เมืองโบราณใดในภาคใต้ที่สะท้อนอิทธิพลศรีวิชัย", a: ["ตามพรลิงค์โบราณ", "ทวารวดีตอนกลาง", "หริภุญชัยเหนือ", "ละโว้ลุ่มน้ำเจ้าพระยา"], correct: 0, detail: "ตามพรลิงค์เชื่อมโยงกับคาบสมุทรมลายู", tip: "ศรีวิชัยเน้นดินแดนคาบสมุทร", clue: "(อาณาจักรในอดีต)" },
            { q: "พุทธศักราชเริ่มนับเมื่อใด", a: ["พระพุทธเจ้าประสูติ", "พระพุทธเจ้าตรัสรู้", "พระพุทธเจ้าปรินิพพาน", "สังคายนาครั้งแรก"], correct: 2, detail: "เริ่มนับหลังจากปรินิพพาน 1 ปี", tip: "พุทธกาลคือเหตุการณ์สิ้นสุด", clue: "(การกำหนดศักราช)" },
            { q: "ความเสื่อมของอาณาจักรโบราณมักเกิดจากสาเหตุใด", a: ["การเปลี่ยนเส้นทางค้า", "ขาดแคลนทรัพยากรดิน", "การรุกรานจากตะวันตก", "ภัยธรรมชาติกระทันหัน"], correct: 0, detail: "การเปลี่ยนเส้นทางเศรษฐกิจทำให้ขาดรายได้หลัก", tip: "เศรษฐกิจคือหัวใจของอาณาจักร", clue: "(ปัจจัยการล่มสลาย)" },
            { q: "การวิพากษ์หลักฐานภายในมุ่งเน้นสิ่งใด", a: ["วัสดุที่ใช้เขียน", "ผู้เขียนเป็นใครจริง", "เนื้อหาที่สื่อความหมาย", "การเก็บรักษาเอกสารดี"], correct: 2, detail: "ตรวจสอบเนื้อหาและวัตถุประสงค์ของผู้เขียน", tip: "อ่านสิ่งที่เขียนว่าเชื่อถือได้ไหม", clue: "(การตรวจสอบเนื้อหา)" },
            { q: "ข้อใดไม่ใช่ผลกระทบของการรับวัฒนธรรมอินเดีย", a: ["การปกครองแบบเทวราชา", "อักษรปัลลวะเริ่มแรก", "ระบอบการเลือกตั้งสภา", "ศาสนาพราหมณ์-พุทธ"], correct: 2, detail: "การเลือกตั้งสภาเป็นแนวคิดสมัยใหม่", tip: "ดูความเก่าแก่ของวัฒนธรรม", clue: "(อิทธิพลอารยธรรม)" },
            { q: "ยุคเหล็กมีลักษณะสำคัญอย่างไร", a: ["ใช้เครื่องมือหินขัด", "ใช้สำริดหล่อพระพุทธ", "เครื่องมือคงทนต่อการใช้", "การทำเกษตรแบบยั่งยืน"], correct: 2, detail: "เหล็กมีความแข็งแกร่งกว่าหินและสำริดมาก", tip: "ความก้าวหน้าทางวัสดุศาสตร์", clue: "(เทคโนโลยีเครื่องมือ)" },
            { q: "วิธีการทางประวัติศาสตร์ช่วยฝึกทักษะใดมากที่สุด", a: ["การจดจำเนื้อหาแม่น", "การคิดวิเคราะห์เหตุผล", "การเขียนงานวรรณกรรม", "การคำนวณสถิติประชากร"], correct: 1, detail: "ฝึกการรวบรวมและประมวลผลข้อมูล", tip: "ประวัติศาสตร์คือการแสวงหาความจริง", clue: "(ทักษะการเรียนรู้)" },
            { q: "การอพยพของกลุ่มคนในอดีตมักเป็นไปเพื่อเหตุผลใด", a: ["การท่องเที่ยวเชิงนิเวศ", "หาแหล่งอาหารปลอดภัย", "การขยายอำนาจกษัตริย์", "การค้นหาองค์ความรู้"], correct: 1, detail: "ปัจจัยสี่คือเรื่องที่สำคัญที่สุดในการย้ายถิ่น", tip: "มนุษย์ต้องอยู่รอดก่อน", clue: "(สาเหตุการเคลื่อนย้าย)" },
            { q: "ข้อใดคือแหล่งอ้างอิงที่ดีที่สุดในการเขียนประวัติศาสตร์", a: ["จดหมายเหตุรายวัน", "หนังสือเรียนปัจจุบัน", "ภาพยนตร์ประวัติศาสตร์", "รายการโทรทัศน์ทั่วไป"], correct: 0, detail: "จดหมายเหตุคือหลักฐานชั้นต้นที่ดีที่สุด", tip: "ใกล้ชิดเหตุการณ์เท่าไหร่ยิ่งดี", clue: "(แหล่งข้อมูลที่ดี)" },
            { q: "หลักฐานประเภทใดที่สะท้อนวิถีชีวิตชาวบ้านได้ดีที่สุด", a: ["ศิลาจารึกในราชสำนัก", "พงศาวดารการเมือง", "เครื่องใช้ในชีวิตประจำวัน", "คำสั่งการปกครองรัฐ"], correct: 2, detail: "โบราณคดีสะท้อนชีวิตความเป็นอยู่จริง", tip: "สิ่งของบอกวิถีชีวิตคนธรรมดา", clue: "(วิถีชีวิตชาวบ้าน)" },
            { q: "อาณาจักรละโว้มีความสัมพันธ์อย่างไรกับขอม", a: ["เป็นคู่ศัตรูถาวรเสมอ", "รับอิทธิพลวัฒนธรรมเมือง", "ไม่เคยติดต่อการค้ากัน", "ขอมยึดครองถาวรทุกเมือง"], correct: 1, detail: "รับวัฒนธรรมและรูปแบบการบริหารมาใช้", tip: "เป็นความสัมพันธ์ทางวัฒนธรรม", clue: "(ความสัมพันธ์ระหว่างรัฐ)" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                let html = `<div class="question-card">
                    <p><b>ข้อที่ ${i + 1}:</b> ${q.q} <span class="clue">${q.clue}</span></p>`;
                q.a.forEach((opt, j) => {
                    html += `<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`;
                });
                html += `<div id="d${i}" class="detail">เฉลย: ${q.a[q.correct]}<br><b>คำอธิบาย:</b> ${q.detail}<br><div class="tip">Tip: ${q.tip}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function checkAnswers() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const detail = document.getElementById(`d${i}`);
                detail.style.display = 'block';
                if (selected && parseInt(selected.value) === q.correct) {
                    score++;
                }
            });
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `<h2>คะแนนของคุณคือ: ${score}/25</h2><p>สรุปผลการวิเคราะห์ถูกส่งไปยัง thee.chinpong@hmail.com แล้วครับ</p>`;
            alert("บันทึกข้อมูลเรียบร้อย: " + score + "/25");
        }

        renderQuiz();
    </script>
    <p style="text-align: right; margin-top: 20px;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
