<body>

    <h1>ข้อสอบประวัติศาสตร์ ม.5 โดย พระจอมเกล้าติวเตอร์</h1>

    <div id="result-box"></div>

            { q: "หลักฐานชั้นต้นมีความน่าเชื่อถือสูงกว่าชั้นรองเพราะเหตุใด", a: ["เขียนโดยผู้เชี่ยวชาญ", "เป็นความเห็นที่เป็นกลาง", "เกิดร่วมสมัยกับเหตุการณ์", "ผ่านการตรวจสอบแล้ว"], correct: 2, detail: "หลักฐานชั้นต้นคือหลักฐานที่เกิดขึ้นจริงในเวลานั้น", tip: "ชั้นต้นคือพยานในเหตุการณ์โดยตรง", clue: "(ความใกล้ชิดของเหตุการณ์)" },

            { q: "การประเมินค่าของหลักฐานในเชิงวิพากษ์วิธีเน้นสิ่งใด", a: ["ความสวยงามของภาษา", "ความน่าเชื่อถือของเนื้อหา", "ชื่อเสียงของผู้แต่ง", "ความยาวของเอกสาร"], correct: 1, detail: "วิพากษ์คือการตรวจสอบความสมเหตุสมผลและความจริง", tip: "ห้ามเชื่อทันทีจนกว่าจะพิสูจน์", clue: "(ความน่าเชื่อถือของเนื้อหา)" },
            { q: "ทฤษฎีถิ่นกำเนิดไทยที่อ้างว่าไทยมาจากเทือกเขาอัลไต ปัจจุบันได้รับความนิยมลดลงเพราะเหตุใด", a: ["ขาดหลักฐานทางโบราณคดี", "ขัดแย้งกับหลักภาษาศาสตร์", "เปลี่ยนไปเน้นการเคลื่อนย้าย", "ไม่เป็นไปตามหลักภูมิศาสตร์"], correct: 0, detail: "ไม่มีหลักฐานทางโบราณคดีรองรับการตั้งถิ่นฐานจริงในพื้นที่นั้น", tip: "ประวัติศาสตร์ต้องมีหลักฐานเชิงประจักษ์", clue: "(หลักฐานทางโบราณคดี)" },

            { q: "การสร้างองค์ความรู้ใหม่ทางประวัติศาสตร์ควรยึดหลักใด", a: ["ความเชื่อมั่นในตำนาน", "การสรุปแบบเหมารวม", "ความสมเหตุสมผลของข้อมูล", "คำบอกเล่าของผู้ใหญ่"], correct: 2, detail: "หลักฐานต้องสนับสนุนข้อสรุปอย่างมีตรรกะและเหตุผล", tip: "ข้อมูลต้องเชื่อมโยงกันอย่างสมเหตุสมผล", clue: "(ตรรกะทางประวัติศาสตร์)" },

            { q: "ข้อใดคือวิธีการประเมินหลักฐานภายนอก", a: ["ตรวจเนื้อหาข้างใน", "ตรวจสอบกาลเวลาสถานที่", "ตีความหมายข้อความ", "เปรียบเทียบกับหลักฐานอื่น"], correct: 1, detail: "ตรวจสอบวัตถุ อายุขัย สถานที่ และวัสดุที่ใช้ผลิต", tip: "ภายนอก = ตัววัตถุ / ภายใน = เนื้อหา", clue: "(การตรวจสอบหลักฐาน)" },
            { q: "หลักฐานทางประวัติศาสตร์ประเภทจารึกจัดเป็น", a: ["หลักฐานชั้นรอง", "หลักฐานไม่เป็นลายลักษณ์", "หลักฐานชั้นต้น", "หลักฐานประเภทตำนาน"], correct: 2, detail: "จารึกคือสิ่งที่บันทึกในเวลาที่เหตุการณ์เกิดขึ้น", tip: "จารึกคือพยานปากเอกที่หักล้างไม่ได้", clue: "(ประเภทของหลักฐาน)" },

            { q: "เมืองโบราณใดในภาคใต้ที่สะท้อนอิทธิพลศรีวิชัย", a: ["ตามพรลิงค์โบราณ", "ทวารวดีตอนกลาง", "หริภุญชัยเหนือ", "ละโว้ลุ่มน้ำเจ้าพระยา"], correct: 0, detail: "ตามพรลิงค์มีความสัมพันธ์ใกล้ชิดกับการค้าทางทะเล", tip: "ศรีวิชัยเน้นดินแดนชายฝั่งและคาบสมุทร", clue: "(อาณาจักรในอดีต)" },

            { q: "ความเสื่อมของอาณาจักรโบราณมักเกิดจากสาเหตุใด", a: ["การเปลี่ยนเส้นทางค้า", "ขาดแคลนทรัพยากรดิน", "การรุกรานจากตะวันตก", "ภัยธรรมชาติกระทันหัน"], correct: 0, detail: "การเปลี่ยนเส้นทางเศรษฐกิจทำให้ขาดรายได้หลักในการบำรุงเมือง", tip: "เศรษฐกิจคือหัวใจของอาณาจักรโบราณ", clue: "(ปัจจัยการล่มสลาย)" },
            { q: "การวิพากษ์หลักฐานภายในมุ่งเน้นสิ่งใด", a: ["วัสดุที่ใช้เขียน", "ผู้เขียนเป็นใครจริง", "เนื้อหาที่สื่อความหมาย", "การเก็บรักษาเอกสารดี"], correct: 2, detail: "ตรวจสอบเนื้อหา เจตนา และความเป็นจริงของสารที่ส่งมา", tip: "อ่านสิ่งที่เขียนเพื่อดูว่าสมเหตุสมผลไหม", clue: "(การตรวจสอบเนื้อหา)" },
            { q: "ข้อใดไม่ใช่ผลกระทบของการรับวัฒนธรรมอินเดีย", a: ["การปกครองแบบเทวราชา", "อักษรปัลลวะเริ่มแรก", "ระบอบการเลือกตั้งสภา", "ศาสนาพราหมณ์-พุทธ"], correct: 2, detail: "การเลือกตั้งสภาเป็นแนวคิดประชาธิปไตยสมัยใหม่", tip: "วัฒนธรรมอินเดียเน้นคติรวมศูนย์และศาสนา", clue: "(อิทธิพลอารยธรรม)" },
            { q: "ยุคเหล็กมีลักษณะสำคัญอย่างไร", a: ["ใช้เครื่องมือหินขัด", "ใช้สำริดหล่อพระพุทธ", "เครื่องมือคงทนต่อการใช้", "การทำเกษตรแบบยั่งยืน"], correct: 2, detail: "เหล็กมีความแข็งแกร่งกว่าหินและสำริด ทำให้ทำงานเกษตรได้ดีขึ้น", tip: "ความก้าวหน้าทางวัสดุช่วยการผลิต", clue: "(เทคโนโลยีเครื่องมือ)" },
            { q: "วิธีการทางประวัติศาสตร์ช่วยฝึกทักษะใดมากที่สุด", a: ["การจดจำเนื้อหาแม่น", "การคิดวิเคราะห์เหตุผล", "การเขียนงานวรรณกรรม", "การคำนวณสถิติประชากร"], correct: 1, detail: "ฝึกการรวบรวม ตรวจสอบ และประมวลผลข้อมูลอย่างเป็นระบบ", tip: "ประวัติศาสตร์คือการแสวงหาความจริงไม่ใช่แค่จำ", clue: "(ทักษะการเรียนรู้)" },
            { q: "การอพยพของกลุ่มคนในอดีตมักเป็นไปเพื่อเหตุผลใด", a: ["การท่องเที่ยวเชิงนิเวศ", "หาแหล่งอาหารปลอดภัย", "การขยายอำนาจกษัตริย์", "การค้นหาองค์ความรู้"], correct: 1, detail: "ปัจจัยสี่และการดำรงชีวิตเป็นเรื่องสำคัญที่สุด", tip: "มนุษย์จะเคลื่อนที่เพื่อความอยู่รอด", clue: "(สาเหตุการเคลื่อนย้าย)" },
            { q: "ข้อใดคือแหล่งอ้างอิงที่ดีที่สุดในการเขียนประวัติศาสตร์", a: ["จดหมายเหตุรายวัน", "หนังสือเรียนปัจจุบัน", "ภาพยนตร์ประวัติศาสตร์", "รายการโทรทัศน์ทั่วไป"], correct: 0, detail: "จดหมายเหตุคือบันทึกโดยผู้ร่วมเหตุการณ์ จึงเป็นชั้นต้นที่ดี", tip: "ใกล้ชิดเหตุการณ์ที่สุด = น่าเชื่อถือที่สุด", clue: "(แหล่งข้อมูลที่ดี)" },
            { q: "หลักฐานประเภทใดที่สะท้อนวิถีชีวิตชาวบ้านได้ดีที่สุด", a: ["ศิลาจารึกในราชสำนัก", "พงศาวดารการเมือง", "เครื่องใช้ในชีวิตประจำวัน", "คำสั่งการปกครองรัฐ"], correct: 2, detail: "โบราณคดีและเครื่องใช้สะท้อนชีวิตจริงของชาวบ้าน", tip: "ของใช้บอกวิธีชีวิตของคนทั่วไปได้ดีกว่าบันทึกกษัตริย์", clue: "(วิถีชีวิตชาวบ้าน)" },
            { q: "อาณาจักรละโว้มีความสัมพันธ์อย่างไรกับขอม", a: ["เป็นคู่ศัตรูถาวรเสมอ", "รับอิทธิพลวัฒนธรรมเมือง", "ไม่เคยติดต่อการค้ากัน", "ขอมยึดครองถาวรทุกเมือง"], correct: 1, detail: "รับวัฒนธรรม รูปแบบการปกครอง และอิทธิพลศิลปะมาประยุกต์ใช้", tip: "ความสัมพันธ์เชิงอิทธิพลวัฒนธรรมเด่นชัดมาก", clue: "(ความสัมพันธ์ระหว่างรัฐ)" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                let html = `<div class="question-card" id="card${i}">
                    <p><b>ข้อที่ ${i + 1}:</b> ${q.q} <span class="clue">${q.clue}</span></p>`;
                q.a.forEach((opt, j) => {
                    html += `<label><input type="radio" name="q${i}" value="${j}" onclick="showDetail(${i}, ${j})"> ${opt}</label><br>`;
                });
                html += `<div id="d${i}" class="detail"><b>เฉลย:</b> ${q.a[q.correct]}<br><b>คำอธิบาย:</b> ${q.detail}<div class="tip">Tip: ${q.tip}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function showDetail(qIdx, aIdx) {
            const detailDiv = document.getElementById(`d${qIdx}`);
            const inputs = document.querySelectorAll(`input[name="q${qIdx}"]`);
            inputs.forEach(input => input.disabled = true);
            detailDiv.style.display = 'block';
            detailDiv.style.borderColor = (aIdx === questions[qIdx].correct) ? "#27ae60" : "#c0392b";
        }

        function checkFinal() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) score++;
            });
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `<h2>คะแนนของคุณคือ: ${score}/25</h2><p>ระบบได้จำลองการส่งคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้วครับ</p>`;
            alert("บันทึกข้อมูลเรียบร้อย: " + score + "/25");
        }

        renderQuiz();
    </script>
