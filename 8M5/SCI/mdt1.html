<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาศาสตร์กายภาพ ม.5 - 25 ข้อ</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #27ae60; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #2980b9; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #2ecc71 !important; color: white; border: 1px solid #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border: 1px solid #c0392b; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #3498db; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค วิทยาศาสตร์กายภาพ ม.5</h2>
    <p>เรื่อง: การเคลื่อนที่และสนามของแรง | จำนวน: 25 ข้อ</p>
    <div style="background: #e8f8f5; padding: 10px;"><b>คำแนะนำติวเตอร์:</b> อ่านตัวแปรจากโจทย์ให้ชัดเจน (u, v, a, s, t) และระวังทิศทางเวกเตอร์ แรงโน้มถ่วงทิศลงเสมอ ส่วนสนามไฟฟ้าทิศจากบวกไปลบครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "วัตถุเคลื่อนที่จากหยุดนิ่งด้วยความเร่ง 2 m/s^2 เป็นเวลา 5 วินาที จะมีความเร็วปลายกี่ m/s", opts: ["5", "10", "15", "20"], corr: 1, th: "ใช้สูตร v = u + at", det: "v = 0 + (2 * 5) = 10 m/s" },
        { q: "ถ้าวัตถุเคลื่อนที่ด้วยความเร็วคงที่ 10 m/s ในเวลา 20 วินาที จะได้ระยะทางเท่าใด", opts: ["100 m", "200 m", "300 m", "400 m"], corr: 1, th: "ใช้สูตร s = vt", det: "s = 10 * 20 = 200 เมตร" },
        { q: "การเคลื่อนที่แบบโพรเจกไทล์ แนวราบมีความเร็วอย่างไร", opts: ["คงที่", "เพิ่มขึ้น", "ลดลง", "เป็นศูนย์"], corr: 0, th: "ไม่มีแรงกระทำในแนวราบ", det: "ความเร็วแนวราบ ax = 0 ดังนั้น v คงที่" },
        { q: "แรงโน้มถ่วงที่กระทำต่อวัตถุมวล 5 kg (กำหนด g = 9.8 m/s^2) มีค่ากี่นิวตัน", opts: ["4.9 N", "49 N", "490 N", "0.5 N"], corr: 1, th: "ใช้สูตร F = mg", det: "F = 5 * 9.8 = 49 นิวตัน" },
        { q: "เส้นแรงไฟฟ้ามีทิศทางอย่างไร", opts: ["จากลบไปบวก", "จากบวกไปลบ", "เข้าหาประจุลบเสมอ", "พุ่งออกจากประจุบวกเสมอ"], corr: 1, th: "นิยามทิศทางสนามไฟฟ้า", det: "พุ่งออกจากประจุบวกและเข้าหาประจุลบ" },
        { q: "หน่วย SI ของความเร่งคืออะไร", opts: ["m/s", "m/s^2", "N", "kg"], corr: 1, th: "หน่วยพื้นฐาน", det: "เมตรต่อวินาทีกำลังสอง (m/s^2)" },
        { q: "กราฟ v-t พื้นที่ใต้กราฟหมายถึงอะไร", opts: ["ความเร่ง", "ระยะทาง", "เวลา", "แรง"], corr: 1, th: "สมบัติของกราฟการเคลื่อนที่", det: "พื้นที่ใต้กราฟ v-t คือระยะทาง (s)" },
        { q: "วัตถุเคลื่อนที่เป็นวงกลมรัศมีคงที่ ความเร็วเปลี่ยนแปลงอย่างไร", opts: ["ความเร็วคงที่", "ความเร็วเปลี่ยนทิศตลอด", "ความเร็วเป็นศูนย์", "ขนาดความเร็วเปลี่ยนตลอด"], corr: 1, th: "ความเร็วเป็นปริมาณเวกเตอร์", det: "ทิศทางเปลี่ยนตลอดเวลา แม้ขนาดคงที่" },
        { q: "สนามแม่เหล็กทิศจากขั้วไหนไปขั้วไหน", opts: ["เหนือไปเหนือ", "ใต้ไปเหนือ", "เหนือไปใต้", "ใต้ไปใต้"], corr: 2, th: "สมบัติแม่เหล็ก", det: "พุ่งออกจากขั้วเหนือ (N) เข้าขั้วใต้ (S)" },
        { q: "วัตถุตกแบบเสรี (Free fall) ความเร่ง g มีทิศอย่างไร", opts: ["ขึ้น", "ลง", "ขวา", "ซ้าย"], corr: 1, th: "แรงโน้มถ่วงโลก", det: "มีทิศพุ่งเข้าสู่ศูนย์กลางโลก (ทิศลง)" },
        { q: "ถ้าโยนวัตถุทำมุม 45 องศา วัตถุจะตกไกลที่สุดเมื่อใด", opts: ["ความเร็วต้นน้อย", "ที่ระดับพื้นราบ", "ที่สูงมากๆ", "ไม่มีอากาศ"], corr: 1, th: "เงื่อนไขโพรเจกไทล์", det: "มุม 45 องศาจะให้ระยะทางแนวราบสูงสุด" },
        { q: "กฎของนิวตันข้อที่ 3 กล่าวว่าอย่างไร", opts: ["F = ma", "แรงลัพธ์เป็นศูนย์", "Action = Reaction", "วัตถุคงสภาพ"], corr: 2, th: "แรงคู่กิริยา", det: "แรงกิริยาเท่ากับแรงปฏิกิริยา" },
        { q: "คาบ (T) คืออะไร", opts: ["เวลาต่อรอบ", "จำนวนรอบต่อวินาที", "ความถี่", "แอมพลิจูด"], corr: 0, th: "นิยาม", det: "เวลาที่วัตถุใช้ในการเคลื่อนที่ครบ 1 รอบ" },
        { q: "ความถี่ (f) มีหน่วยเป็นอะไร", opts: ["วินาที", "เมตร", "เฮิรตซ์ (Hz)", "นิวตัน"], corr: 2, th: "หน่วยวัด", det: "เฮิรตซ์ (Hz) หรือ 1/s" },
        { q: "เมื่อประจุไฟฟ้าเคลื่อนที่ในสนามแม่เหล็ก จะเกิดอะไรขึ้น", opts: ["หยุดนิ่ง", "เกิดแรงกระทำ", "เป็นกลาง", "เปลี่ยนมวล"], corr: 1, th: "แรงแม่เหล็ก", det: "เกิดแรงกระทำต่อประจุ (Lorentz force)" },
        { q: "ความเร่งขณะใดขณะหนึ่งดูได้จากค่าใดของกราฟ s-t", opts: ["พื้นที่ใต้กราฟ", "ความชัน (Slope)", "จุดตัดแกน", "ความเร็ว"], corr: 1, th: "ความชันของกราฟ", det: "ความชันของกราฟ s-t คือความเร็ว" },
        { q: "ถ้าแรงลัพธ์ที่กระทำต่อวัตถุเป็นศูนย์ วัตถุจะเคลื่อนที่อย่างไร", opts: ["ความเร็วคงที่", "หยุดนิ่งหรือคงที่", "มีความเร่ง", "หยุดนิ่งเท่านั้น"], corr: 1, th: "กฎข้อที่ 1", det: "กฎความเฉื่อย วัตถุจะรักษาความเร็วเดิม" },
        { q: "สนามโน้มถ่วงของโลก (g) มีค่าประมาณเท่าใด", opts: ["1.6 m/s^2", "9.8 m/s^2", "100 m/s^2", "0"], corr: 1, th: "ค่ามาตรฐาน", det: "ประมาณ 9.8 m/s^2" },
        { q: "การเหนี่ยวนำแม่เหล็กไฟฟ้าคือการเปลี่ยนอะไรเป็นอะไร", opts: ["แม่เหล็กเป็นไฟฟ้า", "ไฟฟ้าเป็นแม่เหล็ก", "ไฟฟ้าเป็นความร้อน", "แม่เหล็กเป็นความร้อน"], corr: 0, th: "กฎของฟาราเดย์", det: "เปลี่ยนสนามแม่เหล็กให้เกิดกระแสไฟฟ้า" },
        { q: "ปริมาณสเกลาร์คืออะไร", opts: ["บอกทิศทาง", "มีแต่ขนาด", "ต้องมีทิศ", "ไม่มีหน่วย"], corr: 1, th: "ประเภทปริมาณ", det: "เป็นปริมาณที่บอกเพียงขนาดเท่านั้น" },
        { q: "ความเร็ว (Velocity) เป็นปริมาณประเภทใด", opts: ["สเกลาร์", "เวกเตอร์", "พื้นฐาน", "คงที่"], corr: 1, th: "การกระจัด/เวลา", det: "มีทั้งขนาดและทิศทาง" },
        { q: "แอมพลิจูดในการเคลื่อนที่แบบฮาร์มอนิกคืออะไร", opts: ["คาบ", "ความถี่", "ระยะกระจัดสูงสุด", "ความเร็ว"], corr: 2, th: "นิยาม", det: "ระยะกระจัดที่มากที่สุดจากจุดสมดุล" },
        { q: "ประจุเหมือนกันจะเกิดอะไรขึ้น", opts: ["ดูดกัน", "ผลักกัน", "ไม่เกิดแรง", "รวมกัน"], corr: 1, th: "กฎไฟฟ้า", det: "ประจุเหมือนกันจะผลักกัน" },
        { q: "หากเพิ่มมวลของวัตถุที่ติดสปริง คาบจะเปลี่ยนอย่างไร", opts: ["มากขึ้น", "น้อยลง", "ไม่เปลี่ยน", "เป็นศูนย์"], corr: 0, th: "สมการ T", det: "คาบจะเพิ่มขึ้นเมื่อมวลเพิ่ม" },
        { q: "ถ้าวิ่งครบ 1 รอบสนาม ระยะทางกับการกระจัดเป็นอย่างไร", opts: ["เท่ากัน", "ระยะทาง = 0", "การกระจัด = 0", "ระยะทาง=0"], corr: 2, th: "นิยาม", det: "การกระจัดเป็นศูนย์เพราะกลับที่เดิม" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
