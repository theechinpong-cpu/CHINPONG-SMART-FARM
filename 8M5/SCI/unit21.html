<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Mastery Physics Quiz: Set 6 (หน่วยที่ 2)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; }
        .question { margin-bottom: 25px; padding: 20px; border-left: 4px solid #38bdf8; background: #334155; }
        .options button { display: block; width: 100%; margin: 8px 0; padding: 12px; border: none; border-radius: 5px; cursor: pointer; background: #475569; color: white; text-align: left; transition: 0.2s; }
        .options button:hover { background: #64748b; }
        .correct { background-color: #22c55e !important; }
        .wrong { background-color: #ef4444 !important; }
        .hidden { display: none; margin-top: 10px; padding: 10px; background: #1e293b; border-radius: 5px; font-size: 0.9em; border: 1px solid #38bdf8; }
    </style>
</head>
<body>

<div class="container">
    <h1>ข้อสอบฟิสิกส์ ม.5: หน่วยที่ 2 (แรงพื้นฐานในธรรมชาติ)</h1>
    <div id="quiz-box"></div>
</div>

<script>
const quizData = [
    { q: "แรงโน้มถ่วงระหว่างมวล 2 ก้อนที่มีระยะห่างเพิ่มขึ้นเป็น 3 เท่า จะมีค่าเป็นกี่เท่าของแรงเดิม?", a: ["1/9 เท่า", "1/3 เท่า", "3 เท่า", "9 เท่า"], correct: 0, exp: "F แปรผกผันกับระยะทางยกกำลังสอง" },
    { q: "ข้อใดคือแรงพื้นฐานที่รวมแรงไฟฟ้าและแรงแม่เหล็กเข้าด้วยกัน?", a: ["แรงนิวเคลียร์เข้ม", "แรงแม่เหล็กไฟฟ้า", "แรงโน้มถ่วง", "แรงนิวเคลียร์อ่อน"], correct: 1, exp: "แรงทั้งสองชนิดเป็นส่วนหนึ่งของแรงแม่เหล็กไฟฟ้า" },
    { q: "การที่วัตถุตกสู่พื้นโลกเป็นการกระทำของแรงพื้นฐานใด?", a: ["แรงแม่เหล็ก", "แรงไฟฟ้า", "แรงนิวเคลียร์เข้ม", "แรงโน้มถ่วง"], correct: 3, exp: "แรงโน้มถ่วงเป็นแรงที่กระทำระหว่างมวลของโลกกับวัตถุ" },
    { q: "แรงเข้ม (Strong Nuclear Force) มีบทบาทสำคัญที่สุดในตำแหน่งใด?", a: ["ภายในนิวเคลียส", "ระหว่างดาวเคราะห์", "ระหว่างประจุ", "นอกโลก"], correct: 0, exp: "ยึดเหนี่ยวโปรตอนและนิวตรอนในนิวเคลียส" },
    { q: "แรงใดมีระยะทำการสั้นที่สุดในบรรดาแรงพื้นฐาน?", a: ["แรงนิวเคลียร์เข้ม", "แรงโน้มถ่วง", "แรงแม่เหล็กไฟฟ้า", "แรงนิวเคลียร์อ่อน"], correct: 0, exp: "แรงเข้มมีระยะทำการสั้นที่สุดในระดับนิวเคลียส" },
    { q: "ถ้ามวลของวัตถุทั้งสองเพิ่มขึ้นเป็น 2 เท่า แรงโน้มถ่วงจะเป็นกี่เท่า?", a: ["2 เท่า", "4 เท่า", "1/4 เท่า", "เท่าเดิม"], correct: 1, exp: "แรงแปรผันตรงกับมวลทั้งสองตัว" },
    { q: "แรงนิวเคลียร์อ่อนเกี่ยวข้องกับปรากฏการณ์ใดมากที่สุด?", a: ["การโคจรของดาว", "การสลายตัวของสารกัมมันตรังสี", "การเกิดแสง", "การดูดของแม่เหล็ก"], correct: 1, exp: "เป็นสาเหตุหลักของการสลายตัวแบบบีตา" },
    { q: "สนามแม่เหล็กเกิดขึ้นได้จากสิ่งใด?", a: ["มวลนิ่ง", "ประจุหยุดนิ่ง", "ประจุที่กำลังเคลื่อนที่", "นิวตรอน"], correct: 2, exp: "กระแสไฟฟ้าหรือการเคลื่อนที่ของประจุสร้างสนามแม่เหล็ก" },
    { q: "แรงโน้มถ่วงบนพื้นผิวโลกมีค่าความเร่งประมาณเท่าใด?", a: ["6.67 m/s^2", "9.8 m/s^2", "100 m/s^2", "1 m/s^2"], correct: 1, exp: "ค่า g มาตรฐานของโลกคือ 9.8 m/s^2" },
    { q: "ข้อใดเรียงลำดับขนาดของแรงพื้นฐานได้ถูกต้อง (จากมากไปน้อย)?", a: ["เข้ม > แม่เหล็กไฟฟ้า > อ่อน > โน้มถ่วง", "แม่เหล็กไฟฟ้า > เข้ม > โน้มถ่วง > อ่อน", "โน้มถ่วง > อ่อน > เข้ม > แม่เหล็กไฟฟ้า", "เข้ม > อ่อน > แม่เหล็กไฟฟ้า > โน้มถ่วง"], correct: 0, exp: "แรงเข้มแรงที่สุด และโน้มถ่วงอ่อนที่สุด" },
    { q: "น้ำหนักบนดวงจันทร์เมื่อเทียบกับบนโลกเป็นอย่างไร?", a: ["เท่าเดิม", "มากกว่า", "น้อยกว่า", "เป็นศูนย์"], correct: 2, exp: "ดวงจันทร์มีมวลน้อยกว่าโลก แรงโน้มถ่วงจึงน้อยกว่า" },
    { q: "แรงแม่เหล็กไฟฟ้ามีระยะทำการอย่างไร?", a: ["เป็นอนันต์", "สั้นมาก", "เฉพาะในโลหะ", "ขึ้นกับอุณหภูมิ"], correct: 0, exp: "ส่งผลได้ไกลเหมือนแรงโน้มถ่วง" },
    { q: "นิวตรอนในนิวเคลียสถูกยึดด้วยแรงใด?", a: ["แรงไฟฟ้า", "แรงแม่เหล็ก", "แรงนิวเคลียร์เข้ม", "แรงโน้มถ่วง"], correct: 2, exp: "แรงเข้มเป็นแรงที่ยึดอนุภาคในนิวเคลียส" },
    { q: "ถ้านำวัตถุไปไว้ที่ห่างจากโลก น้ำหนักจะเปลี่ยนอย่างไร?", a: ["เพิ่มขึ้น", "ลดลง", "เท่าเดิม", "ไม่เปลี่ยน"], correct: 1, exp: "แรงโน้มถ่วงลดลงตามระยะห่าง" },
    { q: "แรงเสียดทานเกิดจากแรงพื้นฐานใด?", a: ["แรงไฟฟ้า", "แรงโน้มถ่วง", "แรงนิวเคลียร์", "แรงแม่เหล็ก"], correct: 0, exp: "เกิดจากปฏิสัมพันธ์ระหว่างอะตอมที่ผิวสัมผัส" },
    { q: "แรงที่ส่งผ่านระหว่างโปรตอนและอิเล็กตรอนในอะตอมคือ?", a: ["แรงโน้มถ่วง", "แรงไฟฟ้า", "แรงนิวเคลียร์เข้ม", "แรงนิวเคลียร์อ่อน"], correct: 1, exp: "กฎคูลอมบ์อธิบายแรงดึงดูดระหว่างประจุ" },
    { q: "หากต้องการเพิ่มแรงโน้มถ่วงระหว่างมวล ต้องทำอย่างไร?", a: ["เพิ่มระยะห่าง", "ลดมวล", "เพิ่มมวล", "ลดอุณหภูมิ"], correct: 2, exp: "เพิ่มมวลจะเพิ่มแรงดึงดูด" },
    { q: "สนามไฟฟ้าเข้มที่สุดบริเวณใด?", a: ["ใกล้ประจุ", "ที่ระยะอนันต์", "ห่างจากประจุมาก", "จุดสมดุล"], correct: 0, exp: "แปรผกผันกับระยะทางจากประจุ" },
    { q: "แรงใดรวมกาแล็กซีเข้าด้วยกัน?", a: ["แรงโน้มถ่วง", "แรงไฟฟ้า", "แรงเข้ม", "แรงอ่อน"], correct: 0, exp: "ส่งผลในระดับจักรวาลได้ดีที่สุด" },
    { q: "แรงนิวเคลียร์อ่อนเปลี่ยนอะไร?", a: ["ชนิดของอนุภาค", "ตำแหน่งดาว", "ประจุไฟฟ้า", "สีของแสง"], correct: 0, exp: "เปลี่ยนโปรตอนเป็นนิวตรอนหรือกลับกัน" },
    { q: "แรงโน้มถ่วงมีลักษณะอย่างไร?", a: ["แรงดึงดูดเท่านั้น", "แรงผลักเท่านั้น", "ทั้งดึงดูดและผลัก", "ไม่มีผลในสุญญากาศ"], correct: 0, exp: "เป็นแรงดึงดูดระหว่างมวลเสมอ" },
    { q: "ประจุชนิดเดียวกันวางใกล้กันจะเกิดอะไร?", a: ["ดึงดูดกัน", "ผลักกัน", "นิ่งเฉย", "เกิดสนามแม่เหล็ก"], correct: 1, exp: "กฎของคูลอมบ์" },
    { q: "แรงเข้มช่วยป้องกันอะไร?", a: ["การผลักกันของโปรตอน", "การเคลื่อนที่ของดาว", "การแผ่รังสี", "การเกิดแม่เหล็ก"], correct: 0, exp: "ยึดโปรตอนที่ผลักกันไว้ในนิวเคลียส" },
    { q: "แสงสีต่างๆ สัมพันธ์กับแรงใด?", a: ["แรงแม่เหล็กไฟฟ้า", "แรงโน้มถ่วง", "แรงเข้ม", "แรงอ่อน"], correct: 0, exp: "แสงเป็นคลื่นแม่เหล็กไฟฟ้า" },
    { q: "หัวใจสำคัญของแรงพื้นฐานคือ?", a: ["การท่องจำ", "สเกลที่ต่างกัน", "การคำนวณเลข", "ชื่อแรง"], correct: 1, exp: "ฟิสิกส์เน้นการอธิบายในระดับสเกลที่ต่างกัน" }
];

function renderQuiz() {
    const box = document.getElementById('quiz-box');
    quizData.forEach((item, i) => {
        box.innerHTML += `
            <div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${item.q}</p>
                <div class="options">
                    ${item.a.map((opt, j) => `<button onclick="check(this, ${j}, ${item.correct}, ${i})">${opt}</button>`).join('')}
                </div>
                <div class="hidden" id="exp${i}">คำอธิบาย: ${item.exp}</div>
            </div>`;
    });
}
function check(btn, ans, correct, id) {
    const parent = btn.parentElement;
    parent.querySelectorAll('button').forEach(b => b.disabled = true);
    if(ans === correct) btn.classList.add('correct');
    else btn.classList.add('wrong');
    document.getElementById('exp' + id).style.display = 'block';
}
renderQuiz();
</script>
</body>
</html>
