<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาศาสตร์กายภาพ ม.5 - 25 ข้อ (ชุดที่ 3)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2980b9; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #2980b9; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #2980b9; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค วิทยาศาสตร์กายภาพ ม.5 (ชุดที่ 3)</h2>
    <p>เนื้อหา: การเคลื่อนที่และสนามของแรง | จำนวน: 25 ข้อ</p>
    <div style="background: #eaf2f8; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ชุดนี้เน้นโจทย์สถานการณ์และการคิดวิเคราะห์ เลือกใช้สมการที่เหมาะสมและตรวจหน่วยให้เป็นมาตรฐาน SI เสมอครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "รถยนต์เคลื่อนที่ด้วยความเร็ว 20 m/s แล้วเบรกจนหยุดในเวลา 5 วินาที ความเร่ง (ความหน่วง) มีค่าเท่าใด", opts: ["2 m/s<sup>2</sup>", "-2 m/s<sup>2</sup>", "4 m/s<sup>2</sup>", "-4 m/s<sup>2</sup>"], corr: 3, th: "a = (v - u) / t", det: "a = (0 - 20) / 5 = -4 m/s<sup>2</sup> (เป็นลบคือความหน่วง)" },
        { q: "ในการเคลื่อนที่แบบโพรเจกไทล์ ปัจจัยใดที่ทำให้อัตราเร็วในแนวราบไม่เปลี่ยน", opts: ["แรงโน้มถ่วง", "การมีอากาศ", "ความไม่มีแรงกระทำในแนวราบ", "ความสูง"], corr: 2, th: "ไม่มีแรงลัพธ์กระทำ", det: "เนื่องจากไม่มีแรงในแนวราบ ความเร่งในแนวราบจึงเป็นศูนย์" },
        { q: "วัตถุหนึ่งเคลื่อนที่ครบ 1 รอบของสปริงในเวลา 0.5 วินาที ความถี่ (f) คือเท่าใด", opts: ["0.5 Hz", "1 Hz", "2 Hz", "4 Hz"], corr: 2, th: "f = 1 / T", det: "f = 1 / 0.5 = 2 Hz" },
        { q: "แรงลัพธ์ที่กระทำต่อวัตถุขณะอยู่ที่จุดสูงสุดของการเคลื่อนที่แบบโพรเจกไทล์คือแรงใด", opts: ["แรงขับเคลื่อน", "แรงต้านอากาศ", "แรงโน้มถ่วง", "เป็นศูนย์"], corr: 2, th: "ทิศของแรง", det: "มีเพียงแรงโน้มถ่วงที่ดึงลงในแนวดิ่งเท่านั้น" },
        { q: "สนามไฟฟ้าที่ตำแหน่งใดมีค่าเข้มข้นมากที่สุด", opts: ["ตำแหน่งที่เส้นแรงไฟฟ้าห่างกัน", "ตำแหน่งที่เส้นแรงไฟฟ้าถี่กัน", "ตำแหน่งที่ไม่มีเส้นแรง", "กลางสนาม"], corr: 1, th: "ความหนาแน่นของเส้นแรง", det: "ความถี่ของเส้นแรงไฟฟ้าบ่งบอกถึงความเข้มของสนามไฟฟ้า" },
        { q: "ถ้ามวลติดสปริงสั่นด้วยแอมพลิจูด 5 cm พลังงานรวมจะขึ้นอยู่กับสิ่งใด", opts: ["แอมพลิจูด", "คาบ", "ความเร่ง", "มวล"], corr: 0, th: "พลังงานใน SHM", det: "พลังงานรวมแปรผันตามแอมพลิจูดกำลังสอง" },
        { q: "กฎของนิวตันข้อที่ 3 เกี่ยวข้องกับสิ่งใด", opts: ["ความเฉื่อย", "แรงลัพธ์", "แรงคู่กิริยา-ปฏิกิริยา", "ความเร่ง"], corr: 2, th: "Action = Reaction", det: "แรงคู่กิริยาและปฏิกิริยาเกิดบนวัตถุคนละก้อน" },
        { q: "หน่วยของอัตราเร็วและอัตราเร็วเชิงมุมคืออะไรตามลำดับ", opts: ["m/s, rad/s", "m/s, Hz", "m/s<sup>2</sup>, rad/s", "s, rad"], corr: 0, th: "หน่วยใน SI", det: "อัตราเร็ว (m/s) และความเร็วเชิงมุม (rad/s)" },
        { q: "หากเพิ่มระยะห่างระหว่างประจุเป็น 2 เท่า แรงทางไฟฟ้าจะเปลี่ยนไปอย่างไร", opts: ["เพิ่ม 2 เท่า", "ลดลง 2 เท่า", "ลดลง 4 เท่า", "เท่าเดิม"], corr: 2, th: "F แปรผันผกผันกับ r<sup>2</sup>", det: "เมื่อ r เพิ่ม 2 เท่า แรงจะลดลงเป็น 1/2<sup>2</sup> = 1/4" },
        { q: "กราฟ v-t ที่มีลักษณะเป็นเส้นตรงเอียงขึ้นหมายถึงอะไร", opts: ["ความเร็วคงที่", "ความเร่งคงที่", "ความเร่งเป็นศูนย์", "ความหน่วง"], corr: 1, th: "ความชันของกราฟ v-t", det: "ความชันคงที่แสดงว่ามีความเร่งคงที่" },
        { q: "ประจุลบวางอยู่ในสนามไฟฟ้าจะมีแรงกระทำในทิศใด", opts: ["ทิศเดียวกับสนามไฟฟ้า", "ทิศตรงข้ามกับสนามไฟฟ้า", "ไม่เกิดแรง", "ตั้งฉากกับสนาม"], corr: 1, th: "ทิศของแรงไฟฟ้า", det: "แรงไฟฟ้ามีทิศตรงข้ามกับสนามไฟฟ้าสำหรับประจุลบ" },
        { q: "การเหนี่ยวนำแม่เหล็กไฟฟ้าเกิดได้ดีที่สุดเมื่อใด", opts: ["แม่เหล็กหยุดนิ่ง", "แท่งแม่เหล็กเคลื่อนที่ตัดขดลวด", "กระแสตรงคงที่", "วางแม่เหล็กไว้เฉยๆ"], corr: 1, th: "กฎของฟาราเดย์", det: "การเคลื่อนที่สัมพัทธ์ทำให้ฟลักซ์เปลี่ยน" },
        { q: "วัตถุ A และ B มีมวลเท่ากัน แต่ A อยู่สูงกว่า B แรงโน้มถ่วงที่กระทำต่อ A เป็นอย่างไร", opts: ["มากกว่า B", "น้อยกว่า B", "เท่ากับ B", "เป็นศูนย์"], corr: 2, th: "F = mg", det: "ถ้า g สม่ำเสมอ น้ำหนักจะเท่ากันที่ระดับมวลเท่ากัน" },
        { q: "การกระจัดที่แท้จริงของการเคลื่อนที่เป็นวงกลม 1 รอบคือเท่าใด", opts: ["เส้นรอบวง", "รัศมี", "ศูนย์", "2 * รัศมี"], corr: 2, th: "จุดเริ่มกับจุดจบ", det: "การกลับมาที่จุดเดิมทำให้การกระจัดเป็นศูนย์" },
        { q: "แรงดึงดูดระหว่างมวลของนิวตันแปรผันกับสิ่งใด", opts: ["มวลทั้งสอง", "ระยะห่าง", "ความเร็ว", "ความเร่ง"], corr: 0, th: "F = G(m<sub>1</sub>m<sub>2</sub>)/r<sup>2</sup>", det: "แรงดึงดูดแปรผันตรงกับผลคูณของมวล" },
        { q: "คาบของลูกตุ้มนาฬิกาจะยาวขึ้นเมื่อใด", opts: ["เพิ่มมวล", "ลดความยาวเชือก", "เพิ่มความยาวเชือก", "เพิ่มแรงโน้มถ่วง"], corr: 2, th: "T &propto; &radic;L", det: "คาบจะเพิ่มขึ้นเมื่อความยาวเชือก (L) เพิ่มขึ้น" },
        { q: "ความเร่ง ณ จุดใดจุดหนึ่งของกราฟ s-t ดูได้จากอะไร", opts: ["ความชัน", "ความโค้ง (ความชันเปลี่ยน)", "พื้นที่ใต้กราฟ", "จุดตัดแกน"], corr: 1, th: "การเปลี่ยนของความเร็ว", det: "ความโค้งของกราฟ s-t แสดงว่าความเร็วเปลี่ยน จึงมีความเร่ง" },
        { q: "ถ้าประจุบวกเคลื่อนที่ในสนามแม่เหล็ก แรงที่เกิดขึ้นจะมีทิศใด", opts: ["ทิศเดียวกับสนาม", "ตั้งฉากกับทิศทางประจุและสนาม", "ทิศตรงข้ามสนาม", "ไม่เกิดแรง"], corr: 1, th: "กฎมือขวา", det: "แรงแม่เหล็กกระทำในทิศตั้งฉากกับความเร็วและสนาม" },
        { q: "หน่วยของงานและพลังงานคืออะไร", opts: ["นิวตัน", "จูล (J)", "วัตต์", "เมตร"], corr: 1, th: "หน่วย SI", det: "งานและพลังงานมีหน่วยเป็น จูล (J)" },
        { q: "เมื่อวัตถุเริ่มจากหยุดนิ่ง (u=0) ระยะทางที่ได้จะแปรผันตรงกับสิ่งใด", opts: ["เวลา", "เวลา<sup>2</sup>", "ความเร็ว", "1/เวลา"], corr: 1, th: "s = 0.5at<sup>2</sup>", det: "ระยะทางแปรผันตรงกับเวลาในหน่วยยกกำลังสอง" },
        { q: "ถ้าขดลวดเคลื่อนที่ผ่านสนามแม่เหล็ก จะเกิดสิ่งใด", opts: ["กระแสไฟฟ้าเหนี่ยวนำ", "สนามไฟฟ้า", "ความร้อน", "แรงโน้มถ่วง"], corr: 0, th: "กฎของฟาราเดย์", det: "เกิดกระแสไฟฟ้าจากการเหนี่ยวนำแม่เหล็ก" },
        { q: "วัตถุเคลื่อนที่เป็นเส้นตรงด้วยความเร็วคงที่ แรงลัพธ์คือเท่าใด", opts: ["เป็นศูนย์", "มีค่าคงที่", "ไม่เท่ากับศูนย์", "หาไม่ได้"], corr: 0, th: "กฎข้อที่ 1 ของนิวตัน", det: "ความเร็วคงที่หมายความว่าความเร่งเป็นศูนย์ แรงลัพธ์จึงเป็นศูนย์" },
        { q: "แรงเสียดทานมีทิศอย่างไร", opts: ["ทิศเดียวกับการเคลื่อนที่", "ทิศตรงข้ามกับการเคลื่อนที่", "ทิศตั้งฉาก", "ไม่มีทิศ"], corr: 1, th: "ธรรมชาติของแรงเสียดทาน", det: "แรงเสียดทานต้านการเคลื่อนที่เสมอ" },
        { q: "สนามแม่เหล็กโลกเปรียบเสมือนวางอะไรไว้ข้างใน", opts: ["ขดลวด", "แท่งแม่เหล็ก", "ประจุไฟฟ้า", "ไม่มีสิ่งใด"], corr: 1, th: "แบบจำลองแม่เหล็กโลก", det: "สนามแม่เหล็กโลกมีทิศเหมือนแท่งแม่เหล็กยักษ์" },
        { q: "ความสัมพันธ์ v<sup>2</sup> = u<sup>2</sup> + 2as จะใช้ไม่ได้ในกรณีใด", opts: ["ความเร่งคงที่", "ความเร่งไม่คงที่", "เริ่มจากหยุดนิ่ง", "เคลื่อนที่แนวตรง"], corr: 1, th: "เงื่อนไขสมการ", det: "สมการ 5 สูตรหลักใช้ได้เฉพาะเมื่อความเร่งคงที่เท่านั้น" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
