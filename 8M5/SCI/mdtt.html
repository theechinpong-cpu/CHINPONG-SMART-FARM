<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คู่มือครู: เฉลยละเอียดวิทยาศาสตร์กายภาพ ม.5</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 20px; background: #f0f2f5; }
        .summary { background: #fff; padding: 25px; border-radius: 12px; border-left: 8px solid #27ae60; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-card { background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .teacher-box { margin-top: 15px; padding: 15px; background: #e8f8f5; border-left: 5px solid #27ae60; border-radius: 4px; }
        .step-list { background: #fff; padding: 10px; border: 1px dashed #27ae60; margin: 8px 0; border-radius: 5px; font-size: 0.95em; }
        h2 { color: #2c3e50; }
        .math { font-family: 'Times New Roman', serif; font-size: 1.1em; color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="summary">
    <h2>คู่มือครู: เฉลยละเอียดและขั้นตอนการสอน (วิทยาศาสตร์กายภาพ ม.5)</h2>
    <p><strong>วิชา:</strong> วิทยาศาสตร์กายภาพ | <strong>เรื่อง:</strong> การเคลื่อนที่และสนามของแรง | <strong>จำนวน:</strong> 25 ข้อ</p>
    <p><em>คำแนะนำสำหรับครู:</em> คู่มือนี้จัดทำขึ้นเพื่อช่วยให้ครูอธิบายรายละเอียดให้นักเรียนเข้าใจลำดับความคิดแบบ Step-by-Step</p>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "วัตถุเคลื่อนที่จากหยุดนิ่งด้วยความเร่ง 2 m/s² เป็นเวลา 5 วินาที จะมีความเร็วปลายกี่ m/s", ans: "10", steps: ["ระบุตัวแปรจากโจทย์: ความเร็วต้น (u) = 0, ความเร่ง (a) = 2, เวลา (t) = 5", "ใช้สูตรหาความเร็วปลาย: v = u + at", "แทนค่าในสูตร: v = 0 + (2 × 5)", "คำนวณผลลัพธ์: 0 + 10 = 10 m/s"] },
        { q: "ถ้าวัตถุเคลื่อนที่ด้วยความเร็วคงที่ 10 m/s ในเวลา 20 วินาที จะได้ระยะทางเท่าใด", ans: "200 m", steps: ["ระบุตัวแปร: ความเร็ว (v) = 10, เวลา (t) = 20", "ใช้สูตรระยะทางกรณีความเร็วคงที่: s = vt", "แทนค่า: s = 10 × 20", "คำนวณผลลัพธ์: 200 เมตร"] },
        { q: "การเคลื่อนที่แบบโพรเจกไทล์ แนวราบมีความเร็วอย่างไร", ans: "คงที่", steps: ["วิเคราะห์แรงในแนวราบ: ไม่มีการผลักหรือดึงวัตถุในแนวราบ (แรงลัพธ์เป็นศูนย์)", "ตามกฎข้อที่ 1 ของนิวตัน: วัตถุที่ไม่มีแรงกระทำจะรักษาความเร็วให้คงที่", "สรุป: ความเร็วแนวราบ (vx) จึงคงที่ตลอดการเคลื่อนที่"] },
        { q: "แรงโน้มถ่วงที่กระทำต่อวัตถุมวล 5 kg (กำหนด g = 9.8 m/s²) มีค่ากี่นิวตัน", ans: "49 N", steps: ["ระบุตัวแปร: มวล (m) = 5 kg, ความเร่งโน้มถ่วง (g) = 9.8", "ใช้สูตรหาแรง (น้ำหนัก): F = mg", "แทนค่า: F = 5 × 9.8", "คำนวณ: 49 นิวตัน"] },
        { q: "เส้นแรงไฟฟ้ามีทิศทางอย่างไร", ans: "จากบวกไปลบ", steps: ["นิยามสนามไฟฟ้ากำหนดให้ใช้ประจุบวกทดสอบ", "ประจุบวกทดสอบจะถูกผลักออกจากประจุบวกหลัก", "และจะถูกดึงดูดเข้าหาประจุลบหลัก", "สรุปทิศทาง: พุ่งออกจากบวก เข้าหาลบ"] },
        { q: "หน่วย SI ของความเร่งคืออะไร", ans: "m/s²", steps: ["ความเร่งคือ การเปลี่ยนความเร็ว (m/s) หารด้วย เวลา (s)", "นำหน่วยมาหารกัน: (m/s) / s", "สรุปหน่วย: เมตรต่อวินาทีกำลังสอง หรือ m/s²"] },
        { q: "กราฟ v-t พื้นที่ใต้กราฟหมายถึงอะไร", ans: "ระยะทาง", steps: ["พิจารณาแกนกราฟ: แกนตั้งเป็นความเร็ว (v), แกนนอนเป็นเวลา (t)", "ผลคูณของ v และ t (ตามสูตร s = vt) คือพื้นที่รูปสี่เหลี่ยม", "ดังนั้น พื้นที่ใต้กราฟ v-t จึงแทนระยะทาง (s)"] },
        { q: "วัตถุเคลื่อนที่เป็นวงกลมรัศมีคงที่ ความเร็วเปลี่ยนแปลงอย่างไร", ans: "ความเร็วเปลี่ยนทิศตลอด", steps: ["ความเร็วเป็นปริมาณเวกเตอร์ (ต้องมีทั้งขนาดและทิศทาง)", "ในการเคลื่อนที่แบบวงกลม วัตถุเปลี่ยนทิศทางไปตามเส้นรอบวงตลอดเวลา", "แม้ขนาดความเร็วจะเท่าเดิม แต่ทิศที่เปลี่ยนถือว่าความเร็วเปลี่ยน"] },
        { q: "สนามแม่เหล็กทิศจากขั้วไหนไปขั้วไหน", ans: "เหนือไปใต้", steps: ["ศึกษาคุณสมบัติของแท่งแม่เหล็ก", "เส้นแรงแม่เหล็กพุ่งออกจากขั้วเหนือ (N) เสมอ", "และพุ่งวนกลับเข้าที่ขั้วใต้ (S) เสมอ"] },
        { q: "วัตถุตกแบบเสรี (Free fall) ความเร่ง g มีทิศอย่างไร", ans: "ลง", steps: ["แรงโน้มถ่วงคือแรงดึงดูดของโลก", "โลกดึงดูดทุกอย่างเข้าหาจุดศูนย์กลางของโลก", "เนื่องจากเราอยู่บนพื้นผิวโลก จุดศูนย์กลางจึงอยู่ด้านล่าง ดังนั้นทิศคือลง"] },
        { q: "ถ้าโยนวัตถุทำมุม 45 องศา วัตถุจะตกไกลที่สุดเมื่อใด", ans: "ที่ระดับพื้นราบ", steps: ["การเคลื่อนที่โพรเจกไทล์ขึ้นอยู่กับมุมการยิง", "มุม 45 องศาเป็นมุมที่ให้ระยะยิง (Range) ได้มากที่สุดในระดับพื้นราบ", "ข้อนี้เน้นย้ำเงื่อนไขทางคณิตศาสตร์ของการเคลื่อนที่แนวโค้ง"] },
        { q: "กฎของนิวตันข้อที่ 3 กล่าวว่าอย่างไร", ans: "Action = Reaction", steps: ["กฎข้อ 3 เกี่ยวกับแรงที่เกิดเป็นคู่", "เมื่อมีแรงกิริยา (Action) กระทำต่อวัตถุ", "จะมีแรงปฏิกิริยา (Reaction) ที่มีขนาดเท่ากันแต่ทิศตรงข้ามเกิดขึ้นทันที"] },
        { q: "คาบ (T) คืออะไร", ans: "เวลาต่อรอบ", steps: ["คาบ (T) คือหน่วยวัดเวลาของการหมุนหรือแกว่ง", "เป็นการนับว่า 'ต้องใช้เวลานานเท่าไหร่' ถึงจะครบรอบพอดี", "สรุปหน่วย: วินาทีต่อรอบ"] },
        { q: "ความถี่ (f) มีหน่วยเป็นอะไร", ans: "เฮิรตซ์ (Hz)", steps: ["ความถี่คือจำนวนรอบที่เกิดขึ้นใน 1 วินาที", "หน่วยนับคือ รอบต่อวินาที (1/s)", "ชื่อเฉพาะของหน่วยนี้คือ เฮิรตซ์ (Hertz หรือ Hz)"] },
        { q: "เมื่อประจุไฟฟ้าเคลื่อนที่ในสนามแม่เหล็ก จะเกิดอะไรขึ้น", ans: "เกิดแรงกระทำ", steps: ["ประจุไฟฟ้าเมื่อเคลื่อนที่ จะมีสมบัติเหมือนกระแสไฟฟ้า", "เมื่อกระแสไฟฟ้าผ่านสนามแม่เหล็ก จะเกิดแรงทางแม่เหล็กตามกฎของลอเรนซ์", "แรงนี้ส่งผลให้ประจุเบนทิศทางการเคลื่อนที่"] },
        { q: "ความเร่งขณะใดขณะหนึ่งดูได้จากค่าใดของกราฟ s-t", ans: "ความชัน (Slope)", steps: ["กราฟ s-t (ระยะทาง-เวลา) ความชันคือ Δs/Δt ซึ่งคือความเร็ว", "ถ้าต้องการความเร่ง ต้องดูความชันของกราฟ 'ความเร็ว-เวลา' (v-t) หรือความโค้งของ s-t"], det: "หมายเหตุ: หากโจทย์ถามถึงกราฟ s-t ความชันคือความเร็ว แต่ถ้าโจทย์ต้องการความเร่ง คืออัตราการเปลี่ยนความชัน" },
        { q: "ถ้าแรงลัพธ์ที่กระทำต่อวัตถุเป็นศูนย์ วัตถุจะเคลื่อนที่อย่างไร", ans: "หยุดนิ่งหรือคงที่", steps: ["กฎข้อ 1 ของนิวตัน (กฎความเฉื่อย)", "ถ้าไม่มีแรงกระทำ (แรงลัพธ์=0) วัตถุเดิมหยุดก็จะหยุดนิ่ง", "วัตถุเดิมเคลื่อนที่อยู่ก็จะเคลื่อนที่ด้วยความเร็วเท่าเดิมต่อไป"] },
        { q: "สนามโน้มถ่วงของโลก (g) มีค่าประมาณเท่าใด", ans: "9.8 m/s²", steps: ["ค่านี้เป็นค่ามาตรฐานทางฟิสิกส์ที่นักวิทยาศาสตร์วัดได้บนโลก", "ตัวเลขนิยมที่ใช้ในการคำนวณคือ 9.8 เมตรต่อวินาทีกำลังสอง"] },
        { q: "การเหนี่ยวนำแม่เหล็กไฟฟ้าคือการเปลี่ยนอะไรเป็นอะไร", ans: "แม่เหล็กเป็นไฟฟ้า", steps: ["ค้นพบโดยไมเคิล ฟาราเดย์", "เมื่อสนามแม่เหล็กเปลี่ยนแปลงผ่านขดลวด", "พลังงานแม่เหล็กจะถูกเหนี่ยวนำให้กลายเป็นกระแสไฟฟ้า"] },
        { q: "ปริมาณสเกลาร์คืออะไร", ans: "มีแต่ขนาด", steps: ["ปริมาณทางฟิสิกส์แบ่งเป็น 2 กลุ่มใหญ่", "สเกลาร์ คือ บอกแค่ 'เท่าไหร่' เช่น มวล 5 กก., เวลา 10 วินาที", "ไม่มีการบอกว่าไปทางไหน"] },
        { q: "ความเร็ว (Velocity) เป็นปริมาณประเภทใด", ans: "เวกเตอร์", steps: ["ความเร็วคือการกระจัดหารด้วยเวลา", "การกระจัดต้องบอกทิศทาง (เช่น ขึ้นเหนือ, ลงใต้)", "ดังนั้น ความเร็ว จึงเป็นปริมาณเวกเตอร์ที่มีทั้งขนาดและทิศทาง"] },
        { q: "แอมพลิจูดในการเคลื่อนที่แบบฮาร์มอนิกคืออะไร", ans: "ระยะกระจัดสูงสุด", steps: ["การเคลื่อนที่แบบฮาร์มอนิกคือการแกว่งไปมา", "จุดที่ไกลที่สุดจากตรงกลางเรียกว่า 'จุดสมดุล'", "ระยะห่างจากจุดสมดุลนี้แหละคือแอมพลิจูด"] },
        { q: "ประจุเหมือนกันจะเกิดอะไรขึ้น", ans: "ผลักกัน", steps: ["กฎพื้นฐานของไฟฟ้า: ประจุต่างชนิด (บวก-ลบ) ดึงดูดกัน", "ประจุชนิดเดียวกัน (บวก-บวก หรือ ลบ-ลบ) เกิดแรงผลักกันเสมอ"] },
        { q: "หากเพิ่มมวลของวัตถุที่ติดสปริง คาบจะเปลี่ยนอย่างไร", ans: "มากขึ้น", steps: ["สูตรคาบของสปริงคือ T = 2π√(m/k)", "จะเห็นว่า T แปลผันตรงกับมวล (m)", "ดังนั้น เมื่อมวล m เพิ่มขึ้น ค่า T (คาบ) ก็ต้องมากขึ้นด้วย"] },
        { q: "ถ้าวิ่งครบ 1 รอบสนาม ระยะทางกับการกระจัดเป็นอย่างไร", ans: "การกระจัด = 0", steps: ["ระยะทาง: คือความยาวรวมที่วิ่งจริง (เท่ากับเส้นรอบวง)", "การกระจัด: คือระยะห่างจากจุดเริ่มต้นถึงจุดสุดท้าย", "ในเมื่อวิ่งครบรอบ จุดสุดท้ายทับจุดเริ่มพอดี ระยะห่างคือ 0"] }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let stepsHtml = item.steps.map((step, i) => `<div class="step-list"><b>ขั้นที่ ${i + 1}:</b> ${step}</div>`).join('');
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <div class="teacher-box">
                <p><b>คำตอบ:</b> ${item.ans}</p>
                <b>ขั้นตอนการสอนอย่างละเอียด:</b> ${stepsHtml}
            </div>
        `;
        container.appendChild(div);
    });
</script>

</body>
</html>
