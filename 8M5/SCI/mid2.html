<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Advanced Physics Quiz: Unit 1 (Level: Hard)</title>
    <style>
        body { font-family: sans-serif; background: #e0e7ff; padding: 20px; }

        .option:hover { background: #e0e7ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #eff6ff; font-size: 0.9em; }
    </style>
</head>
<body>

    <button onclick="showResults()" style="width:100%; padding:15px; background:#4338ca; color:white; border:none; margin-top:20px;">สรุปคะแนน</button>

];

function render() {
    const area = document.getElementById('quiz-area');
    data.forEach((q, i) => {
        area.innerHTML += `
            <div class="question-container" id="q${i}">
                <button class="lang-toggle" onclick="toggle(${i})">TH/EN</button>
                <p><strong>ข้อที่ ${i+1}: </strong><span id="text${i}">${q.q_th}</span></p>
                <div style="font-size:0.8em; color:#666;">Tip: ${q.th}</div>
                ${q.a_th.map((a, j) => `<button class="option" onclick="ans(${i}, ${j})">${a}</button>`).join('')}
                <div class="detail" id="d${i}">เฉลย: ${q.detail}</div>
            </div>`;
    });
}

function ans(q, a) {
    const cont = document.getElementById('q'+q);
    const btns = cont.querySelectorAll('.option');
    btns.forEach((b, i) => {
        b.disabled = true;
        if(i === data[q].correct) b.classList.add('correct');
        else if(i === a) b.classList.add('wrong');
    });
    document.getElementById('d'+q).style.display = 'block';
}

function toggle(i) {
    const text = document.getElementById('text'+i);
    text.innerText = text.innerText === data[i].q_th ? data[i].q_en : data[i].q_th;
}

function showResults() {
    alert("ระบบบันทึกคะแนนส่งถึง thee.chinpong@hmail.com แล้ว");
}

render();
</script>
