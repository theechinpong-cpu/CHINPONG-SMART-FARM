<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาศาสตร์กายภาพ ม.5 - 25 ข้อ (ชุดที่ 2)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #e67e22; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #d35400; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #f39c12; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค วิทยาศาสตร์กายภาพ ม.5 (ชุดที่ 2)</h2>
    <p>เนื้อหา: การเคลื่อนที่และสนามของแรง | จำนวน: 25 ข้อ</p>
    <div style="background: #fff3cd; padding: 10px;"><b>เทคนิคติวเตอร์:</b> อ่านโจทย์ให้ดีว่าถามหา "ระยะทาง" (ทางเดินทั้งหมด) หรือ "การกระจัด" (จุดเริ่มต้นถึงจุดสุดท้าย) และระวังหน่วยให้เป็นระบบ SI (m, s, N) เสมอครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "วัตถุเคลื่อนที่ด้วยความเร็วต้น 5 m/s ความเร็วปลาย 15 m/s ในเวลา 2 วินาที ความเร่งเป็นเท่าใด", opts: ["2.5 m/s^2", "5 m/s^2", "10 m/s^2", "20 m/s^2"], corr: 1, th: "a = (v - u) / t", det: "a = (15 - 5) / 2 = 5 m/s^2" },
        { q: "ถ้าโยนวัตถุขึ้นตรงๆ ด้วยความเร็วต้น 20 m/s นานเท่าใดวัตถุจึงจะถึงจุดสูงสุด (ใช้ g = 10 m/s^2)", opts: ["1 s", "2 s", "3 s", "4 s"], corr: 1, th: "ที่จุดสูงสุด v = 0, ใช้ v = u + at", det: "0 = 20 - 10t => t = 2 วินาที" },
        { q: "การเคลื่อนที่แบบโพรเจกไทล์ ความเร็วในแนวดิ่ง ณ จุดสูงสุดเป็นเท่าใด", opts: ["เท่าความเร็วต้น", "เป็นศูนย์", "มากกว่าแนวราบ", "น้อยกว่าแนวราบ"], corr: 1, th: "พิจารณาความเร็วในแกน y", det: "ที่จุดสูงสุด ความเร็วในแนวดิ่ง (vy) จะเป็น 0 ชั่วขณะ" },
        { q: "วัตถุ A มวล 2 kg วัตถุ B มวล 4 kg วางในสนามโน้มถ่วงเดียวกัน แรงโน้มถ่วงที่กระทำต่อวัตถุใดมากกว่า", opts: ["A มากกว่า", "B มากกว่า", "เท่ากัน", "ไม่สามารถสรุปได้"], corr: 1, th: "F = mg", det: "น้ำหนัก (F) แปรผันตรงกับมวล m ดังนั้นมวลมากย่อมมีน้ำหนักมาก" },
        { q: "ทิศทางของสนามแม่เหล็กภายนอกแท่งแม่เหล็กมีทิศอย่างไร", opts: ["ขั้วใต้ไปขั้วเหนือ", "ขั้วเหนือไปขั้วใต้", "เข้าสู่จุดศูนย์กลาง", "ออกจากจุดศูนย์กลาง"], corr: 1, th: "กฎพื้นฐานแม่เหล็ก", det: "สนามแม่เหล็กพุ่งออกจากขั้ว N ไปยังขั้ว S" },
        { q: "สมการใดใช้หาการกระจัดเมื่อไม่ทราบความเร่ง (a)", opts: ["s = vt", "s = ut + 0.5at^2", "v^2 = u^2 + 2as", "s = (u+v)/2 * t"], corr: 3, th: "เลือกใช้สูตรความเร็วเฉลี่ย", det: "s = (u+v)/2 * t ใช้เมื่อความเร่งคงที่และไม่รู้ค่า a" },
        { q: "ถ้าแรงลัพธ์เป็นศูนย์ วัตถุที่เคลื่อนที่จะมีลักษณะอย่างไร", opts: ["หยุดนิ่ง", "ความเร่งเพิ่มขึ้น", "ความเร็วคงที่", "เปลี่ยนทิศทาง"], corr: 2, th: "กฎข้อที่ 1 ของนิวตัน", det: "วัตถุจะเคลื่อนที่ด้วยความเร็วคงที่หรืออยู่นิ่ง" },
        { q: "สนามไฟฟ้าเกิดขึ้นรอบตัวประจุชนิดใด", opts: ["ประจุบวกเท่านั้น", "ประจุลบเท่านั้น", "ประจุไฟฟ้าทุกชนิด", "วัตถุที่เป็นกลาง"], corr: 2, th: "ที่มาของสนามไฟฟ้า", det: "ประจุทุกชนิดสร้างสนามไฟฟ้าได้" },
        { q: "ลูกตุ้มนาฬิกาเคลื่อนที่แบบฮาร์มอนิก ถ้ามวลมากขึ้น คาบจะเป็นอย่างไร", opts: ["เพิ่มขึ้น", "ลดลง", "เท่าเดิม", "เป็นศูนย์"], corr: 2, th: "คาบของลูกตุ้มขึ้นอยู่กับความยาวเชือก", det: "คาบของลูกตุ้มขึ้นอยู่กับความยาวเชือก (L) และ g เท่านั้น" },
        { q: "กราฟ s-t ความชัน (Slope) คืออะไร", opts: ["ความเร็ว", "ความเร่ง", "ระยะทาง", "เวลา"], corr: 0, th: "ความหมายทางคณิตศาสตร์", det: "ความชันของกราฟตำแหน่งคือความเร็ว" },
        { q: "กฎของคูลอมบ์กล่าวถึงแรงระหว่างประจุ แปรผันตามอะไร", opts: ["ระยะห่าง", "1/ระยะห่าง^2", "มวล", "ความเร่ง"], corr: 1, th: "F = k(q1q2)/r^2", det: "แรงแปรผันตาม 1/r^2" },
        { q: "วัตถุตกแบบเสรี (g = 10 m/s^2) ผ่านไป 3 วินาที จะมีความเร็วเท่าใด (เริ่มจากหยุดนิ่ง)", opts: ["10 m/s", "20 m/s", "30 m/s", "40 m/s"], corr: 2, th: "v = u + gt", det: "v = 0 + (10 * 3) = 30 m/s" },
        { q: "แรงคู่กิริยา-ปฏิกิริยา มีแรงลัพธ์รวมเป็นเท่าใด", opts: ["เป็นศูนย์", "หาค่าไม่ได้", "สองเท่าของแรง", "ไม่สามารถรวมกันได้"], corr: 3, th: "วิเคราะห์กฎข้อที่ 3", det: "แรงคู่กิริยากระทำคนละวัตถุ จึงนำมาหักล้างกันไม่ได้" },
        { q: "ปริมาณใดต่อไปนี้เป็นปริมาณเวกเตอร์ทั้งหมด", opts: ["ระยะทาง, อัตราเร็ว", "การกระจัด, ความเร็ว", "เวลา, อุณหภูมิ", "มวล, แรง"], corr: 1, th: "เวกเตอร์ต้องมีทิศทาง", det: "การกระจัดและความเร็วต้องมีทิศทางเสมอ" },
        { q: "รถเบรกกะทันหันจนหยุด ความเร่งมีทิศอย่างไร", opts: ["ทิศเดียวกับการเคลื่อนที่", "ทิศตรงข้ามการเคลื่อนที่", "ตั้งฉาก", "เป็นศูนย์"], corr: 1, th: "ความหน่วง", det: "แรงต้านการเคลื่อนที่ทำให้ความเร่งมีทิศตรงข้ามความเร็ว" },
        { q: "หน่วยของสนามแม่เหล็กคืออะไร", opts: ["นิวตัน", "เทสลา (T)", "โวลต์", "แอมแปร์"], corr: 1, th: "มาตรฐานสากล", det: "สนามแม่เหล็กมีหน่วยเป็น เทสลา" },
        { q: "แอมพลิจูดของการสั่นของสปริงคืออะไร", opts: ["เวลาที่สั่น", "จำนวนรอบ", "ระยะยืดสูงสุดจากสมดุล", "พลังงานจลน์"], corr: 2, th: "การกระจัดสูงสุด", det: "แอมพลิจูดคือระยะที่ไกลที่สุดจากจุดสมดุล" },
        { q: "ถ้าประจุต่างกัน แรงระหว่างประจุจะมีทิศอย่างไร", opts: ["ผลักกัน", "ดูดกัน", "ไม่เกิดแรง", "ขนานกัน"], corr: 1, th: "กฎไฟฟ้า", det: "ประจุต่างชนิดกันจะเกิดแรงดึงดูดกัน" },
        { q: "การเหนี่ยวนำแม่เหล็กไฟฟ้าใช้หลักการเปลี่ยนอะไร", opts: ["ไฟฟ้าเป็นสนามแม่เหล็ก", "การเปลี่ยนแปลงสนามแม่เหล็กเป็นกระแสไฟฟ้า", "ความร้อนเป็นไฟฟ้า", "แรงโน้มถ่วงเป็นไฟฟ้า"], corr: 1, th: "กฎของฟาราเดย์", det: "การตัดกันของเส้นแรงแม่เหล็กกับตัวนำทำให้เกิดกระแส" },
        { q: "วัตถุเคลื่อนที่ได้ 40 เมตร ใน 10 วินาที อัตราเร็วคือเท่าใด", opts: ["2 m/s", "4 m/s", "10 m/s", "400 m/s"], corr: 1, th: "v = s / t", det: "v = 40 / 10 = 4 m/s" },
        { q: "แรงที่โลกดึงดูดวัตถุเรียกว่าอะไร", opts: ["แรงแม่เหล็ก", "แรงไฟฟ้า", "น้ำหนัก (Weight)", "แรงเสียดทาน"], corr: 2, th: "นิยามแรงโน้มถ่วง", det: "น้ำหนักคือแรงดึงดูดของโลกต่อมวล" },
        { q: "การเคลื่อนที่แบบโพรเจกไทล์ แนวราบมีความเร่งเท่าใด", opts: ["เท่ากับ g", "มากกว่า g", "น้อยกว่า g", "เป็นศูนย์"], corr: 3, th: "แรงในแนวราบไม่มี", det: "ไม่มีแรงกระทำในแนวราบ ความเร่งจึงเป็น 0" },
        { q: "สนามแม่เหล็กโลกมีขั้วเหนืออยู่บริเวณใดของโลก", opts: ["ขั้วเหนือทางภูมิศาสตร์", "ขั้วใต้ทางภูมิศาสตร์", "ศูนย์สูตร", "ใต้โลก"], corr: 1, th: "ความรู้ทั่วไป", det: "ขั้วเหนือแม่เหล็กโลกอยู่ใกล้ขั้วใต้ภูมิศาสตร์" },
        { q: "ความสัมพันธ์ระหว่าง คาบ (T) และ ความถี่ (f) คือข้อใด", opts: ["T = f", "T = 1/f", "T = 2f", "T = f^2"], corr: 1, th: "ส่วนกลับกัน", det: "คาบเป็นส่วนกลับของความถี่เสมอ" },
        { q: "จาก v^2 = u^2 + 2as ถ้าวัตถุเริ่มจากหยุดนิ่งและเคลื่อนที่ได้ระยะ s จะได้สมการว่าอย่างไร", opts: ["v^2 = 2as", "v = as", "v^2 = as", "v = 2as"], corr: 0, th: "แทน u = 0", det: "เมื่อ u = 0, v^2 = 0 + 2as = 2as" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
