<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>พระจอมเกล้าติวเตอร์ - รากที่ n มาตรฐานสากล</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
    .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; text-align: center; }
    .radical { display: inline-block; position: relative; font-family: serif; font-size: 1.2em; vertical-align: middle; margin: 0 5px; }
    .rad-n { font-size: 0.6em; position: absolute; top: -0.2em; left: -0.2em; font-weight: bold; }
    .rad-symbol { font-size: 1.2em; }
    .rad-overline { border-top: 1px solid #000; padding-top: 1px; }
    .question-container { margin-bottom: 25px; padding: 20px; border-bottom: 2px solid #eee; background: #fff; border-radius: 8px; }
    .clue { color: #d35400; font-style: italic; font-size: 0.9em; margin: 10px 0; padding: 5px 10px; background: #fff3e0; border-left: 4px solid #d35400; }
    .btn { padding: 10px 20px; background: #2980b9; color: white; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
    .result { margin-top: 10px; font-weight: bold; font-size: 1.1em; }
    .correct { color: #27ae60; } .incorrect { color: #c0392b; }
</style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบ เรื่อง รากที่ n (มาตรฐานสากล)</h1>
    <div style="text-align:center;">
        <button class="btn" onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    </div>
    <div id="quiz-area"></div>
    <button class="btn" onclick="submitExam()" style="width:100%; margin-top:20px; background:#27ae60; font-size:1.2em;">สรุปผลคะแนนรวม / Final Submit</button>
</div>
<script>
function renderRadical(n, val) {
    if (n === 2) return `<span class="radical"><span class="rad-symbol">&radic;</span><span class="rad-overline">${val}</span></span>`;
    return `<span class="radical"><sup class="rad-n">${n}</sup><span class="rad-symbol">&radic;</span><span class="rad-overline">${val}</span></span>`;
}
const questions = [
    {q_th:`ผลลัพธ์ของ ${renderRadical(2, 81)} คือข้อใด`, q_en:`What is ${renderRadical(2, 81)}?`, a_th:["9", "-9", "9 และ -9", "ไม่มีข้อถูก"], a_en:["9", "-9", "9 and -9", "None"], correct: 0, th:"ใบ้: รากที่สองค่าหลักคือบวกเสมอ", en:"Tip: Principal root is positive.", detail:"รากที่สองของ 81 คือ 9"},
    {q_th:`${renderRadical(3, -27)} มีค่าเท่าใด`, q_en:`What is ${renderRadical(3, -27)}?`, a_th:["3", "-3", "9", "-9"], a_en:["3", "-3", "9", "-9"], correct: 1, th:"ใบ้: รากคี่รักษาเครื่องหมายเดิม", en:"Tip: Odd roots keep the sign.", detail:"(-3)^3 = -27"},
    {q_th:`${renderRadical(2, 16)} มีค่าเท่าใด`, q_en:`What is ${renderRadical(2, 16)}?`, a_th:["4", "-4", "2", "8"], a_en:["4", "-4", "2", "8"], correct: 0, th:"ใบ้: 4x4", en:"Tip: 4x4.", detail:"4^2 = 16"},
    {q_th:`${renderRadical(2, -4)} ในระบบจำนวนจริงเท่ากับเท่าใด`, q_en:`What is ${renderRadical(2, -4)} in real numbers?`, a_th:["2", "-2", "2i", "ไม่มีนิยาม"], a_en:["2", "-2", "2i", "Undefined"], correct: 3, th:"ใบ้: รากคู่ติดลบหาค่าไม่ได้", en:"Tip: Even roots of negative are undefined.", detail:"รากคู่ของจำนวนลบไม่มีค่าในจำนวนจริง"},
    {q_th:`${renderRadical(3, 64)} มีค่าเท่าใด`, q_en:`What is ${renderRadical(3, 64)}?`, a_th:["4", "8", "16", "2"], a_en:["4", "8", "16", "2"], correct: 0, th:"ใบ้: 4x4x4", en:"Tip: 4x4x4.", detail:"4^3 = 64"},
    {q_th:`${renderRadical(3, -125)} มีค่าเท่าใด`, q_en:`What is ${renderRadical(3, -125)}?`, a_th:["5", "-5", "25", "-25"], a_en:["5", "-5", "25", "-25"], correct: 1, th:"ใบ้: (-5)^3", en:"Tip: (-5)^3.", detail:"(-5)^3 = -125"},
    {q_th:`${renderRadical(2, 2)} * ${renderRadical(2, 8)} เท่ากับเท่าใด`, q_en:`${renderRadical(2, 2)} * ${renderRadical(2, 8)} = ?`, a_th:["&radic;10", "4", "16", "2"], a_en:["&radic;10", "4", "16", "2"], correct: 1, th:"ใบ้: &radic;16", en:"Tip: &radic;16.", detail:"&radic;16 = 4"},
    {q_th:`${renderRadical(3, 16)} / ${renderRadical(3, 2)} เท่ากับเท่าใด`, q_en:`${renderRadical(3, 16)} / ${renderRadical(3, 2)} = ?`, a_th:["&radic;[3]{8}", "2", "4", "8"], a_en:["&radic;[3]{8}", "2", "4", "8"], correct: 1, th:"ใบ้: รากที่ 3 ของ 8", en:"Tip: Cube root of 8.", detail:"&radic;[3]{8} = 2"},
    {q_th:`3${renderRadical(2, 5)} + 2${renderRadical(2, 5)} เท่ากับเท่าใด`, q_en:`3${renderRadical(2, 5)} + 2${renderRadical(2, 5)} = ?`, a_th:["5&radic;10", "5${renderRadical(2, 5)}", "6${renderRadical(2, 5)}", "25"], a_en:["5&radic;10", "5${renderRadical(2, 5)}", "6${renderRadical(2, 5)}", "25"], correct: 1, th:"ใบ้: รวมตัวเลขข้างหน้า", en:"Tip: Add coefficients.", detail:"บวกเฉพาะสัมประสิทธิ์หน้าราก"},
    {q_th:`${renderRadical(2, 12)} - ${renderRadical(2, 3)} มีค่าเท่าใด`, q_en:`${renderRadical(2, 12)} - ${renderRadical(2, 3)} = ?`, a_th:["&radic;9", "3", "${renderRadical(2, 3)}", "1"], a_en:["&radic;9", "3", "${renderRadical(2, 3)}", "1"], correct: 2, th:"ใบ้: 12 คือ 4x3", en:"Tip: 12 is 4x3.", detail:"2&radic;3 - &radic;3 = &radic;3"},
    {q_th:`สังยุคของ 2 + ${renderRadical(2, 3)} คืออะไร`, q_en:`Conjugate of 2 + ${renderRadical(2, 3)} is?`, a_th:["2 - ${renderRadical(2, 3)}", "-2 + ${renderRadical(2, 3)}", "-2 - ${renderRadical(2, 3)}", "1"], a_en:["2 - ${renderRadical(2, 3)}", "-2 + ${renderRadical(2, 3)}", "-2 - ${renderRadical(2, 3)}", "1"], correct: 0, th:"ใบ้: เปลี่ยนเครื่องหมาย", en:"Tip: Flip the sign.", detail:"เปลี่ยนเครื่องหมายตรงกลาง"},
    {q_th:`(1 + ${renderRadical(2, 2)})(1 - ${renderRadical(2, 2)}) เท่ากับเท่าใด`, q_en:`(1 + ${renderRadical(2, 2)})(1 - ${renderRadical(2, 2)}) = ?`, a_th:["-1", "1", "3", "0"], a_en:["-1", "1", "3", "0"], correct: 0, th:"ใบ้: หน้า^2 - หลัง^2", en:"Tip: a^2 - b^2.", detail:"(1^2) - (2) = -1"},
    {q_th:`ทำให้ส่วนไม่ติดราก: 1/${renderRadical(2, 3)}`, q_en:`Rationalize 1/${renderRadical(2, 3)}`, a_th:["${renderRadical(2, 3)}/3", "3${renderRadical(2, 3)}", "${renderRadical(2, 3)}", "1"], a_en:["${renderRadical(2, 3)}/3", "3${renderRadical(2, 3)}", "${renderRadical(2, 3)}", "1"], correct: 0, th:"ใบ้: คูณบนล่างด้วยราก", en:"Tip: Multiply by radical.", detail:"คูณ&radic;3 ทั้งเศษและส่วน"},
    {q_th:`ถ้า ${renderRadical(2, 'x')} = 6 แล้ว x คือเท่าใด`, q_en:`If ${renderRadical(2, 'x')} = 6, x = ?`, a_th:["6", "12", "36", "3"], a_en:["6", "12", "36", "3"], correct: 2, th:"ใบ้: 6^2", en:"Tip: 6^2.", detail:"6 x 6 = 36"},
    {q_th:`${renderRadical(4, 16)} มีค่าเท่าใด`, q_en:`What is ${renderRadical(4, 16)}?`, a_th:["2", "-2", "4", "ไม่มีคำตอบ"], a_en:["2", "-2", "4", "None"], correct: 0, th:"ใบ้: 2^4 = 16", en:"Tip: 2^4 = 16.", detail:"รากที่ 4 ของ 16 คือ 2"},
    {q_th:`${renderRadical(5, 32)} มีค่าเท่าใด`, q_en:`What is ${renderRadical(5, 32)}?`, a_th:["2", "-2", "4", "8"], a_en:["2", "-2", "4", "8"], correct: 0, th:"ใบ้: 2^5 = 32", en:"Tip: 2^5 = 32.", detail:"2^5 = 32"},
    {q_th:`ถ้า ${renderRadical(3, 'x')} = -2 แล้ว x คือ?`, q_en:`If ${renderRadical(3, 'x')} = -2, x = ?`, a_th:["8", "-8", "4", "-4"], a_en:["8", "-8", "4", "-4"], correct: 1, th:"ใบ้: (-2)^3", en:"Tip: (-2)^3.", detail:"(-2)^3 = -8"},
    {q_th:`${renderRadical(2, 'x^2')} = 5, x เป็นได้กี่ค่า`, q_en:`${renderRadical(2, 'x^2')} = 5, how many values for x?`, a_th:["1", "2", "0", "ไม่จำกัด"], a_en:["1", "2", "0", "Infinite"], correct: 1, th:"ใบ้: 5 และ -5", en:"Tip: 5 and -5.", detail:"x เป็นได้ทั้ง 5 และ -5"},
    {q_th:`${renderRadical(6, 64)} = ?`, q_en:`${renderRadical(6, 64)} = ?`, a_th:["2", "4", "6", "8"], a_en:["2", "4", "6", "8"], correct: 0, th:"ใบ้: 2^6 = 64", en:"Tip: 2^6 = 64.", detail:"2^6 = 64"},
    {q_th:`(${renderRadical(2, 5)})^2 = ?`, q_en:`(${renderRadical(2, 5)})^2 = ?`, a_th:["5", "25", "10", "${renderRadical(2, 5)}"], a_en:["5", "25", "10", "${renderRadical(2, 5)}"], correct: 0, th:"ใบ้: รากยกกำลังสองหาย", en:"Tip: Square cancels root.", detail:"รากที่ 2 เจอกำลัง 2 หักล้างกัน"},
    {q_th:`${renderRadical(3, 'x')} = 0 แล้ว x คือ?`, q_en:`If ${renderRadical(3, 'x')} = 0, x = ?`, a_th:["0", "1", "-1", "ไม่มีคำตอบ"], a_en:["0", "1", "-1", "None"], correct: 0, th:"ใบ้: 0 คูณกันกี่ครั้งก็ได้ 0", en:"Tip: 0^n = 0.", detail:"0 ยกกำลังอะไรก็ได้ 0"},
    {q_th:`${renderRadical(4, 'x')} = 3 แล้ว x คือ?`, q_en:`If ${renderRadical(4, 'x')} = 3, x = ?`, a_th:["9", "27", "81", "12"], a_en:["9", "27", "81", "12"], correct: 2, th:"ใบ้: 3^4 = 81", en:"Tip: 3^4 = 81.", detail:"3^4 = 81"},
    {q_th:`${renderRadical(2, 100)} - ${renderRadical(2, 64)} = ?`, q_en:`${renderRadical(2, 100)} - ${renderRadical(2, 64)} = ?`, a_th:["&radic;36", "6", "2", "1"], a_en:["&radic;36", "6", "2", "1"], correct: 2, th:"ใบ้: 10 - 8", en:"Tip: 10 - 8.", detail:"10 - 8 = 2"},
    {q_th:`${renderRadical(3, 27)} + ${renderRadical(3, 8)} = ?`, q_en:`${renderRadical(3, 27)} + ${renderRadical(3, 8)} = ?`, a_th:["5", "6", "1", "35"], a_en:["5", "6", "1", "35"], correct: 0, th:"ใบ้: 3 + 2", en:"Tip: 3 + 2.", detail:"3 + 2 = 5"},
    {q_th:`รากที่ 2 ของ 100 มีกี่ค่าที่เป็นจำนวนจริง`, q_en:`How many real square roots of 100?`, a_th:["1", "2", "0", "ไม่จำกัด"], a_en:["1", "2", "0", "Infinite"], correct: 1, th:"ใบ้: 10 และ -10", en:"Tip: 10 and -10.", detail:"รากที่สองของบวกมี 2 ค่า"}
];

let lang = 'th';
let userAnswers = new Array(questions.length).fill(null);

function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }

function checkAnswer(qIdx, selectedIdx) {
    if (userAnswers[qIdx] !== null) return; // Prevent double click
    userAnswers[qIdx] = selectedIdx;
    
    const res = document.getElementById('res' + qIdx);
    const detail = document.getElementById('detail' + qIdx);
    const correct = questions[qIdx].correct;
    
    detail.style.display = 'block';
    
    if (selectedIdx === correct) {
        res.innerHTML = '<span class="correct">✔ ถูกต้อง!</span>';
    } else {
        res.innerHTML = `<span class="incorrect">✘ ผิด เฉลยคือข้อที่ ${correct + 1}</span>`;
    }

    // Disable all radio buttons for this question
    const radios = document.getElementsByName('q' + qIdx);
    radios.forEach(r => r.disabled = true);
}

function render() {
    const area = document.getElementById('quiz-area'); area.innerHTML = '';
    questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'question-container';
        div.innerHTML = `<h3>${idx+1}. ${lang === 'th' ? q.q_th : q.q_en}</h3>
            <div class="clue">${lang === 'th' ? q.th : q.en}</div>
            ${(lang === 'th' ? q.a_th : q.a_en).map((opt, i) => 
                `<label><input type="radio" name="q${idx}" value="${i}" onclick="checkAnswer(${idx}, ${i})" ${userAnswers[idx] !== null ? 'disabled' : ''}> ${opt}</label><br>`
            ).join('')}
            <div id="res${idx}" class="result"></div>
            <div id="detail${idx}" style="display:${userAnswers[idx] !== null ? 'block' : 'none'}; margin-top:10px; color:#555; background:#f9f9f9; padding:10px; border-radius:5px;">
                <strong>${lang === 'th' ? 'คำอธิบาย:' : 'Explanation:'}</strong> ${q.detail}
            </div>`;
        area.appendChild(div);
    });
}

function submitExam() {
    let score = 0;
    let attempted = 0;
    userAnswers.forEach((ans, idx) => {
        if (ans !== null) {
            attempted++;
            if (ans === questions[idx].correct) score++;
        }
    });
    alert(`สรุปผลการสอบ\nคะแนนที่ได้: ${score} / ${questions.length} คะแนน\nระบบได้จำลองการส่งข้อมูลคะแนนไปยัง thee.chinpong@hmail.com แล้ว`);
}
render();
</script>
</body>
</html>
