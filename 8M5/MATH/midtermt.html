<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คู่มือครู: เฉลยละเอียดคณิตศาสตร์ ม.5 (ฉบับเจาะลึก)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 20px; background: #f0f2f5; }
        .summary { background: #fff; padding: 25px; border-radius: 12px; border-left: 8px solid #2c3e50; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-card { background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .teacher-box { margin-top: 15px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .step-list { background: #fff; padding: 10px; border: 1px dashed #3498db; margin: 8px 0; border-radius: 5px; font-size: 0.95em; }
        .note { color: #c0392b; font-weight: bold; margin-top: 10px; display: block; }
        h2 { color: #2c3e50; }
        .math { font-family: 'Times New Roman', serif; font-size: 1.2em; color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="summary">
    <h2>คู่มือครู: เฉลยละเอียดและขั้นตอนการสอน (เจาะลึกสำหรับนักเรียนเรียนช้า)</h2>
    <p><em>คำแนะนำสำหรับครู:</em> ส่วนนี้ได้ขยายความทุกจุดทศนิยมและทุกการย้ายข้าง เพื่อให้นักเรียนเห็นภาพรวมของการเคลื่อนที่ของตัวเลขแต่ละตัว</p>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "(2<sup>3</sup> × 2<sup>4</sup>) ÷ 2<sup>5</sup>", ans: "4", steps: ["สังเกตฐานทุกตัวเป็นเลข 2 เท่ากันหมด", "ทำในวงเล็บก่อน: ฐานเหมือนกันคูณกัน ให้นำเลขชี้กำลังมาบวกกัน (3 + 4 = 7) ได้ 2<sup>7</sup>", "นำผลที่ได้มาหาร: ฐานเหมือนกันหารกัน ให้นำเลขชี้กำลังมาลบกัน (7 - 5 = 2)", "สรุปคำตอบ: 2<sup>2</sup> คือ 2 × 2 ได้เท่ากับ 4"], point: "เน้นย้ำเรื่องฐานต้องเท่ากันก่อนจึงใช้กฎการบวก-ลบเลขชี้กำลังได้" },
        { q: "(3<sup>-2</sup> × 27<sup>2</sup>) ÷ 9<sup>3</sup>", ans: "1/9", steps: ["เปลี่ยนทุกฐานให้เป็น 3: 27 คือ 3<sup>3</sup> และ 9 คือ 3<sup>2</sup>", "แทนค่ากลับ: (3<sup>-2</sup> × (3<sup>3</sup>)<sup>2</sup>) ÷ (3<sup>2</sup>)<sup>3</sup>", "ใช้กฎเลขชี้กำลังซ้อน (คูณกัน): ได้ (3<sup>-2</sup> × 3<sup>6</sup>) ÷ 3<sup>6</sup>", "รวมเลขชี้กำลังตัวเศษ (บวก): -2 + 6 = 4 ได้ 3<sup>4</sup> ÷ 3<sup>6</sup>", "หารเลขชี้กำลัง (ลบ): 4 - 6 = -2 ได้ 3<sup>-2</sup>", "เลขชี้กำลังติดลบให้กลับเป็นเศษส่วน: 1 / 3<sup>2</sup> = 1/9"], point: "การแตกฐานเป็นเลขจำนวนเฉพาะคือขั้นตอนที่สำคัญที่สุด" },
        { q: "รากที่ 4 ของ 16<sup>2</sup>", ans: "4", steps: ["เปลี่ยน 16 ให้เป็นเลขยกกำลังฐาน 2: 16 = 2 × 2 × 2 × 2 = 2<sup>4</sup>", "โจทย์กลายเป็นรากที่ 4 ของ (2<sup>4</sup>)<sup>2</sup>", "เลขชี้กำลังซ้อน: (2<sup>4</sup>)<sup>2</sup> = 2<sup>8</sup>", "เปลี่ยนรากที่ 4 เป็นเลขชี้กำลัง 1/4: (2<sup>8</sup>)<sup>1/4</sup>", "คูณเลขชี้กำลัง: 8 × (1/4) = 8/4 = 2", "ได้คำตอบ 2<sup>2</sup> = 4"], point: "สอนให้เปลี่ยนรากเป็นเลขชี้กำลังเศษส่วนเสมอจะทำให้นักเรียนไม่งง" },
        { q: "(8<sup>2/3</sup>) × (16<sup>1/4</sup>)", ans: "8", steps: ["เปลี่ยน 8 เป็น 2<sup>3</sup> จะได้ (2<sup>3</sup>)<sup>2/3</sup>", "คูณเลขชี้กำลัง: 3 × (2/3) = 2 ได้ 2<sup>2</sup> = 4", "เปลี่ยน 16 เป็น 2<sup>4</sup> จะได้ (2<sup>4</sup>)<sup>1/4</sup>", "คูณเลขชี้กำลัง: 4 × (1/4) = 1 ได้ 2<sup>1</sup> = 2", "นำผลลัพธ์มาคูณกัน: 4 × 2 = 8"], point: "ทำทีละวงเล็บให้เสร็จก่อน แล้วค่อยนำมาคูณกันตอนท้าย" },
        { q: "(0.25)<sup>-0.5</sup>", ans: "2", steps: ["เปลี่ยน 0.25 ให้เป็นเศษส่วน: 0.25 = 25/100 = 1/4", "เลขชี้กำลังติดลบ -0.5 คือ -1/2", "ใช้กฎเลขชี้กำลังติดลบ: กลับ 1/4 เป็น 4/1 และเปลี่ยนเลขชี้กำลังเป็นบวกคือ 1/2", "4<sup>1/2</sup> หมายถึงรากที่สองของ 4 ซึ่งคือ 2"], point: "นักเรียนมักงงทศนิยม ให้ย้ำการเปลี่ยนเป็นเศษส่วนก่อนทุกครั้ง" },
        { q: "(5<sup>n+2</sup> - 5<sup>n</sup>) ÷ 5<sup>n+1</sup>", ans: "4.8", steps: ["แยกเลขชี้กำลัง 5<sup>n+2</sup> เป็น 5<sup>n</sup> × 5<sup>2</sup>", "ตัวเศษคือ (5<sup>n</sup> × 25) - (5<sup>n</sup> × 1)", "ดึงตัวร่วม 5<sup>n</sup> ออกมา: 5<sup>n</sup> × (25 - 1) = 5<sup>n</sup> × 24", "ตัวส่วนแยกเป็น: 5<sup>n</sup> × 5<sup>1</sup>", "เอาตัวเศษตั้งหารตัวส่วน: (5<sup>n</sup> × 24) ÷ (5<sup>n</sup> × 5)", "ตัด 5<sup>n</sup> ออกทั้งเศษและส่วน: 24 ÷ 5 = 4.8"], point: "ให้ชี้ให้เด็กเห็นว่า 5<sup>n</sup> คือตัวแปรหนึ่งที่ตัดกันได้" },
        { q: "รากที่ 3 ของ 0.008", ans: "0.2", steps: ["เปลี่ยนทศนิยมเป็นเศษส่วน: 0.008 = 8/1000", "โจทย์กลายเป็นรากที่ 3 ของ (8/1000)", "รากที่ 3 ของ 8 คือ 2 (เพราะ 2×2×2 = 8)", "รากที่ 3 ของ 1000 คือ 10 (เพราะ 10×10×10 = 1000)", "คำตอบคือ 2/10 = 0.2"], point: "ย้ำว่ารากที่ 3 ต้องนับตำแหน่งทศนิยมเป็นกลุ่มละ 3" },
        { q: "ถ้า 2<sup>x</sup> = 32", ans: "5", steps: ["นักเรียนต้องลองกระจาย 32: 2×2=4, 4×2=8, 8×2=16, 16×2=32", "นับจำนวนเลข 2 ที่คูณกัน: มี 5 ตัว", "เขียนใหม่: 2<sup>x</sup> = 2<sup>5</sup>", "ฐานเหมือนกันแล้ว ตัดฐานทิ้งได้เลย: x = 5"], point: "ถ้าเลขไม่เยอะ ให้เด็กฝึกใช้วิธีคูณไล่ไปเรื่อยๆ จะเข้าใจง่าย" },
        { q: "(-2)<sup>4</sup>", ans: "16", steps: ["ความหมายคือเอา -2 มาคูณกัน 4 ครั้ง", "(-2) × (-2) = 4", "(4) × (-2) = -8", "(-8) × (-2) = 16", "สรุป: ลบ × ลบ = บวก เสมอ"], point: "เขียนออกมาให้เห็นชัดๆ ว่าลบหายไปได้อย่างไร" },
        { q: "-2<sup>4</sup>", ans: "-16", steps: ["ความหมายคือ ลบของ (2 × 2 × 2 × 2)", "คำนวณในวงเล็บก่อน: 2 × 2 × 2 × 2 = 16", "ใส่เครื่องหมายลบที่รออยู่ข้างนอก: -16"], point: "นี่คือจุดที่พลาดง่ายที่สุด ย้ำเรื่องลำดับความสำคัญของเครื่องหมาย" },
        { q: "(27<sup>1/3</sup> + 8<sup>1/3</sup>)<sup>2</sup>", ans: "25", steps: ["รากที่ 3 ของ 27 คือ 3", "รากที่ 3 ของ 8 คือ 2", "นำมาบวกกันในวงเล็บ: 3 + 2 = 5", "นำผลลัพธ์มายกกำลังสอง: 5 × 5 = 25"], point: "ทำทีละขั้น อย่าลัดขั้นตอนไปหาเลขยกกำลังข้างนอก" },
        { q: "100<sup>0.5</sup> × 10<sup>-1</sup>", ans: "1", steps: ["0.5 คือ 1/2 หมายถึงรากที่สอง", "รากที่สองของ 100 คือ 10", "10<sup>-1</sup> คือ 1/10", "คำนวณ: 10 × (1/10) = 10/10 = 1"], point: "สอนให้เด็กจำว่า 0.5 คือรากที่สองเสมอ" },
        { q: "(a<sup>2</sup>b<sup>3</sup>)<sup>2</sup> × a<sup>-3</sup>", ans: "ab<sup>6</sup>", steps: ["กระจายเลขชี้กำลัง 2 เข้าไปคูณตัวข้างใน: a<sup>2×2</sup> และ b<sup>3×2</sup>", "ได้เป็น a<sup>4</sup>b<sup>6</sup>", "นำไปคูณกับ a<sup>-3</sup>", "เอาฐานเหมือนกันมาทำกัน: a<sup>4</sup> × a<sup>-3</sup> = a<sup>4-3</sup> = a<sup>1</sup>", "b ไม่มีตัวคูณก็ดึงมาเลย: b<sup>6</sup>"], point: "สอนให้จัดการทีละตัวแปร (จัดการ a ก่อน แล้วค่อยจัดการ b)" },
        { q: "รากที่ 3 ของ (125 × 64)", ans: "20", steps: ["แยกราก: รากที่ 3 ของ 125 คูณ รากที่ 3 ของ 64", "คิดราก 125: อะไรคูณกัน 3 ครั้งได้ 125? คือ 5", "คิดราก 64: อะไรคูณกัน 3 ครั้งได้ 64? คือ 4", "นำผลลัพธ์มาคูณกัน: 5 × 4 = 20"], point: "การแยกรากจะช่วยให้เลขดูน้อยลงและคิดง่ายขึ้น" },
        { q: "ถ้า 9<sup>x</sup> = 27", ans: "1.5", steps: ["ฐานคือ 9 และ 27 ทำเป็นฐาน 3 ได้ทั้งคู่", "9 = 3<sup>2</sup> ดังนั้น 9<sup>x</sup> = (3<sup>2</sup>)<sup>x</sup> = 3<sup>2x</sup>", "27 = 3<sup>3</sup>", "ได้สมการ: 3<sup>2x</sup> = 3<sup>3</sup>", "ตัดฐาน 3 ทิ้ง: 2x = 3", "ย้าย 2 ไปหาร: x = 3 ÷ 2 = 1.5"], point: "เน้นย้ำว่าถ้าเจอฐานไม่เหมือนกัน ให้หาเลขตัวเล็กสุดที่ทำเป็นฐานได้" },
        { q: "(2<sup>5</sup> × 3<sup>5</sup>) ÷ 6<sup>4</sup>", ans: "6", steps: ["สังเกตเลขชี้กำลังเป็น 5 เท่ากัน: ยุบฐานได้เลย (2 × 3)<sup>5</sup> = 6<sup>5</sup>", "กลายเป็น 6<sup>5</sup> ÷ 6<sup>4</sup>", "หารกัน (ฐานเหมือนกัน): นำเลขชี้กำลังมาลบกัน 5 - 4 = 1", "ได้คำตอบ: 6<sup>1</sup> = 6"], point: "โจทย์ลักษณะนี้ออกแบบมาให้ยุบฐานได้" },
        { q: "(1/2)<sup>-3</sup>", ans: "8", steps: ["เลขชี้กำลังติดลบ: กลับเศษส่วน 1/2 เป็น 2/1 (หรือแค่ 2)", "เลขชี้กำลังเปลี่ยนเป็นบวก: 2<sup>3</sup>", "ความหมายคือ 2 × 2 × 2", "คำนวณ: 8"], point: "ถ้าเห็นเศษส่วนยกกำลังติดลบ ให้กลับตัวเลขแล้วจะชีวิตง่ายขึ้นมาก" },
        { q: "รากที่ 3 ของ (x<sup>6</sup>y<sup>3</sup>)", ans: "x<sup>2</sup>y", steps: ["เปลี่ยนรากที่ 3 เป็นเลขชี้กำลัง 1/3", "นำ 1/3 ไปคูณเลขชี้กำลังข้างในทีละตัว: x<sup>6×(1/3)</sup> และ y<sup>3×(1/3)</sup>", "คำนวณเลข: 6 ÷ 3 = 2 และ 3 ÷ 3 = 1", "ได้คำตอบ: x<sup>2</sup>y<sup>1</sup> (หรือ x<sup>2</sup>y)"], point: "อธิบายว่าเลขในรากทุกคนต้องถูกหารด้วยเลขตัวนอกราก" },
        { q: "(4<sup>1/2</sup> + 9<sup>1/2</sup>) ÷ 5", ans: "1", steps: ["4<sup>1/2</sup> คือรากที่สองของ 4 = 2", "9<sup>1/2</sup> คือรากที่สองของ 9 = 3", "นำมาบวกกันในวงเล็บ: 2 + 3 = 5", "หารด้วย 5: 5 ÷ 5 = 1"], point: "ต้องบวกในวงเล็บให้เสร็จก่อนทำการหาร" },
        { q: "(3<sup>n+1</sup> + 3<sup>n</sup>) ÷ 4", ans: "3<sup>n</sup>", steps: ["แตก 3<sup>n+1</sup> ให้เป็น 3<sup>n</sup> × 3<sup>1</sup>", "ตัวเศษคือ (3<sup>n</sup> × 3) + (3<sup>n</sup> × 1)", "ดึงตัวร่วม 3<sup>n</sup>: 3<sup>n</sup> × (3 + 1) = 3<sup>n</sup> × 4", "นำไปหารด้วย 4: (3<sup>n</sup> × 4) ÷ 4", "ตัด 4 ทิ้งไป: เหลือ 3<sup>n</sup>"], point: "สอนนักเรียนว่าเลขยกกำลังบวกกัน ดึงตัวร่วมคือวิธีแก้ที่ดีที่สุด" },
        { q: "รากที่ 4 ของ 81 + รากที่ 3 ของ -8", ans: "1", steps: ["หาค่ารากที่ 4 ของ 81: 3×3×3×3 = 81 ได้ 3", "หาค่ารากที่ 3 ของ -8: (-2)×(-2)×(-2) = -8 ได้ -2", "นำมาบวกกัน: 3 + (-2) = 1"], point: "รากที่ 3 หรือรากเลขคี่ สามารถถอดค่าติดลบได้" },
        { q: "ถ้า x<sup>2</sup> = 16 และ x < 0", ans: "-4", steps: ["เลขที่ยกกำลัง 2 ได้ 16 มีสองตัวคือ 4 และ -4", "โจทย์กำหนดเงื่อนไขสำคัญมากคือ x < 0 (ต้องเป็นเลขลบ)", "ระหว่าง 4 กับ -4 ตัวที่น้อยกว่า 0 คือ -4", "สรุปค่า x = -4"], point: "ย้ำเรื่องเงื่อนไขที่โจทย์แอบไว้ให้" },
        { q: "(5<sup>2</sup>)<sup>0</sup>", ans: "1", steps: ["จำกฎเหล็กไว้: อะไรก็ตาม (ที่ไม่ใช่ 0) ยกกำลัง 0 มีค่าเท่ากับ 1", "แม้จะคำนวณในวงเล็บก่อน (5<sup>2</sup> = 25) แล้วค่อยยกกำลัง 0 ก็ได้ 25<sup>0</sup> = 1"], point: "ไม่ต้องไปสนใจเลขข้างในถ้าข้างนอกมีเลข 0 อยู่" },
        { q: "(2<sup>3</sup>)<sup>2</sup> ÷ 8", ans: "8", steps: ["ทำเลขชี้กำลังซ้อน: (2<sup>3</sup>)<sup>2</sup> = 2<sup>6</sup> = 64", "เปลี่ยน 8 เป็นฐาน 2 เพื่อให้ง่ายขึ้น: 8 = 2<sup>3</sup>", "หารเลขชี้กำลัง: 2<sup>6</sup> ÷ 2<sup>3</sup> = 2<sup>6-3</sup> = 2<sup>3</sup>", "คำนวณ: 2<sup>3</sup> = 8"], point: "เปลี่ยนฐานให้เป็นเลขเดียวกันหมดทุกตัว แล้วจะหารเลขง่ายมาก" },
        { q: "(a<sup>m</sup>)<sup>n</sup> × a<sup>p</sup>", ans: "a<sup>mn+p</sup>", steps: ["เลขชี้กำลังซ้อนกันให้คูณกัน: (a<sup>m</sup>)<sup>n</sup> เป็น a<sup>m×n</sup> = a<sup>mn</sup>", "ฐาน a เหมือนกันคูณกัน: ให้นำเลขชี้กำลังมาบวกกัน", "รวมเลขชี้กำลัง: mn + p", "คำตอบ: a<sup>mn+p</sup>"], point: "เป็นการสรุปกฎพื้นฐานของเลขยกกำลัง" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        let stepsHtml = item.steps.map((step, i) => `<div class="step-list"><b>ขั้นตอนที่ ${i + 1}:</b> ${step}</div>`).join('');
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> <span class="math">${item.q}</span></p>
            <div class="teacher-box">
                <p><b>เฉลย:</b> ${item.ans}</p>
                <b>ขั้นตอนการสอนอย่างละเอียด:</b> ${stepsHtml}
                <span class="note">จุดเน้นย้ำสำหรับเด็ก: ${item.point}</span>
            </div>
        `;
        container.appendChild(div);
    });
</script>

</body>
</html>
