<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คู่มือครู: ข้อสอบคณิตศาสตร์ ม.5 - เลขยกกำลังและราก</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 20px; background: #f0f2f5; }
        .summary { background: #fff; padding: 25px; border-radius: 12px; border-left: 8px solid #34495e; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-card { background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .teacher-box { margin-top: 15px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .note { color: #c0392b; font-weight: bold; margin-top: 10px; display: block; }
        h1, h2 { color: #2c3e50; }
        code { background: #eee; padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="summary">
    <h2>คู่มือครู: เฉลยและวิเคราะห์ข้อสอบคณิตศาสตร์ ม.5</h2>
    <p><strong>วิชา:</strong> เลขยกกำลังและรากที่ n | <strong>จำนวน:</strong> 25 ข้อ</p>
    <p><em>หมายเหตุสำหรับครู:</em> เนื้อหาชุดนี้เน้นการวิเคราะห์ฐานและการดึงตัวร่วม ซึ่งเป็นจุดที่นักเรียนมักทำพลาด</p>
</div>

<div id="quiz-container">
    </div>

<script>
    const questions = [
        { q: "ค่าของ (2^3 * 2^4) / 2^5 คือข้อใด", ans: "4", steps: "2^(3+4) = 2^7; 2^7 / 2^5 = 2^(7-5) = 2^2 = 4", point: "ระวังนักเรียนนำเลขชี้กำลังมาคูณกันแทนที่จะบวก" },
        { q: "ค่าของ (3^-2 * 27^2) / 9^3 คือข้อใด", ans: "1/9", steps: "(3^-2 * (3^3)^2) / (3^2)^3 = 3^-2+6 / 3^6 = 3^4 / 3^6 = 3^-2 = 1/9", point: "ต้องเปลี่ยนฐานให้เป็น 3 ทุกพจน์ก่อนเริ่มคำนวณ" },
        { q: "รากที่ 4 ของ 16^2 มีค่าเท่ากับเท่าใด", ans: "4", steps: "(2^4)^2 ^(1/4) = 2^(8/4) = 2^2 = 4", point: "แนะนำให้นักเรียนเปลี่ยนรากที่ n ให้เป็นเลขชี้กำลัง 1/n จะง่ายกว่า" },
        { q: "จงหาค่าของ (8^2/3) * (16^1/4)", ans: "8", steps: "(2^3)^(2/3) * (2^4)^(1/4) = 2^2 * 2^1 = 4 * 2 = 8", point: "เน้นการจำเลขยกกำลังพื้นฐานของ 2 และ 3" },
        { q: "ค่าของ (0.25)^-0.5 มีค่าเท่ากับเท่าใด", ans: "2", steps: "(1/4)^-1/2 = 4^1/2 = 2", point: "เลขชี้กำลังติดลบคือการกลับเศษเป็นส่วนที่ทรงพลังที่สุด" },
        { q: "ผลลัพธ์ของ (5^(n+2) - 5^n) / 5^(n+1) คือข้อใด", ans: "4.8", steps: "5^n(5^2 - 1) / 5^n(5) = 24 / 5 = 4.8", point: "สอนวิธีดึงตัวร่วม 'เลขชี้กำลังที่น้อยที่สุด' ออกมาเสมอ" },
        { q: "ค่าของ รากที่ 3 ของ 0.008 มีค่าเท่าใด", ans: "0.2", steps: "รากที่ 3 ของ (0.2)^3 = 0.2", point: "ให้นับจำนวนตำแหน่งทศนิยมก่อนถอดราก ถ้าเป็นรากที่ 3 ทศนิยมต้องหารด้วย 3 ลงตัว" },
        { q: "ถ้า 2^x = 32 แล้ว x มีค่าเท่าใด", ans: "5", steps: "2^x = 2^5, ดังนั้น x = 5", point: "เป็นพื้นฐานสมการเลขยกกำลัง ให้จำ 2^1 ถึง 2^10" },
        { q: "ค่าของ ((-2)^4) คือเท่าใด", ans: "16", steps: "(-2)*(-2)*(-2)*(-2) = 16", point: "วงเล็บสำคัญมาก! เลขชี้กำลังคู่ทำให้ค่าเป็นบวกเสมอ" },
        { q: "ค่าของ -2^4 คือเท่าใด", ans: "-16", steps: "-(2*2*2*2) = -16", point: "ชี้ให้เห็นความต่างระหว่าง (-2)^4 กับ -2^4" },
        { q: "จงหาค่าของ (27^1/3 + 8^1/3)^2", ans: "25", steps: "(3 + 2)^2 = 5^2 = 25", point: "ทำในวงเล็บก่อนเสมอ อย่ากระจายเลขชี้กำลังเข้าในผลบวก" },
        { q: "ค่าของ 100^0.5 * 10^-1 คือเท่าใด", ans: "1", steps: "10 * 0.1 = 1", point: "ย้ำว่า x^0.5 คือ รากที่สอง" },
        { q: "จงหาค่าของ (a^2b^3)^2 * a^-3", ans: "ab^6", steps: "a^4b^6 * a^-3 = a^(4-3)b^6 = ab^6", point: "ฐานต่างกันห้ามนำชี้กำลังมาปนกัน" },
        { q: "ค่าของ รากที่ 3 ของ (125 * 64) คือข้อใด", ans: "20", steps: "รากที่ 3 ของ 125 คูณ รากที่ 3 ของ 64 = 5 * 4 = 20", point: "สมบัติราก: สามารถแยกถอดได้ถ้าเป็นคูณ" },
        { q: "ถ้า 9^x = 27 แล้ว x คือค่าใด", ans: "1.5", steps: "(3^2)^x = 3^3 => 2x = 3 => x = 1.5", point: "ถ้านักเรียนมองไม่เห็นฐานร่วม ให้เปลี่ยนเป็นเลขจำนวนเฉพาะทันที" },
        { q: "ค่าของ (2^5 * 3^5) / 6^4", ans: "6", steps: "(6^5) / 6^4 = 6^1 = 6", point: "ถ้าเลขชี้กำลังเท่ากัน ให้นำฐานมาคูณกันก่อน" },
        { q: "จงหาค่าของ (1/2)^-3", ans: "8", steps: "2^3 = 8", point: "เทคนิคการกลับเศษส่วนเพื่อกำจัดลบที่ชี้กำลัง" },
        { q: "ค่าของ รากที่ 3 ของ (x^6y^3)", ans: "x^2y", steps: "x^(6/3)y^(3/3) = x^2y", point: "รากที่ n คือการเอา n ไปหารเลขชี้กำลัง" },
        { q: "ค่าของ (4^1/2 + 9^1/2) / 5", ans: "1", steps: "(2 + 3) / 5 = 1", point: "ทบทวนเรื่องรากที่สองของเลขกำลังสองสมบูรณ์" },
        { q: "ค่าของ (3^(n+1) + 3^n) / 4", ans: "3^n", steps: "3^n(3+1) / 4 = 3^n(4)/4 = 3^n", point: "สอนการจัดรูป 3^(n+1) ให้เป็น 3^n * 3" },
        { q: "ค่าของ รากที่ 4 ของ 81 + รากที่ 3 ของ -8", ans: "1", steps: "3 + (-2) = 1", point: "รากคู่ค่าในต้องห้ามลบ รากคี่ถอดค่าลบได้ค่าลบ" },
        { q: "ถ้า x^2 = 16 และ x < 0 จงหาค่า x", ans: "-4", steps: "(-4)^2 = 16", point: "ย้ำเงื่อนไขโจทย์ x < 0 ห้ามลืมเด็ดขาด" },
        { q: "ค่าของ (5^2)^0", ans: "1", steps: "จำนวนใดๆ ยกกำลัง 0 ได้ 1", point: "ยกเว้น 0^0" },
        { q: "ค่าของ (2^3)^2 หารด้วย 8", ans: "8", steps: "2^6 / 2^3 = 2^3 = 8", point: "ฐาน 8 คือ 2^3" },
        { q: "จงหาผลลัพธ์ของ (a^m)^n * a^p", ans: "a^(mn+p)", steps: "a^(mn) * a^p = a^(mn+p)", point: "สรุปกฎ: ซ้อนให้คูณ, คูณให้บวก" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}: ${item.q}</b></p>
            <div class="teacher-box">
                <p><b>เฉลย:</b> ${item.ans}</p>
                <p><b>วิธีคิด:</b> <code>${item.steps}</code></p>
                <span class="note">จุดเน้นย้ำ: ${item.point}</span>
            </div>
        `;
        container.appendChild(div);
    });
</script>

</body>
</html>
