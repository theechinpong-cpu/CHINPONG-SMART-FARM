<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คู่มือครู: เฉลยละเอียดคณิตศาสตร์ ม.5</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 20px; background: #f0f2f5; }
        .summary { background: #fff; padding: 25px; border-radius: 12px; border-left: 8px solid #2c3e50; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-card { background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .teacher-box { margin-top: 15px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .step-list { background: #fff; padding: 10px; border: 1px dashed #3498db; margin: 10px 0; border-radius: 5px; }
        .note { color: #c0392b; font-weight: bold; margin-top: 10px; display: block; }
        h2 { color: #2c3e50; }
        .math { font-family: 'Times New Roman', serif; font-size: 1.1em; color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="summary">
    <h2>คู่มือครู: เฉลยละเอียดและขั้นตอนการสอน (Step-by-Step)</h2>
    <p><strong>วิชา:</strong> เลขยกกำลังและรากที่ n | <strong>จำนวน:</strong> 25 ข้อ</p>
    <p><em>คำแนะนำ:</em> ใช้ส่วน "ขั้นตอนการสอน" เพื่อไกด์นักเรียนให้คิดเป็นลำดับขั้นก่อนแสดงคำตอบ</p>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "(2<sup>3</sup> × 2<sup>4</sup>) ÷ 2<sup>5</sup>", ans: "4", steps: ["รวมเลขชี้กำลังของตัวเศษ: 3 + 4 = 7", "นำผลลัพธ์มาลบกับเลขชี้กำลังของตัวส่วน: 7 - 5 = 2", "คำนวณค่าสุดท้าย: 2<sup>2</sup> = 4"], point: "เน้นกฎการบวกเมื่อฐานคูณกัน และการลบเมื่อฐานหารกัน" },
        { q: "(3<sup>-2</sup> × 27<sup>2</sup>) ÷ 9<sup>3</sup>", ans: "1/9", steps: ["เปลี่ยน 27 เป็น 3<sup>3</sup> และ 9 เป็น 3<sup>2</sup>", "จัดรูปเลขชี้กำลัง: 3<sup>-2</sup> × 3<sup>6</sup> ÷ 3<sup>6</sup>", "คำนวณ: 3<sup>-2+6-6</sup> = 3<sup>-2</sup> = 1/9"], point: "การเปลี่ยนฐานให้เป็นจำนวนเฉพาะคือหัวใจสำคัญ" },
        { q: "รากที่ 4 ของ 16<sup>2</sup>", ans: "4", steps: ["เปลี่ยน 16 เป็น 2<sup>4</sup>: (2<sup>4</sup>)<sup>2</sup> = 2<sup>8</sup>", "เปลี่ยนรากที่ 4 เป็นเลขชี้กำลัง 1/4", "ใช้สมบัติ (a<sup>m</sup>)<sup>n</sup>: 8 × (1/4) = 2 ได้ 2<sup>2</sup> = 4"], point: "เตือนนักเรียนว่า รากที่ n = ยกกำลัง 1/n" },
        { q: "(8<sup>2/3</sup>) × (16<sup>1/4</sup>)", ans: "8", steps: ["เปลี่ยน 8 เป็น 2<sup>3</sup> จะได้ (2<sup>3</sup>)<sup>2/3</sup> = 2<sup>2</sup> = 4", "เปลี่ยน 16 เป็น 2<sup>4</sup> จะได้ (2<sup>4</sup>)<sup>1/4</sup> = 2<sup>1</sup> = 2", "นำผลลัพธ์มาคูณกัน: 4 × 2 = 8"], point: "ฝึกความคล่องตัวในการเปลี่ยนเลขฐาน" },
        { q: "(0.25)<sup>-0.5</sup>", ans: "2", steps: ["เปลี่ยนทศนิยมเป็นเศษส่วน: 0.25 = 1/4", "เลขชี้กำลังติดลบ: กลับเศษส่วนเป็น 4, เลขชี้กำลังเป็น 0.5 (หรือ 1/2)", "4<sup>1/2</sup> คือ รากที่สองของ 4 ได้ 2"], point: "เลขชี้กำลังติดลบคือการกลับเศษเป็นส่วน" },
        { q: "(5<sup>n+2</sup> - 5<sup>n</sup>) ÷ 5<sup>n+1</sup>", ans: "4.8", steps: ["ดึงตัวร่วม 5<sup>n</sup> ออกจากเศษ: 5<sup>n</sup>(5<sup>2</sup> - 1)", "ตัวส่วนคือ 5<sup>n</sup> × 5<sup>1</sup>", "ตัด 5<sup>n</sup> ทิ้ง: (25-1) ÷ 5 = 24 ÷ 5 = 4.8"], point: "การดึงตัวร่วมที่เลขชี้กำลังต่ำสุดช่วยลดความซับซ้อน" },
        { q: "รากที่ 3 ของ 0.008", ans: "0.2", steps: ["เขียน 0.008 เป็นเศษส่วน: 8/1000", "ถอดรากที่ 3 ของ 8 ได้ 2 และ 1000 ได้ 10", "คำตอบคือ 2/10 = 0.2"], point: "การเปลี่ยนทศนิยมเป็นเศษส่วนช่วยให้เห็นภาพชัดขึ้น" },
        { q: "ถ้า 2<sup>x</sup> = 32", ans: "5", steps: ["เขียน 32 ในรูปเลขยกกำลังฐาน 2: 32 = 2 × 2 × 2 × 2 × 2 = 2<sup>5</sup>", "เปรียบเทียบฐาน: 2<sup>x</sup> = 2<sup>5</sup>", "สรุปค่า x = 5"], point: "ควรจำเลขยกกำลังฐาน 2 ให้แม่น (2<sup>1</sup>-2<sup>10</sup>)" },
        { q: "(-2)<sup>4</sup>", ans: "16", steps: ["พิจารณาเครื่องหมาย: เลขชี้กำลังคู่ ผลลัพธ์ต้องเป็นบวก", "คำนวณ: (-2) × (-2) × (-2) × (-2) = 16"], point: "เน้นย้ำว่าเครื่องหมายลบอยู่ในวงเล็บต้องนำมาคูณด้วย" },
        { q: "-2<sup>4</sup>", ans: "-16", steps: ["แยกเครื่องหมายลบออกจากตัวเลข: -(2<sup>4</sup>)", "คำนวณ 2<sup>4</sup> ได้ 16", "ใส่เครื่องหมายลบหน้าคำตอบ: -16"], point: "ระวังนักเรียนสับสนระหว่าง (-2)<sup>4</sup> กับ -2<sup>4</sup>" },
        { q: "(27<sup>1/3</sup> + 8<sup>1/3</sup>)<sup>2</sup>", ans: "25", steps: ["หาค่าในราก: 27<sup>1/3</sup> = 3 และ 8<sup>1/3</sup> = 2", "บวกกันในวงเล็บ: 3 + 2 = 5", "ยกกำลังสอง: 5<sup>2</sup> = 25"], point: "ทำตามลำดับในวงเล็บก่อนเสมอ" },
        { q: "100<sup>0.5</sup> × 10<sup>-1</sup>", ans: "1", steps: ["เปลี่ยน 100<sup>0.5</sup> เป็นรากที่สองของ 100 ได้ 10", "เปลี่ยน 10<sup>-1</sup> เป็น 1/10", "คูณกัน: 10 × (1/10) = 1"], point: "ย้ำว่า x<sup>0.5</sup> ก็คือรากที่สอง" },
        { q: "(a<sup>2</sup>b<sup>3</sup>)<sup>2</sup> × a<sup>-3</sup>", ans: "ab<sup>6</sup>", steps: ["กระจายเลขชี้กำลัง: (a<sup>2</sup>)<sup>2</sup> × (b<sup>3</sup>)<sup>2</sup> = a<sup>4</sup>b<sup>6</sup>", "นำไปคูณกับ a<sup>-3</sup>: a<sup>4-3</sup>b<sup>6</sup>", "ได้ผลลัพธ์ a<sup>1</sup>b<sup>6</sup>"], point: "ฐานต่างกันห้ามนำชี้กำลังมาบวกกัน" },
        { q: "รากที่ 3 ของ (125 × 64)", ans: "20", steps: ["แยกราก: (รากที่ 3 ของ 125) × (รากที่ 3 ของ 64)", "คำนวณ: 5 × 4", "ได้คำตอบ 20"], point: "สมบัติรากที่ n ของผลคูณ คือผลคูณของรากที่ n" },
        { q: "ถ้า 9<sup>x</sup> = 27", ans: "1.5", steps: ["ทำฐานให้เป็น 3: (3<sup>2</sup>)<sup>x</sup> = 3<sup>3</sup>", "ตั้งสมการเลขชี้กำลัง: 2x = 3", "แก้สมการ x = 3/2 หรือ 1.5"], point: "ถ้าฐานไม่เหมือนกัน ให้หาฐานร่วมที่เป็นจำนวนเฉพาะ" },
        { q: "(2<sup>5</sup> × 3<sup>5</sup>) ÷ 6<sup>4</sup>", ans: "6", steps: ["ใช้สมบัติ a<sup>n</sup> × b<sup>n</sup> = (ab)<sup>n</sup>: (2×3)<sup>5</sup> = 6<sup>5</sup>", "นำไปหารด้วย 6<sup>4</sup>: 6<sup>5-4</sup>", "ได้คำตอบ 6<sup>1</sup> = 6"], point: "ถ้าเลขชี้กำลังเท่ากัน ยุบฐานรวมกันได้เลย" },
        { q: "(1/2)<sup>-3</sup>", ans: "8", steps: ["ใช้สมบัติเลขชี้กำลังติดลบ: กลับเศษส่วนเป็น 2/1", "เปลี่ยนเลขชี้กำลังเป็นบวก: 2<sup>3</sup>", "คำนวณ: 8"], point: "การกลับเศษส่วนเป็นวิธีที่เร็วที่สุดในการกำจัดเลขชี้กำลังลบ" },
        { q: "รากที่ 3 ของ (x<sup>6</sup>y<sup>3</sup>)", ans: "x<sup>2</sup>y", steps: ["เปลี่ยนรากที่ 3 เป็นเลขชี้กำลัง 1/3: (x<sup>6</sup>y<sup>3</sup>)<sup>1/3</sup>", "กระจาย 1/3 เข้าไปคูณ: x<sup>6/3</sup> y<sup>3/3</sup>", "ได้ผลลัพธ์ x<sup>2</sup>y"], point: "รากที่ n คือการเอา n ไปหารเลขชี้กำลังทุกตัวข้างใน" },
        { q: "(4<sup>1/2</sup> + 9<sup>1/2</sup>) ÷ 5", ans: "1", steps: ["ถอดรากที่สอง: 4<sup>1/2</sup> = 2 และ 9<sup>1/2</sup> = 3", "บวกกัน: 2 + 3 = 5", "หารด้วย 5: 5 ÷ 5 = 1"], point: "ทบทวนเรื่องเลขกำลังสองสมบูรณ์พื้นฐาน" },
        { q: "(3<sup>n+1</sup> + 3<sup>n</sup>) ÷ 4", ans: "3<sup>n</sup>", steps: ["เขียน 3<sup>n+1</sup> เป็น 3<sup>n</sup> × 3<sup>1</sup>", "ดึงตัวร่วม 3<sup>n</sup>: 3<sup>n</sup>(3+1)", "หารด้วย 4: (3<sup>n</sup> × 4) ÷ 4 = 3<sup>n</sup>"], point: "การแยกเลขชี้กำลังคือหัวใจของการดึงตัวร่วม" },
        { q: "รากที่ 4 ของ 81 + รากที่ 3 ของ -8", ans: "1", steps: ["หาค่า: รากที่ 4 ของ 81 คือ 3", "หาค่า: รากที่ 3 ของ -8 คือ -2", "บวกกัน: 3 + (-2) = 1"], point: "ย้ำว่ารากคี่สามารถติดลบได้ แต่รากคู่ห้าม" },
        { q: "ถ้า x<sup>2</sup> = 16 และ x < 0", ans: "-4", steps: ["พิจารณาค่าที่เป็นไปได้ของ x ที่ยกกำลังสองแล้วได้ 16 คือ 4 หรือ -4", "ใช้เงื่อนไขโจทย์: x < 0", "สรุปค่า x = -4"], point: "อย่าลืมตรวจสอบเงื่อนไขที่โจทย์ให้มาเสมอ" },
        { q: "(5<sup>2</sup>)<sup>0</sup>", ans: "1", steps: ["ใช้สมบัติ: จำนวนใดๆ (ที่ไม่ใช่ 0) ยกกำลัง 0 ได้ 1", "แม้จะเป็นเลขที่ซ้อนกัน 5<sup>2</sup> = 25", "แต่ 25<sup>0</sup> = 1"], point: "กฎเหล็กคือทุกอย่างยกกำลัง 0 ได้ 1" },
        { q: "(2<sup>3</sup>)<sup>2</sup> ÷ 8", ans: "8", steps: ["ทำเลขชี้กำลังซ้อน: (2<sup>3</sup>)<sup>2</sup> = 2<sup>6</sup> = 64", "เปลี่ยน 8 เป็น 2<sup>3</sup>: 64 ÷ 8", "คำนวณ: 8"], point: "เปลี่ยนฐานให้เหมือนกันก่อนหารกันจะง่ายที่สุด" },
        { q: "(a<sup>m</sup>)<sup>n</sup> × a<sup>p</sup>", ans: "a<sup>mn+p</sup>", steps: ["เลขชี้กำลังซ้อนกันให้คูณ: (a<sup>m</sup>)<sup>n</sup> = a<sup>mn</sup>", "ฐานเหมือนกันคูณกันให้บวกเลขชี้กำลัง: a<sup>mn</sup> × a<sup>p</sup>", "ได้คำตอบ: a<sup>mn+p</sup>"], point: "ท่องกฎให้แม่น: ซ้อนให้คูณ, คูณให้บวก" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        let stepsHtml = item.steps.map((step, i) => `<div class="step-list"><b>ขั้นตอนที่ ${i + 1}:</b> ${step}</div>`).join('');
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> <span class="math">${item.q}</span></p>
            <div class="teacher-box">
                <p><b>เฉลย:</b> ${item.ans}</p>
                <b>ขั้นตอนการสอน:</b> ${stepsHtml}
                <span class="note">จุดเน้นย้ำ: ${item.point}</span>
            </div>
        `;
        container.appendChild(div);
    });
</script>

</body>
</html>
