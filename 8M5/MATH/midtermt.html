<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คู่มือครู: ข้อสอบคณิตศาสตร์ ม.5 - เลขยกกำลังและราก</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: auto; padding: 20px; background: #f0f2f5; }
        .summary { background: #fff; padding: 25px; border-radius: 12px; border-left: 8px solid #34495e; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .q-card { background: #fff; padding: 25px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .teacher-box { margin-top: 15px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .note { color: #c0392b; font-weight: bold; margin-top: 10px; display: block; }
        h1, h2 { color: #2c3e50; }
        .math { font-family: 'Times New Roman', serif; font-size: 1.1em; color: #2980b9; }
        sup { font-size: 0.8em; color: #e67e22; }
    </style>
</head>
<body>

<div class="summary">
    <h2>คู่มือครู: เฉลยและวิเคราะห์ข้อสอบคณิตศาสตร์ ม.5</h2>
    <p><strong>วิชา:</strong> เลขยกกำลังและรากที่ n | <strong>จำนวน:</strong> 25 ข้อ</p>
    <p><em>หมายเหตุสำหรับครู:</em> ปรับปรุงรูปแบบให้อ่านง่าย เพื่อความสะดวกในการสอนออนไลน์</p>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "(2<sup>3</sup> × 2<sup>4</sup>) ÷ 2<sup>5</sup>", ans: "4", steps: "2<sup>3+4</sup> = 2<sup>7</sup>; 2<sup>7</sup> ÷ 2<sup>5</sup> = 2<sup>7-5</sup> = 2<sup>2</sup> = 4", point: "ระวังนักเรียนนำเลขชี้กำลังมาคูณกันแทนที่จะบวก" },
        { q: "(3<sup>-2</sup> × 27<sup>2</sup>) ÷ 9<sup>3</sup>", ans: "1/9", steps: "(3<sup>-2</sup> × (3<sup>3</sup>)<sup>2</sup>) ÷ (3<sup>2</sup>)<sup>3</sup> = 3<sup>-2+6</sup> ÷ 3<sup>6</sup> = 3<sup>4</sup> ÷ 3<sup>6</sup> = 3<sup>-2</sup> = 1/9", point: "ต้องเปลี่ยนฐานให้เป็น 3 ทุกพจน์ก่อนเริ่มคำนวณ" },
        { q: "รากที่ 4 ของ 16<sup>2</sup>", ans: "4", steps: "(2<sup>4</sup>)<sup>2</sup> ยกกำลัง 1/4 = 2<sup>8/4</sup> = 2<sup>2</sup> = 4", point: "แนะนำให้นักเรียนเปลี่ยนรากที่ n ให้เป็นเลขชี้กำลังเศษส่วน" },
        { q: "(8<sup>2/3</sup>) × (16<sup>1/4</sup>)", ans: "8", steps: "(2<sup>3</sup>)<sup>2/3</sup> × (2<sup>4</sup>)<sup>1/4</sup> = 2<sup>2</sup> × 2<sup>1</sup> = 4 × 2 = 8", point: "เน้นการจำเลขยกกำลังพื้นฐานของ 2 และ 3" },
        { q: "(0.25)<sup>-0.5</sup>", ans: "2", steps: "(1/4)<sup>-1/2</sup> = 4<sup>1/2</sup> = 2", point: "เลขชี้กำลังติดลบคือการกลับเศษเป็นส่วน" },
        { q: "(5<sup>n+2</sup> - 5<sup>n</sup>) ÷ 5<sup>n+1</sup>", ans: "4.8", steps: "5<sup>n</sup>(5<sup>2</sup> - 1) ÷ (5<sup>n</sup> × 5) = 24 ÷ 5 = 4.8", point: "สอนวิธีดึงตัวร่วม 'เลขชี้กำลังที่น้อยที่สุด' ออกมาเสมอ" },
        { q: "รากที่ 3 ของ 0.008", ans: "0.2", steps: "รากที่ 3 ของ (0.2)<sup>3</sup> = 0.2", point: "นับตำแหน่งทศนิยมก่อนถอดราก ถ้าเป็นรากที่ 3 ทศนิยมต้องหารด้วย 3 ลงตัว" },
        { q: "ถ้า 2<sup>x</sup> = 32", ans: "5", steps: "2<sup>x</sup> = 2<sup>5</sup>, ดังนั้น x = 5", point: "ให้จำ 2<sup>1</sup> ถึง 2<sup>10</sup> จะช่วยประหยัดเวลามาก" },
        { q: "(-2)<sup>4</sup>", ans: "16", steps: "(-2) × (-2) × (-2) × (-2) = 16", point: "เลขชี้กำลังคู่ทำให้ค่าเป็นบวกเสมอ" },
        { q: "-2<sup>4</sup>", ans: "-16", steps: "-(2 × 2 × 2 × 2) = -16", point: "ชี้ให้เห็นความต่างระหว่าง (-2)<sup>4</sup> กับ -2<sup>4</sup>" },
        { q: "(27<sup>1/3</sup> + 8<sup>1/3</sup>)<sup>2</sup>", ans: "25", steps: "(3 + 2)<sup>2</sup> = 5<sup>2</sup> = 25", point: "ทำในวงเล็บก่อนเสมอ อย่ากระจายเลขชี้กำลังเข้าในผลบวก" },
        { q: "100<sup>0.5</sup> × 10<sup>-1</sup>", ans: "1", steps: "10 × 0.1 = 1", point: "ย้ำว่า x<sup>0.5</sup> คือ รากที่สอง" },
        { q: "(a<sup>2</sup>b<sup>3</sup>)<sup>2</sup> × a<sup>-3</sup>", ans: "ab<sup>6</sup>", steps: "a<sup>4</sup>b<sup>6</sup> × a<sup>-3</sup> = a<sup>4-3</sup>b<sup>6</sup> = ab<sup>6</sup>", point: "ฐานต่างกันห้ามนำชี้กำลังมาปนกัน" },
        { q: "รากที่ 3 ของ (125 × 64)", ans: "20", steps: "(รากที่ 3 ของ 125) × (รากที่ 3 ของ 64) = 5 × 4 = 20", point: "สมบัติราก: สามารถแยกถอดได้ถ้าเป็นคูณ" },
        { q: "ถ้า 9<sup>x</sup> = 27", ans: "1.5", steps: "(3<sup>2</sup>)<sup>x</sup> = 3<sup>3</sup> => 2x = 3 => x = 1.5", point: "หากมองไม่เห็นฐานร่วม ให้เปลี่ยนเป็นเลขจำนวนเฉพาะทันที" },
        { q: "(2<sup>5</sup> × 3<sup>5</sup>) ÷ 6<sup>4</sup>", ans: "6", steps: "(6<sup>5</sup>) ÷ 6<sup>4</sup> = 6<sup>1</sup> = 6", point: "ถ้าเลขชี้กำลังเท่ากัน ให้นำฐานมาคูณกันก่อน" },
        { q: "(1/2)<sup>-3</sup>", ans: "8", steps: "2<sup>3</sup> = 8", point: "เทคนิคการกลับเศษส่วนเพื่อกำจัดลบที่เลขชี้กำลัง" },
        { q: "รากที่ 3 ของ (x<sup>6</sup>y<sup>3</sup>)", ans: "x<sup>2</sup>y", steps: "x<sup>6/3</sup>y<sup>3/3</sup> = x<sup>2</sup>y", point: "รากที่ n คือการเอา n ไปหารเลขชี้กำลัง" },
        { q: "(4<sup>1/2</sup> + 9<sup>1/2</sup>) ÷ 5", ans: "1", steps: "(2 + 3) ÷ 5 = 1", point: "ทบทวนเรื่องรากที่สองของเลขกำลังสองสมบูรณ์" },
        { q: "(3<sup>n+1</sup> + 3<sup>n</sup>) ÷ 4", ans: "3<sup>n</sup>", steps: "3<sup>n</sup>(3+1) ÷ 4 = 3<sup>n</sup>(4)÷4 = 3<sup>n</sup>", point: "สอนการจัดรูป 3<sup>n+1</sup> ให้เป็น 3<sup>n</sup> × 3" },
        { q: "รากที่ 4 ของ 81 + รากที่ 3 ของ -8", ans: "1", steps: "3 + (-2) = 1", point: "รากคู่ค่าในต้องห้ามลบ รากคี่ถอดค่าลบได้ค่าลบ" },
        { q: "ถ้า x<sup>2</sup> = 16 และ x < 0", ans: "-4", steps: "(-4)<sup>2</sup> = 16", point: "ย้ำเงื่อนไขโจทย์ x < 0 ห้ามลืมเด็ดขาด" },
        { q: "(5<sup>2</sup>)<sup>0</sup>", ans: "1", steps: "จำนวนใดๆ ยกกำลัง 0 ได้ 1 (ยกเว้น 0<sup>0</sup>)", point: "ทฤษฎีพื้นฐานของเลขยกกำลัง" },
        { q: "(2<sup>3</sup>)<sup>2</sup> ÷ 8", ans: "8", steps: "2<sup>6</sup> ÷ 2<sup>3</sup> = 2<sup>3</sup> = 8", point: "อย่าลืมว่า 8 คือ 2<sup>3</sup>" },
        { q: "(a<sup>m</sup>)<sup>n</sup> × a<sup>p</sup>", ans: "a<sup>mn+p</sup>", steps: "a<sup>mn</sup> × a<sup>p</sup> = a<sup>mn+p</sup>", point: "สรุปกฎ: ซ้อนให้คูณ, คูณกันให้บวก" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> <span class="math">${item.q}</span></p>
            <div class="teacher-box">
                <p><b>เฉลย:</b> ${item.ans}</p>
                <p><b>วิธีคิด:</b> <span class="math">${item.steps}</span></p>
                <span class="note">จุดเน้นย้ำ: ${item.point}</span>
            </div>
        `;
        container.appendChild(div);
    });
</script>

</body>
</html>
