<div class="summary">
    <h2>ข้อสอบกลางภาค คณิต ม.5 (ชุดที่ 2 ระดับยากมาก)</h2>
    <p>วิชา: เลขยกกำลังและรากที่ n | จำนวน: 25 ข้อ</p>
    <div style="background: #fff3cd; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ในชุดที่ 2 นี้โจทย์เน้นการรวมกฎเลขยกกำลังและรากที่ n เข้าด้วยกัน หากพบโจทย์เลขชี้กำลังเป็นเศษส่วน ให้พิจารณาเปลี่ยนฐานให้เป็นจำนวนเฉพาะขนาดเล็กที่สุดก่อนเสมอ</div>
</div>

<div id="quiz-container"></div>
