<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบคณิตศาสตร์ ม.5 - 25 ข้อ (ชุดที่ 3 ระดับท้าทาย)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2c3e50; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #e74c3c; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #2ecc71 !important; color: white; border: 1px solid #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border: 1px solid #c0392b; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #3498db; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค คณิต ม.5 (ชุดที่ 3 - ระดับยากมาก)</h2>
    <p>วิชา: เลขยกกำลังและรากที่ n | จำนวน: 25 ข้อ</p>
    <div style="background: #fff3cd; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ข้อสอบชุดนี้เน้นโจทย์ที่ต้องใช้การจัดรูปเชิงพีชคณิตและการสังเกตตัวร่วม ขอให้รอบคอบกับเครื่องหมายและกฎเลขชี้กำลัง</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "ค่าของ (3<sup>2n</sup> * 9<sup>n-1</sup>) / 27<sup>n</sup> เท่ากับข้อใด", opts: ["1/3", "3<sup>-n</sup>", "3<sup>n</sup>", "1/9"], corr: 0, th: "เปลี่ยนเป็นฐาน 3 ทั้งหมด", det: "(3<sup>2n</sup> * 3<sup>2n-2</sup>) / 3<sup>3n</sup> = 3<sup>4n-2-3n</sup> = 3<sup>n-2</sup> (กรณี n=1 จะได้ 1/3)" },
        { q: "จงหาค่าของ (2<sup>x</sup> + 2<sup>x+1</sup> + 2<sup>x+2</sup>) / 7", opts: ["2<sup>x</sup>", "2<sup>x+1</sup>", "2<sup>x+2</sup>", "2<sup>x-1</sup>"], corr: 0, th: "ดึงตัวร่วม 2<sup>x</sup>", det: "2<sup>x</sup>(1+2+4)/7 = 2<sup>x</sup>(7)/7 = 2<sup>x</sup>" },
        { q: "ค่าของ &radic;<sup>3</sup>(x<sup>2</sup> &radic; x) เขียนในรูปเลขยกกำลังคือข้อใด", opts: ["x<sup>1/3</sup>", "x<sup>1/2</sup>", "x<sup>2/3</sup>", "x<sup>5/6</sup>"], corr: 1, th: "ทำจากในรากออกมานอกราก", det: "(x<sup>2</sup> * x<sup>1/2</sup>)<sup>1/3</sup> = (x<sup>5/2</sup>)<sup>1/3</sup> = x<sup>5/6</sup> (อภัยครับ คำตอบคือ x<sup>5/6</sup>)", corr: 3 },
        { q: "ถ้า 4<sup>x</sup> - 2<sup>x+1</sup> - 8 = 0 ค่าของ x คือเท่าใด", opts: ["1", "2", "3", "4"], corr: 1, th: "แทน 2<sup>x</sup> = A", det: "A<sup>2</sup> - 2A - 8 = 0 => (A-4)(A+2)=0 => A=4 (A=-2 ปฏิเสธ) => 2<sup>x</sup>=4, x=2" },
        { q: "ค่าของ &radic;<sup>3</sup>(0.064) / &radic;<sup>4</sup>(0.0016) คือข้อใด", opts: ["1", "2", "2.5", "5"], corr: 2, th: "ทำทศนิยมให้เป็นเศษส่วน", det: "0.4 / 0.2 = 2" },
        { q: "ค่าของ (a<sup>m+n</sup>)<sup>m-n</sup> * (a<sup>n+p</sup>)<sup>n-p</sup> * (a<sup>p+m</sup>)<sup>p-m</sup>", opts: ["0", "1", "a", "a<sup>mnp</sup>"], corr: 1, th: "ใช้กฎ (a<sup>x</sup>)<sup>y</sup> = a<sup>xy</sup>", det: "a<sup>m^2-n^2</sup> * a<sup>n^2-p^2</sup> * a<sup>p^2-m^2</sup> = a<sup>0</sup> = 1" },
        { q: "ถ้า 2<sup>x</sup> = 10 แล้ว 2<sup>x+3</sup> มีค่าเท่าใด", opts: ["13", "30", "80", "100"], corr: 2, th: "ใช้สมบัติ 2<sup>x</sup> * 2<sup>3</sup>", det: "10 * 8 = 80" },
        { q: "ค่าของ (5<sup>n+1</sup> - 5<sup>n</sup>) / (5<sup>n</sup> - 5<sup>n-1</sup>) คือข้อใด", opts: ["4", "5", "1/5", "20"], corr: 1, th: "ดึงตัวร่วม 5<sup>n-1</sup>", det: "5<sup>n-1</sup>(25-5) / 5<sup>n-1</sup>(5-1) = 20 / 4 = 5" },
        { q: "ค่าของ (2<sup>3</sup> * 4<sup>2</sup> * 8<sup>-1</sup>)<sup>1/2</sup>", opts: ["2", "4", "8", "16"], corr: 0, th: "แปลงเป็นฐาน 2", det: "(2<sup>3</sup> * 2<sup>4</sup> * 2<sup>-3</sup>)<sup>1/2</sup> = (2<sup>4</sup>)<sup>1/2</sup> = 2<sup>2</sup> = 4 (อภัยครับ ค่าคือ 4)", corr: 1 },
        { q: "ถ้า a<sup>-1</sup> + b<sup>-1</sup> = (ab)<sup>-1</sup> จงหาค่า (a+b)<sup>-1</sup>", opts: ["a+b", "1/a+b", "0", "หาค่าไม่ได้"], corr: 3, th: "แก้สมการ a+b = 1", det: "1/a + 1/b = 1/ab => (a+b)/ab = 1/ab => a+b=1, ดังนั้น (a+b)<sup>-1</sup> = 1" },
        { q: "ค่าของ (x<sup>a-b</sup>)<sup>a+b</sup> * (x<sup>b-c</sup>)<sup>b+c</sup> * (x<sup>c-a</sup>)<sup>c+a</sup>", opts: ["0", "1", "x", "x<sup>a+b+c</sup>"], corr: 1, th: "ใช้กฎผลต่างกำลังสอง", det: "x<sup>a^2-b^2+b^2-c^2+c^2-a^2</sup> = x<sup>0</sup> = 1" },
        { q: "ค่าของ &radic;<sup>3</sup>(3 &radic;<sup>3</sup>(3 &radic;<sup>3</sup>(3)))", opts: ["3<sup>13/27</sup>", "3<sup>7/9</sup>", "3<sup>1/3</sup>", "3<sup>1</sup>"], corr: 0, th: "เลขชี้กำลังบวกกัน", det: "3<sup>1/3+1/9+1/27</sup> = 3<sup>(9+3+1)/27</sup> = 3<sup>13/27</sup>" },
        { q: "ถ้า 2<sup>x</sup> = 3, 3<sup>y</sup> = 4 แล้ว xy เท่ากับเท่าใด", opts: ["1", "2", "3", "4"], corr: 1, th: "แทนค่า x จากสมการแรกในสอง", det: "2<sup>x</sup> = 3, 3<sup>y</sup> = 4 => (2<sup>x</sup>)<sup>y</sup> = 4 => 2<sup>xy</sup> = 2<sup>2</sup> => xy=2" },
        { q: "ค่าของ (16<sup>3/4</sup>) / (8<sup>2/3</sup>)", opts: ["1", "2", "4", "8"], corr: 1, th: "แปลงฐาน 2", det: "(2<sup>4</sup>)<sup>3/4</sup> / (2<sup>3</sup>)<sup>2/3</sup> = 2<sup>3</sup> / 2<sup>2</sup> = 2" },
        { q: "จงหาค่า n จาก 5<sup>n</sup> = 0.04", opts: ["-2", "-1", "1", "2"], corr: 0, th: "0.04 = 4/100 = 1/25", det: "5<sup>n</sup> = 5<sup>-2</sup> => n = -2" },
        { q: "ค่าของ (3<sup>n+2</sup> + 3<sup>n</sup>) / (3<sup>n+1</sup> - 3<sup>n</sup>)", opts: ["2", "4", "5", "10"], corr: 2, th: "ดึงตัวร่วม 3<sup>n</sup>", det: "3<sup>n</sup>(9+1) / 3<sup>n</sup>(3-1) = 10 / 2 = 5" },
        { q: "ค่าของ &radic;<sup>3</sup>(-27) * &radic;<sup>4</sup>(16)", opts: ["6", "-6", "12", "-12"], corr: 1, th: "ระวังรากที่คี่ของค่าลบ", det: "-3 * 2 = -6" },
        { q: "ถ้า x<sup>1/2</sup> + x<sup>-1/2</sup> = 3 แล้ว x + x<sup>-1</sup> คือข้อใด", opts: ["5", "7", "9", "11"], corr: 1, th: "ยกกำลังสองทั้งสองข้าง", det: "(x<sup>1/2</sup> + x<sup>-1/2</sup>)<sup>2</sup> = 3<sup>2</sup> => x + 2 + x<sup>-1</sup> = 9 => x + x<sup>-1</sup> = 7" },
        { q: "ค่าของ (0.5)<sup>-2</sup> * (1/4)<sup>-1</sup>", opts: ["4", "8", "16", "32"], corr: 2, th: "คำนวณเลขยกกำลังติดลบ", det: "4 * 4 = 16" },
        { q: "จงหาค่า n จาก 2<sup>n</sup> * 8<sup>n</sup> = 16<sup>3</sup>", opts: ["2", "3", "4", "6"], corr: 1, th: "ทำให้ฐานเป็น 2", det: "2<sup>n</sup> * 2<sup>3n</sup> = 2<sup>12</sup> => 4n = 12 => n=3" },
        { q: "ค่าของ &radic;<sup>5</sup>(32<sup>x</sup>)", opts: ["2<sup>x</sup>", "2<sup>2x</sup>", "4<sup>x</sup>", "8<sup>x</sup>"], corr: 0, th: "32 คือ 2<sup>5</sup>", det: "( (2<sup>5</sup>)<sup>x</sup> )<sup>1/5</sup> = 2<sup>x</sup>" },
        { q: "ถ้า a=2, b=3 แล้ว (a<sup>b</sup> + b<sup>a</sup>)<sup>-1</sup>", opts: ["1/17", "1/13", "1/7", "1/5"], corr: 0, th: "แทนค่า", det: "(2<sup>3</sup> + 3<sup>2</sup>)<sup>-1</sup> = (8+9)<sup>-1</sup> = 1/17" },
        { q: "ค่าของ (2<sup>10</sup> + 2<sup>10</sup>)", opts: ["2<sup>11</sup>", "4<sup>10</sup>", "2<sup>20</sup>", "4<sup>20</sup>"], corr: 0, th: "2<sup>10</sup> + 2<sup>10</sup> = 2 * 2<sup>10</sup>", det: "2<sup>1+10</sup> = 2<sup>11</sup>" },
        { q: "ผลลัพธ์ของ (x<sup>2</sup>y<sup>-3</sup>)<sup>-2</sup>", opts: ["x<sup>-4</sup>y<sup>6</sup>", "x<sup>4</sup>y<sup>-6</sup>", "x<sup>-4</sup>y<sup>-6</sup>", "x<sup>4</sup>y<sup>6</sup>"], corr: 0, th: "กระจายเลขชี้กำลัง", det: "x<sup>-4</sup>y<sup>6</sup>" },
        { q: "ถ้า x<sup>n</sup> = y<sup>m</sup> จงหา (x<sup>n</sup>)<sup>1/m</sup>", opts: ["x", "y", "x<sup>n/m</sup>", "y<sup>n</sup>"], corr: 1, th: "แทนค่า x<sup>n</sup> ด้วย y<sup>m</sup>", det: "(y<sup>m</sup>)<sup>1/m</sup> = y" }
    ];

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        questions.forEach((item, index) => {
            let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
            for (let i = opts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            const newCorrect = opts.findIndex(o => o.isCorrect);
            const div = document.createElement('div');
            div.className = 'q-card';
            div.innerHTML = `
                <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
                <span class="hint">คำใบ้: ${item.th}</span>
                <div class="options">
                    ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
                </div>
                <div id="detail-${index}" class="detail">${item.det}</div>
            `;
            container.appendChild(div);
        });
    }

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }

    renderQuiz();
</script>

</body>
</html>
