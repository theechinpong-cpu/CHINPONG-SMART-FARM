<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค คณิต ม.5 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2c3e50; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #e74c3c; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; font-size: 1em; }
        button:hover { background: #e0e0e0; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        .detail { margin-top: 15px; padding: 15px; background: #e8f6f3; border-left: 4px solid #1abc9c; display: none; font-size: 0.95em; }
    </style>
</head>
<body>

<div class="summary">
    <h2>สรุปเนื้อหา: เลขยกกำลังและรากที่ n</h2>
    <ul>
        <li><b>กฎเลขยกกำลัง:</b> a<sup>m</sup> &times; a<sup>n</sup> = a<sup>m+n</sup> และ (a<sup>m</sup>)<sup>n</sup> = a<sup>m&times;n</sup></li>
        <li><b>รากที่ n:</b> &radic;<sup>n</sup>a = a<sup>1/n</sup> โดยที่ถ้า n เป็นจำนวนคู่ a ต้อง &ge; 0</li>
        <li><b>เลขชี้กำลังตรรกยะ:</b> a<sup>m/n</sup> = &radic;<sup>n</sup>(a<sup>m</sup>)</li>
    </ul>
    <div style="background: #fff3cd; padding: 10px; border: 1px solid #ffeeba;"><b>เทคนิคการคิด:</b> เปลี่ยนฐานให้เป็นจำนวนเฉพาะ (2, 3, 5, 7) ก่อนเสมอ แล้วค่อยใช้กฎเลขชี้กำลัง</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q_th: "ค่าของ (2<sup>3</sup> &times; 2<sup>4</sup>) / 2<sup>5</sup> เท่ากับเท่าใด", a_th: ["2", "4", "8", "16"], correct: 1, th: "นำเลขชี้กำลังฐานเดียวกันมาบวกกันในตัวเศษ แล้วลบด้วยตัวส่วน", detail: "2<sup>3+4</sup> / 2<sup>5</sup> = 2<sup>7</sup> / 2<sup>5</sup> = 2<sup>7-5</sup> = 2<sup>2</sup> = 4 <br>Tip: อย่าลืมว่าฐานต้องเหมือนกันถึงจะใช้กฎนี้ได้" },
        { q_th: "ค่าของ (3<sup>-2</sup> &times; 3<sup>4</sup>) คือข้อใด", a_th: ["1/9", "3", "9", "27"], correct: 2, th: "เลขชี้กำลังติดลบคือส่วนกลับของจำนวนนั้น", detail: "3<sup>-2+4</sup> = 3<sup>2</sup> = 9 <br>Tip: เลขชี้กำลังเป็นลบห้ามตกใจ ให้มองเป็นตัวหาร" },
        { q_th: "จงหาค่าของ &radic;<sup>3</sup>(27) &times; 2<sup>2</sup>", a_th: ["6", "9", "12", "15"], correct: 2, th: "ถอดรากที่สามของ 27 ก่อน แล้วคูณกับ 2 ยกกำลังสอง", detail: "&radic;<sup>3</sup>(3<sup>3</sup>) &times; 4 = 3 &times; 4 = 12 <br>Tip: จดจำค่าเลขยกกำลังพื้นฐาน 2-5 ไว้จะทำโจทย์เร็วขึ้น" },
        // ... เติมข้อที่เหลือให้ครบ 25 ข้อตามรูปแบบนี้
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q_th}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${item.a_th.map((opt, i) => `<button onclick="check(this, ${i}, ${item.correct}, ${index})">${opt}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.detail}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
