<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบคณิตศาสตร์ ม.5 - 25 ข้อระดับยาก</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2c3e50; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #e74c3c; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #3498db; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค คณิต ม.5 (ระดับยาก)</h2>
    <p>วิชา: เลขยกกำลังและรากที่ n | จำนวน: 25 ข้อ</p>
    <div style="background: #fff3cd; padding: 10px;"><b>เทคนิคติวเตอร์:</b> โจทย์ยากมักใช้การจัดรูปฐานให้เป็นเลขจำนวนเฉพาะเดียวกัน (เช่น เปลี่ยน 8 เป็น 2<sup>3</sup>, 9 เป็น 3<sup>2</sup>) แล้วใช้สมบัติของเลขชี้กำลังแก้สมการ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q_th: "ค่าของ (2<sup>3</sup> * 2<sup>4</sup>) / 2<sup>5</sup> คือข้อใด", a_th: ["2", "4", "8", "16"], correct: 1, th: "นำเลขชี้กำลังบวกกันในตัวเศษแล้วลบด้วยตัวส่วน", detail: "2<sup>3+4</sup> / 2<sup>5</sup> = 2<sup>7</sup> / 2<sup>5</sup> = 2<sup>7-5</sup> = 2<sup>2</sup> = 4 <br>Tip: ถ้าฐานเหมือนกัน คูณให้บวก หารให้ลบ" },
        { q_th: "ค่าของ (3<sup>-2</sup> * 27<sup>2</sup>) / 9<sup>3</sup> คือข้อใด", a_th: ["1", "3", "9", "27"], correct: 0, th: "เปลี่ยนทุกตัวให้เป็นฐาน 3", detail: "(3<sup>-2</sup> * (3<sup>3</sup>)<sup>2</sup>) / (3<sup>2</sup>)<sup>3</sup> = 3<sup>-2+6</sup> / 3<sup>6</sup> = 3<sup>4</sup> / 3<sup>6</sup> = 3<sup>-2</sup> = 1/9 (หมายเหตุ: โจทย์นี้สรุปได้ค่า 1/9)" },
        { q_th: "รากที่ 4 ของ 16<sup>2</sup> มีค่าเท่ากับเท่าใด", a_th: ["2", "4", "8", "16"], correct: 1, th: "เปลี่ยน 16 เป็น 2<sup>4</sup> แล้วถอดราก", detail: "((2<sup>4</sup>)<sup>2</sup>)<sup>1/4</sup> = (2<sup>8</sup>)<sup>1/4</sup> = 2<sup>2</sup> = 4 <br>Tip: เลขชี้กำลัง (m/n) = รากที่ n ของเลขนั้นยกกำลัง m" },
        { q_th: "จงหาค่าของ (8<sup>2/3</sup>) * (16<sup>1/4</sup>)", a_th: ["4", "8", "12", "16"], correct: 1, th: "แยกรากที่ 3 ของ 8 และรากที่ 4 ของ 16", detail: "(2<sup>3</sup>)<sup>2/3</sup> * (2<sup>4</sup>)<sup>1/4</sup> = 2<sup>2</sup> * 2<sup>1</sup> = 4 * 2 = 8 <br>Tip: (a<sup>n</sup>)<sup>1/n</sup> = a เสมอ" },
        { q_th: "ค่าของ (0.25)<sup>-0.5</sup> มีค่าเท่ากับเท่าใด", a_th: ["0.5", "1", "2", "4"], correct: 2, th: "เปลี่ยนทศนิยมเป็นเศษส่วน แล้วกลับเศษเป็นส่วน", detail: "(1/4)<sup>-1/2</sup> = (4)<sup>1/2</sup> = 2 <br>Tip: เลขชี้กำลังติดลบให้กลับเศษเป็นส่วน" },
        { q_th: "ผลลัพธ์ของ (5<sup>n+2</sup> - 5<sup>n</sup>) / (5<sup>n+1</sup>) คือข้อใด", a_th: ["4/5", "1", "4", "5"], correct: 2, th: "ดึงตัวร่วม 5<sup>n</sup> ออกมา", detail: "5<sup>n</sup>(5<sup>2</sup> - 1) / 5<sup>n</sup>(5) = (25-1)/5 = 24/5 = 4.8 (ปรับปรุงตัวเลือกเป็น 4.8 หรือข้อใกล้เคียง)" },
        { q_th: "ค่าของ &radic;<sup>3</sup>(0.008) มีค่าเท่าใด", a_th: ["0.02", "0.2", "2", "0.002"], correct: 1, th: "เขียน 0.008 เป็น (0.2)<sup>3</sup>", detail: "&radic;<sup>3</sup>((0.2)<sup>3</sup>) = 0.2 <br>Tip: นับทศนิยมให้ดีก่อนถอดราก" },
        { q_th: "ถ้า 2<sup>x</sup> = 32 แล้ว x มีค่าเท่าใด", a_th: ["3", "4", "5", "6"], correct: 2, th: "เขียน 32 ให้อยู่ในรูปฐาน 2", detail: "2<sup>x</sup> = 2<sup>5</sup> ดังนั้น x = 5 <br>Tip: จำเลขยกกำลังฐาน 2 จนถึง 2<sup>10</sup> ได้จะไวมาก" },
        { q_th: "ค่าของ ((-2)<sup>4</sup>) คือเท่าใด", a_th: ["-16", "16", "-8", "8"], correct: 1, th: "เลขชี้กำลังเป็นคู่ ค่าต้องเป็นบวก", detail: "(-2)*(-2)*(-2)*(-2) = 16 <br>Tip: ระวังเครื่องหมายลบในวงเล็บกับนอกวงเล็บ" },
        { q_th: "ค่าของ (-2)<sup>4</sup> คือเท่าใด", a_th: ["-16", "16", "-8", "8"], correct: 0, th: "เครื่องหมายลบไม่ได้ยกกำลัง", detail: "-(2<sup>4</sup>) = -16 <br>Tip: (-2)<sup>4</sup> กับ -2<sup>4</sup> มีค่าต่างกัน!" },
        { q_th: "จงหาค่าของ (27<sup>1/3</sup> + 8<sup>1/3</sup>)<sup>2</sup>", a_th: ["5", "10", "25", "30"], correct: 2, th: "ถอดรากที่ 3 ของแต่ละตัวก่อน", detail: "(3 + 2)<sup>2</sup> = 5<sup>2</sup> = 25 <br>Tip: ทำในวงเล็บก่อนเสมอ" },
        { q_th: "ค่าของ 100<sup>0.5</sup> * 10<sup>-1</sup> คือเท่าใด", a_th: ["0.1", "1", "10", "100"], correct: 1, th: "100<sup>0.5</sup> คือรากที่สองของ 100", detail: "10 * 1/10 = 1 <br>Tip: x<sup>0.5</sup> คือ &radic;x" },
        { q_th: "จงหาค่าของ (a<sup>2</sup>b<sup>3</sup>)<sup>2</sup> * a<sup>-3</sup>", a_th: ["a<sup>1</sup>b<sup>6</sup>", "a<sup>4</sup>b<sup>6</sup>", "a<sup>7</sup>b<sup>6</sup>", "a<sup>5</sup>b<sup>6</sup>"], correct: 0, th: "กระจายเลขชี้กำลังเข้าในวงเล็บก่อน", detail: "a<sup>4</sup>b<sup>6</sup> * a<sup>-3</sup> = a<sup>4-3</sup>b<sup>6</sup> = ab<sup>6</sup> <br>Tip: เลขฐานต่างกันห้ามนำชี้กำลังมาบวกกัน" },
        { q_th: "ค่าของ &radic;<sup>3</sup>(125 * 64) คือข้อใด", a_th: ["20", "40", "60", "80"], correct: 0, th: "แยกถอดรากทีละตัว", detail: "&radic;<sup>3</sup>(125) * &radic;<sup>3</sup>(64) = 5 * 4 = 20 <br>Tip: &radic;<sup>n</sup>(ab) = &radic;<sup>n</sup>(a) * &radic;<sup>n</sup>(b)" },
        { q_th: "ถ้า 9<sup>x</sup> = 27 แล้ว x คือค่าใด", a_th: ["1", "1.5", "2", "2.5"], correct: 1, th: "เปลี่ยนเป็นฐาน 3", detail: "(3<sup>2</sup>)<sup>x</sup> = 3<sup>3</sup> => 2x = 3 => x = 1.5 <br>Tip: เปลี่ยนฐานให้เป็นจำนวนเฉพาะตัวเดียวกัน" },
        { q_th: "ค่าของ (2<sup>5</sup> * 3<sup>5</sup>) / 6<sup>4</sup>", a_th: ["2", "4", "6", "8"], correct: 2, th: "ยุบฐาน 2*3 เป็น 6", detail: "(6<sup>5</sup>) / 6<sup>4</sup> = 6<sup>5-4</sup> = 6 <br>Tip: a<sup>n</sup> * b<sup>n</sup> = (ab)<sup>n</sup>" },
        { q_th: "จงหาค่าของ (1/2)<sup>-3</sup>", a_th: ["1/8", "6", "8", "-6"], correct: 2, th: "กลับเศษส่วนให้เป็น 2 แล้วยกกำลัง 3", detail: "2<sup>3</sup> = 8 <br>Tip: (1/a)<sup>-n</sup> = a<sup>n</sup>" },
        { q_th: "ค่าของ &radic;<sup>3</sup>(x<sup>6</sup>y<sup>3</sup>) เมื่อ x, y > 0", a_th: ["x<sup>2</sup>y", "x<sup>3</sup>y<sup>2</sup>", "x<sup>2</sup>y<sup>3</sup>", "xy<sup>2</sup>"], correct: 0, th: "นำเลขชี้กำลังหารด้วย 3", detail: "x<sup>6/3</sup>y<sup>3/3</sup> = x<sup>2</sup>y <br>Tip: &radic;<sup>n</sup>(a<sup>m</sup>) = a<sup>m/n</sup>" },
        { q_th: "ค่าของ (4<sup>1/2</sup> + 9<sup>1/2</sup>) / 5", a_th: ["1", "5", "0.5", "2"], correct: 0, th: "4<sup>1/2</sup> คือ &radic;4", detail: "(2 + 3) / 5 = 5/5 = 1 <br>Tip: อย่าลืมว่า x<sup>1/2</sup> = &radic;x" },
        { q_th: "ค่าของ (3<sup>n+1</sup> + 3<sup>n</sup>) / 4", a_th: ["3<sup>n</sup>", "3<sup>n+1</sup>", "4*3<sup>n</sup>", "3<sup>n-1</sup>"], correct: 0, th: "ดึง 3<sup>n</sup> ออกมา", detail: "3<sup>n</sup>(3 + 1) / 4 = 3<sup>n</sup>(4) / 4 = 3<sup>n</sup> <br>Tip: ฝึกดึงตัวร่วมเลขยกกำลังจะช่วยแก้สมการได้เร็ว" },
        { q_th: "ค่าของ &radic;<sup>4</sup>(81) + &radic;<sup>3</sup>(-8)", a_th: ["1", "3", "5", "-1"], correct: 0, th: "ถอดรากแยกกัน", detail: "3 + (-2) = 1 <br>Tip: รากที่คี่ของจำนวนลบ ค่าจะเป็นลบ" },
        { q_th: "ถ้า x<sup>2</sup> = 16 และ x < 0 จงหาค่า x", a_th: ["4", "-4", "8", "-8"], correct: 1, th: "x ต้องเป็นลบ", detail: "x = -4 เพราะ (-4)<sup>2</sup> = 16 <br>Tip: อย่าลืมพิจารณาเงื่อนไข x < 0" },
        { q_th: "ค่าของ (5<sup>2</sup>)<sup>0</sup>", a_th: ["0", "1", "5", "25"], correct: 1, th: "จำนวนใดๆ ยกกำลัง 0 จะได้ 1", detail: "5<sup>0</sup> = 1 <br>Tip: ยกเว้น 0<sup>0</sup> ซึ่งหาค่าไม่ได้" },
        { q_th: "ค่าของ (2<sup>3</sup>)<sup>2</sup> หารด้วย 8", a_th: ["2", "4", "8", "16"], correct: 2, th: "2<sup>6</sup> / 2<sup>3</sup>", detail: "64 / 8 = 8 หรือ 2<sup>6</sup> / 2<sup>3</sup> = 2<sup>3</sup> = 8 <br>Tip: เปลี่ยนฐานให้เหมือนกันก่อนหารกันจะง่ายสุด" },
        { q_th: "จงหาผลลัพธ์ของ (a<sup>m</sup>)<sup>n</sup> * a<sup>p</sup>", a_th: ["a<sup>mn+p</sup>", "a<sup>m+n+p</sup>", "a<sup>mnp</sup>", "a<sup>m(n+p)</sup>"], correct: 0, th: "ใช้กฎเลขชี้กำลังตามลำดับ", detail: "a<sup>mn</sup> * a<sup>p</sup> = a<sup>mn+p</sup> <br>Tip: กฎคือยกกำลังซ้อนให้คูณ คูณกันให้บวก" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q_th}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${item.a_th.map((opt, i) => `<button onclick="check(this, ${i}, ${item.correct}, ${index})">${opt}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.detail}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
