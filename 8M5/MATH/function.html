<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Pre-test คณิตศาสตร์: ฟังก์ชัน (ม.5) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .summary-box { background: #e8f6f3; padding: 20px; border-left: 6px solid #1abc9c; margin-bottom: 30px; }
        .memory-trick { background: #fff3cd; padding: 12px; font-weight: bold; border-left: 4px solid #f1c40f; margin: 10px 0; }
        .question-container { border-bottom: 1px solid #eee; padding: 25px 0; }
        .option { display: block; padding: 12px; margin: 6px 0; background: #f9f9f9; border: 1px solid #ddd; cursor: pointer; border-radius: 5px; width: 100%; text-align: left; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #fffaf0; border-left: 4px solid #f39c12; }
        #results-container { margin-top: 40px; padding: 25px; border: 2px solid #3498db; display: none; text-align: center; background: #f0f7ff; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Pre-test คณิตศาสตร์: ฟังก์ชัน ม.5 (30 ข้อ)</h1>
    <button onclick="toggleLang()" style="padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px;">Switch Language (TH / EN)</button>
    <div class="summary-box">
        <h2>สรุปเนื้อหาสำคัญ</h2>
        <p>ฟังก์ชันคือ x หนึ่งค่า ให้ y เพียงค่าเดียว การหาโดเมนและเรนจ์เน้น <b>"ส่วนห้ามเป็นศูนย์ และค่าในรากคู่ห้ามติดลบ"</b></p>
        <div class="memory-trick">Tutor's Secret Tip: (f ∘ g)(x) = f(g(x)) มอง g เป็นด่านแรกเสมอ!</div>
    </div>
    <div id="quiz-area"></div>
    <div id="results-container"></div>
</div>
<script>
let lang = 'th';
let score = 0;
const questions = [
    {"q_th": "1. ข้อใดคือฟังก์ชัน", "q_en": "Which one is a function?", "a_th": ["{(1,2), (1,3)}", "{(1,2), (2,2)}", "{(1,1), (1,2)}", "{(1,2), (1,3), (1,4)}"], "a_en": ["{(1,2), (1,3)}", "{(1,2), (2,2)}", "{(1,1), (1,2)}", "{(1,2), (1,3), (1,4)}"], "correct": 1, "th": "ห้ามตัวหน้าซ้ำ", "en": "First element must not repeat", "detail": "สมาชิกตัวหน้า (x) ต้องไม่จับคู่กับตัวหลัง (y) มากกว่าหนึ่งค่า"},
    {"q_th": "2. โดเมนของ f(x) = 1/(x-1) คือข้อใด", "q_en": "Domain of f(x) = 1/(x-1) is?", "a_th": ["R", "R-{1}", "R-{0}", "R-{-1}"], "a_en": ["R", "R-{1}", "R-{0}", "R-{-1}"], "correct": 1, "th": "ส่วนห้ามเป็นศูนย์", "en": "Denominator cannot be zero", "detail": "ตัวส่วนห้ามเป็นศูนย์ ดังนั้น x-1 ≠ 0"},
    {"q_th": "3. โดเมนของ f(x) = √x คือข้อใด", "q_en": "Domain of f(x) = √x is?", "a_th": ["R", "x > 0", "x ≥ 0", "x < 0"], "a_en": ["R", "x > 0", "x ≥ 0", "x < 0"], "correct": 2, "th": "ค่าในรากคู่ต้อง ≥ 0", "en": "Inside square root must be ≥ 0", "detail": "ค่าในรากที่สอง (รากคู่) ต้องไม่ติดลบเสมอ"},
    {"q_th": "4. ถ้า f(x) = 2x+1 แล้ว f(3) คือ?", "q_en": "If f(x) = 2x+1, then f(3) = ?", "a_th": ["5", "6", "7", "8"], "a_en": ["5", "6", "7", "8"], "correct": 2, "th": "แทนค่า x ด้วย 3", "en": "Substitute x with 3", "detail": "f(3) = 2(3) + 1 = 6 + 1 = 7"},
    {"q_th": "5. ฟังก์ชันผกผันของ f(x) = x-2 คือ?", "q_en": "Inverse of f(x) = x-2 is?", "a_th": ["x-2", "x+2", "2-x", "-x-2"], "a_en": ["x-2", "x+2", "2-x", "-x-2"], "correct": 1, "th": "สลับ x กับ y", "en": "Swap x and y", "detail": "y = x-2 → x = y-2 → y = x+2"},
    {"q_th": "6. เรนจ์ของ f(x) = x²+1 คือข้อใด", "q_en": "Range of f(x) = x²+1 is?", "a_th": ["R", "[0, ∞)", "[1, ∞)", "(1, ∞)"], "a_en": ["R", "[0, ∞)", "[1, ∞)", "(1, ∞)"], "correct": 2, "th": "x² มีค่าต่ำสุดคือ 0", "en": "Minimum of x² is 0", "detail": "x² ≥ 0 เสมอ ดังนั้น x²+1 ≥ 1"},
    {"q_th": "7. (f ∘ g)(x) หมายถึงอะไร", "q_en": "What does (f ∘ g)(x) mean?", "a_th": ["f(x) * g(x)", "f(g(x))", "g(f(x))", "f(x) + g(x)"], "a_en": ["f(x) * g(x)", "f(g(x))", "g(f(x))", "f(x) + g(x)"], "correct": 1, "th": "ฟังก์ชันประกอบ", "en": "Composition function", "detail": "คือการนำค่าจาก g เข้าไปใน f"},
    {"q_th": "8. ฟังก์ชันเชิงเส้นคือข้อใด", "q_en": "Which is linear function?", "a_th": ["x²", "1/x", "2x+5", "√x"], "a_en": ["x²", "1/x", "2x+5", "√x"], "correct": 2, "th": "ดีกรีของ x เป็น 1", "en": "Degree of x is 1", "detail": "อยู่ในรูป f(x) = ax+b"},
    {"q_th": "9. ฟังก์ชันคงตัว f(x) = 5 มีเรนจ์คือ?", "q_en": "Range of constant function f(x) = 5?", "a_th": ["R", "{5}", "{0}", "ไม่มีเรนจ์"], "a_en": ["R", "{5}", "{0}", "No range"], "correct": 1, "th": "ค่า y คงที่", "en": "y-value is constant", "detail": "ไม่ว่า x คืออะไร f(x) ได้ 5 เสมอ"},
    {"q_th": "10. ข้อใดไม่ใช่ฟังก์ชัน", "q_en": "Which is NOT a function?", "a_th": ["เส้นตรง", "พาราโบลา", "วงกลม", "กราฟระฆังคว่ำ"], "a_en": ["Line", "Parabola", "Circle", "Bell curve"], "correct": 2, "th": "Vertical Line Test", "en": "Vertical Line Test", "detail": "วงกลมตัดเส้นดิ่ง 2 จุด"},
    {"q_th": "11. โดเมนของ f(x) = 1/x คือข้อใด", "q_en": "Domain of f(x) = 1/x?", "a_th": ["R", "R-{0}", "R-{1}", "R-{x}"], "a_en": ["R", "R-{0}", "R-{1}", "R-{x}"], "correct": 1, "th": "ส่วนห้ามเป็นศูนย์", "en": "Denominator ≠ 0", "detail": "x ต้องไม่เป็น 0"},
    {"q_th": "12. ถ้า f(x) = x+3, g(x) = x-3 แล้ว f(g(5)) คือ?", "q_en": "If f(x)=x+3, g(x)=x-3, f(g(5))?", "a_th": ["5", "3", "0", "8"], "a_en": ["5", "3", "0", "8"], "correct": 0, "th": "หา g(5) ก่อน", "en": "Find g(5) first", "detail": "g(5)=2, f(2)=5"},
    {"q_th": "13. กราฟพาราโบลา f(x) = x² มีจุดยอดที่ใด", "q_en": "Vertex of f(x) = x² is?", "a_th": ["(1,1)", "(0,0)", "(0,1)", "(1,0)"], "a_en": ["(1,1)", "(0,0)", "(0,1)", "(1,0)"], "correct": 1, "th": "จุดต่ำสุดของกราฟ", "en": "Minimum point", "detail": "อยู่ที่จุด (0,0)"},
    {"q_th": "14. f⁻¹(x) หาจากอะไร", "q_en": "How to find f⁻¹(x)?", "a_th": ["สลับ x กับ y", "เปลี่ยนเครื่องหมาย", "คูณ -1", "หารด้วย x"], "a_en": ["Swap x and y", "Change sign", "Multiply -1", "Divide by x"], "correct": 0, "th": "อินเวอร์สคือการสลับ", "en": "Inverse is swapping", "detail": "สลับโดเมนและเรนจ์"},
    {"q_th": "15. f(x) = |x| มีเรนจ์คือ?", "q_en": "Range of f(x) = |x|?", "a_th": ["R", "[0, ∞)", "(0, ∞)", "(-∞, 0]"], "a_en": ["R", "[0, ∞)", "(0, ∞)", "(-∞, 0]"], "correct": 1, "th": "ค่าสัมบูรณ์ ≥ 0", "en": "Absolute value ≥ 0", "detail": "ค่าสัมบูรณ์เป็นบวกเสมอ"},
    {"q_th": "16. ข้อใดคือฟังก์ชันหนึ่งต่อหนึ่ง", "q_en": "Which is one-to-one?", "a_th": ["x²", "2x+1", "sin x", "|x|"], "a_en": ["x²", "2x+1", "sin x", "|x|"], "correct": 1, "th": "Horzontal Line Test", "en": "Horizontal Line Test", "detail": "เส้นนอนตัดได้ 1 จุด"},
    {"q_th": "17. f(x) = 3x+2, f⁻¹(0) คือ?", "q_en": "f(x) = 3x+2, f⁻¹(0) = ?", "a_th": ["2", "-2/3", "2/3", "0"], "a_en": ["2", "-2/3", "2/3", "0"], "correct": 1, "th": "แก้สมการ 0 = 3x+2", "en": "Solve 0 = 3x+2", "detail": "3x = -2, x = -2/3"},
    {"q_th": "18. โดเมนของ 1/√(x-5) คือ?", "q_en": "Domain of 1/√(x-5)?", "a_th": ["x≥5", "x>5", "x≤5", "x<5"], "a_en": ["x≥5", "x>5", "x≤5", "x<5"], "correct": 1, "th": "รูทห้ามเป็น 0 และติดลบ", "en": "Root ≠ 0 and not negative", "detail": "x-5 > 0 ดังนั้น x > 5"},
    {"q_th": "19. ฟังก์ชัน f(x) = -x³ กราฟอยู่ Q ใด", "q_en": "f(x) = -x³ graph in which Q?", "a_th": ["1,3", "2,4", "1,2", "3,4"], "a_en": ["1,3", "2,4", "1,2", "3,4"], "correct": 1, "th": "สมบัติฟังก์ชันคี่", "en": "Odd function property", "detail": "กราฟผ่าน Q2 และ Q4"},
    {"q_th": "20. ข้อใดคือฟังก์ชันคู่", "q_en": "Which is an even function?", "a_th": ["x³", "x²", "x", "1/x"], "a_en": ["x³", "x²", "x", "1/x"], "correct": 1, "th": "f(-x) = f(x)", "en": "f(-x) = f(x)", "detail": "x² มีสมบัติสมมาตรแกน y"},
    {"q_th": "21. f(x) = 2, f(10) คือ?", "q_en": "f(x) = 2, f(10) = ?", "a_th": ["2", "10", "20", "0"], "a_en": ["2", "10", "20", "0"], "correct": 0, "th": "ฟังก์ชันคงตัว", "en": "Constant function", "detail": "ให้ค่าคงที่เสมอ"},
    {"q_th": "22. f(x) = √x, f(g(x)) = x, g(x) คือ?", "q_en": "f(x) = √x, f(g(x)) = x, g(x) = ?", "a_th": ["x", "x²", "√x", "1/x"], "a_en": ["x", "x²", "√x", "1/x"], "correct": 1, "th": "ต้องกำจัดรูท", "en": "Must eliminate root", "detail": "g(x) = x² จะได้ √(x²) = x"},
    {"q_th": "23. f(x) = x+1, f(f(1)) คือ?", "q_en": "f(x) = x+1, f(f(1)) = ?", "a_th": ["1", "2", "3", "4"], "a_en": ["1", "2", "3", "4"], "correct": 2, "th": "f(1)=2, f(2)=3", "en": "f(1)=2, f(2)=3", "detail": "คอมโพสิทตัวเอง"},
    {"q_th": "24. x=y² เป็นฟังก์ชันไหม", "q_en": "Is x=y² a function?", "a_th": ["เป็น", "ไม่เป็น", "ขึ้นกับ x", "ขึ้นกับ y"], "a_en": ["Yes", "No", "Depends on x", "Depends on y"], "correct": 1, "th": "y หนึ่งตัวได้ 2 ค่า x", "en": "y has two x values", "detail": "ไม่เป็นฟังก์ชันเพราะ y ซ้ำ"},
    {"q_th": "25. โดเมนของ f(x) = x/(x²+1) คือ?", "q_en": "Domain of f(x) = x/(x²+1)?", "a_th": ["R", "R-{0}", "R-{1}", "R-{i}"], "a_en": ["R", "R-{0}", "R-{1}", "R-{i}"], "correct": 0, "th": "ส่วนไม่เป็นศูนย์", "en": "Denominator ≠ 0", "detail": "x²+1 เป็นบวกเสมอ"},
    {"q_th": "26. ข้อใดถูก", "q_en": "Which is true?", "a_th": ["D_f = R_f⁻¹", "D_f = D_f⁻¹", "R_f = R_f⁻¹", "f = f⁻¹"], "a_en": ["D_f = R_f⁻¹", "D_f = D_f⁻¹", "R_f = R_f⁻¹", "f = f⁻¹"], "correct": 0, "th": "สมบัติอินเวอร์ส", "en": "Inverse property", "detail": "โดเมนกับเรนจ์สลับกัน"},
    {"q_th": "27. ถ้า (f ∘ g)(1) = 2, g(1) = 4, f(4) คือ?", "q_en": "If (f ∘ g)(1) = 2, g(1) = 4, f(4) = ?", "a_th": ["1", "2", "4", "8"], "a_en": ["1", "2", "4", "8"], "correct": 1, "th": "f(g(1)) = f(4) = 2", "en": "f(g(1)) = f(4) = 2", "detail": "ตามนิยามฟังก์ชันประกอบ"},
    {"q_th": "28. |x| < 2 มีค่า x คือ?", "q_en": "Is |x| < 2 true for?", "a_th": ["(-2, 2)", "[0, 2)", "(-2, 0]", "R"], "a_en": ["(-2, 2)", "[0, 2)", "(-2, 0]", "R"], "correct": 0, "th": "ถอดค่าสัมบูรณ์", "en": "Remove abs", "detail": "-2 < x < 2"},
    {"q_th": "29. เรนจ์ของ y = 3 - x²", "q_en": "Range of y = 3 - x²?", "a_th": ["(-∞, 3]", "[3, ∞)", "R", "[0, 3]"], "a_en": ["(-∞, 3]", "[3, ∞)", "R", "[0, 3]"], "correct": 0, "th": "x² ≥ 0", "en": "x² ≥ 0", "detail": "3 - x² ≤ 3"},
    {"q_th": "30. ฟังก์ชันใดมีอินเวอร์สเป็นฟังก์ชัน", "q_en": "Which has inverse function?", "a_th": ["x²", "x³", "|x|", "sin x"], "a_en": ["x²", "x³", "|x|", "sin x"], "correct": 1, "th": "ต้องเป็น 1 ต่อ 1", "en": "Must be 1-to-1", "detail": "x³ เป็นฟังก์ชันเพิ่มเสมอ"}
];

function render() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = '';
    questions.forEach((q, i) => {
        area.innerHTML += `<div class="question-container" id="q${i}">
            <p><strong>${i+1}. ${lang=='th'?q.q_th:q.q_en}</strong></p>
            ${(lang=='th'?q.a_th:q.a_en).map((o, idx) => `<button class="option" onclick="check(${i}, ${idx})">${o}</button>`).join('')}
            <div class="explanation" id="ex${i}"><p><strong>Clue:</strong> ${lang=='th'?q.th:q.en}</p><p>${q.detail}</p></div>
        </div>`;
    });
}
function check(qIdx, optIdx) {
    const q = questions[qIdx];
    const container = document.getElementById('q' + qIdx);
    const btns = container.querySelectorAll('.option');
    btns.forEach(b => b.disabled = true);
    if(optIdx === q.correct) { btns[optIdx].classList.add('correct'); score++; }
    else { btns[optIdx].classList.add('wrong'); btns[q.correct].classList.add('correct'); }
    document.getElementById('ex' + qIdx).style.display = 'block';
    if(document.querySelectorAll('.explanation[style*="display: block"]').length === questions.length) {
        document.getElementById('results-container').style.display = 'block';
        document.getElementById('results-container').innerHTML = `<h2>สรุปผล: ${score}/30</h2>`;
        alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
    }
}
function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }
render();
</script>
</body>
</html>
