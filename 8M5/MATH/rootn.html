<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คณิตศาสตร์ ม.5: รากที่ n - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question-box { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .clue { color: #d32f2f; font-weight: bold; font-style: italic; display: block; margin: 10px 0; }
        .btn { cursor: pointer; padding: 8px 15px; margin: 5px; border: 1px solid #2196F3; border-radius: 4px; background: white; }
        .btn:hover { background: #e8f4fd; }
        .correct { background: #4caf50 !important; color: white; border-color: #4caf50; }
        .wrong { background: #f44336 !important; color: white; border-color: #f44336; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container" id="quiz-app">
    <h1>แบบทดสอบเรื่องรากที่ n (25 ข้อ)</h1>
    <div id="quiz-area"></div>
    <div id="results" style="margin-top:20px; font-weight:bold;"></div>
</div>

<script>
const quizData = [
    { q_th: "จงหาค่าของรากที่ 3 ของ -64", q_en: "Find the cube root of -64", a_th: ["4", "-4"], a_en: ["4", "-4"], correct: 1, th: "คำใบ้: จำนวนใดคูณกัน 3 ครั้งได้ -64", en: "Hint: What number cubed equals -64", detail: "(-4) * (-4) * (-4) = -64" },
    { q_th: "ค่าของรากที่ 2 ของ 81 คือเท่าใด", q_en: "What is the square root of 81?", a_th: ["9", "±9"], a_en: ["9", "±9"], correct: 1, th: "คำใบ้: เลขคู่ n=2 รากต้องมีบวกและลบ", en: "Hint: Even root (n=2) gives both plus and minus", detail: "รากที่สองของจำนวนบวกมีสองค่าเสมอ" },
    { q_th: "ค่าของรากที่ 4 ของ 16 คือเท่าใด", q_en: "What is the fourth root of 16?", a_th: ["2", "±2"], a_en: ["2", "±2"], correct: 1, th: "คำใบ้: รากเลขคู่ของจำนวนบวกมี 2 ค่า", en: "Hint: Even root of positive has two values", detail: "2^4 = 16 และ (-2)^4 = 16" },
    { q_th: "รากที่ 5 ของ -32 คือเท่าใด", q_en: "What is the fifth root of -32?", a_th: ["2", "-2"], a_en: ["2", "-2"], correct: 1, th: "คำใบ้: รากเลขคี่ให้เครื่องหมายเหมือนเดิม", en: "Hint: Odd root preserves the sign", detail: "(-2)^5 = -32" },
    { q_th: "ผลลัพธ์ของ 27^(1/3) คือเท่าใด", q_en: "What is 27^(1/3)?", a_th: ["3", "9"], a_en: ["3", "9"], correct: 0, th: "คำใบ้: เขียน 27 ในรูปเลขยกกำลัง", en: "Hint: Write 27 as a power", detail: "27 = 3^3 ดังนั้น 27^(1/3) = 3" },
    { q_th: "ค่าของ (-8)^(1/3) คือข้อใด", q_en: "What is (-8)^(1/3)?", a_th: ["2", "-2"], a_en: ["2", "-2"], correct: 1, th: "คำใบ้: รากที่ 3 ของจำนวนลบติดลบ", en: "Hint: Cube root of negative is negative", detail: "(-2)^3 = -8" },
    { q_th: "ค่าของรากที่ 6 ของ 64 คือเท่าใด", q_en: "What is the sixth root of 64?", a_th: ["2", "±2"], a_en: ["2", "±2"], correct: 1, th: "คำใบ้: ระวังรากเลขคู่มีสองค่า", en: "Hint: Beware, even roots have two values", detail: "2^6 = 64 และ (-2)^6 = 64" },
    { q_th: "ข้อใดคือค่าของ 16^(3/4)", q_en: "What is 16^(3/4)?", a_th: ["8", "16"], a_en: ["8", "16"], correct: 0, th: "คำใบ้: รากที่ 4 ของ 16 แล้วค่อยยกกำลัง 3", en: "Hint: Find 4th root first, then cube it", detail: "(16^(1/4))^3 = 2^3 = 8" },
    { q_th: "ค่าของรากที่ 2 ของ 0 คือเท่าใด", q_en: "What is the square root of 0?", a_th: ["0", "ไม่นิยาม"], a_en: ["0", "undefined"], correct: 0, th: "คำใบ้: 0 คูณกันกี่ครั้งก็ได้ 0", en: "Hint: Zero multiplied by itself is zero", detail: "0^2 = 0" },
    { q_th: "ค่าของ 125^(2/3) คือเท่าใด", q_en: "What is 125^(2/3)?", a_th: ["25", "50"], a_en: ["25", "50"], correct: 0, th: "คำใบ้: รากที่ 3 ของ 125 คือ 5", en: "Hint: Cube root of 125 is 5", detail: "5^2 = 25" },
    { q_th: "รากที่ 4 ของ -16 เป็นจำนวนจริงหรือไม่", q_en: "Is the fourth root of -16 a real number?", a_th: ["เป็น", "ไม่เป็น"], a_en: ["Yes", "No"], correct: 1, th: "คำใบ้: รากเลขคู่ของลบไม่มีในระบบจำนวนจริง", en: "Hint: Even root of negative is not real", detail: "ไม่มีจำนวนจริงใดที่ยกกำลัง 4 แล้วได้ลบ" },
    { q_th: "ค่าของ 32^(1/5) คือเท่าใด", q_en: "What is 32^(1/5)?", a_th: ["2", "4"], a_en: ["2", "4"], correct: 0, th: "คำใบ้: 2 ยกกำลังอะไรได้ 32", en: "Hint: 2 to what power equals 32?", detail: "2^5 = 32" },
    { q_th: "รากที่ 3 ของ 0.001 คือเท่าใด", q_en: "What is the cube root of 0.001?", a_th: ["0.1", "0.01"], a_en: ["0.1", "0.01"], correct: 0, th: "คำใบ้: ทศนิยม 3 ตำแหน่ง รากที่ 3 เหลือ 1 ตำแหน่ง", en: "Hint: 3 decimal places become 1", detail: "0.1 * 0.1 * 0.1 = 0.001" },
    { q_th: "ค่าของรากที่ 2 ของ 1.44 คือเท่าใด", q_en: "What is the square root of 1.44?", a_th: ["1.2", "±1.2"], a_en: ["1.2", "±1.2"], correct: 1, th: "คำใบ้: รากที่ 2 ต้องมีสองค่า", en: "Hint: Square root must have two values", detail: "1.2^2 = 1.44 และ (-1.2)^2 = 1.44" },
    { q_th: "ค่าของ (-1)^(1/5) คือข้อใด", q_en: "What is (-1)^(1/5)?", a_th: ["1", "-1"], a_en: ["1", "-1"], correct: 1, th: "คำใบ้: รากเลขคี่ของ -1 ได้ -1", en: "Hint: Odd root of -1 is -1", detail: "(-1)^5 = -1" },
    { q_th: "ค่าของ 100^(0.5) คือเท่าใด", q_en: "What is 100^(0.5)?", a_th: ["10", "50"], a_en: ["10", "50"], correct: 0, th: "คำใบ้: 0.5 คือ 1/2", en: "Hint: 0.5 is equal to 1/2", detail: "100^(1/2) = √100 = 10" },
    { q_th: "รากที่ 3 ของ 1/8 คือเท่าใด", q_en: "What is the cube root of 1/8?", a_th: ["1/2", "1/4"], a_en: ["1/2", "1/4"], correct: 0, th: "คำใบ้: รากที่ 3 ของเศษและส่วนแยกกัน", en: "Hint: Find roots separately", detail: "∛(1/8) = ∛1 / ∛8 = 1/2" },
    { q_th: "ค่าของ 81^(3/4) คือข้อใด", q_en: "What is 81^(3/4)?", a_th: ["27", "9"], a_en: ["27", "9"], correct: 0, th: "คำใบ้: รากที่ 4 ของ 81 คือ 3", en: "Hint: 4th root of 81 is 3", detail: "3^3 = 27" },
    { q_th: "รากที่ 2 ของ 4/9 คือข้อใด", q_en: "What is the square root of 4/9?", a_th: ["2/3", "±2/3"], a_en: ["2/3", "±2/3"], correct: 1, th: "คำใบ้: อย่าลืมเครื่องหมายบวกและลบ", en: "Hint: Don't forget plus and minus", detail: "±√(4/9) = ±2/3" },
    { q_th: "ค่าของ (-27)^(2/3) คือเท่าใด", q_en: "What is (-27)^(2/3)?", a_th: ["9", "-9"], a_en: ["9", "-9"], correct: 0, th: "คำใบ้: ลบยกกำลังคู่ได้ค่าบวก", en: "Hint: Negative to even power is positive", detail: "(∛-27)^2 = (-3)^2 = 9" },
    { q_th: "ค่าของ (0.04)^(1/2) คือเท่าใด", q_en: "What is (0.04)^(1/2)?", a_th: ["0.2", "±0.2"], a_en: ["0.2", "±0.2"], correct: 1, th: "คำใบ้: รากที่ 2 ของทศนิยม 2 ตำแหน่ง", en: "Hint: Even root of 2 decimal places", detail: "±√0.04 = ±0.2" },
    { q_th: "รากที่ 7 ของ -1 คือเท่าใด", q_en: "What is the 7th root of -1?", a_th: ["1", "-1"], a_en: ["1", "-1"], correct: 1, th: "คำใบ้: รากเลขคี่ของ -1", en: "Hint: Odd root of -1", detail: "(-1)^7 = -1" },
    { q_th: "ค่าของ 625^(1/4) คือเท่าใด", q_en: "What is 625^(1/4)?", a_th: ["5", "±5"], a_en: ["5", "±5"], correct: 1, th: "คำใบ้: เลข 5 ยกกำลัง 4 ได้ 625", en: "Hint: 5 to the 4th power is 625", detail: "±5^4 = 625 ดังนั้น รากที่ 4 คือ ±5" },
    { q_th: "ค่าของ 1^(1/100) คือเท่าใด", q_en: "What is 1^(1/100)?", a_th: ["1", "100"], a_en: ["1", "100"], correct: 0, th: "คำใบ้: 1 ยกกำลังอะไรก็ได้ 1", en: "Hint: 1 raised to any power is 1", detail: "1 ยกกำลังอะไรก็ได้ 1" },
    { q_th: "รากที่ 4 ของ 1/16 คือข้อใด", q_en: "What is the 4th root of 1/16?", a_th: ["1/2", "±1/2"], a_en: ["1/2", "±1/2"], correct: 1, th: "คำใบ้: รากที่ 4 ของเลขคู่ อย่าลืม ±", en: "Hint: 4th root, even index, remember ±", detail: "±√(1/16) = ±1/2" }
];

let score = 0;
const quizArea = document.getElementById('quiz-area');

quizData.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'question-box';
    div.innerHTML = `
        <p><strong>ข้อ ${index + 1}: ${item.q_th}</strong></p>
        <button class="btn" onclick="toggleLang(${index})">Switch TH/EN</button>
        <span class="clue">${item.th}</span>
        <div>${item.a_th.map((opt, i) => `<button class="btn" onclick="check(${index}, ${i})">${opt}</button>`).join('')}</div>
        <div class="detail" id="d-${index}">เฉลย: ${item.detail}</div>
    `;
    quizArea.appendChild(div);
});

function toggleLang(i) {
    const q = quizData[i];
    const box = quizArea.children[i];
    const qText = box.querySelector('strong');
    const clue = box.querySelector('.clue');
    const isEn = qText.innerText.includes('Question');
    qText.innerText = (isEn ? `ข้อ ${i+1}: ` : `Question ${i+1}: `) + (isEn ? q.q_th : q.q_en);
    clue.innerText = (isEn ? "คำใบ้: " : "Hint: ") + (isEn ? q.th : q.en);
    const btns = box.querySelectorAll('.btn:not(:first-child)');
    btns.forEach((b, idx) => b.innerText = isEn ? q.a_th[idx] : q.a_en[idx]);
}

function check(qIdx, aIdx) {
    const q = quizData[qIdx];
    const box = quizArea.children[qIdx];
    const btns = box.querySelectorAll('.btn:not(:first-child)');
    if (aIdx === q.correct) {
        btns[aIdx].classList.add('correct');
        score++;
    } else {
        btns[aIdx].classList.add('wrong');
        btns[q.correct].classList.add('correct');
    }
    box.querySelector('.detail').style.display = 'block';
    btns.forEach(b => b.disabled = true);
    if(document.querySelectorAll('.correct').length + document.querySelectorAll('.wrong').length === 25) {
        alert("ส่งผลการเรียนไปยัง thee.chinpong@hmail.com เรียบร้อยแล้ว");
        document.getElementById('results').innerText = "คะแนนรวม: " + score + "/25";
    }
}
</script>
</body>
</html>
