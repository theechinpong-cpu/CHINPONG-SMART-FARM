<form id="mathQuiz">
    <div id="questions"></div>
    <br>
    <button type="button" onclick="calculateResult()">ส่งคำตอบและดูวิเคราะห์</button>
</form>
<div id="finalResult"></div>

<script>
const questions = [
    {q: "1. ค่าของ $\\sqrt[3]{-8}$ คือข้อใด?", options: ["2", "-2", "4", "-4"], ans: 1},
    {q: "2. $\\sqrt{16}$ ในระบบจำนวนจริงมีค่าเท่าใด?", options: ["4", "±4", "-4", "ไม่มีคำตอบ"], ans: 0},
    {q: "3. $\\sqrt[4]{81}$ มีค่าเท่ากับข้อใด?", options: ["9", "3", "±3", "27"], ans: 1},
    {q: "4. เขียน $\\sqrt[5]{x^2}$ ในรูปเลขยกกำลังได้ตรงกับข้อใด?", options: ["x^{2/5}", "x^{5/2}", "x^{10}", "x^3"], ans: 0},
    {q: "5. $27^{2/3}$ มีค่าเท่ากับเท่าใด?", options: ["3", "9", "81", "243"], ans: 1},
    {q: "6. $(-32)^{1/5}$ มีค่าเท่ากับข้อใด?", options: ["2", "-2", "16", "-16"], ans: 1},
    {q: "7. $\\sqrt{x^2}$ มีค่าเท่ากับข้อใดเสมอ?", options: ["x", "-x", "|x|", "x^2"], ans: 2},
    {q: "8. $(\\sqrt[3]{x})^3$ เท่ากับข้อใด?", options: ["x^3", "x", "|x|", "ไม่นิยาม"], ans: 1},
    {q: "9. $\\sqrt[3]{2} \\cdot \\sqrt[3]{4}$ มีค่าเท่ากับข้อใด?", options: ["2", "4", "6", "8"], ans: 0},
    {q: "10. $\\frac{\\sqrt[4]{32}}{\\sqrt[4]{2}}$ มีค่าเท่าใด?", options: ["16", "8", "4", "2"], ans: 3},
    {q: "11. $(16^{1/2})^{1/2}$ มีค่าเท่าใด?", options: ["4", "2", "8", "16"], ans: 1},
    {q: "12. $8^{4/3}$ มีค่าเท่ากับข้อใด?", options: ["16", "32", "64", "128"], ans: 2},
    {q: "13. ข้อใดคือความหมายของ $\\sqrt[n]{a}$ เมื่อ n เป็นเลขคู่?", options: ["a ≥ 0", "a เป็นจำนวนจริงใดๆ", "a < 0", "a ต้องเป็นเลขคี่"], ans: 0},
    {q: "14. $0.001^{1/3}$ มีค่าเท่ากับเท่าใด?", options: ["0.1", "0.01", "0.001", "1"], ans: 0},
    {q: "15. $(x^2y^4)^{1/2}$ เมื่อ x, y > 0 คือข้อใด?", options: ["xy^2", "x^2y^2", "xy", "x^2y"], ans: 0},
    {q: "16. $\\sqrt[3]{x^6}$ เท่ากับข้อใด?", options: ["x^2", "x^3", "x", "x^{18}"], ans: 0},
    {q: "17. $25^{3/2}$ มีค่าเท่าใด?", options: ["75", "125", "625", "50"], ans: 1},
    {q: "18. $\\sqrt{50} + \\sqrt{18}$ มีค่าเท่าใด?", options: ["8\\sqrt{2}", "4\\sqrt{2}", "2\\sqrt{2}", "16\\sqrt{2}"], ans: 0},
    {q: "19. $4^{1/2} \\cdot 8^{1/3}$ มีค่าเท่าใด?", options: ["4", "6", "8", "2"], ans: 0},
    {q: "20. $(\\frac{1}{64})^{1/6}$ มีค่าเท่าใด?", options: ["1/2", "1/4", "1/8", "2"], ans: 0},
    {q: "21. $\\sqrt[4]{x^8}$ เมื่อ x เป็นจำนวนจริงใดๆ คือข้อใด?", options: ["x^2", "|x^2|", "x", "|x|"], ans: 0},
    {q: "22. รากที่สองของ 100 คือข้อใด?", options: ["10", "±10", "-10", "50"], ans: 1},
    {q: "23. $9^{1/2} + 27^{1/3}$ มีค่าเท่าใด?", options: ["5", "6", "7", "8"], ans: 1},
    {q: "24. $\\sqrt[5]{x^5}$ มีค่าเท่ากับข้อใด?", options: ["x", "|x|", "x^2", "ไม่นิยาม"], ans: 0},
    {q: "25. $64^{2/3} \\div 64^{1/3}$ มีค่าเท่าใด?", options: ["4", "8", "16", "2"], ans: 3}
];

const container = document.getElementById('questions');
questions.forEach((item, index) => {
    container.innerHTML += `<p><strong>${item.q}</strong><br>
        ${item.options.map((opt, i) => `<input type="radio" name="q${index}" value="${i}"> ${opt}`).join('<br>')}</p>`;
});

function calculateResult() {
    let score = 0;
    let weakness = [];
    questions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && parseInt(selected.value) === item.ans) {
            score++;
        } else {
            if (index < 5) weakness.push("นิยามของรากที่ n");
            else if (index < 15) weakness.push("สมบัติเลขยกกำลัง");
            else weakness.push("การจัดรูปนิพจน์และการประยุกต์ใช้");
        }
    });
    
    let resultText = `<h2>คะแนนของคุณ: ${score}/25</h2>`;
    if (score < 25) {
        resultText += `<h3>วิเคราะห์จุดอ่อน:</h3><p>เนื้อหาที่ควรทบทวนเพิ่มเติม: ${[...new Set(weakness)].join(', ')}</p>`;
    } else {
        resultText += `<h3>ยอดเยี่ยม! คุณแม่นยำในเนื้อหาบทนี้มากครับ!</h3>`;
    }
    document.getElementById('finalResult').innerHTML = resultText;
}
</script>
