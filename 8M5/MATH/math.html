<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบเลขยกกำลัง 25 ข้อ (ฉบับแก้ไขเศษส่วน) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f7f6; }
        .question { margin-bottom: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { font-size: 0.85em; color: #d35400; font-style: italic; margin-top: 8px; display: block; font-weight: bold; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f8f5; border-left: 5px solid #27ae60; border-radius: 5px; color: #2c3e50; }
        button { cursor: pointer; padding: 15px 30px; background: #2c3e50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; }
        h1 { color: #2c3e50; text-align: center; }
    </style>
</head>
<body>
    <h1>แบบทดสอบเลขยกกำลัง 25 ข้อ (ฉบับแก้ไขเศษส่วน)</h1>
    <div id="quiz-container"></div>
    <div style="text-align: center; margin-top: 20px;">
        <button onclick="submitQuiz()">ตรวจคำตอบและส่งผลคะแนน</button>
    </div>

    <script>
        const questions = [
            { q_th: "ค่าของ (27⅔) × (8⁻⅓) คือเท่าใด", a_th: ["9/2", "3/2", "9/4", "6"], correct: 0, detail: "27⅔ = (3³)⅔ = 9 และ 8⁻⅓ = 1/2 ดังนั้น 9 × 0.5 = 4.5 หรือ 9/2", clue: "แปลงฐานทุกตัวให้เป็นเลขจำนวนเฉพาะก่อนคำนวณ" },
            { q_th: "ถ้า 2ˣ⁺¹ = 32 แล้ว x มีค่าเท่าใด", a_th: ["3", "4", "5", "6"], correct: 1, detail: "2ˣ⁺¹ = 2⁵ จะได้ x+1 = 5 ดังนั้น x = 4", clue: "ทำให้ฐานทั้งสองข้างเท่ากัน (ฐาน 2)" },
            { q_th: "ค่าของ (16¼ × 81¼) คือเท่าใด", a_th: ["6", "12", "18", "24"], correct: 0, detail: "(16 × 81)¼ = (2⁴ × 3⁴)¼ = 2 × 3 = 6", clue: "ใช้สมบัติ (ab)ⁿ = aⁿ × bⁿ" },
            { q_th: "ค่าของ (125⁻⅓ ÷ 5⁻²) คือเท่าใด", a_th: ["5", "10", "25", "1/5"], correct: 0, detail: "125⁻⅓ = 1/5, 5⁻² = 1/25, (1/5) ÷ (1/25) = 5", clue: "เปลี่ยนเลขชี้กำลังติดลบให้เป็นเศษส่วนก่อน" },
            { q_th: "ถ้า 9ˣ = 27 แล้ว x มีค่าเท่าใด", a_th: ["1", "1.5", "2", "2.5"], correct: 1, detail: "(3²)ˣ = 3³ => 3²ˣ = 3³ => 2x = 3 => x = 1.5", clue: "แปลงฐาน 9 และ 27 ให้เป็นฐาน 3" },
            { q_th: "ค่าของ (0.0016)¼ คือเท่าใด", a_th: ["0.2", "0.4", "0.02", "0.04"], correct: 0, detail: "(16/10000)¼ = (2⁴ / 10⁴)¼ = 2/10 = 0.2", clue: "แปลงทศนิยมเป็นเศษส่วนก่อน" },
            { q_th: "ค่าของ (2ⁿ + 2ⁿ) มีค่าเท่ากับข้อใด", a_th: ["2²ⁿ", "4ⁿ", "2ⁿ⁺¹", "4²ⁿ"], correct: 2, detail: "2ⁿ + 2ⁿ = 2(2ⁿ) = 2ⁿ⁺¹", clue: "ดึงตัวร่วม 2ⁿ ออกมา" },
            { q_th: "ผลลัพธ์ของ (4³/² × 27⅓) / 6⁰ คือเท่าใด", a_th: ["12", "18", "24", "36"], correct: 2, detail: "(8 × 3) / 1 = 24", clue: "6⁰ มีค่าเท่ากับ 1 เสมอ" },
            { q_th: "ถ้า 4ˣ = 8ʸ แล้วอัตราส่วน x:y เป็นเท่าใด", a_th: ["2:3", "3:2", "1:2", "2:1"], correct: 1, detail: "(2²)ˣ = (2³)ʸ => 2x = 3y => x/y = 3/2", clue: "ทำฐานเป็นฐาน 2 ทั้งหมด" },
            { q_th: "ค่าของ ((-8)⅔) คือเท่าใด", a_th: ["4", "-4", "ไม่เป็นจำนวนจริง", "8"], correct: 0, detail: "((-2)³)⅔ = (-2)² = 4", clue: "รากที่ 3 ของจำนวนลบหาค่าได้" },
            { q_th: "รูปอย่างง่ายของ (a² × b³)⁴ คือข้อใด", a_th: ["a⁶ × b⁷", "a⁸ × b¹²", "a² × b¹²", "a⁸ × b⁷"], correct: 1, detail: "(aᵐ)ⁿ = aᵐⁿ", clue: "กระจายเลขชี้กำลังเข้าไปทุกตัวในวงเล็บ" },
            { q_th: "ค่าของ (2¹⁰ × 2⁻⁸)½ คือเท่าใด", a_th: ["1", "2", "4", "8"], correct: 1, detail: "(2²)½ = 2¹ = 2", clue: "บวกเลขชี้กำลังก่อนถอดราก" },
            { q_th: "ถ้า x² = 64 และ x < 0 แล้ว x⅔ คือเท่าใด", a_th: ["4", "-4", "16", "ไม่เป็นจำนวนจริง"], correct: 0, detail: "x = -8, (-8)⅔ = ((-2)³)⅔ = 4", clue: "ระวังเครื่องหมายลบเมื่อฐานเป็นเลขลบ" },
            { q_th: "ค่าของ (5ⁿ⁺² - 5ⁿ) / (5ⁿ⁺¹ - 5ⁿ) คือเท่าใด", a_th: ["5", "6", "24/4", "3"], correct: 1, detail: "5ⁿ(25-1) / 5ⁿ(5-1) = 24/4 = 6", clue: "ดึงตัวร่วม 5ⁿ ออกทั้งเศษและส่วน" },
            { q_th: "เลขใดมีค่ามากที่สุด: 2³⁰, 3²⁰, 4¹⁵", a_th: ["2³⁰", "3²⁰", "4¹⁵", "เท่ากันทุกค่า"], correct: 3, detail: "2³⁰ = (2²)¹⁵ = 4¹⁵ และ 3²⁰ = (3²)¹⁰ = 9¹⁰", clue: "ทำเลขชี้กำลังให้เท่ากันก่อนเปรียบเทียบ" },
            { q_th: "ค่าของ (½)⁻³ + (⅓)⁻² คือเท่าใด", a_th: ["15", "17", "18", "21"], correct: 1, detail: "2³ + 3² = 8 + 9 = 17", clue: "เลขชี้กำลังติดลบคือการกลับเศษเป็นส่วน" },
            { q_th: "ค่าของ √2 × √8 คือเท่าใด", a_th: ["√16", "4", "2", "8"], correct: 1, detail: "√(2 × 8) = √16 = 4", clue: "รากที่สองของ a คูณรากที่สองของ b = รากที่สองของ (ab)" },
            { q_th: "ถ้า 3ˣ⁺² = 81ˣ⁻¹ แล้ว x มีค่าเท่าใด", a_th: ["2", "3", "4", "5"], correct: 1, detail: "3ˣ⁺² = 3⁴⁽ˣ⁻¹⁾ => x+2 = 4x-4 => 3x = 6 => x = 2", clue: "แปลง 81 เป็น 3⁴" },
            { q_th: "ค่าของ (2⁰ + 3⁰ + 4⁰)² คือเท่าใด", a_th: ["3", "6", "9", "0"], correct: 2, detail: "(1+1+1)² = 3² = 9", clue: "จำนวนใดๆ ยกกำลัง 0 ได้ 1" },
            { q_th: "ผลสำเร็จของ (xᵃ / xᵇ)ᵃ⁺ᵇ คือข้อใด", a_th: ["xᵃ²⁻ᵇ²", "xᵃ²⁺ᵇ²", "x⁰", "xᵃ⁻ᵇ"], correct: 0, detail: "(xᵃ⁻ᵇ)ᵃ⁺ᵇ = xᵃ²⁻ᵇ²", clue: "ใช้สมบัติ (a-b)(a+b) = a² - b²" },
            { q_th: "ถ้า 5ˣ = 1/125 แล้ว x มีค่าเท่าใด", a_th: ["-3", "3", "1/3", "-1/3"], correct: 0, detail: "5ˣ = 5⁻³ => x = -3", clue: "1/aⁿ = a⁻ⁿ" },
            { q_th: "ค่าของ (8⁴ / 2⁴)½ คือเท่าใด", a_th: ["4", "8", "16", "32"], correct: 1, detail: "(4⁴)½ = 4² = 16", clue: "ลดทอนฐานก่อนทำเลขชี้กำลัง" },
            { q_th: "ค่าของ (3ⁿ × 9ⁿ) / 27ⁿ คือเท่าใด", a_th: ["1", "3ⁿ", "1/3ⁿ", "0"], correct: 2, detail: "(3ⁿ × 3²ⁿ) / 3³ⁿ = 3³ⁿ / 3³ⁿ = 1", clue: "ทำทุกอย่างให้เป็นฐาน 3" },
            { q_th: "ค่าของ √(x²) คือข้อใด (เมื่อ x เป็นจำนวนจริงใดๆ)", a_th: ["x", "-x", "|x|", "x²"], correct: 2, detail: "นิยามของรากที่สองของเลขยกกำลังสองคือค่าสัมบูรณ์", clue: "ต้องระวังเมื่อ x ติดลบ" },
            { q_th: "ผลสำเร็จของ (2ˣ + 2ˣ⁺¹) / 2ˣ คือเท่าใด", a_th: ["2", "3", "2ˣ⁺²", "4"], correct: 1, detail: "2ˣ(1+2) / 2ˣ = 3", clue: "ดึงตัวร่วม 2ˣ ออกมาตัดกัน" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                container.innerHTML += `<div class="question" id="q${i}">
                    <p><strong>${i + 1}. ${q.q_th}</strong></p>
                    ${q.a_th.map((opt, j) => `<input type="radio" name="q${i}" value="${j}"> ${opt}<br>`).join('')}
                    <span class="clue">Tutor's Tip: ${q.clue}</span>
                    <div class="detail" id="d${i}">เฉลย: ${q.detail}</div>
                </div>`;
            });
        }

        function submitQuiz() {
            alert("ระบบจำลองการส่งคะแนนไปยัง thee.chinpong@hmail.com สำเร็จแล้ว!");
            document.querySelectorAll('.detail').forEach(d => d.style.display = 'block');
        }

        renderQuiz();
    </script>
    <p style="text-align: center; font-size: 0.8em; color: #7f8c8d;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
