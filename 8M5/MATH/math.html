<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบเลขยกกำลัง 25 ข้อ (ระดับเข้มข้น) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f7f6; }
        .question { margin-bottom: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { font-size: 0.85em; color: #d35400; font-style: italic; margin-top: 8px; display: block; font-weight: bold; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f8f5; border-left: 5px solid #27ae60; border-radius: 5px; color: #2c3e50; }
        button { cursor: pointer; padding: 15px 30px; background: #2c3e50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; }
        h1 { color: #2c3e50; text-align: center; }
    </style>
</head>
<body>
    <h1>แบบทดสอบเลขยกกำลัง 25 ข้อ</h1>
    <div id="quiz-container"></div>
    <div style="text-align: center; margin-top: 20px;">
        <button onclick="submitQuiz()">ตรวจคำตอบและส่งผลคะแนน</button>
    </div>

    <script>
        const questions = [
            { q_th: "ค่าของ (27^(2/3) × 8^(-1/3)) คือเท่าใด", a_th: ["9/2", "3/2", "9/4", "6"], correct: 0, detail: "27^(2/3) = (3^3)^(2/3) = 9 และ 8^(-1/3) = 1/2 ดังนั้น 9 × 0.5 = 4.5 หรือ 9/2", clue: "แปลงฐานทุกตัวให้เป็นเลขจำนวนเฉพาะก่อนคำนวณ" },
            { q_th: "ถ้า 2^(x+1) = 32 แล้ว x มีค่าเท่าใด", a_th: ["3", "4", "5", "6"], correct: 1, detail: "2^(x+1) = 2^5 จะได้ x+1 = 5 ดังนั้น x = 4", clue: "ทำให้ฐานทั้งสองข้างเท่ากัน (ฐาน 2)" },
            { q_th: "ค่าของ (16^(1/4) × 81^(1/4)) คือเท่าใด", a_th: ["6", "12", "18", "24"], correct: 0, detail: "(16 × 81)^(1/4) = (2^4 × 3^4)^(1/4) = 2 × 3 = 6", clue: "ใช้สมบัติ (ab)^n = a^n × b^n" },
            { q_th: "ค่าของ (125^(-1/3) ÷ 5^(-2)) คือเท่าใด", a_th: ["5", "10", "25", "1/5"], correct: 0, detail: "125^(-1/3) = 1/5, 5^(-2) = 1/25, (1/5) ÷ (1/25) = 5", clue: "เปลี่ยนเลขชี้กำลังติดลบให้เป็นเศษส่วนก่อน" },
            { q_th: "ถ้า 9^(x) = 27 แล้ว x มีค่าเท่าใด", a_th: ["1", "1.5", "2", "2.5"], correct: 1, detail: "(3^2)^x = 3^3 => 3^(2x) = 3^3 => 2x = 3 => x = 1.5", clue: "แปลงฐาน 9 และ 27 ให้เป็นฐาน 3" },
            { q_th: "ค่าของ (0.0016)^(1/4) คือเท่าใด", a_th: ["0.2", "0.4", "0.02", "0.04"], correct: 0, detail: "(16/10000)^(1/4) = (2^4 / 10^4)^(1/4) = 2/10 = 0.2", clue: "แปลงทศนิยมเป็นเศษส่วนก่อน" },
            { q_th: "ค่าของ (2^n + 2^n) มีค่าเท่ากับข้อใด", a_th: ["2^(2n)", "4^n", "2^(n+1)", "4^(2n)"], correct: 2, detail: "2^n + 2^n = 2(2^n) = 2^(n+1)", clue: "ดึงตัวร่วม 2^n ออกมา" },
            { q_th: "ผลลัพธ์ของ (4^(3/2) × 27^(1/3)) / 6^0 คือเท่าใด", a_th: ["12", "18", "24", "36"], correct: 2, detail: "(8 × 3) / 1 = 24", clue: "6^0 มีค่าเท่ากับ 1 เสมอ" },
            { q_th: "ถ้า 4^x = 8^(y) แล้วอัตราส่วน x:y เป็นเท่าใด", a_th: ["2:3", "3:2", "1:2", "2:1"], correct: 1, detail: "(2^2)^x = (2^3)^y => 2x = 3y => x/y = 3/2", clue: "ทำฐานเป็นฐาน 2 ทั้งหมด" },
            { q_th: "ค่าของ ((-8)^(2/3)) คือเท่าใด", a_th: ["4", "-4", "ไม่เป็นจำนวนจริง", "8"], correct: 0, detail: "((-2)^3)^(2/3) = (-2)^2 = 4", clue: "รากที่ 3 ของจำนวนลบหาค่าได้" },
            { q_th: "ข้อใดคือรูปอย่างง่ายของ (a^2 × b^3)^4", a_th: ["a^6 × b^7", "a^8 × b^12", "a^2 × b^12", "a^8 × b^7"], correct: 1, detail: "(a^m)^n = a^(mn)", clue: "กระจายเลขชี้กำลังเข้าไปทุกตัวในวงเล็บ" },
            { q_th: "ค่าของ (2^(10) × 2^(-8))^(1/2) คือเท่าใด", a_th: ["1", "2", "4", "8"], correct: 1, detail: "(2^2)^(1/2) = 2^1 = 2", clue: "บวกเลขชี้กำลังก่อนถอดราก" },
            { q_th: "ถ้า x^2 = 64 และ x < 0 แล้ว x^(2/3) คือเท่าใด", a_th: ["4", "-4", "16", "ไม่เป็นจำนวนจริง"], correct: 0, detail: "x = -8, (-8)^(2/3) = ((-2)^3)^(2/3) = 4", clue: "ระวังเครื่องหมายลบเมื่อฐานเป็นเลขลบ" },
            { q_th: "ค่าของ (5^n+2 - 5^n) / (5^n+1 - 5^n) คือเท่าใด", a_th: ["5", "6", "24/4", "3"], correct: 1, detail: "5^n(25-1) / 5^n(5-1) = 24/4 = 6", clue: "ดึงตัวร่วม 5^n ออกทั้งเศษและส่วน" },
            { q_th: "เลขใดมีค่ามากที่สุด: 2^30, 3^20, 4^15", a_th: ["2^30", "3^20", "4^15", "เท่ากันทุกค่า"], correct: 3, detail: "2^30 = (2^2)^15 = 4^15 และ 3^20 = (3^2)^10 = 9^10", clue: "ทำเลขชี้กำลังให้เท่ากันก่อนเปรียบเทียบ" },
            { q_th: "ค่าของ (1/2)^(-3) + (1/3)^(-2) คือเท่าใด", a_th: ["15", "17", "18", "21"], correct: 1, detail: "2^3 + 3^2 = 8 + 9 = 17", clue: "เลขชี้กำลังติดลบคือการกลับเศษเป็นส่วน" },
            { q_th: "ค่าของ √2 × √8 คือเท่าใด", a_th: ["√16", "4", "2", "8"], correct: 1, detail: "√(2 × 8) = √16 = 4", clue: "รากที่สองของ a คูณรากที่สองของ b = รากที่สองของ (ab)" },
            { q_th: "ถ้า 3^(x+2) = 81^(x-1) แล้ว x มีค่าเท่าใด", a_th: ["2", "3", "4", "5"], correct: 1, detail: "3^(x+2) = 3^(4(x-1)) => x+2 = 4x-4 => 3x = 6 => x = 2", clue: "แปลง 81 เป็น 3^4" },
            { q_th: "ค่าของ (2^0 + 3^0 + 4^0)^2 คือเท่าใด", a_th: ["3", "6", "9", "0"], correct: 2, detail: "(1+1+1)^2 = 3^2 = 9", clue: "จำนวนใดๆ ยกกำลัง 0 ได้ 1" },
            { q_th: "ผลสำเร็จของ (x^a / x^b)^(a+b) คือข้อใด", a_th: ["x^(a^2-b^2)", "x^(a^2+b^2)", "x^0", "x^(a-b)"], correct: 0, detail: "(x^(a-b))^(a+b) = x^(a^2-b^2)", clue: "ใช้สมบัติ (a-b)(a+b) = a^2 - b^2" },
            { q_th: "ถ้า 5^x = 1/125 แล้ว x มีค่าเท่าใด", a_th: ["-3", "3", "1/3", "-1/3"], correct: 0, detail: "5^x = 5^(-3) => x = -3", clue: "1/a^n = a^(-n)" },
            { q_th: "ค่าของ (8^4 / 2^4)^(1/2) คือเท่าใด", a_th: ["4", "8", "16", "32"], correct: 1, detail: "(4^4)^(1/2) = 4^2 = 16 (หรือ (2^12/2^4)^0.5 = (2^8)^0.5 = 2^4 = 16)", clue: "ลดทอนฐานก่อนทำเลขชี้กำลัง" },
            { q_th: "ค่าของ (3^n × 9^n) / 27^n คือเท่าใด", a_th: ["1", "3^n", "1/3^n", "0"], correct: 2, detail: "(3^n × 3^2n) / 3^3n = 3^3n / 3^3n = 1", clue: "ทำทุกอย่างให้เป็นฐาน 3" },
            { q_th: "ค่าของ √(x^2) คือข้อใด (เมื่อ x เป็นจำนวนจริงใดๆ)", a_th: ["x", "-x", "|x|", "x^2"], correct: 2, detail: "นิยามของรากที่สองของเลขยกกำลังสองคือค่าสัมบูรณ์", clue: "ต้องระวังเมื่อ x ติดลบ" },
            { q_th: "ผลสำเร็จของ (2^x + 2^(x+1)) / 2^x คือเท่าใด", a_th: ["2", "3", "2^x+2", "4"], correct: 1, detail: "2^x(1+2) / 2^x = 3", clue: "ดึงตัวร่วม 2^x ออกมาตัดกัน" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                container.innerHTML += `<div class="question" id="q${i}">
                    <p><strong>${i + 1}. ${q.q_th}</strong></p>
                    ${q.a_th.map((opt, j) => `<input type="radio" name="q${i}" value="${j}"> ${opt}<br>`).join('')}
                    <span class="clue">Tutor's Tip: ${q.clue}</span>
                    <div class="detail" id="d${i}">เฉลย: ${q.detail}</div>
                </div>`;
            });
        }

        function submitQuiz() {
            alert("ระบบจำลองการส่งคะแนนไปยัง thee.chinpong@hmail.com สำเร็จแล้ว!");
            document.querySelectorAll('.detail').forEach(d => d.style.display = 'block');
        }

        renderQuiz();
    </script>
    <p style="text-align: center; font-size: 0.8em; color: #7f8c8d;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
