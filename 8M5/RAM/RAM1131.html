<script>
const fullQuizData = [
    { q: "ข้อใดคือความหมายของ 'Digital Literacy' ที่ถูกต้องที่สุด?", a: ["ทักษะความเข้าใจและใช้เทคโนโลยีดิจิทัล", "ทักษะการซ่อมแซมคอมพิวเตอร์", "ทักษะการเล่นเกมออนไลน์", "ทักษะการเขียนโปรแกรมขั้นสูง"], c: 0, r: "Digital Literacy คือทักษะในการค้นหา ประเมิน ใช้ สร้าง และสื่อสารข้อมูลโดยใช้เทคโนโลยีสารสนเทศและดิจิทัลอย่างปลอดภัยและมีประสิทธิภาพในชีวิตประจำวัน" },
    { q: "การประเมินความน่าเชื่อถือของข้อมูลบนอินเทอร์เน็ตควรพิจารณาสิ่งใดเป็นอันดับแรก?", a: ["จำนวนยอดกดไลก์และแชร์", "ความสวยงามของเว็บไซต์", "แหล่งที่มาและผู้แต่งที่มีความเชี่ยวชาญ", "ความเร็วในการโหลดหน้าเว็บ"], c: 2, r: "ข้อมูลที่น่าเชื่อถือต้องมาจากแหล่งอ้างอิงที่เป็นทางการ มีตัวตนผู้เขียนที่ตรวจสอบได้ และมีความเชี่ยวชาญในเรื่องนั้นๆ ไม่ใช่กระแสยอดไลก์หรือความสวยงาม" },
    { q: "ภัยคุกคามประเภทใดที่ใช้วิธีปลอมแปลงหน้าเว็บหรืออีเมลเพื่อหลอกเอาข้อมูลส่วนตัว?", a: ["Phishing", "Malware", "Ransomware", "Spyware"], c: 0, r: "Phishing คือการหลอกลวงออนไลน์โดยสร้างหน้าเว็บหรืออีเมลปลอมให้คล้ายกับสถาบันการเงินหรือหน่วยงานจริง เพื่อตกเบ็ดหลอกลวงเหยื่อ" },
    { q: "ข้อใดเป็นการตั้งรหัสผ่าน (Password) ที่มีความปลอดภัยสูงที่สุด?", a: ["12345678", "password", "P@ss123w0rd!", "วันเดือนปีเกิดตัวเอก"], c: 2, r: "รหัสผ่านที่ดีควรมีความยาวอย่างน้อย 8 ตัวอักษรขึ้นไป และผสมผสานกันระหว่างอักษรตัวพิมพ์ใหญ่ ตัวพิมพ์เล็ก ตัวเลข และสัญลักษณ์พิเศษ" },
    { q: "คำว่า 'Cyberbullying' หมายถึงพฤติกรรมใด?", a: ["การซื้อของออนไลน์แล้วไม่ได้ของ", "การกลั่นแกล้งรังแกกันในโลกออนไลน์", "การส่งอีเมลขยะจำนวนมาก", "การโจรกรรมข้อมูลระบบธนาคาร"], c: 1, r: "Cyberbullying คือการระรานทางไซเบอร์ เช่น การโพสต์ด่าทอ โจมตี ข่มขู่ หรือสร้างความอับอายให้กับผู้อื่นผ่านสื่อสังคมออนไลน์" },
    { q: "การทำธุรกรรมทางการเงินออนไลน์ (Mobile Banking) ข้อใดปลอดภัยที่สุด?", a: ["ใช้งานผ่าน Wi-Fi สาธารณะที่ไม่มีรหัสผ่าน", "ใช้งานผ่านเครือข่ายอินเทอร์เน็ตมือถือ (3G/4G/5G) ของตนเอง", "ฝากเพื่อนให้ล็อกอินเข้าใช้งานแทน", "บันทึกรหัสผ่านไว้ในโน้ตที่เปิดเผย"], c: 1, r: "เครือข่าย Cellular (3G/4G/5G) ส่วนบุคคลมีความปลอดภัยจากการดักรับข้อมูล (Man-in-the-Middle Attack) สูงกว่า Wi-Fi สาธารณะอย่างมาก" },
    { q: "กฎหมายใดในประเทศไทยที่คุ้มครองข้อมูลส่วนบุคคลของประชาชน?", a: ["พ.ร.บ. คอมพิวเตอร์", "พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล (PDPA)", "พ.ร.บ. ลิขสิทธิ์", "พ.ร.บ. การรักษาความมั่นคงปลอดภัยไซเบอร์"], c: 1, r: "PDPA (Personal Data Protection Act) คือกฎหมายที่ออกมาคุ้มครองสิทธิ์และป้องกันการนำข้อมูลส่วนบุคคลของประชาชนไปใช้โดยไม่ได้รับอนุญาต" },
    { q: "หากได้รับอีเมลแจ้งว่า 'คุณคือผู้โชคดีได้รับรางวัลใหญ่ ให้คลิกลิงก์เพื่อยืนยันตัวตน' ควรทำอย่างไร?", a: ["รีบคลิกลิงก์ทันทีกลัวเสียสิทธิ์", "ส่งต่อให้เพื่อนร่วมลุ้น", "ลบอีเมลทิ้งหรือตรวจสอบกับผู้จัดกิจกรรมอย่างเป็นทางการก่อน", "แชร์ลง Facebook"], c: 2, r: "ของฟรีหรือรางวัลใหญ่ที่ไม่ชัดเจนมักเป็นกลลวง Phishing ควรตั้งสติ ตรวจสอบจากช่องทางหลัก หรือลบข้อความทิ้งทันที" },
    { q: "ข้อใดจัดเป็นข้อมูลส่วนบุคคลที่ต้องปกปิดและระมัดระวังในการเปิดเผย?", a: ["ชื่อโรงเรียนมัธยมเก่า", "เลขประจำตัวประชาชน", "สีที่ชอบ", "สถานที่ท่องเที่ยวที่ชอบ"], c: 1, r: "เลขประจำตัวประชาชนเป็นข้อมูลระบุตัวตนขั้นพื้นฐานที่เป็นความลับเฉพาะบุคคล หากรั่วไหลอาจถูกนำไปสวมสิทธิ์ทำธุรกรรมผิดกฎหมายได้" },
    { q: "Digital Footprint หมายถึงอะไร?", a: ["ร่องรอยกิจกรรมดิจิทัลที่ผู้ใช้ทิ้งไว้บนอินเทอร์เน็ต", "ขนาดของหน้าจอสมาร์ตโฟน", "ความเร็วของสัญญาณอินเทอร์เน็ต", "โปรแกรมล้างไฟล์ขยะในคอมพิวเตอร์"], c: 0, r: "Digital Footprint คือร่องรอยดิจิทัล เช่น ประวัติการค้นหา การโพสต์ หรือคอมเมนต์ ซึ่งจะคงอยู่บนอินเทอร์เน็ตและสืบค้นย้อนหลังได้ตลอดไป" },
    { q: "การแชร์ข่าวปลอม (Fake News) โดยรู้อยู่แล้วว่าเป็นความจริงเท็จ มีความผิดตามกฎหมายใด?", a: ["พ.ร.บ. ลิขสิทธิ์", "พ.ร.บ. ว่าด้วยการกระทำความผิดเกี่ยวกับคอมพิวเตอร์", "พ.ร.บ. แพ่งและพาณิชย์", "พ.ร.บ. คุ้มครองผู้บริโภค"], c: 1, r: "มาตรา 14 ของ พ.ร.บ. คอมพิวเตอร์ บัญญัติความผิดชัดเจนเกี่ยวกับการนำเข้าหรือส่งต่อข้อมูลคอมพิวเตอร์อันเป็นเท็จที่น่าจะเกิดความเสียหายต่อประชาชน" },
    { q: "เทคโนโลยีใดที่ช่วยในการเก็บข้อมูลแบบกระจายศูนย์ มีความปลอดภัยและตรวจสอบได้ยากที่จะปลอมแปลง?", a: ["Cloud Computing", "Blockchain", "Big Data", "Artificial Intelligence"], c: 1, r: "Blockchain มีโครงสร้างการจัดเก็บข้อมูลแบบกระจายศูนย์ (Decentralized Ledger) ข้อมูลเชื่อมโยงกันเป็นบล็อกๆ และต้องตรวจสอบร่วมกัน ทำให้ปลอมแปลงยาก" },
    { q: "คำว่า Netiquette หมายถึงอะไร?", a: ["ความเร็วอินเทอร์เน็ต", "มารยาทและข้อควรปฏิบัติในการใช้อินเทอร์เน็ต", "การค้นหาข้อมูลขั้นสูง", "ระบบรักษาความปลอดภัยเครือข่าย"], c: 1, r: "Netiquette มาจากคำว่า Network + Etiquette หมายถึง จริยธรรม กฎเกณฑ์ และมารยาททางสังคมที่ผู้ใช้งานอินเทอร์เน็ตพึงกระทำต่อกัน" },
    { q: "การสำรองข้อมูล (Backup) มีวัตถุประสงค์หลักเพื่ออะไร?", a: ["เพื่อความสวยงามของระบบ", "เพื่อป้องกันข้อมูลสูญหายจากภัยคุกคามหรืออุปกรณ์ชำรุด", "เพื่อเพิ่มความเร็วในการประมวลผล", "เพื่อลดค่าใช้จ่ายอินเทอร์เน็ต"], c: 1, r: "วัตถุประสงค์หลักของการ Backup คือการทำสำเนาข้อมูลเก็บไว้แยกต่างหาก เพื่อกู้คืนกลับมาใช้งานได้เมื่อไฟล์หลักเสียหายหรือถูกไวรัสทำลาย" },
    { q: "การนำภาพถ่ายที่ผู้อื่นถ่ายไว้มาใช้ในงานของตนเองโดยไม่ได้รับอนุญาตและไม่ระบุที่มา ถือเป็นการละเมิดสิ่งใด?", a: ["สิทธิบัตร", "ลิขสิทธิ์", "เครื่องหมายการค้า", "ความลับทางการค้า"], c: 1, r: "ลิขสิทธิ์ (Copyright) คุ้มครองงานสร้างสรรค์ประเภทวรรณกรรม ศิลปกรรม ภาพถ่าย หรือดนตรี ซึ่งเกิดขึ้นทันทีเมื่อสร้างสรรค์ผลงานขึ้นมา" },
    { q: "ข้อใดคือลักษณะของระบบ Cloud Computing?", a: ["การเก็บข้อมูลไว้ในฮาร์ดดิสก์พกพา", "การบริการพื้นที่จัดเก็บและประมวลผลข้อมูลผ่านอินเทอร์เน็ต", "การเชื่อมต่อสายแลนระหว่างคอมพิวเตอร์", "การพิมพ์เอกสารผ่านเครื่องพิมพ์ไร้สาย"], c: 1, r: "Cloud Computing คือการเข้าถึงทรัพยากรคอมพิวเตอร์ เช่น พื้นที่เก็บข้อมูล หรือระบบประมวลผล ผ่านเครือข่ายอินเทอร์เน็ตออนไลน์" },
    { q: "มัลแวร์ประเภทใดที่ทำการเรียกค่าไถ่โดยการเข้ารหัสลับไฟล์ข้อมูลในคอมพิวเตอร์?", a: ["Trojan", "Worm", "Ransomware", "Spyware"], c: 2, r: "Ransomware (มัลแวร์เรียกค่าไถ่) จะเข้าล็อกรหัสไฟล์ข้อมูลในเครื่อง และเรียกร้องให้เหยื่อจ่ายเงินเพื่อแลกกับคีย์ถอดรหัสไฟล์" },
    { q: "การยืนยันตัวตนแบบสองปัจจัย (Two-Factor Authentication: 2FA) ช่วยประโยชน์ด้านใด?", a: ["ช่วยให้ดาวน์โหลดข้อมูลได้เร็วขึ้น", "เพิ่มความปลอดภัยในการเข้าสู่ระบบอีกขั้นหนึ่ง", "ทำให้หน้าจอแสดงผลชัดเจนขึ้น", "ประหยัดแบตเตอรี่อุปกรณ์"], c: 1, r: "2FA ช่วยสร้างความปลอดภัยด่านที่สอง เช่น ระบบต้องการรหัสผ่านปกติ ร่วมกับ รหัส OTP ส่งเข้ามือถือ ทำให้แฮกเกอร์เจาะระบบยากขึ้น" },
    { q: "เมื่อพบเห็นเนื้อหาที่ไม่เหมาะสมบนสื่อสังคมออนไลน์ สิ่งแรกที่ควรทำคืออะไร?", a: ["กดแชร์เพื่อประจาน", "เขียนคอมเมนต์ต่อว่ารุนแรง", "กดรายงาน (Report) ต่อผู้ให้บริการแพลตฟอร์ม", "ปล่อยผ่านและไม่สนใจ"], c: 2, r: "การใช้ปุ่มรายงานระบบ (Report) เป็นวิธีที่เป็นสากลและถูกต้องที่สุด เพื่อให้ทีมงานแพลตฟอร์มตรวจสอบและสกัดกั้นเนื้อหาดังกล่าว" },
    { q: "ข้อใดไม่ใช่ทักษะย่อยใน Digital Literacy?", a: ["การใช้เทคโนโลยีดิจิทัล", "การสร้างสรรค์สื่อดิจิทัล", "การซ่อมแซมแผงวงจรอิเล็กทรอนิกส์", "การเข้าใจและคิดวิเคราะห์สื่อดิจิทัล"], c: 2, r: "การซ่อมแผงวงจรเป็นทักษะวิศวกรรมฮาร์ดแวร์เชิงลึก (Hardware Engineering) ไม่ใช่ทักษะทั่วไปของการรู้เท่าทันและการใช้งานดิจิทัล" },

    { q: "เทคโนโลยีใดช่วยให้เราเห็นวัตถุจำลอง 3 มิติ ปรากฏอยู่ในสภาพแวดล้อมจริงผ่านหน้าจอมือถือ?", a: ["Virtual Reality (VR)", "Augmented Reality (AR)", "Deep Learning", "Block Chain"], c: 1, r: "AR (Augmented Reality) คือการนำภาพเสมือนกราฟิกมาซ้อนทับบนโลกความจริง เช่น ฟิลเตอร์กล้อง หรือเกม Pokémon GO" },

];

const quizContainer = document.getElementById('quiz-container');
const scoreDisplay = document.getElementById('score-display');
let score = 0;
let answeredCount = 0;

// Render Quiz
fullQuizData.forEach((item, index) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question-block';
    qDiv.id = `q-block-${index}`;
    
    const qTitle = document.createElement('div');
    qTitle.className = 'question-title';
    qTitle.innerText = `${index + 1}. ${item.q}`;
    qDiv.appendChild(qTitle);
    
    const uList = document.createElement('ul');
    uList.className = 'options';
    uList.id = `options-group-${index}`;
    
    item.a.forEach((option, oIndex) => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        label.className = 'option-label';
        label.id = `label-${index}-${oIndex}`;
        
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `question-${index}`;
        radio.value = oIndex;
        radio.onclick = () => handleAnswer(index, oIndex, item.c, item.r);
        
        label.appendChild(radio);
        label.appendChild(document.createTextNode(' ' + option));
        li.appendChild(label);
        uList.appendChild(li);
    });
    
    qDiv.appendChild(uList);
    
    const expDiv = document.createElement('div');
    expDiv.className = 'explanation';
    expDiv.id = `exp-${index}`;
    qDiv.appendChild(expDiv);
    
    quizContainer.appendChild(qDiv);
});

function handleAnswer(qIndex, selectedIndex, correctIndex, rationale) {
    const optionsGroup = document.getElementById(`options-group-${qIndex}`);
    const expDiv = document.getElementById(`exp-${qIndex}`);
    
    // Disable further clicking on this question
    optionsGroup.classList.add('disabled');
    answeredCount++;
    
    // Highlight correct answer
    const correctLabel = document.getElementById(`label-${qIndex}-${correctIndex}`);
    correctLabel.classList.add('correct-choice');
    
    if (selectedIndex === correctIndex) {
        score++;
        expDiv.innerHTML = `<strong>ถูกต้อง!</strong> ${rationale}`;
        expDiv.className = 'explanation exp-correct';
    } else {
        const wrongLabel = document.getElementById(`label-${qIndex}-${selectedIndex}`);
        wrongLabel.classList.add('wrong-choice');
        expDiv.innerHTML = `<strong>ไม่ถูกต้อง (คำตอบที่ถูกคือข้อที่ได้รับการไฮไลต์สีเขียว)</strong><br>${rationale}`;
        expDiv.className = 'explanation exp-wrong';
    }
    
    // Show explanation immediately
    expDiv.style.display = 'block';
    
    // Update Score
    scoreDisplay.innerText = `คะแนนปัจจุบัน: ${score} / ${fullQuizData.length}`;
    
    if (answeredCount === fullQuizData.length) {
        setTimeout(() => {
            alert(`ยินดีด้วย! คุณทำข้อสอบครบ ${fullQuizData.length} ข้อแล้ว\nได้คะแนนรวม: ${score} เต็ม ${fullQuizData.length} คะแนน (${((score/fullQuizData.length)*100).toFixed(2)}%)`);
        }, 500);
    }
}
</script>
