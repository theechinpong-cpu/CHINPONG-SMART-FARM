<!DOCTYPE html>
<html lang="th">
<head>

    <style>

</head>
<body>

<div class="container">

</div>

<script>
const quizData = [
    { q: "ข้อใดคือความหมายของ 'Digital Literacy' ที่ถูกต้องที่สุด?", a: ["ทักษะความเข้าใจและใช้เทคโนโลยีดิจิทัล", "ทักษะการซ่อมแซมคอมพิวเตอร์", "ทักษะการเล่นเกมออนไลน์", "ทักษะการเขียนโปรแกรมขั้นสูง"], c: 0 },

    { q: "คำว่า 'Cyberbullying' หมายถึงพฤติกรรมใด?", a: ["การซื้อของออนไลน์แล้วไม่ได้ของ", "การกลั่นแกล้งรังแกกันในโลกออนไลน์", "การส่งอีเมลขยะจำนวนมาก", "การโจรกรรมข้อมูลระบบธนาคาร"], c: 1 },

    { q: "กฎหมายใดในประเทศไทยที่คุ้มครองข้อมูลส่วนบุคคลของประชาชน?", a: ["พ.ร.บ. คอมพิวเตอร์", "พ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล (PDPA)", "พ.ร.บ. ลิขสิทธิ์", "พ.ร.บ. การรักษาความมั่นคงปลอดภัยไซเบอร์"], c: 1 },
    { q: "หากได้รับอีเมลแจ้งว่า 'คุณคือผู้โชคดีได้รับรางวัลใหญ่ ให้คลิกลิงก์เพื่อยืนยันตัวตน' ควรทำอย่างไร?", a: ["รีบคลิกลิงก์ทันทีกลัวเสียสิทธิ์", "ส่งต่อให้เพื่อนร่วมลุ้น", "ลบอีเมลทิ้งหรือตรวจสอบกับผู้จัดกิจกรรมอย่างเป็นทางการก่อน", "แชร์ลง Facebook"], c: 2 },

    { q: "Digital Footprint หมายถึงอะไร?", a: ["ร่องรอยกิจกรรมดิจิทัลที่ผู้ใช้ทิ้งไว้บนอินเทอร์เน็ต", "ขนาดของหน้าจอสมาร์ตโฟน", "ความเร็วของสัญญาณอินเทอร์เน็ต", "โปรแกรมล้างไฟล์ขยะในคอมพิวเตอร์"], c: 0 },
    { q: "การแชร์ข่าวปลอม (Fake News) โดยรู้อยู่แล้วว่าเป็นความจริงเท็จ มีความผิดตามกฎหมายใด?", a: ["พ.ร.บ. ลิขสิทธิ์", "พ.ร.บ. ว่าด้วยการกระทำความผิดเกี่ยวกับคอมพิวเตอร์", "พ.ร.บ. แพ่งและพาณิชย์", "พ.ร.บ. คุ้มครองผู้บริโภค"], c: 1 },

    { q: "การนำภาพถ่ายที่ผู้อื่นถ่ายไว้มาใช้ในงานของตนเองโดยไม่ได้รับอนุญาตและไม่ระบุที่มา ถือเป็นการละเมิดสิ่งใด?", a: ["สิทธิบัตร", "ลิขสิทธิ์", "เครื่องหมายการค้า", "ความลับทางการค้า"], c: 1 },
    { q: "ข้อใดคือลักษณะของระบบ Cloud Computing?", a: ["การเก็บข้อมูลไว้ในฮาร์ดดิสก์พกพา", "การบริการพื้นที่จัดเก็บและประมวลผลข้อมูลผ่านอินเทอร์เน็ต", "การเชื่อมต่อสายแลนระหว่างคอมพิวเตอร์", "การพิมพ์เอกสารผ่านเครื่องพิมพ์ไร้สาย"], c: 1 },
    { q: "มัลแวร์ประเภทใดที่ทำการเรียกค่าไถ่โดยการเข้ารหัสลับไฟล์ข้อมูลในคอมพิวเตอร์?", a: ["Trojan", "Worm", "Ransomware", "Spyware"], c: 2 },

    { q: "เมื่อพบเห็นเนื้อหาที่ไม่เหมาะสมบนสื่อสังคมออนไลน์ สิ่งแรกที่ควรทำคืออะไร?", a: ["กดแชร์เพื่อประจาน", "เขียนคอมเมนต์ต่อว่ารุนแรง", "กดรายงาน (Report) ต่อผู้ให้บริการแพลตฟอร์ม", "ปล่อยผ่านและไม่สนใจ"], c: 2 },
    { q: "ข้อใดไม่ใช่ทักษะย่อยใน Digital Literacy?", a: ["การใช้เทคโนโลยีดิจิทัล", "การสร้างสรรค์สื่อดิจิทัล", "การซ่อมแซมแผงวงจรอิเล็กทรอนิกส์", "การเข้าใจและคิดวิเคราะห์สื่อดิจิทัล"], c: 2 },
    { q: "สัญลักษณ์ใดบนแถบที่อยู่เว็บ (Address Bar) ที่บ่งบอกว่าเว็บไซต์มีการเข้ารหัสความปลอดภัย?", a: ["รูปดวงตา", "รูปแม่กุญแจล็อก", "รูปแว่นขยาย", "รูปเครื่องหมายคำถาม"], c: 1 },

    { q: "การกระทำใดเสี่ยงต่อการโดนแฮกข้อมูลมากที่สุด?", a: ["เปิดสิทธิ์การเข้าถึงตำแหน่งตลอดเวลากับทุกแอปพลิเคชัน", "ใช้ Wi-Fi ฟรีในร้านกาแฟทำธุรกรรมธนาคาร", "อัปเดตระบบปฏิบัติการสมาร์ตโฟนสม่ำเสมอ", "เปิดใช้งานโหมดเครื่องบินเมื่อไม่ได้ใช้"], c: 1 },

const quizContainer = document.getElementById('quiz-container');

// Render Quiz
quizData.forEach((item, index) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'question-block';
    
    const qTitle = document.createElement('div');
    qTitle.className = 'question-title';
    qTitle.innerText = `${index + 1}. ${item.q}`;
    qDiv.appendChild(qTitle);
    
    const uList = document.createElement('ul');
    uList.className = 'options';
    
    item.a.forEach((option, oIndex) => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        label.id = `label-${index}-${oIndex}`;
        
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `question-${index}`;
        radio.value = oIndex;
        
        label.appendChild(radio);
        label.appendChild(document.createTextNode(option));
        li.appendChild(label);
        uList.appendChild(li);
    });
    
    qDiv.appendChild(uList);
    quizContainer.appendChild(qDiv);
});

function checkAnswers() {
    let score = 0;
    
    // Reset background styles
    quizData.forEach((item, qIndex) => {
        item.a.forEach((_, oIndex) => {
            const lbl = document.getElementById(`label-${qIndex}-${oIndex}`);
            lbl.className = '';
        });
    });
    
    // Grade Quiz
    quizData.forEach((item, qIndex) => {
        const selected = document.querySelector(`input[name="question-${qIndex}"]:checked`);
        
        // Highlight correct answer in green
        const correctLabel = document.getElementById(`label-${qIndex}-${item.c}`);
        correctLabel.classList.add('correct');
        
        if (selected) {
            const answerIndex = parseInt(selected.value);
            if (answerIndex === item.c) {
                score++;
            } else {
                // Highlight wrong selected answer in red
                const wrongLabel = document.getElementById(`label-${qIndex}-${answerIndex}`);
                wrongLabel.classList.add('incorrect');
            }
        }
    });
    
    // Display result
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = `คุณได้คะแนน ${score} เต็ม ${quizData.length} ข้อ<br>(${((score/quizData.length)*100).toFixed(2)}%)`;
    resultDiv.style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}
</script>
