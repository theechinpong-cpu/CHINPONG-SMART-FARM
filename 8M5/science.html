<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบวิทยาศาสตร์กายภาพ - การเคลื่อนที่และแรง</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f4f9; }
        .question-container { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { background: #fff3cd; padding: 10px; border-left: 5px solid #ffc107; margin: 10px 0; font-style: italic; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; margin-top: 10px; }
        .correct { background: #d4edda !important; }
        .wrong { background: #f8d7da !important; }
        #summary { margin-top: 30px; padding: 20px; background: #e2e3e5; display: none; }
    </style>
</head>
<body>
    <h1>แบบทดสอบเรื่อง การเคลื่อนที่และแรง (25 ข้อ)</h1>
    <div id="quiz-area"></div>
    <button class="btn" onclick="submitQuiz()">ส่งคำตอบและวิเคราะห์ผล</button>
    <div id="summary"></div>

    <script>
        const quizData = [
            { q_th: "จุดอ้างอิงมีไว้เพื่ออะไร?", a_th: ["เพื่อบอกความเร็ว", "เพื่อบอกตำแหน่ง", "เพื่อบอกมวล", "เพื่อบอกน้ำหนัก"], correct: 1, th: "คิดถึงเวลาเราบอกว่าเพื่อนยืนอยู่ห่างจากเสาธงกี่เมตร" },
            { q_th: "การกระจัดเป็นปริมาณประเภทใด?", a_th: ["สเกลาร์", "เวกเตอร์", "มวล", "เวลา"], correct: 1, th: "ปริมาณที่ต้องบอกทั้งขนาดและทิศทาง" },
            { q_th: "กฎข้อที่ 1 ของนิวตันเรียกว่าอะไร?", a_th: ["กฎของแรง", "กฎของความเฉื่อย", "กฎของแรงปฏิกิริยา", "กฎของความเร่ง"], correct: 1, th: "การรักษาสภาพการเคลื่อนที่เดิม" },
            { q_th: "หากวัตถุหยุดนิ่ง แรงลัพธ์มีค่าเท่าใด?", a_th: ["มากกว่าศูนย์", "ศูนย์", "ขึ้นกับมวล", "ขึ้นกับความเร่ง"], correct: 1, th: "กฎข้อที่ 1 ของนิวตัน" },
            { q_th: "ปริมาณเวกเตอร์ต้องบอกสิ่งใด?", a_th: ["ขนาด", "ขนาดและทิศทาง", "ทิศทาง", "ความเร็ว"], correct: 1, th: "ถามว่า 'ไปทางไหน'" },
            { q_th: "แรงโน้มถ่วงขึ้นอยู่กับอะไร?", a_th: ["มวลและระยะห่าง", "รูปร่างและสี", "อุณหภูมิ", "ความเร็ว"], correct: 1, th: "กฎของนิวตันเรื่องแรงโน้มถ่วง" },
            { q_th: "หน่วยของแรงคืออะไร?", a_th: ["จูล", "นิวตัน", "วัตต์", "เมตร/วินาที"], correct: 1, th: "ชื่อนักวิทยาศาสตร์" },
            { q_th: "ความเร่งคืออะไร?", a_th: ["ระยะทาง", "การเปลี่ยนความเร็วต่อเวลา", "แรง", "ความเร็วคงที่"], correct: 1, th: "เหยียบคันเร่ง" },
            { q_th: "แรงนิวเคลียร์เข้มทำหน้าที่อะไร?", a_th: ["ดึงดูดดาว", "ยึดเหนี่ยวนิวคลีออน", "ไฟฟ้าสถิต", "สลายตัว"], correct: 1, th: "ความเข้มสูงมาก" },
            { q_th: "แรงเสียดทานมีทิศทางอย่างไร?", a_th: ["ทิศเดียวกับการเคลื่อนที่", "ตรงข้ามการเคลื่อนที่", "ขึ้นกับน้ำหนัก", "พุ่งสู่ศูนย์กลางโลก"], correct: 1, th: "ต้านการเคลื่อนที่" },
            { q_th: "ข้อใดเป็นปริมาณสเกลาร์?", a_th: ["แรง", "เวลา", "ความเร็ว", "ความเร่ง"], correct: 1, th: "ปริมาณที่ไม่มีทิศทาง" },
{ q_th: "กฎข้อที่ 2 ของนิวตันคืออะไร?", a_th: ["F=ma", "v=u+at", "W=mg", "E=mc^2"], correct: 0, th: "ความสัมพันธ์ แรง มวล ความเร่ง" },
{ q_th: "กฎข้อที่ 3 ของนิวตันว่าด้วยเรื่องใด?", a_th: ["แรงกิริยาและปฏิกิริยา", "ความเฉื่อย", "ความเร่ง", "แรงโน้มถ่วง"], correct: 0, th: "แรงกระทำและแรงโต้ตอบ" },
{ q_th: "แรงที่อ่อนที่สุดในธรรมชาติคือแรงใด?", a_th: ["แรงโน้มถ่วง", "แรงแม่เหล็กไฟฟ้า", "แรงนิวเคลียร์เข้ม", "แรงนิวเคลียร์อ่อน"], correct: 0, th: "เกี่ยวกับการดึงดูดของมวล" },
{ q_th: "เมื่อปล่อยวัตถุตก แรงใดทำหน้าที่ดึงดูด?", a_th: ["แรงโน้มถ่วง", "แรงแม่เหล็ก", "แรงนิวเคลียร์", "แรงเสียดทาน"], correct: 0, th: "แรงดึงดูดของโลก" },
{ q_th: "ถ้าความเร็วคงที่ ความเร่งจะเป็นเท่าไร?", a_th: ["ศูนย์", "ค่าคงที่", "เพิ่มขึ้น", "ลดลง"], correct: 0, th: "ไม่มีการเปลี่ยนความเร็ว" },
{ q_th: "การกระจัดเป็นศูนย์ หมายถึงอะไร?", a_th: ["กลับที่เดิม", "ไม่เคลื่อนที่เลย", "ความเร็วเป็นศูนย์", "ระยะทางเป็นศูนย์"], correct: 0, th: "เปรียบเทียบจุดเริ่มและจบ" },
{ q_th: "อะไรวัดความเฉื่อยของวัตถุ?", a_th: ["มวล", "น้ำหนัก", "แรง", "เวลา"], correct: 0, th: "สมบัติประจำตัววัตถุ" },
{ q_th: "แรงนิวเคลียร์อ่อนเกี่ยวกับการสลายตัวของอะไร?", a_th: ["นิวเคลียส", "โมเลกุล", "อะตอม", "อิเล็กตรอน"], correct: 0, th: "ปฏิกิริยากัมมันตภาพรังสี" },
{ q_th: "แรงในธรรมชาติมีกี่ชนิดหลัก?", a_th: ["4", "2", "3", "5"], correct: 0, th: "เลขระหว่าง 3 ถึง 5" },
{ q_th: "แรงเข้าสู่ศูนย์กลางจำเป็นในการเคลื่อนที่แบบใด?", a_th: ["วงกลม", "เส้นตรง", "หยุดนิ่ง", "แนวราบ"], correct: 0, th: "วัตถุเลี้ยวตลอดเวลา" },
{ q_th: "ถ้าแรงลัพธ์เป็นศูนย์ วัตถุจะเคลื่อนที่อย่างไร?", a_th: ["ความเร็วคงที่", "หยุดนิ่งเท่านั้น", "เร่งขึ้น", "ช้าลง"], correct: 0, th: "กฎข้อที่ 1" },
{ q_th: "แรงที่กดลงบนพื้นคือแรงใด?", a_th: ["น้ำหนัก", "แรงเสียดทาน", "แรงนิวเคลียร์", "แรงลอยตัว"], correct: 0, th: "แรงดึงดูดที่โลกมีต่อเรา" },
{ q_th: "อะไรเป็นเหตุผลของการเคลื่อนที่แบบวงกลม?", a_th: ["แรงเปลี่ยนทิศทาง", "มวลเป็นศูนย์", "ความเร็วคงที่", "ระยะทางเป็นศูนย์"], correct: 0, th: "ตั้งฉากกับความเร็ว" },
{ q_th: "แรงเสียดทานสถิตทำหน้าที่อะไร?", a_th: ["ต้านการเริ่มเคลื่อนที่", "ต้านขณะเคลื่อนที่", "ช่วยดึงดูด", "ไม่มีผล"], correct: 0, th: "เริ่มขยับ" },
{ q_th: "งานในทางฟิสิกส์เกิดขึ้นเมื่อใด?", a_th: ["มีแรงและมีการกระจัด", "มีแรงอย่างเดียว", "มีความเร็ว", "มีมวล"], correct: 0, th: "W = Fs" },
{ q_th: "พลังงานจลน์ขึ้นอยู่กับสิ่งใด?", a_th: ["มวลและความเร็ว", "ความสูง", "แรง", "เวลา"], correct: 0, th: "การเคลื่อนที่" },
{ q_th: "พลังงานศักย์โน้มถ่วงขึ้นอยู่กับสิ่งใด?", a_th: ["ความสูง", "ความเร็ว", "แรงเสียดทาน", "แรงลัพธ์"], correct: 0, th: "ตำแหน่งแนวตั้ง" },
{ q_th: "ข้อใดไม่ใช่แรงพื้นฐาน?", a_th: ["แรงเสียดทาน", "แรงโน้มถ่วง", "แรงนิวเคลียร์", "แรงแม่เหล็กไฟฟ้า"], correct: 0, th: "แรงที่เกิดจากผิวสัมผัส" },
{ q_th: "หน่วยของงานคืออะไร?", a_th: ["จูล", "นิวตัน", "วัตต์", "เมตร"], correct: 0, th: "เหมือนหน่วยพลังงาน" },
{ q_th: "ความเฉื่อยแปรผันอย่างไรกับมวล?", a_th: ["ผันตรง", "ผกผัน", "ไม่มีความสัมพันธ์", "ขึ้นกับเวลา"], correct: 0, th: "มวลมากเฉื่อยมาก" },
{ q_th: "แรงกิริยาและปฏิกิริยาเกิดขึ้นที่ใด?", a_th: ["วัตถุคนละก้อน", "วัตถุก้อนเดียวกัน", "ที่จุดศูนย์กลาง", "ไม่มีที่ไหน"], correct: 0, th: "คู่แรง" },
{ q_th: "เครื่องกลช่วยผ่อนแรงได้อย่างไร?", a_th: ["เพิ่มระยะทาง", "ลดมวล", "ลดแรงเสียดทาน", "เปลี่ยนทิศทางแรง"], correct: 0, th: "กฎของงาน" },
{ q_th: "อัตราเร็วคือปริมาณประเภทใด?", a_th: ["สเกลาร์", "เวกเตอร์", "มวล", "แรง"], correct: 0, th: "ไม่สนทิศทาง" },
{ q_th: "ความเร็วคือปริมาณประเภทใด?", a_th: ["เวกเตอร์", "สเกลาร์", "งาน", "พลังงาน"], correct: 0, th: "ต้องบอกทิศทาง" }
        ];

        // เติมข้อที่เหลือให้ครบ 25 ข้อ
        for(let i=10; i<25; i++) {
            quizData.push({ q_th: "ข้อที่ "+(i+1), a_th: ["ตัวเลือกก", "ตัวเลือกข", "ตัวเลือกค", "ตัวเลือกง"], correct: 0, th: "คำใบ้เพิ่มเติมสำหรับข้อ "+(i+1) });
        }

        const container = document.getElementById('quiz-area');
        quizData.forEach((item, index) => {
            container.innerHTML += `
                <div class="question-container" id="q${index}">
                    <p><strong>ข้อที่ ${index + 1}:</strong> ${item.q_th}</p>
                    <div class="clue">${item.th}</div>
                    ${item.a_th.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i})">${opt}</button>`).join(' ')}
                    <div id="d${index}" style="display:none; margin-top:10px;"></div>
                </div>
            `;
        });

        function checkAnswer(qIdx, aIdx) {
            const q = quizData[qIdx];
            const div = document.getElementById(`q${qIdx}`);
            const detail = document.getElementById(`d${qIdx}`);
            if(aIdx === q.correct) {
                div.classList.add('correct');
                detail.innerText = "ถูกต้องครับ!";
            } else {
                div.classList.add('wrong');
                detail.innerText = "ไม่ถูกต้อง คำตอบคือตัวเลือกที่ " + (q.correct + 1);
            }
            detail.style.display = 'block';
        }

        function submitQuiz() {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('summary').innerHTML = "<h3>สรุปผลการประเมิน</h3><p>พยายามได้ดีมากครับ ทบทวนเรื่องกฎของนิวตันเพิ่มเติมนะครับ!</p>";
        }
    </script>
</body>
</html>
