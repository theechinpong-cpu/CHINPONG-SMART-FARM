        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, index) => {
                let html = `<div class="question" id="q${index}">
                    <button onclick="toggleLang(${index})">Switch Language (EN/TH)</button>
                    <p><b id="q_text_${index}">${q.en}</b> <span class="hint" id="clue_${index}">${q.clue_en}</span></p>
                    <div id="options_${index}">
                        ${q.a_en.map((a, i) => `<input type="radio" name="q${index}" value="${i}" onclick="showFeedback(${index}, ${i})"> ${a}<br>`).join('')}
                    </div>
                    <div id="feedback_${index}" class="hidden feedback"></div>
                </div>`;
                container.innerHTML += html;
            });
        }

        function toggleLang(idx) {
            const q = questions[idx];
            const qText = document.getElementById(`q_text_${idx}`);
            const clue = document.getElementById(`clue_${idx}`);
            const options = document.getElementById(`options_${idx}`);
            
            const isThai = qText.innerText === q.th;
            qText.innerText = isThai ? q.en : q.th;
            clue.innerText = isThai ? q.clue_en : q.clue_th;
            
            const currentA = isThai ? q.a_en : q.a_th;
            options.innerHTML = currentA.map((a, i) => `<input type="radio" name="q${idx}" value="${i}" onclick="showFeedback(${idx}, ${i})"> ${a}<br>`).join('');
        }

        function showFeedback(idx, selected) {
            const q = questions[idx];
            const div = document.getElementById(`feedback_${idx}`);
            div.classList.remove('hidden');
            const isCorrect = selected === q.correct;
            div.innerHTML = `<span class="${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? 'Correct!' : 'Incorrect!'}</span><br>
                             ${q.detail}<br><b>${q.tip}</b>`;
        }

        renderQuiz();
    </script>
</body>
</html>
