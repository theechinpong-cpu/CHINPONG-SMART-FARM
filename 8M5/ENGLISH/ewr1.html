<body>

    <div id="result"></div>

        const questions = [
            { q_th: "สมองซีกซ้ายมักจะทำหน้าที่ใดมากที่สุด?", q_en: "What is the primary function of the left brain?", a_th: ["การใช้ความคิดสร้างสรรค์", "การใช้เหตุผลและตรรกะ", "การแสดงออกทางอารมณ์", "การวาดภาพศิลปะ"], correct: 1, detail: "สมองซีกซ้ายเน้นการคิดเชิงวิเคราะห์ ตรรกะ ภาษา และตัวเลข" },
            { q_th: "หากต้องการเชื่อมประโยคที่แสดงความขัดแย้ง ควรใช้คำใด?", q_en: "Which conjunction is used to show contrast?", a_th: ["and", "but", "or", "so"], correct: 1, detail: "But ใช้เพื่อแสดงความขัดแย้งหรือข้อมูลที่ตรงกันข้าม" },
            { q_th: "คำใดใช้สำหรับเพิ่มข้อมูลในประโยคความรวม?", q_en: "Which word is used to add information in a compound sentence?", a_th: ["and", "but", "or", "yet"], correct: 0, detail: "And ใช้สำหรับเพิ่มข้อมูลหรือคล้อยตามกัน" },
            { q_th: "ข้อใดคือองค์ประกอบสำคัญที่สุดของย่อหน้า?", q_en: "What is the most important component of a paragraph?", a_th: ["จำนวนคำ", "ชื่อเรื่องที่ยาว", "Topic Sentence", "ตัวอักษรสีเข้ม"], correct: 2, detail: "Topic Sentence เป็นหัวใจที่บอกใจความสำคัญของย่อหน้า" },
            { q_th: "การเปรียบเทียบวิถีชีวิตคนเมืองและชนบทใช้ทักษะการเขียนแบบใด?", q_en: "Comparing urban and rural lifestyles requires what writing skill?", a_th: ["Chronological", "Comparison", "Narrative", "Persuasive"], correct: 1, detail: "การเปรียบเทียบ (Comparison) ช่วยให้เห็นความแตกต่างของสองสิ่ง" },
            { q_th: "ข้อใดกล่าวถึงสมองซีกขวาได้ถูกต้อง?", q_en: "Which statement is true about the right brain?", a_th: ["เก่งคำนวณ", "เน้นตรรกะ", "เน้นความคิดสร้างสรรค์", "เก่งไวยากรณ์"], correct: 2, detail: "สมองซีกขวาเกี่ยวข้องกับศิลปะ ความคิดสร้างสรรค์ และจินตนาการ" },
            { q_th: "ในการตั้งชื่อเรื่อง (Title) ควรคำนึงถึงสิ่งใด?", q_en: "What should be considered when choosing a title?", a_th: ["ความน่าสนใจ", "ความยาวของคำ", "ความซับซ้อน", "การไม่ใช้อักษรใหญ่"], correct: 0, detail: "ชื่อเรื่องที่ดีต้องดึงดูดความสนใจและครอบคลุมเนื้อหา" },
            { q_th: "คำเชื่อมใดใช้แสดงทางเลือก?", q_en: "Which conjunction expresses a choice?", a_th: ["and", "but", "or", "so"], correct: 2, detail: "Or ใช้เพื่อเสนอทางเลือกหรือตัวเลือก" },
            { q_th: "การเขียนย่อหน้าเกี่ยวกับการแนะนำตัวเองควรเน้นอะไร?", q_en: "What should be the focus when writing about yourself?", a_th: ["การใช้ศัพท์ยาก", "เนื้อหาที่ถูกต้องและชัดเจน", "จำนวนหน้ากระดาษ", "การเขียนแบบย้อนเวลา"], correct: 1, detail: "การเขียนแนะนำตนเองต้องเน้นข้อมูลที่ตรงประเด็นและเข้าใจง่าย" },
            { q_th: "ทักษะใดที่จำเป็นในการเขียนลำดับกิจวัตรประจำวัน?", q_en: "What skill is needed for writing a daily routine?", a_th: ["Comparison", "Chronological Order", "Abstract Thinking", "Argumentation"], correct: 1, detail: "Chronological Order คือการเขียนตามลำดับเวลา" },
            { q_th: "ข้อใดถือเป็นกฎการใช้ตัวพิมพ์ใหญ่ (Capitalization)?", q_en: "Which is a rule for capitalization?", a_th: ["ทุกคำในประโยค", "ตัวแรกของย่อหน้าและชื่อเฉพาะ", "เฉพาะคำนามท้ายประโยค", "ไม่จำเป็นต้องใช้"], correct: 1, detail: "ต้องขึ้นต้นประโยคและใช้กับชื่อเฉพาะเสมอ" },
            { q_th: "ความหมายของ 'Let's Face It' ในบริบทนี้คืออะไร?", q_en: "What is the meaning of 'Let's Face It'?", a_th: ["การทาหน้า", "การอ่านนิสัยจากหน้าตา", "การส่องกระจก", "การซ่อนใบหน้า"], correct: 1, detail: "หมายถึงการวิเคราะห์บุคลิกภาพที่แสดงออกผ่านใบหน้า" },
            { q_th: "การใช้ Transition Words ช่วยเรื่องอะไร?", q_en: "What is the purpose of transition words?", a_th: ["ความสวยงาม", "ความยาวของเนื้อหา", "ความต่อเนื่องของเนื้อหา", "การเปลี่ยนบทเรียน"], correct: 2, detail: "ช่วยเชื่อมโยงความคิดให้ไหลลื่นและต่อเนื่อง" },
            { q_th: "การเขียนเชิงเปรียบเทียบต้องการสิ่งใดมากที่สุด?", q_en: "What is most needed in comparison writing?", a_th: ["ข้อมูลที่หลากหลาย", "การระบุจุดเหมือนและต่าง", "ความยาวของย่อหน้า", "คำศัพท์เฉพาะทาง"], correct: 1, detail: "ต้องระบุสิ่งที่เหมือนและแตกต่างเพื่อเปรียบเทียบให้ชัด" },
            { q_th: "กิจกรรมประจำวันในบทที่ 2 สื่อถึงเรื่องใด?", q_en: "What does daily activity in chapter 2 refer to?", a_th: ["Lifestyle", "Right brain function", "Capitalization", "Compound sentences"], correct: 0, detail: "กิจวัตรประจำวันคือส่วนหนึ่งของรูปแบบการดำเนินชีวิต (Lifestyle)" },
            { q_th: "ข้อใดไม่ใช่คำเชื่อมในประโยคความรวม?", q_en: "Which is NOT a coordinating conjunction?", a_th: ["and", "but", "or", "because"], correct: 3, detail: "Because เป็นคำเชื่อมประโยคความซ้อน (Subordinate)" },
            { q_th: "ความเข้าใจในตนเองในบทที่ 1 ส่งผลดีต่อการเขียนอย่างไร?", q_en: "How does self-understanding help writing?", a_th: ["เขียนได้ยาวขึ้น", "ช่วยให้เขียนถ่ายทอดนิสัยได้จริงใจ", "ทำให้ไม่ต้องใช้คำเชื่อม", "เปลี่ยนกฎไวยากรณ์"], correct: 1, detail: "ทำให้สามารถถ่ายทอดตัวตนออกมาเป็นงานเขียนได้ดียิ่งขึ้น" },
            { q_th: "การอ่าน 'Right Brain, Left Brain' เน้นทักษะใด?", q_en: "What skill does the reading 'Right Brain, Left Brain' focus on?", a_th: ["Vocabulary", "Critical Reading", "Spelling", "Punctuation"], correct: 1, detail: "เป็นการอ่านเชิงวิเคราะห์เพื่อหาข้อมูลและลักษณะนิสัย" },

            { q_th: "การปรับตัวเข้ากับสภาพแวดล้อมจัดอยู่ในหัวข้อใด?", q_en: "Adapting to environment is part of what?", a_th: ["Personality", "Lifestyle", "Brain study", "Title writing"], correct: 1, detail: "เป็นเรื่องของการใช้ชีวิต (Lifestyle)" },
            { q_th: "ข้อใดแสดงลักษณะการคิดของสมองซีกซ้าย?", q_en: "Which trait is characteristic of the left brain?", a_th: ["อารมณ์ศิลปิน", "มองภาพรวม", "การวิเคราะห์เชิงตรรกะ", "การใช้จินตนาการ"], correct: 2, detail: "สมองซีกซ้ายโดดเด่นด้านการวิเคราะห์ตรรกะ" },
            { q_th: "ในบทที่ 2 การเขียนเพื่อเปรียบเทียบ ต้องระวังเรื่องใดมากที่สุด?", q_en: "What should be watched in comparison writing?", a_th: ["จำนวนตัวอักษร", "ความชัดเจนของประเด็นเปรียบเทียบ", "การตั้งชื่อเรื่อง", "การใช้คำเชื่อม and เท่านั้น"], correct: 1, detail: "ต้องชัดเจนว่าเปรียบเทียบอะไร เพื่อไม่ให้ผู้อ่านสับสน" },

            { q_th: "คำว่า 'Logical' ออกเสียงเน้นพยางค์ใด?", a_th: ["พยางค์ที่ 1", "พยางค์ที่ 2", "พยางค์ที่ 3", "ออกเสียงเท่ากัน"], correct: 0, detail: "Logical ออกเสียงเน้นพยางค์แรก (LOG-i-cal)" },
            { q_th: "'Analytical' สัมพันธ์กับสมองซีกใด?", a_th: ["Right Brain", "Left Brain", "Front Brain", "Back Brain"], correct: 1, detail: "สมองซีกซ้ายเน้นเรื่องตรรกะและการวิเคราะห์" },
            { q_th: "เสียงสระในพยางค์แรกของ 'Lifestyle' ตรงกับเสียงในคำใด?", a_th: ["Sit", "Time", "Met", "Hot"], correct: 1, detail: "มีเสียงสระ /aɪ/ เหมือนกัน" },
            { q_th: "'Routine' ออกเสียงเน้นหนักที่พยางค์ใด?", a_th: ["พยางค์ที่ 1", "พยางค์ที่ 2", "ออกเสียงเท่ากัน", "ไม่เน้นพยางค์ใดเลย"], correct: 1, detail: "ออกเสียงว่า roo-TINE เน้นพยางค์ที่สอง" },
            { q_th: "เมื่อต้องการเปรียบเทียบสิ่งที่แตกต่างกัน ควรใช้คำเชื่อมใด?", a_th: ["And", "But", "Or", "So"], correct: 1, detail: "But ใช้เพื่อแสดงความขัดแย้ง" },
            { q_th: "คำว่า 'Chronological' มีความหมายใกล้เคียงกับคำใด?", a_th: ["Random", "Sequential", "Creative", "Diverse"], correct: 1, detail: "Sequential แปลว่า ตามลำดับเวลา" },
            { q_th: "คำใดออกเสียงพยัญชนะต้น 'ch' เหมือนกับ 'Choice'?", a_th: ["Character", "Check", "Chef", "Machine"], correct: 1, detail: "Check ออกเสียง /tʃ/ เหมือนกัน" },
            { q_th: "'Comparison' เน้นเสียงหนักที่พยางค์ใด?", a_th: ["พยางค์ที่ 1", "พยางค์ที่ 2", "พยางค์ที่ 3", "พยางค์ที่ 4"], correct: 1, detail: "เน้นที่พยางค์ที่สอง (com-PAR-i-son)" },
            { q_th: "คำใดหมายถึงกิจกรรมที่ทำเป็นประจำในเวลาว่าง?", a_th: ["Routine", "Hobbies", "Personality", "Analysis"], correct: 1, detail: "Hobbies คือกิจกรรมยามว่าง" },

            { q_th: "สมองซีกขวาเน้นเรื่องใด?", a_th: ["ตัวเลข", "ตรรกะ", "ศิลปะและอารมณ์", "ภาษา"], correct: 2, detail: "สมองซีกขวาเน้นจินตนาการและอารมณ์" },
            { q_th: "Transition words มีไว้เพื่ออะไร?", a_th: ["ตกแต่งประโยค", "เชื่อมโยงเนื้อหา", "เพิ่มจำนวนคำ", "เปลี่ยนความหมาย"], correct: 1, detail: "ใช้เชื่อมโยงความคิดให้ต่อเนื่อง" },
            { q_th: "ข้อใดคือการเปรียบเทียบในเชิงเขียน?", a_th: ["Chronological", "Comparison", "Capitalization", "Punctuation"], correct: 1, detail: "Comparison คือทักษะการเปรียบเทียบ" },
            { q_th: "คำศัพท์คำใดใช้บอกลำดับเหตุการณ์?", a_th: ["Finally", "But", "Or", "And"], correct: 0, detail: "Finally ใช้บอกลำดับขั้นตอนสุดท้าย" },
            { q_th: "'Analyze' ออกเสียงเน้นพยางค์ใด?", a_th: ["พยางค์ที่ 1", "พยางค์ที่ 2", "พยางค์ที่ 3", "เน้นทุกพยางค์"], correct: 0, detail: "AN-a-lyze เน้นพยางค์แรก" },
            { q_th: "กิจกรรมกิจวัตรประจำวันภาษาอังกฤษใช้คำว่าอะไร?", a_th: ["Hobbies", "Routine", "Personality", "Dream"], correct: 1, detail: "Routine คือกิจวัตรประจำวัน" },

            { q_th: "การขึ้นต้นประโยคภาษาอังกฤษใช้ตัวอะไร?", a_th: ["ตัวเล็ก", "ตัวใหญ่", "ตัวเอียง", "ตัวหนา"], correct: 1, detail: "Capitalization (ตัวพิมพ์ใหญ่) คือกฎการขึ้นต้นประโยค" },

            { q_th: "เทคนิค 'Look In, Write Out' ใช้สำหรับบทที่เท่าไหร่?", a_th: ["บทที่ 1", "บทที่ 2", "บทที่ 3", "บทที่ 4"], correct: 0, detail: "บทที่ 1 เน้นเรื่อง Personality (Look In)" }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, index) => {
                let html = `<div class="question" id="q${index}">
                    <p><b>ข้อที่ ${index + 1}:</b> ${q.q_th}</p>`;
                q.a_th.forEach((a, i) => {
                    html += `<input type="radio" name="q${index}" value="${i}"> ${a}<br>`;
                });
                html += `<div id="d${index}" class="hidden"><p>เฉลย: ${q.detail}</p></div></div>`;
                container.innerHTML += html;
            });
        }

        function checkAnswers() {
            let score = 0;
            questions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const detailDiv = document.getElementById(`d${index}`);
                detailDiv.classList.remove('hidden');
                if (selected && parseInt(selected.value) === q.correct) {
                    score++;
                    detailDiv.innerHTML = `<span class="correct">ถูกต้อง!</span> ${q.detail}`;
                } else {
                    detailDiv.innerHTML = `<span class="incorrect">ผิด!</span> ${q.detail}`;
                }
            });
            alert("ผลคะแนนของคุณคือ: " + score + "/" + questions.length);
            console.log("Simulating data transfer to thee.chinpong@hmail.com");
        }

        renderQuiz();
    </script>
    <p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
