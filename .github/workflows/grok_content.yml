name: Grok AI Content Automation

on:
  workflow_dispatch: # ปุ่มกดรันเองเพื่อ Test
  schedule:
    - cron: '0 */6 * * *' # ตั้งให้รันทุก 6 ชั่วโมงอัตโนมัติ

jobs:
  generate_grok_content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/python-setup@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg # ติดตั้ง ffmpeg สำหรับจัดการวิดีโอ

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests # ติดตั้ง Library สำหรับ Grok และ Telegram [cite: 2026-02-11]

      - name: Execute Grok Script
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }} # ดึงค่าจาก Secret ที่คุณเพิ่งใส่
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python grok_main.py # รันไฟล์ที่คุณเพิ่งสร้างสำเร็จ
