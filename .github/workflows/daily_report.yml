name: Gmail Summary Agent

on:
  schedule:
    - cron: '0 23 * * *'  # 06:00 น. เวลาไทย
    - cron: '0 13 * * *'  # 20:00 น. เวลาไทย
  workflow_dispatch:      # เพื่อให้พี่กดรันเองได้

jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 google-generativeai requests

      - name: Execute Script
        env:
          # Mapping ชื่อตัวแปรให้ตรงกับใน GitHub Secrets ของพี่
          GMAIL_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN_GET }}
          GMAIL_CLIENT_ID: ${{ secrets.G_CLIENTID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.G_CLIENTSECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # ระบุ Path เข้าไปที่ Folder ย่อยตามโครงสร้างของพี่
        run: python my-gmail-agent/summary_bot.py
