name: Gmail Summary Agent

on:
  schedule:
    - cron: '0 23 * * *'  # 06:00 น. เวลาไทย (รอบเช้า)
    - cron: '0 8 * * *'   # 15:00 น. เวลาไทย (รอบบ่าย - เพิ่มใหม่)
    - cron: '0 13 * * *'  # 20:00 น. เวลาไทย (รอบค่ำ)
  workflow_dispatch:      # เพื่อให้กดรันเองได้เสมอ

jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 google-generativeai requests

     - name: Execute Script
        env:
          # แก้ชื่อตัวแปรฝั่งซ้ายให้ตรงกับที่ Python เรียกหา (creds_dict)
          refresh_token: ${{ secrets.REFRESH_TOKEN_GET }}
          client_id: ${{ secrets.G_CLIENTID }}
          client_secret: ${{ secrets.G_CLIENTSECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python my-gmail-agent/summary_bot.py
