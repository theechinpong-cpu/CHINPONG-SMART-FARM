name: AI Content Automation

on:
  workflow_dispatch: # ปุ่มกดรันเอง
  schedule:
    - cron: '0 */6 * * *' # รันทุก 6 ชั่วโมง [cite: 2026-02-11]

jobs:
  generate_content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # ติดตั้ง Library ที่จำเป็นสำหรับการทำ Automation และ Telegram
          pip install google-generativeai python-telegram-bot

      - name: Execute Script
        env:
          # ดึงค่าจาก GitHub Secrets มาใช้งาน
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
