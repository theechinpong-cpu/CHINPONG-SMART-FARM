name: Auto Update Dashboard

on:
  # ตั้งเวลารันอัตโนมัติ (เช่น ทุกๆ 6 ชั่วโมง)
  schedule:
    - cron: '0 */6 * * *'
  # เปิดให้เรากดรันเองได้จากหน้าเว็บ GitHub (เพื่อทดสอบ)
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install gspread google-auth

      - name: Execute Script
        env:
          # ดึง Secret ที่เราตั้งค่าไว้มาใช้ใน Environment
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python update_sheet.py
