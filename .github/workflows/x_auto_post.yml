name: X Auto Comment Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *' # รันทุก 4 ชั่วโมง

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- จุดที่ต้องเพิ่ม: ติดตั้ง FFmpeg เพื่อแก้ Error [Errno 2] ---
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
          # เพิ่มไลบรารีอื่นที่บอทคุณใช้ เช่น moviepy หรือ opencv (ถ้ามี)

      - name: Run Bot
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: python bot_script.py
