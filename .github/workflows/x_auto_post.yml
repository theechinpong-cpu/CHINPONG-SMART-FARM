name: X Auto Comment Bot

on:
  schedule:
    - cron: '0 * * * *' # รันทุกต้นชั่วโมง (ปรับเปลี่ยนได้)
  workflow_dispatch: # กดรันเองแบบ Manual ได้ด้วย

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Run Bot
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: python bot_script.py
