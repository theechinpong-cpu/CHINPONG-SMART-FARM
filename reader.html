<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM | Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        /* สไตล์เนื้อหาภายในบทความ */
        #content h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 1.5rem; color: #fff; line-height: 1.2; }
        #content p { font-size: 1.1rem; line-height: 1.8; margin-bottom: 1.2rem; color: #cbd5e1; }
        #content strong { color: #60a5fa; }
        #content ul { margin-bottom: 2rem; }
        #content li { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); padding: 1.5rem; border-radius: 1.5rem; margin-bottom: 1rem; list-style: none; }
        /* แปลงลิงก์ Affiliate ให้เป็นปุ่ม */
        #content a { display: inline-block; background: #3b82f6; color: white; padding: 0.6rem 1.5rem; border-radius: 1rem; font-weight: bold; text-decoration: none; margin-top: 0.5rem; transition: all 0.2s; font-size: 0.9rem; }
        #content a:hover { background: #2563eb; transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="glass sticky top-0 z-50 px-8 py-4 mb-8">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-blue-500 font-bold hover:text-white transition-all"><i class="fas fa-chevron-left mr-2"></i> กลับหน้าแรก</a>
            <span class="text-xs font-black tracking-tighter uppercase text-slate-500">CHINPONG SMART FARM</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pb-20">
        <article id="content" class="animate-fade-in">
            <div class="py-20 text-center"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>
        </article>
    </main>

    <script>
        async function loadContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');
            if (!file) return;

            const GITHUB_USER = 'theechinpong-cpu';
            const REPO_NAME = 'king-mongkut-tutor';
            const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/blog/${file}`;

            try {
                const response = await fetch(rawUrl);
                const text = await response.text();
                // แสดงผล Markdown เป็น HTML
                document.getElementById('content').innerHTML = marked.parse(text);
                
                // ตกแต่งเพิ่มเติม: ลบข้อความที่ AI อาจจะแถมมา (ถ้ามี)
                document.title = "อ่านข่าว: " + file.replace('.md', '');
            } catch (e) {
                document.getElementById('content').innerHTML = "<p>ขออภัย ไม่พบเนื้อหาข่าว</p>";
            }
        }
        loadContent();
    </script>
</body>
</html>
