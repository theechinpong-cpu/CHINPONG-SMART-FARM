<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM - Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #111, #000); color: #d1d5db; font-family: 'Anuphan', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #content-area { font-size: 1.15rem; line-height: 2; }
        #content-area p { margin-bottom: 1.8rem; color: #a1a1aa; text-align: justify; }
        .clickable-btn { position: relative; z-index: 50 !important; cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="status" class="text-xs font-bold tracking-widest text-blue-500 uppercase">Checking Data Integrity...</p>
    </div>

    <nav class="sticky top-0 z-[40] w-full glass border-b border-white/5 py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-white transition-all"><i class="fas fa-chevron-left"></i> กลับหน้าหลัก</a>
            <div class="text-[10px] font-black tracking-widest text-blue-500 uppercase">CHINPONG SMART FARM</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-12">
        <header class="mb-12">
            <h1 id="post-title" class="text-4xl md:text-6xl font-black text-white leading-[1.1] mb-6"></h1>
            <div id="post-meta" class="text-xs text-gray-500"></div>
        </header>

        <article id="content-area">
            </article>
    </main>

    <script>
        async function loadContent() {
            const statusEl = document.getElementById('status');
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');

            if (!fileName) {
                statusEl.innerHTML = "ERROR: No File Specified";
                return;
            }

            try {
                // 1. ลองดึงไฟล์จาก /blog/ (รองรับทั้ง Absolute และ Relative Path)
                const filePath = fileName.startsWith('blog/') ? fileName : `blog/${fileName}`;
                statusEl.innerText = `FETCHING: ${fileName}...`;
                
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`Cannot find ${filePath}`);

                let rawData = await response.text();
                let content = rawData;
                let title = fileName.replace('.md', '').replace(/_/g, ' ');

                // 2. แยก Metadata
                const metaMatch = rawData.match(/^---([\s\S]*?)---/);
                if (metaMatch) {
                    const metaLines = metaMatch[1].split('\n');
                    metaLines.forEach(line => {
                        if (line.toLowerCase().includes('title:')) title = line.split(':')[1].trim();
                    });
                    content = rawData.replace(metaMatch[0], '').trim();
                }

                // 3. ดึงสินค้าและทำ Auto-Link
                try {
                    const prodRes = await fetch('products.json');
                    if (prodRes.ok) {
                        const products = await prodRes.json();
                        // เปลี่ยนข้อความ (ใส่ลิงก์...) เป็นโฆษณาสินค้า
                        const placeholder = /\(ใส่ลิงก์ Affiliate ของคุณตรงนี้\)/g;
                        const matches = content.match(placeholder);
                        if (matches) {
                            matches.forEach(() => {
                                const p = products[Math.floor(Math.random() * products.length)];
                                const adHtml = `
                                    <div class="my-10 p-8 rounded-[2.5rem] glass border border-blue-500/20 bg-blue-500/[0.02]">
                                        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                                            <div class="flex-1 text-center md:text-left">
                                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-[0.2em]">${p.shop}</span>
                                                <h4 class="text-white font-bold text-lg mt-1">${p.name}</h4>
                                                <p class="text-2xl font-black text-white mt-2">฿${p.price}</p>
                                            </div>
                                            <a href="${p.affLink}" target="_blank" rel="noopener" class="clickable-btn bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-full text-xs font-black shadow-xl shadow-blue-900/40">SHOP NOW</a>
                                        </div>
                                    </div>
                                `;
                                content = content.replace("(ใส่ลิงก์ Affiliate ของคุณตรงนี้)", adHtml);
                            });
                        }
                    }
                } catch (e) { console.log("Product integration skipped"); }

                // 4. แสดงผล
                document.getElementById('post-title').innerText = title;
                document.getElementById('content-area').innerHTML = marked.parse(content);
                document.getElementById('post-meta').innerText = `Source: ${fileName} | Status: Decrypted`;

                // Success! Hide Loader
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="text-red-500">FAILED: ${error.message}</span><br>
                <button onclick="location.reload()" class="mt-4 text-[10px] bg-white/10 px-4 py-2 rounded-full text-white uppercase">Retry</button>`;
            }
        }

        window.onload = loadContent;
    </script>
</body>
</html>
