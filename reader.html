<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM - Auto Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #111, #000); color: #d1d5db; font-family: 'Anuphan', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #content-area { font-size: 1.15rem; line-height: 2; }
        #content-area p { margin-bottom: 1.8rem; color: #a1a1aa; text-align: justify; }
        #content-area strong { color: white; border-bottom: 2px solid #3b82f6; }
        .clickable-btn { position: relative; z-index: 50 !important; cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="status" class="text-xs font-bold tracking-widest text-blue-500 uppercase">Automating Intelligence...</p>
    </div>

    <nav class="sticky top-0 z-[40] w-full glass border-b border-white/5 py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-white"><i class="fas fa-chevron-left"></i> ย้อนกลับ</a>
            <div class="text-[10px] font-black text-blue-500 tracking-widest uppercase">CHINPONG SMART FARM</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-12">
        <header class="mb-12">
            <h1 id="post-title" class="text-4xl md:text-6xl font-black text-white leading-tight mb-6"></h1>
        </header>

        <article id="content-area">
            </article>
    </main>

    <script>
        async function loadContent() {
            const statusEl = document.getElementById('status');
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');

            try {
                // 1. ดึงไฟล์ข่าว
                const newsRes = await fetch(`blog/${file}`);
                let rawData = await newsRes.text();

                // 2. ดึงสินค้า 100 ชิ้นมาเตรียมไว้
                const prodRes = await fetch('products.json');
                const products = await prodRes.json();
                
                // 3. ระบบ Auto-Match ลิงก์สินค้าเข้าไปในเนื้อหาแทนที่ข้อความ (ใส่ลิงก์...)
                let finalContent = rawData;
                const matches = rawData.match(/\(ใส่ลิงก์ Affiliate ของคุณตรงนี้\)/g);
                
                if (matches && products.length > 0) {
                    matches.forEach(() => {
                        const p = products[Math.floor(Math.random() * products.length)];
                        const adHtml = `
                            <div class="my-8 p-6 rounded-[2rem] glass border border-blue-500/20 bg-blue-500/[0.02]">
                                <div class="flex justify-between items-center gap-4">
                                    <div class="flex-1">
                                        <span class="text-[10px] font-bold text-blue-400 uppercase">${p.shop}</span>
                                        <h4 class="text-white font-bold text-base line-clamp-1">${p.name}</h4>
                                        <p class="text-xl font-black text-white mt-1">฿${p.price}</p>
                                    </div>
                                    <a href="${p.affLink}" target="_blank" class="clickable-btn bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-full text-xs font-black shadow-lg shadow-blue-900/40 whitespace-nowrap">SHOP NOW</a>
                                </div>
                            </div>
                        `;
                        finalContent = finalContent.replace("(ใส่ลิงก์ Affiliate ของคุณตรงนี้)", adHtml);
                    });
                }

                // 4. แสดงผล
                document.getElementById('post-title').innerText = file.replace('.md','').replace(/_/g,' ');
                document.getElementById('content-area').innerHTML = marked.parse(finalContent);

                // ปิด Loader
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

            } catch (error) {
                statusEl.innerText = "Error Loading Content";
            }
        }
        window.onload = loadContent;
    </script>
</body>
</html>
