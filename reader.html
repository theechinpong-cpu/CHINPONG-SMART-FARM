<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM - Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #111, #000); color: #d1d5db; font-family: 'Anuphan', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #content-area { font-size: 1.15rem; line-height: 2; }
        #content-area p { margin-bottom: 1.8rem; color: #a1a1aa; text-align: justify; }
        #content-area strong { color: white; border-bottom: 2px solid #3b82f6; }
        .clickable-btn { position: relative; z-index: 50 !important; cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="status" class="text-[10px] font-bold tracking-widest text-blue-500 uppercase font-mono">Loading Neural Data...</p>
    </div>

    <nav class="sticky top-0 z-[40] w-full glass border-b border-white/5 py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-white transition-all"><i class="fas fa-arrow-left"></i> BACK</a>
            <div class="text-[10px] font-black tracking-[0.3em] text-blue-500 uppercase">CHINPONG SMART FARM</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-12">
        <header class="mb-12 border-l-4 border-blue-600 pl-6">
            <h1 id="post-title" class="text-4xl md:text-6xl font-black text-white leading-[1.1] mb-4 uppercase"></h1>
            <div id="post-meta" class="text-[10px] text-gray-500 tracking-widest uppercase font-bold"></div>
        </header>

        <article id="content-area" class="relative">
            </article>

        <div id="ads-section" class="mt-16 border-t border-white/5 pt-16"></div>
    </main>

    <script>
        async function loadContent() {
            const statusEl = document.getElementById('status');
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');

            if (!fileName) {
                statusEl.innerHTML = "ERROR: FILE NOT SPECIFIED";
                return;
            }

            try {
                // 1. Fetch บทความ
                const filePath = fileName.startsWith('blog/') ? fileName : `blog/${fileName}`;
                const response = await fetch(filePath);
                if (!response.ok) throw new Error("File not found");
                let content = await response.text();

                // 2. Fetch สินค้า
                const prodRes = await fetch('products.json');
                const products = prodRes.ok ? await prodRes.json() : [];

                // ฟังก์ชันสร้าง UI กล่องสินค้า
                const createAdBox = (item) => `
                    <div class="my-10 p-6 rounded-[2rem] bg-gradient-to-br from-blue-600/10 to-transparent border border-blue-500/20 shadow-2xl overflow-hidden">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="flex-1 text-center md:text-left">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${item.shop || 'CHINPONG SELECTION'}</span>
                                <h4 class="text-white font-bold text-lg leading-tight mt-1">${item.name}</h4>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="text-right">
                                    <p class="text-2xl font-black text-white italic">฿${item.price}</p>
                                </div>
                                <a href="${item.affLink}" target="_blank" rel="noopener" class="clickable-btn bg-blue-600 hover:bg-white hover:text-black text-white px-8 py-3 rounded-full text-[10px] font-black transition-all">SHOP NOW</a>
                            </div>
                        </div>
                    </div>`;

                // 3. แทนที่ข้อความที่เป็น Placeholder ด้วยกล่องสินค้า
                if (products.length > 0) {
                    // ใช้ Regex ค้นหาข้อความแบบที่พี่เขียนเป๊ะๆ
                    const placeholderRegex = /\[\(ใส่ลิงก์ Affiliate ของคุณตรงนี้\)\]|\(ใส่ลิงก์ Affiliate ของคุณตรงนี้\)/g;
                    content = content.replace(placeholderRegex, () => {
                        const randomItem = products[Math.floor(Math.random() * products.length)];
                        return createAdBox(randomItem);
                    });
                }

                // 4. Render Markdown
                document.getElementById('post-title').innerText = fileName.replace('.md', '').replace(/_/g, ' ');
                document.getElementById('content-area').innerHTML = marked.parse(content);
                document.getElementById('post-meta').innerText = `PUBLISHED: ${new Date().toLocaleDateString()}`;

                // สุ่มสินค้าปิดท้ายข่าวอีก 2 ชิ้น
                injectBottomAds(products);

                // ปิด Loader
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

            } catch (error) {
                statusEl.innerHTML = `<span class="text-red-500 uppercase">SYNCHRONIZATION FAILED</span>`;
                console.error(error);
            }
        }

        function injectBottomAds(products) {
            if (products.length === 0) return;
            const randomItems = products.sort(() => 0.5 - Math.random()).slice(0, 2);
            let html = '<h3 class="text-xs font-black text-blue-500 tracking-[0.3em] uppercase mb-8 text-center">More Recommended Items</h3><div class="grid gap-4">';
            randomItems.forEach(item => {
                html += `
                <div class="p-4 rounded-3xl glass border border-white/5 flex justify-between items-center">
                    <span class="text-white text-sm font-bold truncate pr-4">${item.name}</span>
                    <a href="${item.affLink}" target="_blank" class="text-blue-500 text-[10px] font-black underline uppercase">View Details</a>
                </div>`;
            });
            html += '</div>';
            document.getElementById('ads-section').innerHTML = html;
        }

        window.onload = loadContent;
    </script>
</body>
</html>
