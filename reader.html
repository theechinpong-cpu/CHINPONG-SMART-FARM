<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM - Professional News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #d1d5db; font-family: 'Anuphan', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #content-area p { margin-bottom: 1.8rem; line-height: 1.8; color: #a1a1aa; font-size: 1.1rem; }
        .aff-feed-card { background: #0d0d0d; border-radius: 20px; border: 1px solid #1a1a1a; transition: all 0.2s; }
        .aff-feed-card:hover { border-color: #3b82f6; background: #111; transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-black transition-opacity duration-500">
        <div class="w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <nav class="sticky top-0 z-[50] w-full glass border-b border-white/5 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-[10px] font-black text-gray-500 hover:text-white uppercase tracking-widest">← Back</a>
            <div class="text-xs font-black tracking-[0.2em] text-blue-500 uppercase italic">CHINPONG SMART FARM</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-12 pb-24">
        <div class="flex flex-col lg:flex-row gap-12">
            
            <div class="w-full lg:w-2/3">
                <header class="mb-12">
                    <h1 id="post-title" class="text-4xl md:text-6xl font-black text-white leading-tight mb-6 italic uppercase"></h1>
                    <div id="post-meta" class="text-[10px] text-gray-500 font-bold tracking-[0.3em] border-l-2 border-blue-600 pl-4 uppercase italic"></div>
                </header>
                <article id="content-area"></article>
            </div>

            <div class="w-full lg:w-1/3">
                <div class="sticky top-28">
                    <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                        <h3 class="text-xs font-black text-white tracking-widest uppercase italic">Smart Selection</h3>
                        <span class="text-[9px] bg-blue-600/10 text-blue-500 px-2 py-1 rounded">15 ITEMS NOW</span>
                    </div>
                    <div id="side-feed" class="space-y-5 max-h-[75vh] overflow-y-auto no-scrollbar pr-2">
                        </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        async function runAutoPilot() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file');

            try {
                // 1. ดึงข้อมูลพร้อมกัน (Must have both)
                const [db, article] = await Promise.all([
                    fetch('products.json').then(r => r.json()),
                    fetch(`blog/${file}`).then(r => r.text())
                ]);

                // 2. จัดการบทความ และฉีด Ads แทรกกลาง (Inline Injection)
                const adTag = /\[\(ใส่ลิงก์ Affiliate ของคุณตรงนี้\)\]|\(ใส่ลิงก์ Affiliate ของคุณตรงนี้\)/g;
                let processedContent = article.replace(adTag, () => {
                    const item = db[Math.floor(Math.random() * db.length)];
                    return `
                    <div class="my-10 p-6 glass border-blue-500/20 rounded-[2.5rem] flex flex-col md:flex-row items-center gap-6 shadow-2xl">
                        <div class="w-20 h-20 bg-blue-600/20 rounded-3xl flex items-center justify-center text-blue-500 text-2xl"><i class="fas fa-box-open"></i></div>
                        <div class="flex-1 text-center md:text-left min-w-0">
                            <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${item.shop}</span>
                            <h4 class="text-white font-bold text-lg truncate">${item.name}</h4>
                            <p class="text-xs text-gray-500 mt-1 italic">คัดสรรโดย CHINPONG SMART FARM</p>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="text-2xl font-black text-white italic underline decoration-blue-500/30">฿${item.price}</span>
                            <a href="${item.affLink}" target="_blank" class="bg-blue-600 hover:bg-white hover:text-black text-white px-8 py-3 rounded-full text-[10px] font-black transition-all">SHOP NOW</a>
                        </div>
                    </div>`;
                });

                document.getElementById('post-title').innerText = file.replace('.md', '').replace(/_/g, ' ');
                document.getElementById('content-area').innerHTML = marked.parse(processedContent);
                document.getElementById('post-meta').innerText = `DATA SYNCED: OK | DATE: ${new Date().toLocaleDateString()}`;

                // 3. สุ่มสินค้า 15 ชิ้นลง Sidebar (Feed Style)
                const shuffled = db.sort(() => 0.5 - Math.random()).slice(0, 15);
                document.getElementById('side-feed').innerHTML = shuffled.map(item => `
                    <div class="aff-feed-card p-5 group transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black text-gray-500 uppercase">${item.shop}</span>
                            <span class="text-blue-500 font-black text-xs italic">฿${item.price}</span>
                        </div>
                        <h4 class="text-gray-200 font-bold text-[13px] mb-4 leading-relaxed group-hover:text-blue-400 transition-colors">${item.name}</h4>
                        <div class="flex gap-1 mb-5">
                            ${item.keywords ? item.keywords.slice(0,2).map(k => `<span class="text-[8px] bg-white/5 text-gray-500 px-2 py-0.5 rounded italic">#${k}</span>`).join('') : ''}
                        </div>
                        <a href="${item.affLink}" target="_blank" class="block w-full text-center py-3 rounded-xl bg-white/5 hover:bg-blue-600 text-[10px] font-black text-white transition-all uppercase tracking-widest">View Details</a>
                    </div>
                `).join('');

                // Close Loader
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

            } catch (err) {
                document.getElementById('loader').innerHTML = `
                <div class="text-center p-10 glass border-red-500/30 rounded-3xl max-w-sm">
                    <p class="text-red-500 font-black text-xl mb-4 italic uppercase">Connection Error</p>
                    <p class="text-gray-400 text-[10px] uppercase tracking-widest leading-loose">โปรดรันผ่าน GitHub Pages หรือ Local Server เพื่อให้ระบบสามารถดึงฐานข้อมูลสินค้ามาแสดงผลได้</p>
                </div>`;
            }
        }
        window.onload = runAutoPilot;
    </script>
</body>
</html>
