<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM - Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        body { background: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        #content-area img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        #content-area h1, #content-area h2 { color: white; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; }
        #content-area p { line-height: 1.8; margin-bottom: 1.2rem; color: #9ca3af; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-black">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p id="status" class="text-blue-500 font-mono text-xs tracking-widest uppercase">Initializing System...</p>
        </div>
    </div>

    <nav class="p-6 border-b border-white/5">
        <a href="index.html" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
            <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
        </a>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <article>
            <h1 id="post-title" class="text-4xl md:text-5xl font-black text-white mb-8 leading-tight"></h1>
            <div id="content-area" class="prose prose-invert max-w-none">
                </div>
        </article>
    </main>

    <script>
        async function loadContent() {
            const statusEl = document.getElementById('status');
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');

            if (!file) {
                statusEl.innerText = "Error: No file specified.";
                return;
            }

            try {
                // 1. ดึงเนื้อหาข่าว
                statusEl.innerText = "FETCHING SMART CONTENT...";
                const response = await fetch(`blog/${file}`);
                if (!response.ok) throw new Error("File not found in /blog directory");
                
                const rawData = await response.text();
                
                // 2. แยก Metadata (ถ้ามี)
                statusEl.innerText = "PARSING DATA...";
                let content = rawData;
                let title = file.replace('.md', '').replace(/_/g, ' ');

                const metaMatch = rawData.match(/^---([\s\S]*?)---/);
                if (metaMatch) {
                    const metaLines = metaMatch[1].split('\n');
                    metaLines.forEach(line => {
                        if (line.toLowerCase().includes('title:')) {
                            title = line.split(':')[1].trim();
                        }
                    });
                    content = rawData.replace(metaMatch[0], '').trim();
                }

                // 3. แสดงเนื้อหา
                document.getElementById('post-title').innerText = title;
                document.getElementById('content-area').innerHTML = marked.parse(content);

                // 4. แทรกสินค้า (Smart Ads)
                await injectSmartAds();

                // ปิด Loader
                document.getElementById('loader').style.display = 'none';

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="text-red-500 font-bold underline">SYSTEM ERROR: ${error.message}</span><br><a href="index.html" class="text-white mt-4 block text-[10px]">GO BACK</a>`;
            }
        }

        async function injectSmartAds() {
            try {
                const res = await fetch('products.json');
                if (!res.ok) return;
                const products = await res.json();
                
                // สุ่มสินค้ามา 3 ชิ้นจาก 100 ชิ้น
                const randomItems = products.sort(() => 0.5 - Math.random()).slice(0, 3);
                
                let adsHtml = `
                    <div class="mt-16 pt-10 border-t border-white/10">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-white font-bold italic flex items-center gap-2">
                                <i class="fas fa-shopping-cart text-blue-500"></i> สินค้าที่น่าสนใจจากฟาร์ม
                            </h3>
                            <span class="text-[10px] bg-white/5 px-3 py-1 rounded-full text-gray-500">ADVERTISEMENT</span>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                `;

                randomItems.forEach(p => {
                    adsHtml += `
                    <div class="glass p-5 rounded-[2rem] border border-white/5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-blue-500/50 transition-all">
                        <div class="flex-1">
                            <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${p.shop}</span>
                            <h4 class="text-white font-bold text-base mt-1">${p.name}</h4>
                        </div>
                        <div class="flex items-center gap-4 w-full md:w-auto justify-between">
                            <span class="text-xl font-black text-white">฿${p.price}</span>
                            <a href="${p.affLink}" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-6 py-2.5 rounded-2xl text-xs font-black text-white transition-all whitespace-nowrap shadow-lg shadow-blue-900/20">
                                สั่งซื้อเลย
                            </a>
                        </div>
                    </div>`;
                });

                adsHtml += '</div></div>';
                document.getElementById('content-area').innerHTML += adsHtml;
            } catch (e) { console.log("Ads system offline"); }
        }

        window.onload = loadContent;
    </script>
</body>
</html>
