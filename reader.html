<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM - Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #111, #000); color: #d1d5db; font-family: 'Anuphan', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #content-area { font-size: 1.15rem; line-height: 2; }
        #content-area p { margin-bottom: 1.8rem; color: #a1a1aa; text-align: justify; }
        #content-area strong { color: white; border-bottom: 2px solid #3b82f6; }
        .clickable-btn { position: relative; z-index: 50 !important; cursor: pointer !important; pointer-events: auto !important; }
        .article-gradient { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="status" class="text-[10px] font-bold tracking-widest text-blue-500 uppercase">Synchronizing Intelligence...</p>
    </div>

    <nav class="sticky top-0 z-[40] w-full glass border-b border-white/5 py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-white transition-all"><i class="fas fa-arrow-left"></i> BACK</a>
            <div class="text-[10px] font-black tracking-[0.3em] text-blue-500 uppercase">CHINPONG SMART FARM</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-12">
        <header class="mb-12 border-l-4 border-blue-600 pl-6">
            <h1 id="post-title" class="text-4xl md:text-6xl font-black text-white leading-[1.1] mb-4 uppercase"></h1>
            <div id="post-meta" class="text-[10px] text-gray-500 tracking-widest uppercase font-bold"></div>
        </header>

        <article id="content-area" class="relative">
            </article>

        <div id="ads-section" class="mt-16">
            </div>
    </main>

    <script>
        async function loadContent() {
            const statusEl = document.getElementById('status');
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');

            if (!fileName) {
                statusEl.innerHTML = "ERROR: FILE NOT FOUND";
                return;
            }

            try {
                // 1. Fetch บทความ
                const filePath = fileName.startsWith('blog/') ? fileName : `blog/${fileName}`;
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`Could not find ${filePath}`);
                
                let rawData = await response.text();
                
                // แยก Metadata (ถ้ามี)
                let content = rawData;
                let title = fileName.replace('.md', '').replace(/_/g, ' ');
                const metaMatch = rawData.match(/^---([\s\S]*?)---/);
                if (metaMatch) {
                    content = rawData.replace(metaMatch[0], '').trim();
                }

                // 2. แสดงผลเนื้อหาข่าว
                document.getElementById('post-title').innerText = title;
                document.getElementById('content-area').innerHTML = marked.parse(content);
                document.getElementById('post-meta').innerText = `DATE: ${new Date().toLocaleDateString()} | SOURCE: ${fileName}`;

                // 3. ระบบฉีดโฆษณา (Smart Ads Injection)
                await injectSmartAds();

                // ปิด Loader
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<span class="text-red-500">FAILED: ${error.message}</span>`;
            }
        }

        async function injectSmartAds() {
            try {
                const res = await fetch('products.json');
                if (!res.ok) return;
                
                const products = await res.json();
                // สุ่มสินค้า 3 ชิ้น
                const randomItems = products.sort(() => 0.5 - Math.random()).slice(0, 3);
                
                let adsHtml = `
                    <div class="mt-20 p-8 rounded-[3rem] glass border border-blue-600/20 bg-blue-600/[0.02]">
                        <div class="flex items-center justify-between mb-8">
                            <h3 class="text-xl font-black text-white italic tracking-tighter">SMART DEALS <span class="text-blue-500">SELECTED</span></h3>
                            <div class="h-[1px] flex-1 bg-white/10 mx-4"></div>
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Sponsored</span>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                `;

                randomItems.forEach(p => {
                    adsHtml += `
                    <div class="p-6 rounded-[2rem] bg-white/[0.02] border border-white/5 hover:border-blue-500/40 transition-all group">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="flex-1 text-center md:text-left">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${p.shop}</span>
                                <h4 class="text-white font-bold text-lg mt-1 group-hover:text-blue-400 transition-colors">${p.name}</h4>
                                <div class="flex gap-2 mt-2 justify-center md:justify-start overflow-hidden">
                                    ${p.keywords.slice(0,3).map(k => `<span class="text-[8px] border border-white/10 text-gray-400 px-2 py-0.5 rounded-full">#${k}</span>`).join('')}
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="text-right">
                                    <p class="text-2xl font-black text-white italic">฿${p.price}</p>
                                    <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">In Stock</p>
                                </div>
                                <a href="${p.affLink}" target="_blank" rel="noopener" class="clickable-btn bg-blue-600 hover:bg-white hover:text-black text-white px-8 py-4 rounded-full text-[10px] font-black transition-all shadow-xl">SHOP NOW</a>
                            </div>
                        </div>
                    </div>`;
                });

                adsHtml += '</div></div>';
                document.getElementById('ads-section').innerHTML = adsHtml;
            } catch (e) { console.error("Ads failed to load"); }
        }

        window.onload = loadContent;
    </script>
</body>
</html>
