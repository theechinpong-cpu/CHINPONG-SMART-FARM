<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาศาสตร์ ป.5 (50 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; line-height: 1.6; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #c0392b; text-align: center; }
        .question { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 6px 0; padding: 10px; background: #f1f1f1; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .options li:hover { background: #e0e0e0; }
        .explanation { display: none; margin-top: 10px; padding: 15px; background: #d4edda; border-left: 5px solid #28a745; color: #155724; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ข้อสอบวิทยาศาสตร์ ป.5 (50 ข้อ)</h1>
        <p style="text-align:center;">โดย พระจอมเกล้าติวเตอร์</p>
        <div id="exam-area"></div>
    </div>

    <script>
        const questions = [
            { q: "1. ในโซ่อาหาร หัวลูกศร (→) มีความหมายว่าอย่างไร?", o: ["ก. ที่อยู่อาศัย", "ข. ผู้กินพลังงาน", "ค. ทิศทางการถ่ายทอดพลังงาน", "ง. การแบ่งกลุ่ม"], a: "ค. ทิศทางการถ่ายทอดพลังงาน" },
            { q: "2. สิ่งใดถือเป็น 'ผู้ผลิต' ในระบบนิเวศแหล่งน้ำ?", o: ["ก. ปลาซิว", "ข. สาหร่าย", "ค. เต่า", "ง. จุลินทรีย์"], a: "ข. สาหร่าย" },
            { q: "3. ยาฆ่าแมลงในนาข้าว ผู้บริโภคกลุ่มแรกที่ได้รับสารพิษคือ?", o: ["ก. นก", "ข. งู", "ค. หนอน", "ง. เหยี่ยว"], a: "ค. หนอน" },
            { q: "4. โซ่อาหารใดถูกต้อง?", o: ["ก. กบ→งู→ตั๊กแตน", "ข. ข้าว→ตั๊กแตน→กบ", "ค. งู→กบ→ข้าว", "ง. ตั๊กแตน→ข้าว→งู"], a: "ข. ข้าว→ตั๊กแตน→กบ" },
            { q: "5. สิ่งมีชีวิตใดเป็น 'ผู้ย่อยสลาย'?", o: ["ก. กระต่าย", "ข. เห็ด", "ค. สิงโต", "ง. ต้นข้าว"], a: "ข. เห็ด" },
            { q: "6. พลังงานในโซ่อาหารจะลดลงเมื่อใด?", o: ["ก. เปลี่ยนผ่านลำดับขั้น", "ข. เท่าเดิม", "ค. เพิ่มขึ้น", "ง. ไม่สูญเสีย"], a: "ก. เปลี่ยนผ่านลำดับขั้น" },
            { q: "7. หาก 'ผู้ล่า' สูญพันธุ์ไปจะเกิดอะไรขึ้น?", o: ["ก. เหยื่อเพิ่มขึ้น", "ข. เหยื่อลดลง", "ค. สมดุลขึ้น", "ง. ผู้ผลิตหมดไป"], a: "ก. เหยื่อเพิ่มขึ้น" },
            { q: "8. สายใยอาหารต่างจากโซ่อาหารอย่างไร?", o: ["ก. ซับซ้อนกว่า", "ข. เป็นเส้นตรง", "ค. ไม่มีข้อต่าง", "ง. ไม่มีผู้ผลิต"], a: "ก. ซับซ้อนกว่า" },
            { q: "9. ผู้บริโภคอันดับสุดท้ายในป่าคือ?", o: ["ก. เสือ", "ข. กระต่าย", "ค. กวาง", "ง. หนอน"], a: "ก. เสือ" },
            { q: "10. ปัจจัยสำคัญที่สุดในการสร้างอาหารคือ?", o: ["ก. แสงแดด", "ข. อุณหภูมิ", "ค. ลม", "ง. ความชื้น"], a: "ก. แสงแดด" },
            { q: "11. รากค้ำยันโกงกางมีไว้เพื่อ?", o: ["ก. หาอาหาร", "ข. พยุงลำต้น", "ค. หายใจ", "ง. สังเคราะห์แสง"], a: "ข. พยุงลำต้น" },
            { q: "12. ทำไมกระบองเพชรเปลี่ยนใบเป็นหนาม?", o: ["ก. ป้องกันศัตรู", "ข. ลดคายน้ำ", "ค. สะสมอาหาร", "ง. สวยงาม"], a: "ข. ลดคายน้ำ" },
            { q: "13. การพรางตัวของกิ้งก่าเพื่อ?", o: ["ก. ล่าและป้องกัน", "ข. อวดสี", "ค. หาคู่", "ง. ลดอุณหภูมิ"], a: "ก. ล่าและป้องกัน" },
            { q: "14. สัตว์ขั้วโลกมีไขมันหนาเพื่อ?", o: ["ก. สวยงาม", "ข. เก็บน้ำ", "ค. รักษาความอบอุ่น", "ง. ลอยตัว"], a: "ค. รักษาความอบอุ่น" },
            { q: "15. ความสัมพันธ์นกเอี้ยงกับควายคือ?", o: ["ก. ปรสิต", "ข. อิงอาศัย", "ค. ได้ประโยชน์ร่วมกัน", "ง. แข่งขัน"], a: "ค. ได้ประโยชน์ร่วมกัน" },
            { q: "16. สัตว์สูญพันธุ์กระทบการขยายพันธุ์พืชอย่างไร?", o: ["ก. พืชดีขึ้น", "ข. ไม่มีผล", "ค. ไม่เกี่ยว", "ง. การกระจายเมล็ดลดลง"], a: "ง. การกระจายเมล็ดลดลง" },
            { q: "17. ข้อใดคือการปรับตัวเชิง 'พฤติกรรม'?", o: ["ก. จำศีล", "ข. ขนหนา", "ค. ไม่มีเกล็ด", "ง. ใบกว้าง"], a: "ก. จำศีล" },
            { q: "18. น้ำเน่าเสียกระทบพลังงานอย่างไร?", o: ["ก. เพิ่มพลังงาน", "ข. พลังงานลดลง", "ค. เท่าเดิม", "ง. ดีขึ้น"], a: "ข. พลังงานลดลง" },
            { q: "19. มนุษย์กระทบสิ่งแวดล้อมมากสุดคือ?", o: ["ก. สร้างที่พัก", "ข. ตัดไม้", "ค. ปลูกพืช", "ง. เลี้ยงสัตว์"], a: "ข. ตัดไม้" },
            { q: "20. สิ่งใดบ่งชี้ระบบนิเวศสมบูรณ์?", o: ["ก. สัตว์ชนิดเดียว", "ข. ความหลากหลายสูง", "ค. ไม่มีสัตว์", "ง. มีแค่ต้นไม้"], a: "ข. ความหลากหลายสูง" },
            { q: "21. ภาวะอิงอาศัยคืออะไร?", o: ["ก. +/+", "ข. +/0", "ค. +/-", "ง. -/-"], a: "ข. +/0" },
            { q: "22. ผู้ล่าสูงสุดในทุ่งหญ้าคือ?", o: ["ก. ม้าลาย", "ข. สิงโต", "ค. หญ้า", "ง. หนอน"], a: "ข. สิงโต" },
            { q: "23. ฟื้นตัวหลังไฟป่าเริ่มจาก?", o: ["ก. ไม้ใหญ่", "ข. สัตว์", "ค. พืชเบิกนำ", "ง. ไม่ฟื้น"], a: "ค. พืชเบิกนำ" },
            { q: "24. กบจำศีลเพื่อ?", o: ["ก. ล่าเหยื่อ", "ข. ลดใช้พลังงาน", "ค. ขยายพันธุ์", "ง. เปลี่ยนสี"], a: "ข. ลดใช้พลังงาน" },
            { q: "25. สารตกค้างส่งผลต่อใครมากสุด?", o: ["ก. พืช", "ข. ผู้บริโภคสุดท้าย", "ค. ปุ๋ย", "ง. อากาศ"], a: "ข. ผู้บริโภคสุดท้าย" },
            { q: "26. ตัวอย่างภาวะปรสิตคือ?", o: ["ก. นกรังบนต้นไม้", "ข. กาฝาก", "ค. ผึ้งกับดอกไม้", "ง. ฉลาม"], a: "ข. กาฝาก" },
            { q: "27. ผู้ย่อยสลายคืนสิ่งใดสู่ดิน?", o: ["ก. ความร้อน", "ข. ป้องกันน้ำท่วม", "ค. ธาตุอาหาร", "ง. น้ำใส"], a: "ค. ธาตุอาหาร" },
            { q: "28. ลดใช้สารเคมีส่งผลดีต่อ?", o: ["ก. พืชโตช้า", "ข. ความหลากหลายเพิ่ม", "ค. สัตว์สูญพันธุ์", "ง. ไม่เปลี่ยน"], a: "ข. ความหลากหลายเพิ่ม" },
            { q: "29. สัตว์ตาสองข้างหน้าคือ?", o: ["ก. สัตว์ถูกล่า", "ข. สัตว์ผู้ล่า", "ค. สัตว์กินพืช", "ง. หากินกลางคืน"], a: "ข. สัตว์ผู้ล่า" },
            { q: "30. ป่าดิบชื้นใบกว้างเพื่อ?", o: ["ก. รับแสงน้อย", "ข. ป้องกันแมลง", "ค. เก็บน้ำ", "ง. สวยงาม"], a: "ก. รับแสงน้อย" },
            { q: "31. สัตว์ต่างถิ่นผลเสียคือ?", o: ["ก. สวยงาม", "ข. แย่งทรัพยากร", "ค. สะอาด", "ง. พืชโตเร็ว"], a: "ข. แย่งทรัพยากร" },
            { q: "32. ป่าต้นน้ำสำคัญเพื่อ?", o: ["ก. ที่อยู่เสือ", "ข. กักเก็บน้ำ", "ค. ไม้แปรรูป", "ง. ท่องเที่ยว"], a: "ข. กักเก็บน้ำ" },
            { q: "33. ฉลามกับปลาเหาคือ?", o: ["ก. ปรสิต", "ข. อิงอาศัย", "ค. พึ่งพา", "ง. ผู้ล่า"], a: "ข. อิงอาศัย" },
            { q: "34. พืชใช้ก๊าซใดสร้างอาหาร?", o: ["ก. ออกซิเจน", "ข. ไฮโดรเจน", "ค. คาร์บอนไดออกไซด์", "ง. ไนโตรเจน"], a: "ค. คาร์บอนไดออกไซด์" },
            { q: "35. ทะเลทรายหากินกลางคืนเพื่อ?", o: ["ก. กลัวแดด", "ข. เลี่ยงร้อน", "ค. ความเคยชิน", "ง. ล่าแม่น"], a: "ข. เลี่ยงร้อน" },
            { q: "36. การปรับตัวทางสรีรวิทยาคือ?", o: ["ก. สีผิว", "ข. จำศีล", "ค. อพยพ", "ง. เสียงร้อง"], a: "ก. สีผิว" },
            { q: "37. พลังงานแสงเก็บในพืชเป็น?", o: ["ก. ราก", "ข. ลำต้น", "ค. สารอาหาร/แป้ง", "ง. ดอก"], a: "ค. สารอาหาร/แป้ง" },
            { q: "38. ห่วงโซ่ไม่มีผู้ผลิตจะเกิดอะไร?", o: ["ก. กินอย่างอื่น", "ข. ระบบล่มสลาย", "ค. กินอากาศ", "ง. ไม่ผล"], a: "ข. ระบบล่มสลาย" },
            { q: "39. น้ำสำคัญอย่างไร?", o: ["ก. เป็นตัวกลางเคมี", "ข. เป็นผู้ผลิต", "ค. เป็นผู้ล่า", "ง. เป็นผู้ย่อย"], a: "ก. เป็นตัวกลางเคมี" },
            { q: "40. ความสมดุลนิเวศเกิดจาก?", o: ["ก. จำนวนเท่ากัน", "ข. ควบคุมกันเอง", "ค. มนุษย์แทรก", "ง. ชนิดเดียว"], a: "ข. ควบคุมกันเอง" },
            { q: "41. BOD สูงหมายถึง?", o: ["ก. น้ำสะอาด", "ข. น้ำเสียขาดออกซิเจน", "ค. แร่ธาตุสูง", "ง. ปลาเยอะ"], a: "ข. น้ำเสียขาดออกซิเจน" },
            { q: "42. รากโกงกางช่วยเรื่อง?", o: ["ก. กรองแสง", "ข. ยึดดิน/กันคลื่น", "ค. ดูดน้ำเค็ม", "ง. คายออกซิเจน"], a: "ข. ยึดดิน/กันคลื่น" },
            { q: "43. พลังงานแดดลดลงกระทบใครสุด?", o: ["ก. ขนาดตัวลด", "ข. ผู้บริโภคขั้นสูงลด", "ค. ผู้ผลิตกินซาก", "ง. ไม่กระทบ"], a: "ข. ผู้บริโภคขั้นสูงลด" },
            { q: "44. นาขั้นบันไดช่วย?", o: ["ก. ลดการชะล้างหน้าดิน", "ข. ปลูกหลากหลาย", "ค. กันแมลง", "ง. รับแสงดี"], a: "ก. ลดการชะล้างหน้าดิน" },
            { q: "45. เขตร้อนหลากชนิดสูงกว่าเพราะ?", o: ["ก. พื้นที่กว้าง", "ข. อากาศเอื้อตลอดปี", "ค. สัตว์ล่าเยอะ", "ง. น้ำเยอะ"], a: "ข. อากาศเอื้อตลอดปี" },
            { q: "46. ก๊าซโลกร้อนหลักคือ?", o: ["ก. ไนโตรเจน", "ข. คาร์บอนไดออกไซด์", "ค. ออกซิเจน", "ง. ฮีเลียม"], a: "ข. คาร์บอนไดออกไซด์" },
            { q: "47. ปะการังฟอกขาวเกิดจาก?", o: ["ก. ปลากิน", "ข. อุณหภูมิน้ำสูง", "ค. เค็มเกิน", "ง. คลื่นแรง"], a: "ข. อุณหภูมิน้ำสูง" },
            { q: "48. บ่งชี้อากาศบริสุทธิ์คือ?", o: ["ก. มอส/ไลเคน", "ข. แมลงสาบ", "ค. หนอน", "ง. ยุง"], a: "ก. มอส/ไลเคน" },
            { q: "49. สูญเสียความหลากชนิดผลระยะยาวคือ?", o: ["ก. เสียสมดุลนิเวศ", "ข. สัตว์ตัวใหญ่ขึ้น", "ค. สังเคราะห์แสงดีขึ้น", "ง. ผู้ย่อยสลายหาย"], a: "ก. เสียสมดุลนิเวศ" },
            { q: "50. ทำไมผู้บริโภคสุดท้ายมีน้อย?", o: ["ก. ศัตรูเยอะ", "ข. พลังงานเหลือพอน้อยมาก", "ค. ตัวใหญ่", "ง. กินยาก"], a: "ข. พลังงานเหลือพอน้อยมาก" }
        ];

        const area = document.getElementById('exam-area');
        questions.forEach((item, index) => {
            area.innerHTML += `
                <div class="question">
                    <p><strong>${index+1}. ${item.q}</strong></p>
                    <ul class="options">
                        ${item.o.map(opt => `<li onclick="show(${index})">${opt}</li>`).join('')}
                    </ul>
                    <div id="exp${index}" class="explanation"><strong>เฉลย:</strong> ${item.a}</div>
                </div>
            `;
        });
        function show(i) { document.getElementById('exp'+i).style.display = 'block'; }
    </script>
</body>
</html>
