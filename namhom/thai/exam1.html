<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบภาษาไทย ป.5 (25 ข้อ)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .exam-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .question-box { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; }
        .btn-option { width: 100%; text-align: left; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; background: #fff; }
        .btn-option:hover { background: #e1f5fe; }
        .correct { background-color: #c8e6c9 !important; border-color: #4caf50 !important; }
        .wrong { background-color: #ffcdd2 !important; border-color: #f44336 !important; }
        .explanation { margin-top: 10px; padding: 10px; background: #fff3e0; border-left: 5px solid #ff9800; display: none; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="exam-container">
    <h1>ข้อสอบภาษาไทย ป.5 (25 ข้อ)</h1>
    <div id="quiz"></div>
</div>

<script>
    const questions = [
        {q: "1. คำบุพบททำหน้าที่อะไรในประโยค?", o: ["เชื่อมประโยค", "บอกความสัมพันธ์", "บอกการกระทำ", "ขยายคำนาม"], a: 1, exp: "คำบุพบทใช้บอกความสัมพันธ์ระหว่างคำ เช่น บอกตำแหน่ง เวลา หรือความเป็นเจ้าของ"},
        {q: "2. คำในข้อใดเป็นคำบุพบททั้งหมด?", o: ["และ, แต่, หรือ", "บน, ใน, แห่ง", "วิ่ง, กิน, นอน", "สวย, สูง, เร็ว"], a: 1, exp: "บน ใน แห่ง เป็นคำที่บอกตำแหน่งและสถานภาพ"},
        {q: "3. คำสันธานในข้อใดเชื่อมความขัดแย้ง?", o: ["และ", "แต่", "เพราะ", "จึง"], a: 1, exp: "'แต่' ใช้เชื่อมประโยคที่มีเนื้อหาขัดแย้งกัน เช่น เขาขยันแต่สอบตก"},
        {q: "4. ประโยคใดมีคำสันธานเชื่อมเหตุและผล?", o: ["เขาชอบกินข้าวผัดและแกงจืด", "เพราะฝนตกเขาจึงมาโรงเรียนสาย", "แม่ไปตลาดแต่พ่ออยู่บ้าน", "ฉันจะไปเที่ยวหรือไปดูหนัง"], a: 1, exp: "'เพราะ...จึง...' เป็นคู่คำสันธานที่แสดงเหตุและผล"},
        {q: "5. คำใดเป็นอักษรนำ?", o: ["กราบ", "ตลก", "เพลง", "ครู"], a: 1, exp: "ตลก (ต อะ - ล อก) ต. นำ ล. เป็นอักษรนำ"},
        {q: "6. คำในข้อใดอ่านออกเสียงอะกึ่งเสียง?", o: ["สนุก", "หญ้า", "อยาก", "หลัง"], a: 0, exp: "สนุก (สะ - หนุก) มีการอ่านออกเสียงอะกึ่งเสียงที่พยางค์หน้า"},
        {q: "7. คำว่า 'บรรทัด' ใช้ บรร หรือ บัน?", o: ["บัน", "บรร", "บาน", "บาน"], a: 1, exp: "บรรทัด เป็นคำที่ใช้ 'บรร'"},
        {q: "8. ข้อใดคือคำที่ใช้ บัน ถูกต้อง?", o: ["บันจุ", "บันได", "บรรเทิง", "บรรดา"], a: 1, exp: "บันได คือหนึ่งใน 5 คำที่ใช้ 'บัน'"},
        {q: "9. พยัญชนะควบกล้ำแท้ในข้อใดควบกับ ร?", o: ["ควาย", "กราบ", "เกวียน", "พลอย"], a: 1, exp: "กราบ ออกเสียง ก และ ร พร้อมกัน"},
        {q: "10. ข้อใดคือคำควบกล้ำไม่แท้?", o: ["จริง", "กวาง", "ความ", "ปลา"], a: 0, exp: "จริง อ่านออกเสียงแค่ จ. ไม่ควบกับ ร."},
        {q: "11. 'อย่า อยู่ อย่าง อยาก' เป็นคำประเภทใด?", o: ["คำสันธาน", "คำบุพบท", "อักษรนำ อ นำ ย", "คำควบกล้ำ"], a: 2, exp: "มี 4 คำในภาษาไทยที่ อ. นำ ย."},
        {q: "12. คำในข้อใดเป็นคำนาม?", o: ["วิ่ง", "สวย", "แมว", "กิน"], a: 2, exp: "แมว เป็นชื่อสัตว์ (คำนาม)"},
        {q: "13. ข้อใดไม่ใช่คำกริยา?", o: ["เดิน", "คิด", "โต๊ะ", "ร้องเพลง"], a: 2, exp: "โต๊ะ เป็นสิ่งของ (คำนาม)"},
        {q: "14. ประโยคใดเป็นข้อเท็จจริง?", o: ["อากาศวันนี้สวยจัง", "น้ำเดือดที่อุณหภูมิ 100 องศาเซลเซียส", "ฉันคิดว่าเขาน่าจะมาสาย", "การดูหนังสนุกกว่าอ่านหนังสือ"], a: 1, exp: "เป็นความจริงทางวิทยาศาสตร์ที่พิสูจน์ได้"},
        {q: "15. ประโยคใดเป็นข้อคิดเห็น?", o: ["นกบินได้", "ปลาว่ายน้ำในน้ำ", "สีฟ้าเป็นสีที่สวยที่สุด", "ดวงอาทิตย์ขึ้นทางทิศตะวันออก"], a: 2, exp: "ความชอบส่วนตัวเป็นข้อคิดเห็น"},
        {q: "16. คำว่า 'รร' (ร หัน) ในข้อใดอ่านออกเสียง อะ-น?", o: ["บรรทัด", "พรรษา", "กรรม", "ธรรม"], a: 1, exp: "พรรษา อ่านว่า พัน-สา"},
        {q: "17. คำว่า 'ธรรม' อ่านว่าอย่างไร?", o: ["ทะ-มะ", "ทำ", "ธะ-ระ-มะ", "ทอ-อะ-มะ"], a: 1, exp: "ร หัน หลังตัวสะกดให้ออกเสียงเหมือนมีสระอะและตัวสะกด"},
        {q: "18. ข้อใดคือการอ่านจับใจความสำคัญ?", o: ["อ่านทุกคำที่เห็น", "หาประโยคใจความสำคัญของเรื่อง", "จดจำตัวละครทุกตัว", "อ่านให้เร็วที่สุด"], a: 1, exp: "หัวใจสำคัญคือการสรุปสาระสำคัญให้ได้"},
        {q: "19. ภาษาถิ่นของคำว่า 'อร่อย' คือข้อใด?", o: ["ลำ", "หรอย", "แซ่บ", "ถูกทุกข้อ"], a: 3, exp: "เป็นคำภาษาถิ่น เหนือ ใต้ และอีสาน ตามลำดับ"},
        {q: "20. ข้อใดคือภาษาไทยมาตรฐาน?", o: ["พูด", "อู้", "แหลง", "เว้า"], a: 0, exp: "พูด เป็นภาษาไทยกลาง"},
        {q: "21. 'เพื่อ' เป็นคำประเภทใด?", o: ["คำสันธาน", "คำบุพบท", "คำวิเศษณ์", "คำกริยา"], a: 1, exp: "เพื่อ ใช้บอกจุดประสงค์"},
        {q: "22. ข้อใดมีการใช้คำควบกล้ำไม่แท้?", o: ["ไทร", "กลม", "กรง", "ควาย"], a: 0, exp: "ไทร อ่านว่า ซาย เป็นควบกล้ำไม่แท้"},
        {q: "23. วรรณคดีในหนังสือภาษาพาทีที่เกี่ยวกับชีวิตเด็กชาวเขาคือเรื่องใด?", o: ["กระเช้าสีดา", "กำเนิดผิดพรรณ", "วิชาเหมือนสินค้า", "พญานาค"], a: 1, exp: "บทเรียนในภาษาพาที ป.5"},
        {q: "24. การสื่อสารด้วยจดหมาย/อีเมล ควรเริ่มต้นอย่างไร?", o: ["ขึ้นต้นด้วยคำขึ้นต้นที่เหมาะสม", "ใส่อารมณ์ลงไป", "เขียนเฉพาะชื่อตนเอง", "ไม่ต้องมีคำลงท้าย"], a: 0, exp: "มารยาทการเขียนต้องมีรูปแบบที่ถูกต้อง"},
        {q: "25. ข้อใดกล่าวถูกต้องที่สุดเกี่ยวกับคำบุพบท?", o: ["ทำหน้าที่เชื่อมประโยค", "วางไว้หน้าคำนามหรือสรรพนาม", "ใช้แสดงอารมณ์", "ใช้เน้นคำ"], a: 1, exp: "ตำแหน่งของคำบุพบทจะอยู่หน้าคำนามหรือคำสรรพนามเสมอ"}
    ];

    const quizDiv = document.getElementById('quiz');
    questions.forEach((q, i) => {
        let optionsHTML = q.o.map((opt, oIdx) => 
            `<li onclick="checkAnswer(${i}, ${oIdx})">
                <button class="btn-option" id="btn-${i}-${oIdx}">${String.fromCharCode(65+oIdx)}. ${opt}</button>
            </li>`
        ).join('');
        quizDiv.innerHTML += `<div class="question-box">
            <p><strong>${i+1}. ${q.q}</strong></p>
            <ul class="options">${optionsHTML}</ul>
            <div id="exp-${i}" class="explanation"><strong>เฉลย:</strong> ${q.exp}</div>
        </div>`;
    });

    function checkAnswer(qIdx, oIdx) {
        const correct = questions[qIdx].a;
        const btn = document.getElementById(`btn-${qIdx}-${oIdx}`);
        const exp = document.getElementById(`exp-${qIdx}`);
        if (oIdx === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            document.getElementById(`btn-${qIdx}-${correct}`).classList.add('correct');
        }
        exp.style.display = 'block';
    }
</script>
</body>
</html>
