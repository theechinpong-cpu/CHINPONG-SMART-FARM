<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คัมภีร์อังกฤษ ป.5 - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff7e5f; --sub-color: #feb47b; --bg: #fdfdfd; }
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; background: linear-gradient(to right, var(--main-color), var(--sub-color)); color: white; padding: 30px; border-radius: 20px; margin-bottom: 30px; }
        .section-title { border-left: 8px solid var(--main-color); padding-left: 15px; margin: 40px 0 20px; color: #333; }
        .q-card { background: #fff; border: 1.5px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; transition: 0.3s; }
        .q-card:hover { border-color: var(--sub-color); transform: translateY(-2px); }
        .btn-ans { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; background: #fafafa; }
        .btn-ans:hover { background: #fff5f0; border-color: var(--main-color); }
        .explain { display: none; margin-top: 15px; padding: 15px; border-radius: 10px; font-size: 0.9rem; border-left: 5px solid; }
        .correct { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .wrong { background: #ffebee; border-color: #f44336; color: #c62828; }
        #summary-panel { display: none; padding: 40px; text-align: center; background: #2c3e50; color: white; border-radius: 20px; margin-top: 30px; }
        .score-num { font-size: 4rem; font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🇹🇭 คลังข้อสอบภาษาอังกฤษ ป.5 ชุดใหญ่</h1>
        <p>จัดทำโดย <b>พระจอมเกล้าติวเตอร์</b> | เขียนโดย CHINPONG SMART FARM</p>
        <p>บทที่ 1: Tenses (25 ข้อ) & บทที่ 2: Comparison (25 ข้อ)</p>
    </div>

    <div id="quiz-area">
        <h2 class="section-title">บทที่ 1: กาลเวลา (Tenses Mastery)</h2>
        <div id="section1"></div>

        <h2 class="section-title">บทที่ 2: การเปรียบเทียบ (Comparison)</h2>
        <div id="section2"></div>
    </div>

    <button onclick="checkAll()" id="submit-all" style="width:100%; padding:20px; background:var(--main-color); color:white; border:none; border-radius:15px; font-size:1.5rem; cursor:pointer; font-weight:bold;">ส่งคำตอบและวิเคราะห์ผล</button>

    <div id="summary-panel">
        <h2>🌈 ผลการเรียนรู้ของน้อง 🌈</h2>
        <div class="score-num" id="total-score">0 / 50</div>
        <div id="analysis-text" style="font-size: 1.2rem; line-height: 1.8;"></div>
    </div>
</div>

<script>
    const questions = [
        // บทที่ 1: Tenses (1-25)
        { q: "1. She _______ to school by bus every day.", a: ["go", "goes", "is going"], c: 1, e: "ทุกวัน (every day) เป็นนิสัย ประธาน She คนเดียว กริยาเติม es" },
        { q: "2. Listen! The birds _______.", a: ["sing", "sings", "are singing"], c: 2, e: "Listen! (ฟังซิ) บอกว่าเหตุการณ์กำลังเกิด ใช้ is/am/are + ing" },
        { q: "3. My father _______ a new car last month.", a: ["buy", "buys", "bought"], c: 2, e: "Last month คืออดีต ต้องใช้กริยาช่อง 2 (bought)" },
        { q: "4. I always _______ my homework in the evening.", a: ["do", "does", "did"], c: 0, e: "I เป็นประธานยกเว้น กริยาไม่ต้องเติม s/es ใน Present Simple" },
        { q: "5. They _______ football now.", a: ["play", "played", "are playing"], c: 2, e: "now แปลว่าตอนนี้ ต้องใช้ are + ing" },
        // ... (สมมติใส่จนครบ 25 ข้อ)
        { q: "25. He _______ his room yesterday.", a: ["clean", "cleaned", "cleans"], c: 1, e: "yesterday คืออดีต เติม ed ได้เลย" },

        // บทที่ 2: Comparison (26-50)
        { q: "26. A plane is _______ than a car.", a: ["fast", "faster", "fastest"], c: 1, e: "มี than แสดงว่าเป็นขั้นกว่า เติม -er" },
        { q: "27. Mount Everest is _______ mountain in the world.", a: ["high", "higher", "the highest"], c: 2, e: "ที่สุดในโลก ต้องเป็นขั้นสุด ใช้ the...est" },
        { q: "28. This book is _______ than that one.", a: ["expensive", "more expensive", "the most expensive"], c: 1, e: "คำยาวใช้ more...than ในขั้นกว่า" },
        { q: "29. My mom is _______ woman for me.", a: ["good", "better", "the best"], c: 2, e: "ขั้นสุดของ good คือ the best" },
        { q: "30. A snail is _______ than a rabbit.", a: ["slow", "slower", "slowest"], c: 1, e: "ขั้นกว่าของ slow คือ slower" }
        // ... (ใส่ต่อจนครบ 50 ข้อ)
    ];

    let userAnswers = new Array(questions.length).fill(null);

    function renderQuiz() {
        const sec1 = document.getElementById('section1');
        const sec2 = document.getElementById('section2');
        
        questions.forEach((item, idx) => {
            const html = `
                <div class="q-card" id="card-${idx}">
                    <p><b>${item.q}</b></p>
                    ${item.a.map((opt, i) => `
                        <button class="btn-ans" id="btn-${idx}-${i}" onclick="select(${idx}, ${i})">${opt}</button>
                    `).join('')}
                    <div id="exp-${idx}" class="explain"></div>
                </div>
            `;
            if(idx < 25) sec1.innerHTML += html;
            else sec2.innerHTML += html;
        });
    }

    function select(qIdx, optIdx) {
        userAnswers[qIdx] = optIdx;
        const buttons = document.querySelectorAll(`#card-${qIdx} .btn-ans`);
        buttons.forEach((b, i) => {
            b.style.background = (i === optIdx) ? '#feb47b' : '#fafafa';
        });
    }

    function checkAll() {
        if(userAnswers.includes(null)) { alert("น้องทำยังไม่ครบทุกข้อเลยครับ!"); return; }
        
        let score = 0;
        questions.forEach((item, idx) => {
            const exp = document.getElementById(`exp-${idx}`);
            exp.style.display = 'block';
            if(userAnswers[idx] === item.c) {
                score++;
                exp.className = "explain correct";
                exp.innerHTML = "✅ ถูกต้อง: " + item.e;
            } else {
                exp.className = "explain wrong";
                exp.innerHTML = "❌ ผิด: " + item.e;
            }
        });

        document.getElementById('summary-panel').style.display = 'block';
        document.getElementById('total-score').innerText = `${score} / ${questions.length}`;
        
        let analysis = "";
        if(score >= 45) analysis = "<b>วิเคราะห์จุดอ่อน:</b> น้องแทบไม่มีจุดอ่อนเลย! ความเข้าใจในเรื่อง Tense และ Comparison อยู่ในเกณฑ์ดีเยี่ยม (Excellent) พร้อมสำหรับการแข่งขันในระดับจังหวัดได้เลย!";
        else if(score >= 30) analysis = "<b>วิเคราะห์จุดอ่อน:</b> น้องเข้าใจเนื้อหาหลัก แต่ยังมีพลาดในเรื่อง 'ข้อยกเว้น' และ 'คำบอกเวลา' เล็กน้อย ให้ระวังเรื่องการเติม s/es และการเปลี่ยนรูปกริยาช่อง 2 นะครับ";
        else analysis = "<b>วิเคราะห์จุดอ่อน:</b> น้องอาจจะสับสนระหว่างปัจจุบันกับอดีต พี่แนะนำให้ท่องคำศัพท์ที่เป็น Keyword ของแต่ละ Tense ให้แม่นขึ้น และฝึกแยกการเปรียบเทียบขั้นกว่า/ขั้นสุดบ่อยๆ พี่เป็นกำลังใจให้ครับ!";
        
        document.getElementById('analysis-text').innerHTML = analysis;
        window.scrollTo(0, document.body.scrollHeight);
    }

    renderQuiz();
</script>
</body>
</html>
