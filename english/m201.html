<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phra Chom Klao Tutor - Grade 7 English Exam</title>
    <style>
        :root { --primary-color: #1565c0; --secondary-color: #d84315; --bg-color: #f8f9fa; }
        body { font-family: sans-serif; line-height: 1.6; background-color: var(--bg-color); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary-color); text-align: center; }
        .summary-section { background: #e3f2fd; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 6px solid var(--primary-color); }
        .question-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .clue { color: var(--secondary-color); font-size: 0.9em; font-weight: bold; display: block; margin-bottom: 5px; }
        .feedback { margin-top: 10px; padding: 10px; border-radius: 5px; display: none; font-size: 0.95em; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .disabled { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>Phra Chom Klao Tutor</h1>
    <div class="summary-section">
        <h2>Grade 7 English Grammar: Midterm Review</h2>
        <p><strong>CHINPONG SMART FARM</strong> guide: Mastering Present Simple/Continuous, Pronouns, Adverbs, and Prepositions. Use the clues provided to analyze the context before answering.</p>
    </div>

    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" onclick="showResults()">Check All Results</button>
    </form>

    <div id="resultCard" style="display:none; margin-top:30px; text-align:center;">
        <h2>Exam Analysis Completed!</h2>
    </div>
</div>

<script>
    const quizData = [
        { q: "1. She ___ to school every day.", clue: "Clue: Habitual action (every day)", options: ["go", "goes", "is going", "went"], answer: 1, exp: "Use Present Simple for habits. 'She' is singular, so add -es." },
        { q: "2. Listen! The baby ___.", clue: "Clue: Action happening 'right now'", options: ["cry", "cries", "is crying", "cried"], answer: 2, exp: "Use Present Continuous for actions occurring at the moment of speaking." },
        { q: "3. I ___ play football on Sundays.", clue: "Clue: Frequency adverb position", options: ["always", "am always", "always do", "always am"], answer: 0, exp: "Frequency adverbs go before the main verb." },
        { q: "4. Is this ___ pen?", clue: "Clue: Need a possessive adjective", options: ["you", "your", "yours", "yourself"], answer: 1, exp: "'Your' is used before a noun (pen) to show possession." },
        { q: "5. We meet ___ 8 o'clock.", clue: "Clue: Precise time", options: ["in", "on", "at", "to"], answer: 2, exp: "Use 'at' for clock times." },
        { q: "6. He ___ TV right now.", clue: "Clue: Present Continuous signal", options: ["watch", "watches", "is watching", "watched"], answer: 2, exp: "Present Continuous = is/am/are + V.ing." },
        { q: "7. My mother ___ dinner every evening.", clue: "Clue: Routine", options: ["cook", "cooks", "is cooking", "cooked"], answer: 1, exp: "Routine actions use Present Simple." },
        { q: "8. They ___ late for class.", clue: "Clue: Adverb with 'to be'", options: ["never are", "are never", "never is", "is never"], answer: 1, exp: "Frequency adverbs go AFTER the verb 'to be'." },
        { q: "9. This bag is ___.", clue: "Clue: Possessive pronoun needed", options: ["mine", "my", "me", "I"], answer: 0, exp: "'Mine' replaces 'my bag'." },
        { q: "10. The party is ___ December.", clue: "Clue: Month", options: ["in", "on", "at", "by"], answer: 0, exp: "Use 'in' for months and years." },
        { q: "11. ___ you reading a book?", clue: "Clue: Present Continuous question", options: ["Do", "Does", "Are", "Is"], answer: 2, exp: "Use 'Are' for 'you' in Continuous tense." },
        { q: "12. Water ___ at 100 degrees.", clue: "Clue: Scientific fact", options: ["boil", "boils", "is boiling", "boiled"], answer: 1, exp: "General truths use Present Simple." },
        { q: "13. I ___ visit my grandparents.", clue: "Clue: Frequency adverb", options: ["usually", "am usually", "do usually", "usually am"], answer: 0, exp: "Adverbs come before the main verb (visit)." },
        { q: "14. That car is ___.", clue: "Clue: Possessive of 'he'", options: ["he", "him", "his", "he's"], answer: 2, exp: "'His' shows possession for males." },
        { q: "15. We go to the beach ___ summer.", clue: "Clue: Season", options: ["in", "on", "at", "to"], answer: 0, exp: "Use 'in' for seasons, months, and years." },
        { q: "16. Look! The sun ___.", clue: "Clue: Action right now", options: ["shine", "shines", "is shining", "shone"], answer: 2, exp: "Exclamation 'Look!' indicates Present Continuous." },
        { q: "17. Cats ___ mice.", clue: "Clue: Nature/General fact", options: ["chase", "chases", "are chasing", "chased"], answer: 0, exp: "Plural subject 'Cats' takes a base verb." },
        { q: "18. He ___ eats vegetables.", clue: "Clue: Frequency", options: ["seldom", "is seldom", "does seldom", "seldom is"], answer: 0, exp: "'Seldom' is an adverb placed before the main verb." },
        { q: "19. The cat licked ___ paw.", clue: "Clue: Possessive for animal", options: ["it", "its", "it's", "itself"], answer: 1, exp: "'Its' is the possessive form for animals." },
        { q: "20. The meeting is ___ Friday.", clue: "Clue: Day of the week", options: ["in", "on", "at", "by"], answer: 1, exp: "Use 'on' for days of the week." },
        { q: "21. What ___ you doing?", clue: "Clue: Question for continuous", options: ["do", "does", "are", "is"], answer: 2, exp: "Continuous tense requires the verb 'to be'." },
        { q: "22. The Earth ___ around the Sun.", clue: "Clue: Scientific fact", options: ["move", "moves", "is moving", "moved"], answer: 1, exp: "Facts require singular Present Simple." },
        { q: "23. I ___ drink coffee.", clue: "Clue: Low frequency", options: ["rarely", "am rarely", "do rarely", "rarely am"], answer: 0, exp: "Frequency adverb before the main verb." },
        { q: "24. These toys are ___.", clue: "Clue: Possessive pronoun for they", options: ["they", "them", "their", "theirs"], answer: 3, exp: "'Theirs' is the possessive pronoun." },
        { q: "25. See you ___ noon!", clue: "Clue: Specific time of day", options: ["in", "on", "at", "to"], answer: 2, exp: "'At' is used for exact points in time." }
    ];

    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        quizData.forEach((item, i) => {
            container.innerHTML += `<div class="question-card" id="card_${i}">
                <p><strong>${item.q}</strong></p>
                <span class="clue">${item.clue}</span>
                ${item.options.map((opt, o) => `<label><input type="radio" name="q${i}" value="${o}" onchange="check(${i}, ${o})"> ${opt}</label><br>`).join('')}
                <div class="feedback" id="f${i}"></div>
            </div>`;
        });
    }

    function check(i, o) {
        const f = document.getElementById(`f${i}`);
        document.getElementById(`card_${i}`).classList.add('disabled');
        f.style.display = "block";
        if (o === quizData[i].answer) {
            f.style.background = "#e8f5e9"; f.innerHTML = "Correct! " + quizData[i].exp;
        } else {
            f.style.background = "#ffebee"; f.innerHTML = "Incorrect. Correct: " + quizData[i].options[quizData[i].answer] + ". Explanation: " + quizData[i].exp;
        }
    }

    function showResults() { alert("Exam finished! Check your answers above."); document.getElementById('resultCard').style.display = 'block'; }
    window.onload = renderQuiz;
</script>
</body>
</html>
