<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>พระจอมเกล้าติวเตอร์ - EdTech Interactive Exam System</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-canvas: #f8fafc;
            --card-surface: #ffffff;
            --text-dark: #0f172a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-dark);
            line-height: 1.7;
            padding: 30px 15px;
            margin: 0;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--card-surface);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
        }
        .question-block {
            background: #fdfdfd;
            border: 1px solid #e2e8f0;
            border-left: 6px solid var(--secondary-color);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .question-header {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 15px;
        }
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .option-item:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .option-item.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
        }
        .option-item.incorrect {
            background-color: var(--danger-color) !important;
            color: white;
            border-color: var(--danger-color);
        }
        .feedback-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #eff6ff;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
        .guide-text {
            color: #dc2626;
            font-weight: bold;
            display: block;
            margin-top: 8px;
        }
        .action-btn {
            display: block;
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 40px;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: #0f172a;
        }
        #summary-dashboard {
            margin-top: 40px;
            padding: 30px;
            background: #f0fdf4;
            border: 2px solid var(--success-color);
            border-radius: 14px;
            display: none;
        }
        .category-tag {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            background: #e0e7ff;
            color: #3730a3;
            border-radius: 4px;
            margin-bottom: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 ระบบข้อสอบภาษาอังกฤษอัตโนมัติ (25 ข้อแรก)</h1>
    <div class="subtitle">สถาปัตยกรรมคลังข้อสอบมัธยมปลาย - พัฒนาโดย พระจอมเกล้าติวเตอร์</div>
    
    <div id="exam-render-target"></div>

    <button class="action-btn" onclick="evaluateExamEngine()">📊 ประมวลผลคะแนนและวิเคราะห์จุดอ่อน</button>

    <div id="summary-dashboard">
        <h2>🏆 ผลการประเมินสถิติเชิงลึก</h2>
        <p id="total-score-display" style="font-size: 22px; font-weight: bold; color: var(--primary-color);"></p>

        <div id="analysis-render-target"></div>
    </div>
</div>

        explanation: "คำนามรวมกลุ่ม (Collective Noun) เมื่อมีความเห็นแตกแยกหรือแยกย้ายกันทำกิจกรรม (สังเกตจากคำว่า divided และ their) จะเป็นพหูพจน์",
        guide: "(Guide ข้อสอบและกฎต่าง ๆ: Collective Nouns จะกลายเป็นพหูพจน์ทันทีเมื่อสมาชิกภายในกลุ่มไม่ได้เคลื่อนไหวเป็นหนึ่งเดียวกัน)"
    },
    {
        cat: "Subject-Verb Agreement",
        q: "24. Not only the internet connection but also the automated systems ________ inspection.",
        answers: ["need", "needs", "needing", "is needing"],
        correctIndex: 0,
        explanation: "ประธานตัวหลังถัดจากคำว่า but also คือ 'the automated systems' เป็นพหูพจน์ กริยาแท้คงรูปเดิมไม่ต้องเติม s",
        guide: "(Guide ข้อสอบและกฎต่าง ๆ: โครงสร้างประธาน Not only...but also... ให้ข้ามประธานตัวแรกแล้วพุ่งเป้าไปที่ประธานตัวหลังสุด)"
    },
    {
        cat: "Subject-Verb Agreement",
        q: "25. Most of the water in the reservoirs ________ evaporated due to the heatwave.",
        answers: ["has", "have", "are", "were"],
        correctIndex: 0,
        explanation: "คำบอกสัดส่วน 'Most of' ให้ไปตรวจสอบคำนามที่อยู่ด้านหลัง ในโจทย์คือคำว่า 'water' (นามนับไม่ได้/เอกพจน์) กริยาจึงใช้ 'has'",
        guide: "(Guide ข้อสอบและกฎต่าง ๆ: คำนามสัดส่วน [ Fractions/Percentages/Quantifiers ] พจน์ของกริยาจะแปรผันตรงตามคำนามที่ตามหลัง of)"
    }
];

const answerRegistry = new Array(quizRepository.length).fill(null);

function renderExamEngine() {
    const target = document.getElementById('exam-render-target');
    quizRepository.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-block';
        
        let optionsHTML = '';
        item.answers.forEach((opt, optIdx) => {
            optionsHTML += `<button class="option-item" id="q_${index}_opt_${optIdx}" onclick="processOptionClick(${index}, ${optIdx})">${opt}</button>`;
        });
        
        card.innerHTML = `
            <span class="category-tag">${item.cat}</span>
            <div class="question-header">${item.q}</div>
            <div class="options-group">${optionsHTML}</div>
            <div class="feedback-box" id="feedback_${index}">
                <strong>คำอธิบาย:</strong> ${item.explanation}
                <span class="guide-text">${item.guide}</span>
            </div>
        `;
        target.appendChild(card);
    });
}

function processOptionClick(qIdx, optIdx) {
    if(answerRegistry[qIdx] !== null) return; 
    
    answerRegistry[qIdx] = optIdx;
    const correctIdx = quizRepository[qIdx].correctIndex;
    const fbox = document.getElementById(`feedback_${qIdx}`);
    
    fbox.style.display = 'block';
    
    if(optIdx === correctIdx) {
        document.getElementById(`q_${qIdx}_opt_${optIdx}`).classList.add('correct');
    } else {
        document.getElementById(`q_${qIdx}_opt_${optIdx}`).classList.add('incorrect');
        document.getElementById(`q_${qIdx}_opt_${correctIdx}`).classList.add('correct');
    }
}

function evaluateExamEngine() {
    let score = 0;
    let categories = { "Tenses": { correct: 0, total: 13 }, "Subject-Verb Agreement": { correct: 0, total: 12 } };
    
    answerRegistry.forEach((ans, idx) => {
        const item = quizRepository[idx];
        if(ans === item.correctIndex) {
            score++;
            categories[item.cat].correct++;
        }
    });
    
    document.getElementById('summary-dashboard').style.display = 'block';
    document.getElementById('total-score-display').innerText = `สรุปคะแนนรวม: ได้รับ ${score} จากคะแนนเต็ม ${quizRepository.length} คะแนน`;
    
    let analysisHTML = '<ul>';
    for (let cat in categories) {
        let currentScore = categories[cat].correct;
        let maxScore = categories[cat].total;
        let percentage = (currentScore / maxScore) * 100;
        
        analysisHTML += `<li style="margin-bottom:10px;"><strong>หมวดหมู่เนื้อหา ${cat}:</strong> สำเร็จคำตอบถูกต้อง ${currentScore}/${maxScore} ข้อ คิดเป็น (${percentage.toFixed(1)}%) <br>`;
        if(percentage >= 80) {
            analysisHTML += `<span style="color:var(--success-color)">✔ ผ่านเกณฑ์มาตรฐานระดับสูง: มีความเชี่ยวชาญในโครงสร้างนี้สูงมาก</span></li>`;
        } else if(percentage >= 50) {
            analysisHTML += `<span style="color:orange">⚠️ ควรระมัดระวัง: พบสับสนในส่วนของข้อยกเว้นบางประการ แนะนำให้สแกนโค้ดสคริปต์ย้อนกลับไปดูข้อที่ผิด</span></li>`;
        } else {
            analysisHTML += `<span style="color:var(--danger-color)">❌ สัญญาณวิกฤต: เป็นจุดอ่อนที่ระบบวิเคราะห์แล้วว่าต้องกลับไปแก้ไขและศึกษาทฤษฎีบทสรุปด้านบนใหม่อีกครั้ง</span></li>`;
        }
    }
    analysisHTML += '</ul>';
    
    document.getElementById('analysis-render-target').innerHTML = analysisHTML;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

window.onload = renderExamEngine;
</script>
</body>
