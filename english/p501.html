            options: ["Protect or keep", "Formally put an end to", "Update and change", "Enforce strictly"],
            answer: 1,
            explanation: "คำใบ้คือประเภท Cause & Effect สังเกตจากคำว่า 'therefore' (ดังนั้น) เหตุคือกฎหมายเก่าและไม่มีประโยชน์แล้ว ผลลัพธ์คือรัฐบาลต้องล้มเลิกหรือยกเลิกมันไป (Formally put an end to)"
        },
        {
            id: 25,
            clueType: "Synonym",
            text: "The soldier showed great <span class='target-word'>valor</span> in battle, and his comrades praised his incredible bravery.",
            options: ["Fear or cowardice", "Great bravery", "Intelligence", "Sadness"],
            answer: 1,
            explanation: "คำใบ้คือประเภท Synonym สังเกตจากคำว่า 'and' เชื่อมโยงกับคำนามด้านหลังคือ 'bravery' (ความกล้าหาญ) ดังนั้น valor จึงแปลว่าความกล้าหาญอย่างยิ่งยวด (Great bravery)"
        }
    ];

    // Render questions dynamically on load
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        questionsData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${q.id}`;

            let optionsHtml = '';
            q.options.forEach((opt, optIdx) => {
                optionsHtml += `
                    <button type="button" 
                            class="option-btn" 
                            id="opt-${q.id}-${optIdx}" 
                            onclick="selectOption(${q.id}, ${optIdx})">
                        ${String.fromCharCode(65 + optIdx)}. ${opt}
                    </button>
                `;
            });

            card.innerHTML = `
                <div class="question-number">Question ${idx + 1} [ประเภทคำใบ้: ${q.clueType}]</div>
                <div class="question-text">${q.text}</div>
                <div class="options-container" id="options-container-${q.id}">
                    ${optionsHtml}
                </div>
                <div class="explanation-box" id="explain-${q.id}">
                    <strong>💡 เฉลย & คำอธิบาย:</strong> ${q.explanation}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Object to track user responses
    const userAnswers = {};

    function selectOption(qId, optIdx) {
        // If already submitted and evaluated, freeze selection
        if(document.getElementById(`explain-${qId}`).style.display === 'block') return;

        // Reset all buttons in this question group
        const qData = questionsData.find(q => q.id === qId);
        qData.options.forEach((_, idx) => {
            document.getElementById(`opt-${qId}-${idx}`).style.border = '2px solid #e2e8f0';
            document.getElementById(`opt-${qId}-${idx}`).style.backgroundColor = '#f1f5f9';
        });

        // Highlight selected
        const selectedBtn = document.getElementById(`opt-${qId}-${optIdx}`);
        selectedBtn.style.border = '2px solid #3b82f6';
        selectedBtn.style.backgroundColor = '#eff6ff';

        // Save answer
        userAnswers[qId] = optIdx;
    }

    // Evaluation and AI Diagnostic Analytics
    function evaluateQuiz() {
        let score = 0;
        const total = questionsData.length;
        
        // Track stats per Clue Type
        const stats = {
            Definition: { correct: 0, total: 0 },
            Antonym: { correct: 0, total: 0 },
            Example: { correct: 0, total: 0 },
            "Cause and Effect": { correct: 0, total: 0 },
            Synonym: { correct: 0, total: 0 }
        };

        // Check each question
        questionsData.forEach(q => {
            stats[q.clueType].total++;
            const userAns = userAnswers[q.id];
            const isCorrect = userAns === q.answer;

            if (isCorrect) {
                score++;
                stats[q.clueType].correct++;
            }

            // UI feedback updates
            const expBox = document.getElementById(`explain-${q.id}`);
            expBox.style.display = 'block';

            // Disable all option buttons and highlight correct/incorrect
            q.options.forEach((_, optIdx) => {
                const btn = document.getElementById(`opt-${q.id}-${optIdx}`);
                btn.disabled = true;
                
                if (optIdx === q.answer) {
                    btn.className = 'option-btn show-correct';
                }
                if (userAns === optIdx && !isCorrect) {
                    btn.className = 'option-btn selected-wrong';
                }
                if (userAns === optIdx && isCorrect) {
                    btn.className = 'option-btn selected-correct';
                }
            });
        });

        // Display Score Card
        document.getElementById('final-score').innerText = `${score} / ${total}`;
        const resultCard = document.getElementById('result-card');
        resultCard.style.display = 'block';

        // Commentary generation
        let commentary = "";
        if (score === total) commentary = "Excellent! คุณเข้าใจบริบทคำใบ้ครบถ้วนทุกมิติอย่างสมบูรณ์แบบ พร้อมลงสนามสอบจริงแล้วครับ!";
        else if (score >= 20) commentary = "Great Job! ทำคะแนนได้ดีมาก มีความเข้าใจโครงสร้างประโยคระดับสูง ทบทวนจุดผิดพลาดเล็กน้อยก็เต็มได้ไม่ยาก!";
        else if (score >= 15) commentary = "Good Effort! ผ่านเกณฑ์พื้นฐาน แต่ยังมีจุดสับสนในการมองหาคำสัญญาณ (Signal Words) ในบางหัวข้อครับ";
        else commentary = "Keep Fighting! คะแนนยังไม่ถึงเกณฑ์ แนะนำให้ศึกษาคำสัญญาณและฝึกกระบวนการคิดตามคำอธิบายในแต่ละข้ออย่างละเอียดครับ";
        
        document.getElementById('score-commentary').innerText = commentary;

        // Perform Diagnostic Analysis on Weaknesses
        const analysisContent = document.getElementById('analysis-content');
        analysisContent.innerHTML = `<div class="analysis-title">📊 บทวิเคราะห์จุดแข็ง-จุดอ่อนรายบุคคล (AI Diagnostic Analytics)</div>`;
        
        let hasWeakness = false;
        for (const [type, data] of Object.entries(stats)) {
            const percentage = (data.correct / data.total) * 100;
            if (percentage < 80) {
                hasWeakness = true;
                let recommendation = "";
                if (type === "Definition") recommendation = "ให้ฝึกสังเกตเครื่องหมายวรรคตอน เช่น Comma (,) หรือคำว่า 'refers to' ให้มากขึ้น";
                if (type === "Antonym") recommendation = "ระวังคำเชื่อมขัดแย้งเช่น 'Although', 'While' คีย์เวิร์ดมักจะสวนทางกับคำศัพท์ง่ายๆ ในประโยค";
                if (type === "Example") recommendation = "หัดถอดความหมายกลุ่มคำนามที่ตามหลังวลี 'such as' หรือ 'including' เพื่อรวมคุณสมบัติเด่น";
                if (type === "Cause and Effect") recommendation = "วิเคราะห์ความสัมพันธ์ของประโยคว่าอะไรเป็น 'เหตุ' และอะไรเป็น 'ผล' โดยดูคำว่า 'consequently', 'therefore'";
                if (type === "Synonym") recommendation = "สังเกตคำเชื่อมพวก 'and', 'also' เพื่อหาคำศัพท์ที่มีความหมายเชิงบวกหรือลบที่ขนานกัน";

                analysisContent.innerHTML += `
                    <div class="weakness-item">
                        คุณยังไม่เชี่ยวชาญหัวข้อ <strong>${type} Clues</strong> (ทำได้เพียง ${data.correct}/${data.total} ข้อ) <br>
                        <span style="color:#64748b; font-size:0.9rem;">🎯 คำแนะนำจากติวเตอร์: ${recommendation}</span>
                    </div>
                `;
            }
        }

        if (!hasWeakness) {
            analysisContent.innerHTML += `<p style="color:var(--success-color); font-weight:bold;">✨ สุดยอดมาก! คุณทำคะแนนแต่ละหัวข้อได้เกิน 80% ไม่พบจุดอ่อนที่ต้องกังวลในเรื่อง Context Clues ครับ</p>`;
        }

        // Scroll smoothly to top results
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialization
    window.onload = renderQuestions;
</script>

</body>
</html>
