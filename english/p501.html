<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - ข้อสอบภาษาอังกฤษ 25 ข้อแรก</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --gray-light: #f3f4f6;
            --text-main: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: var(--primary);
            text-align: center;
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 10px;
        }
        .question-card {
            background: var(--gray-light);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--secondary);
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: #e2e8f0;
        }
        .correct {
            background-color: var(--success) !important;
            color: white;
            border-color: var(--success);
        }
        .incorrect {
            background-color: var(--danger) !important;
            color: white;
            border-color: var(--danger);
        }
        .explanation {
            margin-top: 15px;
            padding: 12px;
            background-color: #eff6ff;
            border-left: 4px solid var(--secondary);
            border-radius: 4px;
            display: none;
            font-size: 14px;
        }
        .submit-btn {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #111827;
        }
        #result-section {
            margin-top: 30px;
            padding: 25px;
            background: #f0fdf4;
            border: 2px solid var(--success);
            border-radius: 12px;
            display: none;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 11px;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 4px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 พระจอมเกล้าติวเตอร์ - English Exam (25 ข้อแรก)</h1>
    <p style="text-align: center; color: #64748b;">หัวข้อ: Tenses & Subject-Verb Agreement</p>
    
    <div id="quiz-container"></div>

    <button class="submit-btn" onclick="calculateScore()">📊 ส่งคำตอบและวิเคราะห์ผลลัพธ์</button>

    <div id="result-section">
        <h2>🏆 ผลการสอบของคุณ</h2>
        <p id="score-text" style="font-size: 20px; font-weight: bold; color: var(--primary);"></p>
        <hr>
        <h3>🔍 บทวิเคราะห์จุดแข็ง-จุดอ่อน (Weakness Analysis)</h3>
        <div id="analysis-text"></div>
    </div>
</div>

<script>
const examData = [
    // --- TENSES (13 ข้อ) ---
    {
        category: "Tenses",
        q: "1. She ________ English since she was a child, and now she speaks it fluently.",
        options: ["studied", "has studied", "is studying", "studies"],
        correct: 1,
        exp: "เฉลย ข้อ 2: has studied เพราะมีคีย์เวิร์ด 'since' (ตั้งแต่) แสดงถึงเหตุการณ์ที่เกิดขึ้นตั้งแต่อดีตและส่งผลต่อเนื่องมาถึงปัจจุบัน (Present Perfect Tense)"
    },
    {
        category: "Tenses",
        q: "2. While we ________ for the bus, it suddenly started to rain heavily.",
        options: ["waited", "are waiting", "were waiting", "have waited"],
        correct: 2,
        exp: "เฉลย ข้อ 3: were waiting ใช้โครงสร้าง Past Continuous คู่กับ Past Simple โดยเหตุการณ์ที่กำลังดำเนินอยู่ (กำลังรอรถเมล์) ใช้ Past Con. และเหตุการณ์ที่เข้ามาแทรก (ฝนตก) ใช้ Past Simple"
    },
    {
        category: "Tenses",
        q: "3. By the time the police arrived, the thieves ________ already escaped.",
        options: ["have", "had", "will have", "were"],
        correct: 1,
        exp: "เฉลย ข้อ 2: had เพราะโครงสร้าง 'By the time + Past Simple, Past Perfect' ใช้แสดงเหตุการณ์ที่เกิดขึ้นและสิ้นสุดลงก่อนอีกเหตุการณ์หนึ่งในอดีต (โจรหนีไปก่อนที่ตำรวจจะมา)"
    },
    {
        category: "Tenses",
        q: "4. I ________ my homework yet, so I cannot go out with you tonight.",
        options: ["didn't finish", "haven't finished", "don't finish", "am not finishing"],
        correct: 1,
        exp: "เฉลย ข้อ 2: haven't finished คำว่า 'yet' มักใช้ในประโยคปฏิเสธของ Present Perfect Tense เพื่อบอกว่าเหตุการณ์นั้นยังไม่ได้ทำจนถึงตอนนี้"
    },
    {
        category: "Tenses",
        q: "5. Look at those dark clouds! It ________ to rain very soon.",
        options: ["is going", "will", "rains", "is raining"],
        correct: 0,
        exp: "เฉลย ข้อ 1: is going เพราะคาดคะเนสิ่งที่จะเกิดขึ้นในอนาคตอันใกล้โดยมี 'หลักฐานที่เห็นเด่นชัด' (dark clouds) เราจะนิยมใช้ be going to มากกว่า will"
    },
    {
        category: "Tenses",
        q: "6. At 10 o'clock yesterday morning, they ________ a critical board meeting.",
        options: ["attended", "were attending", "have attended", "had attended"],
        correct: 1,
        exp: "เฉลย ข้อ 2: were attending มีการระบุเวลาเจาะจงในอดีตอย่างชัดเจน (At 10 o'clock yesterday morning) จึงต้องใช้ Past Continuous Tense เพื่อแสดงว่าเหตุการณ์กำลังดำเนินอยู่ในจุดเวลานั้น"
    },
    {
        category: "Tenses",
        q: "7. Water ________ at 100 degrees Celsius under normal atmospheric pressure.",
        options: ["is boiling", "boils", "boiled", "will boil"],
        correct: 1,
        exp: "เฉลย ข้อ 2: boils เพราะเป็นข้อเท็จจริงตามธรรมชาติ (Scientific Fact) ต้องใช้ Present Simple Tense เสมอ ประธาน Water เป็นเอกพจน์ กริยาจึงเติม s"
    },
    {
        category: "Tenses",
        q: "8. Over the past few decades, technology ________ the way we communicate dramatically.",
        options: ["changed", "has changed", "changes", "is changing"],
        correct: 1,
        exp: "เฉลย ข้อ 2: has changed วลี 'Over the past few decades' (ในช่วงไม่กี่ทศวรรษที่ผ่านมา) บ่งบอกถึงความต่อเนื่องตั้งแต่อดีตจนถึงปัจจุบัน จึงต้องใช้ Present Perfect Tense"
    },
    {
        category: "Tenses",
        q: "9. When I opened the fridge, I found that someone ________ all the milk.",
        options: ["drank", "had drunk", "has drunk", "was drinking"],
        correct: 1,
        exp: "เฉลย ข้อ 2: had drunk เหตุการณ์กินนมเกิดขึ้นและเสร็จสิ้นไปก่อนที่ฉันจะมาเปิดเจอในอดีต (เกิดก่อนใช้ Past Perfect, เกิดทีหลังใช้ Past Simple)"
    },
    {
        category: "Tenses",
        q: "10. This time next week, we ________ on a sunny beach in Phuket.",
        options: ["will relax", "are relaxing", "will be relaxing", "shall relax"],
        correct: 2,
        exp: "เฉลย ข้อ 3: will be relaxing โครงสร้าง Future Continuous Tense (will be + V.ing) ใช้บ่งบอกเหตุการณ์ที่ 'กำลังจะเกิดขึ้นอย่างเจาะจงในอนาคต' (This time next week)"
    },
    {
        category: "Tenses",
        q: "11. My brother ________ to Japan three times, and he wants to go again.",
        options: ["went", "has been", "has gone", "was going"],
        correct: 1,
        exp: "เฉลย ข้อ 2: has been ใช้ Present Perfect เพื่อบอกเล่าประสบการณ์ว่า 'เคยไปมาแล้วและกลับมาแล้ว' (ถ้าใช้ has gone จะแปลว่าไปแล้วยังไม่กลับ)"
    },
    {
        category: "Tenses",
        q: "12. The train ________ at 8:30 AM tomorrow according to the official schedule.",
        options: ["leaves", "will leave", "is leaving", "left"],
        correct: 0,
        exp: "เฉลย ข้อ 1: leaves ตารางเวลาที่เป็นทางการ (Schedules/Timetables) แม้จะเป็นเหตุการณ์ในอนาคตก็นิยมใช้ Present Simple Tense เพื่อความแน่นอน"
    },
    {
        category: "Tenses",
        q: "13. In 2018, they ________ their first software automation project.",
        options: ["have launched", "launched", "had launched", "were launching"],
        correct: 1,
        exp: "เฉลย ข้อ 2: launched เพราะระบุปีในอดีตชัดเจน (In 2018) ซึ่งเป็นเหตุการณ์ที่จบลงไปแล้วอย่างสมบูรณ์ ต้องใช้ Past Simple Tense"
    },
    
    // --- SUBJECT-VERB AGREEMENT (12 ข้อ) ---
    {
        category: "Subject-Verb Agreement",
        q: "14. The manager, along with his team members, ________ attending the conference today.",
        options: ["is", "are", "were", "be"],
        correct: 0,
        exp: "เฉลย ข้อ 1: is วลีขยายที่ตามหลัง 'along with' ไม่ใช่ประธานแท้ ประธานแท้คือ 'The manager' (เอกพจน์) กริยาจึงต้องใช้ 'is'"
    },
    {
        category: "Subject-Verb Agreement",
        q: "15. Either the students or the teacher ________ responsible for cleaning the room.",
        options: ["is", "are", "were", "have"],
        correct: 0,
        exp: "เฉลย ข้อ 1: is ตามกฎโครงสร้าง Either...or... ให้ผันกริยาตามประธานตัวที่อยู่ใกล้ที่สุด ซึ่งก็คือ 'the teacher' (เอกพจน์) กริยาจึงใช้ 'is'"
    },
    {
        category: "Subject-Verb Agreement",
        q: "16. A number of automated tools ________ been developed to streamline the system.",
        options: ["has", "have", "is", "are"],
        correct: 1,
        exp: "เฉลย ข้อ 2: have กฎแกรมม่าระบุว่า 'A number of + นามพหูพจน์' แปลว่า จำนวนมาก ถือเป็นประธานพหูพจน์เสมอ จึงต้องใช้ 'have' (ต่างจาก The number of ที่เป็นเอกพจน์)"
    },
    {
        category: "Subject-Verb Agreement",
        q: "17. Every laptop and smartphone in this smart farm ________ connected to the network.",
        options: ["is", "are", "were", "being"],
        correct: 0,
        exp: "เฉลย ข้อ 1: is เมื่อประธานถูกนำหน้าด้วยคำว่า 'Every' หรือ 'Each' ต่อให้มีหลายสิ่งเชื่อมด้วย and ก็นับเป็นเอกพจน์เสมอ กริยาจึงใช้ 'is'"
    },
    {
        category: "Subject-Verb Agreement",
        q: "18. Physics ________ considered one of the most challenging subjects for high school students.",
        options: ["are", "is", "were", "have been"],
        correct: 1,
        exp: "เฉลย ข้อ 2: is ชื่อวิชาหรือโรคบางชนิดที่ลงท้ายด้วย -s เช่น Physics, Mathematics, Economics ถือเป็นคำนามเอกพจน์เสมอ"
    },
    {
        category: "Subject-Verb Agreement",
        q: "19. Ten kilometers ________ too far for us to walk in this hot weather.",
        options: ["are", "were", "is", "have been"],
        correct: 2,
        exp: "เฉลย ข้อ 3: is จำนวนเงิน ระยะทาง เวลา หรือน้ำหนัก ถือเป็นหน่วยรวมหน่วยเดียว (Single Unit) จัดเป็นนามเอกพจน์ กริยาจึงต้องใช้ 'is'"
    },
    {
        category: "Subject-Verb Agreement",
        q: "20. The news about the global market trends ________ very discouraging today.",
        options: ["is", "are", "were", "have been"],
        correct: 0,
        exp: "เฉลย ข้อ 1: is คำว่า 'News' (ข่าว) แม้จะลงท้ายด้วย s แต่เป็นคำนามที่นับไม่ได้ (Uncountable Noun) ซึ่งจัดอยู่ในกลุ่มเอกพจน์เสมอ"
    },
    {
        category: "Subject-Verb Agreement",
        q: "21. One of the primary reasons for data leakage ________ weak passwords.",
        options: ["are", "is", "were", "have been"],
        correct: 1,
        exp: "เฉลย ข้อ 2: is โครงสร้าง 'One of + นามพหูพจน์' ประธานที่แท้จริงคือคำว่า 'One' (หนึ่งเดียว) กริยาจึงต้องเป็นเอกพจน์ นั่นคือ 'is'"
    },
    {
        category: "Subject-Verb Agreement",
        q: "22. Neither the components nor the main machine ________ functioning properly.",
        options: ["seem", "seems", "seeming", "are seeming"],
        correct: 1,
        exp: "เฉลย ข้อ 2: seems โครงสร้าง Neither...nor... กริยาผันตามประธานตัวหลังสุด ซึ่งก็คือ 'the main machine' (เอกพจน์) กริยาจึงต้องเติม s"
    },
    {
        category: "Subject-Verb Agreement",
        q: "23. The jury ________ divided in their opinions regarding the verdict.",
        options: ["was", "were", "is", "has"],
        correct: 1,
        exp: "เฉลย ข้อ 2: were คำนามกลุ่ม Collective Noun (เช่น jury, committee, team) ถ้าสมาชิกในกลุ่ม 'แตกคอกันหรือแยกกันทำกิจกรรม' (สังเกตจากคำว่า divided หรือคำสรรพนาม their) จะถือเป็นพหูพจน์"
    },
    {
        category: "Subject-Verb Agreement",
        q: "24. Not only the internet connection but also the automated systems ________ inspection.",
        options: ["need", "needs", "needing", "is needing"],
        correct: 0,
        exp: "เฉลย ข้อ 0: need โครงสร้าง Not only...but also... ผันตามประธานตัวหลัง ซึ่งคือ 'the automated systems' (พหูพจน์) กริยาจึงไม่ต้องเติม s"
    },
    {
        category: "Subject-Verb Agreement",
        q: "25. Most of the water in the reservoirs ________ evaporated due to the heatwave.",
        options: ["has", "have", "are", "were"],
        correct: 0,
        exp: "เฉลย ข้อ 1: has คำบอกสัดส่วน เช่น 'Most of / Some of / All of' ให้ดูคำนามที่ตามหลังอดีต ในที่นี้คือ 'water' เป็นนามนับไม่ได้ (เอกพจน์) กริยาจึงต้องใช้ 'has'"
    }
];

// ฟังก์ชันสร้างข้อสอบแสดงผลอัตโนมัติทีเดียว
function renderQuiz() {
    const container = document.getElementById('quiz-container');
    examData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        let optionsHTML = '';
        item.options.forEach((opt, optIdx) => {
            optionsHTML += `<button class="option-btn" id="q_${index}_opt_${optIdx}" onclick="checkAnswer(${index}, ${optIdx})">${opt}</button>`;
        });
        
        card.innerHTML = `
            <span class="badge">${item.category}</span>
            <div class="question-text">${item.q}</div>
            <div class="options">${optionsHTML}</div>
            <div class="explanation" id="exp_${index}">${item.exp}</div>
        `;
        container.appendChild(card);
    });
}

const userAnswers = new Array(examData.length).fill(null);

// ระบบตรวจข้อสอบแบบทันที (Instant Feedback)
function checkAnswer(qIdx, optIdx) {
    if(userAnswers[qIdx] !== null) return; // ทำได้ครั้งเดียวต่อข้อ
    
    userAnswers[qIdx] = optIdx;
    const correctIdx = examData[qIdx].correct;
    const expDiv = document.getElementById(`exp_${qIdx}`);
    
    // แสดงเฉลย
    expDiv.style.display = 'block';
    
    if(optIdx === correctIdx) {
        document.getElementById(`q_${qIdx}_opt_${optIdx}`).classList.add('correct');
    } else {
        document.getElementById(`q_${qIdx}_opt_${optIdx}`).classList.add('incorrect');
        document.getElementById(`q_${qIdx}_opt_${correctIdx}`).classList.add('correct');
    }
}

// ระบบประมวลผลและวิเคราะห์จุดอ่อนอัตโนมัติ (Weakness Analysis)
function calculateScore() {
    let score = 0;
    let categories = { "Tenses": { correct: 0, total: 13 }, "Subject-Verb Agreement": { correct: 0, total: 12 } };
    
    userAnswers.forEach((ans, idx) => {
        const item = examData[idx];
        if(ans === item.correct) {
            score++;
            categories[item.category].correct++;
        }
    });
    
    // แสดงหน้าต่างผลลัพธ์
    const resultSection = document.getElementById('result-section');
    resultSection.style.display = 'block';
    document.getElementById('score-text').innerText = `คุณได้คะแนน ${score} เต็ม ${examData.length} คะแนน`;
    
    // ทำระบบวิเคราะห์จุดอ่อน
    let analysisHTML = '<ul>';
    for (let cat in categories) {
        let catScore = categories[cat].correct;
        let catTotal = categories[cat].total;
        let percentage = (catScore / catTotal) * 100;
        
        analysisHTML += `<li><strong>${cat}:</strong> ได้ ${catScore}/${catTotal} (${percentage.toFixed(1)}%) - `;
        if(percentage >= 80) {
            analysisHTML += `<span style="color:var(--success)">🔥 จุดแข็งระดับยอดเยี่ยม! คุณเข้าใจกลไกส่วนนี้ดีมาก</span></li>`;
        } else if(percentage >= 50) {
            analysisHTML += `<span style="color:orange">⚠️ พอใช้ได้ แต่ยังมีจุดสับสน แนะนำให้ทบทวนเทคนิคการจำด้านบนเพิ่มเติม</span></li>`;
        } else {
            analysisHTML += `<span style="color:var(--danger)">❌ จุดอ่อนที่ต้องเร่งแก้ไข! ควรกลับไปทบทวนกระบวนการคิดและหลักการของหัวข้อนี้นะครับ</span></li>`;
        }
    }
    analysisHTML += '</ul>';
    
    document.getElementById('analysis-text').innerHTML = analysisHTML;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// เริ่มทำงานเมื่อโหลดหน้าเว็บ
window.onload = renderQuiz;
</script>
</body>
</html>
