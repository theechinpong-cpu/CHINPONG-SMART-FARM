        .card:hover { background: var(--s); color: white; transform: translateY(-5px); z-index: 10; }

        .btn-group { margin-top: 25px; }

    const grid = document.getElementById('vocabGrid');
    const wordDisplay = document.getElementById('word');
    const thaiDisplay = document.getElementById('thai');
    const exampleDisplay = document.getElementById('example');
    let currentItem = null;

    function init() {
        advancedData.sort((a,b) => a.en.localeCompare(b.en)).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = item.en;
            card.setAttribute('data-th', item.th);
            card.onclick = () => {
                currentItem = item;
                updateDisplay(item);
                speak();
            };
            grid.appendChild(card);
        });
    }

    function updateDisplay(item) {
        wordDisplay.innerText = item.en;
        thaiDisplay.innerText = item.th;
        exampleDisplay.innerText = `Example: "${item.ex}"`;
    }

    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function randomWord() {
        currentItem = advancedData[Math.floor(Math.random() * advancedData.length)];
        updateDisplay(currentItem);
        speak();
    }

    function speak() {
        if(!currentItem) return;
        const u = new SpeechSynthesisUtterance(currentItem.en);
        u.lang = 'en-US';
        u.rate = 0.8;
        synth.speak(u);
    }

    init();
</script>
