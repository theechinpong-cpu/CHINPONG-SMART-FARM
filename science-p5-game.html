<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Quest ป.5 โดย พระจอมเกล้าติวเตอร์</title>
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: #f0f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }
        #image-display {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid var(--primary);
            transition: transform 0.3s;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .hp-bar {
            color: var(--danger);
        }
        .score-bar {
            color: var(--primary);
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--dark);
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #ecf0f1;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        button:hover {
            background: #d5dbdb;
            transform: scale(1.02);
        }
        .correct { background: var(--primary) !important; color: white; }
        .wrong { background: var(--danger) !important; color: white; }
        
        /* Animations */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.3s; }
        
        #result-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            border-radius: 20px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div class="hp-bar">❤️ พลังชีวิต: <span id="hp">3</span></div>
        <div class="score-bar">⭐ คะแนน: <span id="score">0</span></div>
    </div>

    <img id="image-display" src="https://images.unsplash.com/photo-1500829243541-74b677fecc30?auto=format&fit=crop&w=600&q=80" alt="Science">
    
    <div class="question-text" id="question">กำลังโหลดคำถาม...</div>

    <div class="options-grid" id="options">
        </div>

    <div id="result-screen">
        <h2 id="result-title">จบเกม!</h2>
        <p id="final-stats"></p>
        <button onclick="location.reload()">เล่นใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "ตั๊กแตนใบไม้เปลี่ยนรูปร่างให้เหมือนใบไม้ เพื่อวัตถุประสงค์ใด?",
            options: ["เพื่อความสวยงาม", "พรางตัวจากศัตรู", "เพื่อหาคู่", "เพื่อสังเคราะห์แสง"],
            ans: 1,
            img: "https://images.unsplash.com/photo-1533048347183-51846c5f7881?auto=format&fit=crop&w=600&q=80"
        },
        {
            q: "ในห่วงโซ่อาหาร 'พืช' จัดเป็นสิ่งมีชีวิตประเภทใด?",
            options: ["ผู้บริโภค", "ผู้ย่อยสลาย", "ผู้ผลิต", "ศัตรูพืช"],
            ans: 2,
            img: "https://images.unsplash.com/photo-1545239351-ef35f43d514b?auto=format&fit=crop&w=600&q=80"
        },
        {
            q: "สัตว์ชนิดใดมีการปรับตัวโดยการ 'จำศีล' เพื่อหนีความหนาว?",
            options: ["หมีขั้วโลก", "อูฐ", "ยีราฟ", "ช้าง"],
            ans: 0,
            img: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?auto=format&fit=crop&w=600&q=80"
        },
        {
            q: "แรงเสียดทานจะมีค่า 'มาก' เมื่อผิวสัมผัสเป็นอย่างไร?",
            options: ["เรียบลื่น", "เปียกน้ำ", "ขรุขระ", "ทาน้ำมัน"],
            ans: 2,
            img: "https://images.unsplash.com/photo-1531741400255-839070494451?auto=format&fit=crop&w=600&q=80"
        }
    ];

    let currentQ = 0;
    let score = 0;
    let hp = 3;

    function loadQuestion() {
        const qData = questions[currentQ];
        document.getElementById('question').innerText = qData.q;
        document.getElementById('image-display').src = qData.img;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correctIdx = questions[currentQ].ans;
        if(idx === correctIdx) {
            score += 10;
            btn.classList.add('correct');
            document.getElementById('score').innerText = score;
        } else {
            hp -= 1;
            btn.classList.add('wrong');
            document.getElementById('hp').innerText = hp;
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 300);
        }

        setTimeout(() => {
            currentQ++;
            if(hp <= 0 || currentQ >= questions.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }, 800);
    }

    function showResult() {
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('result-title').innerText = hp > 0 ? "เก่งมาก! คุณคือผู้พิทักษ์" : "พยายามต่อไปนะ!";
        document.getElementById('final-stats').innerText = `คะแนนรวม: ${score} คะแนน`;
    }

    loadQuestion();
</script>

</body>
</html>
