<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sheet Data Test</title>
</head>
<body>
    <h1>ทดสอบดึงข้อมูลจาก Google Sheets</h1>
    <button onclick="loadData()">กดเพื่อดึงข้อมูล</button>
    
    <div id="output" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; white-space: pre-wrap;">
        ข้อมูลจะแสดงที่นี่...
    </div>

    <script>
        async function loadData() {
            // *** วาง URL ของ Web App ที่ได้จาก GAS ตรงนี้ ***
            const url = "ใส่_WEB_APP_URL_ที่นี่";
            const outputDiv = document.getElementById('output');
            
            outputDiv.innerText = "กำลังเชื่อมต่อกับ Google Sheets...";
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // แสดงผลข้อมูลดิบในรูปแบบ JSON string
                outputDiv.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                outputDiv.innerText = "Error: " + error.message;
                console.error("Fetch Error:", error);
            }
        }
    </script>
</body>
</html>
