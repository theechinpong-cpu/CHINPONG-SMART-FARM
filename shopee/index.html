<!DOCTYPE html>
<html>
<head>
    <title>Sheet Test</title>
</head>
<body>
    <h3>Test Fetch Data</h3>
    <button onclick="fetchData()">กดเพื่อดึงข้อมูล</button>
    
    <pre id="display"></pre>

    <script>
        async function fetchData() {
            const url = "ใส่_WEB_APP_URL_ที่นี่";
            const display = document.getElementById('display');
            
            display.innerText = "กำลังโหลด...";
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                console.log("Data received:", data);
                // แสดงข้อมูลดิบที่ดึงมาได้
                display.innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                display.innerText = "เกิดข้อผิดพลาด: " + error;
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
