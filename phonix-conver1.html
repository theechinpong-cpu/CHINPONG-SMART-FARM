<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Puppy Love Dialogue - พระจอมเกล้าติวเตอร์</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap');
        
        body {
            font-family: 'Poppins', 'Kanit', sans-serif;
            background-color: #fff5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: #ff4d6d; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9em; }

        .dialogue-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            position: relative;
            max-width: 85%;
            line-height: 1.5;
        }

        .bubble:hover {
            transform: scale(1.02);
        }

        .praew {
            align-self: flex-start;
            background-color: #ffe3e8;
            border: 2px solid #ffb3c1;
            color: #c9184a;
        }

        .praew::before {
            content: "P'Praew (ม.6) 👩‍🎓";
            display: block;
            font-size: 0.7em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .karn {
            align-self: flex-end;
            background-color: #e0f2fe;
            border: 2px solid #bae6fd;
            color: #0369a1;
        }

        .karn::before {
            content: "Karn (ม.2) 🧑‍🎓";
            display: block;
            font-size: 0.7em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .eng-text { font-weight: 600; display: block; }
        .thai-text { font-size: 0.85em; opacity: 0.8; }

        .playing {
            background-color: #fff;
            border-color: #ff4d6d;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.3);
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Puppy Love Dialogue</h1>
        <p class="subtitle">โดย พระจอมเกล้าติวเตอร์ <br> (คลิกที่ประโยคเพื่อฟังเสียงอ่าน)</p>

        <div class="dialogue-box" id="chat">
            </div>

        <div class="footer">
            Designed for Elementary English Students
        </div>
    </div>

    <script>
        const dialogue = [
            { name: "Praew", gender: "female", en: "Hi, Karn! What are you doing?", th: "กานต์! ทำอะไรอยู่จ๊ะ?" },
            { name: "Karn", gender: "male", en: "Oh! Hello, P’Praew. I am reading a book for the English test.", th: "โอ๊ะ! สวัสดีครับพี่แพรว ผมกำลังอ่านหนังสือเตรียมสอบภาษาอังกฤษครับ" },
            { name: "Praew", gender: "female", en: "You are very diligent! Do you want to take a break? It is very hot today.", th: "กานต์ขยันจังเลย! อยากพักสักหน่อยไหม? วันนี้อากาศร้อนมากเลยนะ" },
            { name: "Karn", gender: "male", en: "A little bit, P’Praew. I am a bit tired.", th: "นิดหน่อยครับพี่แพรว ผมเริ่มเหนื่อยนิดๆ แล้ว" },
            { name: "Praew", gender: "female", en: "Let’s go to the canteen. I want to buy Red Soda for you. It is sweet and cold.", th: "ไปโรงอาหารกันเถอะ พี่อยากซื้อน้ำแดงให้เรานะ มันหวานและเย็นชื่นใจด้วย" },
            { name: "Karn", gender: "male", en: "Really? Thank you very much. You are always kind to me.", th: "จริงเหรอครับ? ขอบคุณมากครับ พี่ใจดีกับผมเสมอเลย" },
            { name: "Praew", gender: "female", en: "Here is your Red Soda, Karn. Do you like it?", th: "นี่จ้ะน้ำแดงของกานต์ ชอบไหม?" },
            { name: "Karn", gender: "male", en: "Yes, I love it. It is my favorite drink. How about you, P'Praew?", th: "ชอบครับ ผมรักน้ำแดงเลย เป็นเครื่องดื่มโปรดของผมครับ แล้วพี่แพรวละครับ?" },
            { name: "Praew", gender: "female", en: "I like it too. But I like your smile more. I am happy you like it.", th: "พี่ก็ชอบเหมือนกันจ้ะ แต่พี่ชอบรอยยิ้มของกานต์มากกว่านะ พี่ดีใจที่กานต์ชอบน้ำแก้วนี้" },
            { name: "Karn", gender: "male", en: "Thank you, P’Praew. Your smile is beautiful too. Why are you here today?", th: "ขอบคุณครับพี่แพรว รอยยิ้มของพี่ก็สวยเหมือนกันครับ วันนี้พี่ทำไมถึงลงมาหาผมล่ะครับ?" },
            { name: "Praew", gender: "female", en: "I just want to see you. You study very hard every day.", th: "พี่แค่แค่อยากมาเห็นหน้ากานต์น่ะ เห็นเราเรียนหนักทุกวันเลย" },
            { name: "Karn", gender: "male", en: "I want to be a good student like you, P'Praew.", th: "ผมอยากเป็นนักเรียนที่เก่งเหมือนพี่แพรวครับ" },
            { name: "Praew", gender: "female", en: "Can I walk with you to your classroom? I want to talk to you more.", th: "พี่เดินไปส่งที่ห้องเรียนได้ไหม? พี่อยากคุยกับเราต่ออีกหน่อยน่ะ" },
            { name: "Karn", gender: "male", en: "Yes, of course. Let’s go! I am happy to walk with you.", th: "ได้แน่นอนครับ ไปกันเลย! ผมมีความสุขที่ได้เดินกับพี่นะ" }
        ];

        const chatContainer = document.getElementById('chat');
        const synth = window.speechSynthesis;

        function speak(text, gender) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.9; // ความเร็วระดับพอดีสำหรับการสอน
            
            // คัดเลือกเสียง
            const voices = synth.getVoices();
            if (gender === 'female') {
                utter.voice = voices.find(v => v.name.includes('Google US English') && v.name.includes('Female')) || voices.find(v => v.name.includes('Female')) || voices[0];
                utter.pitch = 1.2;
            } else {
                utter.voice = voices.find(v => v.name.includes('Google US English') && v.name.includes('Male')) || voices.find(v => v.name.includes('Male')) || voices[1];
                utter.pitch = 0.9;
            }
            
            synth.speak(utter);
        }

        dialogue.forEach((item, index) => {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${item.name.toLowerCase()}`;
            bubble.innerHTML = `
                <span class="eng-text">${item.en}</span>
                <span class="thai-text">${item.th}</span>
            `;
            
            bubble.onclick = () => {
                // ลบคลาส highlight จากทุก bubble
                document.querySelectorAll('.bubble').forEach(b => b.classList.remove('playing'));
                // เพิ่มคลาส highlight
                bubble.classList.add('playing');
                speak(item.en, item.gender);
            };
            
            chatContainer.appendChild(bubble);
        });

        // โหลดเสียงให้พร้อม
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
