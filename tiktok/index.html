<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKTOK MONITORING OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010101; color: #fff; }
        .tiktok-card { background: #121212; border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(to right, #ff0050, #00f2ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black uppercase">TikTok <span class="gradient-text">Automation OS</span></h1>
            <button onclick="fetchData()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm">REFRESH DATA</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="tiktok-card p-8 rounded-[2rem]">
                <p class="text-xs text-gray-500 uppercase font-bold mb-2">Followers</p>
                <h2 id="f-val" class="text-4xl font-black">---</h2>
            </div>
            <div class="tiktok-card p-8 rounded-[2rem]">
                <p class="text-xs text-gray-500 uppercase font-bold mb-2">Total Views</p>
                <h2 id="v-val" class="text-4xl font-black">---</h2>
            </div>
            <div class="tiktok-card p-8 rounded-[2rem]">
                <p class="text-xs text-gray-500 uppercase font-bold mb-2">Status</p>
                <h2 id="s-val" class="text-4xl font-black text-sky-400">---</h2>
            </div>
            <div class="tiktok-card p-8 rounded-[2rem] border-l-4 border-emerald-500">
                <p class="text-xs text-gray-500 uppercase font-bold mb-2">Commission</p>
                <h2 id="c-val" class="text-4xl font-black text-emerald-400">฿0</h2>
            </div>
        </div>

        <div class="tiktok-card p-8 rounded-[2rem]">
            <div class="flex justify-between items-center">
                <span class="text-gray-500 font-bold uppercase text-xs">System Health</span>
                <span id="api-status" class="text-rose-500 font-black">WAITING...</span>
            </div>
        </div>
    </div>

    <script>
        // วาง URL ที่ได้จาก New Deployment (Anyone) ตรงนี้
        const WEB_APP_URL = "ก๊อปปี้ URL จากหน้า Deploy มาวางตรงนี้"; 

        async function fetchData() {
            const statusTag = document.getElementById('api-status');
            try {
                // เทคนิค 100%: ใช้การเรียกแบบปกติ และเช็ค response
                const resp = await fetch(WEB_APP_URL);
                const data = await resp.json();
                
                if (data && data[0]) {
                    const info = data[0];
                    document.getElementById('f-val').innerText = info.followers.toLocaleString();
                    document.getElementById('v-val').innerText = info.views;
                    document.getElementById('c-val').innerText = '฿' + info.commission;
                    document.getElementById('s-val').innerText = info.status;

                    statusTag.innerText = "ONLINE (CONNECTED)";
                    statusTag.className = "text-emerald-500 font-black";
                }
            } catch (e) {
                statusTag.innerText = "OFFLINE/ERROR: " + e.message;
                statusTag.className = "text-rose-500 font-black";
            }
        }

        window.onload = fetchData;
        setInterval(fetchData, 60000); // อัปเดตทุก 1 นาที
    </script>
</body>
</html>
