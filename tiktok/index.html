<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIKTOK MONITORING OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010101; color: #fff; }
        .stat-card { background: #121212; border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic">TIKTOK <span class="text-[#ff0050]">AUTOMATION OS</span></h1>
            <button onclick="updateData()" class="bg-white text-black px-8 py-2 rounded-full font-bold">REFRESH</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card">
                <p class="text-xs text-gray-500 font-bold uppercase">Followers</p>
                <h2 id="f" class="text-4xl font-black">---</h2>
            </div>
            <div class="stat-card">
                <p class="text-xs text-gray-500 font-bold uppercase">Views</p>
                <h2 id="v" class="text-4xl font-black">---</h2>
            </div>
            <div class="stat-card">
                <p class="text-xs text-gray-500 font-bold uppercase">Status</p>
                <h2 id="s" class="text-4xl font-black text-sky-400">---</h2>
            </div>
            <div class="stat-card border-l-4 border-emerald-500">
                <p class="text-xs text-gray-500 font-bold uppercase">Commission</p>
                <h2 id="c" class="text-4xl font-black text-emerald-500">฿0</h2>
            </div>
        </div>

        <div id="health" class="text-center p-4 bg-gray-900/50 rounded-xl text-xs font-bold text-gray-500">
            SYSTEM STATUS: <span id="status-text">WAITING...</span>
        </div>
    </div>

    <script>
        // *** วาง URL ที่ก๊อปมาใหม่ตรงนี้ ***
        const API_URL = "วาง_Web_App_URL_ตรงนี้"; 

        async function updateData() {
            const statusText = document.getElementById('status-text');
            statusText.innerText = "CONNECTING...";
            
            try {
                // ใช้เทคนิคดึงข้อมูลผ่าน Redirect ของ Google
                const response = await fetch(API_URL);
                const text = await response.text();
                
                // เช็คว่าถ้า Google ส่งหน้า Error มา มันจะมีคำว่า "<!DOCTYPE"
                if (text.includes("<!DOCTYPE")) {
                    throw new Error("Google blocked the request. Please check 'Who has access: Anyone'");
                }

                const data = JSON.parse(text);
                
                document.getElementById('f').innerText = Number(data.followers).toLocaleString();
                document.getElementById('v').innerText = data.views;
                document.getElementById('c').innerText = '฿' + data.commission;
                document.getElementById('s').innerText = data.status;

                statusText.innerText = "ONLINE";
                statusText.className = "text-emerald-500";
            } catch (err) {
                statusText.innerText = "ERROR: " + err.message;
                statusText.className = "text-rose-500";
                console.error(err);
            }
        }

        window.onload = updateData;
    </script>
</body>
</html>
