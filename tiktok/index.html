<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING MONGKUT TUTOR | Developer Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root { --primary: #3b82f6; --dark: #020617; }
        body { font-family: 'Kanit', sans-serif; background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .inter { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-monitor { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); border: 1px solid rgba(59, 130, 246, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-monitor:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.2); }
        
        .progress-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .progress-fill { height: 100%; transition: width 2s ease-in-out; background: var(--primary); }
        
        .text-gradient { background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <section id="login-section" class="min-h-screen flex items-center justify-center p-6 bg-slate-950 relative overflow-hidden">
        <div class="absolute inset-0 opacity-20 pointer-events-none">
            <div class="absolute top-0 left-0 w-96 h-96 bg-blue-600 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600 rounded-full blur-[120px]"></div>
        </div>
        <div class="max-w-md w-full text-center relative z-10">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl">
                <i class="fas fa-terminal text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 inter tracking-tighter uppercase">KM-TUTOR OS</h1>
            <p class="text-slate-500 text-[10px] mb-10 tracking-[0.3em] uppercase inter">System Bridge Active</p>
            <div class="glass p-10 rounded-[3rem] border border-white/10">
                <div id="g_id_onload" data-client_id="561774412364-k19ne9uqbdds7rib3mkmhbpcspeqfcqk.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-width="100%"></div>
            </div>
        </div>
    </section>

    <div id="main-content" class="hidden">
        <nav class="glass sticky top-0 z-50 px-8 py-4 mb-8">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-2xl font-black inter tracking-tighter text-gradient uppercase">Command Center</span>
                    <span id="gas-status" class="text-[9px] font-bold text-emerald-400 border border-emerald-900/50 px-2 py-0.5 rounded uppercase inter">GAS Connected</span>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right hidden sm:block">
                        <p id="user-display" class="text-xs font-bold text-white leading-none mb-1 inter">DEVELOPER</p>
                        <span class="text-[9px] text-blue-400 font-black uppercase tracking-widest">Root Access</span>
                    </div>
                    <button onclick="logout()" class="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-rose-500 transition-all flex items-center justify-center">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 pb-20">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="card-monitor rounded-[3rem] p-8 border-l-4 border-emerald-500 relative overflow-hidden">
                    <div class="relative z-10">
                        <h3 class="text-[10px] font-black text-emerald-400 uppercase tracking-[0.2em] mb-6 inter">Live Data Stream</h3>
                        <div id="telegram-log-content" class="space-y-4 min-h-[150px]">
                            <div class="animate-pulse flex gap-3">
                                <div class="w-2 h-2 bg-slate-800 rounded-full mt-1"></div>
                                <div class="h-2 bg-slate-800 rounded w-3/4"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-monitor rounded-[3rem] p-8 border-l-4 border-sky-500 relative overflow-hidden group">
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-[10px] font-black text-sky-400 uppercase tracking-[0.2em] inter">Module Repository</h3>
                            <span id="phonics-count" class="text-[9px] bg-sky-500/10 text-sky-400 px-2 py-1 rounded font-bold">18 NODES</span>
                        </div>
                        <div id="phonics-menu-list" class="grid grid-cols-1 gap-2 max-h-[350px] overflow-y-auto pr-2">
                             </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const AUTH_KEY = 'km_auth_stable_v48';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyyH4kddguub0fdv8gM6hLRs0pqh7qXubKVbmgVbmedk6ikTx4BTExeMAcy0wicVaYn/exec';

        // fallback data if GAS fails
        const FALLBACK_MODULES = [
            { title: "Introduction", file: "introduce.html" },
            { title: "Level 1: SATPIN", file: "phonics-level1-satpin.html" },
            { title: "Level 2: CVC Mastery", file: "phonics-level2-cvc-mastery.html" },
            { title: "Level 12: Polymath", file: "phonics-level12-the-polymath-final.html" }
        ];

        async function fetchSystemData() {
            const logContainer = document.getElementById('telegram-log-content');
            const menuContainer = document.getElementById('phonics-menu-list');
            const statusBadge = document.getElementById('gas-status');

            try {
                // เรียกข้อมูลจาก Google Apps Script
                const response = await fetch(GAS_URL);
                const data = await response.json();

                // 1. Update Logs (ถ้ามีข้อมูลส่งมาจาก GAS)
                if (data.logs) {
                    logContainer.innerHTML = data.logs.map(log => `
                        <div class="flex items-start gap-3 animate-fade-in">
                            <i class="fas fa-circle text-[6px] text-emerald-500 mt-2"></i>
                            <div>
                                <p class="text-[11px] text-white inter">${log.message}</p>
                                <p class="text-[8px] text-slate-500 font-bold uppercase">${log.time || 'JUST NOW'}</p>
                            </div>
                        </div>
                    `).join('');
                }

                // 2. Update Phonics (ถ้า GAS ส่งรายชื่อไฟล์มาให้)
                const modules = data.modules || FALLBACK_MODULES;
                renderMenu(modules);
                statusBadge.innerText = "GAS SYNC: OK";

            } catch (error) {
                console.error("GAS Bridge Error:", error);
                statusBadge.innerText = "GAS OFFLINE - LOCAL MODE";
                statusBadge.classList.replace('text-emerald-400', 'text-rose-500');
                renderMenu(FALLBACK_MODULES);
                logContainer.innerHTML = `<p class="text-[10px] text-slate-500 italic uppercase">System running in local cache mode...</p>`;
            }
        }

        function renderMenu(items) {
            const menuContainer = document.getElementById('phonics-menu-list');
            menuContainer.innerHTML = items.map((item, i) => `
                <a href="Phonics_Course/${item.file}" class="flex justify-between items-center p-4 bg-slate-900/40 border border-slate-800 rounded-2xl hover:border-sky-500 transition-all group/item animate-fade-in" style="animation-delay: ${i * 50}ms">
                    <span class="text-[10px] font-bold text-slate-300 group-hover/item:text-white inter">${item.title.toUpperCase()}</span>
                    <i class="fas fa-chevron-right text-[8px] text-slate-700 group-hover/item:text-sky-400"></i>
                </a>
            `).join('');
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            localStorage.setItem(AUTH_KEY, 'true');
            localStorage.setItem('km_user', payload.name);
            startDashboard();
        }

        function startDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = (localStorage.getItem('km_user') || 'DEVELOPER').toUpperCase();
            fetchSystemData();
            setInterval(fetchSystemData, 60000); // Sync ทุก 1 นาที
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => { if (localStorage.getItem(AUTH_KEY) === 'true') startDashboard(); };
    </script>
</body>
</html>
