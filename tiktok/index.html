<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING MONGKUT TUTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .course-card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .course-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-slate-900/50 p-6 rounded-3xl border border-white/5">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">COMMAND CENTER</h1>
                <p class="text-slate-500 text-xs">KING MONGKUT TUTOR OS v4.8</p>
            </div>
            <a href="https://script.google.com/macros/s/AKfycbyyH4kddguub0fdv8gM6hLRs0pqh7qXubKVbmgVbmedk6ikTx4BTExeMAcy0wicVaYn/exec" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold transition">
                <i class="fas fa-database mr-2"></i> OPEN APPS SCRIPT
            </a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2">
                <div class="glass p-6 rounded-[2rem]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold"><i class="fas fa-book-open mr-2 text-sky-400"></i> PHONICS COURSE</h2>
                        <span class="text-[10px] bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full font-bold">18 FILES</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[600px] overflow-y-auto pr-2" id="course-list">
                        </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6 rounded-[2rem] border-l-4 border-emerald-500">
                    <h3 class="text-xs font-bold text-emerald-500 mb-4 uppercase tracking-widest">System Status</h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between">
                            <span class="text-slate-400">Infrastructure</span>
                            <span class="text-emerald-400 font-bold">ONLINE</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-400">Auth Service</span>
                            <span class="text-blue-400 font-bold">READY</span>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2rem] border-l-4 border-amber-500">
                    <h3 class="text-xs font-bold text-amber-500 mb-4 uppercase tracking-widest">Developer Email</h3>
                    <p class="text-sm font-bold">thee.chinpong@gmail.com</p>
                </div>

                <div class="glass p-6 rounded-[2rem] border-l-4 border-rose-500">
                    <h3 class="text-xs font-bold text-rose-500 mb-4 uppercase tracking-widest">Location</h3>
                    <p class="text-sm">นครศรีธรรมราช, TH</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modules = [
            { name: "Introduce", file: "introduce.html" },
            { name: "Level 1: SATPIN", file: "phonics-level1-satpin.html" },
            { name: "Level 2: CVC Mastery", file: "phonics-level2-cvc-mastery.html" },
            { name: "Level 3: Digraph Mastery", file: "phonics-level3-digraph-mastery.html" },
            { name: "Level 4: Long Vowel Mastery", file: "phonics-level4-long-vowel-mastery.html" },
            { name: "Level 5: Complete Mastery", file: "phonics-level5-complete-mastery.html" },
            { name: "Level 6: Soft Sounds", file: "phonics-level6-soft-sounds-secrets.html" },
            { name: "Level 7: Diphthongs", file: "phonics-level7-ultimate-diphthongs.html" },
            { name: "Level 8: Ultimate Mastery", file: "phonics-level8-the-ultimate-mastery.html" },
            { name: "Level 9: The Architect", file: "phonics-level9-the-architect-final.html" },
            { name: "Level 10: The Ultimate Sage", file: "phonics-level10-the-ultimate-sage-final.html" },
            { name: "Level 11: The Philologist", file: "phonics-level11-the-philologist-ultimate.html" },
            { name: "Level 12: The Polymath", file: "phonics-level12-the-polymath-final.html" },
            { name: "Dialogue 1-4", file: "phonics-mastery-dialogue1-4.html" },
            { name: "Dialogue 1-5", file: "phonics-mastery-dialogue-1-5.html" },
            { name: "Dialogue (HTML Version)", file: "Phonics-mastery-dialogue-html" },
            { name: "Index", file: "index.html" }
        ];

        const listContainer = document.getElementById('course-list');
        listContainer.innerHTML = modules.map(m => `
            <a href="Phonics_Course/${m.file}" class="course-card p-4 rounded-2xl flex justify-between items-center group">
                <span class="text-xs font-bold text-slate-300 group-hover:text-blue-400">${m.name.toUpperCase()}</span>
                <i class="fas fa-external-link-alt text-[10px] text-slate-600 group-hover:text-blue-400"></i>
            </a>
        `).join('');
    </script>
</body>
</html>
