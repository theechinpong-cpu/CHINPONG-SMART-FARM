<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Factory Pro | Bulk Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div class="max-w-7xl mx-auto p-4 lg:p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 border-b border-slate-800 pb-8">
            <div>
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">AFFILIATE FACTORY PRO</h1>
                <p class="text-slate-500 text-xs mt-1 italic">9:16 Vertical Content Factory | Speed 2.9X [cite: 2026-02-02]</p>
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('bulkPanel').classList.toggle('hidden')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold transition-all">
                    <i class="fas fa-file-import mr-2"></i> BULK IMPORT (Excel/Sheet)
                </button>
            </div>
        </header>

        <section id="bulkPanel" class="hidden mb-10 bg-slate-900/80 p-6 rounded-3xl border border-blue-500/30">
            <h2 class="text-blue-400 font-bold mb-4 text-sm"><i class="fas fa-table mr-2"></i> วางข้อมูลจาก Excel/Google Sheet (คอลัมน์: ชื่อ | ไฮไลท์ | ลิงก์ | รูป)</h2>
            <textarea id="bulkInput" rows="5" placeholder="วางข้อมูลที่นี่..." class="w-full bg-black/50 border border-slate-700 p-4 rounded-2xl text-[10px] font-mono text-slate-300 outline-none focus:border-blue-500"></textarea>
            <div class="mt-4 flex flex-col md:flex-row gap-4 items-center">
                <button onclick="convertBulkToJS()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl text-xs font-black transition-all">GENERATE library.js CODE</button>
                <div id="jsOutput" class="flex-1 bg-black/50 p-4 rounded-xl text-[9px] font-mono text-emerald-400 border border-slate-800 overflow-x-auto h-24 overflow-y-auto custom-scrollbar"></div>
                <button onclick="copyData('jsOutput')" class="bg-slate-800 px-4 py-3 rounded-xl text-xs">Copy Code</button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-3 bg-slate-900/40 p-6 rounded-3xl border border-slate-800">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-6 italic">Inventory</h2>
                <div id="inventoryList" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            </aside>

            <main class="lg:col-span-9 space-y-6">
                <div id="workspace" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in">
                    
                    <div class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800">
                        <span class="text-emerald-400 text-[10px] font-black uppercase block mb-4 italic">Caption (TikTok/Reels)</span>
                        <div id="outCaption" class="text-sm text-slate-300 min-h-[180px] bg-black/30 p-4 rounded-2xl border border-slate-800/50 italic whitespace-pre-wrap"></div>
                        <button onclick="copyData('outCaption')" class="w-full mt-4 bg-emerald-600/20 text-emerald-400 py-3 rounded-xl text-[10px] font-bold">COPY CAPTION</button>
                    </div>

                    <div class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800">
                        <span class="text-blue-400 text-[10px] font-black uppercase block mb-4 text-center italic">Visual 9:16 Reference</span>
                        <div class="aspect-[9/16] bg-black rounded-2xl border border-slate-800 overflow-hidden relative group">
                            <img id="productImg" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all" src="" alt="">
                            <p id="noImg" class="absolute inset-0 flex items-center justify-center text-[10px] text-rose-500 font-bold hidden bg-black/80">NO IMAGE URL</p>
                        </div>
                        <button onclick="window.open('https://x.com/grok', '_blank')" class="w-full mt-4 bg-slate-100 text-black py-3 rounded-xl text-[10px] font-bold">OPEN GROK AI</button>
                    </div>

                    <div class="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800">
                        <span class="text-rose-400 text-[10px] font-black uppercase block mb-4 italic">Grok Prompt (Speed 2.9X)</span>
                        <div id="outPrompt" class="text-[9px] font-mono text-yellow-100/60 bg-black/30 p-4 rounded-2xl border border-slate-800/50 min-h-[180px] whitespace-pre-wrap leading-relaxed"></div>
                        <button onclick="copyData('outPrompt')" class="w-full mt-4 bg-rose-600/20 text-rose-400 py-3 rounded-xl text-[10px] font-bold">COPY MASTER PROMPT</button>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script>
        // --- ส่วนแปลงข้อมูล Excel เป็น library.js ---
        function convertBulkToJS() {
            const input = document.getElementById('bulkInput').value;
            const lines = input.trim().split('\n');
            let output = "const shopeeLibrary = [\n";
            
            lines.forEach(line => {
                const parts = line.split('\t'); // แยกด้วย Tab (เวลาวานจาก Excel จะเป็น Tab)
                if (parts.length >= 3) {
                    output += `    {\n        name: "${parts[0].trim()}",\n        cat: "สินค้าใหม่",\n        highlight: "${parts[1].trim()}",\n        link: "${parts[2].trim()}",\n        img: "${parts[3] ? parts[3].trim() : ''}"\n    },\n`;
                }
            });
            output += "];";
            document.getElementById('jsOutput').innerText = output;
        }

        // --- ส่วนแสดงผลสินค้า ---
        function loadInventory() {
            const list = document.getElementById('inventoryList');
            if(typeof shopeeLibrary !== 'undefined') {
                shopeeLibrary.forEach((item, index) => {
                    const btn = document.createElement('div');
                    btn.className = "bg-slate-800/50 p-3 rounded-xl border border-slate-800 cursor-pointer hover:border-blue-500 transition-all text-[11px] font-bold truncate text-slate-400 hover:text-white";
                    btn.innerText = item.name;
                    btn.onclick = () => runAutomation(index);
                    list.appendChild(btn);
                });
            }
        }

        function runAutomation(index) {
            const item = shopeeLibrary[index];
            document.getElementById('workspace').classList.remove('hidden');

            // Caption [cite: 2026-02-01]
            document.getElementById('outCaption').innerText = `🎯 ${item.name}\n${item.highlight.substring(0, 50)}...\n\n🔗 สนใจสั่งซื้อพิกัดในคอมเมนต์ครับ\n#ติวเตอร์ #เตรียมสอบ`;

            // Visual Reference [cite: 2026-02-02]
            const imgEl = document.getElementById('productImg');
            const noImg = document.getElementById('noImg');
            if(item.img && item.img !== "") {
                imgEl.src = item.img;
                imgEl.classList.remove('hidden');
                noImg.classList.add('hidden');
            } else {
                imgEl.classList.add('hidden');
                noImg.classList.remove('hidden');
            }

            // Master Prompt [cite: 2026-02-02]
            const prompt = `REFERENCE IMAGE URL: ${item.img || 'NONE'} [cite: 2026-02-02]
TASK: Create 6-second vertical 9:16 video. [cite: 2026-02-02]
STYLE: 4k ultra realistic product commercial.
ANIMATION: Smooth zoom and rotate "${item.name}".
VOICE OVER (Thai): "อยากสอบติดต้องมีเล่มนี้ ${item.name} สรุปเข้มพร้อมสอบ คลิกเลย!"
AUDIO SETTINGS: Speed 2.9x, Break 1ms. [cite: 2026-02-02]`;
            document.getElementById('outPrompt').innerText = prompt;
        }

        function copyData(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => alert("คัดลอกแล้ว!"));
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
