<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Affiliate Factory | No-Image Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
    <style>body { font-family: 'Kanit', sans-serif; background: #020617; color: #f1f5f9; }</style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-black text-sky-400 mb-6 italic">🚀 AUTOMATE GENERATOR (NO-IMAGE MODE)</h1>
        
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl mb-10">
            <p class="text-xs text-slate-400 mb-3 uppercase tracking-widest font-bold">วางข้อมูลตารางจาก Shopee ที่นี่</p>
            <textarea id="rawInput" rows="5" class="w-full bg-black border border-slate-700 p-4 rounded-xl text-[10px] font-mono mb-4 focus:border-sky-500 outline-none" placeholder="ก๊อปปี้ทั้งตารางมาวางได้เลย..."></textarea>
            <button onclick="smartProcess()" class="bg-sky-600 hover:bg-sky-500 px-10 py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-sky-500/20">PROCESS 100+ ITEMS NOW</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
            <div id="sideList" class="md:col-span-1 space-y-2 max-h-[500px] overflow-y-auto pr-2"></div>
            
            <div id="workArea" class="md:col-span-3 hidden space-y-6">
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <span class="text-sky-400 text-[10px] font-bold block mb-2 uppercase italic">Master Prompt for Grok [cite: 2026-02-02]</span>
                    <div id="outPrompt" class="bg-black/50 p-4 rounded-xl text-[11px] font-mono text-slate-300 whitespace-pre-wrap leading-relaxed border border-slate-800"></div>
                    <button onclick="copyText('outPrompt')" class="w-full mt-4 bg-sky-600/10 text-sky-400 py-3 rounded-xl font-bold text-xs hover:bg-sky-600 hover:text-white transition-all">คัดลอก PROMPT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function smartProcess() {
            const raw = document.getElementById('rawInput').value;
            const lines = raw.trim().split('\n');
            const list = document.getElementById('sideList');
            list.innerHTML = ""; // ล้างรายการเก่า
            
            // ข้ามหัวตารางถ้ามี
            const startIndex = lines[0].includes("รหัสสินค้า") ? 1 : 0;

            window.currentItems = []; // เก็บข้อมูลใน Session

            for(let i = startIndex; i < lines.length; i++) {
                const cols = lines[i].split('\t');
                if(cols.length >= 8) {
                    const item = {
                        id: cols[0],
                        name: cols[1],
                        price: cols[2],
                        link: cols[8] || cols[7]
                    };
                    window.currentItems.push(item);

                    // สร้างเมนูฝั่งซ้าย
                    const btn = document.createElement('div');
                    btn.className = "p-3 bg-slate-800/50 border border-slate-800 rounded-xl text-[10px] cursor-pointer hover:border-sky-500 transition-all truncate";
                    btn.innerText = item.name;
                    btn.onclick = () => showPrompt(window.currentItems.indexOf(item));
                    list.appendChild(btn);
                }
            }
            alert("ประมวลผลสำเร็จ " + window.currentItems.length + " รายการ!");
        }

        function showPrompt(idx) {
            const it = window.currentItems[idx];
            document.getElementById('workArea').classList.remove('hidden');
            
            // สร้าง Prompt โดยไม่มีลิงก์รูป แต่สั่งให้ AI จำลองภาพจากชื่อสินค้าแทน
            const prompt = `[SYSTEM: 9:16 Vertical, 4k ultra realistic] [cite: 2026-02-02]\n` +
                          `TASK: Create a promotional video for TikTok.\n` +
                          `PRODUCT_NAME: ${it.name}\n` +
                          `VISUAL_STYLE: 3D Cinematic Product Showcase.\n` +
                          `REFERENCE_DESC: An educational book cover with title "${it.name}". Show a bright, inspiring atmosphere for students.\n` +
                          `AUDIO_SETTINGS: Speed 2.9x, Break 1ms.\n` +
                          `CAPTION: "สอบเข้า ม.1 ไม่ยากอย่างที่คิด! พิกัดเล่มนี้เลย 🔗 ${it.link}"`;
            
            document.getElementById('outPrompt').innerText = prompt;
        }

        function copyText(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("คัดลอกสำเร็จ!");
        }
    </script>
</body>
</html>
