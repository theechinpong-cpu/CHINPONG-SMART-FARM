<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Generator | ระบบช่วยสร้างคลิป</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Content Auto-Gen 🎬</h1>
                <p class="text-slate-400 text-sm">แปลงสินค้าในคลังเป็น Script วิดีโอสั้น</p>
            </div>
            <a href="index.html" class="text-xs bg-slate-800 px-4 py-2 rounded-xl text-slate-300">กลับหน้าหลัก</a>
        </header>

        <section class="mb-10">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="bg-blue-500 w-2 h-6 rounded-full"></span>
                เลือกสินค้าที่จะทำคลิป
            </h2>
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

        <section id="result-section" class="hidden">
            <div class="bg-slate-800 rounded-3xl p-6 border border-blue-500/30 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-xl text-white">Generated Script ✨</h3>
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase tracking-widest font-black">9:16 | Vertical</span>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-slate-500 uppercase font-bold">Caption (สำหรับโพสต์)</label>
                        <div id="out-caption" class="mt-2 p-4 bg-slate-900 rounded-2xl border border-slate-700 text-sm text-slate-300 italic whitespace-pre-line"></div>
                    </div>

                    <div>
                        <label class="text-xs text-slate-500 uppercase font-bold text-rose-400">Voice Script (ความเร็ว 2.9x)</label>
                        <div id="out-voice" class="mt-2 p-4 bg-slate-900 rounded-2xl border border-slate-700 text-sm text-yellow-100 font-medium"></div>
                    </div>

                    <div class="p-4 bg-blue-900/20 rounded-2xl border border-blue-500/20">
                        <p class="text-[11px] text-blue-300 leading-relaxed">
                            <strong>คำแนะนำ AI:</strong> ใช้ภาพแบบ 4k Ultra Realistic เรียงต่อกัน 3-5 ภาพ ตามจังหวะเพลงที่ตื่นเต้น
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function displayProducts() {
            const list = document.getElementById('product-list');
            if (typeof shopeeLibrary !== 'undefined') {
                shopeeLibrary.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 p-4 rounded-2xl border border-slate-700 hover:border-blue-500 cursor-pointer transition-all";
                    card.onclick = () => generateScript(index);
                    card.innerHTML = `
                        <div class="text-[10px] text-blue-400 font-bold mb-1">${item.cat}</div>
                        <div class="text-sm font-bold truncate">${item.name}</div>
                    `;
                    list.appendChild(card);
                });
            }
        }

        function generateScript(index) {
            const item = shopeeLibrary[index];
            const resultSection = document.getElementById('result-section');
            
            // สร้าง Caption (ตามกฎ TikTok ไม่ระบุชื่อแพลตฟอร์ม)
            const caption = `🎯 ${item.name}\n\n${item.highlight}\n\nสนใจติวเพิ่มหรือหาตัวช่วยสอบเข้า กดดูที่ปักตะกร้าหน้าโปรไฟล์ได้เลยครับ! 📚✨\n#ติวเตอร์ #เตรียมสอบ #ความรู้`;
            
            // สร้าง Voice Script (เน้นสั้น กระชับ สำหรับความเร็ว 2.9x)
            const voice = `อยากสอบติดต้องมีเล่มนี้! ${item.name} สรุปเข้ม เนื้อหาครบ ${item.highlight} พลาดไม่ได้ รีบกดก่อนของหมดที่ตะกร้าหน้าโปรไฟล์เลย!`;

            document.getElementById('out-caption').innerText = caption;
            document.getElementById('out-voice').innerText = voice;
            
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = displayProducts;
    </script>
</body>
</html>
