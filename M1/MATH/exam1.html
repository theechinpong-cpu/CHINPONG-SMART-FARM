<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบคณิตศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .question-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-left: 5px solid #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .option:hover { background: #e9ecef; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .explanation { margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 5px; display: none; font-size: 0.9em; }
        .clue { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>แบบทดสอบคณิตศาสตร์ ม.1 (รวม 25 ข้อ)</h1>
    <div id="quiz"></div>
    <script>
        const questions = [
            { q: "(-5) × (-3) + (-2) มีค่าเท่าใด", o: ["13", "17", "-13", "-17"], a: 0, c: "ลำดับการคูณก่อนบวก" },
            { q: "ผลลัพธ์ของ (-12) ÷ 4 - (-3) คือ", o: ["-6", "0", "6", "9"], a: 1, c: "หารก่อนค่อยบวก" },
            { q: "จำนวนเต็มในข้อใดมีค่ามากที่สุด", o: ["-100", "-1", "0", "-50"], a: 2, c: "ยิ่งติดลบน้อย ยิ่งค่ามาก" },
            { q: "ค่าสัมบูรณ์ของ -15 คือเท่าใด", o: ["15", "-15", "0", "1"], a: 0, c: "ระยะห่างจากศูนย์" },
            { q: "(-2)³ × (-2)² มีค่าเท่ากับ", o: ["-32", "32", "-2", "2"], a: 0, c: "ฐานเหมือนกัน เลขชี้กำลังบวกกัน" },
            { q: "2⁵ ÷ 2³ มีค่าเท่าใด", o: ["4", "8", "16", "2"], a: 0, c: "ฐานเหมือนกันหารกัน เอาเลขชี้กำลังลบกัน" },
            { q: "(3²)³ มีค่าเท่ากับ", o: ["3⁵", "3⁶", "9⁶", "3⁸"], a: 1, c: "เลขชี้กำลังซ้อนกัน เอามาคูณกัน" },
            { q: "(-1)¹⁰⁰ มีค่าเป็น", o: ["1", "-1", "100", "-100"], a: 0, c: "เลขชี้กำลังคู่ ผลเป็นบวก" },
            { q: "5⁰ มีค่าเท่าใด", o: ["0", "1", "5", "ไม่ได้นิยาม"], a: 1, c: "ตัวเลขใดๆ ยกกำลัง 0 ได้ 1" },
            { q: "ข้อใดถูกต้อง", o: ["2³ > 3²", "2³ < 3²", "2³ = 3²", "2³ > 10"], a: 1, c: "คำนวณค่าออกมาเทียบกัน" },
            { q: "(-3)³ มีค่าเท่าใด", o: ["-27", "27", "-9", "9"], a: 0, c: "เลขชี้กำลังคี่ ผลเป็นลบ" },
            { q: "ถ้า x + 5 = 12 แล้ว x มีค่าเท่าใด", o: ["5", "6", "7", "17"], a: 2, c: "ย้าย 5 ไปลบ" },
            { q: "ถ้า 3x = 21 แล้ว x คือ", o: ["7", "6", "8", "63"], a: 0, c: "นำ 3 ไปหาร 21" },
            { q: "2x - 4 = 10 แล้ว x คือ", o: ["3", "5", "7", "14"], a: 2, c: "ย้าย 4 ไปบวก แล้วหาร 2" },
            { q: "x/2 = 5 แล้ว x มีค่าเท่าใด", o: ["2.5", "7", "10", "3"], a: 2, c: "นำ 2 ไปคูณ" },
            { q: "สองเท่าของจำนวนหนึ่งมากกว่า 5 อยู่ 9 คือสมการใด", o: ["2x + 5 = 9", "2x - 5 = 9", "2(x-5) = 9", "x/2 - 5 = 9"], a: 1, c: "เปลี่ยนภาษาไทยเป็นตัวเลข" },
            { q: "มุมตรงมีขนาดกี่องศา", o: ["90", "180", "270", "360"], a: 1, c: "เส้นตรงราบเรียบ" },
            { q: "มุมแหลมมีขนาดเท่าใด", o: ["น้อยกว่า 90", "มากกว่า 90", "เท่ากับ 90", "มากกว่า 180"], a: 0, c: "มุมเล็กกว่ามุมฉาก" },
            { q: "มุมฉากมีขนาดกี่องศา", o: ["45", "90", "180", "360"], a: 1, c: "มุมเป็นรูปตัว L" },
            { q: "มุมแย้งของเส้นขนานจะมีขนาดเป็นอย่างไร", o: ["เท่ากัน", "บวกกันได้ 180", "รวมกันได้ 90", "ไม่เท่ากัน"], a: 0, c: "สมบัติเส้นขนาน" },
            { q: "มุมภายในบนข้างเดียวกันของเส้นตัดเส้นขนานรวมกันได้เท่าใด", o: ["90", "180", "270", "360"], a: 1, c: "สมบัติพื้นฐานเส้นขนาน" },
            { q: "ถ้า -4x = 20 แล้ว x คือ", o: ["5", "-5", "16", "-16"], a: 1, c: "ระวังเครื่องหมายลบ" },
            { q: "เลขยกกำลังฐาน 10 ของ 1,000 คือ", o: ["10²", "10³", "10⁴", "10¹"], a: 1, c: "นับจำนวนศูนย์" },
            { q: "(-2)⁴ + (-2)² มีค่าเท่าใด", o: ["16", "20", "24", "12"], a: 1, c: "ทำแยกกันแล้วค่อยบวก" },
            { q: "ผลรวมมุมภายในของรูปสามเหลี่ยมคือ", o: ["90", "180", "270", "360"], a: 1, c: "สมบัติเรขาคณิตพื้นฐาน" }
        ];

        const container = document.getElementById('quiz');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p>${index + 1}. ${item.q} <span class="clue">(Clue: ${item.c})</span></p>` +
                item.o.map((opt, i) => `<div class="option" onclick="check(${index}, ${i}, this)">${opt}</div>`).join('') +
                `<div class="explanation" id="exp${index}"><strong>เฉลย:</strong> ${item.o[item.a]}<br><span class="tip">Tutor's Secret Tip: ตรวจสอบขั้นตอนการคำนวณซ้ำเสมอ</span></div>`;
            container.appendChild(div);
        });

        function check(qIdx, oIdx, el) {
            const exp = document.getElementById('exp' + qIdx);
            exp.style.display = 'block';
            if (oIdx === questions[qIdx].a) {
                el.classList.add('correct');
            } else {
                el.classList.add('wrong');
            }
            // Disable other options
            const options = el.parentElement.querySelectorAll('.option');
            options.forEach(opt => opt.style.pointerEvents = 'none');
        }
    </script>
</body>
</html>
