<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>แบบทดสอบคณิตศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
<style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; max-width: 800px; margin: auto; }
    .question-container { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .option { display: block; margin: 5px 0; cursor: pointer; padding: 8px; border: 1px solid #ddd; border-radius: 4px; transition: 0.3s; }
    .option:hover { background: #f0f0f0; }
    .correct { background-color: #d4edda !important; border-color: #c3e6cb; }
    .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb; }
    .explanation { margin-top: 10px; padding: 10px; display: none; background: #e2e3e5; border-radius: 4px; font-size: 0.9em; }
    .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
</style>
</head>
<body>
    <h2>แบบทดสอบคณิตศาสตร์ ม.1 (25 ข้อ)</h2>
    <div id="quiz"></div>
    <button class="btn" onclick="analyze()">สรุปผลการประเมิน</button>
    <div id="result" style="margin-top:20px; font-weight:bold;"></div>

<script>
    const questions = [
        // จำนวนเต็ม (1-4)
        { q: "ผลลัพธ์ของ (-15) + (-8) คือเท่าใด?", options: ["-23", "-7", "7", "23"], ans: 0, cat: "จำนวนเต็ม", clue: "การรวมหนี้เพิ่มขึ้นเรื่อยๆ" },
        { q: "ค่าของ (-12) - (-5) คือเท่าใด?", options: ["-17", "-7", "7", "17"], ans: 1, cat: "จำนวนเต็ม", clue: "ลบชนลบกลายเป็นบวก" },
        { q: "(-6) × (-4) มีค่าเท่ากับข้อใด?", options: ["-24", "-10", "10", "24"], ans: 3, cat: "จำนวนเต็ม", clue: "ลบคูณลบได้บวก" },
        { q: "ผลหารของ 56 ÷ (-8) คือเท่าใด?", options: ["-8", "-7", "7", "8"], ans: 1, cat: "จำนวนเต็ม", clue: "ต่างชนิดกันหารกันได้ลบ" },
        // จำนวนเต็มระคน (5-10)
        { q: "ผลลัพธ์ของ 12 + (-4) × 2 คือเท่าใด?", options: ["16", "4", "-4", "-16"], ans: 1, cat: "ระคน", clue: "คูณก่อนบวกเสมอ" },
        { q: "ค่าของ (-2) × (5 - 8) คือเท่าใด?", options: ["-6", "6", "-10", "10"], ans: 1, cat: "ระคน", clue: "ทำในวงเล็บก่อน" },
        { q: "ผลลัพธ์ของ 20 - 4 ÷ 2 คือเท่าใด?", options: ["8", "12", "18", "10"], ans: 2, cat: "ระคน", clue: "หารก่อนลบ" },
        { q: "ค่าของ (10 + 5) ÷ (-3) คือเท่าใด?", options: ["-5", "5", "-3", "3"], ans: 0, cat: "ระคน", clue: "ทำในวงเล็บให้เสร็จก่อน" },
        { q: "ผลลัพธ์ของ (-3) × (-2) + (-4) คือเท่าใด?", options: ["10", "2", "-2", "-10"], ans: 1, cat: "ระคน", clue: "คูณก่อนแล้วค่อยรวม" },
        { q: "ค่าของ 5 - [2 × (3 - 6)] คือเท่าใด?", options: ["1", "9", "11", "-1"], ans: 2, cat: "ระคน", clue: "วงเล็บในสุดออกมาก่อน" },
        // เลขยกกำลัง (11-15)
        { q: "(-2)³ มีค่าเท่ากับเท่าใด?", options: ["-8", "-6", "6", "8"], ans: 0, cat: "เลขยกกำลัง", clue: "ฐานลบเลขชี้คี่ได้ลบ" },
        { q: "(-3)² มีค่าเท่ากับเท่าใด?", options: ["-9", "-6", "6", "9"], ans: 3, cat: "เลขยกกำลัง", clue: "ฐานลบเลขชี้คู่ได้บวก" },
        { q: "2⁴ มีค่าเท่ากับเท่าใด?", options: ["8", "16", "32", "64"], ans: 1, cat: "เลขยกกำลัง", clue: "2 คูณกัน 4 ตัว" },
        { q: "(-1)¹⁰⁰ มีค่าเท่ากับเท่าใด?", options: ["-100", "-1", "1", "100"], ans: 2, cat: "เลขยกกำลัง", clue: "เลขชี้คู่ของฐานติดลบ" },
        { q: "3² + 4² มีค่าเท่ากับเท่าใด?", options: ["14", "25", "49", "100"], ans: 1, cat: "เลขยกกำลัง", clue: "หาค่าแต่ละตัวก่อนบวก" },
        // สมการ (16-20)
        { q: "ถ้า x + 5 = 12 แล้ว x เท่ากับเท่าใด?", options: ["5", "7", "17", "60"], ans: 1, cat: "สมการ", clue: "ย้าย 5 ไปลบ" },
        { q: "ถ้า 3x = 15 แล้ว x เท่ากับเท่าใด?", options: ["5", "12", "18", "45"], ans: 0, cat: "สมการ", clue: "ย้าย 3 ไปหาร" },
        { q: "ถ้า 2x - 4 = 10 แล้ว x เท่ากับเท่าใด?", options: ["3", "5", "7", "14"], ans: 2, cat: "สมการ", clue: "ย้ายเลขตัวเดียวไปก่อน" },
        { q: "จำนวนหนึ่งรวมกับ 8 ได้ 20 เขียนเป็นสมการได้อย่างไร?", options: ["8 - x = 20", "x + 8 = 20", "x - 8 = 20", "20x = 8"], ans: 1, cat: "สมการ", clue: "คำว่ารวมกับคือบวก" },
        { q: "ถ้า x/2 = 6 แล้ว x เท่ากับเท่าใด?", options: ["3", "4", "8", "12"], ans: 3, cat: "สมการ", clue: "ย้าย 2 ไปคูณ" },
        // เรขาคณิต (21-25)
        { q: "มุมตรงมีขนาดกี่องศา?", options: ["90", "180", "270", "360"], ans: 1, cat: "เรขา", clue: "เส้นตรงราบเรียบ" },
        { q: "ถ้าเส้นขนานถูกตัด มุมแย้งจะมีขนาดเป็นอย่างไร?", options: ["เท่ากัน", "บวกกันได้ 90", "บวกกันได้ 180", "ไม่สัมพันธ์กัน"], ans: 0, cat: "เรขา", clue: "สมบัติเส้นขนาน" },
        { q: "มุมภายในรูปสามเหลี่ยมรวมกันได้กี่องศา?", options: ["90", "180", "270", "360"], ans: 1, cat: "เรขา", clue: "สมบัติสามเหลี่ยม" },
        { q: "ถ้ามุมสองมุมรวมกันได้ 90 องศา เรียกว่ามุมอะไร?", options: ["มุมตรง", "มุมกลับ", "มุมประกอบมุมฉาก", "มุมแย้ง"], ans: 2, cat: "เรขา", clue: "มุมฉากคือ 90" },
        { q: "มุมรอบจุดศูนย์กลางมีขนาดกี่องศา?", options: ["90", "180", "270", "360"], ans: 3, cat: "เรขา", clue: "ครบหนึ่งวงกลม" }
    ];

    const quizDiv = document.getElementById('quiz');
    let scores = { "จำนวนเต็ม": 0, "ระคน": 0, "เลขยกกำลัง": 0, "สมการ": 0, "เรขา": 0 };
    let counts = { "จำนวนเต็ม": 0, "ระคน": 0, "เลขยกกำลัง": 0, "สมการ": 0, "เรขา": 0 };

    questions.forEach((item, index) => {
        let div = document.createElement('div');
        div.className = 'question-container';
        div.innerHTML = `<p>${index + 1}. ${item.q} <span style="color:red;">(Clue: ${item.clue})</span></p>`;
        item.options.forEach((opt, oIdx) => {
            div.innerHTML += `<label class="option"><input type="radio" name="q${index}" onclick="check(${index}, ${oIdx})"> ${opt}</label>`;
        });
        div.innerHTML += `<div id="exp${index}" class="explanation"></div>`;
        quizDiv.appendChild(div);
    });

    function check(qIdx, oIdx) {
        let container = document.querySelectorAll('.question-container')[qIdx];
        let expDiv = document.getElementById('exp'+qIdx);
        let inputs = container.querySelectorAll('input');
        inputs.forEach(i => i.disabled = true);
        
        let cat = questions[qIdx].cat;
        counts[cat]++;
        
        if(oIdx === questions[qIdx].ans) {
            container.classList.add('correct');
            expDiv.innerHTML = "ถูกต้อง! Tutor's Secret Tip: แม่นยำมากครับ";
            scores[cat]++;
        } else {
            container.classList.add('incorrect');
            expDiv.innerHTML = "พลาดไปนิด! คำตอบที่ถูกคือ: " + questions[qIdx].options[questions[qIdx].ans] + ". Tutor's Secret Tip: ตรวจสอบขั้นตอนการคำนวณอีกครั้ง";
        }
        expDiv.style.display = 'block';
    }

    function analyze() {
        let res = "วิเคราะห์จุดอ่อน: ";
        for(let key in scores) {
            if(counts[key] > 0 && (scores[key]/counts[key] < 0.6)) {
                res += "บทเรียน " + key + " ควรทบทวนเพิ่ม ";
            }
        }
        document.getElementById('result').innerHTML = res === "วิเคราะห์จุดอ่อน: " ? "ยอดเยี่ยม! คุณเข้าใจพื้นฐานทุกบทเรียนได้ดีมากครับ" : res;
    }
</script>
</body>
</html>
