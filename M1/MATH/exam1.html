<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ข้อสอบคณิตศาสตร์ ม.1</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; background: #f0f2f5; padding: 20px; }
        .question-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-left: 5px solid #007bff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .options { margin: 10px 0; }
        .option { display: block; margin: 5px 0; padding: 10px; background: #e9ecef; cursor: pointer; border-radius: 5px; }
        .correct { background: #d4edda !important; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background: #f8d7da !important; color: #721c24; border: 1px solid #f5c6cb; }
        .feedback { margin-top: 10px; font-weight: bold; }
        .tip { font-style: italic; color: #555; margin-top: 5px; border-top: 1px solid #ccc; padding-top: 5px; }
    </style>
</head>
<body>
    <h1>แบบทดสอบคณิตศาสตร์ ม.1</h1>
    <div id="quiz"></div>
    <div id="summary" style="margin-top:20px; font-weight:bold;"></div>

    <script>
        const questions = [
            // Q1-4 จำนวนเต็ม
            {q: "(-15) + 8 มีค่าเท่าใด", opt: ["-23", "-7", "7", "23"], ans: 1, topic: "จำนวนเต็ม", clue: "หนี้ 15 บาท มีเงินคืน 8 บาท", tip: "ลบมากกว่าบวก คำตอบต้องติดลบ"},
            {q: "(-5) × (-4) มีค่าเท่าใด", opt: ["-20", "20", "-9", "9"], ans: 1, topic: "จำนวนเต็ม", clue: "ลบคูณลบกลายเป็นบวก", tip: "เครื่องหมายเหมือนกันคูณกันได้บวก"},
            {q: "(-20) ÷ 4 มีค่าเท่าใด", opt: ["-5", "5", "-16", "16"], ans: 0, topic: "จำนวนเต็ม", clue: "ลบหารบวก ผลลัพธ์คือลบ", tip: "ต่างกันหารกันได้ลบ"},
            {q: "(-10) - (-12) มีค่าเท่าใด", opt: ["-22", "22", "-2", "2"], ans: 3, topic: "จำนวนเต็ม", clue: "ลบซ้อนลบกลายเป็นบวก", tip: "(-10) + 12 = 2"},
            
            // Q5-10 จำนวนเต็มระคน
            {q: "5 × (3 + 2) มีค่าเท่าใด", opt: ["17", "25", "20", "15"], ans: 1, topic: "จำนวนเต็มระคน", clue: "ทำในวงเล็บก่อน", tip: "กฎ วง-คูณ-หาร-บวก-ลบ"},
            {q: "20 - 4 × 2 มีค่าเท่าใด", opt: ["32", "12", "16", "8"], ans: 1, topic: "จำนวนเต็มระคน", clue: "คูณก่อน ลบทีหลัง", tip: "อย่าลบก่อนคูณเด็ดขาด"},
            {q: "(-2) × ((-3) + 5) มีค่าเท่าใด", opt: ["4", "-4", "16", "-16"], ans: 1, topic: "จำนวนเต็มระคน", clue: "วงเล็บซ้อนทำข้างในสุดก่อน", tip: "(-3)+5 ได้ 2 จากนั้น 2 × -2 = -4"},
            {q: "10 + 20 ÷ 5 มีค่าเท่าใด", opt: ["6", "14", "18", "4"], ans: 1, topic: "จำนวนเต็มระคน", clue: "หารก่อน บวกทีหลัง", tip: "10 + 4 = 14"},
            {q: "(15 - 5) ÷ 2 + 3 มีค่าเท่าใด", opt: ["8", "10", "5", "6"], ans: 0, topic: "จำนวนเต็มระคน", clue: "ลำดับ: วงเล็บ -> หาร -> บวก", tip: "10 ÷ 2 + 3 = 5 + 3 = 8"},
            {q: "((-8) + 2) × 3 มีค่าเท่าใด", opt: ["-18", "18", "-2", "2"], ans: 0, topic: "จำนวนเต็มระคน", clue: "วงเล็บมาก่อนเสมอ", tip: "(-6) × 3 = -18"},

            // Q11-15 เลขยกกำลัง
            {q: "(-2)³ มีค่าเท่าใด", opt: ["8", "-8", "6", "-6"], ans: 1, topic: "เลขยกกำลัง", clue: "เลขชี้กำลังเป็นคี่", tip: "ลบ × ลบ × ลบ = ลบ"},
            {q: "(-3)² มีค่าเท่าใด", opt: ["9", "-9", "6", "-6"], ans: 0, topic: "เลขยกกำลัง", clue: "เลขชี้กำลังเป็นคู่", tip: "ลบ × ลบ = บวก"},
            {q: "2⁴ มีค่าเท่าใด", opt: ["8", "16", "6", "12"], ans: 1, topic: "เลขยกกำลัง", clue: "2 คูณกัน 4 ตัว", tip: "2×2×2×2 = 16"},
            {q: "(-1)¹⁰⁰ มีค่าเท่าใด", opt: ["-1", "1", "100", "-100"], ans: 1, topic: "เลขยกกำลัง", clue: "ฐานลบ ยกกำลังคู่", tip: "เลขคู่อยู่ที่ไหน ค่าเป็นบวกเสมอ"},
            {q: "เปรียบเทียบ (-2)⁴ กับ -2⁴", opt: ["เท่ากัน", "มากกว่า", "น้อยกว่า", "ข้อมูลไม่พอ"], ans: 1, topic: "เลขยกกำลัง", clue: "วงเล็บมีผลต่อฐาน", tip: "(-2)⁴=16 แต่ -2⁴=-(2×2×2×2)=-16"},

            // Q16-20 สมการ
            {q: "x + 5 = 12 ค่าของ x คือ", opt: ["5", "7", "17", "60"], ans: 1, topic: "สมการ", clue: "ย้าย 5 ไปลบ", tip: "x = 12 - 5"},
            {q: "2x = 10 ค่าของ x คือ", opt: ["5", "8", "12", "20"], ans: 0, topic: "สมการ", clue: "ย้าย 2 ไปหาร", tip: "x = 10 / 2"},
            {q: "x - 3 = -5 ค่าของ x คือ", opt: ["2", "-2", "8", "-8"], ans: 1, topic: "สมการ", clue: "ย้าย -3 ไปบวก", tip: "x = -5 + 3 = -2"},
            {q: "3x + 1 = 10 ค่าของ x คือ", opt: ["2", "3", "4", "9"], ans: 1, topic: "สมการ", clue: "ย้าย 1 ไปลบ ก่อนหาร 3", tip: "3x = 9, x = 3"},
            {q: "ถ้า 2 เท่าของจำนวนหนึ่งคือ 14 จำนวนนั้นคือ", opt: ["7", "28", "12", "5"], ans: 0, topic: "สมการ", clue: "2x = 14", tip: "สร้างสมการจากโจทย์ปัญหา"},

            // Q21-25 เรขาคณิต
            {q: "มุมตรงมีขนาดกี่องศา", opt: ["90", "180", "270", "360"], ans: 1, topic: "เรขาคณิต", clue: "เส้นตรงราบ", tip: "จำไว้ว่าเส้นตรงคือ 180 องศา"},
            {q: "ถ้าเส้นขนานถูกตัด มุมแย้งจะมีสมบัติอย่างไร", opt: ["รวมได้ 180", "เท่ากัน", "ต่างกัน", "เป็นมุมฉาก"], ans: 1, topic: "เรขาคณิต", clue: "มุมที่สลับฝั่ง", tip: "มุมแย้งต้องเท่ากันเสมอ"},
            {q: "มุมภายในบนข้างเดียวกันของเส้นตัดรวมกันได้กี่องศา", opt: ["90", "180", "270", "360"], ans: 1, topic: "เรขาคณิต", clue: "ขนานกันเสมอ", tip: "ต้องรวมกันได้ 180"},
            {q: "มุมฉากมีกี่องศา", opt: ["45", "90", "180", "360"], ans: 1, topic: "เรขาคณิต", clue: "มุมตั้งฉาก", tip: "มุม 90 องศา"},
            {q: "มุมรอบจุดศูนย์กลางมีกี่องศา", opt: ["90", "180", "270", "360"], ans: 1, topic: "เรขาคณิต", clue: "ครบวงกลม", tip: "360 องศาคือหนึ่งรอบพอดี"}
        ];

        const quizDiv = document.getElementById('quiz');
        let answers = new Array(questions.length).fill(null);

        questions.forEach((item, index) => {
            let qContainer = document.createElement('div');
            qContainer.className = 'question-container';
            qContainer.innerHTML = `
                <p><strong>ข้อที่ ${index + 1}:</strong> ${item.q} <span style="color:red;">(Clue: ${item.clue})</span></p>
                <div class="options">
                    ${item.opt.map((o, i) => `<div class="option" onclick="check(${index}, ${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}
                </div>
                <div id="feedback-${index}" class="feedback"></div>
            `;
            quizDiv.appendChild(qContainer);
        });

        function check(qIdx, optIdx) {
            if(answers[qIdx] !== null) return;
            answers[qIdx] = optIdx;
            const container = document.querySelectorAll('.question-container')[qIdx];
            const options = container.querySelectorAll('.option');
            const feedback = document.getElementById('feedback-' + qIdx);
            
            if(optIdx === questions[qIdx].ans) {
                options[optIdx].classList.add('correct');
                feedback.innerHTML = "ถูกต้อง!";
            } else {
                options[optIdx].classList.add('wrong');
                options[questions[qIdx].ans].classList.add('correct');
                feedback.innerHTML = "ผิดครับ";
            }
            feedback.innerHTML += `<div class="tip">Tutor's Secret Tip: ${questions[qIdx].tip}</div>`;
            
            if(answers.filter(a => a !== null).length === 25) analyze();
        }

        function analyze() {
            let score = 0;
            let breakdown = {};
            questions.forEach((q, i) => {
                if(answers[i] === q.ans) score++;
                else {
                    breakdown[q.topic] = (breakdown[q.topic] || 0) + 1;
                }
            });
            document.getElementById('summary').innerHTML = `คะแนนของคุณคือ ${score}/25<br>จุดที่ควรปรับปรุง: ${Object.keys(breakdown).length > 0 ? Object.keys(breakdown).join(', ') : 'เยี่ยมมาก! คุณแม่นทุกจุด'}`;
        }
    </script>
</body>
</html>
