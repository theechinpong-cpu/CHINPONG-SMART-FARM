const container = document.getElementById('quiz-container');
quizData.forEach((item, index) => {
    container.innerHTML += `
        <div class="q-card">
            <span class="q-text">${index + 1}. ${item.q}</span>
            <div class="options-grid">
                ${item.options.map((opt, i) => `<button onclick="check(${index}, ${i})">${opt}</button>`).join('')}
            </div>
            <div id="res-${index}" class="result"></div>
            <span class="clue">Tutor's Secret Tip: วิเคราะห์ด้วยเหตุผล อย่าเดา!</span>
        </div>
    `;
});

function check(qIdx, aIdx) {
    const res = document.getElementById('res-' + qIdx);
    if(aIdx === quizData[qIdx].correct) {
        res.innerHTML = "✅ ถูกต้อง! " + quizData[qIdx].detail;
        res.className = "result correct";
    } else {
        res.innerHTML = "❌ ผิดครับ " + quizData[qIdx].detail;
        res.className = "result wrong";
    }
    res.style.display = "block";
    
    // จำลองการส่งข้อมูล (Alert เพื่อแจ้งเตือนตามระบบ)
    if(qIdx === quizData.length - 1) {
        alert("ส่งรายงานผลการทดสอบไปที่ thee.chinpong@hmail.com เรียบร้อยแล้วครับ");
    }
}
