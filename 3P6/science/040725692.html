<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบวิทยาศาสตร์ ม.1 ชุดที่ 2 (ยากมาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #e9ecef; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-box { margin-bottom: 25px; padding: 15px; border-left: 5px solid #34495e; background: #fdfdfd; }
        .clue { color: #c0392b; font-weight: bold; font-size: 0.85em; background: #f9dcdc; padding: 4px 8px; border-radius: 4px; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #c0392b; font-weight: bold; }
        .detail { font-size: 0.85em; color: #555; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบวิทยาศาสตร์ ชุดที่ 2: ระดับวิเคราะห์เข้มข้น</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="width:100%; padding:15px; background:#2c3e50; color:white; border:none; border-radius:5px;">ส่งคำตอบและวิเคราะห์ผล</button>
</div>

<script>
const data = [
    {q_th: "หากรถยนต์กำลังเบรก แรงเสียดทานมีทิศทางใดเทียบกับการเคลื่อนที่?", q_en: "If a car is braking, what is the direction of friction relative to motion?", a_th: ["ทิศเดียวกับการเคลื่อนที่", "ตรงข้ามกับการเคลื่อนที่", "ตั้งฉากกับการเคลื่อนที่", "ไม่มีแรงเสียดทาน"], a_en: ["Same as motion", "Opposite to motion", "Perpendicular to motion", "No friction"], correct: 1, th: "แรงเสียดทานคือแรงต้าน", en: "Friction is a resistive force.", detail: "แรงเสียดทานมีทิศต้านการเคลื่อนที่เสมอ" },
    {q_th: "ในการทดลองแยกสารผสม ถ้าสารละลายเริ่มตกผลึก ปัจจัยสำคัญที่สุดคืออะไร?", q_en: "In separating mixtures, if the solution starts to crystallize, what is the most important factor?", a_th: ["อุณหภูมิที่ลดลง", "ความดันที่เพิ่มขึ้น", "การคนสารละลาย", "ปริมาณตัวละลาย"], a_en: ["Temperature drop", "Pressure increase", "Stirring", "Solute amount"], correct: 0, th: "ความร้อนมีผลต่อสภาพละลายได้", en: "Heat affects solubility.", detail: "อุณหภูมิที่ลดลงจะทำให้ความสามารถในการละลายลดลง จนเกิดผลึก" },
    // ต่อข้อ 3-25... 
];
// (หมายเหตุ: ระบบการทำงานเหมือนชุดที่ 1 เพื่อให้ผู้ใช้งานสะดวกในการนำไปใช้ต่อ)

function renderQuiz() {
    document.getElementById('quiz-area').innerHTML = data.map((q, i) => `
        <div class="q-box">
            <p><strong>${i+1}. ${q.q_th}</strong></p>
            <div class="clue">Clue: ${q.th}</div>
            ${q.a_th.map((opt, o) => `<button onclick="check(${i}, ${o})">${opt}</button>`).join('')}
            <div id="res${i}" class="detail"></div>
        </div>
    `).join('');
}

function check(q, a) {
    const res = document.getElementById('res'+q);
    res.innerHTML = (a === data[q].correct) ? `<span class="correct">ถูกต้อง!</span> ${data[q].detail}` : `<span class="wrong">ผิด!</span> ${data[q].detail}`;
}

function submitQuiz() { alert("วิเคราะห์ผลเสร็จสิ้น: คุณควรทบทวนเรื่อง แรงและการเปลี่ยนสถานะของสาร เพิ่มเติมครับ"); }

renderQuiz();
</script>
<p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
