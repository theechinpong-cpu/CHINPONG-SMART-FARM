<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบวิทยาศาสตร์ ม.1 ชุดที่ 2 (ยากมาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #e9ecef; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-box { margin-bottom: 25px; padding: 15px; border-left: 5px solid #34495e; background: #fdfdfd; }
        .clue { color: #c0392b; font-weight: bold; font-size: 0.85em; background: #f9dcdc; padding: 4px 8px; border-radius: 4px; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #c0392b; font-weight: bold; }
        .detail { font-size: 0.85em; color: #555; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบวิทยาศาสตร์ ชุดที่ 2: ระดับวิเคราะห์เข้มข้น</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="width:100%; padding:15px; background:#2c3e50; color:white; border:none; border-radius:5px;">ส่งคำตอบและวิเคราะห์ผล</button>
</div>

<script>
const data = [
{q_th: "หากรถยนต์กำลังเบรก แรงเสียดทานมีทิศทางใดเทียบกับการเคลื่อนที่?", q_en: "If a car is braking, what is the direction of friction relative to motion?", a_th: ["ทิศเดียวกับการเคลื่อนที่", "ตรงข้ามกับการเคลื่อนที่", "ตั้งฉากกับการเคลื่อนที่", "ไม่มีแรงเสียดทาน"], a_en: ["Same as motion", "Opposite to motion", "Perpendicular to motion", "No friction"], correct: 1, th: "แรงเสียดทานคือแรงต้าน", en: "Friction is a resistive force.", detail: "แรงเสียดทานมีทิศต้านการเคลื่อนที่เสมอ" },
    {q_th: "ในการทดลองแยกสารผสม ถ้าสารละลายเริ่มตกผลึก ปัจจัยสำคัญที่สุดคืออะไร?", q_en: "In separating mixtures, if the solution starts to crystallize, what is the most important factor?", a_th: ["อุณหภูมิที่ลดลง", "ความดันที่เพิ่มขึ้น", "การคนสารละลาย", "ปริมาณตัวละลาย"], a_en: ["Temperature drop", "Pressure increase", "Stirring", "Solute amount"], correct: 0, th: "ความร้อนมีผลต่อสภาพละลายได้", en: "Heat affects solubility.", detail: "อุณหภูมิที่ลดลงทำให้ความสามารถในการละลายลดลงจนเกิดผลึก" },
    {q_th: "การต่อวงจรไฟฟ้าแบบขนาน หากเพิ่มจำนวนหลอดไฟเข้าไป จะส่งผลต่อความสว่างอย่างไร?", q_en: "In a parallel circuit, what happens to brightness if more bulbs are added?", a_th: ["สว่างขึ้น", "เท่าเดิม", "ลดลง", "ดับทั้งหมด"], a_en: ["Brighter", "Same", "Dimmer", "All go out"], correct: 1, th: "แรงดันไฟฟ้าเท่าเดิมในแต่ละสาขา", en: "Voltage remains the same across branches.", detail: "ความต่างศักย์เท่ากันทุกสาขา หลอดไฟจึงสว่างเท่าเดิม" },
    {q_th: "เมื่อแช่เหล็กในสารละลายคอปเปอร์ซัลเฟตสีฟ้า สารละลายจะเปลี่ยนเป็นสีใด?", q_en: "What color does copper sulfate solution turn when iron is soaked in it?", a_th: ["น้ำเงินเข้ม", "เขียว", "ใสไม่มีสี", "แดง"], a_en: ["Dark blue", "Green", "Colorless", "Red"], correct: 1, th: "เหล็กแทนที่คอปเปอร์", en: "Iron replaces copper.", detail: "เกิดการแทนที่กัน ทำให้ได้สารละลายเหล็กซัลเฟตสีเขียวจางๆ" },
    {q_th: "ดาวเคราะห์ดวงใดมีการหมุนรอบตัวเองแบบสวนทางกับดวงอื่น?", q_en: "Which planet rotates in the opposite direction to most others?", a_th: ["พุธ", "ศุกร์", "อังคาร", "พฤหัสบดี"], a_en: ["Mercury", "Venus", "Mars", "Jupiter"], correct: 1, th: "ดาวแห่งความร้อนย้อนศร", en: "The hot planet rotates backwards.", detail: "ดาวศุกร์หมุนตามเข็มนาฬิกา (สวนทาง)" },
    {q_th: "แรงพยุงของวัตถุขึ้นอยู่กับปัจจัยใดมากที่สุด?", q_en: "What does the buoyant force depend on most?", a_th: ["ปริมาตรวัตถุที่จม", "ความหนาแน่นวัตถุ", "มวลวัตถุ", "รูปร่างวัตถุ"], a_en: ["Submerged volume", "Object density", "Object mass", "Shape"], correct: 0, th: "ปริมาตรที่จม = ปริมาตรของเหลวที่ถูกแทนที่", en: "Submerged volume = displaced liquid volume.", detail: "ตามกฎของอาร์คิมิดีส แรงพยุง = น้ำหนักของของเหลวที่ถูกแทนที่" },
    {q_th: "กระบวนการหายใจระดับเซลล์ต้องใช้แก๊สใดเป็นสำคัญ?", q_en: "Which gas is essential for cellular respiration?", a_th: ["คาร์บอนไดออกไซด์", "ไนโตรเจน", "ออกซิเจน", "ไฮโดรเจน"], a_en: ["CO2", "Nitrogen", "Oxygen", "Hydrogen"], correct: 2, th: "การเผาผลาญต้องใช้แก๊สนี้", en: "Metabolism needs this gas.", detail: "ออกซิเจนใช้ในการเผาผลาญสารอาหารเพื่อให้ได้พลังงาน" },
    {q_th: "ถ้าโลกไม่มีชั้นบรรยากาศ อุณหภูมิผิวโลกจะเป็นอย่างไร?", q_en: "If Earth had no atmosphere, what would its surface temperature be?", a_th: ["ร้อนตลอดเวลา", "เย็นตลอดเวลา", "กลางวันร้อนจัด กลางคืนเย็นจัด", "คงที่"], a_en: ["Always hot", "Always cold", "Extremely hot day, freezing night", "Stable"], correct: 2, th: "บรรยากาศทำหน้าที่เป็นฉนวน", en: "Atmosphere acts as an insulator.", detail: "ชั้นบรรยากาศช่วยกักเก็บความร้อนและสะท้อนรังสี" },
    {q_th: "การสะท้อนกลับหมดของแสงจะเกิดขึ้นเมื่อใด?", q_en: "When does total internal reflection occur?", a_th: ["จากตัวกลางหนาแน่นน้อยไปมาก", "จากตัวกลางหนาแน่นมากไปน้อย", "แสงกระทบผิวโลหะ", "แสงเดินทางในสุญญากาศ"], a_en: ["Less to more dense", "More to less dense", "Hitting metal", "In vacuum"], correct: 1, th: "จากเข้มข้นไปเบาบาง", en: "From dense to less dense.", detail: "ต้องเดินทางจากตัวกลางดัชนีหักเหสูงไปต่ำ และมุมตกกระทบเกินมุมวิกฤต" },
    {q_th: "วัฏจักรน้ำในข้อใดจัดเป็นการเปลี่ยนสถานะแบบดูดความร้อน?", q_en: "Which water cycle stage is endothermic?", a_th: ["การควบแน่น", "การแข็งตัว", "การระเหย", "การคายน้ำของพืช"], a_en: ["Condensation", "Freezing", "Evaporation", "Transpiration"], correct: 2, th: "ต้องรับความร้อนถึงจะระเหย", en: "Heat is needed to evaporate.", detail: "การระเหยต้องดูดพลังงานจากสิ่งแวดล้อมเพื่อเปลี่ยนสถานะ" },
    {q_th: "ดินชนิดใดมีการกักเก็บน้ำดีที่สุด?", q_en: "Which soil type holds water best?", a_th: ["ดินทราย", "ดินร่วน", "ดินเหนียว", "ดินร่วนปนทราย"], a_en: ["Sandy", "Loamy", "Clay", "Sandy loam"], correct: 2, th: "เม็ดดินละเอียด", en: "Fine soil particles.", detail: "ดินเหนียวมีอนุภาคเล็กทำให้กักเก็บน้ำได้สูง" },
    {q_th: "หากเพิ่มกระแสไฟฟ้าในแม่เหล็กไฟฟ้า ผลที่ตามมาคืออะไร?", q_en: "If the current in an electromagnet is increased, what happens?", a_th: ["แม่เหล็กแรงขึ้น", "แม่เหล็กอ่อนลง", "ขั้วเปลี่ยน", "ไม่มีผล"], a_en: ["Stronger", "Weaker", "Polarity change", "No effect"], correct: 0, th: "กระแสมากสนามก็มาก", en: "More current, more field.", detail: "ความเข้มสนามแม่เหล็กแปรผันตรงกับกระแสไฟฟ้า" },
    {q_th: "ออร์แกเนลล์ใดทำหน้าที่ผลิตโปรตีนในเซลล์?", q_en: "Which organelle produces proteins?", a_th: ["ไมโทคอนเดรีย", "ไรโบโซม", "กอลจิบอดี", "แวคิวโอล"], a_en: ["Mitochondria", "Ribosome", "Golgi", "Vacuole"], correct: 1, th: "โรงงานผลิตโปรตีน", en: "Protein factory.", detail: "ไรโบโซมเป็นแหล่งสังเคราะห์โปรตีนของเซลล์" },
    {q_th: "ปรากฏการณ์สุริยุปราคาเกิดขึ้นเมื่อใด?", q_en: "When does a solar eclipse occur?", a_th: ["จันทร์อยู่กลาง", "โลกอยู่กลาง", "อาทิตย์อยู่กลาง", "จันทร์บังอาทิตย์"], a_en: ["Moon in middle", "Earth in middle", "Sun in middle", "Moon blocks Sun"], correct: 3, th: "จันทร์บังดวงอาทิตย์", en: "Moon blocks the Sun.", detail: "สุริยุปราคาคือ ดวงจันทร์-โลก-อาทิตย์ เรียงตัวกัน" },
    {q_th: "เมื่อนำเลนส์เว้ามาวางขวางแสงขนาน จะเกิดผลอย่างไร?", q_en: "What happens when light passes through a concave lens?", a_th: ["แสงรวมกันที่จุดโฟกัส", "แสงกระจายออกจากกัน", "แสงไม่หักเห", "แสงสะท้อนกลับ"], a_en: ["Converge", "Diverge", "No refraction", "Reflect"], correct: 1, th: "เลนส์กระจายแสง", en: "Diverging lens.", detail: "เลนส์เว้าเป็นเลนส์กระจายแสง" },
    {q_th: "แรงเสียดทานสถิตกับแรงเสียดทานจลน์ สิ่งใดมากกว่า?", q_en: "Which is greater: static or kinetic friction?", a_th: ["สถิต > จลน์", "จลน์ > สถิต", "เท่ากัน", "สถิต = 0"], a_en: ["Static > Kinetic", "Kinetic > Static", "Equal", "Static = 0"], correct: 0, th: "เริ่มขยับยากกว่าขยับแล้ว", en: "Starting is harder than moving.", detail: "แรงเสียดทานสถิตสูงสุดมากกว่าแรงเสียดทานจลน์" },
    {q_th: "ดาวเคราะห์น้อยส่วนใหญ่อยู่ระหว่างดาวดวงใด?", q_en: "Where are most asteroids located?", a_th: ["พุธ-ศุกร์", "โลก-อังคาร", "อังคาร-พฤหัสบดี", "พฤหัสบดี-เสาร์"], a_en: ["Mercury-Venus", "Earth-Mars", "Mars-Jupiter", "Jupiter-Saturn"], correct: 2, th: "แถบดาวเคราะห์น้อย", en: "Asteroid belt.", detail: "อยู่ระหว่างวงโคจรดาวอังคารและดาวพฤหัสบดี" },
    {q_th: "การวัดความชื้นสัมพัทธ์ใช้เครื่องมือใด?", q_en: "What instrument measures relative humidity?", a_th: ["เทอร์โมมิเตอร์", "ไฮโกรมิเตอร์", "บารอมิเตอร์", "อะนิโมมิเตอร์"], a_en: ["Thermometer", "Hygrometer", "Barometer", "Anemometer"], correct: 1, th: "ไฮโกร = ความชื้น", en: "Hygro = humidity.", detail: "ไฮโกรมิเตอร์ใช้วัดความชื้นในอากาศ" },
    {q_th: "ค่า pH 1 หมายความว่าอย่างไร?", q_en: "What does pH 1 mean?", a_th: ["เบสแก่", "เบสอ่อน", "กรดแก่", "กรดอ่อน"], a_en: ["Strong base", "Weak base", "Strong acid", "Weak acid"], correct: 2, th: "ยิ่งน้อยยิ่งกรดจัด", en: "Lower is more acidic.", detail: "pH น้อยกว่า 7 คือกรด ยิ่งใกล้ 1 ยิ่งเป็นกรดแก่" },
    {q_th: "พืชไร้ดอกมีลักษณะเด่นอย่างไรในการสืบพันธุ์?", q_en: "What is the key feature of non-flowering plant reproduction?", a_th: ["สร้างผล", "สร้างเมล็ด", "สร้างสปอร์", "ผสมเกสร"], a_en: ["Produces fruit", "Produces seeds", "Produces spores", "Pollination"], correct: 2, th: "เฟิร์น มอส ใช้สปอร์", en: "Ferns/Mosses use spores.", detail: "พืชไร้ดอกส่วนใหญ่ใช้สปอร์ในการแพร่พันธุ์" },
    {q_th: "แรงในข้อใดที่กระทำโดยไม่ต้องสัมผัสวัตถุ?", q_en: "Which force acts without contact?", a_th: ["แรงเสียดทาน", "แรงดึง", "แรงโน้มถ่วง", "แรงปกติ"], a_en: ["Friction", "Tension", "Gravity", "Normal"], correct: 2, th: "แรงสนาม", en: "Field force.", detail: "แรงโน้มถ่วงเป็นแรงไม่สัมผัส" },
    {q_th: "สารประกอบไฮโดรคาร์บอนเมื่อเผาไหม้สมบูรณ์ได้ผลผลิตอะไร?", q_en: "What are the products of complete hydrocarbon combustion?", a_th: ["C + H2O", "CO + H2O", "CO2 + H2O", "C + CO"], a_en: ["C + H2O", "CO + H2O", "CO2 + H2O", "C + CO"], correct: 2, th: "เผาไหม้สมบูรณ์ได้คาร์บอนไดออกไซด์", en: "Complete combustion gives CO2.", detail: "ได้คาร์บอนไดออกไซด์และน้ำ" },
    {q_th: "ดวงจันทร์หมุนรอบตัวเองกี่วัน?", q_en: "How many days does the moon take to rotate?", a_th: ["1 วัน", "7 วัน", "27.3 วัน", "365 วัน"], a_en: ["1 day", "7 days", "27.3 days", "365 days"], correct: 2, th: "เท่ากับเวลาโคจรรอบโลก", en: "Equals time orbiting Earth.", detail: "ดวงจันทร์ใช้เวลาหมุนรอบตัวเองเท่ากับการโคจรรอบโลก" },
    {q_th: "ถ้าแรงลัพธ์เป็นศูนย์ วัตถุจะทำอย่างไร?", q_en: "If the net force is zero, what happens?", a_th: ["หยุดนิ่งเสมอ", "เคลื่อนที่เร็วขึ้น", "หยุดนิ่งหรือคงที่", "ช้าลง"], a_en: ["Always stop", "Accelerate", "Stay still or constant", "Slow down"], correct: 2, th: "กฎข้อที่ 1 ของนิวตัน", en: "Newton's 1st Law.", detail: "วัตถุจะรักษาสภาพเดิม (หยุดนิ่งหรือความเร็วคงที่)" }
];
// (หมายเหตุ: ระบบการทำงานเหมือนชุดที่ 1 เพื่อให้ผู้ใช้งานสะดวกในการนำไปใช้ต่อ)

function renderQuiz() {
    document.getElementById('quiz-area').innerHTML = data.map((q, i) => `
        <div class="q-box">
            <p><strong>${i+1}. ${q.q_th}</strong></p>
            <div class="clue">Clue: ${q.th}</div>
            ${q.a_th.map((opt, o) => `<button onclick="check(${i}, ${o})">${opt}</button>`).join('')}
            <div id="res${i}" class="detail"></div>
        </div>
    `).join('');
}

function check(q, a) {
    const res = document.getElementById('res'+q);
    res.innerHTML = (a === data[q].correct) ? `<span class="correct">ถูกต้อง!</span> ${data[q].detail}` : `<span class="wrong">ผิด!</span> ${data[q].detail}`;
}

function submitQuiz() { alert("วิเคราะห์ผลเสร็จสิ้น: คุณควรทบทวนเรื่อง แรงและการเปลี่ยนสถานะของสาร เพิ่มเติมครับ"); }

renderQuiz();
</script>
<p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
