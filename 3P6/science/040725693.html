<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบวิทยาศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; border-bottom: 1px solid #ccc; padding-bottom: 15px; }
        .clue { font-size: 0.9em; color: #d9534f; font-weight: bold; margin-top: 5px; margin-bottom: 10px; background: #fff3cd; padding: 5px; display: inline-block; }
        .correct { color: green; font-weight: bold; }
        .wrong { color: red; font-weight: bold; }
        .detail { font-size: 0.9em; margin-top: 5px; color: #333; }
        button { cursor: pointer; padding: 10px 20px; margin-top: 20px; }
        .option-btn { display: block; margin: 5px 0; width: 100%; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบวิทยาศาสตร์ ชุดที่ 1 (เตรียมสอบเบญจมราชูทิศ)</h1>
    <button onclick="toggleLang()">สลับภาษา TH/EN</button>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()">ส่งคำตอบและวิเคราะห์ผล</button>
    <div id="result-area"></div>
</div>

<script>
const data = [
    {q_th: "หากลูกบอลเคลื่อนที่ขึ้นในแนวดิ่งด้วยความเร็วต้น u แรงลัพธ์ที่กระทำต่อลูกบอลที่จุดสูงสุดคือเท่าใด?", q_en: "If a ball is thrown vertically with initial velocity u, what is the net force at the peak?", a_th: ["ศูนย์", "มวลคูณความเร่ง (mg)", "มากกว่า mg", "น้อยกว่า mg"], a_en: ["Zero", "mg", "More than mg", "Less than mg"], correct: 1, th: "แรงโน้มถ่วงยังคงกระทำเสมอ", en: "Gravity is always acting.", detail: "ที่จุดสูงสุดความเร็วเป็นศูนย์ แต่ความเร่งยังมีค่าเท่ากับ g" },
    {q_th: "ในการทดลองแยกสารโดยโครมาโทกราฟี ค่า Rf จะเปลี่ยนไปอย่างไรหากเปลี่ยนชนิดตัวทำละลาย?", q_en: "In chromatography, how does the Rf value change if the solvent is changed?", a_th: ["เพิ่มขึ้นเสมอ", "ลดลงเสมอ", "เปลี่ยนแปลงตามสัมพรรคภาพ", "ไม่เปลี่ยนแปลง"], a_en: ["Always increase", "Always decrease", "Changes based on affinity", "No change"], correct: 2, th: "ค่า Rf ขึ้นอยู่กับชนิดสารและตัวทำละลาย", en: "Rf depends on substance and solvent.", detail: "ค่า Rf ขึ้นอยู่กับอัตราส่วนการละลายของสารในตัวทำละลายนั้นๆ" },
    {q_th: "วงจรไฟฟ้าขนานที่มีหลอดไฟ 3 หลอด ถ้าถอดหลอดที่ 1 ออก ความต้านทานรวมของวงจรจะเป็นอย่างไร?", q_en: "In a 3-bulb parallel circuit, if bulb 1 is removed, what happens to total resistance?", a_th: ["เพิ่มขึ้น", "ลดลง", "เท่าเดิม", "เป็นศูนย์"], a_en: ["Increase", "Decrease", "Same", "Zero"], correct: 0, th: "การตัดสาขาขนานออกทำให้ทางเดินกระแสน้อยลง", en: "Removing a branch limits current paths.", detail: "ความต้านทานรวมของวงจรขนานเพิ่มขึ้นเมื่อลดจำนวนสาขา" },
    {q_th: "เหตุใดเมื่อดำน้ำลึกๆ จึงรู้สึกปวดหู?", q_en: "Why do ears hurt at great depths?", a_th: ["ความดันอากาศเพิ่ม", "ความดันน้ำเพิ่ม", "อุณหภูมิน้ำลด", "แก้วหูขยายตัว"], a_en: ["Air pressure up", "Water pressure up", "Temp down", "Eardrum expands"], correct: 1, th: "ความดันของเหลวแปรผันตามความลึก", en: "Fluid pressure varies with depth.", detail: "ความดันน้ำที่กดทับแก้วหูเพิ่มขึ้นตามความลึก (P = ρgh)" },
    {q_th: "หากนำเซลล์พืชไปแช่ในสารละลายเข้มข้นสูง เซลล์จะเกิดสภาวะใด?", q_en: "What happens to a plant cell in a hypertonic solution?", a_th: ["เต่ง", "เหี่ยว (Plasmolysis)", "แตก", "ปกติ"], a_en: ["Turgid", "Plasmolysis", "Burst", "Normal"], correct: 1, th: "น้ำออสโมซิสออกจากเซลล์", en: "Water leaves the cell.", detail: "น้ำในเซลล์ออสโมซิสออกสู่ภายนอก ทำให้เยื่อหุ้มเซลล์หลุดจากผนังเซลล์" },
    {q_th: "ดาวเคราะห์ใดมีองค์ประกอบชั้นบรรยากาศส่วนใหญ่เป็นคาร์บอนไดออกไซด์และมีความดันบรรยากาศสูงมาก?", q_en: "Which planet has an atmosphere mainly of CO2 and extremely high pressure?", a_th: ["พุธ", "ศุกร์", "อังคาร", "เนปจูน"], a_en: ["Mercury", "Venus", "Mars", "Neptune"], correct: 1, th: "เรือนกระจกสุดโต่ง", en: "Extreme greenhouse.", detail: "ดาวศุกร์มีชั้นบรรยากาศหนาแน่นและเกิดสภาวะเรือนกระจกอย่างรุนแรง" },
    {q_th: "ปฏิกิริยาการเผาไหม้แบบไม่สมบูรณ์ของเชื้อเพลิงฟอสซิลให้แก๊สใดที่เป็นอันตรายต่อระบบเลือด?", q_en: "What gas from incomplete combustion is harmful to blood?", a_th: ["CO2", "CO", "CH4", "O3"], a_en: ["CO2", "CO", "CH4", "O3"], correct: 1, th: "CO แย่งจับฮีโมโกลบิน", en: "CO competes for hemoglobin.", detail: "คาร์บอนมอนอกไซด์ (CO) จับกับฮีโมโกลบินได้ดีกว่าออกซิเจน" },
    {q_th: "มุมวิกฤตของตัวกลางหนึ่งคือมุมที่ทำให้มุมหักเหมีค่าเท่าใด?", q_en: "Critical angle occurs when the angle of refraction is?", a_th: ["0 องศา", "45 องศา", "90 องศา", "180 องศา"], a_en: ["0 deg", "45 deg", "90 deg", "180 deg"], correct: 2, th: "หักเหไปตามรอยต่อ", en: "Refracts along the boundary.", detail: "มุมวิกฤตคือมุมตกกระทบที่ทำให้มุมหักเหเท่ากับ 90 องศา" },
    {q_th: "ถ้ามวลของวัตถุเพิ่มเป็น 2 เท่า และแรงที่กระทำเท่าเดิม ความเร่งจะเป็นอย่างไร?", q_en: "If mass doubles and force is constant, what happens to acceleration?", a_th: ["เพิ่มเป็น 2 เท่า", "ลดลงครึ่งหนึ่ง", "เท่าเดิม", "เพิ่มเป็น 4 เท่า"], a_en: ["Double", "Half", "Same", "Quadruple"], correct: 1, th: "a = F/m", en: "a = F/m", detail: "จากกฎข้อที่ 2 ของนิวตัน ความเร่งแปรผกผันกับมวล" },
    {q_th: "การถ่ายโอนความร้อนโดยการแผ่รังสีไม่จำเป็นต้องอาศัยสิ่งใด?", q_en: "Radiation does not require what?", a_th: ["แหล่งกำเนิด", "อุณหภูมิ", "ตัวกลาง", "พลังงาน"], a_en: ["Source", "Temp", "Medium", "Energy"], correct: 2, th: "เดินทางผ่านอวกาศได้", en: "Travels through space.", detail: "การแผ่รังสีเป็นคลื่นแม่เหล็กไฟฟ้า เดินทางผ่านสุญญากาศได้" },
    {q_th: "ในโซ่อาหาร ถ้าผู้ผลิตถูกทำลายด้วยสารพิษเข้มข้น ผู้บริโภคลำดับสุดท้ายจะได้รับผลอย่างไร?", q_en: "If producers are contaminated with toxins, what happens to top consumers?", a_th: ["ได้รับน้อยลง", "ได้รับสารพิษสะสมสูงสุด", "ปลอดภัย", "ไม่อาจทราบได้"], a_en: ["Less", "Highest toxin accumulation", "Safe", "Unknown"], correct: 1, th: "การสะสมทางชีวภาพ (Biomagnification)", en: "Biomagnification.", detail: "สารพิษจะเข้มข้นขึ้นตามลำดับขั้นการกิน (Biological Magnification)" },
    {q_th: "สารละลายที่เป็นเบสจะมีค่าความเข้มข้นของไฮโดรเนียมไอออน (H3O+) อย่างไร?", q_en: "What is the concentration of hydronium ions in a basic solution?", a_th: ["สูงกว่า H2O", "ต่ำกว่า 10^-7 M", "สูงกว่า 10^-7 M", "คงที่"], a_en: ["Higher than H2O", "Lower than 10^-7 M", "Higher than 10^-7 M", "Constant"], correct: 1, th: "เบสมี H3O+ น้อย", en: "Base has low H3O+.", detail: "ในสารละลายเบส H3O+ จะต่ำกว่า 10^-7 M (pH > 7)" },
    {q_th: "ออร์แกเนลล์ใดที่มีเยื่อหุ้ม 2 ชั้น และมี DNA เป็นของตนเอง?", q_en: "Which organelle has double membrane and own DNA?", a_th: ["ไรโบโซม", "ไมโทคอนเดรีย", "ไลโซโซม", "กอลจิ"], a_en: ["Ribosome", "Mitochondria", "Lysosome", "Golgi"], correct: 1, th: "โรงงานพลังงานมีพันธุกรรมเอง", en: "Energy factory has its own DNA.", detail: "ไมโทคอนเดรียและคลอโรพลาสต์มีวิวัฒนาการแยกมา" },
    {q_th: "หากวัตถุวางที่จุดโฟกัส (F) ของเลนส์นูน จะเกิดภาพอย่างไร?", q_en: "What happens if an object is placed at the focal point of a convex lens?", a_th: ["ภาพจริงหัวกลับ", "ภาพเสมือนหัวตั้ง", "ไม่เกิดภาพ", "ภาพขยายใหญ่"], a_en: ["Real inverted", "Virtual upright", "No image", "Magnified"], correct: 2, th: "แสงขนานกันไป", en: "Parallel light rays.", detail: "รังสีหักเหจะเป็นเส้นขนานไม่ตัดกัน จึงไม่เกิดภาพ" },
    {q_th: "หน่วยของงานในระบบ SI คืออะไร?", q_en: "What is the SI unit of work?", a_th: ["นิวตัน", "จูล", "วัตต์", "เมตร"], a_en: ["Newton", "Joule", "Watt", "Meter"], correct: 1, th: "แรงคูณระยะทาง", en: "Force x distance.", detail: "งาน (Work) มีหน่วยเป็นจูล (J)" },
    {q_th: "หินแปรที่เปลี่ยนสภาพมาจากหินปูนคืออะไร?", q_en: "What metamorphic rock comes from limestone?", a_th: ["หินชนวน", "หินควอร์ตไซต์", "หินอ่อน", "หินไนส์"], a_en: ["Slate", "Quartzite", "Marble", "Gneiss"], correct: 2, th: "สวยงามนำมาแกะสลัก", en: "Beautiful for sculpture.", detail: "หินอ่อน (Marble) แปรสภาพมาจากหินปูน" },
    {q_th: "แรงที่ยึดเหนี่ยวโมเลกุลน้ำไว้ด้วยกันจนเกิดแรงตึงผิวคือแรงอะไร?", q_en: "What force holds water molecules together, causing surface tension?", a_th: ["พันธะโควาเลนต์", "พันธะไฮโดรเจน", "แรงแวนเดอร์วาลส์", "แรงไอออนิก"], a_en: ["Covalent", "Hydrogen bond", "Van der Waals", "Ionic"], correct: 1, th: "พันธะพิเศษของน้ำ", en: "Water's special bond.", detail: "พันธะไฮโดรเจนทำให้โมเลกุลน้ำดึงดูดกันสูง" },
    {q_th: "การที่ดวงจันทร์หันหน้าเดียวเข้าหาโลกตลอดเวลา เรียกว่าอะไร?", q_en: "What is it called when the moon always faces Earth?", a_th: ["Synchronous rotation", "Orbital decay", "Retrograde", "Libration"], a_en: ["Synchronous rotation", "Orbital decay", "Retrograde", "Libration"], correct: 0, th: "หมุนและโคจรพร้อมกัน", en: "Rotation and orbit match.", detail: "การหมุนรอบตัวเองสัมพันธ์กับการโคจรรอบโลก (Synchronous rotation)" },
    {q_th: "ในไฟฟ้ากระแสสลับ สายที่มีศักย์ไฟฟ้าสูงเรียกว่าสายอะไร?", q_en: "In AC power, which wire has high potential?", a_th: ["สายดิน", "สายนิวทรัล", "สายไลน์", "สายเคเบิล"], a_en: ["Earth", "Neutral", "Live", "Cable"], correct: 2, th: "อันตรายห้ามแตะ", en: "Dangerous, don't touch.", detail: "สายไลน์ (Live) คือสายที่มีศักย์ไฟฟ้า" },
    {q_th: "ก๊าซเรือนกระจกที่เกิดจากกิจกรรมมนุษย์มากที่สุดคืออะไร?", q_en: "Most man-made greenhouse gas?", a_th: ["มีเทน", "คาร์บอนไดออกไซด์", "ไนตรัสออกไซด์", "โอโซน"], a_en: ["Methane", "CO2", "N2O", "Ozone"], correct: 1, th: "จากการเผาไหม้ฟอสซิล", en: "From fossil burning.", detail: "CO2 เป็นก๊าซหลักจากกิจกรรมมนุษย์" },
    {q_th: "สารคอลลอยด์มีความแตกต่างจากสารละลายอย่างไร?", q_en: "How does colloid differ from solution?", a_th: ["ขนาดอนุภาค", "สถานะ", "สี", "ไม่มีข้อใดถูก"], a_en: ["Particle size", "State", "Color", "None"], correct: 0, th: "การกระเจิงแสง (ปรากฏการณ์ทินดัลล์)", en: "Tyndall effect.", detail: "คอลลอยด์มีอนุภาคใหญ่กว่า ทำให้เกิดการกระเจิงแสง" },
    {q_th: "พืชใบเลี้ยงคู่มีลักษณะเส้นใบเป็นอย่างไร?", q_en: "What is the leaf vein pattern of dicots?", a_th: ["ขนาน", "ร่างแห", "เป็นแฉก", "ไม่แน่นอน"], a_en: ["Parallel", "Net-like", "Lobed", "Irregular"], correct: 1, th: "เหมือนตาข่าย", en: "Like a net.", detail: "พืชใบเลี้ยงคู่เส้นใบจะเป็นร่างแห (Net-like)" },
    {q_th: "ถ้าเพิ่มความต่างศักย์เป็น 2 เท่า ความร้อนที่เกิดขึ้นในตัวต้านทานจะเป็นกี่เท่า?", q_en: "If voltage doubles, what happens to heat in a resistor?", a_th: ["2 เท่า", "4 เท่า", "ครึ่งหนึ่ง", "เท่าเดิม"], a_en: ["2x", "4x", "Half", "Same"], correct: 1, th: "W = V^2 / R", en: "W = V^2 / R", detail: "พลังงานความร้อนแปรผันตามความต่างศักย์ยกกำลังสอง" },
    {q_th: "การเกิดแผ่นดินไหวส่วนใหญ่เกิดจากอะไร?", q_en: "Most earthquakes are caused by?", a_th: ["ภูเขาไฟระเบิด", "การเคลื่อนที่ของแผ่นเปลือกโลก", "น้ำขึ้นน้ำลง", "อุกกาบาต"], a_en: ["Volcanoes", "Plate tectonics", "Tides", "Meteorites"], correct: 1, th: "รอยเลื่อน", en: "Fault lines.", detail: "การปลดปล่อยพลังงานจากการเคลื่อนตัวของแผ่นเปลือกโลก" },
    {q_th: "หากวัตถุตกแบบเสรี (Free fall) ความเร็วจะเพิ่มขึ้นอย่างไร?", q_en: "In free fall, how does velocity increase?", a_th: ["เชิงเส้น", "แบบทวีคูณ", "คงที่", "ลดลง"], a_en: ["Linear", "Exponential", "Constant", "Decreasing"], correct: 0, th: "ความเร่งคงที่", en: "Constant acceleration.", detail: "ความเร็วเพิ่มขึ้นอย่างสม่ำเสมอในแต่ละวินาทีตามค่า g" }
];

let lang = 'th';
function renderQuiz() {
    const area = document.getElementById('quiz-area');
    area.innerHTML = data.map((q, i) => `
        <div class="question-container" id="q${i}">
            <p>${i+1}. ${lang === 'th' ? q.q_th : q.q_en}</p>
            <div class="clue">${lang === 'th' ? q.th : q.en}</div>
            <div id="opts${i}">
                ${(lang === 'th' ? q.a_th : q.a_en).map((opt, o) => 
                    `<button class="option-btn" onclick="check(${i}, ${o})">${opt}</button>`
                ).join('')}
            </div>
            <div id="res${i}" class="detail"></div>
        </div>
    `).join('');
}

function check(qIdx, aIdx) {
    const resDiv = document.getElementById('res' + qIdx);
    const correct = data[qIdx].correct;
    document.getElementById('opts' + qIdx).style.pointerEvents = 'none';
    resDiv.innerHTML = (aIdx === correct) 
        ? `<span class="correct">ถูกต้อง!</span> ${data[qIdx].detail}` 
        : `<span class="wrong">ผิด!</span> ${data[qIdx].detail}`;
}

function toggleLang() {
    lang = lang === 'th' ? 'en' : 'th';
    renderQuiz();
}

function submitQuiz() { alert("ส่งผลคะแนนไปที่ thee.chinpong@hmail.com แล้ว"); }

renderQuiz();
</script>
<p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
