<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาศาสตร์สอบเข้า ม.1 - เบ็ญจมราชูทิศ (ระดับยากมาก)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main-content { flex: 70%; padding: 20px; overflow-y: auto; }
        .whiteboard { flex: 30%; background: #2c3e50; padding: 15px; border-left: 4px solid #34495e; color: white; display: flex; flex-direction: column; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #dee2e6; border-radius: 10px; background: #fafafa; }
        .options button { display: block; width: 100%; margin: 8px 0; padding: 12px; cursor: pointer; border: 1px solid #ced4da; border-radius: 6px; text-align: left; background: white; transition: 0.2s; }
        .options button:hover { background: #e9ecef; }
        .correct { background: #28a745 !important; color: white; }
        .wrong { background: #dc3545 !important; color: white; }
        .detail { display: none; margin-top: 15px; padding: 15px; background: #e7f1ff; border-left: 5px solid #007bff; }
        canvas { background: white; flex-grow: 1; border-radius: 5px; cursor: crosshair; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <h1>ข้อสอบวิทยาศาสตร์สอบเข้า ม.1 (25 ข้อ)</h1>
            <div id="quiz-area"></div>
            <button onclick="submitQuiz()" style="width:100%; padding:15px; background:#34495e; color:white; border:none; border-radius:10px; cursor:pointer;">ส่งข้อสอบ</button>
        </div>
    </div>
    <div class="whiteboard">
        <h2>Whiteboard (ทดเลข)</h2>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const questions = [
            { q: "ถ้าเพิ่มความเข้มแสงในการทดลองสังเคราะห์ด้วยแสงจนเกินจุดอิ่มตัว แล้วเพิ่ม CO2 เข้าไป ผลจะเป็นอย่างไร", a: ["อัตราเพิ่มขึ้น", "อัตราลดลง", "อัตราคงที่", "ไม่มีผล"], correct: "อัตราเพิ่มขึ้น", detail: "เมื่อแสงอิ่มตัว CO2 จะกลายเป็นปัจจัยจำกัดทันที", clue: "กฎปัจจัยจำกัด" },
            { q: "สารละลาย A มี pH 2 สารละลาย B มี pH 5 สารใดมีความเข้มข้นของไฮโดรเจนไอออนมากกว่า", a: ["A มากกว่า B 1,000 เท่า", "B มากกว่า A 1,000 เท่า", "A มากกว่า B 3 เท่า", "เท่ากัน"], correct: "A มากกว่า B 1,000 เท่า", detail: "ค่า pH เปลี่ยน 1 หน่วย ความเข้มข้นเปลี่ยน 10 เท่า (10³)", clue: "ค่า pH แบบ Logarithm" },
            { q: "วงจรไฟฟ้าขนานที่มีความต้านทานเท่ากัน 3 ตัวต่อกับแหล่งจ่าย 12V หากความต้านทานตัวหนึ่งขาด จะเกิดอะไรขึ้น", a: ["แรงดันคงเดิม", "แรงดันเป็นศูนย์", "กระแสรวมเพิ่ม", "กระแสรวมลด"], correct: "แรงดันคงเดิม", detail: "วงจรขนานมีแรงดันตกคร่อมแต่ละสาขาเท่ากันเสมอ", clue: "คุณสมบัติวงจรขนาน" },
            { q: "เมื่อโยนวัตถุขึ้นในแนวดิ่ง ณ จุดสูงสุด วัตถุมีสภาพอย่างไร", a: ["ความเร็วเป็นศูนย์ ความเร่งไม่เป็นศูนย์", "ความเร็วไม่เป็นศูนย์ ความเร่งเป็นศูนย์", "ทั้งคู่เป็นศูนย์", "ทั้งคู่ไม่เป็นศูนย์"], correct: "ความเร็วเป็นศูนย์ ความเร่งไม่เป็นศูนย์", detail: "แรงโน้มถ่วงยังคงกระทำอยู่ตลอดเวลา", clue: "กท. แรงโน้มถ่วง" },
            { q: "การถ่ายทอดพลังงานในโซ่อาหาร สูญเสียพลังงานในรูปใดมากที่สุด", a: ["ความร้อน", "แสง", "เสียง", "แรงกล"], correct: "ความร้อน", detail: "ตามกฎ 10% พลังงานส่วนใหญ่สูญเสียไปกับการหายใจและคายความร้อน", clue: "กฎ 10 เปอร์เซ็นต์" },
            { q: "หากนำเซลล์เม็ดเลือดแดงแช่ในสารละลายเข้มข้นสูง (Hypertonic) จะเกิดอะไรขึ้น", a: ["เซลล์เหี่ยว", "เซลล์เต่ง", "เซลล์แตก", "ไม่เปลี่ยนแปลง"], correct: "เซลล์เหี่ยว", detail: "น้ำจากในเซลล์จะแพร่ออกสู่ภายนอก", clue: "ออสโมซิส" },
            { q: "สารใดมีสมบัติเป็นสารประกอบเชิงเดี่ยวที่แสดงสมบัติเป็นกรด-เบาตามทฤษฎี Arrhenius", a: ["HCl", "NaOH", "NH3", "CH3COOH"], correct: "HCl", detail: "แตกตัวให้ H+ ในน้ำ", clue: "ทฤษฎีการแตกตัว" },
            { q: "ลูกตุ้มนาฬิกาที่สั่นแกว่ง หากเพิ่มความยาวเชือก 4 เท่า คาบการแกว่งจะเป็นอย่างไร", a: ["เพิ่มขึ้น 2 เท่า", "เพิ่มขึ้น 4 เท่า", "ลดลง 2 เท่า", "คงที่"], correct: "เพิ่มขึ้น 2 เท่า", detail: "T แปรผันตรงกับ √L", clue: "ความสัมพันธ์คาบและรากที่สองของความยาว" },
            { q: "ในปฏิกิริยาสะเทิน กรด + เบา ได้ผลิตภัณฑ์คือ", a: ["เกลือ + น้ำ", "เกลือ + แก๊ส", "น้ำ + แก๊ส", "กรดเข้มข้น"], correct: "เกลือ + น้ำ", detail: "ผลผลิตจากการรวมตัวของ H+ และ OH-", clue: "ปฏิกิริยาสะเทิน" },
            { q: "ดาวเคราะห์ใดมีคาบการหมุนรอบตัวเองสั้นที่สุด", a: ["พฤหัสบดี", "โลก", "ศุกร์", "อังคาร"], correct: "พฤหัสบดี", detail: "หมุนเร็วมากเพียง 9.9 ชั่วโมงต่อรอบ", clue: "ดาวก๊าซขนาดใหญ่" },
            { q: "หน่วยพื้นฐานของพันธุกรรมคือ", a: ["ยีน", "โครโมโซม", "ดีเอ็นเอ", "เซลล์"], correct: "ยีน", detail: "ยีนคือลำดับนิวคลีโอไทด์ที่กำหนดลักษณะ", clue: "รหัสพันธุกรรม" },
            { q: "ความดันของแก๊สในภาชนะปิด เมื่อเพิ่มอุณหภูมิโดยปริมาตรคงที่", a: ["เพิ่มขึ้น", "ลดลง", "คงที่", "เป็นศูนย์"], correct: "เพิ่มขึ้น", detail: "ตามกฎของชาร์ลส์/เกย์-ลูสแซก", clue: "พลังงานจลน์โมเลกุล" },
            { q: "คลื่นแม่เหล็กไฟฟ้าชนิดใดมีพลังงานสูงสุด", a: ["รังสีแกมมา", "เอ็กซ์เรย์", "แสง", "คลื่นวิทยุ"], correct: "รังสีแกมมา", detail: "ความถี่สูงที่สุด", clue: "พลังงานแปรผันตามความถี่" },
            { q: "ข้อใดคือโครงสร้างหลักของคานอันดับ 1", a: ["จุดหมุนอยู่ตรงกลาง", "แรงอยู่ตรงกลาง", "น้ำหนักอยู่ตรงกลาง", "ไม่มีจุดหมุน"], correct: "จุดหมุนอยู่ตรงกลาง", detail: "เช่น คีม, กรรไกร", clue: "ตำแหน่งฟูลครัม" },
            { q: "หากพืชขาดธาตุแมกนีเซียม จะส่งผลกระทบโดยตรงต่อสิ่งใด", a: ["การสร้างคลอโรฟิลล์", "การดูดน้ำ", "การออกดอก", "การสะสมแป้ง"], correct: "การสร้างคลอโรฟิลล์", detail: "Mg เป็นส่วนประกอบกลางของโมเลกุลคลอโรฟิลล์", clue: "ธาตุอาหารสีเขียว" },
            { q: "การที่วัตถุจมหรือลอยในของเหลว ขึ้นอยู่กับค่าใด", a: ["ความหนาแน่น", "น้ำหนัก", "ปริมาตร", "ความสูง"], correct: "ความหนาแน่น", detail: "แรงพยุงเทียบกับน้ำหนัก", clue: "กฎของอาร์คิมิดีส" },
            { q: "ปรากฏการณ์สุริยุปราคาเกิดขึ้นเมื่อ", a: ["ดวงจันทร์อยู่ระหว่างโลกและดวงอาทิตย์", "โลกอยู่ระหว่างดวงจันทร์และดวงอาทิตย์", "ดวงอาทิตย์อยู่ตรงกลาง", "โลกหมุนรอบตัวเอง"], correct: "ดวงจันทร์อยู่ระหว่างโลกและดวงอาทิตย์", detail: "เงาจันทร์ตกบนโลก", clue: "ตำแหน่งดวงจันทร์" },
            { q: "สารผสมใดสามารถแยกได้ด้วยการกลั่นลำดับส่วน", a: ["เอทานอลกับน้ำ", "ทรายกับน้ำ", "น้ำมันกับน้ำ", "เกลือกับน้ำ"], correct: "เอทานอลกับน้ำ", detail: "อาศัยจุดเดือดที่ต่างกัน", clue: "ความแตกต่างจุดเดือด" },
            { q: "แรงลัพธ์ที่กระทำต่อวัตถุเป็นศูนย์ หมายความว่า", a: ["วัตถุหยุดนิ่งหรือเคลื่อนที่ด้วยความเร็วคงที่", "วัตถุต้องหยุดนิ่ง", "วัตถุต้องมีความเร่ง", "วัตถุหยุดหมุน"], correct: "วัตถุหยุดนิ่งหรือเคลื่อนที่ด้วยความเร็วคงที่", detail: "กฎข้อที่ 1 ของนิวตัน", clue: "กฎความเฉื่อย" },
            { q: "ในอวัยวะใดของมนุษย์ที่เกิดการแลกเปลี่ยนแก๊สมากที่สุด", a: ["ถุงลมปอด", "หลอดลม", "ขั้วปอด", "หัวใจ"], correct: "ถุงลมปอด", detail: "เพิ่มพื้นที่ผิวด้วยเส้นเลือดฝอย", clue: "พื้นที่ผิวสัมผัส" },
            { q: "สารกัมมันตรังสีที่มีครึ่งชีวิตสั้นจะมีลักษณะอย่างไร", a: ["แผ่รังสีเข้มข้นในเวลาสั้น", "สลายตัวช้ามาก", "ไม่แผ่รังสี", "มีมวลเพิ่มขึ้น"], correct: "แผ่รังสีเข้มข้นในเวลาสั้น", detail: "อัตราการสลายตัวสูง", clue: "ครึ่งชีวิต" },
            { q: "อุณหภูมิที่สารเปลี่ยนจากของแข็งเป็นของเหลวเรียกว่า", a: ["จุดหลอมเหลว", "จุดเดือด", "จุดเยือกแข็ง", "จุดควบแน่น"], correct: "จุดหลอมเหลว", detail: "พลังงานใช้ทำลายแรงยึดเหนี่ยว", clue: "การเปลี่ยนสถานะ" },
            { q: "เซลล์พืชประเภทใดที่ไม่มีคลอโรพลาสต์", a: ["เซลล์ราก", "เซลล์ใบ", "เซลล์กิ่ง", "เซลล์ดอก"], correct: "เซลล์ราก", detail: "ไม่ได้รับแสง จึงไม่มีการสังเคราะห์แสง", clue: "แหล่งที่อยู่ของเซลล์" },
            { q: "แรงที่ทำให้วัตถุเคลื่อนที่ในแนววงกลมเรียกว่า", a: ["แรงสู่ศูนย์กลาง", "แรงหนีศูนย์กลาง", "แรงเสียดทาน", "แรงโน้มถ่วง"], correct: "แรงสู่ศูนย์กลาง", detail: "ดึงวัตถุเข้าหาศูนย์กลางเสมอ", clue: "แนวโค้ง" },
            { q: "ข้อใดไม่ใช่กระบวนการของวิทยาศาสตร์", a: ["การคาดเดาโดยไม่มีข้อมูล", "การสังเกต", "การทดลอง", "การตั้งสมมติฐาน"], correct: "การคาดเดาโดยไม่มีข้อมูล", detail: "วิทยาศาสตร์ต้องมีหลักฐาน", clue: "กระบวนการที่เป็นระบบ" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-area');
            questions.forEach((q, i) => {
                let html = `<div class="question"><p><strong>${i+1}. ${q.q}</strong></p><div class="options">`;
                q.a.forEach(opt => html += `<button onclick="check(this, '${opt}', '${q.correct}', ${i})">${opt}</button>`);
                html += `</div><div class="detail" id="d${i}"><strong>เฉลย:</strong> ${q.detail}<br><em>Clue: ${q.clue}</em></div></div>`;
                container.innerHTML += html;
            });
        }

        function check(btn, choice, correct, i) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.style.pointerEvents = 'none');
            const isCorrect = choice === correct;
            btn.classList.add(isCorrect ? 'correct' : 'wrong');
            document.getElementById('d'+i).style.display = 'block';
        }

        function submitQuiz() {
            alert("คะแนนของคุณถูกส่งไปยัง thee.chinpong@hmail.com เรียบร้อยแล้ว!");
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let draw = false;
        canvas.onmousedown = () => draw = true;
        canvas.onmouseup = () => draw = false;
        canvas.onmousemove = (e) => { if(draw) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
        renderQuiz();
    </script>
</body>
</html>
