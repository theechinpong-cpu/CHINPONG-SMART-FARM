<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบสมการ 2 ตัวแปร (Verified Edition)</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question-box { margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; }
        .clue { background: #e7f3ff; padding: 10px; border-left: 5px solid #2196F3; margin: 10px 0; font-size: 0.9em; }
        .detail { color: #d32f2f; font-weight: bold; margin-top: 10px; display: none; padding: 10px; background: #fff; border: 1px dashed #d32f2f; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: white; }
        .correct { background: #c8e6c9 !important; border-color: #2e7d32 !important; }
        .wrong { background: #ffcdd2 !important; border-color: #c62828 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">ข้อสอบสมการ 2 ตัวแปร (ฉบับปรับปรุง)</h2>
    <button onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    <div id="quiz-container"></div>
</div>

<script>
    let lang = 'th';
    // Index ของ correct คือ 0=ก, 1=ข, 2=ค, 3=ง
    const quizData = [
        { q_th: "1. x + y = 10, x = 3, y คือ?", a_th: ["5", "7", "8", "13"], correct: 1, th: "ย้าย 3 ไปลบออกจาก 10", detail: "y = 10 - 3 = 7" },
        { q_th: "2. a - b = 5, b = 2, a คือ?", a_th: ["3", "5", "7", "10"], correct: 2, th: "ย้าย 2 ไปบวกกับ 5", detail: "a = 5 + 2 = 7" },
        { q_th: "3. 2x = y, x = 4, y คือ?", a_th: ["2", "4", "6", "8"], correct: 3, th: "นำ 2 คูณ 4", detail: "y = 2 * 4 = 8" },
        { q_th: "4. x + 5 = y, x = 2, y คือ?", a_th: ["5", "7", "9", "10"], correct: 1, th: "แทนค่า 2 ลงใน x", detail: "y = 2 + 5 = 7" },
        { q_th: "5. y - 3 = x, y = 10, x คือ?", a_th: ["5", "7", "8", "13"], correct: 1, th: "แทน 10 ลงใน y", detail: "x = 10 - 3 = 7" },
        { q_th: "6. x + y = 15, x = 5, y คือ?", a_th: ["5", "10", "15", "20"], correct: 1, th: "15 ลบ 5", detail: "y = 15 - 5 = 10" },
        { q_th: "7. 3x = y, x = 3, y คือ?", a_th: ["3", "6", "9", "12"], correct: 2, th: "3 คูณ 3", detail: "y = 3 * 3 = 9" },
        { q_th: "8. x - 4 = y, x = 10, y คือ?", a_th: ["4", "6", "14", "40"], correct: 1, th: "10 ลบ 4", detail: "y = 10 - 4 = 6" },
        { q_th: "9. 2x + 1 = y, x = 2, y คือ?", a_th: ["3", "4", "5", "6"], correct: 2, th: "คูณก่อนแล้วค่อยบวก", detail: "y = 2(2) + 1 = 5" },
        { q_th: "10. x/2 = y, x = 8, y คือ?", a_th: ["2", "4", "10", "16"], correct: 1, th: "8 หารด้วย 2", detail: "y = 8 / 2 = 4" },
        { q_th: "11. x + y = 20, y = 10, x คือ?", a_th: ["5", "10", "15", "30"], correct: 1, th: "20 หัก 10", detail: "x = 20 - 10 = 10" },
        { q_th: "12. 4x = 20, x คือ?", a_th: ["4", "5", "16", "24"], correct: 1, th: "อะไรคูณ 4 ได้ 20", detail: "x = 20 / 4 = 5" },
        { q_th: "13. x - 7 = 3, x คือ?", a_th: ["4", "7", "9", "10"], correct: 3, th: "ย้าย 7 ไปบวก", detail: "x = 3 + 7 = 10" },
        { q_th: "14. 5 + x = 12, x คือ?", a_th: ["5", "7", "17", "60"], correct: 1, th: "12 ลบ 5", detail: "x = 12 - 5 = 7" },
        { q_th: "15. 2x = 14, x คือ?", a_th: ["5", "7", "12", "28"], correct: 1, th: "14 หาร 2", detail: "x = 14 / 2 = 7" },
        { q_th: "16. x + 3 = 10, x คือ?", a_th: ["5", "7", "13", "30"], correct: 1, th: "10 ลบ 3", detail: "x = 10 - 3 = 7" },
        { q_th: "17. y - 5 = 15, y คือ?", a_th: ["10", "15", "20", "75"], correct: 2, th: "15 บวก 5", detail: "y = 15 + 5 = 20" },
        { q_th: "18. 3x = 12, x คือ?", a_th: ["2", "4", "9", "36"], correct: 1, th: "12 หาร 3", detail: "x = 12 / 3 = 4" },
        { q_th: "19. x/4 = 3, x คือ?", a_th: ["0.75", "7", "12", "16"], correct: 2, th: "4 คูณ 3", detail: "x = 3 * 4 = 12" },
        { q_th: "20. 2x + 2 = 10, x คือ?", a_th: ["2", "4", "6", "8"], correct: 1, th: "10 ลบ 2 แล้วหาร 2", detail: "x = (10-2)/2 = 4" },
        { q_th: "21. x + y = 25, x = 12, y คือ?", a_th: ["12", "13", "25", "37"], correct: 1, th: "25 ลบ 12", detail: "y = 25 - 12 = 13" },
        { q_th: "22. 2x - 1 = 7, x คือ?", a_th: ["3", "4", "5", "8"], correct: 1, th: "7 บวก 1 แล้วหาร 2", detail: "x = 8 / 2 = 4" },
        { q_th: "23. 3x + 3 = 18, x คือ?", a_th: ["3", "5", "7", "9"], correct: 1, th: "18 ลบ 3 แล้วหาร 3", detail: "x = 15 / 3 = 5" },
        { q_th: "24. 5x = 25, x คือ?", a_th: ["4", "5", "10", "20"], correct: 1, th: "25 หาร 5", detail: "x = 25 / 5 = 5" },
        { q_th: "25. x + 10 = 20, x คือ?", a_th: ["10", "20", "30", "200"], correct: 0, th: "20 ลบ 10", detail: "x = 20 - 10 = 10" }
    ];

    function render() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        quizData.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'question-box';
            div.innerHTML = `
                <p><strong>${item.q_th}</strong></p>
                <div class="clue">${item.th}</div>
                ${item.a_th.map((opt, j) => 
                    `<button class="option-btn" onclick="check(${i}, ${j}, this)">${String.fromCharCode(65+j)}. ${opt}</button>`
                ).join('')}
                <div class="detail" id="d${i}">เฉลย: ${item.detail}</div>
            `;
            container.appendChild(div);
        });
    }

    function check(qIdx, aIdx, btn) {
        const parent = btn.parentElement;
        parent.querySelectorAll('button').forEach(b => b.disabled = true);
        if (aIdx === quizData[qIdx].correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            parent.querySelectorAll('button')[quizData[qIdx].correct].classList.add('correct');
        }
        document.getElementById('d' + qIdx).style.display = 'block';
    }

    render();
</script>
<p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
