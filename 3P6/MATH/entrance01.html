<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบข้อสอบคณิตศาสตร์ สอบเข้า ม.1 (ชุดที่ 1)</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #f7fafc;
            --accent-color: #ff6600;
            --success-color: #d4edda;
            --success-border: #c3e6cb;
            --success-text: #155724;
            --text-color: #2d3748;
        }

        body { font-family: 'Sarabun', Tahoma, sans-serif; background-color: var(--secondary-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--primary-color); padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 26px; }
        .instructions { background-color: #ebf8ff; border-left: 5px solid #3182ce; padding: 15px; margin-bottom: 25px; font-size: 14px; }
        .question-container { border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 25px; transition: all 0.3s ease; }
        .question-title { font-weight: bold; font-size: 17px; margin-bottom: 15px; color: var(--primary-color); }
        .options-list { list-style-type: none; padding: 0; }
        .option-item { margin-bottom: 10px; padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; display: flex; align-items: center; }
        .explanation-box { display: none; margin-top: 15px; padding: 15px; border-radius: 6px; border-left: 5px solid #38a169; background-color: #f0fff4; font-size: 14px; }
        .tip-box { background-color: #fffaf0; border-left: 5px solid #dd6b20; padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 13px; color: #7b341e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>แนวข้อสอบคณิตศาสตร์ สอบเข้า ม.1 (ชุดที่ 1)</h1>
        <p>ระดับกลาง - 25 ข้อ</p>
    </div>

    <div class="instructions">
        <strong>คำชี้แจง:</strong> คลิกที่ตัวเลือกเพื่อตรวจสอบเฉลย วิธีคิด และเคล็ดลับ (Tips)
    </div>

    <div id="quiz-content"></div>

</div>

<script>
    const questions = [
        { q: "1. จำนวนนับตั้งแต่ 100 ถึง 150 มีกี่จำนวนที่มี 8 เป็นตัวประกอบ", o: ["4", "5", "6", "7"], a: 2, e: "104, 112, 120, 128, 136, 144 (รวม 6 จำนวน)", t: "เริ่มหาจากจำนวนที่ใกล้ 100 ที่สุดที่ 8 หารลงตัว แล้วบวกเพิ่มทีละ 8" },
        { q: "2. จำนวนในข้อใดต่อไปนี้มีค่าน้อยที่สุด", o: ["0.77", "0.777", "6/8", "5/7"], a: 3, e: "5/7 ≈ 0.71, 6/8 = 0.75 ดังนั้น 0.71 น้อยที่สุด", t: "แปลงเป็นทศนิยมให้หมดก่อนเปรียบเทียบ" },
        { q: "3. เอซื้อกระเป๋ามา 40,000 ขายไป 35,000 เอขาดทุนร้อยละเท่าใด", o: ["10", "12.5", "15", "17.5"], a: 1, e: "(5,000/40,000) * 100 = 12.5", t: "สูตร: (ส่วนต่าง/ต้นทุน) * 100" },
        { q: "4. จำนวนนับที่มากที่สุดที่หาร 76, 112 และ 130 แล้วเหลือเศษ 4", o: ["14", "16", "18", "21"], a: 2, e: "หา ห.ร.ม. ของ 72, 108, 126 คือ 18", t: "ลบเศษออกก่อนหา ห.ร.ม." },
        { q: "5. ค่าเฉลี่ยของ 22, 25, 30, 32, 25, 24, 31", o: ["26", "27", "28", "29"], a: 1, e: "(22+25+30+32+25+24+31) / 7 = 27", t: "ค่าเฉลี่ยคือ ผลรวมทั้งหมดหารด้วยจำนวนข้อมูล" },
        { q: "6. วิ่ง 1 ชม. ใช้ 300 แคลอรี่ ถ้าวิ่ง 150 นาที ใช้กี่แคลอรี่", o: ["600", "675", "725", "750"], a: 3, e: "150 นาที = 2.5 ชม. -> 2.5 * 300 = 750", t: "แปลงหน่วยเวลาก่อนคำนวณ" },
        { q: "7. แชมพู 6 ขวด 360 บาท ถ้าจ่าย 540 บาท ได้กี่ขวด", o: ["8", "9", "10", "11"], a: 1, e: "ขวดละ 60 บาท -> 540/60 = 9", t: "หาราคาต่อหน่วยก่อน" },
        { q: "8. ซื้อขนมราคา 8, 12, 15, 20 บาท เท่ากันอย่างน้อยต้องซื้อกี่บาท", o: ["60", "120", "180", "240"], a: 1, e: "ค.ร.น. ของ 8, 12, 15, 20 คือ 120", t: "ใช้ ค.ร.น. ในการหาจำนวนเงินที่น้อยที่สุด" },
        { q: "9. จากข้อ 8 ได้ขนมรวมกี่ชิ้น", o: ["39", "41", "42", "44"], a: 0, e: "120/8 + 120/12 + 120/15 + 120/20 = 15+10+8+6 = 39", t: "หาจำนวนชิ้นของแต่ละอย่างแล้วบวกกัน" },
        { q: "10. ผลหารในข้อใดมีค่ามากที่สุด", o: ["0.63/0.09", "2.1/0.3", "0.028/0.0004", "490/0.07"], a: 3, e: "7, 7, 70, 7000 ตามลำดับ", t: "เลื่อนจุดทศนิยมให้ตัวหารเป็นจำนวนเต็มก่อน" },
        { q: "11. อัตราส่วนใดเท่ากับ 48 : 18", o: ["96:54", "33:16", "20:3", "16:6"], a: 3, e: "48:18 หารด้วย 3 = 16:6", t: "หารทั้งสองจำนวนด้วยค่าคงที่เดียวกัน" },
        { q: "12. แบบรูป 1, 1, 1, 2, 1, 3, 1, 4... จำนวนที่ 22 คือ", o: ["1", "11", "22", "24"], a: 0, e: "เลขคี่คือ 1, เลขคู่ (n) คือ n/2", t: "แยกพิจารณาตำแหน่งเลขคี่และเลขคู่" },
        { q: "13. มาตราส่วน 1:100 ม. วัดได้ 16 ซม. วิ่ง 9.6 กม. ต้องกี่รอบ", o: ["0.6", "6", "60", "66"], a: 1, e: "16 ซม. = 16 ม. = 0.016 กม. -> 9.6 / 1.6 = 6", t: "ระวังหน่วย เซนติเมตร/เมตร/กิโลเมตร" },
        { q: "14. แบบรูป 1, 1+2, 1+2+3... จำนวน 210 คือลำดับที่เท่าใด", o: ["21", "13", "17", "20"], a: 3, e: "n(n+1)/2 = 210 -> n(n+1)=420", t: "สูตรผลรวมเลขเรียง: n(n+1)/2" },
        { q: "15. ออกกำลังวันละ 25 นาที นาน 3 สัปดาห์ 4 วัน รวมกี่ชม.กี่นาที", o: ["10ชม.25น.", "10ชม.50น.", "11ชม.25น.", "11ชม.50น."], a: 3, e: "25 วัน * 25 นาที = 625 นาที", t: "รวมจำนวนวันให้ถูกก่อนคูณ" },
        { q: "16. เรียงลำดับมุม: แหลม ฉาก กลับ", o: ["ฉาก แหลม กลับ", "ฉาบ กลับ แหลม", "แหลม ฉาก กลับ", "แหลม กลับ ฉาก"], a: 2, e: "แหลม < 90, ฉาก = 90, กลับ > 180", t: "จำขนาดมุมพื้นฐานให้แม่น" },
        { q: "17. มุมภายในรูปเจ็ดเหลี่ยมรวมกี่องศา", o: ["720", "900", "1080", "1260"], a: 1, e: "(7-2)*180 = 900", t: "สูตร: (n-2)*180" },
        { q: "18. ถัง 60x70x80 ซม. น้ำ 65% เติมอีกกี่ลิตรถึงเต็ม", o: ["117.6", "151.2", "184.8", "218.4"], a: 2, e: "35% ของปริมาตร = 0.35 * 336,000", t: "1,000 ลบ.ซม. = 1 ลิตร" },
        { q: "19. ที่ดินรวม 2 แปลง (20x40 และ 2,500) ติดกันด้านกว้าง รอบรั้วยาวเท่าใด", o: ["280", "290", "300", "320"], a: 1, e: "คำนวณด้านรอบที่ดินรวม", t: "วาดรูปแล้วรวมเส้นรอบรูปที่ไม่ทับกัน" },
        { q: "20. สามเหลี่ยมฉากด้าน 7, 24, 25 พื้นที่เท่าใด", o: ["84", "104", "156", "300"], a: 0, e: "0.5 * 7 * 24 = 84", t: "พื้นที่ = 0.5 * ฐาน * สูง" },
        { q: "21. รูปสองมิติประกอบกันได้รูปสามมิติใด", o: ["ปริซึมสี่", "ปริซึมสาม", "พีระมิดสี่", "พีระมิดสาม"], a: 3, e: "ขึ้นกับจำนวนฐานและยอด", t: "จำแนกรูปทรงจากหน้าตัด" },
        { q: "22. น้ำ 78 ลิตร สูง 60 ซม. ถังมีพื้นที่ฐานเท่าใด", o: ["1200", "1300", "1400", "1500"], a: 1, e: "78,000 / 60 = 1,300", t: "ปริมาตร = พื้นที่ฐาน * สูง" },
        { q: "23. a * b = (a-b)a/b ข้อใดเป็นจำนวนเต็ม", o: ["5*2", "6*3", "7*4", "8*5"], a: 1, e: "(6-3)*6/3 = 6", t: "แทนค่าแล้วคำนวณตามลำดับ" },
        { q: "24. นักเรียน 400 (ฟุตบอล 20%, อ่าน 45%, ศิลปะที่เหลือ) ศิลปะกี่คน", o: ["140", "150", "160", "170"], a: 0, e: "35% ของ 400 = 140", t: "เปอร์เซ็นต์รวมต้องได้ 100%" },
        { q: "25. ส้ม 70, เงาะ 210, มังคุด 1,155 แบ่งกองน้อยที่สุด กองละกี่ผล", o: ["35", "70", "105", "210"], a: 0, e: "ห.ร.ม. ของ 70, 210, 1155 = 35", t: "แบ่งกองน้อยที่สุดต้องใช้ ห.ร.ม. ที่มากที่สุด" }
    ];

    const container = document.getElementById('quiz-content');
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'question-container';
        div.innerHTML = `
            <div class="question-title">ข้อ ${index + 1}. ${q.q}</div>
            <ul class="options-list">
                ${q.o.map((opt, i) => `<li class="option-item"><input type="radio" name="q${index}"> ${i+1}) ${opt}</li>`).join('')}
            </ul>
            <div class="explanation-box">
                <div class="explanation-title"><strong>เฉลย: ตอบข้อ ${q.a + 1})</strong></div>
                <div>วิธีคิด: ${q.e}</div>
                <div class="tip-box"><strong>Tips:</strong> ${q.t}</div>
            </div>
        `;
        container.appendChild(div);
    });

    document.querySelectorAll('.option-item').forEach(item => {
        item.addEventListener('click', function() {
            const container = this.closest('.question-container');
            container.querySelector('.explanation-box').style.display = 'block';
        });
    });
</script>

</body>
</html>

```
