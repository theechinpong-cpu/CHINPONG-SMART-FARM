<section id="exam-section" style="margin-top: 50px; border-top: 5px solid #2c3e50; padding-top: 30px;">

    <div id="quiz-container">
        </div>

    <div style="text-align: center; margin: 30px 0;">
        <button id="submit-btn" onclick="checkQuiz()" style="padding: 15px 40px; font-size: 20px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer;">ส่งคำตอบและวิเคราะห์ผล</button>
    </div>

    <div id="result-display" style="display:none; padding: 30px; border-radius: 15px; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.2);">

    </div>
</section>

    { q: "Which category does 'Grammar' belong to?", a: "Count Noun", b: "Noncount Noun", c: "Adjective", d: "Verb", ans: "b", cat: "Grammar", exp: "ชื่อวิชาต่างๆ เป็นนามนับไม่ได้" },
    { q: "There are many _______ in the sky.", a: "star", b: "stars", c: "some star", d: "a star", ans: "b", cat: "Grammar", exp: "Many ใช้กับนามพหูพจน์ (stars)" },
    { q: "He is eating _______ rice.", a: "a", b: "an", c: "some", d: "one", ans: "c", cat: "Grammar", exp: "Rice นับไม่ได้ ใช้ some" },

    { q: "In China, people use _______ to eat.", a: "Forks", b: "Knives", c: "Chopsticks", d: "Hands", ans: "c", cat: "Reading", exp: "คนจีนใช้ตะเกียบ (Chopsticks)" },
    { q: "A 'Host' is a person who _______.", a: "Is a guest", b: "Receives guests", c: "Cooks food only", d: "Cleans the table", ans: "b", cat: "Vocabulary", exp: "Host คือเจ้าบ้าน ผู้ต้อนรับแขก" },

    { q: "To continue doing a good job is to 'Keep _______' the good work.", a: "up", b: "down", c: "off", d: "in", ans: "a", cat: "Vocabulary", exp: "Keep up คือการรักษามาตรฐานเดิมไว้" },
    { q: "A good host 'Keeps an _______' on the guests' plates.", a: "ear", b: "eye", c: "hand", d: "arm", ans: "b", cat: "Vocabulary", exp: "Keep an eye on คือการเฝ้าดูหรือดูแล" },
    { q: "In the U.S., it is okay to ask for a _______ for your soda.", a: "refill", b: "return", d: "remake", d: "repeat", ans: "a", cat: "Reading", exp: "ในอเมริกาขอเติมน้ำอัดลม (refill) ได้" },
    { q: "Which word means 'to say something strongly'?", a: "Offer", b: "Insist", c: "Suggest", d: "Pray", ans: "b", cat: "Vocabulary", exp: "Insist หมายถึง ยืนกราน" },
    { q: "You use a _______ for soup.", a: "plate", b: "bowl", c: "chopstick", d: "fork", ans: "b", cat: "Vocabulary", exp: "Bowl (ชาม) ใช้สำหรับใส่ซุป" },
    { q: "Chopsticks are _______ sticks.", a: "thick", b: "thin", c: "round", d: "heavy", ans: "b", cat: "Reading", exp: "ตะเกียบมีลักษณะเรียวบาง (thin)" },

    // --- General Review & Writing ---
    { q: "Which city/country must be capitalized?", a: "india", b: "baby", c: "rice", d: "priest", ans: "a", cat: "Grammar", exp: "ชื่อประเทศ (India) ต้องขึ้นต้นด้วยตัวใหญ่เสมอ" },
    { q: "What is the world's oldest religion mentioned?", a: "Islam", b: "Christianity", c: "Hinduism", d: "Buddhism", ans: "c", cat: "Reading", exp: "ในบทความกล่าวว่าฮินดูเป็นศาสนาที่เก่าแก่ที่สุด" },
    { q: "You are born Hindu or you are not. This means you cannot _______ a Hindu.", a: "see", b: "become", c: "pray", d: "bless", ans: "b", cat: "Reading", exp: "ตามบทความ คนจะเป็นฮินดูได้ต้องเกิดมาเป็นเท่านั้น เปลี่ยนมาเป็น (become) ไม่ได้" },

function loadQuiz() {
    const container = document.getElementById('quiz-container');
    quizData.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'exercise-box';
        qDiv.style.borderLeft = "5px solid #2c3e50";
        qDiv.innerHTML = `
            <p><strong>${index + 1}. ${item.q}</strong></p>
            <label style="display:block;"><input type="radio" name="q${index}" value="a"> A) ${item.a}</label>
            <label style="display:block;"><input type="radio" name="q${index}" value="b"> B) ${item.b}</label>
            <label style="display:block;"><input type="radio" name="q${index}" value="c"> C) ${item.c}</label>
            <label style="display:block;"><input type="radio" name="q${index}" value="d"> D) ${item.d}</label>
            <div id="exp-${index}" style="display:none; margin-top:10px; padding:10px; background:#d4edda; border-radius:5px; font-size:0.9em;">
                <b style="color:#155724;">เฉลย: ${item.ans.toUpperCase()}</b> | ${item.exp}
            </div>
        `;
        container.appendChild(qDiv);
    });
}

function checkQuiz() {
    let score = 0;
    let categories = { Reading: 0, Vocabulary: 0, Grammar: 0 };
    let totalCat = { Reading: 0, Vocabulary: 0, Grammar: 0 };

    quizData.forEach((item, index) => {
        totalCat[item.cat]++;
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const expDiv = document.getElementById(`exp-${index}`);
        expDiv.style.display = "block";

        if (selected && selected.value === item.ans) {
            score++;
            categories[item.cat]++;
            expDiv.style.background = "#d4edda";
        } else {
            expDiv.style.background = "#f8d7da";
        }
    });

    // Display Result
    const resultDisplay = document.getElementById('result-display');
    resultDisplay.style.display = "block";
    document.getElementById('score-text').innerHTML = `คุณได้คะแนน ${score} / 50 คะแนน`;

    // Analysis
    let analysisHtml = "<h3>วิเคราะห์ผลการเรียน:</h3><ul>";
    for (let cat in categories) {
        let percent = (categories[cat] / totalCat[cat]) * 100;
        let status = percent < 60 ? "<span style='color:red;'>ควรปรับปรุง</span>" : "<span style='color:green;'>ดีมาก</span>";
        analysisHtml += `<li><b>ด้าน ${cat}:</b> ถูก ${categories[cat]} จาก ${totalCat[cat]} ข้อ (${percent.toFixed(0)}%) - ${status}</li>`;
    }
    analysisHtml += "</ul>";

    if (score < 30) {
        analysisHtml += "<p><b>คำแนะนำ:</b> คุณยังอ่อนในส่วนของไวยากรณ์และรายละเอียดการอ่าน แนะนำให้กลับไปทบทวนตาราง Count/Noncount Nouns อีกครั้งครับ</p>";
    } else {
        analysisHtml += "<p><b>คำแนะนำ:</b> เยี่ยมมาก! คุณมีความเข้าใจในเนื้อหาและวัฒนธรรมอย่างดี พร้อมไปบทต่อไปแล้วครับ</p>";
    }

    document.getElementById('analysis-report').innerHTML = analysisHtml;
    window.scrollTo({ top: resultDisplay.offsetTop, behavior: 'smooth' });
}

window.onload = loadQuiz;
</script>
