<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 6 Exam: Individual Feedback Version</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .summary { background: #eef9ff; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 5px solid #3498db; }
        .question-block { margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; position: relative; }
        .options label { display: block; margin: 10px 0; cursor: pointer; padding: 8px; border-radius: 4px; border: 1px solid #eee; }
        .options label:hover { background: #f0f8ff; }
        .feedback { display: none; margin-top: 15px; padding: 15px; border-radius: 5px; font-weight: bold; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .explanation { font-weight: normal; font-size: 0.9em; margin-top: 5px; color: #555; display: block; }
        button#submitAll { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 20px; }
        #finalResult { display: none; margin-top: 30px; text-align: center; padding: 20px; background: #fff3cd; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Moments in Life: Comprehensive Exam</h1>
    
    <div class="summary">
        <strong>คำชี้แจง:</strong> เลือกคำตอบที่ถูกต้องที่สุดในแต่ละข้อ เมื่อเลือกแล้วระบบจะแสดงเฉลยและคำอธิบายทันทีแบบข้อต่อข้อ
    </div>

    <div id="quizContainer"></div>

    <button id="submitAll" onclick="showFinalResult()">สรุปคะแนนและวิเคราะห์ผลการสอบ</button>

    <div id="finalResult">
        <h2>คะแนนรวม: <span id="totalScore"></span> / 50</h2>
        <div id="categoryAnalysis"></div>
    </div>
</div>

<script>
const quizData = [
    { q: "What was cooked in honour of the groom in traditional Ireland?", options: ["Turkey", "Goose", "Chicken", "Swan"], cor: 1, cat: "Culture", exp: "ห่าน (Goose) คืออาหารมื้อพิเศษที่เตรียมไว้เพื่อผูกใจเจ้าบ่าว" },
    { q: "Why shouldn't Irish brides wear green?", options: ["It's unlucky for the harvest", "It tempts fairies to carry them off", "Green flowers are rare", "The groom hates the color"], cor: 1, cat: "Culture", exp: "สีเขียวเป็นสีของภูต (Fairies) ซึ่งเชื่อกันว่าภูตจะมาลักพาตัวเจ้าสาวไป" },
    { q: "Traditional Irish brides wear a wreath of _____ in their hair.", options: ["Roses", "Exotic lilies", "Wild flowers", "Gold ribbons"], cor: 2, cat: "Culture", exp: "เจ้าสาวไอริชใช้ดอกไม้ป่าเก็บสดตอนเช้ามาทำมงกุฎ" },
    { q: "What is done with the top layer of the wedding cake?", options: ["Eaten at the reception", "Sold to neighbors", "Stored for the first baby's christening", "Given to the fairies"], cor: 2, cat: "Culture", exp: "เค้กชั้นบนสุดจะถูกเก็บไว้ใช้ในพิธีล้างบาปของบุตรคนแรก" },
    { q: "Which month is suggested by 'February birds do mate' as a good time to wed?", options: ["January", "February", "March", "April"], cor: 1, cat: "Reading", exp: "ในบทกลอนระบุว่าเมื่อนกเริ่มจับคู่ในเดือนกุมภาพันธ์ เป็นช่วงเวลาที่ควรแต่งงาน" },
    { q: "What does the word 'dread' mean?", options: ["To love", "To fear", "To wait", "To marry"], cor: 1, cat: "Vocab", exp: "Dread คือความหวาดกลัวหรือกังวล" },
    { q: "The bride carries a 'magic' handkerchief and a _____ for luck.", options: ["Key", "Ring", "Horseshoe", "Feather"], cor: 2, cat: "Culture", exp: "เกือกม้า (Horseshoe) คือสัญลักษณ์แห่งโชคลาภ" },
    { q: "Nowadays, Irish wedding cakes are often decorated with _____ themes.", options: ["Sport", "Swans or fairies", "Cars", "Historical buildings"], cor: 1, cat: "Culture", exp: "ปัจจุบันนิยมแต่งหน้าเค้กด้วยรูปหงส์หรือภูตตามประเพณี" },
    { q: "The bride's dress part is used to make a _____ for the first-born.", options: ["Birthday shirt", "School bag", "Christening robe", "Blanket"], cor: 2, cat: "Culture", exp: "ชุดแต่งงานส่วนหนึ่งจะถูกนำมาทำเป็นชุดพิธีล้างบาป (Christening robe)" },
    { q: "It is unlucky to dance with both _____ off the ground.", options: ["Hands", "Feet", "Shoes", "Arms"], cor: 1, cat: "Culture", exp: "การเต้นรำเท้าลอยพ้นพื้นเชื่อว่าจะถูกภูตลักพาตัว" },
    { q: "A: 'I'm cold.' B: 'I _____ the window.'", options: ["close", "am closing", "will close", "going to close"], cor: 2, cat: "Grammar", exp: "ตัดสินใจเดี๋ยวนั้น (On-the-spot decision) ใช้ will" },
    { q: "Look at those clouds! It _____ rain.", options: ["will", "is going to", "is", "rains"], cor: 1, cat: "Grammar", exp: "ทำนายจากหลักฐานชัดเจน (Evidence) ใช้ be going to" },
    { q: "The train _____ at 7:15 p.m.", options: ["reaches", "is reaching", "will reach", "reach"], cor: 0, cat: "Grammar", exp: "ตารางเวลา (Timetables) ใช้ Present Simple" },
    { q: "This time next week, I _____ to Tahiti!", options: ["will travel", "am travelling", "will be travelling", "travel"], cor: 2, cat: "Grammar", exp: "เหตุการณ์ที่กำลังทำอยู่ ณ เวลาที่ระบุในอนาคต ใช้ Future Continuous" },
    { q: "I _____ my doctor on Monday morning. (I have an appointment)", options: ["meet", "am meeting", "will meet", "meeting"], cor: 1, cat: "Grammar", exp: "การนัดหมายที่ยืนยันแล้ว (Arrangement) ใช้ Present Continuous" },
    { q: "A: 'Why the old clothes?' B: 'I _____ the fence.'", options: ["will paint", "am going to paint", "paint", "will be painting"], cor: 1, cat: "Grammar", exp: "แผนที่วางไว้ก่อนแล้ว (Intention) ใช้ be going to" },
    { q: "The concert _____ at 9 o'clock.", options: ["starts", "is starting", "will start", "is going to start"], cor: 0, cat: "Grammar", exp: "ตารางเวลาการแสดง ใช้ Present Simple" },
    { q: "Don't forget to tell Sue, _____?", options: ["do you", "don't you", "will you", "shall we"], cor: 2, cat: "Grammar", exp: "ประโยคคำสั่ง/ห้าม ใช้ Question Tag ว่า will you?" },
    { q: "Let's dance, _____?", options: ["shall we", "will we", "don't we", "won't we"], cor: 0, cat: "Grammar", exp: "Question Tag ของ Let's คือ shall we?" },
    { q: "He probably _____ make it to the party.", options: ["will", "won't", "don't", "isn't"], cor: 1, cat: "Grammar", exp: "probably มักใช้คู่กับ will/won't ในการคาดเดา" },
    { q: "The robbers _____ the bank last night.", options: ["broke off", "broke out", "broke into", "broke down"], cor: 2, cat: "Phrasal", exp: "Break into แปลว่า งัดแงะบุกรุก" },
    { q: "His washing machine _____ again.", options: ["broke off", "broke into", "broke out", "broke down"], cor: 3, cat: "Phrasal", exp: "Break down ใช้เมื่อเครื่องยนต์หรือเครื่องใช้ไฟฟ้าเสีย" },
    { q: "They _____ their engagement last week.", options: ["broke off", "broke into", "broke down", "broke out"], cor: 0, cat: "Phrasal", exp: "Break off คือการยุติความสัมพันธ์หรือการหมั้น" },
    { q: "A riot _____ in the city center.", options: ["broke into", "broke down", "broke out", "broke off"], cor: 2, cat: "Phrasal", exp: "Break out ใช้กับเหตุการณ์รุนแรงที่เกิดขึ้นฉับพลัน" },
    { q: "They had a party, _____?", options: ["didn't they", "don't they", "hadn't they", "did they"], cor: 0, cat: "Grammar", exp: "ประโยคอดีต (had) ใช้หางปฏิเสธคือ didn't they?" },
    { q: "Children wear strange costumes on _____.", options: ["Christmas", "Eid Al-Fitr", "Halloween", "New Year"], cor: 2, cat: "Culture", exp: "วันฮาโลวีนเด็กๆ จะแต่งชุดแปลกๆ ไปหลอกคน" },
    { q: "People pray in mosques on _____.", options: ["Easter", "Eid Al-Fitr", "May Day", "Carnival"], cor: 1, cat: "Culture", exp: "ชาวมุสลิมประกอบพิธีทางศาสนาที่มัสยิดในวันอีฎิ้ลฟิตริ" },
    { q: "What do people throw during a Carnival?", options: ["Pumpkins", "Crackers", "Streamers", "Stockings"], cor: 2, cat: "Vocab", exp: "Streamers (สายรุ้งกระดาษ) นิยมใช้ในขบวนพาเหรด" },
    { q: "Waiting until midnight to see fireworks is for _____.", options: ["Christmas", "New Year's Eve", "Halloween", "Carnival"], cor: 1, cat: "Culture", exp: "วันสิ้นปีคือการรอนับถอยหลังสู่เที่ยงคืน" },
    { q: "You say 'Get well soon' to someone who is _____.", options: ["Getting married", "Ill", "Graduating", "Traveling"], cor: 1, cat: "Communication", exp: "ใช้ Get well soon อวยพรให้คนป่วยหายเร็วๆ" },
    { q: "A positive word to describe an event is _____.", options: ["Boring", "Dull", "Spectacular", "Terrible"], cor: 2, cat: "Vocab", exp: "Spectacular แปลว่า ตระการตา/วิเศษมาก" },
    { q: "A negative word for an event is _____.", options: ["Entertaining", "Amusing", "Unpleasant", "Superb"], cor: 2, cat: "Vocab", exp: "Unpleasant แปลว่า ไม่น่ารื่นรมย์ (Negative)" },
    { q: "If your friend wins a match, you say _____.", options: ["Season's Greetings", "Well done!", "Many happy returns", "Speedy recovery"], cor: 1, cat: "Communication", exp: "Well done! ใช้ชื่นชมความสำเร็จ" },
    { q: "Which greeting is for a 21st birthday?", options: ["Happy silver anniversary", "Happy 21st", "Get well soon", "Season's Greetings"], cor: 1, cat: "Communication", exp: "Happy 21st ใช้สำหรับวันเกิดปีที่ 21" },
    { q: "What does 'Sorrow' mean?", options: ["Happiness", "Sadness", "Anger", "Surprise"], cor: 1, cat: "Vocab", exp: "Sorrow คือ ความโศกเศร้า" },
    { q: "What is a 'Maiden'?", options: ["An old man", "A young woman", "A baby", "A sailor"], cor: 1, cat: "Vocab", exp: "Maiden คือ หญิงสาว (ที่ยังไม่ได้แต่งงาน)" },
    { q: "A 'Three-tier' cake means a cake with _____ levels.", options: ["Two", "Three", "Four", "Five"], cor: 1, cat: "Vocab", exp: "Tier แปลว่า ชั้น/ระดับ" },
    { q: "What is 'Fate'?", options: ["Luck/Fortune", "A kind of food", "A wedding guest", "A gift"], cor: 0, cat: "Vocab", exp: "Fate คือ โชคชะตาหรือพรหมลิขิต" },
    { q: "Wait! I _____ you with those heavy bags.", options: ["am helping", "will help", "going to help", "help"], cor: 1, cat: "Grammar", exp: "การช่วยเหลือทันทีใช้ will" },
    { q: "I _____ my new car tomorrow morning. (I've paid for it)", options: ["collect", "am collecting", "will collect", "going to collect"], cor: 1, cat: "Grammar", exp: "การนัดหมายส่งมอบของที่ยืนยันแล้วใช้ Present Continuous" },
    { q: "There are still some invitations to send. = We _____ all the invitations yet.", options: ["don't send", "didn't send", "haven't sent", "won't send"], cor: 2, cat: "Grammar", exp: "ความหมายเดียวกันคือ ยังส่งไม่ครบ (Present Perfect + yet)" },
    { q: "It's too cold to have a party. = It isn't _____ to have a party.", options: ["too warm", "warm enough", "enough warm", "cold enough"], cor: 1, cat: "Grammar", exp: "Too cold = Not warm enough" },
    { q: "Why don't you hire a costume? = You _____ hire a costume.", options: ["must", "could", "will", "shall"], cor: 1, cat: "Grammar", exp: "Why don't you...? เป็นการแนะนำ เช่นเดียวกับ You could..." },
    { q: "I think it _____ be a great party.", options: ["is", "is being", "will", "going to"], cor: 2, cat: "Grammar", exp: "ใช้ will หลังคำว่า I think เพื่อคาดการณ์" },
    { q: "She _____ a baby in May. (She's pregnant)", options: ["will have", "is going to have", "has", "is having"], cor: 1, cat: "Grammar", exp: "ใช้ be going to กับเหตุการณ์ที่มีหลักฐานชัดเจน" },
    { q: "What _____ at 8:00 tonight?", options: ["will you do", "do you do", "will you be doing", "are you doing"], cor: 2, cat: "Grammar", exp: "ถามถึงการกระทำที่กำลังดำเนินอยู่ ณ เวลาที่ระบุ" },
    { q: "The flight _____ off at 6:30 a.m.", options: ["takes", "is taking", "will take", "taking"], cor: 0, cat: "Grammar", exp: "ตารางบินใช้ Present Simple" },
    { q: "Be good or you _____ out tonight!", options: ["not go", "won't go", "don't go", "aren't going"], cor: 1, cat: "Grammar", exp: "การขู่หรือคำสั่งในอนาคตใช้ will (won't)" },
    { q: "Many happy returns is for _____.", options: ["Wedding", "Graduation", "Birthday", "Illness"], cor: 2, cat: "Communication", exp: "Many happy returns (of the day) เป็นสำนวนอวยพรวันเกิด" },
    { q: "Season's Greetings is used during _____.", options: ["Summer", "Christmas/New Year", "Easter", "Ramadan"], cor: 1, cat: "Communication", exp: "Season's Greetings ใช้ในช่วงเทศกาลส่งท้ายปีเก่าต้อนรับปีใหม่" }
];

let userScores = { Culture: 0, Grammar: 0, Vocab: 0, Phrasal: 0, Communication: 0, Reading: 0 };
let categoryTotals = { Culture: 0, Grammar: 0, Vocab: 0, Phrasal: 0, Communication: 0, Reading: 0 };
let currentTotalScore = 0;

function renderQuiz() {
    const container = document.getElementById('quizContainer');
    quizData.forEach((item, idx) => {
        categoryTotals[item.cat]++;
        const div = document.createElement('div');
        div.className = 'question-block';
        div.id = `qBlock${idx}`;
        div.innerHTML = `
            <p><strong>${idx + 1}. ${item.q}</strong></p>
            <div class="options">
                ${item.options.map((opt, oIdx) => `
                    <label><input type="radio" name="q${idx}" value="${oIdx}" onclick="checkStepByStep(${idx}, ${oIdx})"> ${opt}</label>
                `).join('')}
            </div>
            <div id="feedback${idx}" class="feedback"></div>
        `;
        container.appendChild(div);
    });
}

function checkStepByStep(qIdx, selectedIdx) {
    const item = quizData[qIdx];
    const feedbackDiv = document.getElementById(`feedback${qIdx}`);
    const inputs = document.getElementsByName(`q${qIdx}`);
    
    // Disable other radios in this question
    for(let input of inputs) { input.disabled = true; }

    feedbackDiv.style.display = 'block';
    if (selectedIdx === item.cor) {
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.innerHTML = `ถูกต้อง! ✅<br><span class="explanation"><b>คำอธิบาย:</b> ${item.exp}</span>`;
        userScores[item.cat]++;
        currentTotalScore++;
    } else {
        feedbackDiv.className = 'feedback incorrect';
        feedbackDiv.innerHTML = `ผิดครับ ❌ (คำตอบที่ถูกคือ: ${item.options[item.cor]})<br><span class="explanation"><b>คำอธิบาย:</b> ${item.exp}</span>`;
    }
}

function showFinalResult() {
    document.getElementById('totalScore').innerText = currentTotalScore;
    let analysisHtml = "<h3>วิเคราะห์ความเข้าใจรายหัวข้อ:</h3><ul>";
    for (let cat in userScores) {
        let percent = (userScores[cat] / categoryTotals[cat]) * 100;
        analysisHtml += `<li><b>${cat}:</b> ${userScores[cat]}/${categoryTotals[cat]} (${percent.toFixed(0)}%) - ${percent < 70 ? 'ควรทบทวนเพิ่ม ⚠️' : 'ทำได้ดีมาก ✅'}</li>`;
    }
    analysisHtml += "</ul>";
    document.getElementById('categoryAnalysis').innerHTML = analysisHtml;
    document.getElementById('finalResult').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}

window.onload = renderQuiz;
</script>

</body>
</html>
