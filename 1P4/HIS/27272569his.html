                correct: 0,
                th: "คำใบ้: ปกป้องคนในชุมชน", en: "Hint: Protecting community members",
                detail: "อาณาจักรช่วยรวมอำนาจและกฎหมายเพื่อป้องกันศัตรูและจัดระเบียบสังคม"
            }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = '';
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question';
                div.innerHTML = `
                    <p><strong>${index + 1}. ${currentLang === 'th' ? q.q_th : q.q_en}</strong></p>
                    <div class="options">
                        ${(currentLang === 'th' ? q.a_th : q.a_en).map((opt, i) => `
                            <button onclick="checkAnswer(${index}, ${i}, this)">${opt}</button>
                        `).join('')}
                    </div>
                    <div class="detail" id="detail-${index}">${currentLang === 'th' ? q.detail : q.detail}</div>
                `;
                area.appendChild(div);
            });
        }

        function checkAnswer(qIndex, aIndex, btn) {
            const q = questions[qIndex];
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            if (aIndex === q.correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                buttons[q.correct].classList.add('correct');
            }
            document.getElementById(`detail-${qIndex}`).style.display = 'block';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            renderQuiz();
        }

        renderQuiz();
    </script>
</body>
</html>
