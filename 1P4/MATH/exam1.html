<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบคณิตศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa; }
        .option-item { cursor: pointer; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; transition: 0.2s; }
        .option-item:hover { background: #eef; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb; }
        .feedback { margin-top: 15px; padding: 15px; display: none; background: #fff; border-left: 5px solid #003366; }
        .tutor-tip { color: #ff6600; font-weight: bold; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color: #003366; text-align: center;">ข้อสอบคณิตศาสตร์ ม.1 (Semester 1)</h1>
    <div id="quiz-area"></div>
</div>

<script>
    const quizData = [
        { q: "ผลลัพธ์ของ (-15) + 20 － (-5) มีค่าเท่าใด?", o: ["10", "0", "30", "-10"], a: 0, c: "เปลี่ยนลบซ้อนลบให้เป็นบวก: -15 + 20 + 5 ＝ 10", s: "ทริก: ลบเจอเลขลบ กลายเป็นบวกทันที!" },
        { q: "จำนวนตรงข้ามของ -(-(-8)) คือข้อใด?", o: ["8", "-8", "0", "16"], a: 1, c: "นับลบได้ 3 ตัว (เลขคี่) ผลคือ -8. จำนวนตรงข้ามของ -8 คือ 8. โจทย์ถาม 'จำนวนตรงข้าม' ของตัวนี้อีกที จึงตอบ -8", s: "ทริก: ลบจำนวนคี่ตัวได้ 'ลบ', เลขคู่ตัวได้ 'บวก'" },
        { q: "ค่าของ |-10| × |5| ÷ |-2| เท่ากับเท่าใด?", o: ["25", "-25", "10", "50"], a: 0, c: "ถอดค่าสัมบูรณ์: 10 × 5 ÷ 2 ＝ 50 ÷ 2 ＝ 25", s: "ทริก: ค่าสัมบูรณ์คือระยะทาง ต้องเป็นบวกเสมอ!" },
        { q: "ข้อใดมีค่ามากที่สุด?", o: ["-100", "-1", "-50", "0"], a: 3, c: "0 อยู่ทางขวาของจำนวนติดลบเสมอ บนเส้นจำนวน", s: "ทริก: ยิ่งติดลบมาก ยิ่งจนมาก ค่าต้องน้อยลง" },
        { q: "ผลลัพธ์ของ 5 × [10 － (3 ＋ 2)] เท่ากับเท่าใด?", o: ["25", "50", "35", "15"], a: 0, c: "ทำวงเล็บกลม: 3+2=5. ทำวงเล็บเหลี่ยม: 10-5=5. สุดท้าย: 5 × 5 = 25", s: "ทริก: เคลียร์ในวงเล็บกลมก่อนเสมอ!" },
        { q: "(-2)³ × (-2)² เท่ากับเท่าใด?", o: ["-32", "32", "64", "-64"], a: 0, c: "ฐานเหมือนกันคูณกัน นำเลขชี้กำลังมาบวก: (-2)^(3+2) ＝ (-2)⁵ ＝ -32", s: "ทริก: ฐานติดลบยกกำลังคี่ ผลลัพธ์ต้องติดลบ" },
        { q: "ค่าของ 2⁴ ÷ 2² คือข้อใด?", o: ["2", "4", "8", "16"], a: 1, c: "หารกันนำเลขชี้กำลังมาลบ: 2^(4-2) ＝ 2² ＝ 4", s: "ทริก: หารกันให้ 'ลบ' ยกกำลัง" },
        { q: "3⁰ ＋ 5⁰ เท่ากับเท่าใด?", o: ["0", "1", "2", "8"], a: 2, c: "จำนวนใดๆ (ที่ไม่ใช่ 0) ยกกำลัง 0 มีค่าเป็น 1 เสมอ: 1 + 1 ＝ 2", s: "ทริก: จำให้ขึ้นใจ x⁰ = 1" },
        { q: "ค่าของ (-3)² เท่ากับเท่าใด?", o: ["-9", "9", "6", "-6"], a: 1, c: "(-3) × (-3) ＝ 9", s: "ทริก: ลบ×ลบ=บวกเสมอ" },
        { q: "4³ เขียนในรูปเลขยกกำลังฐาน 2 ได้เป็น?", o: ["2⁶", "2⁵", "2⁴", "2³"], a: 0, c: "4 คือ 2², ดังนั้น (2²)³ ＝ 2^(2×3) ＝ 2⁶", s: "ทริก: เลขชี้กำลังซ้อนกันให้ 'คูณ' กัน" },
        { q: "เปรียบเทียบ (-2)⁴ กับ (-4)² ข้อใดถูกต้อง?", o: ["(-2)⁴ > (-4)²", "(-2)⁴ < (-4)²", "(-2)⁴ ＝ (-4)²", "เปรียบเทียบไม่ได้"], a: 2, c: "(-2)⁴ ＝ 16 และ (-4)² ＝ 16 ดังนั้นเท่ากัน", s: "ทริก: เลขคู่ปัดลบออกได้เลย!" },
        { q: "ค่าของ 10³ × 10⁻³ คือเท่าใด?", o: ["10", "1", "0", "10⁻⁶"], a: 1, c: "10^(3+(-3)) ＝ 10⁰ ＝ 1", s: "ทริก: เลขชี้กำลังบวกกันให้จบ" },
        { q: "ถ้า 2ⁿ ＝ 64 แล้ว n มีค่าเท่าใด?", o: ["4", "5", "6", "7"], a: 2, c: "2×2×2×2×2×2 ＝ 64 (คูณกัน 6 ตัว)", s: "ทริก: ลองไล่คูณฐานไปเรื่อยๆ" },
        { q: "ผลลัพธ์ของ (2³)² ÷ 2⁴ คือข้อใด?", o: ["2", "4", "8", "16"], a: 1, c: "(2⁶) ÷ 2⁴ ＝ 2^(6-4) ＝ 2² ＝ 4", s: "ทริก: ซ้อนกันคูณ, หารกันลบ" },
        { q: "ค่าของ (-1)¹⁰⁰ ＋ (-1)¹⁰¹ คือเท่าใด?", o: ["2", "-2", "1", "0"], a: 3, c: "1 + (-1) ＝ 0 (เลขคู่ชี้กำลังเป็นบวก เลขคี่ชี้กำลังเป็นลบ)", s: "ทริก: จำแพทเทิร์น 1 กับ -1 ไว้เลย" },
        { q: "แก้สมการ 2x ＋ 5 ＝ 15 ค่า x คือ?", o: ["4", "5", "6", "10"], a: 1, c: "2x ＝ 15-5 -> 2x ＝ 10 -> x ＝ 5", s: "ทริก: ย้ายบวกไปลบก่อน" },
        { q: "ถ้า x/3 ＝ 4 แล้ว x เท่ากับเท่าใด?", o: ["7", "1", "12", "3/4"], a: 2, c: "ย้าย 3 ที่หารอยู่ไปคูณ: 4×3 ＝ 12", s: "ทริก: หารอยู่ต้องย้ายไปคูณ" },
        { q: "โจทย์: สามเท่าของจำนวนหนึ่งมากกว่า 10 อยู่ 2", o: ["3x - 10 ＝ 2", "3x ＋ 10 ＝ 2", "3x - 2 ＝ 10", "x/3 - 10 ＝ 2"], a: 0, c: "สามเท่า คือ 3x มากกว่า 10 แปลว่า 3x - 10 ＝ ผลลัพธ์", s: "ทริก: แปลงทีละคำ 3x | มากกว่า | 10 | คือ | 2" },
        { q: "แก้สมการ x - 5 ＝ -2", o: ["3", "-3", "7", "-7"], a: 0, c: "x ＝ -2 + 5 ＝ 3", s: "ทริก: ย้ายข้างต้องเปลี่ยนเครื่องหมาย!" },
        { q: "สมการ 4(x ＋ 1) ＝ 20 ค่า x คือ?", o: ["4", "5", "6", "3"], a: 0, c: "x+1 ＝ 20÷4 ＝ 5 -> x ＝ 5-1 ＝ 4", s: "ทริก: เอาตัวคูณหน้าวงเล็บไปหารก่อนง่ายกว่า" },
        { q: "มุมตรงข้ามมีขนาดเท่าใด?", o: ["รวมกันได้ 180", "เท่ากันเสมอ", "รวมกันได้ 90", "ไม่สัมพันธ์กัน"], a: 1, c: "เป็นสมบัติทางเรขาคณิตเมื่อเส้นตรงสองเส้นตัดกัน", s: "ทริก: มุมตรงข้าม = เท่ากันเสมอ" },
        { q: "ถ้าเส้นตรงสองเส้นขนานกัน มุมแย้งมีขนาดเป็นอย่างไร?", o: ["รวมกันได้ 180", "เท่ากัน", "รวมกันได้ 90", "ไม่มีสมบัติ"], a: 1, c: "เป็นนิยามของการขนาน มุมที่แย้งกันต้องเท่ากัน", s: "ทริก: มุมแย้ง = เท่ากัน" },
        { q: "มุมภายในบนข้างเดียวกันของเส้นตัดรวมกันได้กี่องศา?", o: ["90", "180", "270", "360"], a: 1, c: "เป็นสมบัติเส้นขนาน", s: "ทริก: 'ข้างเดียวกัน' = 180 องศา" },
        { q: "มุม 30 องศา มีมุมประกอบมุมฉากกี่องศา?", o: ["60", "150", "30", "90"], a: 0, c: "มุมฉากคือ 90, 90-30 ＝ 60", s: "ทริก: ประกอบมุมฉากต้องรวมกันได้ 90" },
        { q: "มุมรอบจุดศูนย์กลางมีขนาดกี่องศา?", o: ["90", "180", "270", "360"], a: 3, c: "เป็นนิยามพื้นฐานของวงกลม", s: "ทริก: รอบจุดศูนย์กลาง = 360" }
    ];

    const quizArea = document.getElementById('quiz-area');
    quizData.forEach((d, i) => {
        let options = d.o.map((opt, j) => `<div class="option-item" onclick="check(${i}, ${j})">${opt}</div>`).join('');
        quizArea.innerHTML += `<div class="question-container" id="q${i}"><strong>ข้อ ${i+1}. ${d.q}</strong>${options}<div class="feedback" id="f${i}"></div></div>`;
    });

    function check(qIdx, oIdx) {
        const q = quizData[qIdx];
        const f = document.getElementById(`f${qIdx}`);
        const items = document.querySelectorAll(`#q${qIdx} .option-item`);
        items.forEach((item, j) => {
            item.style.pointerEvents = 'none';
            if (j === q.a) item.classList.add('correct');
            else if (j === oIdx) item.classList.add('incorrect');
        });
        f.style.display = 'block';
        f.innerHTML = `<strong>${oIdx === q.a ? 'ถูกต้องครับ!' : 'เกือบไปแล้ว!'}</strong><br>วิธีคิด: ${q.c}<div class="tutor-tip">${q.s}</div>`;
    }
</script>
</body>
</html>
