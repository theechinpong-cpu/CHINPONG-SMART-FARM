<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Exam Quiz by พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .question-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { display: block; margin: 10px 0; cursor: pointer; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .correct { background: #d4edda !important; color: #155724; }
        .wrong { background: #f8d7da !important; color: #721c24; }
        .explanation { display: none; margin-top: 10px; padding: 10px; background: #e9ecef; border-left: 4px solid #007bff; }
        .frac { display: inline-block; text-align: center; vertical-align: middle; }
        .num { display: block; border-bottom: 1px solid; }
        .den { display: block; }
    </style>
</head>
<body>

    <h1>แบบทดสอบคณิตศาสตร์ระดับเข้มข้น</h1>
    <div id="quiz"></div>
    <button onclick="analyzeResults()" style="padding: 15px; background: #28a745; color: white; border: none; cursor: pointer; width: 100%;">วิเคราะห์ผลการสอบ</button>
    <div id="analysis" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        const quizData = [
            // Sample structure for 25 questions
            { q: "ถ้า (-2) × (-3) × (-4) × ... × (-20) มีค่าเป็นอย่างไร", o: ["ค่าลบ", "ค่าบวก", "ศูนย์", "ไม่สามารถหาค่าได้"], a: 0, c: "จำนวนเลขลบที่เป็นเลขคู่จะส่งผลให้ผลคูณเป็นบวก แต่โจทย์นี้มีเลขลบ 19 ตัว จึงเป็นค่าลบ", t: "จำไว้ว่า ลบ x ลบ = บวก ถ้าจำนวนตัวลบเป็นคี่ ผลลัพธ์สุดท้ายจะเป็นลบเสมอ", topic: "จำนวนเต็ม" },
            // ... (Insert remaining 24 questions here)
        ];

        const quizContainer = document.getElementById('quiz');
        quizData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p>${index + 1}. ${item.q} <span style="color:red;">(Clue: ${item.c})</span></p>`;
            item.o.forEach((opt, i) => {
                div.innerHTML += `<label class="option" onclick="checkAnswer(${index}, ${i}, this)">
                    <input type="radio" name="q${index}" value="${i}"> ${opt}
                </label>`;
            });
            div.innerHTML += `<div id="exp${index}" class="explanation"></div>`;
            quizContainer.appendChild(div);
        });

        function checkAnswer(qIdx, oIdx, el) {
            const isCorrect = (oIdx === quizData[qIdx].a);
            el.className = isCorrect ? 'option correct' : 'option wrong';
            const exp = document.getElementById('exp' + qIdx);
            exp.style.display = 'block';
            exp.innerHTML = `<strong>${isCorrect ? 'ถูกต้อง!' : 'ผิดพลาด'}</strong><br>คำอธิบาย: ... <br><em>Tutor's Secret Tip: ${quizData[qIdx].t}</em>`;
        }

        function analyzeResults() {
            document.getElementById('analysis').innerHTML = "วิเคราะห์: คุณยังอ่อนเรื่องการแปลโจทย์ปัญหาเป็นสมการ ซึ่งเป็นสาเหตุให้ทำโจทย์ระดับยากไม่ได้";
        }
    </script>
</body>
</html>
