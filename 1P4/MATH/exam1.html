<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบคณิตศาสตร์ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .option-item { cursor: pointer; padding: 5px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        .correct { background-color: #d4edda; }
        .incorrect { background-color: #f8d7da; }
        .feedback { margin-top: 10px; padding: 10px; display: none; background: #e9ecef; }
        .frac { display: inline-block; text-align: center; vertical-align: middle; }
        .num { display: block; border-bottom: 1px solid black; padding: 0 2px; }
        .den { display: block; padding: 0 2px; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบคณิตศาสตร์ ม.1 (Semester 1)</h1>
    <div id="quiz-area"></div>
    <button onclick="calculateScore()" class="btn-action">ประเมินผลคะแนน</button>
    <div id="result-section"></div>
</div>

<script>
    const quizData = [
        // Q1-4 จำนวนเต็ม
        { q: "ผลลัพธ์ของ (-15) + 20 － (-5) มีค่าเท่าใด?", o: ["10", "0", "30", "-10"], a: 0, t: "จำนวนเต็ม", c: "เปลี่ยนการลบเป็นบวกด้วยจำนวนตรงข้าม (-15 + 20 + 5)" },
        { q: "จำนวนตรงข้ามของ -(-(-8)) คือข้อใด?", o: ["8", "-8", "0", "16"], a: 1, t: "จำนวนเต็ม", c: "นับจำนวนเครื่องหมายลบ ถ้าเป็นเลขคี่จะได้ลบ" },
        { q: "ค่าของ |-10| × |5| ÷ |-2| เท่ากับเท่าใด?", o: ["25", "-25", "10", "50"], a: 0, t: "จำนวนเต็ม", c: "ค่าสัมบูรณ์คือระยะห่างจากศูนย์ เป็นบวกเสมอ" },
        { q: "ข้อใดมีค่ามากที่สุด?", o: ["-100", "-1", "-50", "0"], a: 3, t: "จำนวนเต็ม", c: "ยิ่งติดลบมากค่ายิ่งน้อย" },
        // Q5-10 ระคน
        { q: "ผลลัพธ์ของ 5 × [10 － (3 ＋ 2)] เท่ากับเท่าใด?", o: ["25", "50", "35", "15"], a: 0, t: "จำนวนเต็มระคน", c: "ทำในวงเล็บกลมก่อน แล้วตามด้วยวงเล็บเหลี่ยม" },
        { q: "(-2)³ × (-2)² เท่ากับเท่าใด?", o: ["-32", "32", "64", "-64"], a: 0, t: "เลขยกกำลัง", c: "เลขยกกำลังฐานเดียวกันคูณกัน ให้นำเลขชี้กำลังมาบวกกัน" },
        { q: "ค่าของ 2⁴ ÷ 2² คือข้อใด?", o: ["2", "4", "8", "16"], a: 1, t: "เลขยกกำลัง", c: "หารกันให้เอาเลขชี้กำลังมาลบกัน" },
        { q: "3⁰ ＋ 5⁰ เท่ากับเท่าใด?", o: ["0", "1", "2", "8"], a: 2, t: "เลขยกกำลัง", c: "จำนวนใดก็ตามยกกำลังศูนย์ (ที่ไม่ใช่ 0) จะมีค่าเท่ากับ 1" },
        { q: "ค่าของ (-3)² เท่ากับเท่าใด?", o: ["-9", "9", "6", "-6"], a: 1, t: "เลขยกกำลัง", c: "ฐานติดลบยกกำลังเลขคู่ ผลลัพธ์จะเป็นบวก" },
        { q: "4³ เขียนในรูปเลขยกกำลังฐาน 2 ได้เป็น?", o: ["2⁶", "2⁵", "2⁴", "2³"], a: 0, t: "เลขยกกำลัง", c: "แปลง 4 เป็น 2² แล้วนำไปยกกำลัง 3 (2²)³" },
        // Q11-15 เลขยกกำลัง
        { q: "เปรียบเทียบ (-2)⁴ กับ (-4)² ข้อใดถูกต้อง?", o: ["(-2)⁴ > (-4)²", "(-2)⁴ < (-4)²", "(-2)⁴ ＝ (-4)²", "เปรียบเทียบไม่ได้"], a: 2, t: "เลขยกกำลัง", c: "คำนวณค่าออกมา จะได้ 16 เท่ากัน" },
        { q: "ค่าของ 10³ × 10⁻³ คือเท่าใด?", o: ["10", "1", "0", "10⁻⁶"], a: 1, t: "เลขยกกำลัง", c: "เลขชี้กำลังรวมกันได้ 0, 10⁰ = 1" },
        { q: "ถ้า 2ⁿ ＝ 64 แล้ว n มีค่าเท่าใด?", o: ["4", "5", "6", "7"], a: 2, t: "เลขยกกำลัง", c: "กระจาย 64 เป็น 2×2×2×2×2×2" },
        { q: "ผลลัพธ์ของ (2³)² ÷ 2⁴ คือข้อใด?", o: ["2", "4", "8", "16"], a: 1, t: "เลขยกกำลัง", c: "เลขชี้กำลังซ้อนกันให้เอามาคูณกันก่อน" },
        { q: "ค่าของ (-1)¹⁰⁰ ＋ (-1)¹⁰¹ คือเท่าใด?", o: ["2", "-2", "1", "0"], a: 3, t: "เลขยกกำลัง", c: "เลขคู่เป็น 1 เลขคี่เป็น -1" },
        // Q16-20 สมการ
        { q: "แก้สมการ 2x ＋ 5 ＝ 15 ค่า x คือ?", o: ["4", "5", "6", "10"], a: 1, t: "สมการ", c: "ย้าย 5 ไปลบก่อน แล้วค่อยย้าย 2 ไปหาร" },
        { q: "ถ้า x/3 ＝ 4 แล้ว x เท่ากับเท่าใด?", o: ["7", "1", "12", "3/4"], a: 2, t: "สมการ", c: "ย้าย 3 ที่หารอยู่ไปคูณ" },
        { q: "โจทย์: สามเท่าของจำนวนหนึ่งมากกว่า 10 อยู่ 2 เขียนเป็นสมการอย่างไร?", o: ["3x - 10 ＝ 2", "3x ＋ 10 ＝ 2", "3x - 2 ＝ 10", "x/3 - 10 ＝ 2"], a: 0, t: "สมการ", c: "สามเท่าของ x คือ 3x มากกว่า 10 แปลว่าลบ 10 แล้วเหลือ 2" },
        { q: "แก้สมการ x - 5 ＝ -2", o: ["3", "-3", "7", "-7"], a: 0, t: "สมการ", c: "ย้าย -5 ไปเป็น +5 จะได้ x ＝ -2 ＋ 5" },
        { q: "สมการ 4(x ＋ 1) ＝ 20 ค่า x คือ?", o: ["4", "5", "6", "3"], a: 0, t: "สมการ", c: "เอา 4 ไปหาร 20 ก่อน จะได้ x ＋ 1 ＝ 5" },
        // Q21-25 เรขาคณิต
        { q: "มุมตรงข้ามมีขนาดเท่าใด?", o: ["รวมกันได้ 180", "เท่ากันเสมอ", "รวมกันได้ 90", "ไม่สัมพันธ์กัน"], a: 1, t: "เรขาคณิต", c: "สมบัติของมุมที่เกิดจากเส้นตรงตัดกัน" },
        { q: "ถ้าเส้นตรงสองเส้นขนานกัน มุมแย้งมีขนาดเป็นอย่างไร?", o: ["รวมกันได้ 180", "เท่ากัน", "รวมกันได้ 90", "ไม่มีสมบัติ"], a: 1, t: "เรขาคณิต", c: "เป็นนิยามพื้นฐานของเส้นขนาน" },
        { q: "มุมภายในบนข้างเดียวกันของเส้นตัดที่ตัดเส้นขนาน รวมกันได้กี่องศา?", o: ["90", "180", "270", "360"], a: 1, t: "เรขาคณิต", c: "จำไว้ว่ารวมกันได้ 180 (มุมประชิด)" },
        { q: "มุม 30 องศา มีมุมประกอบมุมฉากกี่องศา?", o: ["60", "150", "30", "90"], a: 0, t: "เรขาคณิต", c: "มุมฉากคือ 90 องศา" },
        { q: "มุมรอบจุดศูนย์กลางมีขนาดกี่องศา?", o: ["90", "180", "270", "360"], a: 3, t: "เรขาคณิต", c: "เป็นมุมรอบจุดคงที่" }
    ];

    const quizArea = document.getElementById('quiz-area');
    quizData.forEach((d, i) => {
        let options = d.o.map((opt, j) => `<div class="option-item" onclick="check(${i}, ${j})">${opt}</div>`).join('');
        quizArea.innerHTML += `<div class="question-container" id="q${i}"><strong>ข้อ ${i+1}. ${d.q}</strong><br><span style="color:red;">(Clue: ${d.c})</span>${options}<div class="feedback" id="f${i}"></div></div>`;
    });

    function check(qIdx, oIdx) {
        const q = quizData[qIdx];
        const f = document.getElementById(`f${qIdx}`);
        const items = document.querySelectorAll(`#q${qIdx} .option-item`);
        items.forEach((item, j) => {
            item.style.pointerEvents = 'none';
            if (j === q.a) item.classList.add('correct');
            else if (j === oIdx) item.classList.add('incorrect');
        });
        f.style.display = 'block';
        f.innerHTML = `<strong>${oIdx === q.a ? 'ถูกต้อง!' : 'ผิดครับ'}</strong><br>เฉลย: ${q.o[q.a]}<br>ทริกจากพระจอมเกล้าติวเตอร์: ฝึกวิเคราะห์ขั้นตอนให้ชินครับ!`;
    }

    function calculateScore() { alert("ครบ 25 ข้อแล้ว! ตรวจสอบความถูกต้องรายข้อได้เลยครับ"); }
</script>
</body>
</html>
