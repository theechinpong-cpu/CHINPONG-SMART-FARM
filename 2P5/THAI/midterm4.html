<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบภาษาไทย ป.5 (ชุดที่ 4 - ครบ 25 ข้อ) โดย พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .q-box { border: 1px solid #ddd; padding: 20px; margin-bottom: 15px; border-radius: 10px; background-color: #fff; }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #eee; cursor: pointer; border-radius: 5px; }
        .option:hover { background-color: #f8f9fa; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h1>แบบทดสอบภาษาไทย ป.5 (ชุดที่ 4 - ครบ 25 ข้อ)</h1>
    <div id="quiz-container"></div>
</div>

<script>
    const quizData = [
        { q: "ประโยคใดใช้ 'อุปลักษณ์' เปรียบเทียบได้ถูกต้องตามหลักภาษาไทย?", a: ["ใจเขาเหมือนหิน", "เขาเป็นดั่งหิน", "ใจเขาคือหิน", "เขาแข็งแรงราวกับหิน"], correct: 2, detail: "อุปลักษณ์ใช้คำเชื่อม 'คือ' หรือ 'เป็น' เท่านั้น" },
        { q: "ข้อใดไม่ใช่ความหมายของ 'ประชาธิปไตยในโรงเรียน'?", a: ["รับฟังเสียงข้างมาก", "เคารพสิทธิผู้อื่น", "การบังคับใช้กฎเกณฑ์โดยหัวหน้ากลุ่ม", "ความเท่าเทียมในการแสดงความเห็น"], correct: 2, detail: "การบังคับเป็นเผด็จการ ไม่ใช่ประชาธิปไตย" },
        { q: "คำราชาศัพท์ 'พระเนตร' หมายถึงอวัยวะใด?", a: ["ตา", "หู", "จมูก", "คาง"], correct: 0, detail: "พระเนตร หมายถึง ตา" },
        { q: "ข้อใดเป็นคำพ้องรูปทุกคำ?", a: ["กาล / การ", "เพลา (รถ) / เพลา (เวลา)", "ขัน (ภาชนะ) / ขัน (กริยา)", "กัน / กรรณ"], correct: 1, detail: "คำพ้องรูปต้องเขียนเหมือนกันเป๊ะ" },
        { q: "หากพบภัยเงียบในโลกออนไลน์ สิ่งที่ควรทำลำดับแรกคืออะไร?", a: ["ลบแอปทิ้ง", "แจ้งผู้ปกครองหรือครู", "ท้าทายกลับ", "ถามข้อมูลส่วนตัว"], correct: 1, detail: "การแจ้งผู้ใหญ่ปลอดภัยที่สุด" },
        { q: "คำว่า 'เสวย' ใช้แทนคำกริยาใดในราชาศัพท์?", a: ["เดิน", "กิน", "นอน", "เขียน"], correct: 1, detail: "เสวย แปลว่า กิน" },
        { q: "การประหยัดใน 'ครอบครัวพอเพียง' หมายถึงสิ่งใด?", a: ["การไม่ซื้อของเลย", "การซื้อเฉพาะของที่จำเป็น", "การหารายได้ให้มาก", "การใช้จ่ายฟุ่มเฟือย"], correct: 1, detail: "ความพอเพียงคือความพอดี" },
        { q: "ข้อใดคือคำพ้องเสียง?", a: ["กัน / กรรณ", "เวลา / เพลา", "ปัก / ปัก", "สุข / สุก"], correct: 0, detail: "อ่านเหมือนกัน แต่เขียนต่างกัน" },
        { q: "หลักการ 'คนละไม้คนละมือ' สื่อถึงสิ่งใด?", a: ["ความเป็นส่วนตัว", "การร่วมมือร่วมใจ", "การพึ่งพาหัวหน้า", "การแบ่งงาน"], correct: 1, detail: "หัวใจคือความสามัคคี" },
        { q: "ราชาศัพท์ 'ทรงพระอักษร' คืออะไร?", a: ["เขียนหนังสือ", "ทรงม้า", "ทรงยินดี", "ทรงพระสรวล"], correct: 0, detail: "ทรงพระอักษร = การเขียน" },
        { q: "คำใดมีที่มาต่างจากพวกในกลุ่มราชาศัพท์?", a: ["พระโอษฐ์", "พระศอ", "พระเนตร", "บรรทม"], correct: 3, detail: "บรรทมเป็นกริยา นอกนั้นเป็นคำนาม" },
        { q: "การมี 'เหตุผล' ในเศรษฐกิจพอเพียง คือข้อใด?", a: ["ตัดสินใจตามอารมณ์", "พิจารณาปัจจัยรอบด้าน", "ทำตามเพื่อน", "เลือกที่แพงสุด"], correct: 1, detail: "เหตุผลต้องมาจากการคิดรอบคอบ" },
        { q: "คำว่า 'บรรทม' มาจากภาษาใด?", a: ["บาลี", "สันสกฤต", "เขมร", "จีน"], correct: 2, detail: "บรรทม มาจากภาษาเขมร" },
        { q: "ข้อใดถือเป็น 'ภัยเงียบ' ในสื่อออนไลน์?", a: ["เพื่อนทักที่โรงเรียน", "การเล่นกีฬา", "คนแปลกหน้าทักแชท", "ทำกิจกรรมกลุ่ม"], correct: 2, detail: "ภัยเงียบมาพร้อมความไว้ใจ" },
        { q: "ประชาธิปไตยในโรงเรียนเน้นสิ่งใด?", a: ["กฎระเบียบที่เคร่งครัด", "การมีส่วนร่วม", "การแข่งขัน", "การตัดสินใจของครู"], correct: 1, detail: "เน้นการมีส่วนร่วม" },
        { q: "หากเพื่อนมีความเห็นต่าง ควรทำอย่างไร?", a: ["บังคับให้เปลี่ยนความคิด", "รับฟังเหตุผล", "ไม่คุยด้วย", "ตะโกนแย้ง"], correct: 1, detail: "ความต่างต้องจัดการด้วยเหตุผล" },
        { q: "คำว่า 'ขัน' ในข้อใดเป็นคำพ้องเสียง?", a: ["ขันน้ำ", "ไก่ขัน", "ขันน็อต", "ขันที"], correct: 3, detail: "ขันที ออกเสียงต่างจาก ขัน อื่นๆ" },
        { q: "การรู้จัก 'ตนเอง' ในเศรษฐกิจพอเพียง คืออะไร?", a: ["รู้ว่าเรามีฐานะอย่างไร", "รู้ว่าเราอยากได้อะไร", "รู้ว่าเพื่อนมีอะไร", "ถูกทุกข้อ"], correct: 0, detail: "คือการรู้ขีดจำกัดตนเอง" },
        { q: "ราชาศัพท์ 'พระสรวล' หมายถึงอะไร?", a: ["ร้องไห้", "ยิ้ม/หัวเราะ", "โกรธ", "พูด"], correct: 1, detail: "พระสรวล = หัวเราะ" },
        { q: "เมื่อเห็นเพื่อนคุยกับคนแปลกหน้าออนไลน์ ควรทำอย่างไร?", a: ["แอบดู", "บอกครู", "สอนเพื่อนคุย", "ไม่สนใจ"], correct: 1, detail: "การเตือนภัยคือการช่วยเพื่อน" },
        { q: "คำใดหมายถึง 'กาลเวลา' ในกลุ่มคำพ้องเสียง?", a: ["กาล", "กานต์", "การ", "กาน"], correct: 0, detail: "กาล แปลว่า เวลา" },
        { q: "เป้าหมายสูงสุดของประชาธิปไตยคืออะไร?", a: ["ทุกคนเป็นผู้นำ", "อยู่ร่วมกันอย่างสงบสุข", "แข่งขันกัน", "ได้คนเก่งสุด"], correct: 1, detail: "เน้นความสงบสุข" },
        { q: "คำว่า 'พระหัตถ์' หมายถึงอวัยวะใด?", a: ["มือ", "เท้า", "ปาก", "จมูก"], correct: 0, detail: "พระหัตถ์ คือ มือ" },
        { q: "ข้อใดเป็นการออมที่ถูกต้องตามหลักพอเพียง?", a: ["ออมเงินที่เหลือจากการใช้จ่ายฟุ่มเฟือย", "แบ่งเงินออมตั้งแต่ได้รับเงินมา", "ออมเงินเมื่อมีเหตุจำเป็นเท่านั้น", "ไม่จำเป็นต้องออม"], correct: 1, detail: "การวางแผนล่วงหน้าเป็นนิสัยพอเพียง" },
        { q: "ในบทเรียน 'คนละไม้คนละมือ' สื่อถึงการทำงานแบบใด?", a: ["ทำคนเดียว", "แบ่งปันหน้าที่", "ทำตามคำสั่งเจ้านาย", "ทำเมื่อได้รับค่าจ้าง"], correct: 1, detail: "คือการร่วมใจกันทำงาน" }
    ];

    const container = document.getElementById('quiz-container');
    quizData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-box';
        const qText = document.createElement('p');
        qText.innerText = `${index + 1}. ${item.q}`;
        div.appendChild(qText);

        item.a.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';

            btn.onclick = () => {
                const options = div.querySelectorAll('.option');
                options.forEach(o => o.style.pointerEvents = 'none');
                if (i === item.correct) {
                    btn.classList.add('correct');
                    feedbackDiv.innerText = "ถูกต้อง! " + item.detail;
                } else {
                    btn.classList.add('wrong');
                    options[item.correct].classList.add('correct');
                    feedbackDiv.innerText = "เฉลยคือ: " + item.a[item.correct] + ". " + item.detail;
                }
                feedbackDiv.style.display = 'block';
            };
            div.appendChild(btn);
            div.appendChild(feedbackDiv);
        });
        container.appendChild(div);
    });
</script>
</body>
</html>
