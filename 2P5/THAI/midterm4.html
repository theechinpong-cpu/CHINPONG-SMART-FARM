<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบภาษาไทย ป.5 (ชุดที่ 4 - ระดับยากมาก) โดย พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .q-box { border: 1px solid #ddd; padding: 20px; margin-bottom: 15px; border-radius: 10px; transition: 0.3s; }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #eee; cursor: pointer; border-radius: 5px; }
        .option:hover { background-color: #f8f9fa; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .feedback { margin-top: 10px; font-weight: bold; display: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>แบบทดสอบภาษาไทย ป.5 (ชุดที่ 4 - ระดับยากมาก)</h1>
    <div id="quiz-container"></div>
</div>

<script>
    const quizData = [
        { q: "ประโยคใดใช้ 'อุปลักษณ์' เปรียบเทียบได้ถูกต้องตามหลักภาษาไทย?", a: ["ใจเขาเหมือนหิน", "เขาเป็นดั่งหิน", "ใจเขาคือหิน", "เขาแข็งแรงราวกับหิน"], correct: 2, detail: "อุปลักษณ์ใช้คำเชื่อม 'คือ' หรือ 'เป็น' เท่านั้น ส่วนคำว่า เหมือน/ดั่ง/ราวกับ เป็นอุปมา" },
        { q: "ข้อใดไม่ใช่ความหมายของ 'ประชาธิปไตยในโรงเรียน'?", a: ["รับฟังเสียงข้างมาก", "เคารพสิทธิผู้อื่น", "การบังคับใช้กฎเกณฑ์โดยหัวหน้ากลุ่ม", "ความเท่าเทียมในการแสดงความเห็น"], correct: 2, detail: "การบังคับเป็นเผด็จการ ไม่ใช่ประชาธิปไตย" },
        { q: "คำราชาศัพท์ 'พระเนตร' หมายถึงอวัยวะใด และเป็นคำยืมจากภาษาใด?", a: ["ตา - เขมร", "ตา - บาลี", "หู - สันสกฤต", "จมูก - เขมร"], correct: 0, detail: "พระเนตร หมายถึง ตา มาจากภาษาเขมร" },
        { q: "ข้อใดเป็นคำพ้องรูปทุกคำ?", a: ["กาล / การ", "เพลา (รถ) / เพลา (เวลา)", "ขัน (ภาชนะ) / ขัน (กริยา)", "กัน / กรรณ"], correct: 1, detail: "คำพ้องรูปต้องเขียนเหมือนกันเป๊ะ" },
        { q: "หากพบภัยเงียบในโลกออนไลน์ สิ่งที่ควรทำลำดับแรกคืออะไร?", a: ["ลบแอปทิ้งทันที", "ปิดเครื่องและแจ้งผู้ปกครองหรือครู", "ท้าทายผู้ที่ทักแชทมา", "ถามข้อมูลส่วนตัวเขากลับ"], correct: 1, detail: "การแจ้งผู้ใหญ่คือการป้องกันที่ปลอดภัยที่สุด" },
        { q: "คำว่า 'เสวย' ใช้แทนคำกริยาใดในราชาศัพท์?", a: ["เดิน", "กิน", "นอน", "เขียน"], correct: 1, detail: "เสวย แปลว่า กิน" },
        { q: "การประหยัดใน 'ครอบครัวพอเพียง' หมายถึงสิ่งใดมากที่สุด?", a: ["การไม่ซื้อของเลย", "การซื้อเฉพาะของที่จำเป็นและคุ้มค่า", "การหารายได้ให้มากที่สุด", "การใช้จ่ายฟุ่มเฟือยแต่เก็บเงินได้"], correct: 1, detail: "ความพอเพียงคือความพอดี ไม่ใช่ความตระหนี่" },
        { q: "ข้อใดคือคำพ้องเสียง?", a: ["กัน / กรรณ", "เวลา / เพลา", "ปัก / ปัก", "สุข / สุก"], correct: 0, detail: "อ่านเหมือนกัน แต่เขียนต่างกัน" },
        { q: "หลักการ 'คนละไม้คนละมือ' สื่อถึงสิ่งใดมากที่สุด?", a: ["ความเป็นปัจเจกบุคคล", "การร่วมมือร่วมใจเพื่อเป้าหมายเดียวกัน", "การพึ่งพาหัวหน้ากลุ่มเพียงคนเดียว", "การแบ่งงานกันทำโดยไม่คุยกัน"], correct: 1, detail: "หัวใจคือความสามัคคีในการลงมือทำ" },
        { q: "ราชาศัพท์ 'ทรงพระอักษร' คืออะไร?", a: ["เขียนหนังสือ", "ทรงม้า", "ทรงยินดี", "ทรงพระสรวล"], correct: 0, detail: "ทรงพระอักษร = การเขียน" },
        { q: "ข้อใดใช้คำพ้องรูปผิดความหมาย?", a: ["เขาขับรถด้วยความเร็ว 100 กม./ชม.", "เขามีจิตใจที่เพลาลง (เวลา)", "เขาขันน็อตแน่น", "เขาตื่นแต่เพลาเช้า (เวลา)"], correct: 1, detail: "เพลาในข้อนี้ควรหมายถึงเวลา แต่ใช้ผิดบริบท" },
        { q: "การมี 'เหตุผล' ในเศรษฐกิจพอเพียง คือข้อใด?", a: ["ตัดสินใจตามอารมณ์", "พิจารณาปัจจัยต่างๆ รอบด้านก่อนเลือก", "ทำตามเพื่อนเพื่อให้ดูเข้าพวก", "เลือกสิ่งที่แพงที่สุดเพราะคิดว่าดีที่สุด"], correct: 1, detail: "เหตุผลต้องมาจากการคิดรอบคอบ" },
        { q: "คำว่า 'บรรทม' มาจากภาษาใด?", a: ["บาลี", "สันสกฤต", "เขมร", "จีน"], correct: 2, detail: "บรรทม มาจากภาษาเขมร" },
        { q: "ข้อใดถือเป็น 'ภัยเงียบ' ในบทเรียน?", a: ["เพื่อนมาทักที่โรงเรียน", "การเล่นกีฬา", "คนแปลกหน้าทักแชทชวนไปพบ", "การทำกิจกรรมกลุ่ม"], correct: 2, detail: "ภัยเงียบมาพร้อมความไว้ใจออนไลน์" },
        { q: "คำใดมีที่มาต่างจากพวก?", a: ["พระโอษฐ์", "พระศอ", "พระเนตร", "บรรทม"], correct: 3, detail: "บรรทมเป็นคำกริยา นอกนั้นเป็นคำนามราชาศัพท์" },
        { q: "ประชาธิปไตยในโรงเรียนเน้นสิ่งใด?", a: ["กฎระเบียบที่เคร่งครัด", "การมีส่วนร่วมและรับฟัง", "การแข่งขันของนักเรียน", "การตัดสินใจของครูฝ่ายเดียว"], correct: 1, detail: "คือการเปิดกว้างทางความคิด" },
        { q: "ถ้าเพื่อนในห้องมีความเห็นต่าง เราควรทำอย่างไร?", a: ["บังคับให้เพื่อนเปลี่ยนความคิด", "รับฟังและแลกเปลี่ยนเหตุผล", "ไม่คุยกับเพื่อนคนนั้นอีก", "ตะโกนแย้งทันที"], correct: 1, detail: "ความต่างต้องถูกจัดการด้วยเหตุผล" },
        { q: "คำว่า 'ขัน' ในข้อใดเป็นคำพ้องเสียง?", a: ["ขันน้ำ", "ไก่ขัน", "ขันน็อต", "ขันที"], correct: 3, detail: "ขันที ออกเสียงต่างจาก ขัน ในข้ออื่น" },
        { q: "การรู้จัก 'ตนเอง' ในเศรษฐกิจพอเพียง คืออะไร?", a: ["การรู้ว่าเรามีฐานะอย่างไร", "การรู้ว่าเราอยากได้อะไร", "การรู้ว่าเพื่อนมีอะไร", "ถูกทุกข้อ"], correct: 0, detail: "คือการรู้ขีดจำกัดตนเอง" },
        { q: "ราชาศัพท์ 'พระสรวล' หมายถึงอะไร?", a: ["ร้องไห้", "ยิ้ม/หัวเราะ", "โกรธ", "พูด"], correct: 1, detail: "พระสรวล = หัวเราะ" },
        { q: "หากเห็นเพื่อนแอบคุยกับคนแปลกหน้าออนไลน์ นักเรียนควรทำอย่างไร?", a: ["แอบดูด้วย", "บอกครูหรือผู้ปกครองโดยด่วน", "สอนเพื่อนให้คุยต่อไป", "ไม่สนใจ"], correct: 1, detail: "การเตือนภัยคือการช่วยเพื่อน" },
        { q: "ข้อใดเป็นคำพ้องรูปที่อ่านออกเสียงต่างกัน 2 แบบ?", a: ["กาล", "การ", "เพลา", "กรรณ"], correct: 2, detail: "เพลา อ่านได้ว่า เพ-ลา หรือ เพลา" },
        { q: "การทำงานกลุ่มที่เน้น 'คนละไม้คนละมือ' จะได้ผลลัพธ์อย่างไร?", a: ["งานสำเร็จเร็วขึ้น", "งานมีคุณภาพดีขึ้น", "สมาชิกมีความสุขขึ้น", "ถูกทุกข้อ"], correct: 3, detail: "สามัคคีคือผลสำเร็จในทุกมิติ" },
        { q: "ราชาศัพท์ 'ทรงยินดี' สื่อถึงอะไร?", a: ["การมีความสุข", "การยอมรับ", "การยินดี", "ไม่มีคำนี้ในราชาศัพท์"], correct: 3, detail: "มักใช้ ทรงพระเกษมสำราญ หรือคำอื่น" },
        { q: "ข้อใดคือเป้าหมายของประชาธิปไตย?", a: ["ให้ทุกคนเป็นผู้นำ", "ให้อยู่ร่วมกันได้อย่างสงบสุข", "ให้ทำงานแข่งกัน", "เพื่อให้ได้คนเก่งที่สุด"], correct: 1, detail: "ประชาธิปไตยเน้นความสงบและสิทธิ" }
    ];

    const container = document.getElementById('quiz-container');
    quizData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'q-box';
        div.innerHTML = `<p>${index + 1}. ${item.q}</p>`;
        item.a.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                const options = div.querySelectorAll('.option');
                options.forEach(o => o.style.pointerEvents = 'none');
                if (i === item.correct) {
                    btn.classList.add('correct');
                    div.querySelector('.feedback').innerText = "ถูกต้อง! " + item.detail;
                } else {
                    btn.classList.add('wrong');
                    options[item.correct].classList.add('correct');
                    div.querySelector('.feedback').innerText = "เฉลยคือ: " + item.a[item.correct] + ". " + item.detail;
                }
                div.querySelector('.feedback').style.display = 'block';
            };
            div.appendChild(btn);
        });
        div.innerHTML += `<div class="feedback"></div>`;
        container.appendChild(div);
    });
</script>
</body>
</html>
