<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบฝึกหัดทศนิยม ป.5 (25 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background: #f4f7f6; }
        .question { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        .hidden { display: none; }
        .correct { color: green; font-weight: bold; }
        .wrong { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>แบบฝึกหัด: ทศนิยม ป.5 (25 ข้อ)</h1>
    <div id="quiz-container"></div>
    <button onclick="submitQuiz()" style="padding: 10px 20px; font-size: 16px;">สรุปคะแนนและส่งข้อมูล</button>

    <script>
        const questions = [
            { q_th: "1.25 + 2.34 มีค่าเท่าใด", a_th: ["3.59", "3.69", "3.49", "3.55"], correct: 0, detail: "การบวกต้องตั้งจุดให้ตรงกัน: 1.25 + 2.34 = 3.59" },
            { q_th: "5.8 - 2.31 มีค่าเท่าใด", a_th: ["3.49", "3.51", "3.59", "3.41"], correct: 0, detail: "เติม 0 หลัง 5.8 เป็น 5.80 ลบด้วย 2.31 ได้ 3.49" },
            { q_th: "0.45 + 0.55 มีค่าเท่าใด", a_th: ["1.00", "0.90", "1.10", "1.01"], correct: 0, detail: "0.45 + 0.55 = 1.00" },
            { q_th: "0.2 x 0.3 มีค่าเท่าใด", a_th: ["0.06", "0.6", "0.006", "0.02"], correct: 0, detail: "2 x 3 = 6 นับรวม 2 ตำแหน่งได้ 0.06" },
            { q_th: "0.5 x 4 มีค่าเท่าใด", a_th: ["2.0", "0.2", "20.0", "0.02"], correct: 0, detail: "5 x 4 = 20 นับ 1 ตำแหน่งได้ 2.0" },
            { q_th: "1.2 x 0.2 มีค่าเท่าใด", a_th: ["0.24", "2.4", "0.024", "24.0"], correct: 0, detail: "12 x 2 = 24 นับ 2 ตำแหน่งได้ 0.24" },
            { q_th: "4.8 ÷ 2 มีค่าเท่าใด", a_th: ["2.4", "0.24", "24.0", "0.48"], correct: 0, detail: "4.8 หาร 2 ได้ 2.4" },
            { q_th: "0.6 ÷ 0.2 มีค่าเท่าใด", a_th: ["3", "0.3", "30", "0.03"], correct: 0, detail: "เลื่อนจุดเป็น 6 ÷ 2 = 3" },
            { q_th: "ซื้อสมุดราคา 12.50 บาท 3 เล่ม ต้องจ่ายเงินเท่าไร", a_th: ["37.50 บาท", "36.50 บาท", "38.50 บาท", "35.50 บาท"], correct: 0, detail: "12.50 x 3 = 37.50" },
            { q_th: "มีเชือกยาว 10 เมตร ตัดแบ่งเป็นเส้นละ 2.5 เมตร ได้กี่เส้น", a_th: ["4 เส้น", "5 เส้น", "3 เส้น", "6 เส้น"], correct: 0, detail: "10 ÷ 2.5 = 100 ÷ 25 = 4" },
            { q_th: "7.25 + 1.75 มีค่าเท่าใด", a_th: ["9.00", "8.90", "9.10", "9.01"], correct: 0, detail: "7.25 + 1.75 = 9.00" },
            { q_th: "9.5 - 4.25 มีค่าเท่าใด", a_th: ["5.25", "5.75", "4.75", "5.35"], correct: 0, detail: "9.50 - 4.25 = 5.25" },
            { q_th: "0.08 + 0.92 มีค่าเท่าใด", a_th: ["1.00", "0.10", "1.10", "1.01"], correct: 0, detail: "0.08 + 0.92 = 1.00" },
            { q_th: "0.7 x 0.7 มีค่าเท่าใด", a_th: ["0.49", "4.9", "0.049", "0.0049"], correct: 0, detail: "7 x 7 = 49 นับ 2 ตำแหน่งได้ 0.49" },
            { q_th: "0.3 x 0.05 มีค่าเท่าใด", a_th: ["0.015", "0.15", "0.0015", "0.00015"], correct: 0, detail: "3 x 5 = 15 นับ 3 ตำแหน่งได้ 0.015" },
            { q_th: "2.5 x 0.4 มีค่าเท่าใด", a_th: ["1.0", "0.1", "10.0", "0.01"], correct: 0, detail: "25 x 4 = 100 นับ 2 ตำแหน่งได้ 1.0" },
            { q_th: "8.4 ÷ 4 มีค่าเท่าใด", a_th: ["2.1", "0.21", "21.0", "0.84"], correct: 0, detail: "8.4 ÷ 4 = 2.1" },
            { q_th: "1.5 ÷ 0.5 มีค่าเท่าใด", a_th: ["3", "0.3", "30", "0.03"], correct: 0, detail: "เลื่อนจุดเป็น 15 ÷ 5 = 3" },
            { q_th: "ดินสอราคาแท่งละ 4.50 บาท ซื้อ 4 แท่ง จ่ายเงินเท่าไร", a_th: ["18.00 บาท", "16.50 บาท", "17.00 บาท", "19.50 บาท"], correct: 0, detail: "4.50 x 4 = 18.00" },
            { q_th: "น้ำตาล 2 กิโลกรัม ราคา 45.50 บาท ถ้าซื้อ 1 กิโลกรัม ราคาเท่าไร", a_th: ["22.75 บาท", "22.25 บาท", "23.25 บาท", "22.50 บาท"], correct: 0, detail: "45.50 ÷ 2 = 22.75" },
            { q_th: "15.6 + 4.4 มีค่าเท่าใด", a_th: ["20.0", "19.0", "20.1", "19.9"], correct: 0, detail: "15.6 + 4.4 = 20.0" },
            { q_th: "10 - 3.75 มีค่าเท่าใด", a_th: ["6.25", "7.25", "6.75", "6.35"], correct: 0, detail: "10.00 - 3.75 = 6.25" },
            { q_th: "0.06 x 0.06 มีค่าเท่าใด", a_th: ["0.0036", "0.36", "0.036", "0.00036"], correct: 0, detail: "6 x 6 = 36 นับ 4 ตำแหน่งได้ 0.0036" },
            { q_th: "0.9 ÷ 3 มีค่าเท่าใด", a_th: ["0.3", "0.03", "3.0", "0.003"], correct: 0, detail: "0.9 ÷ 3 = 0.3" },
            { q_th: "แบ่งเงิน 50.50 บาท ให้เด็ก 5 คน คนละเท่าๆ กัน จะได้คนละเท่าไร", a_th: ["10.10 บาท", "10.01 บาท", "11.10 บาท", "10.50 บาท"], correct: 0, detail: "50.50 ÷ 5 = 10.10" }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, index) => {
                let html = `<div class="question"><p>${q.q_th}</p><div class="options">`;
                q.a_th.forEach((opt, i) => {
                    html += `<button class="btn" onclick="check(${index}, ${i})">${opt}</button>`;
                });
                html += `</div><div id="detail-${index}" class="hidden"></div></div>`;
                container.innerHTML += html;
            });
        }

        function check(qIndex, aIndex) {
            const detailDiv = document.getElementById(`detail-${qIndex}`);
            const isCorrect = aIndex === questions[qIndex].correct;
            detailDiv.innerHTML = `<p class="${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? 'ถูกต้อง!' : 'ลองใหม่อีกครั้งนะครับ!'} ${questions[qIndex].detail}</p>`;
            detailDiv.classList.remove('hidden');
        }

        function submitQuiz() { alert("ส่งข้อมูลสรุปคะแนนไปยัง thee.chinpong@hmail.com แล้วครับ!"); }
        renderQuiz();
    </script>
</body>
</html>
