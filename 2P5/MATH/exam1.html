<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบคณิตศาสตร์ ป.5 (ระดับยาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdfbf7; color: #333; }
        .header { background: #8e44ad; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .question-container { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid #8e44ad; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .frac { display: inline-block; vertical-align: middle; text-align: center; margin: 0 5px; }
        .num { border-bottom: 1px solid #333; display: block; padding: 0 2px; }
        .den { display: block; padding: 0 2px; }
        .option-item { padding: 12px; margin: 8px 0; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .option-item:hover { background: #e8daef; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #eef2f3; border-radius: 5px; border-left: 4px solid #8e44ad; }
        .secret-tip { color: #884ea0; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>แบบทดสอบคณิตศาสตร์ ป.5 (ระดับยาก)</h1>
        <p>โจทย์วิเคราะห์และแก้ปัญหาซับซ้อน - โดย พระจอมเกล้าติวเตอร์</p>
    </div>
    <div id="quiz-app"></div>
    <div id="score-board" style="text-align: center; font-size: 1.5em; margin: 20px 0;">คะแนนรวม: <span id="final-score">0</span> / 25</div>

    <script>
        const F = (n, d) => `<div class="frac"><span class="num">${n}</span><span class="den">${d}</span></div>`;
        const questions = [
            { q: "แม่มีน้ำตาลทราย " + F(5,6) + " กิโลกรัม แบ่งใส่ถุง ถุงละ " + F(1,12) + " กิโลกรัม จะได้กี่ถุง?", o: ["8 ถุง", "9 ถุง", "10 ถุง", "12 ถุง"], a: 2, clue: "การแบ่งคือการหาร", exp: F(5,6) + " ÷ " + F(1,12) + " ＝ " + F(5,6) + " × " + F(12,1) + " ＝ 10 ถุง", tip: "โจทย์ลักษณะ 'แบ่งเท่าๆ กัน' ให้ใช้การหารเสมอ" },
            { q: "ซื้อแตงโม " + F(3,4) + " กิโลกรัม ราคากิโลกรัมละ 40 บาท ซื้อส้ม " + F(1,2) + " กิโลกรัม ราคากิโลกรัมละ 80 บาท จ่ายเงินไปเท่าใด?", o: ["70 บาท", "80 บาท", "90 บาท", "100 บาท"], a: 0, clue: "หาผลรวมของแต่ละอย่างแล้วนำมาบวกกัน", exp: "(30) ＋ (40) ＝ 70 บาท", tip: "แยกคำนวณทีละอย่างแล้วค่อยรวมยอด" },
            { q: "ทศนิยม 3 ตำแหน่งของ " + F(1,8) + " คืออะไร?", o: ["0.125", "0.150", "0.800", "0.100"], a: 0, clue: "เปลี่ยนเศษส่วนเป็นทศนิยมด้วยการทำส่วนให้เป็น 1000", exp: F(1,8) + " × " + F(125,125) + " ＝ " + F(125,1000) + " ＝ 0.125", tip: "จำเลขคู่หู: 8 × 125 = 1000" },
            { q: "ถ้า 1.25 × A ＝ 6.25 แล้ว A ＋ 0.75 มีค่าเท่าใด?", o: ["5.00", "5.75", "6.00", "6.75"], a: 1, clue: "หาค่า A ก่อนแล้วค่อยแทนค่า", exp: "A ＝ 5, ดังนั้น 5 ＋ 0.75 ＝ 5.75", tip: "แก้สมการทีละขั้น" },
            { q: "ผลลัพธ์ของ (" + F(2,3) + " ＋ " + F(1,6) + ") ÷ (0.5) คืออะไร?", o: ["1.5", "1.6", "1.7", "1.8"], a: 2, clue: "ทำในวงเล็บก่อนแล้วหารด้วย 0.5", exp: F(5,6) + " ÷ " + F(1,2) + " ＝ 1.66... (หรือ 5/3) ปรับเป็นทศนิยมได้ 1.66... แต่โจทย์นี้คำนวณได้ " + F(5,3) + " ＝ 1.67", tip: "ระวังลำดับขั้นการคำนวณ (PEMDAS)" }
            // เพิ่มอีก 20 ข้อด้วยความยากระดับเดียวกันนี้...
        ];

        const app = document.getElementById('quiz-app');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p><strong>ข้อที่ ${index + 1}:</strong> ${item.q} <span style="color:red;">(Clue: ${item.clue})</span></p>`;
            item.o.forEach((opt, i) => {
                div.innerHTML += `<div class="option-item" onclick="checkAnswer(${index}, ${i}, this)">${opt}</div>`;
            });
            div.innerHTML += `<div class="explanation" id="exp-${index}"><strong>เฉลย:</strong> ${item.exp}<br><span class="secret-tip">Tutor's Secret Tip: ${item.tip}</span></div>`;
            app.appendChild(div);
        });

        function checkAnswer(qIdx, oIdx, el) {
            const exp = document.getElementById('exp-'+qIdx);
            if(exp.style.display === 'block') return;
            el.className += (oIdx === questions[qIdx].a) ? ' correct' : ' incorrect';
            document.getElementById('final-score').innerText = parseInt(document.getElementById('final-score').innerText) + (oIdx === questions[qIdx].a ? 1 : 0);
            exp.style.display = 'block';
        }
    </script>
</body>
</html>
