<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบคณิตศาสตร์ ป.5 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdfbf7; color: #333; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .question-container { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option-item { padding: 12px; margin: 8px 0; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .option-item:hover { background: #f0f0f0; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #eef2f3; border-radius: 5px; border-left: 4px solid #3498db; }
        .secret-tip { color: #d35400; font-weight: bold; display: block; margin-top: 5px; }
        #score-board { margin-top: 20px; padding: 20px; background: #fff; border: 2px solid #2c3e50; text-align: center; font-size: 1.2em; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>แบบทดสอบคณิตศาสตร์ ป.5 (25 ข้อ)</h1>
        <p>หัวข้อที่ออกสอบบ่อยที่สุดในสนามสอบจริง - โดย พระจอมเกล้าติวเตอร์</p>
    </div>
    <div id="quiz-app"></div>
    <div id="score-board">คะแนนของคุณ: <span id="final-score">0</span> / 25</div>

    <script>
        const questions = [
            { q: "(1/2) ＋ (1/4) มีค่าเท่าใด?", o: ["2/6", "3/4", "2/4", "3/8"], a: 1, clue: "ทำตัวส่วนให้เท่ากับ 4", exp: "(1/2) ＝ (2/4) ดังนั้น (2/4) ＋ (1/4) ＝ (3/4)", tip: "มองส่วนตัวมากเป็นหลัก แล้วเปลี่ยนส่วนตัวน้อยให้เท่ากัน" },
            { q: "(0.5) × (0.3) มีค่าเท่าใด?", o: ["0.15", "1.5", "0.015", "0.8"], a: 0, clue: "คูณเลขเต็มแล้วนับจุด 2 ตำแหน่ง", exp: "5 × 3 ＝ 15 ทศนิยม 2 ตำแหน่งคือ 0.15", tip: "คูณเลขเหมือนจำนวนนับ แล้วค่อยเติมจุดทศนิยม!" },
            { q: "(2/3) ÷ 2 มีค่าเท่าใด?", o: ["4/3", "1/3", "2/6", "1/6"], a: 1, clue: "เปลี่ยนหารเป็นคูณกับเศษเป็นส่วน", exp: "(2/3) × (1/2) ＝ (2/6) ＝ (1/3)", tip: "หารจำนวนเต็มคือการคูณด้วยส่วนกลับของมัน" },
            { q: "(4.5) ÷ (0.5) มีค่าเท่าใด?", o: ["0.9", "9.0", "90", "0.09"], a: 1, clue: "เลื่อนจุดให้ตัวหารเป็น 5", exp: "45 ÷ 5 ＝ 9", tip: "เลื่อนจุดทั้งตัวตั้งและตัวหารให้ตัวหารเป็นจำนวนเต็มเสมอ" },
            { q: "(3/5) － (1/10) มีค่าเท่าใด?", o: ["2/10", "4/10", "5/10", "1/2"], a: 2, clue: "ทำส่วนเป็น 10", exp: "(6/10) － (1/10) ＝ (5/10) ＝ (1/2)", tip: "อย่าลืมทอนให้เป็นเศษส่วนอย่างต่ำก่อนตอบ" },
            { q: "(0.12) × 4 มีค่าเท่าใด?", o: ["0.48", "4.8", "0.048", "48"], a: 0, clue: "12 × 4 ＝ 48 แล้วใส่จุด 2 ตำแหน่ง", exp: "12 × 4 ＝ 48 เลื่อนจุด 2 ครั้งได้ 0.48", tip: "คูณเลขเหมือนจำนวนนับ แล้วค่อยเลื่อนจุดตามทศนิยม" },
            { q: "(1/4) ของ 20 เป็นเท่าใด?", o: ["4", "5", "10", "8"], a: 1, clue: "คำว่า 'ของ' คือการคูณ", exp: "(1/4) × 20 ＝ 5", tip: "เปลี่ยน 'ของ' เป็นเครื่องหมาย × ทันที" },
            { q: "(0.8) ÷ 4 มีค่าเท่าใด?", o: ["0.2", "0.02", "2.0", "0.12"], a: 0, clue: "8 ÷ 4 ＝ 2 แล้วใส่จุด 1 ตำแหน่ง", exp: "(0.8) ÷ 4 ＝ 0.2", tip: "การหารทศนิยมด้วยจำนวนเต็ม ให้ตั้งหารเหมือนปกติแล้วใส่จุดที่ตำแหน่งเดิม" },
            { q: "(7/8) ＋ (1/8) มีค่าเท่าใด?", o: ["8/16", "1", "8/8", "1.1"], a: 1, clue: "ส่วนเท่ากันแล้วบวกเศษได้เลย", exp: "8/8 ＝ 1", tip: "ถ้าตัวเศษเท่ากับตัวส่วน ค่าจะเป็น 1 เสมอ" },
            { q: "(0.05) × (0.2) มีค่าเท่าใด?", o: ["0.1", "0.01", "0.001", "0.015"], a: 2, clue: "5 × 2 ＝ 10 ทศนิยมรวม 3 ตำแหน่ง", exp: "(0.05) × (0.2) ＝ 0.010 ＝ 0.01", tip: "ระวัง! ต้องนับตำแหน่งทศนิยมจากโจทย์ทั้งสองตัวรวมกัน" },
            { q: "(2/9) ÷ (1/3) มีค่าเท่าใด?", o: ["2/27", "6/9", "2/3", "3/2"], a: 2, clue: "เปลี่ยนหารเป็นคูณ", exp: "(2/9) × (3/1) ＝ 6/9 ＝ 2/3", tip: "ตัดทอนตัวเลขก่อนคูณเลข จะช่วยให้คิดไวขึ้น" },
            { q: "(1.25) ＋ (0.75) มีค่าเท่าใด?", o: ["1.0", "2.0", "1.9", "0.20"], a: 1, clue: "ตั้งจุดให้ตรงกัน", exp: "(1.25) ＋ (0.75) ＝ 2.00", tip: "การบวกทศนิยม จุดต้องตรงกันเสมอ" },
            { q: "(4/7) × (2/3) มีค่าเท่าใด?", o: ["6/10", "8/21", "6/21", "8/10"], a: 1, clue: "บนคูณบน ล่างคูณล่าง", exp: "4×2＝8, 7×3＝21", tip: "การคูณเศษส่วนทำได้เลยไม่ต้องทำส่วนให้เท่ากัน" },
            { q: "(0.9) ÷ (0.3) มีค่าเท่าใด?", o: ["3", "0.3", "0.03", "30"], a: 0, clue: "ทำ 0.3 เป็น 3 เลื่อนจุด 1 ตำแหน่ง", exp: "9 ÷ 3 ＝ 3", tip: "เลื่อนจุดตัวหารให้เป็นจำนวนเต็ม แล้วเลื่อนตัวตั้งเท่ากัน" },
            { q: "(1/5) ＋ (2/3) มีค่าเท่าใด?", o: ["3/8", "13/15", "3/15", "5/8"], a: 1, clue: "ค.ร.น. คือ 15", exp: "(3/15) ＋ (10/15) ＝ 13/15", tip: "หา ค.ร.น. ให้แม่น การบวกจะง่ายมาก" },
            { q: "(0.4) × (0.4) มีค่าเท่าใด?", o: ["1.6", "0.16", "0.016", "16"], a: 1, clue: "4 × 4 ＝ 16 ใส่จุด 2 ตำแหน่ง", exp: "0.16", tip: "อย่าลืมว่า 0.1 × 0.1 จะได้ทศนิยม 2 ตำแหน่งเสมอ" },
            { q: "1 － (1/4) มีค่าเท่าใด?", o: ["3/4", "1/4", "4/4", "0.75"], a: 0, clue: "1 คือ 4/4", exp: "(4/4) － (1/4) ＝ 3/4", tip: "เลข 1 คือเศษส่วนที่ตัวเศษกับตัวส่วนเท่ากัน" },
            { q: "(5.5) ÷ 5 มีค่าเท่าใด?", o: ["1.1", "0.11", "11", "0.1"], a: 0, clue: "หารเลขปกติแล้วใส่จุด", exp: "55 ÷ 5 ＝ 11 ใส่จุด 1 ที่ ＝ 1.1", tip: "ถ้าตัวตั้งมีทศนิยม 1 ตำแหน่ง คำตอบก็มักจะมี 1 ตำแหน่ง" },
            { q: "(3/8) × 4 มีค่าเท่าใด?", o: ["12/8", "3/2", "1.5", "ถูกทุกข้อ"], a: 3, clue: "คูณแล้วตัดทอน", exp: "(12/8) ＝ (3/2) ＝ 1.5", tip: "คำตอบเศษส่วนกับทศนิยมมีค่าเท่ากันได้" },
            { q: "(0.25) × 2 มีค่าเท่าใด?", o: ["0.5", "0.05", "5.0", "0.25"], a: 0, clue: "25 × 2 ＝ 50 ใส่จุด 2 ตำแหน่ง", exp: "0.50", tip: "0.25 คือเศษ 1 ส่วน 4 คูณ 2 ก็จะได้ 2 ส่วน 4 หรือ 0.5" },
            { q: "(1/2) ÷ (1/2) มีค่าเท่าใด?", o: ["1", "0", "1/4", "4"], a: 0, clue: "จำนวนใดหารตัวมันเองได้ 1", exp: "(1/2) × (2/1) ＝ 1", tip: "จำไว้ว่าอะไรหารตัวเองก็ได้ 1" },
            { q: "(0.1) ＋ (0.2) มีค่าเท่าใด?", o: ["0.3", "0.03", "3.0", "0.12"], a: 0, clue: "บวกเลขปกติ", exp: "0.3", tip: "ตรวจสอบตำแหน่งทศนิยมให้ตรงกันทุกครั้ง" },
            { q: "(2/5) ของ 10 คือเท่าใด?", o: ["2", "4", "5", "20"], a: 1, clue: "(2/5) × 10", exp: "2 × 2 ＝ 4", tip: "เอา 10 ไปหาร 5 ก่อน จะได้ 2 แล้วค่อยคูณ 2" },
            { q: "(0.6) ÷ 2 มีค่าเท่าใด?", o: ["0.3", "0.03", "3.0", "0.62"], a: 0, clue: "6 ÷ 2 ＝ 3", exp: "0.3", tip: "ทศนิยมหารด้วยจำนวนเต็ม ใส่จุดที่เดิม" },
            { q: "(1/3) ＋ (1/3) ＋ (1/3) มีค่าเท่าใด?", o: ["1/9", "3/9", "1", "3/3"], a: 2, clue: "เศษรวมกัน", exp: "3/3 ＝ 1", tip: "ของ 3 ส่วนที่เท่ากัน รวมกันก็ได้ของเต็ม 1 ชิ้น" }
        ];

        let score = 0;
        let answered = new Array(25).fill(false);
        const app = document.getElementById('quiz-app');

        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p><strong>ข้อที่ ${index + 1}:</strong> ${item.q} <span style="color:red;">(Clue: ${item.clue})</span></p>`;
            item.o.forEach((opt, i) => {
                div.innerHTML += `<div class="option-item" onclick="checkAnswer(${index}, ${i}, this)">${opt}</div>`;
            });
            div.innerHTML += `<div class="explanation" id="exp-${index}"><strong>เฉลย:</strong> ${item.exp}<br><span class="secret-tip">Tutor's Secret Tip: ${item.tip}</span></div>`;
            app.appendChild(div);
        });

        function checkAnswer(qIdx, oIdx, el) {
            if(answered[qIdx]) return;
            answered[qIdx] = true;
            const item = questions[qIdx];
            const exp = document.getElementById(`exp-${qIdx}`);
            if(oIdx === item.a) {
                el.className = 'option-item correct';
                score++;
            } else {
                el.className = 'option-item incorrect';
            }
            document.getElementById('final-score').innerText = score;
            exp.style.display = 'block';
        }
    </script>
</body>
</html>
