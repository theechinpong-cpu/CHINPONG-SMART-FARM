<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบคณิตศาสตร์ ป.5 โดย พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .question-container { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .options { margin: 10px 0; }
        .feedback { display: none; margin-top: 10px; padding: 10px; border-radius: 5px; font-weight: bold; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        .tip { font-style: italic; color: #007bff; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>คลังข้อสอบคณิตศาสตร์ ป.5: เศษส่วนและทศนิยม</h1>
    <div id="quiz-area"></div>
    <button onclick="analyzeResults()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">วิเคราะห์ผลคะแนน</button>
    <div id="analysis-report"></div>

    <script>
        const questions = [
            // [1-3] เปรียบเทียบเศษส่วน
            { q: "ข้อใดถูกต้อง (2 / 3) กับ (4 / 5)", o: ["(2/3) < (4/5)", "(2/3) > (4/5)", "(2/3) = (4/5)", "ไม่สามารถเปรียบเทียบได้"], a: 0, clue: "ทำให้ส่วนเท่ากันคือ 15" },
            { q: "เศษส่วนใดมีค่ามากที่สุด: (1 / 2), (2 / 5), (3 / 8)", o: ["(1/2)", "(2/5)", "(3/8)", "เท่ากันหมด"], a: 0, clue: "เปรียบเทียบค่าทศนิยม" },
            { q: "เรียงลำดับจากน้อยไปมาก: (1 / 4), (1 / 3), (1 / 2)", o: ["(1/4), (1/3), (1/2)", "(1/2), (1/3), (1/4)", "(1/3), (1/4), (1/2)", "ไม่มีข้อถูก"], a: 0, clue: "ส่วนยิ่งมาก ค่าของเศษส่วนยิ่งน้อย" },
            // [4-6] บวก/ลบ จำนวนคละ
            { q: "1 (1 / 2) ＋ 2 (1 / 4) มีค่าเท่าใด", o: ["3 (1 / 4)", "3 (3 / 4)", "4 (1 / 4)", "3 (2 / 6)"], a: 1, clue: "เปลี่ยนจำนวนคละเป็นเศษเกิน หรือแยกบวกจำนวนเต็มกับเศษส่วน" },
            { q: "3 (2 / 3) － 1 (1 / 6) มีค่าเท่าใด", o: ["2 (1 / 2)", "2 (3 / 6)", "2 (1 / 6)", "1 (5 / 6)"], a: 0, clue: "หา ค.ร.น. ของส่วนคือ 6" },
            { q: "5 (1 / 5) ＋ 1 (2 / 10) มีค่าเท่าใด", o: ["6 (4 / 10)", "6 (2 / 5)", "6 (1 / 2)", "6 (3 / 5)"], a: 0, clue: "ทำส่วนให้เท่ากันก่อนบวก" },
            // [7-9] คูณเศษส่วน
            { q: "(3 / 4) × (2 / 5) มีค่าเท่าใด", o: ["6 / 20", "5 / 9", "6 / 9", "12 / 5"], a: 0, clue: "เศษคูณเศษ ส่วนคูณส่วน" },
            { q: "1 (1 / 2) × (2 / 3) มีค่าเท่าใด", o: ["1", "2 / 3", "1 (1 / 3)", "3 / 2"], a: 0, clue: "เปลี่ยน 1 (1/2) เป็น 3/2 ก่อนคูณ" },
            { q: "ถ้าคูณเศษส่วนด้วย 0 ผลลัพธ์คือข้อใด", o: ["เศษส่วนนั้น", "1", "0", "หาค่าไม่ได้"], a: 2, clue: "สมบัติการคูณด้วยศูนย์" },
            // [10-12] หารเศษส่วน
            { q: "(1 / 2) ÷ (1 / 4) มีค่าเท่าใด", o: ["1 / 8", "2", "1 / 2", "4"], a: 1, clue: "เปลี่ยนหารเป็นคูณ แล้วกลับเศษส่วนตัวหลัง" },
            { q: "(3 / 5) ÷ 3 มีค่าเท่าใด", o: ["1 / 5", "9 / 5", "3 / 15", "1 / 3"], a: 0, clue: "3 คือ (3 / 1)" },
            { q: "จำนวนใดหารด้วย (1 / 2) แล้วได้ 4", o: ["1", "2", "4", "8"], a: 1, clue: "ย้อนกลับโดยการคูณ" },
            // [13-16] โจทย์ปัญหาเศษส่วน
            { q: "มีเชือกยาว 10 เมตร ตัดแบ่งชิ้นละ (1 / 2) เมตร จะได้กี่ชิ้น", o: ["5 ชิ้น", "10 ชิ้น", "20 ชิ้น", "15 ชิ้น"], a: 2, clue: "นำความยาวทั้งหมดหารด้วยความยาวต่อชิ้น" },
            { q: "แม่มีเงิน 100 บาท ใช้ไป (3 / 4) ของเงินที่มี เหลือเงินกี่บาท", o: ["25 บาท", "50 บาท", "75 บาท", "30 บาท"], a: 0, clue: "ใช้ไป 3 ส่วนจาก 4 ส่วน เหลือ 1 ส่วน" },
            { q: "ถังน้ำจุ 20 ลิตร ตักออกไป (2 / 5) ของถัง จะเหลืออีกกี่ลิตร", o: ["8 ลิตร", "10 ลิตร", "12 ลิตร", "15 ลิตร"], a: 2, clue: "เหลืออีก 3 ส่วนจาก 5 ส่วน" },
            { q: "ระยะทาง 1 กม. เดินไปแล้ว (1 / 4) ของกม. เหลือระยะทางเท่าไร", o: ["250 ม.", "500 ม.", "750 ม.", "1000 ม."], a: 2, clue: "1 กม. = 1,000 เมตร" },
            // [17-19] ความสัมพันธ์
            { q: "0.75 เขียนในรูปเศษส่วนอย่างต่ำคือข้อใด", o: ["75 / 100", "3 / 4", "1 / 4", "7 / 5"], a: 1, clue: "0.75 คือ 75/100 หารด้วย 25 ทั้งบนและล่าง" },
            { q: "เศษส่วน (1 / 8) มีค่าเป็นทศนิยมกี่ตำแหน่ง", o: ["1 ตำแหน่ง", "2 ตำแหน่ง", "3 ตำแหน่ง", "4 ตำแหน่ง"], a: 2, clue: "ลองตั้งหารยาว 1 หาร 8" },
            { q: "ข้อใดไม่เท่ากับ 0.5", o: ["1 / 2", "5 / 10", "50 / 100", "1 / 5"], a: 3, clue: "1/5 คือ 0.2" },
            // [20-22] คูณ/หาร ทศนิยม
            { q: "0.2 × 0.3 มีค่าเท่าใด", o: ["0.6", "0.06", "0.006", "6"], a: 1, clue: "ตำแหน่งทศนิยมรวมกัน" },
            { q: "1.2 ÷ 2 มีค่าเท่าใด", o: ["0.6", "0.06", "6", "0.12"], a: 0, clue: "หารเลขปกติแล้วใส่จุดให้ตรงตำแหน่ง" },
            { q: "0.5 × 0.5 × 0.5 มีค่าเท่าใด", o: ["0.125", "0.0125", "1.25", "0.00125"], a: 0, clue: "5x5x5 = 125 ใส่จุด 3 ตำแหน่ง" },
            // [23-25] โจทย์ปัญหาทศนิยม
            { q: "ซื้อปากกา 3 ด้าม ด้ามละ 5.25 บาท ต้องจ่ายเงินเท่าใด", o: ["15.25", "15.75", "16.25", "15.50"], a: 1, clue: "คูณจำนวนด้ามกับราคา" },
            { q: "มีเงิน 50 บาท ซื้อขนม 3 ห่อ ห่อละ 12.50 บาท เหลือเงินกี่บาท", o: ["12.50", "37.50", "15.00", "13.50"], a: 0, clue: "50 - (3 × 12.50)" },
            { q: "น้ำขวดละ 7.50 บาท ถ้าซื้อ 4 ขวดจ่ายแบงค์ 50 บาท จะได้เงินทอนเท่าใด", o: ["20.00", "30.00", "25.00", "15.00"], a: 0, clue: "50 - (4 × 7.50)" }
        ];

        const container = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question-container" id="q${i}">
                <p><strong>ข้อที่ ${i + 1}: ${q.q}</strong> <span style="color:red;">(Clue: ${q.clue})</span></p>
                <div class="options">`;
            q.o.forEach((opt, oi) => {
                html += `<label><input type="radio" name="q${i}" value="${oi}" onclick="check(${i}, ${oi})"> ${opt}</label><br>`;
            });
            html += `</div><div class="feedback" id="f${i}"></div></div>`;
            container.innerHTML += html;
        });

        function check(qi, ai) {
            const f = document.getElementById(`f${qi}`);
            f.style.display = 'block';
            if(ai === questions[qi].a) {
                f.className = 'feedback correct';
                f.innerHTML = "ถูกต้อง! <div class='tip'>Tutor's Secret Tip: การฝึกฝนโจทย์เดิมซ้ำๆ ช่วยให้ความจำแม่นยำขึ้น</div>";
            } else {
                f.className = 'feedback wrong';
                f.innerHTML = `ผิดครับ! คำตอบที่ถูกคือ: ${questions[qi].o[questions[qi].a]} <div class='tip'>Tutor's Secret Tip: ตรวจสอบขั้นตอนการคำนวณอีกครั้ง ระวังเรื่องจุดทศนิยม!</div>`;
            }
        }

        function analyzeResults() {
            alert("ระบบได้วิเคราะห์จุดอ่อนของคุณแล้ว โปรดดูที่รายงานด้านล่าง");
            document.getElementById('analysis-report').innerHTML = "<h3>สรุปผลการวิเคราะห์</h3><p>หากคุณผิดในข้อ 1-16: คุณควรทบทวนเรื่อง 'การทำส่วนให้เท่ากัน' และ 'การเปลี่ยนวิธีหารเป็นคูณเศษส่วน' เป็นพิเศษ<br>หากคุณผิดในข้อ 17-25: คุณควรฝึกฝนเรื่อง 'การนับตำแหน่งทศนิยม' และ 'การจัดการลำดับการคำนวณในโจทย์ปัญหา'</p>";
        }
    </script>
</body>
</html>
