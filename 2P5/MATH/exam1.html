<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบคณิตศาสตร์ ป.5 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdfbf7; color: #333; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .question-container { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        /* สไตล์เศษส่วนแนวตั้ง */
        .frac { display: inline-block; vertical-align: middle; text-align: center; margin: 0 5px; }
        .num { border-bottom: 1px solid #333; display: block; padding: 0 2px; }
        .den { display: block; padding: 0 2px; }
        
        .option-item { padding: 12px; margin: 8px 0; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .option-item:hover { background: #f0f0f0; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #eef2f3; border-radius: 5px; border-left: 4px solid #3498db; }
        .secret-tip { color: #d35400; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>แบบทดสอบคณิตศาสตร์ ป.5 (25 ข้อ)</h1>
        <p>หัวข้อที่ออกสอบบ่อยที่สุดในสนามสอบจริง - โดย พระจอมเกล้าติวเตอร์</p>
    </div>
    <div id="quiz-app"></div>
    <div id="score-board" style="text-align: center; font-size: 1.5em; margin: 20px 0;">คะแนนรวม: <span id="final-score">0</span> / 25</div>

    <script>
        // ฟังก์ชันสร้างเศษส่วนแนวตั้ง (n=เศษ, d=ส่วน)
        const F = (n, d) => `<div class="frac"><span class="num">${n}</span><span class="den">${d}</span></div>`;

        const questions = [
            { q: F(1,2) + " ＋ " + F(1,4) + " มีค่าเท่าใด?", o: [F(2,6), F(3,4), F(2,4), F(3,8)], a: 1, clue: "ทำตัวส่วนให้เท่ากับ 4", exp: F(1,2) + " ＝ " + F(2,4) + " ดังนั้น " + F(2,4) + " ＋ " + F(1,4) + " ＝ " + F(3,4), tip: "ทำส่วนให้เท่ากันก่อนเสมอ" },
            { q: "(0.5) × (0.3) มีค่าเท่าใด?", o: ["0.15", "1.5", "0.015", "0.8"], a: 0, clue: "คูณเลขเต็มแล้วนับจุด 2 ตำแหน่ง", exp: "5 × 3 ＝ 15 ทศนิยม 2 ตำแหน่งคือ 0.15", tip: "อย่าลืมจุดทศนิยม!" },
            { q: F(2,3) + " ÷ 2 มีค่าเท่าใด?", o: [F(4,3), F(1,3), F(2,6), F(1,6)], a: 1, clue: "เปลี่ยนหารเป็นคูณกับเศษเป็นส่วน", exp: F(2,3) + " × " + F(1,2) + " ＝ " + F(1,3), tip: "หารจำนวนเต็มคือคูณด้วยส่วนกลับ" },
            { q: "(4.5) ÷ (0.5) มีค่าเท่าใด?", o: ["0.9", "9.0", "90", "0.09"], a: 1, clue: "เลื่อนจุดให้ตัวหารเป็น 5", exp: "45 ÷ 5 ＝ 9", tip: "เลื่อนจุดตัวหารให้เป็นจำนวนเต็มเสมอ" },
            { q: F(3,5) + " － " + F(1,10) + " มีค่าเท่าใด?", o: [F(2,10), F(4,10), F(5,10), F(1,2)], a: 3, clue: "ทำส่วนเป็น 10", exp: F(6,10) + " － " + F(1,10) + " ＝ " + F(5,10) + " ＝ " + F(1,2), tip: "ทอนให้เป็นเศษส่วนอย่างต่ำ" },
            { q: "(0.12) × 4 มีค่าเท่าใด?", o: ["0.48", "4.8", "0.048", "48"], a: 0, clue: "12 × 4 ＝ 48 ใส่จุด 2 ตำแหน่ง", exp: "0.48", tip: "คูณเหมือนจำนวนนับ แล้วค่อยใส่จุด" },
            { q: F(1,4) + " ของ 20 เป็นเท่าใด?", o: ["4", "5", "10", "8"], a: 1, clue: "เปลี่ยน 'ของ' เป็น 'คูณ'", exp: F(1,4) + " × 20 ＝ 5", tip: "คำว่าของคือคูณ" },
            { q: "(0.8) ÷ 4 มีค่าเท่าใด?", o: ["0.2", "0.02", "2.0", "0.12"], a: 0, clue: "8 ÷ 4 ＝ 2", exp: "0.2", tip: "ทศนิยมหารด้วยจำนวนเต็ม ใส่จุดที่เดิม" },
            { q: F(7,8) + " ＋ " + F(1,8) + " มีค่าเท่าใด?", o: [F(8,16), "1", F(8,8), "1.1"], a: 1, clue: "ส่วนเท่ากันแล้วบวกเศษได้เลย", exp: F(8,8) + " ＝ 1", tip: "เศษเท่าส่วนมีค่าเป็น 1" },
            { q: "(0.05) × (0.2) มีค่าเท่าใด?", o: ["0.1", "0.01", "0.001", "0.015"], a: 1, clue: "5 × 2 ＝ 10 ทศนิยมรวม 3 ตำแหน่ง", exp: "0.01", tip: "นับตำแหน่งทศนิยมจากโจทย์" },
            { q: F(2,9) + " ÷ " + F(1,3) + " มีค่าเท่าใด?", o: [F(2,27), F(6,9), F(2,3), F(3,2)], a: 2, clue: "เปลี่ยนหารเป็นคูณ", exp: F(2,9) + " × " + F(3,1) + " ＝ " + F(2,3), tip: "ตัดทอนก่อนคูณ" },
            { q: "(1.25) ＋ (0.75) มีค่าเท่าใด?", o: ["1.0", "2.0", "1.9", "0.20"], a: 1, clue: "ตั้งจุดให้ตรงกัน", exp: "2.00", tip: "จุดทศนิยมต้องตรงกัน" },
            { q: F(4,7) + " × " + F(2,3) + " มีค่าเท่าใด?", o: [F(6,10), F(8,21), F(6,21), F(8,10)], a: 1, clue: "บนคูณบน ล่างคูณล่าง", exp: F(8,21), tip: "คูณเศษส่วนได้เลย" },
            { q: "(0.9) ÷ (0.3) มีค่าเท่าใด?", o: ["3", "0.3", "0.03", "30"], a: 0, clue: "ทำ 0.3 เป็น 3 เลื่อนจุด", exp: "3", tip: "ทำตัวหารให้เป็นจำนวนเต็ม" },
            { q: F(1,5) + " ＋ " + F(2,3) + " มีค่าเท่าใด?", o: [F(3,8), F(13,15), F(3,15), F(5,8)], a: 1, clue: "ค.ร.น. คือ 15", exp: F(3,15) + " ＋ " + F(10,15) + " ＝ " + F(13,15), tip: "หา ค.ร.น. ตัวส่วนก่อน" },
            { q: "(0.4) × (0.4) มีค่าเท่าใด?", o: ["1.6", "0.16", "0.016", "16"], a: 1, clue: "4 × 4 ＝ 16 ใส่จุด 2 ตำแหน่ง", exp: "0.16", tip: "ระวังทศนิยม 2 ตำแหน่ง" },
            { q: "1 － " + F(1,4) + " มีค่าเท่าใด?", o: [F(3,4), F(1,4), F(4,4), "0.75"], a: 0, clue: "1 คือ " + F(4,4), exp: F(3,4), tip: "1 คือเศษส่วนที่เศษเท่าส่วน" },
            { q: "(5.5) ÷ 5 มีค่าเท่าใด?", o: ["1.1", "0.11", "11", "0.1"], a: 0, clue: "หารเลขปกติแล้วใส่จุด", exp: "1.1", tip: "จุดทศนิยมอยู่ที่เดิม" },
            { q: F(3,8) + " × 4 มีค่าเท่าใด?", o: [F(12,8), F(3,2), "1.5", "ถูกทั้งสองข้อหลัง"], a: 3, clue: "คูณแล้วตัดทอน", exp: F(12,8) + " ＝ " + F(3,2) + " ＝ 1.5", tip: "เศษส่วนกับทศนิยมเท่ากันได้" },
            { q: "(0.25) × 2 มีค่าเท่าใด?", o: ["0.5", "0.05", "5.0", "0.25"], a: 0, clue: "25 × 2 ＝ 50", exp: "0.5", tip: "จำเลขกลุ่ม 0.25 × 4 = 1" },
            { q: F(1,2) + " ÷ " + F(1,2) + " มีค่าเท่าใด?", o: ["1", "0", F(1,4), "4"], a: 0, clue: "อะไรหารตัวเองได้ 1", exp: "1", tip: "จำไว้ว่าอะไรหารตัวเองได้ 1" },
            { q: "(0.1) ＋ (0.2) มีค่าเท่าใด?", o: ["0.3", "0.03", "3.0", "0.12"], a: 0, clue: "บวกเลขปกติ", exp: "0.3", tip: "ระวังตำแหน่งทศนิยม" },
            { q: F(2,5) + " ของ 10 คือเท่าใด?", o: ["2", "4", "5", "20"], a: 1, clue: "ตัดทอนก่อนคูณ", exp: "4", tip: "นำ 10 หาร 5 ก่อนคูณ 2" },
            { q: "(0.6) ÷ 2 มีค่าเท่าใด?", o: ["0.3", "0.03", "3.0", "0.62"], a: 0, clue: "6 ÷ 2 ＝ 3", exp: "0.3", tip: "จุดตำแหน่งเดิม" },
            { q: F(1,3) + " ＋ " + F(1,3) + " ＋ " + F(1,3) + " มีค่าเท่าใด?", o: [F(1,9), F(3,9), "1", F(3,3)], a: 2, clue: "ของ 3 ส่วนรวมกันได้เต็ม", exp: "1", tip: "รวมกันได้ 1 เต็มชิ้น" }
        ];

        const app = document.getElementById('quiz-app');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p><strong>ข้อที่ ${index + 1}:</strong> ${item.q} <span style="color:red;">(Clue: ${item.clue})</span></p>`;
            item.o.forEach((opt, i) => {
                div.innerHTML += `<div class="option-item" onclick="checkAnswer(${index}, ${i}, this)">${opt}</div>`;
            });
            div.innerHTML += `<div class="explanation" id="exp-${index}"><strong>เฉลย:</strong> ${item.exp}<br><span class="secret-tip">Tutor's Secret Tip: ${item.tip}</span></div>`;
            app.appendChild(div);
        });

        function checkAnswer(qIdx, oIdx, el) {
            const exp = document.getElementById('exp-'+qIdx);
            if(exp.style.display === 'block') return;
            el.className += (oIdx === questions[qIdx].a) ? ' correct' : ' incorrect';
            document.getElementById('final-score').innerText = parseInt(document.getElementById('final-score').innerText) + (oIdx === questions[qIdx].a ? 1 : 0);
            exp.style.display = 'block';
        }
    </script>
</body>
</html>
