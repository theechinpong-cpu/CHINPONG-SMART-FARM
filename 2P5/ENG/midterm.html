<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบภาษาอังกฤษ ป.5 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #ddd; }
        .option { display: block; margin: 5px 0; padding: 10px; border: 1px solid #ccc; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .tip { background: #fff3cd; padding: 10px; margin-top: 10px; border-left: 5px solid #ffc107; font-size: 0.9em; margin-bottom: 10px; }
        .detail { color: #2c3e50; font-weight: bold; }
        #results { padding: 20px; border-radius: 10px; text-align: center; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="toggleLang()">Switch Language (TH / EN)</button>
        <h2 id="title">แบบทดสอบไวยากรณ์ภาษาอังกฤษ ป.5</h2>
        <div id="quiz-area"></div>
        <div id="results" style="display:none;"></div>
    </div>

    <script>
        const quizData = [
            { q_th: "He ___ (play) football every day.", q_en: "He ___ (play) football every day.", a_th: ["play", "plays", "playing", "played"], a_en: ["play", "plays", "playing", "played"], correct: 1, th: "ประธานเอกพจน์กริยาต้องเติม s", en: "Singular subject needs -s", detail: "He เป็นเอกพจน์ กริยา play จึงต้องเติม s" },
            { q_th: "___ do you go to school? - I go by bus.", q_en: "___ do you go to school? - I go by bus.", a_th: ["Who", "Where", "When", "How"], a_en: ["Who", "Where", "When", "How"], correct: 3, th: "ถามวิธีการไปโรงเรียนใช้ How", en: "Use How to ask about the method of transport", detail: "คำตอบคือ by bus (วิธีการ) จึงต้องใช้ How" },
            { q_th: "She ___ (not / eat) meat.", q_en: "She ___ (not / eat) meat.", a_th: ["don't eat", "doesn't eat", "isn't eat", "not eats"], a_en: ["don't eat", "doesn't eat", "isn't eat", "not eats"], correct: 1, th: "ประธานเอกพจน์ใช้ doesn't", en: "Singular subject uses doesn't", detail: "She เป็นเอกพจน์ต้องใช้ doesn't ร่วมกับกริยาไม่ผัน" },
            { q_th: "They ___ (be) my best friends.", q_en: "They ___ (be) my best friends.", a_th: ["is", "am", "are", "be"], a_en: ["is", "am", "are", "be"], correct: 2, th: "They คือพหูพจน์ใช้ are", en: "They is plural, use are", detail: "They เป็นพหูพจน์ต้องใช้ Verb to be คือ are" },
            { q_th: "___ is your teacher? - Mr. John.", q_en: "___ is your teacher? - Mr. John.", a_th: ["Who", "What", "Where", "Why"], a_en: ["Who", "What", "Where", "Why"], correct: 0, th: "ถามถึงคนใช้ Who", en: "Use Who to ask about people", detail: "คำตอบคือชื่อคน (Mr. John) จึงต้องใช้ Who" },
            { q_th: "We ___ (always / study) in the library.", q_en: "We ___ (always / study) in the library.", a_th: ["always study", "study always", "always studies", "are always study"], a_en: ["always study", "study always", "always studies", "are always study"], correct: 0, th: "Adverb อยู่หน้ากริยาแท้", en: "Adverb before the main verb", detail: "always เป็น Adverb วางหน้ากริยาแท้ study" },
            { q_th: "Does she ___ (like) apples?", q_en: "Does she ___ (like) apples?", a_th: ["like", "likes", "liked", "liking"], a_en: ["like", "likes", "liked", "liking"], correct: 0, th: "มี Does แล้วกริยาไม่ต้องเติม s", en: "After Does, verb is base form", detail: "เมื่อมี Does ในประโยค กริยาต้องเป็นรูปเดิม" },
            { q_th: "Give this book to ___ (he).", q_en: "Give this book to ___ (he).", a_th: ["he", "his", "him", "he's"], a_en: ["he", "his", "him", "he's"], correct: 2, th: "อยู่หลัง to ต้องใช้รูปกรรม", en: "After 'to', use object pronoun", detail: "หลังคำบุพบทต้องใช้รูปกรรมของ he คือ him" },
            { q_th: "___ do you live? - In Bangkok.", q_en: "___ do you live? - In Bangkok.", a_th: ["What", "Where", "When", "Who"], a_en: ["What", "Where", "When", "Who"], correct: 1, th: "ตอบเป็นสถานที่ใช้ Where", en: "Answer is a place, use Where", detail: "In Bangkok เป็นสถานที่ จึงใช้ Where" },
            { q_th: "My mom ___ (cook) very well.", q_en: "My mom ___ (cook) very well.", a_th: ["cook", "cooks", "cooking", "cooked"], a_en: ["cook", "cooks", "cooking", "cooked"], correct: 1, th: "ประธานเอกพจน์กริยาเติม s", en: "Singular subject, add -s", detail: "My mom เป็นเอกพจน์ กริยา cook ต้องเติม s" },
            { q_th: "They ___ (never / be) late.", q_en: "They ___ (never / be) late.", a_th: ["never be", "are never", "never are", "be never"], a_en: ["never be", "are never", "never are", "be never"], correct: 1, th: "Adverb อยู่หลัง Verb to be", en: "Adverb after Verb to be", detail: "are คือ Verb to be ต้องวาง Adverb หลัง are" },
            { q_th: "___ time is it?", q_en: "___ time is it?", a_th: ["Who", "What", "Where", "Why"], a_en: ["Who", "What", "Where", "Why"], correct: 1, th: "ถามเวลาใช้ What", en: "Use What to ask about time", detail: "ถามเวลาใช้ What time" },
            { q_th: "I ___ (see) her yesterday.", q_en: "I ___ (see) her yesterday.", a_th: ["see", "sees", "saw", "seen"], a_en: ["see", "sees", "saw", "seen"], correct: 2, th: "เหตุการณ์ในอดีตใช้กริยาช่อง 2", en: "Past event uses verb 2", detail: "yesterday เป็นอดีต กริยา see เปลี่ยนเป็น saw" },
            { q_th: "She ___ (have) a cat.", q_en: "She ___ (have) a cat.", a_th: ["have", "has", "haves", "having"], a_en: ["have", "has", "haves", "having"], correct: 1, th: "ประธานเอกพจน์ใช้ has", en: "Singular subject uses has", detail: "ประธานเอกพจน์ have เปลี่ยนเป็น has" },
            { q_th: "Why ___ you cry?", q_en: "Why ___ you cry?", a_th: ["do", "does", "is", "are"], a_en: ["do", "does", "is", "are"], correct: 0, th: "You ใช้กับ do", en: "You goes with do", detail: "ประธาน you ต้องใช้ do ในคำถาม" },
            { q_th: "This is ___ (she) bag.", q_en: "This is ___ (she) bag.", a_th: ["she", "her", "hers", "herself"], a_en: ["she", "her", "hers", "herself"], correct: 1, th: "ใช้แสดงความเป็นเจ้าของ", en: "Possessive adjective", detail: "her ใช้แสดงความเป็นเจ้าของหน้าคำนาม" },
            { q_th: "Birds ___ (fly) in the sky.", q_en: "Birds ___ (fly) in the sky.", a_th: ["fly", "flies", "flying", "flew"], a_en: ["fly", "flies", "flying", "flew"], correct: 0, th: "Birds เป็นพหูพจน์ไม่ต้องเติม s", en: "Birds is plural, no -s", detail: "Birds พหูพจน์ กริยาไม่ต้องเติมอะไร" },
            { q_th: "___ is your birthday?", q_en: "___ is your birthday?", a_th: ["Who", "When", "Where", "How"], a_en: ["Who", "When", "Where", "How"], correct: 1, th: "ถามวันเกิดใช้ When", en: "Use When for birthdays", detail: "วันเกิดคือเวลา จึงใช้ When" },
            { q_th: "He ___ (usually / go) to the gym.", q_en: "He ___ (usually / go) to the gym.", a_th: ["usually goes", "goes usually", "usually go", "go usually"], a_en: ["usually goes", "goes usually", "usually go", "go usually"], correct: 0, th: "ประธานเอกพจน์ + Adverb + กริยาเติม s", en: "Subject + Adverb + Verb -s", detail: "วาง Adverb หน้ากริยา และกริยาต้องเติม s" },
            { q_th: "They ___ (not / like) pizza.", q_en: "They ___ (not / like) pizza.", a_th: ["don't like", "doesn't like", "not like", "aren't like"], a_en: ["don't like", "doesn't like", "not like", "aren't like"], correct: 0, th: "They เป็นพหูพจน์ใช้ don't", en: "They is plural, use don't", detail: "They พหูพจน์ใช้ don't" },
            { q_th: "I bought it for ___ (they).", q_en: "I bought it for ___ (they).", a_th: ["they", "them", "their", "theirs"], a_en: ["they", "them", "their", "theirs"], correct: 1, th: "หลัง for ใช้รูปกรรม", en: "After for, use object", detail: "หลัง for ต้องใช้ them" },
            { q_th: "___ do you feel today?", q_en: "___ do you feel today?", a_th: ["Who", "What", "When", "How"], a_en: ["Who", "What", "When", "How"], correct: 3, th: "ถามความรู้สึกใช้ How", en: "Use How for feelings", detail: "ถามความรู้สึกใช้ How" },
            { q_th: "The sun ___ (rise) in the east.", q_en: "The sun ___ (rise) in the east.", a_th: ["rise", "rises", "rising", "rose"], a_en: ["rise", "rises", "rising", "rose"], correct: 1, th: "พระอาทิตย์เป็นเอกพจน์", en: "Sun is singular", detail: "The sun เอกพจน์ กริยาเติม s" },
            { q_th: "I ___ (always / be) happy.", q_en: "I ___ (always / be) happy.", a_th: ["always am", "am always", "be always", "always be"], a_en: ["always am", "am always", "be always", "always be"], correct: 1, th: "Adverb หลัง Verb to be", en: "Adverb after Verb to be", detail: "am เป็น Verb to be วาง Adverb ไว้ข้างหลัง" },
            { q_th: "Why ___ she study hard?", q_en: "Why ___ she study hard?", a_th: ["do", "does", "is", "are"], a_en: ["do", "does", "is", "are"], correct: 1, th: "She ใช้กับ does", en: "She goes with does", detail: "She เป็นเอกพจน์ใช้ does" }
        ];

        let lang = 'th';
        let score = 0;
        let answered = 0;

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = '';
            quizData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'question-container';
                div.innerHTML = `
                    <p><strong>${index + 1}. ${lang === 'th' ? item.q_th : item.q_en}</strong></p>
                    ${(lang === 'th' ? item.a_th : item.a_en).map((opt, i) => `<div class="option" onclick="check(${index}, ${i})">${opt}</div>`).join('')}
                    <div id="feedback-${index}" style="display:none;">
                        <div class="tip">Clue: ${lang === 'th' ? item.th : item.en}</div>
                        <div class="detail">${item.detail}</div>
                    </div>
                `;
                area.appendChild(div);
            });
        }

        function check(qIdx, aIdx) {
            const feedback = document.getElementById(`feedback-${qIdx}`);
            const options = document.querySelectorAll(`.question-container:nth-child(${qIdx + 1}) .option`);
            options.forEach(opt => opt.style.pointerEvents = 'none');
            
            if (aIdx === quizData[qIdx].correct) {
                options[aIdx].className = 'option correct';
                score++;
            } else {
                options[aIdx].className = 'option wrong';
                options[quizData[qIdx].correct].className = 'option correct';
            }
            feedback.style.display = 'block';
            answered++;
            if (answered === quizData.length) showResults();
        }

        function showResults() {
            const res = document.getElementById('results');
            res.style.display = 'block';
            const percent = (score / quizData.length) * 100;
            res.innerHTML = `<h3>คะแนนของคุณ: ${score}/${quizData.length} (${percent.toFixed(2)}%)</h3>
                             <p style="color: ${percent >= 60 ? '#2ecc71' : '#e74c3c'}">${percent >= 60 ? '🌟 ทำได้ดีมาก' : '⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม'}</p>`;
            
            // จำลองการส่งอีเมล
            console.log("Sending results to thee.chinpong@hmail.com...");
            alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
        }

        function toggleLang() {
            lang = lang === 'th' ? 'en' : 'th';
            renderQuiz();
        }
        renderQuiz();
    </script>
</body>
</html>
