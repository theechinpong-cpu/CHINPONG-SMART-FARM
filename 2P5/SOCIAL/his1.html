<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Exam: การสืบค้นท้องถิ่น by พระจอมเกล้าติวเตอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clue-box { background: #fef3c7; border-left: 4px solid #d97706; padding: 10px; margin: 10px 0; font-size: 0.9em; color: #92400e; }
        .detail-box { display: none; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .correct-bg { background-color: #d1fae5; border: 1px solid #059669; }
        .wrong-bg { background-color: #fee2e2; border: 1px solid #dc2626; }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg border-t-8 border-blue-600">
        <h1 class="text-3xl font-bold mb-6 text-blue-800">ข้อสอบ: การสืบค้นความเป็นมาของท้องถิ่น (ป.5)</h1>
        
        <div id="quiz-container"></div>
        <div id="result-screen" class="hidden text-center p-8 border-t mt-8"></div>
        <p class="text-center mt-10 text-gray-400 italic">เขียนโดย พระจอมเกล้าติวเตอร์</p>
    </div>

    <script>
        let score = 0;
        let answered = new Array(25).fill(false);
        const questions = [
            { q: "1. เหตุใดการตั้งประเด็นคำถามก่อนสืบค้นจึงสำคัญที่สุด?", a: ["เพื่อให้ทำงานเสร็จไว", "เพื่อกำหนดทิศทางการค้นหาข้อมูล", "เพื่อให้มีรายงานส่งครู", "เพื่อใช้ข้อมูลจากอินเทอร์เน็ตได้ง่าย"], correct: 1, detail: "การกำหนดประเด็นที่ชัดเจนช่วยให้ไม่หลงประเด็นและเลือกหลักฐานได้แม่นยำ" },
            { q: "2. หากต้องการทราบประวัติของวัดเก่าในชุมชน หลักฐานประเภทใดให้ข้อมูลได้ 'ตรงที่สุด'?", a: ["หนังสือเรียนประวัติศาสตร์", "จารึกที่ฐานพระพุทธรูปในวัด", "คำบอกเล่าของคนในหมู่บ้านข้างเคียง", "ข้อมูลจากเว็บไซต์ท่องเที่ยว"], correct: 1, detail: "จารึกในสถานที่จริงคือหลักฐานชั้นต้นที่มีความน่าเชื่อถือสูงในเชิงพื้นที่" },
            { q: "3. การที่นักเรียนนำ 'หลักฐานหลายประเภท' มาตรวจสอบซ้ำกัน เรียกว่าขั้นตอนใด?", a: ["การรวบรวมหลักฐาน", "การตรวจสอบหลักฐาน", "การตีความหลักฐาน", "การนำเสนอข้อมูล"], correct: 1, detail: "การเปรียบเทียบข้อมูลเพื่อหาข้อสรุปคือขั้นตอนการตรวจสอบความน่าเชื่อถือ" },
            { q: "4. สิ่งใดบ่งบอกว่าหลักฐานทางประวัติศาสตร์ชิ้นนั้นมีความน่าเชื่อถือต่ำ?", a: ["ผู้บันทึกเป็นผู้อยู่ในเหตุการณ์จริง", "มีการอ้างอิงแหล่งที่มาที่ชัดเจน", "ผู้บันทึกมีอคติหรือต้องการโน้มน้าวใจ", "หลักฐานได้รับการเก็บรักษาในพิพิธภัณฑ์"], correct: 2, detail: "อคติของผู้เขียนทำให้ความเที่ยงตรงของข้อมูลลดลง" },
            { q: "5. 'แว่นขยายชั้นบุคคล' ในการวิเคราะห์ประวัติศาสตร์ เน้นพิจารณาเรื่องใด?", a: ["สถานภาพของผู้บันทึกว่าเกี่ยวข้องกับเหตุการณ์อย่างไร", "ลักษณะทางกายภาพของสถานที่", "การเปลี่ยนแปลงของเหตุการณ์", "จำนวนประชากรที่เพิ่มขึ้น"], correct: 0, detail: "เราต้องรู้ว่า 'ใคร' เป็นผู้สร้างหลักฐานและอยู่ในฐานะอะไร" },
            { q: "6. ข้อใดคือความแตกต่างหลักระหว่างหลักฐานชั้นต้นและชั้นรอง?", a: ["ความเก่าแก่ของเอกสาร", "ความใกล้ชิดกับเหตุการณ์ของผู้สร้าง", "ภาษาที่ใช้ในการบันทึก", "ราคาของหลักฐาน"], correct: 1, detail: "หลักฐานชั้นต้นเกิดร่วมสมัย ส่วนชั้นรองเกิดจากการนำข้อมูลมาวิเคราะห์ภายหลัง" },
            { q: "7. ในการตีความหลักฐาน นักเรียนควรยึดหลักใด?", a: ["เชื่อข้อมูลที่ดูน่าตื่นเต้น", "ความเป็นกลางและเหตุผลที่พิสูจน์ได้", "เชื่อตามเสียงส่วนใหญ่", "เชื่อข้อมูลจากแหล่งเดียวเพื่อให้ไม่สับสน"], correct: 1, detail: "ความเป็นกลางคือการตัดความรู้สึกส่วนตัวออกแล้ววิเคราะห์ตามหลักฐานจริง" },
            { q: "8. หากคำบอกเล่าของผู้ใหญ่ 2 ท่านขัดแย้งกัน นักเรียนควรทำอย่างไร?", a: ["เลือกเชื่อคนที่อายุมากกว่า", "เลือกเชื่อคนที่พูดจาน่าเชื่อถือกว่า", "แสวงหาหลักฐานอื่นประกอบเพื่อเปรียบเทียบ", "ทิ้งข้อมูลทั้งสองแหล่ง"], correct: 2, detail: "ควรใช้ 'หลักฐานชิ้นที่ 3' เพื่อตรวจสอบความถูกต้อง" },
            { q: "9. ข้อใดไม่ใช่ลักษณะของหลักฐานทางประวัติศาสตร์?", a: ["โบราณสถาน", "ตำนานพื้นบ้านที่ไม่มีหลักฐานประกอบ", "ศิลาจารึก", "บันทึกจดหมายเหตุ"], correct: 1, detail: "ตำนานที่เลื่อนลอยโดยไม่มีหลักฐานยืนยันเป็นเพียงเรื่องเล่า ไม่ใช่หลักฐานที่น่าเชื่อถือ" },
            { q: "10. หากนักเรียนต้องการทราบพัฒนาการของชุมชน ควรใช้หลักการ 'แว่นขยายชั้นใด'?", a: ["ชั้นบุคคล", "ชั้นสภาพแวดล้อม", "ชั้นการเปลี่ยนแปลง", "ชั้นความเชื่อ"], correct: 2, detail: "การเปลี่ยนแปลงมองเห็นได้ผ่านลำดับเวลาและเหตุการณ์ที่เปลี่ยนไป" },
            { q: "11. ถ้าพบแผนที่ชุมชนปี พ.ศ. 2500 เทียบกับปัจจุบัน นี่คือหลักฐานที่แสดงถึง?", a: ["จำนวนประชากร", "การเปลี่ยนแปลงทางกายภาพ", "ความเชื่อทางศาสนา", "การเมืองการปกครอง"], correct: 1, detail: "แผนที่แสดงถึงการเปลี่ยนแปลงของผังเมืองและสภาพแวดล้อม" },
            { q: "12. ขั้นตอนสุดท้ายของการสืบค้นท้องถิ่นคือ 'การนำเสนอ' เพื่อจุดประสงค์ใด?", a: ["เพื่ออวดผลงาน", "เพื่อให้ผู้อื่นเข้าใจประวัติความเป็นมาของชุมชน", "เพื่อให้ครูให้คะแนนเยอะ", "เพื่อเก็บข้อมูลไว้ดูคนเดียว"], correct: 1, detail: "การสื่อสารคือเป้าหมายสูงสุดเพื่อแบ่งปันองค์ความรู้" },
            { q: "13. การตรวจสอบหลักฐานด้วยวิธีการดู 'วันเวลาที่บันทึก' มีประโยชน์อย่างไร?", a: ["ทำให้รู้ว่าเอกสารเก่ากี่ปี", "ทำให้รู้ว่าข้อมูลนั้นทันสมัยและใกล้ชิดเหตุการณ์เพียงใด", "ทำให้เอกสารดูน่าเชื่อถือขึ้น", "ทำให้ประหยัดเวลาในการอ่าน"], correct: 1, detail: "ความใกล้ชิดกับเวลาจริงของเหตุการณ์คือตัวบ่งชี้สำคัญ" },
            { q: "14. หลักฐานที่เป็น 'โบราณสถาน' จัดเป็นหลักฐานประเภทใด?", a: ["หลักฐานลายลักษณ์อักษร", "หลักฐานไม่เป็นลายลักษณ์อักษร", "หลักฐานชั้นรอง", "เรื่องเล่า"], correct: 1, detail: "โบราณสถานเป็นหลักฐานประเภทวัตถุ" },
            { q: "15. การวิเคราะห์ว่า 'สภาพแวดล้อม' ส่งผลต่ออาชีพของคนในท้องถิ่นอย่างไร คือการใช้แว่นขยายชั้นใด?", a: ["บุคคล", "สภาพแวดล้อม", "การเปลี่ยนแปลง", "วัฒนธรรม"], correct: 1, detail: "สภาพแวดล้อมบอกบริบทของพื้นที่ (เช่น ใกล้น้ำทำประมง)" },
            { q: "16. ข้อใดเป็นการนำเสนอข้อมูลทางประวัติศาสตร์ที่น่าสนใจที่สุด?", a: ["อ่านรายงานให้เพื่อนฟัง", "ทำป้ายนิเทศประกอบรูปภาพ", "เขียนสรุปส่งครู", "ท่องจำแล้วไปสอบ"], correct: 1, detail: "การใช้สื่อภาพประกอบช่วยให้การถ่ายทอดเรื่องราวมีความชัดเจน" },
            { q: "17. ทำไมจึงต้องตรวจสอบข้อมูลจากหลายแหล่ง?", a: ["ป้องกันความผิดพลาดจากอคติหรือข้อจำกัดของผู้บันทึก", "เพราะงานวิจัยกำหนดให้ทำ", "เพื่อให้เนื้อหาหนาขึ้น", "เพื่อให้ไม่ต้องเสียเวลาตีความ"], correct: 0, detail: "การตรวจสอบแบบ Triangulation ช่วยลดความผิดพลาด" },
            { q: "18. หลักฐานชั้นรองที่พบได้บ่อยที่สุดในห้องสมุดคือ?", a: ["บันทึกประจำวันของกษัตริย์", "หนังสือประวัติศาสตร์ทั่วไป", "ศิลาจารึก", "เหรียญกษาปณ์"], correct: 1, detail: "หนังสือที่ผ่านการรวบรวมและวิเคราะห์มาแล้วคือหลักฐานชั้นรอง" },
            { q: "19. ก่อนเริ่มสืบค้น ขั้นตอนใดควรทำถัดจากการตั้งคำถาม?", a: ["สรุปผล", "รวบรวมหลักฐาน", "นำเสนอ", "ตีความ"], correct: 1, detail: "เมื่อมีคำถามแล้ว ต้องรีบหาหลักฐานมาตอบ" },
            { q: "20. หากมีคนอ้างว่าหมู่บ้านสร้างมา 500 ปี เราควรตรวจสอบอย่างไร?", a: ["เชื่อทันทีเพราะเขาเป็นผู้ใหญ่", "หาหลักฐานวัตถุหรือเอกสารที่ยืนยันช่วงเวลาได้", "ลองหาในกูเกิลครั้งเดียว", "ไม่ต้องตรวจสอบ"], correct: 1, detail: "การพิสูจน์ด้วยหลักฐานเชิงประจักษ์คือหัวใจของประวัติศาสตร์" },
            { q: "21. การตีความหมายข้อมูลที่ไม่ตรงกับความจริงถือเป็น?", a: ["การนำเสนอที่สร้างสรรค์", "ความผิดพลาดจากการขาดข้อมูลหรืออคติ", "ขั้นตอนปกติของการเรียนรู้", "เป็นเรื่องตลก"], correct: 1, detail: "หากไม่รอบคอบจะทำให้ประวัติศาสตร์บิดเบือน" },
            { q: "22. ความเป็นกลางในประวัติศาสตร์หมายถึง?", a: ["การไม่ตัดสินว่าใครผิดหรือถูก แต่รายงานตามที่เห็น", "การเข้าข้างฝั่งใดฝั่งหนึ่ง", "การเขียนให้คนอ่านรู้สึกเศร้า", "การไม่เขียนเรื่องความขัดแย้ง"], correct: 0, detail: "รายงานตามข้อเท็จจริงโดยปราศจากการเติมความรู้สึก" },
            { q: "23. วัตถุในพิพิธภัณฑ์ท้องถิ่น ช่วยให้เราเข้าใจสิ่งใดมากที่สุด?", a: ["อนาคตของชุมชน", "วิถีชีวิตในอดีตของผู้คน", "ราคาของเก่า", "ความสามารถในการซ่อมแซม"], correct: 1, detail: "สิ่งของในอดีตสะท้อนกิจวัตรประจำวันของคนยุคนั้น" },
            { q: "24. การสืบค้นท้องถิ่นทำให้เราเกิดสิ่งใด?", a: ["ความร่ำรวย", "ความรักและความภาคภูมิใจในถิ่นกำเนิด", "ความสามารถในการลืมอดีต", "ความขัดแย้งกับผู้อื่น"], correct: 1, detail: "การเข้าใจรากเหง้าทำให้เห็นคุณค่าของสถานที่" },
            { q: "25. ถ้าต้องเลือกหลักฐานเพียงชิ้นเดียวเพื่อพิสูจน์ชื่อสถานที่ สิ่งใดดีที่สุด?", a: ["เพลงพื้นบ้าน", "เอกสารราชการในสมัยนั้น", "คำบอกเล่าผ่านสื่อโซเชียล", "ความทรงจำของเด็กในหมู่บ้าน"], correct: 1, detail: "เอกสารทางราชการมีความชัดเจนและถูกต้องตามกฎหมายในยุคนั้น" }
        ];

        function render() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = questions.map((q, i) => `
                <div class="mb-8 border-b pb-6">
                    <p class="font-bold text-lg mb-2">${q.q}</p>
                    <div class="grid grid-cols-1 gap-2 mt-3">
                        ${q.a.map((opt, idx) => `
                            <button id="btn-${i}-${idx}" class="p-3 border rounded hover:bg-blue-50 text-left transition" 
                                onclick="check(${i}, ${idx})" ${answered[i] ? 'disabled' : ''}>${opt}</button>
                        `).join('')}
                    </div>
                    <div id="detail-${i}" class="detail-box"><strong>เฉลย:</strong> ${q.detail}</div>
                </div>
            `).join('');
        }

        function check(qIdx, aIdx) {
            if(answered[qIdx]) return;
            answered[qIdx] = true;
            const detailDiv = document.getElementById(`detail-${qIdx}`);
            detailDiv.style.display = 'block';
            
            if(aIdx === questions[qIdx].correct) {
                score++;
                document.getElementById(`btn-${qIdx}-${aIdx}`).classList.add('correct-bg');
                detailDiv.classList.add('correct-bg');
            } else {
                document.getElementById(`btn-${qIdx}-${aIdx}`).classList.add('wrong-bg');
                document.getElementById(`btn-${qIdx}-${questions[qIdx].correct}`).classList.add('correct-bg');
                detailDiv.classList.add('wrong-bg');
            }
            
            if(answered.every(a => a)) showResult();
        }

        function showResult() {
            const res = document.getElementById('result-screen');
            res.classList.remove('hidden');
            res.innerHTML = `<h2 class="text-3xl font-bold text-blue-800">ผลคะแนน: ${score}/25</h2><p class="mt-2">${score >= 20 ? 'ยอดเยี่ยม! นักเรียนเข้าใจกระบวนการทางประวัติศาสตร์อย่างลึกซึ้ง' : 'พยายามอีกนิดครับ ลองกลับไปทบทวนเรื่องประเภทของหลักฐานใหม่นะครับ'}</p>`;
        }

        render();
    </script>
</body>
</html>
