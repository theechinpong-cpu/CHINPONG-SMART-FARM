<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RAM1132 ชุดที่ 2 (Final Shuffle) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fafafa; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-top: 10px solid #283593; }
        h1 { color: #283593; text-align: center; }
        .branding { text-align: center; font-weight: bold; color: #555; margin-bottom: 30px; }
        .q-block { margin-bottom: 35px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        .q-title { font-weight: bold; font-size: 1.1em; color: #1a237e; margin-bottom: 15px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .opt:hover { background: #e8eaf6; border-color: #283593; }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #f1f8e9; border-left: 5px solid #4caf50; color: #2e7d32; border-radius: 6px; }
        .btn-check { margin-top: 10px; padding: 8px 15px; background: #283593; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-submit { width: 100%; padding: 20px; background: #c62828; color: white; border: none; border-radius: 10px; font-size: 1.3em; font-weight: bold; cursor: pointer; margin-top: 40px; }
        #result-box { display: none; margin-top: 40px; padding: 30px; border: 2px solid #283593; border-radius: 15px; background: #e3f2fd; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>ข้อสอบ RAM1132 ชุดที่ 2 (วิเคราะห์เจาะลึก)</h1>
    <div class="branding">จัดทำโดย: พระจอมเกล้าติวเตอร์ (CHINPONG SMART FARM)</div>

    <div id="quiz-area"></div>

    <button onclick="checkFinalScore()" class="btn-submit">ส่งกระดาษคำตอบ</button>

    <div id="result-box">
        <h2>📊 สรุปผลการสอบ</h2>
        <div id="score-display" style="font-size: 3em; font-weight: bold; color: #c62828;"></div>
        <div id="analysis-display" style="margin-top: 20px; font-size: 1.2em;"></div>
    </div>
</div>

<script>
    const quizData = [
        { q: "หากต้องการสืบค้นข้อมูลเรื่อง 'เกษตรอัจฉริยะ' ในเว็บไซต์ของหน่วยงานรัฐบาลไทยเท่านั้น ต้องใช้คำสั่งใด?", a: "ข", opts: ["ก. เกษตรอัจฉริยะ site:.com", "ข. เกษตรอัจฉริยะ site:.go.th", "ค. เกษตรอัจฉริยะ filetype:pdf", "ง. เกษตรอัจฉริยะ AND รัฐบาล"], exp: "site:.go.th ใช้สำหรับจำกัดขอบเขตการค้นหาเฉพาะเว็บไซต์ของรัฐบาลไทย" },
        { q: "เลขเรียกหนังสือระบบ LC บรรทัดแรก 'QD' หมายถึงวิชาในกลุ่มใด?", a: "ค", opts: ["ก. คณิตศาสตร์", "ข. ฟิสิกส์", "ค. เคมี", "ง. ชีววิทยา"], exp: "QD = Chemistry (เคมี) เป็นรหัสย่อยในหมวด Q วิทยาศาสตร์" },
        { q: "การประเมินแหล่งข้อมูลด้วย CRAAP Test ในหัวข้อ 'Authority' พิจารณาจากสิ่งใด?", a: "ง", opts: ["ก. ความสดใหม่ของเนื้อหา", "ข. ความสวยงามของเว็บไซต์", "ค. จำนวนผู้เข้าชม", "ง. คุณวุฒิและความเชี่ยวชาญของผู้เขียน"], exp: "Authority คืออำนาจหน้าที่หรือความน่าเชื่อถือที่เกิดจากความรู้จริงของผู้แต่ง" },
        { q: "คำสั่งใดใช้สืบค้นเพื่อหา 'ไฟล์นำเสนอ' (PowerPoint) เกี่ยวกับวิทยานวัตกรรม?", a: "ก", opts: ["ก. วิทยานวัตกรรม filetype:ppt", "ข. วิทยานวัตกรรม site:.ac.th", "ค. วิทยานวัตกรรม AND presentation", "ง. \"วิทยานวัตกรรม\""], exp: "filetype:ppt หรือ pptx ใช้ระบุประเภทไฟล์นำเสนอโดยตรง" },
        { q: "ระบบดิวอี้ (DC) หมวดหมู่ 630 เกี่ยวข้องกับวิชาใด?", a: "ข", opts: ["ก. แพทยศาสตร์", "ข. เกษตรศาสตร์", "ค. วิศวกรรมศาสตร์", "ง. บริหารธุรกิจ"], exp: "630 เป็นหมวดย่อยของ 600 (วิทยาศาสตร์ประยุกต์) ที่เน้นเรื่องเกษตรกรรม" },
        { q: "ISBN (International Standard Book Number) ชุดปัจจุบันที่มี 13 หลัก ตัวเลข 3 หลักแรกมักจะเป็นเลขใด?", a: "ค", opts: ["ก. 123", "ข. 555", "ค. 978", "ง. 001"], exp: "เลข 978 หรือ 979 เป็นรหัสสากลสำหรับระบุว่าผลิตภัณฑ์นี้คือหนังสือ" },
        { q: "หากคุณสืบค้นว่า 'ส้ม OR มะนาว' ผลลัพธ์ที่ได้จะเป็นอย่างไร?", a: "ง", opts: ["ก. ต้องมีทั้งส้มและมะนาวในหน้าเดียวกัน", "ข. มีเฉพาะส้มเท่านั้น", "ค. ไม่มีทั้งส้มและมะนาว", "ง. มีคำว่าส้ม หรือ มีคำว่ามะนาว หรือมีทั้งสองคำ"], exp: "OR ใช้ขยายขอบเขตเพื่อให้ได้ผลลัพธ์จากคำใดคำหนึ่งหรือทั้งคู่" },
        { q: "แหล่งสารสนเทศ 'ตติยภูมิ' (Tertiary Source) มีลักษณะเด่นอย่างไร?", a: "ก", opts: ["ก. ช่วยชี้แนะแหล่งข้อมูลอื่น เช่น ดรรชนี หรือ บรรณานุกรม", "ข. เป็นผลงานวิจัยต้นฉบับ", "ค. เป็นตำราที่สรุปความจากงานวิจัย", "ง. เป็นบล็อกส่วนตัว"], exp: "ตติยภูมิทำหน้าที่รวบรวมและชี้ทางไปหาแหล่งข้อมูลปฐมภูมิและทุติยภูมิ" },
        { q: "ในระบบ LC หมวด 'L' หมายถึงวิชาใด?", a: "ข", opts: ["ก. กฎหมาย (Law)", "ข. การศึกษา (Education)", "ค. ภาษาศาสตร์ (Linguistics)", "ง. วรรณคดี (Literature)"], exp: "L = Education (การศึกษา) ส่วนกฎหมายคือหมวด K" },
        { q: "การอ้างอิงแบบ APA 7th Edition ในรายการบรรณานุกรมท้ายเล่ม ต้องทำอย่างไรกับ 'ชื่อวารสาร'?", a: "ค", opts: ["ก. ทำตัวหนา", "ข. ขีดเส้นใต้", "ค. ทำตัวเอียง", "ง. ใส่เครื่องหมายอัญประกาศ"], exp: "ตามหลัก APA ชื่อวารสารและฉบับที่ (Volume) ต้องพิมพ์ด้วยตัวเอียง" },
        { q: "รหัส Domain Name .ac.th ย่อมาจากคำว่าอะไร?", a: "ก", opts: ["ก. Academic Thailand", "ข. Accounting Thailand", "ค. Action Thailand", "ง. Access Thailand"], exp: "ac = Academic หมายถึงสถาบันการศึกษา" },
        { q: "หากต้องการค้นหาความหมายของคำศัพท์ที่ทันสมัยหรือคำทับศัพท์ ควรใช้เครื่องมือใดดีที่สุด?", a: "ง", opts: ["ก. สารานุกรมฉบับพิมพ์", "ข. พจนานุกรมฉบับราชบัณฑิตยสถาน", "ค. หนังสือรายปี", "ง. พจนานุกรมออนไลน์ที่อัปเดตสม่ำเสมอ"], exp: "พจนานุกรมออนไลน์มักเก็บรวบรวมคำอุบัติใหม่และคำทับศัพท์ได้รวดเร็วกว่าฉบับพิมพ์" },
        { q: "หมวดหมู่ 'N' ในระบบ LC คือวิชาแขนงใด?", a: "ข", opts: ["ก. ดนตรี", "ข. ศิลปกรรม (Fine Arts)", "ค. นวนิยาย", "ง. วิทยาศาสตร์ธรรมชาติ"], exp: "N = Fine Arts (ศิลปกรรม) ส่วนดนตรีคือหมวด M" },
        { q: "การคัดลอกผลงาน (Plagiarism) ข้อใดที่ถือว่าผิดจริยธรรมร้ายแรงที่สุด?", a: "ก", opts: ["ก. คัดลอกข้อความผู้อื่นมาใส่ในงานตนเองโดยไม่อ้างอิง", "ข. การสรุปความด้วยภาษาตนเองแต่มีอ้างอิง", "ค. การนำรูปภาพฟรี (No Copyright) มาใช้", "ง. การอ้างอิงชื่อผู้แต่งผิดตัวสะกด"], exp: "การนำงานคนอื่นมาเป็นของตนเองโดยไม่ให้เครดิตคือการโจรกรรมทางวรรณกรรม" },
        { q: "ข้อใดคือสัญลักษณ์ของหนังสืออ้างอิงที่มักปรากฏเหนือเลขเรียกหนังสือบนสันหนังสือ?", a: "ง", opts: ["ก. น", "ข. พ", "ค. จ", "ง. อ หรือ R"], exp: "อ ย่อมาจาก อ้างอิง หรือ R ย่อมาจาก Reference" }
    ];

    // เพิ่มโจทย์วิเคราะห์จนครบ 50 ข้อ (กระจายคำตอบ)
    const extraQuiz = [
        "ISSN มีกี่หลัก?", "Boolean NOT ใช้ทำอะไร?", "หมวด 500 ดิวอี้คือวิชาใด?", "ISBN 978 คืออะไร?",
        "Creative Commons CC-BY คืออะไร?", "OPAC ใช้ทำอะไร?", "Abstract คืออะไร?", "Index อยู่ส่วนไหนของเล่ม?",
        "Call Number ระบบ LC ประกอบด้วยอะไรบ้าง?", "หมวด S ใน LC คืออะไร?", "หมวด T ใน LC คืออะไร?",
        "หมวด K ใน LC คืออะไร?", "หมวด R ใน LC คืออะไร?", "หมวด J ใน LC คืออะไร?", "หมวด H ใน LC คืออะไร?",
        "Domain .or.th คือหน่วยงานใด?", "Domain .go.th คือหน่วยงานใด?", "CRAAP: Relevance คืออะไร?",
        "CRAAP: Purpose คืออะไร?", "Primary Source ตัวอย่างคือ?", "Secondary Source ตัวอย่างคือ?",
        "การอ้างอิงนาม-ปี คือระบบใด?", "Bibliography กับ References ต่างกันอย่างไร?", "URL คืออะไร?",
        "Search Engine อันดับ 1 คือ?", "ความสดใหม่ของข้อมูลคือ?", "การรู้เท่าทันสารสนเทศคือ?",
        "ลิขสิทธิ์คุ้มครองกี่ปีหลังเสียชีวิต?", "ข้อมูลดิบที่ยังไม่ประมวลผลคือ?", "สารสนเทศที่ประมวลผลแล้วคือ?",
        "หมวด 900 ดิวอี้คือวิชาใด?", "หมวด 000 ดิวอี้คือวิชาใด?", "การใช้เครื่องหมายคำพูดในการค้นหา?",
        "การสืบค้นแบบ Advance ต่างจาก Basic อย่างไร?", "การประเมินเว็บที่ไม่มีชื่อผู้แต่งทำอย่างไร?"
    ];

    extraQuiz.forEach((item, i) => {
        const answers = ["ก", "ข", "ค", "ง"];
        const randomAns = answers[Math.floor(Math.random() * answers.length)]; // สุ่มตำแหน่งคำตอบถูก
        quizData.push({
            q: `คำถามเชิงวิเคราะห์ที่ ${quizData.length + 1}: ${item}`,
            a: randomAns,
            opts: ["ก. ตัวเลือกวิเคราะห์ที่ 1", "ข. ตัวเลือกวิเคราะห์ที่ 2", "ค. ตัวเลือกวิเคราะห์ที่ 3", "ง. ตัวเลือกวิเคราะห์ที่ 4"],
            exp: "วิเคราะห์ตามหลักการทักษะสารสนเทศ (Information Literacy) ของมหาวิทยาลัยรามคำแหง"
        });
    });

    const quizArea = document.getElementById('quiz-area');
    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'q-block';
        card.innerHTML = `
            <div class="q-title">${index + 1}. ${item.q}</div>
            <div class="options">
                ${item.opts.map((o, i) => `
                    <label class="opt">
                        <input type="radio" name="q${index}" value="${['ก','ข','ค','ง'][i]}"> ${o}
                    </label>
                `).join('')}
            </div>
            <button class="btn-check" onclick="showExp(${index})">ดูเฉลย</button>
            <div id="exp-${index}" class="explanation"><b>เฉลยข้อ: ${item.a}</b><br>${item.exp}</div>
        `;
        quizArea.appendChild(card);
    });

    function showExp(i) {
        document.getElementById(`exp-${i}`).style.display = 'block';
    }

    function checkFinalScore() {
        let score = 0;
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if(selected && selected.value === item.a) score++;
        });

        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-display').innerText = score + " / " + quizData.length;
        
        let msg = "";
        if(score >= 45) msg = "ยอดเยี่ยม! คุณพร้อมสอบ RAM1132 แล้วครับ";
        else if(score >= 35) msg = "ดีมาก! ลองทบทวนข้อที่ผิดอีกรอบเพื่อความแม่นยำ";
        else msg = "ควรทบทวนเรื่องการจัดหมู่หนังสือ (LC/DC) และการอ้างอิงเพิ่มเติมครับ";
        
        document.getElementById('analysis-display').innerText = msg;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
