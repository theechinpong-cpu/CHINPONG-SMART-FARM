<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาการคำนวณ ม.1 - 25 ข้อ (ชุดที่ 2)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f0f4f8; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #27ae60; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #27ae60; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #27ae60; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค เทคโนโลยี (วิทยาการคำนวณ) ม.1 (ชุดที่ 2)</h2>
    <p>เนื้อหา: แนวคิดเชิงนามธรรม, อัลกอริทึม, และ Python พื้นฐาน</p>
    <div style="background: #e8f8f0; padding: 10px;"><b>คำแนะนำติวเตอร์:</b> ข้อสอบชุดนี้เน้นการแยกแยะรายละเอียด (Abstraction) และการอ่านโครงสร้างโปรแกรม ลองฝึกคิดแบบเป็นลำดับขั้นตอนดูครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "ข้อใดคือหัวใจสำคัญของ 'แนวคิดเชิงนามธรรม' (Abstraction)", opts: ["การทำให้ปัญหาดูยากขึ้น", "การตัดสิ่งที่ไม่จำเป็นออก", "การจำลองภาพกราฟิก", "การใช้ตัวแปรให้มากที่สุด"], corr: 1, th: "การโฟกัสที่จุดสำคัญ", det: "คือการแยกรายละเอียดที่ไม่จำเป็นออก เหลือไว้เพียงใจความสำคัญของปัญหา" },
        { q: "สัญลักษณ์ผังงาน 'สี่เหลี่ยมผืนผ้า' ใช้สำหรับทำอะไร", opts: ["เริ่มโปรแกรม", "ตัดสินใจ", "กระบวนการทำงาน", "รับข้อมูล"], corr: 2, th: "การคำนวณหรือการกระทำ", det: "สี่เหลี่ยมผืนผ้าใช้แทนการประมวลผลหรือขั้นตอนการทำงานทั่วไป" },
        { q: "ภาษาไพทอนจัดเป็นภาษาโปรแกรมระดับใด", opts: ["ระดับต่ำ", "ระดับกลาง", "ระดับสูง", "ภาษาเครื่อง"], corr: 2, th: "ความใกล้เคียงกับภาษาคน", det: "ภาษาไพทอนเป็นภาษาที่มีโครงสร้างคำสั่งคล้ายภาษาอังกฤษและเข้าใจง่าย (High-level language)" },
        { q: "ถ้าเขียนโปรแกรม x = 5 แล้วเขียน x = x + 1 ค่าของ x จะเป็นเท่าใด", opts: ["5", "6", "0", "1"], corr: 1, th: "การอัปเดตค่าตัวแปร", det: "เป็นการนำค่าเดิม (5) มาบวกเพิ่มอีก 1 จึงได้ 6" },
        { q: "ขั้นตอนใด 'ไม่ใช่' ขั้นตอนการแก้ปัญหาตามกระบวนการวิทยาการคำนวณ", opts: ["วิเคราะห์ปัญหา", "วางแผน", "การเดาสุ่มคำตอบ", "ตรวจสอบผลลัพธ์"], corr: 2, th: "กระบวนการเชิงเหตุผล", det: "การแก้ปัญหาต้องมีขั้นตอนที่ชัดเจน ไม่ควรใช้การเดาสุ่ม" },
        { q: "หากต้องการเก็บข้อมูลเลขทศนิยม ควรใช้ข้อมูลชนิดใดในไพทอน", opts: ["int", "float", "str", "bool"], corr: 1, th: "จุดทศนิยม", det: "float คือชนิดข้อมูลที่เป็นเลขทศนิยม" },
        { q: "ในผังงาน 'ลูกศร' มีหน้าที่อะไร", opts: ["เก็บข้อมูล", "แสดงทิศทาง", "เริ่มทำงาน", "ลบข้อมูล"], corr: 1, th: "การเชื่อมต่อขั้นตอน", det: "ลูกศรใช้แสดงทิศทางลำดับงานจากขั้นตอนหนึ่งไปอีกขั้นตอนหนึ่ง" },
        { q: "ข้อใดคือคำสั่ง 'ถ้า...ถ้าไม่' (If-Else) ในไพทอนที่ถูกต้อง", opts: ["if x > 5 else print('No')", "if x > 5: print('Yes') else: print('No')", "if x > 5 then...", "if x > 5 == print('Yes')"], corr: 1, th: "ไวยากรณ์ If-Else", det: "ในไพทอน ต้องมีเครื่องหมายโคลอน (:) หลังเงื่อนไขเสมอ" },
        { q: "ตัวแปรเปรียบได้กับอะไรในการเขียนโปรแกรม", opts: ["เครื่องคิดเลข", "กล่องเก็บข้อมูล", "หน้าจอแสดงผล", "สายไฟ"], corr: 1, th: "สถานที่พักข้อมูล", det: "ตัวแปรเปรียบเสมือนกล่องที่ให้เรากำหนดชื่อเพื่อใส่ค่าข้อมูลเข้าไป" },
        { q: "การ 'คัดเลือกคุณลักษณะที่จำเป็น' หากต้องสร้างแอปฯ สั่งอาหาร สิ่งใดไม่จำเป็น", opts: ["รายการอาหาร", "ราคาอาหาร", "สีของรถคนส่ง", "ที่อยู่ลูกค้า"], corr: 2, th: "ตัดสิ่งฟุ่มเฟือยออก", det: "สีรถไม่ส่งผลต่อการสั่งอาหาร จึงเป็นรายละเอียดที่ไม่จำเป็น" },
        { q: "คำสั่งใดใช้สำหรับวนซ้ำในไพทอน", opts: ["for หรือ while", "if หรือ else", "input หรือ print", "import หรือ def"], corr: 0, th: "การทำงานเป็นรอบ", det: "for และ while เป็นคำสั่งหลักในการวนซ้ำ (Loop)" },
        { q: "ข้อใดคือการกำหนดตัวแปรเก็บ 'ข้อความ' ที่ถูกต้อง", opts: ["name = 'Somchai'", "name = Somchai", "name == 'Somchai'", "name: Somchai"], corr: 0, th: "สตริงต้องมีเครื่องหมายคำพูด", det: "ข้อความต้องครอบด้วยเครื่องหมายอัญประกาศ (' ' หรือ \" \")" },
        { q: "ข้อใดกล่าวถึงรหัสลำลองได้ถูกต้องที่สุด", opts: ["ต้องรันบนคอมพิวเตอร์ได้", "เป็นภาษาที่คนเขียนอ่านเข้าใจได้", "ต้องมีสัญลักษณ์รูปภาพ", "ห้ามใช้ตัวแปร"], corr: 1, th: "ภาษาเขียนที่เลียนแบบโปรแกรม", det: "รหัสลำลองเป็นคำอธิบายลำดับขั้นตอนด้วยภาษาคน เพื่อให้นำไปเขียนโปรแกรมต่อได้ง่าย" },
        { q: "การตัดสินใจแบบมีทางเลือก ถ้าเงื่อนไขไม่เป็นจริง จะไปทำงานที่ส่วนใด", opts: ["if", "else", "loop", "print"], corr: 1, th: "ส่วนของทางเลือกอื่น", det: "ส่วนที่เหลือหรือเงื่อนไขที่เป็นเท็จ จะถูกนำไปจัดการในบล็อก else" },
        { q: "ผลลัพธ์ของ 10 % 3 คือเท่าใด", opts: ["3", "1", "0", "3.3"], corr: 1, th: "เศษจากการหาร", det: "10 หาร 3 ได้ 3 เหลือเศษ 1" },
        { q: "ถ้าต้องการให้โปรแกรมรับค่าจากคีย์บอร์ด ต้องใช้คำสั่งใด", opts: ["print()", "input()", "get()", "scan()"], corr: 1, th: "การนำเข้าข้อมูล", det: "input() เป็นฟังก์ชันที่ใช้รับข้อมูลจากผู้ใช้" },
        { q: "ข้อใดเป็นนามธรรมที่จำเป็นในการ 'จัดกระเป๋านักเรียน'", opts: ["ตารางเรียน", "ยี่ห้อกระเป๋า", "ความสวยงามของกระเป๋า", "สีของสมุด"], corr: 0, th: "ปัจจัยที่ส่งผลต่อการเรียน", det: "ตารางเรียนเป็นข้อมูลสำคัญที่สุดในการจัดกระเป๋า" },
        { q: "ผังงานมีการประมวลผลขั้นตอนถัดไปอย่างไร", opts: ["กระโดดข้ามขั้นตอน", "ทำตามทิศทางลูกศร", "สุ่มขั้นตอน", "ทำพร้อมกันหมด"], corr: 1, th: "ลำดับคือหัวใจ", det: "ผังงานจะแสดงลำดับที่ชัดเจนตามทิศทางลูกศร" },
        { q: "ถ้า a = True, b = False ค่าของ a and b คืออะไร", opts: ["True", "False", "Error", "None"], corr: 1, th: "ตรรกศาสตร์", det: "การใช้ 'and' จะเป็นจริงก็ต่อเมื่อเป็น True ทั้งคู่" },
        { q: "การทำ Debugging คืออะไร", opts: ["การเขียนโปรแกรมเพิ่ม", "การตรวจสอบและแก้ไขข้อผิดพลาด", "การบันทึกไฟล์", "การรันโปรแกรม"], corr: 1, th: "การหาจุดบกพร่อง", det: "Debugging คือกระบวนการไล่หาจุดที่โปรแกรมทำงานผิดพลาดแล้วแก้ไข" },
        { q: "ตัวแปรชื่อ 'x1' สามารถใช้งานในไพทอนได้หรือไม่", opts: ["ได้", "ไม่ได้ (ห้ามขึ้นต้นด้วยตัวเลข)", "ไม่ได้ (ห้ามมีเลข)", "ได้เฉพาะตอนท้าย"], corr: 0, th: "กฎการตั้งชื่อ", det: "สามารถใช้ตัวเลขในชื่อตัวแปรได้ ตราบใดที่ไม่ได้ขึ้นต้นด้วยตัวเลข" },
        { q: "ข้อใดคือประโยชน์ของการแก้ปัญหาเป็นขั้นตอน", opts: ["ลดความซับซ้อนและเพิ่มความแม่นยำ", "ทำให้โปรแกรมทำงานเร็วเกินไป", "ทำให้คนเขียนไม่ต้องใช้ความคิด", "ไม่ต้องตรวจสอบผลลัพธ์"], corr: 0, th: "ความเป็นระบบ", det: "การคิดเป็นลำดับช่วยให้แก้ปัญหาได้ตรงจุดและลดโอกาสผิดพลาด" },
        { q: "ในไพทอน ถ้ากำหนด a = 2 ** 3 ผลลัพธ์คือเท่าใด", opts: ["6", "8", "9", "5"], corr: 1, th: "การยกกำลัง", det: "** คือตัวดำเนินการยกกำลัง (2 ยกกำลัง 3 ได้ 8)" },
        { q: "ผังงานแบบวนซ้ำ (Loop) ในการตรวจสอบเงื่อนไข ถ้าเงื่อนไขเป็นเท็จจะเกิดอะไรขึ้น", opts: ["วนต่อไปเรื่อยๆ", "ออกจากลูปไปทำขั้นตอนถัดไป", "โปรแกรมหยุดทำงานทันที", "error"], corr: 1, th: "การหลุดจากเงื่อนไข", det: "โดยทั่วไปถ้าเงื่อนไขที่เป็นเท็จ ลูปจะจบการทำงานและไปทำงานที่คำสั่งถัดไป" },
        { q: "อัลกอริทึมที่ดีควรเริ่มต้นด้วยสิ่งใด", opts: ["การคิดว่าโปรแกรมจะสวยไหม", "การเข้าใจปัญหาให้ชัดเจน", "การเปิดคอมพิวเตอร์", "การสุ่มตัวแปร"], corr: 1, th: "จุดเริ่มของกระบวนการ", det: "ก่อนเริ่มทำสิ่งใด ต้องเข้าใจปัญหาให้ถ่องแท้ก่อนเสมอ" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
