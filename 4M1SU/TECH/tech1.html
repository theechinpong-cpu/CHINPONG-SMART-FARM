<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาการคำนวณ ม.1 - 25 ข้อ (ชุดที่ 1)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f0f4f8; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #27ae60; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #27ae60; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #27ae60; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค เทคโนโลยี (วิทยาการคำนวณ) ม.1</h2>
    <p>เนื้อหา: แนวคิดเชิงนามธรรม, อัลกอริทึม, และ Python พื้นฐาน</p>
    <div style="background: #e8f8f0; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ข้อสอบชุดนี้เน้นการวิเคราะห์ลำดับขั้นตอน (Algorithm) และการทำความเข้าใจ Logic ของโปรแกรม ขอให้ใจเย็นๆ ในการอ่านคำสั่งครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "แนวคิดเชิงนามธรรม (Abstraction) คืออะไร", opts: ["การเขียนโค้ดที่ซับซ้อน", "การคัดเลือกรายละเอียดที่จำเป็น", "การวาดผังงานให้สวยงาม", "การจำลองสถานการณ์จำลอง"], corr: 1, th: "โฟกัสที่จุดสำคัญของปัญหา", det: "คือการตัดรายละเอียดที่ไม่จำเป็นออกเพื่อเหลือเพียงหัวใจสำคัญของปัญหา" },
        { q: "สัญลักษณ์ผังงานรูปสี่เหลี่ยมขนมเปียกปูน หมายถึงข้อใด", opts: ["จุดเริ่มต้น/จุดจบ", "การประมวลผล", "การตัดสินใจ/เงื่อนไข", "ทิศทางของงาน"], corr: 2, th: "สัญลักษณ์การเลือกทำ", det: "ใช้สำหรับตรวจสอบเงื่อนไข ถ้าใช่/ไม่ใช่อย่างไร" },
        { q: "ถ้าต้องการประกาศตัวแปรชื่อ score เพื่อเก็บค่า 80 ในภาษาไพทอน จะเขียนอย่างไร", opts: ["score = 80", "int score : 80", "var score = 80", "score == 80"], corr: 0, th: "การกำหนดค่าให้ตัวแปร", det: "ในไพทอนใช้เครื่องหมายเท่ากับ (=) ในการกำหนดค่า" },
        { q: "ข้อใดคือการเรียงลำดับขั้นตอนการแก้ปัญหาที่ถูกต้อง", opts: ["แผน -> วิเคราะห์ -> ทำ -> ตรวจ", "ทำ -> ตรวจ -> วิเคราะห์ -> แผน", "วิเคราะห์ -> แผน -> ทำ -> ตรวจ", "ตรวจ -> ทำ -> แผน -> วิเคราะห์"], corr: 2, th: "กระบวนการคิดเชิงตรรกะ", det: "เริ่มต้นที่การเข้าใจปัญหา ก่อนจะวางแผน ดำเนินการ และจบที่การตรวจสอบ" },
        { q: "ข้อใดคือชื่อตัวแปรที่ถูกกฎในภาษาไพทอน", opts: ["1score", "score-name", "my_score", "if"], corr: 2, th: "กฎการตั้งชื่อตัวแปร", det: "ชื่อตัวแปรห้ามขึ้นต้นด้วยตัวเลข, ห้ามใช้สัญลักษณ์พิเศษ และห้ามเป็นคำสงวน" },
        { q: "การเขียนโปรแกรมในโหมดสคริปต์ (Script Mode) แตกต่างจากโหมดโต้ตอบอย่างไร", opts: ["ทำงานเร็วกว่า", "เขียนได้หลายบรรทัดและบันทึกไฟล์ได้", "ไม่ต้องใช้เครื่องคอมพิวเตอร์", "ไม่มีข้อแตกต่าง"], corr: 1, th: "ประโยชน์ของการเก็บไฟล์", det: "โหมดสคริปต์อนุญาตให้เราเขียนโปรแกรมที่ยาวและบันทึกไว้ใช้งานภายหลังได้" },
        { q: "คำสั่ง if-else ในการเขียนโปรแกรมใช้สำหรับเหตุการณ์ใด", opts: ["วนซ้ำงาน", "การตัดสินใจ", "การรับค่าจากคีย์บอร์ด", "การคำนวณตัวเลข"], corr: 1, th: "การมีทางเลือก", det: "ถ้าเงื่อนไขเป็นจริงทำอย่างหนึ่ง ถ้าเท็จทำอีกอย่างหนึ่ง" },
        { q: "หากต้องการทำซ้ำคำสั่งเดิม 5 ครั้ง ควรใช้โครงสร้างแบบใด", opts: ["If-Else", "Loop (วนซ้ำ)", "Abstraction", "Flowchart"], corr: 1, th: "ความหมายของการวนซ้ำ", det: "การวนซ้ำ (Loop) ใช้สำหรับงานที่ต้องทำซ้ำๆ กัน" },
        { q: "ข้อใดคือลักษณะของ 'รหัสลำลอง' (Pseudocode)", opts: ["ใช้รูปภาพแทนขั้นตอน", "ใช้ภาษาที่ใกล้เคียงกับมนุษย์", "ต้องเขียนด้วยภาษาคอมพิวเตอร์เท่านั้น", "เป็นการวาดผังความคิด"], corr: 1, th: "ไม่ใช่ภาษาโปรแกรมแต่คือความเข้าใจ", det: "รหัสลำลองคือภาษาเขียนที่สื่อสารขั้นตอนการแก้ปัญหาได้ง่ายโดยไม่ต้องกังวลเรื่องกฎไวยากรณ์เป๊ะๆ" },
        { q: "ถ้าตัวแปร a = 5, b = 2 แล้วค่าของ a % b คือเท่าใด", opts: ["2", "1", "2.5", "7"], corr: 1, th: "เครื่องหมาย Modulo คือการหาเศษ", det: "5 หาร 2 ได้ 2 เศษ 1 ค่าของ 5 % 2 จึงเท่ากับ 1" },
        { q: "สัญลักษณ์ผังงานรูปวงรี ใช้แทนขั้นตอนใด", opts: ["รับข้อมูล", "คำนวณ", "เริ่มและจบ", "ทางแยก"], corr: 2, th: "จุดบอกเวลาเริ่ม-สิ้นสุด", det: "วงรีหรือแคปซูล ใช้สำหรับแสดงจุดเริ่มต้นและจุดสิ้นสุดของอัลกอริทึม" },
        { q: "การออกแบบอัลกอริทึมที่ดีควรมีลักษณะอย่างไร", opts: ["ซับซ้อนที่สุด", "สั้นที่สุดโดยไม่สนใจความถูกต้อง", "ชัดเจนและทำงานได้ถูกต้องทุกกรณี", "ใช้วงรีให้มากที่สุด"], corr: 2, th: "หัวใจของอัลกอริทึม", det: "อัลกอริทึมที่ดีต้องชัดเจน เข้าใจง่าย และให้ผลลัพธ์ที่ถูกต้องเสมอ" },
        { q: "คำสั่งใดใช้แสดงผลข้อมูลในภาษาไพทอน", opts: ["input()", "print()", "show()", "get()"], corr: 1, th: "พิมพ์ผลลัพธ์", det: "print() คือฟังก์ชันมาตรฐานสำหรับแสดงค่าบนหน้าจอ" },
        { q: "ตัวแปรชนิดใดใช้เก็บข้อความ", opts: ["int", "float", "string", "bool"], corr: 2, th: "Strings", det: "String หรือข้อความ มักเขียนอยู่ในเครื่องหมายคำพูด" },
        { q: "การ 'ถ่ายทอดรายละเอียดของปัญหา' ช่วยในเรื่องใด", opts: ["ทำให้โปรแกรมสวยขึ้น", "สื่อสารให้ผู้อื่นเข้าใจได้ตรงกัน", "ลดขนาดไฟล์", "ทำให้คอมพิวเตอร์เร็วขึ้น"], corr: 1, th: "การส่งต่อความรู้", det: "ช่วยให้ผู้ร่วมทีมเข้าใจรายละเอียดที่สำคัญเหมือนกัน" },
        { q: "ข้อใดคือลำดับที่ถูกต้องของ 'ความคิดเชิงคำนวณ'", opts: ["ย่อยปัญหา -> จดจำ -> คิด -> ทำ", "ย่อย -> หาแบบแผน -> เลือก -> ออกแบบ", "ทำ -> แก้ -> ผิด -> ถูก", "ออกแบบ -> ทำ -> ลบ -> เริ่มใหม่"], corr: 1, th: "Computational Thinking", det: "ประกอบด้วยการย่อยปัญหา, การหาแบบแผน, การคัดเลือกนามธรรม, และการออกแบบอัลกอริทึม" },
        { q: "หากต้องการทราบผลลัพธ์ของ 10 / 3 ในภาษาไพทอน ค่าจะเป็นเท่าใด", opts: ["3", "3.333...", "1", "3.3"], corr: 1, th: "การหารปกติ", det: "การหารด้วย / จะได้ผลลัพธ์เป็นทศนิยมเสมอ" },
        { q: "การประยุกต์ใช้แนวคิดเชิงนามธรรมในการจัดตารางสอน คือข้อใด", opts: ["ดูเฉพาะวิชา วันเวลา และห้องเรียน", "ดูสีของตาราง", "ดูชื่อครูผู้สอนทุกคน", "ดูประวัติโรงเรียน"], corr: 0, th: "ตัดสิ่งที่ไม่เกี่ยวออก", det: "สีหรือประวัติครูไม่สำคัญเท่า วัน เวลา และสถานที่" },
        { q: "อัลกอริทึมคืออะไร", opts: ["ภาษาคอมพิวเตอร์ชั้นสูง", "กระบวนการแก้ปัญหาเป็นขั้นตอน", "ชื่อโปรแกรมตัวหนึ่ง", "การวาดภาพ"], corr: 1, th: "Step-by-step", det: "คือลำดับขั้นตอนที่วางไว้เพื่อใช้แก้ปัญหาให้สำเร็จ" },
        { q: "ในไพทอน หากต้องการเขียนคอมเมนต์ (ไม่ให้โปรแกรมทำงาน) ต้องใช้เครื่องหมายใด", opts: ["//", "/*", "#", "--"], corr: 2, th: "เครื่องหมายสำหรับจดบันทึก", det: "เครื่องหมาย # ใช้สำหรับใส่ข้อความคอมเมนต์ในไพทอน" },
        { q: "ถ้ากำหนดให้ x = 10, y = 3 แล้วค่าของ x // y คือเท่าใด", opts: ["3.33", "3", "1", "0.33"], corr: 1, th: "การหารแบบเอาเฉพาะจำนวนเต็ม", det: "ตัวดำเนินการ // คือการหารเอาเฉพาะจำนวนเต็ม (Floor Division)" },
        { q: "ข้อใดจัดเป็นขั้นตอนการ 'วิเคราะห์ปัญหา'", opts: ["การลองเขียนโปรแกรม", "การพิจารณาว่าต้องใช้อะไรและผลลัพธ์คืออะไร", "การวาดผังงาน", "การตั้งชื่อตัวแปร"], corr: 1, th: "รู้เขาเรารู้", det: "คือการทำความเข้าใจว่า ปัญหาคืออะไร และสิ่งที่ต้องใช้เพื่อหาคำตอบคืออะไร" },
        { q: "ข้อดีของการใช้ Flowchart คืออะไร", opts: ["ทำงานแทนคน", "เห็นลำดับงานชัดเจนและเข้าใจง่าย", "ประหยัดไฟฟ้า", "ทำให้โปรแกรมมีขนาดเล็ก"], corr: 1, th: "เห็นภาพรวม", det: "ผังงานช่วยให้เราเห็นกระแสงาน (Workflow) ตั้งแต่ต้นจนจบ" },
        { q: "การ 'คัดเลือกคุณลักษณะที่จำเป็น' ในการเลือกซื้อคอมพิวเตอร์ คือข้อใด", opts: ["สีของเคส", "สเปกเครื่อง (CPU, RAM)", "ชื่อผู้ขาย", "น้ำหนักของกล่อง"], corr: 1, th: "อะไรคือหัวใจของสเปกคอม", det: "สเปกเครื่องสำคัญต่อการใช้งาน ส่วนสีหรือน้ำหนักกล่องมักไม่ส่งผลต่อการทำงานหลัก" },
        { q: "ในการเขียนโปรแกรมแบบวนซ้ำ คำสั่งใดที่อาจทำให้เกิด Loop ไม่รู้จบ (Infinite Loop)", opts: ["การตรวจสอบเงื่อนไขผิดพลาด", "การใช้ตัวแปรที่ถูกต้อง", "การเขียน print()", "การทำตามขั้นตอน"], corr: 0, th: "ระวังเงื่อนไขที่ไม่มีวันจบ", det: "ถ้าเงื่อนไขของการวนซ้ำไม่มีวันเป็นเท็จ โปรแกรมจะทำงานไปเรื่อยๆ จนค้าง" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
