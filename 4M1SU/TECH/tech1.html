<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาการคำนวณ ม.5 - 25 ข้อ (ชุดที่ 1)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdf2e9; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #d35400; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #d35400; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #fdebd0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #d35400; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค วิทยาการคำนวณ ม.5 (ชุดที่ 1)</h2>
    <p>เนื้อหา: แนวคิดเชิงนามธรรม, การแก้ปัญหา และ Python | จำนวน: 25 ข้อ</p>
    <div style="background: #fff3cd; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ข้อสอบชุดนี้เน้นความเข้าใจในขั้นตอนอัลกอริทึมและการประยุกต์ใช้ตัวแปรภาษาไพทอน ขอให้ตั้งใจวิเคราะห์โจทย์ครับ!</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "แนวคิดเชิงนามธรรม (Abstraction) มีจุดประสงค์หลักเพื่ออะไร", opts: ["ทำลายข้อมูล", "ลดความซับซ้อนของปัญหา", "เพิ่มรายละเอียดของข้อมูล", "เขียนโปรแกรมให้เร็วขึ้น"], corr: 1, th: "โฟกัสที่หัวใจสำคัญ", det: "เพื่อแยกรายละเอียดที่ไม่จำเป็นออก เหลือไว้เฉพาะใจความสำคัญของปัญหา" },
        { q: "การตัดสินใจในผังงาน (Flowchart) ใช้สัญลักษณ์ใด", opts: ["วงรี", "สี่เหลี่ยมผืนผ้า", "สี่เหลี่ยมขนมเปียกปูน", "ลูกศร"], corr: 2, th: "การเลือกทางเลือก", det: "สี่เหลี่ยมขนมเปียกปูนใช้สำหรับการตัดสินใจ (Decision/If-Else)" },
        { q: "หากต้องการเก็บข้อมูลชื่อนักเรียน ควรประกาศตัวแปรชนิดใดใน Python", opts: ["int", "float", "str", "bool"], corr: 2, th: "ชนิดข้อความ", det: "str (String) ใช้สำหรับเก็บข้อมูลประเภทข้อความ" },
        { q: "ขั้นตอนแรกของการแก้ปัญหาคืออะไร", opts: ["เขียนโค้ด", "วางแผน", "วิเคราะห์ปัญหา", "ทดสอบผลลัพธ์"], corr: 2, th: "กระบวนการคิด", det: "ต้องวิเคราะห์ก่อนว่าปัญหาคืออะไร จึงจะวางแผนแก้ได้" },
        { q: "สัญลักษณ์วงรีในผังงานหมายถึงอะไร", opts: ["เริ่มต้นหรือจบ", "การคำนวณ", "การตัดสินใจ", "การรับข้อมูล"], corr: 0, th: "จุดเริ่มและจุดจบ", det: "ใช้แสดงจุดเริ่มต้นหรือจุดสิ้นสุดของอัลกอริทึม" },
        { q: "ผลลัพธ์ของ 10 // 3 ใน Python คือเท่าใด", opts: ["3.33", "3", "4", "1"], corr: 1, th: "การหารเอาผลลัพธ์จำนวนเต็ม", det: "// คือการหารเอาจำนวนเต็ม (Floor division)" },
        { q: "ถ้ากำหนด x = 5 แล้วเขียน x = x + 1 ค่าของ x จะเป็นเท่าใด", opts: ["5", "6", "1", "0"], corr: 1, th: "การเพิ่มค่าตัวแปร", det: "5 + 1 = 6" },
        { q: "ข้อใดไม่ใช่โครงสร้างการควบคุมหลักในโปรแกรม", opts: ["ลำดับ", "ทางเลือก", "วนซ้ำ", "การข้าม"], corr: 3, th: "หลักการเขียนโปรแกรม", det: "หลักๆ มีเพียง ลำดับ (Sequential), ทางเลือก (If-Else), และวนซ้ำ (Loop)" },
        { q: "การตัดสิ่งที่ไม่เกี่ยวข้องออกเพื่อโฟกัสปัญหาคือคุณลักษณะใด", opts: ["การถ่ายทอด", "การคัดเลือกคุณลักษณะ", "การแก้ปัญหา", "การเขียนโปรแกรม"], corr: 1, th: "การคัดเลือก", det: "การคัดเลือกคุณลักษณะที่จำเป็น (Selection)" },
        { q: "คำสั่งใดใช้สำหรับแสดงผลลัพธ์ใน Python", opts: ["input()", "print()", "if", "for"], corr: 1, th: "การแสดงผล", det: "print() ใช้แสดงข้อมูลออกทางหน้าจอ" },
        { q: "ตัวแปรใน Python จำเป็นต้องประกาศชนิดข้อมูลก่อนใช้งานหรือไม่", opts: ["จำเป็น", "ไม่จำเป็น", "ขึ้นอยู่กับเวอร์ชัน", "เฉพาะตัวแปรตัวเลข"], corr: 1, th: "ความยืดหยุ่นของ Python", det: "Python เป็น Dynamic typing ไม่ต้องระบุชนิดข้อมูลล่วงหน้า" },
        { q: "ถ้า x = 10, y = 3 ผลลัพธ์ของ x % y คือเท่าใด", opts: ["3", "1", "0", "3.33"], corr: 1, th: "การหารเอาเศษ", det: "% คือการหารเอาเศษ (Modulo) 10 หาร 3 ได้ 3 เศษ 1" },
        { q: "ผังงานที่มีการวนซ้ำจะมีการเชื่อมโยงแบบใด", opts: ["เส้นตรง", "เส้นย้อนกลับ", "ไม่ใช้เส้น", "สี่เหลี่ยม"], corr: 1, th: "ย้อนกลับไปทำใหม่", det: "การวนซ้ำต้องมีการย้อนกลับไปทำขั้นตอนก่อนหน้า" },
        { q: "เปรียบเทียบตัวแปรกับอะไรเพื่อให้เข้าใจง่าย", opts: ["กล่องเก็บของ", "ถนน", "ภาพวาด", "ตู้จดหมาย"], corr: 0, th: "พื้นที่จัดเก็บ", det: "ตัวแปรคือภาชนะ (กล่อง) ที่ใช้เก็บค่าข้อมูล" },
        { q: "ข้อมูลชนิดใดใช้เก็บค่าความจริง", opts: ["int", "str", "bool", "float"], corr: 2, th: "True/False", det: "bool (Boolean) เก็บค่า True หรือ False" },
        { q: "เงื่อนไขใดที่ทำให้โปรแกรมทำงานผิดพลาด (Syntax Error)", opts: ["ลืมใส่ : หลัง if", "บวกเลขผิด", "ลอจิกซับซ้อน", "ชื่อตัวแปรยาวไป"], corr: 0, th: "ผิดไวยากรณ์", det: "การลืมไวยากรณ์ภาษาทำให้เครื่องไม่เข้าใจคำสั่ง" },
        { q: "หากต้องการรับค่าจากผู้ใช้ใน Python ต้องใช้คำสั่งใด", opts: ["input()", "print()", "read()", "scan()"], corr: 0, th: "การรับเข้า", det: "input() ใช้รับค่าจากแป้นพิมพ์" },
        { q: "อัลกอริทึมที่ดีควรมีลักษณะอย่างไร", opts: ["ยาวที่สุด", "ซับซ้อน", "มีความชัดเจนและเป็นขั้นตอน", "ไม่มีขั้นตอน"], corr: 2, th: "หัวใจของอัลกอริทึม", det: "ต้องชัดเจนและลำดับขั้นตอนถูกต้องเพื่อให้ได้ผลลัพธ์ที่ถูกต้อง" },
        { q: "ตัวดำเนินการใดใช้เปรียบเทียบความเท่ากัน", opts: ["=", "==", "!", ">"], corr: 1, th: "การเปรียบเทียบ", det: "== คือการเปรียบเทียบค่าว่าเท่ากันหรือไม่" },
        { q: "การเขียนรหัสลำลอง (Pseudocode) ควรใช้ภาษาใด", opts: ["ภาษาเครื่อง", "ภาษาไทยหรืออังกฤษแบบกึ่งภาษาโปรแกรม", "ภาษา C อย่างเดียว", "ไม่มีกฎ"], corr: 1, th: "ภาษาที่มนุษย์อ่านเข้าใจ", det: "เน้นการเขียนที่มนุษย์เข้าใจง่ายและเลียนแบบโครงสร้างโปรแกรม" },
        { q: "หากต้องการให้โปรแกรมทำงานซ้ำ 5 ครั้ง ควรใช้คำสั่งใด", opts: ["if", "for", "def", "print"], corr: 1, th: "การวนซ้ำ", det: "for loop นิยมใช้สำหรับการวนซ้ำตามจำนวนรอบที่แน่นอน" },
        { q: "ตัวแปรใดตั้งชื่อได้ถูกต้องตามกฎของ Python", opts: ["1st_name", "my-name", "my_name", "class"], corr: 2, th: "กฎการตั้งชื่อ", det: "ตัวแปรห้ามขึ้นต้นด้วยตัวเลข, ห้ามมีขีดกลาง, ห้ามซ้ำคำสงวน" },
        { q: "ถ้าต้องการตรวจสอบว่าเลขเป็นจำนวนคู่ ควรใช้เงื่อนไขใด", opts: ["x % 2 == 0", "x / 2 == 1", "x % 2 != 0", "x * 2 == 0"], corr: 0, th: "หารลงตัว", det: "ถ้าจำนวนหารด้วย 2 แล้วเหลือเศษ 0 แสดงว่าเป็นจำนวนคู่" },
        { q: "ส่วนที่สำคัญที่สุดของการแก้ปัญหาคืออะไร", opts: ["การใช้คอมพิวเตอร์", "การเข้าใจปัญหาและวางแผน", "การเขียนโปรแกรม", "การใช้อินเทอร์เน็ต"], corr: 1, th: "พื้นฐาน", det: "ก่อนแก้ปัญหาต้องเข้าใจปัญหานั้นอย่างถ่องแท้ก่อน" },
        { q: "ข้อใดกล่าวถึงโครงสร้างทางเลือก (If-Else) ได้ถูกต้อง", opts: ["ทำงานตามลำดับ", "ทำงานซ้ำๆ", "ตัดสินใจเลือกทำอย่างใดอย่างหนึ่ง", "หยุดการทำงาน"], corr: 2, th: "การตัดสินใจ", det: "ใช้ตัดสินใจตามเงื่อนไขที่กำหนด" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
