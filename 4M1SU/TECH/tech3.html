<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบวิทยาการคำนวณ ม.1 - 25 ข้อ (ชุดที่ 3)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #27ae60; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #27ae60; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #27ae60; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค เทคโนโลยี (วิทยาการคำนวณ) ม.1 (ชุดที่ 3)</h2>
    <p>เนื้อหา: Abstraction, Algorithm & Python Programming | จำนวน: 25 ข้อ</p>
    <div style="background: #eafaf1; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ชุดนี้ท้าทายด้วยโจทย์สถานการณ์และการอ่าน Code แนะนำให้ค่อยๆ ไล่ลำดับบรรทัดของโปรแกรมครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "ข้อใดคือเป้าหมายสูงสุดของแนวคิดเชิงนามธรรม (Abstraction)", opts: ["ทำให้อ่านรหัสยากขึ้น", "ลดความซับซ้อนของปัญหา", "ประหยัดพื้นที่คอมพิวเตอร์", "ทำให้อัลกอริทึมยาวขึ้น"], corr: 1, th: "การคัดเลือกสิ่งที่จำเป็น", det: "เพื่อให้ง่ายต่อการจัดการปัญหา โดยตัดรายละเอียดที่ไม่สำคัญออก" },
        { q: "สัญลักษณ์ผังงานใดใช้แสดง 'ทิศทาง' ของลำดับการทำงาน", opts: ["วงรี", "ลูกศร", "สี่เหลี่ยมผืนผ้า", "สี่เหลี่ยมขนมเปียกปูน"], corr: 1, th: "เส้นเชื่อมโยง", det: "ลูกศรคือตัวบอกลำดับการทำงานว่าจากไหนไปไหน" },
        { q: "ในไพทอน ตัวแปรชื่อ '2nd_name' ผิดเพราะเหตุใด", opts: ["มีตัวเลข", "มีสัญลักษณ์พิเศษ", "ขึ้นต้นด้วยตัวเลข", "ห้ามใช้ตัวอักษร"], corr: 2, th: "กฎการตั้งชื่อตัวแปร", det: "ห้ามขึ้นต้นด้วยตัวเลขเด็ดขาด" },
        { q: "การวิเคราะห์ปัญหา (Problem Analysis) สิ่งแรกที่ต้องทำคืออะไร", opts: ["เขียนโค้ด", "ทำความเข้าใจว่าปัญหาต้องการอะไร", "สร้างผังงาน", "ตรวจสอบรหัสลำลอง"], corr: 1, th: "รู้จักจุดเริ่มต้น", det: "การวิเคราะห์เริ่มต้นจากการนิยามปัญหาให้ชัดเจน" },
        { q: "ข้อใดไม่ใช่ชนิดข้อมูลพื้นฐานใน Python", opts: ["int", "string", "float", "arraylist"], corr: 3, th: "ชนิดข้อมูลไพทอน", det: "ในไพทอนพื้นฐานหลักๆ คือ int, float, string, และ bool" },
        { q: "หากต้องการเก็บค่า 'True' หรือ 'False' ควรใช้ข้อมูลชนิดใด", opts: ["string", "bool", "float", "int"], corr: 1, th: "ค่าตรรกะ", det: "bool คือชนิดข้อมูลที่เก็บค่าความจริง" },
        { q: "โครงสร้างแบบ 'วนซ้ำ' (Loop) มีประโยชน์ที่สุดในงานลักษณะใด", opts: ["การรับค่าครั้งเดียว", "การทำงานที่ต้องทำซ้ำๆ หลายครั้ง", "การตัดสินใจแบบเลือกทาง", "การเริ่มทำงาน"], corr: 1, th: "ลดขั้นตอนงานซ้ำซ้อน", det: "ช่วยลดการเขียนโค้ดชุดเดิมซ้ำไปมา" },
        { q: "ถ้า a = 10, b = 3 แล้ว a % b มีค่าเท่าใด", opts: ["3", "1", "0.33", "30"], corr: 1, th: "เศษจากการหาร", det: "10 หาร 3 ได้ 3 เศษ 1" },
        { q: "คำสั่งใดใช้สำหรับรับค่าข้อความจากผู้ใช้งาน", opts: ["print()", "input()", "get_text()", "read()"], corr: 1, th: "รับอินพุต", det: "input() เป็นฟังก์ชันรับข้อมูลจากคีย์บอร์ด" },
        { q: "สัญลักษณ์ผังงาน 'สี่เหลี่ยมขนมเปียกปูน' ใช้ในกรณีใด", opts: ["คำนวณเลข", "รับค่า", "ตรวจสอบเงื่อนไข Yes/No", "จุดสิ้นสุด"], corr: 2, th: "การมีเงื่อนไข", det: "ใช้ตัดสินใจเมื่อมีทางเลือก" },
        { q: "ข้อใดคือผลลัพธ์ของ print(5 + 2 * 3)", opts: ["21", "11", "13", "10"], corr: 1, th: "ลำดับการคำนวณทางคณิตศาสตร์", det: "คูณก่อนบวก: (2*3) = 6 แล้วบวก 5 ได้ 11" },
        { q: "การเปรียบเทียบตัวแปรเหมือนกับ 'กล่องเก็บข้อมูล' ช่วยในเรื่องใด", opts: ["ทำให้คอมพิวเตอร์สวยขึ้น", "เข้าใจการเรียกใช้และเปลี่ยนค่าข้อมูล", "ประหยัดไฟฟ้า", "ทำให้โปรแกรมทำงานเร็วขึ้น"], corr: 1, th: "หลักการตัวแปร", det: "ช่วยให้เห็นภาพว่าค่าต่างๆ ถูกเก็บไว้และหยิบออกมาใช้ได้อย่างไร" },
        { q: "ในไพทอน เครื่องหมาย # ใช้ทำอะไร", opts: ["คำนวณ", "ประกาศตัวแปร", "เขียนคอมเมนต์", "วนซ้ำ"], corr: 2, th: "การจดบันทึกในโค้ด", det: "คอมเมนต์เพื่ออธิบายโค้ดโดยไม่รันจริง" },
        { q: "อัลกอริทึมที่ดีที่สุดคือข้อใด", opts: ["ยาวที่สุด", "รวดเร็ว ถูกต้อง และตรวจสอบได้", "สวยงามที่สุด", "ใช้ตัวแปรเยอะๆ"], corr: 1, th: "มาตรฐานการแก้ปัญหา", det: "เน้นประสิทธิภาพ ความถูกต้อง และความง่ายในการเข้าใจ" },
        { q: "การถ่ายทอดรายละเอียดปัญหา (Detailing) คืออะไร", opts: ["การซ่อนปัญหา", "การอธิบายปัญหาให้เข้าใจตรงกัน", "การวาดภาพประกอบ", "การเพิ่มความยาก"], corr: 1, th: "การสื่อสาร", det: "คือการอธิบายปัญหาให้ผู้อื่นเข้าใจได้ชัดเจน" },
        { q: "ถ้า a = 5 แล้ว a += 2 จะมีค่าเป็นเท่าใด", opts: ["5", "7", "2", "10"], corr: 1, th: "การบวกเพิ่ม", det: "a += 2 คือ a = a + 2" },
        { q: "ถ้ามีทางเลือก 3 ทาง การใช้ If-Else จะเป็นอย่างไร", opts: ["ใช้เพียง If", "ใช้ If-Elif-Else", "ใช้ Loop", "ใช้ ผังงาน"], corr: 1, th: "หลายเงื่อนไข", det: "Elif ช่วยให้เราสร้างเงื่อนไขเพิ่มขึ้นได้เรื่อยๆ" },
        { q: "การ 'ไล่หาข้อผิดพลาด' ในโปรแกรมเรียกว่าอะไร", opts: ["Programming", "Debugging", "Abstraction", "Flowcharting"], corr: 1, th: "แก้บั๊ก", det: "Debugging คือหัวใจของการแก้ปัญหาในโปรแกรม" },
        { q: "ข้อใดเป็นชนิดข้อมูลแบบเลขจำนวนเต็ม", opts: ["float", "int", "str", "bool"], corr: 1, th: "Integer", det: "int ย่อมาจาก Integer (จำนวนเต็ม)" },
        { q: "หากต้องการให้โปรแกรมวนซ้ำไปเรื่อยๆ จนกว่าเงื่อนไขจะเป็นเท็จ ต้องใช้คำสั่งใด", opts: ["for", "while", "if", "def"], corr: 1, th: "การทำจนกว่าจะจบ", det: "while จะทำงานซ้ำตราบเท่าที่เงื่อนไขเป็นจริง" },
        { q: "อะไรคือข้อผิดพลาดที่พบบ่อยในการเขียน Loop", opts: ["เขียนโค้ดสวยเกินไป", "Infinite Loop", "ใช้ตัวแปรน้อยเกินไป", "ไม่ใช้คอมเมนต์"], corr: 1, th: "ลูปไม่รู้จบ", det: "ลูปที่เงื่อนไขไม่มีวันเป็นเท็จจะทำงานค้างอยู่ตลอด" },
        { q: "ข้อใดไม่ใช่คุณลักษณะที่จำเป็นในการจัดทำตารางเวลาเรียน", opts: ["ชื่อวิชา", "เวลาเริ่ม-จบ", "ห้องเรียน", "ชื่อนักเรียนคนอื่นทั้งหมด"], corr: 3, th: "ตัดข้อมูลส่วนเกิน", det: "ชื่อนักเรียนคนอื่นไม่เกี่ยวกับตารางส่วนตัวของเรา" },
        { q: "รหัสลำลองเขียนด้วยภาษาอะไร", opts: ["ภาษาเครื่อง", "ภาษาธรรมชาติ/มนุษย์", "ภาษาไพทอนเท่านั้น", "สัญลักษณ์ผังงาน"], corr: 1, th: "ภาษาเขียนที่เข้าใจง่าย", det: "เขียนด้วยภาษามนุษย์เพื่ออธิบายตรรกะการแก้ปัญหา" },
        { q: "สัญลักษณ์ผังงาน 'วงรี' สื่อถึงอะไร", opts: ["ประมวลผล", "รับข้อมูล", "จุดเริ่มหรือจุดจบ", "ทิศทาง"], corr: 2, th: "แคปซูลเริ่มต้น", det: "วงรีเป็นจุดบอกจุดเริ่มต้นหรือจุดสิ้นสุดของอัลกอริทึม" },
        { q: "การเขียนโปรแกรมด้วยภาษา Python ทำได้ที่ไหน", opts: ["เขียนในกระดาษเท่านั้น", "เขียนในโปรแกรมแก้ไขโค้ด (Editor)", "เขียนในเครื่องคิดเลข", "เขียนในสมุดวาดรูป"], corr: 1, th: "สภาพแวดล้อมการเขียน", det: "ควรใช้ Editor ที่รองรับการรันโค้ด Python" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
