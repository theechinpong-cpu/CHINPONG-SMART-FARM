<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบไวยากรณ์ภาษาอังกฤษ 25 ข้อ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 20px auto; padding: 20px; }
        h1 { color: #2c3e50; text-align: center; }
        .question-box { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .options { list-style: none; padding: 0; }
        .options li { margin: 5px 0; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: block; margin: 20px auto; }
        button:hover { background-color: #2980b9; }
        #result { text-align: center; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>แบบทดสอบไวยากรณ์ภาษาอังกฤษ (Noun, Pronoun, Verb, Adjective, Adverb)</h1>
    <form id="quizForm">
        <!-- Questions will be generated by JS -->
    </form>
    <button onclick="checkAnswers()">ตรวจคำตอบ</button>
    <div id="result"></div>

    <script>
        const questions = [
            {q: "1. คำใดเป็น Noun: ", options: ["Quickly", "Happiness", "Eat", "Beautiful"], answer: 1},
            {q: "2. เลือก Pronoun: Sarah is a doctor. ___ works at the city hospital.", options: ["He", "It", "She", "They"], answer: 2},
            {q: "3. ระบุ Adjective: The old man walked slowly down the street.", options: ["old", "walked", "slowly", "street"], answer: 0},
            {q: "4. ระบุ Adverb: She finished her homework very quickly.", options: ["finished", "homework", "quickly", "very"], answer: 2},
            {q: "5. ประโยคใดมี Verb แสดงสภาวะ (State-of-being):", options: ["They run.", "The soup is hot.", "She eats.", "He writes."], answer: 1},
            {q: "6. เลือก Pronoun: My brothers are coming over. I bought some snacks for ___.", options: ["they", "them", "their", "theirs"], answer: 1},
            {q: "7. คำใดในประโยคเป็น Noun: The bright sun shines above us.", options: ["bright", "sun", "shines", "above"], answer: 1},
            {q: "8. เลือก Adjective ที่เหมาะสม: The ___ cat slept on the sofa.", options: ["loudly", "fluffy", "run", "quickly"], answer: 1},
            {q: "9. ระบุ Adverb: He spoke carefully during the meeting.", options: ["He", "spoke", "carefully", "meeting"], answer: 2},
            {q: "10. ข้อใดเป็น Verb ในรูปอดีต:", options: ["Sleep", "Ate", "Run", "Are"], answer: 1},
            {q: "11. แทนที่คำ: John and Mary are friends. John and Mary play tennis.", options: ["He", "They", "We", "It"], answer: 1},
            {q: "12. ประโยคใดใช้ Adjective ถูกต้อง:", options: ["The boy runs happy.", "She is a beautiful girl.", "He writes beautiful.", "The cat is fluffily."], answer: 1},
            {q: "13. ระบุ Verb: The stars twinkle in the night sky.", options: ["stars", "twinkle", "night", "sky"], answer: 1},
            {q: "14. คำใดเป็น Adverb:", options: ["Happy", "Happily", "Happiness", "Happen"], answer: 1},
            {q: "15. เลือก Pronoun: This pen belongs to me. It is ___.", options: ["my", "mine", "me", "I"], answer: 1},
            {q: "16. คำใดเป็น Noun:", options: ["Teacher", "Teach", "Teaching", "Taught"], answer: 0},
            {q: "17. ระบุ Adjective: She has a big red apple.", options: ["has", "big", "apple", "She"], answer: 1},
            {q: "18. คำใดเป็น Verb:", options: ["Table", "Eat", "Quickly", "Beautiful"], answer: 1},
            {q: "19. เติม Adverb: He drives very ___.", options: ["careful", "carefully", "care", "cares"], answer: 1},
            {q: "20. ประโยคใดใช้ Pronoun ถูกต้อง:", options: ["Us went to the park.", "They went to the park.", "Them went to the park.", "He go to the park."], answer: 1},
            {q: "21. คำที่เป็น Noun ในกลุ่มคำ 'The tall man':", options: ["The", "tall", "man", "The tall"], answer: 2},
            {q: "22. คำใดทำหน้าที่เป็น Adjective:", options: ["Fastly", "Fast", "Fasted", "Fasts"], answer: 1},
            {q: "23. เติม Verb: They ___ at the park yesterday.", options: ["are", "were", "was", "is"], answer: 1},
            {q: "24. ระบุ Adverb: She studies hard.", options: ["She", "studies", "hard", "none"], answer: 2},
            {q: "25. Pronoun ใดแสดงความเป็นเจ้าของ:", options: ["He", "Him", "His", "Them"], answer: 2}
        ];

        const form = document.getElementById('quizForm');
        questions.forEach((q, index) => {
            let html = `<div class="question-box"><p>${q.q}</p><ul class="options">`;
            q.options.forEach((opt, i) => {
                html += `<li><input type="radio" name="q${index}" value="${i}"> ${opt}</li>`;
            });
            html += `</ul></div>`;
            form.innerHTML += html;
        });

        function checkAnswers() {
            let score = 0;
            questions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.answer) score++;
            });
            document.getElementById('result').innerHTML = `คุณได้คะแนน ${score} เต็ม ${questions.length}`;
        }
    </script>
</body>
</html>
