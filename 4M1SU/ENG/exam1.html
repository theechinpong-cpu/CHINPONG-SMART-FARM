<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบไวยากรณ์ภาษาอังกฤษ 25 ข้อ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 20px auto; padding: 20px; }
        h1 { color: #2c3e50; text-align: center; }
        .question-box { background: white; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .options { list-style: none; padding: 0; }
        .options li { margin: 5px 0; cursor: pointer; }
        .feedback { margin-top: 10px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .correct { background-color: #d4edda; color: #155724; }
        .incorrect { background-color: #f8d7da; color: #721c24; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: block; margin: 20px auto; }
        button:hover { background-color: #2980b9; }
        #result { text-align: center; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>แบบทดสอบไวยากรณ์ภาษาอังกฤษ</h1>
    <div id="quizForm"></div>
    <button onclick="checkAll()">ตรวจคำตอบทั้งหมด</button>
    <div id="result"></div>

    <script>
        const questions = [
            {q: "1. คำใดเป็น Noun:", options: ["Quickly", "Happiness", "Eat", "Beautiful"], answer: 1, tip: "Noun คือชื่อของคน สัตว์ สิ่งของ หรือแนวคิด Happiness เป็นนามธรรมที่เป็นแนวคิด"},
            {q: "2. เลือก Pronoun: Sarah is a doctor. ___ works at the city hospital.", options: ["He", "It", "She", "They"], answer: 2, tip: "Sarah เป็นผู้หญิงคนเดียว จึงต้องใช้ She แทน"},
            {q: "3. ระบุ Adjective: The old man walked slowly down the street.", options: ["old", "walked", "slowly", "street"], answer: 0, tip: "old เป็น Adjective ขยายคำนาม man (ชายแก่)"},
            {q: "4. ระบุ Adverb: She finished her homework very quickly.", options: ["finished", "homework", "quickly", "very"], answer: 2, tip: "quickly ลงท้ายด้วย -ly และขยายกริยา finished (เสร็จอย่างรวดเร็ว)"},
            {q: "5. ประโยคใดมี Verb แสดงสภาวะ (State-of-being):", options: ["They run.", "The soup is hot.", "She eats.", "He writes."], answer: 1, tip: "Verb to be (is) ทำหน้าที่เชื่อมประโยคบอกสถานะของซุป"},
            {q: "6. เลือก Pronoun: My brothers are coming over. I bought some snacks for ___.", options: ["they", "them", "their", "theirs"], answer: 1, tip: "หลังคำบุพบท for ต้องตามด้วย Object Pronoun คือ them"},
            {q: "7. คำใดในประโยคเป็น Noun: The bright sun shines above us.", options: ["bright", "sun", "shines", "above"], answer: 1, tip: "sun คือชื่อสิ่งของ (ธรรมชาติ) จึงเป็น Noun"},
            {q: "8. เลือก Adjective ที่เหมาะสม: The ___ cat slept on the sofa.", options: ["loudly", "fluffy", "run", "quickly"], answer: 1, tip: "fluffy อธิบายลักษณะของแมว จึงเป็น Adjective"},
            {q: "9. ระบุ Adverb: He spoke carefully during the meeting.", options: ["He", "spoke", "carefully", "meeting"], answer: 2, tip: "carefully ขยายกริยา spoke (พูดอย่างระมัดระวัง)"},
            {q: "10. ข้อใดเป็น Verb ในรูปอดีต:", options: ["Sleep", "Ate", "Run", "Are"], answer: 1, tip: "Ate เป็นกริยาช่อง 2 ของ eat (ในอดีต)"},
            {q: "11. แทนที่คำ: John and Mary are friends. John and Mary play tennis.", options: ["He", "They", "We", "It"], answer: 1, tip: "John and Mary สองคนขึ้นไปใช้ They"},
            {q: "12. ประโยคใดใช้ Adjective ถูกต้อง:", options: ["The boy runs happy.", "She is a beautiful girl.", "He writes beautiful.", "The cat is fluffily."], answer: 1, tip: "beautiful ขยายคำนาม girl ได้ถูกต้อง"},
            {q: "13. ระบุ Verb: The stars twinkle in the night sky.", options: ["stars", "twinkle", "night", "sky"], answer: 1, tip: "twinkle คือการกระทำ (กริยา) ของดาว"},
            {q: "14. คำใดเป็น Adverb:", options: ["Happy", "Happily", "Happiness", "Happen"], answer: 1, tip: "Happily ลงท้ายด้วย -ly มักเป็น Adverb"},
            {q: "15. เลือก Pronoun: This pen belongs to me. It is ___.", options: ["my", "mine", "me", "I"], answer: 1, tip: "mine เป็น Possessive Pronoun แสดงความเป็นเจ้าของเดี่ยวๆ"},
            {q: "16. คำใดเป็น Noun:", options: ["Teacher", "Teach", "Teaching", "Taught"], answer: 0, tip: "Teacher คือบุคคล (นาม)"},
            {q: "17. ระบุ Adjective: She has a big red apple.", options: ["has", "big", "apple", "She"], answer: 1, tip: "big ขยาย apple (ขนาดของแอปเปิล)"},
            {q: "18. คำใดเป็น Verb:", options: ["Table", "Eat", "Quickly", "Beautiful"], answer: 1, tip: "Eat คือการกระทำ (กิน)"},
            {q: "19. เติม Adverb: He drives very ___.", options: ["careful", "carefully", "care", "cares"], answer: 1, tip: "ต้องใช้ Adverb ขยายกริยา drives"},
            {q: "20. ประโยคใดใช้ Pronoun ถูกต้อง:", options: ["Us went to the park.", "They went to the park.", "Them went to the park.", "He go to the park."], answer: 1, tip: "ประธานต้องใช้ Subject Pronoun (They)"},
            {q: "21. คำที่เป็น Noun ในกลุ่มคำ 'The tall man':", options: ["The", "tall", "man", "The tall"], answer: 2, tip: "man คือคน (นาม)"},
            {q: "22. คำใดทำหน้าที่เป็น Adjective:", options: ["Fastly", "Fast", "Fasted", "Fasts"], answer: 1, tip: "Fast เป็น Adjective ขยายคำนามได้"},
            {q: "23. เติม Verb: They ___ at the park yesterday.", options: ["are", "were", "was", "is"], answer: 1, tip: "yesterday เป็นอดีต ใช้ were สำหรับประธานพหูพจน์"},
            {q: "24. ระบุ Adverb: She studies hard.", options: ["She", "studies", "hard", "none"], answer: 2, tip: "hard ในที่นี้ขยายกริยา studies (เรียนอย่างหนัก)"},
            {q: "25. Pronoun ใดแสดงความเป็นเจ้าของ:", options: ["He", "Him", "His", "Them"], answer: 2, tip: "His เป็น Possessive Adjective/Pronoun แสดงเจ้าของ"}
        ];

        const form = document.getElementById('quizForm');
        questions.forEach((q, index) => {
            let html = `<div class="question-box" id="box${index}"><p>${q.q}</p><ul class="options">`;
            q.options.forEach((opt, i) => {
                html += `<li><input type="radio" name="q${index}" value="${i}" onclick="showTip(${index}, ${i})"> ${opt}</li>`;
            });
            html += `</ul><div id="feedback${index}" class="feedback"></div></div>`;
            form.innerHTML += html;
        });

        function showTip(qIndex, selectedValue) {
            const feedback = document.getElementById(`feedback${qIndex}`);
            const q = questions[qIndex];
            feedback.style.display = 'block';
            if (selectedValue === q.answer) {
                feedback.className = 'feedback correct';
                feedback.innerHTML = 'ถูกต้อง! ' + q.tip;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = 'ผิดครับ! ' + q.tip;
            }
        }

        function checkAll() {
            let score = 0;
            questions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.answer) score++;
            });
            document.getElementById('result').innerHTML = `สรุปคะแนน: คุณได้ ${score} เต็ม ${questions.length}`;
        }
    </script>
</body>
</html>
