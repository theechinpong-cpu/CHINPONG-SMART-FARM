<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ข้อสอบอัตนัย</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #fdfbf7; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--primary); padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question-box { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        textarea { width: 100%; height: 60px; margin-top: 10px; display: block; }
        .answer-area { margin-top: 10px; background: #e8f6f3; padding: 10px; border-radius: 4px; display: none; color: #27ae60; font-weight: bold; }
        button { cursor: pointer; padding: 8px 15px; background: var(--accent); color: white; border: none; border-radius: 4px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>แบบทดสอบอัตนัย: สารบริสุทธิ์ ธาตุ และสารประกอบ</h1>
        <div id="quiz-container"></div>
    </div>

    <script>
        const questions = [
            { q: "สารบริสุทธิ์และสารผสมมีความแตกต่างกันอย่างไรในเชิงสมบัติทางฟิสิกส์?", a: "สารบริสุทธิ์มีจุดเดือดและจุดหลอมเหลวคงที่ แต่สารผสมจะมีจุดเดือดและจุดหลอมเหลวไม่คงที่" },
            { q: "ธาตุและสารประกอบมีความแตกต่างกันอย่างไร?", a: "ธาตุประกอบด้วยอะตอมชนิดเดียว ส่วนสารประกอบประกอบด้วยธาตุตั้งแต่ 2 ชนิดขึ้นไปมารวมตัวกันทางเคมี" },
            { q: "เหตุใดโลหะจึงสามารถนำไฟฟ้าได้ดี?", a: "เพราะโลหะมีอิเล็กตรอนอิสระที่สามารถเคลื่อนที่ได้อย่างอิสระภายในโครงสร้าง" },
            { q: "ยกตัวอย่างธาตุกึ่งโลหะมา 2 ชนิด", a: "ซิลิคอน (Si) และ เจอร์เมเนียม (Ge)" },
            { q: "สารประกอบ NaCl เกิดจากธาตุชนิดใดบ้าง?", a: "โซเดียม (Na) และ คลอรีน (Cl)" },
            { q: "ทำไมน้ำบริสุทธิ์จึงถือเป็นสารประกอบ?", a: "เพราะเกิดจากไฮโดรเจนและออกซิเจนรวมตัวกันด้วยอัตราส่วนทางเคมีที่คงที่" },
            { q: "ธาตุอโลหะมีสมบัติทางกายภาพอย่างไรบ้าง?", a: "มักเปราะ ผิวไม่มันวาว และเป็นฉนวนไฟฟ้า" },
            { q: "ปรอทมีความพิเศษกว่าโลหะชนิดอื่นอย่างไร?", a: "ปรอทเป็นโลหะที่มีสถานะเป็นของเหลวที่อุณหภูมิห้อง" },
            { q: "การแยกสารประกอบทำได้ด้วยวิธีใด?", a: "ต้องใช้วิธีทางเคมี ไม่สามารถใช้วิธีทางกายภาพปกติได้" },
            { q: "ธาตุหมู่ 1 มีความว่องไวในการทำปฏิกิริยาอย่างไร?", a: "มีความว่องไวสูงมาก เนื่องจากมีอิเล็กตรอนวงนอกสุดเพียงตัวเดียว" },
            { q: "แก๊สเฉื่อยคืออะไร และทำไมจึงเรียกว่าธาตุเฉื่อย?", a: "คือธาตุหมู่ 18 ที่มีความเสถียรสูงมาก ไม่ทำปฏิกิริยากับธาตุอื่น" },
            { q: "เขียนสัญลักษณ์ของธาตุ: เหล็ก, ทองคำ, เงิน", a: "Fe, Au, Ag" },
            { q: "สารผสมหมายถึงอะไร?", a: "คือการที่สารตั้งแต่ 2 ชนิดขึ้นไปมาอยู่รวมกันโดยไม่มีการรวมตัวทางเคมี" },
            { q: "คาร์บอนไดออกไซด์ (CO2) ประกอบด้วยธาตุอะไรบ้าง?", a: "คาร์บอน (C) และ ออกซิเจน (O)" },
            { q: "หากมีสารสีเงินเงางาม นำไฟฟ้าได้ คุณคาดว่าเป็นสารประเภทใด?", a: "คาดว่าเป็นธาตุโลหะ" }
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((item, index) => {
            container.innerHTML += `
                <div class="question-box">
                    <p>${index + 1}. ${item.q}</p>
                    <textarea placeholder="พิมพ์คำตอบของคุณที่นี่..."></textarea>
                    <button onclick="this.nextElementSibling.style.display='block'">เฉลย</button>
                    <div class="answer-area">คำตอบ: ${item.a}</div>
                </div>
            `;
        });
    </script>
</body>
</html>
