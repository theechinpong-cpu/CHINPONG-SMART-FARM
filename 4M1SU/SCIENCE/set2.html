// เตรียมตัวแปร global สำหรับเก็บลำดับที่สุ่มแล้ว
let questions = [];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = ''; 

    // สุ่มตัวเลือกสำหรับทุกข้อ
    questions = rawQuestions.map(item => {
        let options = item.a.map((text, idx) => ({ text, isCorrect: (idx === item.correct) }));
        options = shuffle(options);
        
        let correctIdx = options.findIndex(opt => opt.isCorrect);
        
        return {
            ...item,
            shuffledOptions: options,
            shuffledCorrect: correctIdx
        };
    });

    questions.forEach((q, index) => {
        let html = `<div class="question">
            <p>${index + 1}. ${q.q}</p>`;
        q.shuffledOptions.forEach((opt, i) => {
            html += `<label><input type="radio" name="q${index}" value="${i}" onclick="checkAnswer(${index}, ${i})"> ${opt.text}</label><br>`;
        });
        html += `<div class="clue" onclick="toggleClue(${index})">🔍 ดูคำใบ้/เฉลย</div>
                 <div id="feedback${index}" class="feedback"></div></div>`;
        container.innerHTML += html;
    });
}

function checkAnswer(qIdx, aIdx) {
    const feedback = document.getElementById(`feedback${qIdx}`);
    const isCorrect = (aIdx === questions[qIdx].shuffledCorrect);
    feedback.style.display = 'block';
    feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
    feedback.innerHTML = `<strong>${isCorrect ? 'ถูกต้อง!' : 'ผิดครับ!'}</strong> ${questions[qIdx].detail}`;
}

function toggleClue(index) {
    alert("Tip: " + questions[index].clue);
}

function submitQuiz() {
    let score = 0;
    questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && parseInt(selected.value) === q.shuffledCorrect) score++;
    });
    alert("คะแนนรวมของคุณคือ: " + score + "/" + questions.length + " คะแนน");
}

renderQuiz();
</script>
