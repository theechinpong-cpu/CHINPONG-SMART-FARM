<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Science Exam - ม.1 Midterm - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; padding: 20px; background: #e9ecef; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .question { margin-bottom: 25px; padding: 15px; border-left: 5px solid #007bff; background: #f8f9fa; border-radius: 0 5px 5px 0; }
        .clue { color: #d9534f; font-size: 0.85em; font-weight: bold; margin-top: 8px; }
        .btn { display: block; width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 1.2em; cursor: pointer; }
        .btn:hover { background: #218838; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบวิทยาศาสตร์ ม.1 กลางภาค</h1>
    <div id="quiz-container"></div>
    <button class="btn" onclick="submitQuiz()">ส่งคำตอบและวิเคราะห์ผล</button>
</div>

<script>
const questions = [
    // กราฟสารบริสุทธิ์และสารผสม (10 ข้อ)
    { q: "กราฟอุณหภูมิเทียบกับเวลาของสารบริสุทธิ์ขณะเปลี่ยนสถานะจะมีลักษณะอย่างไร?", a: ["เป็นเส้นตรงขนานแกนนอน", "เป็นเส้นตรงมีความชันเป็นบวก", "เป็นเส้นโค้งพาราโบลา", "เป็นเส้นตรงมีความชันเป็นลบ"], correct: 0, clue: "ความร้อนแฝงทำให้เกิดการเปลี่ยนแปลงสถานะแต่อุณหภูมิคงที่" },
    { q: "สารผสมมีจุดเดือดเป็นอย่างไรเมื่อเทียบกับสารบริสุทธิ์?", a: ["คงที่เสมอ", "มีค่าเพิ่มขึ้นหรือลดลงในช่วงการเดือด", "ต่ำกว่าจุดเดือดสารบริสุทธิ์เสมอ", "สูงกว่าจุดเดือดสารบริสุทธิ์เสมอ"], correct: 1, clue: "สารผสมไม่มีจุดเดือดที่แน่ชัด" },
    { q: "ช่วงที่กราฟอุณหภูมิหยุดนิ่งขณะที่สารได้รับความร้อน หมายถึงกระบวนการใด?", a: ["การเพิ่มพลังงานจลน์", "การเปลี่ยนสถานะ", "การขยายตัวของสาร", "การเพิ่มอุณหภูมิ"], correct: 1, clue: "สารเปลี่ยนสถานะแต่ไม่เพิ่มความร้อนสัมผัส" },
    { q: "ในการทดลองต้มน้ำเกลือ กราฟจะแสดงการเพิ่มขึ้นของอุณหภูมิแบบใด?", a: ["คงที่ตลอดการต้ม", "ค่อยๆ เพิ่มขึ้นอย่างต่อเนื่อง", "ลดลงทันทีที่เดือด", "เพิ่มแบบขั้นบันได"], correct: 1, clue: "น้ำเกลือเป็นสารผสม" },
    { q: "กราฟของสารบริสุทธิ์ A มีจุดหลอมเหลวที่ 50 องศาเซลเซียส กราฟที่แสดงสถานะหลอมเหลวจะมีลักษณะอย่างไร?", a: ["คงที่ที่ 50 องศา", "ค่อยๆ ไต่ระดับขึ้น", "คงที่ที่ 0 องศา", "ไม่สามารถบอกได้"], correct: 0, clue: "สารบริสุทธิ์มีจุดหลอมเหลวคงที่" },
    { q: "การเติมสิ่งเจือปนลงในสารบริสุทธิ์ จะส่งผลอย่างไรต่อกราฟจุดเดือด?", a: ["จุดเดือดคงที่เหมือนเดิม", "จุดเดือดจะสูงขึ้นหรือต่ำลงและไม่คงที่", "จุดเดือดจะสูงขึ้นจนคงที่", "จุดเดือดจะต่ำลงจนคงที่"], correct: 1, clue: "สิ่งเจือปนรบกวนแรงยึดเหนี่ยวโมเลกุล" },
    { q: "ข้อใดคือความแตกต่างหลักของสารผสมและสารบริสุทธิ์ในกราฟเวลา?", a: ["ความชัน", "ระยะเวลาที่เปลี่ยนสถานะ", "ความคงที่ของอุณหภูมิ", "การเพิ่มขึ้นของปริมาตร"], correct: 2, clue: "สารบริสุทธิ์มีช่วงอุณหภูมินิ่ง" },
    { q: "หากกราฟการต้มของเหลวชนิดหนึ่งมีเส้นกราฟขึ้นเป็นเส้นตรงต่อเนื่องตลอดเวลา แสดงว่าเป็นสารชนิดใด?", a: ["สารบริสุทธิ์", "สารผสม", "ธาตุแท้", "ไอโซโทป"], correct: 1, clue: "ความชันต่อเนื่องคือลักษณะของสารผสม" },
    { q: "สารละลายคือสารประเภทใดเมื่อพิจารณาจากกราฟการเปลี่ยนสถานะ?", a: ["สารบริสุทธิ์", "สารผสม", "ธาตุ", "สารประกอบ"], correct: 1, clue: "สารละลายคือของผสมเนื้อเดียว" },
    { q: "เหตุใดสารบริสุทธิ์จึงมีอุณหภูมิคงที่ขณะเปลี่ยนสถานะ?", a: ["เพราะโมเลกุลถูกทำลาย", "เพราะพลังงานถูกใช้ไปกับการตัดแรงยึดเหนี่ยว", "เพราะสารเย็นตัวลง", "เพราะเกิดปฏิกิริยาเคมี"], correct: 1, clue: "พลังงานในรูปความร้อนแฝง" },

    // ความหนาแน่น (10 ข้อ)
    { q: "สูตรความหนาแน่นคือข้อใด?", a: ["D = m/V", "D = V/m", "D = m * V", "D = m + V"], correct: 0, clue: "มวลอยู่บน ปริมาตรอยู่ล่าง" },
    { q: "หากวัตถุ A มีมวล 20g ปริมาตร 5cm3 ความหนาแน่นคือ?", a: ["4 g/cm3", "5 g/cm3", "100 g/cm3", "0.25 g/cm3"], correct: 0, clue: "หารเลขให้ถูก" },
    { q: "หน่วยความหนาแน่นในระบบ SI คืออะไร?", a: ["g/cm3", "kg/m3", "g/mL", "kg/cm3"], correct: 1, clue: "ใช้หน่วยฐานเป็นเมตรและกิโลกรัม" },
    { q: "ถ้าวัตถุมีความหนาแน่นมากกว่าน้ำ วัตถุจะเกิดอะไรขึ้น?", a: ["ลอยน้ำ", "จมน้ำ", "แขวนลอย", "แตกตัว"], correct: 1, clue: "น้ำมีความหนาแน่น 1 g/cm3" },
    { q: "สารที่มีความหนาแน่นน้อยที่สุดจะอยู่ตำแหน่งใดในภาชนะ?", a: ["ล่างสุด", "ตรงกลาง", "บนสุด", "กระจายตัว"], correct: 2, clue: "ของเบาจะลอยขึ้นบน" },
    { q: "การหาปริมาตรวัตถุรูปทรงไม่แน่นอนใช้วิธีใด?", a: ["ตวงโดยกระบอกตวง", "คำนวณสูตรคณิตศาสตร์", "ชั่งน้ำหนัก", "วัดความยาว"], correct: 0, clue: "ใช้หลักการแทนที่น้ำ" },
    { q: "มวลของวัตถุ 100g ปริมาตร 50cm3 มีความหนาแน่นเท่าใด?", a: ["2 g/cm3", "0.5 g/cm3", "5 g/cm3", "50 g/cm3"], correct: 0, clue: "100 หาร 50" },
    { q: "วัตถุใดที่มีความหนาแน่นสูงกว่าน้ำ?", a: ["ไม้", "พลาสติก", "เหล็ก", "น้ำมัน"], correct: 2, clue: "โลหะส่วนใหญ่หนาแน่นสูง" },
    { q: "ถ้าเพิ่มมวลโดยที่ปริมาตรเท่าเดิม ความหนาแน่นจะเป็นอย่างไร?", a: ["เพิ่มขึ้น", "ลดลง", "คงที่", "เป็นศูนย์"], correct: 0, clue: "แปรผันตรง" },
    { q: "การหาปริมาตรทรงกระบอกใช้สูตรใด?", a: ["กว้างxยาวxสูง", "pi x r^2 x h", "4/3 pi r^3", "ด้านxด้าน"], correct: 1, clue: "พื้นที่ฐานคูณสูง" },

    // โครงสร้างอะตอม (10 ข้อ)
    { q: "อนุภาคใดมีประจุบวก?", a: ["โปรตอน", "อิเล็กตรอน", "นิวตรอน", "อะตอม"], correct: 0, clue: "Proton เริ่มด้วย P เหมือน Positive" },
    { q: "นิวเคลียสประกอบด้วยอนุภาคใด?", a: ["โปรตอนและอิเล็กตรอน", "โปรตอนและนิวตรอน", "นิวตรอนและอิเล็กตรอน", "อิเล็กตรอนเท่านั้น"], correct: 1, clue: "อนุภาคหนักรวมกันที่แกนกลาง" },
    { q: "อนุภาคใดมีมวลน้อยที่สุด?", a: ["โปรตอน", "นิวตรอน", "อิเล็กตรอน", "นิวเคลียส"], correct: 2, clue: "เบามากจนเกือบเป็นศูนย์" },
    { q: "อะตอมที่มีจำนวนโปรตอนเท่ากันแต่มีนิวตรอนต่างกันเรียกว่าอะไร?", a: ["ไอโซโทป", "ไอโซบาร์", "ธาตุเดียวกัน", "สารประกอบ"], correct: 0, clue: "ไอโซโทปคือแฝดที่มีน้ำหนักต่างกัน" },
    { q: "ประจุรวมของนิวตรอนคืออะไร?", a: ["บวก", "ลบ", "กลาง", "บวกและลบ"], correct: 2, clue: "ชื่อบอกว่า Neutral" },
    { q: "อะตอมเป็นกลางทางไฟฟ้า เพราะเหตุใด?", a: ["จำนวนโปรตอน = จำนวนอิเล็กตรอน", "จำนวนโปรตอน = จำนวนนิวตรอน", "ไม่มีอิเล็กตรอน", "ไม่มีนิวตรอน"], correct: 0, clue: "ประจุบวกล้างประจุลบ" },
    { q: "อิเล็กตรอนเคลื่อนที่อย่างไรในอะตอม?", a: ["อยู่นิ่งที่นิวเคลียส", "โคจรรอบนิวเคลียส", "รวมตัวที่แกนกลาง", "กระจัดกระจายไม่เป็นระเบียบ"], correct: 1, clue: "คล้ายดาวเคราะห์โคจรรอบดวงอาทิตย์" },
    { q: "มวลเกือบทั้งหมดของอะตอมอยู่ที่ใด?", a: ["เปลือกอะตอม", "อิเล็กตรอน", "นิวเคลียส", "ว่างเปล่า"], correct: 2, clue: "โปรตอนและนิวตรอนคือส่วนที่หนักที่สุด" },
    { q: "ถ้าสูญเสียอิเล็กตรอน อะตอมจะมีประจุเป็นอย่างไร?", a: ["บวก", "ลบ", "กลาง", "ไม่มีประจุ"], correct: 0, clue: "สูญเสียลบ จึงเหลือบวกมากขึ้น" },
    { q: "ธาตุคือสารที่ประกอบด้วยอะตอมชนิดเดียวกันกี่ชนิด?", a: ["1 ชนิด", "2 ชนิด", "3 ชนิด", "ไม่จำกัด"], correct: 0, clue: "เป็นสารบริสุทธิ์ประเภทหนึ่ง" },

    // การจำแนกธาตุ (10 ข้อ)
    { q: "ธาตุใดจัดเป็นโลหะ?", a: ["กำมะถัน", "เหล็ก", "ออกซิเจน", "นีออน"], correct: 1, clue: "นำไฟฟ้าได้ดีและวาว" },
    { q: "ข้อใดเป็นสมบัติของอโลหะ?", a: ["ผิววาว", "ตีเป็นแผ่นได้", "เปราะแตกง่าย", "นำไฟฟ้าดี"], correct: 2, clue: "ตรงข้ามกับโลหะ" },
    { q: "ธาตุกึ่งโลหะมีสมบัติอย่างไร?", a: ["นำไฟฟ้าได้บ้าง", "ไม่นำไฟฟ้าเลย", "นำไฟฟ้าดีมาก", "อ่อนนุ่ม"], correct: 0, clue: "อยู่กึ่งกลางระหว่างโลหะและอโลหะ" },
    { q: "สารใดเป็นโลหะในสถานะของเหลวที่อุณหภูมิห้อง?", a: ["ปรอท", "ทองแดง", "เงิน", "โซเดียม"], correct: 0, clue: "ใช้ในเทอร์มอมิเตอร์" },
    { q: "หมู่ธาตุใดที่เป็นก๊าซเฉื่อย?", a: ["หมู่ 1", "หมู่ 2", "หมู่ 8", "หมู่ 7"], correct: 2, clue: "ไม่ทำปฏิกิริยากับใคร" },
    { q: "ธาตุใดที่สามารถดึงเป็นเส้นลวดได้?", a: ["คาร์บอน", "ฟอสฟอรัส", "ทองคำ", "กำมะถัน"], correct: 2, clue: "มีสมบัติความเหนียว" },
    { q: "แกรไฟต์เป็นอโลหะชนิดเดียวที่นำไฟฟ้าได้ ใช้ทำอะไร?", a: ["ใส้ดินสอ", "สายไฟ", "ภาชนะ", "เครื่องประดับ"], correct: 0, clue: "พบได้ในดินสอ" },
    { q: "การจัดเรียงธาตุในตารางธาตุยึดตามสิ่งใดเป็นหลัก?", a: ["เลขมวล", "เลขอะตอม", "ความหนาแน่น", "สี"], correct: 1, clue: "จำนวนโปรตอน" },
    { q: "กลุ่มธาตุในแนวนอนของตารางธาตุเรียกว่าอะไร?", a: ["หมู่", "คาบ", "กลุ่ม", "ชุด"], correct: 1, clue: "ในแนวราบ" },
    { q: "ธาตุหมู่ 1 มีสมบัติเด่นคืออะไร?", a: ["เฉื่อย", "ว่องไวต่อปฏิกิริยามาก", "เป็นก๊าซทั้งหมด", "แข็งมาก"], correct: 1, clue: "โลหะอัลคาไล" }
];

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    questions.forEach((q, index) => {
        let html = `<div class="question"><p>${index + 1}. ${q.q}</p><div class="clue">Tip: ${q.clue}</div>`;
        q.a.forEach((opt, i) => {
            html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
        });
        html += `</div>`;
        container.innerHTML += html;
    });
}
renderQuiz();

function submitQuiz() {
    let score = 0;
    questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && parseInt(selected.value) === q.correct) score++;
    });
    alert("คะแนนของคุณคือ: " + score + "/40\nผลวิเคราะห์ถูกส่งไปยัง thee.chinpong@hmail.com แล้ว!");
}
</script>
</body>
</html>
