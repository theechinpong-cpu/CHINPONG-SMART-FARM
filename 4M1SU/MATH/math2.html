<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบคณิตศาสตร์ ม.1 (ชุดยาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.5; max-width: 900px; margin: auto; padding: 20px; background: #f0f2f5; }
        .summary { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .question-card { background: #fff; padding: 20px; margin: 15px 0; border-radius: 10px; border-left: 6px solid #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .clue { color: #e74c3c; font-weight: bold; margin: 10px 0; display: block; }
        .options { margin: 15px 0; }
        .option-btn { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .option-btn:hover { background: #eef2f7; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 5px; display: none; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .footer { text-align: center; margin-top: 30px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="summary">
    <h1>ข้อสอบวิเคราะห์คณิตศาสตร์ ม.1 (ระดับยาก)</h1>
    <p>ชุดข้อสอบนี้เน้นการประยุกต์ใช้สมบัติของจำนวนเต็มในเชิงลึก และการใช้เหตุผลเชิงเรขาคณิตขั้นสูง <em>กระบวนการคิด:</em> ก่อนตอบให้เช็กเครื่องหมายลบทุกครั้ง และจินตนาการถึงภาพรวมของรูปเรขาคณิตที่โจทย์กำหนดให้</p>
</div>

<div id="quiz-container"></div>

<script>
const questions = [
    {q: "ค่าของ (-5) - [(-3) - (-7)] มีค่าเท่าใด", a: ["-9", "-1", "1", "9"], correct: 0, detail: "วิธีทำ: ทำในวงเล็บก่อน (-3+7=4) แล้วจึงนำไปลบ (-5-4=-9)"},
    {q: "ถ้า a เป็นจำนวนเต็มลบ และ b เป็นจำนวนเต็มบวก ข้อใดกล่าวถูกต้องที่สุด", a: ["a*b เป็นบวก", "a+b เป็นลบเสมอ", "a-b เป็นลบเสมอ", "b-a เป็นลบเสมอ"], correct: 2, detail: "วิธีทำ: จำนวนลบ ลบด้วยจำนวนบวก ผลลัพธ์ต้องเป็นลบเสมอ"},
    {q: "(-1)^101 + (-1)^100 มีค่าเท่าใด", a: ["-2", "-1", "0", "1"], correct: 2, detail: "วิธีทำ: (-1) ยกกำลังเลขคี่ได้ -1, ยกกำลังเลขคู่ได้ 1, ดังนั้น -1+1=0"},
    {q: "จำนวนเต็ม x ที่ทำให้ x/(-4) > 2 คือจำนวนใด", a: ["x < -8", "x > -8", "x < 8", "x > 8"], correct: 0, detail: "วิธีทำ: เมื่อคูณด้วย -4 อสมการต้องเปลี่ยนเครื่องหมาย x < -8"},
    {q: "สมบัติการแจกแจงข้อใดใช้แก้โจทย์ 99 * 15 ได้เร็วที่สุด", a: ["(100-1)*15", "(90+9)*15", "(99*10)+(99*5)", "ไม่สามารถใช้ได้"], correct: 0, detail: "วิธีทำ: 1500 - 15 = 1485 เป็นการประยุกต์สมบัติแจกแจงที่ดี"},
    {q: "จำนวนเต็ม n ที่น้อยที่สุดที่ทำให้ (-15) + n > 0 คือข้อใด", a: ["14", "15", "16", "17"], correct: 2, detail: "วิธีทำ: ต้องมากกว่า 15 คือ 16"},
    {q: "ผลคูณของจำนวนเต็มลบ 5 จำนวน จะได้ผลลัพธ์เป็นอย่างไร", a: ["เป็นบวกเสมอ", "เป็นลบเสมอ", "เป็นศูนย์", "ขึ้นอยู่กับค่าสัมบูรณ์"], correct: 1, detail: "วิธีทำ: ลบจำนวนคี่ครั้ง ผลลัพธ์เป็นลบเสมอ"},
    {q: "ถ้า a*b = 0 และ a เป็นจำนวนลบ แล้ว b ต้องเป็นเท่าใด", a: ["จำนวนบวก", "จำนวนลบ", "ศูนย์", "สรุปไม่ได้"], correct: 2, detail: "วิธีทำ: ผลคูณเป็นศูนย์ แสดงว่าตัวใดตัวหนึ่งต้องเป็น 0"},
    {q: "ข้อใดคือค่าสัมบูรณ์ของ |(-5) + (-3)|", a: ["-8", "2", "8", "-2"], correct: 2, detail: "วิธีทำ: |-8| = 8"},
    {q: "(-2) * [3 - (-5)] มีค่าเท่าใด", a: ["-16", "-12", "12", "16"], correct: 0, detail: "วิธีทำ: (-2) * 8 = -16"},
    {q: "จำนวนเต็มที่อยู่ระหว่าง -5 กับ 3 มีกี่จำนวน", a: ["6", "7", "8", "9"], correct: 1, detail: "วิธีทำ: -4, -3, -2, -1, 0, 1, 2 รวม 7 จำนวน"},
    {q: "(-a) - (-b) เท่ากับข้อใด", a: ["b - a", "a - b", "-(a+b)", "-a+b"], correct: 0, detail: "วิธีทำ: จัดรูปจะได้ b - a"},
    {q: "ถ้า a*b < 0 และ a > 0 แล้ว b เป็นอย่างไร", a: ["บวก", "ลบ", "ศูนย์", "สรุปไม่ได้"], correct: 1, detail: "วิธีทำ: บวกคูณลบได้ลบ ดังนั้น b ต้องเป็นลบ"},
    {q: "ข้อใดคือสมบัติที่ใช้ในการเปลี่ยนลำดับการบวกเลขหลายจำนวน", a: ["การสลับที่", "การเปลี่ยนหมู่", "การแจกแจง", "เอกลักษณ์"], correct: 1, detail: "วิธีทำ: การเปลี่ยนหมู่ช่วยให้เลือกคู่บวกที่ง่ายก่อนได้"},
    {q: "(-10) - (-10) - (-10) มีค่าเท่าใด", a: ["-30", "-10", "10", "30"], correct: 2, detail: "วิธีทำ: -10 + 10 + 10 = 10"},
    {q: "การสร้างเส้นตั้งฉากกับเส้นตรงที่จุดใดจุดหนึ่ง ทำได้โดยใช้วงเวียนกางรัศมีอย่างไร", a: ["รัศมีเท่ากัน", "รัศมีต่างกัน", "ไม่ต้องใช้วงเวียน", "กางกว้างเท่าไหร่ก็ได้"], correct: 0, detail: "วิธีทำ: ต้องกางรัศมีเท่ากันจากจุดที่กำหนดทั้งสองข้าง"},
    {q: "ในการสร้างมุม 30 องศา ต้องใช้วิธีใดจากมุม 60 องศา", a: ["แบ่งครึ่งมุม", "บวกเพิ่ม", "ลบออก", "สร้างเส้นขนาน"], correct: 0, detail: "วิธีทำ: แบ่งครึ่งมุม 60 องศาจะได้ 30 องศา"},
    {q: "ถ้ากางวงเวียนด้วยรัศมีคงที่ในการสร้างสามเหลี่ยมด้านเท่า ด้านแต่ละด้านจะมีลักษณะอย่างไร", a: ["ยาวเท่ากัน", "ยาวต่างกัน", "มุมเปลี่ยนไป", "เส้นตรงไม่บรรจบกัน"], correct: 0, detail: "วิธีทำ: รัศมีที่เท่ากันทำให้ระยะทุกด้านยาวเท่ากัน"},
    {q: "การสร้างมุม 120 องศา คือการทำอย่างไร", a: ["2 เท่าของ 60 องศา", "แบ่งครึ่ง 90", "ใช้ไม้บรรทัดวัด", "ไม่มีวิธีสร้าง"], correct: 0, detail: "วิธีทำ: สร้างมุม 60 องศา สองครั้งต่อกัน"},
    {q: "จุดใดคือจุดตัดของเส้นแบ่งครึ่งมุม", a: ["จุดศูนย์กลาง", "จุดยอด", "จุดภายใน", "จุดภายนอก"], correct: 0, detail: "วิธีทำ: คือจุดที่ระยะห่างจากแขนของมุมทั้งสองเท่ากัน"},
    {q: "ถ้าสร้างรูปสามเหลี่ยมโดยกางวงเวียนรัศมี r ตลอด จะได้รูปอะไร", a: ["ด้านเท่า", "หน้าจั่ว", "มุมฉาก", "ไม่เป็นรูปปิด"], correct: 0, detail: "วิธีทำ: ความยาวด้านทุกด้านจะเท่ากับรัศมี r"},
    {q: "การสร้างเส้นขนานโดยใช้มุมแย้ง ต้องสร้างมุมชนิดใดก่อน", a: ["มุมฉาก", "มุมแย้งที่เท่ากัน", "มุมป้าน", "มุมกลับ"], correct: 1, detail: "วิธีทำ: การสร้างมุมแย้งที่เท่ากันจะทำให้เส้นสองเส้นขนานกัน"},
    {q: "ข้อใดเป็นข้อจำกัดของการสร้างด้วยวงเวียนและสันตรง", a: ["ห้ามวัดความยาว", "ห้ามใช้ดินสอ", "ห้ามกางวงเวียน", "ห้ามใช้กระดาษ"], correct: 0, detail: "วิธีทำ: สันตรงใช้ลากเส้น ห้ามใช้สเกลวัด"},
    {q: "การแบ่งส่วนของเส้นตรงออกเป็น 4 ส่วนเท่าๆ กัน ต้องทำอย่างไร", a: ["แบ่งครึ่ง 2 ครั้ง", "ใช้ไม้บรรทัดวัด", "กะระยะ", "ไม่มีวิธี"], correct: 0, detail: "วิธีทำ: แบ่งครึ่งครั้งแรกได้ 2 ส่วน แล้วแบ่งครึ่งของครึ่งอีกที"},
    {q: "มุมที่มีขนาดเป็นพหุคูณของ 15 องศา สามารถสร้างได้โดยการใช้การแบ่งครึ่งมุมไปเรื่อยๆ จากมุมใด", a: ["มุม 60", "มุม 90", "มุมตรง", "ทุกข้อที่กล่าวมา"], correct: 3, detail: "วิธีทำ: การแบ่งครึ่งมุมพื้นฐานอย่างต่อเนื่องสร้างมุมที่ซับซ้อนได้"}
];

const container = document.getElementById('quiz-container');

questions.forEach((item, index) => {
    let qDiv = document.createElement('div');
    qDiv.className = 'question-card';
    qDiv.innerHTML = `
        <p><strong>ข้อที่ ${index + 1}:</strong> ${item.q}</p>
        <span class="clue">TIP: วิเคราะห์เงื่อนไขของโจทย์ให้ดีก่อนคำนวณ</span>
        <div class="options">
            ${item.a.map((opt, i) => `<div class="option-btn" onclick="check(${index}, ${i}, this)">${opt}</div>`).join('')}
        </div>
        <div class="feedback" id="fb${index}"></div>
    `;
    container.appendChild(qDiv);
});

function check(qIdx, optIdx, element) {
    const feedback = document.getElementById('fb' + qIdx);
    feedback.style.display = 'block';
    if (optIdx === questions[qIdx].correct) {
        feedback.className = 'feedback correct';
        feedback.innerHTML = "<strong>ถูกต้อง!</strong> " + questions[qIdx].detail;
    } else {
        feedback.className = 'feedback wrong';
        feedback.innerHTML = "<strong>เกือบไปแล้ว!</strong> " + questions[qIdx].detail;
    }
}
</script>

<div class="footer">เขียนโดย พระจอมเกล้าติวเตอร์</div>

</body>
</html>
