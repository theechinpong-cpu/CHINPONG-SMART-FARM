<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบสังคมศึกษา ม.1 - 25 ข้อ (ชุดที่ 2)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fff5e6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #d35400; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #d35400; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #ffeaa7; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #fdf2e9; border-left: 4px solid #d35400; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค สังคมศึกษา ม.1 (ชุดที่ 2)</h2>
    <p>เนื้อหา: พุทธประวัติ, หลักธรรม, การบริหารจิต และศาสนสัมพันธ์ | จำนวน: 25 ข้อ</p>
    <div style="background: #fcf3eb; padding: 10px;"><b>เทคนิคติวเตอร์:</b> ข้อสอบชุดนี้เน้นความเข้าใจลำดับเหตุการณ์สำคัญและหลักธรรมที่นำไปใช้ในชีวิตจริง ลองอ่านคำใบ้ก่อนตอบดูนะครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "พุทธประวัติช่วงใดที่แสดงถึง 'การค้นหาคำตอบเพื่อแก้ปัญหาความทุกข์' ของเจ้าชายสิทธัตถะ", opts: ["ประสูติ", "การออกผนวช", "การปรินิพพาน", "การปฐมเทศนา"], corr: 1, th: "จุดเปลี่ยนชีวิต", det: "การออกผนวชคือการเสด็จออกแสวงหาความจริงเพื่อแก้ปัญหาชีวิต" },
        { q: "ในอริยสัจ 4 ข้อใดเปรียบเทียบว่าเป็น 'จุดหมายสูงสุดหรือเป้าหมาย' ของการปฏิบัติ", opts: ["ทุกข์", "สมุทัย", "นิโรธ", "มรรค"], corr: 2, th: "เป้าหมายแห่งการดับทุกข์", det: "นิโรธคือความดับทุกข์ ซึ่งเป็นเป้าหมายที่แท้จริง" },
        { q: "พุทธศาสนสุภาษิตใด สอนให้ตนเองเป็นที่พึ่งของตนเอง", opts: ["กัมมุนา วัตตตี โลโก", "นัตถิ ปัญญา สมา อาภา", "อตฺตา หิ อตฺตโน นาโถ", "สติ โลกสมิ ชาคะโร"], corr: 2, th: "ความพึ่งพาตนเอง", det: "ตนเป็นที่พึ่งแห่งตน คือหลักการสอนให้รับผิดชอบชีวิตตนเอง" },
        { q: "การมี 'สติ' คือการรู้อะไร", opts: ["สิ่งที่เกิดขึ้นในปัจจุบัน", "อนาคตที่จะมาถึง", "อดีตที่ผ่านมาแล้ว", "ทุกข้อที่กล่าวมา"], corr: 0, th: "การตระหนักรู้", det: "สติคือความระลึกได้และรู้ตัวในปัจจุบันขณะ" },
        { q: "โอวาท 3 ข้อแรก คือการละเว้นจากความชั่ว ได้แก่ข้อใด", opts: ["ทำดี", "ละชั่ว", "ทำใจบริสุทธิ์", "ถูกทุกข้อ"], corr: 1, th: "ส่วนของการละเว้น", det: "โอวาท 3 คือ ไม่ทำชั่ว ทำดี และทำใจให้บริสุทธิ์" },
        { q: "ศีลข้อที่ 1 คือข้อใด", opts: ["งดเว้นจากการลักทรัพย์", "งดเว้นจากการฆ่าสัตว์", "งดเว้นจากการพูดเท็จ", "งดเว้นจากการดื่มสุรา"], corr: 1, th: "ความเมตตาต่อชีวิต", det: "ปาณาติปาตา คือการงดเว้นจากการทำร้ายชีวิต" },
        { q: "การอยู่ร่วมกันในสังคมที่มีหลากหลายศาสนา ควรปฏิบัติตนอย่างไร", opts: ["ดูถูกศาสนาอื่น", "เคารพในความเชื่อที่แตกต่าง", "บังคับให้คนอื่นเปลี่ยนศาสนา", "อยู่แยกส่วนกัน"], corr: 1, th: "ศาสนสัมพันธ์", det: "การเคารพและเข้าใจความแตกต่างคือหัวใจของการอยู่ร่วมกันอย่างสันติ" },
        { q: "วันใดที่พระพุทธเจ้าแสดงธรรมครั้งแรกแก่ปัญจวัคคีย์", opts: ["วันวิสาขบูชา", "วันอาสาฬหบูชา", "วันมาฆบูชา", "วันเข้าพรรษา"], corr: 1, th: "วันที่เกิดครบ 'พระรัตนตรัย'", det: "วันอาสาฬหบูชา มีพระพุทธ พระธรรม และพระสงฆ์องค์แรก" },
        { q: "การทำจิตใจให้บริสุทธิ์ ในโอวาท 3 หมายถึงอะไร", opts: ["การนั่งสมาธิ", "การทำบุญตักบาตร", "การชำระจิตใจจากกิเลส", "การเป็นคนใจดี"], corr: 2, th: "การขัดเกลาจิตใจ", det: "คือการทำจิตให้ว่างจากความโลภ โกรธ หลง" },
        { q: "สี่เหลี่ยมเปรียบได้กับการแก้ปัญหาตามหลักอริยสัจ 4 อย่างไร", opts: ["ทุกข์=ปัญหา, สมุทัย=สาเหตุ, นิโรธ=เป้าหมาย, มรรค=วิธีการ", "ทุกข์=สาเหตุ, สมุทัย=ปัญหา", "สลับกันหมด", "ไม่มีความเกี่ยวข้องกัน"], corr: 0, th: "หลักการคิดแบบวิทยาศาสตร์", det: "เป็นการแก้ปัญหาอย่างเป็นระบบ" },
        { q: "เทวทูต 4 ได้แก่ คนแก่ คนเจ็บ คนตาย และสมณะ เหตุใดสมณะถึงเป็นข้อสุดท้าย", opts: ["เพราะพระองค์เห็นแล้วเลื่อมใส", "เพราะเป็นคนสุดท้ายที่พบ", "เพราะสมณะชี้ทางพ้นทุกข์", "ถูกทุกข้อ"], corr: 3, th: "ความแตกต่างของเทวทูต", det: "สมณะคือสัญลักษณ์ของผู้ที่ค้นพบทางออก" },
        { q: "กัมมุนา วัตตตี โลโก แปลว่าอะไร", opts: ["สัตว์โลกย่อมเป็นไปตามกรรม", "คนจะเป็นคนดีเพราะการกระทำ", "ความรู้เท่ากับแสงสว่าง", "สติเป็นเครื่องตื่นในโลก"], corr: 0, th: "กฎแห่งกรรม", det: "ทุกชีวิตขับเคลื่อนด้วยการกระทำของตน" },
        { q: "เบญจธรรม คือหลักธรรมที่ใช้คู่กับศีล 5 ข้อใดคือเบญจธรรมที่คู่กับศีลข้อ 1", opts: ["ความเมตตากรุณา", "ความสุจริต", "ความสำรวมในกาม", "การมีสติ"], corr: 0, th: "คุณธรรมประจำศีล", det: "การไม่ฆ่า ต้องมาพร้อมกับความเมตตา" },
        { q: "เหตุใดเราจึงต้องเรียนรู้หลักธรรมในศาสนาอื่นๆ", opts: ["เพื่อเอาชนะ", "เพื่อเปรียบเทียบศาสนา", "เพื่อส่งเสริมความเข้าใจอันดี", "เพื่อให้รู้ว่าใครดีกว่า"], corr: 2, th: "หัวใจของการเรียนรู้", det: "เพื่อลดอคติและสร้างสันติภาพ" },
        { q: "การเจริญปัญญาช่วยลดปัญหาในชีวิตประจำวันได้อย่างไร", opts: ["ทำให้สอบผ่าน", "ทำให้ตัดสินใจบนพื้นฐานของเหตุผล", "ทำให้คนเกรงกลัว", "ไม่ช่วยอะไรเลย"], corr: 1, th: "ปัญญาคือแสงสว่าง", det: "ปัญญาช่วยให้มองเห็นความจริงและแก้ปัญหาไม่ให้ลุกลาม" },
        { q: "วันมาฆบูชา มีความสำคัญอย่างไร", opts: ["วันแสดงโอวาทปาติโมกข์", "วันประสูติ", "วันดับขันธปรินิพพาน", "วันตรัสรู้"], corr: 0, th: "การประชุมใหญ่แห่งพุทธสาวก", det: "วันแห่งการแสดงหลักธรรมที่เป็นหัวใจพุทธศาสนา" },
        { q: "การฝึกสมาธิในเบื้องต้น ควรเริ่มจากจุดใด", opts: ["การกำหนดลมหายใจ", "การอ่านหนังสือ", "การเดินเที่ยว", "การเล่นกีฬา"], corr: 0, th: "จุดเริ่มของสมาธิ", det: "อานาปานสติ หรือการดูลมหายใจ เป็นพื้นฐานที่ดีที่สุด" },
        { q: "ข้อใดคือประโยชน์ของการมีความกตัญญู", opts: ["ทำให้เป็นที่รักของผู้คน", "ทำให้เป็นคนอ่อนแอ", "ทำให้ไม่มีเพื่อน", "ทำให้งานยุ่งขึ้น"], corr: 0, th: "ความดีที่โลกสรรเสริญ", det: "กตัญญูเป็นเครื่องหมายของคนดี" },
        { q: "อริยสัจ 4 ข้อ 'มรรค' ประกอบด้วยองค์กี่ประการ", opts: ["8 ประการ (มรรค 8)", "4 ประการ", "5 ประการ", "10 ประการ"], corr: 0, th: "ทางสายกลาง", det: "มรรคมีองค์ 8 คือแนวทางปฏิบัติเพื่อเข้าถึงนิพพาน" },
        { q: "ถ้าเพื่อนชวนไปโกงข้อสอบ เราควรทำอย่างไรตามหลักพุทธศาสนา", opts: ["ไปทำเพื่อเพื่อน", "ไม่ไปและเตือนเพื่อน", "เงียบไว้เฉยๆ", "ด่าเพื่อน"], corr: 1, th: "การรักษาศีล", det: "ต้องยึดมั่นในความถูกต้อง (ศีลข้อที่ 2)" },
        { q: "พระรัตนตรัยประกอบด้วยอะไรบ้าง", opts: ["พระพุทธ พระธรรม พระสงฆ์", "พระธรรม พระสงฆ์ พระกษัตริย์", "พระพุทธ พระสงฆ์ พ่อแม่", "พระพุทธ พระธรรม กฎหมาย"], corr: 0, th: "สรณะสูงสุด", det: "ที่พึ่งสูงสุดของชาวพุทธ" },
        { q: "คำว่า 'พุทธประวัติ' คือการศึกษาเรื่องราวของใคร", opts: ["พระพุทธเจ้า", "พระสงฆ์", "พระมหากษัตริย์", "ศาสดาของศาสนาอื่น"], corr: 0, th: "ประวัติศาสตร์พระพุทธศาสนา", det: "การศึกษาชีวิตของพระพุทธเจ้า" },
        { q: "การแก้ปัญหาด้วย 'ปัญญา' คือการใช้สิ่งใด", opts: ["อารมณ์", "เหตุผล", "ความโกรธ", "ความเดา"], corr: 1, th: "หัวใจของการเจริญปัญญา", det: "ปัญญาคู่กับเหตุผลเสมอ" },
        { q: "ข้อใดเป็นคำสอนของโอวาท 3 ที่กล่าวถึง 'การทำความดี'", opts: ["สัพพะปาปัสสะ อะกะระณัง", "กุสะลัสสูปะสัมปะทา", "สะจิตตะปะริโยทะปะนัง", "ถูกทุกข้อ"], corr: 1, th: "กุศล = ความดี", det: "กุศลสัมปทา คือการถึงพร้อมด้วยการทำกุศล" },
        { q: "จุดหมายของการเรียนสังคมศึกษาฯ เพื่ออะไร", opts: ["เป็นพลเมืองดีและอยู่ร่วมกันอย่างสันติ", "เป็นนักบวช", "ทำให้สอบผ่าน", "เพื่อการประกอบอาชีพเท่านั้น"], corr: 0, th: "เป้าหมายของวิชา", det: "เพื่อเป็นพลเมืองที่มีคุณภาพของสังคม" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
