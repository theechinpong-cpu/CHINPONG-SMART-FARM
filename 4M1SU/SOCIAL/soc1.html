<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบสังคมศึกษา ม.1 - 25 ข้อ (ชุดที่ 1)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdf6e3; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #d35400; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #d35400; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #d35400; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค สังคมศึกษา ม.1 (ชุดที่ 1)</h2>
    <p>เนื้อหา: พุทธประวัติ, หลักธรรมอริยสัจ 4 และการอยู่ร่วมกัน | จำนวน: 25 ข้อ</p>
    <div style="background: #fcf3eb; padding: 10px;"><b>เคล็ดลับพระจอมเกล้าติวเตอร์:</b> ข้อสอบชุดนี้เน้นการวิเคราะห์สถานการณ์ ขอให้น้องๆ ลองเชื่อมโยงเหตุการณ์ในพุทธประวัติเข้ากับการดำเนินชีวิตประจำวันนะครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "เหตุการณ์ใดเป็นจุดเริ่มต้นที่ทำให้เจ้าชายสิทธัตถะตัดสินใจออกผนวช", opts: ["การพบเทวทูต 4", "การประสูติ", "การอภิเษกสมรส", "การชนะมาร"], corr: 0, th: "การเห็นความทุกข์ของโลก", det: "การพบคนแก่ คนเจ็บ คนตาย และสมณะ ทำให้ทรงเห็นว่าชีวิตเป็นทุกข์" },
        { q: "หลักอริยสัจ 4 ข้อใดเปรียบเสมือน 'สาเหตุของปัญหา'", opts: ["ทุกข์", "สมุทัย", "นิโรธ", "มรรค"], corr: 1, th: "ต้นเหตุของทุกข์", det: "สมุทัย คือเหตุให้เกิดทุกข์ (ตัณหา)" },
        { q: "วันวิสาขบูชา มีความสำคัญอย่างไรในพุทธประวัติ", opts: ["ประสูติ", "ตรัสรู้", "ปรินิพพาน", "ถูกทุกข้อ"], corr: 3, th: "วันสำคัญยิ่งของโลก", det: "เป็นวันที่พระพุทธเจ้าประสูติ ตรัสรู้ และปรินิพพาน" },
        { q: "การไม่โกงผู้อื่น จัดอยู่ในหลักธรรมใด", opts: ["เบญจศีล", "เบญจธรรม", "อริยสัจ 4", "โอวาท 3"], corr: 0, th: "ศีลข้อที่ 2", det: "ศีลข้อ 2 คือ อทินนาทานา เวระมะณี คือการเว้นจากการถือเอาของที่เจ้าของไม่ได้ให้" },
        { q: "ข้อใดคือเป้าหมายสูงสุดของพระพุทธศาสนา", opts: ["สวรรค์", "นิพพาน", "การเกิดใหม่", "ความรวย"], corr: 1, th: "เป้าหมายสูงสุด", det: "นิพพาน คือความหลุดพ้นจากความทุกข์ทั้งปวง" },
        { q: "มรรค ในอริยสัจ 4 หมายถึงข้อใด", opts: ["ความดับทุกข์", "ข้อปฏิบัติให้ถึงความดับทุกข์", "ความทุกข์", "สาเหตุของทุกข์"], corr: 1, th: "หนทางปฏิบัติ", det: "มรรค คือทางสายกลางหรือข้อปฏิบัติเพื่อดับทุกข์" },
        { q: "เหตุใดพระพุทธศาสนาจึงมีความสำคัญต่อวัฒนธรรมไทย", opts: ["เป็นศาสนาประจำชาติ", "หล่อหลอมจิตใจและประเพณี", "สร้างวัดให้สวยงาม", "ทำให้คนไทยมีความรู้"], corr: 1, th: "อิทธิพลต่อสังคมไทย", det: "วิถีชีวิต ประเพณี และศิลปะไทยได้รับอิทธิพลจากพุทธศาสนาอย่างมาก" },
        { q: "พระพุทธศาสนสุภาษิตใด สอนเกี่ยวกับการทำดีได้ดี ทำชั่วได้ชั่ว", opts: ["กัมมุนา วัตตตี โลโก", "นัตถิ ปัญญา สมา อาภา", "อตฺตา หิ อตฺตโน นาโถ", "สติ โลกสมิ ชาคะโร"], corr: 0, th: "สัตว์โลกย่อมเป็นไปตามกรรม", det: "กรรมกำหนดวิถีชีวิตคน" },
        { q: "การนั่งสมาธิมีผลอย่างไรต่อการแก้ปัญหา", opts: ["ทำให้ขี้เกียจ", "ทำให้ใจเย็นและมีสติ", "ทำให้ลืมปัญหา", "ทำให้ร่างกายแข็งแรง"], corr: 1, th: "การบริหารจิต", det: "การมีสมาธิช่วยให้เกิดความรอบคอบและปัญญาในการแก้ปัญหา" },
        { q: "ศาสนาทุกศาสนาในสังคมไทยมีเป้าหมายร่วมกันคืออะไร", opts: ["ทำให้คนเชื่อเหมือนกัน", "สอนให้คนเป็นคนดี", "สร้างชื่อเสียงให้ศาสนา", "ห้ามทำบุญ"], corr: 1, th: "เป้าหมายของศาสนา", det: "ทุกศาสนาสอนให้คนประพฤติตนเป็นคนดี" },
        { q: "เทวทูต 4 คือใครบ้าง", opts: ["คนแก่ เจ็บ ตาย สมณะ", "กษัตริย์ พราหมณ์ แพศย์ ศูทร", "พ่อ แม่ ลูก เพื่อน", "ดิน น้ำ ลม ไฟ"], corr: 0, th: "ผู้ชี้ทางให้เห็นความทุกข์", det: "เป็นภาพสะท้อนธรรมชาติของมนุษย์" },
        { q: "โอวาท 3 คืออะไร", opts: ["การทำดี ละเว้นชั่ว ทำจิตใจให้บริสุทธิ์", "อริยสัจ 4", "ศีล 5", "ไตรสิกขา"], corr: 0, th: "หัวใจของพระพุทธศาสนา", det: "เป็นการสรุปหลักธรรมทั้งหมดให้เหลือเพียงสามข้อ" },
        { q: "เหตุการณ์ใดเกิดขึ้นก่อนในพุทธประวัติ", opts: ["ตรัสรู้", "ปรินิพพาน", "ประสูติ", "แสดงธรรมครั้งแรก"], corr: 2, th: "จุดเริ่มชีวิต", det: "ประสูติเป็นเหตุการณ์แรกสุด" },
        { q: "ถ้าเพื่อนทำผิดต่อเรา ควรใช้หลักธรรมใดในการอยู่ร่วมกัน", opts: ["เมตตาและให้อภัย", "การโต้ตอบ", "ความโกรธ", "การนิ่งเฉย"], corr: 0, th: "หัวใจของความสงบสุข", det: "เมตตาธรรมค้ำจุนโลก" },
        { q: "การเจริญปัญญา หมายถึงอะไร", opts: ["การเรียนเก่ง", "การรอบรู้ตามความเป็นจริง", "การมีเงินเยอะ", "การจำเก่ง"], corr: 1, th: "ความฉลาดทางธรรม", det: "การเข้าใจสภาวะความจริงของโลก" },
        { q: "ข้อใดคือการปฏิบัติตนที่เหมาะสมต่อพระสงฆ์", opts: ["พูดคุยเสียงดัง", "แสดงความเคารพอย่างเหมาะสม", "ขอเงิน", "ทำตัวตามสบาย"], corr: 1, th: "มารยาททางสังคม", det: "การแสดงความเคารพเป็นวัฒนธรรมไทยที่งดงาม" },
        { q: "สติ ในทางพุทธหมายถึงอะไร", opts: ["ความโกรธ", "ความไม่รู้", "ความระลึกได้", "ความง่วง"], corr: 2, th: "ความไม่ประมาท", det: "สติคือความตื่นตัว รู้ตัวอยู่เสมอ" },
        { q: "พระพุทธศาสนาสอนให้คนรู้จัก 'ปล่อยวาง' เพื่ออะไร", opts: ["เพื่อความเกียจคร้าน", "เพื่อลดความทุกข์", "เพื่อให้คนอื่นเอาเปรียบ", "เพื่อจะได้ไม่ต้องทำงาน"], corr: 1, th: "การปล่อยวาง", det: "ความทุกข์เกิดจากการยึดมั่นถือมั่น" },
        { q: "ข้อใดไม่ใช่หลักปฏิบัติของเบญจศีล", opts: ["ไม่ฆ่าสัตว์", "ไม่ลักทรัพย์", "ไม่โกหก", "ไม่ทานอาหารเย็น"], corr: 3, th: "ศีล 5 ข้อ", det: "การไม่ทานอาหารเย็นเป็นศีล 8 ของนักบวช" },
        { q: "การอยู่ร่วมกันอย่างสันติในสังคมพหุวัฒนธรรม ต้องเริ่มจากอะไร", opts: ["การยอมรับความแตกต่าง", "การเปลี่ยนศาสนา", "การห้ามศาสนาอื่น", "การบังคับให้เชื่อ"], corr: 0, th: "กุญแจสู่สันติภาพ", det: "ความเข้าใจและเคารพในความต่าง" },
        { q: "ก่อนบรรลุธรรม เจ้าชายสิทธัตถะบำเพ็ญเพียรในรูปแบบใด", opts: ["การเสวยสุข", "การทรมานร่างกาย", "การเรียนรู้จากตำรา", "การท่องโลก"], corr: 1, th: "ทุกรกิริยา", det: "ทรงทดลองทำทุกทางจนพบทางสายกลาง" },
        { q: "ความกตัญญู ต่อบิดามารดา จัดอยู่ในหลักธรรมใด", opts: ["พรหมวิหาร 4", "มงคลชีวิต", "เบญจธรรม", "ถูกทุกข้อ"], corr: 3, th: "รากฐานความดี", det: "ความกตัญญูเป็นเครื่องหมายของคนดี" },
        { q: "ใครคือผู้ที่ฟังธรรมครั้งแรกของพระพุทธเจ้า", opts: ["ปัญจวัคคีย์", "พระเจ้าพิมพิสาร", "พระมหากัสสปะ", "พระเจ้าอโศก"], corr: 0, th: "ผู้รับฟังธรรมชุดแรก", det: "การแสดงธรรมครั้งแรกเรียกว่า ธรรมจักรกัปปวัตตนสูตร" },
        { q: "หลักธรรมใดช่วยให้คนเราสามารถควบคุมอารมณ์ได้", opts: ["สติสัมปชัญญะ", "ความโลภ", "ความโกรธ", "ความหลง"], corr: 0, th: "เครื่องควบคุมจิต", det: "การมีสติช่วยให้เท่าทันอารมณ์" },
        { q: "การทำบุญในทางพุทธศาสนาไม่ได้หมายถึงเพียงการให้ทาน แต่รวมถึงอะไรด้วย", opts: ["การรักษาศีลและการภาวนา", "การอวดรวย", "การสร้างสถานีตำรวจ", "การทำตามคนอื่น"], corr: 0, th: "บุญกิริยาวัตถุ", det: "บุญทำได้ด้วยการให้ทาน รักษาศีล และเจริญภาวนา" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
