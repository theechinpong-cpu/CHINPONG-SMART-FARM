<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบสังคมศึกษา ม.1 - 25 ข้อ (ชุดที่ 3)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdfaf6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #e67e22; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #e67e22; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; transition: 0.3s; }
        button:hover { background: #fcead0; }
        .correct { background: #27ae60 !important; color: white; border: 1px solid #2ecc71; }
        .wrong { background: #c0392b !important; color: white; border: 1px solid #e74c3c; }
        .detail { margin-top: 10px; padding: 10px; background: #fdf2e9; border-left: 4px solid #e67e22; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบกลางภาค สังคมศึกษา ม.1 (ชุดที่ 3)</h2>
    <p>เนื้อหา: พุทธประวัติ, อริยสัจ 4, หลักธรรม และศาสนสัมพันธ์ | จำนวน: 25 ข้อ</p>
    <div style="background: #fef5e7; padding: 10px;"><b>เคล็ดลับพระจอมเกล้าติวเตอร์:</b> ชุดนี้เน้นการวิเคราะห์พุทธประวัติและหลักธรรมเชื่อมโยงกับชีวิตจริง ขอให้น้องๆ มีสติในการวิเคราะห์คำถามครับ</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "เจ้าชายสิทธัตถะทรงประสูติที่สวนใด", opts: ["ลุมพินีวัน", "สารนาถ", "กุสินารา", "พุทธคยา"], corr: 0, th: "สถานที่ประสูติ", det: "ประสูติที่สวนลุมพินี ปัจจุบันอยู่ในประเทศเนปาล" },
        { q: "อริยสัจ 4 ข้อใดคือ 'เป้าหมาย' ของการแก้ปัญหา", opts: ["ทุกข์", "สมุทัย", "นิโรธ", "มรรค"], corr: 2, th: "ความดับทุกข์", det: "นิโรธคือเป้าหมายสูงสุดคือการดับทุกข์ให้สิ้นไป" },
        { q: "หลักธรรม 'โอวาท 3' ประกอบด้วยอะไรบ้าง", opts: ["ทำดี ละชั่ว ทำใจบริสุทธิ์", "ศีล สมาธิ ปัญญา", "ทุกข์ สมุทัย นิโรธ มรรค", "ขันติ โสรัจจะ กตัญญู"], corr: 0, th: "หัวใจพุทธศาสนา", det: "สรุปหลักธรรมทั้งหมดได้ 3 ข้อนี้" },
        { q: "การพูดคำหยาบ ผิดศีลข้อใด", opts: ["ข้อ 2", "ข้อ 3", "ข้อ 4", "ข้อ 5"], corr: 2, th: "ศีลข้อ 4 มุสาวาท", det: "ศีลข้อ 4 ครอบคลุมการพูดเท็จ พูดคำหยาบ และพูดส่อเสียด" },
        { q: "พระพุทธเจ้าตรัสรู้ที่ไหน", opts: ["ใต้ต้นศรีมหาโพธิ์", "ใต้ต้นสาละ", "ในป่าอิสิปตนมฤคทายวัน", "ในวัง"], corr: 0, th: "สถานที่ตรัสรู้", det: "ตรัสรู้ใต้ต้นพระศรีมหาโพธิ์ ณ พุทธคยา" },
        { q: "การฝึกสมาธิมีจุดประสงค์หลักเพื่ออะไร", opts: ["เพื่อให้มีพลังวิเศษ", "เพื่อให้จิตใจสงบและมีสติ", "เพื่อให้เรียนเก่ง", "เพื่อให้ดูเท่"], corr: 1, th: "การบริหารจิต", det: "สมาธิช่วยให้จิตนิ่ง มีสติพร้อมสำหรับการใช้ปัญญา" },
        { q: "ศาสนาทุกศาสนาสอนให้คนเป็นคนดี คำว่า 'เป็นคนดี' ในทางสังคมหมายถึงอะไร", opts: ["ร่ำรวย", "มีน้ำใจและไม่เบียดเบียนผู้อื่น", "เรียนเก่ง", "แต่งตัวสวยงาม"], corr: 1, th: "นิยามของคนดี", det: "คนดีคือคนที่ไม่สร้างความเดือดร้อนให้ตนเองและผู้อื่น" },
        { q: "การรู้จักรับผิดชอบต่อหน้าที่ จัดเป็น 'เบญจธรรม' ข้อใด", opts: ["ความเมตตากรุณา", "การมีสติสัมปชัญญะ", "ความเสียสละ", "การมีวินัย"], corr: 1, th: "ความสำรวมระวัง", det: "การมีสติและรู้ผิดชอบชั่วดีเป็นหัวใจสำคัญของคนมีวินัย" },
        { q: "ข้อใดคือความหมายของ 'มรรค' ในอริยสัจ 4", opts: ["ปัญหา", "เหตุแห่งปัญหา", "หนทางดับทุกข์", "ผลลัพธ์"], corr: 2, th: "วิถีปฏิบัติ", det: "มรรคคือทางสายกลางที่นำไปสู่ความดับทุกข์" },
        { q: "ถ้าเพื่อนลืมของไว้ ควรปฏิบัติตนตามศีลข้อใด", opts: ["ศีลข้อ 1", "ศีลข้อ 2", "ศีลข้อ 3", "ศีลข้อ 4"], corr: 1, th: "ศีลข้อ 2 อทินนาทาน", det: "การไม่ถือเอาของผู้อื่น คือการซื่อสัตย์" },
        { q: "เหตุการณ์ในพุทธประวัติที่ทำให้พระองค์เปลี่ยนใจออกผนวชคืออะไร", opts: ["การไปเที่ยว", "การพบเทวทูต 4", "การแข่งกีฬา", "การนอนหลับ"], corr: 1, th: "แรงบันดาลใจจากความทุกข์", det: "เห็นความแก่ เจ็บ ตาย ทำให้คิดหาทางออก" },
        { q: "วันวิสาขบูชาได้รับการยกย่องจาก UNESCO ว่าอย่างไร", opts: ["วันสำคัญของโลก", "วันหยุดราชการ", "วันของคนรวย", "วันของคนฉลาด"], corr: 0, th: "สำคัญระดับโลก", det: "ได้รับการประกาศเป็นวันสำคัญสากลของโลก" },
        { q: "พุทธศาสนสุภาษิตใดที่ว่าด้วย 'การทำดีได้ดี'", opts: ["กัมมุนา วัตตตี โลโก", "สติ โลกสมิ ชาคะโร", "นัตถิ ปัญญา สมา อาภา", "อตฺตา หิ อตฺตโน นาโถ"], corr: 0, th: "กรรมกำหนดผล", det: "คนทำดีต้องได้ดีเพราะกรรมขับเคลื่อนโลก" },
        { q: "หากนักเรียนโกรธเพื่อน ควรใช้วิธีใดตามหลักพุทธศาสนา", opts: ["ด่ากลับ", "เมตตาและให้อภัย", "แจ้งครูอย่างเดียว", "นิ่งเงียบด้วยความโกรธ"], corr: 1, th: "การบริหารจิต", det: "ความโกรธดับด้วยความเมตตา" },
        { q: "การอยู่ร่วมกันในสังคมไทย ต้องเน้นสิ่งใดมากที่สุด", opts: ["ความอดทนอดกลั้น", "การเอาชนะ", "การแบ่งพรรคพวก", "การนิ่งเฉย"], corr: 0, th: "การยอมรับความแตกต่าง", det: "ความอดทนอดกลั้นช่วยให้ลดความขัดแย้ง" },
        { q: "พระพุทธเจ้าปรินิพพานที่ใด", opts: ["กุสินารา", "ลุมพินี", "พุทธคยา", "สารนาถ"], corr: 0, th: "สถานที่สุดท้าย", det: "สาลวโนทยาน เมืองกุสินารา" },
        { q: "การมีปัญญา คือการรู้อะไร", opts: ["รู้ทุกเรื่องในโลก", "รู้ความจริงตามความเป็นจริง", "รู้สูตรคณิตศาสตร์", "รู้การเดาทาง"], corr: 1, th: "ปัญญาคือความรู้จริง", det: "เห็นความจริงของโลก เช่น ความไม่เที่ยง" },
        { q: "ข้อใดไม่ใช่ความสำคัญของพระพุทธศาสนาต่อสังคมไทย", opts: ["เป็นรากฐานประเพณี", "สร้างสถาปัตยกรรม", "ส่งเสริมความเป็นอิสระจากกฎหมาย", "หล่อหลอมจิตใจคน"], corr: 2, th: "บทบาทของพุทธศาสนา", det: "ศาสนาสอนให้เคารพกฎหมายและศีลธรรม" },
        { q: "การทำบุญในพุทธศาสนา ข้อใดถือว่าได้บุญสูงสุด", opts: ["การทำด้วยใจที่บริสุทธิ์", "การทำบุญด้วยเงินจำนวนมาก", "การทำบุญให้คนเห็น", "การทำตามๆ กันไป"], corr: 0, th: "เจตนาคือตัวการ", det: "บุญที่แท้อยู่ที่เจตนาและความบริสุทธิ์ของใจ" },
        { q: "เทวทูต 4 คือภาพสะท้อนของอะไร", opts: ["ความรวย", "ธรรมชาติของชีวิต", "ความฉลาด", "โชคชะตา"], corr: 1, th: "สัจธรรมชีวิต", det: "สะท้อนความจริงว่าทุกคนต้องแก่ เจ็บ ตาย" },
        { q: "ไตรสิกขา คือข้อปฏิบัติ 3 ได้แก่สิ่งใด", opts: ["ศีล สมาธิ ปัญญา", "ทาน ศีล ภาวนา", "อริยสัจ 4", "โอวาท 3"], corr: 0, th: "การพัฒนาตนเอง", det: "การพัฒนาทั้ง กาย จิต และปัญญา" },
        { q: "หากเราขยันอ่านหนังสือ คือการปฏิบัติตามหลักธรรมใดในอริยสัจ 4", opts: ["มรรค", "นิโรธ", "ทุกข์", "สมุทัย"], corr: 0, th: "การกระทำ", det: "การขยันทำหน้าที่คือส่วนหนึ่งของมรรค" },
        { q: "ความซื่อสัตย์ คือเบญจธรรมข้อใด", opts: ["เมตตา", "สัมมาอาชีวะ", "สติ", "ความสงบ"], corr: 1, th: "อาชีพที่สุจริต", det: "การหาเลี้ยงชีพโดยสุจริตคือความซื่อสัตย์" },
        { q: "ข้อใดแสดงถึง 'การมีจิตใจที่บริสุทธิ์'", opts: ["ไม่มีความโลภ โกรธ หลง", "ไม่ไปวัด", "ไม่ยุ่งเรื่องคนอื่น", "ไม่ทำอะไรเลย"], corr: 0, th: "ความสะอาดของจิต", det: "จิตที่ว่างจากกิเลส คือจิตที่บริสุทธิ์" },
        { q: "การไปเรียนสาย เป็นทุกข์หรือไม่ ตามหลักอริยสัจ 4", opts: ["เป็นทุกข์ (ปัญหา)", "เป็นนิโรธ", "เป็นมรรค", "ไม่เป็น"], corr: 0, th: "ทุกข์ในชีวิตประจำวัน", det: "การไปสายทำให้เกิดผลกระทบ ถือเป็นปัญหา (ทุกข์) ที่ต้องแก้ไข" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
