    <div class="summary">
        <h2>สรุปเนื้อหาประวัติศาสตร์ ม.1</h2>
        <p>การศึกษาประวัติศาสตร์เป็นการฝึกฝนกระบวนการคิดวิเคราะห์ข้อมูลจากหลักฐาน การแยกแยะประเภทหลักฐาน (ต้น/รอง) และการเข้าใจเวลาผ่านศักราชที่ต่างกันคือทักษะสำคัญในการเป็นนักประวัติศาสตร์รุ่นเยาว์</p>
        <div style="background:#fff3cd; padding:10px; border-radius:5px;">
            <strong>เทคนิคการจำ:</strong> หลักฐานชั้นต้น = ของจริงในยุค, หลักฐานชั้นรอง = สรุปจากของจริง
        </div>
    </div>

    <script>
        let isThai = true;

            { q_th: "เหตุใดจึงต้องแบ่งยุคสมัยทางประวัติศาสตร์ออกเป็นยุคก่อนและยุคประวัติศาสตร์?", q_en: "Why is history divided into prehistoric and historic periods?", options: ["การใช้โลหะ", "การใช้ตัวอักษร", "การรู้จักการเพาะปลูก", "การเกิดรัฐ"], correct: 1, detail: "การค้นพบตัวอักษรคือจุดเปลี่ยนที่ทำให้มนุษย์บันทึกเรื่องราวได้" },
            { q_th: "หลักฐานชั้นต้นมีความน่าเชื่อถือในด้านใดมากที่สุด?", q_en: "What is the primary strength of primary sources?", options: ["ความง่ายในการตีความ", "ความใกล้ชิดกับเหตุการณ์", "การสรุปใจความสำคัญ", "การจัดหมวดหมู่ที่เป็นระบบ"], correct: 1, detail: "เพราะเกิดขึ้นในเหตุการณ์จริง จึงมีโอกาสบิดเบือนน้อยกว่าการบอกเล่าต่อ" },
            { q_th: "หาก พ.ศ. 2500 ตรงกับ ค.ศ. ใด?", q_en: "If it is 2500 BE, what year is it in AD?", options: ["1956", "1957", "2043", "3043"], correct: 1, detail: "พ.ศ. - 543 = ค.ศ. -> 2500 - 543 = 1957" },
            { q_th: "การประเมินคุณค่าหลักฐานคือขั้นตอนใดของวิธีการทางประวัติศาสตร์?", q_en: "Which step of the historical method involves evaluating evidence?", options: ["ขั้นตอนที่ 1", "ขั้นตอนที่ 2", "ขั้นตอนที่ 3", "ขั้นตอนที่ 5"], correct: 2, detail: "คือการตรวจสอบความน่าเชื่อถือของหลักฐาน (ขั้นตอนที่ 3)" },

            { q_th: "ข้อใดคือเป้าหมายสำคัญที่สุดของการศึกษาประวัติศาสตร์?", q_en: "What is the most important goal of studying history?", options: ["จำปี พ.ศ. ให้แม่น", "เข้าใจความเปลี่ยนแปลงและเหตุผล", "รวบรวมของเก่า", "ทำนายอนาคต"], correct: 1, detail: "ประวัติศาสตร์เน้นการเข้าใจสาเหตุและผลของเหตุการณ์" },
            { q_th: "ยุคหินใหม่มีลักษณะเด่นที่สำคัญคืออะไร?", q_en: "What is the main characteristic of the Neolithic Age?", options: ["ล่าสัตว์", "การเพาะปลูกและตั้งหลักแหล่ง", "ใช้เครื่องมือหินกะเทาะ", "การใช้โลหะ"], correct: 1, detail: "มนุษย์เริ่มรู้จักการเกษตรและตั้งถิ่นฐานถาวร" },
            { q_th: "หากพบโครงกระดูกและเครื่องมือหินในถ้ำจัดเป็นหลักฐานประเภทใด?", q_en: "Skeletons and stone tools found in caves are what type of evidence?", options: ["วัตถุพยาน", "หลักฐานชั้นรอง", "ตำนาน", "คำบอกเล่า"], correct: 0, detail: "โบราณวัตถุที่เป็นหลักฐานชั้นต้น" },
            { q_th: "การทำลายหลักฐานเพื่อปกปิดความผิดจัดอยู่ในขั้นตอนใดของวิธีการทางประวัติศาสตร์?", q_en: "Destroying evidence falls under which step of the historical method?", options: ["รวบรวม", "ตีความ", "ตรวจสอบ", "ไม่มีข้อใดถูก"], correct: 2, detail: "การตรวจสอบต้องดูว่าหลักฐานถูกแก้ไขหรือทำลายหรือไม่" },

            { q_th: "การอ่านหนังสือเรียนประวัติศาสตร์ถือเป็นการศึกษาจากหลักฐานใด?", q_en: "Reading a history textbook is studying from which type of evidence?", options: ["ชั้นต้น", "ชั้นรอง", "ชั้นต้นและรอง", "ไม่ถือเป็นหลักฐาน"], correct: 1, detail: "เป็นหลักฐานชั้นรองที่รวบรวมมา" },

            { q_th: "ความสำคัญของวิธีการทางประวัติศาสตร์คืออะไร?", q_en: "What is the importance of the historical method?", options: ["ทำให้เรียนเก่ง", "ลดความลำเอียงในการศึกษา", "ทำให้รู้ปีศักราช", "ช่วยสร้างพิพิธภัณฑ์"], correct: 1, detail: "ช่วยให้เกิดความน่าเชื่อถือและความถูกต้อง" },
            { q_th: "การตีความข้อมูลอาจเกิดข้อผิดพลาดจากสิ่งใดมากที่สุด?", q_en: "What causes the most errors in historical interpretation?", options: ["หลักฐานมากเกินไป", "อคติของผู้ตีความ", "จำนวนปีศักราช", "สถานที่พบหลักฐาน"], correct: 1, detail: "ความลำเอียงส่วนตัวมักทำให้อ่านประวัติศาสตร์บิดเบือน" },
            { q_th: "หลักฐานชั้นรองมักถูกใช้เพื่อวัตถุประสงค์ใด?", q_en: "What is the main purpose of secondary evidence?", options: ["แทนที่หลักฐานชั้นต้น", "อธิบายและสรุปเหตุการณ์", "เพื่อความสนุกสนาน", "เพื่อคัดค้านหลักฐานชั้นต้น"], correct: 1, detail: "สรุปเหตุการณ์ให้เข้าใจง่ายขึ้น" },

            { q_th: "พุทธศักราชเริ่มนับ พ.ศ. 1 เมื่อใด?", q_en: "When does the Buddhist Era begin?", options: ["วันที่ประสูติ", "วันที่ปรินิพพาน", "วันที่ตรัสรู้", "วันที่ประกาศศาสนา"], correct: 1, detail: "เริ่มนับปีที่ 1 หลังจากพระพุทธเจ้าปรินิพพาน" },

        function toggleLang() {
            isThai = !isThai;
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                let html = `<div class="question-card">
                    <p><strong>${isThai ? 'ข้อ' : 'Q'} ${index + 1}:</strong> ${isThai ? q.q_th : q.q_en}</p>
                    ${q.options.map((opt, i) => `<button class="option-btn" onclick="check(${index}, ${i})">${opt}</button>`).join('')}
                    <div id="detail-${index}" class="hidden detail">${q.detail}</div>
                </div>`;
                container.innerHTML += html;
            });
        }
        
        function check(qIdx, optIdx) {
            document.getElementById(`detail-${qIdx}`).classList.remove('hidden');
            alert(optIdx === questions[qIdx].correct ? (isThai ? "ถูกต้อง!" : "Correct!") : (isThai ? "ไม่ถูกต้อง ลองวิเคราะห์ใหม่" : "Incorrect, try analyzing again!"));
        }

        }
