<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600&display=swap" rel="stylesheet">
</head>
<body class="bg-indigo-900 h-screen flex flex-col items-center justify-center p-4 text-white font-['Kanit']">
    <div id="setup" class="text-center">
        <h1 class="text-3xl font-black text-yellow-400 mb-8 uppercase">Phonics Challenge</h1>
        <div class="flex gap-4">
            <button onclick="start(1)" class="bg-orange-500 p-8 rounded-3xl w-32 font-black text-2xl shadow-xl">คนที่ 1</button>
            <button onclick="start(2)" class="bg-green-500 p-8 rounded-3xl w-32 font-black text-2xl shadow-xl">คนที่ 2</button>
        </div>
    </div>
    <div id="game" class="hidden w-full max-w-sm">
        <div class="bg-white text-black w-full p-8 rounded-[40px] shadow-2xl text-center mb-6">
            <h1 id="word" class="text-5xl font-black text-indigo-900 mb-6 uppercase">...</h1>
            <input type="text" id="ans" class="w-full border-b-4 p-2 text-center text-3xl focus:outline-none focus:border-yellow-500 text-indigo-900" placeholder="คำแปลไทย" autocomplete="off">
        </div>
        <button onclick="check()" class="bg-yellow-400 text-blue-900 font-black p-6 w-full rounded-2xl text-2xl shadow-lg">ส่งคำตอบ! 🚀</button>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://t-touch-chinpong-8e1af-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player = 0, idx = 0;
        const vocab = [{w:'Shirt',m:['เสื้อ']},{w:'Pants',m:['กางเกง']},{w:'Dress',m:['ชุดกระโปรง']},{w:'Skirt',m:['กระโปรง']},{w:'Sock',m:['ถุงเท้า']},{w:'Shoe',m:['รองเท้า']},{w:'Hat',m:['หมวก']},{w:'Coat',m:['เสื้อคลุม','เสื้อโค้ท']},{w:'Belt',m:['เข็มขัด']},{w:'Ring',m:['แหวน']},{w:'Door',m:['ประตู']},{w:'Window',m:['หน้าต่าง']},{w:'Floor',m:['พื้น']},{w:'Wall',m:['ผนัง']},{w:'Roof',m:['หลังคา']},{w:'Lamp',m:['โคมไฟ']},{w:'Mirror',m:['กระจก']},{w:'Soap',m:['สบู่']},{w:'Towel',m:['ผ้าขนหนู']},{w:'Spoon',m:['ช้อน']},{w:'Fork',m:['ส้อม']},{w:'Knife',m:['มีด']},{w:'Plate',m:['จาน']},{w:'Bowl',m:['ชาม']},{w:'Glass',m:['แก้ว']}];

        function start(n) { player = n; document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); next(); }
        function next() { idx = Math.floor(Math.random()*vocab.length); document.getElementById('word').innerText = vocab[idx].w; document.getElementById('ans').value = ''; document.getElementById('ans').focus(); }
        function check() {
            const input = document.getElementById('ans').value.trim();
            if (vocab[idx].m.includes(input)) {
                const path = player === 1 ? 'scores/p1' : 'scores/p2';
                db.ref(path).transaction(s => (s || 0) + 10);
                next();
            } else { alert('ลองใหม่ครับ!'); }
        }
    </script>
</body>
</html>
