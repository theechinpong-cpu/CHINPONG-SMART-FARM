<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Challenge - Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; touch-action: manipulation; }
        .shake { animation: shake 0.5s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-700 to-indigo-900 h-screen flex flex-col items-center justify-center p-4 text-white overflow-hidden">

    <div id="setup-container" class="text-center">
        <h1 class="text-3xl font-black mb-2 text-yellow-400">PHONICS CHALLENGE</h1>
        <div class="bg-white/10 p-8 rounded-3xl border border-white/20 mt-6">
            <p class="mb-6">น้องคนไหนจะแข่งครับ?</p>
            <div class="flex gap-4">
                <button onclick="selectPlayer(1)" class="bg-orange-500 p-6 rounded-2xl w-32 font-bold text-xl shadow-lg">คนที่ 1</button>
                <button onclick="selectPlayer(2)" class="bg-green-500 p-6 rounded-2xl w-32 font-bold text-xl shadow-lg">คนที่ 2</button>
            </div>
        </div>
    </div>

    <div id="game-ui" class="hidden w-full max-w-sm">
        <div id="word-card" class="bg-white text-black w-full p-10 rounded-[40px] shadow-2xl text-center mb-8">
            <h1 id="word-display" class="text-5xl font-black text-indigo-800 mb-8 uppercase tracking-tight">...</h1>
            <input type="text" id="answer-input" class="w-full border-b-4 border-indigo-100 p-2 text-center text-3xl focus:outline-none focus:border-yellow-500 text-indigo-900" placeholder="คำแปลไทย" autocomplete="off">
        </div>
        <button onclick="checkAnswer()" class="bg-yellow-400 text-blue-900 font-black p-6 w-full rounded-2xl text-2xl shadow-lg">ส่งคำตอบ! 🚀</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "YOUR_FIREBASE_DATABASE_URL" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const cheerSound = new Audio('https://www.soundjay.com/human/sounds/applause-01.mp3');
        const booSound = new Audio('https://www.myinstants.com/media/sounds/crowd-moan.mp3');

        let currentPlayer = 0;
        let currentWordIndex = 0;
        const vocabulary = [
            {w:'Shirt',m:['เสื้อ','เสื้อเชิ้ต']},{w:'Pants',m:['กางเกง','กางเกงขายาว']},{w:'Dress',m:['ชุดกระโปรง']},{w:'Skirt',m:['กระโปรง']},{w:'Sock',m:['ถุงเท้า']},{w:'Shoe',m:['รองเท้า']},{w:'Hat',m:['หมวก']},{w:'Coat',m:['เสื้อคลุม']},{w:'Belt',m:['เข็มขัด']},{w:'Ring',m:['แหวน']},{w:'Door',m:['ประตู']},{w:'Window',m:['หน้าต่าง']},{w:'Floor',m:['พื้น']},{w:'Wall',m:['ผนัง']},{w:'Roof',m:['หลังคา']},{w:'Lamp',m:['โคมไฟ']},{w:'Mirror',m:['กระจก']},{w:'Soap',m:['สบู่']},{w:'Towel',m:['ผ้าขนหนู']},{w:'Spoon',m:['ช้อน']},{w:'Fork',m:['ส้อม']},{w:'Knife',m:['มีด']},{w:'Plate',m:['จาน']},{w:'Bowl',m:['ชาม']},{w:'Glass',m:['แก้ว']}
        ]; // สามารถเติมให้ครบ 150 คำได้ตามรูปแบบนี้

        function selectPlayer(num) {
            currentPlayer = num;
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            nextWord();
        }

        function nextWord() {
            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            document.getElementById('word-display').innerText = vocabulary[currentWordIndex].w;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function checkAnswer() {
            const userInput = document.getElementById('answer-input').value.trim();
            const isCorrect = vocabulary[currentWordIndex].m.includes(userInput);
            const card = document.getElementById('word-card');

            if (isCorrect) {
                cheerSound.play();
                const path = currentPlayer === 1 ? 'scores/p1' : 'scores/p2';
                db.ref(path).transaction(currentScore => (currentScore || 0) + 10);
                nextWord();
            } else {
                booSound.play();
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        }
    </script>
</body>
</html>
