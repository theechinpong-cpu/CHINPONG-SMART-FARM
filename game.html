<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Challenge 151-300 - CHINPONG SMART FARM</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .scale-110 { transform: scale(1.1); transition: 0.1s; }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-600 to-indigo-900 h-screen flex flex-col items-center justify-center p-4 text-white overflow-hidden">

    <div id="setup-container" class="text-center animate-fade-in">
        <h1 class="text-3xl font-black mb-2 text-yellow-400">PHONICS CHALLENGE</h1>
        <p class="mb-8 opacity-80">โดย CHINPONG SMART FARM</p>
        <p class="mb-4 text-xl">เลือกตำแหน่งผู้เล่นบนมือถือ</p>
        <div class="flex gap-4">
            <button onclick="selectPlayer(1)" class="bg-orange-500 hover:bg-orange-400 p-6 rounded-2xl w-32 shadow-xl font-bold text-2xl">คนที่ 1</button>
            <button onclick="selectPlayer(2)" class="bg-green-500 hover:bg-green-400 p-6 rounded-2xl w-32 shadow-xl font-bold text-2xl">คนที่ 2</button>
        </div>
    </div>

    <div id="game-ui" class="hidden w-full max-w-sm flex flex-col items-center">
        <div class="w-full flex justify-between items-center mb-4 px-2">
            <span id="player-tag" class="bg-white text-blue-900 px-4 py-1 rounded-full font-bold"></span>
            <span id="group-label" class="opacity-70 text-sm"></span>
        </div>

        <div class="bg-white text-black w-full p-10 rounded-[40px] shadow-2xl text-center mb-6 relative">
            <div class="text-gray-400 text-sm mb-2 uppercase tracking-widest">แปลคำนี้เป็นไทย</div>
            <h1 id="word-display" class="text-6xl font-black text-indigo-700 mb-6 uppercase">Loading...</h1>
            <input type="text" id="answer-input" 
                   class="w-full border-b-4 border-indigo-200 p-2 rounded-none text-center text-2xl focus:outline-none focus:border-yellow-500 transition-colors" 
                   placeholder="พิมพ์ความหมายที่นี่..." autocomplete="off">
        </div>

        <button onclick="checkAnswer()" id="btn-submit" 
                class="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-black p-5 w-full rounded-2xl text-2xl shadow-[0_8px_0_rgb(202,138,4)] active:translate-y-1 active:shadow-none transition-all">
            ส่งคำตอบ! 🚀
        </button>
    </div>

    <script>
        // --- 1. การตั้งค่าระบบ Real-time ---
        const socket = io('YOUR_SERVER_URL'); // *** เปลี่ยนเป็น URL ของ Server คุณ ***
        const clapSound = new Audio('https://www.soundjay.com/human/applause-01.mp3');
        
        let currentPlayer = 0;
        let currentWordIndex = 0;

        // --- 2. ข้อมูลคำศัพท์ 150 คำ (Group 1-6) โดย CHINPONG SMART FARM ---
        const vocabulary = [
            // Group 1
            {w: 'Shirt', m: ['เสื้อ', 'เสื้อเชิ้ต'], g: 'Group 1'}, {w: 'Pants', m: ['กางเกง', 'กางเกงขายาว'], g: 'Group 1'},
            {w: 'Dress', m: ['ชุดกระโปรง', 'เดรส'], g: 'Group 1'}, {w: 'Skirt', m: ['กระโปรง'], g: 'Group 1'},
            {w: 'Sock', m: ['ถุงเท้า'], g: 'Group 1'}, {w: 'Shoe', m: ['รองเท้า'], g: 'Group 1'},
            {w: 'Hat', m: ['หมวก'], g: 'Group 1'}, {w: 'Coat', m: ['เสื้อคลุม', 'เสื้อโค้ท'], g: 'Group 1'},
            {w: 'Belt', m: ['เข็มขัด'], g: 'Group 1'}, {w: 'Ring', m: ['แหวน'], g: 'Group 1'},
            {w: 'Door', m: ['ประตู'], g: 'Group 1'}, {w: 'Window', m: ['หน้าต่าง'], g: 'Group 1'},
            {w: 'Floor', m: ['พื้น'], g: 'Group 1'}, {w: 'Wall', m: ['ผนัง', 'กำแพง'], g: 'Group 1'},
            {w: 'Roof', m: ['หลังคา'], g: 'Group 1'}, {w: 'Lamp', m: ['โคมไฟ'], g: 'Group 1'},
            {w: 'Mirror', m: ['กระจก'], g: 'Group 1'}, {w: 'Soap', m: ['สบู่'], g: 'Group 1'},
            {w: 'Towel', m: ['ผ้าขนหนู', 'ผ้าเช็ดตัว'], g: 'Group 1'}, {w: 'Spoon', m: ['ช้อน'], g: 'Group 1'},
            {w: 'Fork', m: ['ส้อม'], g: 'Group 1'}, {w: 'Knife', m: ['มีด'], g: 'Group 1'},
            {w: 'Plate', m: ['จาน'], g: 'Group 1'}, {w: 'Bowl', m: ['ชาม'], g: 'Group 1'},
            {w: 'Glass', m: ['แก้ว'], g: 'Group 1'},
            // Group 2
            {w: 'Angry', m: ['โกรธ', 'โมโห'], g: 'Group 2'}, {w: 'Brave', m: ['กล้าหาญ', 'ใจกล้า'], g: 'Group 2'},
            {w: 'Scared', m: ['กลัว'], g: 'Group 2'}, {w: 'Tired', m: ['เหนื่อย'], g: 'Group 2'},
            {w: 'Thirsty', m: ['หิวน้ำ', 'กระหายน้ำ'], g: 'Group 2'}, {w: 'Dirty', m: ['สกปรก'], g: 'Group 2'},
            {w: 'Clean', m: ['สะอาด'], g: 'Group 2'}, {w: 'Soft', m: ['นุ่ม'], g: 'Group 2'},
            {w: 'Hard', m: ['แข็ง', 'ยาก'], g: 'Group 2'}, {w: 'Heavy', m: ['หนัก'], g: 'Group 2'},
            {w: 'Light', m: ['เบา', 'แสง'], g: 'Group 2'}, {w: 'Full', m: ['เต็ม', 'อิ่ม'], g: 'Group 2'},
            {w: 'Empty', m: ['ว่างเปล่า'], g: 'Group 2'}, {w: 'Rich', m: ['รวย'], g: 'Group 2'},
            {w: 'Poor', m: ['จน', 'น่าสงสาร'], g: 'Group 2'}, {w: 'Earth', m: ['โลก'], g: 'Group 2'},
            {w: 'Sun', m: ['พระอาทิตย์', 'ดวงอาทิตย์'], g: 'Group 2'}, {w: 'Moon', m: ['พระจันทร์', 'ดวงจันทร์'], g: 'Group 2'},
            {w: 'Star', m: ['ดาว'], g: 'Group 2'}, {w: 'Cloud', m: ['เมฆ'], g: 'Group 2'},
            {w: 'Rain', m: ['ฝน'], g: 'Group 2'}, {w: 'Snow', m: ['หิมะ'], g: 'Group 2'},
            {w: 'Storm', m: ['พายุ'], g: 'Group 2'}, {w: 'Wind', m: ['ลม'], g: 'Group 2'},
            {w: 'Fire', m: ['ไฟ'], g: 'Group 2'},
            // Group 3
            {w: 'Water', m: ['น้ำ'], g: 'Group 3'}, {w: 'Land', m: ['บก', 'ที่ดิน', 'พื้นดิน'], g: 'Group 3'},
            {w: 'Sea', m: ['ทะเล'], g: 'Group 3'}, {w: 'Mountain', m: ['ภูเขา'], g: 'Group 3'},
            {w: 'Cave', m: ['ถ้ำ'], g: 'Group 3'}, {w: 'Left', m: ['ซ้าย'], g: 'Group 3'},
            {w: 'Right', m: ['ขวา'], g: 'Group 3'}, {w: 'Up', m: ['ขึ้น'], g: 'Group 3'},
            {w: 'Down', m: ['ลง'], g: 'Group 3'}, {w: 'Inside', m: ['ข้างใน'], g: 'Group 3'},
            {w: 'Outside', m: ['ข้างนอก'], g: 'Group 3'}, {w: 'Between', m: ['ระหว่าง'], g: 'Group 3'},
            {w: 'Behind', m: ['ข้างหลัง'], g: 'Group 3'}, {w: 'Under', m: ['ข้างล่าง', 'ใต้'], g: 'Group 3'},
            {w: 'Above', m: ['ข้างบน', 'เหนือ'], g: 'Group 3'}, {w: 'Fruit', m: ['ผลไม้'], g: 'Group 3'},
            {w: 'Animal', m: ['สัตว์'], g: 'Group 3'}, {w: 'Person', m: ['คน'], g: 'Group 3'},
            {w: 'Money', m: ['เงิน'], g: 'Group 3'}, {w: 'Paper', m: ['กระดาษ'], g: 'Group 3'},
            {w: 'Picture', m: ['รูปภาพ'], g: 'Group 3'}, {w: 'Music', m: ['ดนตรี'], g: 'Group 3'},
            {w: 'Song', m: ['เพลง'], g: 'Group 3'}, {w: 'Sound', m: ['เสียง'], g: 'Group 3'},
            {w: 'Color', m: ['สี'], g: 'Group 3'},
            // Group 4-6 (ย่อเพื่อความกระชับ คุณสามารถเติมคำแปลที่เหลือได้ในรูปแบบเดียวกัน)
            {w: 'Shape', m: ['รูปร่าง'], g: 'Group 4'}, {w: 'Square', m: ['จัตุรัส', 'สี่เหลี่ยม'], g: 'Group 4'},
            {w: 'Circle', m: ['วงกลม'], g: 'Group 4'}, {w: 'Triangle', m: ['สามเหลี่ยม'], g: 'Group 4'},
            {w: 'Heart', m: ['หัวใจ'], g: 'Group 4'}, {w: 'Beach', m: ['ชายหาด'], g: 'Group 4'},
            {w: 'Doctor', m: ['หมอ', 'แพทย์'], g: 'Group 5'}, {w: 'Nurse', m: ['พยาบาล'], g: 'Group 5'},
            {w: 'Police', m: ['ตำรวจ'], g: 'Group 5'}, {w: 'Teacher', m: ['ครู'], g: 'Group 5'},
            {w: 'Farmer', m: ['ชาวนา', 'เกษตรกร'], g: 'Group 5'}, {w: 'Happy', m: ['มีความสุข'], g: 'Group 6'},
            {w: 'Sad', m: ['เศร้า', 'เสียใจ'], g: 'Group 6'}, {w: 'Good', m: ['ดี'], g: 'Group 6'},
            {w: 'New', m: ['ใหม่'], g: 'Group 6'}, {w: 'Old', m: ['เก่า', 'แก่'], g: 'Group 6'}
        ];

        // --- 3. Logic การเล่นเกม ---
        function selectPlayer(num) {
            currentPlayer = num;
            document.getElementById('setup-container').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('player-tag').innerText = `ผู้เล่นคนที่ ${num}`;
            nextWord();
        }

        function nextWord() {
            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            document.getElementById('word-display').innerText = vocabulary[currentWordIndex].w;
            document.getElementById('group-label').innerText = vocabulary[currentWordIndex].g;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function checkAnswer() {
            const userInput = document.getElementById('answer-input').value.trim();
            const correctMeanings = vocabulary[currentWordIndex].m;
            
            // ตรวจว่าสิ่งที่เด็กพิมพ์ ตรงกับความหมายอันใดอันหนึ่งหรือไม่
            const isCorrect = correctMeanings.some(meaning => meaning === userInput);

            if (isCorrect) {
                // เอฟเฟกต์ตอบถูก: เสียงปรบมือ
                clapSound.currentTime = 0;
                clapSound.play();
                
                // ส่งคะแนนไปยัง Dashboard Real-time
                socket.emit('submit-score', { player: currentPlayer, points: 10 });
                
                // เปลี่ยนโจทย์
                nextWord();
            } else {
                // เขย่าหน้าจอเมื่อผิด
                const box = document.querySelector('.bg-white');
                box.classList.add('animate-bounce');
                setTimeout(() => box.classList.remove('animate-bounce'), 500);
            }
        }

        // รองรับการกด Enter เพื่อส่งคำตอบ
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
