<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Challenge - Player by CHINPONG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; touch-action: manipulation; }
        .shake { animation: shake 0.5s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        /* ซ่อน Game UI ในตอนแรก */
        #game-ui { display: none; }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-700 to-indigo-900 h-screen flex flex-col items-center justify-center p-4 text-white overflow-hidden">

    <div id="setup-container" class="text-center transition-all duration-300">
        <h1 class="text-3xl font-black mb-2 text-yellow-400">PHONICS CHALLENGE</h1>
        <p class="text-xs opacity-70 tracking-widest mb-6 uppercase">By CHINPONG SMART FARM</p>
        <div class="bg-white/10 p-8 rounded-3xl border border-white/20">
            <p class="mb-6 text-xl">น้องคนไหนจะแข่งครับ?</p>
            <div class="flex gap-4">
                <button onclick="selectPlayer(1)" class="bg-orange-500 p-6 rounded-2xl w-32 font-bold text-xl shadow-lg hover:scale-105 active:scale-95 transition-all">คนที่ 1</button>
                <button onclick="selectPlayer(2)" class="bg-green-500 p-6 rounded-2xl w-32 font-bold text-xl shadow-lg hover:scale-105 active:scale-95 transition-all">คนที่ 2</button>
            </div>
        </div>
    </div>

    <div id="game-ui" class="w-full max-w-sm flex-col items-center">
        <div class="w-full flex justify-between items-center mb-3 px-2 text-xs">
            <span id="player-tag" class="bg-yellow-400 text-blue-900 px-3 py-1 rounded-full font-bold"></span>
            <span id="group-label" class="opacity-60 font-light"></span>
        </div>
        
        <div id="word-card" class="bg-white text-black w-full p-8 rounded-[35px] shadow-2xl text-center mb-6 transition-all">
            <div class="text-gray-400 text-xs mb-2 uppercase tracking-widest">แปลคำนี้เป็นไทย</div>
            <h1 id="word-display" class="text-5xl font-black text-indigo-800 mb-8 uppercase tracking-tight">...</h1>
            <input type="text" id="answer-input" class="w-full border-b-4 border-indigo-100 p-2 text-center text-3xl focus:outline-none focus:border-yellow-500 text-indigo-900" placeholder="คำแปลไทย" autocomplete="off">
        </div>
        
        <button onclick="checkAnswer()" class="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-black p-6 w-full rounded-2xl text-2xl shadow-[0_8px_0_rgb(202,138,4)] active:translate-y-1 active:shadow-none transition-all">ส่งคำตอบ! 🚀</button>
    </div>

    <script>
        // --- ส่วนการตั้งค่า Firebase (คุณต้องนำ Config มาใส่ตรงนี้) ---
        // ⚠️ สำคัญมาก: ถ้าคุณไม่แก้ตรงนี้ให้ถูกต้อง เกมจะค้างที่หน้า '...'
        const firebaseConfig = {
            databaseURL: "YOUR_FIREBASE_DATABASE_URL" // <--- ใส่ URL ของ Firebase Database ที่นี่
        };
        
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("Firebase initialized successfully");
        } catch (error) {
            console.error("Firebase initialization failed:", error);
            alert("ไม่สามารถเชื่อมต่อระบบได้ กรุณาแจ้งผู้ดูแล");
        }

        const cheerSound = new Audio('https://www.soundjay.com/human/sounds/applause-01.mp3');
        const booSound = new Audio('https://www.myinstants.com/media/sounds/crowd-moan.mp3');

        let currentPlayer = 0;
        let currentWordIndex = 0;

        // --- คลังคำศัพท์ 150 คำ โดย CHINPONG SMART FARM (เติมครบแล้ว) ---
        const vocabulary = [
            // Group 1
            {w:'Shirt',m:['เสื้อ','เสื้อเชิ้ต']},{w:'Pants',m:['กางเกง','กางเกงขายาว']},{w:'Dress',m:['ชุดกระโปรง']},{w:'Skirt',m:['กระโปรง']},{w:'Sock',m:['ถุงเท้า']},{w:'Shoe',m:['รองเท้า']},{w:'Hat',m:['หมวก']},{w:'Coat',m:['เสื้อคลุม']},{w:'Belt',m:['เข็มขัด']},{w:'Ring',m:['แหวน']},{w:'Door',m:['ประตู']},{w:'Window',m:['หน้าต่าง']},{w:'Floor',m:['พื้น']},{w:'Wall',m:['ผนัง']},{w:'Roof',m:['หลังคา']},{w:'Lamp',m:['โคมไฟ']},{w:'Mirror',m:['กระจก']},{w:'Soap',m:['สบู่']},{w:'Towel',m:['ผ้าขนหนู']},{w:'Spoon',m:['ช้อน']},{w:'Fork',m:['ส้อม']},{w:'Knife',m:['มีด']},{w:'Plate',m:['จาน']},{w:'Bowl',m:['ชาม']},{w:'Glass',m:['แก้ว']},
            // Group 2
            {w:'Angry',m:['โกรธ']},{w:'Brave',m:['กล้าหาญ']},{w:'Scared',m:['กลัว']},{w:'Tired',m:['เหนื่อย']},{w:'Thirsty',m:['หิวน้ำ']},{w:'Dirty',m:['สกปรก']},{w:'Clean',m:['สะอาด']},{w:'Soft',m:['นุ่ม']},{w:'Hard',m:['แข็ง']},{w:'Heavy',m:['หนัก']},{w:'Light',m:['เบา','แสง']},{w:'Full',m:['เต็ม']},{w:'Empty',m:['ว่างเปล่า']},{w:'Rich',m:['รวย']},{w:'Poor',m:['จน']},{w:'Earth',m:['โลก']},{w:'Sun',m:['พระอาทิตย์']},{w:'Moon',m:['พระจันทร์']},{w:'Star',m:['ดาว']},{w:'Cloud',m:['เมฆ']},{w:'Rain',m:['ฝน']},{w:'Snow',m:['หิมะ']},{w:'Storm',m:['พายุ']},{w:'Wind',m:['ลม']},{w:'Fire',m:['ไฟ']},
            // Group 3
            {w:'Water',m:['น้ำ']},{w:'Land',m:['บก']},{w:'Sea',m:['ทะเล']},{w:'Mountain',m:['ภูเขา']},{w:'Cave',m:['ถ้ำ']},{w:'Left',m:['ซ้าย']},{w:'Right',m:['ขวา']},{w:'Up',m:['ขึ้น']},{w:'Down',m:['ลง']},{w:'Inside',m:['ข้างใน']},{w:'Outside',m:['ข้างนอก']},{w:'Between',m:['ระหว่าง']},{w:'Behind',m:['ข้างหลัง']},{w:'Under',m:['ข้างล่าง','ใต้']},{w:'Above',m:['ข้างบน','เหนือ']},{w:'Fruit',m:['ผลไม้']},{w:'Animal',m:['สัตว์']},{w:'Person',m:['คน']},{w:'Money',m:['เงิน']},{w:'Paper',m:['กระดาษ']},{w:'Picture',m:['รูปภาพ']},{w:'Music',m:['ดนตรี']},{w:'Song',m:['เพลง']},{w:'Sound',m:['เสียง']},{w:'Color',m:['สี']},
            // Group 4
            {w:'Shape',m:['รูปร่าง']},{w:'Square',m:['สี่เหลี่ยม']},{w:'Circle',m:['วงกลม']},{w:'Triangle',m:['สามเหลี่ยม']},{w:'Heart',m:['หัวใจ']},{w:'Beach',m:['ชายหาด']},{w:'Island',m:['เกาะ']},{w:'River',m:['แม่น้ำ']},{w:'Lake',m:['ทะเลสาบ']},{w:'Forest',m:['ป่า']},{w:'Garden',m:['สวน']},{w:'Farm',m:['ฟาร์ม']},{w:'Park',m:['สวนสาธารณะ']},{w:'City',m:['เมือง']},{w:'Town',m:['เมือง']},{w:'Apple',m:['แอปเปิ้ล']},{w:'Banana',m:['กล้วย']},{w:'Orange',m:['ส้ม']},{w:'Grape',m:['องุ่น']},{w:'Mango',m:['มะม่วง']},{w:'Lemon',m:['มะนาว']},{w:'Candy',m:['ลูกอม']},{w:'Bread',m:['ขนมปัง']},{w:'Butter',m:['เนย']},{w:'Cheese',m:['ชีส']},
            // Group 5
            {w:'Doctor',m:['หมอ']},{w:'Nurse',m:['พยาบาล']},{w:'Police',m:['ตำรวจ']},{w:'Pilot',m:['นักบิน']},{w:'Chef',m:['เชฟ']},{w:'Teacher',m:['ครู']},{w:'Farmer',m:['ชาวนา']},{w:'Worker',m:['คนงาน']},{w:'Driver',m:['คนขับรถ']},{w:'Singer',m:['นักร้อง']},{w:'Table',m:['โต๊ะ']},{w:'Chair',m:['เก้าอี้']},{w:'Desk',m:['โต๊ะทำงาน']},{w:'Bed',m:['เตียง']},{w:'Sofa',m:['โซฟา']},{w:'Box',m:['กล่อง']},{w:'Cup',m:['ถ้วย']},{w:'Bottle',m:['ขวด']},{w:'Key',m:['กุญแจ']},{w:'Watch',m:['นาฬิกา']},{w:'Quiet',m:['เงียบ']},{w:'Loud',m:['ดัง']},{w:'Fast',m:['เร็ว']},{w:'Slow',m:['ช้า']},{w:'Small',m:['เล็ก']},
            // Group 6
            {w:'Large',m:['ใหญ่']},{w:'Short',m:['สั้น']},{w:'Tall',m:['สูง']},{w:'Young',m:['หนุ่ม']},{w:'Old',m:['เก่า']},{w:'Happy',m:['มีความสุข']},{w:'Sad',m:['เศร้า']},{w:'Good',m:['ดี']},{w:'Bad',m:['เลว']},{w:'Nice',m:['ดี']},{w:'Cool',m:['เย็น']},{w:'Warm',m:['อบอุ่น']},{w:'Cold',m:['หนาว']},{w:'Hot',m:['ร้อน']},{w:'New',m:['ใหม่']}
        ];

        function selectPlayer(num) {
            currentPlayer = num;
            document.getElementById('setup-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-container').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                document.getElementById('player-tag').innerText = `Player ${num}`;
                nextWord();
            }, 300);
        }

        function nextWord() {
            // มั่นใจว่ามีคำศัพท์เหลือให้สุ่ม
            if (vocabulary.length === 0) return;
            
            currentWordIndex = Math.floor(Math.random() * vocabulary.length);
            const currentData = vocabulary[currentWordIndex];
            
            document.getElementById('word-display').innerText = currentData.w;
            // จัดการเรื่อง Group Label (ถ้าไม่มีข้อมูล Group ใน Array คำศัพท์)
            document.getElementById('group-label').innerText = currentData.g || 'Phonics Challenge';
            
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function checkAnswer() {
            const userInput = document.getElementById('answer-input').value.trim();
            if (!userInput) return; // ไม่ให้ส่งคำตอบว่าง

            const currentData = vocabulary[currentWordIndex];
            // ตรวจคำตอบแบบ Flexible (ถูกอย่างน้อย 1 ความหมายใน Array)
            const isCorrect = currentData.m.some(meaning => meaning === userInput);
            const card = document.getElementById('word-card');

            if (isCorrect) {
                // ตอบถูก
                cheerSound.play();
                
                // ตรวจสอบความพร้อมของ Firebase ก่อนส่ง
                if (!db) {
                    alert("⚠️ ยังไม่ใส่ Firebase Config หรือเชื่อมต่อไม่ได้ คะแนนจะไม่ถูกบันทึก");
                } else {
                    const path = currentPlayer === 1 ? 'scores/p1' : 'scores/p2';
                    // เพิ่มคะแนนทีละ 10 ผ่าน Transaction (ปลอดภัยจากการเขียนพร้อมกัน)
                    db.ref(path).transaction(currentScore => (currentScore || 0) + 10);
                }
                
                nextWord();
            } else {
                // ตอบผิด
                booSound.play();
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        }

        // รองรับการกด Enter เพื่อส่งคำตอบ
        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
