<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คณิตศาสตร์ ม.1 - แบบทดสอบ 25 ข้อ</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .card { background: white; padding: 30px; border-radius: 15px; max-width: 900px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .summary-box { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        .thought-process { background: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 0.9em; }
        .q-container { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .btn-opt { display: block; width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; cursor: pointer; border-radius: 5px; text-align: left; transition: 0.3s; }
        .btn-opt:hover { background: #f1f1f1; }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .feedback { display: none; margin-top: 10px; padding: 10px; background: #fdeaea; border-radius: 5px; color: #c0392b; font-size: 0.9em; }
        .control-bar { margin-bottom: 20px; text-align: right; }
    </style>
</head>
<body>

<div class="card">
    <div class="control-bar">
        <button onclick="toggleLang()">Switch Language (TH / EN)</button>
    </div>
    
    <div class="summary-box">
        <h2 id="main-title">แบบทดสอบคณิตศาสตร์ ม.1: โจทย์ปัญหา</h2>
        <p id="main-desc">ทดสอบความเข้าใจเรื่องจำนวนเต็ม, อัตราส่วน, พื้นที่ และสมการ</p>
        <div class="thought-process">💡 <strong>กระบวนการคิด:</strong> วิเคราะห์โจทย์ -> กำหนดตัวแปร -> สร้างสมการ -> แก้ปัญหา -> ตรวจสอบคำตอบ</div>
    </div>

    <div id="quiz-container"></div>
    <div id="final-result" style="display:none; text-align:center; padding:20px; font-size:1.2em; font-weight:bold;"></div>
</div>

<script>
    let lang = 'th';
    let score = 0;
    let answeredCount = 0;

    const questions = [
        { q_th: "อุณหภูมิยอดเขาลบ 5 องศา ลดลงอีก 3 องศา เป็นเท่าใด?", q_en: "Temperature at -5C drops by 3C. What is the new temp?", a_th: ["-2", "2", "-8", "8"], a_en: ["-2", "2", "-8", "8"], correct: 2, th: "ลดลงคือการลบเพิ่ม", en: "Decrease means subtracting more.", detail: "-5 - 3 = -8" },
        { q_th: "มีเงิน 500 ซื้อของ 250 ได้ทอน 50 เหลือเท่าใด?", q_en: "Have 500, spent 250, got 50 change. How much left?", a_th: ["200", "300", "400", "500"], a_en: ["200", "300", "400", "500"], correct: 1, th: "500 - 250 + 50", en: "500 - 250 + 50", detail: "300" },
        { q_th: "สี่เหลี่ยมผืนผ้า กว้าง 5 ยาว 8 เส้นรอบรูปคือ?", q_en: "Rectangle width 5, length 8. Perimeter?", a_th: ["13", "26", "40", "18"], a_en: ["13", "26", "40", "18"], correct: 1, th: "2*(กว้าง+ยาว)", en: "2*(W+L)", detail: "2*(5+8) = 26" },
        { q_th: "พื้นที่ 144 สี่เหลี่ยมจัตุรัส ด้านยาวเท่าใด?", q_en: "Area 144, square. Side length?", a_th: ["10", "12", "14", "24"], a_en: ["10", "12", "14", "24"], correct: 1, th: "รากที่สองของ 144", en: "Square root of 144", detail: "12" },
        { q_th: "ตู้ปลา กว้าง 2 ยาว 5 สูง 3 จุน้ำได้เท่าใด?", q_en: "Tank W=2, L=5, H=3. Volume?", a_th: ["10", "15", "30", "60"], a_en: ["10", "15", "30", "60"], correct: 2, th: "กว้าง*ยาว*สูง", en: "W*L*H", detail: "2*5*3 = 30" },
        { q_th: "ขนม 24 ชิ้น แบ่งเด็ก 4 คน ได้กี่ชิ้น?", q_en: "24 candies divided by 4 kids?", a_th: ["4", "6", "8", "12"], a_en: ["4", "6", "8", "12"], correct: 1, th: "24 หาร 4", en: "24 divided by 4", detail: "6" },
        { q_th: "เสื้อ 300 บาท ลด 20% จ่ายเท่าใด?", q_en: "Shirt 300, 20% off. Pay how much?", a_th: ["60", "240", "260", "280"], a_en: ["60", "240", "260", "280"], correct: 1, th: "จ่าย 80%", en: "Pay 80%", detail: "300*0.8 = 240" },
        { q_th: "ปั่น 2 ชม. ได้ 30 กม. ความเร็วเท่าใด?", q_en: "Bike 2h, 30km. Avg speed?", a_th: ["10", "15", "20", "60"], a_en: ["10", "15", "20", "60"], correct: 1, th: "ระยะทาง/เวลา", en: "Dist/Time", detail: "30/2 = 15" },
        { q_th: "มุมสี่เหลี่ยม 3 มุมรวมได้ 280 มุมที่ 4 คือ?", q_en: "Quad 3 angles sum 280. 4th angle?", a_th: ["70", "80", "90", "100"], a_en: ["70", "80", "90", "100"], correct: 1, th: "360-280", en: "360-280", detail: "80" },
        { q_th: "มีน้ำ 1/2 เติมอีก 1/4 รวมเป็นเท่าใด?", q_en: "1/2 water, add 1/4. Total?", a_th: ["1/6", "2/4", "3/4", "1/2"], a_en: ["1/6", "2/4", "3/4", "1/2"], correct: 2, th: "ทำส่วนให้เท่ากัน", en: "Find common denominator", detail: "2/4 + 1/4 = 3/4" },
        { q_th: "ปากกา 3 ด้าม 15 บาท 10 ด้ามกี่บาท?", q_en: "3 pens 15 baht. 10 pens?", a_th: ["45", "50", "55", "60"], a_en: ["45", "50", "55", "60"], correct: 1, th: "ราคาต่อด้าม*10", en: "Price per pen * 10", detail: "5*10 = 50" },
        { q_th: "เลขฐานสอง 11 คือฐานสิบใด?", q_en: "Binary 11 to decimal?", a_th: ["1", "2", "3", "4"], a_en: ["1", "2", "3", "4"], correct: 2, th: "1*2 + 1", en: "1*2 + 1", detail: "3" },
        { q_th: "ส้ม 10 กินไป 2 คิดเป็นกี่ %?", q_en: "10 oranges, ate 2. What %?", a_th: ["10%", "20%", "25%", "80%"], a_en: ["10%", "20%", "25%", "80%"], correct: 1, th: "(2/10)*100", en: "(2/10)*100", detail: "20%" },
        { q_th: "สามเหลี่ยมฐาน 10 พื้นที่ 50 สูงเท่าใด?", q_en: "Triangle base 10, area 50. Height?", a_th: ["5", "10", "15", "20"], a_en: ["5", "10", "15", "20"], correct: 1, th: "พื้นที่ = 0.5*ฐาน*สูง", en: "Area = 0.5*b*h", detail: "10" },
        { q_th: "ทอดลูกเต๋า โอกาสเกิดแต้ม 6 คือ?", q_en: "Rolling die, chance of 6?", a_th: ["1/6", "1/2", "1/3", "1"], a_en: ["1/6", "1/2", "1/3", "1"], correct: 0, th: "1 ใน 6 หน้า", en: "1 in 6 sides", detail: "1/6" },
        { q_th: "จำนวนเฉพาะ 1-10 มีกี่ตัว?", q_en: "Primes between 1-10, count?", a_th: ["3", "4", "5", "6"], a_en: ["3", "4", "5", "6"], correct: 1, th: "2, 3, 5, 7", en: "2, 3, 5, 7", detail: "4" },
        { q_th: "ไข่ 1 โหล 60 บาท 1 ฟองเท่าใด?", q_en: "12 eggs 60 baht. 1 egg?", a_th: ["4", "5", "6", "10"], a_en: ["4", "5", "6", "10"], correct: 1, th: "60/12", en: "60/12", detail: "5" },
        { q_th: "15 นาที เป็นกี่ชั่วโมง?", q_en: "15 mins to hours?", a_th: ["0.15", "0.25", "0.5", "1"], a_en: ["0.15", "0.25", "0.5", "1"], correct: 1, th: "15/60", en: "15/60", detail: "0.25" },
        { q_th: "2 เท่าของ x มากกว่า 10 อยู่ 2 คือ?", q_en: "2x more than 10 by 2 is?", a_th: ["2x+10=2", "2x-10=2", "2x-2=10", "x+2=10"], a_en: ["2x+10=2", "2x-10=2", "2x-2=10", "x+2=10"], correct: 1, th: "สมการลบ", en: "Subtraction eqn", detail: "2x-10=2" },
        { q_th: "เชือก 10 เมตร แบ่งเส้นละ 2 เมตร?", q_en: "10m rope divided into 2m pieces?", a_th: ["4", "5", "6", "8"], a_en: ["4", "5", "6", "8"], correct: 1, th: "10/2", en: "10/2", detail: "5" },
        { q_th: "100 แบ่ง 3 เหลือเศษเท่าใด?", q_en: "100 divided by 3, remainder?", a_th: ["0", "1", "2", "3"], a_en: ["0", "1", "2", "3"], correct: 1, th: "100 mod 3", en: "100 mod 3", detail: "1" },
        { q_th: "เหนือ 4 ใต้ 3 ห่างจุดเริ่มเท่าใด?", q_en: "North 4, South 3. Distance from start?", a_th: ["1", "2", "3", "7"], a_en: ["1", "2", "3", "7"], correct: 0, th: "ทิศตรงข้ามหักลบ", en: "Opposite dir subtract", detail: "1" },
        { q_th: "กล่อง 2 ชั้น ชั้นละ 10 รวมเท่าใด?", q_en: "2 layers, 10 per layer. Total?", a_th: ["10", "12", "20", "22"], a_en: ["10", "12", "20", "22"], correct: 2, th: "2*10", en: "2*10", detail: "20" },
        { q_th: "ปัจจุบัน 13 อีก 5 ปีอายุเท่าใด?", q_en: "Age 13, age in 5 years?", a_th: ["15", "16", "17", "18"], a_en: ["15", "16", "17", "18"], correct: 3, th: "13+5", en: "13+5", detail: "18" },
        { q_th: "อ่าน 30 หน้าใน 1 ชม. 3 ชม. ได้กี่หน้า?", q_en: "30 pages/h. In 3h, pages?", a_th: ["60", "90", "100", "120"], a_en: ["60", "90", "100", "120"], correct: 1, th: "30*3", en: "30*3", detail: "90" }
    ];

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        questions.forEach((q, idx) => {
            const div = document.createElement('div');
            div.className = 'q-container';
            div.innerHTML = `
                <p><strong>${idx + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                ${(lang === 'th' ? q.a_th : q.a_en).map((opt, i) => `<button class="btn-opt" onclick="checkAnswer(${idx}, ${i}, this)">${opt}</button>`).join('')}
                <div class="feedback" id="fb-${idx}">
                    <strong>${lang === 'th' ? '💡 คำใบ้:' : '💡 Clue:'}</strong> ${lang === 'th' ? q.th : q.en}<br>
                    <strong>${lang === 'th' ? '📖 เฉลย:' : '📖 Explain:'}</strong> ${q.detail}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function checkAnswer(qIdx, aIdx, btn) {
        const q = questions[qIdx];
        const parent = btn.parentElement;
        parent.querySelectorAll('button').forEach(b => b.disabled = true);
        if(aIdx === q.correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            parent.querySelectorAll('button')[q.correct].classList.add('correct');
        }
        document.getElementById(`fb-${qIdx}`).style.display = 'block';
        answeredCount++;
        if(answeredCount === questions.length) showFinalResult();
    }

    function toggleLang() {
        lang = lang === 'th' ? 'en' : 'th';
        document.getElementById('main-title').innerText = lang === 'th' ? "แบบทดสอบคณิตศาสตร์ ม.1: โจทย์ปัญหา" : "Math Grade 7 Quiz: Word Problems";
        renderQuiz();
    }

    function showFinalResult() {
        const res = document.getElementById('final-result');
        res.style.display = 'block';
        const pct = (score / questions.length) * 100;
        res.innerHTML = `คะแนนรวม: ${score}/${questions.length} (${pct}%) <br> ${pct >= 60 ? '<span style="color:green">🌟 ทำได้ดีมาก</span>' : '<span style="color:red">⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม</span>'}`;
        alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
    }

    renderQuiz();
</script>
<p style="text-align:center; margin-top:30px;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
