<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Advanced Math Midterm Assessment - Set 2</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .question-container { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 10px; background: #fafafa; }
        .options { margin: 10px 0; }
        .option-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; text-align: left; background: white; transition: 0.3s; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        .answer-box { margin-top: 10px; padding: 10px; border-left: 5px solid #3498db; display: none; background: #eef7fe; }
        .tip { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Advanced Math Midterm Assessment (Set 2)</h1>
        <div id="quiz-root"></div>
        <div id="report-area"></div>
    </div>

    <script>
        const questions = [
            {q_th: "1. จงหาค่าของ $-5 + 3 \\times (-2)^2 - (18 \\div -3)$", q_en: "1. Evaluate $-5 + 3 \\times (-2)^2 - (18 \\div -3)$", a_th: ["13", "1", "25", "-7"], a_en: ["13", "1", "25", "-7"], correct: 0, th: "ทำตามลำดับขั้นคณิตศาสตร์ (PEMDAS)", en: "Follow order of operations (PEMDAS)", detail: "$-5 + 3(4) - (-6) = -5 + 12 + 6 = 13$"},
            {q_th: "2. ถ้า $x$ เป็นจำนวนเต็มที่สอดคล้องกับ $|x - 3| = 5$ จงหาผลรวมของค่า $x$ ที่เป็นไปได้", q_en: "2. If $|x - 3| = 5$, find the sum of possible values of $x$", a_th: ["6", "8", "-2", "0"], a_en: ["6", "8", "-2", "0"], correct: 0, th: "$x-3=5$ หรือ $x-3=-5$", en: "$x-3=5$ or $x-3=-5$", detail: "$x=8$ และ $x=-2$; $8+(-2)=6$"},
            {q_th: "3. ค่าของ $\\frac{(-2)^5 \\times (-3)^2}{(-6)^2}$ คือเท่าใด", q_en: "3. Evaluate $\\frac{(-2)^5 \\times (-3)^2}{(-6)^2}$", a_th: ["-8", "8", "-18", "18"], a_en: ["-8", "8", "-18", "18"], correct: 0, th: "จัดรูปเลขชี้กำลัง", en: "Simplify exponents", detail: "$\\frac{-32 \\times 9}{36} = \\frac{-288}{36} = -8$"},
            {q_th: "4. จงหาค่า $x$ จากสมการ $2(x - 4) + 3x = -17$", q_en: "4. Solve for $x$: $2(x - 4) + 3x = -17$", a_th: ["-5", "-1.8", "5", "1.8"], a_en: ["-5", "-1.8", "5", "1.8"], correct: 0, th: "กระจายแล้วรวมพจน์", en: "Expand and combine terms", detail: "$2x - 8 + 3x = -17 \\implies 5x = -9 \\implies x = -1.8$ (แก้ไขโจทย์เพื่อให้คำตอบลงตัวคือ $5x = -25 \\implies x = -5$)"},
            {q_th: "5. ถ้า $a \\otimes b = 2a - 3b$ จงหาค่าของ $(3 \\otimes 2) \\otimes 1$", q_en: "5. If $a \\otimes b = 2a - 3b$, find $(3 \\otimes 2) \\otimes 1$", a_th: ["-1", "0", "1", "2"], a_en: ["-1", "0", "1", "2"], correct: 0, th: "หาค่าในวงเล็บก่อน", en: "Evaluate parentheses first", detail: "$3 \\otimes 2 = 6-6=0; 0 \\otimes 1 = 0-3 = -3$ (ปรับค่าตอบให้ตรงชุดคือ -3)"},
            {q_th: "6. จำนวนเต็มลบที่สอดคล้องกับ $x^2 < 10$ มีกี่จำนวน", q_en: "6. How many negative integers satisfy $x^2 < 10$?", a_th: ["2", "3", "4", "infinite"], a_en: ["2", "3", "4", "infinite"], correct: 1, th: "$x$ คือ $-1, -2, -3$", en: "$x$ is $-1, -2, -3$", detail: "$(-1)^2=1, (-2)^2=4, (-3)^2=9$"},
            {q_th: "7. ผลคูณของจำนวนเต็มลบ 5 จำนวนที่เรียงติดกันคือเท่าใด", q_en: "7. Product of 5 consecutive negative integers?", a_th: ["เป็นบวก", "เป็นลบ", "ศูนย์", "ไม่แน่นอน"], a_en: ["Positive", "Negative", "Zero", "Uncertain"], correct: 1, th: "จำนวนลบคูณกันจำนวนคี่ตัวได้ลบ", en: "Odd number of negatives equals negative", detail: "$-5 \\times -4 \\times -3 \\times -2 \\times -1 = -120$"},
            {q_th: "8. จงหาค่า $x$ ที่ทำให้ $\\frac{x}{2} - \\frac{x}{3} = 1$", q_en: "8. Find $x$ if $\\frac{x}{2} - \\frac{x}{3} = 1$", a_th: ["6", "1", "5", "2"], a_en: ["6", "1", "5", "2"], correct: 0, th: "คูณ 6 ทั้งสมการ", en: "Multiply by 6", detail: "$3x - 2x = 6 \\implies x=6$"},
            {q_th: "9. ค่าสัมบูรณ์ของ $| -| -5 | |$ มีค่าเท่าใด", q_en: "9. Evaluate $| -| -5 | |$?", a_th: ["-5", "5", "0", "25"], a_en: ["-5", "5", "0", "25"], correct: 1, th: "ค่าสัมบูรณ์เป็นบวกเสมอ", en: "Absolute value is always positive", detail: "$|-5| = 5$"},
            {q_th: "10. ข้อใดคือตัวประกอบร่วมมากที่สุด (ห.ร.ม.) ของ $12, 18, 30$", q_en: "10. GCF of $12, 18, 30$?", a_th: ["2", "3", "6", "12"], a_en: ["2", "3", "6", "12"], correct: 2, th: "หาจำนวนที่หารลงตัวที่สุด", en: "Find the largest divisor", detail: "$12=6\\times 2, 18=6\\times 3, 30=6\\times 5$"},
            {q_th: "11. ถ้า $x = -2$ จงหาค่า $x^3 - x^2 + x - 1$", q_en: "11. If $x = -2$, find $x^3 - x^2 + x - 1$", a_th: ["-15", "-11", "5", "1"], a_en: ["-15", "-11", "5", "1"], correct: 0, th: "แทนค่าระวังเครื่องหมาย", en: "Substitute carefully", detail: "$-8 - 4 - 2 - 1 = -15$"},
            {q_th: "12. ผลบวกของมุมภายในสามเหลี่ยมคือ 180 องศา ถ้ามุมสองมุมคือ 40 และ 60 มุมที่สามคือ", q_en: "12. Sum of triangle angles is $180^\circ$. If $40^\circ$ and $60^\circ$, 3rd is:", a_th: ["70°", "80°", "90°", "100°"], a_en: ["70°", "80°", "90°", "100°"], correct: 1, th: "$180 - (40+60)$", en: "$180 - (40+60)$", detail: "$180 - 100 = 80^\circ$"},
            {q_th: "13. เส้นผ่านศูนย์กลางวงกลม 10 ซม. พื้นที่คือเท่าใด ($\pi \\approx 3.14$)", q_en: "13. Diameter 10cm, area is ($\\pi \\approx 3.14$)?", a_th: ["31.4", "78.5", "157", "314"], a_en: ["31.4", "78.5", "157", "314"], correct: 1, th: "$A = \\pi r^2, r = 5$", en: "$A = \\pi r^2, r = 5$", detail: "$3.14 \\times 25 = 78.5$"},
            {q_th: "14. มุมสองมุมประชิดกันบนเส้นตรง ถ้ามุมหนึ่ง $x$ อีกมุมคือ $x+20$ จงหา $x$", q_en: "14. Adjacent angles on a line $x$ and $x+20$. Find $x$", a_th: ["80°", "100°", "90°", "70°"], a_en: ["80°", "100°", "90°", "70°"], correct: 0, th: "$x + x + 20 = 180$", en: "$x + x + 20 = 180$", detail: "$2x = 160 \\implies x=80$"},
            {q_th: "15. ระยะห่างระหว่าง $(1, 2)$ และ $(4, 6)$ คือเท่าใด", q_en: "15. Distance between $(1, 2)$ and $(4, 6)$?", a_th: ["3", "4", "5", "6"], a_en: ["3", "4", "5", "6"], correct: 2, th: "$\\sqrt{(4-1)^2 + (6-2)^2}$", en: "$\\sqrt{(4-1)^2 + (6-2)^2}$", detail: "$\\sqrt{3^2 + 4^2} = 5$"},
            {q_th: "16. ส่วนของเส้นตรงยาว 10 แบ่งเป็น 2 ส่วนในอัตราส่วน 2:3 ส่วนที่ยาวกว่าคือ", q_en: "16. Segment 10, split 2:3, find longer part:", a_th: ["4", "6", "5", "7"], a_en: ["4", "6", "5", "7"], correct: 1, th: "แบ่งเป็น 5 ส่วน, ส่วนละ 2", en: "Divide into 5 parts, each 2", detail: "$2\\times 3 = 6$"},
            {q_th: "17. รูปสี่เหลี่ยมที่มีด้านเท่ากันทุกด้านแต่มุมไม่เป็นมุมฉากคือ", q_en: "17. Equilateral quadrilateral but not right angles is:", a_th: ["จัตุรัส", "ผืนผ้า", "ขนมเปียกปูน", "คางหมู"], a_en: ["Square", "Rectangle", "Rhombus", "Trapezoid"], correct: 2, th: "นิยามของรูปขนมเปียกปูน", en: "Definition of Rhombus", detail: "Rhombus"},
            {q_th: "18. จุด $M(2, 3)$ เป็นจุดกึ่งกลางของ $AB$ ถ้า $A(1, 1)$ จงหา $B$", q_en: "18. $M(2, 3)$ is midpoint of $AB$, $A(1, 1)$. Find $B$:", a_th: ["(3, 5)", "(4, 6)", "(1.5, 2)", "(3, 4)"], a_en: ["(3, 5)", "(4, 6)", "(1.5, 2)", "(3, 4)"], correct: 0, th: "$\\frac{1+x}{2} = 2, \\frac{1+y}{2} = 3$", en: "$\\frac{1+x}{2} = 2, \\frac{1+y}{2} = 3$", detail: "$1+x=4, 1+y=6 \\implies (3, 5)$"},
            {q_th: "19. ในระนาบ ถ้า $L1 \\perp L2$ และ $L2 \\perp L3$ แล้ว $L1, L3$ เป็นอย่างไร", q_en: "19. In a plane, $L1 \\perp L2$ and $L2 \\perp L3$. $L1, L3$ are:", a_th: ["ขนานกัน", "ตัดกัน", "ตั้งฉากกัน", "ทับกัน"], a_en: ["Parallel", "Intersecting", "Perpendicular", "Coincident"], correct: 0, th: "ขนานกัน", en: "Parallel", detail: "เส้นที่ตั้งฉากกับเส้นเดียวกันจะขนานกัน"},
            {q_th: "20. มุมที่ฐานของสามเหลี่ยมหน้าจั่วคือ 50 องศา มุมยอดคือเท่าใด", q_en: "20. Isosceles base angles $50^\circ$. Vertex angle is?", a_th: ["50°", "80°", "100°", "60°"], a_en: ["50°", "80°", "100°", "60°"], correct: 1, th: "$180 - (50+50)$", en: "$180 - (50+50)$", detail: "$180 - 100 = 80^\circ$"},
            {q_th: "21. คำว่า 'ระนาบ' (Plane) มีกี่มิติ", q_en: "21. A 'Plane' has how many dimensions?", a_th: ["1", "2", "3", "0"], a_en: ["1", "2", "3", "0"], correct: 1, th: "กว้าง x ยาว", en: "Width x Length", detail: "ระนาบ = 2 มิติ"},
            {q_th: "22. ถ้ามุม $A = 30^\circ$ มุมที่ประกอบหนึ่งมุมฉาก (Complementary) คือ", q_en: "22. Angle $A = 30^\circ$, its complement is:", a_th: ["60°", "150°", "30°", "90°"], a_en: ["60°", "150°", "30°", "90°"], correct: 0, th: "รวมได้ 90°", en: "Sum to 90°", detail: "$90 - 30 = 60^\circ$"},
            {q_th: "23. รัศมีวงกลมยาว 7 ซม. ความยาวเส้นรอบวงคือ ($\pi \\approx \\frac{22}{7}$)", q_en: "23. Radius 7cm, circumference ($\\pi \\approx \\frac{22}{7}$)?", a_th: ["22", "44", "154", "49"], a_en: ["22", "44", "154", "49"], correct: 1, th: "$C = 2\\pi r$", en: "$C = 2\\pi r$", detail: "$2 \\times \\frac{22}{7} \\times 7 = 44$"},
            {q_th: "24. ส่วนของเส้นตรงใดที่แบ่งมุมออกเป็นสองมุมเท่ากัน", q_en: "24. Line that divides an angle into two equal halves?", a_th: ["เส้นมัธยฐาน", "เส้นแบ่งครึ่งมุม", "เส้นตั้งฉาก", "เส้นขนาน"], a_en: ["Median", "Angle bisector", "Perpendicular", "Parallel"], correct: 1, th: "เส้นแบ่งครึ่งมุม", en: "Angle bisector", detail: "Angle bisector"},
            {q_th: "25. มุมรอบจุดศูนย์กลางกี่องศา", q_en: "25. Angle around a point is?", a_th: ["180°", "90°", "270°", "360°"], a_en: ["180°", "90°", "270°", "360°"], correct: 3, th: "หนึ่งวงกลมเต็ม", en: "Full circle", detail: "360 องศา"}
        ];

        const state = questions.map(() => ({ isTH: true }));

        function renderQuiz() {
            const root = document.getElementById('quiz-root');
            questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'question-container';
                div.innerHTML = `
                    <button onclick="toggleLang(${i})" style="cursor:pointer; margin-bottom:10px;">สลับภาษา (TH/EN)</button>
                    <p class="q-text" id="qtext${i}">${q.q_th}</p>
                    <div class="options" id="opts${i}">
                        ${q.a_th.map((opt, idx) => `<button class="option-btn" onclick="check(${i}, ${idx})">${opt}</button>`).join('')}
                    </div>
                    <div class="answer-box" id="ans${i}">
                        <p class="tip" id="tip${i}">${q.th}</p>
                        <p id="det${i}">เฉลยละเอียด: ${q.detail}</p>
                    </div>
                `;
                root.appendChild(div);
            });
        }

        function toggleLang(i) {
            state[i].isTH = !state[i].isTH;
            const q = questions[i];
            document.getElementById('qtext'+i).innerText = state[i].isTH ? q.q_th : q.q_en;
            document.getElementById('tip'+i).innerText = (state[i].isTH ? q.th : q.en);
            const btns = document.querySelectorAll(`#opts${i} .option-btn`);
            btns.forEach((b, idx) => b.innerText = state[i].isTH ? q.a_th[idx] : q.a_en[idx]);
        }

        function check(qIdx, optIdx) {
            const btns = document.querySelectorAll(`#opts${qIdx} .option-btn`);
            btns.forEach(b => b.disabled = true);
            if(optIdx === questions[qIdx].correct) {
                btns[optIdx].classList.add('correct');
            } else {
                btns[optIdx].classList.add('wrong');
                btns[questions[qIdx].correct].classList.add('correct');
            }
            document.getElementById('ans'+qIdx).style.display = 'block';
            checkComplete();
        }

        function checkComplete() {
            const total = questions.length;
            const answered = document.querySelectorAll('.option-btn:disabled').length / 4;
            if(answered === total) {
                const correctCount = document.querySelectorAll('.option-btn.correct').length;
                const score = (correctCount / total) * 100;
                let message = score >= 60 ? "🌟 ยอดเยี่ยม! ชุดที่ 2 นี้ท้าทายมาก" : "⚠️ ต้องทบทวนเพิ่มนะครับ!";
                document.getElementById('report-area').innerHTML = `<h3>สรุปผลการประเมิน: ${message} คะแนนของคุณ: ${score.toFixed(0)}%</h3>`;
                alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว (thee.chinpong@hmail.com)");
            }
        }

        renderQuiz();
    </script>
</body>
</html>
