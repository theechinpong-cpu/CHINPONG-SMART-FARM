<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบ Number Sense & Operations - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .correct { background-color: #2ecc71 !important; color: white !important; }
        .incorrect { background-color: #e74c3c !important; color: white !important; }
        .option { margin: 5px 0; padding: 10px; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .option:hover { background-color: #f0f0f0; }
        .lang-btn { background: #9b59b6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
        .ans-box { margin-top:10px; padding:15px; background:#fff3cd; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>

<div class="card" style="text-align: center;">
    <h2>แบบทดสอบ Number Sense & Operations - 25 ข้อ</h2>
</div>

<div id="exam-container"></div>
<div id="results" class="card hidden"></div>

<script>
    const questions = [
        { q_th: "(-15) + 20 - (-5) คือเท่าใด", q_en: "What is (-15) + 20 - (-5)?", a_th: ["5", "10", "0", "-10"], a_en: ["5", "10", "0", "-10"], correct: 1, th: "ลบชนลบกลายเป็นบวก", en: "Negative times negative is positive", detail: "-15 + 20 + 5 = 10", lang: 'th' },
        { q_th: "(-2)^3 × (-2)^2 มีค่าเท่าใด", q_en: "What is (-2)^3 × (-2)^2?", a_th: ["32", "-32", "16", "-16"], a_en: ["32", "-32", "16", "-16"], correct: 1, th: "ฐานเหมือนกันคูณกัน นำเลขชี้กำลังบวกกัน", en: "Same base, add exponents", detail: "(-2)^5 = -32", lang: 'th' },
        { q_th: "ข้อใดมีค่าเท่ากับ 1", q_en: "Which equals 1?", a_th: ["(-1)^3", "(-1)^2", "0^1", "-1^2"], a_en: ["(-1)^3", "(-1)^2", "0^1", "-1^2"], correct: 1, th: "เลขลบยกกำลังคู่ได้บวก", en: "Negative to even power is positive", detail: "(-1)^2 = 1", lang: 'th' },
        { q_th: "ผลลัพธ์ของ 0.75 ÷ 0.25 คือข้อใด", q_en: "What is 0.75 ÷ 0.25?", a_th: ["3", "0.3", "30", "0.03"], a_en: ["3", "0.3", "30", "0.03"], correct: 0, th: "เลื่อนจุดให้ตัวหารเป็นจำนวนเต็ม", en: "Shift the decimal point", detail: "75 ÷ 25 = 3", lang: 'th' },
        { q_th: "เศษส่วนใดมีค่ามากที่สุด", q_en: "Which fraction is the largest?", a_th: ["1/2", "2/3", "3/4", "4/5"], a_en: ["1/2", "2/3", "3/4", "4/5"], correct: 3, th: "ทำส่วนให้เท่ากันหรือแปลงเป็นทศนิยม", en: "Convert to decimal or equal denominator", detail: "4/5 = 0.8", lang: 'th' },
        { q_th: "ค่าของ 2^0 + 3^0 + 5^0", q_en: "What is 2^0 + 3^0 + 5^0?", a_th: ["0", "3", "10", "1"], a_en: ["0", "3", "10", "1"], correct: 1, th: "เลขใดๆ ยกกำลังศูนย์ได้ 1", en: "Any number raised to 0 is 1", detail: "1+1+1 = 3", lang: 'th' },
        { q_th: "จำนวนเต็มที่มากที่สุดที่น้อยกว่า -5", q_en: "Largest integer less than -5", a_th: ["-4", "-6", "-5", "0"], a_en: ["-4", "-6", "-5", "0"], correct: 1, th: "บนเส้นจำนวน ยิ่งซ้ายยิ่งน้อย", en: "Left side is smaller", detail: "-6 คือจำนวนที่อยู่ทางซ้ายของ -5", lang: 'th' },
        { q_th: "ค่าของ (-1)^100 คือเท่าใด", q_en: "What is (-1)^100?", a_th: ["-1", "1", "100", "-100"], a_en: ["-1", "1", "100", "-100"], correct: 1, th: "เลขลบยกกำลังเลขคู่ ผลเป็นบวก", en: "Negative to even power is positive", detail: "(-1)^100 = 1", lang: 'th' },
        { q_th: "ผลบวกของ 1/2 + 1/3", q_en: "What is 1/2 + 1/3?", a_th: ["2/5", "5/6", "1/6", "2/6"], a_en: ["2/5", "5/6", "1/6", "2/6"], correct: 1, th: "หา ค.ร.น. คือ 6", en: "Find LCM, which is 6", detail: "3/6 + 2/6 = 5/6", lang: 'th' },
        { q_th: "(-5) × (-4) × (-3) เท่ากับเท่าใด", q_en: "What is (-5) × (-4) × (-3)?", a_th: ["60", "-60", "12", "-12"], a_en: ["60", "-60", "12", "-12"], correct: 1, th: "ลบสามตัวคูณกันเป็นลบ", en: "Odd number of negatives makes negative", detail: "20 × -3 = -60", lang: 'th' },
        { q_th: "ค่าของ 10^2 × 10^3", q_en: "What is 10^2 × 10^3?", a_th: ["10^5", "10^6", "100^5", "10^1"], a_en: ["10^5", "10^6", "100^5", "10^1"], correct: 0, th: "ฐานเหมือนกัน คูณกันนำเลขชี้กำลังบวกกัน", en: "Same base, add exponents", detail: "10^(2+3) = 10^5", lang: 'th' },
        { q_th: "3.5 × 10^-2 คือเท่าใด", q_en: "What is 3.5 × 10^-2?", a_th: ["0.35", "0.035", "0.0035", "350"], a_en: ["0.35", "0.035", "0.0035", "350"], correct: 1, th: "เลขชี้กำลังลบคือเลื่อนจุดไปทางซ้าย", en: "Negative exponent shifts decimal left", detail: "0.035", lang: 'th' },
        { q_th: "ถ้า a=2, b=-3 แล้ว a^2 + b^2", q_en: "If a=2, b=-3, a^2 + b^2?", a_th: ["-5", "13", "5", "7"], a_en: ["-5", "13", "5", "7"], correct: 1, th: "แทนค่าระวังเครื่องหมายลบ", en: "Watch out for negative signs", detail: "4 + 9 = 13", lang: 'th' },
        { q_th: "1/8 เปลี่ยนเป็นทศนิยมคือเท่าใด", q_en: "1/8 as a decimal?", a_th: ["0.125", "0.8", "0.25", "0.1"], a_en: ["0.125", "0.8", "0.25", "0.1"], correct: 0, th: "ครึ่งหนึ่งของ 0.25", en: "Half of 0.25", detail: "0.125", lang: 'th' },
        { q_th: "เลขยกกำลังที่มากที่สุดคือ?", q_en: "Which is the largest?", a_th: ["2^4", "4^2", "3^3", "5^2"], a_en: ["2^4", "4^2", "3^3", "5^2"], correct: 2, th: "คำนวณทีละค่า", en: "Calculate values", detail: "27 คือ 3^3 มากสุด", lang: 'th' },
        { q_th: "(2^3)^2 คือเท่าใด", q_en: "What is (2^3)^2?", a_th: ["2^5", "2^6", "4^6", "2^9"], a_en: ["2^5", "2^6", "4^6", "2^9"], correct: 1, th: "เลขชี้กำลังซ้อนกันเอามาคูณกัน", en: "Nested powers multiply", detail: "2^(3×2) = 2^6", lang: 'th' },
        { q_th: "ค่าสัมบูรณ์ของ |-10| + |5|", q_en: "What is |-10| + |5|?", a_th: ["-5", "15", "5", "-15"], a_en: ["-5", "15", "5", "-15"], correct: 1, th: "ค่าสัมบูรณ์เป็นบวกเสมอ", en: "Absolute value is always positive", detail: "10 + 5 = 15", lang: 'th' },
        { q_th: "0.1212... คือทศนิยมซ้ำแบบใด", q_en: "What is 0.1212...?", a_th: ["ซ้ำศูนย์", "ซ้ำหนึ่ง", "ซ้ำสิบสอง", "ไม่ซ้ำ"], a_en: ["Zero recurring", "One recurring", "Twelve recurring", "Non-recurring"], correct: 2, th: "ซ้ำตัวเลขที่วน", en: "Recurring sequence", detail: "ซ้ำ 12", lang: 'th' },
        { q_th: "4^3 คือเท่าใด", q_en: "What is 4^3?", a_th: ["12", "64", "16", "24"], a_en: ["12", "64", "16", "24"], correct: 1, th: "4 คูณกัน 3 ครั้ง", en: "4 times 4 times 4", detail: "4×4×4 = 64", lang: 'th' },
        { q_th: "จำนวนเต็มระหว่าง -2 และ 2", q_en: "Integer between -2 and 2", a_th: ["-3", "3", "0", "4"], a_en: ["-3", "3", "0", "4"], correct: 2, th: "คือ -1, 0, 1", en: "They are -1, 0, 1", detail: "0 คือจำนวนเต็ม", lang: 'th' },
        { q_th: "0.5 × 0.5 คือเท่าใด", q_en: "What is 0.5 × 0.5?", a_th: ["0.25", "0.025", "2.5", "0.5"], a_en: ["0.25", "0.025", "2.5", "0.5"], correct: 0, th: "ทศนิยม 1 ตำแหน่งคูณ 1 ตำแหน่ง ได้ 2 ตำแหน่ง", en: "1 decimal times 1 decimal = 2 decimals", detail: "0.25", lang: 'th' },
        { q_th: "ฐานลบ ยกกำลังคี่ ผลจะเป็น?", q_en: "Negative base to odd power?", a_th: ["เป็นบวก", "เป็นลบ", "เป็นศูนย์", "หาค่าไม่ได้"], a_en: ["Positive", "Negative", "Zero", "Undefined"], correct: 1, th: "คี่ได้ลบ คู่ได้บวก", en: "Odd is negative, even is positive", detail: "(-2)^3 = -8", lang: 'th' },
        { q_th: "ข้อใดคือสมบัติการแจกแจง", q_en: "Which is distributive property?", a_th: ["a+b=b+a", "a(b+c)=ab+ac", "a+(b+c)=(a+b)+c", "a×1=a"], a_en: ["a+b=b+a", "a(b+c)=ab+ac", "a+(b+c)=(a+b)+c", "a×1=a"], correct: 1, th: "กระจายตัวคูณเข้าไป", en: "Distribute the multiplier", detail: "a(b+c) = ab+ac", lang: 'th' },
        { q_th: "ถ้าฐานคือ -3 เลขชี้กำลังคือ 2 คือเท่าใด", q_en: "(-3)^2 equals?", a_th: ["-9", "9", "-6", "6"], a_en: ["-9", "9", "-6", "6"], correct: 1, th: "ลบยกกำลังคู่เป็นบวก", en: "Negative to even power is positive", detail: "(-3)×(-3) = 9", lang: 'th' },
        { q_th: "จำนวนในข้อใดเป็นจำนวนเต็มลบ", q_en: "Which is a negative integer?", a_th: ["0", "0.5", "-1", "1"], a_en: ["0", "0.5", "-1", "1"], correct: 2, th: "น้อยกว่าศูนย์", en: "Less than zero", detail: "-1 คือจำนวนเต็มลบ", lang: 'th' }
    ];

    let score = 0;
    let answeredCount = 0;

    function toggleLang(index) {
        questions[index].lang = questions[index].lang === 'th' ? 'en' : 'th';
        renderQuestion(index);
    }

    function renderQuestion(index) {
        const q = questions[index];
        const container = document.getElementById(`q-box-${index}`);
        const isTh = q.lang === 'th';
        container.innerHTML = `
            <button class="lang-btn" onclick="toggleLang(${index})">${isTh ? 'EN' : 'TH'}</button>
            <p><strong>${index + 1}. ${isTh ? q.q_th : q.q_en}</strong></p>
            ${(isTh ? q.a_th : q.a_en).map((ans, i) => `
                <div class="option" onclick="checkAnswer(${index}, ${i}, this)">
                    ${['ก', 'ข', 'ค', 'ง'][i]}. ${ans}
                </div>
            `).join('')}
            <div id="ans-${index}" class="hidden ans-box">
                <p><strong>Clue:</strong> ${isTh ? q.th : q.en}</p>
                <p><strong>Explanation:</strong> ${q.detail}</p>
            </div>
        `;
    }

    function checkAnswer(qIdx, aIdx, el) {
        const q = questions[qIdx];
        const isCorrect = aIdx === q.correct;
        el.className = 'option ' + (isCorrect ? 'correct' : 'incorrect');
        document.getElementById(`ans-${qIdx}`).className = 'ans-box';
        
        if (isCorrect) score++;
        answeredCount++;
        
        Array.from(el.parentElement.querySelectorAll('.option')).forEach(c => c.style.pointerEvents = 'none');

        if (answeredCount === questions.length) {
            alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
            showResults();
        }
    }

    function showResults() {
        const resDiv = document.getElementById('results');
        resDiv.className = 'card';
        const percentage = (score / questions.length) * 100;
        resDiv.innerHTML = `<h3>คะแนนของคุณ: ${score} / ${questions.length} (${percentage.toFixed(1)}%)</h3>` + 
            (percentage >= 60 ? '<p style="color:#2ecc71">🌟 ทำได้ดีมาก</p>' : '<p style="color:#e74c3c">⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม</p>');
    }

    const container = document.getElementById('exam-container');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.id = `q-box-${i}`;
        container.appendChild(div);
        renderQuestion(i);
    });
</script>
</body>
</html>
