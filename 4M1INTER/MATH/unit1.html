<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; }
    .question-container { border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    .explanation { display: none; margin-top: 10px; padding: 10px; background: #e9ecef; border-left: 4px solid #007bff; }
    .term { border-bottom: 1px dotted #000; cursor: help; color: blue; }
    .clue-btn { background: #dc3545; color: white; border: none; padding: 2px 5px; cursor: pointer; border-radius: 3px; font-size: 0.8em; }
</style>
</head>
<body>

<h1>Unit 1: Integers Exam (Grade 7)</h1>

<div class="question-container">
    <p>1. What is the <span class="term" title="ค่าสัมบูรณ์">absolute value</span> of -15? 
    <button class="clue-btn" title="ระยะห่างจาก 0 มีค่าเป็นบวกเสมอ">(Clue)</button></p>
    <input type="radio" name="q1" onclick="check(this, false)"> -15<br>
    <input type="radio" name="q1" onclick="check(this, true)"> 15<br>
    <input type="radio" name="q1" onclick="check(this, false)"> 0<br>
    <input type="radio" name="q1" onclick="check(this, false)"> 1<br>
    <div class="explanation">
        Explanation: Absolute value is distance from zero. <strong>Tutor's Secret Tip: Absolute value (|x|) always outputs a positive result!</strong>
    </div>
</div>

<script>
    function check(el, isCorrect) {
        let parent = el.parentElement;
        parent.style.backgroundColor = isCorrect ? '#d4edda' : '#f8d7da';
        parent.querySelector('.explanation').style.display = 'block';
    }
</script>

</body>
</html>
