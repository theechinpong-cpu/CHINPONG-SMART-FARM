    <h1>แบบทดสอบกลางภาค พระพุทธศาสนา ม.1 (ชุดที่ 5: ยากมาก)</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="background: #28a745; color: white; padding: 15px; font-size: 18px; text-align: center; margin-top: 20px;">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "ในปฏิจจสมุปบาท การที่ 'อวิชชา' เป็นปัจจัยให้เกิด 'สังขาร' คำว่า สังขาร ในที่นี้หมายถึงสิ่งใด?", q_en: "In Dependent Origination, what does 'Sankhara' mean when caused by Ignorance?", a_th: ["ร่างกายและจิตใจ", "การปรุงแต่งกรรม", "ความจำได้หมายรู้", "ความรู้แจ้ง"], a_en: ["Body and Mind", "Karmic formations", "Perception", "Enlightenment"], correct: 1, th: "การปรุงแต่งทางความคิดและกรรม", en: "Mental and karmic formation.", detail: "หมายถึง สภาพที่ปรุงแต่งกรรม ทั้งทางกาย วาจา และใจ" },
    { q_th: "เหตุใดการสังคายนาครั้งที่ 2 (ที่เมืองเวสาลี) จึงมีความสำคัญอย่างยิ่งต่อความมั่นคงของศาสนา?", q_en: "Why was the 2nd Council crucial for Buddhism's stability?", a_th: ["เพื่อแบ่งแยกนิกาย", "เพื่อแก้ไขความเห็นต่างเรื่องวินัย", "เพื่อแต่งตำราใหม่", "เพื่อสรุปพระสูตร"], a_en: ["To split sects", "To resolve Vinaya disputes", "To write new books", "To summarize Sutras"], correct: 1, th: "ความเห็นเรื่องวินัย 10 ประการ", en: "The 10 points of discipline.", detail: "เพื่อวินิจฉัยข้อพิพาทเรื่องวัตถุ 10 ประการที่ผิดหลักพระธรรมวินัย" },
    { q_th: "หลัก 'อนัตตา' ในพุทธศาสนา ปฏิเสธความเชื่อเรื่องใดอย่างชัดเจน?", q_en: "Which belief does 'Anatta' clearly refute?", a_th: ["เรื่องกรรม", "เรื่องการเวียนว่ายตายเกิด", "เรื่องตัวตนที่เป็นอมตะ", "เรื่องนิพพาน"], a_en: ["Kamma", "Rebirth", "Permanent self/Soul", "Nibbana"], correct: 2, th: "ความไม่มีตัวตนถาวร", en: "No permanent self.", detail: "ปฏิเสธความเชื่อเรื่อง 'อัตตา' หรือตัวตนที่เที่ยงแท้ถาวร" },
    { q_th: "เหตุใดพระพุทธเจ้าจึงทรงสอนให้ใช้ 'กาลามสูตร' ในการรับฟังข้อมูล?", q_en: "Why did the Buddha teach 'Kalama Sutta' for receiving information?", a_th: ["เพื่อความเชื่อฟัง", "เพื่อความเป็นอิสระทางความคิด", "เพื่อจำกัดความรู้", "เพื่อความสนุกสนาน"], a_en: ["For obedience", "For intellectual independence", "To limit knowledge", "For fun"], correct: 1, th: "อย่าเชื่อเพียงเพราะฟังตามๆ กันมา", en: "Do not believe just because you heard it.", detail: "เพื่อให้คนรู้จักวิเคราะห์เหตุผลและตรวจสอบก่อนจะปลงใจเชื่อ" },
    { q_th: "ข้อใดคือความต่างของ 'ศีล' กับ 'จริยธรรม' ตามนัยพระพุทธศาสนา?", q_en: "What is the difference between Sila and Ethics in Buddhism?", a_th: ["ไม่มีความต่าง", "ศีลเป็นข้อบังคับทางใจ", "ศีลคือการงดเว้น จริยธรรมคือความประพฤติที่ดี", "ศีลใช้กับพระ จริยธรรมใช้กับฆราวาส"], a_en: ["No difference", "Sila is mental constraint", "Sila is abstinence, Ethics is good behavior", "Sila for monks, Ethics for lay"], correct: 2, th: "ศีลคือพื้นฐานการควบคุมกายวาจา", en: "Sila is the foundation of controlling body and speech.", detail: "ศีลเน้นการฝึกเพื่อไม่ให้เบียดเบียนผู้อื่น ส่วนจริยธรรมครอบคลุมความประพฤติที่ควรทำด้วย" },
    { q_th: "คำว่า 'พระรัตนตรัย' ในความหมายที่ลึกซึ้งที่สุด หมายถึงสิ่งใด?", q_en: "What is the deepest meaning of the Triple Gem?", a_th: ["ผู้ตรัสรู้ คำสอน และผู้สืบทอด", "พระพุทธรูป พระไตรปิฎก และพระสงฆ์", "คุณธรรม 3 ประการ", "ถูกทุกข้อ"], a_en: ["The Enlightened, Teachings, Successors", "Statues, Books, Monks", "3 Virtues", "All of the above"], correct: 0, th: "เป็นผู้ สื่อ และผู้ปฏิบัติตาม", en: "The Enlightened, The Message, The Practitioners.", detail: "คือองค์ประกอบหลักที่เป็นเนื้อแท้ของศาสนา" },
    { q_th: "กรรมในทางพุทธศาสนา หากเปรียบเทียบเชิงวิศวกรรมคืออะไร?", q_en: "Comparing Kamma in Buddhism to engineering, what is it?", a_th: ["การออกแบบ", "กฎของเหตุและผล", "ความโชคดี", "อำนาจดลบันดาล"], a_en: ["Design", "Law of Cause and Effect", "Good luck", "Divine power"], correct: 1, th: "เหตุปัจจัย", en: "Cause and effect.", detail: "กรรมคือกฎแห่งเหตุปัจจัยที่ผลลัพธ์ย่อมเกิดจากเหตุเสมอ" },
    { q_th: "จุดประสงค์ของการทำ 'อุปสมบทกรรม' คืออะไร?", q_en: "What is the purpose of 'Upasampada' (Ordination)?", a_th: ["เพื่อบวชเป็นพระ", "เพื่อเป็นคนดี", "เพื่อเรียนหนังสือ", "เพื่อลาบวช"], a_en: ["To become a monk", "To be a good person", "To study", "To take leave"], correct: 0, th: "เข้าสู่ความเป็นสงฆ์", en: "Entry into Sangha.", detail: "เป็นการเปลี่ยนสถานะจากบุคคลทั่วไปสู่ผู้ดำรงตนอยู่ในพระธรรมวินัย" },
    { q_th: "นิโรธ ในอริยสัจ 4 หากอธิบายถึง 'สภาวะ' คืออะไร?", q_en: "What is the 'state' of Nirodha in the Four Noble Truths?", a_th: ["ความสบายใจ", "ความเย็นใจ", "ความดับเย็นปราศจากทุกข์", "ความหลับลึก"], a_en: ["Comfort", "Coolness", "Coolness/Cessation of suffering", "Deep sleep"], correct: 2, th: "ความดับสนิท", en: "The complete cessation.", detail: "ภาวะที่ทุกข์ดับไปอย่างสิ้นเชิง" },
    { q_th: "ข้อใดไม่ใช่ลักษณะของ 'อริยบุคคล'?", q_en: "Which is not a characteristic of an 'Arya' (Noble Person)?", a_th: ["เห็นความจริง", "ไม่มีกิเลสเหลือเลย", "ละความเห็นผิด", "ยังมีความเห็นแก่ตัวอยู่"], a_en: ["Sees truth", "Zero defilements", "Abandons wrong views", "Still selfish"], correct: 3, th: "ละความเห็นแก่ตัวได้", en: "Abandoning selfishness.", detail: "อริยบุคคลคือผู้ละกิเลสและเห็นความจริงได้ในระดับต่างๆ" },
    { q_th: "ความกตัญญูกตเวที ตามหลักพุทธศาสนาต้องประกอบด้วย 2 ส่วน คืออะไร?", q_en: "Gratitude according to Buddhism consists of two parts. What are they?", a_th: ["รู้บุญคุณ และตอบแทน", "รักแม่ และรักพ่อ", "ทำบุญ และให้ทาน", "กราบพระ และไหว้พ่อแม่"], a_en: ["Knowing and Repaying", "Loving mom and dad", "Making merit and Giving", "Bowing to monks and parents"], correct: 0, th: "รู้และทำ", en: "Knowledge and Action.", detail: "1. รู้บุญคุณ 2. ทำการตอบแทน" },
    { q_th: "ธรรมะข้อใดเปรียบเสมือน 'เกราะป้องกันภัย' ในชีวิตประจำวัน?", q_en: "Which Dhamma is like armor in daily life?", a_th: ["ศีล 5", "อิทธิบาท 4", "สังคหวัตถุ 4", "โอวาทปาติโมกข์"], a_en: ["5 Precepts", "4 Paths to Success", "4 Bases of Social Solidarity", "Ovadapatimokkha"], correct: 0, th: "ป้องกันการทำชั่ว", en: "Protection from evil.", detail: "ศีลช่วยคุ้มครองไม่ให้เราพลาดพลั้งทำผิดจนเกิดอันตราย" },
    { q_th: "ทำไมพุทธศาสนาถึงเน้น 'ปัญญา' นำหน้า 'ศรัทธา'?", q_en: "Why does Buddhism prioritize 'Wisdom' over 'Faith'?", a_th: ["เพราะศาสนาพุทธไม่ชอบคนเชื่อฟัง", "เพราะให้ผลที่ยั่งยืนกว่า", "เพราะศรัทธาไม่มีอยู่จริง", "เพราะปัญญาดูเท่กว่า"], a_en: ["Buddhism dislikes obedience", "Sustainable results", "Faith is not real", "Wisdom is cooler"], correct: 1, th: "ปัญญาเกิดจากความเข้าใจ", en: "Wisdom arises from understanding.", detail: "ปัญญาช่วยให้เข้าใจความจริงอย่างถ่องแท้ ต่างจากศรัทธาที่อาจเลื่อนลอย" },
    { q_th: "วิถีแห่ง 'มัชฌิมาปฏิปทา' คืออะไร?", q_en: "What is the 'Middle Way'?", a_th: ["ทำพอดีๆ", "ทางสายกลาง", "ทำเยอะๆ", "ไม่ทำอะไรเลย"], a_en: ["Just enough", "The Middle Way", "Do a lot", "Do nothing"], correct: 1, th: "ทางที่พอเหมาะ", en: "The balanced path.", detail: "การปฏิบัติที่ไม่ตึงหรือหย่อนจนเกินไป" },
    { q_th: "พระพุทธศาสนาสอนเรื่อง 'กฎแห่งกรรม' เพื่ออะไร?", q_en: "What is the purpose of teaching 'The Law of Kamma'?", a_th: ["เพื่อให้กลัวบาป", "เพื่อให้รับผิดชอบต่อการกระทำตน", "เพื่อให้โทษเวร", "เพื่อให้คนมาวัด"], a_en: ["To make people fear sin", "To make people responsible", "To blame fate", "To get people to temple"], correct: 1, th: "ความรับผิดชอบ", en: "Responsibility.", detail: "เพื่อส่งเสริมให้มนุษย์มีสำนึกรับผิดชอบต่อผลของการกระทำตน" },

    { q_th: "อะไรคือความหมายที่แท้จริงของ 'การปล่อยวาง'?", q_en: "What is the true meaning of 'letting go'?", a_th: ["ไม่ทำอะไรเลย", "ไม่ยึดมั่นในความถูกใจผิดใจ", "เลิกทำงาน", "หนีจากปัญหา"], a_en: ["Doing nothing", "Detachment from likes/dislikes", "Quitting work", "Running away"], correct: 1, th: "ไม่ยึดติดในตัวตน", en: "Not clinging to self.", detail: "การไม่นำความยึดติดมาเป็นทุกข์ ไม่ใช่การไม่รับผิดชอบ" },
    { q_th: "อริยสัจ 4 ข้อไหนถือเป็น 'จุดหมายปลายทาง' ของพุทธศาสนา?", q_en: "Which of the Four Noble Truths is the 'destination' of Buddhism?", a_th: ["ทุกข์", "สมุทัย", "นิโรธ", "มรรค"], a_en: ["Dukkha", "Samudaya", "Nirodha", "Magga"], correct: 2, th: "จุดหมายคือความสงบ", en: "Goal is peace.", detail: "นิโรธ คือ ความดับทุกข์ ซึ่งเป็นเป้าหมายสูงสุด" },

    { q_th: "เหตุใดพระสงฆ์ถึงต้องไม่รับเงินทองในสมัยพุทธกาล?", q_en: "Why were monks not allowed to touch money in the Buddha's time?", a_th: ["เพราะยากจน", "เพื่อลดการยึดติดทางโลก", "เพราะคนสมัยนั้นไม่มีเงิน", "เพื่อฝึกงานช่าง"], a_en: ["Because poor", "To reduce worldliness", "No money back then", "Manual labor"], correct: 1, th: "เพื่อไม่ให้วุ่นวาย", en: "To avoid worldliness.", detail: "เพื่อความเรียบง่ายและลดความต้องการทางวัตถุ" },
    { q_th: "การมีส่วนร่วมใน 'สังฆกรรม' ของพระสงฆ์ คืออะไร?", q_en: "What is 'Sanghakamma'?", a_th: ["การทำงานร่วมกันของสงฆ์", "การฉันอาหารร่วมกัน", "การเดินบิณฑบาต", "การสวดมนต์หน้ากระจก"], a_en: ["Collective work", "Eating together", "Alms round", "Chanting in front of a mirror"], correct: 0, th: "กิจการของสงฆ์", en: "Monastic affairs.", detail: "การที่พระสงฆ์มาชุมนุมกันเพื่อดำเนินกิจการทางศาสนา" },
    { q_th: "คำว่า 'ตถาคต' มักหมายถึงใคร?", q_en: "Who does the word 'Tathagata' usually refer to?", a_th: ["พระอานนท์", "พระพุทธเจ้า", "พระสารีบุตร", "พระมหากัสสปะ"], a_en: ["Ananda", "The Buddha", "Sariputta", "Mahakassapa"], correct: 1, th: "ผู้เสด็จมาเช่นนั้น", en: "The One who has come/gone thus.", detail: "หมายถึง พระพุทธเจ้า" },
    { q_th: "การประพฤติ 'มัชฌิมาปฏิปทา' ช่วยแก้ปัญหาในสังคมได้อย่างไร?", q_en: "How does the 'Middle Way' solve social issues?", a_th: ["ทำให้คนขี้เกียจ", "ทำให้เกิดความสมดุลและความไม่สุดโต่ง", "ทำให้คนรวยขึ้น", "ไม่มีประโยชน์"], a_en: ["Makes people lazy", "Balance and no extremes", "Makes people rich", "Useless"], correct: 1, th: "ความสมดุลคือคำตอบ", en: "Balance is the answer.", detail: "ช่วยลดความขัดแย้งจากการยึดมั่นในความคิดที่สุดโต่ง" },

        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, index) => {
                area.innerHTML += `<div class='question-container' id='q${index}'>
                    <p><strong>ข้อที่ ${index + 1}:</strong> ${q.q_th}</p>
                    <div class='clue'>Tip: ${q.th}</div>
                    ${q.a_th.map((opt, i) => `<button onclick='check(${index}, ${i})' id='btn${index}_${i}'>${opt}</button>`).join('')}
                    <div class='detail hidden' id='d${index}' style='margin-top:10px; font-style:italic; color: #555;'><strong>เฉลย:</strong> ${q.detail}</div>
                </div>`;
            });
        }

        function check(qIdx, aIdx) {
            const btns = document.querySelectorAll(`#q${qIdx} button`);
            btns.forEach(b => b.disabled = true);
            const detail = document.getElementById(`d${qIdx}`);
            detail.classList.remove('hidden');
            if (aIdx === questions[qIdx].correct) {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('correct');
            } else {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('wrong');
                document.getElementById(`btn${qIdx}_${questions[qIdx].correct}`).classList.add('correct');
            }
        }

        function submitQuiz() {
            alert("ส่งข้อสอบเรียบร้อยแล้ว ระบบจำลองการสรุปคะแนนและส่งข้อมูลไปยังอีเมลผู้สอนครับ ขอบคุณครับ");
        }

        renderQuiz();
    </script>
</body>
</html>
