<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค พระพุทธศาสนา ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f9f9f9; }
        .question-container { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 12px; background: white; }
        .clue { background: #fff3cd; padding: 10px; font-weight: bold; color: #856404; border-left: 5px solid #ffeeba; margin: 10px 0; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #007bff; background: white; }
        button:hover { background: #e7f1ff; }
        .hidden { display: none; }
        .correct { background-color: #d4edda !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; color: #721c24; }
    </style>
</head>
<body>
    <h1>แบบทดสอบกลางภาค พระพุทธศาสนา ม.1</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="width: 100%; background: #007bff; color: white; padding: 15px; font-size: 18px;">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "ข้อใดคือเป้าหมายสูงสุดของการสังคายนาครั้งที่ 1?", q_en: "What was the main purpose of the first Buddhist council?", a_th: ["เผยแผ่ศาสนา", "รวบรวมพระธรรมวินัย", "สร้างสังฆมณฑล", "แต่งตั้งพระสงฆ์"], a_en: ["Spread religion", "Compile the Canon", "Establish Sangha", "Appoint monks"], correct: 1, th: "คิดถึงความเป็นหนึ่งเดียวของคำสอน", en: "Think of the unity of teachings.", detail: "เพื่อรวบรวมและจัดหมวดหมู่พระธรรมวินัยให้เป็นหลักฐานที่ถูกต้อง" },
            { q_th: "หลักอริยสัจ 4 ข้อใดเปรียบได้กับการหาทางแก้ปัญหา?", q_en: "Which of the Four Noble Truths represents finding a solution?", a_th: ["ทุกข์", "สมุทัย", "นิโรธ", "มรรค"], a_en: ["Dukkha", "Samudaya", "Nirodha", "Magga"], correct: 3, th: "มรรค คือ ทางปฏิบัติ", en: "Magga is the path of practice.", detail: "มรรค คือ ข้อปฏิบัติให้ถึงความดับทุกข์" },
            { q_th: "ใครคือผู้ที่ได้รับการยกย่องว่าเป็นเอตทัคคะด้านผู้มีความจำดี?", q_en: "Who was praised for having a great memory?", a_th: ["พระสารีบุตร", "พระโมคคัลลานะ", "พระอานนท์", "พระอุบาลี"], a_en: ["Sariputta", "Moggallana", "Ananda", "Upali"], correct: 2, th: "ท่านคือพุทธอุปัฏฐาก", en: "He was the Buddha's personal attendant.", detail: "พระอานนท์เป็นพุทธอุปัฏฐากที่มีความจำแม่นยำมาก" },
            { q_th: "พุทธศาสนสุภาษิต 'ยํ เว เสวติ ตาทิโส' แปลว่าอะไร?", q_en: "What does the proverb 'Yam ve sevati tatiso' mean?", a_th: ["ตนเป็นที่พึ่งแห่งตน", "คบคนเช่นใดเป็นเช่นนั้น", "ใจเป็นใหญ่", "สติเป็นเลิศ"], a_en: ["Self-reliance", "You are who you associate with", "Mind is leader", "Mindfulness is best"], correct: 1, th: "เกี่ยวข้องกับมิตรสหาย", en: "Relates to friends.", detail: "คบคนเช่นใด ย่อมเป็นเช่นคนนั้น" },
            { q_th: "ในวันมาฆบูชา เหตุการณ์สำคัญคืออะไร?", q_en: "What is the main event of Makha Bucha Day?", a_th: ["พระพุทธเจ้าประสูติ", "การแสดงโอวาทปาติโมกข์", "การปลงพระชนมายุ", "พระพุทธเจ้าตรัสรู้"], a_en: ["Birth of Buddha", "Ovadapatimokkha sermon", "Passing away", "Enlightenment"], correct: 1, th: "วันแห่งความรักของชาวพุทธ", en: "The day of Buddhist love.", detail: "เป็นวันที่พระสงฆ์สาวกมาชุมนุมกันโดยมิได้นัดหมายและฟังโอวาทปาติโมกข์" },
            { q_th: "การประพฤติตนตามหลักพระพุทธศาสนาในข้อใดส่งผลดีต่อครอบครัว?", q_en: "Which behavior best benefits a family?", a_th: ["การเป็นคนเห็นแก่ตัว", "การมีศีลธรรมในบ้าน", "การทำตามใจตนเอง", "การไม่ยุ่งเกี่ยวกับใคร"], a_en: ["Selfishness", "Having morality at home", "Following own desires", "Isolating from others"], correct: 1, th: "ความอบอุ่นต้องเริ่มจากศีลธรรม", en: "Warmth starts with morality.", detail: "ครอบครัวจะอยู่ร่วมกันอย่างปกติสุขหากยึดมั่นในศีลธรรม" },
            { q_th: "ข้อใดไม่ใช่ส่วนหนึ่งของพระรัตนตรัย?", q_en: "Which is not part of the Triple Gem?", a_th: ["พระพุทธ", "พระธรรม", "พระสงฆ์", "พระอริยสงฆ์"], a_en: ["Buddha", "Dhamma", "Sangha", "Ariya Sangha"], correct: 3, th: "พระรัตนตรัยมี 3", en: "The Triple Gem has 3 parts.", detail: "พระรัตนตรัยคือ พระพุทธ พระธรรม และพระสงฆ์" },
            { q_th: "กระบวนการ 'สมุทัย' คืออะไร?", q_en: "What is the process of 'Samudaya'?", a_th: ["ความทุกข์", "สาเหตุแห่งทุกข์", "ความดับทุกข์", "ข้อปฏิบัติ"], a_en: ["Suffering", "Cause of suffering", "Cessation of suffering", "Path"], correct: 1, th: "เหตุของเรื่องราว", en: "The root cause.", detail: "สมุทัยคือสาเหตุที่ทำให้เกิดทุกข์" },
            { q_th: "การปฏิบัติตนต่อพระสงฆ์ควรคำนึงถึงสิ่งใดมากที่สุด?", q_en: "What is most important when interacting with monks?", a_th: ["ของกำนัล", "ความเคารพและกาลเทศะ", "ความสนิทสนม", "เงินบริจาค"], a_en: ["Gifts", "Respect and decorum", "Closeness", "Donations"], correct: 1, th: "ต้องสุภาพอ่อนน้อม", en: "Be polite and humble.", detail: "การแสดงออกด้วยความเคารพให้เหมาะสมตามสถานะคือสิ่งสำคัญ" },
            { q_th: "ชาดกเรื่องใดเน้นความเพียรพยายาม?", q_en: "Which Jataka story emphasizes perseverance?", a_th: ["มหาชนก", "สุวรรณสาม", "เวสสันดร", "กระต่ายตื่นตูม"], a_en: ["Mahajanaka", "Suvannasama", "Vessantara", "Frightened Rabbit"], correct: 0, th: "พระมหาชนกทรงว่ายน้ำ", en: "King Mahajanaka swimming.", detail: "มหาชนกชาดกเน้นความวิริยะอุตสาหะ" },
            { q_th: "การเวียนเทียนถือเป็นกิจกรรมในข้อใด?", q_en: "What is 'Wien Tien' (candle circumambulation)?", a_th: ["การปฏิบัติธรรม", "ศาสนพิธี", "การทำบุญตักบาตร", "การกราบไหว้"], a_en: ["Meditation", "Religious ceremony", "Alms giving", "Prostration"], correct: 1, th: "กิจกรรมในวันสำคัญ", en: "Activity on important days.", detail: "เป็นศาสนพิธีที่แสดงความเคารพต่อพระรัตนตรัย" },
            { q_th: "โยนิโสมนสิการ หมายถึงอะไร?", q_en: "What is 'Yonisomanasikara'?", a_th: ["การท่องจำ", "การคิดอย่างมีวิจารณญาณ", "การสวดมนต์", "การทำบุญ"], a_en: ["Memorization", "Critical thinking", "Chanting", "Donating"], correct: 1, th: "คิดอย่างถูกวิธี", en: "Thinking in the right way.", detail: "หมายถึงการใช้ความคิดอย่างถูกวิธีและมีเหตุผล" },
            { q_th: "พระรัตนตรัยเป็นที่พึ่งสูงสุดของใคร?", q_en: "For whom is the Triple Gem the highest refuge?", a_th: ["ชาวพุทธ", "เทวดา", "สรรพสัตว์", "ถูกทุกข้อ"], a_en: ["Buddhists", "Devas", "All sentient beings", "All of the above"], correct: 3, th: "ที่พึ่งของทุกคน", en: "Refuge for all.", detail: "พระรัตนตรัยถือเป็นที่พึ่งทางใจของชาวพุทธและผู้เลื่อมใส" },
            { q_th: "การสังคายนาครั้งที่ 1 เกิดขึ้นหลังจากพระพุทธเจ้าปรินิพพานนานเท่าใด?", q_en: "How long after Buddha's passing was the first council?", a_th: ["ทันที", "3 เดือน", "1 ปี", "10 ปี"], a_en: ["Immediately", "3 months", "1 year", "10 years"], correct: 1, th: "ไม่นานเกินรอ", en: "Not long after.", detail: "หลังปรินิพพาน 3 เดือน ณ ถ้ำสัตตบรรณคูหา" },
            { q_th: "ข้อใดเป็นการปฏิบัติมารยาทชาวพุทธที่ถูกต้อง?", q_en: "Which is proper Buddhist etiquette?", a_th: ["ยืนกราบ", "กราบแบบเบญจางคประดิษฐ์", "กราบแบบนอน", "ไม่กราบ"], a_en: ["Standing bow", "Prostration", "Lying down", "Not bowing"], correct: 1, th: "อวัยวะสัมผัสพื้น 5 ส่วน", en: "Five points touch the ground.", detail: "เบญจางคประดิษฐ์คือการกราบที่อวัยวะ 5 ส่วนสัมผัสพื้น" },
            { q_th: "หากท่านพบเห็นคนทะเลาะกัน ท่านควรใช้หลักธรรมใด?", q_en: "What principle should you use if you see people fighting?", a_th: ["เมตตาธรรม", "ความโกรธ", "การนิ่งเฉย", "ความโลภ"], a_en: ["Loving-kindness", "Anger", "Indifference", "Greed"], correct: 0, th: "ความเห็นอกเห็นใจ", en: "Compassion.", detail: "ใช้เมตตาธรรมเพื่อลดความขัดแย้ง" },
            { q_th: "การตักบาตรเป็นการแสดงออกถึงอะไร?", q_en: "What does giving alms show?", a_th: ["ความร่ำรวย", "ความเสียสละ", "การโอ้อวด", "หน้าที่บังคับ"], a_en: ["Wealth", "Sacrifice", "Showing off", "Duty"], correct: 1, th: "การแบ่งปัน", en: "Sharing.", detail: "แสดงถึงความเสียสละและการเกื้อกูลแก่พระสงฆ์" },
            { q_th: "วันวิสาขบูชาคือวันสำคัญระดับใด?", q_en: "What is the importance of Visakha Bucha Day?", a_th: ["วันสำคัญของไทย", "วันสำคัญสากลของโลก", "วันหยุดราชการ", "วันของหมู่บ้าน"], a_en: ["Thai holiday", "International day", "Government holiday", "Village day"], correct: 1, th: "ยูเนสโกรับรอง", en: "Recognized by UNESCO.", detail: "เป็นวันสำคัญสากลของโลกที่ยูเนสโกประกาศ" },
            { q_th: "ศีล 5 ข้อแรกคืออะไร?", q_en: "What is the first of the Five Precepts?", a_th: ["ไม่ลักทรัพย์", "ไม่ฆ่าสัตว์", "ไม่พูดเท็จ", "ไม่ดื่มสุรา"], a_en: ["Not stealing", "Not killing", "Not lying", "Not drinking"], correct: 1, th: "ห้ามทำลายชีวิต", en: "Do not kill.", detail: "งดเว้นจากการฆ่าสัตว์ตัดชีวิต" },
            { q_th: "ใครคือพุทธสาวิกาตัวอย่างเรื่องความกตัญญู?", q_en: "Which female follower is a model of gratitude?", a_th: ["นางวิสาขา", "พระอุบลวรรณาเถรี", "นางสุชาดา", "พระนางมหาปชาบดี"], a_en: ["Visakha", "Uppalavanna", "Sujata", "Mahapajapati"], correct: 0, th: "ผู้มีศรัทธาแรงกล้า", en: "Devoted follower.", detail: "นางวิสาขาเป็นแบบอย่างที่ดีในการทำนุบำรุงศาสนา" },
            { q_th: "ทุกข์ ในอริยสัจ 4 หมายถึงอะไร?", q_en: "What does 'Dukkha' mean?", a_th: ["ความสุข", "ความไม่สบายกายไม่สบายใจ", "ความพอใจ", "ความเฉยๆ"], a_en: ["Happiness", "Suffering/Unsatisfactoriness", "Satisfaction", "Neutrality"], correct: 1, th: "สิ่งที่ทนได้ยาก", en: "Hard to endure.", detail: "คือสภาวะที่ทนได้ยาก ไม่น่าพอใจ" },
            { q_th: "เหตุใดต้องมีการทำนุบำรุงพระพุทธศาสนา?", q_en: "Why maintain Buddhism?", a_th: ["เพื่อให้มีวัดสวยงาม", "เพื่อให้หลักธรรมคงอยู่", "เพื่อให้คนเกรงกลัว", "เพื่อความสนุกสนาน"], a_en: ["For beautiful temples", "For teachings to persist", "For fear", "For fun"], correct: 1, th: "ส่งต่อความดี", en: "Passing on goodness.", detail: "เพื่อให้หลักธรรมคำสอนเป็นที่พึ่งของคนรุ่นหลัง" },
            { q_th: "พระพุทธศาสนาเข้าสู่ประเทศไทยผ่านทางใด?", q_en: "How did Buddhism enter Thailand?", a_th: ["การทหาร", "การค้าขายและการเผยแผ่", "การบังคับ", "การซื้อขายที่ดิน"], a_en: ["War", "Trade and missions", "Force", "Land deals"], correct: 1, th: "ส่งผ่านเส้นทางสายไหม", en: "Via trade routes.", detail: "ผ่านทางการค้าและการส่งสมณทูต" },
            { q_th: "การมีสติก่อนทำคือพุทธศาสนสุภาษิตใด?", q_en: "Which proverb teaches mindfulness before action?", a_th: ["อัตตา หิ อัตตโน นาโถ", "นิสมฺม กรณํ เสยฺโย", "ธมฺโม หเว รกฺขติ ธมฺมจารึ", "สจฺจํ เว อมตา วาจา"], a_en: ["Self-reliance", "Think before act", "Dharma protects", "Truth is immortal"], correct: 1, th: "ใคร่ครวญก่อนทำ", en: "Consider before doing.", detail: "นิสมฺม กรณํ เสยฺโย หมายถึง ใคร่ครวญก่อนทำดีกว่า" },
            { q_th: "สรุปผลการทำข้อสอบจะส่งที่ใด?", q_en: "Where will the result be sent?", a_th: ["LINE", "Facebook", "thee.chinpong@hmail.com", "TikTok"], a_en: ["LINE", "Facebook", "thee.chinpong@hmail.com", "TikTok"], correct: 2, th: "อีเมลของผู้สอน", en: "Tutor's email.", detail: "ระบบจะสรุปคะแนนส่งไปยังอีเมลของพระจอมเกล้าติวเตอร์โดยอัตโนมัติ" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, index) => {
                area.innerHTML += `<div class='question-container' id='q${index}'>
                    <p><strong>ข้อที่ ${index + 1}:</strong> ${q.q_th}</p>
                    <div class='clue'>Tip: ${q.th}</div>
                    ${q.a_th.map((opt, i) => `<button onclick='check(${index}, ${i})' id='btn${index}_${i}'>${opt}</button>`).join('')}
                    <div class='detail hidden' id='d${index}' style='margin-top:10px; font-style:italic;'><strong>เฉลย:</strong> ${q.detail}</div>
                </div>`;
            });
        }

        function check(qIdx, aIdx) {
            const btns = document.querySelectorAll(`#q${qIdx} button`);
            btns.forEach(b => b.disabled = true);
            const detail = document.getElementById(`d${qIdx}`);
            detail.classList.remove('hidden');
            if (aIdx === questions[qIdx].correct) {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('correct');
            } else {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('wrong');
                document.getElementById(`btn${qIdx}_${questions[qIdx].correct}`).classList.add('correct');
            }
        }

        function submitQuiz() {
            alert("ส่งข้อสอบเรียบร้อยแล้ว ระบบกำลังจำลองการส่งข้อมูลไปที่ thee.chinpong@hmail.com ขอบคุณครับ");
        }

        renderQuiz();
    </script>
</body>
</html>
