    <h1>แบบทดสอบกลางภาค พระพุทธศาสนา ม.1 (ชุดที่ 5: ยากมาก)</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="background: #28a745; color: white; padding: 15px; font-size: 18px; text-align: center; margin-top: 20px;">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "ในอริยสัจ 4 การบรรลุ 'มรรค' เปรียบเสมือนการเข้าถึงสภาวะใดทางจิต?", q_en: "In the Four Noble Truths, reaching 'Magga' correlates to which mental state?", a_th: ["ความสงบชั่วคราว", "การละกิเลสอย่างถาวร", "ทางสายกลางที่สมดุล", "การเห็นแจ้งในความทุกข์"], correct: 2, th: "มรรค คือ ทางสายกลาง (Majjhima Patipada)", detail: "มรรค คือข้อปฏิบัติที่นำไปสู่ความดับทุกข์อย่างถาวร (วิมุตติ)" },
            { q_th: "คำว่า 'โยนิโสมนสิการ' ในเชิงลึกเกี่ยวข้องโดยตรงกับปัจจัยใด?", q_en: "What factor is 'Yonisomanasikara' directly related to?", a_th: ["การมีศรัทธาตั้งมั่น", "กระบวนการคิดวิเคราะห์เหตุปัจจัย", "ความเพียรในทางที่ถูก", "การระลึกได้ของสติ"], correct: 1, th: "คิดแบบสาวหาเหตุ (Causality)", detail: "โยนิโสมนสิการคือการคิดโดยแยบคาย มองเห็นเหตุและปัจจัยที่มาประกอบกัน" },
            { q_th: "การสังคายนาครั้งที่ 1 มีวัตถุประสงค์แฝงสำคัญเรื่องใดนอกเหนือจากการรวบรวมพระธรรมวินัย?", q_en: "What was the ulterior motive of the 1st council besides compiling the Canon?", a_th: ["คัดเลือกพระอรหันต์", "ป้องกันความเห็นแตกแยกในอนาคต", "ประกาศเกียรติคุณพระพุทธเจ้า", "สร้างความสามัคคีกับกษัตริย์"], correct: 1, th: "ระงับอธิกรณ์", detail: "เพื่อป้องกันคำสอนที่ผิดเพี้ยนและการตีความพระธรรมวินัยที่คลาดเคลื่อนหลังจากพุทธปรินิพพาน" },
            { q_th: "ในพุทธศาสนสุภาษิต 'นิสมฺม กรณํ เสยฺโย' ทำไมจึงกล่าวว่าการใคร่ครวญก่อนทำจึงประเสริฐ?", q_en: "Why is 'reflection before action' considered superior according to the proverb?", a_th: ["เพราะเป็นการฝึกสมาธิ", "เพราะช่วยลดวิบากกรรมจากการกระทำผิดพลาด", "เพราะทำให้งานสำเร็จเร็วขึ้น", "เพราะเป็นการยอมรับความคิดผู้อื่น"], correct: 1, th: "ความประมาทเป็นทางแห่งความเสื่อม", detail: "การใคร่ครวญ (ปัญญา) ช่วยป้องกันความผิดพลาดที่ไม่อาจแก้ไขได้ในภายหลัง" },
            { q_th: "ชาดกเรื่องใดแสดงออกถึงความอดทน (ขันติบารมี) ในระดับสูงสุดต่อผู้อื่นที่มุ่งร้าย?", q_en: "Which Jataka story exhibits the highest level of patience toward adversaries?", a_th: ["วานรชาดก", "ขันติวาทีชาดก", "จันทกุมารชาดก", "กามชาดก"], correct: 1, th: "ขันติวาทีแปลว่าผู้ถือความอดทน", detail: "ขันติวาทีชาดกกล่าวถึงพระโพธิสัตว์ที่อดทนแม้ในขณะที่ถูกลงโทษโดยไม่เป็นธรรม" },
            { q_th: "ความแตกต่างที่สำคัญที่สุดระหว่าง 'กุศลกรรม' และ 'บุญ' คืออะไร?", q_en: "What is the key difference between 'Kusala' (wholesome) and 'Punna' (merit)?", a_th: ["กุศลเป็นนามธรรม บุญเป็นรูปธรรม", "กุศลคือความฉลาดทางจิต บุญคือการสะสมผลกำไรทางจิต", "ไม่มีความแตกต่างกัน", "กุศลต้องมีพิธีกรรม บุญไม่ต้องมี"], correct: 1, th: "กุศลคือสภาพจิตที่ดี บุญคือเครื่องชำระจิต", detail: "กุศลกรรมคือความฉลาด/ความถูกต้องทางจิต ส่วนบุญคือสิ่งที่ช่วยชำระล้างความชั่วออกจากใจ" },
            { q_th: "หลัก 'มิจฉาวณิชชา' (อาชีพที่ควรหลีกเลี่ยง) ในปัจจุบันสอดคล้องกับข้อใดมากที่สุด?", q_en: "Which modern activity best corresponds to 'Miccha Vanijja' (wrong livelihood)?", a_th: ["การซื้อขายอสังหาริมทรัพย์", "การผลิตอาวุธสงคราม", "การทำเกษตรอินทรีย์", "การรับราชการ"], correct: 1, th: "ทำลายชีวิตและศีลธรรม", detail: "มิจฉาวณิชชา 5 รวมถึงการค้าขายอาวุธ และการค้าชีวิตสัตว์" },
            { q_th: "ในพระรัตนตรัย 'พระธรรม' ในความหมายสูงสุดคือสิ่งใด?", q_en: "In the Triple Gem, what is 'Dhamma' in its ultimate sense?", a_th: ["พระไตรปิฎก", "หลักอริยสัจ 4", "กฎธรรมชาติและความจริงแท้ของชีวิต", "การสวดมนต์"], correct: 2, th: "ธรรมะคือความจริง", detail: "พระธรรมหมายถึง 'ธรรมนิยาม' หรือกฎแห่งธรรมชาติที่พระพุทธเจ้าค้นพบ" },
            { q_th: "เหตุการณ์ในวันมาฆบูชา 'จาตุรงคสันนิบาต' มีความหมายลึกซึ้งอย่างไร?", q_en: "What is the profound meaning of 'Chaturongkasantibat'?", a_th: ["การพบกันของ 4 กษัตริย์", "การรวมตัวโดยไม่ได้นัดหมายของพระอรหันต์ 1,250 รูป", "การแสดงธรรม 4 ข้อ", "การแบ่งศาสนาเป็น 4 นิกาย"], correct: 1, th: "ความพร้อมใจของพุทธสาวก", detail: "คือองค์ 4: พระสงฆ์ 1,250 รูป, เป็นเอหิภิกขุอุปสัมปทา, ไม่ได้นัดหมาย, วันเพ็ญเดือน 3" },
            { q_th: "พระพุทธศาสนาในประเทศไทยยุคแรกสุดได้รับอิทธิพลจากนิกายใดเป็นหลัก?", q_en: "Which sect primarily influenced early Buddhism in Thailand?", a_th: ["มหายาน", "เถรวาทแบบลังกาวงศ์", "วัชรยาน", "สรวาสติวาท"], correct: 1, th: "เชื่อมโยงกับลังกา", detail: "ได้รับอิทธิพลเถรวาทแบบลังกาวงศ์อย่างเข้มข้นในยุคสุโขทัย" },
            { q_th: "หลัก 'สัปปุริสธรรม 7' ข้อใดถือเป็นหัวใจของการอยู่ร่วมกันอย่างยั่งยืน?", q_en: "Which of the 7 Sappurisa-dhamma is the heart of sustainable coexistence?", a_th: ["มัตตัญญุตา", "อัตตัญญุตา", "ปริสัญญุตา", "ธัมมัญญุตา"], correct: 0, th: "ความรู้จักประมาณ", detail: "มัตตัญญุตา คือความรู้จักพอประมาณ ในการใช้ทรัพยากรและพฤติกรรม" },
            { q_th: "อะไรคือความแตกต่างระหว่าง 'สติ' และ 'สัมปชัญญะ'?", q_en: "Difference between Sati (mindfulness) and Sampajanna (clear comprehension)?", a_th: ["สติคือการระลึก สัมปชัญญะคือการรู้ตัว", "สติคือความเร็ว สัมปชัญญะคือความแม่น", "สติคือการคิด สัมปชัญญะคือการทำ", "ไม่มีข้อแตกต่าง"], correct: 0, th: "สติคือระลึก สัมปชัญญะคือรู้ตัว", detail: "สติคือการระลึกได้ สัมปชัญญะคือความรู้ชัดถึงประโยชน์และเหตุผลในสิ่งที่ทำ" },
            { q_th: "คำสอนเรื่อง 'โลกธรรม 8' เน้นให้ชาวพุทธฝึกจิตอย่างไร?", q_en: "How does 'Lokadhamma 8' train the Buddhist mind?", a_th: ["ให้หนีโลกไปบวช", "ให้ยอมรับความเปลี่ยนแปลงที่เป็นธรรมดาของโลก", "ให้แสวงหาลาภยศ", "ให้เชื่อในโชคชะตา"], correct: 1, th: "จิตที่มั่นคงไม่หวั่นไหว", detail: "ฝึกให้จิตเป็นอุเบกขา ไม่ฟูเมื่อมีลาภ/สรรเสริญ และไม่แฟบเมื่อเสื่อมลาภ/นินทา" },
            { q_th: "ศีล 5 ข้อที่ 4 เกี่ยวกับ 'มุสาวาท' หากพูดโกหกเพื่อช่วยเหลือผู้อื่น ถือเป็นบาปหรือไม่ในทางพุทธ?", q_en: "Is lying to help others considered a sin according to the 4th precept?", a_th: ["ไม่บาปเพราะเจตนาดี", "เป็นบาป เพราะเป็นการทำลายสัจจะ", "บาปเล็กน้อย", "ขึ้นอยู่กับความเชื่อ"], correct: 1, th: "ศีลคือการงดเว้น", detail: "ในทางศีลคือการกระทำที่ไม่ตรงความจริง แม้เจตนาดีแต่ถือว่าทำลายศีล" },
            { q_th: "หลัก 'อปริหานิยธรรม 7' เหมาะสำหรับใช้ในสถานการณ์ใด?", q_en: "When is 'Aparihaniyadhamma 7' most applicable?", a_th: ["การฝึกสมาธิคนเดียว", "การบริหารงานในองค์กรหรือหมู่คณะ", "การดูแลผู้ป่วย", "การศึกษาธรรมะ"], correct: 1, th: "หลักแห่งความไม่เสื่อม", detail: "เป็นหลักธรรมที่ใช้ในการบริหารหมู่คณะให้เจริญรุ่งเรืองและไม่เสื่อมถอย" },
            { q_th: "พุทธศาสนสุภาษิต 'ธมฺโม หเว รกฺขติ ธมฺมจารึ' สื่อถึงอะไร?", q_en: "What does 'Dhammo have rakkhati dhamma carim' mean?", a_th: ["คนทำบุญจะรวย", "ธรรมะย่อมรักษาผู้ประพฤติธรรม", "ธรรมะคือธรรมชาติ", "ความเชื่อช่วยรักษาโรค"], correct: 1, th: "ธรรมคือเกราะป้องกัน", detail: "ธรรมะจะคุ้มครองผู้ที่ปฏิบัติธรรมให้พ้นจากความชั่วและอันตราย" },
            { q_th: "ในทางพุทธศาสนา 'กรรม' หมายถึงอะไรที่แม่นยำที่สุด?", q_en: "What is the most precise definition of 'Karma'?", a_th: ["โชคชะตา", "เจตนาในการกระทำ", "ผลของงาน", "การทำพิธีกรรม"], correct: 1, th: "กรรมคือเจตนา", detail: "กรรมทางพุทธคือเจตนา (Intention) ทั้งทางกาย วาจา และใจ" },
            { q_th: "อะไรคือเป้าหมายสูงสุดของ 'วิปัสสนาภาวนา'?", q_en: "What is the ultimate goal of Vipassana meditation?", a_th: ["การเห็นนิมิต", "การเห็นสภาวะจริงของโลก (ไตรลักษณ์)", "การทำให้ตัวเบา", "การขอพรจากสิ่งศักดิ์สิทธิ์"], correct: 1, th: "ปัญญาเห็นความจริง", detail: "เพื่อถอนความยึดมั่นถือมั่นและเห็นความจริงตามธรรมชาติ (ไตรลักษณ์)" },
            { q_th: "พระพุทธเจ้าสอนเรื่อง 'กาลามสูตร' เพื่ออะไร?", q_en: "Why did the Buddha teach the 'Kalama Sutta'?", a_th: ["เพื่อให้เชื่อตามผู้ใหญ่", "เพื่อให้คนมีวิจารณญาณ ไม่เชื่ออะไรง่ายๆ", "เพื่อให้คนไปทำพิธีสะเดาะเคราะห์", "เพื่อให้คนเลิกทำบุญ"], correct: 1, th: "อย่าเพิ่งเชื่อตามๆ กันมา", detail: "เพื่อส่งเสริมการใช้ปัญญาตรวจสอบความจริงก่อนจะเชื่อสิ่งใด" },
            { q_th: "ข้อใดคือองค์ประกอบของ 'มรรค' ในส่วนของปัญญา (วิชชา)?", q_en: "Which path factor belongs to the Wisdom group?", a_th: ["สัมมาวายามะ", "สัมมาสติ", "สัมมาทิฏฐิ", "สัมมาอาชีวะ"], correct: 2, th: "ความเห็นชอบคือจุดเริ่มต้น", detail: "ปัญญาประกอบด้วย: สัมมาทิฏฐิ (เห็นชอบ) และสัมมาสังกัปปะ (ดำริชอบ)" },
            { q_th: "ทำไม 'การทำบุญ' จึงไม่ช่วยล้างกรรมชั่วที่เคยทำมาได้โดยตรง?", q_en: "Why can't 'merit-making' directly erase past bad Karma?", a_th: ["เพราะกรรมเป็นคนละส่วนกัน", "เพราะบุญมีน้อยเกินไป", "เพราะเทวดาไม่อนุญาต", "เพราะกรรมล้างได้ด้วยสมาธิเท่านั้น"], correct: 0, th: "กรรมใครกรรมมัน", detail: "กรรมคือการกระทำ บุญคือการกระทำใหม่ การทำบุญไม่ลบล้างผลของกรรมชั่วที่ได้รับไปแล้ว แต่ช่วยประคองชีวิต" },
            { q_th: "หลัก 'มโนกรรม' ในทางพุทธศาสนาจัดเป็นกรรมที่รุนแรงที่สุดเพราะอะไร?", q_en: "Why is 'Manokamma' (mental action) considered the most severe?", a_th: ["เพราะคนอื่นมองไม่เห็น", "เพราะเป็นบ่อเกิดของกายกรรมและวจีกรรม", "เพราะใช้พลังงานเยอะ", "เพราะเป็นกรรมที่แก้ไม่ได้"], correct: 1, th: "ใจเป็นนาย กายและวาจาเป็นบ่าว", detail: "เจตนาในใจเป็นจุดเริ่มต้นของทุกการกระทำ หากใจชั่ว การกระทำย่อมชั่วตาม" },
            { q_th: "การเวียนเทียนในวันสำคัญทางพุทธศาสนาสอดคล้องกับหลักธรรมใดมากที่สุด?", q_en: "Candle circumambulation aligns best with which principle?", a_th: ["กตัญญูกตเวที", "พระรัตนตรัย", "ไตรสิกขา", "อิทธิบาท 4"], correct: 1, th: "การบูชาพระรัตนตรัย", detail: "เป็นการแสดงความเคารพต่อพระพุทธ พระธรรม และพระสงฆ์" },
            { q_th: "พระอานนท์ได้รับการยกย่องว่าเป็น 'พุทธอุปัฏฐาก' ที่ดีที่สุดเพราะอะไร?", q_en: "Why is Ananda praised as the best attendant?", a_th: ["เพราะท่านหล่อที่สุด", "เพราะท่านจำคำสอนได้แม่นยำและเอาใจใส่ดูแลพระพุทธเจ้า", "เพราะท่านเป็นลูกพี่ลูกน้อง", "เพราะท่านบวชนานที่สุด"], correct: 1, th: "ขุมคลังแห่งพุทธพจน์", detail: "ท่านเป็นผู้มีความจำแม่นยำที่สุดเกี่ยวกับคำสอน (พหูสูต)" },
            { q_th: "หากท่านต้องสรุปหลักธรรมที่สำคัญที่สุดในการอยู่ร่วมกันในสังคม คือข้อใด?", q_en: "What is the most important principle for living together in society?", a_th: ["สังคหวัตถุ 4", "อริยสัจ 4", "ขันธ์ 5", "อายตนะ 6"], correct: 0, th: "ธรรมเครื่องยึดเหนี่ยวใจ", detail: "สังคหวัตถุ 4 (ทาน ปิยวาจา อัตถจริยา สมานัตตตา) คือวิธีสงเคราะห์และสร้างความสัมพันธ์ที่ดีกับผู้อื่น" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, index) => {
                area.innerHTML += `<div class='question-container' id='q${index}'>
                    <p><strong>ข้อที่ ${index + 1}:</strong> ${q.q_th}</p>
                    <div class='clue'>Tip: ${q.th}</div>
                    ${q.a_th.map((opt, i) => `<button onclick='check(${index}, ${i})' id='btn${index}_${i}'>${opt}</button>`).join('')}
                    <div class='detail hidden' id='d${index}' style='margin-top:10px; font-style:italic; color: #555;'><strong>เฉลย:</strong> ${q.detail}</div>
                </div>`;
            });
        }

        function check(qIdx, aIdx) {
            const btns = document.querySelectorAll(`#q${qIdx} button`);
            btns.forEach(b => b.disabled = true);
            const detail = document.getElementById(`d${qIdx}`);
            detail.classList.remove('hidden');
            if (aIdx === questions[qIdx].correct) {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('correct');
            } else {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('wrong');
                document.getElementById(`btn${qIdx}_${questions[qIdx].correct}`).classList.add('correct');
            }
        }

        function submitQuiz() {
            alert("ส่งข้อสอบเรียบร้อยแล้ว ระบบจำลองการสรุปคะแนนและส่งข้อมูลไปยังอีเมลผู้สอนครับ ขอบคุณครับ");
        }

        renderQuiz();
    </script>
</body>
</html>
