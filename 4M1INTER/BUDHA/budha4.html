<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค พระพุทธศาสนา ม.1 (ชุดที่ 4 - ระดับยาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f0f2f5; }
        .question-container { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { background: #e3f2fd; padding: 10px; font-weight: bold; color: #0d47a1; border-left: 5px solid #2196f3; margin: 10px 0; font-size: 0.9em; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #6c757d; background: white; transition: 0.3s; }
        button:hover { background: #f8f9fa; }
        .hidden { display: none; }
        .correct { background-color: #c8e6c9 !important; border-color: #2e7d32 !important; font-weight: bold; }
        .wrong { background-color: #ffcdd2 !important; border-color: #c62828 !important; }
        .detail { margin-top: 10px; padding: 10px; background: #fff9c4; border-radius: 5px; font-size: 0.95em; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">แบบทดสอบพระพุทธศาสนา ม.1 (ชุดที่ 4: ระดับยากพิเศษ)</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="width: 100%; background: #28a745; color: white; padding: 15px; font-size: 18px; border: none; margin-top: 20px;">สรุปคะแนนและส่งผลการเรียน</button>

    <script>
        const questions = [
            { q_th: "ในมรรค 8 องค์ประกอบใดจัดอยู่ในหมวด 'ปัญญา'?", a_th: ["สัมมาวายามะ, สัมมาสติ", "สัมมาทิฏฐิ, สัมมาสังกัปปะ", "สัมมาวาจา, สัมมากัมมันตะ", "สัมมาสมาธิ"], correct: 1, th: "เกี่ยวกับการเห็นและการดำริ", detail: "หมวดปัญญาประกอบด้วย สัมมาทิฏฐิ (เห็นชอบ) และ สัมมาสังกัปปะ (ดำริชอบ)" },
            { q_th: "ความแตกต่างที่สำคัญที่สุดระหว่าง 'หิริ' และ 'โอตตัปปะ' คืออะไร?", a_th: ["หิริกลัวคนรู้ โอตตัปปะกลัวบาป", "หิริละอายใจตนเอง โอตตัปปะเกรงกลัวผลบาป", "หิริเป็นศีล โอตตัปปะเป็นสมาธิ", "ไม่มีข้อแตกต่าง"], correct: 1, th: "ละอาย vs เกรงกลัว", detail: "หิริ คือ ความละอายต่อบาปในใจตน โอตตัปปะ คือ ความเกรงกลัวต่อผลของบาป" },
            { q_th: "สาเหตุหลักของการสังคายนาครั้งที่ 2 เกิดจากอะไร?", a_th: ["พระสงฆ์ตีความวินัยผิดเพี้ยน (เรื่องวัตถุ 10 ประการ)", "พระสงฆ์ทะเลาะกันเรื่องที่อยู่อาศัย", "การเผยแผ่ศาสนาไปต่างเมือง", "การแต่งตั้งพระสังฆราช"], correct: 0, th: "ความเห็นไม่ตรงกันในวินัยสงฆ์", detail: "เกิดจากกลุ่มพระวัชชีบุตรถือปฏิบัติในเรื่องวัตถุ 10 ประการที่ขัดกับพระธรรมวินัย" },
            { q_th: "หลัก 'ไตรลักษณ์' ข้อใดเป็นต้นเหตุที่ทำให้เกิดความทุกข์หากเรายึดมั่นถือมั่น?", a_th: ["อนิจจัง", "ทุกขัง", "อนัตตา", "ทุกข้อเป็นเหตุ"], correct: 3, th: "การยึดติดในสิ่งที่เปลี่ยนแปลง", detail: "ความทุกข์เกิดจากการไปยึดมั่นในสิ่งที่ไม่เที่ยง เป็นทุกข์ และไม่ใช่ตัวตน" },
            { q_th: "โอวาทปาติโมกข์เปรียบเสมือนหัวใจพระพุทธศาสนา ข้อใดไม่ใช่หลักการ 3?", a_th: ["การไม่ทำบาปทั้งปวง", "การทำกุศลให้ถึงพร้อม", "การทำจิตใจให้บริสุทธิ์ผ่องใส", "การทำบุญตักบาตรทุกเช้า"], correct: 3, th: "หลัก 3 ประการ", detail: "หัวใจพระพุทธศาสนาคือ 1.ไม่ทำบาป 2.ทำกุศล 3.ทำจิตใจให้บริสุทธิ์" },
            { q_th: "ในวันอาสาฬหบูชา เหตุใดจึงถือเป็นวันที่มี 'พระรัตนตรัย' ครบองค์ประกอบ?", a_th: ["เพราะเป็นวันที่มีพระพุทธเจ้าแสดงธรรม", "เพราะพระอัญญาโกณฑัญญะบรรลุธรรมและบวชเป็นพระสงฆ์รูปแรก", "เพราะเป็นวันพระเจ้าอโศกมหาราชสร้างวัด", "เพราะเป็นวันเกิดพระธรรม"], correct: 1, th: "เกิดพระสงฆ์องค์แรก", detail: "ครบองค์ 3 คือ พระพุทธ (ตรัสรู้แล้ว) พระธรรม (ธรรมจักรกัปปวัตตนสูตร) และพระสงฆ์ (โกณฑัญญะบวช)" },
            { q_th: "การพิจารณา 'โยนิโสมนสิการ' ในสถานการณ์ที่โกรธจัด ควรเริ่มจากจุดใด?", a_th: ["การตั้งสติแล้วมองเหตุปัจจัยที่ทำให้โกรธ", "การระบายความโกรธออก", "การขอโทษทันที", "การเพิกเฉย"], correct: 0, th: "มองหาเหตุปัจจัย", detail: "คือการคิดวิเคราะห์หาสาเหตุอย่างถูกวิธี ไม่ใช่อารมณ์" },
            { q_th: "คำว่า 'พระสงฆ์' ในพระรัตนตรัย หมายถึงใคร?", a_th: ["พระภิกษุทุกรูปที่ห่มเหลือง", "พระอริยสงฆ์ (ผู้บรรลุธรรม)", "พระผู้ใหญ่ในวัด", "คนทำหน้าที่สอนศาสนา"], correct: 1, th: "อริยบุคคล", detail: "หมายถึงหมู่พระอริยบุคคลที่ปฏิบัติดีปฏิบัติชอบ (สังฆคุณ)" },
            { q_th: "ความเชื่อในเรื่อง 'กรรม' ของพุทธศาสนา สอดคล้องกับหลักการใดมากที่สุด?", a_th: ["โชคชะตาลิขิต", "เหตุและผล", "อิทธิฤทธิ์", "การอ้อนวอน"], correct: 1, th: "กฎแห่งเหตุและผล", detail: "กรรมคือการกระทำ ซึ่งเป็นเหตุที่ส่งผลตามมา" },
            { q_th: "หากท่านต้องการมี 'สมาธิ' ในการเรียน ท่านควรใช้หลักธรรมใดเป็นพื้นฐาน?", a_th: ["อิทธิบาท 4", "สังคหวัตถุ 4", "อริยสัจ 4", "ศีล 5"], correct: 0, th: "ทางสู่ความสำเร็จ", detail: "อิทธิบาท 4 (ฉันทะ วิริยะ จิตตะ วิมังสา) คือหลักธรรมสู่ความสำเร็จ" },
            { q_th: "การไม่ดื่มสุรา (ศีลข้อ 5) สัมพันธ์โดยตรงกับหลักธรรมใดมากที่สุด?", a_th: ["สัมมาสมาธิ", "สติสัมปชัญญะ", "มหากรุณา", "ศรัทธา"], correct: 1, th: "ความไม่ประมาท", detail: "การดื่มสุราทำให้ขาดสติ เป็นต้นเหตุแห่งการผิดศีลข้ออื่นๆ" },
            { q_th: "อะไรคือความหมายที่แท้จริงของคำว่า 'นิพพาน'?", a_th: ["สถานที่สวยงามบนสวรรค์", "การดับกิเลสและความทุกข์อย่างสิ้นเชิง", "การหลับลึก", "การไปเกิดใหม่"], correct: 1, th: "การดับสนิท", detail: "นิพพาน คือ ความดับกิเลสและกองทุกข์" },
            { q_th: "ชาดกเรื่อง 'วิธูรบัณฑิต' สอนเรื่องอะไรเป็นสำคัญ?", a_th: ["ความกตัญญู", "ความซื่อสัตย์และการรักษาคำพูด", "การเสียสละตนเอง", "ความเพียรพยายาม"], correct: 1, th: "ธรรมานุธรรมปฏิบัติ", detail: "เน้นเรื่องการรักษาศีลธรรมและความซื่อสัตย์เป็นสำคัญ" },
            { q_th: "อริยสัจ 4 ข้อใดคือจุดหมายปลายทางที่พุทธศาสนิกชนต้องเข้าถึง?", a_th: ["ทุกข์", "สมุทัย", "นิโรธ", "มรรค"], correct: 2, th: "ความดับทุกข์", detail: "นิโรธ คือ ความดับทุกข์ เป็นเป้าหมายสูงสุด" },
            { q_th: "พระนางมหาปชาบดีเถรี มีความสำคัญอย่างไรต่อพุทธศาสนา?", a_th: ["เป็นพุทธมารดา", "เป็นผู้ก่อตั้งภิกษุณีสงฆ์", "เป็นผู้ให้กำเนิดพระธรรม", "เป็นผู้สร้างวัดแรก"], correct: 1, th: "ผู้นำภิกษุณี", detail: "ทรงเป็นสตรีคนแรกที่บวชเป็นภิกษุณี" },
            { q_th: "ความกตัญญูกตเวทีตามหลักพุทธศาสนา หมายถึงอะไร?", a_th: ["การรู้คุณและตอบแทนท่าน", "การให้เงินแก่พ่อแม่", "การกราบไหว้รูปปั้น", "การเชื่อฟังทุกอย่าง"], correct: 0, th: "รู้คุณและตอบแทน", detail: "กตัญญูคือรู้คุณ กตเวทีคือการตอบแทนคุณ" },
            { q_th: "ในทางพุทธศาสนา 'ความเชื่อ' (ศรัทธา) ต้องคู่กับสิ่งใดจึงจะเป็นศรัทธาที่ถูกต้อง?", a_th: ["ปัญญา", "ความกลัว", "อำนาจเงิน", "คนชักจูง"], correct: 0, th: "ศรัทธาต้องประกอบด้วยปัญญา", detail: "ศรัทธาที่ปราศจากปัญญา เรียกว่า 'ศรัทธาหลงงมงาย'" },
            { q_th: "การกราบแบบเบญจางคประดิษฐ์ อวัยวะที่ 5 ที่ต้องสัมผัสพื้นคืออะไร?", a_th: ["เข่า 2 มือ 2 หน้าผาก 1", "มือ 2 เท้า 2 หน้าผาก 1", "ศอก 2 เข่า 2 หน้าผาก 1", "ศีรษะ มือ เท้า"], correct: 0, th: "อวัยวะ 5 ส่วน", detail: "หน้าผาก 1, ฝ่ามือ 2, เข่า 2" },
            { q_th: "สัมมาสติ คือการมีสติในเรื่องใด?", a_th: ["สติรู้เท่าทันกาย เวทนา จิต และธรรม", "สติในการหาเงิน", "สติในการพูดโกหก", "สติในการนอน"], correct: 0, th: "สติปัฏฐาน 4", detail: "คือการระลึกรู้ใน กาย เวทนา จิต ธรรม" },
            { q_th: "คำว่า 'อนัตตา' แปลว่าอะไร?", a_th: ["ไม่เที่ยง", "เป็นทุกข์", "ไม่ใช่ตัวตน", "เป็นสุข"], correct: 2, th: "ไม่มีตัวตน", detail: "คือความไม่มีตัวตนถาวร" },
            { q_th: "ใครคือผู้ที่พระพุทธเจ้าทรงสรรเสริญว่าเป็น 'เอตทัคคะด้านผู้เลิศทางปัญญา'?", a_th: ["พระโมคคัลลานะ", "พระสารีบุตร", "พระอานนท์", "พระมหากัสสปะ"], correct: 1, th: "อัครสาวกเบื้องขวา", detail: "พระสารีบุตรได้รับยกย่องว่าเลิศทางปัญญา" },
            { q_th: "พระธรรมวินัย (พระไตรปิฎก) ปิฎกใดว่าด้วยหลักธรรมล้วนๆ?", a_th: ["พระวินัยปิฎก", "พระสุตตันตปิฎก", "พระอภิธรรมปิฎก", "ไม่มีข้อถูก"], correct: 2, th: "ธรรมะชั้นสูง", detail: "พระอภิธรรมปิฎก ว่าด้วยหลักธรรมล้วนๆ ไม่มีเรื่องราวประกอบ" },
            { q_th: "การปฏิบัติตนตามหลัก 'สังคหวัตถุ 4' ส่งผลอย่างไร?", a_th: ["ทำให้คนเกรงกลัว", "ทำให้คนรักใคร่และอยู่ร่วมกันได้", "ทำให้รวย", "ทำให้เป็นคนดัง"], correct: 1, th: "หลักธรรมเครื่องยึดเหนี่ยวใจ", detail: "สังคหวัตถุ 4 คือหลักธรรมเครื่องยึดเหนี่ยวใจคนให้รักกัน" },
            { q_th: "เหตุใดพระพุทธเจ้าจึงทรงอนุญาตให้ภิกษุสงฆ์จาริกไปเผยแผ่ศาสนา?", a_th: ["เพื่อความสนุกสนาน", "เพื่อประโยชน์สุขแก่มหาชน", "เพื่อสร้างอาณาจักร", "เพื่อหลบหนีความวุ่นวาย"], correct: 1, th: "เพื่อเกื้อกูลชาวโลก", detail: "เพื่อประโยชน์และความสุขแก่เทวดาและมนุษย์ทั้งหลาย" },
            { q_th: "หากเพื่อนชวนทำความชั่ว ท่านควรใช้หลักธรรมใดในการปฏิเสธตามพุทธวิธี?", a_th: ["ใช้ความรุนแรง", "หิริ-โอตตัปปะ", "ไม่สนใจ", "โกรธตอบ"], correct: 1, th: "ความละอายและเกรงกลัวต่อบาป", detail: "ใช้ความละอายต่อบาปเป็นเกราะป้องกันตนเอง" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, index) => {
                area.innerHTML += `<div class='question-container' id='q${index}'>
                    <p><strong>ข้อที่ ${index + 1}:</strong> ${q.q_th}</p>
                    <div class='clue'>แนวคิด: ${q.th}</div>
                    ${q.a_th.map((opt, i) => `<button onclick='check(${index}, ${i})' id='btn${index}_${i}'>${opt}</button>`).join('')}
                    <div class='detail hidden' id='d${index}'><strong>เฉลย:</strong> ${q.detail}</div>
                </div>`;
            });
        }

        function check(qIdx, aIdx) {
            const btns = document.querySelectorAll(`#q${qIdx} button`);
            btns.forEach(b => b.disabled = true);
            const detail = document.getElementById(`d${qIdx}`);
            detail.classList.remove('hidden');
            if (aIdx === questions[qIdx].correct) {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('correct');
            } else {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('wrong');
                document.getElementById(`btn${qIdx}_${questions[qIdx].correct}`).classList.add('correct');
            }
        }

        function submitQuiz() {
            alert("ระบบได้บันทึกคะแนนของท่านแล้ว โปรดดูเฉลยที่ด้านล่างของแต่ละข้อครับ");
        }

        renderQuiz();
    </script>
</body>
</html>
