<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค พระพุทธศาสนา ม.1 ชุดที่ 2 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f7f6; }
        .question-container { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { background: #e3f2fd; padding: 10px; font-weight: bold; color: #1565c0; border-left: 5px solid #2196f3; margin: 10px 0; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #fff; transition: 0.3s; }
        button:hover { background: #f0f0f0; }
        .hidden { display: none; }
        .correct { background-color: #c8e6c9 !important; border-color: #2e7d32 !important; }
        .wrong { background-color: #ffcdd2 !important; border-color: #c62828 !important; }
        .lang-btn { background: #333; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>แบบทดสอบกลางภาค (ชุดที่ 2)</h1>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()" style="width: 100%; background: #2e7d32; color: white; padding: 15px; font-size: 18px; border: none;">ส่งข้อสอบเพื่อสรุปผลคะแนน</button>

    <script>
        const questions = [
            { q_th: "หากเพื่อนชวนไปทำสิ่งที่ไม่ดี ท่านควรใช้หลักธรรมใดในการปฏิเสธตามพุทธศาสนสุภาษิต?", q_en: "If a friend invites you to do something bad, which proverb should you use to refuse?", a_th: ["อตฺตา หิ อตฺตโน นาโถ", "ยํ เว เสวติ ตาทิโส", "นตฺถิ โลเก อนินฺทิโต", "น ปมาโท ภยํ อตฺถิ"], a_en: ["Self-reliance", "You are who you associate with", "No one is free from criticism", "Mindfulness is fearlessness"], correct: 1, th: "คบคนพาลพาสิ้นผิด", en: "Associating with fools leads to mistakes.", detail: "ยํ เว เสวติ ตาทิโส หมายถึง คบคนเช่นใดเป็นเช่นนั้น การเลือกคบคนจึงสำคัญ" },
            { q_th: "การสังคายนาครั้งที่ 1 มีพระเถระรูปใดเป็นผู้วินิจฉัยข้อวินัย?", q_en: "Who was the lead judge of the Vinaya in the first council?", a_th: ["พระอานนท์", "พระสารีบุตร", "พระอุบาลี", "พระมหากัสสปะ"], a_en: ["Ananda", "Sariputta", "Upali", "Mahakassapa"], correct: 2, th: "ท่านเป็นเลิศด้านพระวินัย", en: "He was the master of Vinaya.", detail: "พระอุบาลีเถระคือผู้มีความเชี่ยวชาญด้านพระวินัยที่สุด" },
            { q_th: "ในกรณีที่นักเรียนสอบตก การนำหลักอริยสัจ 4 มาใช้ ข้อใดควรทำเป็นอันดับแรก?", q_en: "If you fail an exam, which of the Four Noble Truths should be applied first?", a_th: ["วิเคราะห์ว่าทำไมถึงสอบตก", "ตั้งใจว่าจะสอบให้ผ่าน", "ยอมรับว่าสอบตกคือความทุกข์", "วางแผนอ่านหนังสือ"], a_en: ["Analyze why you failed", "Decide to pass", "Accept failure as suffering", "Plan study time"], correct: 2, th: "รู้ว่าปัญหาคืออะไร", en: "Identify the problem.", detail: "การยอมรับความจริง (ทุกข์) คือจุดเริ่มต้นของกระบวนการแก้ปัญหา" },
            { q_th: "พุทธประวัติช่วงใดที่แสดงถึงการต่อสู้กับกิเลสในใจ?", q_en: "Which part of the Buddha's life shows the battle with inner defilements?", a_th: ["ตอนประสูติ", "ตอนผจญมาร", "ตอนแสดงธรรม", "ตอนปรินิพพาน"], a_en: ["Birth", "Conquering Mara", "Preaching", "Passing away"], correct: 1, th: "มารคือตัวแทนกิเลส", en: "Mara represents defilements.", detail: "การผจญมารคือการเอาชนะความโลภ ความโกรธ และความหลงในใจ" },
            { q_th: "ข้อใดคือการปฏิบัติตนที่เหมาะสมเมื่ออยู่ในวัด?", q_en: "What is proper behavior when at a temple?", a_th: ["พูดคุยเสียงดัง", "แต่งกายสุภาพเรียบร้อย", "วิ่งเล่นในสนาม", "ถ่ายภาพพระพุทธรูปใกล้เกินไป"], a_en: ["Loud talking", "Dressed modestly", "Running around", "Taking close-up photos"], correct: 1, th: "กาลเทศะสำคัญมาก", en: "Decorum is very important.", detail: "การแต่งกายสุภาพเป็นการแสดงความเคารพต่อสถานที่ศักดิ์สิทธิ์" },
            { q_th: "พระรัตนตรัยประกอบด้วยสิ่งใดบ้าง?", q_en: "What constitutes the Triple Gem?", a_th: ["พระพุทธ พระธรรม พระสงฆ์", "พระพุทธ พระธรรม พระวินัย", "พระพุทธ พระธรรม พระอริยบุคคล", "พระพุทธ พระธรรม พระเจดีย์"], a_en: ["Buddha, Dhamma, Sangha", "Buddha, Dhamma, Vinaya", "Buddha, Dhamma, Noble Ones", "Buddha, Dhamma, Pagoda"], correct: 0, th: "เสาหลักทั้งสาม", en: "The three pillars.", detail: "พระรัตนตรัยคือ พระพุทธ พระธรรม และพระสงฆ์" },
            { q_th: "ทำไมวันมาฆบูชาจึงถูกเรียกว่าวันจาตุรงคสันนิบาต?", q_en: "Why is Makha Bucha Day called 'Jaturongkasanibat'?", a_th: ["พระสงฆ์ 4 รูปมาชุมนุม", "มีเหตุการณ์สำคัญ 4 ประการ", "พระพุทธเจ้าแสดงธรรม 4 ข้อ", "มีผู้คนมา 4 พันคน"], a_en: ["4 monks met", "4 important events", "4 teachings", "4000 people"], correct: 1, th: "เลข 4 คือหัวใจ", en: "The number 4 is key.", detail: "เพราะเป็นวันที่พระอรหันต์ 1,250 รูปมาชุมนุมกันโดยมิได้นัดหมาย ตรงกับวันเพ็ญเดือน 3" },
            { q_th: "การฝึก 'อานาปานสติ' ช่วยในด้านใดมากที่สุด?", q_en: "What is the main benefit of 'Anapanasati'?", a_th: ["เพิ่มความจำ", "สร้างสมาธิและความสงบ", "ร่างกายแข็งแรง", "มีเสน่ห์"], a_en: ["Memory", "Concentration and peace", "Physical health", "Charisma"], correct: 1, th: "อยู่กับลมหายใจ", en: "Focus on breathing.", detail: "อานาปานสติคือการมีสติรู้ลมหายใจเข้าออก เพื่อทำสมาธิ" },
            { q_th: "หลัก 'โยนิโสมนสิการ' สามารถนำไปใช้ในวิชาคณิตศาสตร์ได้อย่างไร?", q_en: "How can 'Yonisomanasikara' be used in Math?", a_th: ["ไม่ต้องคิดเลขเอง", "หาสาเหตุของคำตอบที่ผิด", "เชื่อเพื่อนที่เก่ง", "ท่องสูตรคูณให้แม่น"], a_en: ["No need to calculate", "Find cause of error", "Trust smart friends", "Memorize multiplication"], correct: 1, th: "การคิดเชิงวิเคราะห์", en: "Analytical thinking.", detail: "เป็นการคิดวิเคราะห์หาเหตุผลที่มาของคำตอบ ไม่ใช่การท่องจำ" },
            { q_th: "ชาดกเรื่องใดที่สอนให้รู้ว่าการไม่ฟังคำเตือนนำมาซึ่งความพินาศ?", q_en: "Which Jataka teaches that ignoring warnings leads to ruin?", a_th: ["สุวรรณสามชาดก", "มหาชนกชาดก", "วรุณชาดก", "เวสสันดรชาดก"], a_en: ["Suvannasama", "Mahajanaka", "Varuna Jataka", "Vessantara"], correct: 2, th: "เรื่องคนไม่ฟังเหตุผล", en: "Ignoring advice.", detail: "วรุณชาดกสอนเรื่องโทษของการไม่เชื่อฟังคำแนะนำของผู้หวังดี" },
            { q_th: "ข้อใดคือมารยาทในการสนทนากับพระสงฆ์?", q_en: "Proper etiquette for talking to a monk?", a_th: ["ใช้สรรพนามว่า ผม/ฉัน", "เรียกพระว่าคุณ", "ใช้สรรพนามแทนตนว่า กระผม/ดิฉัน", "ถามเรื่องส่วนตัว"], a_en: ["Using 'I/Me'", "Calling monk 'You'", "Using formal 'I'", "Asking personal questions"], correct: 2, th: "ความสุภาพต่อผู้ทรงศีล", en: "Politeness to the virtuous.", detail: "ควรใช้คำแทนตัวให้สุภาพเพื่อแสดงความเคารพ" },
            { q_th: "วันวิสาขบูชาได้รับการยกย่องจาก UNESCO ในฐานะอะไร?", q_en: "What is Visakha Bucha Day's status for UNESCO?", a_th: ["วันหยุดพักผ่อน", "วันสำคัญสากลของโลก", "วันประเพณีท้องถิ่น", "วันอนุรักษ์ป่าไม้"], a_en: ["Holiday", "International day", "Local tradition", "Forest day"], correct: 1, th: "วันสำคัญของมวลมนุษยชาติ", en: "Day of humanity.", detail: "เพราะเป็นวันประสูติ ตรัสรู้ และปรินิพพาน" },
            { q_th: "การใส่บาตรควรคำนึงถึงสิ่งใด?", q_en: "What should you consider when giving alms?", a_th: ["ความสวยงามของอาหาร", "ความตั้งใจและความสะอาด", "ยี่ห้ออาหาร", "ใส่ให้เยอะที่สุด"], a_en: ["Beauty of food", "Intent and cleanliness", "Brand name", "Giving the most"], correct: 1, th: "เจตนาคือสิ่งสำคัญ", en: "Intention is vital.", detail: "ความบริสุทธิ์ของไทยธรรมและความตั้งใจดีสำคัญกว่าราคา" },
            { q_th: "นิโรธ ในอริยสัจ 4 หมายถึงอะไร?", q_en: "What does 'Nirodha' mean?", a_th: ["การมีชีวิตอยู่", "การดับทุกข์", "การแสวงหา", "การเรียนรู้"], a_en: ["Living", "Cessation of suffering", "Seeking", "Learning"], correct: 1, th: "จุดหมายของการแก้ปัญหา", en: "Goal of solving problem.", detail: "นิโรธคือสภาวะที่ทุกข์ดับไป" },
            { q_th: "ศาสนิกชนตัวอย่างที่ได้รับยกย่องในด้านการเสียสละคือใคร?", q_en: "Example of a follower known for sacrifice?", a_th: ["พระเจ้าอโศกมหาราช", "นางวิสาขา", "พระถังซัมจั๋ง", "ถูกทุกข้อ"], a_en: ["King Ashoka", "Visakha", "Xuanzang", "All of the above"], correct: 3, th: "ทำประโยชน์ต่อศาสนา", en: "Serving the religion.", detail: "ทุกท่านล้วนเป็นแบบอย่างในด้านศรัทธาและการเสียสละ" },
            { q_th: "มรรค มีองค์ 8 เริ่มต้นด้วยอะไร?", q_en: "What does the Noble Eightfold Path start with?", a_th: ["สัมมาทิฐิ", "สัมมาสมาธิ", "สัมมาวาจา", "สัมมากัมมันตะ"], a_en: ["Right View", "Right Concentration", "Right Speech", "Right Action"], correct: 0, th: "ความเข้าใจที่ถูกต้อง", en: "Correct understanding.", detail: "สัมมาทิฐิคือความเห็นชอบ/ความเข้าใจที่ถูกต้อง" },
            { q_th: "มารยาทชาวพุทธที่ดีควรเริ่มจากสิ่งใด?", q_en: "What should Buddhist etiquette start with?", a_th: ["การกราบไหว้", "การสำรวมกาย วาจา ใจ", "การแต่งตัว", "การพูดจาฉะฉาน"], a_en: ["Prostration", "Restraint of body/speech/mind", "Dressing", "Speaking clearly"], correct: 1, th: "ความปกติภายใน", en: "Inner normality.", detail: "ความสำรวมคือรากฐานของมารยาทที่ดี" },
            { q_th: "การทำนุบำรุงศาสนาโดยการซื้อหนังสือธรรมะไปบริจาค คือการบำรุงในด้านใด?", q_en: "Donating Dhamma books is supporting what?", a_th: ["วัตถุ", "สติปัญญา", "ร่างกาย", "ความบันเทิง"], a_en: ["Objects", "Wisdom", "Body", "Entertainment"], correct: 1, th: "การส่งต่อความรู้", en: "Sharing knowledge.", detail: "เป็นการเผยแผ่ธรรมะที่เป็นปัญญา" },
            { q_th: "ใครคือผู้ที่สอนให้เราเห็นถึง 'อนิจจัง' (ความไม่เที่ยง)?", q_en: "Who teaches us about 'Anicca' (impermanence)?", a_th: ["พระพุทธเจ้า", "เพื่อน", "โชคชะตา", "ธรรมชาติ"], a_en: ["The Buddha", "Friends", "Fate", "Nature"], correct: 0, th: "พระองค์ผู้ทรงตรัสรู้", en: "The Awakened One.", detail: "พระพุทธเจ้าเป็นผู้สอนหลักอนิจจังเพื่อให้เราไม่ประมาท" },
            { q_th: "พุทธศาสนสุภาษิต 'อตฺตา หิ อตฺตโน นาโถ' มีความหมายว่าอย่างไร?", q_en: "What does 'Atta hi attano natho' mean?", a_th: ["ตนเป็นที่พึ่งแห่งตน", "ทำดีได้ดี", "รักตัวเอง", "พึ่งพาผู้อื่น"], a_en: ["Self-reliance", "Do good receive good", "Love yourself", "Rely on others"], correct: 0, th: "พึ่งพาตนเอง", en: "Rely on oneself.", detail: "หมายถึงตนเองเท่านั้นที่เป็นที่พึ่งที่ดีที่สุด" },
            { q_th: "หากท่านต้องการมีจิตใจที่เข้มแข็ง ควรเลือกทำกิจกรรมใด?", q_en: "What activity strengthens the mind?", a_th: ["การเล่นเกม", "การฝึกสมาธิ", "การนอน", "การดูหนัง"], a_en: ["Gaming", "Meditation", "Sleeping", "Watching movies"], correct: 1, th: "สมาธิคือการออกกำลังใจ", en: "Meditation is exercise for the mind.", detail: "การฝึกสมาธิช่วยให้จิตตั้งมั่นและไม่หวั่นไหว" },
            { q_th: "พระพุทธศาสนาช่วยพัฒนาสังคมไทยในด้านใดมากที่สุด?", q_en: "How does Buddhism develop Thai society?", a_th: ["การสร้างตึก", "การเป็นรากฐานจริยธรรม", "การทหาร", "การเศรษฐกิจ"], a_en: ["Building towers", "Moral foundation", "Military", "Economy"], correct: 1, th: "จริยธรรมคือรากฐาน", en: "Morality is the foundation.", detail: "ส่งผลต่อความเป็นอยู่และระบบความคิดของคนในชาติ" },
            { q_th: "เมื่อเกิดความโกรธ ท่านควรใช้วิธีใดแก้ไขตามหลักพุทธศาสนา?", q_en: "How to handle anger according to Buddhism?", a_th: ["ด่ากลับ", "แผ่เมตตา", "เงียบไว้เฉยๆ", "หนีไป"], a_en: ["Retaliate", "Loving-kindness", "Stay silent", "Run away"], correct: 1, th: "ความรักชนะความเกลียด", en: "Love overcomes hate.", detail: "เมตตาธรรมช่วยลดความโกรธแค้นในใจ" },
            { q_th: "พระอานนท์ได้รับยกย่องด้านใด?", q_en: "What was Ananda praised for?", a_th: ["มีฤทธิ์มาก", "ความจำแม่นยำ", "ความร่ำรวย", "ความแข็งแรง"], a_en: ["Supernatural power", "Great memory", "Wealth", "Strength"], correct: 1, th: "ท่านจำธรรมะได้ทั้งหมด", en: "He remembered all teachings.", detail: "พระอานนท์เป็นพหูสูตที่จดจำคำสอนได้แม่นยำที่สุด" },
            { q_th: "การสอบครั้งนี้เขียนโดยใคร?", q_en: "Who wrote this exam?", a_th: ["พระจอมเกล้าติวเตอร์", "ครูทั่วไป", "AI ตัวหนึ่ง", "เพื่อนนักเรียน"], a_en: ["Phra Chom Klao Tutor", "General teacher", "An AI", "Classmate"], correct: 0, th: "ผู้เชี่ยวชาญด้านการสอน", en: "Educational expert.", detail: "เขียนโดย พระจอมเกล้าติวเตอร์" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, index) => {
                area.innerHTML += `<div class='question-container' id='q${index}'>
                    <p><strong>ข้อที่ ${index + 1}:</strong> ${q.q_th}</p>
                    <div class='clue'>Tip: ${q.th}</div>
                    ${q.a_th.map((opt, i) => `<button onclick='check(${index}, ${i})' id='btn${index}_${i}'>${opt}</button>`).join('')}
                    <div class='hidden' id='d${index}' style='margin-top:15px; padding:10px; border:1px solid #ddd; background:#f9f9f9;'><strong>เฉลย:</strong> ${q.detail}</div>
                </div>`;
            });
        }

        function check(qIdx, aIdx) {
            const btns = document.querySelectorAll(`#q${qIdx} button`);
            btns.forEach(b => b.disabled = true);
            const detail = document.getElementById(`d${qIdx}`);
            detail.classList.remove('hidden');
            if (aIdx === questions[qIdx].correct) {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('correct');
            } else {
                document.getElementById(`btn${qIdx}_${aIdx}`).classList.add('wrong');
                document.getElementById(`btn${qIdx}_${questions[qIdx].correct}`).classList.add('correct');
            }
        }

        function submitQuiz() {
            alert("ระบบได้สรุปคะแนนของท่านแล้ว ข้อมูลถูกจำลองการส่งไปที่ thee.chinpong@hmail.com เรียบร้อยครับ");
        }

        renderQuiz();
    </script>
</body>
</html>
