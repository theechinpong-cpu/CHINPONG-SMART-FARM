<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ข้อสอบวิทยาศาสตร์ ม.1</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ccc; cursor: pointer; border-radius: 5px; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .answer-box { margin-top: 10px; padding: 10px; background: #f9f9f9; display: none; }
        .tip { color: #e74c3c; font-weight: bold; }
        #summary { margin-top: 20px; padding: 20px; border-top: 2px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <button onclick="toggleLang()">Switch Language (TH/EN)</button>
        <h1 id="title">แนวข้อสอบวิทยาศาสตร์ ม.1</h1>
        <div id="quiz-area"></div>
        <div id="summary"></div>
    </div>

    <script>
        let lang = 'th';
        const questions = [
            {
                q_th: "การตั้งสมมติฐานที่ดีควรเป็นอย่างไร?",
                q_en: "What characterizes a good hypothesis?",
                a_th: ["เป็นการคาดเดาแบบสุ่ม", "ต้องสามารถตรวจสอบได้", "เป็นความจริงที่สรุปแล้ว", "ต้องใช้ทฤษฎีระดับโลก"],
                a_en: ["Random guess", "Testable", "Proven fact", "Global theory"],
                correct: 1,
                th: "สมมติฐานคือการคาดคะเนที่มีเหตุผลและทดสอบได้",
                en: "Hypothesis is a logical and testable prediction.",
                detail: "สมมติฐานต้องเป็นข้อความที่ระบุความสัมพันธ์ระหว่างตัวแปรที่พิสูจน์ได้"
            }
            // ... (สำหรับข้อสอบ 25 ข้อ สามารถขยาย Array นี้ได้)
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = '';
            questions.forEach((q, i) => {
                area.innerHTML += `
                    <div class="question-container" id="q${i}">
                        <p><strong>${i+1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                        ${(lang === 'th' ? q.a_th : q.a_en).map((opt, j) => `
                            <div class="option" onclick="checkAnswer(${i}, ${j})">${opt}</div>
                        `).join('')}
                        <div class="answer-box" id="ans${i}">
                            <p class="tip">${lang === 'th' ? 'คำใบ้: ' : 'Tip: '}${lang === 'th' ? q.th : q.en}</p>
                            <p>${q.detail}</p>
                        </div>
                    </div>
                `;
            });
        }

        function checkAnswer(qIdx, optIdx) {
            const q = questions[qIdx];
            const options = document.getElementById(`q${qIdx}`).getElementsByClassName('option');
            document.getElementById(`ans${qIdx}`).style.display = 'block';
            
            for(let i=0; i<4; i++) options[i].style.pointerEvents = 'none';
            
            if(optIdx === q.correct) options[optIdx].classList.add('correct');
            else {
                options[optIdx].classList.add('wrong');
                options[q.correct].classList.add('correct');
            }
            
            if(document.querySelectorAll('.correct').length === questions.length) sendEmail();
        }

        function toggleLang() {
            lang = lang === 'th' ? 'en' : 'th';
            renderQuiz();
        }

        function sendEmail() {
            alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
            console.log("Simulating email to: thee.chinpong@hmail.com");
        }

        renderQuiz();
    </script>
</body>
</html>
