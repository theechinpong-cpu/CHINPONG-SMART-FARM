<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบวิทยาศาสตร์ ม.1 - Science Solution</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .controls { text-align: center; margin-bottom: 20px; }
        .question { margin-top: 30px; font-weight: bold; background: #fff; padding: 15px; border-radius: 8px; }
        .options { margin-left: 20px; cursor: pointer; }
        .answer-box { margin-top: 10px; padding: 10px; background: #e8f8f5; border-left: 5px solid #27ae60; display: none; }
        .btn { padding: 10px 20px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; }
        
        /* สลับภาษาด้วย Class */
        body.lang-th .lang-en { display: none; }
        body.lang-th .lang-th { display: inline; }
        body.lang-en .lang-en { display: inline; }
        body.lang-en .lang-th { display: none; }
    </style>
</head>
<body class="lang-en">

    <h1>แบบทดสอบวิทยาศาสตร์ ม.1</h1>
    <div class="controls">
        <button class="btn" onclick="toggleLanguage()">Switch Language (EN/TH)</button>
    </div>

    <div id="quizContainer"></div>

    <script>
        const questions = [
            { q: "What is the first step in the scientific method?", a: ["Hypothesis", "Observation/Question", "Experiment", "Conclusion"], en: "Observation comes first.", th: "การสังเกตคือขั้นตอนแรก" },
            { q: "Which tool measures liquid volume accurately?", a: ["Beaker", "Graduated cylinder", "Test tube", "Petri dish"], en: "Graduated cylinder is for precision.", th: "กระบอกตวงมีความแม่นยำสูง" },
            { q: "What is a 'Hypothesis'?", a: ["Fact", "Scientific law", "Tentative prediction", "Final result"], en: "It's an educated guess.", th: "คือการคาดคะเนที่มีเหตุผล" },
            { q: "Which is a qualitative observation?", a: ["10 cm tall", "100°C boiling point", "Bright blue color", "50 grams"], en: "Color is qualitative.", th: "สีเป็นเชิงคุณภาพ" },
            { q: "Why control variables?", a: ["To be fast", "To test one variable only", "To save money", "To skip steps"], en: "Fair test requires constant variables.", th: "เพื่อให้การทดลองยุติธรรม" },
            { q: "What is a Pure Substance?", a: ["Mixture", "Constant properties", "Easily separated", "Any solution"], en: "It has fixed properties.", th: "มีสมบัติคงที่" },
            { q: "Which is an element?", a: ["Water", "CO2", "Oxygen", "Salt water"], en: "Oxygen (O2) is an element.", th: "ออกซิเจนเป็นธาตุ" },
            { q: "Formula for density?", a: ["Mass x Volume", "Mass / Volume", "Volume / Mass", "Force / Area"], en: "Density = Mass divided by Volume.", th: "ความหนาแน่น = มวลหารปริมาตร" },
            { q: "How to separate solid from liquid?", a: ["Distillation", "Chromatography", "Filtration", "Sublimation"], en: "Filtration catches the solid.", th: "การกรองแยกของแข็งออกจากของเหลว" },
            { q: "What is a Compound?", a: ["Chemically bonded elements", "Physical mix", "Single atom", "Metal alloy"], en: "Elements bond chemically.", th: "ธาตุรวมตัวกันทางเคมี" },
            { q: "Density of 20g in 4cm³?", a: ["5 g/cm³", "80 g/cm³", "0.2 g/cm³", "16 g/cm³"], en: "20 / 4 = 5.", th: "20 หาร 4 ได้ 5" },
            { q: "Separation by boiling point?", a: ["Filtration", "Distillation", "Magnet", "Decantation"], en: "Distillation uses boiling points.", th: "การกลั่นใช้จุดเดือดที่ต่างกัน" },
            { q: "Powerhouse of the cell?", a: ["Nucleus", "Mitochondria", "Ribosome", "Cell wall"], en: "Mitochondria produces energy.", th: "ไมโทคอนเดรียสร้างพลังงาน" },
            { q: "Unique to plant cells?", a: ["Nucleus", "Cell wall/Chloroplasts", "Vacuoles", "Membrane"], en: "Plants have rigid walls.", th: "เซลล์พืชมีผนังเซลล์" },
            { q: "Water movement across membrane?", a: ["Diffusion", "Osmosis", "Active transport", "Photosynthesis"], en: "Osmosis is water movement.", th: "ออสโมซิสคือการแพร่ของน้ำ" },
            { q: "Function of chloroplast?", a: ["Protein", "Respiration", "Photosynthesis", "Storage"], en: "Chloroplast makes food.", th: "คลอโรพลาสต์สังเคราะห์แสง" },
            { q: "Transports water in plants?", a: ["Phloem", "Xylem", "Root hairs", "Stomata"], en: "Xylem carries water.", th: "ไซเล็มลำเลียงน้ำ" },
            { q: "What plants need for photosynthesis?", a: ["Oxygen/Glucose", "CO2/Water/Sun", "Nitrogen/Soil", "Sugar/Protein"], en: "Light + CO2 + Water.", th: "แสง+คาร์บอนไดออกไซด์+น้ำ" },
            { q: "Function of cell membrane?", a: ["Controls entry", "Energy", "Sun protection", "Storage"], en: "It regulates traffic.", th: "ควบคุมสารเข้าออกเซลล์" },
            { q: "Average kinetic energy?", a: ["Heat", "Temperature", "Density", "Mass"], en: "Temperature = kinetic energy.", th: "อุณหภูมิคือพลังงานจลน์เฉลี่ย" },
            { q: "Heat transfer in fluids?", a: ["Conduction", "Convection", "Radiation", "Expansion"], en: "Convection is in fluids.", th: "การพาความร้อนเกิดในของไหล" },
            { q: "Heat transfer in vacuum?", a: ["Conduction", "Convection", "Radiation", "Insulation"], en: "Radiation travels through space.", th: "การแผ่รังสีไม่ต้องใช้ตัวกลาง" },
            { q: "Particles when heated?", a: ["Slower", "Faster", "Stop", "Condense"], en: "Heat increases speed.", th: "ความร้อนทำให้เร็วขึ้น" },
            { q: "Thermal Equilibrium?", a: ["Same temp", "No heat move", "Melting", "Boiling"], en: "Temps become equal.", th: "อุณหภูมิเท่ากัน" },
            { q: "Good heat insulator?", a: ["Copper", "Aluminum", "Plastic/Wood", "Iron"], en: "Non-metals are poor conductors.", th: "พลาสติก/ไม้เป็นฉนวน" }
        ];

        const container = document.getElementById('quizContainer');
        questions.forEach((item, index) => {
            let qNum = index + 1;
            container.innerHTML += `
                <div class="question">Q${qNum}. ${item.q}</div>
                <ol class="options">
                    ${item.a.map(opt => `<li onclick="this.parentElement.nextElementSibling.style.display='block'">${opt}</li>`).join('')}
                </ol>
                <div id="a${qNum}" class="answer-box">
                    <strong>Tip/Explanation:</strong> 
                    <span class="lang-en">${item.en}</span>
                    <span class="lang-th">${item.th}</span>
                </div>
            `;
        });

        function toggleLanguage() {
            const body = document.body;
            if (body.classList.contains('lang-en')) {
                body.classList.remove('lang-en');
                body.classList.add('lang-th');
            } else {
                body.classList.remove('lang-th');
                body.classList.add('lang-en');
            }
        }
    </script>
</body>
</html>
