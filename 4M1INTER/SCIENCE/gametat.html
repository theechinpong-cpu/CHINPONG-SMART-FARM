<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เกมจับคู่ธาตุ - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfbf7; }
        .game-container { display: flex; gap: 50px; margin-top: 20px; }
        .box { width: 150px; min-height: 300px; border: 2px dashed #333; padding: 10px; }
        .item { padding: 10px; margin: 5px; background: #fff; border: 1px solid #999; cursor: grab; text-align: center; }
    </style>
</head>
<body>
    <h2>เกมจับคู่: ธาตุและชื่อเรียก (Drag & Drop)</h2>
    <div class="game-container">
        <div><h3>ธาตุ (Symbol)</h3>
            <div id="symbols" class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div id="d1" class="item" draggable="true" ondragstart="drag(event)">H</div>
                <div id="d2" class="item" draggable="true" ondragstart="drag(event)">Li</div>
                <div id="d3" class="item" draggable="true" ondragstart="drag(event)">Be</div>
                <div id="d4" class="item" draggable="true" ondragstart="drag(event)">F</div>
                <div id="d5" class="item" draggable="true" ondragstart="drag(event)">He</div>
            </div>
        </div>
        <div><h3>ชื่อเต็ม (Name)</h3>
            <div id="names" class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div id="n1" class="item" draggable="true" ondragstart="drag(event)">ไฮโดรเจน</div>
                <div id="n2" class="item" draggable="true" ondragstart="drag(event)">ลิเทียม</div>
                <div id="n3" class="item" draggable="true" ondragstart="drag(event)">เบริลเลียม</div>
                <div id="n4" class="item" draggable="true" ondragstart="drag(event)">ฟลูออรีน</div>
                <div id="n5" class="item" draggable="true" ondragstart="drag(event)">ฮีเลียม</div>
            </div>
        </div>
    </div>
    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) { ev.preventDefault(); var data = ev.dataTransfer.getData("text"); ev.target.appendChild(document.getElementById(data)); }
    </script>
    <p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
