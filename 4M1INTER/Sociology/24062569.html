<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Advanced Sociology Assessment</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ccc; cursor: pointer; border-radius: 5px; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .answer-box { margin-top: 10px; padding: 10px; background: #f9f9f9; display: none; border-left: 5px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sociology: This is Me (Advanced Level)</h1>
        <div id="quiz-area"></div>
        <div id="analysis"></div>
    </div>
    <script>
        const questions = [
            { q: "ทฤษฎี Dramaturgy ของ Goffman มองว่าสังคมเป็นอะไร?", a: ["เวทีการแสดง", "ระบบเศรษฐกิจ", "โครงสร้างทางชีวภาพ", "วงจรของธรรมชาติ"], c: 0, d: "มนุษย์ต้องแสดงบทบาทตามบริบท", tip: "ชีวิตคือละคร บทบาทคือหน้ากาก" },
            { q: "Impression Management หมายถึงอะไร?", a: ["การจัดกลุ่มคน", "การควบคุมภาพลักษณ์", "การลดภาระสมอง", "การจำแนกสถานะ"], c: 1, d: "การจัดการภาพลักษณ์เพื่อให้ผู้อื่นรับรู้ตามต้องการ", tip: "สร้างความประทับใจ คือการสร้างบทบาท" },
            { q: "Front Stage แตกต่างจาก Back Stage อย่างไร?", a: ["ความเป็นส่วนตัว", "ความเร็วในการประมวลผล", "การใช้กริยา be", "การลดตัวแปร"], c: 0, d: "Front คือเวทีสาธารณะ Back คือพื้นที่ส่วนตัว", tip: "หน้าฉาก vs หลังฉาก" },
            { q: "กริยา 'be' ในทางสังคมวิทยาทำหน้าที่อะไร?", a: ["เชื่อมบทบาทและสถานะ", "ระบุเวลา", "ทำลายโครงสร้าง", "ขยายอารมณ์"], c: 0, d: "ใช้ประกาศตัวตนให้สอดคล้องกับสถานะ", tip: "Be = ผมคือใครในสังคมนี้" },
            { q: "การทำ Social Categorization ก่อให้เกิดสิ่งใด?", a: ["Stereotypes", "Role Freedom", "Scientific Truth", "Global Peace"], c: 0, d: "เป็นการจัดประเภทคนตามความเข้าใจเดิม", tip: "เหมารวมคือทางลัดที่อันตราย" },
            { q: "อัตลักษณ์แบบ 'Fluid' สะท้อนถึงสิ่งใด?", a: ["ความยืดหยุ่นทางบทบาท", "ความเชื่อมั่นในอดีต", "กฎหมายที่ตายตัว", "ความไม่มั่นคงของชีวิต"], c: 0, d: "ปรับเปลี่ยนตามสถานการณ์และเวลา", tip: "ลื่นไหล ไม่หยุดนิ่ง" },
            { q: "เมื่อตัวตนขัดแย้งกัน (Role Conflict) ควรแก้ปัญหาอย่างไร?", a: ["ปรับ Impression Management", "หนีจากสังคม", "ท่องจำทฤษฎี", "ยกเลิกบทบาททั้งหมด"], c: 0, d: "ปรับการแสดงออกให้เหมาะกับผู้ชม", tip: "ยืดหยุ่นคือทางรอด" },
            { q: "เป้าหมายสูงสุดของการศึกษา Sociology คือ?", a: ["เข้าใจพฤติกรรมมนุษย์", "การสร้างเครื่องจักร", "คำนวณความเร็ว", "การแยกธาตุสาร"], c: 0, d: "เพื่อให้เข้าใจความสัมพันธ์ระหว่างตนเองและสังคม", tip: "มองโลกให้กว้างกว่าตัวเอง" },
            { q: "การที่บุคคลเปลี่ยน 'หน้ากาก' ตามผู้ฟัง เรียกว่าอะไร?", a: ["การแสดงตามบทบาท", "การเสียตัวตน", "การปฏิวัติสังคม", "การเลียนแบบโดยไม่คิด"], c: 0, d: "คือการบริหารจัดการตนเองในแต่ละสถานการณ์", tip: "หน้ากาก = โอกาส" },
            { q: "อะไรคือความต่างระหว่าง Personality และ Identity?", a: ["บุคลิกภายใน vs บทบาทสังคม", "ความจำ vs การเรียนรู้", "สารบริสุทธิ์ vs สารผสม", "มวล vs ปริมาตร"], c: 0, d: "Personality คือตัวตนภายใน Identity คือภาพที่สังคมมอง", tip: "ข้างใน vs ข้างนอก" },
            { q: "ในสมการ I-C-E, 'E' คืออะไร?", a: ["Expression (การแสดงออก)", "Energy (พลังงาน)", "Evaluation (การประเมิน)", "Education (การศึกษา)"], c: 0, d: "การแสดงออกที่สื่อถึงสถานะ", tip: "แสดงออกให้ชัด" },
            { q: "การทำความเข้าใจ 'Stereotype' มีประโยชน์อย่างไร?", a: ["ลดความเสี่ยงจากการตัดสินผิดพลาด", "ช่วยให้เกลียดคนง่ายขึ้น", "ไม่มีประโยชน์เลย", "ทำให้เรียนภาษาเก่งขึ้น"], c: 0, d: "เพื่อตระหนักและก้าวข้ามการตัดสินคน", tip: "รู้จักเพื่อเปลี่ยน" },
            { q: "อะไรคือตัวบ่งชี้ของบทบาททางสังคม (Social Role)?", a: ["ความคาดหวังของผู้อื่น", "กฎหมายฟิสิกส์", "จำนวนออร์แกเนลล์", "อุณหภูมิห้อง"], c: 0, d: "สังคมคาดหวังให้เราแสดงออกอย่างไร", tip: "สังคม = ผู้กำกับ" },
            { q: "กริยา 'be' เปลี่ยนแปลงสถานะตัวตนได้อย่างไร?", a: ["เปลี่ยนประธานไปสู่สถานะใหม่", "ไม่เปลี่ยนแปลง", "ทำลายไวยากรณ์", "ทำให้สับสน"], c: 0, d: "เช่น 'I am a student' คือการนิยามตนเอง", tip: "Be = นิยาม" },
            { q: "ทำไมมนุษย์จึงต้องแสดงละครทางสังคม?", a: ["เพื่อความอยู่รอดทางสังคม", "เพื่อความสนุก", "ไม่มีเหตุผล", "เพื่อโกหก"], c: 0, d: "เพื่อให้ยอมรับและอยู่ในกลุ่มได้", tip: "การยอมรับคือเป้าหมาย" },
            { q: "อะไรคืออันตรายที่สุดของการสวมบทบาทตลอดเวลา?", a: ["การสูญเสียตัวตนที่แท้จริง", "ความดันเลือด", "โรคกระเพาะ", "การเรียนไม่เก่ง"], c: 0, d: "อาจลืมไปว่าตัวตนที่แท้จริงคืออะไร", tip: "อย่าลืมถอดหน้ากากที่บ้าน" },
            { q: "ในสถานการณ์ 'Back Stage' บุคคลจะทำอย่างไร?", a: ["ผ่อนคลายจากบทบาท", "แสดงอย่างเคร่งครัด", "แต่งหน้า", "พูดจาเป็นทางการ"], c: 0, d: "เป็นตัวของตัวเองได้มากที่สุด", tip: "พื้นที่ปลอดภัย" },
            { q: "สิ่งใดไม่ใช่กลไกของ Impression Management?", a: ["การคำนวณแรงลัพธ์", "การแต่งกาย", "การใช้ภาษากาย", "การคัดเลือกคำพูด"], c: 0, d: "การคำนวณแรงเป็นวิชาฟิสิกส์", tip: "สังคมไม่ใช่ฟิสิกส์" },
            { q: "ทำไมอัตลักษณ์ถึงต้องมีบริบท (Context)?", a: ["เพราะความหมายเปลี่ยนตามสถานการณ์", "ไม่มีเหตุผล", "เพราะเป็นกฎ", "เพื่อความสวยงาม"], c: 0, d: "บทบาทของหมอที่โรงพยาบาลต่างจากที่บ้าน", tip: "เวลาและสถานที่สำคัญที่สุด" },
            { q: "การศึกษา Sociology ช่วยในการเรียนวิทยาศาสตร์อย่างไร?", a: ["สร้างทักษะการวิเคราะห์ระบบ", "ไม่มีความเกี่ยวข้องกัน", "ช่วยให้ท่องสูตรแม่น", "ช่วยให้ทำ Lab เร็วขึ้น"], c: 0, d: "ช่วยให้มองโครงสร้างและความสัมพันธ์ของระบบ", tip: "ทุกอย่างเป็นระบบ" },
            { q: "กริยา 'be' สามารถนำไปใช้สร้างความมั่นใจอย่างไร?", a: ["พูดคำยืนยันตนเอง (Affirmation)", "พูดกับตัวเองในใจ", "เลิกพูด", "พูดภาษาอื่น"], c: 0, d: "การนิยามตนเองเชิงบวก", tip: "I am confident!" },
            { q: "ความหมายของ 'Socialization' คือ?", a: ["การกล่อมเกลาทางสังคม", "การเรียนทำอาหาร", "การออกกำลังกาย", "การเล่นละคร"], c: 0, d: "การเรียนรู้บรรทัดฐานสังคม", tip: "สังคมสอนเรา" },
            { q: "ทำไมเราควรตระหนักถึง 'Social Construction'?", a: ["เพื่อให้เข้าใจว่าสังคมสร้างความหมายได้", "เพื่อทำลายสังคม", "ไม่มีประโยชน์", "เพื่อเพิ่มการท่องจำ"], c: 0, d: "เพื่อไม่ให้เชื่อสิ่งที่สังคมยัดเยียดโดยไม่คิด", tip: "อย่าเชื่อทุกอย่างที่เห็น" },
            { q: "ในฐานะนักเรียน ความคาดหวังทางสังคมคืออะไร?", a: ["ความรับผิดชอบและการเรียนรู้", "การแสดงละคร", "การทำธุรกิจ", "การขัดแย้งกับครู"], c: 0, d: "สังคมคาดหวังให้ทำหน้าที่นักเรียน", tip: "รู้บทบาท = รู้หน้าที่" },
            { q: "บทสรุปของ Chapter 1 คืออะไร?", a: ["จงเข้าใจตนเองและบทบาทในสังคม", "จงท่องจำสังคม", "จงทิ้งความเป็นตัวตน", "จงอยู่คนเดียว"], c: 0, d: "ตัวตนคือกระบวนการที่สร้างขึ้นและเปลี่ยนแปลงได้", tip: "กำหนดชีวิตด้วยตัวคุณเอง" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, i) => {
                area.innerHTML += `<div class="question-container" id="q${i}">
                    <p><strong>${i+1}. ${q.q} <span style="color:red;">(Clue: ${q.tip})</span></strong></p>
                    ${q.a.map((opt, j) => `<div class="option" onclick="check(${i}, ${j})">${opt}</div>`).join('')}
                    <div class="answer-box" id="ans${i}"><b>เฉลย:</b> ${q.d}</div>
                </div>`;
            });
        }
        function check(qIdx, oIdx) {
            const q = questions[qIdx];
            const ops = document.getElementById('q'+qIdx).getElementsByClassName('option');
            document.getElementById('ans'+qIdx).style.display = 'block';
            for(let i=0; i<4; i++) ops[i].style.pointerEvents = 'none';
            if(oIdx === q.c) ops[oIdx].classList.add('correct');
            else { ops[oIdx].classList.add('wrong'); ops[q.c].classList.add('correct'); }
        }
        renderQuiz();
    </script>
</body>
</html>
