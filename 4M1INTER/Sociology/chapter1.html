<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chapter 1: This is Me (Sociology) Assessment</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; padding: 20px; background: #f0f2f5; color: #333; }
        .question-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 12px; border-left: 6px solid #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .choice { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .choice:hover { background: #e8ecef; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #c0392b; font-weight: bold; }
        .explanation { margin-top: 10px; padding: 15px; background: #f9f9f9; border-radius: 5px; display: none; border-left: 4px solid #ccc; }
        .lang-btn { margin-bottom: 20px; padding: 10px 20px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Chapter 1: This is Me (Sociology) Assessment</h1>
    <button class="lang-btn" onclick="toggleLang()">Switch Language (English / ภาษาไทย)</button>
    <div id="exam-container"></div>

    <script>
        const questions = [
            { en: "What is the sociological term for the cognitive process of grouping people based on appearance and initial speech?", th: "คำศัพท์ทางสังคมวิทยาที่ใช้เรียกกระบวนการทางความคิดในการจัดกลุ่มผู้คนตามรูปลักษณ์และการพูดครั้งแรกคืออะไร?", clue: "Social categorization", choices: ["Social Categorization", "Impression Management", "Dramaturgy", "Role Playing"], answer: 0, exp: "Social categorization is the mental shortcut used to organize perceptions.", tip: "Think of it as putting labels on information to process it faster." },
            { en: "According to Erving Goffman, social life is often compared to a:", th: "ตามทฤษฎีของ Erving Goffman ชีวิตทางสังคมมักถูกเปรียบเทียบกับอะไร?", clue: "Dramaturgical theory", choices: ["Laboratory", "Stage", "Marketplace", "Game"], answer: 1, exp: "Goffman's theory views social interactions as performances on a stage.", tip: "Actors prepare for roles; humans prepare for social situations." },
            { en: "What is the primary purpose of 'Impression Management' in social interactions?", th: "จุดประสงค์หลักของ 'การจัดการความประทับใจ' ในการปฏิสัมพันธ์ทางสังคมคืออะไร?", clue: "Controlling perception", choices: ["To deceive others", "To influence how others perceive us", "To memorize vocabulary", "To study sociology"], answer: 1, exp: "Impression management is the effort to control the images we project.", tip: "Think of it as choosing the right outfit for an event." },
            { en: "When you use a dictionary to identify if a word is a noun, verb, or adjective, you are performing:", th: "เมื่อคุณใช้พจนานุกรมเพื่อระบุว่าคำนั้นเป็นคำนาม กริยา หรือคุณศัพท์ คุณกำลังทำสิ่งใด?", clue: "Parts of speech", choices: ["Linguistic analysis", "Dramaturgical analysis", "Social categorization", "Collocation"], answer: 0, exp: "Identifying parts of speech is a fundamental part of linguistic analysis.", tip: "Words have different jobs in sentences just like people have roles in society." },
            { en: "The phrase 'I am a student' uses the verb 'be' to:", th: "ประโยค 'I am a student' ใช้กริยา 'be' เพื่ออะไร?", clue: "Bridge of identity", choices: ["Describe an action", "Define an identity", "Express past habits", "Question a status"], answer: 1, exp: "The verb 'be' acts as a bridge connecting the subject to their identity.", tip: "Verb to be = Identity connector." },
            { en: "What is a 'Collocation' in the context of English language learning?", th: "'Collocation' ในบริบทของการเรียนภาษาอังกฤษหมายถึงอะไร?", clue: "Natural word pairing", choices: ["The definition of a word", "A word with its opposite", "Words that naturally go together", "A synonym for a noun"], answer: 2, exp: "Collocations are habitual word combinations that sound natural to native speakers.", tip: "It's like how salt naturally goes with pepper." },
            { en: "Which of the following is an example of an identity role?", th: "ข้อใดเป็นตัวอย่างของบทบาททางอัตลักษณ์?", clue: "Social position", choices: ["Reading a book", "Being a leader", "Walking quickly", "A dictionary"], answer: 1, exp: "Being a leader describes a position within a social context.", tip: "Roles tell us 'who' you are in a specific scenario." },
            { en: "In Sociology, identity is considered:", th: "ในทางสังคมวิทยา อัตลักษณ์ถูกพิจารณาว่าเป็นอย่างไร?", clue: "Fluidity", choices: ["Permanent and fixed", "Fluid and context-dependent", "Only determined by birth", "Irrelevant to social life"], answer: 1, exp: "Social identity shifts depending on the environment and interactions.", tip: "You are not the same person in every room." },
            { en: "What should you do to better understand the nuance of words?", th: "คุณควรทำอย่างไรเพื่อเข้าใจความหมายโดยนัยของคำได้ดีขึ้น?", clue: "Using a dictionary", choices: ["Guess the meaning", "Use a dictionary effectively", "Ignore the word", "Memorize definitions only"], answer: 1, exp: "Effective dictionary use reveals nuance, context, and usage.", tip: "Go beyond the first definition." },
            { en: "When meeting someone for the first time, what typically forms in seconds?", th: "เมื่อพบใครบางคนเป็นครั้งแรก สิ่งใดที่มักก่อตัวขึ้นภายในไม่กี่วินาที?", clue: "First impressions", choices: ["A deep relationship", "A first impression", "A social debate", "A grammatical error"], answer: 1, exp: "First impressions are rapid judgments formed upon meeting.", tip: "First impressions are the brain's way of 'sizing up' a situation." },
            { en: "Which part of speech describes a person, place, or thing?", th: "ชนิดของคำใดที่ใช้บรรยายคน สถานที่ หรือสิ่งของ?", clue: "Naming word", choices: ["Verb", "Adverb", "Noun", "Preposition"], answer: 2, exp: "Nouns are the fundamental labels for subjects and objects.", tip: "If you can name it, it's a noun." },
            { en: "Why is it important to understand 'Parts of Speech'?", clue: "Functional communication", choices: ["To win arguments", "To build accurate social identities", "To write longer essays", "To sound formal"], answer: 1, exp: "Precise word choice helps construct and communicate who we are.", tip: "The right tool for the right job applies to grammar." },
            { en: "In the context of identity, how do we use gestures?", th: "ในบริบทของอัตลักษณ์ เราใช้ท่าทางอย่างไร?", clue: "Communication of self", choices: ["To block others", "To reinforce our social impression", "To make sentences longer", "To avoid speaking"], answer: 1, exp: "Gestures act as non-verbal cues that support our perceived identity.", tip: "Body language speaks as loudly as words." },
            { en: "If you are a 'listener' at home and a 'leader' at school, this proves that:", th: "ถ้าคุณเป็น 'ผู้ฟัง' ที่บ้าน และเป็น 'ผู้นำ' ที่โรงเรียน สิ่งนี้พิสูจน์ว่า:", clue: "Role shifting", choices: ["Your identity is broken", "Your identity is context-dependent", "You are confused", "You have no identity"], answer: 1, exp: "People shift roles to fit social context requirements.", tip: "Think of your different identities as hats you wear." },
            { en: "The verb 'be' is a key part of what?", th: "กริยา 'be' เป็นส่วนสำคัญของสิ่งใด?", clue: "Structural backbone", choices: ["Collocations", "Social categorization", "Dramaturgical theater", "Dictionary definitions"], answer: 0, exp: "Many collocations rely on the verb 'be' to link status.", tip: "BE is the glue of sentences." },
            { en: "What does 'Social Interaction' involve?", th: "'การปฏิสัมพันธ์ทางสังคม' เกี่ยวข้องกับสิ่งใด?", clue: "Exchange", choices: ["Only speaking", "Communication and response between people", "Reading books alone", "Thinking silently"], answer: 1, exp: "Interaction requires a dynamic exchange between two or more individuals.", tip: "Interaction = Action + Reaction." },
            { en: "Which of these is NOT a key component of the 'I-C-E' formula?", th: "ข้อใดไม่ใช่ส่วนประกอบหลักของสูตร 'I-C-E'?", clue: "Not ICE", choices: ["Impression", "Categorization", "Expression", "Evaluation"], answer: 3, exp: "Evaluation is not part of the core I-C-E identity formula.", tip: "Remember: I-mpression, C-ategorization, E-xpression." },
            { en: "Why do humans categorize people automatically?", th: "ทำไมมนุษย์ถึงจัดกลุ่มผู้คนโดยอัตโนมัติ?", clue: "Efficiency", choices: ["To be mean", "To process social data quickly", "To make life complicated", "To avoid meeting people"], answer: 1, exp: "Cognitive efficiency drives automatic social grouping.", tip: "Our brains like shortcuts." },
            { en: "What does 'Dramaturgical' mean in sociology?", th: "'Dramaturgical' ในทางสังคมวิทยาหมายถึงอะไร?", clue: "Theatrical", choices: ["Related to real-life theater", "Acting in social roles", "Scientific testing", "Grammar rules"], answer: 1, exp: "It describes life as a performance with roles and scripts.", tip: "All the world's a stage." },
            { en: "To make a strong first impression, you should:", th: "เพื่อให้เกิดความประทับใจแรกพบที่ดี คุณควร:", clue: "Impression management", choices: ["Look away", "Manage your presentation thoughtfully", "Talk very quickly", "Memorize the dictionary"], answer: 1, exp: "Intentional management of presentation helps guide others' perceptions.", tip: "Be mindful of your signal." },
            { en: "How can you analyze social interactions?", th: "คุณสามารถวิเคราะห์การปฏิสัมพันธ์ทางสังคมได้อย่างไร?", clue: "Thought process", choices: ["By observing the setting", "By ignoring everyone", "By speaking only once", "By memorizing names"], answer: 0, exp: "Observation is the first step in sociological analysis.", tip: "Look before you leap." },
            { en: "What does the word 'Fluid' mean regarding identity?", th: "คำว่า 'Fluid' ในเรื่องของอัตลักษณ์หมายถึงอะไร?", clue: "Changeable", choices: ["Hard and stiff", "Easily changed or adapted", "Empty", "Very loud"], answer: 1, exp: "Fluidity implies the ability to shift and adapt as needed.", tip: "Think of water taking the shape of its container." },
            { en: "What happens when you select incorrect words for your role?", th: "จะเกิดอะไรขึ้นเมื่อคุณเลือกใช้คำผิดสำหรับบทบาทของคุณ?", clue: "Misalignment", choices: ["Nothing happens", "The social impression might be misaligned", "People will laugh", "The conversation stops"], answer: 1, exp: "Poor vocabulary choices can lead to a gap between your intent and perception.", tip: "Choose words that fit the performance." },
            { en: "Which verb is often used to connect a subject to a personal quality?", th: "กริยาใดที่มักใช้เชื่อมประธานกับคุณสมบัติส่วนบุคคล?", clue: "Verb be", choices: ["Go", "Be", "Run", "Eat"], answer: 1, exp: "The verb 'be' describes states of being or existence.", tip: "BE links you to your quality." },
            { en: "The goal of learning English in this context is to:", th: "เป้าหมายของการเรียนภาษาอังกฤษในบริบทนี้คืออะไร?", clue: "Effective expression", choices: ["Pass a test only", "Clearly communicate your identity", "Ignore sociology", "Sound like a robot"], answer: 1, exp: "The goal is to master tools for clear, purposeful self-expression.", tip: "English is a tool, not just a subject." }
        ];

        let isEnglish = true;
        function toggleLang() {
            isEnglish = !isEnglish;
            render();
        }

        function render() {
            const container = document.getElementById('exam-container');
            container.innerHTML = '';
            questions.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'question-container';
                div.innerHTML = `<p><strong>Question ${index + 1}:</strong> ${isEnglish ? item.en : item.th} <span style="color:red;">(Clue: ${item.clue})</span></p>`;
                item.choices.forEach((c, cIndex) => {
                    div.innerHTML += `<label class="choice"><input type="radio" name="q${index}" onclick="check(${index}, ${cIndex})"> ${c}</label>`;
                });
                div.innerHTML += `<div id="exp${index}" class="explanation"></div>`;
                container.appendChild(div);
            });
        }

        function check(qIdx, cIdx) {
            const expDiv = document.getElementById(`exp${qIdx}`);
            expDiv.style.display = 'block';
            if(cIdx === questions[qIdx].answer) {
                expDiv.innerHTML = `<span class="correct">Correct! / ถูกต้อง!</span> ${questions[qIdx].exp} <br> <strong>Tutor's Secret Tip:</strong> ${questions[qIdx].tip}`;
            } else {
                expDiv.innerHTML = `<span class="wrong">Incorrect. / ไม่ถูกต้อง</span> ${questions[qIdx].exp} <br> <strong>Tutor's Secret Tip:</strong> ${questions[qIdx].tip}`;
            }
        }
        render();
    </script>
</body>
</html>
