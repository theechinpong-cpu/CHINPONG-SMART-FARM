function renderQuestions() {
    const quizFlow = document.getElementById('quiz-flow');
    quizFlow.innerHTML = '';
    
    questions.forEach((q, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question-container';
        qDiv.id = `q-block-${index}`;
        
        const questionText = currentLang === 'th' ? q.q_th : q.q_en;
        const clueText = currentLang === 'th' ? q.th : q.en;
        const choices = currentLang === 'th' ? q.choices_th : q.choices_en;
        
        qDiv.innerHTML = `
            <h3>${currentLang === 'th' ? 'ข้อที่' : 'Question'} ${index + 1}</h3>
            <p>${questionText}</p>
            <span class="clue">${clueText}</span>
            <div class="choices-grid">
                ${choices.map((choice, i) => `
                    <button class="choice-btn" id="btn-${index}-${i}" onclick="selectAnswer(${index}, ${i})">
                        ${choice}
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}">${q.detail}</div>
        `;
        quizFlow.appendChild(qDiv);
        
        // Restore state if already answered
        if (userResponses[index] !== null) {
            applyFeedback(index, userResponses[index]);
        }
    });
}

function selectAnswer(qIndex, choiceIndex) {
    if (userResponses[qIndex] !== null) return;
    
    userResponses[qIndex] = choiceIndex;
    applyFeedback(qIndex, choiceIndex);
}

function applyFeedback(qIndex, choiceIndex) {
    const correctIdx = questions[qIndex].correct;
    const feedback = document.getElementById(`feedback-${qIndex}`);
    
    // Mark buttons
    for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`btn-${qIndex}-${i}`);
        btn.disabled = true;
        if (i === correctIdx) btn.classList.add('correct');
        if (i === choiceIndex && choiceIndex !== correctIdx) btn.classList.add('wrong');
    }
    
    feedback.style.display = 'block';
}

function toggleLanguage() {
    currentLang = currentLang === 'th' ? 'en' : 'th';
    renderQuestions();
}

function finishQuiz() {
    const answeredCount = userResponses.filter(r => r !== null).length;
    if (answeredCount < 25) {
        alert(currentLang === 'th' ? "กรุณาทำข้อสอบให้ครบ 25 ข้อก่อน!" : "Please complete all 25 questions!");
        return;
    }
    
    let score = 0;
    const stats = {};
    
    questions.forEach((q, i) => {
        if (userResponses[i] === q.correct) {
            score++;
            stats[q.category] = (stats[q.category] || 0) + 1;
        } else {
            stats[q.category] = stats[q.category] || 0;
        }
    });
    
    document.getElementById('analysis-section').style.display = 'block';
    document.getElementById('score-text').innerHTML = `คุณได้คะแนน ${score}/25 (${(score/25*100).toFixed(2)}%)`;
    
    let breakdownHtml = '<ul>';
    for (let cat in stats) {
        const catQuestions = questions.filter(q => q.category === cat).length;
        breakdownHtml += `<li>${cat}: ${stats[cat]}/${catQuestions}</li>`;
    }
    breakdownHtml += '</ul>';
    document.getElementById('theory-breakdown').innerHTML = breakdownHtml;
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
