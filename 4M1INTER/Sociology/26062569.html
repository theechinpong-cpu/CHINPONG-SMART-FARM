<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - ข้อสอบสังคมวิทยา</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .options button { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; cursor: pointer; text-align: left; border-radius: 5px; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .explanation { margin-top: 10px; padding: 10px; background: #f9f9f9; border-left: 4px solid #3498db; display: none; }
        .tip { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="toggleLang()">Switch Language (TH/EN)</button>
    <h1 id="title">แบบทดสอบสังคมวิทยา</h1>
    <div id="quiz-area"></div>
    <div id="result-area" style="display:none; text-align:center; margin-top:20px;"></div>
</div>

<script>
    let lang = 'th';
    const quizData = [/* ข้อมูลคำถาม 25 ข้อ */]; // (ใส่ข้อมูลตามที่ให้มา)
    
    function renderQuiz() {
        const area = document.getElementById('quiz-area');
        area.innerHTML = '';
        quizData.forEach((q, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `
                <p><strong>${index + 1}. <span class="q">${lang === 'th' ? q.q_th : q.q_en}</span></strong></p>
                <div class="options">
                    ${(lang === 'th' ? q.a_th : q.a_en).map((opt, i) => `<button onclick="check(${index}, ${i})">${opt}</button>`).join('')}
                </div>
                <div class="explanation" id="expl-${index}">
                    <p class="tip">${lang === 'th' ? '💡 เทคนิค:' : '💡 Tip:'} ${lang === 'th' ? q.th : q.en}</p>
                    <p>${q.detail}</p>
                </div>
            `;
            area.appendChild(div);
        });
    }

    function check(qIdx, aIdx) {
        const correct = quizData[qIdx].correct;
        const options = document.querySelectorAll(`.question-container:nth-child(${qIdx + 1}) button`);
        options.forEach(btn => btn.disabled = true);
        
        if (aIdx === correct) {
            options[aIdx].classList.add('correct');
        } else {
            options[aIdx].classList.add('wrong');
            options[correct].classList.add('correct');
        }
        document.getElementById(`expl-${qIdx}`).style.display = 'block';
    }

    function toggleLang() {
        lang = lang === 'th' ? 'en' : 'th';
        renderQuiz();
    }

    renderQuiz();
</script>

<p style="text-align:center; margin-top:30px;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
