<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Advanced Sociology Assessment</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 20px; border: 1px solid #dee2e6; border-radius: 10px; background: #fdfdfd; }
        .option { display: block; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .option:hover { background-color: #e9ecef; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .ans-detail { margin-top: 10px; padding: 10px; background: #e2e3e5; display: none; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center;">Chapter 1: This is Me (Advanced Sociology)</h1>
        <div id="quiz-area"></div>
    </div>
    <script>
        const quizData = [
            { q: "ปรากฏการณ์ที่คนเราแสดงพฤติกรรมต่างกันเมื่อรู้ว่าถูกจับตามองเรียกว่าอะไรในเชิง Goffman?", a: ["Hawthorne Effect", "Performance Expectation", "Social Osmosis", "Reactive Identity"], c: 0, d: "ความตระหนักว่าถูกจับจ้องทำให้คนแสดงตนต่างจากธรรมชาติ", tip: "คนดูเปลี่ยนการแสดง" },
    { q: "ความหมายของ 'Total Institution' คืออะไร?", a: ["องค์กรที่ควบคุมทุกมิติของชีวิต", "สถาบันการเงินขนาดใหญ่", "โครงสร้างของภาษา", "ระบบนิเวศน์ทางสังคม"], c: 0, d: "สถานที่ที่ตัดขาดจากโลกภายนอกเพื่อขัดเกลาบทบาทใหม่", tip: "คุก/ค่ายทหาร" },
    { q: "ในทฤษฎีของ Mead สิ่งใดที่ช่วยให้เราเข้าถึง 'Me' ได้?", a: ["Generalized Other", "Primary Instinct", "Genetic Coding", "Spontaneous Action"], c: 0, d: "คือทัศนคติของกลุ่มสังคมที่เรานำมาใช้ประเมินตนเอง", tip: "เสียงของสังคมในหัวเรา" },
    { q: "การ 'Account-giving' ในสถานการณ์สังคมคืออะไร?", a: ["การสร้างเหตุผลเพื่ออธิบายความผิดพลาด", "การจดบันทึกรายรับรายจ่าย", "การสรุปบทเรียนทางประวัติศาสตร์", "การคำนวณทางสถิติ"], c: 0, d: "การหาคำอธิบายเพื่อรักษาหน้า (Face-work) หลังเกิดความผิดพลาด", tip: "เหตุผลเพื่อรักษาหน้า" },
    { q: "อะไรคือหัวใจของแนวคิด 'Deconstruction' ในอัตลักษณ์?", a: ["การรื้อถอนความหมายที่ถูกกดทับ", "การทำลายทฤษฎีเดิม", "การเพิ่มจำนวนคำศัพท์", "การวิเคราะห์โครงสร้างอะตอม"], c: 0, d: "คือการชำแหละอคติที่ซ่อนอยู่ในความหมายที่เราใช้เรียกตัวเอง", tip: "รื้อเพื่อสร้างใหม่" },
    { q: "คำว่า 'Agency' ในสังคมวิทยาหมายถึงสิ่งใด?", a: ["ขีดความสามารถในการตัดสินใจของปัจเจก", "กฎหมายปกครอง", "ระบบอัตโนมัติ", "โครงสร้างชั้นทางสังคม"], c: 0, d: "พลังในการเลือกและกระทำเพื่อเปลี่ยนแปลงสถานการณ์", tip: "อำนาจในมือเรา" },
    { q: "ทำไม 'Stereotypes' จึงถูกมองว่าเป็นทางลัดทางปัญญา (Cognitive Heuristics)?", a: ["ช่วยลดภาระการวิเคราะห์ข้อมูลที่ซับซ้อน", "ช่วยให้ฉลาดขึ้น", "ช่วยให้จำสูตรได้แม่น", "ช่วยให้เก่งฟิสิกส์"], c: 0, d: "สมองเลือกจำรูปแบบแทนการวิเคราะห์รายบุคคลเพื่อประหยัดพลังงาน", tip: "ประหยัดพลังงานสมอง" },
    { q: "ข้อใดคือความต่างของ 'Essentialism' กับ 'Social Constructionism'?", a: ["แก่นแท้ vs สิ่งที่ถูกสร้าง", "ความเร็ว vs ความช้า", "ดี vs เลว", "วิทยาศาสตร์ vs ศิลปะ"], c: 0, d: "Essentialism เชื่อว่ามีแก่นแท้ติดตัว ส่วน Constructionism เชื่อว่าสังคมกำหนด", tip: "มีมาเอง vs สังคมสร้าง" },
    { q: "การมี 'Master Status' หมายถึงอะไร?", a: ["สถานะหลักที่กำหนดการมองของผู้อื่นที่มีต่อเรา", "สถานะทางเศรษฐกิจที่สูงที่สุด", "สถานะในครอบครัว", "สถานะชั่วคราว"], c: 0, d: "ตำแหน่งทางสังคมที่โดดเด่นจนบดบังสถานะอื่นทั้งหมด", tip: "สถานะหลักที่คนจำเรา" },
    { q: "ปรากฏการณ์ที่คนในกลุ่มย่อยมีพฤติกรรมกลมกลืนกันเกินไปจนเสียวิจารณญาณคือ?", a: ["Groupthink", "Individualism", "Rational Choice", "Sociological Imagination"], c: 0, d: "การตัดสินใจแบบกลุ่มที่ขาดการวิพากษ์จนเกิดความผิดพลาด", tip: "คิดตามกลุ่มจนขาดสติ" },
    { q: "ใน Dramaturgy ของ Goffman, 'Cynical Performance' หมายถึง?", a: ["การแสดงที่คนแสดงไม่เชื่อในบทบาทตนเอง", "การแสดงที่จริงใจที่สุด", "การทำตามกฎหมาย", "การปฏิเสธการแสดง"], c: 0, d: "เมื่อนักแสดงรู้ตัวว่ากำลังหลอกคนดูและไม่เชื่อในบทบาทนั้น", tip: "หลอกทั้งที่รู้ตัว" },
    { q: "โครงสร้างความสัมพันธ์แบบ 'Networked Self' คือ?", a: ["ตัวตนที่เชื่อมโยงผ่านความสัมพันธ์ดิจิทัล", "ตัวตนที่โดดเดี่ยว", "ตัวตนที่มีสถานะเดียว", "ตัวตนที่หยุดนิ่ง"], c: 0, d: "อัตลักษณ์ที่ถูกนิยามผ่านความสัมพันธ์ในโลกออนไลน์", tip: "เราคือใครในเครือข่าย" },
    { q: "การเรียนรู้บรรทัดฐานสังคมผ่านการลงโทษและรางวัลเรียกว่าอะไร?", a: ["Operant Conditioning", "Dramaturgy", "Ethnomethodology", "Macro-analysis"], c: 0, d: "การเรียนรู้พฤติกรรมผ่านผลลัพธ์ (รางวัล/ลงโทษ)", tip: "ไม้เรียวและรางวัล" },
    { q: "ทฤษฎี 'Ethnomethodology' สนใจเรื่องใดเป็นพิเศษ?", a: ["วิธีการที่มนุษย์สร้างความเป็นระเบียบในชีวิตประจำวัน", "ประวัติศาสตร์ยุโรป", "ทฤษฎีการหมุนเวียนเศรษฐกิจ", "การทดลองทางเคมี"], c: 0, d: "สนใจวิธีที่คนทั่วไปจัดการกับสถานการณ์ปกติในชีวิต", tip: "ระเบียบเล็กๆ ของคนธรรมดา" },
    { q: "อะไรคือความหมายของ 'Hidden Curriculum' ในสถาบันการศึกษา?", a: ["บทเรียนที่ไม่ได้อยู่ในตำราแต่แฝงอยู่กับบรรทัดฐาน", "สูตรคณิตศาสตร์ที่ยากที่สุด", "ตารางเรียนพิเศษ", "ทฤษฎีการจัดการ"], c: 0, d: "การสอนเรื่องความเชื่อฟัง ความอดทน และชนชั้นที่แฝงมากับการเรียน", tip: "บทเรียนที่ครูไม่พูดถึง" },
    { q: "ความหมายของ 'Alienation' ของ Marx ในเชิงตัวตนคืออะไร?", a: ["ความแปลกแยกจากงานและตัวตนตนเอง", "ความรู้สึกเหงา", "การย้ายถิ่นฐาน", "การขาดความรู้"], c: 0, d: "เมื่อมนุษย์สูญเสียความเป็นเจ้าของในผลผลิตและในตนเอง", tip: "คนไม่เป็นนายงาน" },
    { q: "การสื่อสารแบบ 'High Context' ต่างจาก 'Low Context' อย่างไร?", a: ["ใช้บริบทสูง vs ใช้ข้อมูลตรงไปตรงมา", "ใช้เสียงดัง vs เสียงเบา", "ใช้เลข vs ใช้ตัวอักษร", "ไม่มีความแตกต่าง"], c: 0, d: "High Context อาศัยการอ่านใจ/ความสัมพันธ์ มากกว่าคำพูด", tip: "อ่านบรรยากาศ vs ฟังคำพูด" },
    { q: "อะไรคืออันตรายของการมี 'Confirmation Bias' ในการมองสังคม?", a: ["การเลือกรับข้อมูลที่สนับสนุนความเชื่อเดิมตนเอง", "การเพิ่มไอคิว", "การเข้าใจสังคมมากขึ้น", "การยอมรับความต่าง"], c: 0, d: "ทำให้มองเห็นแต่สิ่งที่ตนเองอยากเห็นจนบิดเบือนความจริง", tip: "โลกมีแค่ความเชื่อเรา" },
    { q: "สภาวะ 'Anomie' ของ Durkheim คืออะไร?", a: ["สภาวะที่บรรทัดฐานสังคมล่มสลายหรือสูญเสียความหมาย", "ภาวะเศรษฐกิจเฟื่องฟู", "การมีสุขภาพจิตดี", "การทดลองทางวิทยาศาสตร์"], c: 0, d: "เมื่อสังคมสับสนจนคนไม่รู้ว่าต้องทำตามกฎอะไร", tip: "ไร้ระเบียบจนไปไม่ถูก" },
    { q: "ทำไมคำนิยาม (Definitions) จึงมีพลังอำนาจในเชิงสังคมวิทยา?", a: ["เพราะคนที่มีอำนาจกำหนดความหมายได้", "เพราะเป็นกฎธรรมชาติ", "เพราะเป็นเรื่องไกลตัว", "เพราะทำให้เกิดสันติภาพ"], c: 0, d: "อำนาจคือการนิยามว่าสิ่งใดจริง/ดี/ถูกต้อง", tip: "คนนิยามคือผู้คุมเกม" },
    { q: "ทฤษฎี 'Structural Functionalism' มองสังคมเป็นเหมือนอะไร?", a: ["ร่างกายมนุษย์ที่มีอวัยวะทำงานร่วมกัน", "เครื่องจักรที่ไม่เคยหยุด", "วงจรสารเคมี", "กระแสน้ำ"], c: 0, d: "สังคมมีส่วนต่างๆ ที่ต้องทำงานร่วมกันเพื่อให้ระบบอยู่รอด", tip: "ทุกส่วนมีหน้าที่" },
    { q: "อะไรคือข้อเสียของการวิเคราะห์แบบ 'Macro' ในสังคมวิทยา?", a: ["มองข้ามประสบการณ์ส่วนบุคคลและรายละเอียด", "ละเอียดเกินไป", "เสียเวลา", "ไม่น่าเชื่อถือ"], c: 0, d: "มองภาพใหญ่เกินจนไม่เห็นความทุกข์หรือเรื่องเล็กน้อยของคน", tip: "ภาพกว้างแต่ขาดรายละเอียด" },
    { q: "ในเชิงภาษา 'Indexicality' หมายถึงอะไร?", a: ["ความหมายที่ผันแปรตามบริบทพื้นที่และเวลา", "ความหมายที่คงที่เสมอ", "คำนามที่เป็นประธาน", "พจนานุกรม"], c: 0, d: "เช่นคำว่า 'ที่นี่' หรือ 'ตอนนี้' จะรู้เรื่องต้องมีบริบทกำกับ", tip: "บริบทกำหนดความหมาย" },
    { q: "ปรากฏการณ์ 'Glass Ceiling' สะท้อนโครงสร้างสังคมอย่างไร?", a: ["อุปสรรคที่ไม่เห็นด้วยตาแต่กีดกันความก้าวหน้า", "ความใสของกระจก", "นวัตกรรมวัสดุศาสตร์", "ความแข็งแรงของอาคาร"], c: 0, d: "เพดานที่ขวางกั้นโอกาสของคนบางกลุ่มโดยไม่เปิดเผย", tip: "มองไม่เห็นแต่ข้ามไม่ได้" },
    { q: "การมี 'Sociological Imagination' คือการเชื่อมโยงอะไรเข้าด้วยกัน?", a: ["ปัญหาส่วนตัว (Personal Troubles) กับประเด็นสาธารณะ (Public Issues)", "แรงและมวล", "ธาตุและสารประกอบ", "อดีตและอนาคต"], c: 0, d: "มองปัญหาตนเองเป็นส่วนหนึ่งของระบบสังคมที่ใหญ่กว่า", tip: "เรื่องเรา = เรื่องสังคม" }
];

        function render() {
            const area = document.getElementById('quiz-area');
            quizData.forEach((q, i) => {
                area.innerHTML += `<div class="question-container">
                    <p><strong>${i+1}. ${q.q} <span style="color:red;">(Clue: ${q.tip})</span></strong></p>
                    ${q.a.map((opt, j) => `<div class="option" onclick="check(${i}, ${j}, this)">${opt}</div>`).join('')}
                    <div class="ans-detail" id="ans${i}"><b>เฉลย:</b> ${q.d}</div>
                </div>`;
            });
        }
        function check(qIdx, oIdx, el) {
            const q = quizData[qIdx];
            const parent = el.parentElement;
            document.getElementById('ans'+qIdx).style.display = 'block';
            Array.from(parent.getElementsByClassName('option')).forEach(o => o.style.pointerEvents = 'none');
            if(oIdx === q.c) el.classList.add('correct');
            else { el.classList.add('wrong'); parent.getElementsByClassName('option')[q.c].classList.add('correct'); }
        }
        render();
    </script>
</body>
</html>
