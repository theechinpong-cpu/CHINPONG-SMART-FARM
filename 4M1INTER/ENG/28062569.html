<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Phra Chom Klao Tutor - English Midterm Exam</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .question-container { margin-bottom: 25px; padding: 20px; border-radius: 10px; background: #f9f9f9; border-left: 5px solid #3498db; }
        .option-btn { display: block; width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; text-align: left; background: white; transition: 0.2s; }
        .option-btn:hover { background: #f0f0f0; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        .tutor-tip { margin-top: 10px; padding: 10px; background: #fff3cd; border-left: 5px solid #ffc107; font-size: 0.9em; display: none; }
        #result-area { margin-top: 30px; padding: 20px; border-radius: 10px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: right;">
        <button onclick="toggleLang()">Switch Language (TH / EN)</button>
    </div>
    <h2 id="title">ข้อสอบภาษาอังกฤษ ม.1 - พระจอมเกล้าติวเตอร์</h2>
    <div id="exam-area"></div>
    <div id="result-area"></div>
</div>

<script>
    let lang = 'th';
    const questions = [
        { q_th: "My sister ______ a doctor, and she ______ her job very much.", q_en: "My sister ______ a doctor, and she ______ her job very much.", a_th: ["is, likes", "are, like", "be, liking", "is, like"], a_en: ["is, likes", "are, like", "be, liking", "is, like"], correct: 0, th: "ประธานเอกพจน์ กริยาเติม s", en: "Singular subject takes s/es", detail: "Sister เป็นเอกพจน์ ใช้ is และ likes" },
        { q_th: "\"This house is ______,\" my father said, \"we built it for ______.\"", q_en: "\"This house is ______,\" my father said, \"we built it for ______.\"", a_th: ["ours, us", "our, we", "ours, we", "our, us"], a_en: ["ours, us", "our, we", "ours, we", "our, us"], correct: 0, th: "หลังบุพบทต้องเป็น Object", en: "Use object pronoun after preposition", detail: "หลัง for ต้องเป็น us (object)" },
        { q_th: "______ does your mother do? She is a teacher.", q_en: "______ does your mother do? She is a teacher.", a_th: ["What", "How", "Where", "When"], a_en: ["What", "How", "Where", "When"], correct: 0, th: "ถามอาชีพใช้ What", en: "Use What to ask about job", detail: "What does...do เป็นโครงสร้างถามอาชีพ" },
        { q_th: "I ______ (not/be) a shy person, but my brother ______ (be) very outgoing.", q_en: "I ______ (not/be) a shy person, but my brother ______ (be) very outgoing.", a_th: ["am not, is", "isn't, are", "am, isn't", "are, am"], a_en: ["am not, is", "isn't, are", "am, isn't", "are, am"], correct: 0, th: "Verb to be ตามประธาน", en: "Verb to be follows subject", detail: "I ใช้ am not, brother ใช้ is" },
        { q_th: "They are my parents. I really love ______ and they love ______.", q_en: "They are my parents. I really love ______ and they love ______.", a_th: ["them, me", "they, my", "them, I", "their, me"], a_en: ["them, me", "they, my", "them, I", "their, me"], correct: 0, th: "หลังกริยาใช้ Object Pronoun", en: "Use object pronoun after verb", detail: "Love them (parent) / Love me (I)" },
        { q_th: "Sarah ______ brushes her teeth before going to bed.", q_en: "Sarah ______ brushes her teeth before going to bed.", a_th: ["always", "brushes always", "is always", "always is"], a_en: ["always", "brushes always", "is always", "always is"], correct: 0, th: "Adverb อยู่หน้ากริยาแท้", en: "Adverb before main verb", detail: "Always วางหน้า brushes" },
        { q_th: "We have English class ______ Monday ______ 8 o'clock.", q_en: "We have English class ______ Monday ______ 8 o'clock.", a_th: ["on, at", "in, in", "at, on", "on, in"], a_en: ["on, at", "in, in", "at, on", "on, in"], correct: 0, th: "On วัน, At เวลา", en: "On for day, At for time", detail: "Monday วันใช้ on, 8 o'clock เวลาใช้ at" },
        { q_th: "My brother ______ is late for school; he is very punctual.", q_en: "My brother ______ is late for school; he is very punctual.", a_th: ["never", "always", "usually", "often"], a_en: ["never", "always", "usually", "often"], correct: 0, th: "คนตรงต่อเวลาจะไม่มาสาย", en: "Punctual people are never late", detail: "Never คือไม่เคยสาย" },
        { q_th: "I wake up ______ 6:00 AM ______ the morning.", q_en: "I wake up ______ 6:00 AM ______ the morning.", a_th: ["at, in", "in, at", "at, on", "on, in"], a_en: ["at, in", "in, at", "at, on", "on, in"], correct: 0, th: "At เวลา, In ช่วงเวลา", en: "At for time, In for period", detail: "6 AM ใช้ at, morning ใช้ in" },
        { q_th: "How often do you play sports? I play ______ twice a week.", q_en: "How often do you play sports? I play ______ twice a week.", a_th: ["usually", "at", "on", "in"], a_en: ["usually", "at", "on", "in"], correct: 0, th: "ตอบความถี่", en: "Answer frequency", detail: "Usually บอกความถี่" },
        { q_th: "______ open the window, please. It is too hot in here.", q_en: "______ open the window, please. It is too hot in here.", a_th: ["Please", "Don't", "Do", "Be"], a_en: ["Please", "Don't", "Do", "Be"], correct: 0, th: "Imperative ขึ้นต้นกริยา", en: "Imperative starts with verb", detail: "สั่งให้ทำใช้ Please open" },
        { q_th: "I have ______ books in my bag, but I don't have ______ pencils.", q_en: "I have ______ books in my bag, but I don't have ______ pencils.", a_th: ["some, any", "any, some", "some, some", "any, any"], a_en: ["some, any", "any, some", "some, some", "any, any"], correct: 0, th: "Some บอกเล่า, Any ปฏิเสธ", en: "Some positive, Any negative", detail: "ประโยคบอกเล่าใช้ some, ปฏิเสธใช้ any" },
        { q_th: "Teacher: \"______ run in the hallway!\"", q_en: "Teacher: \"______ run in the hallway!\"", a_th: ["Don't", "Do", "Please", "Be"], a_en: ["Don't", "Do", "Please", "Be"], correct: 0, th: "ห้ามทำใช้ Don't", en: "Negative imperative use Don't", detail: "Don't run คือห้ามวิ่ง" },
        { q_th: "Are there ______ students in the library? Yes, there are ______.", q_en: "Are there ______ students in the library? Yes, there are ______.", a_th: ["any, some", "some, any", "any, any", "some, some"], a_en: ["any, some", "some, any", "any, any", "some, some"], correct: 0, th: "คำถามใช้ any, บอกเล่าใช้ some", en: "Any for question, Some for positive", detail: "คำถามใช้ any, คำตอบบอกเล่าใช้ some" },
        { q_th: "______ quiet while the teacher is speaking.", q_en: "______ quiet while the teacher is speaking.", a_th: ["Be", "Are", "Is", "Am"], a_en: ["Be", "Are", "Is", "Am"], correct: 0, th: "Imperative ใช้ Be", en: "Imperative use Be", detail: "คำสั่งให้เงียบใช้ Be quiet" },
        { q_th: "I enjoy ______ football because it is exciting.", q_en: "I enjoy ______ football because it is exciting.", a_th: ["playing", "play", "to play", "played"], a_en: ["playing", "play", "to play", "played"], correct: 0, th: "Enjoy ตามด้วย V.ing", en: "Enjoy + V.ing", detail: "Enjoy + playing" },
        { q_th: "She hates ______ early in the morning.", q_en: "She hates ______ early in the morning.", a_th: ["waking up", "wake up", "to wake up", "woke up"], a_en: ["waking up", "wake up", "to wake up", "woke up"], correct: 0, th: "Hate ตามด้วย V.ing", en: "Hate + V.ing", detail: "Hate + waking up" },
        { q_th: "Do you like ______ pizza? Yes, I love ______ it!", q_en: "Do you like ______ pizza? Yes, I love ______ it!", a_th: ["eating, eating", "eat, eat", "eating, eat", "eat, eating"], a_en: ["eating, eating", "eat, eat", "eating, eat", "eat, eating"], correct: 0, th: "Like/Love ตามด้วย V.ing", en: "Like/Love + V.ing", detail: "ใช้ eating ทั้งคู่" },
        { q_th: "Why does he like science? ______ it is very interesting.", q_en: "Why does he like science? ______ it is very interesting.", a_th: ["Because", "But", "And", "So"], a_en: ["Because", "But", "And", "So"], correct: 0, th: "ตอบเหตุผลใช้ Because", en: "Use Because for reason", detail: "ถาม why ตอบ because" },
        { q_th: "My friends don't like ______ in the rain.", q_en: "My friends don't like ______ in the rain.", a_th: ["walking", "walk", "to walk", "walked"], a_en: ["walking", "walk", "to walk", "walked"], correct: 0, th: "Like ตามด้วย V.ing", en: "Like + V.ing", detail: "Like + walking" },
        { q_th: "He ______ (be) a student, and he ______ (love) ______ (study) English.", q_en: "He ______ (be) a student, and he ______ (love) ______ (study) English.", a_th: ["is, loves, studying", "is, love, study", "are, loves, studying", "is, loves, study"], a_en: ["is, loves, studying", "is, love, study", "are, loves, studying", "is, loves, study"], correct: 0, th: "ประธานเอกพจน์ กริยาเติม s", en: "Singular subject takes s/es", detail: "He is, loves, studying" },
        { q_th: "______ you have ______ homework today?", q_en: "______ you have ______ homework today?", a_th: ["Do, any", "Are, some", "Do, some", "Are, any"], a_en: ["Do, any", "Are, some", "Do, some", "Are, any"], correct: 0, th: "ถามใช้ Do + any", en: "Question use Do + any", detail: "ประโยคคำถามใช้ Do + any" },
        { q_th: "I ______ (never/be) late because I always wake up ______ 6 AM.", q_en: "I ______ (never/be) late because I always wake up ______ 6 AM.", a_th: ["am never, at", "never am, in", "am never, on", "never am, at"], a_en: ["am never, at", "never am, in", "am never, on", "never am, at"], correct: 0, th: "Adverb หลัง V.to be", en: "Adverb after V.to be", detail: "am never + at" },
        { q_th: "\"______ talk during the exam!\" the teacher said.", q_en: "\"______ talk during the exam!\" the teacher said.", a_th: ["Don't", "Not", "No", "Please"], a_en: ["Don't", "Not", "No", "Please"], correct: 0, th: "คำสั่งห้ามใช้ Don't", en: "Negative command use Don't", detail: "Don't talk" },
        { q_th: "She likes ______ because it helps ______ learn new things.", q_en: "She likes ______ because it helps ______ learn new things.", a_th: ["reading, her", "read, she", "reading, she", "read, her"], a_en: ["reading, her", "read, she", "reading, she", "read, her"], correct: 0, th: "Like V.ing, Object หลัง Verb", en: "Like V.ing, Object after Verb", detail: "Reading + help her" }
    ];

    function render() {
        const area = document.getElementById('exam-area');
        area.innerHTML = questions.map((q, i) => `
            <div class="question-container" id="q${i}">
                <p><b>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</b></p>
                ${(lang === 'th' ? q.a_th : q.a_en).map((opt, idx) => `
                    <button class="option-btn" onclick="check(${i}, ${idx})">${opt}</button>
                `).join('')}
                <div id="tip${i}" class="tutor-tip">
                    <b>${lang === 'th' ? 'คำใบ้: ' : 'Clue: '}</b>${lang === 'th' ? q.th : q.en}<br>
                    <b>${lang === 'th' ? 'เฉลย: ' : 'Explanation: '}</b>${q.detail}
                </div>
            </div>
        `).join('');
    }

    function check(qIdx, optIdx) {
        const q = questions[qIdx];
        const container = document.getElementById(`q${qIdx}`);
        const buttons = container.querySelectorAll('.option-btn');
        buttons.forEach((b, i) => {
            b.disabled = true;
            if (i === q.correct) b.classList.add('correct');
            else if (i === optIdx) b.classList.add('wrong');
        });
        document.getElementById(`tip${qIdx}`).style.display = 'block';
        checkComplete();
    }

    function checkComplete() {
        if (document.querySelectorAll('.option-btn:disabled').length === questions.length * 4) {
            alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว (thee.chinpong@hmail.com)");
            const res = document.getElementById('result-area');
            res.style.display = 'block';
            res.innerHTML = "🌟 ทำได้ดีมาก! คุณผ่านการทดสอบแล้ว";
            res.style.backgroundColor = "#2ecc71";
            res.style.color = "white";
        }
    }

    function toggleLang() {
        lang = lang === 'th' ? 'en' : 'th';
        render();
    }

    render();
</script>

</body>
</html>
