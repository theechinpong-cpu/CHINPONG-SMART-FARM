<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Gold Experience 1: Midterm Exam</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .question-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-left: 5px solid #2c3e50; }
        .option { display: block; margin: 8px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .tip { margin-top: 10px; padding: 15px; background: #e8f8f5; border-left: 4px solid #27ae60; font-size: 0.9em; }
        .correct { background-color: #d4edda; border-color: #27ae60; }
        .incorrect { background-color: #f8d7da; border-color: #c0392b; }
    </style>
</head>
<body>
    <h1>แบบทดสอบกลางภาค (25 ข้อ)</h1>
    <div id="quiz"></div>

    <script>
        const quizData = [
            { q: "This is my brother. ____ name is Tom.", a: ["His", "He", "Him", "He's"], c: 0, exp: "กฎ Possessive Adjective: ต้องมีคำนามตามหลังเสมอ (name) และใช้ His แทนสรรพนามบุรุษที่ 3 เพศชาย | Tutor Tip: จำไว้ว่า 'แสดงความเป็นเจ้าของต้องมีนามต่อท้าย'" },
            { q: "Are there ____ apples in the kitchen?", a: ["a", "any", "some", "the"], c: 1, exp: "กฎ Some/Any: ในประโยคคำถามที่ต้องการทราบจำนวน เรานิยมใช้ 'any' | Tutor Tip: เห็นเครื่องหมาย ? ให้ระวัง any ไว้ก่อน" },
            { q: "She ____ to the music every morning.", a: ["listen", "listens", "listening", "listened"], c: 1, exp: "กฎ Present Simple: ประธานเอกพจน์ (She) กริยาต้องเติม -s/-es | Tutor Tip: จำกฎ 'ประธานเหงา กริยาต้องมี s'" }
        ];

        const quizDiv = document.getElementById('quiz');
        quizData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p>${index + 1}. ${item.q} <span style="color:red;">(Clue: สังเกตประธานและประเภทประโยค)</span></p>`;
            item.a.forEach((opt, i) => {
                div.innerHTML += `<label class="option"><input type="radio" name="q${index}" onclick="check(${index}, ${i})"> ${opt}</label>`;
            });
            div.innerHTML += `<div id="res${index}" style="display:none;"></div>`;
            quizDiv.appendChild(div);
        });

        function check(q, i) {
            const res = document.getElementById('res' + q);
            const isCorrect = i === quizData[q].c;
            res.style.display = 'block';
            res.innerHTML = `<div class="tip ${isCorrect ? 'correct' : 'incorrect'}">
                <strong>${isCorrect ? 'ถูกต้อง!' : 'ผิดครับ!'}</strong><br>
                ${quizData[q].exp}
            </div>`;
        }
    </script>
</body>
</html>
