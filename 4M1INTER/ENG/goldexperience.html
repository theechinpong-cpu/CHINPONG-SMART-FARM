<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam: Gold Experience 1 - Midterm</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f7f6; }
        .question-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-left: 5px solid #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .option { display: block; margin: 10px 0; cursor: pointer; }
        .correct { color: #27ae60; font-weight: bold; }
        .incorrect { color: #c0392b; font-weight: bold; }
        .tip { font-style: italic; color: #7f8c8d; margin-top: 10px; padding: 10px; background: #ecf0f1; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>แบบทดสอบเตรียมสอบกลางภาค (25 ข้อ)</h1>
    <div id="quiz-container"></div>

    <script>
        const questions = [
            { q: "This is my brother. ____ name is Tom.", a: ["His", "He", "Him", "He's"], c: 0, tip: "ใช้ Possessive Adjective นำหน้าชื่อ" },
            { q: "____ there any pens on the desk?", a: ["Is", "Are", "Be", "Do"], c: 1, tip: "Pens เป็นพหูพจน์" },
            { q: "She ____ to school every day.", a: ["go", "goes", "going", "gone"], c: 1, tip: "ประธานเอกพจน์ต้องเติม -es" },
            // (Note: เพิ่มให้ครบ 25 ข้อตามโครงสร้างนี้)
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.innerHTML = `<p>${index + 1}. ${item.q} <span style="color:red;">(Clue: ${item.tip})</span></p>`;
            item.a.forEach((opt, i) => {
                div.innerHTML += `<label class="option"><input type="radio" name="q${index}" onclick="check(${index}, ${i}, ${item.c})"> ${opt}</label>`;
            });
            div.innerHTML += `<div id="res${index}"></div>`;
            container.appendChild(div);
        });

        function check(qIdx, selected, correct) {
            const res = document.getElementById('res' + qIdx);
            if (selected === correct) {
                res.innerHTML = '<p class="correct">ถูกต้อง!</p>';
            } else {
                res.innerHTML = '<p class="incorrect">ผิด! คำตอบที่ถูกต้องคือ ' + questions[qIdx].a[correct] + '</p>';
            }
        }
    </script>
</body>
</html>
