<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 4) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-container { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { color: #d35400; font-weight: bold; font-style: italic; margin: 10px 0; padding: 5px; background: #fff3e0; border-left: 4px solid #d35400; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
        button { cursor: pointer; padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; margin: 2px; }
    </style>
</head>
<body>
    <h1>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 4 - Mastery Level)</h1>
    <button onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "ประโยคใดมีโครงสร้างประโยคซับซ้อนที่สุด", q_en: "Which sentence has the most complex structure?", a_th: ["I am happy.", "He is smart, but I am smarter.", "They are students.", "She is kind."], a_en: ["I am happy.", "He is smart, but I am smarter.", "They are students.", "She is kind."], correct: 1, th: "มีการใช้ but เชื่อมประโยคอิสระสองประโยค", en: "Uses 'but' to link two independent clauses.", detail: "เป็นการเชื่อมสองประโยคความเดียวเข้าด้วยกัน (Compound Sentence)" },
            { q_th: "ข้อใดคือความหมายเชิงอนุมานของ 'It’s a small world'?", q_en: "Inferred meaning of 'It’s a small world'?", a_th: ["โลกมีขนาดเล็ก", "โลกหมุนเร็ว", "เจอคนรู้จักในที่ที่ไม่คาดฝัน", "ทุกคนรู้จักกันหมด"], a_en: ["World is small", "World spins fast", "Unexpectedly meeting someone", "Everyone knows each other"], correct: 2, th: "สำนวนหมายถึงความบังเอิญที่ได้เจอคนรู้จัก", en: "Idiom for unexpected encounters.", detail: "ใช้เมื่อบังเอิญเจอคนรู้จักในสถานการณ์ที่คาดไม่ถึง" },
            { q_th: "ข้อใดใช้ Participle Adjective ได้ถูกต้อง", q_en: "Correct usage of Participle Adjective?", a_th: ["The book is interesting.", "The book is interested.", "I am interesting in it.", "It is interest."], a_en: ["The book is interesting.", "The book is interested.", "I am interesting in it.", "It is interest."], correct: 0, th: "interesting ขยายสิ่งที่น่าสนใจ", en: "Interesting describes the source.", detail: "Interesting ใช้กับสิ่งที่ทำให้น่าสนใจ (Active)" },
            { q_th: "การวิเคราะห์ 'Bias' ในบทความคือการหาอะไร", q_en: "Analyzing 'Bias' means finding what?", a_th: ["ข้อเท็จจริง", "ความลำเอียงของผู้เขียน", "คำศัพท์ยาก", "ไวยากรณ์"], a_en: ["Fact", "Author's prejudice", "Hard vocab", "Grammar"], correct: 1, th: "ความลำเอียงส่วนตัว", en: "Personal prejudice.", detail: "Bias คือการที่ผู้เขียนโน้มเอียงไปทางความคิดหนึ่ง" },
            { q_th: "ประโยค 'He is as smart as his brother' หมายความว่าอย่างไร", q_en: "'He is as smart as his brother' means:", a_th: ["ฉลาดกว่า", "ฉลาดน้อยกว่า", "ฉลาดเท่ากัน", "ไม่ฉลาดเลย"], a_en: ["Smarter", "Less smart", "Equally smart", "Not smart"], correct: 2, th: "โครงสร้าง as...as เปรียบเทียบความเท่ากัน", en: "As...as structure shows equality.", detail: "as + adj + as คือการเปรียบเทียบความเท่าเทียม" },
            { q_th: "คำว่า 'Prejudice' สัมพันธ์กับข้อใดมากที่สุด", q_en: "'Prejudice' relates to?", a_th: ["Stereotype", "Knowledge", "Fact", "Evidence"], a_en: ["Stereotype", "Knowledge", "Fact", "Evidence"], correct: 0, th: "ความเชื่อผิดๆ ที่เหมารวม", en: "Misconceived generalizations.", detail: "Prejudice มักเกิดจาก Stereotype" },
            { q_th: "ข้อใดไม่ใช่รูป Verb to be ในภาษาอังกฤษ", q_en: "Which is NOT a form of 'verb to be'?", a_th: ["am", "is", "are", "do"], a_en: ["am", "is", "are", "do"], correct: 3, th: "do เป็น Verb ช่วย", en: "Do is an auxiliary verb.", detail: "Do/Does ใช้เป็นกริยาช่วย ไม่ใช่ Verb to be" },
            { q_th: "ประโยค 'She has been a teacher for years' หมายความว่าอะไร", q_en: "'She has been a teacher for years' means?", a_th: ["เพิ่งเริ่มเป็น", "เป็นมานานแล้ว", "กำลังจะเป็น", "เลิกเป็นแล้ว"], a_en: ["Just started", "Has been for a long time", "Becoming", "Stopped"], correct: 1, th: "บ่งบอกเหตุการณ์ที่ต่อเนื่อง", en: "Continuous state from past.", detail: "เป็นการใช้ Present Perfect บ่งบอกความต่อเนื่อง" },
            { q_th: "คำถาม 'Why?' ต้องการคำตอบประเภทใด", q_en: "'Why?' requires what kind of answer?", a_th: ["เวลา", "สถานที่", "เหตุผล", "วิธีการ"], a_en: ["Time", "Place", "Reason", "Method"], correct: 2, th: "เหตุผล (Reason)", en: "Reason.", detail: "Why ถามหาสาเหตุหรือเหตุผล" },
            { q_th: "ข้อใดคือการเปรียบเทียบขั้นสูงสุด", q_en: "Superlative comparison?", a_th: ["He is smart.", "He is smarter than me.", "He is the smartest.", "He is very smart."], a_en: ["He is smart.", "He is smarter than me.", "He is the smartest.", "He is very smart."], correct: 2, th: "ขั้นสูงสุดใช้ the + ...est", en: "Superlative uses 'the + ...est'.", detail: "The smartest คือที่สุดในกลุ่ม" },
            { q_th: "คำว่า 'Autonomous' ในบริบทภาษาหมายถึง", q_en: "'Autonomous' means?", a_th: ["พึ่งพาคนอื่น", "พึ่งพาตัวเอง", "ไม่สำคัญ", "ขี้เกียจ"], a_en: ["Dependent", "Independent", "Not important", "Lazy"], correct: 1, th: "อิสระ/พึ่งพาตนเอง", en: "Independent.", detail: "Autonomous คือความอิสระ" },
            { q_th: "ประโยคใดถูกต้องตามไวยากรณ์ที่สุด", q_en: "Which is grammatically correct?", a_th: ["He have a pen.", "He has a pen.", "He is have a pen.", "He do has a pen."], a_en: ["He have a pen.", "He has a pen.", "He is have a pen.", "He do has a pen."], correct: 1, th: "He ใช้กับ has", en: "He uses 'has'.", detail: "ประธานเอกพจน์ใช้ has" },
            { q_th: "ถ้าผู้เขียนใช้คำว่า 'Undoubtedly' หมายความว่า", q_en: "'Undoubtedly' means?", a_th: ["อาจจะ", "ไม่ต้องสงสัยเลย", "ไม่แน่ใจ", "น่าจะเป็น"], a_en: ["Maybe", "Without doubt", "Unsure", "Likely"], correct: 1, th: "อย่างแน่นอน", en: "Certainly.", detail: "Undoubtedly ยืนยันความจริง" },
            { q_th: "คำว่า 'Collaborate' มีความหมายเหมือนกับ", q_en: "'Collaborate' is similar to?", a_th: ["Compete", "Cooperate", "Criticize", "Ignore"], a_en: ["Compete", "Cooperate", "Criticize", "Ignore"], correct: 1, th: "ร่วมมือกัน", en: "Cooperate.", detail: "Collaborate แปลว่า ทำงานร่วมกัน" },
            { q_th: "ประโยค 'If I were you, I would study' ใช้เพื่อ?", q_en: "'If I were you, I would study' is used to?", a_th: ["ให้คำแนะนำ", "บอกเล่าความจริง", "ถาม", "สั่ง"], a_en: ["Give advice", "State fact", "Ask", "Command"], correct: 0, th: "ให้คำแนะนำ", en: "Give advice.", detail: "เป็นประโยคสมมติเพื่อให้คำแนะนำ" },
            { q_th: "คำว่า 'Inference' คือกระบวนการคิดแบบใด", q_en: "'Inference' is which thinking process?", a_th: ["การท่องจำ", "การอนุมานจากสิ่งที่เห็น", "การสรุปแบบเหมารวม", "การถาม"], a_en: ["Memorization", "Logical deduction", "Generalization", "Asking"], correct: 1, th: "อนุมานจากหลักฐาน", en: "Deduction from evidence.", detail: "คือการคาดการณ์จากเบาะแสที่มี" },
            { q_th: "ข้อใดใช้ Adverb ขยายกริยาได้ถูกต้อง", q_en: "Correct usage of Adverb?", a_th: ["He walks quick.", "He walks quickly.", "He is quickly.", "He walk quickly."], a_en: ["He walks quick.", "He walks quickly.", "He is quickly.", "He walk quickly."], correct: 1, th: "ขยายกริยาใช้ adverb", en: "Adverb modifies verb.", detail: "Quickly ขยายการเดิน" },
            { q_th: "คำว่า 'Subjective' หมายถึง", q_en: "'Subjective' means?", a_th: ["ความเห็นส่วนตัว", "ความจริงแท้", "วิทยาศาสตร์", "กฎหมาย"], a_en: ["Personal opinion", "Objective truth", "Science", "Law"], correct: 0, th: "ขึ้นอยู่กับคนมอง", en: "Based on personal views.", detail: "Subjective คือไม่อิงจากความเป็นจริงเพียงอย่างเดียว" },
            { q_th: "ประโยคใดมีคำเชื่อมแบบขัดแย้ง", q_en: "Sentence with contrast conjunction?", a_th: ["I am sad, so I cry.", "I am happy, and he is sad.", "I am tired, yet I study.", "I eat, then I sleep."], a_en: ["I am sad, so I cry.", "I am happy, and he is sad.", "I am tired, yet I study.", "I eat, then I sleep."], correct: 2, th: "yet แปลว่า แต่", en: "Yet means 'but'.", detail: "Yet ทำหน้าที่เชื่อมความขัดแย้ง" },
            { q_th: "ประธาน 'The team' ควรใช้กริยาอย่างไรในบริบทอังกฤษแบบอเมริกัน", q_en: "'The team' (US English) uses what verb?", a_th: ["is", "are", "have", "do"], a_en: ["is", "are", "have", "do"], correct: 0, th: "มองเป็นเอกพจน์", en: "Viewed as singular.", detail: "มองทีมเป็นก้อนเดียวจึงใช้ is" },
            { q_th: "คำว่า 'Objection' แปลว่าอะไร", q_en: "'Objection' means?", a_th: ["การสนับสนุน", "การคัดค้าน", "การเห็นด้วย", "การขอบคุณ"], a_en: ["Support", "Opposition", "Agreement", "Thanks"], correct: 1, th: "คัดค้าน", en: "Opposition.", detail: "Objection คือการไม่เห็นด้วย" },
            { q_th: "การทำ Self-Reflection หลังสอบคืออะไร", q_en: "What is 'Self-Reflection'?", a_th: ["การบ่น", "การทบทวนตัวเอง", "การทำโทษ", "การนอน"], a_en: ["Complaining", "Introspection", "Punishment", "Sleeping"], correct: 1, th: "การทบทวนตัวเอง", en: "Introspection.", detail: "การสำรวจสิ่งที่ทำพลาดและพัฒนา" },
            { q_th: "ประโยค 'None of the students is here' ใช้กริยาอย่างไร", q_en: "'None of the students is here' verb usage?", a_th: ["is", "are", "were", "do"], a_en: ["is", "are", "were", "do"], correct: 0, th: "none ตามด้วยนามพหูพจน์ ใช้เอกพจน์/พหูพจน์ได้ แต่ is ทางการกว่า", en: "Formal singular usage.", detail: "ในบริบททางการ None มักใช้กริยาเอกพจน์" },
            { q_th: "คำว่า 'Consequence' แปลว่า", q_en: "'Consequence' means?", a_th: ["สาเหตุ", "ผลลัพธ์", "คำถาม", "ความฝัน"], a_en: ["Cause", "Result", "Question", "Dream"], correct: 1, th: "ผลลัพธ์", en: "Result.", detail: "ผลที่ตามมาจากการกระทำ" },
            { q_th: "ขั้นตอนสุดท้ายในการใช้สื่อพระจอมเกล้าติวเตอร์", q_en: "Last step of this tutor tool?", a_th: ["วิเคราะห์และพัฒนา", "ลบ", "ปิด", "แชร์"], a_en: ["Analyze and improve", "Delete", "Close", "Share"], correct: 0, th: "วิเคราะห์จุดอ่อนและปรับปรุง", en: "Analyze weakness and improve.", detail: "หัวใจสำคัญคือการนำผลไปวิเคราะห์เพื่อพัฒนาตัวเอง" }
        ];

        let lang = 'th';
        function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }
        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = questions.map((q, i) => `
                <div class="question-container" id="q${i}">
                    <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                    <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                    <div class="options">
                        ${(lang === 'th' ? q.a_th : q.a_en).map((a, j) => `<button onclick="check(${i}, ${j})">${a}</button>`).join(' ')}
                    </div>
                    <div class="detail" id="d${i}">${q.detail}</div>
                </div>
            `).join('');
        }
        function check(qIdx, aIdx) {
            const container = document.getElementById(`q${qIdx}`);
            const detail = document.getElementById(`d${qIdx}`);
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            if (aIdx === questions[qIdx].correct) {
                container.style.background = '#d4edda';
            } else {
                container.style.background = '#f8d7da';
            }
            detail.style.display = 'block';
        }
        function submitQuiz() { alert('ส่งคะแนนการทดสอบชุดที่ 4 (Mastery Level) ไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว!'); }
        render();
    </script>
</body>
</html>
