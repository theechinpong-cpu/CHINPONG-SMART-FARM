<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Advanced Present Simple Tense Quiz - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; padding: 20px; background-color: #fdfdfd; max-width: 800px; margin: auto; }
        h1 { color: #2c3e50; text-align: center; }
        .question { margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .options { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f9f9f9; }
        button:hover { background: #eef; }
        .correct { background-color: #c8e6c9 !important; border-color: #2e7d32 !important; }
        .incorrect { background-color: #ffcdd2 !important; border-color: #c62828 !important; }
        .detail { margin-top: 15px; padding: 10px; background: #f0f0f0; border-left: 4px solid #333; display: none; }
    </style>
</head>
<body>

    <h1>แบบทดสอบ Present Simple Tense (ระดับเข้มข้น)</h1>
    <p style="text-align:center;">สำหรับนักเรียน ม.1 โรงเรียนนานาชาติ</p>
    
    <div id="quiz-container"></div>

    <script>
        const questions = [
            { q: "1. Rarely _____ he miss a class, even when he feels unwell.", opts: ["does", "do", "is", "has"], correct: 0, exp: "Negative adverb 'Rarely' triggers inversion; requires auxiliary 'does'." },
            { q: "2. The committee _____ every Tuesday to discuss the curriculum updates.", opts: ["meet", "meets", "meeting", "are meeting"], correct: 1, exp: "Collective noun 'committee' acts as a singular unit here." },
            { q: "3. Neither the students nor the teacher _____ the answer to this complex problem.", opts: ["know", "knows", "are knowing", "is knowing"], correct: 1, exp: "In 'Neither/nor' structures, verb agrees with the closer subject (teacher)." },
            { q: "4. Water _____ at 100 degrees Celsius under standard atmospheric pressure.", opts: ["boil", "boils", "boiling", "is boiling"], correct: 1, exp: "General scientific truth uses Present Simple." },
            { q: "5. Everyone _____ that the school trip is scheduled for next Friday.", opts: ["know", "knows", "knowing", "is knowing"], correct: 1, exp: "'Everyone' is singular, requiring singular verb form." },
            { q: "6. Unless you _____ harder, you won't pass the final examination.", opts: ["study", "studies", "will study", "don't study"], correct: 0, exp: "First conditional: 'unless' clause takes Present Simple." },
            { q: "7. My father, along with his colleagues, _____ to the office every morning.", opts: ["drive", "drives", "driving", "are driving"], correct: 1, exp: "Prepositional phrase 'along with' does not change the singular subject 'father'." },
            { q: "8. Physics _____ a challenging subject for most secondary students.", opts: ["is", "are", "be", "been"], correct: 0, exp: "Academic subjects ending in -s are grammatically singular." },
            { q: "9. The news _____ always surprising to those who don't follow the updates.", opts: ["is", "are", "be", "were"], correct: 0, exp: "'News' is an uncountable noun, treated as singular." },
            { q: "10. If it _____ tomorrow, we will hold the assembly in the indoor gym.", opts: ["rain", "rains", "will rain", "raining"], correct: 1, exp: "First conditional: 'if' clause takes Present Simple." },
            { q: "11. Mathematics _____ my favorite subject because of its logical structure.", opts: ["is", "are", "remains", "remain"], correct: 0, exp: "'Mathematics' is singular." },
            { q: "12. The local library _____ at 6 PM sharp on weekdays.", opts: ["close", "closes", "is closing", "closing"], correct: 1, exp: "Fixed schedules use Present Simple." },
            { q: "13. Nobody _____ to be interrupted while working on a project.", opts: ["like", "likes", "liking", "are liking"], correct: 1, exp: "'Nobody' is an indefinite pronoun, takes singular verb." },
            { q: "14. She _____ believe in ghosts despite her friends' stories.", opts: ["don't", "doesn't", "isn't", "aren't"], correct: 1, exp: "Stative verb 'believe' requires 'doesn't' for negative." },
            { q: "15. How often _____ the school bus arrive at your stop?", opts: ["do", "does", "is", "are"], correct: 1, exp: "Subject 'school bus' is singular, requires 'does'." },
            { q: "16. The flock of birds _____ over the school field every afternoon.", opts: ["fly", "flies", "flying", "are flying"], correct: 1, exp: "'Flock' is the head noun (singular)."},
            { q: "17. He _____ English, French, and a bit of Mandarin fluently.", opts: ["speak", "speaks", "speaking", "is speaking"], correct: 1, exp: "Singular subject 'He' requires -s."},
            { q: "18. The data _____ that students who read daily perform better.", opts: ["show", "shows", "showing", "are showing"], correct: 1, exp: "In modern academic context, 'data' is often treated as plural, but 'shows' is common."},
            { q: "19. Each of the participants _____ a certificate after the workshop.", opts: ["receive", "receives", "receiving", "are receiving"], correct: 1, exp: "'Each' takes a singular verb."},
            { q: "20. What time _____ your classes usually begin?", opts: ["do", "does", "is", "are"], correct: 0, exp: "Plural subject 'classes' requires 'do'."},
            { q: "21. The smell of fresh flowers _____ the entire corridor.", opts: ["fill", "fills", "filling", "are filling"], correct: 1, exp: "Head noun 'smell' is singular."},
            { q: "22. My best friend _____ a collection of rare coins from around the world.", opts: ["own", "owns", "owning", "are owning"], correct: 1, exp: "Singular subject 'friend' requires -s."},
            { q: "23. Either the teacher or the students _____ the classroom door.", opts: ["lock", "locks", "locking", "are locking"], correct: 0, exp: "Verb agrees with the closer subject 'students' (plural)."},
            { q: "24. She _____ coffee because it makes her feel jittery.", opts: ["avoid", "avoids", "avoiding", "are avoiding"], correct: 1, exp: "Singular subject 'she' requires -s."},
            { q: "25. Always _____ the instructions carefully before starting the exam.", opts: ["read", "reads", "reading", "are reading"], correct: 0, exp: "Imperative sentence uses base verb."}
        ];

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((item, qIdx) => {
                let html = `<div class="question"><p><strong>${item.q}</strong></p><div class="options">`;
                item.opts.forEach((opt, oIdx) => {
                    html += `<button onclick="checkAnswer(${qIdx}, ${oIdx}, this)">${opt}</button>`;
                });
                html += `</div><div class="detail" id="detail${qIdx}"><strong>เฉลย:</strong> ${item.exp}</div></div>`;
                container.innerHTML += html;
            });
        }

        function checkAnswer(qIdx, oIdx, btn) {
            const parent = btn.parentElement;
            const detail = document.getElementById('detail' + qIdx);
            const buttons = parent.querySelectorAll('button');
            
            buttons.forEach(b => b.disabled = true);
            
            if (oIdx === questions[qIdx].correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                buttons[questions[qIdx].correct].classList.add('correct');
            }
            detail.style.display = 'block';
        }

        initQuiz();
    </script>
    <p style="text-align:center; margin-top:40px; color:#888;">เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
