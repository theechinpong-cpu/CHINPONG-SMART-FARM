<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 2) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-container { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { color: #d35400; font-weight: bold; font-style: italic; margin: 10px 0; padding: 5px; background: #fff3e0; border-left: 4px solid #d35400; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
        button { cursor: pointer; padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 2 - Hard Mode)</h1>
    <button onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "โครงสร้าง 'Isn't he a smart student?' ใช้ในกรณีใด", q_en: "When do we use 'Isn't he a smart student?'", a_th: ["คำถามปฏิเสธทั่วไป", "คำถามเพื่อความมั่นใจ", "ประโยคบอกเล่า", "คำสั่ง"], a_en: ["Negative question", "Confirming information", "Statement", "Command"], correct: 1, th: "เป็นการถามเพื่อยืนยันสิ่งที่คิด", en: "Seeking confirmation.", detail: "ใช้เพื่อถามยืนยันในสิ่งที่ผู้พูดเชื่อว่าเป็นจริง" },
            { q_th: "ถ้าห้องมี 'Not a lot of space' ความรู้สึกคือ", q_en: "If a room has 'not a lot of space', how does it feel?", a_th: ["กว้างขวาง", "อึดอัด", "สะดวกสบาย", "เงียบสงบ"], a_en: ["Spacious", "Cramped", "Comfortable", "Quiet"], correct: 1, th: "พื้นที่น้อยคืออึดอัด", en: "Small space feels cramped.", detail: "Not a lot of space คือพื้นที่น้อยหรือคับแคบ" },
            { q_th: "ประโยคใดแสดง Adjective ที่วางหลัง Verb to be ได้ถูกต้อง", q_en: "Which correctly uses an Adjective after Verb to be?", a_th: ["She is quiet girl.", "She is quiet.", "Quiet she is.", "Girl she is quiet."], a_en: ["She is quiet girl.", "She is quiet.", "Quiet she is.", "Girl she is quiet."], correct: 1, th: "หลัง verb to be ต้องตามด้วย adj", en: "Adjective follows verb to be.", detail: "หลัง is คือ Adjective ได้เลย" },
            { q_th: "Stereotype มักมีลักษณะอย่างไร", q_en: "What is a characteristic of a stereotype?", a_th: ["ข้อมูลจริง 100%", "การเหมาในกลุ่มคน", "ข้อมูลวิจัย", "กฎหมาย"], a_en: ["100% Truth", "Group generalization", "Research data", "Law"], correct: 1, th: "การเหมากลุ่มคนคือหัวใจของอคติ", en: "Generalization is key.", detail: "อคติคือการด่วนสรุปกลุ่มคน" },
            { q_th: "เลือกเติม: 'Math is __________ for me, but easy for her.'", q_en: "Complete: 'Math is __________ for me, but easy for her.'", a_th: ["hard", "fast", "own", "sunny"], a_en: ["hard", "fast", "own", "sunny"], correct: 0, th: "มี but แสดงความขัดแย้ง", en: "'But' shows contrast.", detail: "Easy ตรงข้ามกับ hard" },
            { q_th: "ข้อใดผิดหลักการใช้ Adjective", q_en: "Which is grammatically wrong?", a_th: ["A tall boy.", "A quiet room.", "A boy tall.", "A clean house."], a_en: ["A tall boy.", "A quiet room.", "A boy tall.", "A clean house."], correct: 2, th: "ปกติ adj วางหน้า N", en: "Adj goes before N.", detail: "A boy tall เรียงสลับตำแหน่ง" },
            { q_th: "คำว่า 'matter' ในบริบท 'It doesn't matter' คืออะไร", q_en: "What does 'matter' mean in 'It doesn't matter'?", a_th: ["สสาร", "ปัญหา", "ไม่สำคัญ", "ความจริง"], a_en: ["Matter", "Problem", "Not important", "Truth"], correct: 2, th: "แปลว่าไม่สำคัญ", en: "Means 'not important'.", detail: "Doesn't matter แปลว่า ไม่เป็นไรหรือไม่สำคัญ" },
            { q_th: "ทำไมการทำ 'eye contact' ถึงสำคัญ", q_en: "Why is 'eye contact' important?", a_th: ["ทำให้สวย", "แสดงความสนใจ", "เพื่อมองหน้า", "ลดความประหม่า"], a_en: ["Makes you pretty", "Shows interest", "Look at face", "Reduces nerves"], correct: 1, th: "แสดงถึงการตั้งใจฟัง", en: "Shows attention.", detail: "การสบตาแสดงความเอาใจใส่" },
            { q_th: "ประโยค 'My sister and I share a bathroom' คืออะไร", q_en: "'My sister and I share a bathroom' means:", a_th: ["คนละห้อง", "ใช้ห้องเดียวกัน", "ไม่มีห้องน้ำ", "ห้องน้ำสกปรก"], a_en: ["Different rooms", "Same room", "No bathroom", "Dirty"], correct: 1, th: "share คือใช้ร่วมกัน", en: "Share means use together.", detail: "Share หมายถึง ใช้ร่วมกัน" },
            { q_th: "ข้อใดคืออาการของคน Messy", q_en: "What is a sign of a messy person?", a_th: ["จัดของเป็นระเบียบ", "ของวางเกะกะ", "ทำความสะอาดบ่อย", "ชอบอ่านหนังสือ"], a_en: ["Tidy", "Cluttered items", "Cleaning often", "Reading"], correct: 1, th: "ไม่เป็นระเบียบ", en: "Disorganized.", detail: "Messy คือรกและไม่เป็นระเบียบ" },
            { q_th: "เลือกคำเติม: 'She runs for her __________.'", q_en: "Complete: 'She runs for her __________.'", a_th: ["health", "weight", "fast", "lazy"], a_en: ["health", "weight", "fast", "lazy"], correct: 0, th: "เพื่อสุขภาพ", en: "For health.", detail: "Runs for health คือวิ่งเพื่อสุขภาพ" },
            { q_th: "คำว่า 'fast' ใน 'Life goes by fast' ทำหน้าที่อะไร", q_en: "What is the function of 'fast' here?", a_th: ["Adjective", "Adverb", "Noun", "Verb"], a_en: ["Adjective", "Adverb", "Noun", "Verb"], correct: 1, th: "ขยายกริยา goes", en: "Modifies verb.", detail: "ขยายกริยาจึงเป็น Adverb" },
            { q_th: "ข้อใดคือการทำ First Impression ที่แย่", q_en: "What creates a bad first impression?", a_th: ["ยิ้มแย้ม", "ถามคำถามเยอะเกินไป", "ตั้งใจฟัง", "สบตา"], a_en: ["Smiling", "Asking too many questions", "Listening", "Eye contact"], correct: 1, th: "มากเกินไปก็ไม่ดี", en: "Too much is bad.", detail: "การถามมากไปดูเหมือนซักประวัติ" },
            { q_th: "ถ้าเรา 'agree' เราควรทำอย่างไร", q_en: "If you 'agree', what do you do?", a_th: ["คัดค้าน", "พยักหน้า", "เดินหนี", "พูดไม่รู้เรื่อง"], a_en: ["Oppose", "Nod", "Walk away", "Babble"], correct: 1, th: "เป็นการแสดงความเห็นด้วย", en: "Shows agreement.", detail: "การพยักหน้าแสดงความเห็นด้วย" },
            { q_th: "ข้อใดต่างจากพวก", q_en: "Which is the odd one out?", a_th: ["is", "am", "are", "do"], a_en: ["is", "am", "are", "do"], correct: 3, th: "3 ตัวแรกคือ verb to be", en: "First three are verb to be.", detail: "do ไม่ใช่ verb to be" },
            { q_th: "ประโยค 'I'm not from Canada' รูปเต็มคือ", q_en: "'I'm not from Canada' full form?", a_th: ["I am not from Canada", "I not am from Canada", "I am no from Canada", "I do not from Canada"], a_en: ["I am not from Canada", "I not am from Canada", "I am no from Canada", "I do not from Canada"], correct: 0, th: "I + am + not", en: "I + am + not.", detail: "I am not คือรูปเต็ม" },
            { q_th: "ข้อใดคือ Adj ขยาย Noun", q_en: "Which is Adj modifying Noun?", a_th: ["Kind girl", "She is kind", "Is she kind?", "Kind she is"], a_en: ["Kind girl", "She is kind", "Is she kind?", "Kind she is"], correct: 0, th: "วางหน้าคำนาม", en: "Before noun.", detail: "Kind girl วางหน้าคำนาม" },
            { q_th: "การพูดว่า 'He's smart and a good student' ใช้หลักอะไร", q_en: "'He's smart and a good student' uses what?", a_th: ["การเชื่อมความ", "การปฏิเสธ", "คำถาม", "Stereotype"], a_en: ["Conjunction", "Negation", "Question", "Stereotype"], correct: 0, th: "and เชื่อมความ", en: "And connects.", detail: "And เชื่อมข้อมูลสองอย่าง" },
            { q_th: "What do you do? ถามถึงอะไร", q_en: "'What do you do?' asks about?", a_th: ["งาน/สถานะ", "ที่อยู่", "ชื่อ", "ความชอบ"], a_en: ["Job/Status", "Location", "Name", "Interest"], correct: 0, th: "ถามอาชีพหรือสถานะ", en: "Asking job/status.", detail: "ถามอาชีพหรือสิ่งที่เป็นอยู่" },
            { q_th: "ข้อใดใช้ Adjective ผิด", q_en: "Which uses Adjective incorrectly?", a_th: ["Funny jokes", "Smart boy", "Quietly room", "Kind sister"], a_en: ["Funny jokes", "Smart boy", "Quietly room", "Kind sister"], correct: 2, th: "Quietly เป็น adv", en: "Quietly is adv.", detail: "ต้องใช้ Quiet room" },
            { q_th: "ถ้าเพื่อนบอกว่า 'I live with my roommate' คืออะไร", q_en: "'I live with my roommate' means?", a_th: ["อยู่คนเดียว", "อยู่กับคนแชร์ห้อง", "อยู่กับครอบครัว", "อยู่กับสัตว์เลี้ยง"], a_en: ["Alone", "With roommate", "With family", "With pet"], correct: 1, th: "roommate คือคนแชร์ห้อง", en: "Roommate is co-habitant.", detail: "อยู่กับเพื่อนร่วมห้อง" },
            { q_th: "คำว่า 'alone' แปลว่า", q_en: "'Alone' means?", a_th: ["ด้วยกัน", "คนเดียว", "เพื่อนเยอะ", "เสียงดัง"], a_en: ["Together", "By oneself", "Friends", "Loud"], correct: 1, th: "ตามลำพัง", en: "By oneself.", detail: "Alone แปลว่า ตามลำพัง" },
            { q_th: "ประโยคบอกเล่าประธาน he ใช้ไร", q_en: "Subject 'he' uses?", a_th: ["is", "am", "are", "do"], a_en: ["is", "am", "are", "do"], correct: 0, th: "he เป็นเอกพจน์", en: "He is singular.", detail: "He ใช้ is เสมอ" },
            { q_th: "ข้อใดหมายถึงอวกาศหรือที่ว่าง", q_en: "Which means space?", a_th: ["space", "move", "share", "own"], a_en: ["space", "move", "share", "own"], correct: 0, th: "space คือที่ว่าง", en: "Space is empty.", detail: "Space คือที่ว่าง" },
            { q_th: "ส่งคะแนนเมื่อทำเสร็จ", q_en: "Send score when done?", a_th: ["submitQuiz()", "exit()", "close()", "delete()"], a_en: ["submitQuiz()", "exit()", "close()", "delete()"], correct: 0, th: "ส่งคำตอบ", en: "Submit answer.", detail: "เรียกฟังก์ชัน submitQuiz" }
        ];

        let lang = 'th';
        function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }
        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = questions.map((q, i) => `
                <div class="question-container" id="q${i}">
                    <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                    <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                    <div class="options">
                        ${(lang === 'th' ? q.a_th : q.a_en).map((a, j) => `<button onclick="check(${i}, ${j})">${a}</button>`).join(' ')}
                    </div>
                    <div class="detail" id="d${i}">${q.detail}</div>
                </div>
            `).join('');
        }
        function check(qIdx, aIdx) {
            const container = document.getElementById(`q${qIdx}`);
            const detail = document.getElementById(`d${qIdx}`);
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            if (aIdx === questions[qIdx].correct) {
                container.style.background = '#d4edda';
            } else {
                container.style.background = '#f8d7da';
            }
            detail.style.display = 'block';
        }
        function submitQuiz() { alert('ส่งคะแนนการทดสอบชุดที่ 2 ไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว!'); }
        render();
    </script>
</body>
</html>
