<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบ Present Perfect Tense - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-toggle { background: #3498db; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-bottom: 10px; }
        .option { display: block; width: 100%; margin: 5px 0; padding: 10px; border: 1px solid #ccc; cursor: pointer; text-align: left; }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .tip-box { margin-top: 15px; padding: 10px; background: #fff0f0; border-left: 4px solid #e74c3c; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>แบบทดสอบ Present Perfect Tense</h1>
        <div id="quiz-area"></div>
        <div id="results"></div>
    </div>

    <script>
        const questions = [
            { q_th: "เขาเขียนหนังสือเล่มนี้มาเป็นเวลา 3 ปีแล้ว", q_en: "He ___ this book for 3 years.", a_th: ["write", "has written", "wrote", "is writing"], a_en: ["write", "has written", "wrote", "is writing"], correct: 1, th: "คำใบ้: มี for + เวลา ใช้ Present Perfect", en: "Tip: 'for + duration' requires Present Perfect.", detail: "ใช้ has written เพราะเหตุการณ์เริ่มต้นในอดีตและต่อเนื่องถึงปัจจุบัน" },
            { q_th: "ฉันยังทำการบ้านไม่เสร็จ", q_en: "I ___ my homework yet.", a_th: ["haven't finished", "didn't finish", "don't finish", "am not finishing"], a_en: ["haven't finished", "didn't finish", "don't finish", "am not finishing"], correct: 0, th: "คำใบ้: มี yet มักใช้ในประโยคปฏิเสธ", en: "Tip: 'yet' is commonly used in negative sentences.", detail: "haven't finished ใช้กับเหตุการณ์ที่ยังไม่เสร็จสิ้นจนถึงตอนนี้" },
            { q_th: "คุณเคยไปเที่ยวลอนดอนไหม?", q_en: "___ you ever visited London?", a_th: ["Do", "Did", "Have", "Are"], a_en: ["Do", "Did", "Have", "Are"], correct: 2, th: "คำใบ้: ประสบการณ์ใช้ Have + V.3", en: "Tip: Use 'Have' for past experiences.", detail: "ใช้ Have เพื่อถามถึงประสบการณ์ในอดีตถึงปัจจุบัน" },
            { q_th: "ฝนตกตั้งแต่ตอนเช้า", q_en: "It ___ since this morning.", a_th: ["rained", "rains", "has rained", "is raining"], a_en: ["rained", "rains", "has rained", "is raining"], correct: 2, th: "คำใบ้: มี since + จุดเวลา ใช้ Present Perfect", en: "Tip: 'since + point of time' requires Present Perfect.", detail: "has rained บอกเหตุการณ์ที่เริ่มตั้งแต่เช้าและยังคงตกอยู่" },
            { q_th: "แม่ทำอาหารเย็นเสร็จแล้ว", q_en: "Mom ___ dinner already.", a_th: ["cooked", "cooks", "has cooked", "is cooking"], a_en: ["cooked", "cooks", "has cooked", "is cooking"], correct: 2, th: "คำใบ้: already ใช้กับเหตุการณ์ที่เพิ่งทำเสร็จ", en: "Tip: 'already' signifies completion.", detail: "has cooked เน้นผลลัพธ์ในปัจจุบันว่าอาหารเสร็จแล้ว" },
            { q_th: "ฉันไม่เคยเห็นผีมาก่อน", q_en: "I ___ a ghost before.", a_th: ["never see", "have never seen", "never saw", "am never seeing"], a_en: ["never see", "have never seen", "never saw", "am never seeing"], correct: 1, th: "คำใบ้: ประสบการณ์ชีวิตห้ามลืมใช้ช่อง 3", en: "Tip: Use Past Participle for life experiences.", detail: "have never seen ใช้สำหรับประสบการณ์ที่ไม่เคยเกิดขึ้น" },
            { q_th: "พวกเขาเพิ่งจะกลับมาถึงบ้าน", q_en: "They ___ just arrived home.", a_th: ["have", "did", "are", "do"], a_en: ["have", "did", "are", "do"], correct: 0, th: "คำใบ้: โครงสร้างคือ have/has + just + V.3", en: "Tip: Just goes between auxiliary and participle.", detail: "have just arrived ใช้แสดงเหตุการณ์ที่เพิ่งเกิดขึ้น" },
            { q_th: "ฉันอาศัยอยู่ที่นี่มาตั้งแต่ปี 2010", q_en: "I ___ here since 2010.", a_th: ["live", "lived", "have lived", "am living"], a_en: ["live", "lived", "have lived", "am living"], correct: 2, th: "คำใบ้: ตั้งแต่จุดเวลา ใช้ since", en: "Tip: Use 'since' for starting points.", detail: "have lived แสดงความต่อเนื่องของเหตุการณ์" },
            { q_th: "เขายังไม่ได้ตอบอีเมลของฉัน", q_en: "He ___ my email yet.", a_th: ["hasn't answered", "didn't answer", "doesn't answer", "isn't answering"], a_en: ["hasn't answered", "didn't answer", "doesn't answer", "isn't answering"], correct: 0, th: "คำใบ้: ประธานเอกพจน์ใช้ has", en: "Tip: Singular subjects take 'has'.", detail: "hasn't answered คือโครงสร้างปฏิเสธสำหรับประธานเอกพจน์" },
            { q_th: "คุณเคยอ่านหนังสือเล่มนี้ไหม?", q_en: "___ you read this book before?", a_th: ["Do", "Did", "Have", "Are"], a_en: ["Do", "Did", "Have", "Are"], correct: 2, th: "คำใบ้: ประโยคคำถามประสบการณ์ใช้ Have", en: "Tip: Start questions with 'Have' for experience.", detail: "Have + S + V.3 คือโครงสร้างคำถามปกติ" },
            { q_th: "พวกเราทำงานนี้เสร็จแล้ว", q_en: "We ___ this work.", a_th: ["finish", "finished", "have finished", "are finishing"], a_en: ["finish", "finished", "have finished", "are finishing"], correct: 2, th: "คำใบ้: ประธานพหูพจน์ใช้ have", en: "Tip: 'We' requires 'have'.", detail: "have finished บอกถึงความสำเร็จของงาน" },
            { q_th: "เขาไปเที่ยวต่างประเทศมาแล้ว 2 ครั้ง", q_en: "He ___ abroad twice.", a_th: ["go", "went", "has gone", "has been"], a_en: ["go", "went", "has gone", "has been"], correct: 3, th: "คำใบ้: ไปแล้วกลับมาใช้ has been", en: "Tip: Use 'has been' for trips you've returned from.", detail: "has been ใช้เมื่อไปมาแล้วและกลับมาแล้ว" },
            { q_th: "ฉันทำกุญแจหาย", q_en: "I ___ my keys.", a_th: ["lose", "lost", "have lost", "am losing"], a_en: ["lose", "lost", "have lost", "am losing"], correct: 2, th: "คำใบ้: เน้นผลกระทบปัจจุบันคือยังหากุญแจไม่เจอ", en: "Tip: Use Present Perfect for current consequences.", detail: "have lost หมายถึงหายไปในอดีตและยังไม่ได้คืน" },
            { q_th: "นกบินหนีไปแล้ว", q_en: "The bird ___ away.", a_th: ["fly", "flew", "has flown", "is flying"], a_en: ["fly", "flew", "has flown", "is flying"], correct: 2, th: "คำใบ้: เหตุการณ์จบลงและเห็นผลทันที", en: "Tip: Present Perfect for immediate results.", detail: "has flown ใช้ V.3 (flown)" },
            { q_th: "คุณเคยทานอาหารญี่ปุ่นไหม?", q_en: "___ you ever eaten Japanese food?", a_th: ["Do", "Did", "Have", "Are"], a_en: ["Do", "Did", "Have", "Are"], correct: 2, th: "คำใบ้: ถามถึงประสบการณ์ในชีวิต", en: "Tip: 'ever' is a keyword for life experience.", detail: "Have + S + ever + V.3" },
            { q_th: "เขาทำความสะอาดห้องแล้ว", q_en: "He ___ the room.", a_th: ["clean", "cleaned", "has cleaned", "is cleaning"], a_en: ["clean", "cleaned", "has cleaned", "is cleaning"], correct: 2, th: "คำใบ้: เน้นว่าตอนนี้ห้องสะอาดแล้ว", en: "Tip: Result = Clean room.", detail: "has cleaned หมายถึงทำเสร็จสิ้น" },
            { q_th: "ฉันไม่เคยเห็นที่ไหนสวยขนาดนี้มาก่อน", q_en: "I ___ such a beautiful place before.", a_th: ["never see", "have never seen", "never saw", "am never seeing"], a_en: ["never see", "have never seen", "never saw", "am never seeing"], correct: 1, th: "คำใบ้: ประสบการณ์ที่ไม่เคยเกิดขึ้น", en: "Tip: Never experience = have never V.3.", detail: "have never seen เป็นการบอกเล่าประสบการณ์" },
            { q_th: "พวกเขายังไม่มาถึง", q_en: "They ___ yet.", a_th: ["haven't arrived", "didn't arrive", "don't arrive", "aren't arriving"], a_en: ["haven't arrived", "didn't arrive", "don't arrive", "aren't arriving"], correct: 0, th: "คำใบ้: yet ใช้คู่กับปฏิเสธ", en: "Tip: yet + negative.", detail: "haven't arrived เหมาะสมที่สุด" },
            { q_th: "เราไม่ได้คุยกันมานานแล้ว", q_en: "We ___ for a long time.", a_th: ["don't talk", "didn't talk", "haven't talked", "aren't talking"], a_en: ["don't talk", "didn't talk", "haven't talked", "aren't talking"], correct: 2, th: "คำใบ้: for + ช่วงเวลา", en: "Tip: Use 'for' with Present Perfect.", detail: "haven't talked บอกช่วงเวลาที่ไม่ได้ทำ" },
            { q_th: "เธอเขียนจดหมายเสร็จหรือยัง?", q_en: "___ she finished the letter yet?", a_th: ["Do", "Did", "Has", "Is"], a_en: ["Do", "Did", "Has", "Is"], correct: 2, th: "คำใบ้: ประธานเอกพจน์ถามด้วย Has", en: "Tip: 'She' needs 'Has'.", detail: "Has + S + V.3" },
            { q_th: "หิมะตกเยอะมากในฤดูหนาวนี้", q_en: "It ___ a lot this winter.", a_th: ["snow", "snowed", "has snowed", "is snowing"], a_en: ["snow", "snowed", "has snowed", "is snowing"], correct: 2, th: "คำใบ้: ฤดูหนาวนี้ยังไม่จบ ใช้ Perfect", en: "Tip: 'This winter' is still ongoing.", detail: "has snowed ใช้บอกเหตุการณ์ที่เกิดขึ้นในระยะเวลาปัจจุบัน" },
            { q_th: "ฉันจำเขาได้แล้ว", q_en: "I ___ him already.", a_th: ["remember", "remembered", "have remembered", "am remembering"], a_en: ["remember", "remembered", "have remembered", "am remembering"], correct: 2, th: "คำใบ้: จดจำได้ในตอนนี้", en: "Tip: Result in present = Perfect.", detail: "have remembered เน้นความสำเร็จในตอนนี้" },
            { q_th: "เขาเสียเงินไปทั้งหมดแล้ว", q_en: "He ___ all his money.", a_th: ["lose", "lost", "has lost", "is losing"], a_en: ["lose", "lost", "has lost", "is losing"], correct: 2, th: "คำใบ้: ผลปัจจุบันคือไม่เหลือเงิน", en: "Tip: 'Result: No money'.", detail: "has lost V.3 ของ lose คือ lost" },
            { q_th: "เธอเรียนภาษาอังกฤษมานานเท่าไหร่แล้ว?", q_en: "How long ___ she studied English?", a_th: ["do", "did", "has", "is"], a_en: ["do", "did", "has", "is"], correct: 2, th: "คำใบ้: How long ใช้ถามช่วงเวลา", en: "Tip: How long + Perfect.", detail: "Has + S + V.3" },
            { q_th: "พวกเขาดูหนังเรื่องนั้นจบแล้ว", q_en: "They ___ that movie.", a_th: ["watch", "watched", "have watched", "are watching"], a_en: ["watch", "watched", "have watched", "are watching"], correct: 2, th: "คำใบ้: ดูเสร็จแล้วเน้นผล", en: "Tip: 'already/completed' = Perfect.", detail: "have watched บอกผลว่าดูจบแล้ว" }
        ];

        function renderQuiz() {
            const area = document.getElementById('quiz-area');
            questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-container';
                div.id = `q-${index}`;
                div.innerHTML = `
                    <p><strong>ข้อ ${index + 1}:</strong> <span class="q-text">${q.q_th}</span></p>
                    <button class="btn-toggle" onclick="toggleLang(${index})">สลับภาษา (TH/EN)</button>
                    <div class="options">
                        ${q.a_th.map((opt, i) => `<button class="option" onclick="checkAnswer(${index}, ${i})">${opt}</button>`).join('')}
                    </div>
                    <div class="tip-box" id="tip-${index}"></div>
                `;
                area.appendChild(div);
            });
        }

        let answers = new Array(25).fill(null);
        function checkAnswer(qIdx, aIdx) {
            if (answers[qIdx] !== null) return;
            answers[qIdx] = aIdx;
            const isCorrect = questions[qIdx].correct === aIdx;
            const options = document.querySelectorAll(`#q-${qIdx} .option`);
            options.forEach(btn => btn.style.pointerEvents = 'none');
            options[aIdx].classList.add(isCorrect ? 'correct' : 'wrong');
            const tip = document.getElementById(`tip-${qIdx}`);
            tip.style.display = 'block';
            tip.innerHTML = `<strong>${questions[qIdx].th}</strong><br>${questions[qIdx].detail}`;
            checkCompletion();
        }

        function toggleLang(idx) {
            const q = questions[idx];
            const container = document.getElementById(`q-${idx}`);
            const isTH = container.querySelector('.q-text').innerText === q.q_th;
            container.querySelector('.q-text').innerText = isTH ? q.q_en : q.q_th;
            const buttons = container.querySelectorAll('.option');
            buttons.forEach((btn, i) => btn.innerText = isTH ? q.a_en[i] : q.a_th[i]);
            const tip = document.getElementById(`tip-${idx}`);
            if (tip.style.display === 'block') {
                tip.innerHTML = `<strong>${isTH ? q.en : q.th}</strong><br>${q.detail}`;
            }
        }

        function checkCompletion() {
            if (answers.filter(a => a !== null).length === 25) {
                const score = answers.filter((a, i) => a === questions[i].correct).length;
                const results = document.getElementById('results');
                results.innerHTML = `<h2>สรุปผลคะแนน: ${score}/25</h2><p style="color: ${score >= 15 ? '#2ecc71' : '#e74c3c'}">${score >= 15 ? '🌟 ทำได้ดีมาก' : '⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม'}</p>`;
                alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
            }
        }

        renderQuiz();
    </script>
</body>
</html>
