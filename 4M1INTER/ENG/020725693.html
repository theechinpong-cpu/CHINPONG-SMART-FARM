<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 3) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-container { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { color: #d35400; font-weight: bold; font-style: italic; margin: 10px 0; padding: 5px; background: #fff3e0; border-left: 4px solid #d35400; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
        button { cursor: pointer; padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; margin: 2px; }
    </style>
</head>
<body>
    <h1>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 3 - Challenge)</h1>
    <button onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "โครงสร้าง 'Are you not happy?' ต่างจาก 'Aren't you happy?' อย่างไร", q_en: "Difference between 'Are you not happy?' and 'Aren't you happy?'", a_th: ["ความหมายต่างกัน", "ระดับความเป็นทางการ", "ไม่มีข้อต่าง", "ใช้เฉพาะกับเพื่อน"], a_en: ["Different meaning", "Formal vs Informal", "No difference", "Only for friends"], correct: 1, th: "การใช้รูปย่อมีความเป็นกันเองมากกว่า", en: "Contractions are more informal.", detail: "Aren't คือรูปย่อมีความเป็นกันเองสูงกว่า" },
            { q_th: "ประโยค 'He is a man of his word' หมายถึงอะไร", q_en: "'He is a man of his word' means:", a_th: ["เขาพูดเก่ง", "เขารักษาสัญญา", "เขาเป็นนักพูด", "เขาโกหก"], a_en: ["He talks well", "He keeps his word", "He is a speaker", "He lies"], correct: 1, th: "คำสำนวนหมายถึงคนรักษาคำพูด", en: "Idiom for keeping promises.", detail: "Man of his word คือคนที่รักษาสัญญาเสมอ" },
            { q_th: "หากประธานคือ 'Neither the students nor the teacher...' ควรใช้ Verb อะไร", q_en: "Verb choice for 'Neither the students nor the teacher...'", a_th: ["is", "are", "were", "am"], a_en: ["is", "are", "were", "am"], correct: 0, th: "ตามตัวที่ใกล้สุดคือ teacher", en: "Follow the closest subject.", detail: "ตามกฎคือตามประธานใกล้สุดคือ Teacher(is)" },
            { q_th: "คำว่า 'Stereotype' มีที่มาจากอะไร", q_en: "Origin of the word 'Stereotype'?", a_th: ["Printing plate", "Sociology", "Psychology", "History"], a_en: ["Printing plate", "Sociology", "Psychology", "History"], correct: 0, th: "มาจากเทคนิคการพิมพ์ซ้ำ", en: "Derived from printing technique.", detail: "เคยเป็นแผ่นโลหะใช้ในการพิมพ์ซ้ำๆ" },
            { q_th: "เลือกใช้คำให้ถูก: 'The dog wagged __________ tail.'", q_en: "Fill in: 'The dog wagged __________ tail.'", a_th: ["it", "its", "it's", "its'"], a_en: ["it", "its", "it's", "its'"], correct: 1, th: "แสดงความเป็นเจ้าของ", en: "Possessive form.", detail: "Its คือความเป็นเจ้าของของสัตว์" },
            { q_th: "ข้อใดเป็นคำนามที่เป็นพหูพจน์ไม่ปกติ", q_en: "Which is an irregular plural noun?", a_th: ["dogs", "men", "cats", "books"], a_en: ["dogs", "men", "cats", "books"], correct: 1, th: "man -> men", en: "man -> men.", detail: "Man เปลี่ยนรูปเป็น Men" },
            { q_th: "ข้อใดคือความหมายของ 'Cooperate'", q_en: "Meaning of 'Cooperate'?", a_th: ["แข่งขัน", "ร่วมมือ", "โต้แย้ง", "หลีกเลี่ยง"], a_en: ["Compete", "Cooperate", "Argue", "Avoid"], correct: 1, th: "การทำงานร่วมกัน", en: "Working together.", detail: "Cooperate คือการทำงานร่วมกัน" },
            { q_th: "ประโยคใดแสดงการขัดแย้งได้สละสลวยที่สุด", q_en: "Best contrast sentence?", a_th: ["He is smart, but lazy.", "He is smart, and lazy.", "He is smart, or lazy.", "He is smart, so lazy."], a_en: ["He is smart, but lazy.", "He is smart, and lazy.", "He is smart, or lazy.", "He is smart, so lazy."], correct: 0, th: "but ใช้เชื่อมความขัดแย้ง", en: "But shows contrast.", detail: "ฉลาดแต่ขี้เกียจใช้ but" },
            { q_th: "ถ้าเรา 'assume' อะไรบางอย่าง เรากำลังทำอะไร", q_en: "If you 'assume' something, what are you doing?", a_th: ["วิจัย", "ด่วนสรุป", "พิสูจน์", "คำนวณ"], a_en: ["Research", "Assume without proof", "Prove", "Calculate"], correct: 1, th: "เป็นการคาดเดาโดยไม่มีหลักฐาน", en: "Guessing without evidence.", detail: "Assume คือการสรุปโดยยังไม่มีข้อมูลจริง" },
            { q_th: "ข้อใดใช้ 'my' อย่างถูกต้องในเชิงไวยากรณ์", q_en: "Correct usage of 'my'?", a_th: ["This is my.", "My is this.", "This is my book.", "Book is my."], a_en: ["This is my.", "My is this.", "This is my book.", "Book is my."], correct: 2, th: "my ต้องมีนามตาม", en: "My needs a noun.", detail: "My เป็น Adjective ต้องมีนามตาม" },
            { q_th: "ประโยค 'She has an own room' ผิดตรงไหน", q_en: "Error in 'She has an own room'?", a_th: ["ใช้ an", "ใช้ has", "ใช้ room", "ไม่มีข้อผิด"], a_en: ["Use an", "Use has", "Use room", "No error"], correct: 0, th: "ต้องใช้ her own", en: "Should be 'her own'.", detail: "ต้องระบุเจ้าของ เช่น her own" },
            { q_th: "คำว่า 'Tidy' เป็นคำประเภทใด", q_en: "What type of word is 'Tidy'?", a_th: ["Noun", "Verb", "Adjective", "Adverb"], a_en: ["Noun", "Verb", "Adjective", "Adverb"], correct: 2, th: "ใช้ขยายคำนามหรือบอกสถานะ", en: "Describes state.", detail: "Tidy คือสะอาด/เป็นระเบียบ(Adj)" },
            { q_th: "หากต้องการชมเพื่อนว่า 'แต่งตัวดี' ใช้คำไหน", q_en: "Compliment for 'well-dressed'?", a_th: ["Smart", "Messy", "Quiet", "Sunny"], a_en: ["Smart", "Messy", "Quiet", "Sunny"], correct: 0, th: "ในภาษาอังกฤษ smart แปลว่าดูดีได้", en: "Smart means looking good.", detail: "Smart สามารถแปลว่าแต่งตัวดูดีได้" },
            { q_th: "ประโยค 'He makes me happy' กริยาหลักคือ", q_en: "Main verb in 'He makes me happy'?", a_th: ["makes", "happy", "me", "He"], a_en: ["makes", "happy", "me", "He"], correct: 0, th: "makes คือ action", en: "Makes is action.", detail: "Makes เป็นกริยาหลัก" },
            { q_th: "ข้อใดใช้ verb to be ในรูปอดีต", q_en: "Verb to be in past tense?", a_th: ["is", "am", "were", "are"], a_en: ["is", "am", "were", "are"], correct: 2, th: "were เป็นอดีต", en: "Were is past.", detail: "Were คือรูปอดีตของ are" },
            { q_th: "คำว่า 'Inquire' หมายถึงอะไร", q_en: "What does 'Inquire' mean?", a_th: ["ตอบ", "ถาม", "เขียน", "อ่าน"], a_en: ["Answer", "Ask", "Write", "Read"], correct: 1, th: "แปลว่า สอบถาม", en: "To ask.", detail: "Inquire คือการสอบถามข้อมูล" },
            { q_th: "ประโยคคำถามที่ใช้ 'How' ถามถึงอะไร", q_en: "'How' asks about?", a_th: ["สถานที่", "วิธี", "คน", "เวลา"], a_en: ["Place", "Method", "Person", "Time"], correct: 1, th: "ถามวิธีการ", en: "Method/Manner.", detail: "How ถามถึงวิธีทำหรือความเป็นไป" },
            { q_th: "ข้อใดไม่ใช่บุรุษสรรพนาม", q_en: "Not a pronoun?", a_th: ["I", "They", "Table", "She"], a_en: ["I", "They", "Table", "She"], correct: 2, th: "table เป็นนาม", en: "Table is noun.", detail: "Table คือคำนาม (Noun)" },
            { q_th: "คำตรงข้ามของ 'Tidy' คือ", q_en: "Opposite of 'Tidy'?", a_th: ["Clean", "Messy", "Smart", "Kind"], a_en: ["Clean", "Messy", "Smart", "Kind"], correct: 1, th: "รก/ไม่เรียบร้อย", en: "Untidy.", detail: "Messy คือตรงข้ามกับ Tidy" },
            { q_th: "การประเมินตนเอง (Self-assessment) ช่วยอะไร", q_en: "Benefit of self-assessment?", a_th: ["ลดคะแนน", "รู้จุดอ่อน", "เพิ่มงาน", "เปลืองเวลา"], a_en: ["Lower score", "Know weakness", "More work", "Waste time"], correct: 1, th: "ช่วยให้พัฒนาถูกจุด", en: "Improves learning.", detail: "รู้จุดอ่อนทำให้พัฒนาได้ดีขึ้น" },
            { q_th: "ประโยค 'We are moving out' หมายถึง", q_en: "'We are moving out' means?", a_th: ["ย้ายเข้า", "ย้ายออก", "อยู่เฉยๆ", "ล้างจาน"], a_en: ["Moving in", "Moving out", "Staying", "Cleaning"], correct: 1, th: "ย้ายที่อยู่ออกไป", en: "Relocating.", detail: "Moving out คือการย้ายออก" },
            { q_th: "คำว่า 'Goal' มักใช้คู่กับกริยาใด", q_en: "Goal is used with?", a_th: ["set", "make", "eat", "walk"], a_en: ["set", "make", "eat", "walk"], correct: 0, th: "set a goal", en: "Set a goal.", detail: "Set a goal แปลว่า ตั้งเป้าหมาย" },
            { q_th: "ถ้าเราจะสื่อว่า 'ห้องของเธอ' (เจ้าของคนเดียว)", q_en: "'Her room'?", a_th: ["Her room", "She room", "Hers room", "He room"], a_en: ["Her room", "She room", "Hers room", "He room"], correct: 0, th: "Her เป็นเจ้าของ", en: "Possessive.", detail: "Her room คือห้องของเธอ" },
            { q_th: "ข้อใดสะกดคำว่า 'Comfortable' ถูก", q_en: "Correct spelling?", a_th: ["Comfortable", "Comfotable", "Comfortablee", "Comtable"], a_en: ["Comfortable", "Comfotable", "Comfortablee", "Comtable"], correct: 0, th: "สะกดให้ถูกต้อง", en: "Correct spelling.", detail: "Comfortable (C-O-M-F-O-R-T-A-B-L-E)" },
            { q_th: "ถ้าส่งข้อสอบนี้แล้วต้องทำอย่างไร", q_en: "After submitting?", a_th: ["รอรับคะแนน", "ทำใหม่", "ลบโค้ด", "ปิดคอม"], a_en: ["Wait for score", "Do again", "Delete code", "Close PC"], correct: 0, th: "วิเคราะห์ผล", en: "Analyze results.", detail: "ตรวจสอบผลคะแนนและนำไปปรับปรุง" }
        ];

        let lang = 'th';
        function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }
        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = questions.map((q, i) => `
                <div class="question-container" id="q${i}">
                    <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                    <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                    <div class="options">
                        ${(lang === 'th' ? q.a_th : q.a_en).map((a, j) => `<button onclick="check(${i}, ${j})">${a}</button>`).join(' ')}
                    </div>
                    <div class="detail" id="d${i}">${q.detail}</div>
                </div>
            `).join('');
        }
        function check(qIdx, aIdx) {
            const container = document.getElementById(`q${qIdx}`);
            const detail = document.getElementById(`d${qIdx}`);
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            if (aIdx === questions[qIdx].correct) {
                container.style.background = '#d4edda';
            } else {
                container.style.background = '#f8d7da';
            }
            detail.style.display = 'block';
        }
        function submitQuiz() { alert('ส่งคะแนนการทดสอบชุดที่ 3 ไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว!'); }
        render();
    </script>
</body>
</html>
