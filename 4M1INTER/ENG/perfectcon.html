<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบ Present Perfect Continuous Tense - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 8px 12px; margin: 5px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .answer-box { margin-top: 10px; padding: 10px; display: none; background: #e8f8f5; border-radius: 5px; border: 1px solid #2ecc71; }
        .correct { color: #2ecc71; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; }
        .clue { color: #e74c3c; font-weight: bold; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>แบบทดสอบ Present Perfect Continuous Tense</h1>
    <div id="quiz-area"></div>
    <div id="result-area"></div>
</div>

<script>
    const questions = [
        { q_th: "I ___ (study) for three hours.", q_en: "I ___ (study) for three hours.", a_th: ["have studied", "have been studying", "am studying", "studied"], a_en: ["have studied", "have been studying", "am studying", "studied"], correct: 1, th: "เน้นระยะเวลาที่ต่อเนื่องใช้ have been V.ing", en: "Focus on duration using have been V.ing", detail: "ใช้ have been studying เพราะมี for บอกระยะเวลาต่อเนื่อง" },
        { q_th: "She ___ (clean) the house all morning.", q_en: "She ___ (clean) the house all morning.", a_th: ["has cleaned", "has been cleaning", "is cleaning", "cleaned"], a_en: ["has cleaned", "has been cleaning", "is cleaning", "cleaned"], correct: 1, th: "all morning บ่งบอกความต่อเนื่อง", en: "all morning implies continuity", detail: "ใช้ has been cleaning เพราะกิจกรรมดำเนินต่อเนื่องตลอดช่วงเวลาที่ระบุ" },
        { q_th: "We ___ (wait) for the bus since 8 AM.", q_en: "We ___ (wait) for the bus since 8 AM.", a_th: ["have waited", "have been waiting", "are waiting", "waited"], a_en: ["have waited", "have been waiting", "are waiting", "waited"], correct: 1, th: "since บ่งบอกจุดเริ่มต้นในอดีต", en: "since marks the start in the past", detail: "ใช้ have been waiting เพราะเน้นเหตุการณ์ที่เริ่มตั้งแต่ 8 โมงจนถึงตอนนี้" },
        { q_th: "He ___ (work) here for five years.", q_en: "He ___ (work) here for five years.", a_th: ["has worked", "has been working", "is working", "worked"], a_en: ["has worked", "has been working", "is working", "worked"], correct: 1, th: "เน้นความต่อเนื่องของการทำงาน", en: "Focus on the continuity of work", detail: "ใช้ has been working เพื่อเน้นระยะเวลา 5 ปีที่ทำต่อเนื่องมา" },
        { q_th: "They ___ (play) football all afternoon.", q_en: "They ___ (play) football all afternoon.", a_th: ["have played", "have been playing", "are playing", "played"], a_en: ["have played", "have been playing", "are playing", "played"], correct: 1, th: "all afternoon คือช่วงเวลาที่ทำต่อเนื่อง", en: "all afternoon indicates continuous action", detail: "ใช้ have been playing เพราะกิจกรรมต่อเนื่องตลอดบ่าย" },
        { q_th: "My brother ___ (cook) since noon.", q_en: "My brother ___ (cook) since noon.", a_th: ["has cooked", "has been cooking", "is cooking", "cooked"], a_en: ["has cooked", "has been cooking", "is cooking", "cooked"], correct: 1, th: "since บอกเวลาเริ่มต้น", en: "since marks the start time", detail: "ใช้ has been cooking เพราะเริ่มทำตั้งแตเที่ยงและยังทำอยู่" },
        { q_th: "I ___ (feel) tired because I ___ (run).", q_en: "I ___ (feel) tired because I ___ (run).", a_th: ["am feeling / run", "have felt / have run", "feel / have been running", "am feeling / have been running"], a_en: ["am feeling / run", "have felt / have run", "feel / have been running", "am feeling / have been running"], correct: 3, th: "กริยา feel เป็น Stative Verb", en: "feel is a Stative Verb", detail: "feel ไม่ใช้รูป -ing แต่ run ใช้ได้เพื่อบอกสาเหตุความเหนื่อย" },
        { q_th: "It ___ (rain) all day.", q_en: "It ___ (rain) all day.", a_th: ["has rained", "has been raining", "is raining", "rained"], a_en: ["has rained", "has been raining", "is raining", "rained"], correct: 1, th: "all day เน้นระยะเวลา", en: "all day emphasizes duration", detail: "ใช้ has been raining เพราะฝนตกต่อเนื่องตลอดวัน" },
        { q_th: "She ___ (try) to fix this computer for hours.", q_en: "She ___ (try) to fix this computer for hours.", a_th: ["has tried", "has been trying", "is trying", "tried"], a_en: ["has tried", "has been trying", "is trying", "tried"], correct: 1, th: "for hours บ่งบอกความต่อเนื่อง", en: "for hours shows continuity", detail: "ใช้ has been trying เพื่อแสดงความพยายามที่ทำมาต่อเนื่องหลายชั่วโมง" },
        { q_th: "We ___ (live) in this city since 2010.", q_en: "We ___ (live) in this city since 2010.", a_th: ["have lived", "have been living", "are living", "lived"], a_en: ["have lived", "have been living", "are living", "lived"], correct: 1, th: "Live ใช้ได้ทั้ง Perfect/Perfect Continuous", en: "Live can be Perfect or Perfect Continuous", detail: "have been living เน้นความต่อเนื่องของที่อยู่อาศัย" },
        { q_th: "The baby ___ (cry) all night.", q_en: "The baby ___ (cry) all night.", a_th: ["has cried", "has been crying", "is crying", "cried"], a_en: ["has cried", "has been crying", "is crying", "cried"], correct: 1, th: "all night คือระยะเวลา", en: "all night is the duration", detail: "has been crying เน้นเหตุการณ์ที่เด็กร้องต่อเนื่องมาตลอดคืน" },
        { q_th: "You ___ (look) worried. What ___ (you/do)?", q_en: "You ___ (look) worried. What ___ (you/do)?", a_th: ["look / are you doing", "have looked / have you done", "look / have you been doing", "are looking / are you doing"], a_en: ["look / are you doing", "have looked / have you done", "look / have you been doing", "are looking / are you doing"], correct: 2, th: "ถามถึงกิจกรรมที่ทำมาตลอดจนหน้าตาดูเครียด", en: "Asking about the activity that caused the look", detail: "look เป็น Stative Verb ไม่ใช้ -ing แต่กิจกรรมที่ทำใช้ perfect continuous" },
        { q_th: "He ___ (read) this book all week.", q_en: "He ___ (read) this book all week.", a_th: ["has read", "has been reading", "is reading", "read"], a_en: ["has read", "has been reading", "is reading", "read"], correct: 1, th: "all week แสดงความต่อเนื่อง", en: "all week shows continuity", detail: "ใช้ has been reading เพราะเน้นการอ่านต่อเนื่องตลอดสัปดาห์" },
        { q_th: "I ___ (not/sleep) well lately.", q_en: "I ___ (not/sleep) well lately.", a_th: ["have not slept", "have not been sleeping", "am not sleeping", "did not sleep"], a_en: ["have not slept", "have not been sleeping", "am not sleeping", "did not sleep"], correct: 1, th: "lately ใช้กับ Perfect Continuous", en: "lately goes with Perfect Continuous", detail: "have not been sleeping เน้นช่วงเวลาล่าสุดที่นอนไม่หลับ" },
        { q_th: "Why are your clothes dirty? You ___ (garden).", q_en: "Why are your clothes dirty? You ___ (garden).", a_th: ["have gardened", "have been gardening", "are gardening", "gardened"], a_en: ["have gardened", "have been gardening", "are gardening", "gardened"], correct: 1, th: "เห็นผลลัพธ์จากอดีตที่ต่อเนื่องมา", en: "Result of a continuous action", detail: "มีร่องรอยความสกปรกจึงใช้ has/have been V.ing" },
        { q_th: "She ___ (learn) English for three years.", q_en: "She ___ (learn) English for three years.", a_th: ["has learned", "has been learning", "is learning", "learned"], a_en: ["has learned", "has been learning", "is learning", "learned"], correct: 1, th: "for three years เน้นระยะเวลา", en: "for three years emphasizes duration", detail: "has been learning เน้นกระบวนการที่ต่อเนื่องมา 3 ปี" },
        { q_th: "They ___ (talk) about this topic since morning.", q_en: "They ___ (talk) about this topic since morning.", a_th: ["have talked", "have been talking", "are talking", "talked"], a_en: ["have talked", "have been talking", "are talking", "talked"], correct: 1, th: "since บอกเวลาเริ่ม", en: "since indicates start time", detail: "have been talking เน้นบทสนทนาที่ต่อเนื่องมาแต่เช้า" },
        { q_th: "I ___ (think) about moving to a new house.", q_en: "I ___ (think) about moving to a new house.", a_th: ["have thought", "have been thinking", "am thinking", "thought"], a_en: ["have thought", "have been thinking", "am thinking", "thought"], correct: 1, th: "Think สามารถเน้นความคิดที่วนเวียน", en: "Think can emphasize persistent thoughts", detail: "have been thinking เน้นการคิดทบทวนต่อเนื่องมานาน" },
        { q_th: "He ___ (write) his thesis all year.", q_en: "He ___ (write) his thesis all year.", a_th: ["has written", "has been writing", "is writing", "wrote"], a_en: ["has written", "has been writing", "is writing", "wrote"], correct: 1, th: "all year บอกความยาวนาน", en: "all year shows long duration", detail: "has been writing เน้นงานเขียนที่ทำมาทั้งปี" },
        { q_th: "We ___ (wait) for the reply since last week.", q_en: "We ___ (wait) for the reply since last week.", a_th: ["have waited", "have been waiting", "are waiting", "waited"], a_en: ["have waited", "have been waiting", "are waiting", "waited"], correct: 1, th: "since last week คือจุดเริ่ม", en: "since last week is the start", detail: "have been waiting เน้นการรอคอยที่ยาวนาน" },
        { q_th: "The kids ___ (play) games all evening.", q_en: "The kids ___ (play) games all evening.", a_th: ["have played", "have been playing", "are playing", "played"], a_en: ["have played", "have been playing", "are playing", "played"], correct: 1, th: "all evening เป็นช่วงเวลา", en: "all evening is the duration", detail: "have been playing เน้นกิจกรรมตลอดเย็น" },
        { q_th: "I ___ (listen) to music for an hour.", q_en: "I ___ (listen) to music for an hour.", a_th: ["have listened", "have been listening", "am listening", "listened"], a_en: ["have listened", "have been listening", "am listening", "listened"], correct: 1, th: "for an hour คือตัวบ่งชี้", en: "for an hour is the indicator", detail: "have been listening เน้นการฟังต่อเนื่อง 1 ชั่วโมง" },
        { q_th: "She ___ (paint) the fence since 9 AM.", q_en: "She ___ (paint) the fence since 9 AM.", a_th: ["has painted", "has been painting", "is painting", "painted"], a_en: ["has painted", "has been painting", "is painting", "painted"], correct: 1, th: "since 9 AM บอกจุดเริ่ม", en: "since 9 AM tells the start", detail: "has been painting เน้นการทาสีต่อเนื่อง" },
        { q_th: "It ___ (snow) since midnight.", q_en: "It ___ (snow) since midnight.", a_th: ["has snowed", "has been snowing", "is snowing", "snowed"], a_en: ["has snowed", "has been snowing", "is snowing", "snowed"], correct: 1, th: "since midnight จุดเริ่มในอดีต", en: "since midnight, start in past", detail: "has been snowing เน้นหิมะตกต่อเนื่อง" },
        { q_th: "They ___ (discuss) this matter for days.", q_en: "They ___ (discuss) this matter for days.", a_th: ["have discussed", "have been discussing", "are discussing", "discussed"], a_en: ["have discussed", "have been discussing", "are discussing", "discussed"], correct: 1, th: "for days แสดงระยะเวลา", en: "for days shows duration", detail: "have been discussing เน้นการถกเถียงต่อเนื่องหลายวัน" }
    ];

    let score = 0;
    let answered = new Array(questions.length).fill(false);

    function renderQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, index) => {
            area.innerHTML += `
                <div class="question-container" id="q${index}">
                    <p><strong>ข้อที่ ${index + 1}:</strong> <span id="text${index}">${q.q_th}</span></p>
                    <button class="btn" onclick="toggleLang(${index})">สลับภาษา (TH/EN)</button>
                    <div id="opt${index}">
                        ${q.a_th.map((opt, i) => `<button class="btn" onclick="check(${index}, ${i})">${opt}</button>`).join('')}
                    </div>
                    <div class="answer-box" id="ans${index}"></div>
                </div>
            `;
        });
    }

    function toggleLang(idx) {
        const q = questions[idx];
        const isEng = document.getElementById(`text${idx}`).innerText === q.q_en;
        document.getElementById(`text${idx}`).innerText = isEng ? q.q_th : q.q_en;
        const btns = document.getElementById(`opt${idx}`).querySelectorAll('button');
        const opts = isEng ? q.a_th : q.a_en;
        btns.forEach((btn, i) => btn.innerText = opts[i]);
    }

    function check(qIdx, choice) {
        if(answered[qIdx]) return;
        answered[qIdx] = true;
        const q = questions[qIdx];
        const buttons = document.getElementById(`opt${qIdx}`).querySelectorAll('button');
        buttons.forEach(btn => btn.disabled = true);
        
        const box = document.getElementById('ans' + qIdx);
        box.style.display = 'block';
        if(choice === q.correct) {
            score++;
            buttons[choice].style.backgroundColor = '#2ecc71';
            box.innerHTML = `<p class="correct">ถูกต้อง!</p><p class="clue">คำใบ้: ${q.th}</p><p>${q.detail}</p>`;
        } else {
            buttons[choice].style.backgroundColor = '#e74c3c';
            buttons[q.correct].style.backgroundColor = '#2ecc71';
            box.innerHTML = `<p class="wrong">ผิดพลาด</p><p class="clue">คำใบ้: ${q.th}</p><p>${q.detail}</p>`;
        }
        if(answered.every(a => a)) showResult();
    }

    function showResult() {
        const result = document.getElementById('result-area');
        const percent = (score / questions.length) * 100;
        result.innerHTML = `<h2>คะแนนรวม: ${score} / ${questions.length}</h2>`;
        if(percent < 60) {
            result.innerHTML += `<p style="color:red">⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม: การใช้ Stative Verb และโครงสร้าง Continuous</p>`;
        } else {
            result.innerHTML += `<p style="color:green">🌟 ทำได้ดีมาก! คุณเข้าใจพื้นฐานการใช้งานได้แม่นยำ</p>`;
        }
        alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
    }

    renderQuiz();
</script>
<p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
