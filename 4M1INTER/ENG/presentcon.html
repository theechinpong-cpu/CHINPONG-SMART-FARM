<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบ Present Continuous - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-container { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9; }
        button:hover:not([disabled]) { background: #e0e0e0; }
        .correct { background-color: #2ecc71 !important; color: white; }
        .wrong { background-color: #e74c3c !important; color: white; }
        .answer-box { margin-top: 10px; padding: 10px; background: #fff3cd; border-left: 5px solid #ffc107; display: none; }
        .tip-highlight { color: #e74c3c; font-weight: bold; }
        .toggle-btn { font-size: 0.8em; background: #3498db; color: white; border: none; padding: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>แบบทดสอบ Present Continuous Tense (25 ข้อ)</h1>
        <p>โดย: พระจอมเกล้าติวเตอร์</p>
        <div id="quiz-root"></div>
        <div id="result-container" style="display:none; margin-top: 30px; padding: 20px; background: #e8f6f3; border-radius: 8px;"></div>
    </div>

    <script>
        const questions = [
            { q_th: "1. ฉันกำลังอ่านหนังสืออยู่ตอนนี้", q_en: "1. I ______ a book right now.", a_th: ["read", "am reading", "is reading", "are reading"], a_en: ["read", "am reading", "is reading", "are reading"], correct: 1, th: "กำลังทำตอนนี้ ใช้ am/is/are + V.ing", en: "Happening now: am/is/are + V.ing", detail: "ประธาน I ต้องคู่กับ am ตามด้วยกริยาเติม ing" },
            { q_th: "2. พวกเขากำลังเล่นฟุตบอล", q_en: "2. They ______ football.", a_th: ["play", "plays", "are playing", "is playing"], a_en: ["play", "plays", "are playing", "is playing"], correct: 2, th: "They คือพหูพจน์ใช้ are", en: "They is plural, use are", detail: "They เป็นประธานพหูพจน์จึงใช้ are" },
            { q_th: "3. แม่กำลังทำอาหารในครัว", q_en: "3. Mother ______ in the kitchen.", a_th: ["cook", "is cooking", "are cooking", "cooks"], a_en: ["cook", "is cooking", "are cooking", "cooks"], correct: 1, th: "แม่คนเดียวใช้ is", en: "Mother is singular, use is", detail: "ประธานเอกพจน์ Mother ใช้ is" },
            { q_th: "4. คุณกำลังดูอะไรอยู่?", q_en: "4. What ______ you ______?", a_th: ["do/watch", "are/watching", "is/watching", "are/watch"], a_en: ["do/watch", "are/watching", "is/watching", "are/watch"], correct: 1, th: "ถาม You ใช้ are", en: "For You, use are", detail: "ประโยคคำถามโครงสร้างคือ V.to be + S + V.ing" },
            { q_th: "5. เขาไม่ได้กำลังนอนหลับ", q_en: "5. He ______ sleeping.", a_th: ["isn't", "aren't", "don't", "doesn't"], a_en: ["isn't", "aren't", "don't", "doesn't"], correct: 0, th: "ปฏิเสธใช้ is/am/are + not", en: "Negative: is/am/are + not", detail: "He เป็นเอกพจน์จึงใช้ isn't" },
            { q_th: "6. ฉันกำลังวางแผนจะไปเที่ยวอาทิตย์หน้า", q_en: "6. I ______ next week.", a_th: ["travel", "traveling", "am traveling", "is traveling"], a_en: ["travel", "traveling", "am traveling", "is traveling"], correct: 2, th: "อนาคตที่วางแผนไว้ใช้ Present Con.", en: "Future plan: use Present Con.", detail: "การเตรียมการอนาคตใช้โครงสร้างเดียวกัน" },
            { q_th: "7. คุณมักจะมาสายอยู่เสมอ! (ตำหนิ)", q_en: "7. You ______ late!", a_th: ["always come", "are always coming", "always coming", "is always coming"], a_en: ["always come", "are always coming", "always coming", "is always coming"], correct: 1, th: "บ่น/ตำหนิ ใช้ always + V.ing", en: "Complaining: always + V.ing", detail: "การบ่นพฤติกรรมใช้โครงสร้าง Continuous" },
            { q_th: "8. อากาศกำลังแย่ลงเรื่อยๆ", q_en: "8. The weather ______ worse.", a_th: ["get", "gets", "is getting", "are getting"], a_en: ["get", "gets", "is getting", "are getting"], correct: 2, th: "เหตุการณ์เปลี่ยนแปลงใช้ V.ing", en: "Change: use V.ing", detail: "การเปลี่ยนแปลงหรือพัฒนาใช้ Continuous" },
            { q_th: "9. พวกเรากำลังเรียนภาษาอังกฤษกันอยู่", q_en: "9. We ______ English.", a_th: ["study", "studying", "are studying", "is studying"], a_en: ["study", "studying", "are studying", "is studying"], correct: 2, th: "We ใช้ are", en: "We use are", detail: "We เป็นพหูพจน์" },
            { q_th: "10. ฝนกำลังตก", q_en: "10. It ______.", a_th: ["rain", "rains", "is raining", "are raining"], a_en: ["rain", "rains", "is raining", "are raining"], correct: 2, th: "It ใช้ is", en: "It use is", detail: "It คือเอกพจน์" },
            { q_th: "11. เด็กๆ กำลังร้องเพลง", q_en: "11. The children ______ a song.", a_th: ["is singing", "are singing", "sing", "sings"], a_en: ["is singing", "are singing", "sing", "sings"], correct: 1, th: "Children เป็นพหูพจน์ใช้ are", en: "Children = plural, use are", detail: "คำนามพหูพจน์ไม่ปกติ" },
            { q_th: "12. ฉันไม่ได้กำลังทำงานวันนี้", q_en: "12. I ______ today.", a_th: ["am not working", "isn't working", "aren't working", "not working"], a_en: ["am not working", "isn't working", "aren't working", "not working"], correct: 0, th: "ปฏิเสธ I ใช้ am not", en: "I use am not", detail: "โครงสร้างปฏิเสธ" },
            { q_th: "13. พวกเขากำลังรอรถบัสไหม?", q_en: "13. ______ they ______ for the bus?", a_th: ["Do/wait", "Are/waiting", "Is/waiting", "Are/wait"], a_en: ["Do/wait", "Are/waiting", "Is/waiting", "Are/wait"], correct: 1, th: "ขึ้นต้นด้วย Are", en: "Start with Are", detail: "Question form" },
            { q_th: "14. เขากำลังอ่านข่าวอยู่", q_en: "14. He ______ the news.", a_th: ["is reading", "are reading", "read", "reads"], a_en: ["is reading", "are reading", "read", "reads"], correct: 0, th: "He ใช้ is", en: "He use is", detail: "He เอกพจน์" },
            { q_th: "15. พวกเขาชอบบ่นเรื่องเงินอยู่เรื่อยเลย (ขุ่นเคือง)", q_en: "15. They ______ about money.", a_th: ["always complain", "are always complaining", "is always complaining", "always complaining"], a_en: ["always complain", "are always complaining", "is always complaining", "always complaining"], correct: 1, th: "บ่นใช้ always + V.ing", en: "Complaining: always + V.ing", detail: "เน้นอารมณ์บ่น" },
            { q_th: "16. ราคาสินค้ากำลังพุ่งสูงขึ้น", q_en: "16. Prices ______ up.", a_th: ["go", "goes", "is going", "are going"], a_en: ["go", "goes", "is going", "are going"], correct: 3, th: "Prices พหูพจน์ใช้ are", en: "Prices = plural, use are", detail: "การเปลี่ยนแปลง" },
            { q_th: "17. ฉันกำลังฝึกกีตาร์ช่วงนี้", q_en: "17. I ______ guitar these days.", a_th: ["practice", "am practicing", "is practicing", "practicing"], a_en: ["practice", "am practicing", "is practicing", "practicing"], correct: 1, th: "เหตุการณ์ชั่วคราวใช้ V.ing", en: "Temporary: use V.ing", detail: "กิจกรรมช่วงนี้" },
            { q_th: "18. เธอไม่ได้กำลังเรียนภาษาจีน", q_en: "18. She ______ Chinese.", a_th: ["isn't studying", "aren't studying", "doesn't study", "not studying"], a_en: ["isn't studying", "aren't studying", "doesn't study", "not studying"], correct: 0, th: "She ใช้ isn't", en: "She use isn't", detail: "ปฏิเสธ" },
            { q_th: "19. คุณกำลังทำอะไรอยู่?", q_en: "19. What ______ doing?", a_th: ["are you", "is you", "you are", "are"], a_en: ["are you", "is you", "you are", "are"], correct: 0, th: "สลับประธานกับ V.to be", en: "Invert S + V.to be", detail: "คำถาม" },
            { q_th: "20. เรากำลังไปดูหนังเย็นนี้", q_en: "20. We ______ a movie tonight.", a_th: ["go to see", "are going to see", "is going to see", "goes to see"], a_en: ["go to see", "are going to see", "is going to see", "goes to see"], correct: 1, th: "นัดหมายใช้ V.ing", en: "Plan: use V.ing", detail: "แผนการ" },
            { q_th: "21. แมวกำลังไล่หนู", q_en: "21. The cat ______ the mouse.", a_th: ["chase", "chases", "is chasing", "are chasing"], a_en: ["chase", "chases", "is chasing", "are chasing"], correct: 2, th: "Cat เอกพจน์ใช้ is", en: "Cat = singular, use is", detail: "กำลังกระทำ" },
            { q_th: "22. พวกเขาไม่ได้กำลังคุยกัน", q_en: "22. They ______ to each other.", a_th: ["aren't talking", "isn't talking", "don't talk", "not talk"], a_en: ["aren't talking", "isn't talking", "don't talk", "not talk"], correct: 0, th: "They ใช้ aren't", en: "They use aren't", detail: "ปฏิเสธ" },
            { q_th: "23. เขามักจะลืมของตลอดเลย! (ขุ่นเคือง)", q_en: "23. He ______ things!", a_th: ["is always forgetting", "always forgets", "always forgetting", "are always forgetting"], a_en: ["is always forgetting", "always forgets", "always forgetting", "are always forgetting"], correct: 0, th: "บ่นใช้ always + V.ing", en: "Complaining: always + V.ing", detail: "บ่น" },
            { q_th: "24. เทคโนโลยีมันกำลังพัฒนาเร็วมาก", q_en: "24. Technology ______ fast.", a_th: ["develop", "develops", "is developing", "are developing"], a_en: ["develop", "develops", "is developing", "are developing"], correct: 2, th: "พัฒนาใช้ Continuous", en: "Development: use Continuous", detail: "การเปลี่ยนแปลง" },
            { q_th: "25. ฉันกำลังเตรียมงานนำเสนออยู่", q_en: "25. I ______ the presentation.", a_th: ["prepare", "am preparing", "is preparing", "are preparing"], a_en: ["prepare", "am preparing", "is preparing", "are preparing"], correct: 1, th: "กำลังทำใช้ am + V.ing", en: "Doing: am + V.ing", detail: "กำลังทำอยู่" }
        ];

        let scores = 0;
        let answered = 0;

        function init() {
            const root = document.getElementById('quiz-root');
            questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'question-container';
                div.innerHTML = `
                    <button class="toggle-btn" onclick="toggle(${i})">Switch TH/EN</button>
                    <p class="q-text" id="qtext-${i}">${q.q_th}</p>
                    <div class="options" id="opt-${i}">
                        ${q.a_th.map((opt, j) => `<button onclick="check(${i}, ${j})">${opt}</button>`).join('')}
                    </div>
                    <div class="answer-box" id="ans-${i}">
                        <p><span class="tip-highlight" id="tip-${i}">คำใบ้: ${q.th}</span></p>
                        <p>${q.detail}</p>
                    </div>
                `;
                root.appendChild(div);
            });
        }

        function toggle(i) {
            const isTH = document.getElementById(`qtext-${i}`).innerText === questions[i].q_th;
            document.getElementById(`qtext-${i}`).innerText = isTH ? questions[i].q_en : questions[i].q_th;
            document.getElementById(`tip-${i}`).innerText = isTH ? "Tip: " + questions[i].en : "คำใบ้: " + questions[i].th;
            const btns = document.getElementById(`opt-${i}`).getElementsByTagName('button');
            for(let j=0; j<4; j++) btns[j].innerText = isTH ? questions[i].a_en[j] : questions[i].a_th[j];
        }

        function check(qI, aI) {
            const btns = document.getElementById(`opt-${qI}`).getElementsByTagName('button');
            for(let btn of btns) btn.disabled = true;
            if(aI === questions[qI].correct) {
                btns[aI].classList.add('correct');
                scores++;
            } else {
                btns[aI].classList.add('wrong');
                btns[questions[qI].correct].classList.add('correct');
            }
            document.getElementById(`ans-${qI}`).style.display = 'block';
            answered++;
            if(answered === 25) {
                const res = document.getElementById('result-container');
                res.style.display = 'block';
                const percent = (scores/25)*100;
                res.innerHTML = `<h3>สรุปผลคะแนน: ${scores}/25 (${percent.toFixed(0)}%)</h3>` + 
                    (percent >= 60 ? '<p style="color:green">🌟 ทำได้ดีมาก</p>' : '<p style="color:red">⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม</p>');
                alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
            }
        }

        init();
    </script>
</body>
</html>
