<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบ Present Continuous Tense - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .toggle-btn { background: #3498db; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-bottom: 10px; }
        .option { display: block; margin: 10px 0; padding: 10px; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        .answer-box { margin-top: 10px; padding: 15px; background: #f9f9f9; border-left: 5px solid #3498db; display: none; }
        .clue { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<h1>แบบทดสอบ Present Continuous Tense</h1>
<div id="exam-container"></div>
<div id="result-container" class="card" style="display:none; text-align:center;"></div>

<script>
const questions = [
    { q_th: "ตอนนี้เขากำลังทำอะไร?", q_en: "What is he doing right now?", a_th: ["เล่นฟุตบอล", "กินข้าว", "นอน", "อ่านหนังสือ"], a_en: ["playing football", "eating", "sleeping", "reading"], correct: 0, th: "มีคำว่า right now คือกำลังทำ", en: "Look for the keyword 'right now'", detail: "Present Continuous ใช้กับเหตุการณ์ที่กำลังเกิดขึ้นขณะพูด" },
    { q_th: "ฉัน ___ การบ้านในขณะนี้", q_en: "I ___ my homework at the moment.", a_th: ["ทำ", "กำลังทำ", "ทำอยู่", "ทำเสร็จแล้ว"], a_en: ["do", "am doing", "am do", "did"], correct: 1, th: "at the moment = ขณะนี้ ใช้โครงสร้าง S + is/am/are + V-ing", en: "'at the moment' indicates an action in progress", detail: "ใช้ am doing เพราะประธานคือ I" },
    { q_th: "สัปดาห์นี้เขาพักที่โรงแรม", q_en: "He ___ at a hotel this week.", a_th: ["พัก", "กำลังพัก", "จะพัก", "พักอยู่"], a_en: ["stay", "is staying", "stays", "stayed"], correct: 1, th: "this week บอกว่าเป็นเหตุการณ์ชั่วคราว", en: "'this week' suggests a temporary situation", detail: "เหตุการณ์ชั่วคราวใช้ Present Continuous" },
    { q_th: "พวกเราจะบินไปญี่ปุ่นพรุ่งนี้", q_en: "We ___ to Japan tomorrow.", a_th: ["บิน", "กำลังบิน", "จะบิน", "บินอยู่"], a_en: ["fly", "are flying", "will fly", "flown"], correct: 1, th: "แผนการที่วางไว้แล้ว (จองตั๋วแล้ว) ใช้ Present Continuous", en: "Definite future plans use Present Continuous", detail: "แผนการที่ชัดเจนใช้โครงสร้างนี้ได้" },
    { q_th: "คุณมักจะมาสายเสมอเลย! (บ่น)", q_en: "You ___ always coming late!", a_th: ["มา", "กำลังมา", "มาอยู่", "จะมา"], a_en: ["come", "are", "coming", "is"], correct: 1, th: "แสดงความหงุดหงิดกับพฤติกรรมใช้ always + V-ing", en: "Use always + V-ing to express annoyance", detail: "always ร่วมกับ Continuous ใช้บ่นพฤติกรรมที่รำคาญ" },
    { q_th: "อากาศกำลังร้อนขึ้นเรื่อยๆ", q_en: "The weather ___ warmer.", a_th: ["ร้อน", "กำลังร้อนขึ้น", "กลายเป็น", "คือร้อน"], a_en: ["get", "is getting", "gets", "is get"], correct: 1, th: "การเปลี่ยนแปลงใช้ V-ing", en: "Use V-ing for trends and changes", detail: "get เป็นกริยาแสดงการเปลี่ยนสถานะ" },
    { q_th: "เธอกำลังอ่านนิทานให้ลูกฟัง", q_en: "She ___ a story to her son.", a_th: ["อ่าน", "กำลังอ่าน", "จะอ่าน", "ได้อ่าน"], a_en: ["read", "is reading", "reads", "has read"], correct: 1, th: "เหตุการณ์ที่กำลังทำอยู่ขณะนี้", en: "Action in progress right now", detail: "is reading คือโครงสร้างที่ถูกต้อง" },
    { q_th: "ฉันกำลังเรียนภาษาอังกฤษช่วงนี้", q_en: "I ___ English these days.", a_th: ["เรียน", "กำลังเรียน", "จะเรียน", "เรียนรู้"], a_en: ["study", "am studying", "studies", "studied"], correct: 1, th: "these days เป็นเหตุการณ์ชั่วคราว", en: "'these days' = temporary situation", detail: "ใช้ am studying เพื่อแสดงกิจกรรมช่วงนี้" },
    { q_th: "พวกเขาดูเหมือนกำลังหัวเราะ", q_en: "They ___ at the moment.", a_th: ["หัวเราะ", "กำลังหัวเราะ", "จะหัวเราะ", "ได้หัวเราะ"], a_en: ["laugh", "are laughing", "laughed", "will laugh"], correct: 1, th: "at the moment บอกว่ากำลังทำ", en: "Look for 'at the moment'", detail: "are laughing เป็นรูป V-ing ที่สมบูรณ์" },
    { q_th: "ฝนกำลังตกหนัก", q_en: "It ___ hard.", a_th: ["ตก", "กำลังตก", "ตกอยู่", "จะตก"], a_en: ["rain", "is raining", "rains", "rained"], correct: 1, th: "เหตุการณ์ธรรมชาติที่กำลังเกิด", en: "Natural action happening now", detail: "is raining ใช้กับประธาน It" },
    { q_th: "พ่อกำลังซ่อมรถในโรงรถ", q_en: "Father ___ the car in the garage.", a_th: ["ซ่อม", "กำลังซ่อม", "จะซ่อม", "ซ่อมอยู่"], a_en: ["repair", "is repairing", "repairs", "repaired"], correct: 1, th: "กำลังทำกิจกรรมต่อเนื่อง", en: "Continuous action in the garage", detail: "is repairing คือคำตอบที่ถูกต้อง" },
    { q_th: "พวกเรากำลังเตรียมตัวสำหรับงานปาร์ตี้", q_en: "We ___ for the party.", a_th: ["เตรียม", "กำลังเตรียม", "จะเตรียม", "เตรียมแล้ว"], a_en: ["prepare", "are preparing", "prepared", "prepares"], correct: 1, th: "การเตรียมตัวที่มีการนัดหมาย", en: "Future plan arrangement", detail: "are preparing ใช้กับประธาน We" },
    { q_th: "ทำไมคุณถึงบ่นเรื่องงานตลอดเลย!", q_en: "Why ___ you always complaining about work!", a_th: ["ทำไม", "คือ", "อยู่", "ถูก"], a_en: ["do", "are", "is", "have"], correct: 1, th: "always + V-ing ใช้บ่น", en: "Annoyance with always", detail: "are อยู่ในรูปประโยคคำถาม" },
    { q_th: "ราคาสินค้ากำลังเพิ่มขึ้น", q_en: "The prices ___.", a_th: ["เพิ่ม", "กำลังเพิ่ม", "จะเพิ่ม", "เพิ่มขึ้น"], a_en: ["increase", "are increasing", "increases", "increased"], correct: 1, th: "แนวโน้มการเปลี่ยนแปลง", en: "Trend or change over time", detail: "are increasing แสดงการเปลี่ยนแปลง" },
    { q_th: "ลูกกำลังเล่นซ่อนหา", q_en: "The kids ___ hide and seek.", a_th: ["เล่น", "กำลังเล่น", "จะเล่น", "เล่นอยู่"], a_en: ["play", "are playing", "plays", "played"], correct: 1, th: "กำลังทำกิจกรรมในปัจจุบัน", en: "Action in progress", detail: "are playing คือคำตอบที่ถูก" },
    { q_th: "เธอกำลังยุ่งอยู่กับการเตรียมอาหาร", q_en: "She ___ dinner.", a_th: ["ทำ", "กำลังทำ", "จะทำ", "ทำเสร็จ"], a_en: ["cook", "is cooking", "cooks", "cooked"], correct: 1, th: "is + V-ing", en: "She is + V-ing", detail: "is cooking คือรูปประโยคที่ถูกต้อง" },
    { q_th: "คุณกำลังเขียนอะไรอยู่?", q_en: "What ___ you writing?", a_th: ["เป็น", "คือ", "อยู่", "กำลัง"], a_en: ["do", "are", "is", "were"], correct: 1, th: "ประธานคือ you ใช้ are", en: "Use 'are' with 'you'", detail: "are you writing เป็นโครงสร้างคำถาม" },
    { q_th: "น้องชายกำลังเต้นรำในห้อง", q_en: "My brother ___ in the room.", a_th: ["เต้น", "กำลังเต้น", "จะเต้น", "เต้นอยู่"], a_en: ["dance", "is dancing", "dances", "danced"], correct: 1, th: "กำลังทำกิจกรรมขณะนี้", en: "Continuous action in the room", detail: "is dancing คือรูปที่ถูกต้อง" },
    { q_th: "วันนี้ฉันกำลังเดินทางไปกรุงเทพฯ", q_en: "I ___ to Bangkok today.", a_th: ["ไป", "กำลังไป", "จะไป", "ได้ไป"], a_en: ["go", "am going", "went", "gone"], correct: 1, th: "แผนการเดินทาง", en: "Travel plan for today", detail: "am going คือคำตอบที่ถูก" },
    { q_th: "เขากำลังมองหาที่พัก", q_en: "He ___ for a place to stay.", a_th: ["มอง", "กำลังมอง", "จะมอง", "มองอยู่"], a_en: ["look", "is looking", "looked", "looks"], correct: 1, th: "กำลังทำกิจกรรมต่อเนื่อง", en: "Continuous search", detail: "is looking คือคำตอบที่ถูกต้อง" },
    { q_th: "คุณพูดแทรกฉันตลอดเลย!", q_en: "You ___ always interrupting me!", a_th: ["พูด", "กำลังพูด", "คือ", "อยู่"], a_en: ["do", "are", "were", "be"], correct: 1, th: "always + V-ing แสดงความรำคาญ", en: "Always + V-ing for annoyance", detail: "are คือ verb to be ที่ใช้กับ you" },
    { q_th: "เทคโนโลยีกำลังพัฒนาเร็วมาก", q_en: "Technology ___ very fast.", a_th: ["พัฒนา", "กำลังพัฒนา", "จะพัฒนา", "พัฒนาอยู่"], a_en: ["develop", "is developing", "develops", "developed"], correct: 1, th: "การเปลี่ยนแปลงในปัจจุบัน", en: "Rapid development change", detail: "is developing คือรูปประโยคที่ถูกต้อง" },
    { q_th: "พวกเรากำลังฟังเพลง", q_en: "We ___ to music.", a_th: ["ฟัง", "กำลังฟัง", "จะฟัง", "ฟังอยู่"], a_en: ["listen", "are listening", "listens", "listened"], correct: 1, th: "กำลังฟังอยู่ตอนนี้", en: "Listening right now", detail: "are listening ใช้กับ We" },
    { q_th: "คุณกำลังรอใคร?", q_en: "Who ___ you waiting for?", a_th: ["เป็น", "คือ", "อยู่", "กำลัง"], a_en: ["do", "are", "is", "were"], correct: 1, th: "ประธาน you คู่กับ are", en: "You + are", detail: "are you waiting คือคำถาม" },
    { q_th: "ฉันกำลังนอนหลับ อย่ากวนนะ", q_en: "I ___! Don't disturb me.", a_th: ["นอน", "กำลังนอน", "จะนอน", "นอนอยู่"], a_en: ["sleep", "am sleeping", "sleeps", "slept"], correct: 1, th: "กำลังทำอยู่ขณะนี้", en: "Action happening right now", detail: "am sleeping คือคำตอบที่ถูก" }
];

function renderExams() {
    const container = document.getElementById('exam-container');
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'card question-container';
        div.innerHTML = `
            <button class="toggle-btn" onclick="toggleLang(${index})">TH / EN</button>
            <h3 class="q-text" id="q-${index}">${q.q_th}</h3>
            ${q.a_th.map((opt, i) => `<div class="option" onclick="checkAnswer(${index}, ${i})">${opt}</div>`).join('')}
            <div class="answer-box" id="ans-${index}">
                <p class="clue" id="clue-${index}">คำใบ้: ${q.th}</p>
                <p>เฉลย: ${q.detail}</p>
            </div>
        `;
        container.appendChild(div);
    });
}

function toggleLang(index) {
    const q = questions[index];
    const isEn = document.getElementById(`q-${index}`).innerText === q.q_en;
    document.getElementById(`q-${index}`).innerText = isEn ? q.q_th : q.q_en;
    const options = document.querySelectorAll(`.question-container:nth-child(${index + 1}) .option`);
    options.forEach((opt, i) => {
        opt.innerText = isEn ? q.a_th[i] : q.a_en[i];
    });
    document.getElementById(`clue-${index}`).innerText = (isEn ? "คำใบ้: " : "Clue: ") + (isEn ? q.th : q.en);
}

let score = 0;
let answered = 0;
function checkAnswer(qIdx, aIdx) {
    const q = questions[qIdx];
    const options = document.querySelectorAll(`.question-container:nth-child(${qIdx + 1}) .option`);
    options.forEach(opt => opt.style.pointerEvents = 'none');
    
    if(aIdx === q.correct) {
        options[aIdx].classList.add('correct');
        score++;
    } else {
        options[aIdx].classList.add('wrong');
        options[q.correct].classList.add('correct');
    }
    document.getElementById(`ans-${qIdx}`).style.display = 'block';
    answered++;
    if(answered === questions.length) showResult();
}

function showResult() {
    const container = document.getElementById('result-container');
    const percent = (score / questions.length) * 100;
    container.style.display = 'block';
    container.innerHTML = `
        <h2>สรุปผลคะแนน: ${score} / ${questions.length} (${percent}%)</h2>
        <p style="color: ${percent >= 60 ? '#2ecc71' : '#e74c3c'}">
            ${percent >= 60 ? '🌟 ทำได้ดีมาก' : '⚠️ จุดอ่อนที่ต้องทบทวนเพิ่ม'}
        </p>
    `;
    console.log("Simulating email to: thee.chinpong@hmail.com");
    alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว");
}

renderExams();
</script>
<p>เขียนโดย พระจอมเกล้าติวเตอร์</p>
</body>
</html>
