<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-container { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { color: #d35400; font-weight: bold; font-style: italic; margin: 10px 0; padding: 5px; background: #fff3e0; border-left: 4px solid #d35400; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 5px; }
        button { cursor: pointer; padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>ข้อสอบกลางภาคเรียนที่ 1 - ภาษาอังกฤษ ม.1</h1>
    <button class="btn-lang" onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "ข้อใดใช้ verb to be ได้ถูกต้อง", q_en: "Which sentence uses 'verb to be' correctly?", a_th: ["I is a student.", "They is happy.", "She are smart.", "He is kind."], a_en: ["I is a student.", "They is happy.", "She are smart.", "He is kind."], correct: 3, th: "ประธานเอกพจน์บุรุษที่ 3 ใช้กับ is", en: "Third-person singular uses 'is'.", detail: "He เป็นเอกพจน์จึงคู่กับ is" },
            { q_th: "เมื่ออากาศดีและมีหน้าต่างมาก ห้องจะเป็นอย่างไร", q_en: "If the weather is nice and there are many windows, how is the room?", a_th: ["sunny", "move", "space", "share"], a_en: ["sunny", "move", "space", "share"], correct: 0, th: "sunny แปลว่ามีแสงแดดส่องถึง", en: "Sunny means bright with light.", detail: "Sunny เหมาะกับสภาพห้องที่รับแสงดี" },
            { q_th: "ข้อใดคือ Stereotype ของนักวิทยาศาสตร์ตามเนื้อหา", q_en: "Which is a stereotype of scientists?", a_th: ["Scientists use tools.", "All scientists are men.", "Scientists work hard.", "Scientists study world."], a_en: ["Scientists use tools.", "All scientists are men.", "Scientists work hard.", "Scientists study world."], correct: 1, th: "การเหมาว่าทุกคนต้องเป็นเพศใดเพศหนึ่งคืออคติ", en: "Generalizing gender is a stereotype.", detail: "การสรุปเหมารวมว่า All... คืออคติ" },
            { q_th: "ข้อใดใช้ Adjective วางหน้าคำนามได้ถูกต้อง", q_en: "Which uses an adjective before a noun correctly?", a_th: ["Jokes funny are.", "He funny tells.", "He tells funny jokes.", "Funny he is."], a_en: ["Jokes funny are.", "He funny tells.", "He tells funny jokes.", "Funny he is."], correct: 2, th: "funny ขยาย jokes", en: "Funny modifies jokes.", detail: "Adj วางหน้า N ได้คือ funny jokes" },
            { q_th: "เติมประโยค: We have our __________ bathrooms.", q_en: "Complete: We have our __________ bathrooms.", a_th: ["own", "alone", "move", "space"], a_en: ["own", "alone", "move", "space"], correct: 0, th: "own หมายถึง ของเราเอง", en: "Own means belonging to us.", detail: "Our own เป็นการเน้นความเป็นเจ้าของ" },
            { q_th: "ปฏิเสธของ 'They are from Japan' คือ", q_en: "Negative of 'They are from Japan' is:", a_th: ["They aren't from Japan.", "They no are from Japan.", "They don't from Japan.", "They not be from Japan."], a_en: ["They aren't from Japan.", "They no are from Japan.", "They don't from Japan.", "They not be from Japan."], correct: 0, th: "เติม not หลัง verb to be", en: "Add not after verb to be.", detail: "They aren't คือรูปย่อของ are not" },
            { q_th: "คำว่า comfortable แปลว่าอะไร", q_en: "What does 'comfortable' mean?", a_th: ["รู้สึกสบาย", "รู้สึกอึดอัด", "รู้สึกเหนื่อย", "รู้สึกตื่นเต้น"], a_en: ["Feel comfortable", "Feel uncomfortable", "Feel tired", "Feel excited"], correct: 0, th: "เป็นความรู้สึกในเชิงบวกเมื่อได้นั่ง", en: "Positive feeling while sitting.", detail: "Comfortable แปลว่า สบาย" },
            { q_th: "คำถาม 'Where are you from?' แปลว่า", q_en: "'Where are you from?' means:", a_th: ["คุณไปที่ไหน", "คุณมาจากไหน", "คุณอยู่ที่ไหน", "คุณเป็นใคร"], a_en: ["Where do you go?", "Where are you from?", "Where are you?", "Who are you?"], correct: 1, th: "ถามถึงสถานที่ต้นกำเนิด", en: "Ask about origin.", detail: "Where are you from ถามที่มา" },
            { q_th: "คำตรงข้ามของ 'agree' คือ", q_en: "Opposite of 'agree' is:", a_th: ["disagree", "believe", "hard", "fast"], a_en: ["disagree", "believe", "hard", "fast"], correct: 0, th: "มี prefix dis- นำหน้า", en: "Use prefix dis-.", detail: "Agree เห็นด้วย Disagree ไม่เห็นด้วย" },
            { q_th: "การสร้าง First Impression ที่ดีควรทำอย่างไร", q_en: "How to make a good first impression?", a_th: ["Smile", "Talk about self", "Ask age", "Don't speak"], a_en: ["Smile", "Talk about self", "Ask age", "Don't speak"], correct: 0, th: "การยิ้มช่วยให้คนอื่นสบายใจ", en: "Smiling makes others feel at ease.", detail: "รอยยิ้มช่วยสร้างความประทับใจ" },
            { q_th: "ประโยค 'He is messy' หมายถึง", q_en: "'He is messy' means:", a_th: ["เขาเรียบร้อย", "เขาไม่สะอาด", "เขาขยัน", "เขาเป็นคนดี"], a_en: ["He is tidy.", "He is untidy.", "He is hardworking.", "He is kind."], correct: 1, th: "messy แปลว่า รกหรือไม่สะอาด", en: "Messy means untidy.", detail: "Messy หมายถึง ไม่เป็นระเบียบ" },
            { q_th: "คำใดหมายถึงเป้าหมายในอนาคต", q_en: "Which word means a future goal?", a_th: ["goal", "space", "move", "share"], a_en: ["goal", "space", "move", "share"], correct: 0, th: "goal แปลว่า เป้าหมาย", en: "Goal means objective.", detail: "Goal คือสิ่งที่ต้องการในอนาคต" },
            { q_th: "ข้อใดใช้ 'not' กับประธานได้ถูกต้อง", q_en: "Which uses 'not' correctly?", a_th: ["I not am.", "I am not.", "I am no.", "I not be."], a_en: ["I not am.", "I am not.", "I am no.", "I not be."], correct: 1, th: "วาง not หลัง am", en: "Place not after am.", detail: "I am not คือรูปประโยคปฏิเสธ" },
            { q_th: "คำคุณศัพท์ 'quiet' ขยายประธานอย่างไร", q_en: "How does 'quiet' describe the subject?", a_th: ["เงียบ", "เสียงดัง", "สะอาด", "สวย"], a_en: ["Silent", "Noisy", "Clean", "Beautiful"], correct: 0, th: "quiet แปลว่า เงียบ", en: "Quiet means silent.", detail: "Quiet หมายถึง ไม่ส่งเสียง" },
            { q_th: "ข้อใดคือการย้ายถิ่นฐาน", q_en: "Which word means moving home?", a_th: ["move", "share", "space", "own"], a_en: ["move", "share", "space", "own"], correct: 0, th: "move แปลว่า เคลื่อนย้าย", en: "Move means to change place.", detail: "Move คือการย้ายที่อยู่" },
            { q_th: "ใครคือผู้พูดที่ 'fun brother'", q_en: "Who is the 'fun brother'?", a_th: ["พี่ชาย", "น้องชาย", "เพื่อน", "ครู"], a_en: ["Older brother", "Younger brother", "Friend", "Teacher"], correct: 0, th: "brother คือ พี่หรือน้องชาย", en: "Brother means sibling.", detail: "Brother หมายถึง พี่น้องชาย" },
            { q_th: "คำว่า 'smart' แปลว่าอะไร", q_en: "What does 'smart' mean?", a_th: ["ฉลาด", "โง่", "รวย", "จน"], a_en: ["Intelligent", "Stupid", "Rich", "Poor"], correct: 0, th: "smart แปลว่า ฉลาด", en: "Smart means intelligent.", detail: "Smart คือฉลาดหลักแหลม" },
            { q_th: "ประโยคคำถามใดใช้ verb to be ถูก", q_en: "Which question uses verb to be correctly?", a_th: ["Is you happy?", "Are you happy?", "Be you happy?", "Are he happy?"], a_en: ["Is you happy?", "Are you happy?", "Be you happy?", "Are he happy?"], correct: 1, th: "you ใช้กับ are", en: "Use are with you.", detail: "Are you happy ถูกต้อง" },
            { q_th: "การพูดว่า 'Math is easy for her' แปลว่า", q_en: "'Math is easy for her' means:", a_th: ["คณิตง่าย", "คณิตยาก", "คณิตน่าเบื่อ", "คณิตดี"], a_en: ["Math is simple.", "Math is hard.", "Math is boring.", "Math is good."], correct: 0, th: "easy แปลว่า ง่าย", en: "Easy means simple.", detail: "Easy หมายถึง ไม่ยาก" },
            { q_th: "ถ้าเพื่อนช่วยงานบ้าน เพื่อนเป็นคนอย่างไร", q_en: "If a friend helps, how is the friend?", a_th: ["kind", "messy", "noisy", "lazy"], a_en: ["kind", "messy", "noisy", "lazy"], correct: 0, th: "kind แปลว่า ใจดี", en: "Kind means helpful.", detail: "Kind หมายถึง มีจิตใจเมตตา" },
            { q_th: "ถ้าเราอยากฟังเพื่อน เราควรทำอย่างไร", q_en: "How to listen to a friend?", a_th: ["Make eye contact", "Look away", "Talk only", "Sleep"], a_en: ["Make eye contact", "Look away", "Talk only", "Sleep"], correct: 0, th: "eye contact แสดงความตั้งใจ", en: "Eye contact shows attention.", detail: "การสบตาแสดงความตั้งใจ" },
            { q_th: "คำศัพท์คำใดใช้บอกความเป็นเจ้าของ", q_en: "Which word indicates possession?", a_th: ["my", "me", "I", "am"], a_en: ["my", "me", "I", "am"], correct: 0, th: "my คือของฉัน", en: "My means mine.", detail: "My เป็น Possessive Adjective" },
            { q_th: "ประโยคบอกเล่าประธานเป็นพหูพจน์ใช้ไร", q_en: "Plural subject uses which verb?", a_th: ["is", "am", "are", "be"], a_en: ["is", "am", "are", "be"], correct: 2, th: "พหูพจน์ใช้ are", en: "Plural uses are.", detail: "พหูพจน์ใช้ are เสมอ" },
            { q_th: "ข้อใดหมายถึงพื้นที่ว่าง", q_en: "Which word means empty area?", a_th: ["space", "share", "move", "own"], a_en: ["space", "share", "move", "own"], correct: 0, th: "space แปลว่า ที่ว่าง", en: "Space means empty area.", detail: "Space หมายถึง ที่ว่าง" },
            { q_th: "หากทำข้อสอบเสร็จควรทำอย่างไร", q_en: "What to do after finishing?", a_th: ["Check", "Leave", "Sleep", "Talk"], a_en: ["Check", "Leave", "Sleep", "Talk"], correct: 0, th: "ตรวจสอบความเรียบร้อย", en: "Verify accuracy.", detail: "การตรวจสอบช่วยลดข้อผิดพลาด" }
        ];

        let lang = 'th';
        function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }
        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = questions.map((q, i) => `
                <div class="question-container" id="q${i}">
                    <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                    <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                    <div class="options">
                        ${(lang === 'th' ? q.a_th : q.a_en).map((a, j) => `<button onclick="check(${i}, ${j})">${a}</button>`).join(' ')}
                    </div>
                    <div class="detail" id="d${i}">${q.detail}</div>
                </div>
            `).join('');
        }
        function check(qIdx, aIdx) {
            const container = document.getElementById(`q${qIdx}`);
            const detail = document.getElementById(`d${qIdx}`);
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            if (aIdx === questions[qIdx].correct) {
                container.style.background = '#d4edda';
            } else {
                container.style.background = '#f8d7da';
            }
            detail.style.display = 'block';
        }
        function submitQuiz() { alert('ส่งคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว!'); }
        render();
    </script>
</body>
</html>
