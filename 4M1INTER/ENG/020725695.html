<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 5 - Elite Level) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f9; }
        .question-container { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .clue { color: #8e44ad; font-weight: bold; font-style: italic; margin: 10px 0; padding: 5px; background: #f3e5f5; border-left: 4px solid #8e44ad; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 5px; border-left: 4px solid #2e7d32; }
        button { cursor: pointer; padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; margin: 2px; }
    </style>
</head>
<body>
    <h1>ข้อสอบกลางภาคภาษาอังกฤษ ม.1 (ชุดที่ 5 - Elite Level)</h1>
    <button onclick="toggleLang()">สลับภาษา (TH/EN)</button>
    <div id="quiz-area"></div>
    <button onclick="submitQuiz()">ส่งข้อสอบ</button>

    <script>
        const questions = [
            { q_th: "เลือกใช้คำเชื่อมที่แสดงความเป็นเหตุเป็นผล: 'He studied hard, __________ he passed the exam.'", q_en: "'He studied hard, __________ he passed the exam.'", a_th: ["however", "consequently", "but", "although"], a_en: ["however", "consequently", "but", "although"], correct: 1, th: "consequently บอกผลลัพธ์", en: "Consequently indicates result.", detail: "ใช้เชื่อมประโยคเหตุและผลที่เป็นทางการ" },
            { q_th: "คำว่า 'Prejudice' จัดเป็นทักษะเชิงลบทางใด", q_en: "'Prejudice' is a negative form of?", a_th: ["Critical Thinking", "Logical Analysis", "Cognitive Bias", "Grammar"], a_en: ["Critical Thinking", "Logical Analysis", "Cognitive Bias", "Grammar"], correct: 2, th: "ความลำเอียงในการคิด", en: "Cognitive bias.", detail: "อคติจากการคิดเหมารวม" },
            { q_th: "ประโยคใดมีระดับความเป็นทางการสูงที่สุด", q_en: "Which is the most formal?", a_th: ["I'm gonna do it.", "I will do it.", "I am going to do it.", "I'll do it."], a_en: ["I'm gonna do it.", "I will do it.", "I am going to do it.", "I'll do it."], correct: 2, th: "หลีกเลี่ยงการย่อ", en: "Avoid contractions.", detail: "การไม่ใช้รูปย่อทำให้ภาษาดูเป็นทางการ" },
            { q_th: "ในประโยค 'If I were a bird, I would fly', ทำไมต้องใช้ 'were' แทน 'was'?", q_en: "Why 'were' instead of 'was' in 'If I were a bird'?", a_th: ["ประธานเป็น I", "เหตุการณ์สมมติ", "กฎไวยากรณ์เก่า", "ไม่มีเหตุผล"], a_en: ["I is subject", "Hypothetical mood", "Old grammar", "No reason"], correct: 1, th: "Subjunctive Mood สำหรับเรื่องสมมติ", en: "Subjunctive Mood for hypotheticals.", detail: "เรื่องที่ไม่เป็นความจริงในปัจจุบันใช้ were เสมอ" },
            { q_th: "คำว่า 'Inevitably' มีความหมายตรงกับข้อใด", q_en: "'Inevitably' means?", a_th: ["อย่างไม่มีทางหลีกเลี่ยง", "อย่างไม่ตั้งใจ", "อย่างรวดเร็ว", "อย่างชัดเจน"], a_en: ["Unavoidably", "Unintentionally", "Quickly", "Clearly"], correct: 0, th: "ไม่มีทางหนีพ้น", en: "Unavoidably.", detail: "หลีกเลี่ยงไม่ได้" },
            { q_th: "ถ้าเราพบคำว่า 'Hypothesis' ในเนื้อหา เราควรมองหาสิ่งใด", q_en: "When finding 'Hypothesis', look for?", a_th: ["ผลสรุป", "การคาดคะเน", "หลักฐาน", "ความเห็น"], a_en: ["Conclusion", "Prediction", "Evidence", "Opinion"], correct: 1, th: "สมมติฐานคือการคาดคะเน", en: "Prediction.", detail: "การตั้งสมมติฐานคือการคาดการณ์" },
            { q_th: "ข้อใดไม่ใช่ความหมายของ 'Subjective'?", q_en: "Which is NOT the meaning of 'Subjective'?", a_th: ["Personal", "Objective", "Opinionated", "Biased"], a_en: ["Personal", "Objective", "Opinionated", "Biased"], correct: 1, th: "Objective คือความจริงแท้", en: "Objective is factual.", detail: "Subjective คือความเห็น, Objective คือความจริง" },
            { q_th: "เลือกใช้ Verb: 'The collection of stamps __________ rare.'", q_en: "'The collection of stamps __________ rare.'", a_th: ["is", "are", "have", "were"], a_en: ["is", "are", "have", "were"], correct: 0, th: "ประธานหลักคือ collection (เอกพจน์)", en: "Head is 'collection' (singular).", detail: "มองที่คำหลักคือ collection ไม่ใช่ stamps" },
            { q_th: "คำว่า 'Ambiguous' หมายถึง", q_en: "'Ambiguous' means?", a_th: ["ชัดเจน", "คลุมเครือ", "รวดเร็ว", "สำคัญ"], a_en: ["Clear", "Vague", "Fast", "Important"], correct: 1, th: "ไม่ชัดเจน", en: "Vague.", detail: "กำกวม" },
            { q_th: "ข้อใดคือการสรุป (Deduction) ที่ถูกต้องจาก 'It is raining.'", q_en: "Correct deduction from 'It is raining.'", a_th: ["It is hot.", "The ground is wet.", "It is dry.", "It is windy."], a_en: ["It is hot.", "The ground is wet.", "It is dry.", "It is windy."], correct: 1, th: "พื้นเปียกเป็นผลลัพธ์", en: "Logical result.", detail: "การอนุมานผลลัพธ์ที่เป็นเหตุเป็นผล" },
            { q_th: "เลือกใช้คำให้สละสลวย: 'Her performance was __________.'", q_en: "'Her performance was __________.'", a_th: ["amazed", "amazing", "amazingly", "amaze"], a_en: ["amazed", "amazing", "amazingly", "amaze"], correct: 1, th: "ขยาย performance (Noun)", en: "Modifies performance (Noun).", detail: "Amazing เป็น Adj ขยาย Noun" },
            { q_th: "คำว่า 'Inherent' แปลว่า", q_en: "'Inherent' means?", a_th: ["มีอยู่แต่กำเนิด", "ที่เกิดขึ้นภายหลัง", "ที่ไม่สำคัญ", "ที่สูญหาย"], a_en: ["Inborn", "Later acquired", "Unimportant", "Lost"], correct: 0, th: "โดยเนื้อแท้", en: "Inborn.", detail: "ธรรมชาติของสิ่งนั้น" },
            { q_th: "ประโยคใดแสดงการเปรียบเทียบที่มากกว่าขั้นปกติ", q_en: "Which shows a stronger comparison?", a_th: ["She is tall.", "She is taller.", "She is the tallest.", "She is very tall."], a_en: ["She is tall.", "She is taller.", "She is the tallest.", "She is very tall."], correct: 2, th: "ขั้นสูงสุด (Superlative)", en: "Superlative.", detail: "เปรียบเทียบในกลุ่ม" },
            { q_th: "ถ้าผู้เขียนใช้ 'First, Second, Finally' แสดงว่าผู้เขียนกำลังทำอะไร", q_en: "'First, Second, Finally' shows?", a_th: ["ลำดับเหตุการณ์", "การเปรียบเทียบ", "การยกตัวอย่าง", "การสรุปความ"], a_en: ["Sequencing", "Comparison", "Example", "Conclusion"], correct: 0, th: "บอกลำดับ (Sequence)", en: "Sequencing.", detail: "การจัดระเบียบเนื้อหา" },
            { q_th: "เลือก Verb: 'Neither he nor they __________ ready.'", q_en: "'Neither he nor they __________ ready.'", a_th: ["is", "are", "was", "has"], a_en: ["is", "are", "was", "has"], correct: 1, th: "ตามประธานตัวใกล้ (they)", en: "Follows closest subject (they).", detail: "They เป็นพหูพจน์ใช้ are" },
            { q_th: "คำว่า 'Proponent' แปลว่า", q_en: "'Proponent' means?", a_th: ["ผู้สนับสนุน", "ผู้คัดค้าน", "ผู้สังเกตการณ์", "ผู้บันทึก"], a_en: ["Supporter", "Opponent", "Observer", "Recorder"], correct: 0, th: "ผู้สนับสนุน", en: "Supporter.", detail: "คนที่เห็นด้วยหรือสนับสนุน" },
            { q_th: "ข้อใดคือการสรุปความ (Conclusion) ในเชิงตรรกะ", q_en: "Logical conclusion?", a_th: ["การคาดเดา", "ข้อเท็จจริงสุดท้ายที่สนับสนุนโดยหลักฐาน", "ความรู้สึก", "คำถาม"], a_en: ["Guess", "Fact supported by evidence", "Feeling", "Question"], correct: 1, th: "ข้อสรุปต้องมีหลักฐาน", en: "Based on evidence.", detail: "การสรุปเชิงตรรกะต้องอิงจากข้อมูล" },
            { q_th: "ประโยค 'If you had studied, you would have passed' เป็นเหตุการณ์แบบใด", q_en: "'If you had studied, you would have passed' is?", a_th: ["ปัจจุบัน", "อนาคต", "อดีตที่ไม่เป็นจริง", "ความจริง"], a_en: ["Present", "Future", "Past hypothetical", "Fact"], correct: 2, th: "สมมติในอดีต (Third Conditional)", en: "Past hypothetical.", detail: "เรื่องในอดีตที่แก้ไขไม่ได้" },
            { q_th: "คำว่า 'Verify' แปลว่าอะไร", q_en: "'Verify' means?", a_th: ["ตรวจสอบ", "ตั้งคำถาม", "ละทิ้ง", "สรุป"], a_en: ["Check/Validate", "Ask", "Ignore", "Conclude"], correct: 0, th: "ตรวจสอบความถูกต้อง", en: "Validate.", detail: "การยืนยันความถูกต้อง" },
            { q_th: "ถ้าเนื้อหา 'Contradicts' ข้อมูลเดิม หมายถึง", q_en: "If content 'contradicts' old data?", a_th: ["สอดคล้องกัน", "ขัดแย้งกัน", "เหมือนกัน", "ไม่มีผล"], a_en: ["Consistent", "Contradicts", "Same", "No effect"], correct: 1, th: "ขัดแย้งกัน", en: "Contradicts.", detail: "การที่ข้อมูลหักล้างกันเอง" },
            { q_th: "คำว่า 'Metaphor' คืออะไร", q_en: "'Metaphor' is?", a_th: ["การเปรียบเทียบโดยตรง", "คำนาม", "กริยา", "เครื่องหมาย"], a_en: ["Direct comparison", "Noun", "Verb", "Sign"], correct: 0, th: "อุปลักษณ์", en: "Direct comparison.", detail: "การเปรียบว่าสิ่งหนึ่งคืออีกสิ่งหนึ่ง" },
            { q_th: "เลือกใช้คำให้ถูกต้อง: 'The data __________ quite interesting.'", q_en: "'The data __________ quite interesting.'", a_th: ["is", "are", "was", "were"], a_en: ["is", "are", "was", "were"], correct: 1, th: "Data (plural) ใช้ are", en: "Data is plural.", detail: "Data เป็นพหูพจน์ของ Datum" },
            { q_th: "หากบทความมี 'Bias', เราควรทำอย่างไร", q_en: "If content has 'Bias', what to do?", a_th: ["เชื่อทันที", "ใช้วิจารณญาณ", "ข้ามไป", "คัดลอก"], a_en: ["Believe", "Think critically", "Skip", "Copy"], correct: 1, th: "ใช้วิจารณญาณ", en: "Think critically.", detail: "ต้องตรวจสอบความลำเอียง" },
            { q_th: "ความหมายของ 'Authentic' คือ", q_en: "'Authentic' means?", a_th: ["ของแท้", "ของปลอม", "ของราคาถูก", "ของใหม่"], a_en: ["Genuine", "Fake", "Cheap", "New"], correct: 0, th: "เป็นของแท้", en: "Genuine.", detail: "ถูกต้องและเป็นของจริง" },
            { q_th: "ส่งผลลัพธ์นี้เพื่ออะไร", q_en: "Submit result for?", a_th: ["วิเคราะห์และพัฒนาตัวเอง", "ลบ", "ปิด", "เล่นๆ"], a_en: ["Analyze and improve", "Delete", "Close", "Just for fun"], correct: 0, th: "เพื่อการเรียนรู้", en: "For learning.", detail: "เพื่อวัดความเข้าใจระดับ Elite" }
        ];

        let lang = 'th';
        function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; render(); }
        function render() {
            const area = document.getElementById('quiz-area');
            area.innerHTML = questions.map((q, i) => `
                <div class="question-container" id="q${i}">
                    <p><strong>${i + 1}. ${lang === 'th' ? q.q_th : q.q_en}</strong></p>
                    <div class="clue">${lang === 'th' ? q.th : q.en}</div>
                    <div class="options">
                        ${(lang === 'th' ? q.a_th : q.a_en).map((a, j) => `<button onclick="check(${i}, ${j})">${a}</button>`).join(' ')}
                    </div>
                    <div class="detail" id="d${i}">${q.detail}</div>
                </div>
            `).join('');
        }
        function check(qIdx, aIdx) {
            const container = document.getElementById(`q${qIdx}`);
            const detail = document.getElementById(`d${qIdx}`);
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            if (aIdx === questions[qIdx].correct) {
                container.style.background = '#d4edda';
            } else {
                container.style.background = '#f8d7da';
            }
            detail.style.display = 'block';
        }
        function submitQuiz() { alert('ส่งคะแนนการทดสอบชุดที่ 5 (Elite Level) ไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว!'); }
        render();
    </script>
</body>
</html>
