<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Midterm English Exam - Gold Experience 1</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background-color: #f4f4f9; }
        .question-container { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; background-color: white; }
        .correct { background-color: #d4edda !important; }
        .incorrect { background-color: #f8d7da !important; }
        .btn-lang { margin-bottom: 20px; text-align: right; }
        .tip { font-style: italic; color: #333; margin-top: 10px; display: none; padding: 10px; border-left: 4px solid #007bff; background: #e9ecef; }
    </style>
</head>
<body>
    <div class="btn-lang"><button onclick="toggleLang()">Switch Language / สลับภาษา</button></div>
    <h1 id="title">Midterm English Exam (Starter - Unit 3)</h1>
    <div id="quiz"></div>
    <button onclick="submitExam()">Submit Exam / ส่งข้อสอบ</button>

    <script>
        let lang = 'th';
        const data = [
            { en: "She ___ got a cat.", th: "เธอ___มีแมวหนึ่งตัว", options: ["have", "has", "is", "are"], answer: 1, explanation: "ใช้ has got กับประธานเอกพจน์ (She)", tip: "He/She/It + has got, I/You/We/They + have got" },
            { en: "There ___ some apples on the table.", th: "มีแอปเปิ้ล___อยู่บนโต๊ะ", options: ["is", "are", "be", "has"], answer: 1, explanation: "apples เป็นพหูพจน์ ต้องใช้ are", tip: "Countable plural noun = are" },
            { en: "I don't have ___ brothers.", th: "ฉันไม่มีพี่ชาย/น้องชาย___เลย", options: ["some", "any", "a", "an"], answer: 1, explanation: "ประโยคปฏิเสธใช้ any", tip: "Negative & Question = any" },
            { en: "He ___ breakfast at 7 AM.", th: "เขาทานอาหารเช้าตอน 7 โมงเช้า", options: ["eat", "eats", "eating", "eated"], answer: 1, explanation: "He เป็นเอกพจน์ กริยาต้องเติม s", tip: "3rd person singular + s/es" },
            { en: "They ___ usually go to school by bus.", th: "พวกเขามักจะไปโรงเรียนโดยรถประจำทาง", options: ["don't", "doesn't", "is", "are"], answer: 0, explanation: "They ใช้กับ do not (don't)", tip: "I/You/We/They = don't" },
            { en: "She is ___ late for class.", th: "เธอมักจะมาเข้าเรียนสายเสมอ", options: ["always", "go", "do", "have"], answer: 0, explanation: "Adverb วางหลัง Verb to be", tip: "Be + Adverb" },
            { en: "___ you got a pen?", th: "คุณมีปากกาไหม?", options: ["Do", "Does", "Have", "Has"], answer: 2, explanation: "โครงสร้าง Have got ตั้งคำถามโดยเอา Have ไว้หน้า", tip: "Have + S + got...?" },
            { en: "The cat is ___ the box.", th: "แมวอยู่___กล่อง", options: ["in", "on", "at", "to"], answer: 0, explanation: "in = ข้างใน", tip: "Preposition of place" },
            { en: "We ___ play football on Sundays.", th: "พวกเราเล่นฟุตบอลทุกวันอาทิตย์", options: ["always", "is", "are", "am"], answer: 0, explanation: "Adverb วางหน้ากริยาหลัก", tip: "Adverb + Verb" },
            { en: "Does he ___ a bike?", th: "เขามีจักรยานไหม?", options: ["has", "have", "haves", "had"], answer: 1, explanation: "เมื่อมี Does กริยาหลักต้องเป็นรูปเดิม (have)", tip: "Does + infinitive" },
            { en: "My sister ___ music every day.", th: "น้องสาวของฉันฟังเพลงทุกวัน", options: ["listen", "listens", "listening", "listened"], answer: 1, explanation: "Sister เป็นเอกพจน์", tip: "Subject-Verb Agreement" },
            { en: "Are there ___ chairs in the room?", th: "มีเก้าอี้ในห้องบ้างไหม?", options: ["some", "any", "a", "the"], answer: 1, explanation: "ประโยคคำถามใช้ any", tip: "Interrogative = any" },
            { en: "I ___ get up at 6 AM.", th: "ฉันตื่นนอนตอน 6 โมงเช้า", options: ["am", "is", "always", "does"], answer: 2, explanation: "วาง adverb หน้ากริยา", tip: "Always + V1" },
            { en: "She ___ like broccoli.", th: "เธอไม่ชอบบล็อกโคลี", options: ["don't", "doesn't", "isn't", "aren't"], answer: 1, explanation: "She ใช้ doesn't", tip: "Doesn't + V1" },
            { en: "Where ___ you live?", th: "คุณอาศัยอยู่ที่ไหน?", options: ["do", "does", "is", "are"], answer: 0, explanation: "You ใช้ do", tip: "Do + You" },
            { en: "He ___ a new car.", th: "เขามีรถคันใหม่", options: ["have got", "has got", "is got", "are got"], answer: 1, explanation: "He = has got", tip: "Has got" },
            { en: "There ___ a pen on the desk.", th: "มีปากกาหนึ่งด้ามบนโต๊ะ", options: ["is", "are", "have", "has"], answer: 0, explanation: "ปากกา 1 ด้ามใช้ is", tip: "Singular = is" },
            { en: "___ they play tennis?", th: "พวกเขาเล่นเทนนิสไหม?", options: ["Do", "Does", "Is", "Are"], answer: 0, explanation: "They ใช้ do", tip: "Do + They" },
            { en: "We ___ have a dog.", th: "พวกเราไม่มีสุนัข", options: ["don't", "doesn't", "isn't", "aren't"], answer: 0, explanation: "We ใช้ don't", tip: "Don't + V1" },
            { en: "She ___ to the park on Saturdays.", th: "เธอไปสวนสาธารณะในวันเสาร์", options: ["go", "goes", "going", "gone"], answer: 1, explanation: "ประธานเอกพจน์เติม es", tip: "Goes" },
            { en: "I am ___ busy on Mondays.", th: "ฉันมักจะยุ่งในวันจันทร์", options: ["often", "do", "does", "have"], answer: 0, explanation: "วางหลัง V.to be", tip: "Am + Often" },
            { en: "___ he got a computer?", th: "เขามีคอมพิวเตอร์ไหม?", options: ["Do", "Does", "Has", "Have"], answer: 2, explanation: "Has he got...?", tip: "Has + subject + got" },
            { en: "The book is ___ the table.", th: "หนังสืออยู่บนโต๊ะ", options: ["on", "in", "at", "to"], answer: 0, explanation: "บนโต๊ะใช้ on", tip: "On" },
            { en: "They ___ soccer after school.", th: "พวกเขาเล่นฟุตบอลหลังเลิกเรียน", options: ["play", "plays", "playing", "played"], answer: 0, explanation: "They ไม่ต้องเติม s", tip: "V1" },
            { en: "Do you ___ a pencil?", th: "คุณมีดินสอไหม?", options: ["have", "has", "haves", "had"], answer: 0, explanation: "Do + V1", tip: "Do + Have" }
        ];

        let score = 0, completed = 0;
        function toggleLang() { lang = lang === 'th' ? 'en' : 'th'; renderQuiz(); }

        function renderQuiz() {
            const quizDiv = document.getElementById('quiz'); quizDiv.innerHTML = '';
            data.forEach((item, i) => {
                quizDiv.innerHTML += `<div class="question-container" id="q${i}">
                    <p>${i+1}. ${lang === 'th' ? item.th : item.en} <span style="color:red;">(Clue: ${item.clue})</span></p>
                    ${item.options.map((opt, j) => `<input type="radio" name="q${i}" value="${j}" onclick="checkAnswer(${i}, ${j})"> ${opt}<br>`).join('')}
                    <div class="tip" id="tip${i}"></div>
                </div>`;
            });
        }

        function checkAnswer(qIdx, choice) {
            const container = document.getElementById(`q${qIdx}`), tip = document.getElementById(`tip${qIdx}`);
            if(tip.style.display !== 'block') {
                completed++;
                if(choice === data[qIdx].answer) {
                    score++; container.classList.add('correct');
                    tip.innerHTML = `<strong>ถูกต้อง!</strong> ${data[qIdx].explanation}<br><em>Tutor's Secret Tip: ${data[qIdx].tip}</em>`;
                } else {
                    container.classList.add('incorrect');
                    tip.innerHTML = `<strong>ผิดพลาด!</strong> ${data[qIdx].explanation}<br><em>Tutor's Secret Tip: ${data[qIdx].tip}</em>`;
                }
                tip.style.display = "block";
            }
        }

        function submitExam() {
            if(completed < 25) { alert("กรุณาตอบให้ครบทุกข้อก่อนส่งครับ"); return; }
            let analysis = score >= 20 ? "ยอดเยี่ยม! คุณเข้าใจพื้นฐานครบถ้วน" : "แนะนำให้ทบทวนเรื่องการผันกริยา (Subject-Verb Agreement) และการใช้ Some/Any เพิ่มเติม";
            alert(`ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว (thee.chinpong@hmail.com)\nคะแนนรวม: ${score}/25\n\nวิเคราะห์ผล: ${analysis}`);
        }
        renderQuiz();
    </script>
</body>
</html>
