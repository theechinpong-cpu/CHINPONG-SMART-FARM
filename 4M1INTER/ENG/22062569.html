<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Midterm English Exam - Gold Experience 1</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background-color: #f4f4f9; }
        .question-container { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; background-color: white; }
        .correct { background-color: #d4edda !important; }
        .incorrect { background-color: #f8d7da !important; }
        .btn-lang { margin-bottom: 20px; text-align: right; }
        .tip { font-style: italic; color: #555; margin-top: 10px; display: none; padding: 10px; border-left: 4px solid #007bff; background: #e9ecef; }
    </style>
</head>
<body>
    <div class="btn-lang"><button onclick="toggleLang()">Switch Language / สลับภาษา</button></div>
    <h1 id="title">Midterm English Exam (Starter - Unit 3)</h1>
    <div id="quiz"></div>
    <button onclick="submitExam()">Submit Exam / ส่งข้อสอบ</button>

    <script>
        let lang = 'th';
        const data = [
            { en: "She ___ got a cat.", th: "เธอ___มีแมวหนึ่งตัว", options: ["have", "has", "is", "are"], answer: 1, clue: "Subject-Verb Agreement" },
            { en: "There ___ some apples on the table.", th: "มีแอปเปิ้ล___อยู่บนโต๊ะ", options: ["is", "are", "be", "has"], answer: 1, clue: "Countable Nouns" },
            { en: "I don't have ___ brothers.", th: "ฉันไม่มีพี่ชาย/น้องชาย___เลย", options: ["some", "any", "a", "an"], answer: 1, clue: "Negative Sentence" },
            { en: "He ___ breakfast at 7 AM.", th: "เขาทานอาหารเช้าตอน 7 โมงเช้า", options: ["eat", "eats", "eating", "eated"], answer: 1, clue: "Present Simple (3rd Person)" },
            { en: "They ___ usually go to school by bus.", th: "พวกเขามักจะไปโรงเรียนโดยรถประจำทาง", options: ["don't", "doesn't", "is", "are"], answer: 0, clue: "Present Simple Negative" },
            { en: "She is ___ late for class.", th: "เธอมักจะมาเข้าเรียนสายเสมอ", options: ["always", "go", "do", "have"], answer: 0, clue: "Adverb position with Verb to be" },
            { en: "___ you got a pen?", th: "คุณมีปากกาไหม?", options: ["Do", "Does", "Have", "Has"], answer: 2, clue: "Have got usage" },
            { en: "The cat is ___ the box.", th: "แมวอยู่___กล่อง", options: ["in", "on", "at", "to"], answer: 0, clue: "Preposition of place" },
            { en: "We ___ play football on Sundays.", th: "พวกเราเล่นฟุตบอลทุกวันอาทิตย์", options: ["always", "is", "are", "am"], answer: 0, clue: "Frequency Adverb" },
            { en: "Does he ___ a bike?", th: "เขามีจักรยานไหม?", options: ["has", "have", "haves", "had"], answer: 1, clue: "Does + Verb infinitive" }
            // (เพิ่มเติมให้ครบ 25 ข้อตามโครงสร้างนี้)
        ];

        function toggleLang() {
            lang = lang === 'th' ? 'en' : 'th';
            renderQuiz();
        }

        function renderQuiz() {
            const quizDiv = document.getElementById('quiz');
            quizDiv.innerHTML = '';
            data.forEach((item, i) => {
                quizDiv.innerHTML += `<div class="question-container" id="q${i}">
                    <p>${i+1}. ${lang === 'th' ? item.th : item.en} <span style="color:red;">(Clue: ${item.clue})</span></p>
                    ${item.options.map((opt, j) => `<input type="radio" name="q${i}" value="${j}" onclick="checkAnswer(${i}, ${j})"> ${opt}<br>`).join('')}
                    <div class="tip" id="tip${i}"></div>
                </div>`;
            });
        }

        function checkAnswer(qIdx, choice) {
            const container = document.getElementById(`q${qIdx}`);
            const tip = document.getElementById(`tip${qIdx}`);
            if(choice === data[qIdx].answer) {
                container.classList.add('correct');
                tip.innerHTML = "Correct! Tutor's Secret Tip: Always check the subject first.";
            } else {
                container.classList.add('incorrect');
                tip.innerHTML = "Wrong! Tutor's Secret Tip: Look at the tense and subject carefully.";
            }
            tip.style.display = "block";
        }

        function submitExam() {
            alert("ส่งผลการเรียนไปยังติวเตอร์เรียบร้อยแล้ว (thee.chinpong@hmail.com)");
        }

        renderQuiz();
    </script>
</body>
</html>
