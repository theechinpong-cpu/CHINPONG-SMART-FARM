<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบภาษาไทย 50 ข้อ - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question-block { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .options button { display: block; width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #f5c6cb !important; }
        .detail { display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border-left: 4px solid #ffc107; font-size: 0.9em; }
        .btn-submit { background-color: #27ae60; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-size: 1.2em; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>ข้อสอบภาษาไทย: ชนิดและหน้าที่ของคำ (50 ข้อ)</h2>
    <div id="quiz-container"></div>
    <button class="btn-submit" onclick="submitQuiz()">ส่งข้อสอบ</button>
</div>

<script>
    // ข้อมูลคำถาม 50 ข้อที่ปรับชื่อ property ให้ตรงกัน
    const questions = [
        { q: "1. ข้อใดมี 'วิภาคสรรพนาม' มากที่สุด", options: ["เด็กๆ ต่างทำตามหน้าที่","เขาทั้งหลายไปด้วยกัน","บ้างก็ชอบ บ้างก็ไม่ชอบ","นักเรียนช่วยกันเรียน"], correct: 2, detail: "วิภาคสรรพนามใช้แยกกลุ่ม เช่น บ้าง, ต่าง, กัน" },
        { q: "2. ข้อใดไม่ใช่ 'อาการนาม'", options: ["การบ้าน","การเดิน","ความดี","ความรัก"], correct: 0, detail: "การบ้าน เป็นนามสามัญ" },
        { q: "3. ข้อใดใช้ 'สรรพนามชี้เฉพาะ' (นิยมสรรพนาม)", options: ["นั่นคืออะไร","นี่คือปากกาของฉัน","นั่นใครน่ะ","โน่นอย่างไรล่ะ"], correct: 1, detail: "นี่ ใช้ชี้ระยะใกล้เฉพาะเจาะจง" },
        { q: "4. คำว่า 'ใคร' ในข้อใดเป็น 'ปฤจฉาสรรพนาม'", options: ["ใครจะทำอะไรก็ได้","ใครก็ช่วยเขาไม่ได้","เธอจะไปกับใคร","ใครมาฉันก็ไม่สน"], correct: 2, detail: "ปฤจฉาสรรพนามต้องเป็นประโยคคำถาม" },
        { q: "5. ข้อใดเป็น 'นามวิสามัญ'", options: ["โรงเรียน","จังหวัด","ดอยอินทนนท์","อำเภอ"], correct: 2, detail: "ดอยอินทนนท์ เป็นชื่อเฉพาะ" },
        { q: "6. ข้อใดคือคำลักษณนามของ 'ช้างป่า'", options: ["ตัว","เชือก","หัว","เล่ม"], correct: 1, detail: "ช้างป่ามีลักษณนามว่า เชือก" },
        { q: "7. ประโยคใดมี 'ประพันธสรรพนาม'", options: ["เขาเดินที่สวน","เธออยู่ที่บ้าน","คนซึ่งฉลาดมักรอบคอบ","เขากินที่ร้าน"], correct: 2, detail: "ซึ่ง ใช้เชื่อมและแทนคำนาม" },
        { q: "8. ข้อใดมีนามสามัญมากที่สุด", options: ["แมวไล่จับหนู","สมชายไปโรงเรียน","แม่ซื้อผลไม้ที่ตลาด","นักเรียนอ่านหนังสือ"], correct: 2, detail: "แม่, ผลไม้, ตลาด เป็นนามสามัญ" },
        { q: "9. ข้อใดใช้สรรพนามแทนบุคคลผิดหลัก", options: ["ผมพูดกับเพื่อน","ดิฉันคุยกับหัวหน้า","กูใช้กับพระสงฆ์","เราพูดกับพ่อแม่"], correct: 2, detail: "กูไม่ควรใช้กับพระสงฆ์" },
        { q: "10. ข้อใดไม่มีอาการนาม", options: ["ความสวย","การกิน","การเดิน","การเรือ"], correct: 3, detail: "การเรือ เป็นนามสามัญ" },
        { q: "11. ประโยคใดมีคำสรรพนามถาม", options: ["อะไรอยู่ในถุง","กินอะไรก็ได้","ใครมาก็ไม่รู้","ฉันไม่รู้ว่าคืออะไร"], correct: 0, detail: "เป็นการถามโดยตรง" },
        { q: "12. ข้อใดใช้ลักษณนามของพระสงฆ์ถูกต้อง", options: ["พระ 1 ตัว","พระ 1 องค์","พระ 1 รูป","พระ 1 คน"], correct: 1, detail: "พระสงฆ์ใช้ องค์" },
        { q: "13. ข้อใดคือสรรพนามแทนบุคคลผู้ถูกกล่าวถึง", options: ["ผม","เธอ","เขา","เรา"], correct: 2, detail: "เขา บุคคลที่สาม" },
        { q: "14. ข้อใดคืออาการนามที่ถูกต้อง", options: ["ความรัก","การบ้าน","การตลาด","ความมือ"], correct: 0, detail: "ความรัก เป็นอาการนาม" },
        { q: "15. ข้อใดมีสรรพนามชี้เฉพาะ", options: ["ใครๆ ก็รู้","นี่คือความจริง","อะไรก็ได้","ต่างคนต่างไป"], correct: 1, detail: "นี่ ใช้ชี้เฉพาะ" },
        { q: "16. คำว่า 'ที่' ข้อใดเป็นคำบุพบท", options: ["บ้านที่สวย","นั่งที่โต๊ะ","นกที่บิน","คนที่มา"], correct: 1, detail: "นั่งที่โต๊ะ (บอกสถานที่)" },
        { q: "17. ข้อใดเป็นนามวิสามัญทั้งหมด", options: ["วันจันทร์, เดือนพฤษภาคม","โต๊ะ, เก้าอี้","คน, สัตว์","บ้าน, วัด"], correct: 0, detail: "วันจันทร์, พฤษภาคม เป็นชื่อเฉพาะ" },
        { q: "18. สรรพนามชนิดใดใช้กล่าวลอยๆ", options: ["นิยม","อนิยม","ปฤจฉา","วิภาค"], correct: 1, detail: "อนิยม กล่าวลอยๆ" },
        { q: "19. ประโยคใดมีคำนามทำหน้าที่เป็นกรรม", options: ["แมวร้อง","แม่ทำกับข้าว","ฝนตก","ลมพัด"], correct: 1, detail: "กับข้าว เป็นกรรม" },
        { q: "20. ข้อใดใช้ลักษณนามถูกต้อง", options: ["พระพุทธรูป 1 องค์","ตะเกียบ 1 คู่","บ้าน 1 หลัง","ปลา 1 ตัว"], correct: 0, detail: "ทุกข้อในตัวเลือกนี้ถูกต้องตามหลักภาษา" },
        { q: "21. ข้อใดมีสรรพนามแทนผู้พูด", options: ["ฉัน","คุณ","เขา","ท่าน"], correct: 0, detail: "ฉัน แทนผู้พูด" },
        { q: "22. ข้อใดคืออาการนาม", options: ["การเงิน","ความสวย","การงาน","การรถไฟ"], correct: 1, detail: "ความสวย เป็นอาการนาม" },
        { q: "23. ข้อใดคือสรรพนามแทนผู้ฟัง", options: ["คุณ","ผม","เขา","ท่าน"], correct: 0, detail: "คุณ แทนผู้ฟัง" },
        { q: "24. ข้อใดมีคำนามวิสามัญ", options: ["วัด","แม่น้ำ","พระแก้วมรกต","หนังสือ"], correct: 2, detail: "พระแก้วมรกต เป็นชื่อเฉพาะ" },
        { q: "25. ข้อใดเป็นคำสรรพนาม", options: ["สวย","เดิน","ใคร","กิน"], correct: 2, detail: "ใคร เป็นสรรพนาม" },
        { q: "26. ข้อใดมี 'วิภาคสรรพนาม' มากที่สุด", options: ["เด็กๆ ต่างพากันเรียน", "ใครจะไปบ้าง", "เขาและเธอชอบกัน", "เขากินอะไรก็ได้"], correct: 0, detail: "ต่าง, กัน เป็นวิภาคสรรพนาม" },
        { q: "27. ข้อใดไม่ใช่ 'อาการนาม'", options: ["การไฟฟ้า", "การวิ่ง", "ความเร็ว", "ความเป็นธรรม"], correct: 0, detail: "การไฟฟ้า เป็นนามสามัญ" },
        { q: "28. ข้อใดใช้ 'สรรพนามชี้เฉพาะ'", options: ["นั่นอะไร", "นี่คือปากกา", "ใครมา", "คนไหน"], correct: 1, detail: "นี่ ชี้เฉพาะสิ่งใกล้ตัว" },
        { q: "29. คำว่า 'ใคร' ในข้อใดเป็น 'ปฤจฉาสรรพนาม'", options: ["ใครจะไปไหนก็ได้", "ฉันไม่รู้ว่าใครมา", "ใครมาหานะ", "ไม่ว่าใครก็ทำได้"], correct: 2, detail: "เป็นประโยคคำถาม" },
        { q: "30. ข้อใดเป็น 'นามวิสามัญ' ทั้งหมด", options: ["พระแก้วมรกต, ดอยอินทนนท์", "โรงเรียน, วัด, ตลาด", "คน, สัตว์, สิ่งของ", "วัน, เดือน, ปี"], correct: 0, detail: "เป็นชื่อเฉพาะ" },
        { q: "31. ลักษณนามของ 'พระพุทธรูป' คือ", options: ["ตัว", "องค์", "รูป", "หลัง"], correct: 1, detail: "สิ่งศักดิ์สิทธิ์ใช้ องค์" },
        { q: "32. ข้อใดมี 'ประพันธสรรพนาม'", options: ["คนซึ่งขยันย่อมสำเร็จ", "เขาอยู่ที่นั่น", "ไปที่บ้านเขา", "กินที่ร้าน"], correct: 0, detail: "ซึ่ง เป็นประพันธสรรพนาม" },
        { q: "33. ข้อใดมีนามสามัญมากที่สุด", options: ["น้องรักแม่", "ชาวสวนขายผลไม้ในตลาด", "ครูสอนนักเรียน", "แมวไล่จับหนู"], correct: 1, detail: "ชาวสวน, ผลไม้, ตลาด" },
        { q: "34. ข้อใดใช้สรรพนามแทนบุคคลได้ถูกต้องที่สุด", options: ["ท่านมาแล้ว", "เขาเดินไป", "เธอสั่ง", "กูไป"], correct: 0, detail: "ท่าน ใช้กับผู้สูงศักดิ์" },
        { q: "35. ข้อใดไม่มีอาการนาม", options: ["ความรัก", "การกระทำ", "การเดินทาง", "การเรือ"], correct: 3, detail: "การเรือ เป็นนามสามัญ" },
        { q: "36. ประโยคใดมีคำสรรพนามถาม", options: ["อะไรอยู่ในถุง", "กินอะไรก็ได้", "ใครก็ไม่รู้", "เธอทำอะไร"], correct: 0, detail: "เป็นการถามโดยตรง" },
        { q: "37. ข้อใดคือลักษณนามของ 'ตะเกียบ'", options: ["อัน", "คู่", "เล่ม", "แท่ง"], correct: 1, detail: "ตะเกียบต้องเป็นคู่" },
        { q: "38. ข้อใดคือสรรพนามบุรุษที่ 3", options: ["ผม", "เธอ", "ท่าน", "เรา"], correct: 1, detail: "เธอ บุคคลที่สาม" },
        { q: "39. ข้อใดคืออาการนามที่ถูกต้อง", options: ["ความดี", "การคลัง", "การท่าเรือ", "ความรถยนต์"], correct: 0, detail: "ความดี เป็นอาการนาม" },
        { q: "40. ข้อใดมีสรรพนามชี้เฉพาะ", options: ["นี่คือความจริง", "อะไรก็ได้", "ใครบ้าง", "ต่างคนต่างไป"], correct: 0, detail: "นี่ ชี้เฉพาะ" },
        { q: "41. ข้อใดเป็นนามวิสามัญ", options: ["จังหวัดเชียงราย", "จังหวัด", "อำเภอ", "ตำบล"], correct: 0, detail: "เชียงราย เป็นชื่อเฉพาะ" },
        { q: "42. สรรพนามชนิดใดใช้กล่าวลอยๆ", options: ["นิยม", "อนิยม", "ปฤจฉา", "บุรุษ"], correct: 1, detail: "อนิยม กล่าวลอยๆ" },
        { q: "43. ประโยคใดมีคำนามเป็นกรรม", options: ["แม่กินข้าว", "ลมพัด", "ฝนตก", "แดดออก"], correct: 0, detail: "ข้าว ถูกกิน" },
        { q: "44. ข้อใดคือลักษณนามของ 'เลื่อย'", options: ["เล่ม", "ตัว", "หลัง", "ปื้น"], correct: 3, detail: "เลื่อยใช้ ปื้น" },
        { q: "45. ข้อใดมีสรรพนามแทนผู้พูด", options: ["อาตมา", "คุณ", "ท่าน", "เขา"], correct: 0, detail: "อาตมา แทนตัวพระสงฆ์" },
        { q: "46. ข้อใดเป็นอาการนาม", options: ["ความร้อน", "การคลัง", "การงาน", "ความมือ"], correct: 0, detail: "ความร้อน เป็นอาการนาม" },
        { q: "47. ข้อใดคือสรรพนามแทนผู้ฟัง", options: ["คุณ", "ผม", "เขา", "มัน"], correct: 0, detail: "คุณ แทนผู้ฟัง" },
        { q: "48. ข้อใดมีนามวิสามัญ", options: ["พระนครศรีอยุธยา", "วัด", "โรงเรียน", "ตลาด"], correct: 0, detail: "อยุธยา เป็นชื่อเฉพาะ" },
        { q: "49. ข้อใดเป็นคำสรรพนาม", options: ["สวย", "เดิน", "โน่น", "กิน"], correct: 2, detail: "โน่น เป็นสรรพนาม" },
        { q: "50. ประโยคใดมีวิภาคสรรพนาม", options: ["บ้างก็ว่าดี", "ใครมา", "นี่คือเขา", "เขาเดินไป"], correct: 0, detail: "บ้าง เป็นวิภาคสรรพนาม" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((q, i) => {
        container.innerHTML += `
            <div class="question-block">
                <p><strong>${q.q}</strong></p>
                <div class="options">
                    ${q.options.map((opt, j) => `<button onclick="check(${i}, ${j}, this)">${opt}</button>`).join('')}
                </div>
                <div class="detail" id="detail-${i}">${q.detail}</div>
            </div>
        `;
    });

    function check(qIdx, optIdx, btn) {
        const correct = questions[qIdx].correct;
        const btns = btn.parentElement.querySelectorAll('button');
        document.getElementById(`detail-${qIdx}`).style.display = 'block';
        if (optIdx === correct) btn.classList.add('correct');
        else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }
    }

    function submitQuiz() { alert("ส่งข้อสอบเรียบร้อยแล้ว!"); }
</script>
</body>
</html>
