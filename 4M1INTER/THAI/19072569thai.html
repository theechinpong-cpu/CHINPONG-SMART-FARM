        { q_th: "ประโยคใดมีคำนามเป็นกรรม", q_en: "Which noun is the object?", options: ["แม่กินข้าว", "ลมพัด", "ฝนตก", "แดดออก"], correct: 0, detail: "ข้าวถูกกิน", clue: "ผู้ถูกกระทำ" },

        { q_th: "ข้อใดคือลักษณนามของ 'เลื่อย'", q_en: "What is the classifier for 'saw'?", options: ["เล่ม", "ตัว", "หลัง", "ปื้น"], correct: 3, detail: "เลื่อยใช้ ปื้น", clue: "คำนี้เป็นคำเฉพาะ" },

        { q_th: "ข้อใดมีสรรพนามแทนผู้พูด", q_en: "Which pronoun replaces the speaker?", options: ["อาตมา", "คุณ", "ท่าน", "เขา"], correct: 0, detail: "อาตมา แทนผู้พูด(พระ)", clue: "บุคคลที่ 1" },

        { q_th: "ข้อใดเป็นอาการนาม", q_en: "Which is a verbal noun?", options: ["ความร้อน", "การคลัง", "การงาน", "ความมือ"], correct: 0, detail: "ความร้อน (ร้อนเป็นกริยา/วิเศษณ์)", clue: "กริยา/วิเศษณ์นำหน้า" },

        { q_th: "ข้อใดคือสรรพนามแทนผู้ฟัง", q_en: "Which is the second-person pronoun?", options: ["คุณ", "ผม", "เขา", "มัน"], correct: 0, detail: "คุณ", clue: "บุรุษที่ 2" },

        { q_th: "ข้อใดมีนามวิสามัญ", q_en: "Which has a proper noun?", options: ["พระนครศรีอยุธยา", "วัด", "โรงเรียน", "ตลาด"], correct: 0, detail: "เป็นชื่อเฉพาะ", clue: "สถานที่ที่ระบุชื่อ" },

        { q_th: "ข้อใดเป็นคำสรรพนาม", q_en: "Which is a pronoun?", options: ["สวย", "เดิน", "โน่น", "กิน"], correct: 2, detail: "โน่น", clue: "คำใช้แทนตำแหน่งสิ่งของ" },

        { q_th: "ประโยคใดมีวิภาคสรรพนาม", q_en: "Which sentence has a 'distributive pronoun'?", options: ["บ้างก็ว่าดี", "ใครมา", "นี่คือเขา", "เขาเดินไป"], correct: 0, detail: "บ้าง", clue: "การแบ่งกลุ่ม" }

    ];
    for(let i=1; i<=50; i++) {
        questions.push({
            q: `ข้อที่ ${i}: คำในข้อใดจัดเป็น 'นามสามัญ' ที่ชัดเจนที่สุด?`,
            options: ["แมว", "เชียงใหม่", "การเดิน", "ความดี"],
            correct: 0,
            detail: "แมว เป็นชื่อเรียกสัตว์ทั่วไป ไม่ระบุชื่อเฉพาะ จึงเป็นนามสามัญ"
        });
    }

    const container = document.getElementById('quiz-container');
    questions.forEach((q, i) => {
        container.innerHTML += `
            <div class="question-block">
                <p><strong>${q.q}</strong></p>
                <div class="options">
                    ${q.options.map((opt, j) => `<button onclick="check(${i}, ${j}, this)">${opt}</button>`).join('')}
                </div>
                <div class="detail" id="detail-${i}">${q.detail}</div>
            </div>
        `;
    });

    function check(qIdx, optIdx, btn) {
        const correct = questions[qIdx].correct;
        const btns = btn.parentElement.querySelectorAll('button');
        document.getElementById(`detail-${qIdx}`).style.display = 'block';
        if (optIdx === correct) btn.classList.add('correct');
        else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }
    }

    function submitQuiz() { alert("ส่งข้อสอบเรียบร้อยแล้ว!"); }
</script>
</body>
</html>
