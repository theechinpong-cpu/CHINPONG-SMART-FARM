    { q_th: "ประโยคใดมี 'ประพันธสรรพนาม' ปรากฏอยู่", q_en: "Which sentence contains a 'relative pronoun'?", a_th: ["ฉันชอบคนที่ทำความดี", "ใครมาที่หน้าบ้าน", "นี่คือหนังสือของฉัน", "ฉันไม่ทราบว่าเขาอยู่ที่ไหน"], a_en: ["I like people WHO do good", "WHO came to the house?", "This is my book", "I don't know WHERE he is"], correct: 0, th: "'ที่' ในที่นี้ทำหน้าที่เชื่อมประโยค 'ฉันชอบคน' กับ 'คนทำความดี'", en: "'ที่' functions here as a connector between 'I like people' and 'people do good'.", detail: "ประพันธสรรพนามใช้เชื่อมประโยคย่อยเข้ากับประโยคหลัก" },
    { q_th: "ข้อใดคือ 'นิยมสรรพนาม' ที่ชัดเจนที่สุด", q_en: "Which is the most specific 'demonstrative pronoun'?", a_th: ["โน่นคือบ้านของเขา", "ใครทำแก้วแตก", "เขาไปที่ไหน", "อะไรวางอยู่ตรงนั้น"], a_en: ["THAT is his house", "WHO broke the glass?", "WHERE did he go?", "WHAT is lying there?"], correct: 0, th: "'โน่น' เป็นการระบุตำแหน่งที่แน่นอน (ชี้เฉพาะ)", en: "'โน่น' specifies a certain location (demonstrative).", detail: "นิยมสรรพนามใช้ชี้ระยะหรือกำหนดเฉพาะเจาะจง" },
    { q_th: "ประโยคใดมี 'อนิยมสรรพนาม' ปรากฏอยู่", q_en: "Which sentence contains an 'indefinite pronoun'?", a_th: ["ใครจะไปก็ไปเถอะ", "ใครเคาะประตู", "นั่นคืออะไร", "สิ่งใดที่เธอชอบ"], a_en: ["WHOEVER wants to go can go", "WHO is knocking?", "WHAT is that?", "WHAT is it that you like?"], correct: 0, th: "'ใคร' ในที่นี้ไม่ได้ถาม แต่หมายถึงคนทั่วไปแบบไม่เจาะจง", en: "'ใคร' here is not asking, but refers to anyone, indefinitely.", detail: "อนิยมสรรพนามจะใช้แทนคำนามโดยไม่ต้องการคำตอบและไม่เจาะจง" },

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <p><strong>${index + 1}. <span class="q-text">${currentLang === 'th' ? q.q_th : q.q_en}</span></strong></p>
                ${(currentLang === 'th' ? q.a_th : q.a_en).map((ans, i) => `<button onclick="check(this, ${index}, ${i})">${ans}</button>`).join(' ')}
                <div class="answer-box" id="ans-${index}">
                    <p style="color:red">Tip: ${currentLang === 'th' ? q.th : q.en}</p>
                    <p>${currentLang === 'th' ? q.detail : q.detail}</p>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function check(btn, qIdx, aIdx) {
        const card = btn.parentElement;
        const correctIdx = questions[qIdx].correct;
        const buttons = card.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        
        if (aIdx === correctIdx) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
            buttons[correctIdx].classList.add('correct');
        }
        document.getElementById('ans-' + qIdx).style.display = 'block';
        checkComplete();
    }

    function setLang(lang) { currentLang = lang; renderQuiz(); }
