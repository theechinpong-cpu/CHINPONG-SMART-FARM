        { q_th: "ทำไมต้องมีการนำเสนอ (Presentation) ผลงาน?", q_en: "Why present the work?", a_th: ["เพื่อให้ได้คะแนน", "เพื่อสื่อสารวิธีการแก้ปัญหาและรับข้อเสนอแนะ", "เพื่อโชว์ออฟ", "เพื่อจบโปรเจกต์"], a_en: ["To get grades", "To communicate solutions and get feedback", "To show off", "To finish the project"], correct: 1, th: "คำใบ้: แบ่งปันและปรับปรุง", en: "Clue: Share and improve", detail: "การนำเสนอช่วยให้เราได้รับความคิดเห็นจากผู้อื่น" },
        { q_th: "กระบวนการคิดของวิศวกรคือ?", q_en: "What is an engineer's thought process?", a_th: ["คิดว่าจะได้เงินเท่าไหร่", "คิดว่าทำอย่างไรให้แก้ปัญหาได้ดีที่สุด", "คิดว่าจะทำให้เสร็จเร็วที่สุดโดยไม่ต้องทดสอบ", "คิดว่าใครจะทำแทนได้"], a_en: ["Thinking about money", "Thinking about how to solve the problem best", "Thinking about finishing fastest without testing", "Thinking about who can do it instead"], correct: 1, th: "คำใบ้: คุณภาพ", en: "Clue: Quality", detail: "เป้าหมายสูงสุดคือผลลัพธ์ที่มีคุณภาพ" },
        { q_th: "เมื่อนำวัสดุมาประกอบเป็นชิ้นงาน คือขั้นตอนใด?", q_en: "Assembling materials into a project is which step?", a_th: ["การรวบรวมข้อมูล", "การสร้างต้นแบบ/ดำเนินการแก้ปัญหา", "การประเมินผล", "การระบุปัญหา"], a_en: ["Gathering data", "Prototyping/Implementation", "Evaluation", "Identifying"], correct: 1, th: "คำใบ้: ลงมือสร้าง", en: "Clue: Construction", detail: "ขั้นตอนการสร้างคือการลงมือทำให้เป็นรูปธรรม" }
    ];

    let currentLang = 'th';

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-${index}`;
            card.innerHTML = `
                <p><strong>${index + 1}. <span class="q-text">${currentLang === 'th' ? q.q_th : q.q_en}</span></strong></p>
                <div class="clue">${currentLang === 'th' ? q.th : q.en}</div>
                <div class="options">
                    ${(currentLang === 'th' ? q.a_th : q.a_en).map((opt, i) => `
                        <button onclick="checkAnswer(${index}, ${i})">${opt}</button>
                    `).join('')}
                </div>
                <div class="explanation" id="exp-${index}">
                    <strong>${currentLang === 'th' ? 'เฉลย:' : 'Explanation:'}</strong> ${q.detail}
                </div>
            `;
            container.appendChild(card);
        });
    }

    function checkAnswer(qIndex, aIndex) {
        const q = questions[qIndex];
        const card = document.getElementById(`q-${qIndex}`);
        const buttons = card.querySelectorAll('button');
        const exp = document.getElementById(`exp-${qIndex}`);
        buttons.forEach(btn => btn.disabled = true);
        if (aIndex === q.correct) {
            buttons[aIndex].classList.add('correct');
        } else {
            buttons[aIndex].classList.add('wrong');
            buttons[q.correct].classList.add('correct');
        }
        exp.style.display = 'block';
        card.dataset.userAnswer = aIndex;
    }

    function toggleLang(lang) {
        currentLang = lang;
        const qTexts = document.querySelectorAll('.q-text');
        const clues = document.querySelectorAll('.clue');
        const buttons = document.querySelectorAll('.options');
        questions.forEach((q, i) => {
            qTexts[i].innerText = currentLang === 'th' ? q.q_th : q.q_en;
            clues[i].innerText = currentLang === 'th' ? q.th : q.en;
            const btns = buttons[i].querySelectorAll('button');
            const options = currentLang === 'th' ? q.a_th : q.a_en;
            btns.forEach((btn, j) => {
                btn.innerText = options[j];
            });
        });
    }

    function submitQuiz() {
        let score = 0;
        let attempted = 0;
        questions.forEach((q, i) => {
            const card = document.getElementById(`q-${i}`);
            if (card.dataset.userAnswer !== undefined && parseInt(card.dataset.userAnswer) === q.correct) {
                score++;
            }
        });
        alert("ระบบจำลองการส่งข้อมูลคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว");
        document.getElementById('result-area').innerHTML = `<div class="summary-box"><h2>คะแนนรวม: ${score} / 25</h2><p>ทบทวนบทเรียนและทำความเข้าใจให้ถ่องแท้เพื่อความสำเร็จ!</p></div>`;
        window.scrollTo(0, document.body.scrollHeight);
    }

    renderQuiz();
</script>
