<!DOCTYPE html>
<html lang="th">
    <!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Final Quiz ป.1-3</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdfefe; padding: 20px; }
        .quiz-container { max-width: 750px; margin: auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid #3498db; }
        .q-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        .options button { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; }
        .options button:hover { background: #ebf5fb; }
        .feedback { display: none; padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 14px; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        #final-score { display: none; text-align: center; padding: 20px; background: #3498db; color: white; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1 style="text-align: center; color: #2980b9;">📝 แบบทดสอบรวม 4 บทเรียน (25 ข้อ)</h1>
    <p style="text-align: center;">โดย <b>พระจอมเกล้าติวเตอร์</b></p>
    <div id="quiz-box"></div>
    <div id="final-score">
        <h2>คะแนนของคุณคือ</h2>
        <h1 id="score-val">0 / 25</h1>
        <p id="analysis"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; background: #f1c40f; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">เริ่มใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "1. There are five _____ on the table.", a: ["apple", "apples", "an apple"], c: 1, e: "เลข 5 คือพหูพจน์ ต้องเติม -s ครับ" },
        { q: "2. I want _____ orange.", a: ["a", "an", "the"], c: 1, e: "Orange ขึ้นต้นด้วยสระ O จึงใช้ an" },
        { q: "3. _____ is a beautiful girl.", a: ["He", "She", "It"], c: 1, e: "ใช้ She แทนผู้หญิงครับ" },
        { q: "4. My cat _____ white.", a: ["is", "am", "are"], c: 0, e: "Cat 1 ตัว ใช้ is ครับ" },
        { q: "5. We _____ two dogs.", a: ["has", "have", "is"], c: 1, e: "We ใช้ have แปลว่ามีครับ" },
        { q: "6. He _____ to school every day.", a: ["go", "goes", "going"], c: 1, e: "ประธาน He กริยาต้องเติม -es" },
        { q: "7. The pencil is _____ the box.", a: ["in", "on", "at"], c: 0, e: "ดินสออยู่ในกล่องใช้ in" },
        { q: "8. A bird _____ fly.", a: ["can", "can't", "is"], c: 0, e: "นกสามารถบินได้ใช้ can" },
        { q: "9. They _____ playing football.", a: ["is", "am", "are"], c: 2, e: "They ใช้ are ครับ" },
        { q: "10. I _____ a new bike.", a: ["has", "have", "am"], c: 1, e: "I ใช้ have ครับ" },
        { q: "11. This is a _____ house.", a: ["big", "run", "in"], c: 0, e: "big เป็น Adjective บอกขนาด" },
        { q: "12. I _____ swim. I am afraid of water.", a: ["can", "can't", "am"], c: 1, e: "กลัวน้ำแปลว่าว่ายน้ำไม่ได้" },
        { q: "13. It is very _____ today. (แดดแรงมาก)", a: ["cold", "hot", "small"], c: 1, e: "แดดแรงทำให้อากาศร้อน (hot)" },
        { q: "14. My father _____ a teacher.", a: ["is", "am", "are"], c: 0, e: "คุณพ่อ 1 คนใช้ is" },
        { q: "15. _____ are my friends.", a: ["He", "She", "They"], c: 2, e: "Friends หลายคนใช้ They" },
        { q: "16. Tom _____ milk in the morning.", a: ["drink", "drinks", "drinking"], c: 1, e: "Tom 1 คน กริยาเติม s" },
        { q: "17. An _____ is in the sky.", a: ["airplane", "car", "bird"], c: 0, e: "an นำหน้า airplane (ขึ้นต้นด้วย A)" },
        { q: "18. The ball is _____ the chair.", a: ["under", "at", "to"], c: 0, e: "อยู่ใต้เก้าอี้ใช้ under" },
        { q: "19. You _____ a good boy.", a: ["is", "am", "are"], c: 2, e: "You คู่กับ are" },
        { q: "20. She _____ long hair.", a: ["has", "have", "is"], c: 0, e: "She ใช้ has แปลว่ามี" },
        { q: "21. A fish can _____.", a: ["swim", "swims", "swimming"], c: 0, e: "หลัง can ไม่ต้องเติมอะไร" },
        { q: "22. The elephant is _____.", a: ["small", "big", "short"], c: 1, e: "ช้างตัวใหญ่ (big)" },
        { q: "23. We _____ breakfast at 7 AM.", a: ["eat", "eats", "eating"], c: 0, e: "We ไม่ต้องเติม s ที่กริยา" },
        { q: "24. I have _____ umbrella.", a: ["a", "an", "the"], c: 1, e: "Umbrella ใช้ an" },
        { q: "25. The sun is _____.", a: ["round", "square", "triangle"], c: 0, e: "ดวงอาทิตย์เป็นทรงกลม (round)" }
    ];

    let currentScore = 0;
    let totalAnswered = 0;

    const quizBox = document.getElementById('quiz-box');
    quizData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'q-row';
        div.innerHTML = `<p><b>${item.q}</b></p><div class="options">` + 
            item.a.map((opt, i) => `<button onclick="checkAnswer(${idx}, ${i}, this)">${opt}</button>`).join('') +
            `</div><div class="feedback" id="feedback-${idx}"></div>`;
        quizBox.appendChild(div);
    });

    window.checkAnswer = (qIdx, aIdx, btn) => {
        const feedback = document.getElementById(`feedback-${qIdx}`);
        const btns = btn.parentElement.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        feedback.style.display = 'block';
        if(aIdx === quizData[qIdx].c) {
            currentScore++;
            feedback.className = 'feedback correct';
            feedback.innerHTML = "✅ ถูกต้อง! " + quizData[qIdx].e;
        } else {
            feedback.className = 'feedback wrong';
            feedback.innerHTML = "❌ ผิดนะ! " + quizData[qIdx].e;
        }
        totalAnswered++;
        if(totalAnswered === 25) {
            document.getElementById('final-score').style.display = 'block';
            document.getElementById('score-val').innerText = `${currentScore} / 25`;
            const analysis = document.getElementById('analysis');
            if(currentScore === 25) analysis.innerText = "วิเคราะห์: น้องเก่งมาก! พื้นฐานแน่นสุดๆ พร้อมลุย ป.6 แล้วครับ";
            else if(currentScore >= 18) analysis.innerText = "วิเคราะห์: ดีมากครับ มีผิดเรื่อง s/es เล็กน้อย ทบทวนบทที่ 3 อีกนิดนะ";
            else analysis.innerText = "วิเคราะห์: ลองกลับไปอ่านบทเรียนทั้ง 4 เรื่องอีกรอบนะ พี่เป็นกำลังใจให้ครับ!";
        }
    };
</script>
</body>
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Mega Quiz 25 ข้อ</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        .options button { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #fff; }
        .options button:hover { background: #e8f4fd; }
        .feedback { display: none; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 14px; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        #summary-panel { display: none; text-align: center; margin-top: 20px; padding: 20px; background: #2c3e50; color: white; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align: center; color: #2980b9;">🎓 แบบทดสอบพื้นฐาน 25 ข้อ</h1>
    <p style="text-align: center;">โดย <b>พระจอมเกล้าติวเตอร์</b></p>
    <div id="quiz-box"></div>
    <div id="summary-panel">
        <h2>สรุปคะแนน</h2>
        <h1 id="score-text">0 / 25</h1>
        <p id="analysis"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">เริ่มใหม่</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. Two _____ are on the floor.", a: ["box", "boxes", "boxs"], c: 1, e: "คำที่ลงท้ายด้วย x ต้องเติม -es ครับ" },
        { q: "2. I see _____ elephant.", a: ["a", "an", "the"], c: 1, e: "Elephant ขึ้นต้นด้วยเสียงสระ E จึงใช้ an" },
        { q: "3. _____ is my sister.", a: ["He", "She", "It"], c: 1, e: "Sister เป็นผู้หญิง ใช้ She แทนครับ" },
        { q: "4. _____ am a student.", a: ["I", "You", "We"], c: 0, e: "am ต้องใช้กับ I เท่านั้น" },
        { q: "5. They _____ many toys.", a: ["has", "have", "is"], c: 1, e: "They เป็นพหูพจน์ ใช้ have แปลว่ามี" },
        { q: "6. She _____ oranges every day.", a: ["eat", "eats", "eating"], c: 1, e: "She เป็นเอกพจน์ กริยาต้องเติม s" },
        { q: "7. The book is _____ the table.", a: ["in", "on", "at"], c: 1, e: "หนังสือวาง 'บน' โต๊ะ ใช้ on" },
        { q: "8. I _____ swim very well.", a: ["can", "is", "am"], c: 0, e: "can ใช้บอกความสามารถว่าว่ายน้ำได้" },
        { q: "9. We _____ happy today.", a: ["is", "am", "are"], c: 2, e: "We มีหลายคนใช้ are" },
        { q: "10. He _____ a red car.", a: ["have", "has", "are"], c: 1, e: "He เป็นคนเดียวขี้เหงา ใช้ has ครับ" },
        { q: "11. A _____ mouse is in the hole.", a: ["small", "tall", "long"], c: 0, e: "หนูมักจะมีลักษณะตัวเล็ก (small)" },
        { q: "12. Birds _____ fly.", a: ["can", "can't", "is"], c: 0, e: "นกสามารถบินได้ ใช้ can" },
        { q: "13. It is _____ cold in the fridge.", a: ["big", "hot", "very"], c: 2, e: "ในตู้เย็นจะมีความ 'หนาว' (cold)" },
        { q: "14. Ten _____ are in the sky.", a: ["bird", "birds", "birdes"], c: 1, e: "นก 10 ตัวเป็นพหูพจน์ เติม s" },
        { q: "15. _____ are my friends.", a: ["He", "She", "They"], c: 2, e: "Friends มีหลายคน ใช้ They" },
        { q: "16. Tom _____ to school.", a: ["go", "goes", "go es"], c: 1, e: "Tom คนเดียว กริยาเติม -es (เพราะลงท้ายด้วย o)" },
        { q: "17. An _____ is on the tree.", a: ["apple", "banana", "cat"], c: 0, e: "an ต้องนำหน้าคำที่ขึ้นต้นด้วยสระ (a)" },
        { q: "18. The cat is _____ the box.", a: ["in", "at", "to"], c: 0, e: "แมวอยู่ในกล่อง ใช้ in" },
        { q: "19. You _____ tall.", a: ["is", "am", "are"], c: 2, e: "You ใช้คู่กับ are เสมอ" },
        { q: "20. A dog _____ four legs.", a: ["have", "has", "is"], c: 1, e: "หมา 1 ตัว ใช้ has แปลว่ามี" },
        { q: "21. I can't _____.", a: ["fly", "flies", "flying"], c: 0, e: "หลัง can't กริยาห้ามเติมอะไรเลย" },
        { q: "22. The sun is _____.", a: ["cold", "hot", "small"], c: 1, e: "ดวงอาทิตย์มีลักษณะร้อน (hot)" },
        { q: "23. We _____ English now.", a: ["study", "studies", "studying"], c: 0, e: "We เป็นพหูพจน์ กริยาไม่ต้องเติม s" },
        { q: "24. There is _____ umbrella.", a: ["a", "an", "the"], c: 1, e: "Umbrella ขึ้นต้นด้วยสระ u ใช้ an" },
        { q: "25. My mom _____ dinner.", a: ["cook", "cooks", "cooking"], c: 1, e: "Mom คนเดียว กริยาเติม s" }
    ];

    let score = 0;
    let answered = 0;

    const quizBox = document.getElementById('quiz-box');
    questions.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'q-row';
        div.innerHTML = `<p><b>${item.q}</b></p><div class="options">` + 
            item.a.map((opt, i) => `<button onclick="check(${idx}, ${i}, this)">${opt}</button>`).join('') +
            `</div><div class="feedback" id="f-${idx}"></div>`;
        quizBox.appendChild(div);
    });

    window.check = (qIdx, aIdx, btn) => {
        const f = document.getElementById(`f-${qIdx}`);
        const btns = btn.parentElement.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        f.style.display = 'block';
        if(aIdx === questions[qIdx].c) {
            score++;
            f.className = 'feedback correct';
            f.innerHTML = "✅ ถูกต้อง! " + questions[qIdx].e;
        } else {
            f.className = 'feedback wrong';
            f.innerHTML = "❌ ผิดนะ! " + questions[qIdx].e;
        }
        answered++;
        if(answered === 25) {
            document.getElementById('summary-panel').style.display = 'block';
            document.getElementById('score-text').innerText = `${score} / 25`;
            const analysis = document.getElementById('analysis');
            if(score === 25) analysis.innerText = "วิเคราะห์: สมบูรณ์แบบ! คุณพร้อมสำหรับบทเรียนขั้นสูงแล้ว";
            else if(score >= 15) analysis.innerText = "วิเคราะห์: ดีมากครับ แต่ยังมีพลาดเรื่องการเติม s/es เล็กน้อย";
            else analysis.innerText = "วิเคราะห์: ควรกลับไปอ่านทวนบทที่ 2 และ 3 อีกครั้งนะครับ";
        }
    };
</script>
</body>
</html>
