<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - Mega Quiz 25 ข้อ</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .q-row { border-bottom: 1px solid #eee; padding: 15px 0; }
        .options button { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #fff; }
        .options button:hover { background: #e8f4fd; }
        .feedback { display: none; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 14px; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        #summary-panel { display: none; text-align: center; margin-top: 20px; padding: 20px; background: #2c3e50; color: white; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align: center; color: #2980b9;">🎓 แบบทดสอบพื้นฐาน 25 ข้อ</h1>
    <p style="text-align: center;">โดย <b>พระจอมเกล้าติวเตอร์</b></p>
    <div id="quiz-box"></div>
    <div id="summary-panel">
        <h2>สรุปคะแนน</h2>
        <h1 id="score-text">0 / 25</h1>
        <p id="analysis"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">เริ่มใหม่</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. Two _____ are on the floor.", a: ["box", "boxes", "boxs"], c: 1, e: "คำที่ลงท้ายด้วย x ต้องเติม -es ครับ" },
        { q: "2. I see _____ elephant.", a: ["a", "an", "the"], c: 1, e: "Elephant ขึ้นต้นด้วยเสียงสระ E จึงใช้ an" },
        { q: "3. _____ is my sister.", a: ["He", "She", "It"], c: 1, e: "Sister เป็นผู้หญิง ใช้ She แทนครับ" },
        { q: "4. _____ am a student.", a: ["I", "You", "We"], c: 0, e: "am ต้องใช้กับ I เท่านั้น" },
        { q: "5. They _____ many toys.", a: ["has", "have", "is"], c: 1, e: "They เป็นพหูพจน์ ใช้ have แปลว่ามี" },
        { q: "6. She _____ oranges every day.", a: ["eat", "eats", "eating"], c: 1, e: "She เป็นเอกพจน์ กริยาต้องเติม s" },
        { q: "7. The book is _____ the table.", a: ["in", "on", "at"], c: 1, e: "หนังสือวาง 'บน' โต๊ะ ใช้ on" },
        { q: "8. I _____ swim very well.", a: ["can", "is", "am"], c: 0, e: "can ใช้บอกความสามารถว่าว่ายน้ำได้" },
        { q: "9. We _____ happy today.", a: ["is", "am", "are"], c: 2, e: "We มีหลายคนใช้ are" },
        { q: "10. He _____ a red car.", a: ["have", "has", "are"], c: 1, e: "He เป็นคนเดียวขี้เหงา ใช้ has ครับ" },
        { q: "11. A _____ mouse is in the hole.", a: ["small", "tall", "long"], c: 0, e: "หนูมักจะมีลักษณะตัวเล็ก (small)" },
        { q: "12. Birds _____ fly.", a: ["can", "can't", "is"], c: 0, e: "นกสามารถบินได้ ใช้ can" },
        { q: "13. It is _____ cold in the fridge.", a: ["big", "hot", "very"], c: 2, e: "ในตู้เย็นจะมีความ 'หนาว' (cold)" },
        { q: "14. Ten _____ are in the sky.", a: ["bird", "birds", "birdes"], c: 1, e: "นก 10 ตัวเป็นพหูพจน์ เติม s" },
        { q: "15. _____ are my friends.", a: ["He", "She", "They"], c: 2, e: "Friends มีหลายคน ใช้ They" },
        { q: "16. Tom _____ to school.", a: ["go", "goes", "go es"], c: 1, e: "Tom คนเดียว กริยาเติม -es (เพราะลงท้ายด้วย o)" },
        { q: "17. An _____ is on the tree.", a: ["apple", "banana", "cat"], c: 0, e: "an ต้องนำหน้าคำที่ขึ้นต้นด้วยสระ (a)" },
        { q: "18. The cat is _____ the box.", a: ["in", "at", "to"], c: 0, e: "แมวอยู่ในกล่อง ใช้ in" },
        { q: "19. You _____ tall.", a: ["is", "am", "are"], c: 2, e: "You ใช้คู่กับ are เสมอ" },
        { q: "20. A dog _____ four legs.", a: ["have", "has", "is"], c: 1, e: "หมา 1 ตัว ใช้ has แปลว่ามี" },
        { q: "21. I can't _____.", a: ["fly", "flies", "flying"], c: 0, e: "หลัง can't กริยาห้ามเติมอะไรเลย" },
        { q: "22. The sun is _____.", a: ["cold", "hot", "small"], c: 1, e: "ดวงอาทิตย์มีลักษณะร้อน (hot)" },
        { q: "23. We _____ English now.", a: ["study", "studies", "studying"], c: 0, e: "We เป็นพหูพจน์ กริยาไม่ต้องเติม s" },
        { q: "24. There is _____ umbrella.", a: ["a", "an", "the"], c: 1, e: "Umbrella ขึ้นต้นด้วยสระ u ใช้ an" },
        { q: "25. My mom _____ dinner.", a: ["cook", "cooks", "cooking"], c: 1, e: "Mom คนเดียว กริยาเติม s" }
    ];

    let score = 0;
    let answered = 0;

    const quizBox = document.getElementById('quiz-box');
    questions.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'q-row';
        div.innerHTML = `<p><b>${item.q}</b></p><div class="options">` + 
            item.a.map((opt, i) => `<button onclick="check(${idx}, ${i}, this)">${opt}</button>`).join('') +
            `</div><div class="feedback" id="f-${idx}"></div>`;
        quizBox.appendChild(div);
    });

    window.check = (qIdx, aIdx, btn) => {
        const f = document.getElementById(`f-${qIdx}`);
        const btns = btn.parentElement.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        f.style.display = 'block';
        if(aIdx === questions[qIdx].c) {
            score++;
            f.className = 'feedback correct';
            f.innerHTML = "✅ ถูกต้อง! " + questions[qIdx].e;
        } else {
            f.className = 'feedback wrong';
            f.innerHTML = "❌ ผิดนะ! " + questions[qIdx].e;
        }
        answered++;
        if(answered === 25) {
            document.getElementById('summary-panel').style.display = 'block';
            document.getElementById('score-text').innerText = `${score} / 25`;
            const analysis = document.getElementById('analysis');
            if(score === 25) analysis.innerText = "วิเคราะห์: สมบูรณ์แบบ! คุณพร้อมสำหรับบทเรียนขั้นสูงแล้ว";
            else if(score >= 15) analysis.innerText = "วิเคราะห์: ดีมากครับ แต่ยังมีพลาดเรื่องการเติม s/es เล็กน้อย";
            else analysis.innerText = "วิเคราะห์: ควรกลับไปอ่านทวนบทที่ 2 และ 3 อีกครั้งนะครับ";
        }
    };
</script>
</body>
</html>
