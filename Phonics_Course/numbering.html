<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Number Adventure 1-100 🍎 พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --secondary-pink: #FFB3C6;
            --bg-color: #FFF0F3;
            --text-color: #4A4A4A;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.8rem; margin: 0; }
        .subtitle { color: #888; font-size: 1.1rem; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.15);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 8px; }
        th { background-color: var(--primary-pink); color: white; padding: 18px; border-radius: 20px; font-size: 1.2rem; }
        
        td {
            background-color: #FFF;
            border: 3px solid #FFE5EC;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        td:hover { transform: scale(1.03); border-color: var(--primary-pink); background-color: #FFF9FA; }

        .number-arabic { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--primary-pink); }
        .number-word { font-weight: 700; font-size: 1.3rem; color: #555; text-transform: uppercase; }
        
        .phonics-btn {
            background: #FFD93D;
            border: none;
            padding: 8px 15px;
            border-radius: 12px;
            color: #665400;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .tally {
            font-family: 'Segoe UI Symbol', sans-serif;
            font-size: 1.8rem;
            color: #FF5C8A;
            letter-spacing: 3px;
            line-height: 1;
        }

        .play-icon { font-size: 1.2rem; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍓 Number Phonics Adventure 🍓</h1>
        <p class="subtitle">สอนโดย: พระจอมเกล้าติวเตอร์ (KMITL Tutor)</p>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Number</th>
                    <th>Word</th>
                    <th>Phonics Spelling</th>
                    <th>Tally Marks</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const tableBody = document.getElementById('tableBody');

        // ข้อมูลการสะกด Phonics รายตัวอักษรสำหรับตัวเลขพื้นฐาน
        const phonicsData = {
            1: { spelling: "W - U - N", word: "ONE" },
            2: { spelling: "T - OO", word: "TWO" },
            3: { spelling: "TH - R - EE", word: "THREE" },
            4: { spelling: "F - OR", word: "FOUR" },
            5: { spelling: "F - I - V", word: "FIVE" },
            6: { spelling: "S - I - KS", word: "SIX" },
            7: { spelling: "S - E - V - E - N", word: "SEVEN" },
            8: { spelling: "AE - T", word: "EIGHT" },
            9: { spelling: "N - IE - N", word: "NINE" },
            10: { spelling: "T - E - N", word: "TEN" }
            // ระบบจะใช้ Logic พื้นฐานสำหรับเลขอื่นๆ
        };

        function getPhonicsSpelling(n) {
            if (phonicsData[n]) return phonicsData[n].spelling;
            return numberToWords(n).split('').join(' - ');
        }

        function numberToWords(n) {
            const ones = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
            const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
            if (n < 20) return ones[n];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + ones[n % 10] : "");
            return "ONE HUNDRED";
        }

        function generateTally(n) {
            let result = "";
            let fullGroups = Math.floor(n / 5);
            let remainder = n % 5;
            for(let i=0; i<fullGroups; i++) result += "卌 ";
            const marks = ["", "I", "II", "III", "IIII"];
            return result + marks[remainder];
        }

        function speakPhonics(number) {
            const word = numberToWords(number);
            const spelling = getPhonicsSpelling(number);
            
            // สร้างประโยคการสะกด: "W (เว้น) U (เว้น) N ... ONE"
            const msg = new SpeechSynthesisUtterance();
            msg.text = `${spelling} ... ${word}`;
            msg.lang = 'en-US';
            msg.rate = 0.6;  // ช้าเป็นพิเศษเพื่อให้เด็กออกเสียงตามทัน
            msg.pitch = 1.3; // เสียงสูงสดใสแบบผู้หญิง

            const voices = window.speechSynthesis.getVoices();
            // เลือกเสียงผู้หญิงที่ชัดเจน
            const femaleVoice = voices.find(v => v.name.includes('Google') && v.lang === 'en-US') || voices[0];
            msg.voice = femaleVoice;

            window.speechSynthesis.speak(msg);
        }

        for (let i = 1; i <= 100; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="number-arabic" onclick="speakPhonics(${i})">${i}</td>
                <td class="number-word" onclick="speakPhonics(${i})">${numberToWords(i)}</td>
                <td>
                    <button class="phonics-btn" onclick="speakPhonics(${i})">
                        <span class="play-icon">🔊</span> ${getPhonicsSpelling(i)}
                    </button>
                </td>
                <td class="tally">${generateTally(i)}</td>
            `;
            tableBody.appendChild(row);
        }

        // โหลดเสียง
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
