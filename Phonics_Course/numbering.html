<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Number Adventure 1-100 🍎 พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --secondary-pink: #FFB3C6;
            --bg-color: #FFF0F3;
            --text-color: #4A4A4A;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.8rem; margin: 0; }
        .subtitle { color: #888; font-size: 1.1rem; }

        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.15);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 8px; }
        th { background-color: var(--primary-pink); color: white; padding: 18px; border-radius: 20px; font-size: 1.1rem; }
        
        td {
            background-color: #FFF;
            border: 3px solid #FFE5EC;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        td:hover { transform: scale(1.02); border-color: var(--primary-pink); }

        .number-arabic { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--primary-pink); }
        .number-word { font-weight: 700; font-size: 1.3rem; color: #555; text-transform: uppercase; }
        
        .phonics-btn {
            background: #FFD93D;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            color: #665400;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 0 #E5C337;
        }
        .phonics-btn:active { transform: translateY(4px); box-shadow: none; }

        .tally {
            font-family: 'Segoe UI Symbol', sans-serif;
            font-size: 1.8rem;
            color: #FF5C8A;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍓 Number Phonics Adventure 🍎</h1>
        <p class="subtitle">โดย: พระจอมเกล้าติวเตอร์</p>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Number</th>
                    <th>Full Word</th>
                    <th>Phonics Spelling (Click to Practice)</th>
                    <th>Tally Marks</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const tableBody = document.getElementById('tableBody');

        // ข้อมูลการแยกเสียง Phonics (Segmenting)
        const phonicsData = {
            1: "W - U - N",
            2: "T - OO",
            3: "TH - R - EE",
            4: "F - OR",
            5: "F - I - V",
            6: "S - I - KS",
            7: "S - E - V - E - N",
            8: "AE - T",
            9: "N - IE - N",
            10: "T - E - N"
        };

        function numberToWords(n) {
            const ones = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
            const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
            if (n < 20) return ones[n];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + ones[n % 10] : "");
            return "ONE HUNDRED";
        }

        // 1. เสียงอ่านปกติ (สำหรับ Column 1 & 2)
        function speakWord(n) {
            const word = numberToWords(n);
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'en-US';
            msg.rate = 0.8; 
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        // 2. เสียงสะกด Phonics (สำหรับ Column 3)
        function speakPhonics(n) {
            const word = numberToWords(n);
            let spelling = phonicsData[n] || word.split('').join(' - ');
            
            // สร้างเสียงสะกดแบบเว้นจังหวะ: "W... U... N... ONE"
            const msg = new SpeechSynthesisUtterance(`${spelling} ... ${word}`);
            msg.lang = 'en-US';
            msg.rate = 0.6; // ช้าลงเพื่อให้สะกดตามทัน
            msg.pitch = 1.3;
            window.speechSynthesis.speak(msg);
        }

        function generateTally(n) {
            let result = "";
            let fullGroups = Math.floor(n / 5);
            let remainder = n % 5;
            for(let i=0; i<fullGroups; i++) result += "卌 ";
            const marks = ["", "I", "II", "III", "IIII"];
            return result + marks[remainder];
        }

        for (let i = 1; i <= 100; i++) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="number-arabic" onclick="speakWord(${i})">${i}</td>
                <td class="number-word" onclick="speakWord(${i})">${numberToWords(i)}</td>
                <td>
                    <button class="phonics-btn" onclick="speakPhonics(${i})">
                        🔊 ${phonicsData[i] || numberToWords(i).split('').join(' - ')}
                    </button>
                </td>
                <td class="tally">${generateTally(i)}</td>
            `;
            tableBody.appendChild(row);
        }

        // อุ่นเครื่องระบบเสียง
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
