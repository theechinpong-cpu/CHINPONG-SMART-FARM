<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONICS COURSE | KING MONGKUT TUTOR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --primary: #0ea5e9; --dark: #020617; }
        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--dark); 
            color: #f8fafc; 
            background-image: radial-gradient(circle at 50% -20%, #0c4a6e 0%, #020617 80%);
            min-height: 100 screen;
        }
        .inter { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .course-card { 
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .course-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(14, 165, 233, 0.3);
        }
        .text-gradient { background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <a href="../index.html" class="text-sky-400 text-xs font-bold uppercase tracking-widest mb-4 inline-block hover:text-white transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Command Center
                </a>
                <h1 class="text-5xl font-black inter tracking-tighter text-white mb-2">PHONICS<span class="text-gradient">MASTERY</span></h1>
                <p class="text-slate-400 text-sm tracking-wide">Infrastructure for Advanced English Pronunciation</p>
            </div>
            <div class="glass px-6 py-3 rounded-2xl border border-sky-500/20">
                <span class="text-[10px] text-slate-500 block uppercase font-bold tracking-tighter">System Status</span>
                <span class="text-sky-400 font-black inter italic">ALL MODULES OPERATIONAL</span>
            </div>
        </header>

        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <footer class="mt-20 pt-8 border-t border-slate-900 text-center">
            <p class="text-[10px] text-slate-600 font-bold uppercase tracking-[0.4em]">© 2026 พระจอมเกล้าติวเตอร์ | CHINPONG SMART FARM</p>
        </footer>
    </div>

    <script>
        const modules = [
            { id: "00", title: "Course Introduction", file: "introduce.html", category: "Basics", icon: "fa-door-open" },
            { id: "01", title: "SATPIN Mastery", file: "phonics-level1-satpin.html", category: "Level 1", icon: "fa-font" },
            { id: "02", title: "CVC Mastery", file: "phonics-level2-cvc-mastery.html", category: "Level 2", icon: "fa-cubes" },
            { id: "03", title: "Digraph Mastery", file: "phonics-level3-digraph-mastery.html", category: "Level 3", icon: "fa-layer-group" },
            { id: "04", title: "Long Vowel Mastery", file: "phonics-level4-long-vowel-mastery.html", category: "Level 4", icon: "fa-wind" },
            { id: "05", title: "Complete Mastery", file: "phonics-level5-complete-mastery.html", category: "Level 5", icon: "fa-star" },
            { id: "06", title: "Soft Sounds Secrets", file: "phonics-level6-soft-sounds-secrets.html", category: "Level 6", icon: "fa-feather" },
            { id: "07", title: "Ultimate Diphthongs", file: "phonics-level7-ultimate-diphthongs.html", category: "Level 7", icon: "fa-bolt" },
            { id: "08", title: "The Ultimate Mastery", file: "phonics-level8-the-ultimate-mastery.html", category: "Level 8", icon: "fa-crown" },
            { id: "09", title: "The Architect Final", file: "phonics-level9-the-architect-final.html", category: "Level 9", icon: "fa-drafting-compass" },
            { id: "10", title: "The Ultimate Sage", file: "phonics-level10-the-ultimate-sage-final.html", category: "Level 10", icon: "fa-brain" },
            { id: "11", title: "The Philologist", file: "phonics-level11-the-philologist-ultimate.html", category: "Level 11", icon: "fa-book-open" },
            { id: "12", title: "The Polymath Final", file: "phonics-level12-the-polymath-final.html", category: "Level 12", icon: "fa-microchip" },
            { id: "D1", title: "Dialogue 1-4", file: "phonics-mastery-dialogue1-4.html", category: "Practical", icon: "fa-comments" },
            { id: "D2", title: "Dialogue 1-5", file: "phonics-mastery-dialogue-1-5.html", category: "Practical", icon: "fa-comment-dots" },
            { id: "H1", title: "Hardcore 25 Mastery", file: "phonics-mastery-hardcore-25.html", category: "Extreme", icon: "fa-fire-alt" }
        ];

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = modules.map((m, index) => `
                <a href="${m.file}" class="course-card rounded-[2rem] p-8 group relative overflow-hidden block">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-sky-500/5 rounded-full blur-2xl group-hover:bg-sky-500/10 transition-all"></div>
                    
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-sky-400 shadow-lg">
                                <i class="fas ${m.icon} text-xl"></i>
                            </div>
                            <span class="text-[9px] font-black inter text-slate-600 tracking-widest uppercase">${m.category}</span>
                        </div>
                        
                        <h3 class="text-xl font-bold text-white mb-2 inter tracking-tight group-hover:text-sky-400 transition-colors">
                            ${m.title}
                        </h3>
                        
                        <div class="flex items-center justify-between mt-8">
                            <span class="text-[10px] font-bold text-slate-500 inter">MODULE ID: ${m.id}</span>
                            <div class="w-8 h-8 rounded-full border border-slate-800 flex items-center justify-center group-hover:border-sky-500 transition-all">
                                <i class="fas fa-arrow-right text-[10px] text-slate-600 group-hover:text-sky-400"></i>
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        window.onload = renderMenu;
    </script>
</body>
</html>
