<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .course-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(56, 189, 248, 0.1); }
        .course-card:hover { transform: scale(1.02); border-color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
        .level-badge { background: linear-gradient(90deg, #38bdf8, #818cf8); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tighter uppercase italic text-sky-400">Phonics Mastery</h1>
            <p class="text-slate-500 text-xs tracking-[0.5em] uppercase">Private English Infrastructure by พระจอมเกล้าติวเตอร์</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            
            <script>
                const modules = [
                    { id: '01', file: 'phonics-level1-satpin.html', title: 'SATPIN Foundation', desc: 'Starting with basic sounds' },
                    { id: '02', file: 'phonics-level2-cvc-mastery.html', title: 'CVC Mastery', desc: 'Consonant-Vowel-Consonant' },
                    { id: '03', file: 'phonics-level3-digraph-mastery.html', title: 'Digraph Mastery', desc: 'Double consonants sounds' },
                    { id: '04', file: 'phonics-level4-long-vowel-mastery.html', title: 'Long Vowel Mastery', desc: 'Vowel team power' },
                    { id: '05', file: 'phonics-level5-complete-mastery.html', title: 'Complete Mastery', desc: 'Advanced blending' },
                    { id: '06', file: 'phonics-level6-soft-sounds-secrets.html', title: 'Soft Sounds Secrets', desc: 'The "C" and "G" mysteries' },
                    { id: '07', file: 'phonics-level7-ultimate-diphthongs.html', title: 'Ultimate Diphthongs', desc: 'Gliding vowel sounds' },
                    { id: '08', file: 'phonics-level8-the-ultimate-mastery.html', title: 'The Ultimate Mastery', desc: 'Elite level phonics' },
                    { id: '09', file: 'phonics-level9-the-architect-final.html', title: 'The Architect', desc: 'Word structure engineering' },
                    { id: '10', file: 'phonics-level10-the-ultimate-sage-final.html', title: 'The Ultimate Sage', desc: 'Wisdom of sounds' },
                    { id: '11', file: 'phonics-level11-the-philologist-ultimate.html', title: 'The Philologist', desc: 'Linguistic excellence' },
                    { id: '12', file: 'phonics-level12-the-polymath-final.html', title: 'The Polymath', desc: 'The Grand Final' }
                ];

                modules.forEach(m => {
                    document.write(`
                        <a href="${m.file}" class="course-card glass p-6 rounded-[2rem] flex items-center gap-6 group">
                            <div class="level-badge w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-sky-500/20">
                                ${m.id}
                            </div>
                            <div>
                                <h3 class="font-bold text-white group-hover:text-sky-400 transition-colors">${m.title}</h3>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">${m.desc}</p>
                            </div>
                            <i class="fas fa-chevron-right ml-auto text-slate-800 group-hover:text-sky-500 transition-all"></i>
                        </a>
                    `);
                });
            </script>

        </div>

        <div class="mb-12">
            <h2 class="text-[10px] font-black text-amber-500 uppercase tracking-[0.3em] mb-6 border-b border-amber-500/20 pb-2">Training & Dialogues</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                
                <a href="phonics-mastery-dialogue-1-5.html" class="glass p-5 rounded-2xl border-l-2 border-amber-500 flex items-center gap-4 hover:bg-amber-500/5 transition-all">

                    <span class="text-sm font-bold">Dialogue 1-5</span>

                    <i class="fas fa-crown text-rose-500"></i>
                    <span class="text-sm font-bold">Mastery Dialogue Final</span>
                </a>

            </div>
        </div>

        <footer class="text-center py-12">

            </button>
            <p class="mt-8 text-[9px] text-slate-600 font-bold uppercase tracking-widest">© 2026 CHINPONG SMART FARM INFRASTRUCTURE</p>
        </footer>

    </div>
</body>
</html>
