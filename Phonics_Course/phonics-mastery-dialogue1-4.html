<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Mastery Conversation | พระจอมเกล้าติวเตอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', 'Kanit', sans-serif; background: #f8fafc; }
        .highlight { background-color: #fef08a; border-radius: 4px; transition: all 0.2s; }
        .kate-bubble { background: #e0f2fe; border-radius: 20px 20px 20px 4px; border: 2px solid #7dd3fc; }
        .mike-bubble { background: #fff7ed; border-radius: 20px 20px 4px 20px; border: 2px solid #fdba74; }
        .active-bubble { ring: 4px; ring-color: #3b82f6; transform: scale(1.02); }
    </style>
</head>
<body class="p-4 bg-slate-100">

    <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-white">
        <div class="bg-indigo-600 p-8 text-white text-center relative">
            <h1 class="text-3xl font-black tracking-tight">PHONICS DIALOGUE</h1>
            <p class="text-indigo-100 font-light mt-1">Level 1 - 4 Mastery Course</p>
            <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-white text-indigo-600 px-6 py-1 rounded-full text-xs font-bold shadow-md">
                BY พระจอมเกล้าติวเตอร์
            </div>
        </div>

        <div class="flex justify-between items-center px-8 py-6 bg-slate-50 border-b">
            <button onclick="toggleTranslation()" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 uppercase tracking-widest">
                [ แปลไทย ON/OFF ]
            </button>
            <button onclick="stopAll()" class="bg-red-100 text-red-600 p-2 rounded-full hover:bg-red-200 transition">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
            </button>
        </div>

        <div id="chat-container" class="p-6 space-y-8 min-h-[500px]"></div>

        <div class="p-6 bg-slate-50 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">© CHINPONG SMART FARM - EXCELLENCE IN EDUCATION</p>
        </div>
    </div>

    <script>
        const dialogues = [
            { name: "Kate", gender: "female", text: "Hi Mike! Is that a big red cat on the mat?", th: "ไฮ ไมค์! นั่นแมวสีแดงตัวใหญ่บนพรมใช่ไหม?", lv: "L1" },
            { name: "Mike", gender: "male", text: "Yes Kate! It is my fat cat. His name is Sam.", th: "ใช่แล้วเคท! มันคือแมวอ้วนของผมเอง ชื่อของมันคือแซม", lv: "L1" },
            { name: "Kate", gender: "female", text: "I like Sam. Can he hop and jump on the box?", th: "ฉันชอบแซมนะ เขากระโดดไปบนกล่องได้ไหม?", lv: "L2" },
            { name: "Mike", gender: "male", text: "He can hop, but he is too fat to jump fast.", th: "เขากระโดดเตี้ยๆ ได้ แต่เขาอ้วนเกินกว่าจะกระโดดเร็วๆ", lv: "L2" },
            { name: "Kate", gender: "female", text: "Look at the lake! Let's go and take a ride.", th: "ดูที่ทะเลสาบสิ! ไปขี่รถเล่นกันเถอะ", lv: "L4" },
            { name: "Mike", gender: "male", text: "Wait! I need to find my bike and my kite.", th: "รอเดี๋ยว! ผมต้องไปหาจักรยานกับว่าวก่อน", lv: "L4" },
            { name: "Kate", gender: "female", text: "Is your bike safe? Do not fall in the hole!", th: "จักรยานปลอดภัยไหม? อย่าตกลงไปในหลุมนะ!", lv: "L4" },
            { name: "Mike", gender: "male", text: "My bike is fine. I can ride it to the gate.", th: "จักรยานผมโอเค ผมขี่มันไปที่ประตูรั้วได้", lv: "L4" },
            { name: "Kate", gender: "female", text: "Did you bring a cake to eat at the lake?", th: "คุณเอาเค้กมาทานที่ทะเลสาบด้วยหรือเปล่า?", lv: "L4" },
            { name: "Mike", gender: "male", text: "I have a lime cake and a cold Coke in my bag.", th: "ผมมีเค้กมะนาวกับโค้กเย็นๆ ในกระเป๋าครับ", lv: "L4" },
            { name: "Kate", gender: "female", text: "That is nice! I hope Sam the cat can come too.", th: "ดีจัง! ฉันหวังว่าเจ้าแมวแซมจะมาได้ด้วยนะ", lv: "L4" },
            { name: "Mike", gender: "male", text: "Sam is at home. He is sleeping in the sun.", th: "แซมอยู่ที่บ้านครับ เขากำลังนอนตากแดดอยู่", lv: "L1" },
            { name: "Kate", gender: "female", text: "Look! I see a white snake under that pine tree.", th: "ดูนั่น! ฉันเห็นงูสีขาวใต้ต้นสนต้นนั้น", lv: "L4" },
            { name: "Mike", gender: "male", text: "Do not go near! It is not a tame snake.", th: "อย่าเข้าใกล้เข้านะ! มันไม่ใช่งูที่เชื่อง", lv: "L4" },
            { name: "Kate", gender: "female", text: "You are right. Let us fly the kite in the lane.", th: "คุณพูดถูก เราไปเล่นว่าวที่ถนนเลนโน้นกันเถอะ", lv: "L4" },
            { name: "Mike", gender: "male", text: "The wind is strong. The kite can dive and rise.", th: "ลมแรงมากเลย ว่าวมันโฉบลงและลอยขึ้นได้ด้วย", lv: "L4" },
            { name: "Kate", gender: "female", text: "It is time to go home. It is getting late.", th: "ได้เวลาต้องกลับบ้านแล้ว มันเริ่มเย็นมากแล้วนะ", lv: "L4" },
            { name: "Mike", gender: "male", text: "Can we make a fire to bake some cute buns?", th: "เราก่อไฟเพื่ออบขนมปังน่ารักๆ กันได้ไหม?", lv: "L4" },
            { name: "Kate", gender: "female", text: "Yes! Use the wood to make a flame for us.", th: "ได้เลย! ใช้ไม้พวกนั้นทำเปลวไฟให้เรานะ", lv: "L4" },
            { name: "Mike", gender: "male", text: "I am glad we had a fun time today, Kate!", th: "ผมดีใจจังที่เราได้มีเวลาสนุกๆ กันวันนี้ เคท!", lv: "L1" }
        ];

        let showTrans = false;
        const synth = window.speechSynthesis;

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = dialogues.map((d, i) => `
                <div id="msg-${i}" class="flex ${d.name==='Kate'?'justify-start':'flex-row-reverse'} items-end gap-3 group">
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-500 shadow-inner">
                        ${d.name[0]}
                    </div>
                    <div onclick="playAudio(${i})" class="cursor-pointer transition-all duration-300 ${d.name==='Kate'?'kate-bubble':'mike-bubble'} p-4 max-w-[85%] shadow-sm hover:shadow-md">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">${d.lv} MASTERED</span>
                            <div class="h-1 w-1 rounded-full bg-slate-300"></div>
                            <span class="text-[10px] font-bold text-indigo-500 uppercase">${d.name}</span>
                        </div>
                        <p id="text-${i}" class="text-slate-800 text-lg font-medium leading-tight">${d.text}</p>
                        <p id="th-${i}" class="text-slate-500 text-sm mt-2 font-light italic transition-opacity ${showTrans?'opacity-100':'opacity-0 h-0 overflow-hidden'}">${d.th}</p>
                    </div>
                </div>
            `).join('');
        }

        function playAudio(index) {
            synth.cancel();
            const data = dialogues[index];
            const utterance = new SpeechSynthesisUtterance(data.text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;

            // Voice Selection Logic
            const voices = synth.getVoices();
            if(data.gender === 'female') {
                utterance.voice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Female')) || voices[0];
            } else {
                utterance.voice = voices.find(v => v.name.includes('David') || v.name.includes('Guy') || v.name.includes('Male')) || voices[0];
            }

            // Highlighting
            const textEl = document.getElementById(`text-${index}`);
            const originalText = data.text;
            
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    const word = event.utterance.text.substr(event.charIndex, event.charLength);
                    const before = originalText.substr(0, event.charIndex);
                    const after = originalText.substr(event.charIndex + event.charLength);
                    textEl.innerHTML = `${before}<span class="highlight">${word}</span>${after}`;
                }
            };

            utterance.onend = () => { textEl.innerHTML = originalText; };
            synth.speak(utterance);
        }

        function toggleTranslation() {
            showTrans = !showTrans;
            renderChat();
        }

        function stopAll() { synth.cancel(); renderChat(); }

        window.speechSynthesis.onvoiceschanged = renderChat;
        renderChat();
    </script>
</body>
</html>
