<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-100 Number Adventure 🍎 KMITL Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --secondary-pink: #FFB3C6;
            --bg-color: #FFF0F3;
            --text-color: #4A4A4A;
            --accent-yellow: #FFD93D;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--primary-pink);
            font-size: 2.5rem;
            text-shadow: 2px 2px white;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 10px;
        }

        th {
            background-color: var(--primary-pink);
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.2rem;
        }

        td {
            background-color: #FFF;
            border: 3px solid var(--secondary-pink);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        td:hover {
            transform: scale(1.05);
            background-color: #FFE5EC;
        }

        .number-arabic {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: var(--primary-pink);
        }

        .number-word {
            font-weight: 600;
            text-transform: uppercase;
            color: #555;
        }

        .phonics {
            color: #888;
            font-style: italic;
            font-size: 0.9rem;
        }

        .tally {
            font-family: monospace;
            font-size: 1.5rem;
            color: #FF5C8A;
            letter-spacing: 2px;
            white-space: pre-wrap;
        }

        /* Styling for Tally Marks */
        .tally-group {
            display: inline-block;
            margin-right: 5px;
            text-decoration: none;
        }

        .strike {
            text-decoration: line-through;
            text-decoration-thickness: 3px;
        }

    </style>
</head>
<body>

    <h1>✨ Number Adventure 1-100 ✨</h1>
    <p>แตะที่ช่องเพื่อฟังเสียงสอนสะกด Phonics นะคะ!</p>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Arabic</th>
                    <th>English Word</th>
                    <th>Phonics Sound</th>
                    <th>Tally Marks</th>
                </tr>
            </thead>
            <tbody id="numberTableBody">
                </tbody>
        </table>
    </div>

    <script>
        const numberTableBody = document.getElementById('numberTableBody');

        function numberToWords(n) {
            const ones = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
            const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
            if (n < 20) return ones[n];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? "-" + ones[n % 10] : "");
            return "ONE HUNDRED";
        }

        function getPhonics(n) {
            // Simplified phonics for demonstration, focusing on key sounds
            const phonicsMap = {
                1: "/w/ - /u/ - /n/", 2: "/t/ - /oo/", 3: "/th/ - /r/ - /ee/",
                4: "/f/ - /or/", 5: "/f/ - /i/ - /v/", 6: "/s/ - /i/ - /ks/",
                7: "/s/ - /e/ - /v/ - /e/ - /n/", 8: "/ae/ - /t/", 9: "/n/ - /ie/ - /n/",
                10: "/t/ - /e/ - /n/"
                // In a full app, you'd define all 100 or use a logic-based phonetic engine
            };
            return phonicsMap[n] || "Phonics Sound";
        }

        function generateTally(n) {
            let tallies = "";
            for (let i = 1; i <= n; i++) {
                if (i % 5 === 0) {
                    tallies = tallies.trim() + "卌 "; // Using the tally character for simplicity and visual clarity
                } else if (i % 5 === 1 && i !== 1) {
                    // Start new group
                }
            }
            // Add the remaining marks
            const remainder = n % 5;
            const marks = ["", "|", "||", "|||", "||||"];
            return tallies + marks[remainder];
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            
            // Try to find a high-quality female voice
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(voice => 
                voice.name.includes('Google') && voice.name.includes('Female') || 
                voice.name.includes('Samantha') || 
                voice.name.includes('Zira')
            );

            if (femaleVoice) utterance.voice = femaleVoice;
            utterance.pitch = 1.2; // Higher pitch for a "cute/friendly" teacher voice
            utterance.rate = 0.8;  // Slower for clarity
            window.speechSynthesis.speak(utterance);
        }

        for (let i = 1; i <= 100; i++) {
            const word = numberToWords(i);
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td class="number-arabic" onclick="speak('${i}')">${i}</td>
                <td class="number-word" onclick="speak('${word}')">${word}</td>
                <td class="phonics" onclick="speak('${word}')">${getPhonics(i)}</td>
                <td class="tally" onclick="speak('Count to ${i}')">${generateTally(i)}</td>
            `;
            
            numberTableBody.appendChild(row);
        }

        // Initialize voices
        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Voices loaded");
        };
    </script>
</body>
</html>
