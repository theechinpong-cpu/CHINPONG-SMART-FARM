<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-100 Number Adventure - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #ffb3c6;
            --bg-color: #fff0f3;
            --yellow: #ffd60a;
            --white: #ffffff;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.5rem; margin: 0; }

        .app-container {
            display: flex;
            width: 95%;
            max-width: 1100px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.2);
            padding: 30px;
            min-height: 550px;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 4px dashed var(--soft-pink);
            padding: 20px;
        }

        .right-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .number-display { 
            font-size: 10rem; 
            font-family: 'Fredoka One'; 
            color: var(--primary-pink); 
            cursor: pointer;
            line-height: 1;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.05);
        }

        .word-display { 
            font-size: 3rem; 
            font-weight: bold; 
            color: #444; 
            margin: 10px 0; 
            cursor: pointer;
            text-transform: uppercase;
        }
        
        .phonics-btn {
            background-color: var(--yellow);
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #ccac00;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .phonics-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #ccac00;
        }

        .apple-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 25px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            width: 100%;
            justify-items: center;
        }

        .apple { font-size: 3rem; cursor: pointer; transition: transform 0.2s; }
        .apple:hover { transform: scale(1.3) rotate(10deg); }

        .sentence-display {
            margin-top: 20px;
            padding: 20px;
            background: #fff5f7;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border: 2px solid var(--soft-pink);
        }

        .clickable-word {
            font-size: 1.8rem;
            color: var(--primary-pink);
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: 600;
            background: white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }

        .clickable-word:hover {
            background: var(--primary-pink);
            color: white;
            transform: translateY(-3px);
        }

        .nav-controls { margin-top: 30px; display: flex; gap: 30px; }
        .nav-btn {
            padding: 18px 50px;
            font-size: 1.8rem;
            border-radius: 50px;
            border: none;
            color: white;
            cursor: pointer;
            font-family: 'Fredoka One';
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            transition: all 0.2s;
        }

        .nav-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        .prev-btn { background-color: #ffafcc; }
        .next-btn { background-color: #fb6f92; }

        .tally-marks { 
            font-size: 2.2rem; 
            color: #666; 
            margin-top: 25px; 
            letter-spacing: 5px;
            background: #fdfdfd;
            padding: 10px 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Number Adventure! 🍎</h1>
        <p style="color: #888;">พระจอมเกล้าติวเตอร์ - เรียนรู้อย่างสนุกผ่านเสียงสะกด Phonics</p>
    </div>

    <div class="app-container">
        <div class="left-panel">
            <div class="number-display" id="numDisplay" onclick="speakNum()">1</div>
            <div class="word-display" id="wordDisplay" onclick="speakNum()">ONE</div>
            <button class="phonics-btn" onclick="speakPhonics()">Phonics Sound 🔊</button>
            <div class="tally-marks" id="tallyDisplay">|</div>
        </div>

        <div class="right-panel">
            <div class="apple-container" id="appleArea" onclick="speakSentence()">
                </div>
            <div class="sentence-display" id="sentenceArea">
                </div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn prev-btn" onclick="changePage(-1)">Back</button>
        <button class="nav-btn next-btn" onclick="changePage(1)">Next</button>
    </div>

    <script>
        let currentPage = 1;

        // คำศัพท์ตัวเลข (เตรียมไว้บางส่วน สามารถเขียนโปรแกรม generate ต่อได้)
        const numberWords = {
            1: "ONE", 2: "TWO", 3: "THREE", 4: "FOUR", 5: "FIVE", 
            6: "SIX", 7: "SEVEN", 8: "EIGHT", 9: "NINE", 10: "TEN",
            11: "ELEVEN", 12: "TWELVE", 13: "THIRTEEN", 14: "FOURTEEN", 15: "FIFTEEN",
            20: "TWENTY", 30: "THIRTY", 40: "FORTY", 50: "FIFTY", 100: "ONE HUNDRED"
        };

        // แผนผัง Phonics (American Style)
        const phonicsMap = {
            1: "/w/ - /u/ - /n/ ... ONE",
            2: "/t/ - /oo/ ... TWO",
            3: "/th/ - /r/ - /ee/ ... THREE",
            4: "/f/ - /or/ ... FOUR",
            5: "/f/ - /ai/ - /v/ ... FIVE",
            6: "/s/ - /i/ - /k/ - /s/ ... SIX",
            7: "/s/ - /e/ - /v/ - /e/ - /n/ ... SEVEN",
            8: "/ei/ - /t/ ... EIGHT",
            9: "/n/ - /ai/ - /n/ ... NINE",
            10: "/t/ - /e/ - /n/ ... TEN"
        };

        // ฟังก์ชันแปลงตัวเลขเป็นตัวหนังสือสำหรับแสดงผล (รองรับ 1-100)
        function numberToWord(n) {
            if (numberWords[n]) return numberWords[n];
            // logic ง่ายๆ สำหรับตัวเลขอื่นๆ (simplified for demo)
            return "NUMBER " + n;
        }

        function speak(text) {
            window.speechSynthesis.cancel(); // หยุดเสียงเก่าก่อนเริ่มเสียงใหม่
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'en-US';
            uttr.rate = 0.7; // ความเร็ว 0.7 ตามคู่มือ เพื่อให้เด็ก 4 ขวบฟังทัน
            uttr.pitch = 1.2; // เสียงสูงสดใสแบบครูผู้หญิง
            window.speechSynthesis.speak(uttr);
        }

        function speakNum() { speak(numberToWord(currentPage)); }
        
        function speakPhonics() { 
            const phonicsText = phonicsMap[currentPage] || "Number " + currentPage;
            speak(phonicsText); 
        }

        function speakSentence() { 
            const plural = currentPage === 1 ? 'apple' : 'apples';
            speak(`There are ${currentPage} ${plural}.`); 
        }

        function renderSentence(n) {
            const area = document.getElementById('sentenceArea');
            area.innerHTML = '';
            const appleWord = n === 1 ? 'apple' : 'apples';
            const sentence = `There are ${n} ${appleWord}`.split(' ');

            sentence.forEach(word => {
                const span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.onclick = (e) => {
                    e.stopPropagation();
                    speak(word);
                };
                area.appendChild(span);
            });
        }

        function updateUI() {
            // อัปเดตตัวเลขและตัวหนังสือ
            document.getElementById('numDisplay').innerText = currentPage;
            document.getElementById('wordDisplay').innerText = numberToWord(currentPage);
            
            // วาด Apple
            const appleArea = document.getElementById('appleArea');
            appleArea.innerHTML = '';
            for(let i=0; i<currentPage; i++) {
                const apple = document.createElement('span');
                apple.className = 'apple';
                apple.innerText = '🍎';
                appleArea.appendChild(apple);
            }

            // อัปเดตประโยคแยกคำ
            renderSentence(currentPage);

            // อัปเดต Tally Marks (卌 = 5)
            const tallyDisplay = document.getElementById('tallyDisplay');
            let fullFives = Math.floor(currentPage / 5);
            let remainder = currentPage % 5;
            let tallyString = "";
            
            for(let i=0; i<fullFives; i++) {
                tallyString += "卌 ";
            }
            for(let j=0; j<remainder; j++) {
                tallyString += "|";
            }
            tallyDisplay.innerText = tallyString || "|";
        }

        function changePage(step) {
            currentPage += step;
            if(currentPage < 1) currentPage = 1;
            if(currentPage > 100) currentPage = 100;
            updateUI();
        }

        // เริ่มต้นแอป
        updateUI();
    </script>
</body>
</html>
