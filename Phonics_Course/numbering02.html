<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Number Adventure 1-100 🍎 พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --secondary-pink: #FFB3C6;
            --bg-color: #FFF0F3;
            --text-color: #4A4A4A;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; z-index: 10; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.2rem; margin: 0; }
        .subtitle { color: #888; font-size: 1rem; margin: 0;}

        /* เมนคอนเทนเนอร์แบ่งเป็น 2 ฝั่ง */
        .main-container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 80vh;
            background: white;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.2);
            overflow: hidden; /* ให้คอนเทนต์ด้านในไม่ทะลุขอบมน */
        }

        /* ฝั่งซ้าย: ข้อมูลตัวเลข */
        .info-panel {
            flex: 1; /* เอาพื้นที่ครึ่งนึง */
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 5px dashed var(--bg-color);
        }

        /* ฝั่งขวา: พื้นที่แสดง Apple */
        .apple-panel {
            flex: 1; /* เอาพื้นที่อีกครึ่งนึง */
            padding: 20px;
            overflow-y: auto; /* ให้เลื่อนลงได้ถ้า Apple เยอะ */
            display: flex;
            flex-wrap: wrap; /* ให้ Apple เรียงต่อกันพอดีหน้าจอ */
            align-content: flex-start;
            justify-content: center; /* ให้อยู่ตรงกลาง */
            cursor: pointer; /* ทำให้รู้ว่ากดได้ */
            background-color: #fffafb;
        }

        .number-arabic { 
            font-family: 'Fredoka One', cursive; 
            font-size: 8rem; 
            color: var(--primary-pink); 
            margin: 0;
            cursor: pointer;
            line-height: 1;
        }

        .number-word { 
            font-weight: 700; 
            font-size: 2.5rem; 
            color: #555; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            cursor: pointer;
        }

        .phonics-section { margin: 10px 0; width: 100%; }
        
        .phonics-btn {
            background: #FFD93D;
            border: none;
            padding: 15px 25px;
            border-radius: 20px;
            color: #665400;
            font-weight: bold;
            font-size: 1.3rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 6px 0 #E5C337;
            transition: all 0.1s;
        }
        .phonics-btn:active { transform: translateY(4px); box-shadow: none; }

        .tally {
            font-family: 'Segoe UI Symbol', sans-serif;
            font-size: 2rem;
            color: #FF5C8A;
            letter-spacing: 3px;
            margin-top: 15px;
            min-height: 1.2em;
            text-align: center;
        }

        /* สไตล์ของ Apple */
        .apple-icon {
            font-size: 3.5rem; /* ขนาดใหญ่เห็นชัด */
            margin: 5px;
            transition: transform 0.2s;
        }
        .apple-panel:hover .apple-icon {
            transform: scale(1.1); /* ขยายเล็กน้อยเมื่อเอาเมาส์วาง */
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            z-index: 10;
        }

        .nav-btn {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
        }

        .nav-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .progress {
            color: var(--primary-pink);
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍓 Number Adventure 🍎</h1>
        <p class="subtitle">พระจอมเกล้าติวเตอร์</p>
    </div>

    <div class="main-container">
        <div class="info-panel">
            <div class="number-arabic" id="displayNum" onclick="speakWord(currentNum)">1</div>
            <div class="number-word" id="displayWord" onclick="speakWord(currentNum)">ONE</div>
            
            <div class="phonics-section">
                <button class="phonics-btn" onclick="speakPhonics(currentNum)">
                    🔊 <span id="displayPhonics">W - U - N</span>
                </button>
            </div>

            <div class="tally" id="displayTally">卌</div>
        </div>

        <div class="apple-panel" id="appleDisplay" onclick="speakAppleSentence(currentNum)">
            </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">◀ Back</button>
        <div class="progress"><span id="currentPage">1</span> / 100</div>
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">Next ▶</button>
    </div>

    <script>
        let currentNum = 1;

        const phonicsData = {
            1: "W - U - N", 2: "T - OO", 3: "TH - R - EE", 4: "F - OR", 5: "F - I - V",
            6: "S - I - KS", 7: "S - E - V - E - N", 8: "AE - T", 9: "N - IE - N", 10: "T - E - N"
        };

        function numberToWords(n) {
            const ones = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
            const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
            if (n < 20) return ones[n];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + ones[n % 10] : "");
            return "ONE HUNDRED";
        }

        function generateTally(n) {
            let result = "";
            let fullGroups = Math.floor(n / 5);
            let remainder = n % 5;
            for(let i=0; i<fullGroups; i++) result += "卌 ";
            const marks = ["", "I", "II", "III", "IIII"];
            return result + marks[remainder];
        }

        // ฟังก์ชันสร้าง Apple ตามจำนวน
        function updateAppleContainer(n) {
            const container = document.getElementById('appleDisplay');
            container.innerHTML = ""; // ล้าง Apple เก่าออก

            for (let i = 0; i < n; i++) {
                const appleSpan = document.createElement('span');
                appleSpan.className = 'apple-icon';
                appleSpan.innerText = '🍎';
                container.appendChild(appleSpan);
            }
        }

        function updatePage() {
            document.getElementById('displayNum').innerText = currentNum;
            const word = numberToWords(currentNum);
            document.getElementById('displayWord').innerText = word;
            document.getElementById('displayPhonics').innerText = phonicsData[currentNum] || word.split('').join(' - ');
            document.getElementById('displayTally').innerText = generateTally(currentNum);
            document.getElementById('currentPage').innerText = currentNum;

            // อัปเดตจำนวน Apple
            updateAppleContainer(currentNum);

            // ควบคุมปุ่ม
            document.getElementById('prevBtn').disabled = (currentNum === 1);
            document.getElementById('nextBtn').disabled = (currentNum === 100);
        }

        function changePage(step) {
            currentNum += step;
            if (currentNum < 1) currentNum = 1;
            if (currentNum > 100) currentNum = 100;
            updatePage();
        }

        // เสียงปกติ
        function speakWord(n) {
            const word = numberToWords(n);
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'en-US';
            msg.rate = 0.8; 
            msg.pitch = 1.2;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        // เสียง Phonics
        function speakPhonics(n) {
            const word = numberToWords(n);
            let spelling = phonicsData[n] || word.split('').join(' - ');
            const msg = new SpeechSynthesisUtterance(`${spelling} ... ${word}`);
            msg.lang = 'en-US';
            msg.rate = 0.6;
            msg.pitch = 1.3;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        // เสียงประโยค Apple (There are X apples.)
        function speakAppleSentence(n) {
            // ปรับ Grammer เล็กน้อยสำหรับเลข 1 (apple ไม่เติม s)
            const appleWord = (n === 1) ? "apple" : "apples";
            const sentence = `There are ${n} ${appleWord}.`;
            const msg = new SpeechSynthesisUtterance(sentence);
            msg.lang = 'en-US';
            msg.rate = 0.8; 
            msg.pitch = 1.2;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        // เริ่มต้นหน้าแรก
        updatePage();

        // อุ่นเครื่องระบบเสียง
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
