<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Adventure - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --bg-color: #FFF0F3;
            --card-white: #FFFFFF;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.5rem; margin: 0; }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        .card {
            background: var(--card-white);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.2);
            text-align: center;
            flex: 1;
        }

        .big-letter {
            font-size: 8rem;
            font-family: 'Fredoka One', cursive;
            color: var(--primary-pink);
            margin: 0;
            cursor: pointer;
        }

        .word-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .word-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #FFF9FA;
            margin: 10px 0;
            padding: 15px 25px;
            border-radius: 20px;
            border: 2px solid #FFE0E6;
        }

        .word-text { font-size: 1.8rem; font-weight: 600; color: #444; }

        .btn-group { display: flex; gap: 10px; }

        button {
            border: none;
            border-radius: 15px;
            padding: 10px 15px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-speak { background-color: #FFDDE4; color: #FF5E7E; }
        .btn-phonics { background-color: #FFEB3B; color: #827717; }
        button:hover { transform: scale(1.05); }

        .nav-btns { margin-top: 30px; display: flex; gap: 20px; }
        .nav-btn { background: var(--primary-pink); color: white; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; }

        .apple-container {
            flex: 1;
            background: white;
            border-radius: 30px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            align-content: start;
        }

        .apple-icon { font-size: 2.5rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>พระจอมเกล้าติวเตอร์</h1>
    <p>Phonics Mastery for Kids</p>
</div>

<div class="container">
    <div class="card">
        <div class="big-letter" onclick="speakLetter('A')">A</div>
        <div class="word-list" id="wordList">
            </div>
    </div>

    <div class="apple-container" id="appleZone" onclick="speakSentence()">
        </div>
</div>

<div class="nav-btns">
    <button class="nav-btn" onclick="prevPage()">Back</button>
    <button class="nav-btn" onclick="nextPage()">Next</button>
</div>

<script>
    const data = [
        { letter: 'A', words: [
            { text: 'Ant', phonics: 'a, a, n, t', ssml: 'a, a, n, t' },
            { text: 'Apple', phonics: 'a, p, p, l, e', ssml: 'a, p, p, l, e' },
            { text: 'Arm', phonics: 'a, r, m', ssml: 'a, r, m' }
        ], count: 3 },
        { letter: 'B', words: [
            { text: 'Bat', phonics: 'b, b, a, t', ssml: 'b, b, a, t' },
            { text: 'Ball', phonics: 'b, b, a, l, l', ssml: 'b, b, a, l, l' },
            { text: 'Bear', phonics: 'b, b, e, a, r', ssml: 'b, b, e, a, r' }
        ], count: 3 }
    ];

    let currentIndex = 0;

    function renderPage() {
        const item = data[currentIndex];
        document.querySelector('.big-letter').innerText = item.letter;
        
        const list = document.getElementById('wordList');
        list.innerHTML = item.words.map(w => `
            <div class="word-item">
                <span class="word-text">${w.text}</span>
                <div class="btn-group">
                    <button class="btn-speak" onclick="speakNormal('${w.text}')">Normal</button>
                    <button class="btn-phonics" onclick="speakPhonics('${w.ssml}', '${w.text}')">Phonics</button>
                </div>
            </div>
        `).join('');

        const appleZone = document.getElementById('appleZone');
        appleZone.innerHTML = '🍎'.repeat(item.count);
    }

    // เสียงพูดปกติ
    function speakNormal(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    // แก้ไข: เสียงอ่าน Phonics แบบช้าพิเศษและไม่มีคำว่า Slash
    function speakPhonics(ssmlText, fullWord) {
        // ใช้เทคนิคการหน่วงเวลาด้วยการสร้างหลาย Utterance เพื่อความแม่นยำสูง
        // หรือใช้ Rate ต่ำสุดเพื่อเลียนแบบการสอน
        const letters = ssmlText.split(', ');
        let delay = 0;

        letters.forEach((char, index) => {
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance(char);
                msg.lang = 'en-US';
                msg.rate = 0.5; // ความเร็ว 0.5x ตามที่ต้องการ
                msg.pitch = 1.2;
                window.speechSynthesis.speak(msg);
            }, delay);
            delay += 1000; // เว้นช่วงทีละ 1 วินาที
        });

        // พูดคำเต็มปิดท้าย
        setTimeout(() => {
            speakNormal(fullWord);
        }, delay);
    }

    function speakLetter(l) {
        const msg = new SpeechSynthesisUtterance(`Letter ${l}`);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function speakSentence() {
        const item = data[currentIndex];
        const msg = new SpeechSynthesisUtterance(`There are ${item.count} apples`);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function nextPage() { if (currentIndex < data.length - 1) { currentIndex++; renderPage(); } }
    function prevPage() { if (currentIndex > 0) { currentIndex--; renderPage(); } }

    renderPage();
</script>

</body>
</html>
