<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Adventure - KMITL Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --soft-pink: #FFB6C1;
            --sunny-yellow: #FFD700;
            --bg-color: #FFF0F5;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; padding: 20px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.5rem; margin: 0; }

        .app-container {
            width: 90%;
            max-width: 1000px;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .info-panel { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .image-panel { 
            flex: 1; 
            background: #fdfdfd; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            border: 2px dashed var(--soft-pink);
            padding: 20px;
        }

        .big-letter { font-size: 120px; font-family: 'Fredoka One'; color: var(--primary-pink); line-height: 1; }
        
        .word-card {
            width: 100%;
            background: var(--bg-color);
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            font-family: 'Prompt';
        }

        .btn:active { transform: scale(0.95); }
        .btn-read { background-color: var(--soft-pink); color: white; }
        .btn-phonics { background-color: var(--sunny-yellow); color: #555; }

        .apple-container { font-size: 40px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; cursor: pointer; }
        .sentence-box { margin-top: 15px; font-size: 1.2rem; color: #555; font-weight: 600; text-align: center; }
        .nav-buttons { display: flex; gap: 20px; margin-top: 10px; }
        .btn-nav { background: var(--primary-pink); color: white; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; }

    </style>
</head>
<body>

<div class="header">
    <h1>Phonics Adventure</h1>
    <p>พระจอมเกล้าติวเตอร์ 🍎</p>
</div>

<div class="app-container">
    <div class="info-panel" id="infoPanel">
        <div class="big-letter" id="currentLetter">A</div>
        <div id="wordList" style="width: 100%;"></div>
    </div>

    <div class="image-panel">
        <div class="apple-container" id="appleDisplay" onclick="speakFullSentence()"></div>
        <div class="sentence-box" id="sentenceBox"></div>
    </div>
</div>

<div class="nav-buttons">
    <button class="btn btn-nav" onclick="prevPage()">Back</button>
    <button class="btn btn-nav" onclick="nextPage()">Next</button>
</div>

<script>
    let currentIndex = 0;

    const alphabetData = [
        {
            letter: "A",
            words: [
                { name: "Ant", phonics: "a n t" },
                { name: "Apple", phonics: "a p p l e" },
                { name: "Arm", phonics: "a r m" }
            ]
        },
        {
            letter: "B",
            words: [
                { name: "Bat", phonics: "b a t" },
                { name: "Ball", phonics: "b a l l" },
                { name: "Bear", phonics: "b e a r" }
            ]
        },
        {
            letter: "C",
            words: [
                { name: "Cat", phonics: "k a t" },
                { name: "Cup", phonics: "k u p" },
                { name: "Cake", phonics: "k a k e" }
            ]
        }
        // สามารถเพิ่มตัวอักษรอื่นๆ จนถึง Z ได้ที่นี่
    ];

    function renderPage() {
        const data = alphabetData[currentIndex];
        document.getElementById('currentLetter').innerText = data.letter;
        
        // Render Words
        const wordList = document.getElementById('wordList');
        wordList.innerHTML = '';
        data.words.forEach(word => {
            const div = document.createElement('div');
            div.className = 'word-card';
            div.innerHTML = `
                <span><strong>${word.name}</strong></span>
                <div>
                    <button class="btn btn-read" onclick="speakText('${word.name}')">Read</button>
                    <button class="btn btn-phonics" onclick="speakPhonics('${word.phonics}', '${word.name}')">Phonics 🔊</button>
                </div>
            `;
            wordList.appendChild(div);
        });

        // Render Apples (ตามลำดับหน้า เช่น A=1, B=2, C=3...)
        const appleCount = currentIndex + 1;
        const appleDisplay = document.getElementById('appleDisplay');
        appleDisplay.innerHTML = '🍎'.repeat(appleCount);
        
        const sentence = `There are ${appleCount} ${appleCount > 1 ? 'apples' : 'apple'}`;
        document.getElementById('sentenceBox').innerHTML = sentence.split(' ').map(w => 
            `<span onclick="speakText('${w}'); event.stopPropagation();" style="cursor:pointer; padding:2px;">${w}</span>`
        ).join(' ');
    }

    function speakText(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        msg.pitch = 1.2; // เสียงผู้หญิงสดใส
        window.speechSynthesis.speak(msg);
    }

    // ฟังก์ชันสะกด Phonics แบบสะอาด (ไม่มีสัญลักษณ์ปน)
    async function speakPhonics(phonicsString, finalWord) {
        window.speechSynthesis.cancel(); // ล้างคิวเสียงเก่า
        const sounds = phonicsString.split(' ');
        
        for (let sound of sounds) {
            const msg = new SpeechSynthesisUtterance(sound);
            msg.lang = 'en-US';
            msg.rate = 0.6; // สะกดช้าๆ
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
            
            // รอให้เสียงจบก่อนอ่านตัวถัดไป (จังหวะพัก)
            await new Promise(resolve => setTimeout(resolve, 600));
        }

        // อ่านคำเต็มปิดท้าย
        speakText(finalWord);
    }

    function speakFullSentence() {
        const appleCount = currentIndex + 1;
        speakText(`There are ${appleCount} ${appleCount > 1 ? 'apples' : 'apple'}`);
    }

    function nextPage() {
        if (currentIndex < alphabetData.length - 1) {
            currentIndex++;
            renderPage();
        }
    }

    function prevPage() {
        if (currentIndex > 0) {
            currentIndex--;
            renderPage();
        }
    }

    // เริ่มต้นหน้าแรก
    renderPage();
</script>

</body>
</html>
