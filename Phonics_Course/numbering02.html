<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-100 Phonics Adventure - KMITL Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #ffb3c6;
            --bg-color: #fff0f3;
            --yellow: #ffd60a;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.5rem; margin: 0; }

        .app-container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            min-height: 500px;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 3px dashed var(--soft-pink);
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .number-display { font-size: 8rem; font-family: 'Fredoka One'; color: var(--primary-pink); cursor: pointer; }
        .word-display { font-size: 2.5rem; font-weight: bold; color: #555; margin: 10px 0; cursor: pointer; }
        
        .phonics-btn {
            background-color: var(--yellow);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #ccac00;
            margin-top: 10px;
        }

        .apple-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .apple { font-size: 2.5rem; cursor: pointer; transition: transform 0.2s; }
        .apple:hover { transform: scale(1.2); }

        .sentence-display {
            margin-top: 20px;
            padding: 15px;
            background: #fff5f7;
            border-radius: 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .clickable-word {
            font-size: 1.5rem;
            color: var(--primary-pink);
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: background 0.2s;
            font-weight: 600;
        }

        .clickable-word:hover {
            background: var(--soft-pink);
            color: white;
        }

        .nav-controls { margin-top: 30px; display: flex; gap: 20px; }
        .nav-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            color: white;
            cursor: pointer;
            font-family: 'Fredoka One';
        }
        .prev-btn { background-color: #ffafcc; }
        .next-btn { background-color: #fb6f92; }

        .tally-marks { font-size: 1.8rem; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Number Adventure! 🍎</h1>
        <p>คลิกที่คำศัพท์เพื่อฟังเสียงคนจริง (Premium Voice)</p>
    </div>

    <div class="app-container">
        <div class="left-panel">
            <div class="number-display" id="numDisplay" onclick="speakNum()">1</div>
            <div class="word-display" id="wordDisplay" onclick="speakNum()">ONE</div>
            <button class="phonics-btn" onclick="speakPhonics()">Phonics Sound 🔊</button>
            <div class="tally-marks" id="tallyDisplay">|</div>
        </div>

        <div class="right-panel">
            <div class="apple-container" id="appleArea" onclick="speakSentence()">
                </div>
            <div class="sentence-display" id="sentenceArea">
                </div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn prev-btn" onclick="changePage(-1)">Back</button>
        <button class="nav-btn next-btn" onclick="changePage(1)">Next</button>
    </div>

    <script>
        let currentPage = 1;
        const numberWords = [
            "", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"
            // ... (สามารถใส่ให้ครบ 100 ได้ที่นี่)
        ];

        function getPhonics(n) {
            const phonicsMap = {
                1: "/w/ - /u/ - /n/ ... ONE",
                2: "/t/ - /oo/ ... TWO",
                3: "/th/ - /r/ - /ee/ ... THREE",
                4: "/f/ - /or/ ... FOUR",
                5: "/f/ - /ai/ - /v/ ... FIVE",
                6: "/s/ - /i/ - /k/ - /s/ ... SIX",
                7: "/s/ - /e/ - /v/ - /e/ - /n/ ... SEVEN",
                8: "/ei/ - /t/ ... EIGHT",
                9: "/n/ - /ai/ - /n/ ... NINE",
                10: "/t/ - /e/ - /n/ ... TEN"
            };
            return phonicsMap[n] || "Number " + n;
        }

        function speak(text) {
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'en-US';
            uttr.rate = 0.8; // พูดช้าลงเพื่อให้เด็กฟังชัด [cite: 35]
            uttr.pitch = 1.2; // เสียงสดใสแบบครูผู้หญิง [cite: 35]
            window.speechSynthesis.speak(uttr);
        }

        function speakNum() { speak(numberWords[currentPage]); }
        function speakPhonics() { speak(getPhonics(currentPage)); }
        function speakSentence() { speak(`There are ${currentPage} ${currentPage === 1 ? 'apple' : 'apples'}.`); }

        function renderSentence(n) {
            const area = document.getElementById('sentenceArea');
            area.innerHTML = '';
            const wordCount = n === 1 ? 'one' : n;
            const appleWord = n === 1 ? 'apple' : 'apples';
            const sentence = `There are ${wordCount} ${appleWord}`.split(' ');

            sentence.forEach(word => {
                const span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = word;
                span.onclick = (e) => {
                    e.stopPropagation(); // ไม่ให้ไปเรียกเสียงรวมของประโยค
                    speak(word);
                };
                area.appendChild(span);
            });
        }

        function updateUI() {
            document.getElementById('numDisplay').innerText = currentPage;
            document.getElementById('wordDisplay').innerText = numberWords[currentPage] || "NUMBER " + currentPage;
            
            // วาด Apple
            const appleArea = document.getElementById('appleArea');
            appleArea.innerHTML = '';
            for(let i=0; i<currentPage; i++) {
                const apple = document.createElement('span');
                apple.className = 'apple';
                apple.innerText = '🍎';
                appleArea.appendChild(apple);
            }

            // วาดประโยคแยกคำ
            renderSentence(currentPage);

            // วาด Tally Marks
            let tally = "";
            for(let i=1; i<=currentPage; i++) {
                if(i % 5 === 0) tally += "卌 ";
                else if(i % 5 !== 0 && i === currentPage) {
                    for(let j=0; j < (currentPage % 5); j++) tally += "|";
                }
            }
            document.getElementById('tallyDisplay').innerText = tally;
        }

        function changePage(step) {
            currentPage += step;
            if(currentPage < 1) currentPage = 1;
            if(currentPage > 100) currentPage = 100;
            updateUI();
        }

        // เริ่มต้นหน้าแรก
        updateUI();
    </script>
</body>
</html>
