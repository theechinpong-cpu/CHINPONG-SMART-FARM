<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Number Adventure 1-100 🍎 พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FF85A2;
            --secondary-pink: #FFB3C6;
            --bg-color: #FFF0F3;
            --text-color: #4A4A4A;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary-pink); font-size: 2.2rem; margin: 0; }
        .subtitle { color: #888; font-size: 1rem; }

        .page-container {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.2);
            text-align: center;
            position: relative;
        }

        .number-arabic { 
            font-family: 'Fredoka One', cursive; 
            font-size: 8rem; 
            color: var(--primary-pink); 
            margin: 0;
            cursor: pointer;
        }

        .number-word { 
            font-weight: 700; 
            font-size: 2.5rem; 
            color: #555; 
            text-transform: uppercase; 
            margin-bottom: 20px;
            cursor: pointer;
        }

        .phonics-section { margin: 20px 0; }
        
        .phonics-btn {
            background: #FFD93D;
            border: none;
            padding: 20px 30px;
            border-radius: 20px;
            color: #665400;
            font-weight: bold;
            font-size: 1.5rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 6px 0 #E5C337;
            transition: all 0.1s;
        }
        .phonics-btn:active { transform: translateY(4px); box-shadow: none; }

        .tally {
            font-family: 'Segoe UI Symbol', sans-serif;
            font-size: 2.5rem;
            color: #FF5C8A;
            letter-spacing: 5px;
            margin-top: 30px;
            min-height: 1.2em;
            word-wrap: break-word;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
        }

        .nav-btn {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
        }

        .nav-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .progress {
            margin-top: 15px;
            color: var(--primary-pink);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍓 Number Adventure 🍎</h1>
        <p class="subtitle">พระจอมเกล้าติวเตอร์</p>
    </div>

    <div class="page-container" id="contentCard">
        <div class="number-arabic" id="displayNum" onclick="speakWord(currentNum)">1</div>
        <div class="number-word" id="displayWord" onclick="speakWord(currentNum)">ONE</div>
        
        <div class="phonics-section">
            <button class="phonics-btn" onclick="speakPhonics(currentNum)">
                🔊 <span id="displayPhonics">W - U - N</span>
            </button>
        </div>

        <div class="tally" id="displayTally">卌</div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">◀ Back</button>
        <div class="progress"><span id="currentPage">1</span> / 100</div>
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">Next ▶</button>
    </div>

    <script>
        let currentNum = 1;

        const phonicsData = {
            1: "W - U - N", 2: "T - OO", 3: "TH - R - EE", 4: "F - OR", 5: "F - I - V",
            6: "S - I - KS", 7: "S - E - V - E - N", 8: "AE - T", 9: "N - IE - N", 10: "T - E - N"
        };

        function numberToWords(n) {
            const ones = ["ZERO", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
            const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
            if (n < 20) return ones[n];
            if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 !== 0 ? " " + ones[n % 10] : "");
            return "ONE HUNDRED";
        }

        function generateTally(n) {
            let result = "";
            let fullGroups = Math.floor(n / 5);
            let remainder = n % 5;
            for(let i=0; i<fullGroups; i++) result += "卌 ";
            const marks = ["", "I", "II", "III", "IIII"];
            return result + marks[remainder];
        }

        function updatePage() {
            document.getElementById('displayNum').innerText = currentNum;
            const word = numberToWords(currentNum);
            document.getElementById('displayWord').innerText = word;
            document.getElementById('displayPhonics').innerText = phonicsData[currentNum] || word.split('').join(' - ');
            document.getElementById('displayTally').innerText = generateTally(currentNum);
            document.getElementById('currentPage').innerText = currentNum;

            // ควบคุมปุ่ม
            document.getElementById('prevBtn').disabled = (currentNum === 1);
            document.getElementById('nextBtn').disabled = (currentNum === 100);
        }

        function changePage(step) {
            currentNum += step;
            if (currentNum < 1) currentNum = 1;
            if (currentNum > 100) currentNum = 100;
            updatePage();
        }

        function speakWord(n) {
            const word = numberToWords(n);
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'en-US';
            msg.rate = 0.8; 
            msg.pitch = 1.2;
            window.speechSynthesis.cancel(); // หยุดเสียงเก่าก่อน
            window.speechSynthesis.speak(msg);
        }

        function speakPhonics(n) {
            const word = numberToWords(n);
            let spelling = phonicsData[n] || word.split('').join(' - ');
            const msg = new SpeechSynthesisUtterance(`${spelling} ... ${word}`);
            msg.lang = 'en-US';
            msg.rate = 0.6;
            msg.pitch = 1.3;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        // เริ่มต้นหน้าแรก
        updatePage();

        // อุ่นเครื่องระบบเสียง
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
