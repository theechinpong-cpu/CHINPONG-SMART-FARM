<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - บทสนทนาโต้ตอบ 16 ประโยค</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --namhom-color: #ff6f00; --guest-color: #00796b; }
        body { font-family: 'Kanit', sans-serif; background-color: #f5f5f5; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        .author { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 25px; }
        
        .chat-container { display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 15px; border-radius: 15px; position: relative; cursor: pointer; transition: 0.3s; max-width: 80%; }
        .bubble:hover { transform: scale(1.02); }
        
        /* สไตล์ของน้องน้ำหอม (ขวา) */
        .namhom { align-self: flex-end; background-color: #fff3e0; border: 2px solid var(--namhom-color); border-bottom-right-radius: 2px; }
        .namhom .role { color: var(--namhom-color); font-weight: bold; }
        
        /* สไตล์ของแขก (ซ้าย) */
        .guest { align-self: flex-start; background-color: #e0f2f1; border: 2px solid var(--guest-color); border-bottom-left-radius: 2px; }
        .guest .role { color: var(--guest-color); font-weight: bold; }

        .en { font-family: 'Poppins', sans-serif; display: block; font-size: 1.1em; margin: 5px 0; }
        .th { font-size: 0.9em; color: #555; }
        .play-hint { font-size: 0.7em; color: #999; text-align: right; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>ติวเตอร์พระจอมเกล้า: สนทนาโต้ตอบรีสอร์ท</h1>
    <p class="author">เขียนโดย CHINPONG SMART FARM</p>

    <div class="chat-container" id="chat">
        </div>
</div>

<script>
    const dialogue = [
        {role: "Guest", en: "Excuse me, I am looking for the restaurant. Is it open?", th: "ขอโทษครับ ผมกำลังมองหาห้องอาหาร ไม่ทราบว่าเปิดหรือยังครับ?"},
        {role: "Namhom", en: "Yes, it is! Good morning. Welcome to our resort.", th: "เปิดแล้วค่ะ! สวัสดีตอนเช้า ยินดีต้อนรับสู่รีสอร์ทของเรานะคะ"},
        {role: "Guest", en: "Great! Can I have a table for two people near the garden?", th: "เยี่ยมเลย ขอโต๊ะสำหรับ 2 ท่านตรงใกล้ๆ สวนได้ไหมครับ?"},
        {role: "Namhom", en: "Certainly. This way, please. Follow me.", th: "ได้แน่นอนค่ะ เชิญทางนี้เลยค่ะ เดินตามหนูมานะคะ"},
        {role: "Guest", en: "Thank you. What is the most popular dish here?", th: "ขอบคุณครับ เมนูไหนที่ฮิตที่สุดของที่นี่เหรอครับ?"},
        {role: "Namhom", en: "I highly recommend Pad Thai. It is very delicious!", th: "หนูขอแนะนำผัดไทยค่ะ อร่อยมากๆ เลย!"},
        {role: "Guest", en: "That sounds good. I will take one Pad Thai, please.", th: "ฟังดูดีนะ งั้นเอาผัดไทยที่หนึ่งครับ"},
        {role: "Namhom", en: "Would you like it spicy or not spicy?", th: "คุณลูกค้าอยากได้แบบเผ็ดหรือว่าไม่เผ็ดดีคะ?"},
        {role: "Guest", en: "Not spicy, please. I don't like chili.", th: "ขอแบบไม่เผ็ดครับ ผมไม่ชอบพริก"},
        {role: "Namhom", en: "Got it! And what would you like to drink?", th: "รับทราบค่ะ! แล้วคุณลูกค้าจะรับเครื่องดื่มอะไรดีคะ?"},
        {role: "Guest", en: "Just a bottle of water and some ice, please.", th: "ขอน้ำเปล่าหนึ่งขวดกับน้ำแข็งด้วยครับ"},
        {role: "Namhom", en: "Okay. Please wait for a moment. I will bring your food.", th: "ตกลงค่ะ กรุณารอสักครู่นะคะ เดี๋ยวหนูจะนำอาหารมาเสิร์ฟค่ะ"},
        {role: "Guest", en: "Everything looks great. Can I have the bill now?", th: "ทุกอย่างดูดีมากเลยครับ ขอเก็บเงินเลยได้ไหม?"},
        {role: "Namhom", en: "Yes. The total is two hundred Baht, please.", th: "ได้ค่ะ ยอดรวมทั้งหมดคือสองร้อยบาทค่ะ"},
        {role: "Guest", en: "Here is the money. Keep the change!", th: "นี่ครับเงิน ไม่ต้องทอนนะ (ทิป)"},
        {role: "Namhom", en: "Thank you so much! Have a wonderful day!", th: "ขอบพระคุณมากค่ะ! ขอให้เป็นวันที่แสนวิเศษนะคะ!"}
    ];

    const chatBox = document.getElementById('chat');

    dialogue.forEach(item => {
        const div = document.createElement('div');
        div.className = `bubble ${item.role.toLowerCase()}`;
        div.onclick = () => speak(item.en);
        div.innerHTML = `
            <span class="role">${item.role}:</span>
            <span class="en">${item.en}</span>
            <span class="th">${item.th}</span>
            <span class="play-hint">🔊 คลิกเพื่อฟัง</span>
        `;
        chatBox.appendChild(div);
    });

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
