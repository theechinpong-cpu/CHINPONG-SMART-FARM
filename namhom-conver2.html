<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - ฝึกภาษาอังกฤษ 16 ประโยคทอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --main-gold: #c5a059; --dark-blue: #1a237e; --soft-bg: #fdfdfd; }
        body { font-family: 'Kanit', sans-serif; background-color: #f1f2f6; margin: 0; padding: 20px; }
        .app-container { max-width: 900px; margin: auto; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--dark-blue); color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.8em; }
        .author-tag { font-size: 0.8em; color: #ccc; margin-top: 5px; }
        
        .dialogue-list { padding: 20px; }
        .sentence-card { 
            display: flex; align-items: center; background: var(--soft-bg); 
            margin-bottom: 12px; padding: 15px; border-radius: 15px; 
            border-left: 6px solid var(--main-gold); cursor: pointer; transition: 0.2s;
        }
        .sentence-card:hover { transform: translateX(10px); background: #fff8e1; }
        .num-circle { width: 30px; height: 30px; background: var(--main-gold); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; flex-shrink: 0; }
        .text-content { flex-grow: 1; }
        .en { font-family: 'Poppins', sans-serif; font-weight: 600; color: #2c3e50; font-size: 1.05em; display: block; }
        .th { color: #7f8c8d; font-size: 0.9em; }
        .play-btn { color: var(--main-gold); font-size: 1.4em; margin-left: 10px; }

        .tips { background: #e8f5e9; padding: 15px; margin: 20px; border-radius: 10px; border: 1px solid #c8e6c9; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>พระจอมเกล้าติวเตอร์ - ฝึกภาษาอังกฤษ 16 ประโยคทอง</h1>
        <div class="author-tag">เขียนโดย CHINPONG SMART FARM</div>
    </div>

    <div class="tips">
        📌 <b>น้องน้ำหอม:</b> กดที่ประโยคเพื่อฟังเสียงสำเนียง AI ฝึกพูดตามวันละ 3 รอบนะจ๊ะ!
    </div>

    <div class="dialogue-list" id="list">
        </div>
</div>

<script>
    const sentences = [
        {en: "Good morning! Welcome to our resort restaurant.", th: "สวัสดีตอนเช้าค่ะ ยินดีต้อนรับสู่ห้องอาหารของรีสอร์ทเรานะคะ"},
        {en: "How many people are there in your group?", th: "มากี่ท่านคะ?"},
        {en: "This way, please. Here is your table near the garden.", th: "เชิญทางนี้ค่ะ นี่คือโต๊ะของคุณที่อยู่ใกล้สวนนะคะ"},
        {en: "Would you like to see the menu?", th: "คุณต้องการดูเมนูอาหารไหมคะ?"},
        {en: "I highly recommend our Pad Thai and Tom Yum Goong.", th: "หนูขอแนะนำผัดไทยและต้มยำกุ้งค่ะ"},
        {en: "Do you like it spicy or not spicy?", th: "คุณชอบรสเผ็ดหรือแบบไม่เผ็ดคะ?"},
        {en: "Are you allergic to any food or peanuts?", th: "คุณแพ้อาหารชนิดไหนหรือแพ้ถั่วไหมคะ?"},
        {en: "What would you like to drink?", th: "คุณต้องการรับเครื่องดื่มอะไรดีคะ?"},
        {en: "A bottle of water and a glass of orange juice, please.", th: "ขอน้ำเปล่าหนึ่งขวดและน้ำส้มหนึ่งแก้วครับ (แขกตอบ)"},
        {en: "Certainly. Please wait for ten minutes.", th: "ได้เลยค่ะ กรุณารอสักสิบนาทีนะคะ"},
        {en: "Here is your food. Enjoy your meal!", th: "อาหารมาแล้วค่ะ ขอให้ทานให้อร่อยนะคะ!"},
        {en: "Would you like some dessert like Mango Sticky Rice?", th: "รับของหวานอย่างข้าวเหนียวมะม่วงเพิ่มไหมคะ?"},
        {en: "Excuse me, can I have the bill, please?", th: "ขอโทษครับ ขอเก็บเงินหน่อยครับ (แขกพูด)"},
        {en: "Yes. The total is 350 Baht, please.", th: "ได้ค่ะ ยอดรวมทั้งหมดคือ 350 บาทค่ะ"},
        {en: "Thank you for coming to our restaurant.", th: "ขอบคุณที่มาใช้บริการห้องอาหารของเราค่ะ"},
        {en: "Have a nice day and enjoy your stay!", th: "ขอให้เป็นวันที่ดีและมีความสุขกับการพักผ่อนนะคะ!"}
    ];

    const listDiv = document.getElementById('list');

    sentences.forEach((s, index) => {
        const card = document.createElement('div');
        card.className = 'sentence-card';
        card.onclick = () => speak(s.en);
        card.innerHTML = `
            <div class="num-circle">${index + 1}</div>
            <div class="text-content">
                <span class="en">${s.en}</span>
                <span class="th">${s.th}</span>
            </div>
            <div class="play-btn">🔊</div>
        `;
        listDiv.appendChild(card);
    });

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
