<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Sarabun:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00cec9; --s: #6c5ce7; --bg: #f5f6fa; }
        body { font-family: 'Lexend', 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--s); font-size: 2.5em; }
        .author { text-align: center; color: #636e72; margin-bottom: 20px; }
        
        .vocab-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #eee; font-size: 1.1em; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; max-height: 500px; overflow-y: auto; padding: 15px; border: 2px solid #f1f2f6; border-radius: 15px; background: #fafafa; }
        .card { background: white; border: 1px solid #eee; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 0.9em; font-weight: bold; color: #2d3436; }
        .card:hover { background: var(--s); color: white; transform: scale(1.05); }
        
        .scholar-zone { margin-top: 40px; padding: 30px; background: #eef2f3; border-radius: 20px; text-align: center; border: 2px solid var(--p); }
        .big-word { font-size: 3.5em; color: var(--s); font-weight: bold; margin: 15px 0; min-height: 1.1em; letter-spacing: 2px; }
        .typing-input { width: 300px; padding: 12px; border-radius: 8px; border: 2px solid #ccc; font-size: 1.2em; text-align: center; margin-bottom: 10px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn-blue { background: var(--s); color: white; }
        .btn-green { background: var(--p); color: white; }

<body>

<div class="container">
    <h1>🎓 Scholar Vocabulary (1001 - 1500)</h1>
    <p class="author">โดย พระจอมเกล้าติวเตอร์ | ยกระดับความรู้โดย CHINPONG SMART FARM</p>

    <div class="vocab-controls">
        <input type="text" class="search-input" id="search" placeholder="🔍 ค้นหาศัพท์แสงทางวิชาการ..." onkeyup="filter()">
    </div>

    <div class="grid" id="grid">
        </div>

    <div class="scholar-zone">
        <h2>🔬 Scholar Challenge</h2>
        <p>ฝึกสะกดคำศัพท์ยากๆ ให้แม่นยำ (พิมพ์ตามคำที่สุ่มได้)</p>
        <div class="big-word" id="target">CHALLENGE</div>
        <input type="text" id="typer" class="typing-input" placeholder="Type here..." onkeyup="checkType()">
        <br>
        <button class="btn btn-blue" onclick="randomWord()">Next Word</button>
        <button class="btn btn-green" onclick="speak()">🔊 Listen</button>
        <div id="msg" style="margin-top:10px; font-weight:bold; font-size:1.2em;"></div>

    ];

    const grid = document.getElementById('grid');
    const target = document.getElementById('target');
    const typer = document.getElementById('typer');
    const msg = document.getElementById('msg');
    let current = "";

    function init() {
        scholarWords.sort().forEach(w => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = w;
            div.onclick = () => { current = w; target.innerText = w; speak(); };
            grid.appendChild(div);
        });
        randomWord();
    }

    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function randomWord() {
        current = scholarWords[Math.floor(Math.random() * scholarWords.length)];
        target.innerText = current;
        typer.value = "";
        msg.innerText = "";
        typer.focus();
    }

    function checkType() {
        if(typer.value.toLowerCase() === current.toLowerCase()) {
            msg.innerText = "✨ Excellent Spell! ✨";
            msg.style.color = "#00b894";
            setTimeout(randomWord, 1000);
        } else {
            msg.innerText = "Keep typing...";
            msg.style.color = "#636e72";
        }
    }

    function speak() {
        const u = new SpeechSynthesisUtterance(current);
        u.lang = 'en-US';
        u.rate = 0.8;
        synth.speak(u);
    }

    init();
