<script>

    { q: "ปัญหาการซื้อสิทธิขายเสียงจัดเป็นปัญหาในด้านใดของวัฒนธรรมการเมืองไทย?", o: ["ปัญหาโครงสร้างกฎหมาย", "ปัญหาจิตสำนึกความเป็นพลเมือง", "ปัญหาเศรษฐกิจตกต่ำ", "ปัญหาความมั่นคง"], c: 1, cat: "ปัญหาการเมืองไทย", exp: "การซื้อสิทธิขายเสียงสะท้อนว่าพลเมืองยังไม่เข้าใจคุณค่าของอำนาจอธิปไตยของตนเอง" },

    { q: "ประเทศไทยใช้ระบบการปกครองแบบรัฐสภาตามแบบอย่างประเทศใด?", o: ["สหรัฐอเมริกา", "ฝรั่งเศส", "สหราชอาณาจักร", "รัสเซีย"], c: 2, cat: "ระบอบการปกครอง", exp: "ไทยใช้ระบบ Westminister ตามแบบอังกฤษที่พระมหากษัตริย์ทรงเป็นประมุขใต้รัฐธรรมนูญ" },

    { q: "องค์กรใดมีหน้าที่วินิจฉัยว่ากฎหมายขัดต่อรัฐธรรมนูญหรือไม่?", o: ["ศาลยุติธรรม", "ศาลรัฐธรรมนูญ", "ศาลปกครอง", "ศาลทหาร"], c: 1, cat: "องค์กรอิสระ", exp: "ศาลรัฐธรรมนูญมีอำนาจหน้าที่ตรวจสอบความชอบด้วยรัฐธรรมนูญของกฎหมาย" },

    { q: "สหประชาชาติ (UN) ก่อตั้งขึ้นหลังเหตุการณ์ใด?", o: ["สงครามเย็น", "สงครามโลกครั้งที่ 1", "สงครามโลกครั้งที่ 2", "วิกฤตเศรษฐกิจตกต่ำ"], c: 2, cat: "ความสัมพันธ์ระหว่างประเทศ", exp: "UN ก่อตั้งเพื่อรักษาความสงบเรียบร้อยและสันติภาพโลกหลังสงครามโลกครั้งที่ 2" },
    { q: "หลัก 'ภราดรภาพ' ในอุดมการณ์ประชาธิปไตยหมายถึงอะไร?", o: ["ความอิสระ", "ความเท่าเทียม", "ความรักใคร่ฉันพี่น้องและสามัคคี", "ความเคารพผู้อาวุโส"], c: 2, cat: "หลักการปกครอง", exp: "ภราดรภาพคือความเป็นพี่น้องกัน (Fraternity) เพื่อสร้างสันติสุขในสังคม" },

    { q: "การคานอำนาจระหว่างฝ่ายบริหารและฝ่ายนิติบัญญัติในระบบรัฐสภาเรียกว่า?", o: ["การรัฐประหาร", "การยุบสภาและการอภิปรายไม่ไว้วางใจ", "การแต่งตั้งโยกย้าย", "การเลือกตั้งใหม่"], c: 1, cat: "ระบอบการปกครอง", exp: "สภาอภิปรายฯ รัฐบาลได้ และรัฐบาลสามารถยุบสภาเพื่อให้ประชาชนตัดสินใจใหม่ได้" },

function buildQuiz() {
    const container = document.getElementById('quiz-container');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `
            <div class="q-text">${i + 1}. ${q.q}</div>
            ${q.o.map((opt, oi) => `
                <label class="opt-btn">
                    <input type="radio" name="q${i}" onclick="checkAnswer(${i}, ${oi})"> ${opt}
                </label>
            `).join('')}
            <div id="fb-${i}" class="feedback"></div>
        `;
        container.appendChild(div);
    });
}

let score = 0;
let answered = 0;
let stats = {};

function checkAnswer(qi, si) {
    const q = questions[qi];
    const fb = document.getElementById(`fb-${qi}`);
    const radios = document.getElementsByName(`q${qi}`);
    for (let r of radios) r.disabled = true;

    fb.style.display = 'block';
    if (si === q.c) {
        fb.className = 'feedback correct';
        fb.innerHTML = `<strong>ถูกต้อง! ✅</strong><br><small>${q.exp}</small>`;
        score++;
        stats[q.cat] = (stats[q.cat] || 0) + 1;
    } else {
        fb.className = 'feedback incorrect';
        fb.innerHTML = `<strong>ผิด! ❌ (คำตอบคือ: ${q.o[q.c]})</strong><br><small>${q.exp}</small>`;
    }
    answered++;
}

function showResults() {
    if (answered < 50) { alert("กรุณาทำข้อสอบให้ครบ 50 ข้อก่อนครับ!"); return; }
    document.getElementById('score-val').innerText = score;
    const analysis = document.getElementById('analysis-text');
    analysis.innerHTML = "<h3>📊 การวิเคราะห์รายหัวข้อ:</h3>";
    
    const cats = [...new Set(questions.map(q => q.cat))];
    cats.forEach(c => {
        const total = questions.filter(q => q.cat === c).length;
        const s = stats[c] || 0;
        const p = Math.round((s / total) * 100);
        analysis.innerHTML += `<p><strong>${c}:</strong> ได้ ${s}/${total} (${p}%) - ${p < 60 ? '⚠️ ควรทบทวนเพิ่ม' : '✅ เยี่ยมมาก'}</p>`;
    });

    document.getElementById('summary').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}

window.onload = buildQuiz;
