<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - Grammar Exam P.1-P.3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Sarabun:wght@400;700&display=swap');
        :root { --primary: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; width: 100%; max-width: 800px; }
        .brand { color: var(--primary); font-size: 0.9rem; letter-spacing: 2px; font-weight: bold; }
        
        .exam-container { max-width: 800px; width: 100%; height: 600px; overflow-y: auto; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); scrollbar-width: thin; scrollbar-color: var(--primary) transparent; }
        
        .question-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 4px solid var(--primary); }
        .options { display: grid; gap: 10px; margin-top: 15px; }
        .option-btn { background: #334155; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s; }
        .option-btn:hover { background: #475569; }
        
        .feedback { margin-top: 10px; padding: 10px; border-radius: 5px; display: none; font-size: 0.9rem; line-height: 1.5; }
        .correct { background: #065f46; border: 1px solid #10b981; display: block; }
        .wrong { background: #7f1d1d; border: 1px solid #f87171; display: block; }

        .score-board { display: none; text-align: center; padding: 40px; background: #1e293b; border-radius: 15px; border: 2px solid var(--primary); margin-top: 20px; width: 100%; max-width: 800px; }
        .score-num { font-size: 3rem; color: var(--primary); font-weight: bold; }
        .btn-submit { background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">WRITTEN BY CHINPONG SMART FARM</div>
    <h1>👨‍🏫 พระจอมเกล้าติวเตอร์: Grammar Challenge (P.1-P.3)</h1>
    <p>คัดแนวข้อสอบจริง 50 ข้อ (รวม EP/Gifted)</p>
</div>

<div class="exam-container" id="exam-box">
    </div>

<button class="btn-submit" id="submit-btn" onclick="finishExam()">สรุปคะแนนและวิเคราะห์จุดอ่อน ✅</button>

<div class="score-board" id="score-board">
    <h2>Mission Complete!</h2>
    <div class="score-num" id="total-score">0 / 50</div>
    <div id="analysis"></div>
    <button class="btn-submit" onclick="location.reload()">ทำใหม่อีกครั้ง</button>
</div>

<script>
    const questions = [
        { q: "1. These ______ my books.", a: ["is", "am", "are"], c: 2, exp: "These เป็นพหูพจน์ ใช้คู่กับ are" },
        { q: "2. I ______ a student.", a: ["is", "am", "are"], c: 1, exp: "ประธาน I ต้องใช้คู่กับ am เสมอ" },
        { q: "3. She ______ an orange every morning.", a: ["eat", "eats", "eating"], c: 1, exp: "She เป็นเอกพจน์ กริยาช่อง 1 ต้องเติม -s" },
        { q: "4. A cat has four ______.", a: ["foot", "foots", "feet"], c: 2, exp: "feet เป็นรูปพหูพจน์ของ foot (ไม่เติม s แต่เปลี่ยนรูป)" },
        { q: "5. ______ is a ruler in my bag.", a: ["There", "This", "They"], c: 0, exp: "There is/are แปลว่า 'มี' ใช้บอกการมีอยู่" },
        { q: "6. Do you like ______ apple?", a: ["a", "an", "the"], c: 1, exp: "apple ขึ้นต้นด้วยสระ (a) ใช้ an" },
        { q: "7. ______ are you? - I am seven years old.", a: ["What", "How old", "How many"], c: 1, exp: "ถามอายุใช้ How old" },
        { q: "8. This is ______ university.", a: ["a", "an", "the"], c: 0, exp: "university ออกเสียง 'ยู' เป็นเสียงพยัญชนะ จึงใช้ a (ข้อยกเว้นยอดฮิต!)" },
        { q: "9. We ______ to school by bus.", a: ["go", "goes", "going"], c: 0, exp: "We เป็นพหูพจน์ กริยาไม่ต้องเติม -s" },
        { q: "10. There are five ______ on the table.", a: ["box", "boxs", "boxes"], c: 2, exp: "คำลงท้ายด้วย -x เมื่อเป็นพหูพจน์ให้เติม -es" },
        { q: "11. ______ color is it? - It is red.", a: ["Who", "What", "Where"], c: 1, exp: "ถามสิ่งของหรือสีใช้ What" },
        { q: "12. Look! The bird ______ in the sky.", a: ["fly", "is flying", "flies"], c: 1, exp: "มีคำว่า Look! แสดงว่ากำลังเกิดขึ้น ใช้ Present Continuous (is + v.ing)" },
        { q: "13. I have ______ umbrella.", a: ["a", "an", "some"], c: 1, exp: "umbrella ขึ้นต้นด้วยเสียงสระ ใช้ an" },
        { q: "14. My father ______ a car.", a: ["drive", "drives", "driving"], c: 1, exp: "Father เป็นเอกพจน์ กริยาเติม -s" },
        { q: "15. The cat is ______ the chair.", a: ["in", "on", "at"], c: 1, exp: "แมวนั่ง 'บน' เก้าอี้ใช้ on" },
        { q: "16. They ______ football now.", a: ["play", "plays", "are playing"], c: 2, exp: "now บอกปัจจุบันที่กำลังทำ ใช้ are + playing" },
        { q: "17. ______ do you live? - In Bangkok.", a: ["What", "Who", "Where"], c: 2, exp: "ถามสถานที่ใช้ Where" },
        { q: "18. Mary ______ her teeth every day.", a: ["brush", "brushes", "brushing"], c: 1, exp: "Mary เป็นเอกพจน์ brush ลงท้ายด้วย -sh เติม -es" },
        { q: "19. ______ many pens are there?", a: ["How", "Who", "What"], c: 0, exp: "How many ใช้ถามจำนวน" },
        { q: "20. This is my dog. ______ name is Lucky.", a: ["It", "Its", "It's"], c: 1, exp: "Its (ไม่มี ') คือคำแสดงความเป็นเจ้าของ 'ของมัน'" },
        { q: "21. A ______ is a small animal.", a: ["mouse", "mice", "mouses"], c: 0, exp: "A บอกว่าเป็นเอกพจน์ ใช้ mouse" },
        { q: "22. Can you ______ English?", a: ["speak", "speaks", "speaking"], c: 0, exp: "หลัง Can ต้องตามด้วยกริยาไม่เติมอะไรเลย (Infinitive)" },
        { q: "23. ______ is she? - She is my sister.", a: ["What", "Who", "Where"], c: 1, exp: "ถามบุคคลใช้ Who" },
        { q: "24. Please ______ the door.", a: ["open", "opens", "opening"], c: 0, exp: "ประโยคคำสั่ง/ขอร้อง ใช้กริยาตั้งต้น" },
        { q: "25. My birthday is ______ August.", a: ["in", "on", "at"], c: 0, exp: "เดือนใช้บุพบท in" },
        { q: "26. I ______ like coffee.", a: ["not", "doesn't", "don't"], c: 2, exp: "I ใช้คู่กับ do not (don't)" },
        { q: "27. Does he ______ a cat?", a: ["have", "has", "having"], c: 0, exp: "มี Does มาช่วยแล้ว กริยาต้องกลับเป็น have (ร่างเดิม)" },
        { q: "28. That is ______ elephant.", a: ["a", "an", "the"], c: 1, exp: "elephant ขึ้นต้นด้วยสระ ใช้ an" },
        { q: "29. Those ______ trees are tall.", a: ["is", "am", "are"], c: 2, exp: "Those เป็นพหูพจน์ ใช้ are" },
        { q: "30. ______ names are Somchai and Somsri.", a: ["Their", "They", "Them"], c: 0, exp: "ใช้ Their เพื่อบอกความเป็นเจ้าของ 'ชื่อของพวกเขา'" },
        { q: "31. An ______ is in the kitchen.", a: ["apple", "banana", "egg"], c: 2, exp: "An ใช้หน้าสระ egg ขึ้นต้นด้วย e (apple ก็ได้แต่ในข้อสอบจริงมักสับขาหลอก ดูความหมายประกอบ)" },
        { q: "32. Two ______ are in the room.", a: ["man", "mans", "men"], c: 2, exp: "man พหูพจน์คือ men" },
        { q: "33. ______ I borrow your pen?", a: ["Can", "Do", "Is"], c: 0, exp: "Can ใช้ขออนุญาตหรือถามความสามารถ" },
        { q: "34. The sun ______ in the morning.", a: ["rise", "rises", "rising"], c: 1, exp: "ความจริงตามธรรมชาติ Sun เป็นเอกพจน์ เติม s" },
        { q: "35. You ______ very tall.", a: ["is", "am", "are"], c: 2, exp: "You ใช้คู่กับ are เสมอ" },
        { q: "36. ______ is my father. He is a doctor.", a: ["He", "She", "It"], c: 0, exp: "Father เป็นผู้ชายใช้ He" },
        { q: "37. He ______ milk every day.", a: ["drink", "drinks", "drinking"], c: 1, exp: "Present Simple: He เป็นเอกพจน์ เติม s" },
        { q: "38. There are some ______ on the desk.", a: ["knife", "knifes", "knives"], c: 2, exp: "คำลงท้ายด้วย -fe เปลี่ยนเป็น -ves" },
        { q: "39. Is this your pen? - Yes, it ______.", a: ["is", "am", "are"], c: 0, exp: "ถาม Is ตอบ is" },
        { q: "40. We ______ happy today.", a: ["is", "am", "are"], c: 2, exp: "We ใช้ are" },
        { q: "41. Tom ______ TV every night.", a: ["watch", "watches", "watching"], c: 1, exp: "watch ลงท้ายด้วย -ch เติม -es" },
        { q: "42. ______ is the ball? - It is under the table.", a: ["What", "Where", "Who"], c: 1, exp: "คำตอบเป็นสถานที่ ใช้ Where" },
        { q: "43. Are there ______ students in the room?", a: ["any", "some", "a"], c: 0, exp: "ประโยคคำถามใช้ any" },
        { q: "44. She ______ sing very well.", a: ["can", "is", "does"], c: 0, exp: "บอกความสามารถใช้ can" },
        { q: "45. Don't ______ in the classroom.", a: ["run", "runs", "running"], c: 0, exp: "หลัง Don't ใช้กริยาไม่เติมอะไรเลย" },
        { q: "46. That is ______ old car.", a: ["a", "an", "some"], c: 1, exp: "old ขึ้นต้นด้วยเสียงสระ ใช้ an" },
        { q: "47. ______ you have a sister?", a: ["Do", "Does", "Are"], c: 0, exp: "You ใช้ Do ในประโยคคำถาม" },
        { q: "48. These are ______.", a: ["child", "childs", "children"], c: 2, exp: "child พหูพจน์คือ children" },
        { q: "49. It is ______ hot today.", a: ["a", "very", "an"], c: 1, exp: "very ใช้ขยาย Adjective (hot)" },
        { q: "50. Good ______! See you tomorrow.", a: ["morning", "bye", "afternoon"], c: 1, exp: "See you tomorrow คือการบอกลา ใช้ Goodbye" }
    ];

    let userScore = 0;
    const examBox = document.getElementById('exam-box');

    questions.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
            <div><strong>${item.q}</strong></div>
            <div class="options" id="opt-${index}">
                ${item.a.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${index}, ${i})">${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="feed-${index}"></div>
        `;
        examBox.appendChild(card);
    });

    function checkAnswer(qIdx, aIdx) {
        const feed = document.getElementById(`feed-${qIdx}`);
        const opts = document.getElementById(`opt-${qIdx}`).querySelectorAll('.option-btn');
        
        // Disable other buttons
        opts.forEach(btn => btn.disabled = true);

        if (aIdx === questions[qIdx].c) {
            userScore++;
            feed.innerText = "ถูกต้อง! ✅ " + questions[qIdx].exp;
            feed.className = "feedback correct";
        } else {
            feed.innerText = "ผิดนะ! ❌ เฉลยคือ: " + questions[qIdx].a[questions[qIdx].c] + " (" + questions[qIdx].exp + ")";
            feed.className = "feedback wrong";
        }
    }

    function finishExam() {
        document.getElementById('exam-box').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('score-board').style.display = 'block';
        document.getElementById('total-score').innerText = userScore + " / 50";
        
        let analysisText = "";
        if(userScore >= 45) analysisText = "ยอดเยี่ยมมาก! น้องมีความรู้ Grammar ระดับ EP/Gifted ที่แข็งแกร่งมากครับ";
        else if(userScore >= 35) analysisText = "เก่งมาก! พื้นฐานดีแล้ว แต่ลองทบทวนเรื่องการเติม s/es และการใช้ a/an เพิ่มเติมนะครับ";
        else analysisText = "พยายามต่อไปนะ! แนะนำให้กลับไปทวนเรื่อง Verb to Be และการใช้ประธานคู่กับกริยาครับ";
        
        document.getElementById('analysis').innerText = analysisText;
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
