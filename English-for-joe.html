<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery P.5 - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0984e3; --s: #fdcb6e; --ok: #00b894; --no: #d63031; --bg: #f5f6fa; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #2d3436; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--p); padding-bottom: 15px; margin-bottom: 25px; }
        .q-box { border: 1px solid #dfe6e9; padding: 20px; border-radius: 12px; margin-bottom: 20px; background: #fff; transition: 0.3s; }
        .q-box:hover { border-color: var(--p); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: 2px solid #ecf0f1; border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 15px; }
        .btn:hover:not(:disabled) { background: #f0f7ff; border-color: var(--p); }
        .correct { background: var(--ok) !important; color: white; border-color: #55efc4; }
        .wrong { background: var(--no) !important; color: white; border-color: #fab1a0; }
        .exp { display: none; margin-top: 15px; padding: 12px; background: #fff9c4; border-radius: 8px; font-size: 14px; border-left: 4px solid #f1c40f; }
        #summary { display: none; text-align: center; background: var(--p); color: white; padding: 30px; border-radius: 15px; margin-top: 20px; }
        .nav-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #2d3436; color: white; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p style="color: #636e72; font-weight: bold;">เขียนโดย CHINPONG SMART FARM</p>
        <h1>🏆 คลังข้อสอบคุณภาพ 50 ข้อ (ป.5)</h1>
        <p>โดย <b>พระจอมเกล้าติวเตอร์</b></p>
    </div>

    <div id="quiz-root"></div>

    <button class="nav-btn" onclick="showResults()">ส่งคำตอบและวิเคราะห์ผล</button>

    <div id="summary">
        <h2 id="final-score"></h2>
        <div id="analysis" style="text-align: left; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;"></div>
        <button onclick="location.reload()" style="margin-top:20px; background:white; color:var(--p); border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">ทำใหม่อีกครั้ง</button>
    </div>
</div>

<script>
const data = [
    { q: "A: ________ is your house? B: It's on Sukhumvit Road.", o: ["Who", "Where", "When", "What"], a: "Where", e: "ใช้ Where ถามสถานที่ เพราะคำตอบระบุชื่อถนนครับ" },
    { q: "My brother ________ breakfast at 7 o'clock every day.", o: ["eat", "eats", "eating", "is eat"], a: "eats", e: "Present Simple: ประธานเอกพจน์ (My brother) กริยาต้องเติม s" },
    { q: "A: What is she doing? B: She ________ a book.", o: ["is reading", "reads", "read", "reading"], a: "is reading", e: "คำถามใช้ is doing (กำลังทำ) คำตอบต้องใช้ is reading" },
    { q: "I ________ to the zoo with my family last weekend.", o: ["go", "goes", "went", "going"], a: "went", e: "last weekend เป็นอดีต กริยาต้องเป็นช่อง 2 (went)" },
    { q: "An elephant is ________ than a tiger.", o: ["big", "bigger", "biggest", "the biggest"], a: "bigger", e: "มีคำว่า than แสดงการเปรียบเทียบขั้นกว่า ใช้ bigger" },
    { q: "This is the ________ mountain in Thailand.", o: ["high", "higher", "highest", "more high"], a: "highest", e: "มี the นำหน้า เป็นขั้นสุด ใช้ highest" },
    { q: "I don't have ________ money in my pocket.", o: ["some", "any", "a", "an"], a: "any", e: "ประโยคปฏิเสธ (don't have) ต้องใช้ any" },
    { q: "A: Can you swim? B: ________", o: ["Yes, I do.", "Yes, I can.", "No, I am not.", "No, I don't."], a: "Yes, I can.", e: "ถาม Can ต้องตอบด้วย Can ครับ" },
    { q: "A ________ works in a police station.", o: ["policeman", "doctor", "chef", "nurse"], a: "policeman", e: "ตำรวจทำงานที่สถานีตำรวจ" },
    { q: "He ________ to school by bus every morning.", o: ["go", "goes", "going", "gone"], a: "goes", e: "กิจวัตรประจำวันของเขา (He) กริยาเติม es" },
    { q: "Look! The cat ________ a tree.", o: ["climb", "climbs", "is climbing", "climbed"], a: "is climbing", e: "มีคำว่า Look! แสดงว่าเหตการณ์กำลังเกิดตอนนี้" },
    { q: "My mother is a ________. She cooks in a restaurant.", o: ["nurse", "chef", "pilot", "dentist"], a: "chef", e: "คนทำอาหารในร้านอาหารคือเชฟ" },
    { q: "How ________ is this T-shirt? It's 200 baht.", o: ["many", "much", "far", "old"], a: "much", e: "ถามราคาใช้ How much" },
    { q: "How ________ apples do you have?", o: ["much", "many", "old", "tall"], a: "many", e: "แอปเปิลนับได้ ใช้ How many" },
    { q: "They ________ at the park yesterday afternoon.", o: ["are", "is", "was", "were"], a: "were", e: "Yesterday (อดีต) และ They เป็นพหูพจน์ ใช้ were" },
    { q: "You ________ brush your teeth before going to bed.", o: ["should", "shouldn't", "mustn't", "can't"], a: "should", e: "ใช้ควรจะ (should) สำหรับคำแนะนำที่ดี" },
    { q: "A ________ flies a plane.", o: ["doctor", "pilot", "driver", "farmer"], a: "pilot", e: "นักบิน (pilot) คือคนขับเครื่องบิน" },
    { q: "The sun ________ in the morning.", o: ["rise", "rises", "rising", "rose"], a: "rises", e: "พระอาทิตย์ขึ้นเป็นความจริงตามธรรมชาติ กริยาเติม s" },
    { q: "There are ________ students in the classroom.", o: ["any", "much", "some", "a"], a: "some", e: "ประโยคบอกเล่ากับนามนับได้พหูพจน์ใช้ some" },
    { q: "Excuse me, ________ is the restroom?", o: ["What", "Where", "Who", "When"], a: "Where", e: "ถามหาห้องน้ำ (สถานที่) ใช้ Where" },
    { q: "A giraffe has a ________ neck.", o: ["short", "long", "small", "thin"], a: "long", e: "ยีราฟมีคอยาว (long)" },
    { q: "I'm ________. I want some water.", o: ["hungry", "thirsty", "angry", "happy"], a: "thirsty", e: "หิวน้ำคือกระหาย (thirsty)" },
    { q: "My father ________ a new car last month.", o: ["buy", "buys", "bought", "buying"], a: "bought", e: "Last month (อดีต) ใช้ V.2 ของ buy คือ bought" },
    { q: "Today is Monday. Tomorrow is ________.", o: ["Sunday", "Tuesday", "Wednesday", "Friday"], a: "Tuesday", e: "พรุ่งนี้ของวันจันทร์คือวันอังคาร" },
    { q: "She ________ like durian. She thinks it smells bad.", o: ["don't", "doesn't", "isn't", "aren't"], a: "doesn't", e: "She ใช้คู่กับ doesn't ในประโยคปฏิเสธ" },
    { q: "A: ________ is that man? B: He is my uncle.", o: ["What", "Where", "Who", "Why"], a: "Who", e: "ถามถึงบุคคล (my uncle) ใช้ Who" },
    { q: "We ________ Thai at school every day.", o: ["learn", "learns", "learning", "is learning"], a: "learn", e: "We เป็นพหูพจน์ กริยาไม่ต้องเติม s" },
    { q: "The elephant is the ________ land animal.", o: ["big", "bigger", "biggest", "more big"], a: "biggest", e: "ช้างเป็นสัตว์บกที่ใหญ่ที่สุด (ขั้นสุด)" },
    { q: "A rabbit is ________ than a turtle.", o: ["slow", "slower", "fast", "faster"], a: "faster", e: "กระต่ายเร็วกว่า (faster) เต่า" },
    { q: "Is there ________ milk in the bottle?", o: ["some", "any", "a", "an"], a: "any", e: "ประโยคคำถามใช้ any" },
    { q: "A ________ grows rice.", o: ["nurse", "farmer", "doctor", "soldier"], a: "farmer", e: "ชาวนาคือคนปลูกข้าว" },
    { q: "The pen is ________ the table.", o: ["in", "on", "at", "between"], a: "on", e: "ปากกาอยู่บน (on) โต๊ะ" },
    { q: "It is ________ today. Take your umbrella.", o: ["sunny", "rainy", "hot", "windy"], a: "rainy", e: "ฝนตก (rainy) เลยต้องใช้ร่ม" },
    { q: "A: What ________ is it? B: It's 9 o'clock.", o: ["day", "time", "date", "month"], a: "time", e: "ถามเวลาใช้ What time" },
    { q: "He ________ to music now.", o: ["listen", "listens", "is listening", "listened"], a: "is listening", e: "มีคำว่า now ต้องใช้ Present Continuous" },
    { q: "Which one is ________, an ant or a bee?", o: ["small", "smaller", "smallest", "the smallest"], a: "smaller", e: "เปรียบเทียบมดกับผึ้ง (2 อย่าง) ใช้ขั้นกว่า" },
    { q: "I ________ a headache. I need some medicine.", o: ["has", "have", "am", "is"], a: "have", e: "I ใช้คู่กับ have" },
    { q: "A: How are you? B: ________", o: ["I'm nine.", "I'm fine.", "I'm a boy.", "I'm Thai."], a: "I'm fine.", e: "สบายดีครับ/ค่ะ" },
    { q: "They ________ at the cinema last night.", o: ["was", "were", "are", "is"], a: "were", e: "Last night (อดีต) + They (พหูพจน์) ใช้ were" },
    { q: "What's the ________ today? It's the 1st of May.", o: ["day", "date", "month", "year"], a: "date", e: "ถามวันที่ใช้ What's the date" },
    { q: "Please ________ the door. It's cold.", o: ["open", "close", "read", "write"], a: "close", e: "หนาวเลยต้องปิด (close) ประตู" },
    { q: "A bird can ________ but it can't swim.", o: ["fly", "run", "jump", "walk"], a: "fly", e: "นกบินได้ (fly)" },
    { q: "Do you like apples? ________", o: ["Yes, I do.", "Yes, I am.", "No, I don't.", "Yes, I like."], a: "Yes, I do.", e: "ถาม Do ตอบ Do" },
    { q: "My father's brother is my ________.", o: ["aunt", "uncle", "brother", "cousin"], a: "uncle", e: "น้องชาย/พี่ชายของพ่อคือลุง (uncle)" },
    { q: "A ________ works in a library.", o: ["librarian", "teacher", "doctor", "postman"], a: "librarian", e: "บรรณารักษ์ทำงานในห้องสมุด" },
    { q: "You ________ smoke here. It's a hospital.", o: ["can", "must", "mustn't", "should"], a: "mustn't", e: "ห้ามสูบบุหรี่ (ข้อห้าม) ใช้ mustn't" },
    { q: "I ________ my homework yesterday.", o: ["do", "does", "did", "doing"], a: "did", e: "Yesterday เป็นอดีต ใช้ V.2 คือ did" },
    { q: "They ________ soccer twice a week.", o: ["play", "plays", "playing", "played"], a: "play", e: "กิจวัตร (twice a week) + They ใช้ play" },
    { q: "Is she a nurse? No, ________.", o: ["she is", "she isn't", "he isn't", "she doesn't"], a: "she isn't", e: "ถาม Is she ตอบ No, she isn't" },
    { q: "We go to school ________ Monday to Friday.", o: ["from", "at", "on", "in"], a: "from", e: "จากวันจันทร์ถึงวันศุกร์ (from... to...)" }
];

const root = document.getElementById('quiz-root');
let score = 0;
let done = 0;

data.forEach((item, i) => {
    const box = document.createElement('div');
    box.className = 'q-box';
    box.innerHTML = `
        <p><b>${i+1}. ${item.q}</b></p>
        <div class="opts">
            ${item.o.map(o => `<button class="btn" onclick="check(this, ${i}, '${o}')">${o}</button>`).join('')}
        </div>
        <div class="exp" id="exp-${i}"><b>เฉลย: ${item.a}</b><br>${item.e}</div>
    `;
    root.appendChild(box);
});

function check(btn, i, choice) {
    const parent = btn.parentElement;
    if(parent.dataset.answered) return;
    parent.dataset.answered = "true";
    done++;
    
    if(choice === data[i].a) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        Array.from(parent.children).forEach(b => { if(b.innerText === data[i].a) b.classList.add('correct'); });
    }
    document.getElementById(`exp-${i}`).style.display = 'block';
}

function showResults() {
    if(done < 50) { alert(`น้องยังทำไม่ครบนะครับ (ทำไปแล้ว ${done}/50 ข้อ)`); return; }
    document.getElementById('quiz-root').style.display = 'none';
    document.querySelector('.nav-btn').style.display = 'none';
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    document.getElementById('final-score').innerText = `คะแนนของคุณ: ${score}/50`;
    
    let text = "";
    if(score >= 45) text = "🎖️ <b>ระดับ Expert:</b> น้องยอดเยี่ยมมาก! พื้นฐาน ป.5 แน่นปึ๊ก พร้อมลุยทุกสนามสอบ";
    else if(score >= 35) text = "📈 <b>ระดับ Good:</b> เก่งมากครับ มีพลาดเรื่องหลักไวยากรณ์เล็กน้อย ลองอ่านเฉลยข้อที่ผิดดูนะ";
    else text = "💡 <b>ระดับ Improving:</b> พยายามต่อไปนะ! พี่แนะนำให้ทบทวนเรื่อง Tense และการใช้ Some/Any เพิ่มเติมครับ";
    document.getElementById('analysis').innerHTML = text;
    window.scrollTo(0,0);
}
</script>
</body>
</html>
