<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบอังกฤษ ป.5 (100 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0984e3; --green: #00b894; --red: #d63031; --light: #f5f6fa; }
        body { font-family: 'Sarabun', sans-serif; background: var(--light); padding: 20px; color: #2d3436; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--blue); padding-bottom: 20px; margin-bottom: 30px; }
        .q-item { border: 1px solid #dfe6e9; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .topic { font-size: 12px; color: var(--blue); font-weight: bold; background: #e1f5fe; padding: 2px 8px; border-radius: 5px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; text-align: left; }
        .btn:hover { border-color: var(--blue); }
        .correct { background: var(--green) !important; color: white; border-color: var(--green); }
        .wrong { background: var(--red) !important; color: white; border-color: var(--red); }
        .explanation { display: none; margin-top: 15px; padding: 15px; background: #fff9c4; border-radius: 8px; font-size: 14px; }
        #result-box { display: none; text-align: center; padding: 40px; background: var(--blue); color: white; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <p><b>เขียนโดย CHINPONG SMART FARM</b></p>
        <h1>🏆 ข้อสอบมาตรฐานภาษาอังกฤษ ป.5 (100 ข้อจริง)</h1>
        <p>โดย <b>พระจอมเกล้าติวเตอร์</b></p>
    </div>

    <div id="quiz-container"></div>

    <button onclick="calculate()" id="submit-btn" style="width:100%; padding:20px; background:var(--blue); color:white; border:none; border-radius:12px; font-size:20px; cursor:pointer; font-weight:bold;">ส่งคำตอบและดูเฉลยทั้งหมด</button>

    <div id="result-box">
        <h2 id="score-text"></h2>
        <p id="analysis"></p>
        <button onclick="location.reload()" style="background:white; color:var(--blue); border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">ลองใหม่อีกครั้ง</button>
    </div>
</div>

<script>

    {t:"Conversation", q: "A: Excuse me. B: _______", o: ["Yes?", "No.", "Fine.", "Thank you."], a: "Yes?", e: "การตอบรับเมื่อมีคนเรียก"},
    {t:"Comparison", q: "She is the ______ girl in class.", o: ["pretty", "prettier", "prettiest", "most pretty"], a: "prettiest", e: "ขั้นสุดของ pretty"},
    {t:"Past Simple", q: "We ______ to the zoo last Sunday.", o: ["go", "goes", "went", "going"], a: "went", e: "V.2 ของ go"},

const container = document.getElementById('quiz-container');
qData.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'q-item';
    div.innerHTML = `
        <span class="topic">${item.t}</span>
        <p><b>${i+1}. ${item.q}</b></p>
        <div class="options">
            ${item.o.map(opt => `<button class="btn" onclick="check(this, ${i}, '${opt}')">${opt}</button>`).join('')}
        </div>
        <div class="explanation" id="exp-${i}"><b>เฉลย: ${item.a}</b><br>${item.e}</div>
    `;
    container.appendChild(div);
});

let score = 0;
let done = 0;

function check(btn, i, choice) {
    if(btn.parentElement.dataset.done) return;
    btn.parentElement.dataset.done = "true";
    done++;
    if(choice === qData[i].a) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        Array.from(btn.parentElement.children).forEach(b => {
            if(b.innerText === qData[i].a) b.classList.add('correct');
        });
    }
    document.getElementById(`exp-${i}`).style.display = 'block';
}

function calculate() {
    if(done < 100) { alert('ทำไม่ครบ 100 ข้อ พี่ไม่ตรวจให้นะครับ!'); return; }
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'none';
    const box = document.getElementById('result-box');
    box.style.display = 'block';
    document.getElementById('score-text').innerText = `คะแนนของคุณคือ ${score} / 100`;
    document.getElementById('analysis').innerText = score >= 80 ? "ยอดเยี่ยม! น้องพร้อมสอบเข้า ม.1 แล้ว" : "ดีครับ แต่ลองทบทวนข้อที่ผิดและทำใหม่อีกรอบนะ";
    window.scrollTo(0,0);
}
</script>
</body>
</html>
