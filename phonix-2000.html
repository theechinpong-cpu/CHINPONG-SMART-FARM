<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Sarabun:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #e84393; --s: #6c5ce7; --bg: #f1f2f6; }
        body { font-family: 'Lexend', 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--p); font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }
        .sub { text-align: center; color: #636e72; margin-bottom: 30px; }

        .search-area { margin-bottom: 25px; }
        .search-input { width: 100%; padding: 15px; border: 2px solid #dfe6e9; border-radius: 15px; font-size: 1.1em; box-sizing: border-box; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(232, 67, 147, 0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; max-height: 550px; overflow-y: auto; padding: 15px; border: 1px solid #eee; border-radius: 20px; background: #fff; }
        
        .card { position: relative; background: #f9f9f9; border: 1px solid #efefef; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; font-weight: 700; color: #2d3436; }
        .card:hover { background: var(--p); color: white; transform: translateY(-3px); z-index: 10; }
        
        /* Tooltip คำแปล */
        .card::after {
            content: attr(data-th);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #2d3436; color: white; padding: 6px 12px; border-radius: 8px;
            font-size: 0.85em; white-space: nowrap; visibility: hidden; opacity: 0; transition: 0.2s;
            font-family: 'Sarabun'; font-weight: 400;
        }
        .card:hover::after { visibility: visible; opacity: 1; bottom: 115%; }

        .dashboard { margin-top: 40px; padding: 30px; border-radius: 25px; background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; text-align: center; }
        .big-word { font-size: 4em; margin: 10px 0; font-weight: 700; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        .big-mean { font-size: 1.5em; font-family: 'Sarabun'; opacity: 0.9; margin-bottom: 20px; }
        .btn-group button { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1em; margin: 5px; transition: 0.3s; }
        .btn-next { background: #fff; color: var(--s); }
        .btn-audio { background: #fd79a8; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 English Expert (1,501 - 2,000)</h1>
    <p class="sub">รวบรวมโดย พระจอมเกล้าติวเตอร์ | CHINPONG SMART FARM</p>

    <div class="search-area">
        <input type="text" id="search" class="search-input" placeholder="🔍 ค้นหาคำศัพท์ระดับ Expert..." onkeyup="filter()">
    </div>

    <div id="vocabGrid" class="grid"></div>

    <div class="dashboard">
        <h2>🔥 The Final Master Challenge</h2>
        <div id="target" class="big-word">START</div>
        <div id="thai" class="big-mean">พร้อมแล้วกดสุ่มเลย!</div>
        <div class="btn-group">
            <button class="btn-next" onclick="randomWord()">Random Word</button>
            <button class="btn-audio" onclick="speak()">🔊 Play Sound</button>
        </div>
    </div>
</div>

    ];

    const grid = document.getElementById('vocabGrid');
    const target = document.getElementById('target');
    const thai = document.getElementById('thai');
    let current = null;

    function init() {
        expertData.sort((a,b) => a.en.localeCompare(b.en)).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = item.en;
            card.setAttribute('data-th', item.th);
            card.onclick = () => { current = item; target.innerText = item.en; thai.innerText = item.th; speak(); };
            grid.appendChild(card);
        });
    }

    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function randomWord() {
        current = expertData[Math.floor(Math.random() * expertData.length)];
        target.innerText = current.en;
        thai.innerText = current.th;
        speak();
    }

    function speak() {
        if(!current) return;
        const u = new SpeechSynthesisUtterance(current.en);
        u.lang = 'en-US';
        u.rate = 0.85;
        synth.speak(u);
    }

    init();

</html>
