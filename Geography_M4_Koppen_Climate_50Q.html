<script>
const questions = [
    { q: "เกณฑ์หลักที่เคิพเปินใช้จำแนกเขตภูมิอากาศคือข้อใด?", o: ["ทิศทางลมและความกดอากาศ", "อุณหภูมิและหยาดน้ำฟ้า", "ประเภทของดินและแร่ธาตุ", "ความสูงจากระดับน้ำทะเล"], c: 1, cat: "พื้นฐานเคิพเปิน", exp: "เคิพเปินใช้ข้อมูลอุณหภูมิและปริมาณน้ำฝน/หิมะรายเดือนและรายปีเป็นเกณฑ์ทางสถิติ" },
    { q: "การเก็บข้อมูลเพื่อระบุ 'ภูมิอากาศ' (Climate) ต้องใช้ระยะเวลาเฉลี่ยมาตรฐานกี่ปี?", o: ["5 ปี", "10 ปี", "30 ปี", "50 ปี"], c: 2, cat: "พื้นฐานเคิพเปิน", exp: "ภูมิอากาศคือรูปแบบระยะยาวของสภาพอากาศ ระยะเวลามาตรฐานคือ 30 ปี" },
    { q: "กลุ่มภูมิอากาศหลักใดที่มีอุณหภูมิเฉลี่ยทุกเดือนสูงกว่า 18°C และไม่มีฤดูหนาว?", o: ["A เขตร้อนชื้น", "B แห้งแล้ง", "C เขตอบอุ่น", "D ภาคพื้นทวีป"], c: 0, cat: "กลุ่มอักษรตัวที่ 1", exp: "กลุ่ม A คือเขตร้อน (Tropical) อากาศร้อนตลอดปีไม่มีเดือนไหนอุณหภูมิต่ำกว่า 18°C" },
    { q: "อักษร 'f' ในสัญลักษณ์ Af หมายถึงลักษณะความชื้นแบบใด?", o: ["มีมรสุม", "แห้งแล้งฤดูหนาว", "ฝนตกชุกตลอดปี", "แห้งแล้งฤดูร้อน"], c: 2, cat: "กลุ่มอักษรตัวที่ 2", exp: "f ย่อมาจาก Fully humid หมายถึงไม่มีฤดูแล้ง ฝนตกชุกตลอดปี" },
    { q: "ภูมิอากาศแบบสะวันนา (Savanna) แทนด้วยสัญลักษณ์ใด?", o: ["Af", "Am", "Aw", "As"], c: 2, cat: "รายละเอียดกลุ่ม A", exp: "Aw คือทุ่งหญ้าสะวันนาที่มีฤดูแล้งในฤดูหนาว (w = dry winter)" },
    { q: "กลุ่มภูมิอากาศใดที่ไม่พบในซีกโลกใต้เนื่องจากขาดแคลนพื้นที่ทวีปขนาดใหญ่?", o: ["กลุ่ม A", "กลุ่ม B", "กลุ่ม C", "กลุ่ม D"], c: 3, cat: "กลุ่มอักษรตัวที่ 1", exp: "กลุ่ม D (Continental) ต้องการแผ่นดินขนาดใหญ่เพื่อสะสมความหนาว ซึ่งซีกโลกใต้ส่วนใหญ่เป็นมหาสมุทร" },
    { q: "สัญลักษณ์ 'BW' ในเขตแห้งแล้งหมายถึงพื้นที่ประเภทใด?", o: ["ทุ่งหญ้าสั้นสเตปป์", "ทะเลทราย", "โอเอซิส", "ป่าโปร่ง"], c: 1, cat: "รายละเอียดกลุ่ม B", exp: "W มาจากคำว่า Wüste ในภาษาเยอรมันแปลว่า Desert หรือทะเลทราย" },
    { q: "ภูมิอากาศแบบเมดิเตอร์เรเนียน (Cs) มีลักษณะเด่นที่แตกต่างจากเขตอื่นอย่างไร?", o: ["ฝนตกชุกในฤดูร้อน", "แห้งแล้งในฤดูร้อนและฝนตกในฤดูหนาว", "หนาวจัดตลอดปี", "ไม่มีฤดูแล้ง"], c: 1, cat: "รายละเอียดกลุ่ม C", exp: "Cs (Summer dry) คือเขตเมดิเตอร์เรเนียนที่จะแล้งจัดในฤดูร้อนและมีฝนในฤดูหนาว" },
    { q: "ป่าสนไทกา (Taiga) เป็นพืชพรรณธรรมชาติเด่นของเขตภูมิอากาศใด?", o: ["Af", "BS", "Df", "ET"], c: 2, cat: "รายละเอียดกลุ่ม D", exp: "Df เป็นเขตหนาวชื้นที่มีหิมะตกตลอดปีและมีป่าสนขนาดใหญ่" },
    { q: "อักษร 'E' แทนภูมิอากาศเขตใด?", o: ["อบอุ่น", "หนาว", "ขั้วโลก", "ภูเขาสูง"], c: 2, cat: "กลุ่มอักษรตัวที่ 1", exp: "E ย่อมาจาก Polar หรือเขตขั้วโลกที่มีอากาศหนาวจัดตลอดปี" },
    { q: "เขตภูมิอากาศแบบใดที่ปลูก 'อินทผลัม' ได้ดีบริเวณโอเอซิส?", o: ["Af", "BW", "Cs", "Dw"], c: 1, cat: "รายละเอียดกลุ่ม B", exp: "อินทผลัมเป็นพืชเศรษฐกิจหลักในเขตทะเลทราย (BW)" },
    { q: "ลักษณะของอักษรตัวที่ 3 'a' ในระบบเคิพเปินคืออะไร?", o: ["ฤดูร้อนอากาศร้อนจัด", "ฤดูร้อนอากาศอบอุ่น", "ฤดูหนาวหนาวจัด", "หนาวทั้งปี"], c: 0, cat: "กลุ่มอักษรตัวที่ 3", exp: "a หมายถึงอุณหภูมิเฉลี่ยเดือนร้อนที่สุดสูงกว่า 22°C" },
    { q: "ประเทศไทย (ส่วนใหญ่) จัดอยู่ในเขตภูมิอากาศแบบใด?", o: ["Af", "Am", "Aw", "BS"], c: 2, cat: "ภูมิอากาศไทย", exp: "ไทยส่วนใหญ่เป็น Aw (สะวันนา) ยกเว้นภาคใต้และตะวันออกบางส่วนที่เป็น Am และ Af" },
    { q: "เขตทุนดรา (Tundra) ใช้สัญลักษณ์ใด?", o: ["ET", "EF", "Eh", "Dfc"], c: 0, cat: "รายละเอียดกลุ่ม E", exp: "ET คือเขตทุนดรา อุณหภูมิเดือนร้อนที่สุดอยู่ระหว่าง 0-10°C" },
    { q: "บริเวณ 'ลุ่มแม่น้ำแอมะซอน' มีภูมิอากาศแบบใด?", o: ["Af", "Aw", "BS", "Cfa"], c: 0, cat: "รายละเอียดกลุ่ม A", exp: "แอมะซอนเป็นเขตป่าฝนเขตร้อน (Af) ที่มีความหลากหลายทางชีวภาพสูงที่สุด" },
    { q: "อักษร 'h' ในกลุ่ม B (เช่น BWh) หมายถึงอะไร?", o: ["ความชื้นสูง", "อุณหภูมิเฉลี่ยทั้งปีสูง", "อากาศหนาวจัด", "มีลมพายุ"], c: 1, cat: "กลุ่มอักษรตัวที่ 3", exp: "h หมายถึง Hot (ร้อน) ใช้ในเขตแห้งแล้งที่มีอุณหภูมิเฉลี่ยทั้งปีเกิน 18°C" },
    { q: "ภูมิอากาศแบบมรสุมเขตร้อน (Am) พบได้ในจังหวัดใดของไทย?", o: ["เชียงใหม่", "จันทบุรี", "นครราชสีมา", "กาญจนบุรี"], c: 1, cat: "ภูมิอากาศไทย", exp: "จันทบุรีและตราดเป็นเขต Am ที่มีฝนตกชุกจากอิทธิพลมรสุม" },
    { q: "อักษร 'S' ในกลุ่ม B (เช่น BSh) ย่อมาจากอะไร?", o: ["Savanna", "Steppe", "Summer", "Snow"], c: 1, cat: "รายละเอียดกลุ่ม B", exp: "S ย่อมาจาก Steppe หมายถึงทุ่งหญ้าสั้นกึ่งทะเลทราย" },
    { q: "เขตภูมิอากาศใดที่มีสภาพอากาศ 'เหมาะสมที่สุด' สำหรับการอยู่อาศัยของมนุษย์?", o: ["A", "B", "C", "D"], c: 2, cat: "รายละเอียดกลุ่ม C", exp: "กลุ่ม C (อบอุ่น) มีอุณหภูมิปานกลาง ไม่ร้อนหรือหนาวจนเกินไป" },
    { q: "ลักษณะพืชใบเล็ก เปลือกหนา เช่น มะกอก พบในเขตใด?", o: ["Af", "Cs", "Df", "BW"], c: 1, cat: "รายละเอียดกลุ่ม C", exp: "เป็นลักษณะการปรับตัวของพืชในเขตเมดิเตอร์เรเนียนเพื่อลดการคายน้ำในฤดูร้อน" },
    { q: "เขตภูมิอากาศแบบใดที่ไม่มีต้นไม้ใหญ่ขึ้นได้เลย มีเพียงมอสและไลเคน?", o: ["ET", "Am", "Cw", "Dfa"], c: 0, cat: "รายละเอียดกลุ่ม E", exp: "ทุนดรา (ET) หนาวเกินไปที่ไม้ใหญ่จะเติบโต แต่พอมีพืชชั้นต่ำในช่วงสั้นๆ" },
    { q: "อักษร 'H' ถูกเพิ่มเข้ามาภายหลังเพื่อระบุภูมิอากาศแบบใด?", o: ["Humidity", "Highland", "Hot desert", "Hurricane"], c: 1, cat: "กลุ่มอักษรตัวที่ 1", exp: "H หมายถึง Highland ภูมิอากาศภูเขาสูงที่อุณหภูมิลดลงตามความสูง" },
    { q: "องุ่นและผลไม้ตระกูลส้ม เป็นพืชเศรษฐกิจเด่นของเขตใด?", o: ["Af", "Cs", "BS", "Aw"], c: 1, cat: "รายละเอียดกลุ่ม C", exp: "พืชเหล่านี้เจริญเติบโตได้ดีในเขตเมดิเตอร์เรเนียน (Cs)" },
    { q: "ข้อใดคือความหมายของอักษร 'm' ในระบบเคิพเปิน?", o: ["Moderate", "Mountain", "Monsoon", "Marine"], c: 2, cat: "กลุ่มอักษรตัวที่ 2", exp: "m คือ Monsoon มรสุม มีช่วงแล้งสั้นๆ แต่ฝนรวมทั้งปีสูงมาก" },
    { q: "ทุ่งหญ้าแพรรี (Prairie) ในอเมริกาเหนือ จัดอยู่ในเขตใด?", o: ["BW", "BS", "Af", "Cs"], c: 1, cat: "รายละเอียดกลุ่ม B", exp: "แพรรีเป็นทุ่งหญ้าสเตปป์ (BS) ในเขตอบอุ่น" },
    { q: "เขตภูมิอากาศ D พบมากที่สุดในบริเวณใด?", o: ["เอเชียตะวันออกเฉียงใต้", "แอฟริกาตอนกลาง", "ไซบีเรียและแคนาดา", "ออสเตรเลีย"], c: 2, cat: "รายละเอียดกลุ่ม D", exp: "เป็นเขตพื้นที่กว้างขวางในซีกโลกเหนือที่มีอากาศหนาวจัด" },
    { q: "ลักษณะของเขต EF (Ice Cap) คือข้อใด?", o: ["มีมอสขึ้นในฤดูร้อน", "อุณหภูมิเฉลี่ยทุกเดือนต่ำกว่า 0°C", "มีฝนตกชุกตลอดปี", "เป็นที่ตั้งของป่าสน"], c: 1, cat: "รายละเอียดกลุ่ม E", exp: "EF คือพืดน้ำแข็งถาวร หนาวจัดจนไม่มีเดือนไหนอุณหภูมิเกินจุดเยือกแข็ง" },
    { q: "ยางพาราและปาล์มน้ำมัน ปลูกได้ดีที่สุดในเขตใด?", o: ["Af", "BS", "Cs", "ET"], c: 0, cat: "รายละเอียดกลุ่ม A", exp: "พืชเหล่านี้ต้องการฝนชุกและความร้อนสูงตลอดปีแบบป่าดิบชื้น" },
    { q: "อักษร 'w' (ตัวเล็ก) หมายถึงแห้งแล้งในช่วงฤดูใด?", o: ["ฤดูร้อน", "ฤดูหนาว", "ฤดูใบไม้ผลิ", "แล้งตลอดปี"], c: 1, cat: "กลุ่มอักษรตัวที่ 2", exp: "w ย่อมาจาก Winter dry (แห้งแล้งฤดูหนาว)" },
    { q: "เขตภูมิอากาศแบบใดที่มีการระเหยของน้ำมากกว่าหยาดน้ำฟ้า?", o: ["A", "B", "C", "D"], c: 1, cat: "กลุ่มอักษรตัวที่ 1", exp: "เป็นนิยามหลักของเขตแห้งแล้ง (B)" },
    { q: "ข้าวสาลีและข้าวบาร์เลย์ ปลูกได้ดีในเขตภูมิอากาศใด?", o: ["Af", "BS และ C", "ET", "Am"], c: 1, cat: "รายละเอียดกลุ่ม C", exp: "เขตอบอุ่นและทุ่งหญ้าสเตปป์เป็นแหล่งผลิตข้าวสาลีที่สำคัญของโลก" },
    { q: "ทำไมเขต Af ถึงมีความหนาแน่นของประชากรน้อย?", o: ["ไม่มีน้ำ", "หนาวจัด", "ป่าทึบและโรคเขตร้อน", "ดินจืดปลูกพืชไม่ได้"], c: 2, cat: "รายละเอียดกลุ่ม A", exp: "ความร้อนชื้นและป่าที่หนาแน่นทำให้การตั้งถิ่นฐานลำบาก" },
    { q: "สัญลักษณ์ Cfa หมายถึงอะไร?", o: ["อบอุ่นชื้น ฝนชุกตลอดปี ฤดูร้อนอากาศร้อนจัด", "เมดิเตอร์เรเนียน", "หนาวภาคพื้นทวีป", "สะวันนา"], c: 0, cat: "กลุ่มอักษรตัวที่ 3", exp: "C=อบอุ่น, f=ชื้นตลอดปี, a=ร้อนจัดในฤดูร้อน" },
    { q: "มณฑลทางใต้ของจีนและอินเดียตอนเหนือมีภูมิอากาศแบบใด?", o: ["Af", "Cw", "BW", "ET"], c: 1, cat: "รายละเอียดกลุ่ม C", exp: "เป็นเขตอบอุ่นที่มีฤดูแล้งในฤดูหนาว (Cw)" },

function buildQuiz() {
    const area = document.getElementById('quiz-area');
    questions.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <div class="q-text">${i + 1}. ${item.q}</div>
            ${item.o.map((opt, oi) => `
                <label class="opt-label">
                    <input type="radio" name="q${i}" onclick="checkQ(${i}, ${oi})"> ${opt}
                </label>
            `).join('')}
            <div id="fb-${i}" class="feedback"></div>
        `;
        area.appendChild(card);
    });
}

let score = 0;
let done = 0;
let results = {};

function checkQ(qi, si) {
    const q = questions[qi];
    const fb = document.getElementById(`fb-${qi}`);
    const rds = document.getElementsByName(`q${qi}`);
    for(let r of rds) r.disabled = true;

    fb.style.display = 'block';
    if(si === q.c) {
        fb.className = 'feedback correct';
        fb.innerHTML = `<strong>ถูกต้อง! ✅</strong><br>${q.exp}`;
        score++;
        results[q.cat] = (results[q.cat] || 0) + 1;
    } else {
        fb.className = 'feedback incorrect';
        fb.innerHTML = `<strong>ผิด! ❌ (ตอบ: ${q.o[q.c]})</strong><br>${q.exp}`;
    }
    done++;
}

function showAnalysis() {
    if(done < 50) { alert("กรุณาทำข้อสอบให้ครบ 50 ข้อก่อนส่งครับ!"); return; }
    document.getElementById('final-score').innerText = score;
    const crit = document.getElementById('critique');
    crit.innerHTML = "<h3>🔍 วิเคราะห์รายหัวข้อ:</h3>";
    
    const cats = [...new Set(questions.map(q => q.cat))];
    cats.forEach(c => {
        const total = questions.filter(q => q.cat === c).length;
        const s = results[c] || 0;
        const p = Math.round((s/total)*100);
        crit.innerHTML += `<p><strong>${c}:</strong> ได้ ${s}/${total} (${p}%) - ${p < 60 ? '🔴 ควรทบทวน' : '🟢 ดีมาก'}</p>`;
    });

    document.getElementById('summary').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}

window.onload = buildQuiz;
</script>
