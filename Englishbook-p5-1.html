    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 30px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .word-row { display: flex; align-items: center; background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .word-row label { flex: 1; font-weight: 600; font-size: 0.95em; color: #444; }
        input[type="text"] { flex: 1.2; padding: 8px; border: 2px solid #dfe6e9; border-radius: 6px; outline: none; transition: 0.2s; }
        input[type="text"]:focus { border-color: #3498db; background: #f7fbff; }
        .group-header { grid-column: 1 / -1; background: #3498db; color: white; padding: 10px 20px; border-radius: 8px; margin-top: 25px; margin-bottom: 10px; font-weight: bold; }
        button#submit-btn { display: block; width: 100%; padding: 20px; background-color: #2ecc71; color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 40px; box-shadow: 0 4px 0 #27ae60; }
        button#submit-btn:active { transform: translateY(3px); box-shadow: none; }
        #result { margin-top: 40px; display: none; padding: 25px; border-radius: 15px; background: #fff; border: 2px solid #3498db; }
        .score-box { text-align: center; font-size: 32px; font-weight: bold; color: #2c3e50; margin-bottom: 25px; background: #e1f5fe; padding: 20px; border-radius: 10px; }
        .analysis-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .error-item { background: #fff5f5; border-left: 6px solid #ff7675; padding: 15px; border-radius: 8px; }
        .correct-ans { color: #27ae60; font-weight: bold; text-decoration: underline; }
        .wrong-ans { color: #d63031; text-decoration: line-through; margin-right: 10px; }
        .memory-tip { display: block; margin-top: 8px; font-size: 0.85em; color: #636e72; background: #f1f2f6; padding: 5px 10px; border-radius: 4px; }
        @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>

function initQuiz() {
    const container = document.getElementById('quiz-container');
    let currentGroup = 0;
    
    wordsData.forEach((item, index) => {
        if (index % 25 === 0) {
            currentGroup++;
            container.innerHTML += `<div class="group-header">Group ${currentGroup}</div>`;
        }
        container.innerHTML += `
            <div class="word-row">
                <label>${index + 151}. ${item.th}</label>
                <input type="text" id="input-${index}" placeholder="...">
            </div>
        `;
    });
}

function checkAnswers() {
    let score = 0;
    let wrongByCat = {};
    let analysisHtml = "";

    wordsData.forEach((item, index) => {
        const userVal = document.getElementById(`input-${index}`).value.trim().toLowerCase();
        const correctVal = item.en.toLowerCase();

        if (userVal === correctVal) {
            score++;
        } else {
            // Track weak categories
            wrongByCat[item.cat] = (wrongByCat[item.cat] || 0) + 1;
            
            analysisHtml += `
                <div class="error-item">
                    <strong>ข้อ ${index + 151} (${item.th}):</strong><br>
                    <span class="wrong-ans">${userVal || "(ไม่ได้ตอบ)"}</span> 
                    → <span class="correct-ans">${item.en}</span>
                    <span class="memory-tip">💡 ${item.tip}</span>
                </div>
            `;
        }
    });

    // Score & Analysis
    document.getElementById('score-display').innerText = `ได้คะแนน ${score} จาก 150`;
    
    let weakText = "หมวดหมู่ที่ต้องฝึกฝนเพิ่ม: ";
    const weakCats = Object.keys(wrongByCat).filter(cat => wrongByCat[cat] > 2);
    weakText += weakCats.length > 0 ? weakCats.join(", ") : "ไม่มี (คุณทำได้ดีมาก!)";
    
    document.getElementById('weak-areas').innerText = weakText;
    document.getElementById('analysis').innerHTML = score === 150 ? "<h3>🌟 Perfect! คุณเป็นอัจฉริยะด้านตัวสะกด!</h3>" : analysisHtml;
    document.getElementById('result').style.display = 'block';
    window.scrollTo(0, document.getElementById('result').offsetTop);
}
