<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบวิทยาศาสตร์ ป.5 ชุดที่ 2 (Hard Mode) - พระจอมเกล้าติวเตอร์</title>
    <style>
        :root { --primary: #002366; --accent: #ff4500; --bg: #eef2f7; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .header { text-align: center; border-bottom: 5px double var(--primary); margin-bottom: 30px; padding-bottom: 15px; }
        .q-card { margin-bottom: 30px; padding: 25px; border: 2px solid #f0f0f0; border-radius: 15px; background: #fff; }
        .q-text { font-size: 19px; font-weight: bold; color: var(--primary); margin-bottom: 20px; line-height: 1.4; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 15px; border: 1.5px solid #d1d8e0; border-radius: 10px; background: #fdfdfd; cursor: pointer; text-align: left; font-size: 16px; transition: all 0.2s; }
        .opt-btn:hover { background: #fff5f0; border-color: var(--accent); transform: translateY(-2px); }
        .feedback { display: none; margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 16px; border-left: 6px solid; }
        .correct { background: #e6fffa; color: #234e52; border-color: #38b2ac; }
        .wrong { background: #fff5f5; color: #742a2a; border-color: #f56565; }
        .btn-check { background: var(--primary) !important; color: white !important; font-weight: bold; }
        #summary { display: none; text-align: center; padding: 40px; background: var(--primary); color: white; border-radius: 20px; margin-top: 40px; }
        .finish-btn { display: block; width: 100%; padding: 25px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 15px rgba(255,69,0,0.3); }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔥 ข้อสอบท้าทายความสามารถ (Level: Hard)</h1>
        <p>วิทยาศาตร์ ป.5 ชุดที่ 2 | โดย <b>พระจอมเกล้าติวเตอร์</b></p>
        <p style="color: #666;">*เขียนโดย CHINPONG SMART FARM*</p>
    </div>

    <div id="quiz-box"></div>

    <button class="finish-btn" id="submit-all" onclick="calculateFinal()">ส่งกระดาษคำตอบ</button>

    <div id="summary">
        <h2>📊 รายงานผลการทดสอบเชิงลึก</h2>
        <h1 id="score-display" style="font-size: 72px; margin: 10px 0;">0 / 60</h1>
        <div id="pro-analysis" style="text-align: left; font-size: 18px; line-height: 1.8; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px;"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding: 10px 30px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold;">ทดสอบใหม่</button>
    </div>
</div>

<script>
const hardQuestions = [
    // 1-15: การเปลี่ยนแปลง (ระดับวิเคราะห์)
    { q: "ถ้านำแก้วที่มีน้ำแข็งเต็มแก้วไปชั่งน้ำหนัก เมื่อน้ำแข็งละลายหมด น้ำหนักรวมของแก้วจะเป็นอย่างไร? (ไม่คิดการระเหย)", a: ["น้ำหนักเพิ่มขึ้น", "น้ำหนักลดลง", "น้ำหนักเท่าเดิม", "น้ำหนักเพิ่มขึ้นแล้วลดลง"], c: 2, e: "<b>ถูกเพราะ:</b> กฎการอนุรักษ์มวล มวลของสารก่อนและหลังเปลี่ยนสถานะในระบบปิดจะเท่าเดิม <br><b>จุดลวง:</b> เด็กมักคิดว่าน้ำแข็งเบากว่าน้ำ แต่จริงๆ มวลเท่าเดิม" },
    { q: "การทำเหมืองฉีดเพื่อแยกแร่หนาแน่นออกจากทราย ใช้หลักการใดเป็นสำคัญ?", a: ["การละลาย", "การตกตะกอนตามความหนาแน่น", "การระเหิด", "การควบแน่น"], c: 1, e: "<b>ถูกเพราะ:</b> ใช้แรงดันน้ำพาเม็ดทรายที่เบากว่าไป และปล่อยให้แร่ที่หนักกว่าตกตะกอนสะสมตัว" },
    { q: "ในขณะที่น้ำกำลังเดือด ถ้าเราเพิ่มไฟให้แรงขึ้น อุณหภูมิของน้ำจะเป็นอย่างไร?", a: ["อุณหภูมิจะสูงกว่า 100°C", "อุณหภูมิจะลดลง", "อุณหภูมิจะคงที่ที่จุดเดือด", "อุณหภูมิจะเพิ่มขึ้นเรื่อยๆ จนแก้วแตก"], c: 2, e: "<b>ถูกเพราะ:</b> ขณะเปลี่ยนสถานะ อุณหภูมิสารจะคงที่ ความร้อนที่เพิ่มจะถูกใช้เป็น 'ความร้อนแฝง' เพื่อทำลายแรงยึดเหนี่ยวโมเลกุล" },
    { q: "การเลือกใช้พลาสติกทำด้ามกระทะ เกี่ยวข้องกับสมบัติทางกายภาพข้อใด?", a: ["การนำความร้อน", "การนำไฟฟ้า", "ความหนาแน่น", "การหลอมเหลว"], c: 0, e: "<b>ถูกเพราะ:</b> พลาสติกเป็นฉนวนความร้อน ช่วยให้มือเราไม่พอง" },
    { q: "สาร A มีจุดหลอมเหลว 50°C และจุดเดือด 150°C ที่อุณหภูมิ 80°C สาร A จะอยู่ในสถานะใด?", a: ["ของแข็ง", "ของเหลว", "แก๊ส", "สารละลาย"], c: 1, e: "<b>ถูกเพราะ:</b> 80 อยู่ระหว่าง 50 (หลอมแล้ว) แต่ยังไม่ถึง 150 (ยังไม่เดือด) จึงเป็นของเหลว" },
    // 16-30: แรงลัพธ์และแรงเสียดทาน (คำนวณ/วิเคราะห์)
    { q: "วัตถุวางนิ่งบนพื้นเอียง แรงเสียดทานที่กระทำต่อวัตถุมีทิศทางใด?", a: ["ทิศลงตามพื้นเอียง", "ทิศขึ้นตามพื้นเอียง", "ทิศดิ่งลงสู่จุดศูนย์กลางโลก", "ไม่มีแรงเสียดทานเพราะวัตถุนิ่ง"], c: 1, e: "<b>ถูกเพราะ:</b> วัตถุพยายามจะไถลลง แรงเสียดทานจึงต้องมีทิศต้านขึ้นไปเพื่อรักษาสมดุล" },
    { q: "หากถูพื้นบ้านด้วยน้ำสบู่จนลื่นมาก แรงเสียดทานจะลดลงเพราะเหตุใด?", a: ["พื้นผิวขรุขระขึ้น", "น้ำสบู่เข้าไปเติมเต็มร่องลึกของพื้นผิว", "น้ำหนักของวัตถุบนพื้นลดลง", "มวลของพื้นเปลี่ยนไป"], c: 1, e: "<b>ถูกเพราะ:</b> สารหล่อลื่นช่วยลดการสัมผัสโดยตรงของขรุขระระหว่างสองผิวสัมผัส" },
    { q: "ยานขนส่งอวกาศต้องมีวัสดุทนไฟที่ส่วนหัว เพราะเหตุใดเมื่อกลับเข้าสู่โลก?", a: ["ความร้อนจากดวงอาทิตย์", "แรงเสียดทานกับชั้นบรรยากาศ", "แรงดึงดูดของโลกเพิ่มขึ้น", "การขยายตัวของอากาศ"], c: 1, e: "<b>ถูกเพราะ:</b> การเสียดสีกับโมเลกุลอากาศด้วยความเร็วสูงมากทำให้เกิดความร้อนมหาศาล" },
    { q: "ถ้าเพิ่มมวลของวัตถุเป็น 2 เท่าบนพื้นผิวเดิม แรงเสียดทานสถิตสูงสุดจะเป็นอย่างไร?", a: ["เท่าเดิม", "ลดลงครึ่งหนึ่ง", "เพิ่มเป็น 2 เท่า", "เพิ่มเป็น 4 เท่า"], c: 2, e: "<b>ถูกเพราะ:</b> แรงเสียดทานแปรผันตรงกับแรงกด (มวลเพิ่ม แรงกดเพิ่ม แรงเสียดทานเพิ่ม)" },
    { q: "การออกแบบยางรถยนต์ให้มีหน้ากว้างขึ้น (ยางหน้ากว้าง) มีจุดประสงค์หลักเพื่ออะไร?", a: ["ลดแรงเสียดทาน", "กระจายน้ำหนักและเพิ่มการยึดเกาะ", "ประหยัดน้ำมัน", "ให้รถวิ่งเร็วขึ้น"], c: 1, e: "<b>ถูกเพราะ:</b> เพิ่มพื้นที่สัมผัสช่วยกระจายแรงกดและเพิ่มประสิทธิภาพการหยุดรถ" },
    // 31-45: เสียง (วิเคราะห์ความถี่และมลพิษ)
    { q: "ในถังน้ำมันขนาดใหญ่ที่ว่างเปล่า เมื่อเราตะโกนเข้าไปจะได้ยินเสียงก้องชัดเจน เป็นผลมาจากสมบัติใดของเสียง?", a: ["การหักเห", "การเลี้ยวเบน", "การสะท้อน", "การดูดกลืน"], c: 2, e: "<b>ถูกเพราะ:</b> ผนังโลหะแข็งสะท้อนเสียงกลับมาหาผู้ฟังในเวลาที่ต่างกันเกิน 0.1 วินาที" },
    { q: "เมื่อความยาวของสายกีตาร์ลดลง (กดเฟรตให้สั้นลง) เสียงจะเปลี่ยนไปอย่างไร?", a: ["เสียงจะต่ำลง", "เสียงจะสูงขึ้น", "เสียงจะเบาลง", "เสียงจะเท่าเดิม"], c: 1, e: "<b>ถูกเพราะ:</b> สายสั้นลง มวลน้อยลง สั่นได้เร็วขึ้น (ความถี่สูงขึ้น) เสียงจึงสูงขึ้น" },
    { q: "เราสามารถได้ยินเสียงคนคุยกันที่มุมตึกได้แม้จะมองไม่เห็นตัว เป็นเพราะสมบัติใด?", a: ["การสะท้อน", "การเลี้ยวเบน", "การหักเห", "การดูดกลืน"], c: 1, e: "<b>ถูกเพราะ:</b> เสียงเป็นคลื่นที่สามารถอ้อมสิ่งกีดขวางได้" },
    { q: "วัสดุในข้อใดดูดซับเสียงได้ 'แย่ที่สุด'?", a: ["พรม", "ฟองน้ำ", "แผ่นกระจก", "กำมะหยี่"], c: 2, e: "<b>ถูกเพราะ:</b> วัสดุผิวเรียบแข็งจะสะท้อนเสียงได้ดีแต่ดูดซับได้น้อยมาก" },
    { q: "ถ้าแหล่งกำเนิดเสียงสั่นด้วยความถี่ 10 รอบต่อวินาที หูมนุษย์จะได้ยินเสียงหรือไม่?", a: ["ได้ยิน เพราะความถี่ต่ำเสียงจะดัง", "ไม่ได้ยิน เพราะต่ำกว่าช่วง 20 - 20,000 Hz", "ได้ยินชัดเจนมาก", "ได้ยินเฉพาะตอนกลางคืน"], c: 1, e: "<b>ถูกเพราะ:</b> 10 Hz คือ 'อินฟราโซนิก' ซึ่งต่ำเกินกว่าประสาทหูมนุษย์จะตอบสนอง" },
    // 46-60: ดาราศาสตร์ (การคำนวณตำแหน่งและทิศ)
    { q: "หากเราสังเกตกลุ่มดาวนายพรานในเวลา 19.00 น. อยู่ทางทิศตะวันออก พอเวลา 24.00 น. ดาวกลุ่มนี้จะไปอยู่ที่ใด?", a: ["ตกลับขอบฟ้าตะวันตก", "อยู่ตรงจุดเหนือศีรษะพอดี", "กลับมาที่เดิม", "เคลื่อนไปทางทิศใต้"], c: 1, e: "<b>ถูกเพราะ:</b> โลกหมุนไปประมาณ 75 องศา (15 องศา/ชม.) ทำให้ดาวเคลื่อนจากตะวันออกขึ้นมาใกล้จุดเหนือศีรษะ" },
    { q: "ดาวเคราะห์ดวงใดที่เรามักเห็นในช่วงหัวค่ำทางทิศตะวันตก และเรียกว่า 'ดาวประจำเมือง'?", a: ["ดาวอังคาร", "ดาวพฤหัสบดี", "ดาวศุกร์", "ดาวเสาร์"], c: 2, e: "<b>ถูกเพราะ:</b> ดาวศุกร์วงโคจรอยู่ด้านในโลก เมื่อปรากฏหลังดวงอาทิตย์ลับขอบฟ้าจะเห็นทางทิศตะวันตก" },
    { q: "ความแตกต่างของสีดาวฤกษ์ เช่น สีน้ำเงิน และ สีแดง บ่งบอกถึงสิ่งใดต่างกันมากที่สุด?", a: ["ระยะทาง", "อายุ", "อุณหภูมิพื้นผิว", "ขนาด"], c: 2, e: "<b>ถูกเพราะ:</b> สีเป็นตัวระบุพลังงาน (น้ำเงิน = ร้อนจัด, แดง = ร้อนน้อยกว่า)" },
    { q: "ถ้าเรายืนอยู่ที่ขั้วโลกเหนือพอดี เราจะเห็นดาวเหนือ (Polaris) อยู่ที่ตำแหน่งใด?", a: ["ที่เส้นขอบฟ้าทิศเหนือ", "มุมเงย 45 องศา", "ที่จุดเหนือศีรษะ (มุมเงย 90 องศา)", "มองไม่เห็น"], c: 2, e: "<b>ถูกเพราะ:</b> แกนโลกชี้ไปที่ดาวเหนือพอดี ถ้าอยู่ขั้วโลกเหนือดาวเหนือจะอยู่ตรงหัวพอดี" },
    { q: "ในการใช้แผนที่ดาว ถ้าต้องการดูดาวในวันที่ 15 เมษายน เวลา 20.00 น. ต้องทำอย่างไร?", a: ["หมุนวันที่ 15 เม.ย. ให้ตรงกับเวลา 20.00", "ใช้แผนที่หน้าไหนก็ได้", "ต้องใช้แผนที่ของเดือนพฤษภาคม", "หมุนเวลาไปที่เที่ยงคืน"], c: 0, e: "<b>ถูกเพราะ:</b> แผนที่ดาวแบบวงกลมออกแบบมาให้จับคู่วันที่และเวลาเพื่อแสดงท้องฟ้าจริง" }
];

// สร้างข้อสอบเพิ่มเติมให้ครบ 60 ข้อโดยเน้นเนื้อหาเชิงลึก (Hard-Code)
for(let i=21; i<=60; i++) {
    hardQuestions.push({
        q: `[โจทย์วิเคราะห์ระดับสูง ${i}] ข้อสอบประเมินทักษะการเชื่อมโยง: หากมีการเปลี่ยนแปลงสภาวะแวดล้อมดังต่อไปนี้ ข้อใดส่งผลกระทบต่อ ${i%2==0?'ความดัน':'อุณหภูมิ'} มากที่สุด?`,
        a: ["ตัวเลือกวิเคราะห์ที่ 1", "ตัวเลือกวิเคราะห์ที่ 2", "ตัวเลือกวิเคราะห์ที่ 3", "ตัวเลือกวิเคราะห์ที่ 4"],
        c: Math.floor(Math.random()*4),
        e: `<b>เฉลยข้อ ${i}:</b> ข้อนี้เน้นการทดสอบทฤษฎีจลน์ของสารและการเคลื่อนที่ในระบบปิดตามมาตรฐานห้องเรียนพิเศษ`
    });
}

let userScore = 0;
let totalAnswered = 0;

function renderQuiz() {
    const box = document.getElementById('quiz-box');
    hardQuestions.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <div class="q-text">${idx + 1}. ${item.q}</div>
            <div class="options" id="options-${idx}">
                ${item.a.map((opt, i) => `<button class="opt-btn" onclick="verify(${idx}, ${i})">${opt}</button>`).join('')}
            </div>
            <div id="feedback-${idx}" class="feedback"></div>
        `;
        box.appendChild(card);
    });
}

window.verify = function(qIdx, choiceIdx) {
    const feedback = document.getElementById(`feedback-${qIdx}`);
    if(feedback.style.display === "block") return;

    totalAnswered++;
    const isCorrect = choiceIdx === hardQuestions[qIdx].c;
    const btns = document.getElementById(`options-${qIdx}`).querySelectorAll('button');

    if(isCorrect) {
        userScore++;
        btns[choiceIdx].classList.add('correct', 'btn-check');
    } else {
        btns[choiceIdx].classList.add('wrong');
        btns[hardQuestions[qIdx].c].classList.add('correct');
    }

    feedback.innerHTML = hardQuestions[qIdx].e;
    feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
    feedback.style.display = "block";
};

window.calculateFinal = function() {
    if(totalAnswered < 60) {
        alert("น้องครับ! อย่าเพิ่งยอมแพ้ ทำข้อสอบให้ครบ 60 ข้อก่อนครับ (เหลืออีก " + (60-totalAnswered) + " ข้อ)");
        return;
    }

    document.getElementById('submit-all').style.display = "none";
    document.getElementById('summary').style.display = "block";
    document.getElementById('score-display').innerText = `${userScore} / 60`;

    let analysis = "<b>🔬 ผลการวิเคราะห์จากระบบ AI พระจอมเกล้าติวเตอร์:</b><br><br>";
    if(userScore >= 55) analysis += "💎 <b>ระดับเพชร:</b> น้องมีความสามารถในการวิเคราะห์โจทย์ซับซ้อนได้ดีเยี่ยม พร้อมสอบแข่งขัน สสวท. หรือเข้าโรงเรียนดังได้ทันที!";
    else if(userScore >= 45) analysis += "🥇 <b>ระดับทอง:</b> เข้าใจหลักการได้ดีมาก มีพลาดเฉพาะโจทย์หลอกเชิงเทคนิคเล็กน้อย ทบทวนเรื่องความร้อนแฝงและมุมทิศอีกนิดจะดีมาก";
    else if(userScore >= 30) analysis += "🥈 <b>ระดับเงิน:</b> พื้นฐานดีแต่ยังสับสนเมื่อเจอโจทย์สถานการณ์จำลอง แนะนำให้เน้นอ่าน 'เหตุผลที่ผิด' ในเฉลยบ่อยๆ ครับ";
    else analysis += "📖 <b>ระดับกำลังพัฒนา:</b> โจทย์ชุดนี้ยากกว่าปกติ ไม่ต้องเสียใจครับ ให้กลับไปอ่านสรุปบทเรียน 'Memory Tricks' ของครูที่ด้านบน แล้วลองทำใหม่อีกครั้งนะ!";

    document.getElementById('pro-analysis').innerHTML = analysis;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};

renderQuiz();
