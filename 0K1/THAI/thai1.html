        onVoiceSpeak(activePage.audioText);

        stopVoice();
        if (storyIndex < STORY_PAGES.length - 1) {
          setStoryIndex(prev => prev + 1);
        }

        stopVoice();

          setStoryIndex(prev => prev - 1);
        }
      };

            <button

                <button
                  disabled={storyIndex === 0}
                  onClick={prevSlide}
                  className="px-4 py-2 border border-book-beige bg-white text-book-dark font-bold rounded-xl text-sm hover:bg-book-peach/20 disabled:opacity-40"
                >
                  ◀️ หน้าก่อนหน้า
                </button>
                <button
                  disabled={storyIndex === STORY_PAGES.length - 1}
                  onClick={nextSlide}
                  className="px-4 py-2 bg-brand-green text-white font-bold rounded-xl text-sm hover:bg-brand-green/95 disabled:opacity-40"
                >
                  หน้าถัดไป ▶️
                </button>
              </div>

          </div>
        </div>
      );
    }

    // --- ส่วนประกอบย่อย: เกมผ่าแบ่งแครอท (Interactive Sharing Game) ---
    function SharingGameSection({ onVoiceSpeak }) {
      const [slices, setSlices] = useState(1);
      const [recipientCount, setRecipientCount] = useState(0);
      const [friends, setFriends] = useState([
        { id: 'turtle', name: 'คุณเต่าต้วมเตี้ยม 🐢', hasCarrot: false, delayText: "พยักหน้าอย่างช้าๆ แสนสุภาพ" },
        { id: 'bird', name: 'นกน้อยเสียงใส 🐦', hasCarrot: false, delayText: "สยายปีกบินมารับอย่างร่าเริง" },
        { id: 'mouse', name: 'เจ้าหนูขี้อาย 🐭', hasCarrot: false, delayText: "แอบโผล่หน้ายิ้มแก้มป่องด้วยความดีใจ" },
        { id: 'pui', name: 'เจ้าปุย (แบ่งกินเอง) 🐰', hasCarrot: false, delayText: "เคี้ยวแครอทกรุบๆ อย่างเอร็ดอร่อย" }
      ]);

      const [gameCompleted, setGameCompleted] = useState(false);

      const handleSlice = () => {
        if (slices < 4) {
          const nextSlice = slices + 1;
          setSlices(nextSlice);
          onVoiceSpeak(`ผ่าแครอทครั้งที่ ${nextSlice - 1}! ตอนนี้เรามีแครอททั้งหมด ${nextSlice} ชิ้นเท่าๆ กันแล้วจ้า!`);
        }
      };

      const giveCarrotToFriend = (index) => {
        if (slices <= recipientCount) {
          onVoiceSpeak("อุ๊ย! ชิ้นแครอทไม่พอแล้วจ้าคุณหนู ต้องกดปุ่มสีส้มเพื่อผ่าแครอทเพิ่มก่อนนะ!");
          return;
        }
        if (friends[index].hasCarrot) return;

        const updated = [...friends];
        updated[index].hasCarrot = true;
        setFriends(updated);
        
        const nextRecipients = recipientCount + 1;
        setRecipientCount(nextRecipients);
        onVoiceSpeak(`เย้ มอบแครอทให้ ${updated[index].name} เรียบร้อยแล้ว! เขากำลัง ${updated[index].delayText}`);

        if (nextRecipients === 4) {
          setGameCompleted(true);
          setTimeout(() => {
            onVoiceSpeak("ยอดเยี่ยมที่สุดในสามโลกเลยจ้า! ทุกคนได้รับแครอทวิเศษคนละหนึ่งชิ้นเท่าๆ กันพอดีเลย พลังมิตรภาพจงเจริญ!");
          }, 3000);
        }
      };

      const resetGame = () => {
        setSlices(1);
        setRecipientCount(0);
        setFriends(friends.map(f => ({ ...f, hasCarrot: false })));
        setGameCompleted(false);
        onVoiceSpeak("มาเริ่มต้นผ่าและแบ่งแครอทวิเศษแสนอร่อยกันใหม่อีกครั้งนะจ๊ะเด็กๆ!");
      };

      return (
        <div id="sharing-game-section" className="bg-white rounded-3xl border border-book-beige p-5 md:p-8 shadow-lg max-w-4xl mx-auto my-8">
          <div className="border-b border-book-beige pb-3 mb-5">
            <h3 className="font-kids text-xl md:text-2xl text-book-dark flex items-center gap-2">
              🔪 เกมผ่าและแบ่งปันแครอทแสนสนุก! 🥕
              <span className="text-xs bg-brand-orange text-white px-2.5 py-0.5 rounded-full">ฝึกแบ่งปัน</span>
            </h3>
            <p className="text-sm text-book-text font-medium mt-1">มาช่วยเจ้าปุยใช้ฟันคู่เล็กๆ ค่อยๆ ตัดแครอทยักษ์ออกเป็น 4 ชิ้น แล้วแจกเพื่อนๆ ที่กำลังหิวกันเถอะ!</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            {/* ฝั่งซ้าย: แครอทที่ผ่า */}
            <div className="bg-book-bg rounded-2xl p-5 border border-book-beige text-center space-y-4">
              <h4 className="font-kids text-base text-book-dark">แครอทวิเศษในมือน้องๆ:</h4>
              
              <div className="flex justify-center items-center gap-3 py-4 bg-white rounded-2xl border-2 border-book-beige/60 shadow-inner">
                {Array.from({ length: slices }).map((_, i) => (
                  <div key={i} className="animate-bounce" style={{ animationDelay: `${i * 100}ms` }}>
                    <svg viewBox="0 0 60 80" className="w-12 h-16">
                      <path d="M10,10 L50,10 L30,70 Z" fill="#FF9800" stroke="#E65100" strokeWidth="2" />
                      <path d="M30,10 Q20,-5 15,0" stroke="#4CAF50" strokeWidth="3" fill="none" />
                      <path d="M30,10 Q40,-5 45,0" stroke="#4CAF50" strokeWidth="3" fill="none" />
                    </svg>
                    <span className="text-xs font-bold text-brand-orange font-kids">ส่วนที่ {i + 1}</span>
                  </div>
                ))}
              </div>

              <div className="flex justify-center gap-3">
                <button
                  disabled={slices >= 4}
                  onClick={handleSlice}
                  className="px-5 py-3 bg-brand-orange hover:bg-brand-orange/95 text-white font-extrabold rounded-2xl text-sm transition-all active:scale-95 disabled:opacity-40"
                >
                  {slices < 4 ? `🔪 กดเพื่อผ่าแครอท (${slices}/4)` : '✨ ผ่าครบ 4 ชิ้นแล้วจ้า!'}
                </button>
                <button
                  onClick={resetGame}
                  className="px-4 py-2 border-2 border-book-beige bg-white text-book-dark font-bold rounded-2xl text-xs hover:bg-book-peach/20"
                >
                  🔄 เริ่มใหม่
                </button>
              </div>
            </div>

            {/* ฝั่งขวา: รายชื่อเพื่อนๆ ที่หิวโหย */}
            <div className="space-y-4">
              <div className="text-sm font-bold text-book-text flex justify-between items-center bg-book-peach/40 px-3 py-1.5 rounded-lg border border-book-beige/50">
                <span>มีแครอทพร้อมแจก: {slices - recipientCount} ชิ้น</span>
                <span>แจกไปแล้ว: {recipientCount}/4 สหาย</span>
              </div>

              <div className="grid grid-cols-1 gap-3">
                {friends.map((friend, idx) => (
                  <button
                    key={friend.id}
                    disabled={friend.hasCarrot}
                    onClick={() => giveCarrotToFriend(idx)}
                    className={`w-full p-3.5 rounded-2xl border-2 font-kids text-base flex items-center justify-between transition-all active:scale-[0.99] ${
                      friend.hasCarrot
                        ? 'bg-emerald-50 border-emerald-300 text-emerald-800 opacity-80'
                        : 'bg-white border-book-beige hover:border-brand-green hover:bg-book-peach/10 cursor-pointer'
                    }`}
                  >
                    <span className="flex items-center gap-2">
                      <span className="w-8 h-8 rounded-full bg-book-peach/50 flex items-center justify-center text-sm border">
                        {idx + 1}
                      </span>
                      {friend.name}
                    </span>
                    <span>
                      {friend.hasCarrot ? '💝 ได้กินแฮปปี้แล้วจ้า!' : '👉 กดเพื่อมอบให้'}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {gameCompleted && (
            <div className="bg-emerald-50 border-2 border-emerald-200 rounded-3xl p-6 text-center mt-6 animate-pulse">
              <h4 className="font-kids text-xl text-emerald-800 font-extrabold">🏆 ยินดีด้วยจ้าคนเก่ง! เจ้ากระต่ายแบ่งปันวิเศษ</h4>
              <p className="text-base text-emerald-700 font-medium mt-1">หนูใจดีที่สุดเลยจ้า ช่วยแบ่งปันแครอทได้อย่างทั่วถึง คืนความสุขให้กับป่าทั้งผืนเรียบร้อยแล้วนะจ๊ะ! 🥕🐢🐦🐭🐰</p>
            </div>
          )}
        </div>
      );
    }

    // --- ส่วนประกอบหลักของแอปพลิเคชัน (Main App Component) ---
    function App() {
      const [currentIdx, setCurrentIdx] = useState(0);
      const [answers, setAnswers] = useState(Array(QUIZ_QUESTIONS.length).fill(null));
      const [isFinished, setIsFinished] = useState(false);
      
      const [isPlayingTTS, setIsPlayingTTS] = useState(false);
      const [selectedVoicePitch, setSelectedVoicePitch] = useState(1.0); // ปรับระดับคีย์เสียงเด็ก/ผู้ใหญ่
      const [selectedVoiceRate, setSelectedVoiceRate] = useState(0.95);  // ปรับความเร็วในการพูด

      const currentQuestion = QUIZ_QUESTIONS[currentIdx];
      const currentAnswer = answers[currentIdx];
      const hasAnsweredCurrent = currentAnswer !== null;

      // คำนวณคะแนนปัจจุบัน
      const score = answers.reduce((acc, ans, idx) => {
        return ans === QUIZ_QUESTIONS[idx].correctIndex ? acc + 1 : acc;
      }, 0);

      // ฟังก์ชันหยุดพูด
      const stopVoice = () => {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
        setIsPlayingTTS(false);
      };

      // ฟังก์ชันออกเสียงภาษาไทยหลักด้วย Web Speech API (ไม่มีการโทรไป API ภายนอก ทำงานได้ออฟไลน์!)
      const speakText = (textToSpeak) => {
        const cleanedText = cleanTextForSpeech(textToSpeak);
        const hasSpeech = "speechSynthesis" in window;
        if (hasSpeech) {
          try {
            stopVoice();
            setIsPlayingTTS(true);
            const utterance = new SpeechSynthesisUtterance(cleanedText);
            utterance.lang = "th-TH";
            
            // พยายามค้นหาเสียงภาษาไทยที่ใกล้เคียงที่สุด
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.startsWith("th") || v.lang.includes("TH"));
            if (thaiVoice) {
              utterance.voice = thaiVoice;
            }
            
            utterance.rate = selectedVoiceRate;
            utterance.pitch = selectedVoicePitch;
            
            utterance.onend = () => {
              setIsPlayingTTS(false);
            };
            
            utterance.onerror = () => {
              setIsPlayingTTS(false);
            };
            
            window.speechSynthesis.speak(utterance);
          } catch (speechErr) {
            console.warn("Speech synthesis error:", speechErr);
            setIsPlayingTTS(false);
          }
        } else {
          alert("ขออภัยจ้า เบราว์เซอร์นี้ไม่รองรับระบบเสียงพูดภาษาไทย");
        }
      };

      // เมื่อเปลี่ยนคำถาม ให้อ่านโจทย์โดยอัตโนมัติ (หากหน้าคำถามนั้นยังไม่ได้ตอบ)
      useEffect(() => {
        if (isFinished) return;
        
        const timer = setTimeout(() => {
          if (answers[currentIdx] === null) {
            const fullQuestionSpeech = `${currentQuestion.voiceText}. ตัวเลือกมีดังนี้. ${currentQuestion.options.map((opt, i) => `ตัวเลือก ${String.fromCharCode(65 + i)}: ${opt}`).join(". . ")}`;
            speakText(fullQuestionSpeech);
          } else {
            const isCorrect = answers[currentIdx] === currentQuestion.correctIndex;
            const resultPrefix = isCorrect 
              ? "ข้อนี้หนูตอบถูกแล้วจ้า เก่งมากๆ เลย มาฟังคำอธิบายเฉลยกันอีกรอบนะ" 
              : "ข้อนี้คำตอบยังไม่ถูกนะจ๊ะคนดี มาลองฟังคำเฉลยแก้ตัวกันเลย";
            speakText(`${resultPrefix}. ${currentQuestion.explanationVoiceText}`);
          }
        }, 800);

        return () => {
          clearTimeout(timer);
          stopVoice();
        };
      }, [currentIdx, isFinished]);

      // รองรับการโหลดเสียงพูดภาษาไทยตอนหน้าเว็บพร้อม
      useEffect(() => {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.getVoices();
        }
      }, []);

      const handleSelectOption = (optionIdx) => {
        if (hasAnsweredCurrent) return; // ห้ามเปลี่ยนคำตอบซ้ำ
        
        const newAnswers = [...answers];
        newAnswers[currentIdx] = optionIdx;
        setAnswers(newAnswers);

        const isCorrect = optionIdx === currentQuestion.correctIndex;
        if (isCorrect) {
          speakText(`ถูกต้องคร้าบคุณหนูเก่งมาก! ${currentQuestion.explanationVoiceText}`);
        } else {
          speakText(`คำตอบนี้ยังไม่ถูกนะจ๊ะคนเก่ง ลองฟังเฉลยกันเถอะ... ${currentQuestion.explanationVoiceText}`);
        }
      };

      const handleNextQuestion = () => {
        stopVoice();
        if (currentIdx < QUIZ_QUESTIONS.length - 1) {
          setCurrentIdx(prev => prev + 1);
        }
      };

      const handlePrevQuestion = () => {
        stopVoice();
        if (currentIdx > 0) {
          setCurrentIdx(prev => prev - 1);
        }
      };

      const handleShowSummary = () => {
        stopVoice();
        setIsFinished(true);
        const finalMsg = score >= 8 
          ? `เย้! คุณหนูตอบถูกทั้งหมด ${score} ข้อเลยจ้า! เก่งที่สุดในสามโลกเลย เป็นสุดยอดราชาจับใจความคนเก่งจริงๆ!` 
          : score >= 5 
          ? `เก่งมากเลยจ้าคนเก่ง! ตอบถูกทั้งหมด ${score} ข้อแหนะ ลองกลับไปทบทวนเพื่อคว้าคะแนนเต็มสิบกันนะจ๊ะ!` 
          : `เก่งมากจ้าที่ตั้งใจเล่นจนจบ! ตอบถูกทั้งหมด ${score} ข้อจ้า ลองกลับไปฟังนิทานใหม่อีกสักรอบเพื่อคะแนนเต็มสิบนะจ๊ะ!`;
        speakText(finalMsg);
      };

      const handleRestart = () => {
        stopVoice();
        setCurrentIdx(0);
        setAnswers(Array(QUIZ_QUESTIONS.length).fill(null));
        setIsFinished(false);
      };

      const getScoreBadge = () => {
        if (score === 10) return { text: "🏆 มหาเสนาธิการกระต่ายวิเศษ!", color: "bg-amber-100 text-amber-700 border-amber-300", emoji: "👑" };
        if (score >= 7) return { text: "🌟 อัศวินหูยาวจับใจความยอดเยี่ยม!", color: "bg-blue-100 text-blue-700 border-blue-300", emoji: "⭐" };
        if (score >= 4) return { text: "🎈 หน่วยสำรวจสวนผักจอมขยัน!", color: "bg-emerald-100 text-emerald-700 border-emerald-300", emoji: "🌱" };
        return { text: "🎈 นักผจญภัยกระต่ายแสนน่ารัก!", color: "bg-orange-100 text-orange-700 border-orange-300", emoji: "🐰" };
      };

      const allQuestionsAnswered = answers.every(ans => ans !== null);

      return (
        <div className="max-w-5xl mx-auto space-y-6">
          
          {/* แผงหัวกระดาษแสนสวย */}
          <header className="text-center py-6 bg-white rounded-3xl border border-book-beige shadow-sm max-w-4xl mx-auto">
            <h1 className="font-kids text-3xl md:text-4xl text-brand-orange font-extrabold flex items-center justify-center gap-2">
              🐰 เจ้าปุยกับการผจญภัยแครอทวิเศษ 🥕
            </h1>
            <p className="text-base text-book-text font-bold mt-2">
              หนังสือนิทานโต้ตอบ สื่อการสอนพัฒนาทักษะการฟังและการแบ่งปันสำหรับคุณหนูๆ
            </p>
          </header>

          {/* แผงควบคุมความเร็ว / คีย์เสียงพูดภาษาไทย */}
          <div className="bg-white rounded-2xl border border-book-beige p-4 max-w-4xl mx-auto flex flex-col sm:flex-row gap-4 justify-between items-center text-sm font-bold text-book-dark shadow-xs">
            <div className="flex items-center gap-2">
              <span>🔊 ระบบปรับระดับเสียงพูดวิเศษ:</span>
              <button 
                onClick={() => { setSelectedVoicePitch(1.3); onVoiceSpeak && speakText("ทดสอบเสียงเด็กเล็กแสนร่าเริงจ้า"); }}
                className={`px-3 py-1.5 rounded-lg border text-xs ${selectedVoicePitch > 1.1 ? 'bg-brand-orange text-white' : 'bg-white hover:bg-gray-50'}`}
              >
                👧 เสียงเด็กเล็ก (Pitch สูง)
              </button>
              <button 
                onClick={() => { setSelectedVoicePitch(0.9); onVoiceSpeak && speakText("ทดสอบเสียงคุณครูใจดีจ้า"); }}
                className={`px-3 py-1.5 rounded-lg border text-xs ${selectedVoicePitch < 1.1 ? 'bg-brand-orange text-white' : 'bg-white hover:bg-gray-50'}`}
              >
                👩 เสียงคุณครูใจดี (Pitch กลาง)
              </button>
            </div>
            
            <div className="flex items-center gap-2">
              <span>⏱️ ความเร็วการพูด:</span>
              <button 
                onClick={() => { setSelectedVoiceRate(0.8); }}
                className={`px-3 py-1.5 rounded-lg border text-xs ${selectedVoiceRate === 0.8 ? 'bg-brand-orange text-white' : 'bg-white hover:bg-gray-50'}`}
              >
                🐌 พูดช้าๆ (สำหรับเด็กเล็ก)
              </button>
              <button 
                onClick={() => { setSelectedVoiceRate(1.0); }}
                className={`px-3 py-1.5 rounded-lg border text-xs ${selectedVoiceRate === 1.0 ? 'bg-brand-orange text-white' : 'bg-white hover:bg-gray-50'}`}
              >
                🐰 ความเร็วปกติ
              </button>
            </div>
          </div>

          {/* ส่วนที่ 1: หนังสือนิทานภาพประกอบ */}
          <StorybookSection 
            onVoiceSpeak={speakText} 
            isVoicePlaying={isPlayingTTS} 
            stopVoice={stopVoice} 
          />

          {/* ส่วนที่ 2: แบบฝึกหัดโต้ตอบ 10 ข้อ */}
          <div id="comprehension-quiz-section" className="bg-white rounded-3xl border border-book-beige p-5 md:p-8 shadow-xl max-w-4xl mx-auto my-8">
            {/* ส่วนหัวกระดาษแบบฝึกหัด */}
            <div className="flex flex-col md:flex-row md:items-center justify-between border-b-2 border-book-beige pb-4 mb-6 gap-4">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 bg-brand-orange/20 rounded-xl flex items-center justify-center text-brand-orange text-2xl font-bold font-kids">
                  📝
                </div>
                <div>
                  <h3 className="text-xl md:text-2xl font-extrabold text-book-dark font-kids flex items-center gap-2">
                    แบบฝึกหัดถามตอบ 10 ข้อ 
                    <span className="text-xs px-2 py-0.5 bg-brand-orange text-white rounded-full">ทดสอบความเข้าใจ</span>
                  </h3>
                  <p className="text-xs text-book-text font-medium">หนูๆ สามารถกดที่ตัวเลือก และกดปุ่มย้อนกลับหรือข้ามข้อเพื่อฟังเสียงและฝึกฝนซ้ำได้ตามต้องการเลยจ้า!</p>
                </div>
              </div>

              {!isFinished && (
                <div className="flex items-center gap-2">
                  {isPlayingTTS ? (
                    <button 
                      onClick={stopVoice} 
                      className="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-xl font-bold text-xs border border-red-200 transition-all shadow-xs active:scale-95"
                    >
                      ⏹️ หยุดเล่นเสียง
                    </button>
                  ) : (
                    <div className="flex gap-2">
                      <button 
                        onClick={() => {
                          const fullSpeech = `${currentQuestion.voiceText}. ตัวเลือกมีดังนี้. ${currentQuestion.options.map((opt, i) => `ตัวเลือก ${String.fromCharCode(65 + i)}: ${opt}`).join(". . ")}`;
                          speakText(fullSpeech);
                        }}
                        className="px-4 py-2 bg-brand-orange text-white hover:bg-brand-orange/90 rounded-xl font-bold text-xs flex items-center gap-1.5 transition-all shadow-xs active:scale-95"
                      >
                        🔊 ฟังโจทย์และตัวเลือก
                      </button>
                      {hasAnsweredCurrent && (
                        <button 
                          onClick={() => speakText(currentQuestion.explanationVoiceText)}
                          className="px-4 py-2 bg-emerald-100 text-emerald-800 border border-emerald-200 rounded-xl font-bold text-xs flex items-center gap-1 transition-all"
                        >
                          🔊 ฟังเฉลยซ้ำ
                        </button>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* แผนที่เดินทางทำโจทย์ 1-10 ข้อ (กดสลับข้อได้อย่างอิสระ!) */}
            {!isFinished && (
              <div className="bg-book-bg rounded-2xl p-4 border border-book-beige mb-6">
                <div className="text-xs font-bold text-book-text mb-2 text-center md:text-left">
                  🗺️ แผนที่ข้อสอบ (กดเลือกข้อใดข้อหนึ่งเพื่อย้อนกลับมาทบทวนหรือเรียนรู้ซ้ำได้เลยจ้า):
                </div>
                <div className="flex flex-wrap items-center justify-center gap-2">
                  {QUIZ_QUESTIONS.map((q, idx) => {
                    const isCurrent = idx === currentIdx;
                    const ans = answers[idx];
                    const isCorrect = ans === q.correctIndex;
                    
                    let btnStyle = "bg-white border-book-beige text-book-dark hover:bg-book-peach/30";
                    let badge = "";
                    
                    if (ans !== null) {
                      if (isCorrect) {
                        btnStyle = "bg-emerald-500 border-emerald-600 text-white";
                        badge = "✅";
                      } else {
                        btnStyle = "bg-rose-500 border-rose-600 text-white";
                        badge = "❌";
                      }
                    }
                    
                    if (isCurrent) {
                      btnStyle += " ring-4 ring-brand-orange/40 scale-110 font-bold border-brand-orange";
                    }
                    
                    return (
                      <button
                        key={idx}
                        onClick={() => {
                          stopVoice();
                          setCurrentIdx(idx);
                        }}
                        className={`w-10 h-10 rounded-full border-2 font-kids text-sm flex items-center justify-center relative transition-all ${btnStyle}`}
                      >
                        <span>{idx + 1}</span>
                        {badge && (
                          <span className="absolute -bottom-1 -right-1 text-[9px] bg-white rounded-full w-4.5 h-4.5 flex items-center justify-center shadow-xs border">
                            {badge}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {!isFinished ? (
              <div className="space-y-6">
                {/* ความคืบหน้าข้อปัจจุบัน */}
                <div className="flex items-center justify-between text-xs font-bold text-book-text">
                  <span>ข้อที่ {currentIdx + 1} จาก {QUIZ_QUESTIONS.length} ข้อ</span>
                  <span className="bg-book-peach px-2.5 py-1 rounded-full text-brand-orange">คะแนนสะสม: {score} ⭐</span>
                </div>

                {/* แถบสีแสดงสัดส่วนคะแนนสะสม */}
                <div className="w-full bg-book-peach/50 h-3 rounded-full overflow-hidden border border-book-beige">
                  <div 
                    className="bg-brand-orange h-full rounded-full transition-all duration-300"
                    style={{ width: `${((currentIdx + 1) / QUIZ_QUESTIONS.length) * 100}%` }}
                  />
                </div>

                {/* บล็อกหัวคำถาม */}
                <div className="bg-book-bg rounded-2xl border border-book-beige p-5 text-center space-y-3 relative overflow-hidden">
                  <div className="w-10 h-10 bg-white rounded-full border-2 border-book-beige mx-auto flex items-center justify-center text-lg shadow-inner">
                    ❓
                  </div>
                  <h4 className="text-lg md:text-xl font-extrabold text-book-dark font-kids leading-snug">
                    {currentQuestion.question}
                  </h4>
                  <button
                    onClick={() => {
                      const fullSpeech = `${currentQuestion.voiceText}. ตัวเลือกมีดังนี้. ${currentQuestion.options.map((opt, i) => `ตัวเลือก ${String.fromCharCode(65 + i)}: ${opt}`).join(". . ")}`;
                      speakText(fullSpeech);
                    }}
                    className="inline-flex items-center gap-1 text-xs bg-white border border-book-beige hover:bg-book-peach/20 px-3 py-1 rounded-full text-book-dark font-bold transition-all"
                  >
                    🔊 กดที่นี่เพื่ออ่านคำถามอีกครั้ง
                  </button>
                </div>

                {/* บล็อกตัวเลือกคำตอบ 4 ข้อ */}
                <div className="grid grid-cols-1 gap-3">
                  {currentQuestion.options.map((option, idx) => {
                    let cardStyle = "bg-white border-2 border-book-beige hover:border-brand-orange hover:bg-book-peach/10";
                    let statusIcon = null;

                    if (hasAnsweredCurrent) {
                      if (idx === currentQuestion.correctIndex) {
                        cardStyle = "bg-emerald-50 border-emerald-400 text-emerald-900 font-bold ring-2 ring-emerald-400/20";
                        statusIcon = <span className="text-emerald-500 font-bold">✔️ ถูกต้องจ้า</span>;
                      } else if (idx === currentAnswer) {
                        cardStyle = "bg-rose-50 border-rose-400 text-rose-900 ring-2 ring-rose-400/20";
                        statusIcon = <span className="text-rose-500 font-bold">❌ ยังไม่ถูกน้า</span>;
                      } else {
                        cardStyle = "bg-white border-book-beige/60 opacity-60";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        disabled={hasAnsweredCurrent}
                        onClick={() => handleSelectOption(idx)}
                        className={`w-full text-left p-3.5 rounded-2xl flex items-center justify-between gap-4 transition-all font-sans font-bold text-base cursor-pointer ${cardStyle}`}
                      >
                        <div className="flex items-center gap-3">
                          <span className="w-8 h-8 rounded-full bg-book-peach/50 text-brand-orange font-extrabold text-sm flex items-center justify-center border border-book-beige">
                            {String.fromCharCode(65 + idx)}
                          </span>
                          <span>{option}</span>
                        </div>
                        {statusIcon}
                      </button>
                    );
                  })}
                </div>

                {/* บล็อกคำอธิบายเฉลยหลังจากตอบคำถามแล้ว */}
                {hasAnsweredCurrent && (
                  <div className={`p-5 rounded-2xl border-2 space-y-3 ${
                    currentAnswer === currentQuestion.correctIndex
                      ? 'bg-emerald-50/50 border-emerald-200 text-emerald-900'
                      : 'bg-rose-50/50 border-rose-200 text-rose-900'
                  }`}>
                    <div className="flex items-center justify-between font-bold font-kids text-base">
                      <span>{currentAnswer === currentQuestion.correctIndex ? "🎉 เก่งมากเลยคนดี!" : "💡 ลองฟังและเรียนรู้เฉลยกันจ้า"}</span>
                      <button 
                        onClick={() => speakText(currentQuestion.explanationVoiceText)}
                        className="px-2.5 py-1.5 bg-white border border-book-beige hover:bg-gray-50 text-xs rounded-lg flex items-center gap-1 shadow-xs"
                      >
                        🔊 ฟังเสียงอธิบาย
                      </button>
                    </div>
                    <p className="text-base leading-relaxed font-sans">{currentQuestion.explanation}</p>
                    
                    <div className="flex justify-end pt-2">
                      {currentIdx < QUIZ_QUESTIONS.length - 1 ? (
                        <button
                          onClick={handleNextQuestion}
                          className="sparkle-btn text-white px-5 py-2 rounded-xl font-bold flex items-center gap-1"
                        >
                          <span>ทำข้อต่อไป</span> ➡️
                        </button>
                      ) : (
                        allQuestionsAnswered && (
                          <button
                            onClick={handleShowSummary}
                            className="px-5 py-2.5 bg-amber-500 hover:bg-amber-600 text-white font-extrabold rounded-xl text-base shadow-md border border-amber-400"
                          >
                            🏅 ดูคะแนนสรุปยอดกระต่ายนักจำ 🎉
                          </button>
                        )
                      )}
                    </div>
                  </div>
                )}

                {/* ตัวควบควบคุม ย้อนกลับ/ถัดไป ด้านล่างเพื่ออำนวยความสะดวกให้เด็กๆ เลื่อนดูข้อสอบได้อย่างอิสระ */}
                <div className="flex items-center justify-between border-t border-book-beige pt-4 mt-3">
                  <button
                    disabled={currentIdx === 0}
                    onClick={handlePrevQuestion}
                    className="px-4 py-2 border-2 border-book-beige bg-white text-book-dark font-bold rounded-xl text-xs hover:bg-book-peach/20 disabled:opacity-40"
                  >
                    ◀️ ย้อนข้อก่อนหน้า
                  </button>
                  <button
                    disabled={currentIdx === QUIZ_QUESTIONS.length - 1}
                    onClick={handleNextQuestion}
                    className="px-4 py-2 border-2 border-book-beige bg-white text-book-dark font-bold rounded-xl text-xs hover:bg-book-peach/20 disabled:opacity-40"
                  >
                    ข้ามไปข้อถัดไป ▶️
                  </button>
                </div>

                {allQuestionsAnswered && (
                  <div className="flex justify-center pt-4">
                    <button
                      onClick={handleShowSummary}
                      className="px-6 py-3 bg-amber-500 hover:bg-amber-600 text-white font-extrabold rounded-2xl flex items-center gap-2 text-base shadow-lg animate-pulse"
                    >
                      🏆 ตอบครบทุกข้อแล้ว! กดสรุปคะแนนเกียรติยศกันจ้า ({score}/10)
                    </button>
                  </div>
                )}
              </div>
            ) : (
              /* หน้าแสดงใบบันทึกคะแนนผลสัมฤทธิ์อย่างวิเศษ */
              <div className="text-center py-6 space-y-6">
                <div className="text-6xl animate-bounce">🏆</div>
                <div className="space-y-2">
                  <h4 className="text-2xl md:text-3xl font-extrabold text-book-dark font-kids">
                    {score === 10 ? "ว้าว! มหาเสนาธิการกระต่ายแสนรอบรู้!" : "เก่งและมีความตั้งใจมากเลยจ้า!"}
                  </h4>
                  <p className="text-base text-book-text font-medium max-w-lg mx-auto leading-relaxed">
                    {score === 10 
                      ? "หนูจับใจความรายละเอียดนิทานเรื่องแครอทวิเศษของเจ้าปุยได้สมบูรณ์แบบ 100% เต็มสิบเต็มล้านเลยจ้า ผองเพื่อนสัตว์ป่าภูมิใจในตัวหนูที่สุดเลย!"
                      : `หนูทำคะแนนได้ดีเยี่ยมถึง ${score} ข้อจากทั้งหมด 10 ข้อจ้า! ได้เรียนรู้สาระสำคัญเรื่องความมีน้ำใจและการแบ่งปันเรียบร้อยแล้วนะจ๊ะ`}
                  </p>
                </div>

                {/* บัตรคะแนนเกียรติยศบันทึกผลการเรียนรู้ */}
                <div className="bg-book-bg rounded-3xl border-2 border-book-beige max-w-md mx-auto p-5 space-y-4 shadow-inner">
                  <div className="text-xs font-bold text-book-text uppercase tracking-wider">บันทึกประวัติการพัฒนาทักษะจับใจความ</div>
                  <div className="text-5xl font-extrabold font-kids text-brand-orange">
                    {score} <span className="text-xl text-book-text font-medium">/ 10 คะแนนเต็ม</span>
                  </div>
                  <div className={`px-4 py-2 border-2 rounded-xl font-bold font-kids inline-block ${getScoreBadge().color}`}>
                    {getScoreBadge().emoji} {getScoreBadge().text}
                  </div>
                </div>

                {/* ปุ่มควบคุมหลังเล่นเสร็จ */}
                <div className="flex gap-4 justify-center max-w-sm mx-auto">
                  <button
                    onClick={handleRestart}
                    className="px-5 py-3 border-2 border-book-beige bg-white text-book-dark font-bold rounded-xl flex items-center justify-center gap-1 shadow-sm flex-1"
                  >
                    🔄 ลองเล่นใหม่อีกครั้ง
                  </button>
                  <button
                    onClick={() => {
                      const el = document.getElementById("sharing-game-section");
                      if (el) el.scrollIntoView({ behavior: 'smooth' });
                    }}
                    className="px-5 py-3 bg-brand-green text-white font-extrabold rounded-xl flex items-center justify-center gap-1 shadow-sm flex-1 hover:bg-brand-green/90"
                  >
                    ⭐ ไปฝึกสไลซ์แบ่งแครอท
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* ส่วนที่ 3: เกมสไลซ์แครอท */}
          <SharingGameSection onVoiceSpeak={speakText} />

          {/* แท่นท้ายเว็บแสนอบอุ่น */}
          <footer className="text-center py-6 text-xs text-book-text/70 font-bold max-w-lg mx-auto border-t border-book-beige/60">
            <p>เจ้ากระต่ายน้อยกับแครอทวิเศษ | พัฒนาในรูปแบบ Single HTML สะดวกสำหรับเด็กปฐมวัย</p>
            <p className="mt-1">© 2026 เรื่องเล่าหรรษาและการแบ่งปันทางเทคโนโลยีที่เข้าถึงได้ออฟไลน์</p>
          </footer>
        </div>
      );
    }

    // เรนเดอร์คอมโพเนนต์เข้าหน้าเว็บหลัก
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
