<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Content Engine | KING MONGKUT TUTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-['Kanit'] min-h-screen">

    <nav class="p-6 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter text-rose-500">AFFILIATE CONTENT ENGINE</h1>
            <button onclick="window.location.reload()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl text-xs font-bold transition-all">
                🔄 สุ่มสินค้าใหม่
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        <div id="content-output" class="space-y-8">
            <div class="text-center py-20 animate-pulse text-slate-500">กำลังดึงข้อมูลจาก Library...</div>
        </div>
    </main>

    <script>
        function generateContent() {
            if (typeof shopeeLibrary === 'undefined' || shopeeLibrary.length === 0) {
                document.getElementById('content-output').innerHTML = "❌ ไม่พบข้อมูลใน library.js";
                return;
            }

            // สุ่มสินค้ามา 1 ชิ้น
            const item = shopeeLibrary[Math.floor(Math.random() * shopeeLibrary.length)];
            
            const container = document.getElementById('content-output');
            container.innerHTML = `
                <div class="bg-white text-slate-900 p-6 rounded-[2.5rem] shadow-2xl overflow-hidden relative">
                    <div class="absolute top-4 right-6 bg-rose-500 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">${item.cat}</div>
                    <h2 class="text-2xl font-black italic leading-tight pr-10">${item.name}</h2>
                    <p class="text-slate-500 mt-2 font-medium">${item.highlight}</p>
                    <a href="${item.link}" target="_blank" class="mt-4 inline-block text-rose-600 font-bold underline">Link สินค้าจริง &rarr;</a>
                </div>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <h3 class="text-blue-400 font-black text-xs uppercase tracking-widest mb-4">🎥 AI Video Prompt (6 Seconds / 9:16)</h3>
                    <div class="bg-black/40 p-4 rounded-2xl text-sm font-mono text-emerald-400 leading-relaxed select-all">
                        Cinematic 4K ultra-realistic vertical 9:16, close-up shot of ${item.name}, ${item.highlight}, professional studio lighting, soft bokeh background, high-speed camera movement, 6-second dynamic shot, sharp details, vibrant colors.
                    </div>
                </div>

                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <h3 class="text-purple-400 font-black text-xs uppercase tracking-widest mb-4">✍️ English Caption</h3>
                    <div class="bg-black/40 p-4 rounded-2xl text-sm font-medium text-white leading-relaxed select-all">
                        Don't miss out! 🚀 Get your ${item.name} today. Best quality for your lifestyle. ✨ <br><br>
                        #MustHave #ShopeeFinds #QualityProducts #Trending #Affiliate
                    </div>
                </div>

                <div class="bg-rose-500/10 p-6 rounded-3xl border border-rose-500/30">
                    <h3 class="text-rose-500 font-black text-xs uppercase tracking-widest mb-4">🎙️ Thai Voice Over (SSML)</h3>
                    <div class="bg-black/40 p-4 rounded-2xl text-sm font-medium text-rose-100 leading-relaxed">
                        &lt;speak&gt;<br>
                        &lt;prosody rate="2.9"&gt;
                        ${item.name} <break time="1ms"/> ${item.highlight} <break time="1ms"/> สินค้าดีที่ต้องมี <break time="1ms"/> กดสั่งซื้อที่ตะกร้าหรือลิงก์ในคอมเมนต์ได้เลยครับ
                        &lt;/prosody&gt;<br>
                        &lt;/speak&gt;
                    </div>
                </div>
            `;
        }

        window.onload = generateContent;
    </script>
</body>
</html>
