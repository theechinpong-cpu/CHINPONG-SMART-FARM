<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Unified Prompt Engine | KING MONGKUT TUTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
</head>
<body class="bg-[#0f1419] text-slate-100 font-['Kanit'] min-h-screen">

    <nav class="p-6 border-b border-slate-800 bg-[#0f1419]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter text-emerald-400">GROK UNIFIED PROMPT ENGINE</h1>
            <button onclick="generateContent()" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-full text-sm font-bold transition-all shadow-lg shadow-emerald-600/20">
                🔄 สุ่มสินค้า & สร้าง Unified Prompt
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        <div id="content-output" class="space-y-8">
            </div>
    </main>

    <script>
        function generateContent() {
            if (typeof shopeeLibrary === 'undefined' || shopeeLibrary.length === 0) {
                document.getElementById('content-output').innerHTML = "<p class='text-center text-rose-500'>❌ ไม่พบข้อมูลใน library.js</p>";
                return;
            }

            const item = shopeeLibrary[Math.floor(Math.random() * shopeeLibrary.length)];
            const container = document.getElementById('content-output');

            // --- UNIFIED PROMPT FOR GROK ---
            const unifiedPrompt = `
Generate a 6-second vertical 9:16 video, an English caption, and a Thai SSML voice-over for this product:

PRODUCT: "${item.name}"
HIGHLIGHT: "${item.highlight}"

VIDEO INSTRUCTIONS:
Create a cinematic 4K ultra-realistic close-up shot of the product, showcasing its key features (${item.highlight}) with professional studio lighting, a soft bokeh background, and dynamic camera movement. The video must be 6 seconds long and in 9:16 aspect ratio.

ENGLISH CAPTION:
"🔥 Don't miss out! Get your ${item.name} today. Experience ${item.highlight} and upgrade your lifestyle! ✨ Shop now! #${item.cat.replace(/ /g, '')} #MustHave #LimitedTimeOffer #AffiliateDeal"

THAI VOICE OVER (SSML):
<speak><prosody rate="2.9" volume="+0dB" pitch="+0st">สวัสดีครับ <break time="100ms"/> วันนี้ขอเสนอ <break time="1ms"/> ${item.name} <break time="1ms"/> ที่มาพร้อมคุณสมบัติเด่นคือ <break time="1ms"/> ${item.highlight} <break time="1ms"/> ห้ามพลาด <break time="100ms"/> สั่งซื้อเลยครับ</prosody></speak>
`;
            // --- END UNIFIED PROMPT ---

            container.innerHTML = `
                <div class="bg-emerald-600/10 p-8 rounded-[2rem] border-2 border-emerald-600/30 shadow-2xl shadow-emerald-600/10">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-emerald-400 font-black text-sm uppercase tracking-widest">✨ GROK UNIFIED MASTER PROMPT (Copy All Below)</h3>
                        <span class="text-[10px] bg-emerald-500 text-white px-3 py-1 rounded-full font-bold uppercase">Ready for Grok</span>
                    </div>
                    <textarea id="unifiedCopy" class="w-full h-80 bg-black/50 p-6 rounded-2xl text-sm font-mono text-emerald-100 leading-relaxed border border-emerald-600/20 focus:outline-none select-all resize-y" readonly>${unifiedPrompt.trim()}</textarea>
                    <p class="text-[11px] text-emerald-400/60 mt-4 italic text-center">** เพียง Copy ข้อความทั้งหมดในกล่องด้านบน แล้วไปวางใน Grok เพื่อ Generate Video, Caption และ Voice Over ได้ในครั้งเดียว **</p>
                </div>

                <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 flex gap-6 items-center">
                    <div class="w-24 h-24 bg-white/5 rounded-2xl flex items-center justify-center text-4xl">📦</div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${item.cat}</span>
                        <h4 class="text-lg font-black text-white mt-1">${item.name}</h4>
                        <p class="text-sm text-slate-400 italic">${item.highlight}</p>
                    </div>
                </div>
            `;
        }

        window.onload = generateContent;
    </script>
</body>
</html>
