<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Unified Prompt Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
</head>
<body class="bg-[#0f1419] text-slate-100 font-['Kanit'] min-h-screen">

    <nav class="p-6 border-b border-slate-800 bg-[#0f1419]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter text-emerald-400">GROK UNIFIED PROMPT ENGINE</h1>
            <button onclick="generateContent()" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-full text-sm font-bold transition-all shadow-lg shadow-emerald-600/20">
                🔄 สุ่มสินค้า & สร้าง Unified Prompt
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        <div id="content-output"></div>
    </main>

    <script>
        function generateContent() {
            if (typeof shopeeLibrary === 'undefined' || shopeeLibrary.length === 0) {
                document.getElementById('content-output').innerHTML = `
                    <div class="text-center p-10 bg-rose-500/10 border border-rose-500/50 rounded-3xl">
                        <p class="text-rose-500 font-bold">❌ ไม่พบไฟล์ library.js หรือข้อมูลใน shopeeLibrary</p>
                        <p class="text-xs text-slate-400 mt-2">กรุณาตรวจสอบว่าชื่อตัวแปรใน library.js คือ const shopeeLibrary = [...]</p>
                    </div>`;
                return;
            }

            const item = shopeeLibrary[Math.floor(Math.random() * shopeeLibrary.length)];
            
            // สร้าง Super Prompt สำหรับ Grok
            const unifiedPrompt = `Act as a professional video creator. Generate a 6-second vertical 9:16 video, an English caption, and a Thai SSML voice-over for this product:

PRODUCT: "${item.name}"
DETAILS: "${item.highlight}"

1. [VIDEO INSTRUCTIONS]: 
Create a cinematic 4K ultra-realistic vertical 9:16 video. Scene: Close-up of ${item.name} showing its key feature: ${item.highlight}. High-end studio lighting, soft bokeh, dynamic 6-second camera movement. 

2. [ENGLISH CAPTION]:
"🔥 Don't miss out! Get your ${item.name} today. Best quality for your lifestyle! ✨ #MustHave #Affiliate #${item.cat.replace(/ /g, '')}"

3. [THAI VOICE OVER SSML]:
<speak><prosody rate="2.9">${item.name} <break time="1ms"/> ${item.highlight} <break time="1ms"/> สินค้าดีที่ต้องมี สั่งซื้อได้ที่ลิงก์ในคอมเมนต์เลยครับ</prosody></speak>`;

            document.getElementById('content-output').innerHTML = `
                <div class="bg-emerald-600/10 p-8 rounded-[2rem] border-2 border-emerald-600/30 shadow-2xl">
                    <h3 class="text-emerald-400 font-black text-sm mb-4">✨ GROK MASTER PROMPT (Copy & Paste to Grok)</h3>
                    <textarea id="unifiedCopy" class="w-full h-80 bg-black/50 p-6 rounded-2xl text-sm font-mono text-emerald-100 border border-emerald-600/20 focus:outline-none select-all" readonly>${unifiedPrompt.trim()}</textarea>
                </div>
                <div class="mt-6 p-4 bg-slate-800 rounded-2xl text-xs text-slate-400 text-center">
                    สินค้าที่เลือก: <b>${item.name}</b> (${item.cat})
                </div>
            `;
        }
        window.onload = generateContent;
    </script>
</body>
</html>
