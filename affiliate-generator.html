<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Affiliate Engine | KING MONGKUT TUTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
</head>
<body class="bg-[#0f1419] text-slate-100 font-['Kanit'] min-h-screen">

    <nav class="p-6 border-b border-slate-800 bg-[#0f1419]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter text-blue-400">GROK AFFILIATE ENGINE</h1>
            <button onclick="generateContent()" class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-full text-sm font-bold transition-all shadow-lg shadow-blue-500/20">
                🔄 สุ่มสินค้าและสร้าง Prompt ใหม่
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-4xl">
        <div id="content-output" class="space-y-8">
            </div>
    </main>

    <script>
        function generateContent() {
            if (typeof shopeeLibrary === 'undefined' || shopeeLibrary.length === 0) {
                document.getElementById('content-output').innerHTML = "<p class='text-center text-rose-500'>❌ ไม่พบข้อมูลใน library.js</p>";
                return;
            }

            const item = shopeeLibrary[Math.floor(Math.random() * shopeeLibrary.length)];
            const container = document.getElementById('content-output');

            // สร้างโครงสร้าง Master Prompt สำหรับ Grok
            const grokPrompt = `Please generate content for this product:
Product Name: ${item.name}
Details: ${item.highlight}

1. VIDEO PROMPT (6 Seconds, 9:16):
"Cinematic 4K ultra-realistic vertical 9:16, close-up shot of ${item.name}, ${item.highlight}, professional studio lighting, soft bokeh background, 6-second dynamic shot, sharp details."

2. ENGLISH CAPTION:
"Don't miss out! 🚀 Get your ${item.name} today. Best quality for your lifestyle. ✨ #MustHave #ShopeeFinds #QualityProducts #Affiliate"

3. THAI VOICE OVER (SSML 2.9X):
<speak><prosody rate="2.9">${item.name} <break time="1ms"/> ${item.highlight} <break time="1ms"/> สินค้าดีที่ต้องมี กดสั่งซื้อที่ตะกร้าหรือลิงก์ในคอมเมนต์ได้เลยครับ</prosody></speak>`;

            container.innerHTML = `
                <div class="bg-blue-500/10 p-8 rounded-[2rem] border-2 border-blue-500/30 shadow-2xl shadow-blue-500/10">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-blue-400 font-black text-sm uppercase tracking-widest">📋 GROK MASTER PROMPT (Copy This)</h3>
                        <span class="text-[10px] bg-blue-500 text-white px-2 py-1 rounded font-bold uppercase">Ready to Paste</span>
                    </div>
                    <textarea id="masterCopy" class="w-full h-64 bg-black/50 p-6 rounded-2xl text-sm font-mono text-blue-100 leading-relaxed border border-blue-500/20 focus:outline-none select-all" readonly>${grokPrompt}</textarea>
                    <p class="text-[11px] text-blue-400/60 mt-4 italic text-center">** เคล็ดลับ: ก๊อปปี้ทั้งหมดนี้ไปวางใน Grok เพื่อสร้างวิดีโอ แคปชั่น และเสียงพากย์ในครั้งเดียว **</p>
                </div>

                <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 flex gap-6 items-center">
                    <div class="w-24 h-24 bg-white/5 rounded-2xl flex items-center justify-center text-4xl">📦</div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${item.cat}</span>
                        <h4 class="text-lg font-black text-white mt-1">${item.name}</h4>
                        <p class="text-sm text-slate-400 italic">${item.highlight}</p>
                    </div>
                </div>
            `;
        }

        window.onload = generateContent;
    </script>
</body>
</html>
