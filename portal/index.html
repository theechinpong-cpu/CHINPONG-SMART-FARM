<div class="admin-card">
    <h2><i class="fas fa-plus-circle"></i> เพิ่มเนื้อหาบทเรียนใหม่</h2>
    <form id="contentForm">
        <div class="form-row">
            <select name="level"><option>ระดับชั้น ป.4</option></select>
            <select name="subject"><option>วิชาวิทยาศาสตร์</option></select>
            <select name="term"><option>เทอม 1</option></select>
        </div>
        <input type="text" placeholder="ชื่อบทเรียน (เช่น บทที่ 1 การเรียนรู้แบบนักวิทยาศาสตร์)">
        
        <div id="editor-container" style="height: 300px; background: white;">
            <p>พิมพ์เนื้อหาบทเรียนที่นี่...</p>
        </div>

        <div class="quiz-builder">
            <h3>จัดการข้อสอบ (JSON Builder)</h3>
            <textarea placeholder='[{"q":"1+1=?", "a":["1","2","3"], "correct":1}]' style="width:100%; height:100px;"></textarea>
        </div>
        
        <button type="submit" class="btn-save">บันทึกลง Database</button>
    </form>
</div>
