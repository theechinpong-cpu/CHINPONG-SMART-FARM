<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #e8f4f8; padding: 20px; line-height: 1.8; color: #333; }
        .story-card { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid #27ae60; }
        h1 { color: #2c3e50; text-align: center; font-size: 2em; }
        .author { text-align: center; color: #7f8c8d; font-style: italic; margin-bottom: 25px; }
        .sentence { margin-bottom: 12px; padding: 15px; background: #f9f9f9; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; display: flex; align-items: center; }
        .sentence:hover { background: #e1f5fe; border-color: #03a9f4; transform: scale(1.01); }
        .vocab { font-weight: bold; color: #d35400; text-decoration: underline; }
        .audio-icon { margin-right: 15px; font-size: 1.5em; }
        .instruction-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: bold; }
        footer { text-align: center; margin-top: 30px; font-size: 0.9em; color: #95a5a6; }
    </style>
</head>
<body>

<div class="story-card">
    <h1>📖 The Brave Hero and the Magic Island</h1>
    <div class="author">Written by CHINPONG SMART FARM</div>
    
    <div class="instruction-box">💡 Click any sentence to hear "พระจอมเกล้าติวเตอร์" read it for you!</div>

    <div id="story-display"></div>

    <footer>
        © Developed by CHINPONG SMART FARM | All Rights Reserved.
    </footer>
</div>

<script>
const storySentences = [
    "A <span class='vocab'>young</span> <span class='vocab'>person</span> named Leo lived in a <span class='vocab'>small</span> <span class='vocab'>town</span>.",
    "One day, he felt <span class='vocab'>brave</span> and decided to go to a mysterious <span class='vocab'>island</span>.",
    "He put on his <span class='vocab'>shirt</span>, <span class='vocab'>pants</span>, and a <span class='vocab'>warm</span> <span class='vocab'>coat</span>.",
    "He tied his <span class='vocab'>belt</span>, put on his <span class='vocab'>shoes</span>, and wore his favorite <span class='vocab'>hat</span>.",
    "Leo took a boat across the <span class='vocab'>blue</span> <span class='vocab'>sea</span>.",
    "The <span class='vocab'>wind</span> was <span class='vocab'>strong</span>, and the waves were <span class='vocab'>large</span>.",
    "Soon, he saw a <span class='vocab'>mountain</span> and a <span class='vocab'>forest</span> <span class='vocab'>behind</span> the <span class='vocab'>beach</span>.",
    "It was a <span class='vocab'>nice</span> and <span class='vocab'>cool</span> day.",
    "He walked <span class='vocab'>up</span> the hill and found a <span class='vocab'>large</span> house with a red <span class='vocab'>roof</span>, a wooden <span class='vocab'>door</span>, and a <span class='vocab'>circle</span> <span class='vocab'>window</span>.",
    "Leo went <span class='vocab'>inside</span>. The <span class='vocab'>floor</span> was <span class='vocab'>clean</span>, but the <span class='vocab'>walls</span> were <span class='vocab'>old</span>.",
    "He saw a <span class='vocab'>table</span>, a <span class='vocab'>chair</span>, and a <span class='vocab'>soft</span> <span class='vocab'>sofa</span>.",
    "On the <span class='vocab'>desk</span>, there was a <span class='vocab'>lamp</span> and a <span class='vocab'>mirror</span>.",
    "He felt <span class='vocab'>thirsty</span>, so he found a <span class='vocab'>glass</span> and a <span class='vocab'>bottle</span> of <span class='vocab'>water</span>.",
    "He was hungry, so he ate some <span class='vocab'>bread</span> with <span class='vocab'>butter</span> and <span class='vocab'>cheese</span>.",
    "He used a <span class='vocab'>spoon</span>, <span class='vocab'>fork</span>, and a <span class='vocab'>knife</span> to eat from a white <span class='vocab'>plate</span>.",
    "For dessert, he had an <span class='vocab'>apple</span>, a <span class='vocab'>banana</span>, and an <span class='vocab'>orange</span>.",
    "Suddenly, the <span class='vocab'>sun</span> went <span class='vocab'>down</span>, and the <span class='vocab'>moon</span> and <span class='vocab'>stars</span> came out.",
    "Leo felt <span class='vocab'>tired</span> and <span class='vocab'>scared</span> because he heard a <span class='vocab'>loud</span> <span class='vocab'>sound</span>.",
    "He hid <span class='vocab'>under</span> the <span class='vocab'>bed</span> and stayed <span class='vocab'>quiet</span>.",
    "He looked <span class='vocab'>outside</span> the <span class='vocab'>window</span> and saw a <span class='vocab'>storm</span> with <span class='vocab'>rain</span> and <span class='vocab'>cloud</span>.",
    "The next morning, he met a friendly <span class='vocab'>farmer</span> and a <span class='vocab'>doctor</span>.",
    "They were <span class='vocab'>rich</span> in kindness but <span class='vocab'>poor</span> in <span class='vocab'>money</span>.",
    "They gave Leo a <span class='vocab'>box</span> with a gold <span class='vocab'>ring</span> and a silver <span class='vocab'>key</span>.",
    "Leo felt <span class='vocab'>happy</span> and <span class='vocab'>good</span>. He used his <span class='vocab'>watch</span> to check the time.",
    "He ran <span class='vocab'>fast</span> to his boat. He would never forget this adventure!"
];

const container = document.getElementById('story-display');

storySentences.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sentence';
    div.innerHTML = `<span class="audio-icon">🔊</span> <span>${s}</span>`;
    div.onclick = () => {
        const textToSpeak = div.innerText.replace('🔊 ', '');
        const speech = new SpeechSynthesisUtterance(textToSpeak);
        speech.lang = 'en-US';
        speech.rate = 0.8;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(speech);
    };
    container.appendChild(div);
});
</script>

</body>
</html>
