        .btn-group button { padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.1em; margin: 10px; transition: 0.3s; }

    const grid = document.getElementById('vocabGrid');
    const target = document.getElementById('target');
    const thai = document.getElementById('thai');
    let currentItem = null;

    function init() {
        masterData.sort((a,b) => a.en.localeCompare(b.en)).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = item.en;
            card.setAttribute('data-th', item.th);
            card.onclick = () => {
                currentItem = item;
                target.innerText = item.en;
                thai.innerText = item.th;
                speak();
            };
            grid.appendChild(card);
        });
    }

    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function randomWord() {
        currentItem = masterData[Math.floor(Math.random() * masterData.length)];
        target.innerText = currentItem.en;
        thai.innerText = currentItem.th;
        speak();
    }

    function speak() {
        if(!currentItem) return;
        const u = new SpeechSynthesisUtterance(currentItem.en);
        u.lang = 'en-US';
        u.rate = 0.8;
        synth.speak(u);
    }

    init();
