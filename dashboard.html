<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CHINPONG SMART FARM - Live Scoreboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; overflow: hidden; }
        .score-pop { animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); color: #fbbf24; } 100% { transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center text-white">
    <h1 class="text-5xl font-black mb-16 italic text-yellow-400 drop-shadow-2xl uppercase tracking-tighter">
        Phonics Challenge Live
    </h1>

    <div class="flex gap-10 w-full max-w-6xl px-10">
        <div class="flex-1 bg-gradient-to-br from-orange-500 to-red-600 rounded-[50px] p-12 text-center shadow-2xl border-4 border-white/20">
            <h2 class="text-4xl font-bold opacity-90 mb-4">PLAYER 1</h2>
            <div id="p1-score" class="text-[200px] leading-none font-black drop-shadow-lg">0</div>
        </div>

        <div class="flex-1 bg-gradient-to-br from-green-500 to-emerald-700 rounded-[50px] p-12 text-center shadow-2xl border-4 border-white/20">
            <h2 class="text-4xl font-bold opacity-90 mb-4">PLAYER 2</h2>
            <div id="p2-score" class="text-[200px] leading-none font-black drop-shadow-lg">0</div>
        </div>
    </div>

    <div class="mt-20 flex flex-col items-center opacity-50">
        <p class="mb-4 text-sm tracking-widest uppercase">By CHINPONG SMART FARM</p>
        <button onclick="resetGame()" class="px-8 py-3 bg-white/10 rounded-full hover:bg-red-500/50 hover:text-white transition-all border border-white/20">Reset Score</button>
    </div>

    <script>
        // ใส่ URL Firebase ของคุณที่นี่
        const firebaseConfig = { databaseURL: "ใส่_URL_FIREBASE_ตรงนี้" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('scores').on('value', (snapshot) => {
            const data = snapshot.val() || { p1: 0, p2: 0 };
            updateDisplay('p1-score', data.p1);
            updateDisplay('p2-score', data.p2);
        });

        function updateDisplay(id, newScore) {
            const el = document.getElementById(id);
            if (el.innerText != newScore) {
                el.innerText = newScore;
                el.classList.remove('score-pop');
                void el.offsetWidth;
                el.classList.add('score-pop');
                confetti({ particleCount: 50, spread: 80, origin: { y: 0.7 } });
            }
        }

        function resetGame() {
            if(confirm('รีเซ็ตคะแนนเป็น 0 ทั้งหมด?')) db.ref('scores').set({ p1: 0, p2: 0 });
        }
    </script>
</body>
</html>
