<!DOCTYPE html>
<html>
<head>
    <title>CHINPONG SMART FARM - Live Scoreboard</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; }
        .score-pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #fbbf24; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center overflow-hidden">
    <h1 class="text-5xl font-black text-white mb-16 tracking-tighter italic">
        <span class="text-yellow-400">PHONICS</span> CHALLENGE LIVE
    </h1>

    <div class="flex gap-12 w-full max-w-6xl px-10">
        <div class="flex-1 bg-gradient-to-br from-orange-500 to-red-600 rounded-[50px] p-12 text-center shadow-[0_0_80px_rgba(234,88,12,0.4)] border-4 border-white/20">
            <h2 class="text-4xl text-white opacity-80 mb-4 uppercase">PLAYER 1</h2>
            <div id="p1-score" class="text-[180px] leading-none font-black text-white drop-shadow-2xl">0</div>
        </div>

        <div class="flex-1 bg-gradient-to-br from-green-500 to-emerald-700 rounded-[50px] p-12 text-center shadow-[0_0_80px_rgba(16,185,129,0.4)] border-4 border-white/20">
            <h2 class="text-4xl text-white opacity-80 mb-4 uppercase">PLAYER 2</h2>
            <div id="p2-score" class="text-[180px] leading-none font-black text-white drop-shadow-2xl">0</div>
        </div>
    </div>

    <div class="mt-16 flex gap-4">
        <button onclick="resetGame()" class="px-6 py-2 bg-white/10 text-white/50 rounded-full hover:bg-white/20 transition-all">Reset Match</button>
    </div>

    <script>
        // เปลี่ยน URL ตรงนี้ให้ตรงกับ Server ของคุณ
        const socket = io('http://localhost:3000'); 

        socket.on('connect', () => console.log('Connected to Server!'));

        socket.on('update-dashboard', (scores) => {
            const p1 = document.getElementById('p1-score');
            const p2 = document.getElementById('p2-score');

            // ตรวจสอบว่าคะแนนมีการเปลี่ยนแปลงหรือไม่เพื่อทำ Animation
            if (p1.innerText != scores.player1.score) {
                p1.innerText = scores.player1.score;
                triggerUpdateEffect(p1);
            }
            if (p2.innerText != scores.player2.score) {
                p2.innerText = scores.player2.score;
                triggerUpdateEffect(p2);
            }
        });

        function triggerUpdateEffect(el) {
            el.classList.remove('score-pop');
            void el.offsetWidth; // Force Reflow
            el.classList.add('score-pop');
            
            // ยิงพลุฉลองทุกครั้งที่ได้คะแนน
            confetti({
                particleCount: 40,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

        function resetGame() {
            if(confirm('ต้องการรีเซ็ตคะแนนใช่ไหม?')) socket.emit('reset-game');
        }
    </script>
</body>
</html>
