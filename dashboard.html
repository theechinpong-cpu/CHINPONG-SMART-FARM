<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Real-time Score</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center h-screen overflow-hidden">
    <h1 class="text-4xl font-bold mb-10 text-yellow-400">🔥 Phonics Challenge Live Score 🔥</h1>
    
    <div class="flex gap-10 w-full px-20">
        <div class="flex-1 bg-orange-600 rounded-3xl p-10 text-center shadow-[0_0_50px_rgba(234,88,12,0.5)]">
            <h2 class="text-3xl font-bold mb-4">Player 1</h2>
            <div id="p1-score" class="text-9xl font-black">0</div>
        </div>

        <div class="flex-1 bg-green-600 rounded-3xl p-10 text-center shadow-[0_0_50px_rgba(22,163,74,0.5)]">
            <h2 class="text-3xl font-bold mb-4">Player 2</h2>
            <div id="p2-score" class="text-9xl font-black">0</div>
        </div>
    </div>

    <button onclick="resetGame()" class="mt-10 text-gray-400 hover:text-white underline">Reset Scores</button>

    <script>
        const socket = io('YOUR_SERVER_URL');
        socket.on('update-dashboard', (scores) => {
            document.getElementById('p1-score').innerText = scores.player1.score;
            document.getElementById('p2-score').innerText = scores.player2.score;
            
            // เพิ่ม Animation เมื่อคะแนนขยับ
            document.querySelectorAll('.text-9xl').forEach(el => {
                el.classList.add('scale-110');
                setTimeout(() => el.classList.remove('scale-110'), 200);
            });
        });

        function resetGame() { socket.emit('reset-game'); }
    </script>
    <style>
        .scale-110 { transform: scale(1.1); transition: transform 0.1s; }
    </style>
</body>
</html>
