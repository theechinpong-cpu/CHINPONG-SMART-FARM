<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CHINPONG SMART FARM - Live Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; }
        .score-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); color: #fbbf24; } 100% { transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center overflow-hidden">
    <h1 class="text-5xl font-black text-white mb-16 italic">
        <span class="text-yellow-400">PHONICS</span> CHALLENGE LIVE BY CHINPONG
    </h1>

    <div class="flex gap-12 w-full max-w-6xl px-10">
        <div class="flex-1 bg-gradient-to-br from-orange-500 to-red-600 rounded-[50px] p-12 text-center shadow-[0_0_80px_rgba(234,88,12,0.4)] border-4 border-white/20">
            <h2 class="text-4xl text-white opacity-80 mb-4">PLAYER 1</h2>
            <div id="p1-score" class="text-[180px] leading-none font-black text-white">0</div>
        </div>
        <div class="flex-1 bg-gradient-to-br from-green-500 to-emerald-700 rounded-[50px] p-12 text-center shadow-[0_0_80px_rgba(16,185,129,0.4)] border-4 border-white/20">
            <h2 class="text-4xl text-white opacity-80 mb-4">PLAYER 2</h2>
            <div id="p2-score" class="text-[180px] leading-none font-black text-white">0</div>
        </div>
    </div>

    <button onclick="resetGame()" class="mt-16 px-6 py-2 bg-white/10 text-white/50 rounded-full hover:bg-white/20">Reset Match</button>

    <script>
        // --- ส่วนการตั้งค่า Firebase (คุณต้องนำ Config มาใส่ตรงนี้) ---
        const firebaseConfig = {
            databaseURL: "YOUR_FIREBASE_DATABASE_URL" // <--- ใส่ URL ของ Firebase Database ที่นี่
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ฟังการอัปเดตคะแนนแบบ Real-time
        db.ref('scores').on('value', (snapshot) => {
            const data = snapshot.val() || { p1: 0, p2: 0 };
            updateDisplay('p1-score', data.p1);
            updateDisplay('p2-score', data.p2);
        });

        function updateDisplay(id, newScore) {
            const el = document.getElementById(id);
            if (el.innerText != newScore) {
                el.innerText = newScore;
                el.classList.remove('score-pop');
                void el.offsetWidth;
                el.classList.add('score-pop');
                confetti({ particleCount: 40, spread: 70, origin: { y: 0.6 } });
            }
        }

        function resetGame() {
            if(confirm('Reset คะแนน?')) db.ref('scores').set({ p1: 0, p2: 0 });
        }
    </script>
</body>
</html>
