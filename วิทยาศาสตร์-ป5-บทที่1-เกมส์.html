<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Survival - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --primary: #06b6d4;
            --danger: #ef4444;
            --success: #10b981;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Chakra Petch', sans-serif;
            background: var(--bg); color: white; overflow: hidden;
        }

        #game-stage {
            position: relative; width: 100%; height: 100vh;
            background: radial-gradient(circle, #1e293b 0%, #020617 100%);
        }

        /* ส่วนหัว UI */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; pointer-events: none;
        }

        #hp-display { font-size: 2rem; color: var(--danger); pointer-events: auto; }
        #score-display { font-size: 1.5rem; color: var(--primary); }

        /* คำถาม */
        #q-container {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; font-size: 1.8rem;
            background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px;
            border: 1px solid var(--primary); z-index: 90;
        }

        /* ตัวเลือกที่ลอยไปมา */
        .floating-opt {
            position: absolute; padding: 15px 25px;
            background: var(--primary); color: var(--bg);
            border-radius: 50px; cursor: pointer; font-weight: bold;
            font-size: 1.1rem; border: 3px solid white;
            box-shadow: 0 0 20px rgba(6,182,212,0.5);
            transition: transform 0.1s, opacity 0.3s;
            user-select: none; z-index: 80;
            white-space: nowrap;
        }

        .floating-opt:hover { transform: scale(1.1); background: white; }

        /* หน้าจออื่นๆ */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }

        .btn-start {
            padding: 20px 60px; font-size: 2rem; background: var(--primary);
            border: none; border-radius: 50px; cursor: pointer; font-family: 'Chakra Petch';
            box-shadow: 0 0 30px var(--primary); font-weight: bold;
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-10px, 10px); }
            40% { transform: translate(10px, -10px); }
            60% { transform: translate(-10px, -10px); }
            80% { transform: translate(10px, 10px); }
        }
    </style>
</head>
<body>

<div id="game-stage">
    <div class="ui-layer">
        <div id="hp-display">❤️❤️❤️❤️❤️</div>
        <div id="score-display">คะแนน: 0 | ข้อที่: 1/50</div>
    </div>

    <div id="q-container">กด START เพื่อเริ่มการทดสอบ!</div>

    <div id="start-screen" class="overlay">
        <h1 style="font-size: 4rem; color: var(--primary); margin: 0;">50 TRIALS</h1>
        <p style="font-size: 1.5rem;">คลิกคำตอบที่ลอยอยู่ให้ถูกต้องเพื่อรอดชีวิต!</p>
        <button class="btn-start" onclick="initGame()">START GAME</button>
        <p style="margin-top: 20px;">*จะมีเพลงตื่นเต้นประกอบเมื่อเริ่มเล่น*</p>
    </div>

    <div id="end-screen" class="overlay" style="display:none">
        <h1 id="end-status" style="font-size: 4rem;">GAME OVER</h1>
        <p id="end-msg" style="font-size: 1.5rem;"></p>
        <h2 style="color:gold">SCORE: <span id="final-score">0</span></h2>
        <button class="btn-start" onclick="location.reload()">RETRY</button>
    </div>
</div>

<script>
    const questions = [
        { q: "โหนกของอูฐมีหน้าที่สำคัญที่สุดคืออะไร?", a: "สะสมไขมันไว้เป็นพลังงาน", opts: ["สะสมน้ำ", "สะสมไขมันไว้เป็นพลังงาน", "ระบายความร้อน", "ป้องกันแดด"] },
        { q: "ต้นกระบองเพชรเปลี่ยนใบเป็นหนามเพื่ออะไร?", a: "ลดการคายน้ำ", opts: ["สังเคราะห์แสง", "ลดการคายน้ำ", "พรางตัว", "ดักจับแมลง"] },
        { q: "พืชป่าชายเลน (โกงกาง) มีรากค้ำจุนเพื่อ?", a: "พยุงลำต้นในดินเลน", opts: ["หายใจ", "พยุงลำต้นในดินเลน", "ดูดเกลือ", "หาอาหาร"] },
        { q: "ผักตบชวาลอยน้ำได้เพราะลักษณะใด?", a: "ก้านใบพองมีช่องอากาศ", opts: ["ใบกว้าง", "ก้านใบพองมีช่องอากาศ", "รากยาว", "ดอกเบา"] },
        { q: "ความสัมพันธ์แบบ (+, +) ที่แยกกันไม่ได้คือ?", a: "ไลเคน", opts: ["นกเอี้ยงกับควาย", "ผีเสื้อกับดอกไม้", "ไลเคน", "กาฝาก"] },
        { q: "มนุษย์เป็นผู้บริโภคประเภทใด?", a: "Omnivore (กินทั้งพืชและสัตว์)", opts: ["Herbivore", "Carnivore", "Omnivore (กินทั้งพืชและสัตว์)", "Decomposer"] },
        { q: "ในโซ่อาหาร หัวลูกศรชี้ไปทางใด?", a: "ผู้กิน", opts: ["ผู้ผลิต", "ผู้กิน", "แสงแดด", "ดิน"] },
        { q: "สัตว์ขั้วโลกมีไขมันหนาเพื่ออะไร?", a: "รักษาความอบอุ่น", opts: ["ว่ายน้ำเร็ว", "รักษาความอบอุ่น", "พรางตัว", "เก็บน้ำ"] },
        { q: "ต้นไม้ใหญ่กับกล้วยไม้ คือความสัมพันธ์แบบ?", a: "ภาวะอิงอาศัย (+,0)", opts: ["ปรสิต", "อิงอาศัย (+,0)", "พึ่งพากัน", "ล่าเหยื่อ"] },
        { q: "ผู้ย่อยสลายที่สำคัญคือข้อใด?", a: "เห็ดและรา", opts: ["แร้ง", "ไส้เดือน", "เห็ดและรา", "แมลงสาบ"] }
        // (น้องสามารถเพิ่มข้อ 11-50 ได้ในรูปแบบเดียวกันนี้ครับ พี่ใส่ตัวอย่างหลักๆ ให้ก่อน)
    ];

    let currentIdx = 0;
    let hp = 5;
    let score = 0;
    let floatingElements = [];
    let audioCtx, oscillator, gainNode;

    // ระบบเสียงตื่นเต้น (Synth Music)
    function startMusic() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(60, audioCtx.currentTime); 
        
        // จังหวะการเต้นของเสียง (Heartbeat/Techno feel)
        setInterval(() => {
            if(audioCtx.state === 'running') {
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            }
        }, 600);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
    }

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        startMusic();
        spawnQuestion();
        animate();
    }

    function spawnQuestion() {
        if (currentIdx >= questions.length || hp <= 0) {
            endGame(hp > 0);
            return;
        }

        const data = questions[currentIdx];
        document.getElementById('q-container').innerText = data.q;
        document.getElementById('score-display').innerText = `คะแนน: ${score} | ข้อที่: ${currentIdx + 1}/50`;
        
        // ล้างตัวเลือกเก่า
        floatingElements.forEach(el => el.dom.remove());
        floatingElements = [];

        // สร้างตัวเลือกใหม่
        data.opts.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'floating-opt';
            div.innerText = opt;
            document.getElementById('game-stage').appendChild(div);

            const element = {
                dom: div,
                x: Math.random() * (window.innerWidth - 150),
                y: Math.random() * (window.innerHeight - 200) + 150,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            };

            div.onclick = () => checkAnswer(opt);
            floatingElements.push(element);
        });
    }

    function animate() {
        floatingElements.forEach(el => {
            el.x += el.vx;
            el.y += el.vy;

            // ชนขอบเด้งคืน
            if (el.x <= 0 || el.x >= window.innerWidth - el.dom.offsetWidth) el.vx *= -1;
            if (el.y <= 150 || el.y >= window.innerHeight - el.dom.offsetHeight) el.vy *= -1;

            el.dom.style.left = el.x + 'px';
            el.dom.style.top = el.y + 'px';
        });
        requestAnimationFrame(animate);
    }

    function checkAnswer(selected) {
        const correct = questions[currentIdx].a;
        if (selected === correct) {
            score += 20;
            currentIdx++;
            // เสียงความถี่สูงเมื่อถูก
            beep(880, 0.1);
            spawnQuestion();
        } else {
            hp--;
            updateHP();
            document.body.classList.add('shake');
            beep(110, 0.3); // เสียงต่ำเมื่อผิด
            setTimeout(() => document.body.classList.remove('shake'), 500);
            
            if (hp <= 0) {
                endGame(false);
            } else {
                currentIdx++;
                spawnQuestion();
            }
        }
    }

    function beep(freq, duration) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function updateHP() {
        document.getElementById('hp-display').innerText = "❤️".repeat(hp) + "🖤".repeat(5-hp);
    }

    function endGame(isWin) {
        if(oscillator) oscillator.stop();
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        const status = document.getElementById('end-status');
        const msg = document.getElementById('end-msg');

        if(isWin) {
            status.innerText = "VICTORY!";
            status.style.color = "var(--success)";
            msg.innerText = "คุณคือสุดยอดผู้อยู่รอด! ปรับตัวได้ 100%";
        } else {
            status.innerText = "EXTINCT!";
            status.style.color = "var(--danger)";
            msg.innerText = "คุณสูญพันธุ์เพราะปรับตัวไม่ทัน... ลองใหม่นะ!";
        }
    }
</script>
</body>
</html>
