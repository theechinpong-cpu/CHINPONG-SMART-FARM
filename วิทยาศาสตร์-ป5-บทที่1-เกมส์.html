<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Trials: Adaptation Survivor - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #06b6d4;
            --danger: #ef4444;
            --success: #10b981;
            --gold: #f59e0b;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-box {
            width: 95%;
            max-width: 700px;
            background: var(--card);
            border: 3px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.3);
        }

        /* ระบบ HP */
        .header-ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .hp-bar { color: var(--danger); font-size: 1.5rem; letter-spacing: 5px; }

        .progress-text { color: var(--primary); font-weight: bold; }

        /* โจทย์ */
        .question-area {
            font-size: 1.4rem;
            margin: 30px 0;
            line-height: 1.5;
            min-height: 100px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* ปุ่มตอบ */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }

        .opt-btn {
            background: #334155;
            border: 2px solid #475569;
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Chakra Petch';
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .opt-btn:hover:not(:disabled) {
            background: var(--primary);
            border-color: white;
            transform: scale(1.02);
        }

        /* Screen States */
        .screen { display: none; text-align: center; }
        .active { display: block; }

        /* Animation */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        .btn-start {
            background: var(--primary);
            color: var(--bg);
            padding: 20px 50px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="start-screen" class="screen active">
        <h1 style="font-size: 3rem; color: var(--primary);">50 TRIALS</h1>
        <h2>ADAPTATION SURVIVOR</h2>
        <p>คุณมีหัวใจ 5 ดวง... ตอบผิด 5 ครั้ง = สูญพันธุ์!</p>
        <button class="btn-start" onclick="initGame()">START</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="header-ui">
            <div class="hp-bar" id="hp-display">❤️❤️❤️❤️❤️</div>
            <div class="progress-text">ด่านที่: <span id="q-num">1</span>/50</div>
        </div>
        <div class="question-area" id="q-text">คำถามกำลังมา...</div>
        <div class="options-grid" id="options-area"></div>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="end-title">GAME OVER</h1>
        <p id="end-msg"></p>
        <h2 style="color:var(--gold)">SCORE: <span id="final-score">0</span></h2>
        <button class="btn-start" style="font-size: 1.2rem;" onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
    const allQuestions = [
        { q: "1. โหนกของอูฐมีหน้าที่สำคัญที่สุดคืออะไร?", a: "สะสมไขมันไว้เป็นพลังงาน", opts: ["สะสมน้ำไว้ใช้", "สะสมไขมันไว้เป็นพลังงาน", "ระบายความร้อน", "ป้องกันแสงแดด"] },
        { q: "2. ต้นกระบองเพชรเปลี่ยนใบเป็นหนามเพื่ออะไร?", a: "ลดการคายน้ำ", opts: ["สังเคราะห์แสง", "ลดการคายน้ำ", "พรางตัวจากศัตรู", "ดักจับแมลง"] },
        { q: "3. ผักตบชวาสามารถลอยน้ำได้เพราะลักษณะใด?", a: "ก้านใบพองและมีช่องอากาศ", opts: ["ใบกว้างและบาง", "ก้านใบพองและมีช่องอากาศ", "รากมีขนาดเล็กมาก", "ลำต้นกลวง"] },
        { q: "4. พืชป่าชายเลน (โกงกาง) มีรากค้ำจุนเพื่ออะไร?", a: "พยุงลำต้นในดินเลน", opts: ["หายใจใต้น้ำ", "พยุงลำต้นในดินเลน", "ดูดสารอาหาร", "คายเกลือ"] },
        { q: "5. หมีขั้วโลกมีขนสีขาวเพื่อประโยชน์ด้านใด?", a: "พรางตัวในหิมะ", opts: ["ระบายความร้อน", "พรางตัวในหิมะ", "สะท้อนแสงแดด", "หาคู่ง่ายขึ้น"] },
        { q: "6. การที่สัตว์จำศีลในฤดูหนาวจัดเป็นการปรับตัวแบบใด?", a: "พฤติกรรม", opts: ["สรีระ", "โครงสร้าง", "พฤติกรรม", "เคมี"] },
        { q: "7. จิ้งจอกทะเลทรายมีหูขนาดใหญ่เพื่ออะไร?", a: "ระบายความร้อน", opts: ["ฟังเสียงได้ไกล", "ระบายความร้อน", "หาอาหาร", "บิน"] },
        { q: "8. ปลาตีนใช้สิ่งใดช่วยในการเคลื่อนที่บนเลน?", a: "ครีบอกที่แข็งแรง", opts: ["ครีบหาง", "ครีบอกที่แข็งแรง", "เหงือก", "เกล็ด"] },
        { q: "9. พังผืดที่เท้าของเป็ดช่วยในเรื่องใด?", a: "การว่ายน้ำ", opts: ["การเดินบนทราย", "การว่ายน้ำ", "การเกาะกิ่งไม้", "การหาอาหาร"] },
        { q: "10. รากหายใจของต้นลำพูมีลักษณะอย่างไร?", a: "แทงยอดแหลมขึ้นเหนือดิน", opts: ["แผ่ขนานไปกับดิน", "แทงยอดแหลมขึ้นเหนือดิน", "หยั่งลึกลงไปใต้ดิน", "พันรอบต้นไม้ใหญ่"] },
        { q: "11. ไลเคน (Lichen) เป็นความสัมพันธ์แบบใด?", a: "ภาวะพึ่งพากัน (+,+)", opts: ["ภาวะอิงอาศัย (+,0)", "ภาวะพึ่งพากัน (+,+)", "ภาวะปรสิต (+,-)", "ภาวะล่าเหยื่อ"] },
        { q: "12. นกเอี้ยงกับควายจัดเป็นความสัมพันธ์แบบใด?", a: "ได้ประโยชน์ร่วมกัน (+,+)", opts: ["พึ่งพากัน", "ได้ประโยชน์ร่วมกัน (+,+)", "ปรสิต", "อิงอาศัย"] },
        { q: "13. กาฝากบนต้นมะม่วงเป็นความสัมพันธ์แบบ?", a: "ภาวะปรสิต (+,-)", opts: ["ภาวะอิงอาศัย", "ภาวะปรสิต (+,-)", "ภาวะพึ่งพากัน", "ได้ประโยชน์ร่วมกัน"] },
        { q: "14. เหาฉลามกับฉลาม ใครเสียประโยชน์?", a: "ไม่มีใครเสียประโยชน์", opts: ["ฉลาม", "เหาฉลาม", "ไม่มีใครเสียประโยชน์", "เสียประโยชน์ทั้งคู่"] },
        { q: "15. เสือกับกวาง มีความสัมพันธ์แบบใด?", a: "ภาวะล่าเหยื่อ (+,-)", opts: ["ภาวะปรสิต", "ภาวะล่าเหยื่อ (+,-)", "ภาวะอิงอาศัย", "ภาวะพึ่งพากัน"] },
        { q: "16. ผู้ผลิต (Producer) ในโซ่อาหารคือข้อใด?", a: "หญ้า", opts: ["เสือ", "หญ้า", "แบคทีเรีย", "คน"] },
        { q: "17. มนุษย์เป็นผู้บริโภคประเภทใด?", a: "กินทั้งพืชและสัตว์", opts: ["กินพืช", "กินสัตว์", "กินทั้งพืชและสัตว์", "ผู้ย่อยสลาย"] },
        { q: "18. ในโซ่อาหาร หัวลูกศรชี้ไปทางใด?", a: "ผู้บริโภค", opts: ["ผู้ผลิต", "ผู้บริโภค", "แหล่งกำเนิดแสง", "ดิน"] },
        { q: "19. ผู้ย่อยสลาย (Decomposer) ที่สำคัญคือข้อใด?", a: "เห็ดและรา", opts: ["แร้ง", "ไส้เดือน", "เห็ดและรา", "แมลงสาบ"] },
        { q: "20. หากผู้ผลิตในป่าหายไปจะเกิดอะไรขึ้น?", a: "สิ่งมีชีวิตอื่นๆ จะตายหมด", opts: ["สัตว์กินเนื้อจะเพิ่มขึ้น", "สิ่งมีชีวิตอื่นๆ จะตายหมด", "อากาศจะบริสุทธิ์ขึ้น", "ไม่มีผลกระทบ"] },
        { q: "21. ตั๊กแตนใบไม้มีการปรับตัวแบบใด?", a: "การพรางตัว (Camouflage)", opts: ["การจำศีล", "การพรางตัว (Camouflage)", "การอพยพ", "การต่อสู้"] },
        { q: "22. อูฐมีขนตายาวเพื่ออะไร?", a: "ป้องกันทรายเข้าตา", opts: ["ความสวยงาม", "ป้องกันทรายเข้าตา", "กรองแสงแดด", "ระบายความร้อน"] },
        { q: "23. ขนที่หนาของสัตว์ขั้วโลกทำหน้าที่อะไร?", a: "รักษาความอบอุ่น", opts: ["ระบายเหงื่อ", "รักษาความอบอุ่น", "เก็บน้ำ", "ว่ายน้ำ"] },
        { q: "24. พืชที่ขึ้นในที่น้ำท่วมขังมักมีลักษณะใด?", a: "มีช่องอากาศในลำต้น", opts: ["รากสั้น", "มีช่องอากาศในลำต้น", "ใบเล็กและแข็ง", "ไม่มีดอก"] },
        { q: "25. สัตว์ชนิดใดปรับตัวโดยการ 'เปลี่ยนสีผิว' ตามสภาพแวดล้อม?", a: "กิ้งก่า", opts: ["นกยูง", "กิ้งก่า", "ช้าง", "เสือ"] },
        { q: "26. ข้อใดคือความสัมพันธ์แบบ (+, 0)?", a: "กล้วยไม้บนต้นไม้ใหญ่", opts: ["พยาธิในท้อง", "กล้วยไม้บนต้นไม้ใหญ่", "มดดำกับเพลี้ย", "เสือล่ากวาง"] },
        { q: "27. ผีเสื้อกับดอกไม้แยกกันได้หรือไม่?", a: "แยกกันได้และยังรอดชีวิต", opts: ["แยกกันไม่ได้เลย", "แยกกันได้และยังรอดชีวิต", "แยกกันแล้วตายทันที", "ไม่มีข้อถูก"] },
        { q: "28. กล้วยไม้บนต้นไม้ใหญ่ ต้นไม้ใหญ่เสียประโยชน์หรือไม่?", a: "ไม่เสียและไม่ได้ประโยชน์", opts: ["เสียประโยชน์", "ไม่เสียและไม่ได้ประโยชน์", "ได้ประโยชน์", "ตายทันที"] },
        { q: "29. แร้งที่กินซากสัตว์จัดเป็นผู้บริโภคประเภทใด?", a: "สัตว์กินซาก (Scavenger)", opts: ["ผู้ผลิต", "สัตว์กินซาก (Scavenger)", "ผู้ย่อยสลาย", "ผู้บริโภคพืช"] },
        { q: "30. พลังงานเริ่มต้นของโซ่อาหารมาจากไหน?", a: "ดวงอาทิตย์", opts: ["ดิน", "น้ำ", "ดวงอาทิตย์", "พืช"] },
        { q: "31. กบจำศีลเพื่ออะไร?", a: "ขาดแคลนอาหารและน้ำ", opts: ["หาคู่", "ขาดแคลนอาหารและน้ำ", "รอให้ตัวโตขึ้น", "หนีศัตรู"] },
        { q: "32. ยีราฟคอยาวเป็นผลจากการปรับตัวเพื่อสิ่งใด?", a: "กินใบไม้บนที่สูง", opts: ["มองเห็นศัตรูได้ไกล", "กินใบไม้บนที่สูง", "ระบายความร้อน", "ส่งเสียงคำราม"] },
        { q: "33. พืชที่เปลี่ยนใบเป็นหนามลดการคายน้ำทางใด?", a: "ปากใบ", opts: ["ราก", "ลำต้น", "ปากใบ", "ดอก"] },
        { q: "34. ปลาใช้อะไรหายใจใต้น้ำ?", a: "เหงือก", opts: ["ปอด", "ผิวหนัง", "เหงือก", "ครีบ"] },
        { q: "35. ตัวนิ่มม้วนตัวเป็นก้อนกลมเพื่อ?", a: "ป้องกันตัวจากศัตรู", opts: ["กลิ้งลงเขา", "ป้องกันตัวจากศัตรู", "จำศีล", "เก็บความร้อน"] },
        { q: "36. การถ่ายทอดพลังงานในโซ่อาหาร สิ่งใดอยู่ระดับล่างสุด?", a: "ผู้ผลิต", opts: ["ผู้ผลิต", "ผู้บริโภคพืช", "ผู้บริโภคสัตว์", "ผู้ย่อยสลาย"] },
        { q: "37. ข้อใดไม่ใช่ลักษณะพืชป่าชายเลน?", a: "ใบใหญ่และอวบน้ำ", opts: ["รากค้ำจุน", "รากหายใจ", "ใบหนามีต่อมขับเกลือ", "ใบใหญ่และอวบน้ำ"] },
        { q: "38. มดดำกับเพลี้ยเป็นความสัมพันธ์แบบใด?", a: "ได้ประโยชน์ร่วมกัน", opts: ["ปรสิต", "อิงอาศัย", "ได้ประโยชน์ร่วมกัน", "ล่าเหยื่อ"] },
        { q: "39. ทำไมเห็ดราถึงไม่ใช่ผู้ผลิต?", a: "ไม่มีคลอโรฟิลล์สร้างอาหารเองไม่ได้", opts: ["เคลื่อนที่ไม่ได้", "ไม่มีคลอโรฟิลล์สร้างอาหารเองไม่ได้", "ไม่มีราก", "ตัวเล็กเกินไป"] },
        { q: "40. สายใยอาหาร (Food Web) ต่างจากโซ่อาหารอย่างไร?", a: "มีความซับซ้อนและกินกันหลายทอด", opts: ["มีสิ่งมีชีวิตน้อยกว่า", "มีความซับซ้อนและกินกันหลายทอด", "ไม่มีผู้ผลิต", "เหมือนกันทุกอย่าง"] },
        { q: "41. อูฐมีเท้าที่แบนกว้างเพื่ออะไร?", a: "ไม่ให้จมลงในทราย", opts: ["วิ่งได้เร็วขึ้น", "ไม่ให้จมลงในทราย", "ระบายความร้อน", "ใช้ขุดหลุม"] },
        { q: "42. พืชน้ำส่วนใหญ่มักมีรากเป็นแบบใด?", a: "รากฝอยขนาดเล็ก", opts: ["รากแก้วหยั่งลึก", "รากฝอยขนาดเล็ก", "รากอากาศ", "ไม่มีราก"] },
        { q: "43. ความสัมพันธ์แบบ (+, -) ใครคือผู้เสียประโยชน์?", a: "Host (ผู้ถูกอาศัย/เหยื่อ)", opts: ["Parasite", "Host (ผู้ถูกอาย/เหยื่อ)", "ทั้งคู่", "ไม่มีใคร"] },
        { q: "44. ต้นกาบหอยแครงปรับตัวเพื่อรับสารอาหารใดจากแมลง?", a: "ไนโตรเจน", opts: ["แป้ง", "น้ำตาล", "ไนโตรเจน", "ไขมัน"] },
        { q: "45. การอพยพของนกไซบีเรียเป็นการปรับตัวด้านใด?", a: "พฤติกรรมเพื่อหนีหนาว", opts: ["โครงสร้างร่างกาย", "พฤติกรรมเพื่อหนีหนาว", "สรีระภายใน", "การหาคู่"] },
        { q: "46. ข้อใดคือความสัมพันธ์แบบพึ่งพากัน?", a: "ปลวกกับโปรโตซัวในลำไส้", opts: ["นกทำรังบนต้นไม้", "ปลวกกับโปรโตซัวในลำไส้", "เห็บบนตัวสุนัข", "เสือกับสิงโต"] },
        { q: "47. สิ่งมีชีวิตที่กินได้ทั้งพืชและสัตว์เรียกว่า?", a: "Omnivore", opts: ["Herbivore", "Carnivore", "Omnivore", "Scavenger"] },
        { q: "48. ทำไมพืชในทะเลทรายถึงมีรากแผ่กว้าง?", a: "ดักจับน้ำฝนที่ตกลงมาน้อย", opts: ["ยึดลำต้น", "ดักจับน้ำฝนที่ตกลงมาน้อย", "หาอาหารใต้ดิน", "ระบายอากาศ"] },
        { q: "49. สัญลักษณ์ (+, +) หมายถึง?", a: "ได้ประโยชน์ทั้งคู่", opts: ["ได้ประโยชน์ฝ่ายเดียว", "เสียประโยชน์ทั้งคู่", "ได้ประโยชน์ทั้งคู่", "ไม่มีใครได้ใครเสีย"] },
        { q: "50. การเรียนรู้เรื่องการปรับตัวสอนให้เราเห็นอะไร?", a: "ความสมดุลและความอยู่รอด", opts: ["การทำลายธรรมชาติ", "ความสมดุลและความอยู่รอด", "การเอาชนะธรรมชาติ", "ความเก่งของมนุษย์"] }
    ];

    let currentIdx = 0;
    let hp = 5;
    let score = 0;

    function initGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        hp = 5;
        score = 0;
        currentIdx = 0;
        updateHP();
        showQ();
    }

    function showQ() {
        if (currentIdx >= allQuestions.length) {
            victory();
            return;
        }
        const data = allQuestions[currentIdx];
        document.getElementById('q-num').innerText = currentIdx + 1;
        document.getElementById('q-text').innerText = data.q;
        
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        data.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = o;
            btn.onclick = () => check(btn, o);
            area.appendChild(btn);
        });
    }

    function check(btn, val) {
        const correct = allQuestions[currentIdx].a;
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(b => b.disabled = true);

        if (val === correct) {
            btn.style.background = "var(--success)";
            score += 20;
            currentIdx++;
            setTimeout(showQ, 1000);
        } else {
            btn.style.background = "var(--danger)";
            document.getElementById('game-box').classList.add('shake');
            hp--;
            updateHP();
            // เฉลย
            btns.forEach(b => { if(b.innerText === correct) b.style.background = "var(--success)"; });
            
            setTimeout(() => {
                document.getElementById('game-box').classList.remove('shake');
                if (hp <= 0) {
                    gameOver();
                } else {
                    currentIdx++;
                    showQ();
                }
            }, 1500);
        }
    }

    function updateHP() {
        document.getElementById('hp-display').innerText = "❤️".repeat(hp) + "🖤".repeat(5-hp);
    }

    function gameOver() {
        document.getElementById('game-screen').classList.remove('active');
        const end = document.getElementById('end-screen');
        end.classList.add('active');
        document.getElementById('end-title').innerText = "SPECIES EXTINCT!";
        document.getElementById('end-title').style.color = "var(--danger)";
        document.getElementById('end-msg').innerText = "คุณไม่สามารถปรับตัวได้ทัน และสูญพันธุ์ไปจากเกาะ...";
        document.getElementById('final-score').innerText = score;
    }

    function victory() {
        document.getElementById('game-screen').classList.remove('active');
        const end = document.getElementById('end-screen');
        end.classList.add('active');
        document.getElementById('end-title').innerText = "APEX SURVIVOR!";
        document.getElementById('end-title').style.color = "var(--success)";
        document.getElementById('end-msg').innerText = "ยินดีด้วย! คุณคือสุดยอดสิ่งมีชีวิตที่ปรับตัวได้สมบูรณ์แบบที่สุด!";
        document.getElementById('final-score').innerText = score;
    }
</script>

</body>
</html>
