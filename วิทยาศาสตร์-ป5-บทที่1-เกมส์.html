<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Game: นักล่าการปรับตัว - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #4ade80;
            --error: #fb7185;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid var(--accent);
            text-align: center;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--accent);
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--success);
            border-radius: 5px;
            transition: 0.3s;
        }

        .question-box {
            font-size: 1.3rem;
            margin-bottom: 25px;
            min-height: 80px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-opt {
            background: #334155;
            border: 2px solid transparent;
            color: white;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .btn-opt:hover {
            background: #475569;
            border-color: var(--accent);
        }

        .btn-opt.correct { background: var(--success); color: #064e3b; }
        .btn-opt.wrong { background: var(--error); color: #4c0519; }

        #screen-start, #screen-result {
            display: block;
        }

        #screen-game {
            display: none;
        }

        .btn-main {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .badge-evo {
            display: inline-block;
            padding: 5px 15px;
            background: gold;
            color: black;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-start">
        <h1 style="color:var(--accent)">🏝️ ADAPTATION SURVIVAL</h1>
        <p>คุณต้องวิวัฒนาการเพื่อรอดชีวิตจากเกาะมรณะ!<br>ตอบถูก = รอด | ตอบผิด = สูญพันธุ์</p>
        <button class="btn-main" onclick="startGame()">เริ่มผจญภัย!</button>
        <p style="font-size: 0.8rem; margin-top: 20px;">ติวเข้มโดย พระจอมเกล้าติวเตอร์</p>
    </div>

    <div id="screen-game">
        <div class="stats-bar">
            <span>Level: <span id="lvl">1</span></span>
            <span>EXP: <span id="score">0</span></span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="question-box" id="q-text">คำถามจะขึ้นที่นี่...</div>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="screen-result" style="display:none">
        <h2 id="result-title">จบการเดินทาง!</h2>
        <div style="font-size: 4rem; margin: 20px 0;" id="final-score">0</div>
        <p id="result-msg"></p>
        <button class="btn-main" onclick="location.reload()">เล่นไม่อีกครั้ง</button>
    </div>
</div>

<script>
    // ดึงข้อมูล 50 ข้อจากที่เตรียมไว้
    const gameData = [
        { q: "โหนกของอูฐทำหน้าที่สำคัญที่สุดคืออะไร?", a: "เก็บไขมันเพื่อเป็นพลังงาน", opts: ["เก็บน้ำ", "เก็บไขมันเพื่อเป็นพลังงาน", "ระบายความร้อน", "ช่วยในการทรงตัว"] },
        { q: "ต้นโกงกางใช้ 'รากค้ำจุน' เพื่อจุดประสงค์ใด?", a: "พยุงลำต้นไม่ให้ล้มในดินเลน", opts: ["ช่วยหายใจ", "พยุงลำต้นไม่ให้ล้มในดินเลน", "ดูดเกลือออกจากต้น", "หาอาหารได้ไกลขึ้น"] },
        { q: "กระบองเพชรเปลี่ยนใบเป็นหนามเพื่ออะไร?", a: "ลดการคายน้ำ", opts: ["ป้องกันศัตรูอย่างเดียว", "ลดการคายน้ำ", "ใช้สังเคราะห์แสง", "ดักจับน้ำค้าง"] },
        { q: "หมีขั้วโลกมี 'ไขมันหนา' และ 'ขนสีขาว' เพื่ออะไร?", a: "กันความหนาวและพรางตัว", opts: ["ช่วยให้ว่ายน้ำเร็ว", "กันความหนาวและพรางตัว", "ขู่ศัตรู", "ลดน้ำหนักตัว"] },
        { q: "ผักตบชวาลอยน้ำได้เพราะมีลักษณะใด?", a: "ก้านใบพองและมีช่องอากาศ", opts: ["ใบกว้างและบาง", "ก้านใบพองและมีช่องอากาศ", "รากมีขนาดสั้นมาก", "มีดอกที่มีกลิ่นหอม"] },
        { q: "จิ้งจอกทะเลทรายมีใบหูขนาดใหญ่เพื่อ?", a: "ช่วยระบายความร้อน", opts: ["ฟังเสียงได้ไกลขึ้น", "ช่วยระบายความร้อน", "ใช้ในการบิน", "พรางตัวในทราย"] },
        { q: "ความสัมพันธ์แบบ (+, +) ที่แยกจากกันไม่ได้คือ?", a: "ไลเคน (รากับสาหร่าย)", opts: ["นกเอี้ยงกับควาย", "ผีเสื้อกับดอกไม้", "ไลเคน (รากับสาหร่าย)", "กล้วยไม้กับต้นไม้ใหญ่"] },
        { q: "เหาฉลามกับฉลาม เป็นความสัมพันธ์แบบใด?", a: "ภาวะอิงอาศัย (+, 0)", opts: ["ภาวะปรสิต (+, -)", "ภาวะพึ่งพากัน (+, +)", "ภาวะอิงอาศัย (+, 0)", "ภาวะล่าเหยื่อ"] },
        { q: "ในโซ่อาหาร หัวลูกศรชี้ไปทางใดเสมอ?", a: "ผู้บริโภค (ผู้กิน)", opts: ["ผู้ผลิต", "ผู้บริโภค (ผู้กิน)", "พระอาทิตย์", "ผู้ย่อยสลาย"] },
        { q: "มนุษย์จัดเป็นผู้บริโภคประเภทใด?", a: "Omnivore (กินทั้งพืชและสัตว์)", opts: ["Herbivore", "Carnivore", "Omnivore (กินทั้งพืชและสัตว์)", "Decomposer"] },
        // ... (สามารถเพิ่มข้อที่เหลือจาก 50 ข้อได้ที่นี่เพื่อความสมบูรณ์)
    ];

    let currentQ = 0;
    let score = 0;

    function startGame() {
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-game').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if (currentQ >= gameData.length) {
            endGame();
            return;
        }

        const q = gameData[currentQ];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('lvl').innerText = currentQ + 1;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            optionsDiv.appendChild(btn);
        });

        const progress = (currentQ / gameData.length) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
    }

    function checkAnswer(btn, selected) {
        const correct = gameData[currentQ].a;
        const allBtns = document.querySelectorAll('.btn-opt');
        
        allBtns.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            score += 10;
            document.getElementById('score').innerText = score;
        } else {
            btn.classList.add('wrong');
            // แสดงเฉลย
            allBtns.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
        }

        setTimeout(() => {
            currentQ++;
            showQuestion();
        }, 1500);
    }

    function endGame() {
        document.getElementById('screen-game').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        
        let msg = "";
        if(score >= 80) msg = "สุดยอด! คุณคือ 'ราชาแห่งการวิวัฒนาการ' พร้อมสอบเข้า ม.1 แล้ว!";
        else if(score >= 50) msg = "เก่งมาก! คุณรอดชีวิตมาได้ แต่ต้องอ่านเรื่องความสัมพันธ์สิ่งมีชีวิตเพิ่มนะ";
        else msg = "คุณสูญพันธุ์! กลับไปทบทวนเรื่องการปรับตัวกับพระจอมเกล้าติวเตอร์ด่วน!";
        
        document.getElementById('result-msg').innerText = msg;
    }
</script>

</body>
</html>
