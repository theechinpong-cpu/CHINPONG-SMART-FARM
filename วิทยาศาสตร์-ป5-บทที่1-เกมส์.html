<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Hard Trials - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --primary: #06b6d4; --danger: #ef4444; --success: #10b981; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Chakra Petch', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #game-stage { position: relative; width: 100%; height: 100vh; background: radial-gradient(circle, #1e293b 0%, #020617 100%); }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none; }
        #hp-display { font-size: 2rem; color: var(--danger); pointer-events: auto; }
        #score-display { font-size: 1.5rem; color: var(--primary); }
        #q-container { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; font-size: 1.5rem; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border: 2px solid var(--primary); z-index: 90; line-height: 1.4; }
        .floating-opt { position: absolute; padding: 12px 20px; background: var(--primary); color: var(--bg); border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; border: 2px solid white; box-shadow: 0 0 15px rgba(6,182,212,0.4); transition: transform 0.1s; user-select: none; z-index: 80; white-space: nowrap; }
        .floating-opt:hover { transform: scale(1.1); background: white; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn-start { padding: 15px 50px; font-size: 1.8rem; background: var(--primary); border: none; border-radius: 50px; cursor: pointer; font-family: 'Chakra Petch'; box-shadow: 0 0 30px var(--primary); font-weight: bold; color: #000; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } 75% { transform: translate(-8px, -8px); } }
    </style>
</head>
<body>

<div id="game-stage">
    <div class="ui-layer">
        <div id="hp-display">❤️❤️❤️❤️❤️</div>
        <div id="score-display">คะแนน: 0 | ข้อที่: 1/30</div>
    </div>
    <div id="q-container">กด START เพื่อเริ่ม Hard Mode!</div>
    <div id="start-screen" class="overlay">
        <h1 style="font-size: 3.5rem; color: var(--primary); margin: 0;">30 HARD TRIALS</h1>
        <p style="font-size: 1.3rem;">วิเคราะห์ให้ดี เล็งให้แม่น... คุณมีหัวใจ 5 ดวงเท่านั้น!</p>
        <button class="btn-start" onclick="initGame()">GO!</button>
    </div>
    <div id="end-screen" class="overlay" style="display:none">
        <h1 id="end-status" style="font-size: 4rem;">FINISH</h1>
        <p id="end-msg" style="font-size: 1.5rem;"></p>
        <h2 style="color:gold">TOTAL SCORE: <span id="final-score">0</span></h2>
        <button class="btn-start" onclick="location.reload()">TRY AGAIN</button>
    </div>
</div>

<script>
    const questions = [
        // --- ส่วนที่ 1: พื้นฐานวิเคราะห์ (10 ข้อแรก) ---
        { q: "1. โหนกของอูฐทำหน้าที่สำคัญที่สุดคืออะไร?", a: "สะสมไขมันเพื่อสลายเป็นพลังงานและน้ำ", opts: ["สะสมน้ำสำรอง", "สะสมไขมันเพื่อสลายเป็นพลังงานและน้ำ", "ระบายความร้อนจากเลือด", "ช่วยถ่วงน้ำหนัก"] },
        { q: "2. ต้นกระบองเพชรเปลี่ยนใบเป็นหนาม จุดประสงค์หลักคืออะไร?", a: "ลดพื้นที่ผิวในการคายน้ำ", opts: ["ดักจับแมลงกินเป็นอาหาร", "ลดพื้นที่ผิวในการคายน้ำ", "ใช้สังเคราะห์แสงในเวลากลางคืน", "ป้องกันสัตว์มาแทะกินน้ำ"] },
        { q: "3. รากหายใจของต้นลำพูที่โผล่พ้นดินเลนมีไว้เพื่ออะไร?", a: "รับออกซิเจนจากอากาศมาใช้หายใจ", opts: ["ดูดซับเกลือออกจากลำต้น", "รับออกซิเจนจากอากาศมาใช้หายใจ", "รับแสงแดดเพื่อปรุงอาหาร", "ดักจับซากเน่าเปื่อย"] },
        { q: "4. ลักษณะใดของหมีขั้วโลกที่ช่วยเรื่องการ 'ลดการระบายความร้อน'?", a: "ใบหูขนาดเล็กและขาสั้น", opts: ["ขนสีขาวกลืนกับหิมะ", "มีอุ้งเท้าขนาดใหญ่", "ใบหูขนาดเล็กและขาสั้น", "ชั้นไขมันใต้ผิวหนังหนา"] },
        { q: "5. ผักตบชวาลอยน้ำได้ดีเยี่ยมเพราะโครงสร้างใด?", a: "ก้านใบมีช่องอากาศขนาดใหญ่", opts: ["ใบมีสารเคลือบแว็กซ์", "ก้านใบมีช่องอากาศขนาดใหญ่", "รากมีขนาดเบามาก", "ดอกมีน้ำหนักน้อย"] },
        { q: "6. นกเอี้ยงกับควาย หากแยกจากกันข้อใดถูกต้อง?", a: "ทั้งคู่ยังมีชีวิตอยู่ได้ตามปกติ", opts: ["ควายจะตายทันที", "นกเอี้ยงจะอดตาย", "ทั้งคู่ยังมีชีวิตอยู่ได้ตามปกติ", "จะเกิดโรคระบาดในฝูงควาย"] },
        { q: "7. ความสัมพันธ์แบบ 'แยกจากกันไม่ได้' (ถ้าแยกคือตาย) คือข้อใด?", a: "ไลเคน (รากับสาหร่าย)", opts: ["กล้วยไม้บนต้นไม้ใหญ่", "ผีเสื้อกับดอกไม้", "ไลเคน (รากับสาหร่าย)", "ปลาการ์ตูนกับดอกไม้ทะเล"] },
        { q: "8. ในสายใยอาหาร หาก 'ผู้ผลิต' หายไป สิ่งมีชีวิตแรกที่จะตายคือ?", a: "สัตว์กินพืช", opts: ["สัตว์กินเนื้อ", "สัตว์กินพืช", "ผู้ย่อยสลาย", "มนุษย์"] },
        { q: "9. ทำไมเห็ดและราถึงไม่จัดว่าเป็น 'ผู้ผลิต' ในระบบนิเวศ?", a: "เพราะไม่มีคลอโรฟิลล์สร้างอาหารเองไม่ได้", opts: ["เพราะเคลื่อนที่ไม่ได้", "เพราะไม่มีคลอโรฟิลล์สร้างอาหารเองไม่ได้", "เพราะมีขนาดเล็กเกินไป", "เพราะชอบขึ้นบนของเน่าเสีย"] },
        { q: "10. ความสัมพันธ์ระหว่าง 'กาฝากกับต้นไม้ใหญ่' ต่างจาก 'กล้วยไม้กับต้นไม้ใหญ่' อย่างไร?", a: "กาฝากแย่งน้ำและอาหารจากต้นไม้", opts: ["กาฝากให้ประโยชน์ต้นไม้", "กาฝากแย่งน้ำและอาหารจากต้นไม้", "กล้วยไม้ฆ่าต้นไม้ใหญ่", "ไม่ต่างกันเลย"] },

        // --- ส่วนที่ 2: วิเคราะห์สถานการณ์ (10 ข้อกลาง) ---
        { q: "11. ถ้าเอาปลาทองไปเลี้ยงในน้ำเค็ม ปลาทองจะตายเพราะเหตุใด?", a: "ร่างกายไม่สามารถปรับความสมดุลของเกลือได้", opts: ["น้ำเค็มไม่มีอากาศ", "ร่างกายไม่สามารถปรับความสมดุลของเกลือได้", "ปลาทองสายตาไม่ดีในน้ำเค็ม", "น้ำเค็มมีความหนาแน่นสูง"] },
        { q: "12. นกที่อพยพหนีหนาวจากไซบีเรีย จัดเป็นการปรับตัวด้านใด?", a: "พฤติกรรม", opts: ["โครงสร้าง", "พฤติกรรม", "สรีระ", "ทางเคมี"] },
        { q: "13. สิ่งมีชีวิตที่กินทั้งพืชและสัตว์ (Omnivore) คือข้อใด?", a: "หนู และ คน", opts: ["เสือ และ แมว", "วัว และ ควาย", "หนู และ คน", "นกแร้ง และ ไส้เดือน"] },
        { q: "14. ข้อใดคือความสัมพันธ์แบบเดียวกับ 'เห็บบนตัวสุนัข'?", a: "พยาธิในลำไส้คน", opts: ["เหาฉลามกับฉลาม", "พยาธิในลำไส้คน", "รากับสาหร่าย", "มดดำกับเพลี้ย"] },
        { q: "15. การที่ตั๊กแตนกิ่งไม้ทำตัวนิ่งๆ เหมือนกิ่งไม้ มีประโยชน์อย่างไร?", a: "พรางตัวจากผู้ล่าและดักซุ่มรอเหยื่อ", opts: ["ช่วยให้ประหยัดพลังงาน", "พรางตัวจากผู้ล่าและดักซุ่มรอเหยื่อ", "ช่วยให้ดูดซับความชื้นได้ดี", "ทำให้ศัตรูกลัวเพราะนึกว่าเป็นผี"] },
        { q: "16. พืชในป่าดิบชื้นมักมีใบกว้างและใหญ่ เพื่อวัตถุประสงค์ใด?", a: "เร่งการคายน้ำและรับแสงในที่ร่ม", opts: ["ลดการคายน้ำ", "เร่งการคายน้ำและรับแสงในที่ร่ม", "ป้องกันแมลงมาวางไข่", "เก็บน้ำฝนไว้ที่ใบ"] },
        { q: "17. ในการถ่ายทอดพลังงาน 10% (Ten Percent Law) พลังงานส่วนใหญ่หายไปในรูปใด?", a: "พลังงานความร้อนและการหายใจ", opts: ["พลังงานความร้อนและการหายใจ", "กลายเป็นซากเน่าเปื่อย", "ถูกส่งต่อไปยังผู้ผลิต", "หายไปในอวกาศ"] },
        { q: "18. 'ปลาตีน' มีการปรับตัวทางสรีระที่พิเศษคืออะไร?", a: "ผิวหนังสามารถแลกเปลี่ยนก๊าซได้เมื่ออยู่บนบก", opts: ["มีปอดเหมือนมนุษย์", "ผิวหนังสามารถแลกเปลี่ยนก๊าซได้เมื่ออยู่บนบก", "สามารถเดินได้เร็วกว่าวิ่ง", "กินโคลนเป็นอาหารหลัก"] },
        { q: "19. หากประชากร 'งู' ลดลงอย่างรวดเร็ว จะส่งผลกระทบต่อ 'หนู' อย่างไร?", a: "หนูจะมีจำนวนเพิ่มขึ้นและทำลายพืชไร่", opts: ["หนูจะสูญพันธุ์ตามงูไป", "หนูจะมีจำนวนเพิ่มขึ้นและทำลายพืชไร่", "หนูจะเปลี่ยนไปกินงูแทน", "ไม่มีผลกระทบต่อหนู"] },
        { q: "20. จิ้งจอกทะเลทรายมักออกหากินตอนกลางคืน เพราะเหตุใด?", a: "เพื่อเลี่ยงการสูญเสียน้ำและความร้อนในตอนกลางวัน", opts: ["สายตาดีเฉพาะตอนกลางคืน", "เพื่อเลี่ยงการสูญเสียน้ำและความร้อนในตอนกลางวัน", "ศัตรูของมันนอนหลับหมด", "เหยื่อของมันชอบออกมาตอนกลางคืน"] },

        // --- ส่วนที่ 3: โจทย์ขั้นสูง/ห้อง Gifted (10 ข้อสุดท้าย) ---
        { q: "21. ระบบนิเวศที่มีความสมดุลที่สุด ควรมีลักษณะอย่างไร?", a: "มีความหลากหลายของสายใยอาหารสูง", opts: ["มีผู้ผลิตจำนวนน้อยที่สุด", "มีความหลากหลายของสายใยอาหารสูง", "มีสัตว์กินเนื้อมากกว่าสัตว์กินพืช", "มีแต่ผู้ย่อยสลายเท่านั้น"] },
        { q: "22. พืชที่ขึ้นในน้ำเค็ม (Halophyte) มีวิธีการกำจัดเกลือส่วนเกินอย่างไร?", a: "ขับเกลือออกทางต่อมบริเวณใบ", opts: ["ขับเกลือออกทางราก", "ขับเกลือออกทางต่อมบริเวณใบ", "เก็บเกลือไว้ในผลเท่านั้น", "เปลี่ยนเกลือเป็นน้ำตาล"] },
        { q: "23. ข้อใดจัดเป็น 'ห่วงโซ่อาหารแบบเศษซาก' (Detritus food chain)?", a: "ซากพืช -> ไส้เดือน -> นก", opts: ["หญ้า -> กระต่าย -> งู", "ซากพืช -> ไส้เดือน -> นก", "ข้าว -> ตั๊กแตน -> กบ", "แพลงก์ตอนพืช -> กุ้ง -> ปลา"] },
        { q: "24. สิ่งมีชีวิตใดทำหน้าที่เปลี่ยน 'สารอินทรีย์' ให้เป็น 'สารอนินทรีย์' กลับสู่ดิน?", a: "ผู้ย่อยสลาย (Decomposer)", opts: ["ผู้ผลิต", "ผู้บริโภคพืช", "ผู้ย่อยสลาย (Decomposer)", "สัตว์กินซาก"] },
        { q: "25. สัญลักษณ์ (+ , 0) หมายความว่าอย่างไร?", a: "ฝ่ายหนึ่งได้ประโยชน์ อีกฝ่ายไม่เสียและไม่ได้ประโยชน์", opts: ["ฝ่ายหนึ่งได้ อีกฝ่ายเสีย", "ฝ่ายหนึ่งได้ประโยชน์ อีกฝ่ายไม่เสียและไม่ได้ประโยชน์", "ได้ประโยชน์ร่วมกันทั้งคู่", "เสียประโยชน์ทั้งคู่"] },
        { q: "26. กระต่ายในเขตหนาวมักมีสีขนเปลี่ยนตามฤดูกาล เป็นการปรับตัวเพื่ออะไร?", a: "พรางตัวจากผู้ล่าในสภาพแวดล้อมที่ต่างกัน", opts: ["รักษาอุณหภูมิร่างกาย", "พรางตัวจากผู้ล่าในสภาพแวดล้อมที่ต่างกัน", "ดึงดูดเพศตรงข้าม", "บอกอาณาเขต"] },
        { q: "27. กล้วยไม้ที่เกาะบนต้นไม้ใหญ่ ไม่จัดว่าเป็นปรสิตเพราะเหตุใด?", a: "เพราะกล้วยไม้สร้างอาหารเองได้จากแสงแดด", opts: ["เพราะกล้วยไม้ตัวเล็กกว่า", "เพราะกล้วยไม้สร้างอาหารเองได้จากแสงแดด", "เพราะต้นไม้ใหญ่ชอบกล้วยไม้", "เพราะกล้วยไม้ไม่มีราก"] },
        { q: "28. 'ปลวกกับโปรโตซัวในลำไส้' เป็นความสัมพันธ์รูปแบบใด?", a: "ภาวะพึ่งพากัน (Mutualism)", opts: ["ภาวะอิงอาศัย", "ภาวะพึ่งพากัน (Mutualism)", "ภาวะได้ประโยชน์ร่วมกัน", "ภาวะปรสิต"] },
        { q: "29. การฉีดพ่นยาฆ่าแมลงในนาข้าว จะส่งผลเสียต่อใครมากที่สุดในระยะยาว?", a: "ผู้บริโภคลำดับสุดท้าย (สะสมสารพิษมากที่สุด)", opts: ["ต้นข้าว", "แมลงศัตรูพืช", "ผู้บริโภคลำดับสุดท้าย (สะสมสารพิษมากที่สุด)", "ผู้ผลิต"] },
        { q: "30. ปัจจัยใดสำคัญที่สุดที่ทำให้สิ่งมีชีวิตต้องเกิดการ 'ปรับตัว'?", a: "การเปลี่ยนแปลงของสภาพแวดล้อม", opts: ["ต้องการเป็นจ่าฝูง", "การเปลี่ยนแปลงของสภาพแวดล้อม", "ความต้องการความสวยงาม", "การเพิ่มขึ้นของประชากรมนุษย์"] }
    ];

    let currentIdx = 0, hp = 5, score = 0, floatingElements = [], audioCtx, oscillator, gainNode;

    function startMusic() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(55, audioCtx.currentTime); 
        setInterval(() => { if(audioCtx.state === 'running') { gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4); } }, 500);
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination); oscillator.start();
    }

    function initGame() { document.getElementById('start-screen').style.display = 'none'; startMusic(); spawnQuestion(); animate(); }

    function spawnQuestion() {
        if (currentIdx >= questions.length || hp <= 0) { endGame(hp > 0); return; }
        const data = questions[currentIdx];
        document.getElementById('q-container').innerText = data.q;
        document.getElementById('score-display').innerText = `คะแนน: ${score} | ข้อที่: ${currentIdx + 1}/30`;
        floatingElements.forEach(el => el.dom.remove());
        floatingElements = [];
        data.opts.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'floating-opt'; div.innerText = opt;
            document.getElementById('game-stage').appendChild(div);
            const element = { dom: div, x: Math.random() * (window.innerWidth - 180), y: Math.random() * (window.innerHeight - 300) + 250, vx: (Math.random() - 0.5) * 2.5, vy: (Math.random() - 0.5) * 2.5 };
            div.onclick = () => checkAnswer(opt);
            floatingElements.push(element);
        });
    }

    function animate() {
        floatingElements.forEach(el => {
            el.x += el.vx; el.y += el.vy;
            if (el.x <= 0 || el.x >= window.innerWidth - el.dom.offsetWidth) el.vx *= -1;
            if (el.y <= 250 || el.y >= window.innerHeight - el.dom.offsetHeight) el.vy *= -1;
            el.dom.style.left = el.x + 'px'; el.dom.style.top = el.y + 'px';
        });
        requestAnimationFrame(animate);
    }

    function checkAnswer(selected) {
        const correct = questions[currentIdx].a;
        if (selected === correct) { score += 50; currentIdx++; beep(800, 0.1); spawnQuestion(); }
        else {
            hp--; updateHP(); document.body.classList.add('shake'); beep(150, 0.4);
            setTimeout(() => document.body.classList.remove('shake'), 400);
            if (hp <= 0) endGame(false); else { currentIdx++; spawnQuestion(); }
        }
    }

    function beep(freq, duration) { if(!audioCtx) return; const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.frequency.value = freq; osc.connect(g); g.connect(audioCtx.destination); osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration); osc.stop(audioCtx.currentTime + duration); }
    function updateHP() { document.getElementById('hp-display').innerText = "❤️".repeat(hp) + "🖤".repeat(5-hp); }

    function endGame(isWin) {
        if(oscillator) oscillator.stop();
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        const status = document.getElementById('end-status');
        const msg = document.getElementById('end-msg');
        if(isWin) { status.innerText = "🏆 ADAPTATION MASTER"; status.style.color = "var(--success)"; msg.innerText = "คุณคือสุดยอดสิ่งมีชีวิตที่แกร่งที่สุดในปฐพี!"; }
        else { status.innerText = "💀 EXTINCT"; status.style.color = "var(--danger)"; msg.innerText = "ธรรมชาติได้คัดสรรคุณออก... กลับไปฝึกฝนใหม่!"; }
    }
</script>
