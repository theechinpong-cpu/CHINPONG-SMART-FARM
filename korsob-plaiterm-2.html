<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>English Grade 5 - Final Exam 50 Unique Questions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .vocab { border-bottom: 2px dashed #f43f5e; cursor: pointer; position: relative; font-weight: bold; color: #e11d48; }
        .vocab:hover::after {
            content: attr(data-meaning);
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 6px 12px; border-radius: 8px;
            font-size: 13px; white-space: nowrap; z-index: 50; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-blue-50/50 pb-20">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold">English Final Exam: Grade 5 (Term 2)</h1>
            <p class="text-sm font-bold bg-blue-700 px-3 py-1 rounded-lg">50 Questions</p>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <div class="bg-white p-6 rounded-3xl shadow-xl border-b-4 border-blue-600 mb-8">
            <h2 class="font-black text-slate-800 text-xl mb-4 underline decoration-blue-200">How to use / วิธีใช้งาน</h2>
            <ul class="text-sm text-slate-600 space-y-2">
                <li>🔴 <span class="font-bold">Hover (ชี้):</span> เพื่อดูคำอ่านและความหมายของคำศัพท์</li>
                <li>🔊 <span class="font-bold">Click (คลิก):</span> เพื่อฟังเสียงอ่านภาษาอังกฤษที่ถูกต้อง</li>
            </ul>
        </div>

        <div id="quiz-container" class="bg-white p-8 rounded-3xl shadow-2xl min-h-[400px]">
            <div id="q-stage">
                <div class="flex justify-between items-center mb-10">
                    <span id="q-label" class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-black"></span>
                    <span id="score-display" class="font-bold text-slate-400 uppercase text-xs tracking-widest">Score: 0</span>
                </div>
                <h3 id="q-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-10 leading-relaxed"></h3>
                <div id="q-options" class="grid gap-4 md:grid-cols-2"></div>
            </div>

            <div id="result-page" class="hidden text-center py-10">
                <h2 class="text-6xl font-black text-blue-600 mb-4" id="final-score"></h2>
                <div id="review-list" class="text-left space-y-4 max-h-[500px] overflow-y-auto bg-slate-50 p-6 rounded-2xl border"></div>
                <button onclick="location.reload()" class="mt-8 bg-blue-600 text-white px-12 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">Restart Exam</button>
            </div>
        </div>
    </main>

    <script>
        function speak(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'en-US';
            window.speechSynthesis.speak(ut);
        }

        function v(word, mean) {
            return `<span class="vocab" data-meaning="${mean}" onclick="speak('${word}')">${word}</span>`;
        }

        const questions = [
            // Comparisons
            {q:`A giraffe is ${v('taller','/ทอล-เลอร์/ สูงกว่า')} than a horse.`, a:["tall","taller","tallest","more tall"], c:1, e:"เปรียบเทียบ 2 สิ่ง (กว่า) ใช้ adjective + er"},
            {q:`The blue whale is the ${v('largest','/ลา-เจสท์/ ใหญ่ที่สุด')} animal in the world.`, a:["large","larger","largest","more large"], c:2, e:"เปรียบเทียบที่สุด ใช้ the + adjective + est"},
            {q:`A Ferrari is ${v('more expensive','/มอร์ อิค-สเพน-ซิฟ/ แพงกว่า')} than a bicycle.`, a:["expensive","expensiver","more expensive","most expensive"], c:2, e:"คำ 3 พยางค์ขึ้นไป ใช้ 'more' ในขั้นกว่า"},
            {q:`English is ${v('easier','/อี-ซี-เออร์/ ง่ายกว่า')} than Math.`, a:["easy","easier","easiest","easyer"], c:1, e:"คำที่ลงท้ายด้วย y ให้เปลี่ยน y เป็น i แล้วเติม er"},
            {q:`He is the ${v('best','/เบสท์/ ดีที่สุด')} student in class.`, a:["good","better","best","goodest"], c:2, e:"ขั้นสูงสุดของ good คือ best"},
            // Health
            {q:`I have a ${v('headache','/เฮด-เอค/ ปวดหัว')}. I need to rest.`, a:["stomachache","headache","toothache","cough"], c:1, e:"head (หัว) + ache (ปวด) = ปวดหัว"},
            {q:`You should see a ${v('dentist','/เดน-ทิสท์/ หมอฟัน')} if you have a toothache.`, a:["doctor","dentist","nurse","teacher"], c:1, e:"ปวดฟันต้องไปหาหมอฟัน"},
            {q:`Drink a lot of water if you have a ${v('fever','/ฟี-เวอร์/ เป็นไข้')}.`, a:["fever","broken leg","cut","bruise"], c:0, e:"เป็นไข้ ตัวร้อน ควรดื่มน้ำเยอะๆ"},
            {q:`What's the matter? I have a ${v('sore throat','/ซอร์ โธรท/ เจ็บคอ')}.`, a:["sore throat","runny nose","earache","backache"], c:0, e:"sore throat คืออาการเจ็บคอ"},
            {q:`Don't eat too much candy or you will have a ${v('stomachache','/สทัม-มัค-เอค/ ปวดท้อง')}.`, a:["headache","earache","stomachache","cough"], c:2, e:"กินขนมเยอะอาจทำให้ปวดท้อง"},
            // Future Tense
            {q:`I ${v('will','/วิล/ จะ')} go to London next summer.`, a:["will","am","do","did"], c:0, e:"Future Tense บอกเหตุการณ์ในอนาคตใช้ will"},
            {q:`It ${v('will rain','/วิล เรน/ ฝนจะตก')} tomorrow. Don't forget your umbrella.`, a:["rains","rained","will rain","is rain"], c:2, e:"อนาคต (tomorrow) ใช้ will + v.1"},
            {q:`Will you join the party? No, I ${v("won't","/โวนท์/ จะไม่")}.`, a:["will","won't","don't","not"], c:1, e:"ปฏิเสธของ will คือ won't"},
            {q:`We ${v('are going to','/อาร์ โก-อิง ทู/ กำลังจะ')} visit grandma this weekend.`, a:["will","are going to","go","went"], c:1, e:"แผนการที่แน่นอนใช้ be going to"},
            {q:`What ${v('will happen','/วิล แฮพ-เพ็น/ จะเกิดขึ้น')} in the future?`, a:["happens","happened","will happen","happen"], c:2, e:"ประโยคคำถามอนาคตใช้ will"},
            // Environment
            {q:`We should ${v('recycle','/รี-ไซ-เคิล/ รีไซเคิล')} plastic bottles.`, a:["throw","burn","recycle","waste"], c:2, e:"ช่วยโลกด้วยการนำกลับมาใช้ใหม่"},
            {q:`Don't ${v('litter','/ลิท-เทอร์/ ทิ้งขยะเรี่ยราด')} in the park.`, a:["litter","clean","plant","save"], c:0, e:"ห้ามทิ้งขยะไม่เป็นที่"},
            {q:`Smoke from cars causes air ${v('pollution','/พอล-ลู-ชัน/ มลพิษ')}.`, a:["fresh","pollution","oxygen","water"], c:1, e:"ควันรถทำให้เกิดมลพิษทางอากาศ"},
            {q:`We must ${v('save','/เซฟ/ ประหยัด')} electricity.`, a:["waste","save","use","burn"], c:1, e:"ควรประหยัดพลังงานไฟฟ้า"},
            {q:`Turn off the ${v('faucet','/ฟอ-เซิท/ ก๊อกน้ำ')} when you brush your teeth.`, a:["light","faucet","TV","door"], c:1, e:"แปรงฟันควรปิดก๊อกน้ำ"},
            // Directions & Places
            {q:`The bank is ${v('opposite','/ออพ-พะ-ซิท/ ตรงข้าม')} the school.`, a:["between","opposite","under","inside"], c:1, e:"opposite คืออยู่ฝั่งตรงข้ามกัน"},
            {q:`Go ${v('straight','/สเทรท/ ตรงไป')} and turn left at the corner.`, a:["straight","around","back","up"], c:0, e:"go straight คือเดินตรงไป"},
            {q:`You can buy stamps at the ${v('post office','/โพสท์ ออฟ-ฟิศ/ ไปรษณีย์')}.`, a:["hospital","post office","library","zoo"], c:1, e:"ซื้อแสตมป์ต้องไปไปรษณีย์"},
            {q:`A ${v('library','/ไล-บระ-รี/ ห้องสมุด')} is a place to read books.`, a:["market","library","gym","park"], c:1, e:"อ่านหนังสือต้องไปห้องสมุด"},
            {q:`The hospital is ${v('between','/บี-ทวีน/ ระหว่าง')} the cafe and the bank.`, a:["near","between","on","at"], c:1, e:"between ... and ... คืออยู่ระหว่างกลาง"},
            // Vocabulary & Mixed
            {q:`Which one is a ${v('healthy','/เฮล-ธี/ สุขภาพดี')} food?`, a:["Pizza","Salad","Candy","Donut"], c:1, e:"สลัดเป็นอาหารเพื่อสุขภาพ"},
            {q:`I use a ${v('thermometer','/เธอร์-โม-มิ-เทอร์/ ที่วัดไข้')} to check temperature.`, a:["ruler","spoon","thermometer","pen"], c:2, e:"ใช้ที่วัดไข้ตรวจสอบอุณหภูมิร่างกาย"},
            {q:`It's very cold. I should wear a ${v('sweater','/สเวท-เทอร์/ เสื้อกันหนาว')}.`, a:["T-shirt","sweater","shorts","swimsuit"], c:1, e:"หนาวควรใส่เสื้อกันหนาว"},
            {q:`A ${v('chef','/เชฟ/ หัวหน้าพ่อครัว')} works in the kitchen.`, a:["pilot","doctor","chef","farmer"], c:2, e:"เชฟทำงานในครัว"},
            {q:`The sun rises in the ${v('east','/อีสท์/ ทิศตะวันออก')}.`, a:["west","north","south","east"], c:3, e:"พระอาทิตย์ขึ้นทิศตะวันออก"},
            {q:`Can you ${v('lend','/เลนด์/ ให้ยืม')} me a pencil?`, a:["borrow","lend","give","buy"], c:1, e:"lend คือการให้ผู้อื่นยืม"},
            {q:`This movie is ${v('boring','/บอ-ริง/ น่าเบื่อ')}. I want to sleep.`, a:["exciting","fun","boring","great"], c:2, e:"น่าเบื่อจนอยากนอน"},
            {q:`A lion is ${v('braver','/เบรฟ-เว่อร์/ กล้าหาญกว่า')} than a rabbit.`, a:["brave","braver","bravest","more brave"], c:1, e:"สิงโตกล้าหาญกว่ากระต่าย"},
            {q:`Please ${v('quiet','/ไคว-เอิท/ เงียบ')} in the library.`, a:["be quiet","be loud","be fast","be slow"], c:0, e:"ในห้องสมุดต้องเงียบ"},
            {q:`I have ${v('earache','/เอียร์-เอค/ ปวดหู')}. I can't hear you.`, a:["earache","toothache","backache","headache"], c:0, e:"ear (หู) + ache = ปวดหู"},
            {q:`We use a ${v('knife','/ไนฟ์/ มีด')} to cut fruit.`, a:["fork","spoon","knife","napkin"], c:2, e:"ใช้มีดตัดผลไม้"},
            {q:`Is it ${v('far','/ฟาร์/ ไกล')} from here? No, it's near.`, a:["far","long","high","big"], c:0, e:"ตรงข้ามกับ near (ใกล้) คือ far (ไกล)"},
            {q:`She ${v('will study','/วิล สทัด-ดี/ จะเรียน')} hard for the exam.`, a:["studies","will study","studied","studying"], c:1, e:"จะเรียน (อนาคต) ใช้ will + v.1"},
            {q:`Do you have ${v('runny nose','/รัน-นี โนส/ น้ำมูกไหล')}? Yes, I do.`, a:["runny nose","broken arm","fever","cut"], c:0, e:"น้ำมูกไหลเรียกว่า runny nose"},
            {q:`What is the ${v('cheapest','/ชี-เพสท์/ ถูกที่สุด')} fruit here?`, a:["cheap","cheaper","cheapest","more cheap"], c:2, e:"ขั้นสูงสุดของ cheap (ถูก) คือ cheapest"},
            {q:`The earth is ${v('smaller','/สมอล-เลอร์/ เล็กกว่า')} than the sun.`, a:["small","smaller","smallest","more small"], c:1, e:"โลกเล็กกว่าดวงอาทิตย์"},
            {q:`I ${v('am thirsty','/แอม เธิร์ส-ที/ หิวน้ำ')}. Can I have some water?`, a:["hungry","thirsty","angry","tired"], c:1, e:"หิวน้ำต้องใช้ thirsty"},
            {q:`We shouldn't ${v('waste','/เวสท์/ สิ้นเปลือง')} water.`, a:["save","waste","keep","drink"], c:1, e:"ไม่ควรใช้น้ำอย่างสิ้นเปลือง"},
            {q:`Which animal is the ${v('slowest','/สโล-เวสท์/ ช้าที่สุด')}?`, a:["Snail","Cheetah","Lion","Horse"], c:0, e:"หอยทากช้าที่สุด"},
            {q:`You look ${v('pale','/เพล/ ซีดเซียว')}. Are you okay?`, a:["pale","happy","strong","red"], c:0, e:"สีหน้าซีดเซียว (pale) มักใช้ถามคนป่วย"},
            {q:`A doctor works in a ${v('hospital','/ฮอส-พะ-เทิล/ โรงพยาบาล')}.`, a:["school","farm","hospital","station"], c:2, e:"หมอทำงานที่โรงพยาบาล"},
            {q:`What will you ${v('be','/บี/ เป็น')} when you grow up?`, a:["be","do","have","get"], c:0, e:"โตขึ้นอยาก 'เป็น' อะไร ใช้ will be"},
            {q:`Please ${v('turn left','/เทิร์น เลฟท์/ เลี้ยวซ้าย')} at the traffic light.`, a:["go","turn left","stop","walk"], c:1, e:"เลี้ยวซ้ายที่สัญญาณไฟจราจร"},
            {q:`Gold is ${v('more valuable','/มอร์ แว-ลู-อะ-เบิล/ มีค่ามากกว่า')} than silver.`, a:["valuable","more valuable","most valuable","valuabler"], c:1, e:"ขั้นกว่าของคำยาวๆ ใช้ more"},
            {q:`I hope you ${v('get well soon','/เก็ท เวล ซูน/ หายป่วยไวๆ')}.`, a:["get well soon","good luck","happy birthday","thank you"], c:0, e:"คำอวยพรให้คนป่วยหายไวๆ"}
        ];

        let current = 0, score = 0, userAnswers = [];

        function render() {
            const q = questions[current];
            document.getElementById('q-label').innerText = `QUESTION ${current+1} / 50`;
            document.getElementById('q-text').innerHTML = q.q;
            const container = document.getElementById('q-options');
            container.innerHTML = "";
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "text-left p-4 border-2 border-slate-100 rounded-2xl hover:bg-blue-50 hover:border-blue-400 transition-all font-medium text-slate-700 shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => {
                    userAnswers.push(idx);
                    if(idx === q.c) score++;
                    document.getElementById('score-display').innerText = `Score: ${score}`;
                    current++;
                    if(current < 50) render(); else finish();
                };
                container.appendChild(btn);
            });
        }

        function finish() {
            document.getElementById('q-stage').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/50`;
            const review = document.getElementById('review-list');
            questions.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.c;
                review.innerHTML += `
                    <div class="p-4 rounded-xl border-l-4 ${isCorrect ? 'border-emerald-500 bg-emerald-50' : 'border-rose-500 bg-rose-50'}">
                        <p class="font-bold text-slate-800 text-sm">${i+1}. ${q.q}</p>
                        <p class="text-xs mt-1 ${isCorrect?'text-emerald-600':'text-rose-600'}">Your Ans: ${q.a[userAnswers[i]]} | Correct: ${q.a[q.c]}</p>
                        <p class="text-[10px] text-slate-400 italic mt-1">💡 ${q.e}</p>
                    </div>`;
            });
        }

        render();
    </script>
</body>
</html>
