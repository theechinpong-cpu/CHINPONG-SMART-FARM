        { q: "วันอาสาฬหบูชา เกิดขึ้นในวันขึ้น 15 ค่ำ เดือนใด", opts: ["เดือน 6", "เดือน 8", "เดือน 10", "เดือน 12"], corr: 1, th: "เดือนแห่งการแสดงธรรม", det: "เดือน 8 เป็นวันปฐมเทศนา" },
        { q: "เทวทูต 4 ข้อใดที่ทำให้พระพุทธเจ้าตัดสินใจออกผนวช", opts: ["คนแก่ เจ็บ ตาย สมณะ", "การได้ลาภยศ", "การได้รับความสุข", "การเห็นดอกไม้"], corr: 0, th: "ผู้ชี้ทางพ้นทุกข์", det: "สมณะคือจุดเปลี่ยนให้เห็นทางพ้นทุกข์" },
        { q: "ความกตัญญูจัดเป็นเครื่องหมายของสิ่งใด", opts: ["คนดี", "คนเก่ง", "คนรวย", "นักบวช"], corr: 0, th: "คุณธรรมพื้นฐาน", det: "กตัญญูเป็นเครื่องหมายของคนดี" },
        { q: "มรรค 8 เริ่มต้นด้วยข้อใด", opts: ["สัมมาทิฏฐิ", "สัมมาวาจา", "สัมมากัมมันตะ", "สัมมาสติ"], corr: 0, th: "จุดเริ่มของปัญญา", det: "สัมมาทิฏฐิคือความเห็นชอบ" },
        { q: "การบริหารจิต คือการฝึกอะไร", opts: ["ความอดทน", "สมาธิและปัญญา", "ความจำ", "การโต้ตอบ"], corr: 1, th: "การฝึกใจ", det: "ทำให้จิตมีสมาธิและเกิดปัญญา" },
        { q: "เบญจธรรมที่คู่กับศีลข้อ 2 คืออะไร", opts: ["สัมมาอาชีวะ", "ความเสียสละ", "ความซื่อสัตย์", "ความอดทน"], corr: 2, th: "ความตรงไปตรงมา", det: "ศีลข้อ 2 คือไม่ลักทรัพย์ คู่กับความซื่อสัตย์" },
        { q: "หลักศาสนสัมพันธ์ มีไว้เพื่ออะไร", opts: ["สร้างความแตกแยก", "อยู่ร่วมกันอย่างสันติ", "แข่งขันกัน", "เปรียบเทียบศาสนา"], corr: 1, th: "สันติภาพ", det: "เพื่อการเข้าใจและการเคารพความแตกต่าง" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
