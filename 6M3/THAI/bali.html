<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบคัมภีร์ลับบาลี-สันสกฤต ม.3</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background: #fdfaf6; }
        .summary { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid #2980b9; margin-bottom: 20px; }
        .q-card { background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hint { color: #2980b9; font-style: italic; font-size: 0.9em; margin-bottom: 10px; display: block; font-weight: bold; }
        .options { display: grid; gap: 10px; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; }
        button:hover { background: #d6eaf8; }
        .correct { background: #27ae60 !important; color: white; }
        .wrong { background: #c0392b !important; color: white; }
        .detail { margin-top: 10px; padding: 10px; background: #ebf5fb; border-left: 4px solid #2980b9; display: none; }
    </style>
</head>
<body>

<div class="summary">
    <h2>ข้อสอบ: คัมภีร์ลับการแยกคำบาลี-สันสกฤต (ม.3)</h2>
    <p>จำนวน: 25 ข้อ | เน้นการวิเคราะห์เชิงโครงสร้างตามหลักพยัญชนะวรรคและอักขระพิเศษ</p>
    <div><b>เทคนิคติวเตอร์:</b> ใช้วิธี "สแกนหาศัตรู" (ศ, ษ, ฤ, รร, ควบกล้ำ) ก่อนเสมอ!</div>
</div>

<div id="quiz-container"></div>

<script>
    const questions = [
        { q: "คำว่า 'กษัตริย์' เป็นคำยืมจากภาษาใด", opts: ["บาลี", "สันสกฤต", "เขมร", "จีน"], corr: 1, th: "พิจารณาจาก ศ และตัวควบกล้ำ", det: "มี ศ และการควบกล้ำ เป็นสันสกฤต" },
        { q: "ข้อใดเป็นคำบาลีแท้ทุกคำ", opts: ["สัจจะ, ปัญญา", "กษัตริย์, ฤดู", "อัคคี, ศรัทธา", "วิทยา, ภรรยา"], corr: 0, th: "กฎพยัญชนะวรรค", det: "สัจจะ ปัญญา เป็นบาลีเพราะมีตัวสะกด-ตัวตามตรงตามกฎวรรค" },
        { q: "เพราะเหตุใด 'อิทธิพล' จึงเป็นภาษาสันสกฤต", opts: ["มี ฤ", "มี ศ", "มีการควบกล้ำ", "มีตัวสะกดตามกฎบาลี"], corr: 0, th: "พิจารณาจากสระ ฤ", det: "มี ฤ เป็นลักษณะเฉพาะของสันสกฤต" },
        { q: "คำว่า 'กีฬา' มีลักษณะเด่นตามกฎของภาษาใด", opts: ["บาลี", "สันสกฤต", "เขมร", "ชวา"], corr: 0, th: "พิจารณาจาก ฬ", det: "บาลีนิยมใช้ ฬ" },
        { q: "ข้อใดไม่ใช่คำสันสกฤต", opts: ["ปรารถนา", "กรรรม", "มัจฉา", "อัศจรรย์"], corr: 2, th: "กฎพยัญชนะวรรค", det: "มัจฉา มี จ สะกด ฉ ตาม เป็นบาลี" },
        { q: "คำว่า 'ปัญญา' จัดเป็นภาษาใด", opts: ["บาลี", "สันสกฤต", "เขมร", "มลายู"], corr: 0, th: "พิจารณาจากตัวสะกด-ตัวตาม", det: "ญ เป็นตัวสะกดและตัวตามในวรรคเดียวกัน" },
        { q: "ข้อใดมี 'รร' (รหัน) ทุกคำ", opts: ["ธรรม, กรรม", "สวรรค์, บรรพต", "กรรไกร, บรรทัด", "ถูกทุกข้อ"], corr: 3, th: "ลักษณะเฉพาะสันสกฤต", det: "รร (รหัน) เป็นลักษณะเฉพาะที่พบมากในสันสกฤต" },
        { q: "คำใดมี ศ หรือ ษ ที่ไม่ใช่สันสกฤต", opts: ["ไม่มี", "ศิษย์", "ศึกษา", "กษัตริย์"], corr: 0, th: "ตรวจสอบ ศ ษ", det: "ศ และ ษ มักปรากฏในสันสกฤตเสมอ" },
        { q: "คำว่า 'มิตร' จัดเป็นภาษาใด", opts: ["บาลี", "สันสกฤต", "เขมร", "จีน"], corr: 1, th: "พิจารณาการควบกล้ำ", det: "มีการควบกล้ำและเป็นคำที่นิยมในสันสกฤต" },
        { q: "ข้อใดไม่ใช่กฎของภาษาบาลี", opts: ["มีสระ 8 ตัว", "นิยมใช้ ฬ", "มีตัวสะกด-ตาม", "นิยมใช้ ฤ ฤๅ"], corr: 3, th: "กฎสระ", det: "ฤ ฤๅ เป็นสระของสันสกฤต" },
        { q: "คำว่า 'วิญญาณ' เป็นคำยืมจากภาษาใด", opts: ["บาลี", "สันสกฤต", "เขมร", "จีน"], corr: 0, th: "พิจารณาตัวสะกด-ตาม", det: "ญ เป็นตัวสะกดและตามในวรรคเดียวกัน" },
        { q: "ข้อใดประกอบด้วยคำสันสกฤตทั้งหมด", opts: ["มหา, ฤทัย", "ธรรม, จิต", "อิสรี, บุษบา", "ถูกทุกข้อ"], corr: 3, th: "วิเคราะห์อักขระ", det: "ทุกคำมีอักขระพิเศษของสันสกฤต" },
        { q: "ภาษาบาลีมักใช้พยัญชนะตัวใดแทนที่ในคำสันสกฤตที่ใช้ 'ศ' หรือ 'ษ'", opts: ["ส", "ห", "ร", "ล"], corr: 0, th: "บาลีเน้น ส", det: "เช่น ศาสนา(สันสกฤต) เป็น ศาสนา(บาลี)" },
        { q: "คำว่า 'สวรรค์' มีลักษณะเด่นอย่างไร", opts: ["ใช้ รร", "ใช้ตัวควบ", "ใช้ ษ", "เป็นบาลี"], corr: 0, th: "วิเคราะห์ รร", det: "รหันเป็นลักษณะเด่นของสันสกฤต" },
        { q: "พยัญชนะวรรคที่นิยมในภาษาบาลีมีกี่วรรค", opts: ["3 วรรค", "4 วรรค", "5 วรรค", "6 วรรค"], corr: 2, th: "กฎวรรค", det: "มี 5 วรรคคือ กะ จะ ฏะ ตะ ปะ" },
        { q: "คำใดต่อไปนี้เป็นบาลีแท้", opts: ["สัตบุรุษ", "อิทธิ", "กัลยาณี", "ถูกทุกข้อ"], corr: 3, th: "วิเคราะห์กฎสะกด-ตาม", det: "ทุกคำมีโครงสร้างสะกด-ตามที่เคร่งครัด" },
        { q: "คำใดคือคำสันสกฤต", opts: ["อาทิตย์", "วิทยาลัย", "ศรัทธา", "ถูกทุกข้อ"], corr: 3, th: "มองหาอักขระพิเศษ", det: "มีทั้ง รร, ควบกล้ำ, ศ" },
        { q: "ข้อใดถูกต้อง", opts: ["บาลีใช้ ฤ ฤๅ", "สันสกฤตใช้ ฬ", "บาลีใช้ ศ ษ", "สันสกฤตใช้ ศ ษ"], corr: 3, th: "กฎพยัญชนะ", det: "ศ และ ษ เป็นสัญลักษณ์สันสกฤต" },
        { q: "คำว่า 'อุปสรรค' เป็นคำยืมจากภาษาใด", opts: ["บาลี", "สันสกฤต", "เขมร", "จีน"], corr: 1, th: "ตรวจสอบ ศ", det: "มี ศ เป็นสันสกฤต" },
        { q: "คำใดอ่านออกเสียง 'รร' เหมือนเสียงสระอะ", opts: ["บรรพต", "ธรรม", "กรรม", "ถูกทุกข้อ"], corr: 3, th: "การอ่าน รร", det: "รหันในสันสกฤตทำหน้าที่เป็นสระอะ" },
        { q: "คำใดต่อไปนี้เป็นคำสันสกฤต", opts: ["กรรไกร", "กรรรม", "บันทึก", "ถูกทุกข้อ"], corr: 3, th: "สแกนหา รร", det: "รหันเป็นสันสกฤต" },
        { q: "บาลีมีสระกี่ตัว", opts: ["8", "10", "12", "14"], corr: 0, th: "สระบาลี", det: "มี 8 ตัว ได้แก่ อะ อา อิ อี อุ อู เอ โอ" },
        { q: "ข้อใดจัดเป็นบาลีทั้งหมด", opts: ["มัจฉา, อัคคี", "ภรรยา, วิทยา", "บุษบา, กษัตริย์", "ไม่มีข้อถูก"], corr: 0, th: "กฎการซ้อนพยัญชนะ", det: "ทั้งคู่มีกฎการสะกด-ตามแบบบาลี" },
        { q: "คำสันสกฤตที่นิยมใช้ 'ไอ' หรือ 'เอา' คือคำใด", opts: ["ไมตรี", "ไพศาล", "เสาวภา", "ถูกทุกข้อ"], corr: 3, th: "สระพิเศษ", det: "ไอ และ เอา คือสระพิเศษของสันสกฤต" },
        { q: "สรุปคัมภีร์แยกภาษาคืออะไร", opts: ["การจำอักขระพิเศษ", "การท่องจำคำศัพท์", "การดูพยัญชนะวรรค", "ถูกทุกข้อ"], corr: 3, th: "กระบวนการคิด", det: "ต้องใช้ทุกเทคนิครวมกัน" }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        let opts = item.opts.map((o, i) => ({ val: o, isCorrect: (i === item.corr) }));
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        const newCorrect = opts.findIndex(o => o.isCorrect);

        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <p><b>ข้อ ${index + 1}:</b> ${item.q}</p>
            <span class="hint">คำใบ้: ${item.th}</span>
            <div class="options">
                ${opts.map((opt, i) => `<button onclick="check(this, ${i}, ${newCorrect}, ${index})">${opt.val}</button>`).join('')}
            </div>
            <div id="detail-${index}" class="detail">${item.det}</div>
        `;
        container.appendChild(div);
    });

    function check(btn, selected, correct, idx) {
        const buttons = btn.parentElement.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        if(selected === correct) btn.className = 'correct';
        else { btn.className = 'wrong'; buttons[correct].className = 'correct'; }
        document.getElementById(`detail-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
