<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 - ชุดที่ 5 (พันธุศาสตร์ขั้นสูง)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .clue { color: red; font-size: 0.9em; font-weight: bold; }
        .detail { background: #fff0f5; padding: 10px; margin-top: 10px; border-left: 5px solid #db7093; font-size: 0.95em; }
        .tip { font-weight: bold; color: #800080; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบกลางภาค (ชุดที่ 5: วิเคราะห์พันธุศาสตร์)</h1>
    <div id="quiz-area"></div>
</div>

<script>
    const questions = [
        { q: "เหตุใดคนที่เป็นโรคเลือดจางธาลัสซีเมียจึงมักเกิดจากพ่อแม่ที่เป็นพาหะทั้งคู่?", clue: "(ใบ้: ยีนด้อยแสดงออกเมื่อไม่มีตัวข่ม)", options: ["เป็นยีนเด่น", "ยีนด้อยบนออโตโซม", "ยีนบนโครโมโซม Y", "มิวเทชันสดๆ"], correct: 1, detail: "ธาลัสซีเมียเป็นโรคพันธุกรรมแบบยีนด้อยบนออโตโซม พ่อแม่ที่เป็นพาหะ (Aa) มีโอกาสส่งยีนด้อย (a) ให้ลูก 25%", tip: "พาหะ + พาหะ = มีโอกาสเป็นโรค" },
        { q: "ถ้าเปรียบเทียบ DNA กับตำราอาหาร 'ยีน' เปรียบเสมือนสิ่งใด?", clue: "(ใบ้: ชุดคำสั่งสำหรับทำอาหาร 1 เมนู)", options: ["กระดาษ", "หมึก", "สูตรอาหาร", "ห้องครัว"], correct: 2, detail: "ยีนเป็นส่วนของ DNA ที่ให้รหัสสร้างโปรตีน เปรียบได้กับสูตรอาหาร", tip: "ยีน = สูตรสร้างโปรตีน" },
        { q: "กระบวนการ Transcription คือการสร้างสิ่งใด?", clue: "(ใบ้: เปลี่ยนรหัส DNA เป็น mRNA)", options: ["DNA ใหม่", "mRNA", "โปรตีน", "ไขมัน"], correct: 1, detail: "Transcription คือการถอดรหัสจาก DNA ไปเป็น mRNA", tip: "Transcription = ถอดรหัส" },
        { q: "ถ้าลูกมีหมู่เลือด O พ่ออาจมีหมู่เลือดใดได้บ้าง?", clue: "(ใบ้: ลูกต้องได้ i จากพ่อและแม่)", options: ["AB", "A", "B", "ถูกทั้งข้อ 2 และ 3"], correct: 3, detail: "พ่อเลือด A (IAi) หรือ B (IBi) ก็สามารถให้ i แก่ลูกได้", tip: "เลือด O = พ่อแม่ต้องมี i" },
        { q: "ลักษณะที่แปรผันไม่ต่อเนื่อง (Discontinuous Variation) ข้อใดถูกต้อง?", clue: "(ใบ้: ไม่ได้รับอิทธิพลจากสิ่งแวดล้อม)", options: ["ส่วนสูง", "ความฉลาด", "หมู่เลือด", "น้ำหนัก"], correct: 2, detail: "หมู่เลือดเป็นพันธุกรรมล้วน ไม่ขึ้นกับอาหารหรือสิ่งแวดล้อม", tip: "ไม่ต่อเนื่อง = พันธุกรรมล้วน" },
        { q: "ทำไมโครโมโซมต้องมีช่วงที่หดตัวสั้นที่สุดในขณะแบ่งเซลล์?", clue: "(ใบ้: เพื่อการเคลื่อนที่)", options: ["เพื่อให้เซลล์เล็กลง", "เพื่อความสะดวกในการแยกออกจากกัน", "เพื่อสังเคราะห์โปรตีน", "เพื่อป้องกันการกลายพันธุ์"], correct: 1, detail: "โครโมโซมที่หดตัวแน่นทำให้แยกไปยังขั้วเซลล์ได้ไม่พันกัน", tip: "แน่น = จัดระเบียบได้ง่าย" },
        { q: "การทำลายยีนที่ผิดปกติด้วยเทคโนโลยี CRISPR เปรียบเสมือนเครื่องมือใด?", clue: "(ใบ้: ใช้ซ่อมแซมยีน)", options: ["กรรไกรระดับโมเลกุล", "กาวเชื่อม", "เครื่องถ่ายเอกสาร", "แม่พิมพ์"], correct: 0, detail: "CRISPR-Cas9 ใช้ตัดยีนที่ต้องการได้อย่างแม่นยำเหมือนกรรไกร", tip: "CRISPR = กรรไกรตัดแต่ง" },
        { q: "แบคทีเรียที่ดัดแปลงพันธุกรรมให้ผลิตฮอร์โมนการเจริญเติบโตใช้กระบวนการใดเพิ่มจำนวน?", clue: "(ใบ้: การแบ่งเซลล์ตามธรรมชาติ)", options: ["Binary fission", "Meiosis", "Budding", "Regeneration"], correct: 0, detail: "แบคทีเรียแบ่งตัวเร็วด้วยการแบ่งเซลล์แบบ Binary fission", tip: "แบคทีเรีย = แบ่งตัวเร็ว" },
        { q: "ถ้าฝาแฝดแท้ที่โตขึ้นมาในสิ่งแวดล้อมต่างกัน มีลักษณะต่างกัน เป็นเพราะเหตุใด?", clue: "(ใบ้: การตอบสนองต่อสิ่งแวดล้อม)", options: ["พันธุกรรมต่างกัน", "อิทธิพลของสิ่งแวดล้อม", "ฝาแฝดปลอม", "อายุต่างกัน"], correct: 1, detail: "ฝาแฝดแท้มี DNA เหมือนกัน ความต่างเกิดจากสิ่งแวดล้อม (Epigenetics)", tip: "แฝดแท้ต่างกัน = สิ่งแวดล้อม" },
        { q: "เอนไซม์ชนิดใดที่จำเป็นในการทำ PCR เพื่อจำลอง DNA ในอุณหภูมิสูง?", clue: "(ใบ้: ทนความร้อน)", options: ["Taq Polymerase", "Amylase", "Lipase", "Pepsin"], correct: 0, detail: "Taq Polymerase ทนความร้อนสูงที่ใช้ใน PCR ได้", tip: "PCR = Taq Polymerase" },
        { q: "ข้อใดเป็นข้อเสียของการโคลนนิ่ง?", clue: "(ใบ้: ความหลากหลายต่ำ)", options: ["สัตว์โตช้า", "ขาดความหลากหลายทางพันธุกรรม", "ทำให้สัตว์มีขนาดใหญ่เกินไป", "เสียค่าใช้จ่ายน้อย"], correct: 1, detail: "โคลนนิ่งทำให้พันธุกรรมเหมือนกันหมด เสี่ยงต่อการสูญพันธุ์จากโรคระบาด", tip: "โคลน = เหมือนกันหมด" },
        { q: "ยีนที่อยู่ติดกันบนโครโมโซมคู่เดียวกันมักถ่ายทอดไปด้วยกัน เรียกว่า?", clue: "(ใบ้: การลิงก์ยีน)", options: ["Gene Linkage", "Gene Flow", "Genetic Drift", "Inversion"], correct: 0, detail: "Gene Linkage คือปรากฏการณ์ที่ยีนใกล้กันมักถ่ายทอดไปด้วยกัน", tip: "ติดกัน = ไปด้วยกัน" },
        { q: "mRNA หนึ่งสายมีหน้าที่หลักคืออะไร?", clue: "(ใบ้: แม่พิมพ์สร้างโปรตีน)", options: ["เก็บรหัสพันธุกรรมถาวร", "เป็นแม่พิมพ์ในการสังเคราะห์โปรตีน", "จำลองตัวเอง", "ควบคุมการแบ่งเซลล์"], correct: 1, detail: "mRNA นำรหัสจากนิวเคลียสไปที่ไรโบโซมเพื่อสร้างโปรตีน", tip: "mRNA = Messenger (ส่งสาร)" },
        { q: "อะไรคือความแตกต่างที่สำคัญที่สุดระหว่างเซลล์ร่างกายและเซลล์สืบพันธุ์?", clue: "(ใบ้: จำนวนโครโมโซม)", options: ["ขนาดเซลล์", "จำนวนโครโมโซม", "ผนังเซลล์", "ที่อยู่ของนิวเคลียส"], correct: 1, detail: "เซลล์ร่างกายเป็น 2n เซลล์สืบพันธุ์เป็น n", tip: "สืบพันธุ์ = ครึ่งหนึ่ง" },
        { q: "ถ้าโครโมโซม Y หายไป (XO) จะเป็นกลุ่มอาการใด?", clue: "(ใบ้: เทอร์เนอร์)", options: ["Turner", "Klinefelter", "Down", "ไม่มีข้อถูก"], correct: 0, detail: "Turner syndrome คือ XO (เพศหญิงที่โครโมโซม X หายไป 1)", tip: "XO = Turner" },
        { q: "จุดประสงค์หลักของการทำ DNA Fingerprinting คืออะไร?", clue: "(ใบ้: พิสูจน์อัตลักษณ์บุคคล)", options: ["คัดเลือกสายพันธุ์พืช", "ตรวจสอบความสัมพันธ์ทางสายเลือด", "หาความสูง", "สร้างฮอร์โมน"], correct: 1, detail: "ใช้ในทางนิติวิทยาศาสตร์เพื่อพิสูจน์พ่อแม่ลูกหรือผู้ต้องหา", tip: "Fingerprint = อัตลักษณ์" },
        { q: "แอลลีลเด่น (Dominant allele) จะแสดงลักษณะออกมาได้เมื่อใด?", clue: "(ใบ้: มีแค่ตัวเดียวก็แสดงออก)", options: ["มีแค่ 1 แอลลีล", "ต้องมี 2 แอลลีล", "ต้องอยู่บนโครโมโซม X", "ไม่มีข้อถูก"], correct: 0, detail: "ยีนเด่นต้องการเพียงแอลลีลเดียวก็แสดงลักษณะได้", tip: "เด่น = ไม่ต้องครบคู่" },
        { q: "การทำลายยีนที่รบกวนในพืช GMOs เรียกว่าอะไร?", clue: "(ใบ้: การทำให้ยีนเงียบ)", options: ["Gene Silencing", "Gene Amplification", "Gene Therapy", "Inversion"], correct: 0, detail: "Gene Silencing คือการหยุดการแสดงออกของยีนที่พืชไม่ต้องการ", tip: "Silencing = เงียบ" },
        { q: "เซลล์ที่ได้จากการทำโคลนนิ่งจะมีการแบ่งตัวแบบใดเพื่อเจริญเป็นตัวอ่อน?", clue: "(ใบ้: แบ่งเซลล์ร่างกาย)", options: ["ไมโทซิส", "ไมโอซิส", "ปฏิสนธิ", "สปอร์"], correct: 0, detail: "การเจริญเติบโตใช้การแบ่งเซลล์แบบไมโทซิส", tip: "เติบโต = ไมโทซิส" },
        { q: "อะไรเป็นตัวกำหนดสีของเมล็ดถั่วที่เมนเดลศึกษา?", clue: "(ใบ้: ยีนใน DNA)", options: ["สารเคมี", "ยีน", "อาหาร", "แสงแดด"], correct: 1, detail: "ลักษณะต่างๆ ถูกควบคุมโดยยีน", tip: "ยีน = ควบคุมลักษณะ" },
        { q: "ถ้าเรานำยีนจากปลาไปใส่ในมะเขือเทศ เรียกพืชชนิดนี้ว่า?", clue: "(ใบ้: ทรานส์ยีนิก)", options: ["พืชลูกผสม", "พืช GMOs", "พืชพื้นเมือง", "ไม่มีข้อถูก"], correct: 1, detail: "การใส่ยีนข้ามสปีชีส์คือ Transgenic หรือ GMOs", tip: "ข้ามพันธุ์ = GMOs" },
        { q: "การเปลี่ยนแปลงลำดับเบสใน DNA อย่างฉับพลันเรียกว่าอะไร?", clue: "(ใบ้: กลายพันธุ์)", options: ["Mutation", "Evolution", "Replication", "Translation"], correct: 0, detail: "Mutation คือการเปลี่ยนแปลงลำดับเบสใน DNA", tip: "เบสเปลี่ยน = มิวเทชัน" },
        { q: "ทำไมโครโมโซมเพศหญิง (XX) จึงดูแข็งแรงกว่าเพศชาย (XY) ในแง่โรคพันธุกรรม?", clue: "(ใบ้: มี X อีกตัวสำรอง)", options: ["เพราะมี 2 X", "เพราะมีขนาดใหญ่กว่า", "เพราะไม่มี Y", "เพราะไม่มีโครโมโซมร่างกาย"], correct: 0, detail: "มี X อีกตัวเป็นสำรองหาก X หนึ่งผิดปกติ (โรคบน X จึงแสดงยาก)", tip: "XX = มีสำรอง" },
        { q: "การผสมพันธุ์สัตว์เพื่อคัดเลือกยีนที่ต้องการเรียกว่าอะไร?", clue: "(ใบ้: คัดเลือกพันธุ์)", options: ["Selective Breeding", "Cloning", "PCR", "Genetic Screening"], correct: 0, detail: "มนุษย์เป็นผู้เลือกคู่ผสมให้สัตว์ตามลักษณะที่ต้องการ", tip: "Selective = มนุษย์คัดเลือก" },
        { q: "ถ้าเซลล์ไม่มีโปรตีนโฮสโตน (Histone) จะเกิดอะไรขึ้น?", clue: "(ใบ้: ใช้ม้วนโครโมโซม)", options: ["DNA พันกันยุ่งเหยิง", "เซลล์แบ่งตัวเร็วขึ้น", "เซลล์ตายทันที", "DNA จะยาวขึ้น"], correct: 0, detail: "ฮิสโตนช่วยม้วน DNA ให้เป็นระเบียบในโครโมโซม", tip: "Histone = แกนม้วน DNA" }
    ];

    function loadQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${q.q} <span class="clue">${q.clue}</span></p>
                <div id="options${i}">`;
            q.options.forEach((opt, oIdx) => {
                html += `<button onclick="checkAnswer(${i}, ${oIdx})">${opt}</button><br><br>`;
            });
            html += `</div><div id="d${i}" class="detail" style="display:none"></div></div>`;
            area.innerHTML += html;
        });
    }

    function checkAnswer(qIdx, selected) {
        const d = document.getElementById(`d${qIdx}`);
        const optDiv = document.getElementById(`options${qIdx}`);
        d.style.display = 'block';
        optDiv.style.pointerEvents = 'none';
        
        if(selected === questions[qIdx].correct) {
            d.innerHTML = `✅ ถูกต้อง! <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        } else {
            d.innerHTML = `❌ ผิด! เฉลยคือ: ${questions[qIdx].options[questions[qIdx].correct]} <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        }
    }
    loadQuiz();
</script>
</body>
</html>
