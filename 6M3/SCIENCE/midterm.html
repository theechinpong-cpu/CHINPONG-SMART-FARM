<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 - ฉบับสมบูรณ์ 25 ข้อ</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .options { list-style: none; padding: 0; }
        button { cursor: pointer; padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; }
        .detail { background: #e7f3fe; padding: 10px; margin-top: 10px; border-left: 5px solid #2196F3; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3</h1>
    <div id="quiz-area"></div>
    <button onclick="submitExam()">ตรวจข้อสอบ</button>
    <div id="result-area"></div>
</div>

<script>
    const questions = [
        { q: "การแบ่งเซลล์แบบไมโทซิสมีความสำคัญอย่างไรต่อสิ่งมีชีวิต?", options: ["สร้างเซลล์สืบพันธุ์", "เพิ่มจำนวนเซลล์เพื่อการเติบโต", "ถ่ายทอดลักษณะพันธุกรรมให้ลูก", "ลดจำนวนโครโมโซมลงครึ่งหนึ่ง"], correct: 1, detail: "ไมโทซิสใช้ในการเพิ่มจำนวนเซลล์ร่างกายเพื่อการเจริญเติบโตและซ่อมแซม" },
        { q: "หากเซลล์เริ่มต้นมีโครโมโซม 46 แท่ง แบ่งเซลล์แบบไมโอซิสจะได้เซลล์ลูกกี่เซลล์ และมีโครโมโซมกี่แท่ง?", options: ["2 เซลล์, 46 แท่ง", "4 เซลล์, 23 แท่ง", "4 เซลล์, 46 แท่ง", "2 เซลล์, 23 แท่ง"], correct: 1, detail: "ไมโอซิสลดโครโมโซมลงครึ่งหนึ่งเพื่อให้เหมาะสมกับการสืบพันธุ์" },
        { q: "ยีน (Gene) ทำหน้าที่อะไรหลักในสิ่งมีชีวิต?", options: ["เป็นแหล่งเก็บพลังงาน", "เป็นหน่วยควบคุมลักษณะพันธุกรรม", "เป็นตัวกลางในการนำส่งสารอาหาร", "ป้องกันอันตรายให้เซลล์"], correct: 1, detail: "ยีนเป็นส่วนหนึ่งของ DNA ที่ควบคุมการแสดงออกของลักษณะต่างๆ" },
        { q: "ความผิดปกติของโครโมโซมคู่ที่ 21 เกินมา 1 แท่ง ส่งผลอย่างไร?", options: ["ภาวะตาบอดสี", "กลุ่มอาการดาวน์", "ภาวะฮีโมฟีเลีย", "ไม่มีข้อใดถูก"], correct: 1, detail: "กลุ่มอาการดาวน์เกิดจาก Trisomy 21" },
        { q: "ข้อใดกล่าวถึง DNA ได้ถูกต้องที่สุด?", options: ["เป็นโปรตีนชนิดหนึ่ง", "มีโครงสร้างเป็นเกลียวคู่", "อยู่ในไซโทพลาซึมเท่านั้น", "ทำหน้าที่ผลิตพลังงาน"], correct: 1, detail: "DNA มีรูปร่างเป็นเกลียวคู่ (Double Helix)" },
        { q: "สิ่งมีชีวิตดัดแปรพันธุกรรม (GMOs) เกิดจากการดำเนินการใด?", options: ["การผสมพันธุ์คัดเลือก", "การตัดต่อยีนด้วยเทคโนโลยีทางชีวภาพ", "การใช้รังสีทำให้เกิดการกลายพันธุ์", "การเปลี่ยนอาหารและสิ่งแวดล้อม"], correct: 1, detail: "GMOs คือการนำยีนที่ต้องการจากสิ่งมีชีวิตหนึ่งไปใส่ในอีกสิ่งมีชีวิตหนึ่ง" },
        { q: "การถ่ายทอดลักษณะทางพันธุกรรมแบบเด่นอย่างสมบูรณ์ ข้อใดคือจีโนไทป์ของลูกรุ่น F1 จากพ่อแม่ TT x tt?", options: ["TT", "Tt", "tt", "TT และ tt"], correct: 1, detail: "ลูกจะได้แอลลีลจากพ่อ 1 และแม่ 1 คือ Tt" },
        { q: "ข้อใดคือความแตกต่างหลักระหว่างคลื่นกลและคลื่นแม่เหล็กไฟฟ้า?", options: ["ความเร็ว", "การใช้ตัวกลาง", "ความยาวคลื่น", "ทิศทางการสั่น"], correct: 1, detail: "คลื่นกลต้องใช้ตัวกลาง แต่คลื่นแม่เหล็กไฟฟ้าไม่ต้อง" },
        { q: "แสงจัดเป็นคลื่นชนิดใด?", options: ["คลื่นกล", "คลื่นแม่เหล็กไฟฟ้า", "คลื่นตามยาว", "คลื่นเสียง"], correct: 1, detail: "แสงเดินทางได้ในสุญญากาศ จึงเป็นคลื่นแม่เหล็กไฟฟ้า" },
        { q: "ปรากฏการณ์ที่แสงเดินทางผ่านตัวกลางต่างชนิดกันแล้วเกิดการเบี่ยงเบนทิศทางเรียกว่าอะไร?", options: ["การสะท้อน", "การหักเห", "การแทรกสอด", "การเลี้ยวเบน"], correct: 1, detail: "การหักเหเกิดเมื่อแสงเปลี่ยนตัวกลาง" },
        { q: "เลนส์นูนทำหน้าที่อย่างไรกับแสงที่ผ่านเข้ามา?", options: ["กระจายแสงออก", "รวมแสงเข้าสู่จุดโฟกัส", "ไม่เปลี่ยนแปลงทิศทางแสง", "สะท้อนแสงกลับ"], correct: 1, detail: "เลนส์นูนเป็นเลนส์รวมแสง" },
        { q: "ภาพที่เกิดจากกระจกเงาเรียบจะมีลักษณะอย่างไร?", options: ["ภาพจริง หัวกลับ", "ภาพเสมือน หัวตั้ง", "ภาพขยายใหญ่", "ภาพมีขนาดเล็กกว่าวัตถุ"], correct: 1, detail: "กระจกเงาเรียบให้ภาพเสมือนหัวตั้งขนาดเท่าวัตถุเสมอ" },
        { q: "การมองเห็นวัตถุสีเขียว แสดงว่าวัตถุนั้นมีสมบัติอย่างไรต่อแสงขาว?", options: ["ดูดกลืนสีเขียวไว้ทั้งหมด", "สะท้อนสีเขียวออกมาเพียงสีเดียว", "ดูดกลืนสีเขียวและสะท้อนสีอื่น", "สะท้อนแสงทุกสีเท่ากัน"], correct: 1, detail: "วัตถุสีนั้นๆ จะสะท้อนแสงสีนั้นออกมาและดูดกลืนสีอื่นไว้" },
        { q: "ส่วนประกอบใดของตาที่ทำหน้าที่รับภาพ?", options: ["ม่านตา", "เลนส์ตา", "เรตินา", "กระจกตา"], correct: 1, detail: "เรตินา (Retina) เป็นจอรับภาพที่ไวต่อแสง" },
        { q: "ยีนด้อยจะแสดงลักษณะออกมาได้เมื่อใด?", options: ["เมื่อได้รับยีนเด่นมาด้วย", "เมื่ออยู่ในสภาวะโฮโมไซกัสด้อย (tt)", "ไม่สามารถแสดงออกได้", "เมื่อมีโครโมโซมเกิน"], correct: 1, detail: "ยีนด้อยจะแสดงลักษณะเมื่อไม่มีแอลลีลเด่นมาข่ม" },
        { q: "ความผิดปกติของโครโมโซมเพศ เช่น Klinefelter syndrome คือข้อใด?", options: ["XX", "XY", "XXY", "XO"], correct: 2, detail: "Klinefelter syndrome มีโครโมโซมเพศเป็น XXY" },
        { q: "การแบ่งเซลล์ที่ทำให้เกิดความหลากหลายทางพันธุกรรมคือข้อใด?", options: ["ไมโทซิส", "ไมโอซิส", "การจำลองตัวเองของ DNA", "การสังเคราะห์โปรตีน"], correct: 1, detail: "ไมโอซิสมีการแลกเปลี่ยนชิ้นส่วนโครโมโซม (Crossing over)" },
        { q: "หน่วยของความถี่คลื่นคืออะไร?", options: ["เมตร", "วินาที", "เฮิรตซ์", "จูล"], correct: 2, detail: "ความถี่ (Frequency) มีหน่วยเป็น เฮิรตซ์ (Hz)" },
        { q: "สูตรความสัมพันธ์ของคลื่นคือข้อใด?", options: ["v = fλ", "f = v/t", "v = s/f", "λ = v*f"], correct: 0, detail: "อัตราเร็วคลื่น (v) = ความถี่ (f) x ความยาวคลื่น (λ)" },
        { q: "กระจกเว้าสามารถใช้ทำประโยชน์ในข้อใดได้ดีที่สุด?", options: ["กระจกมองหลังรถ", "กระจกในร้านค้า", "ไฟหน้ารถยนต์", "แว่นสายตายาว"], correct: 2, detail: "กระจกเว้าช่วยรวมแสงจากแหล่งกำเนิดให้เป็นลำขนาน" },
        { q: "สายตาสั้นเกิดจากอะไร?", options: ["ลูกตายาวเกินไป", "ลูกตาสั้นเกินไป", "เลนส์ตาแข็งตัว", "กล้ามเนื้อตาอ่อนแรง"], correct: 0, detail: "สายตาสั้นทำให้ภาพไปตกก่อนถึงเรตินา" },
        { q: "เลนส์ที่ใช้แก้ไขสายตายาวคือเลนส์ชนิดใด?", options: ["เลนส์นูน", "เลนส์เว้า", "เลนส์เว้าแกมเว้า", "เลนส์นูนแกมเว้า"], correct: 0, detail: "เลนส์นูนช่วยรวมแสงให้ตกที่เรตินาได้พอดี" },
        { q: "โครโมโซมในเซลล์ร่างกายมนุษย์ปกติมีกี่คู่?", options: ["22 คู่", "23 คู่", "44 คู่", "46 คู่"], correct: 1, detail: "มนุษย์มี 46 แท่ง หรือ 23 คู่" },
        { q: "การดัดแปรทางพันธุกรรมอาจส่งผลกระทบต่อสิ่งแวดล้อมอย่างไร?", options: ["ลดความหลากหลายทางชีวภาพ", "ทำให้อากาศบริสุทธิ์ขึ้น", "เพิ่มจำนวนประชากรมนุษย์", "ทำให้ไม่มีโรคระบาด"], correct: 0, detail: "ความเสี่ยงของ GMOs คือการรบกวนระบบนิเวศดั้งเดิม" },
        { q: "ข้อใดไม่ใช่คลื่นแม่เหล็กไฟฟ้า?", options: ["รังสีแกมมา", "แสงเลเซอร์", "คลื่นเสียง", "รังสีอัลตราไวโอเลต"], correct: 2, detail: "คลื่นเสียงเป็นคลื่นกล" }
    ];

    function loadQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${q.q}</p>`;
            q.options.forEach((opt, oIdx) => {
                html += `<label><input type="radio" name="q${i}" value="${oIdx}"> ${opt}</label><br>`;
            });
            html += `<div id="d${i}" style="display:none" class="detail"></div></div>`;
            area.innerHTML += html;
        });
    }

    function submitExam() {
        let score = 0;
        questions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const d = document.getElementById(`d${i}`);
            d.style.display = 'block';
            if(selected && parseInt(selected.value) === q.correct) {
                score++;
                d.innerHTML = "ถูกต้อง! " + q.detail;
            } else {
                d.innerHTML = "ผิด! เฉลย: " + q.options[q.correct] + " - " + q.detail;
            }
        });
        document.getElementById('result-area').innerHTML = `<h2>คะแนนรวม: ${score} / 25</h2>`;
    }
    loadQuiz();
</script>
</body>
</html>
