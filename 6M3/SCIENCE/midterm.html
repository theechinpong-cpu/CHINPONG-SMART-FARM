<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 - ฉบับสมบูรณ์ 25 ข้อ</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .clue { color: red; font-size: 0.9em; font-weight: bold; }
        .detail { background: #e7f3fe; padding: 10px; margin-top: 10px; border-left: 5px solid #2196F3; font-size: 0.95em; }
        .tip { font-weight: bold; color: #d35400; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3</h1>
    <div id="quiz-area"></div>
    <div id="result-area"></div>
</div>

<script>
    const questions = [
        { q: "การแบ่งเซลล์แบบไมโทซิสมีความสำคัญอย่างไรต่อสิ่งมีชีวิต?", clue: "(ใบ้: ใช้เพื่อการซ่อมแซมส่วนที่สึกหรอ)", options: ["สร้างเซลล์สืบพันธุ์", "เพิ่มจำนวนเซลล์เพื่อการเติบโต", "ถ่ายทอดลักษณะพันธุกรรมให้ลูก", "ลดจำนวนโครโมโซมลงครึ่งหนึ่ง"], correct: 1, detail: "ไมโทซิสใช้ในการเพิ่มจำนวนเซลล์ร่างกาย", tip: "Mitosis = Multi-cells (เพิ่มจำนวนเซลล์)" },
        { q: "หากเซลล์เริ่มต้นมีโครโมโซม 46 แท่ง แบ่งเซลล์แบบไมโอซิสจะได้เซลล์ลูกกี่เซลล์ และมีโครโมโซมกี่แท่ง?", clue: "(ใบ้: ลดลงครึ่งหนึ่งสำหรับเซลล์สืบพันธุ์)", options: ["2 เซลล์, 46 แท่ง", "4 เซลล์, 23 แท่ง", "4 เซลล์, 46 แท่ง", "2 เซลล์, 23 แท่ง"], correct: 1, detail: "ไมโอซิสสร้างเซลล์สืบพันธุ์ จึงต้องลดโครโมโซมลงครึ่งหนึ่ง", tip: "Meiosis = Me-oh-sis (สร้างเซลล์เพื่อสืบพันธุ์)" },
        { q: "ยีน (Gene) ทำหน้าที่อะไรหลักในสิ่งมีชีวิต?", clue: "(ใบ้: เป็นรหัสที่กำหนดลักษณะทางพันธุกรรม)", options: ["เป็นแหล่งเก็บพลังงาน", "เป็นหน่วยควบคุมลักษณะพันธุกรรม", "เป็นตัวกลางในการนำส่งสารอาหาร", "ป้องกันอันตรายให้เซลล์"], correct: 1, detail: "ยีนคือหน่วยพันธุกรรมที่ถ่ายทอดลักษณะต่างๆ", tip: "ยีน = รหัสลับกำหนดหน้าตา" },
        { q: "ความผิดปกติของโครโมโซมคู่ที่ 21 เกินมา 1 แท่ง ส่งผลอย่างไร?", clue: "(ใบ้: เรียกอีกชื่อว่ากลุ่มอาการดาวน์)", options: ["ภาวะตาบอดสี", "กลุ่มอาการดาวน์", "ภาวะฮีโมฟีเลีย", "ไม่มีข้อใดถูก"], correct: 1, detail: "การเกินมาของโครโมโซมคู่ที่ 21 คือกลุ่มอาการดาวน์", tip: "จำเลข 21 คู่กับ Down's" },
        { q: "ข้อใดกล่าวถึง DNA ได้ถูกต้องที่สุด?", clue: "(ใบ้: โครงสร้างเป็นเกลียวคู่)", options: ["เป็นโปรตีนชนิดหนึ่ง", "มีโครงสร้างเป็นเกลียวคู่", "อยู่ในไซโทพลาซึมเท่านั้น", "ทำหน้าที่ผลิตพลังงาน"], correct: 1, detail: "DNA มีโครงสร้างเป็นเกลียวคู่ (Double Helix)", tip: "DNA = บันไดเวียนแห่งชีวิต" },
        { q: "สิ่งมีชีวิตดัดแปรพันธุกรรม (GMOs) เกิดจากการดำเนินการใด?", clue: "(ใบ้: การนำยีนของสิ่งมีชีวิตหนึ่งไปใส่อีกสิ่งหนึ่ง)", options: ["การผสมพันธุ์คัดเลือก", "การตัดต่อยีนด้วยเทคโนโลยีทางชีวภาพ", "การใช้รังสีทำให้เกิดการกลายพันธุ์", "การเปลี่ยนอาหารและสิ่งแวดล้อม"], correct: 1, detail: "GMOs คือการนำยีนที่ต้องการจากสิ่งมีชีวิตหนึ่งไปใส่ในอีกสิ่งมีชีวิตหนึ่ง", tip: "GMO = ตัดต่อยีน (Transgenic)" },
        { q: "การถ่ายทอดลักษณะทางพันธุกรรมแบบเด่นอย่างสมบูรณ์ ข้อใดคือจีโนไทป์ของลูกรุ่น F1 จากพ่อแม่ TT x tt?", clue: "(ใบ้: ลูกต้องได้รับจากพ่อหนึ่งและแม่หนึ่ง)", options: ["TT", "Tt", "tt", "TT และ tt"], correct: 1, detail: "ลูกจะได้แอลลีลจากพ่อ 1 และแม่ 1 คือ Tt", tip: "T ใหญ่ข่ม T เล็กเสมอ" },
        { q: "ข้อใดคือความแตกต่างหลักระหว่างคลื่นกลและคลื่นแม่เหล็กไฟฟ้า?", clue: "(ใบ้: สิ่งที่ใช้เดินทางต่างกัน)", options: ["ความเร็ว", "การใช้ตัวกลาง", "ความยาวคลื่น", "ทิศทางการสั่น"], correct: 1, detail: "คลื่นกลต้องใช้ตัวกลาง แต่คลื่นแม่เหล็กไฟฟ้าไม่ต้อง", tip: "กล = ตัวกลาง (กล้ามเนื้อต้องมีที่จับ)" },
        { q: "แสงจัดเป็นคลื่นชนิดใด?", clue: "(ใบ้: เดินทางผ่านสุญญากาศได้)", options: ["คลื่นกล", "คลื่นแม่เหล็กไฟฟ้า", "คลื่นตามยาว", "คลื่นเสียง"], correct: 1, detail: "แสงเดินทางได้ในสุญญากาศ จึงเป็นคลื่นแม่เหล็กไฟฟ้า", tip: "แสง = คลื่นแม่เหล็กไฟฟ้า" },
        { q: "ปรากฏการณ์ที่แสงเดินทางผ่านตัวกลางต่างชนิดกันแล้วเกิดการเบี่ยงเบนทิศทางเรียกว่าอะไร?", clue: "(ใบ้: การเปลี่ยนตัวกลางทำให้แสงหัก)", options: ["การสะท้อน", "การหักเห", "การแทรกสอด", "การเลี้ยวเบน"], correct: 1, detail: "การหักเหเกิดเมื่อแสงเปลี่ยนตัวกลาง", tip: "หักเห = เปลี่ยนตัวกลาง" },
        { q: "เลนส์นูนทำหน้าที่อย่างไรกับแสงที่ผ่านเข้ามา?", clue: "(ใบ้: รวมแสงให้มาตัดกัน)", options: ["กระจายแสงออก", "รวมแสงเข้าสู่จุดโฟกัส", "ไม่เปลี่ยนแปลงทิศทางแสง", "สะท้อนแสงกลับ"], correct: 1, detail: "เลนส์นูนเป็นเลนส์รวมแสง", tip: "เลนส์นูน = รวม" },
        { q: "ภาพที่เกิดจากกระจกเงาเรียบจะมีลักษณะอย่างไร?", clue: "(ใบ้: เหมือนที่เราส่องกระจกดูตัวเอง)", options: ["ภาพจริง หัวกลับ", "ภาพเสมือน หัวตั้ง", "ภาพขยายใหญ่", "ภาพมีขนาดเล็กกว่าวัตถุ"], correct: 1, detail: "กระจกเงาเรียบให้ภาพเสมือนหัวตั้งขนาดเท่าวัตถุเสมอ", tip: "กระจกเรียบ = เสมือนหัวตั้ง" },
        { q: "การมองเห็นวัตถุสีเขียว แสดงว่าวัตถุนั้นมีสมบัติอย่างไรต่อแสงขาว?", clue: "(ใบ้: สีที่ตาเห็นคือสีที่สะท้อนมา)", options: ["ดูดกลืนสีเขียวไว้ทั้งหมด", "สะท้อนสีเขียวออกมาเพียงสีเดียว", "ดูดกลืนสีเขียวและสะท้อนสีอื่น", "สะท้อนแสงทุกสีเท่ากัน"], correct: 1, detail: "วัตถุสีนั้นๆ จะสะท้อนแสงสีนั้นออกมาและดูดกลืนสีอื่นไว้", tip: "เห็นสีไหน คือสีที่สะท้อน" },
        { q: "ส่วนประกอบใดของตาที่ทำหน้าที่รับภาพ?", clue: "(ใบ้: อยู่ด้านหลังของลูกตา)", options: ["ม่านตา", "เลนส์ตา", "เรตินา", "กระจกตา"], correct: 2, detail: "เรตินา (Retina) เป็นจอรับภาพที่ไวต่อแสง", tip: "เรตินา = จอรับภาพ" },
        { q: "ยีนด้อยจะแสดงลักษณะออกมาได้เมื่อใด?", clue: "(ใบ้: ต้องไม่มียีนเด่นมาข่ม)", options: ["เมื่อได้รับยีนเด่นมาด้วย", "เมื่ออยู่ในสภาวะโฮโมไซกัสด้อย (tt)", "ไม่สามารถแสดงออกได้", "เมื่อมีโครโมโซมเกิน"], correct: 1, detail: "ยีนด้อยจะแสดงลักษณะเมื่อไม่มีแอลลีลเด่นมาข่ม", tip: "ยีนด้อย = คู่ต้องเป็นด้อยทั้งคู่" },
        { q: "ความผิดปกติของโครโมโซมเพศ เช่น Klinefelter syndrome คือข้อใด?", clue: "(ใบ้: ผู้ชายที่มี X เกินมา)", options: ["XX", "XY", "XXY", "XO"], correct: 2, detail: "Klinefelter syndrome มีโครโมโซมเพศเป็น XXY", tip: "XXY = Klinefelter" },
        { q: "การแบ่งเซลล์ที่ทำให้เกิดความหลากหลายทางพันธุกรรมคือข้อใด?", clue: "(ใบ้: มีกระบวนการ Crossing over)", options: ["ไมโทซิส", "ไมโอซิส", "การจำลองตัวเองของ DNA", "การสังเคราะห์โปรตีน"], correct: 1, detail: "ไมโอซิสมีการแลกเปลี่ยนชิ้นส่วนโครโมโซม", tip: "ไมโอซิส = เพิ่มความหลากหลาย" },
        { q: "หน่วยของความถี่คลื่นคืออะไร?", clue: "(ใบ้: อักษรย่อคือ Hz)", options: ["เมตร", "วินาที", "เฮิรตซ์", "จูล"], correct: 2, detail: "ความถี่มีหน่วยเป็นเฮิรตซ์ (Hz)", tip: "Hz = ความถี่" },
        { q: "สูตรความสัมพันธ์ของคลื่นคือข้อใด?", clue: "(ใบ้: v คือความเร็ว, f คือความถี่, แลมดาคือความยาวคลื่น)", options: ["v = fλ", "f = v/t", "v = s/f", "λ = v*f"], correct: 0, detail: "อัตราเร็วคลื่น (v) = ความถี่ (f) x ความยาวคลื่น (λ)", tip: "v = fλ ท่องให้ขึ้นใจ" },
        { q: "กระจกเว้าสามารถใช้ทำประโยชน์ในข้อใดได้ดีที่สุด?", clue: "(ใบ้: ไฟหน้าต้องการแสงพุ่งเป็นลำ)", options: ["กระจกมองหลังรถ", "กระจกในร้านค้า", "ไฟหน้ารถยนต์", "แว่นสายตายาว"], correct: 2, detail: "กระจกเว้าช่วยรวมแสงจากแหล่งกำเนิดให้เป็นลำขนาน", tip: "กระจกเว้า = รวมแสง" },
        { q: "สายตาสั้นเกิดจากอะไร?", clue: "(ใบ้: ภาพตกก่อนถึงจอ)", options: ["ลูกตายาวเกินไป", "ลูกตาสั้นเกินไป", "เลนส์ตาแข็งตัว", "กล้ามเนื้อตาอ่อนแรง"], correct: 0, detail: "สายตาสั้นทำให้ภาพไปตกก่อนถึงเรตินา", tip: "สั้น = หน้าจอ" },
        { q: "เลนส์ที่ใช้แก้ไขสายตายาวคือเลนส์ชนิดใด?", clue: "(ใบ้: เลนส์รวมแสง)", options: ["เลนส์นูน", "เลนส์เว้า", "เลนส์เว้าแกมเว้า", "เลนส์นูนแกมเว้า"], correct: 0, detail: "เลนส์นูนช่วยรวมแสงให้ตกที่เรตินาได้พอดี", tip: "สายตายาว = นูน" },
        { q: "โครโมโซมในเซลล์ร่างกายมนุษย์ปกติมีกี่คู่?", clue: "(ใบ้: รวมแล้วเป็น 46 แท่ง)", options: ["22 คู่", "23 คู่", "44 คู่", "46 คู่"], correct: 1, detail: "มนุษย์มี 46 แท่ง หรือ 23 คู่", tip: "23 คู่ คือจำนวนโครโมโซมคน" },
        { q: "การดัดแปรทางพันธุกรรมอาจส่งผลกระทบต่อสิ่งแวดล้อมอย่างไร?", clue: "(ใบ้: ลดความหลากหลายดั้งเดิม)", options: ["ลดความหลากหลายทางชีวภาพ", "ทำให้อากาศบริสุทธิ์ขึ้น", "เพิ่มจำนวนประชากรมนุษย์", "ทำให้ไม่มีโรคระบาด"], correct: 0, detail: "ความเสี่ยงของ GMOs คือการรบกวนระบบนิเวศดั้งเดิม", tip: "GMO = กระทบความหลากหลาย" },
        { q: "ข้อใดไม่ใช่คลื่นแม่เหล็กไฟฟ้า?", clue: "(ใบ้: ต้องใช้ตัวกลางในการเดินทาง)", options: ["รังสีแกมมา", "แสงเลเซอร์", "คลื่นเสียง", "รังสีอัลตราไวโอเลต"], correct: 2, detail: "คลื่นเสียงเป็นคลื่นกล", tip: "เสียง = คลื่นกล" }
    ];

    function loadQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${q.q} <span class="clue">${q.clue}</span></p>
                <div id="options${i}">`;
            q.options.forEach((opt, oIdx) => {
                html += `<button onclick="checkAnswer(${i}, ${oIdx})">${opt}</button><br><br>`;
            });
            html += `</div><div id="d${i}" class="detail" style="display:none"></div></div>`;
            area.innerHTML += html;
        });
    }

    function checkAnswer(qIdx, selected) {
        const d = document.getElementById(`d${qIdx}`);
        const optDiv = document.getElementById(`options${qIdx}`);
        d.style.display = 'block';
        optDiv.style.pointerEvents = 'none';
        
        if(selected === questions[qIdx].correct) {
            d.innerHTML = `✅ ถูกต้อง! <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        } else {
            d.innerHTML = `❌ ผิด! เฉลยคือ: ${questions[qIdx].options[questions[qIdx].correct]} <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        }
    }
    loadQuiz();
</script>
</body>
</html>
