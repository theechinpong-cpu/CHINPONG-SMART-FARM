<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 - ชุดที่ 3 (ระดับท้าทาย)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .clue { color: red; font-size: 0.9em; font-weight: bold; }
        .detail { background: #d4edda; padding: 10px; margin-top: 10px; border-left: 5px solid #28a745; font-size: 0.95em; }
        .tip { font-weight: bold; color: #155724; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 (ชุดที่ 3)</h1>
    <div id="quiz-area"></div>
</div>

<script>
    const questions = [
        { q: "ถ้าในเซลล์สืบพันธุ์ของพืชชนิดหนึ่งมีโครโมโซม 10 แท่ง เซลล์ร่างกายของพืชนี้จะมีโครโมโซมกี่แท่ง?", clue: "(ใบ้: เซลล์ร่างกายคือ 2 เท่าของเซลล์สืบพันธุ์)", options: ["5", "10", "20", "40"], correct: 2, detail: "เซลล์สืบพันธุ์ (n) = 10 ดังนั้นเซลล์ร่างกาย (2n) = 20", tip: "ร่างกาย = 2 เท่าของสืบพันธุ์" },
        { q: "กลุ่มอาการเทอร์เนอร์ (Turner syndrome) เกิดจากโครโมโซมเพศใด?", clue: "(ใบ้: โครโมโซม X หายไป 1 แท่ง)", options: ["XXY", "XYY", "XO", "XXX"], correct: 2, detail: "มีโครโมโซม X เพียงแท่งเดียว (XO)", tip: "Turner = ขาดไป 1 (เหลือ X เดียว)" },
        { q: "หากนำพืชดอกสีม่วงพันธุ์แท้ (PP) ผสมกับดอกสีขาว (pp) แล้วลูกรุ่น F1 ได้ดอกสีม่วงทั้งหมด ถ้าให้ F1 ผสมกันเอง ลูกรุ่น F2 จะมีอัตราส่วนฟีโนไทป์เท่าใด?", clue: "(ใบ้: อัตราส่วนตามกฎเมนเดล)", options: ["ม่วง:ขาว = 1:1", "ม่วง:ขาว = 3:1", "ม่วง:ขาว = 1:3", "ม่วง:ขาว = 2:1"], correct: 1, detail: "การผสมพันธุ์แบบ Monohybrid cross จะได้อัตราส่วน 3:1", tip: "กฎเมนเดล = 3 ต่อ 1" },
        { q: "คลื่นแม่เหล็กไฟฟ้าชนิดใดที่ใช้ในเครื่องตรวจกระดูก (เอกซเรย์)?", clue: "(ใบ้: พลังงานสูงกว่าแสง)", options: ["ไมโครเวฟ", "อินฟราเรด", "รังสีเอกซ์", "วิทยุ"], correct: 2, detail: "รังสีเอกซ์มีความสามารถในการทะลุผ่านเนื้อเยื่อได้ดี", tip: "X-ray = ทะลุเนื้อเยื่อ" },
        { q: "ถ้าต้องการให้กระจกเว้าเกิด 'ภาพเสมือน' ต้องวางวัตถุไว้ที่ตำแหน่งใด?", clue: "(ใบ้: ต้องใกล้มากจนอยู่ในระยะโฟกัส)", options: ["ที่จุด C", "ที่จุด F", "ไกลกว่า C", "ใกล้กว่า F"], correct: 3, detail: "เมื่อวัตถุอยู่ระหว่างกระจกกับ F จะเกิดภาพเสมือนหัวตั้ง", tip: "ใกล้กระจก = เสมือน" },
        { q: "ความยาวคลื่นมีหน่วยเป็นอะไร?", clue: "(ใบ้: ระยะทางในหนึ่งลูกคลื่น)", options: ["เฮิรตซ์", "เมตร", "วินาที", "จูล"], correct: 1, detail: "ความยาวคลื่นคือระยะทาง จึงมีหน่วยเป็นเมตร", tip: "ยาว = เมตร" },
        { q: "เอนไซม์ชนิดใดที่ทำหน้าที่เชื่อมต่อสาย DNA ในกระบวนการตัดต่อยีน?", clue: "(ใบ้: เอนไซม์กาว)", options: ["Ligase", "Helicase", "Polymerase", "Nuclease"], correct: 0, detail: "DNA Ligase คือกาวที่ใช้เชื่อม DNA เข้าด้วยกัน", tip: "Ligase = กาวเชื่อม" },
        { q: "การถ่ายทอดลักษณะพันธุกรรมแบบเด่นร่วม (Codominance) ของเลือดระบบ AB เกิดจากอะไร?", clue: "(ใบ้: แสดงออกทั้งสองยีนพร้อมกัน)", options: ["เลือดมีทั้ง IA และ IB", "ยีน A ข่มยีน B", "ยีน B ข่มยีน A", "เป็นยีนด้อยทั้งคู่"], correct: 0, detail: "เลือด AB คือการแสดงออกของยีน A และ B พร้อมๆ กัน", tip: "ร่วม = แสดงพร้อมกัน" },
        { q: "คลื่นกลในข้อใดเป็นคลื่นตามยาว?", clue: "(ใบ้: สั่นในทิศทางเดียวกับการเคลื่อนที่ของคลื่น)", options: ["คลื่นน้ำ", "คลื่นในเส้นเชือก", "คลื่นเสียง", "คลื่นแสง"], correct: 2, detail: "คลื่นเสียงเป็นการสั่นของโมเลกุลอากาศในทิศเดียวกับทิศคลื่น", tip: "เสียง = ตามยาว" },
        { q: "สายตาเอียงแก้ไขโดยใช้เลนส์ชนิดใด?", clue: "(ใบ้: เลนส์ทรงกระบอก)", options: ["เลนส์นูน", "เลนส์เว้า", "เลนส์ทรงกระบอก", "เลนส์สองชั้น"], correct: 2, detail: "สายตาเอียงเกิดจากความโค้งกระจกตาไม่เท่ากัน แก้ด้วยเลนส์ทรงกระบอก", tip: "เอียง = ทรงกระบอก" },
        { q: "ถ้าดัชนีหักเหของตัวกลาง A มากกว่าตัวกลาง B แสงจะเดินทางในตัวกลางใดได้เร็วกว่า?", clue: "(ใบ้: ดัชนีหักเหสูง = เร็วต่ำ)", options: ["ตัวกลาง A", "ตัวกลาง B", "เร็วเท่ากัน", "ไม่สามารถบอกได้"], correct: 1, detail: "ดัชนีหักเหสูงแสดงว่าแสงเดินทางได้ช้ากว่า", tip: "ดัชนีสูง = ช้า" },
        { q: "ยีนที่อยู่บนโครโมโซม X ของแม่จะถ่ายทอดไปสู่ใครได้บ้าง?", clue: "(ใบ้: ลูกชายต้องได้รับ X จากแม่)", options: ["ลูกชายเท่านั้น", "ลูกสาวเท่านั้น", "ทั้งลูกชายและลูกสาว", "ส่งไปให้พ่อ"], correct: 2, detail: "แม่ให้ X กับลูกทุกคน (ชายและหญิง)", tip: "แม่ให้ X เสมอ" },
        { q: "ปรากฏการณ์ที่แสงสะท้อนกลับจากผิวตัวกลางไปยังตัวกลางเดิมทั้งหมดเรียกว่าอะไร?", clue: "(ใบ้: ต้องเดินทางจากตัวกลางแน่นไปบาง)", options: ["การหักเห", "การสะท้อนกลับหมด", "การแทรกสอด", "การกระจายแสง"], correct: 1, detail: "เมื่อมุมตกกระทบเกินมุมวิกฤตจะเกิดการสะท้อนกลับหมด", tip: "มุมเกินวิกฤต = สะท้อนหมด" },
        { q: "อวัยวะใดของตาทำหน้าที่ปรับความเข้มของแสงที่เข้าสู่ตา?", clue: "(ใบ้: รูม่านตาขยายหรือหด)", options: ["ม่านตา", "เลนส์ตา", "เรตินา", "กระจกตา"], correct: 0, detail: "ม่านตา (Iris) ควบคุมขนาดรูม่านตา", tip: "ม่านตา = ปรับแสง" },
        { q: "โครโมโซมคู่ที่ 23 ในผู้ชายปกติคือคู่ใด?", clue: "(ใบ้: โครโมโซมเพศชาย)", options: ["XX", "XY", "YY", "X0"], correct: 1, detail: "เพศชายคือ XY", tip: "ชาย = XY" },
        { q: "ถ้าวัตถุอยู่ห่างจากกระจกเงาเรียบ 2 เมตร ภาพจะอยู่ห่างจากกระจกเท่าใด?", clue: "(ใบ้: ระยะวัตถุ = ระยะภาพ)", options: ["1 เมตร", "2 เมตร", "4 เมตร", "0 เมตร"], correct: 1, detail: "กระจกเงาเรียบมีระยะภาพเท่ากับระยะวัตถุ", tip: "ระยะเท่ากัน" },
        { q: "ในขั้นตอนการเพิ่มจำนวน DNA (PCR) ต้องใช้สิ่งใดมากที่สุด?", clue: "(ใบ้: เพื่อจำลอง DNA)", options: ["ความร้อน", "เอนไซม์ Polymerase", "โปรตีน", "ไขมัน"], correct: 1, detail: "ใช้เอนไซม์ Taq Polymerase ในการสร้าง DNA สายใหม่", tip: "PCR = สร้าง DNA" },
        { q: "ข้อใดเป็นคุณสมบัติของคลื่นแม่เหล็กไฟฟ้า?", clue: "(ใบ้: เดินทางได้เร็วที่สุด)", options: ["ต้องใช้ตัวกลาง", "เดินทางได้ในสุญญากาศ", "มีความเร็วเท่าเสียง", "ไม่มีความยาวคลื่น"], correct: 1, detail: "เดินทางได้ในสุญญากาศด้วยความเร็วแสง", tip: "ไม่ต้องใช้ตัวกลาง" },
        { q: "ถ้าแสงสีแดงผสมกับแสงสีเขียวจะได้แสงสีอะไร?", clue: "(ใบ้: การผสมสีของแสง)", options: ["เหลือง", "ฟ้า", "ม่วง", "ขาว"], correct: 0, detail: "แดง + เขียว = เหลือง (ในระบบแสง)", tip: "R+G = Y" },
        { q: "เซลล์ที่ได้จากการแบ่งแบบไมโทซิสจะมีจำนวนโครโมโซมเท่าใดเมื่อเทียบกับเซลล์เริ่มต้น?", clue: "(ใบ้: เท่าเดิม)", options: ["ลดลงครึ่งหนึ่ง", "เท่าเดิม", "เป็น 2 เท่า", "ไม่มีข้อถูก"], correct: 1, detail: "ไมโทซิสรักษาจำนวนโครโมโซมให้เท่าเดิม", tip: "ไมโท = เท่า" },
        { q: "การตรวจหาพาหะพันธุกรรมเรียกว่าอะไร?", clue: "(ใบ้: การวิเคราะห์ยีน)", options: ["Genetic Screening", "Gene Cloning", "DNA Sequencing", "Surgery"], correct: 0, detail: "Genetic Screening คือการตรวจหาโรคทางพันธุกรรม", tip: "Screening = คัดกรอง" },
        { q: "ถ้ามุมตกกระทบคือ 30 องศา มุมสะท้อนจะเป็นเท่าใด?", clue: "(ใบ้: กฎการสะท้อน)", options: ["30 องศา", "60 องศา", "90 องศา", "0 องศา"], correct: 0, detail: "มุมตกกระทบ = มุมสะท้อนเสมอ", tip: "เท่ากัน" },
        { q: "แสงเลเซอร์มีลักษณะเด่นอย่างไร?", clue: "(ใบ้: แสงมีความถี่เดียว)", options: ["แสงสีขาว", "แสงมีความถี่เดียวและทิศทางเดียว", "แสงกระจายตัว", "แสงหักเหง่าย"], correct: 1, detail: "เลเซอร์เป็นแสงสีเดียว (Monochromatic) และขนานกัน", tip: "เลเซอร์ = สีเดียว" },
        { q: "โรคธาลัสซีเมียเป็นโรคพันธุกรรมแบบใด?", clue: "(ใบ้: ยีนด้อยบนออโตโซม)", options: ["ยีนเด่น", "ยีนด้อย", "ยีนบนโครโมโซมเพศ", "การกลายพันธุ์จากรังสี"], correct: 1, detail: "ธาลัสซีเมียเป็นยีนด้อยที่ถ่ายทอดบนโครโมโซมร่างกาย", tip: "ธาลัสซีเมีย = ด้อย" },
        { q: "ถ้าวัตถุอยู่จุดโฟกัส (F) ของเลนส์นูน จะเกิดภาพอย่างไร?", clue: "(ใบ้: ภาพอยู่ระยะอนันต์)", options: ["ภาพจริงขนาดเล็ก", "ภาพเสมือนขนาดใหญ่", "ไม่เกิดภาพ", "ภาพอยู่ที่ระยะอนันต์"], correct: 3, detail: "ถ้าวัตถุอยู่ที่ F แสงจะหักเหขนานกันไปเกิดภาพที่ระยะอนันต์", tip: "ที่ F = อนันต์" }
    ];

    function loadQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${q.q} <span class="clue">${q.clue}</span></p>
                <div id="options${i}">`;
            q.options.forEach((opt, oIdx) => {
                html += `<button onclick="checkAnswer(${i}, ${oIdx})">${opt}</button><br><br>`;
            });
            html += `</div><div id="d${i}" class="detail" style="display:none"></div></div>`;
            area.innerHTML += html;
        });
    }

    function checkAnswer(qIdx, selected) {
        const d = document.getElementById(`d${qIdx}`);
        const optDiv = document.getElementById(`options${qIdx}`);
        d.style.display = 'block';
        optDiv.style.pointerEvents = 'none';
        
        if(selected === questions[qIdx].correct) {
            d.innerHTML = `✅ ถูกต้อง! <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        } else {
            d.innerHTML = `❌ ผิด! เฉลยคือ: ${questions[qIdx].options[questions[qIdx].correct]} <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        }
    }
    loadQuiz();
</script>
</body>
</html>
