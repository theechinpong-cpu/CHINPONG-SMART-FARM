<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบชีววิทยา: การแบ่งเซลล์ (ระดับยาก) - โดย พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Kanit', sans-serif; line-height: 1.6; padding: 20px; background-color: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e1e1; border-radius: 10px; }
        .options button { display: block; width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #bdc3c7; border-radius: 5px; cursor: pointer; transition: 0.3s; background: #fff; }
        .options button:hover { background: #ecf0f1; }
        .correct { background-color: #27ae60 !important; color: white; border-color: #27ae60 !important; }
        .wrong { background-color: #c0392b !important; color: white; border-color: #c0392b !important; }
        .detail { margin-top: 15px; padding: 15px; background: #e8f8f5; border-left: 5px solid #27ae60; display: none; }
        .header { text-align: center; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header">แบบทดสอบเรื่อง การแบ่งเซลล์ (25 ข้อ)</h1>
    <p><em>หมายเหตุ: ข้อสอบชุดนี้เน้นความเข้าใจเชิงวิเคราะห์ ระดับมัธยมศึกษาตอนต้น-ตอนปลาย</em></p>
    
    <div id="quiz-area"></div>
    
    <button onclick="checkAll()" style="width:100%; padding:20px; background:#2980b9; color:white; border:none; border-radius:10px; font-size:18px; cursor:pointer;">แสดงเฉลยและวิเคราะห์ผล</button>
    <div id="final-result"></div>
</div>

<script>
    const quizData = [
        { q: "ข้อใดคือวัตถุประสงค์หลักของการแบ่งเซลล์แบบไมโทซิส?", a: ["เพื่อสร้างเซลล์สืบพันธุ์", "เพื่อเพิ่มจำนวนเซลล์ร่างกาย", "เพื่อลดจำนวนโครโมโซม", "เพื่อสร้างความแปรผันทางพันธุกรรม"], correct: 1, detail: "ไมโทซิสเป็นการเพิ่มจำนวนเซลล์ร่างกาย (Somatic cell) เพื่อการเจริญเติบโตและซ่อมแซมส่วนที่สึกหรอ" },
        { q: "ระยะใดของการแบ่งเซลล์ที่โครโมโซมเรียงตัวอยู่กลางเซลล์?", a: ["Prophase", "Metaphase", "Anaphase", "Telophase"], correct: 1, detail: "Metaphase คือระยะที่โครโมโซมมาเรียงตัวกันที่กึ่งกลางเซลล์ (M for Middle)" },
        { q: "การแลกเปลี่ยนชิ้นส่วนโครโมโซม (Crossing over) เกิดขึ้นในระยะใด?", a: ["Prophase I", "Metaphase I", "Anaphase I", "Prophase II"], correct: 0, detail: "Crossing over เกิดใน Prophase I ซึ่งเป็นหัวใจสำคัญที่ทำให้เกิดความหลากหลายทางพันธุกรรม" },
        { q: "หากเซลล์เริ่มต้นมีโครโมโซม 46 แท่ง ผ่านการแบ่งเซลล์แบบไมโทซิส จะได้เซลล์ใหม่กี่เซลล์ และมีโครโมโซมกี่แท่ง?", a: ["2 เซลล์, 23 แท่ง", "4 เซลล์, 23 แท่ง", "2 เซลล์, 46 แท่ง", "4 เซลล์, 46 แท่ง"], correct: 2, detail: "ไมโทซิสได้ 2 เซลล์ที่เหมือนแม่ทุกประการ (โครโมโซมคงเดิม 2n)" },
        { q: "ระยะใดที่มีการแยกตัวของ Sister chromatid ออกจากกัน?", a: ["Anaphase", "Anaphase I", "Anaphase II", "ทั้งข้อ ก และ ค"], correct: 3, detail: "Sister chromatid แยกตัวใน Anaphase ของไมโทซิส และ Anaphase II ของไมโอซิส" },
        { q: "เหตุใดไมโอซิสจึงจำเป็นต้องมีการแบ่ง 2 รอบ?", a: ["เพื่อให้เซลล์มีขนาดใหญ่ขึ้น", "เพื่อลดจำนวนโครโมโซมลงครึ่งหนึ่ง", "เพื่อเพิ่มจำนวนเซลล์ให้มากขึ้นเป็น 8 เซลล์", "ไม่มีข้อใดถูก"], correct: 1, detail: "เพื่อให้ได้เซลล์ที่มีโครโมโซมเพียงครึ่งหนึ่ง (n) สำหรับการปฏิสนธิ" },
        { q: "การสร้างอสุจิและไข่ในมนุษย์ เกิดจากการแบ่งเซลล์ประเภทใด?", a: ["ไมโทซิส", "ไมโอซิส", "การแบ่งตัวแบบ Binary Fission", "การแตกหน่อ"], correct: 1, detail: "การสร้างเซลล์สืบพันธุ์ต้องเป็นไมโอซิส เพื่อให้โครโมโซมเหลือครึ่งเดียว" },
        { q: "DNA จะเพิ่มปริมาณเป็น 2 เท่าในช่วงใดของวัฏจักรเซลล์?", a: ["G1 phase", "S phase", "G2 phase", "M phase"], correct: 1, detail: "S phase (Synthesis) คือช่วงที่มีการจำลองตัวเองของ DNA" },
        { q: "ข้อใดไม่ใช่ความแตกต่างระหว่างไมโทซิสและไมโอซิส?", a: ["จำนวนเซลล์ที่ได้", "จำนวนโครโมโซมในเซลล์ลูก", "การเกิดขึ้นของนิวเคลียส", "จำนวนขั้นตอนการแบ่ง"], correct: 2, detail: "ทั้งสองกระบวนการมีการสลายและสร้างนิวเคลียสใหม่เหมือนกัน" },
        { q: "ถ้าเซลล์หนึ่งมีโครโมโซม 2n=20 หากเกิดการแบ่งเซลล์แบบไมโอซิส จะได้เซลล์ลูกกี่เซลล์ และแต่ละเซลล์มีกี่โครโมโซม?", a: ["2 เซลล์, 20 แท่ง", "4 เซลล์, 10 แท่ง", "4 เซลล์, 20 แท่ง", "2 เซลล์, 10 แท่ง"], correct: 1, detail: "ไมโอซิสได้ 4 เซลล์ (n) โดยโครโมโซมลดลงครึ่งหนึ่งจาก 20 เหลือ 10" },
        { q: "ระยะที่นานที่สุดในวัฏจักรเซลล์คือระยะใด?", a: ["Prophase", "Interphase", "Metaphase", "Telophase"], correct: 1, detail: "Interphase คือระยะเตรียมตัว ซึ่งกินเวลาส่วนใหญ่ของชีวิตเซลล์" },
        { q: "ไซโทไคเนซิส (Cytokinesis) คือกระบวนการอะไร?", a: ["การแบ่งตัวของนิวเคลียส", "การจำลอง DNA", "การแบ่งไซโทพลาซึม", "การสร้างเส้นใยสปินเดิล"], correct: 2, detail: "Cytokinesis คือการแบ่งตัวของไซโทพลาซึมเพื่อแยกเซลล์ออกจากกันอย่างสมบูรณ์" },
        { q: "จุดตรวจสอบ (Checkpoint) ของเซลล์มีไว้เพื่ออะไร?", a: ["เพื่อเร่งการแบ่งเซลล์", "เพื่อตรวจสอบความถูกต้องของ DNA", "เพื่อสร้างสารอาหาร", "เพื่อทำลายเซลล์"], correct: 1, detail: "Checkpoint มีเพื่อตรวจสอบว่า DNA พร้อมและถูกต้องหรือไม่ก่อนเข้าสู่ขั้นตอนต่อไป" },
        { q: "ในระยะใดที่โครโมโซมเริ่มหดตัวจนเห็นชัดเจนด้วยกล้องจุลทรรศน์?", a: ["Prophase", "Metaphase", "Anaphase", "Telophase"], correct: 0, detail: "Prophase เป็นระยะที่โครมาทินขดตัวแน่นจนเห็นเป็นแท่งโครโมโซม" },
        { q: "การแบ่งเซลล์ที่พบในแบคทีเรียเรียกว่าอะไร?", a: ["ไมโทซิส", "ไมโอซิส", "Binary Fission", "Budding"], correct: 2, detail: "แบคทีเรียไม่มีนิวเคลียส จึงแบ่งตัวแบบ Binary Fission" },
        { q: "อะไรคือผลลัพธ์ของ Anaphase I ในไมโอซิส?", a: ["Homologous chromosome แยกจากกัน", "Sister chromatid แยกจากกัน", "โครโมโซมเพิ่มจำนวน", "เซลล์ลูก 4 เซลล์"], correct: 0, detail: "Anaphase I ของไมโอซิส คือการที่โครโมโซมคู่เหมือน (Homologous) แยกจากกัน" },
        { q: "หากเซลล์สูญเสียความสามารถในการควบคุมการแบ่งเซลล์ จะนำไปสู่สภาวะใด?", a: ["การเจริญเติบโต", "โรคมะเร็ง", "การแก่ตัว", "การสร้างอวัยวะใหม่"], correct: 1, detail: "มะเร็งเกิดจากการแบ่งเซลล์ที่ไม่สามารถควบคุมได้ (Uncontrolled division)" },
        { q: "โครโมโซมที่ได้รับจากพ่อและแม่เรียกว่าอะไร?", a: ["Sister chromatid", "Homologous chromosome", "Centromere", "Centriole"], correct: 1, detail: "Homologous chromosome คือคู่โครโมโซมที่มาจากพ่อและแม่" },
        { q: "ใยสปินเดิล (Spindle fiber) สร้างขึ้นจากโครงสร้างใด?", a: ["นิวเคลียส", "ไรโบโซม", "เซนทริโอล", "ผนังเซลล์"], correct: 2, detail: "เซนทริโอลในเซลล์สัตว์มีบทบาทในการสร้างใยสปินเดิลเพื่อดึงโครโมโซม" },
        { q: "ในระยะ Telophase จะเกิดอะไรขึ้น?", a: ["นิวเคลียสเริ่มสลายตัว", "โครโมโซมเรียงตัวตรงกลาง", "นิวเคลียสสร้างตัวขึ้นใหม่รอบโครโมโซม", "DNA จำลองตัวเอง"], correct: 2, detail: "Telophase เป็นขั้นตอนสุดท้ายที่นิวเคลียสจะสร้างขึ้นใหม่เพื่อคืนสภาพ" },
        { q: "ถ้าขาดไมโอซิส สิ่งมีชีวิตที่สืบพันธุ์แบบอาศัยเพศจะเป็นอย่างไร?", a: ["จำนวนโครโมโซมจะเพิ่มขึ้นเท่าตัวทุกรุ่น", "สิ่งมีชีวิตจะหายไป", "จะสืบพันธุ์ไม่ได้", "ผิดทุกข้อ"], correct: 0, detail: "ถ้าไม่มีไมโอซิส โครโมโซมจะเพิ่มขึ้นเรื่อยๆ ทุกรุ่น ทำให้เกิดความผิดปกติรุนแรง" },
        { q: "ระยะใดที่โครโมโซมเริ่มคลายตัวเป็นเส้นใยโครมาทิน?", a: ["Telophase", "Metaphase", "Anaphase", "Prophase"], correct: 0, detail: "ใน Telophase โครโมโซมจะคลายตัวกลับไปเป็นโครมาทินเหมือนเดิม" },
        { q: "ความแปรผันทางพันธุกรรมเกิดขึ้นจากอะไรเป็นหลัก?", a: ["ไมโทซิส", "ไมโอซิส", "การได้รับสารอาหาร", "อุณหภูมิ"], correct: 1, detail: "ไมโอซิสทำให้เกิดการผสมข้ามของยีนและการแยกตัวของยีน ทำให้ลูกต่างจากพ่อแม่" },
        { q: "ข้อใดกล่าวถูกเกี่ยวกับการแบ่งไซโทพลาซึมในพืชและสัตว์?", a: ["พืชใช้ Cell plate, สัตว์ใช้การคอดกิ่ว", "พืชใช้การคอดกิ่ว, สัตว์ใช้ Cell plate", "พืชและสัตว์ใช้เหมือนกัน", "พืชแบ่งไม่ได้"], correct: 0, detail: "เซลล์พืชมีผนังเซลล์จึงต้องสร้าง Cell plate ตรงกลาง ส่วนสัตว์ไม่มีผนังเซลล์จึงคอดเข้าหากัน" },
        { q: "ระยะพักของเซลล์ (G0 phase) คืออะไร?", a: ["เซลล์ตาย", "เซลล์เตรียมแบ่ง", "เซลล์หยุดแบ่งตัวชั่วคราวหรือถาวร", "เซลล์กำลังสังเคราะห์โปรตีน"], correct: 2, detail: "G0 คือระยะที่เซลล์ทำหน้าที่เฉพาะทางและไม่แบ่งตัว เช่น เซลล์ประสาท" }
    ];

    const area = document.getElementById('quiz-area');
    quizData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `<p><strong>ข้อที่ ${idx + 1}: ${item.q}</strong></p>`;
        item.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = div.querySelectorAll('button');
                btns.forEach(b => b.style.background = '#fff');
                btn.style.background = (i === item.correct) ? '#27ae60' : '#c0392b';
                div.querySelector('.detail').style.display = 'block';
            };
            div.appendChild(btn);
        });
        div.innerHTML += `<div class="detail">${item.detail}</div>`;
        area.appendChild(div);
    });

    function checkAll() {
        alert("ทำข้อสอบครบแล้ว! ดูเฉลยด้านล่างแต่ละข้อได้เลยครับ \n\nวิเคราะห์: หากผิดข้อ 3 หรือ 16 แสดงว่ายังไม่แม่นเรื่องขั้นตอนไมโอซิส (I vs II)");
    }
</script>
</body>
</html>
