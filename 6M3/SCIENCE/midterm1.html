<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 - ชุดที่ 2 (ระดับท้าทาย)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .clue { color: red; font-size: 0.9em; font-weight: bold; }
        .detail { background: #fff3cd; padding: 10px; margin-top: 10px; border-left: 5px solid #ffc107; font-size: 0.95em; }
        .tip { font-weight: bold; color: #856404; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 (ชุดที่ 2)</h1>
    <div id="quiz-area"></div>
</div>

<script>
    const questions = [
        { q: "เซลล์ร่างกายของมนุษย์ที่มีความผิดปกติแบบ Trisomy 18 (Edwards Syndrome) จะมีโครโมโซมทั้งหมดกี่แท่ง?", clue: "(ใบ้: ปกติมี 46 บวกเพิ่มอีก 1)", options: ["45", "46", "47", "48"], correct: 2, detail: "Trisomy หมายถึงโครโมโซมเกินมา 1 แท่งจากปกติ 46 เป็น 47", tip: "Trisomy = 46+1 = 47" },
        { q: "หากพืชดอกสีแดง (RR) ผสมกับดอกสีขาว (rr) แล้วลูกรุ่น F1 เป็นดอกสีชมพูทั้งหมด นี่คือการถ่ายทอดแบบใด?", clue: "(ใบ้: ไม่มีการเด่นสมบูรณ์)", options: ["เด่นสมบูรณ์", "เด่นไม่สมบูรณ์", "เด่นร่วม", "ยีนด้อยบนโครโมโซมเพศ"], correct: 1, detail: "การที่สีผสมกันเป็นสีกลางคือการเด่นไม่สมบูรณ์", tip: "แดง + ขาว = ชมพู คือ ไม่สมบูรณ์" },
        { q: "ถ้าพ่อมีหมู่เลือด AB และแม่มีหมู่เลือด O ลูกมีโอกาสมีหมู่เลือดใดได้บ้าง?", clue: "(ใบ้: เขียน Punnett square ของ IAIB กับ ii)", options: ["AB หรือ O", "A หรือ B", "A, B, AB หรือ O", "เฉพาะ AB"], correct: 1, detail: "ลูกจะได้ IAi หรือ IBi ซึ่งคือเลือดหมู่ A หรือ B เท่านั้น", tip: "AB ผสม O ไม่มีทางได้ลูกเลือด AB" },
        { q: "คลื่นแม่เหล็กไฟฟ้าข้อใดมีความถี่สูงสุด?", clue: "(ใบ้: พลังงานสูงสุดและทะลุทะลวงสูง)", options: ["คลื่นวิทยุ", "รังสีเอกซ์", "รังสีแกมมา", "แสงสีม่วง"], correct: 2, detail: "รังสีแกมมามีความถี่สูงสุดและพลังงานสูงสุดในสเปกตรัม", tip: "Gamma = พลังงานสูงที่สุด" },
        { q: "วัตถุวางหน้าเลนส์เว้าที่ระยะ 2 เท่าของความยาวโฟกัส (2f) ภาพที่เกิดขึ้นเป็นอย่างไร?", clue: "(ใบ้: เลนส์เว้าให้ภาพเดียวเสมอ)", options: ["ภาพจริง หัวกลับ", "ภาพเสมือน หัวตั้ง ขนาดเล็กกว่าวัตถุ", "ภาพเสมือน หัวตั้ง ขนาดใหญ่กว่าวัตถุ", "ไม่เกิดภาพ"], correct: 1, detail: "เลนส์เว้าให้ภาพเสมือนหัวตั้งขนาดเล็กกว่าวัตถุเสมอ ไม่ว่าจะวางที่ระยะใด", tip: "เลนส์เว้า = เสมือน+ตั้ง+เล็ก" },
        { q: "เมื่อแสงเดินทางจากอากาศเข้าสู่แก้ว ข้อใดกล่าวถูกต้อง?", clue: "(ใบ้: อากาศเบาบาง แก้วแน่นกว่า)", options: ["ความเร็วลดลง เบนเข้าหาเส้นปกติ", "ความเร็วเพิ่มขึ้น เบนออกจากเส้นปกติ", "ความเร็วคงที่", "แสงสะท้อนกลับหมด"], correct: 0, detail: "แสงจากตัวกลางบางไปแน่น จะหักเหเข้าหาเส้นปกติ", tip: "บางไปแน่น = เข้าหาเส้น" },
        { q: "การตัดต่อยีน (Recombinant DNA) มักใช้เอนไซม์ชนิดใดในการตัดสาย DNA?", clue: "(ใบ้: เอนไซม์กรรไกร)", options: ["DNA Polymerase", "Restriction Enzyme", "Ligase", "Amylase"], correct: 1, detail: "Restriction enzyme ใช้ตัดสาย DNA ณ ตำแหน่งจำเพาะ", tip: "Restriction = กรรไกรตัด DNA" },
        { q: "ดาวน์ซินโดรมเกิดจากความผิดปกติของโครโมโซมประเภทใด?", clue: "(ใบ้: ไม่ใช่โครโมโซมเพศ)", options: ["Autosome", "Sex Chromosome", "Y Chromosome", "X Chromosome"], correct: 0, detail: "โครโมโซมคู่ที่ 21 เป็นโครโมโซมร่างกาย (Autosome)", tip: "Autosome = โครโมโซมร่างกาย" },
        { q: "หากความถี่ของคลื่นเพิ่มขึ้น 2 เท่า โดยความเร็วคงที่ ความยาวคลื่นจะเป็นอย่างไร?", clue: "(ใบ้: v = fλ ถ้า f เพิ่ม 2 เท่า λ ต้องลด)", options: ["เพิ่มขึ้น 2 เท่า", "ลดลงครึ่งหนึ่ง", "เท่าเดิม", "เพิ่มขึ้น 4 เท่า"], correct: 1, detail: "จาก v=fλ หาก v คงที่ f และ λ จะแปรผกผันกัน", tip: "f และ λ แปรผกผันกัน" },
        { q: "กระจกเงาชนิดใดที่ถูกนำมาใช้ทำกระจกส่องทางโค้งเพื่อให้เห็นภาพมุมกว้าง?", clue: "(ใบ้: ทำให้ภาพเล็กลงแต่เห็นได้เยอะ)", options: ["กระจกราบ", "กระจกเว้า", "กระจกนูน", "เลนส์นูน"], correct: 2, detail: "กระจกนูนให้ภาพเสมือนขนาดเล็ก ทำให้เห็นพื้นที่ได้กว้าง", tip: "กระจกนูน = เห็นกว้าง" },
        { q: "โรคฮีโมฟีเลีย (เลือดไหลไม่หยุด) เป็นลักษณะทางพันธุกรรมแบบใด?", clue: "(ใบ้: ติดมากับโครโมโซม X)", options: ["ยีนเด่นบนออโตโซม", "ยีนด้อยบนโครโมโซม X", "ยีนเด่นบนโครโมโซม X", "ยีนด้อยบนออโตโซม"], correct: 1, detail: "ฮีโมฟีเลียถ่ายทอดผ่านโครโมโซม X โดยเป็นยีนด้อย", tip: "ฮีโมฟีเลีย = X ด้อย" },
        { q: "การถ่ายทอดลักษณะพันธุกรรมแบบ Polygenic Inheritance คืออะไร?", clue: "(ใบ้: ลักษณะที่มีความแปรผันต่อเนื่อง)", options: ["สีดอกถั่วลันเตา", "หมู่เลือด", "ความสูงของมนุษย์", "การห่อลิ้น"], correct: 2, detail: "ความสูงเป็นลักษณะที่ควบคุมด้วยยีนหลายคู่ (Polygenic)", tip: "Polygenic = แปรผันต่อเนื่อง" },
        { q: "ถ้ามองผ่านเลนส์นูนเห็นภาพหัวตั้งขนาดใหญ่กว่าวัตถุ แสดงว่าวัตถุอยู่ที่ไหน?", clue: "(ใบ้: ต้องอยู่ใกล้เลนส์มาก)", options: ["ระยะอนันต์", "ไกลกว่า 2f", "ที่ 2f", "ระหว่าง f กับเลนส์"], correct: 3, detail: "ภาพเสมือนหัวตั้งขนาดใหญ่เกิดเมื่อวัตถุอยู่ระหว่าง f กับเลนส์", tip: "ใกล้เกิน f = ขยายใหญ่" },
        { q: "แสงสีขาวผ่านปริซึมแล้วแยกออกเป็น 7 สี ปรากฏการณ์นี้เรียกว่าอะไร?", clue: "(ใบ้: เกิดจากการหักเหที่ไม่เท่ากันของแต่ละสี)", options: ["การกระเจิง", "การกระจายแสง", "การแทรกสอด", "การสะท้อนกลับหมด"], correct: 1, detail: "แสงขาวแยกเป็นสีรุ้งคือการกระจายแสง (Dispersion)", tip: "Dispersion = แยกสี" },
        { q: "ข้อใดคือความหมายของ 'โฮโมไซกัส' (Homozygous)?", clue: "(ใบ้: เหมือนกันทั้งคู่)", options: ["Tt", "TT", "Ttและtt", "ไม่มีข้อถูก"], correct: 1, detail: "Homozygous คือแอลลีลที่เหมือนกัน เช่น TT หรือ tt", tip: "Homo = เหมือน" },
        { q: "คลื่นแม่เหล็กไฟฟ้าชนิดใดที่ใช้ในรีโมทคอนโทรล?", clue: "(ใบ้: รังสีเหนือแดง)", options: ["ไมโครเวฟ", "อินฟราเรด", "อัลตราไวโอเลต", "เอกซ์เรย์"], correct: 1, detail: "อินฟราเรด (Infrared) ใช้ในการส่งสัญญาณระยะใกล้", tip: "Remote = Infrared" },
        { q: "ระยะภาพของภาพจริงที่เกิดจากเลนส์นูนมีค่าเป็นอย่างไร?", clue: "(ใบ้: อยู่ฝั่งตรงข้ามวัตถุ)", options: ["เป็นบวก", "เป็นลบ", "เป็นศูนย์", "หาค่าไม่ได้"], correct: 0, detail: "ในทางฟิสิกส์ ระยะภาพจริง (s') จะเป็นบวก", tip: "ภาพจริง = บวก" },
        { q: "ยีนที่อยู่บนโครโมโซมเดียวกันจะถ่ายทอดไปด้วยกัน เรียกว่าอะไร?", clue: "(ใบ้: ลิงก์...)", options: ["Crossing over", "Linkage", "Mutation", "Inversion"], correct: 1, detail: "ยีนที่อยู่ติดกันบนโครโมโซมมักถ่ายทอดไปด้วยกัน เรียกว่า Gene Linkage", tip: "Linkage = ผูกติดกัน" },
        { q: "การฉายรังสีพืชเพื่อทำให้เกิดการเปลี่ยนแปลงรหัสพันธุกรรม เรียกว่าอะไร?", clue: "(ใบ้: การกลายพันธุ์)", options: ["Selective Breeding", "Mutation", "Cloning", "Transgenic"], correct: 1, detail: "รังสีทำให้เกิดการเปลี่ยนแปลง DNA หรือ Mutation", tip: "Mutation = กลายพันธุ์" },
        { q: "ถ้าค่าดัชนีหักเหของแก้วคือ 1.5 แสงจะเดินทางในแก้วด้วยความเร็วเท่าใด (ความเร็วแสงในสุญญากาศ = 3x10^8 m/s)?", clue: "(ใบ้: v = c/n)", options: ["1.5 x 10^8 m/s", "2.0 x 10^8 m/s", "3.0 x 10^8 m/s", "4.5 x 10^8 m/s"], correct: 1, detail: "v = c/n = 3x10^8 / 1.5 = 2x10^8", tip: "v = c/n" },
        { q: "โครโมโซมมนุษย์คู่ที่ 1-22 เรียกว่าอะไร?", clue: "(ใบ้: ไม่ใช่โครโมโซมเพศ)", options: ["Allosome", "Autosome", "Zygote", "Gamete"], correct: 1, detail: "โครโมโซมร่างกายคือ Autosome", tip: "Autosome = ร่างกาย" },
        { q: "การใช้ DNA ตรวจสอบความเป็นพ่อแม่เรียกว่าอะไร?", clue: "(ใบ้: ลายพิมพ์...)", options: ["DNA Cloning", "DNA Sequencing", "DNA Fingerprinting", "PCR"], correct: 2, detail: "DNA Fingerprinting ใช้ตรวจเอกลักษณ์บุคคล", tip: "Fingerprint = ตรวจสอบ" },
        { q: "เหตุใดท้องฟ้าจึงมีสีฟ้าในช่วงกลางวัน?", clue: "(ใบ้: แสงกระเจิง)", options: ["การสะท้อน", "การกระเจิงของแสง", "การดูดกลืน", "การหักเห"], correct: 1, detail: "แสงสีฟ้ามีความยาวคลื่นสั้นจึงกระเจิงได้ดีในชั้นบรรยากาศ", tip: "ฟ้า = กระเจิง" },
        { q: "จีโนไทป์ Tt มีฟีโนไทป์แบบใด (T=สูง, t=เตี้ย)?", clue: "(ใบ้: T ใหญ่ข่ม T เล็ก)", options: ["สูง", "เตี้ย", "ปานกลาง", "ไม่มีข้อถูก"], correct: 0, detail: "ยีนเด่นแสดงออกเสมอเมื่อมีอย่างน้อย 1 ยีน", tip: "มีตัวใหญ่ = เด่น" },
        { q: "ถ้าภาพที่เห็นในกระจกเงาเป็นภาพจริง แสดงว่าเป็นกระจกชนิดใด?", clue: "(ใบ้: ต้องรวมแสง)", options: ["กระจกราบ", "กระจกเว้า", "กระจกนูน", "กระจกเงาตาย"], correct: 1, detail: "กระจกเว้าเท่านั้นที่รวมแสงเกิดภาพจริงได้", tip: "ภาพจริง = กระจกเว้า" }
    ];

    function loadQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${q.q} <span class="clue">${q.clue}</span></p>
                <div id="options${i}">`;
            q.options.forEach((opt, oIdx) => {
                html += `<button onclick="checkAnswer(${i}, ${oIdx})">${opt}</button><br><br>`;
            });
            html += `</div><div id="d${i}" class="detail" style="display:none"></div></div>`;
            area.innerHTML += html;
        });
    }

    function checkAnswer(qIdx, selected) {
        const d = document.getElementById(`d${qIdx}`);
        const optDiv = document.getElementById(`options${qIdx}`);
        d.style.display = 'block';
        optDiv.style.pointerEvents = 'none';
        
        if(selected === questions[qIdx].correct) {
            d.innerHTML = `✅ ถูกต้อง! <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        } else {
            d.innerHTML = `❌ ผิด! เฉลยคือ: ${questions[qIdx].options[questions[qIdx].correct]} <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        }
    }
    loadQuiz();
</script>
</body>
</html>
