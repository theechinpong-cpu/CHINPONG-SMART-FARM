<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบกลางภาค วิทยาศาสตร์ ม.3 - ชุดที่ 4 (เน้นพันธุศาสตร์)</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .question { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .clue { color: red; font-size: 0.9em; font-weight: bold; }
        .detail { background: #e2e3e5; padding: 10px; margin-top: 10px; border-left: 5px solid #383d41; font-size: 0.95em; }
        .tip { font-weight: bold; color: #1b1e21; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>ข้อสอบกลางภาค (ชุดที่ 4: พันธุศาสตร์เน้นๆ)</h1>
    <div id="quiz-area"></div>
</div>

<script>
    const questions = [
        { q: "สารพันธุกรรม (DNA) ของสิ่งมีชีวิตยูคาริโอตส่วนใหญ่อยู่ที่ส่วนใดของเซลล์?", clue: "(ใบ้: แหล่งเก็บรหัสทางพันธุกรรม)", options: ["ไซโทพลาซึม", "นิวเคลียส", "ไมโทคอนเดรีย", "ไรโบโซม"], correct: 1, detail: "DNA ส่วนใหญ่ในยูคาริโอตอยู่ในนิวเคลียส", tip: "DNA = สมุดจดรหัสในนิวเคลียส" },
        { q: "คู่เบสของ DNA ข้อใดจับคู่กันได้ถูกต้องตามหลัก?", clue: "(ใบ้: A จับ T, C จับ G)", options: ["A-C", "A-T", "T-G", "C-T"], correct: 1, detail: "Adenine จับกับ Thymine, Cytosine จับกับ Guanine", tip: "AT, CG" },
        { q: "การถ่ายทอดลักษณะแบบ 'ความแปรผันไม่ต่อเนื่อง' (Discontinuous Variation) ได้แก่ข้อใด?", clue: "(ใบ้: ลักษณะที่มีแบบแผนชัดเจน)", options: ["ความสูง", "สีผิว", "ติ่งหู", "น้ำหนัก"], correct: 2, detail: "ลักษณะติ่งหูมีแบบแผนชัดเจนคือมีติ่งหรือไม่มีติ่ง", tip: "ไม่ต่อเนื่อง = ใช่/ไม่ใช่" },
        { q: "ถ้าพ่อมียีนพาหะโรคตาบอดสี (ตาปกติ) และแม่เป็นตาปกติ (โฮโมไซกัส) ลูกสาวจะมีโอกาสเป็นพาหะกี่เปอร์เซ็นต์?", clue: "(ใบ้: ตาบอดสีเป็นยีนด้อยบนโครโมโซม X)", options: ["0%", "25%", "50%", "100%"], correct: 0, detail: "พ่อตาปกติ (XY) แม่ตาปกติ (XX) ลูกทุกคนตาปกติแน่นอน", tip: "พ่อปกติ = ไม่ส่งยีนด้อยให้ลูกสาว" },
        { q: "การตัดแต่งพันธุกรรมเพื่อสร้างอินซูลินใช้แบคทีเรียประเภทใดเป็นพาหะ?", clue: "(ใบ้: วงแหวน DNA เล็กๆ)", options: ["พลาสมิด (Plasmid)", "โครโมโซมหลัก", "RNA", "โปรตีนแคปซิด"], correct: 0, detail: "พลาสมิดเป็นวงแหวน DNA ในแบคทีเรียที่ใช้ใส่ยีนมนุษย์", tip: "Plasmid = พาหะนำยีน" },
        { q: "กระบวนการแบ่งเซลล์แบบใดที่ช่วยเพิ่มความหลากหลายทางพันธุกรรมมากที่สุด?", clue: "(ใบ้: มีการแลกเปลี่ยนชิ้นส่วนโครโมโซม)", options: ["ไมโทซิส", "ไมโอซิส", "binary fission", "budding"], correct: 1, detail: "ไมโอซิสมีกระบวนการ Crossing over ทำให้ลูกไม่เหมือนพ่อแม่เป๊ะ", tip: "ไมโอซิส = เพิ่มความหลากหลาย" },
        { q: "ยีนที่อยู่บนโครโมโซมคู่เดียวกันและถ่ายทอดไปด้วยกัน เรียกว่ายีนอะไร?", clue: "(ใบ้: Link...)", options: ["Sex-linked gene", "Linked gene", "Lethal gene", "Mutant gene"], correct: 1, detail: "ยีนที่อยู่บนโครโมโซมเดียวกันเรียกว่า Linked gene", tip: "Linked = ผูกไว้ด้วยกัน" },
        { q: "ฟีโนไทป์ (Phenotype) หมายถึงข้อใด?", clue: "(ใบ้: ลักษณะที่แสดงออกมาให้เห็น)", options: ["รหัสยีน", "ลักษณะที่ปรากฏภายนอก", "จำนวนโครโมโซม", "ลำดับเบส"], correct: 1, detail: "ฟีโนไทป์คือลักษณะที่สังเกตเห็นได้จากภายนอก", tip: "Phenotype = Physical appearance" },
        { q: "ข้อใดคือความหมายของ 'โฮโมไซกัส' (Homozygous)?", clue: "(ใบ้: ยีนคู่เหมือน)", options: ["แอลลีลเหมือนกัน", "แอลลีลต่างกัน", "โครโมโซมเกิน", "ยีนกลายพันธุ์"], correct: 0, detail: "Homozygous หมายถึงแอลลีลที่เหมือนกันทั้งคู่", tip: "Homo = เหมือน" },
        { q: "ข้อใดเป็นลักษณะที่เกิดจากมิวเทชัน (Mutation) ในระดับโครโมโซม?", clue: "(ใบ้: กลุ่มอาการทางพันธุกรรม)", options: ["ผิวเผือก", "ดาวน์ซินโดรม", "ตาบอดสี", "ฮีโมฟีเลีย"], correct: 1, detail: "ดาวน์ซินโดรมเกิดจากจำนวนโครโมโซมเกินมา 1 แท่ง", tip: "ดาวน์ซินโดรม = โครโมโซมผิดปกติ" },
        { q: "ในกระบวนการถอดรหัส DNA ไปเป็น mRNA เบส T จะถูกเปลี่ยนเป็นเบสใด?", clue: "(ใบ้: mRNA ไม่มี T)", options: ["A", "C", "G", "U"], correct: 3, detail: "ใน mRNA เบส Thymine (T) จะถูกแทนที่ด้วย Uracil (U)", tip: "RNA ไม่มี T มีแต่ U" },
        { q: "หากแอลลีลเด่น (A) และด้อย (a) ผสมกันแบบ Aa x Aa ลูกจะมีจีโนไทป์แบบ Aa กี่ส่วน?", clue: "(ใบ้: อัตราส่วน 1:2:1)", options: ["1/4", "2/4", "3/4", "4/4"], correct: 1, detail: "Aa x Aa ได้ AA, Aa, Aa, aa (Aa มี 2 ใน 4)", tip: "Aa = ครึ่งหนึ่ง" },
        { q: "การทำโคลนนิ่ง (Cloning) สิ่งมีชีวิตตัวใหม่จะมีพันธุกรรมเหมือนใครมากที่สุด?", clue: "(ใบ้: ผู้บริจาคเซลล์ร่างกาย)", options: ["แม่ผู้รับท้อง", "ตัวผู้บริจาคนิวเคลียส", "ไม่มีใครเหมือน", "ผสมจากทั้งสองตัว"], correct: 1, detail: "โคลนนิ่งเอาสารพันธุกรรมจากตัวบริจาคนิวเคลียส", tip: "เหมือนผู้บริจาคนิวเคลียส" },
        { q: "สิ่งมีชีวิตใดที่ถูกจัดเป็นสิ่งมีชีวิตดัดแปรพันธุกรรม (GMOs) แบบ Transgenic?", clue: "(ใบ้: มีการข้ามสายพันธุ์)", options: ["แตงโมไร้เมล็ด", "ข้าวสีทองที่มีวิตามิน A", "สุนัขพันธุ์ทาง", "พืชที่ถูกคัดพันธุ์"], correct: 1, detail: "ข้าวสีทองได้รับยีนจากสิ่งมีชีวิตอื่นเพื่อสร้างวิตามิน", tip: "Transgenic = ข้ามสปีชีส์" },
        { q: "ถ้าลูกมีจีโนไทป์เป็น aa จะต้องได้รับยีนด้อยมาจากใคร?", clue: "(ใบ้: ต้องรับมาจากทั้งคู่)", options: ["พ่อเท่านั้น", "แม่เท่านั้น", "ทั้งพ่อและแม่", "ไม่มีข้อถูก"], correct: 2, detail: "ยีนด้อยต้องได้รับมาจากทั้งพ่อและแม่จึงจะแสดงออกได้", tip: "aa = รับมาจากสองฝ่าย" },
        { q: "ข้อใดคือบทบาทของเอนไซม์ DNA Polymerase?", clue: "(ใบ้: สร้างสาย DNA)", options: ["ตัด DNA", "เชื่อม DNA", "จำลองสาย DNA", "สลาย DNA"], correct: 2, detail: "Polymerase ทำหน้าที่สร้างสาย DNA ใหม่ระหว่างจำลองตัวเอง", tip: "Polymerase = จำลอง" },
        { q: "ลักษณะที่แปรผันต่อเนื่องมักถูกควบคุมโดยยีนกี่คู่?", clue: "(ใบ้: Poly...)", options: ["1 คู่", "2 คู่", "หลายคู่", "ไม่มีข้อใดถูก"], correct: 2, detail: "ลักษณะแปรผันต่อเนื่อง (Polygenic) ควบคุมด้วยยีนหลายคู่", tip: "Poly = หลาย" },
        { q: "โครโมโซมเพศของมนุษย์เพศหญิงคือคู่ใด?", clue: "(ใบ้: เหมือนกันทั้งคู่)", options: ["XX", "XY", "YY", "X0"], correct: 0, detail: "หญิงปกติมีโครโมโซมเพศเป็น XX", tip: "หญิง = XX" },
        { q: "ความหมายของ 'เฮเทอโรไซกัส' (Heterozygous) คืออะไร?", clue: "(ใบ้: ยีนคู่ต่าง)", options: ["แอลลีลเหมือนกัน", "แอลลีลต่างกัน", "มีโครโมโซมเกิน", "ไม่มีข้อใดถูก"], correct: 1, detail: "Heterozygous คือแอลลีลที่ต่างกัน เช่น Tt", tip: "Hetero = ต่าง" },
        { q: "ยีนที่อยู่บนโครโมโซมร่างกายเรียกว่าอะไร?", clue: "(ใบ้: Autosome)", options: ["Autosome", "Sex chromosome", "Allosome", "Zygote"], correct: 0, detail: "โครโมโซมร่างกาย 1-22 คือ Autosome", tip: "Auto = ร่างกาย" },
        { q: "ถ้าพ่อเป็นพาหะฮีโมฟีเลีย (X^h Y) แม่เป็นปกติ (XX) ลูกสาวจะมีโอกาสเป็นพาหะกี่เปอร์เซ็นต์?", clue: "(ใบ้: พ่อให้ X^h แก่ลูกสาวทุกคน)", options: ["0%", "25%", "50%", "100%"], correct: 3, detail: "พ่อให้ X^h ลูกสาวทุกคน (ได้รับ X^h จากพ่อเสมอ)", tip: "พ่อฮีโม = ส่งต่อให้ลูกสาว" },
        { q: "การวิเคราะห์ลำดับเบสใน DNA เรียกว่าอะไร?", clue: "(ใบ้: การหาลำดับ)", options: ["DNA Sequencing", "Cloning", "Fingerprinting", "PCR"], correct: 0, detail: "Sequencing คือการอ่านลำดับเบส", tip: "Sequence = ลำดับ" },
        { q: "ข้อใดไม่ใช่กระบวนการของเทคโนโลยีชีวภาพ?", clue: "(ใบ้: วิธีธรรมชาติ)", options: ["ตัดต่อยีน", "โคลนนิ่ง", "ผสมพันธุ์คัดเลือก", "การเกษตรพื้นบ้าน"], correct: 3, detail: "เกษตรพื้นบ้านคือวิถีดั้งเดิม ไม่ใช่เทคโนโลยีชีวภาพสมัยใหม่", tip: "Bio-tech = วิทยาศาสตร์ขั้นสูง" },
        { q: "ยีนที่ข่มยีนอื่นอย่างสมบูรณ์ จะแสดงลักษณะอย่างไร?", clue: "(ใบ้: แสดงลักษณะตนเองแม้มีคู่เดียว)", options: ["ข่มยีนอื่นได้เสมอ", "ไม่แสดงออก", "รอให้ยีนด้อยมาช่วย", "ถูกข่มเสมอ"], correct: 0, detail: "ยีนเด่นจะแสดงลักษณะแม้มีเพียงแอลลีลเดียว", tip: "เด่น = แสดงออก" },
        { q: "เหตุใดมนุษย์จึงมีความหลากหลายทางชีวภาพมาก?", clue: "(ใบ้: เกิดจากการสุ่มเลือกยีน)", options: ["การแบ่งไมโทซิส", "การผสมผสานของยีนในไมโอซิส", "การได้รับอาหารต่างกัน", "สภาพแวดล้อมเท่านั้น"], correct: 1, detail: "ไมโอซิสและการปฏิสนธิทำให้เกิดการรวมกันของยีนที่หลากหลาย", tip: "ไมโอซิส = ต้นเหตุความหลากหลาย" }
    ];

    function loadQuiz() {
        const area = document.getElementById('quiz-area');
        questions.forEach((q, i) => {
            let html = `<div class="question">
                <p><strong>ข้อที่ ${i+1}:</strong> ${q.q} <span class="clue">${q.clue}</span></p>
                <div id="options${i}">`;
            q.options.forEach((opt, oIdx) => {
                html += `<button onclick="checkAnswer(${i}, ${oIdx})">${opt}</button><br><br>`;
            });
            html += `</div><div id="d${i}" class="detail" style="display:none"></div></div>`;
            area.innerHTML += html;
        });
    }

    function checkAnswer(qIdx, selected) {
        const d = document.getElementById(`d${qIdx}`);
        const optDiv = document.getElementById(`options${qIdx}`);
        d.style.display = 'block';
        optDiv.style.pointerEvents = 'none';
        
        if(selected === questions[qIdx].correct) {
            d.innerHTML = `✅ ถูกต้อง! <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        } else {
            d.innerHTML = `❌ ผิด! เฉลยคือ: ${questions[qIdx].options[questions[qIdx].correct]} <br>${questions[qIdx].detail} <div class="tip">TIP: ${questions[qIdx].tip}</div>`;
        }
    }
    loadQuiz();
</script>
</body>
</html>
