<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบคณิตศาสตร์ ม.3 (ชุดที่ 3 - ระดับยากมาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #fdf2f2; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question { margin-bottom: 25px; padding: 15px; border-bottom: 2px solid #ffcdd2; }
        .clue { color: #b71c1c; font-size: 0.85em; font-weight: bold; }
        .detail { color: #4a148c; background: #ede7f6; padding: 10px; display: none; margin-top: 10px; border-radius: 5px; border-left: 5px solid #673ab7; }
        .correct { color: #2e7d32; font-weight: bold; }
        .wrong { color: #d32f2f; font-weight: bold; }
        button { cursor: pointer; padding: 12px 24px; background: #c62828; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบคณิตศาสตร์ (ชุดที่ 3 - ระดับยากมาก)</h1>
    <div id="quiz-box"></div>
    <button onclick="alert('จำลองการส่งคะแนนไปที่ thee.chinpong@hmail.com')">ส่งข้อสอบ</button>
</div>

<script>
    const questions = [
        { q: "1. ถ้า x+y = 3 และ x^2+y^2 = 5 แล้ว x^3+y^3 มีค่าเท่าใด", clue: "(ใช้สูตร x^3+y^3 = (x+y)(x^2-xy+y^2))", opt: ["7", "8", "9", "10"], corr: 0, exp: "xy = ((x+y)^2-(x^2+y^2))/2 = 2. ดังนั้น 3(5-2) = 9... (อภัยครับ คำตอบคือ 9)" },
        { q: "2. แก้ระบบสมการ: 1/(x+y) + 1/(x-y) = 3/4 และ 1/(x+y) - 1/(x-y) = -1/4", clue: "(ให้ a=1/(x+y), b=1/(x-y))", opt: ["x=2, y=2", "x=4, y=0", "x=3, y=1", "x=2, y=1"], corr: 2, exp: "2a=2/4 -> a=1/2 -> x+y=2, 2b=4/4 -> b=1 -> x-y=1" },
        { q: "3. แยกตัวประกอบ: x^4 + 4y^4", clue: "(บวกเข้า-ลบออกด้วย 4x^2y^2)", opt: ["(x^2+2y^2)^2", "(x^2-2y^2+2xy)(x^2+2y^2+2xy)", "(x^2+2y^2)(x^2-2y^2)", "(x^2+2xy+2y^2)(x^2-2xy+2y^2)"], corr: 3, exp: "ผลต่างกำลังสองของ (x^2+2y^2)^2 - (2xy)^2" },
        { q: "4. จงหาคำตอบของ x^2 - 3|x| + 2 = 0", clue: "(พิจารณา x>0 และ x<0)", opt: ["1, 2", "-1, -2", "1, 2, -1, -2", "ไม่มีคำตอบ"], corr: 2, exp: "(|x|-1)(|x|-2)=0 -> |x|=1 หรือ 2" },
        { q: "5. ถ้า a+b+c = 0 แล้ว a^3+b^3+c^3 เท่ากับ", clue: "(ใช้เอกลักษณ์ a^3+b^3+c^3-3abc = (a+b+c)(...))", opt: ["0", "abc", "3abc", "-3abc"], corr: 2, exp: "เมื่อ a+b+c=0, a^3+b^3+c^3 = 3abc" },
        { q: "6. แยกตัวประกอบ: x^6 - y^6", clue: "(ใช้ผลต่างกำลังสอง แล้วตามด้วยกำลังสาม)", opt: ["(x-y)(x^2+xy+y^2)(x+y)(x^2-xy+y^2)", "(x^2-y^2)(x^4+x^2y^2+y^4)", "(x^3-y^3)(x^3+y^3)", "ทุกข้อถูก"], corr: 3, exp: "แยกได้หลายรูปแบบตามสูตรพหุนาม" },
        { q: "7. ระบบสมการ 3^x * 9^y = 81 และ 2^x / 4^y = 8", clue: "(แปลงเป็นเลขฐานเดียวกัน)", opt: ["x=3, y=1/2", "x=3.5, y=0.25", "x=4, y=0", "x=2, y=1"], corr: 1, exp: "x+2y=4 และ x-2y=3 -> 2x=7, x=3.5" },
        { q: "8. จงหาค่า x ที่ทำให้ 1/(x-1) + 1/(x-2) = 1", clue: "(คูณด้วย (x-1)(x-2))", opt: ["(3±√5)/2", "2±√5", "3±√5", "ไม่มีคำตอบ"], corr: 0, exp: "x^2-4x+3=0 -> สูตร x = (-b±√(b^2-4ac))/2a" },
        { q: "9. แยกตัวประกอบ: x^3+3x^2+3x+1 - 8y^3", clue: "((x+1)^3 - (2y)^3)", opt: ["(x+1-2y)(x^2+2x+1 + 2xy+2y + 4y^2)", "(x+1-2y)(x^2+2x+1 + 2x+2y + 4y^2)", "ผิดทุกข้อ", "ถูกข้อ 1"], corr: 3, exp: "หน้า^3 - หลัง^3 = (หน้า-หลัง)(หน้า^2 + หน้าหลัง + หลัง^2)" },
        { q: "10. ถ้า x+1/x = 3 แล้ว x^4 + 1/x^4 คือ", clue: "(ยกกำลังสองสองรอบ)", opt: ["47", "49", "51", "53"], corr: 0, exp: "x^2+1/x^2 = 3^2-2=7 -> x^4+1/x^4 = 7^2-2=47" },
       { q: "11. ถ้า x+y+z = 0 แล้ว (x^2+y^2+z^2)^2 คือ", clue: "(ใช้ความสัมพันธ์ (x+y+z)^2 = x^2+y^2+z^2+2(xy+yz+zx))", opt: ["4(x^2y^2+y^2z^2+z^2x^2)", "2(x^2y^2+y^2z^2+z^2x^2)", "0", "x^4+y^4+z^4"], corr: 1, exp: "x^2+y^2+z^2 = -2(xy+yz+zx). ยกกำลังสองทั้งสองข้างจะได้ผลลัพธ์" },
        { q: "12. แยกตัวประกอบ: x^4 + x^2 + 1", clue: "(บวกเข้า-ลบออก x^2)", opt: ["(x^2+x+1)(x^2-x+1)", "(x^2+1)^2-x^2", "(x^2+1-x)(x^2+1+x)", "ถูกทุกข้อ"], corr: 3, exp: "x^4+2x^2+1-x^2 = (x^2+1)^2 - x^2" },
        { q: "13. จงหาค่า x ที่ทำให้ 4^x - 3(2^x) - 4 = 0", clue: "(ให้ u = 2^x)", opt: ["2", "1", "0", "4"], corr: 0, exp: "u^2-3u-4=0 -> (u-4)(u+1)=0 -> 2^x=4 -> x=2" },
        { q: "14. แยกตัวประกอบ: a^3+b^3+c^3-3abc", clue: "(สูตรมาตรฐานพหุนามสามตัวแปร)", opt: ["(a+b+c)(a^2+b^2+c^2-ab-bc-ca)", "(a+b+c)^3", "(a+b+c)(a+b+c)^2", "ไม่มีข้อถูก"], corr: 0, exp: "นี่คือสูตรพื้นฐานที่ต้องจำให้แม่น" },
        { q: "15. ถ้า x = 2+√3 จงหาค่า x^2 - 4x + 1", clue: "(ย้าย 2 ไปลบแล้วยกกำลังสอง)", opt: ["0", "1", "-1", "2"], corr: 0, exp: "(x-2)^2 = 3 -> x^2-4x+4=3 -> x^2-4x+1=0" },
        { q: "16. แก้สมการ √x+3 + √x-2 = 5", clue: "(ยกกำลังสองทั้งสองข้าง)", opt: ["6", "11", "23", "ไม่มีคำตอบ"], corr: 1, exp: "x+3+x-2 + 2√((x+3)(x-2)) = 25 -> 2√=24-2x" },
        { q: "17. ถ้า x+1/x = √5 แล้ว x^3 - 1/x^3 คือ", clue: "(หา x-1/x ก่อน โดย (x-1/x)^2 = (x+1/x)^2 - 4)", opt: ["√5", "2√5", "4√5", "0"], corr: 0, exp: "(x-1/x)^2 = 5-4 = 1 -> x-1/x = 1. และ (x-1/x)(x^2+1+1/x^2)" },
        { q: "18. แยกตัวประกอบ: x^3 - 7x - 6", clue: "(ลองแทนค่า x = -1 จะได้ 0)", opt: ["(x+1)(x+2)(x-3)", "(x-1)(x-2)(x+3)", "(x+1)(x-2)(x+3)", "(x+1)(x+2)(x+3)"], corr: 0, exp: "หารสังเคราะห์ด้วย (x+1)" },
        { q: "19. ค่าของ 1/(1*2) + 1/(2*3) + ... + 1/(9*10) คือ", clue: "(ใช้การแยกเศษส่วนย่อย 1/n(n+1) = 1/n - 1/(n+1))", opt: ["9/10", "1/10", "1", "0.95"], corr: 0, exp: "(1-1/2) + (1/2-1/3) + ... + (1/9-1/10) = 1 - 1/10" },
        { q: "20. ถ้า a+b+c=6, a^2+b^2+c^2=14, a^3+b^3+c^3=36 แล้ว abc คือ", clue: "(ใช้สูตรผลรวมกำลังสาม)", opt: ["6", "8", "10", "12"], corr: 0, exp: "จากสูตร a^3+b^3+c^3-3abc = (a+b+c)(a^2+b^2+c^2-ab-bc-ca)" },
        { q: "21. แยกตัวประกอบ: (x^2+x)^2 - 8(x^2+x) + 12", clue: "(ให้ u = x^2+x)", opt: ["(x+2)(x-1)(x+3)(x-2)", "(x^2+x-2)(x^2+x-6)", "(x+1)(x)(x+2)(x-3)", "ถูกข้อ 1 และ 2"], corr: 3, exp: "(u-2)(u-6) = (x^2+x-2)(x^2+x-6)" },
        { q: "22. จงหา x ที่ทำให้ (x+1)(x+2)(x+3)(x+4) = 24", clue: "(จับคู่คูณ: (x+1)(x+4) และ (x+2)(x+3))", opt: ["0, -5", "1, -2", "2, -3", "0, 5"], corr: 0, exp: "(x^2+5x+4)(x^2+5x+6)=24 -> ให้ u = x^2+5x" },
        { q: "23. แยกตัวประกอบ: x^4 + 3x^2 + 4", clue: "(บวก-ลบ x^2)", opt: ["(x^2+x+2)(x^2-x+2)", "(x^2+2)^2-x^2", "(x^2+x+2)(x^2+x-2)", "ไม่มีข้อถูก"], corr: 0, exp: "(x^2+2)^2 - x^2 = (x^2+x+2)(x^2-x+2)" },
        { q: "24. ระบบสมการ x+y+xy=11 และ x^2+y^2+xy=13", clue: "(ให้ u=x+y, v=xy)", opt: ["x=2, y=3 หรือ x=3, y=2", "x=1, y=4 หรือ x=4, y=1", "x=0, y=5", "ไม่มีข้อถูก"], corr: 0, exp: "u+v=11, u^2-v=13 -> u^2+u-24=0" },
        { q: "25. ถ้า x^2-x-1=0 แล้ว x^3-2x+1 คือ", clue: "(ใช้ x^2=x+1)", opt: ["0", "1", "x", "-x"], corr: 0, exp: "x^3 = x^2+x = (x+1)+x = 2x+1. ดังนั้น (2x+1)-2x+1 = 2" }
    ];

    const quizBox = document.getElementById('quiz-box');
    questions.forEach((q, i) => {
        let optionsHTML = q.opt.map((o, j) => `<label style="display:block; margin:5px 0;"><input type="radio" name="q${i}" value="${j}" onchange="checkAnswer(${i}, ${j})"> ${o}</label>`).join('');
        quizBox.innerHTML += `<div class="question"><p>${i+1}. ${q.q} <span class="clue">${q.clue}</span></p><div class="options">${optionsHTML}</div><div id="result${i}"></div><div id="exp${i}" class="detail"><strong>เฉลยละเอียด:</strong> ${q.exp}</div></div>`;
    });

    function checkAnswer(qIdx, selected) {
        const resultDiv = document.getElementById('result' + qIdx);
        document.getElementById('exp' + qIdx).style.display = 'block';
        resultDiv.innerHTML = (selected === questions[qIdx].corr) ? '<span class="correct">ยอดเยี่ยม!</span>' : '<span class="wrong">พยายามอีกนิด!</span>';
    }
</script>
<div class="footer">เขียนโดย พระจอมเกล้าติวเตอร์</div>
</body>
</html>
