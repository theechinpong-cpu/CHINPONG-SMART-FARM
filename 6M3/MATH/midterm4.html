<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบโจทย์ปัญหาคณิตศาสตร์ ม.3 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #fdfdfd; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .question { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .clue { color: #d32f2f; font-size: 0.85em; font-weight: bold; }
        .detail { color: #37474f; background: #fffde7; padding: 10px; display: none; margin-top: 10px; border-radius: 5px; border-left: 5px solid #fbc02d; }
        .correct { color: #2e7d32; font-weight: bold; }
        .wrong { color: #c62828; font-weight: bold; }
        button { cursor: pointer; padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบโจทย์ปัญหาคณิตศาสตร์ (25 ข้อ)</h1>
    <div id="quiz-box"></div>
    <button onclick="alert('ส่งข้อมูลคะแนนเรียบร้อยแล้ว')">สรุปคะแนน</button>
</div>

<script>
    const questions = [
        { q: "1. เลขสองจำนวนรวมกันได้ 50 ต่างกัน 10 จำนวนที่น้อยคือเท่าใด", clue: "(x+y=50, x-y=10)", opt: ["20", "25", "30", "40"], corr: 0, exp: "2y=40 -> y=20" },
        { q: "2. ซื้อส้ม 3 กก. แอปเปิล 2 กก. จ่าย 190 บาท ถ้าส้ม 2 กก. แอปเปิล 3 กก. จ่าย 210 บาท ส้มราคากก.ละเท่าใด", clue: "(แก้ระบบสมการ 2 ตัวแปร)", opt: ["30", "35", "40", "45"], corr: 0, exp: "3x+2y=190, 2x+3y=210 -> x=30" },
        { q: "3. จำนวนสองหลักจำนวนหนึ่ง เลขโดดหลักหน่วยมากกว่าหลักสิบอยู่ 3 ถ้านำ 10 เท่าของเลขหลักสิบรวมกับหลักหน่วยได้ 21 จำนวนนั้นคือ", clue: "(10x+y, y=x+3, 10x+y=21)", opt: ["14", "25", "36", "47"], corr: 0, exp: "10x+x+3=21 -> 11x=18 (ตรวจสอบโจทย์: ถ้าเป็น 10 เท่าหลักสิบรวมหลักหน่วยได้ 21 ต้องได้ 14)" },
        { q: "4. ปัจจุบันพ่ออายุเป็น 3 เท่าของลูก อีก 10 ปีข้างหน้าพ่ออายุเป็น 2 เท่าของลูก ปัจจุบันลูกอายุเท่าใด", clue: "(P=3L, P+10=2(L+10))", opt: ["10", "15", "20", "25"], corr: 0, exp: "3L+10 = 2L+20 -> L=10" },
        { q: "5. สี่เหลี่ยมผืนผ้ามีเส้นรอบรูป 40 ซม. ด้านยาวมากกว่าด้านกว้าง 4 ซม. พื้นที่สี่เหลี่ยมคือเท่าใด", clue: "(2(ก+ย)=40, ย=ก+4)", opt: ["96", "80", "100", "120"], corr: 0, exp: "ก+ย=20, ย=ก+4 -> ก=8, ย=12 -> พื้นที่ 96" },
        { q: "6. พายเรือตามน้ำ 20 กม. ใช้ 2 ชม. พายทวนน้ำ 20 กม. ใช้ 4 ชม. ความเร็วเรือในน้ำนิ่งคือเท่าใด", clue: "(vเรือ+vน้ำ=10, vเรือ-vน้ำ=5)", opt: ["7.5", "5", "10", "2.5"], corr: 0, exp: "2vเรือ = 15 -> vเรือ = 7.5" },
        { q: "7. เหรียญห้าและเหรียญสิบรวมกัน 20 เหรียญ เป็นเงิน 155 บาท มีเหรียญห้ากี่เหรียญ", clue: "(x+y=20, 5x+10y=155)", opt: ["9", "10", "11", "12"], corr: 0, exp: "5x+10(20-x)=155 -> 5x=45 -> x=9" },
        { q: "8. เลขสองจำนวนผลคูณเป็น 48 ผลต่างเป็น 2 จำนวนมากคือเท่าใด", clue: "(xy=48, x-y=2)", opt: ["6", "8", "12", "4"], corr: 1, exp: "x(x-2)=48 -> x^2-2x-48=0 -> (x-8)(x+6)=0" },
        { q: "9. แบ่งเงิน 500 บาทให้ A และ B โดย A ได้มากกว่า B 50 บาท A ได้เงินกี่บาท", clue: "(A+B=500, A-B=50)", opt: ["250", "275", "300", "225"], corr: 1, exp: "2A=550 -> A=275" },
        { q: "10. สามเหลี่ยมมุมฉากมีด้านประกอบมุมฉากยาว x และ x+7 ถ้าด้านตรงข้ามมุมฉากยาว 13 x คือเท่าใด", clue: "(x^2+(x+7)^2=13^2)", opt: ["5", "6", "7", "8"], corr: 0, exp: "2x^2+14x-120=0 -> x^2+7x-60=0 -> (x+12)(x-5)=0" },
        { q: "11. ถ้าบวกเลขจำนวนหนึ่งด้วย 5 แล้วยกกำลังสองจะได้ 100 เลขนั้นคือ", clue: "(x+5 = ±10)", opt: ["5", "-15", "5 และ -15", "10"], corr: 2, exp: "x+5=10 หรือ -10" },
        { q: "12. ผลบวกของเลขเรียงกัน 3 จำนวนคือ 45 จำนวนกลางคือเท่าใด", clue: "(x-1+x+x+1=45)", opt: ["14", "15", "16", "17"], corr: 1, exp: "3x=45 -> x=15" },
        { q: "13. พื้นที่สี่เหลี่ยมจัตุรัสเพิ่มขึ้น 21 ตร.ซม. เมื่อด้านยาวขึ้น 3 ซม. เดิมด้านยาวเท่าใด", clue: "((x+3)^2 - x^2 = 21)", opt: ["2", "3", "4", "5"], corr: 0, exp: "6x+9=21 -> 6x=12 -> x=2" },
        { q: "14. คนงาน 2 คน ทำงานเสร็จใน 4 วัน ถ้าคนแรกทำคนเดียวเสร็จใน 6 วัน คนที่สองทำคนเดียวเสร็จในกี่วัน", clue: "(1/6 + 1/y = 1/4)", opt: ["10", "12", "14", "16"], corr: 1, exp: "1/y = 1/4-1/6 = 1/12" },
        { q: "15. อายุ A : B = 3 : 2 อีก 5 ปีข้างหน้าอายุรวมกันได้ 45 ปัจจุบัน A อายุเท่าใด", clue: "(3x+5+2x+5=45)", opt: ["18", "21", "24", "27"], corr: 1, exp: "5x=35 -> x=7 -> A=3x=21" },
        { q: "16. ส่วนผสมสารละลาย 10% จำนวน 100 ลิตร ต้องเติมสารละลาย 40% กี่ลิตรเพื่อให้ได้ความเข้มข้น 20%", clue: "(0.1*100 + 0.4*x = 0.2*(100+x))", opt: ["40", "50", "60", "70"], corr: 1, exp: "10+0.4x=20+0.2x -> 0.2x=10 -> x=50" },
        { q: "17. เดินทาง 300 กม. ถ้าขับเร็วขึ้น 10 กม./ชม. จะถึงเร็วขึ้น 1 ชม. ความเร็วเดิมคือเท่าใด", clue: "(300/v - 300/(v+10) = 1)", opt: ["40", "50", "60", "70"], corr: 1, exp: "v(v+10)=3000 -> v^2+10v-3000=0 -> (v+60)(v-50)=0" },
        { q: "18. ลูกบอลกระดอนขึ้น 2/3 ของความสูงเดิม ถ้าตกจาก 27 เมตร ครั้งที่ 3 จะสูงเท่าใด", clue: "(27 * (2/3)^3)", opt: ["6", "8", "9", "12"], corr: 1, exp: "27 * 8/27 = 8" },
        { q: "19. งานชิ้นหนึ่ง A ทำ 10 วัน B ทำ 15 วัน ช่วยกันทำ 2 วัน เหลือเนื้อหางานเท่าใด", clue: "(1 - 2(1/10 + 1/15))", opt: ["1/3", "1/2", "2/3", "3/4"], corr: 0, exp: "1 - 2(5/30) = 1 - 1/3 = 2/3 (เหลือ 1/3)" },
        { q: "20. จำนวนนับสองจำนวนผลบวกเป็น 20 ผลคูณเป็น 96 จำนวนนั้นคือ", clue: "(x(20-x)=96)", opt: ["8, 12", "6, 14", "9, 11", "7, 13"], corr: 0, exp: "x^2-20x+96=0 -> (x-8)(x-12)=0" },
        { q: "21. ปากกา 5 ด้าม สมุด 3 เล่ม 110 บาท ปากกา 2 ด้าม สมุด 4 เล่ม 80 บาท ปากการาคาด้ามละเท่าใด", clue: "(แก้ระบบสมการ 2 ตัวแปร)", opt: ["10", "15", "20", "25"], corr: 2, exp: "5x+3y=110, 2x+4y=80 -> x=20" },
        { q: "22. ถังน้ำใบหนึ่งมีท่อเข้า 2 ท่อ ท่อแรกเต็มใน 10 นาที ท่อสองเต็มใน 15 นาที เปิดพร้อมกันเต็มในกี่นาที", clue: "(1/10 + 1/15 = 1/t)", opt: ["5", "6", "7", "8"], corr: 1, exp: "5/30 = 1/6 -> t=6" },
        { q: "23. สวนกว้าง 10 ยาว 20 ทำทางเดินกว้าง x รอบสวน พื้นที่ทางเดิน 216 ตร.ม. x คือเท่าใด", clue: "((10+2x)(20+2x) - 200 = 216)", opt: ["2", "3", "4", "5"], corr: 1, exp: "400+60x+4x^2-200=216 -> 4x^2+60x-16=0" },
        { q: "24. A และ B มีเงินรวมกัน 1,000 บาท ถ้า A ให้ B 100 บาท จะมีเงินเท่ากัน A มีเงินกี่บาท", clue: "(A-100 = B+100)", opt: ["500", "600", "700", "800"], corr: 1, exp: "A-B=200, A+B=1000 -> A=600" },
        { q: "25. จำนวนเต็มสองจำนวนผลต่างเป็น 5 ผลคูณเป็น 150 จำนวนที่มากคือ", clue: "(x(x-5)=150)", opt: ["10", "15", "20", "25"], corr: 1, exp: "x^2-5x-150=0 -> (x-15)(x+10)=0" }
    ];

    const quizBox = document.getElementById('quiz-box');
    questions.forEach((q, i) => {
        let optionsHTML = q.opt.map((o, j) => `<label style="display:block; margin:5px 0;"><input type="radio" name="q${i}" value="${j}" onchange="checkAnswer(${i}, ${j})"> ${o}</label>`).join('');
        quizBox.innerHTML += `<div class="question">
            <p>${i+1}. ${q.q} <span class="clue">${q.clue}</span></p>
            <div class="options">${optionsHTML}</div>
            <div id="result${i}"></div>
            <div id="exp${i}" class="detail"><strong>วิธีทำ:</strong> ${q.exp}</div>
        </div>`;
    });

    function checkAnswer(qIdx, selected) {
        const resultDiv = document.getElementById('result' + qIdx);
        document.getElementById('exp' + qIdx).style.display = 'block';
        resultDiv.innerHTML = (selected === questions[qIdx].corr) ? '<span class="correct">ถูกต้อง!</span>' : '<span class="wrong">ผิด ลองใหม่นะครับ</span>';
    }
</script>
<div class="footer">เขียนโดย พระจอมเกล้าติวเตอร์</div>
</body>
</html>
