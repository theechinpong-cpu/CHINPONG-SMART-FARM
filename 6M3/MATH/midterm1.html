<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบคณิตศาสตร์ ม.3 - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .question { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #ddd; }
        .options { margin: 10px 0; }
        .detail { color: #2c3e50; background: #ecf0f1; padding: 10px; display: none; margin-top: 10px; border-radius: 5px; }
        button { cursor: pointer; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; }
        .footer { text-align: center; margin-top: 30px; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบปรนัยคณิตศาสตร์ ม.3 (25 ข้อ)</h1>
    <div id="quiz-box"></div>
    <button onclick="submitQuiz()">ส่งคำตอบ</button>
</div>

<script>
    const questions = [
        // ระบบสมการ (1-10)
        { q: "1. คำตอบของระบบสมการ x+y=5 และ x-y=1 คือข้อใด", opt: ["(2,3)", "(3,2)", "(4,1)", "(1,4)"], corr: 1, exp: "บวกสมการได้ 2x=6, x=3, แทนค่าได้ y=2" },
        { q: "2. ถ้า 2x+y=7 และ x-y=2 ค่า x คือข้อใด", opt: ["2", "3", "4", "5"], corr: 1, exp: "บวกสมการได้ 3x=9, x=3" },
        { q: "3. ระบบสมการใดที่มีคำตอบเป็น (1, 1)", opt: ["x+y=1", "2x+y=3", "x-y=2", "2x-y=0"], corr: 1, exp: "2(1)+1 = 3" },
        { q: "4. จาก x+2y=4 และ x-y=1 ค่า y คือข้อใด", opt: ["1", "2", "3", "4"], corr: 0, exp: "ลบสมการได้ 3y=3, y=1" },
        { q: "5. ถ้า 3x+2y=12 และ x-y=1 ค่า x คือเท่าใด", opt: ["2", "2.8", "3", "3.2"], corr: 1, exp: "จาก x=y+1, แทนได้ 3(y+1)+2y=12, 5y=9, y=1.8, x=2.8" },
        { q: "6. ระบบสมการ 4x-y=6 และ x+y=4 ค่าของ x+y คือเท่าใด", opt: ["2", "4", "6", "8"], corr: 1, exp: "ไม่ต้องหา x,y แยกกัน ดูจากสมการที่สองได้เลย" },
        { q: "7. เลขสองจำนวนรวมกันได้ 10 ต่างกัน 2 จำนวนมากคือเท่าใด", opt: ["4", "5", "6", "7"], corr: 2, exp: "x+y=10, x-y=2 -> 2x=12, x=6" },
        { q: "8. ซื้อปากกา 2 ด้าม สมุด 1 เล่ม ราคา 25 บาท ถ้าปากกา 3 ด้าม สมุด 1 เล่ม ราคา 30 บาท ปากการาคาเท่าใด", opt: ["3", "4", "5", "6"], corr: 2, exp: "ลบสมการกันได้ ปากกา = 5" },
        { q: "9. ระบบสมการ 0.5x + 0.2y = 1.3 และ x - y = 0.5 ค่า x คือ", opt: ["1.5", "2", "2.5", "3"], corr: 0, exp: "คูณสมการแรกด้วย 10 ได้ 5x+2y=13, แทนค่า y=x-0.5" },
        { q: "10. ผลบวกของ x และ y ในสมการ 7x+3y=15 และ 3x+7y=5 คือเท่าใด", opt: ["1", "2", "3", "4"], corr: 1, exp: "บวกสมการจะได้ 10x+10y=20, x+y=2" },

        // แยกตัวประกอบ (11-25)
        { q: "11. x^2 - 25 แยกตัวประกอบได้ตามข้อใด", opt: ["(x-5)(x-5)", "(x+5)(x+5)", "(x-5)(x+5)", "x(x-25)"], corr: 2, exp: "ผลต่างกำลังสอง A^2-B^2" },
        { q: "12. x^2 + 7x + 10 แยกตัวประกอบได้เท่าใด", opt: ["(x+2)(x+5)", "(x+1)(x+10)", "(x-2)(x-5)", "(x+5)(x+2)"], corr: 0, exp: "หาเลขที่คูณกันได้ 10 บวกกันได้ 7" },
        { q: "13. 4x^2 - 9 แยกตัวประกอบได้เท่าใด", opt: ["(2x-3)^2", "(2x-3)(2x+3)", "(4x-3)(x+3)", "(2x+3)(2x+3)"], corr: 1, exp: "สูตรผลต่างกำลังสอง" },
        { q: "14. x^2 - 6x + 9 แยกตัวประกอบได้เท่าใด", opt: ["(x-3)(x-3)", "(x+3)(x+3)", "(x-9)(x+1)", "(x-3)(x+3)"], corr: 0, exp: "กำลังสองสมบูรณ์ (x-3)^2" },
        { q: "15. ดึงตัวร่วม 3x^2 + 6x ได้ตามข้อใด", opt: ["3(x^2+2x)", "x(3x+6)", "3x(x+2)", "3x^2(1+2x)"], corr: 2, exp: "นำ 3x เป็นตัวประกอบร่วม" },
        { q: "16. x^3 - 8 แยกตัวประกอบได้เท่าใด", opt: ["(x-2)(x^2+2x+4)", "(x-2)(x^2-2x+4)", "(x+2)(x^2-2x+4)", "(x-2)^3"], corr: 0, exp: "ผลต่างกำลังสาม" },
        { q: "17. x^3 + 1 แยกตัวประกอบได้เท่าใด", opt: ["(x+1)(x^2-x+1)", "(x+1)(x^2+x+1)", "(x-1)(x^2+x+1)", "(x+1)^3"], corr: 0, exp: "ผลบวกกำลังสาม" },
        { q: "18. x^2 - x - 12 แยกตัวประกอบได้เท่าใด", opt: ["(x-4)(x+3)", "(x+4)(x-3)", "(x-6)(x+2)", "(x-12)(x+1)"], corr: 0, exp: "คูณกันได้ -12 บวกกันได้ -1" },
        { q: "19. 2x^2 + 5x + 3 แยกตัวประกอบได้เท่าใด", opt: ["(2x+3)(x+1)", "(2x+1)(x+3)", "(2x+1)(x+1)", "(2x+3)(x+3)"], corr: 0, exp: "แยกแฟคเตอร์พหุนามดีกรีสอง" },
        { q: "20. x^2 - 100 แยกตัวประกอบได้เท่าใด", opt: ["(x-10)(x-10)", "(x+10)(x+10)", "(x-10)(x+10)", "(x-50)(x+2)"], corr: 2, exp: "ผลต่างกำลังสอง" },
        { q: "21. 9x^2 - 4y^2 แยกตัวประกอบได้เท่าใด", opt: ["(3x-2y)^2", "(3x-2y)(3x+2y)", "(9x-4y)(x+y)", "(3x+2y)^2"], corr: 1, exp: "(3x)^2 - (2y)^2" },
        { q: "22. x^2 + 8x + 16 แยกตัวประกอบได้เท่าใด", opt: ["(x+4)^2", "(x-4)^2", "(x+8)(x+2)", "(x+16)(x+1)"], corr: 0, exp: "กำลังสองสมบูรณ์" },
        { q: "23. 5x^2 - 20 ดึงตัวร่วมแล้วแยกต่อได้เท่าใด", opt: ["5(x-2)(x+2)", "5(x-4)(x+4)", "(5x-10)(x+2)", "5(x-2)^2"], corr: 0, exp: "ดึง 5 ออกก่อน จะเหลือ 5(x^2-4)" },
        { q: "24. x^3 - 27 แยกตัวประกอบได้เท่าใด", opt: ["(x-3)(x^2+3x+9)", "(x-3)(x^2-3x+9)", "(x+3)(x^2-3x+9)", "(x-3)^3"], corr: 0, exp: "สูตรผลต่างกำลังสาม" },
        { q: "25. แยกตัวประกอบ x^2+3x-10", opt: ["(x+5)(x-2)", "(x-5)(x+2)", "(x+10)(x-1)", "(x-10)(x+1)"], corr: 0, exp: "คูณกันได้ -10 บวกกันได้ 3" }
    ];

    const quizBox = document.getElementById('quiz-box');
    questions.forEach((q, i) => {
        let optionsHTML = q.opt.map((o, j) => `<input type="radio" name="q${i}" value="${j}"> ${o} <br>`).join('');
        quizBox.innerHTML += `<div class="question">
            <p>${q.q}</p>
            <div class="options">${optionsHTML}</div>
            <button onclick="document.getElementById('exp${i}').style.display='block'">ดูคำใบ้/เฉลย</button>
            <div id="exp${i}" class="detail">เฉลย: ${q.exp}</div>
        </div>`;
    });

    function submitQuiz() { alert('จำลองการส่งข้อมูลคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว'); }
</script>
<div class="footer">เขียนโดย พระจอมเกล้าติวเตอร์</div>
</body>
</html>
