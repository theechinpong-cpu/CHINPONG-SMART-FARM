<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบคณิตศาสตร์ ม.3 (ชุดที่ 2 - ระดับยาก) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .question { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .clue { color: #d32f2f; font-size: 0.85em; margin-left: 10px; font-weight: bold; }
        .detail { color: #37474f; background: #fff3e0; padding: 10px; display: none; margin-top: 10px; border-radius: 5px; border-left: 5px solid #ff9800; }
        .correct { color: #2e7d32; font-weight: bold; }
        .wrong { color: #c62828; font-weight: bold; }
        button { cursor: pointer; padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 5px; font-size: 16px; }
        .footer { text-align: center; margin-top: 40px; font-size: 0.9em; color: #7f8c8d; }
    </style>
</head>
<body>
<div class="container">
    <h1>แบบทดสอบคณิตศาสตร์ (ชุดที่ 2 - ระดับยาก)</h1>
    <div id="quiz-box"></div>
    <button onclick="alert('จำลองการส่งข้อมูลคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว')">สรุปคะแนนและส่งข้อมูล</button>
</div>

<script>
    const questions = [
        { q: "1. แก้ระบบสมการ: 3(x+y) = 2x+1 และ 2(x-y) = y+4", clue: "(จัดรูปสมการใหม่ทั้งคู่)", opt: ["x=2, y=-1", "x=-1, y=2", "x=1, y=-2", "x=2, y=1"], corr: 1, exp: "สมการ: x+3y=1 และ 2x-3y=4 -> บวกกันได้ 3x=5(โจทย์ประยุกต์)" },
        { q: "2. กำหนดให้ 1/x + 1/y = 5 และ 2/x - 1/y = 1 ค่าของ x คือ", clue: "(แทนตัวแปร a=1/x, b=1/y)", opt: ["1/3", "1/2", "2/3", "3/4"], corr: 1, exp: "บวกสมการ: 3/x = 6 -> x=1/2" },
        { q: "3. ผลคูณของรากสมการ (x+2)(x-3) = 6", clue: "(กระจายพหุนามและย้ายข้าง)", opt: ["-12", "12", "-6", "6"], corr: 0, exp: "x^2-x-6=6 -> x^2-x-12=0, ผลคูณราก = c/a = -12" },
        { q: "4. แยกตัวประกอบ: x^4 - 16", clue: "(ใช้ผลต่างกำลังสอง 2 รอบ)", opt: ["(x^2-4)^2", "(x-2)(x+2)(x^2+4)", "(x-2)^2(x+2)^2", "(x^2+4)(x^2-4)"], corr: 1, exp: "(x^2-4)(x^2+4) = (x-2)(x+2)(x^2+4)" },
        { q: "5. ถ้า x^2 + kx + 16 เป็นกำลังสองสมบูรณ์ k มีค่าเท่าใด", clue: "(หน้า^2+2หน้าหลัง+หลัง^2)", opt: ["4", "6", "8", "16"], corr: 2, exp: "2 * หน้า * หลัง = kx, 2*x*4 = 8x" },
        { q: "6. แยกตัวประกอบ: x^3 - x^2 - x + 1", clue: "(จัดกลุ่มดึงตัวร่วม)", opt: ["(x-1)^2(x+1)", "(x+1)^2(x-1)", "(x-1)^3", "(x+1)^3"], corr: 0, exp: "x^2(x-1)-1(x-1) = (x^2-1)(x-1) = (x+1)(x-1)^2" },
        { q: "7. ระบบสมการ 0.1x + 0.2y = 0.5 และ 0.3x - 0.1y = 0.4", clue: "(คูณ 10 ทั้งสมการ)", opt: ["x=1.3, y=1.9", "x=1.5, y=1.8", "x=1.3, y=1.85", "x=1.2, y=1.9"], corr: 0, exp: "x+2y=5, 3x-y=4 -> x=1.3, y=1.85" },
        { q: "8. แยกตัวประกอบ: x^2 - 5x + 6", clue: "(คูณได้ 6 บวกได้ -5)", opt: ["(x-2)(x-3)", "(x+2)(x-3)", "(x-2)(x+3)", "(x+2)(x+3)"], corr: 0, exp: "(-2)+(-3)=-5, (-2)*(-3)=6" },
        { q: "9. จงหาค่า x ที่ทำให้ 2x^2 + 7x + 3 = 0", clue: "(แยกตัวประกอบ)", opt: ["-1/2, -3", "-1/2, 3", "1/2, -3", "1/2, 3"], corr: 0, exp: "(2x+1)(x+3)=0" },
        { q: "10. แยกตัวประกอบ: 8x^3 + 27", clue: "(สูตรผลบวกกำลังสาม)", opt: ["(2x+3)(4x^2-6x+9)", "(2x+3)(4x^2+6x+9)", "(2x-3)(4x^2+6x+9)", "(2x+3)^3"], corr: 0, exp: "(2x)^3 + 3^3 = (2x+3)(4x^2-6x+9)" },
        { q: "11. x^2 - 2xy + y^2 - z^2 แยกตัวประกอบได้ตามข้อใด", clue: "(จัดกลุ่มกำลังสองสมบูรณ์)", opt: ["(x-y-z)(x-y+z)", "(x+y-z)(x+y+z)", "(x-y)^2 - z^2", "(x-y-z)^2"], corr: 0, exp: "(x-y)^2 - z^2 = (x-y-z)(x-y+z)" },
        { q: "12. ระบบสมการ x/2 + y/3 = 2 และ x/3 + y/2 = 1", clue: "(คูณครน. เพื่อกำจัดเศษส่วน)", opt: ["x=4.8, y=-1.2", "x=5, y=-1", "x=4.5, y=-1.5", "x=4.8, y=-1"], corr: 0, exp: "3x+2y=12, 2x+3y=6 -> 5x+5y=18" },
        { q: "13. แยกตัวประกอบ: (x+1)^2 - 9", clue: "(ใช้ผลต่างกำลังสอง)", opt: ["(x-2)(x+4)", "(x+2)(x-4)", "(x-8)(x+10)", "(x+4)(x+2)"], corr: 0, exp: "((x+1)-3)((x+1)+3) = (x-2)(x+4)" },
        { q: "14. ถ้า 9x^2 + kx + 4 เป็นกำลังสองสมบูรณ์ k คือ", clue: "(ระวัง: หน้าคือ 3x หลังคือ 2)", opt: ["6", "9", "12", "18"], corr: 2, exp: "2 * 3x * 2 = 12x" },
        { q: "15. แก้ระบบสมการ x+y=a, x-y=b แล้ว x^2 - y^2 คือ", clue: "(นำผลลัพธ์มาคูณกัน)", opt: ["a+b", "ab", "a/b", "(a+b)/2"], corr: 1, exp: "(x+y)(x-y) = a*b" },
        { q: "16. แยกตัวประกอบ: x^4 + x^2 + 1", clue: "(บวกเข้า-ลบออก 1)", opt: ["(x^2+x+1)(x^2-x+1)", "(x^2+1)^2", "(x^2+x+1)^2", "(x^2-x+1)^2"], corr: 0, exp: "เพิ่ม x^2 และลบ x^2 ได้ (x^2+1)^2 - x^2" },
        { q: "17. ระบบสมการ 2x+3y=8 และ 3x+2y=7 ค่าของ x-y คือ", clue: "(ลบสมการ)", opt: ["1", "-1", "2", "-2"], corr: 1, exp: "-x+y=-1 -> x-y=1" },
        { q: "18. แยกตัวประกอบ: 6x^2 - x - 2", clue: "(แยกแฟคเตอร์)", opt: ["(2x+1)(3x-2)", "(2x-1)(3x+2)", "(3x+1)(2x-2)", "(6x+1)(x-2)"], corr: 0, exp: "(2x+1)(3x-2)" },
        { q: "19. ถ้า x^2 - 1/x^2 = 0 แล้ว x คือ", clue: "(x^4-1=0)", opt: ["1", "-1", "1, -1", "0"], corr: 2, exp: "(x^2-1)(x^2+1)=0" },
        { q: "20. แยกตัวประกอบ: x^2 + 2x - 15", clue: "(คูณได้ -15 รวมได้ 2)", opt: ["(x+5)(x-3)", "(x-5)(x+3)", "(x+15)(x-1)", "(x+3)(x-5)"], corr: 0, exp: "(x+5)(x-3)" },
        { q: "21. ระบบสมการ 3/x + 2/y = 12 และ 2/x + 3/y = 13", clue: "(บวก/ลบสมการ)", opt: ["x=1/2, y=1/3", "x=1/3, y=1/2", "x=1, y=1", "x=2, y=3"], corr: 0, exp: "5/x+5/y=25, 1/x-1/y=-1" },
        { q: "22. แยกตัวประกอบ: 27x^3 - 1", clue: "(ผลต่างกำลังสาม)", opt: ["(3x-1)(9x^2+3x+1)", "(3x-1)(9x^2-3x+1)", "(3x+1)(9x^2-3x+1)", "(3x-1)^3"], corr: 0, exp: "(3x)^3 - 1^3 = (3x-1)(9x^2+3x+1)" },
        { q: "23. ถ้า (x+3)^2 = 16 แล้ว x คือ", clue: "(ถอดรากที่สอง)", opt: ["1, -7", "7, -1", "4, -4", "1, 7"], corr: 0, exp: "x+3 = 4 หรือ -4" },
        { q: "24. แยกตัวประกอบ: x^2 - 14x + 49", clue: "(กำลังสองสมบูรณ์)", opt: ["(x-7)^2", "(x+7)^2", "(x-7)(x+7)", "(x-14)^2"], corr: 0, exp: "(x-7)^2" },
        { q: "25. โจทย์ประยุกต์: สี่เหลี่ยมผืนผ้ามีพื้นที่ x^2+5x+6 ถ้าด้านหนึ่งยาว x+2 อีกด้านยาวเท่าใด", clue: "(พื้นฐาน กว้าง*ยาว = พื้นที่)", opt: ["x+3", "x-3", "x+1", "x-1"], corr: 0, exp: "(x+2)(x+3) = x^2+5x+6" }
    ];

    const quizBox = document.getElementById('quiz-box');
    questions.forEach((q, i) => {
        let optionsHTML = q.opt.map((o, j) => `<label style="display:block; margin:5px 0;"><input type="radio" name="q${i}" value="${j}" onchange="checkAnswer(${i}, ${j})"> ${o}</label>`).join('');
        quizBox.innerHTML += `<div class="question">
            <p>${i+1}. ${q.q} <span class="clue">${q.clue}</span></p>
            <div class="options">${optionsHTML}</div>
            <div id="result${i}"></div>
            <div id="exp${i}" class="detail"><strong>วิธีทำ:</strong> ${q.exp}</div>
        </div>`;
    });

    function checkAnswer(qIdx, selected) {
        const correct = questions[qIdx].corr;
        const resultDiv = document.getElementById('result' + qIdx);
        const expDiv = document.getElementById('exp' + qIdx);
        resultDiv.innerHTML = (selected === correct) ? 
            '<span class="correct">ถูกต้อง!</span>' : '<span class="wrong">ผิด ลองใหม่นะครับ</span>';
        expDiv.style.display = 'block';
    }
</script>
<div class="footer">เขียนโดย พระจอมเกล้าติวเตอร์</div>
</body>
</html>
