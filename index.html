<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINPONG SMART FARM | AI News Magazine</title>
    
    <meta name="description" content="อัปเดตข่าวไอทีและการเกษตรอัจฉริยะ โดย CHINPONG SMART FARM">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --primary: #3b82f6; --dark: #020617; }
        body { font-family: 'Kanit', sans-serif; background: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .inter { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-magazine { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); border: 1px solid rgba(59, 130, 246, 0.1); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .card-magazine:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.3); }
        .text-gradient { background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="glass sticky top-0 z-50 px-8 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-black inter tracking-tighter text-gradient uppercase">CHINPONG SMART FARM</span>
            </div>
            <div class="flex items-center gap-6">
                <span class="hidden md:block text-[9px] font-bold text-slate-500 border border-slate-800 px-2 py-0.5 rounded uppercase inter italic">AI-Driven Content</span>
                <a href="admin.html" class="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 text-slate-500 hover:text-blue-400 transition-all flex items-center justify-center">
                    <i class="fas fa-user-shield"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        
        <div class="text-center mb-16 animate-fade-in">
            <h1 class="text-5xl font-black mb-4 inter tracking-tighter uppercase italic text-white">Latest Intelligence</h1>
            <p class="text-slate-500 text-xs tracking-[0.3em] uppercase">คัดสรรข่าวสารและนวัตกรรมเพื่อคุณโดย CHINPONG SMART FARM</p>
        </div>

        <div id="magazine-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-circle-notch fa-spin text-blue-500 text-3xl mb-4"></i>
                <p class="text-slate-500 animate-pulse">Scanning Cloud Storage for Latest Articles...</p>
            </div>
        </div>

    </main>

    <footer class="max-w-7xl mx-auto px-6 py-12 border-t border-slate-900/50 text-center">
        <p class="text-[9px] text-slate-600 font-bold uppercase tracking-[0.3em]">© 2026 CHINPONG SMART FARM | All Content Generated by AI</p>
    </footer>

    <script>
        // ตั้งค่าชื่อ User และ Repo ของคุณ
        const GITHUB_USER = 'theechinpong-cpu'; 
        const REPO_NAME = 'king-mongkut-tutor';

        async function loadMagazine() {
            const feed = document.getElementById('magazine-feed');
            // ดึงรายชื่อไฟล์จากโฟลเดอร์ blog/ ผ่าน GitHub API
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/blog`;
            
            try {
                const response = await fetch(apiUrl);
                const files = await response.json();
                
                // กรองเฉพาะไฟล์ .md และเรียงลำดับใหม่ล่าสุดขึ้นก่อน
                const articles = files.filter(f => f.name.endsWith('.md')).reverse();

                if (articles.length === 0) {
                    feed.innerHTML = `<div class="col-span-full text-center text-slate-600 italic">ยังไม่มีบทความในขณะนี้</div>`;
                    return;
                }

                feed.innerHTML = articles.map(article => {
                    // ทำความสะอาดชื่อไฟล์เพื่อมาทำเป็น Title (ตัดวันที่และ .md ออก)
                    let displayTitle = article.name.replace('.md', '').replace(/_/g, ' ');
                    
                    return `
                   <div class="card-magazine rounded-[2.5rem] p-8 relative overflow-hidden flex flex-col justify-between h-full" onclick="window.location.href='reader.html?file=${article.name}'">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[9px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded font-black uppercase tracking-widest inter">Article</span>
                                <i class="fas fa-external-link-alt text-[10px] text-slate-700"></i>
                            </div>
                            <h2 class="text-xl font-bold text-white mb-4 leading-tight">${displayTitle}</h2>
                        </div>
                        <div class="mt-6 flex items-center justify-between">
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">Read Summary & Shop →</span>
                            <i class="fas fa-chevron-right text-[10px] text-slate-800"></i>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (e) {
                console.error(e);
                feed.innerHTML = `<div class="col-span-full text-center text-rose-500">ไม่สามารถดึงข้อมูลได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง</div>`;
            }
        }

        // เริ่มรันระบบ
        window.onload = loadMagazine;
    </script>
</body>
</html>
