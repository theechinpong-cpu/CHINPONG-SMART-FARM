<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING MONGKUT TUTOR | ระบบจัดการการเรียนอัจฉริยะ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
    <script src="menu.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        .dynamic-card { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-2xl italic text-slate-800">KING MONGKUT TUTOR</h1>
            <div id="stats" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                VIEWS: <span id="view-count">0</span> | CLICKS: <span id="click-count">0</span>
            </div>
        </div>
    </nav>

    <div id="ad-top" class="container mx-auto px-4 mt-6"></div>

    <main class="container mx-auto px-4 py-12 flex flex-col lg:flex-row gap-8">
        <aside id="ad-sidebar" class="w-full lg:w-1/4 space-y-4"></aside>

        <div id="menu-container" class="w-full lg:w-3/4 grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </main>

    <script>
        // 1. Render Menu Engine
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = lessonMenu.map(cat => `
                <div class="dynamic-card bg-white rounded-[2.5rem] p-8 shadow-sm border-t-[10px] border-${cat.color}-500 ring-4 ring-${cat.color}-50">
                    <h3 class="text-2xl font-bold text-${cat.color}-600 mb-6 flex items-center">
                        <i class="${cat.icon} mr-3"></i> ${cat.category}
                    </h3>
                    <div class="space-y-4">
                        ${cat.items.map(item => `
                            <details class="group border border-slate-100 rounded-2xl bg-slate-50 overflow-hidden">
                                <summary class="flex justify-between items-center p-4 cursor-pointer hover:bg-white transition-colors">
                                    <span class="font-bold text-slate-700">${item.icon} ${item.subject}</span>
                                    <i class="fas fa-chevron-right group-open:rotate-90 transition-transform"></i>
                                </summary>
                                <div class="p-4 bg-white space-y-2">
                                    ${item.links.map(link => `
                                        <a href="${link.url}" class="block p-3 border rounded-xl hover:bg-slate-50 text-sm 
                                            ${link.type === 'bold' ? 'font-black text-indigo-600' : ''} 
                                            ${link.type === 'italic' ? 'italic text-slate-500' : ''}">
                                            ${link.title}
                                        </a>
                                    `).join('')}
                                </div>
                            </details>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 2. Render Ads (From library.js)
        function renderAds() {
            if (typeof shopeeLibrary !== 'undefined') {
                const s = [...shopeeLibrary].sort(() => 0.5 - Math.random());
                // Top Ad
                document.getElementById('ad-top').innerHTML = `
                    <div class="bg-slate-900 rounded-[2rem] p-8 border border-slate-700 shadow-2xl flex flex-col md:flex-row items-center gap-6">
                        <div class="flex-1">
                            <span class="bg-rose-500 text-white text-[10px] px-3 py-1 rounded-full font-black">${s[0].cat}</span>
                            <h3 class="text-white text-xl font-bold mt-2 italic text-rose-400">${s[0].name}</h3>
                            <p class="text-slate-400 text-sm mt-1">${s[0].highlight}</p>
                        </div>
                        <a href="${s[0].link}" onclick="trackClick()" target="_blank" class="bg-white text-black px-10 py-4 rounded-2xl font-black hover:bg-rose-500 hover:text-white transition-all">สั่งซื้อ</a>
                    </div>
                `;
                // Sidebar Ad
                document.getElementById('ad-sidebar').innerHTML = `
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <span class="text-[9px] font-bold text-blue-500 uppercase italic">${s[1].cat}</span>
                        <h4 class="text-sm font-bold mt-2">${s[1].name}</h4>
                        <a href="${s[1].link}" onclick="trackClick()" target="_blank" class="text-xs text-rose-500 font-bold mt-4 block">ดูรายละเอียด →</a>
                    </div>
                `;
            }
        }

        // Stats
        let v = localStorage.getItem('v') || 0;
        let c = localStorage.getItem('c') || 0;
        localStorage.setItem('v', ++v);
        document.getElementById('view-count').innerText = v;
        document.getElementById('click-count').innerText = c;
        function trackClick() { localStorage.setItem('c', ++c); document.getElementById('click-count').innerText = c; }

        window.onload = () => { renderMenu(); renderAds(); };
    </script>
</body>
</html>
