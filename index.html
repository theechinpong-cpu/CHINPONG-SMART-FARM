<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Video Content Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="library.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .item-card:hover { border-color: #38bdf8; transform: translateY(-2px); transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-sky-400 italic tracking-tighter">AFFILIATE FACTORY</h1>
                <p class="text-slate-400 text-sm">Automated Content Engine [Ver 2026.2]</p>
            </div>
            <div class="text-right">
                <span id="itemCount" class="bg-sky-500/20 text-sky-400 px-4 py-1 rounded-full text-xs font-bold border border-sky-500/30">
                    -- Items Loaded
                </span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
            
            <div class="md:col-span-1 space-y-4">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Product List</h2>
                <div id="productList" class="space-y-2 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                    </div>
            </div>

            <div class="md:col-span-3 space-y-6">
                <div id="welcomeScreen" class="glass p-20 rounded-[40px] text-center">
                    <div class="text-5xl mb-4">🚀</div>
                    <h3 class="text-xl font-bold">พร้อมสร้างคอนเทนต์หรือยัง?</h3>
                    <p class="text-slate-400 text-sm mt-2">เลือกสินค้าจากรายการด้านซ้ายเพื่อเจน Prompt สำหรับ Grok ได้เลย</p>
                </div>

                <div id="editorScreen" class="hidden space-y-6">
                    <div class="glass p-6 rounded-[32px] border-l-4 border-sky-500">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-black text-sky-400 tracking-widest uppercase italic">Master Prompt for Grok</span>
                            <button onclick="copyContent('promptOutput')" class="text-[10px] bg-sky-500 hover:bg-sky-400 text-white px-3 py-1 rounded-lg font-bold transition-all">COPY PROMPT</button>
                        </div>
                        <div id="promptOutput" class="bg-black/40 p-5 rounded-2xl text-sm font-mono leading-relaxed text-slate-300 whitespace-pre-wrap"></div>
                    </div>

                    <div class="glass p-6 rounded-[32px] border-l-4 border-emerald-500">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-black text-emerald-400 tracking-widest uppercase italic">TikTok/Reels Caption</span>
                            <button onclick="copyContent('captionOutput')" class="text-[10px] bg-emerald-500 hover:bg-emerald-400 text-white px-3 py-1 rounded-lg font-bold transition-all">COPY CAPTION</button>
                        </div>
                        <div id="captionOutput" class="bg-black/40 p-5 rounded-2xl text-sm leading-relaxed text-slate-300 italic"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันโหลดรายการสินค้าจาก library.js
        function loadProducts() {
            const list = document.getElementById('productList');
            document.getElementById('itemCount').innerText = `${shopeeLibrary.length} Items In Library`;
            
            shopeeLibrary.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "item-card glass p-4 rounded-2xl cursor-pointer text-xs transition-all";
                card.innerHTML = `
                    <div class="text-sky-400 font-bold mb-1">[${item.cat}]</div>
                    <div class="text-slate-200 line-clamp-2">${item.name}</div>
                `;
                card.onclick = () => generatePrompt(index);
                list.appendChild(card);
            });
        }

        // ฟังก์ชันสร้าง Prompt ตามกฎ และ
        function generatePrompt(idx) {
            const it = shopeeLibrary[idx];
            const welcome = document.getElementById('welcomeScreen');
            const editor = document.getElementById('editorScreen');
            
            welcome.classList.add('hidden');
            editor.classList.remove('hidden');

            // สร้าง Master Prompt
            const masterPrompt = `[SYSTEM: 9:16 Vertical, 4k ultra realistic]
TASK: Create a cinematic product showcase for TikTok/Reels.
PRODUCT: ${it.name}
CATEGORY: ${it.cat}
VISUAL_DESC: High-end 3D rendering of "${it.name}" book. Soft lighting, educational and inspiring atmosphere.
AUDIO_CONFIG: SSML Speed 2.9x, Break 1ms.
KEY_MESSAGE: ${it.highlight}`;

            // สุ่ม Caption จากคลัง affCaps
            let cap = affCaps[Math.floor(Math.random() * affCaps.length)];
            cap = cap.replace("[NAME]", it.name)
                     .replace("[CAT]", it.cat)
                     .replace("[HIGHLIGHT]", it.highlight);

            document.getElementById('promptOutput').innerText = masterPrompt;
            document.getElementById('captionOutput').innerText = cap + "\n\nพิกัดสินค้า 👇\n" + it.link;
            
            // Scroll ไปด้านบน
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function copyContent(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("คัดลอกลง Clipboard แล้ว!");
        }

        // เริ่มทำงานเมื่อโหลดหน้าเสร็จ
        window.onload = loadProducts;
    </script>
</body>
</html>
