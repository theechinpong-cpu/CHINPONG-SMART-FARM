<section id="result-section" class="hidden mt-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="bg-slate-800 rounded-3xl p-6 border border-emerald-500/30 shadow-xl">
            <h3 class="font-bold text-emerald-400 mb-4 flex items-center gap-2">
                <i class="fas fa-pen-nib"></i> ช่อง 1: Social Caption
            </h3>
            <div id="out-caption" class="p-4 bg-slate-900 rounded-2xl border border-slate-700 text-sm text-slate-300 min-h-[150px]"></div>
            <p class="text-[10px] text-emerald-500/60 mt-2 italic">* ความยาวไม่เกิน 150 ตัวอักษร และไม่ผิดกฎแพลตฟอร์ม [cite: 2026-02-01]</p>
            <button onclick="copyToClipboard('out-caption')" class="w-full mt-4 py-2 bg-emerald-600 rounded-xl text-xs font-bold hover:bg-emerald-500 transition-all">คัดลอกแคปชั่น</button>
        </div>

        <div class="bg-slate-800 rounded-3xl p-6 border border-blue-500/30 shadow-xl text-center">
            <h3 class="font-bold text-blue-400 mb-4 flex items-center justify-center gap-2">
                <i class="fas fa-image"></i> ช่อง 2: Product Image
            </h3>
            <div id="out-image-box" class="aspect-[9/16] bg-slate-900 rounded-2xl border border-dashed border-slate-700 flex flex-col items-center justify-center p-4">
                <i class="fas fa-camera text-4xl text-slate-700 mb-2"></i>
                <p class="text-[10px] text-slate-500">จำลองรูปสินค้าแบบ 9:16 [cite: 2026-02-02]</p>
                </div>
            <p id="img-desc" class="text-[11px] text-slate-400 mt-4 italic"></p>
        </div>

        <div class="bg-slate-800 rounded-3xl p-6 border border-rose-500/30 shadow-xl">
            <h3 class="font-bold text-rose-400 mb-4 flex items-center gap-2">
                <i class="fas fa-robot"></i> ช่อง 3: Master Prompt (Grok)
            </h3>
            <div class="space-y-4">
                <div class="p-4 bg-slate-900 rounded-2xl border border-slate-700">
                    <label class="text-[10px] uppercase font-black text-rose-500/70">Master Prompt (Copy this)</label>
                    <div id="out-grok-prompt" class="text-xs text-yellow-100 mt-2 leading-relaxed"></div>
                </div>
            </div>
            <button onclick="copyToClipboard('out-grok-prompt')" class="w-full mt-4 py-2 bg-rose-600 rounded-xl text-xs font-bold hover:bg-rose-500 transition-all">คัดลอก Master Prompt</button>
        </div>

    </div>
</section>

<script>
    function generateScript(index) {
        const item = shopeeLibrary[index];
        const resultSection = document.getElementById('result-section');
        
        // --- ช่อง 1: Caption (Limit 150 chars + No platform names) ---
        let rawCaption = `🎯 ${item.name}\n${item.highlight.substring(0, 50)}...\nสั่งซื้อ: ${item.link}\n#ติวเตอร์ #เตรียมสอบ`; [cite: 2026-02-01]
        document.getElementById('out-caption').innerText = rawCaption;

        // --- ช่อง 2: Image Logic ---
        document.getElementById('img-desc').innerText = `Style: 4k ultra realistic, vertical, high contrast, product focus on ${item.cat}`; [cite: 2026-02-02]

        // --- ช่อง 3: Master Prompt for Grok (6 Sec) ---
        // ใส่ SSML speed 2.9x และ break 1ms ตามสั่ง [cite: 2026-02-02]
        const grokPrompt = `Create a 6-second vertical 9:16 video. [cite: 2026-02-02] 
        VISUAL: 4k ultra realistic product shot of "${item.name}". [cite: 2026-02-02]
        TEXT OVER (English): "TOP EXAM PREP - GET IT NOW!" 
        VOICE OVER (Thai): "อยากสอบติดต้องมีเล่มนี้ ${item.name} สรุปเข้มพร้อมสอบ คลิกเลย!" 
        AUDIO SETTINGS: SSML Speed 2.9x, Break 1ms. [cite: 2026-02-02]`;

        document.getElementById('out-grok-prompt').innerText = grokPrompt;
        
        resultSection.classList.remove('hidden');
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }

    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('คัดลอกข้อมูลแล้ว! นำไปวางในแอปได้เลย');
        });
    }
</script>
