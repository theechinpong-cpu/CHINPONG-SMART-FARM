<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ข้อสอบคณิตศาสตร์ ป.6 (สสวท.) พร้อมเฉลย - ระบบปรนัย</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', 'Prompt', 'Noto Sans Thai', system-ui, sans-serif;
            background: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        /* 2 Columns Layout */
        .exam-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LEFT: 70% - ข้อสอบ */
        .exam-panel {
            flex: 7;
            background: #f8fafc;
            overflow-y: auto;
            padding: 20px 25px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
            border-right: 1px solid #cbd5e1;
        }

        /* RIGHT: 30% - Whiteboard */
        .whiteboard-panel {
            flex: 3;
            background: #fef9e6;
            display: flex;
            flex-direction: column;
            border-left: 4px solid #ffb74d;
            box-shadow: -2px 0 10px rgba(0,0,0,0.08);
        }

        .whiteboard-header {
            background: #ffb74d;
            padding: 14px 16px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid #e67e22;
        }

        .whiteboard-header span {
            background: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b45f06;
        }

        .whiteboard-tools {
            display: flex;
            gap: 8px;
        }

        .whiteboard-tools button {
            background: white;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            transition: 0.2s;
        }

        .whiteboard-tools button:hover {
            background: #ffe0b3;
            transform: scale(0.96);
        }

        .whiteboard-canvas {
            flex: 1;
            background: #fffdf7;
            background-image: radial-gradient(circle, #ddd 1px, transparent 1px);
            background-size: 24px 24px;
            cursor: crosshair;
            position: relative;
            overflow: auto;
            min-height: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: white;
            box-shadow: inset 0 0 0 1px #e9e0c0;
        }

        .status-bar {
            background: #f1e5c0;
            padding: 6px 12px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            color: #7b5a2e;
        }

        /* ข้อสอบ styles */
        .exam-header {
            background: linear-gradient(135deg, #0b3b5f, #1b4f6e);
            color: white;
            padding: 18px 22px;
            border-radius: 28px;
            margin-bottom: 20px;
        }

        .question-card {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid #dce3ec;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .q-num {
            background: #1f6392;
            color: white;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 500;
            margin: 10px 0 12px;
            line-height: 1.4;
        }

        .fig-ref {
            background: #eef2ff;
            padding: 6px 12px;
            border-radius: 18px;
            font-size: 0.75rem;
            margin: 8px 0;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 12px 0 8px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 5px 14px;
            border-radius: 40px;
        }

        input[type="radio"] {
            transform: scale(0.9);
            accent-color: #2c7da0;
        }

        .submit-area {
            margin: 15px 0;
            text-align: center;
        }

        .btn-submit {
            background: #2c7da0;
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .result-area {
            margin-top: 20px;
            background: #e6f4ea;
            padding: 15px;
            border-radius: 28px;
            display: none;
        }

        hr {
            margin: 15px 0;
        }

        .pdf-link {
            color: #1f6392;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="exam-layout">
    <!-- ด้านซ้าย : ข้อสอบปรนัย -->
    <div class="exam-panel" id="examPanel">
        <div class="exam-header">
            <h2>📐 แบบทดสอบคณิตศาสตร์ ป.6</h2>
            <p>โครงการพัฒนาอัจฉริยภาพ (สสวท.) ปี 2564 | เวลา 2 ชั่วโมง</p>
            <p>🔹 ข้อสอบปรนัย 25 ข้อ (เลือกข้อที่ถูกต้อง) 🔹</p>
            <div style="margin-top: 10px;">
                <label>👤 ชื่อผู้สอบ: <input type="text" id="studentName" placeholder="กรอกชื่อ-นามสกุล" style="padding: 6px 12px; border-radius: 40px; border: none;"></label>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="submit-area">
            <button class="btn-submit" id="finalSubmit">📨 ส่งข้อสอบ & ตรวจคะแนน</button>
        </div>
        <div id="resultBox" class="result-area"></div>
    </div>

    <!-- ด้านขวา : Whiteboard (กระดานทด) -->
    <div class="whiteboard-panel">
        <div class="whiteboard-header">
            ✏️  WHITEBOARD - กระดานทด
            <div class="whiteboard-tools">
                <button id="clearCanvasBtn">🗑️ ล้าง</button>
                <button id="downloadBoardBtn">📸 บันทึกภาพ</button>
            </div>
        </div>
        <div class="whiteboard-canvas" id="whiteboardContainer">
            <canvas id="drawingCanvas"></canvas>
        </div>
        <div class="status-bar">
            <span>🖱️ กดเมาส์ค้างแล้วลากเพื่อวาด</span>
            <span>📌 ใช้ทดเลข/วาดรูป</span>
        </div>
    </div>
</div>

<script>
    // ----------------------------- ข้อมูลข้อสอบ 25 ข้อ (ปรนัย) อ้างอิงจาก PDF ---------------------------------
    const questions = [
        { text: "รถรับส่งพนักงานจะรับคนงานครบทั้ง 4 จุด ไปยังโรงงาน โดยไม่ผ่านจุดเดิม ใช้เวลาที่น้อยที่สุดกี่นาที (ดูรูปแผนภาพหน้า 2)", options: ["12 นาที", "14 นาที", "15 นาที", "16 นาที"], correct: 1, fig: "หน้า 2" },
        { text: "A เป็นจำนวนนับสามหลัก หารด้วย 10 เหลือเศษ 5 และหารด้วย 9 เหลือเศษ 2 ค่า A ที่น้อยที่สุดคือ?", options: ["125", "135", "145", "155"], correct: 3, fig: "หน้า 3" },
        { text: "ซื้อสลากออมสิน 100,000 หมายเลขติดกัน จะถูกรางวัลเลขท้ายเดือนละอย่างน้อยที่สุดกี่บาท?", options: ["100 บาท", "200 บาท", "300 บาท", "400 บาท"], correct: 1, fig: "หน้า 4" },
        { text: "วัคซีน A = 1/5 ของทั้งหมด, วัคซีน B แบ่งเช้าบ่ายเท่ากัน รอบบ่าย 40% อายุมากกว่า60 ปี ถ้ารอบบ่ายอายุไม่เกิน60 ปี = 120 คน รวมทั้งหมดกี่คน", options: ["400", "450", "500", "550"], correct: 2, fig: "หน้า 5" },
        { text: "โคมไฟ 50 สี เรียงแบบเพิ่มสีทีละ1 ต้องใช้โคมไฟอย่างน้อยกี่อัน", options: ["1270", "1275", "1300", "1325"], correct: 1, fig: "หน้า 6" },
        { text: "แบบรูป A,171,B,C,...,K ผลบวก13จำนวน=2021, ผลบวกสามตัวติดกันเท่ากัน จงหา F", options: ["70", "72", "74", "76"], correct: 2, fig: "หน้า 7" },
        { text: "ลูกอมส้ม3, วานิลลา6, สตรอว์เบอร์รี8, ช็อกโกแลต12 เม็ด ซื้อ12ถุง รวม121เม็ด ครบทุกกลิ่น ถุงสตรอว์เบอร์รีกี่ถุง", options: ["2", "3", "4", "5"], correct: 2, fig: "หน้า 8" },
        { text: "เชือก A,B,C อัตราดูดซึมน้ำ ถ้าใช้ A+B 7วัน, B+C 8วัน, A+C 10วัน ใช้ A+B+C พร้อมกัน น้ำหมดเร็วสุดกี่วัน (เต็มวัน)", options: ["5", "6", "7", "8"], correct: 1, fig: "หน้า 9" },
        { text: "ค.ร.น.ของ A,B = 28, ค.ร.น.ของ B,C = 126 ค่า A+B+C น้อยสุดเท่าใด", options: ["36", "42", "56", "63"], correct: 0, fig: "หน้า 11" },
        { text: "ซื้อมะม่วงสวนA ขายกำไร5% สวนB ถูกลง20% ขายลด10บาท กำไร25% ของทุนใหม่ ราคาซื้อจากสวนB?", options: ["90", "96", "100", "108"], correct: 1, fig: "หน้า 12" },
        { text: "บัตร4ใบ ปลาได้คู่เดียว ผลบวกคู่ละคู่ = {100,108,113,122,127,135} A-B เท่าใด", options: ["30", "33", "35", "38"], correct: 2, fig: "หน้า 13" },
        { text: "A,B พาลินโดรม3หลัก หาร11ลงตัว A+B พาลินโดรม3หลัก Aคู่ จงหา A-B มากสุด", options: ["682", "704", "792", "858"], correct: 2, fig: "หน้า 14" },
        { text: "วงกลมA(80),B(30),C(50),D(30),E(40) วางบนเส้นตรง หาเส้นผ่านศูนย์กลางF", options: ["90", "100", "110", "120"], correct: 1, fig: "หน้า 15" },
        { text: "สามเหลี่ยมด้านเท่า40cm ตัดเป็น Dudeney dissection พื้นที่สามเหลี่ยมB+C อย่างละ1ชิ้นรวมกัน (ตร.ซม.)", options: ["180", "200", "220", "240"], correct: 1, fig: "หน้า 17" },
        { text: "สี่เหลี่ยมจัตุรัส A,B,C,D พื้นที่C=4, C=4%ของD, A:B:C =4:16:1 จงหาเส้นรอบรูปสิบหกเหลี่ยม (หน่วย)", options: ["60", "64", "68", "72"], correct: 1, fig: "หน้า 19" },
        { text: "สี่เหลี่ยมด้านขนาน ABCD, PA=AB=BQ, AD=2AB, มุมPCD=25° จงหามุมDQP", options: ["55°", "60°", "65°", "70°"], correct: 2, fig: "หน้า 20" },
        { text: "กล่อง48×56×36 ติดสติกเกอร์ขนาดใหญ่สุด (กว้าง×ยาว นับ) ทั้งหมดกี่แผ่น", options: ["30", "36", "42", "48"], correct: 1, fig: "หน้า 21" },
        { text: "พื้นที่สามเหลี่ยม ABF=250, BFG=100, CDF=175, DEF=125 จงหา AEF - CFG", options: ["40", "45", "50", "55"], correct: 2, fig: "หน้า 22" },
        { text: "รูป A จุดยอด3 จุด ด้านโค้งยาว 128π/3 หน่วย ระยะห่างน้อยสุดระหว่างจุดยอด?", options: ["60", "62", "64", "68"], correct: 2, fig: "หน้า 23" },
        { text: "มุม BAD ในรูปสี่เหลี่ยม (หน้า24) มีขนาดกี่องศา", options: ["100°", "105°", "110°", "115°"], correct: 2, fig: "หน้า 24" },
        { text: "เกมนับ6 มี22คน เริ่มต้นคนที่9 ผู้ชนะหมายเลขใด", options: ["5", "7", "9", "11"], correct: 1, fig: "หน้า 25" },
        { text: "เกรด A=16คน, A/B/C=30คน, B/C/D/F=20คน, D=2คน รวมทั้งหมดกี่คน", options: ["32", "34", "36", "38"], correct: 1, fig: "หน้า 26" },
        { text: "ชาย = 2/3 ของหญิง? (โจทย์ระบุชาย=2เท่าหญิง) แต่แผนภูมิหญิง สุ่มชาย 35% ของ120 จงหาสัดส่วนชายที่สุ่มคิดเป็น %ของชายทั้งหมด", options: ["18%", "21%", "24%", "28%"], correct: 1, fig: "หน้า 27" },
        { text: "ผู้ประชุม6คน 2บริษัท บริษัทละ3คน อายุรวมมากที่สุดที่เข้าเงื่อนไข (เสื้อหรือกางเกงสีเดียวกัน)", options: ["115", "118", "121", "124"], correct: 2, fig: "หน้า 28" },
        { text: "แผนภูมิวงกลม 300คน ยูทูบเบอร์มากกว่าวิศวกร45คน วิศวกร = ครู จงหาจำนวนครู", options: ["55", "60", "65", "70"], correct: 1, fig: "หน้า 29" }
    ];

    let userAnswers = new Array(25).fill(null);
    let examSubmitted = false;

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        let html = '';
        questions.forEach((q, idx) => {
            html += `
                <div class="question-card" data-qidx="${idx}">
                    <div class="q-num">ข้อ ${idx+1}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="fig-ref">📖 รูปประกอบ: <a href="#" class="pdf-link" data-page="${q.fig}">${q.fig} ใน PDF ต้นฉบับ</a></div>
                    <div class="options">
                        ${q.options.map((opt, optIdx) => `
                            <label class="option">
                                <input type="radio" name="q${idx}" value="${optIdx}" ${userAnswers[idx] === optIdx ? 'checked' : ''} ${examSubmitted ? 'disabled' : ''}>
                                ${String.fromCharCode(65+optIdx)}. ${opt}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // attach radio events
        for(let i=0; i<questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(!examSubmitted) userAnswers[i] = parseInt(e.target.value);
                });
            });
        }
        // pdf link alert
        document.querySelectorAll('.pdf-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                alert(`📄 กรุณาเปิดไฟล์ PDF ต้นฉบับ (Math6-2564.pdf) ดูรูปประกอบหน้าที่ ${link.dataset.page}`);
            });
        });
    }

    function calculateScore() {
        let score = 0;
        for(let i=0; i<questions.length; i++) {
            if(userAnswers[i] === questions[i].correct) score++;
        }
        return score;
    }

    function showResult() {
        const score = calculateScore();
        const total = questions.length;
        let details = '<h3>📊 ผลสอบ</h3>';
        details += `<p>✅ คะแนนที่ได้: ${score} / ${total} (${Math.round(score/total*100)}%)</p><hr>`;
        for(let i=0; i<questions.length; i++) {
            const isCorrect = (userAnswers[i] === questions[i].correct);
            const userChoice = userAnswers[i] !== null ? String.fromCharCode(65+userAnswers[i]) : 'ไม่ได้เลือก';
            const correctChoice = String.fromCharCode(65+questions[i].correct);
            details += `<div style="margin-bottom: 8px;"><strong>ข้อ ${i+1}:</strong> ${isCorrect ? '✅' : '❌'} คุณตอบ ${userChoice} (เฉลย ${correctChoice})<br>
            <span style="font-size:0.8rem;">📘 ${questions[i].options[questions[i].correct]}</span></div>`;
        }
        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = details;
        resultBox.style.display = 'block';

        // แสดงข้อมูลสำหรับคัดลอก
        const name = document.getElementById('studentName').value || 'ไม่ระบุชื่อ';
        const copyData = `ชื่อผู้สอบ: ${name}\nคะแนน: ${score}/${total} (${Math.round(score/total*100)}%)\n\nรายละเอียด:\n${details.replace(/<[^>]*>/g, '')}`;
        if(!document.getElementById('copyBtn')) {
            const btnCopy = document.createElement('button');
            btnCopy.id = 'copyBtn';
            btnCopy.innerText = '📋 คัดลอกผลสอบ (เพื่อส่งอีเมล)';
            btnCopy.style.marginTop = '12px';
            btnCopy.style.padding = '8px 16px';
            btnCopy.style.borderRadius = '30px';
            btnCopy.style.border = 'none';
            btnCopy.style.backgroundColor = '#ffb74d';
            btnCopy.style.cursor = 'pointer';
            btnCopy.onclick = () => {
                navigator.clipboard.writeText(copyData).then(() => {
                    alert('✅ คัดลอกผลสอบเรียบร้อย! กรุณาไปวางในอีเมลส่งไปที่ thee.chinpong@gmail.com');
                }).catch(() => alert('❌ ไม่สามารถคัดลอกได้'));
            };
            resultBox.appendChild(btnCopy);
        }
    }

    // สุดท้าย: ส่งข้อสอบ
    document.getElementById('finalSubmit').addEventListener('click', () => {
        if(examSubmitted) {
            alert('คุณส่งข้อสอบไปแล้ว');
            return;
        }
        let allAnswered = true;
        for(let i=0; i<questions.length; i++) {
            if(userAnswers[i] === null) {
                allAnswered = false;
                break;
            }
        }
        if(!allAnswered && !confirm('คุณยังไม่ได้ตอบบางข้อ ต้องการส่งหรือไม่?')) return;
        examSubmitted = true;
        // disable radio ทั้งหมด
        for(let i=0; i<questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(r => r.disabled = true);
        }
        showResult();
    });

    // -------------------- Whiteboard Canvas --------------------
    const canvas = document.getElementById('drawingCanvas');
    let ctx = canvas.getContext('2d');
    let painting = false;

    function resizeCanvas() {
        const container = document.getElementById('whiteboardContainer');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        ctx.fillStyle = '#fffdf7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
    }

    function startDraw(e) {
        painting = true;
        const pos = getCanvasCoordinates(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function draw(e) {
        if (!painting) return;
        const pos = getCanvasCoordinates(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function stopDraw() { painting = false; ctx.beginPath(); }

    function getCanvasCoordinates(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);

    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDraw);

    document.getElementById('clearCanvasBtn').addEventListener('click', () => {
        ctx.fillStyle = '#fffdf7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    });
    document.getElementById('downloadBoardBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'whiteboard.png';
        link.href = canvas.toDataURL();
        link.click();
    });
    window.addEventListener('resize', () => { resizeCanvas(); });
    resizeCanvas();

    renderQuestions();
</script>
</body>
