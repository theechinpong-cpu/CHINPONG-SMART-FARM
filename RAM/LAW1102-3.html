let userAnswers = new Array(examData.length).fill(null);
let score = 0;
const quizBody = document.getElementById('quiz-content');

function loadExam() {
    examData.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.style = "margin-bottom: 30px; padding: 25px; border-left: 10px solid #1a237e; background: #fff; border-radius: 0 15px 15px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05);";
        qDiv.innerHTML = `
            <h3 style="margin-top: 0; color: #1a237e;">ข้อที่ ${index + 1}: ${item.q}</h3>
            <div id="opts-${index}" style="margin-top: 20px;">
                ${item.options.map((opt, i) => `
                    <button onclick="handleAnswer(${index}, ${i})" id="btn-${index}-${i}" style="display: block; width: 100%; text-align: left; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s;">${opt}</button>
                `).join('')}
            </div>
            <div id="exp-${index}" style="display:none; margin-top: 15px; padding: 15px; border-radius: 10px; line-height: 1.6;"></div>
        `;
        quizBody.appendChild(qDiv);
    });
}

window.handleAnswer = function(qIdx, sIdx) {
    if(userAnswers[qIdx] !== null) return;
    
    userAnswers[qIdx] = sIdx;
    const correct = examData[qIdx].correct;
    const expDiv = document.getElementById(`exp-${qIdx}`);
    const buttons = document.getElementById(`opts-${qIdx}`).getElementsByTagName('button');

    for(let b of buttons) { b.disabled = true; }

    if(sIdx === correct) {
        score++;
        buttons[sIdx].style.background = "#e8f5e9";
        buttons[sIdx].style.borderColor = "#2e7d32";
        expDiv.style.background = "#e8f5e9";
        expDiv.innerHTML = `<b style="color:#2e7d32;">✅ วิเคราะห์ถูกต้อง</b><br><small>${examData[qIdx].exp}</small>`;
    } else {
        buttons[sIdx].style.background = "#ffebee";
        buttons[sIdx].style.borderColor = "#d32f2f";
        buttons[correct].style.border = "2px dashed #2e7d32";
        buttons[correct].style.background = "#f1f8e9";
        expDiv.style.background = "#ffebee";
        expDiv.innerHTML = `<b style="color:#d32f2f;">❌ วิเคราะห์คลาดเคลื่อน</b><br>คำตอบที่ถูกคือ: <b>${examData[qIdx].options[correct]}</b><br><small>${examData[qIdx].exp}</small>`;
    }
    expDiv.style.display = "block";

    if(userAnswers.filter(a => a !== null).length === examData.length) {
        showFinalReport();
    }
}

function showFinalReport() {
    const report = document.getElementById('result-summary');
    const scoreText = document.getElementById('total-score');
    const analysis = document.getElementById('analysis-details');
    
    report.style.display = "block";
    scoreText.innerText = `${score} / 50 คะแนน`;

    let catScore = {};
    examData.forEach((item, i) => {
        if(!catScore[item.cat]) catScore[item.cat] = { got: 0, total: 0 };
        catScore[item.cat].total++;
        if(userAnswers[i] === item.correct) catScore[item.cat].got++;
    });

    let html = "<h3>📉 เจาะลึกรายหัวข้อ:</h3><div style='display: grid; grid-template-columns: 1fr 1fr; gap: 20px;'>";
    for(let c in catScore) {
        let p = (catScore[c].got / catScore[c].total) * 100;
        html += `<div style='padding: 15px; border: 1px solid #ddd; border-radius: 10px; text-align: center;'>
            <b style='color: #1a237e;'>${c}</b><br>
            <span style='font-size: 20px; color: ${p < 60 ? '#d32f2f' : '#2e7d32'};'>${p.toFixed(0)}%</span><br>
            <small>(${catScore[c].got}/${catScore[c].total} ข้อ)</small>
        </div>`;
    }
    html += "</div>";
    
    if(score < 30) {
        html += "<p style='color: #d32f2f; font-weight: bold; margin-top: 20px; text-align: center;'>⚠️ ข้อแนะนำ: คุณควรเน้นทบทวนเรื่อง 'นิติกรรมและสัญญา' ให้มากขึ้น เพราะเป็นฐานของกฎหมายแพ่งทั้งหมดครับ</p>";
    } else {
        html += "<p style='color: #2e7d32; font-weight: bold; margin-top: 20px; text-align: center;'>🌟 ข้อแนะนำ: ความรู้ของคุณพร้อมสำหรับการสอบแล้ว ขอให้รักษาสติและอ่านโจทย์ให้รอบคอบในวันจริงครับ!</p>";
    }

    analysis.innerHTML = html;
    window.scrollTo({ top: report.offsetTop, behavior: 'smooth' });
}

loadExam();
</script>
