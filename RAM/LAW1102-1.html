let userAnswers = new Array(quizData.length).fill(null);
const content = document.getElementById('quiz-content');

function loadQuiz() {
    quizData.forEach((item, index) => {
        const qBlock = document.createElement('div');
        qBlock.className = 'q-block';
        qBlock.style = "margin-bottom: 30px; padding: 20px; border-left: 10px solid #1a237e; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.3s;";
        
        qBlock.innerHTML = `
            <h3 style="margin-top: 0; color: #333;">ข้อที่ ${index + 1}: ${item.q}</h3>
            <div id="options-${index}" style="margin-top: 15px;">
                ${item.options.map((opt, i) => `
                    <div onclick="selectOption(${index}, ${i})" id="opt-${index}-${i}" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin: 8px 0; cursor: pointer; background: #fff;">
                        ${opt}
                    </div>
                `).join('')}
            </div>
            <div id="feedback-${index}" style="display:none; margin-top: 15px; padding: 15px; border-radius: 8px;"></div>
        `;
        content.appendChild(qBlock);
    });
}

window.selectOption = function(qIdx, sIdx) {
    if(userAnswers[qIdx] !== null) return; // ล็อกไม่ให้เปลี่ยนคำตอบ

    userAnswers[qIdx] = sIdx;
    const feedback = document.getElementById(`feedback-${qIdx}`);
    const correct = quizData[qIdx].correct;
    const isCorrect = sIdx === correct;

    // เปลี่ยนสีปุ่มที่เลือก
    const selectedBtn = document.getElementById(`opt-${qIdx}-${sIdx}`);
    const correctBtn = document.getElementById(`opt-${qIdx}-${correct}`);

    if(isCorrect) {
        selectedBtn.style.background = "#c8e6c9";
        selectedBtn.style.borderColor = "#2e7d32";
        feedback.style.background = "#e8f5e9";
        feedback.innerHTML = `<b style="color:#2e7d32;">✅ ถูกต้อง:</b> ${quizData[qIdx].exp}`;
    } else {
        selectedBtn.style.background = "#ffcdd2";
        selectedBtn.style.borderColor = "#d32f2f";
        correctBtn.style.border = "2px solid #2e7d32";
        feedback.style.background = "#ffebee";
        feedback.innerHTML = `<b style="color:#d32f2f;">❌ ผิด:</b> คำตอบที่ถูกคือ <b>${quizData[qIdx].options[correct]}</b><br><small>${quizData[qIdx].exp}</small>`;
    }
    feedback.style.display = "block";

    // ตรวจสอบว่าทำครบหรือยัง
    if(userAnswers.filter(a => a !== null).length === quizData.length) {
        calculateFinal();
    }
};

function calculateFinal() {
    let score = 0;
    let catScore = { "บุคคล": 0, "นิติกรรม": 0, "ทรัพย์": 0, "หนี้": 0 };
    let catTotal = { "บุคคล": 0, "นิติกรรม": 0, "ทรัพย์": 0, "หนี้": 0 };

    quizData.forEach((item, i) => {
        catTotal[item.cat]++;
        if(userAnswers[i] === item.correct) {
            score++;
            catScore[item.cat]++;
        }
    });

    document.getElementById('result-panel').style.display = "block";
    document.getElementById('score-display').innerText = `${score} / 50 คะแนน`;

    let analysis = "<h3>📈 รายละเอียดรายหัวข้อ:</h3>";
    for(let cat in catScore) {
        let pct = (catScore[cat] / catTotal[cat]) * 100;
        analysis += `<p><b>หมวด${cat}:</b> ได้ ${catScore[cat]}/${catTotal[cat]} (${pct.toFixed(0)}%) - ${pct < 60 ? '<span style="color:red;">ควรเน้นอ่านเพิ่ม</span>' : '<span style="color:green;">ทำได้ดีมาก</span>'}</p>`;
    }
    document.getElementById('category-analysis').innerHTML = analysis;
    window.scrollTo({ top: document.getElementById('result-panel').offsetTop, behavior: 'smooth' });
}

loadQuiz();
</script>
