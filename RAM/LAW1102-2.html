let userAnswersV2 = new Array(quizDataV2.length).fill(null);
const contentV2 = document.getElementById('quiz-content-v2');

function loadQuizV2() {
    quizDataV2.forEach((item, index) => {
        const qBlock = document.createElement('div');
        qBlock.style = "margin-bottom: 35px; padding: 25px; border-left: 12px solid #0d47a1; background: #f9f9f9; border-radius: 0 10px 10px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.05);";
        
        qBlock.innerHTML = `
            <h3 style="margin-top: 0; color: #1a237e;">ข้อที่ ${index + 1}: ${item.q}</h3>
            <div id="options-v2-${index}" style="margin-top: 20px;">
                ${item.options.map((opt, i) => `
                    <div onclick="selectOptionV2(${index}, ${i})" id="opt-v2-${index}-${i}" style="padding: 15px; border: 1.5px solid #ccc; border-radius: 8px; margin: 10px 0; cursor: pointer; background: #fff; transition: all 0.2s ease;">
                        ${opt}
                    </div>
                `).join('')}
            </div>
            <div id="feedback-v2-${index}" style="display:none; margin-top: 20px; padding: 18px; border-radius: 8px; font-size: 0.95em; line-height: 1.5;"></div>
        `;
        contentV2.appendChild(qBlock);
    });
}

window.selectOptionV2 = function(qIdx, sIdx) {
    if(userAnswersV2[qIdx] !== null) return;

    userAnswersV2[qIdx] = sIdx;
    const feedback = document.getElementById(`feedback-v2-${qIdx}`);
    const correct = quizDataV2[qIdx].correct;
    const isCorrect = sIdx === correct;

    const selectedBtn = document.getElementById(`opt-v2-${qIdx}-${sIdx}`);
    const correctBtn = document.getElementById(`opt-v2-${qIdx}-${correct}`);

    if(isCorrect) {
        selectedBtn.style.background = "#e8f5e9";
        selectedBtn.style.borderColor = "#2e7d32";
        selectedBtn.style.fontWeight = "bold";
        feedback.style.background = "#e8f5e9";
        feedback.style.borderLeft = "5px solid #2e7d32";
        feedback.innerHTML = `<b style="color:#2e7d32; font-size: 1.1em;">✅ วิเคราะห์ถูกต้อง:</b> <br>${quizDataV2[qIdx].exp}`;
    } else {
        selectedBtn.style.background = "#ffebee";
        selectedBtn.style.borderColor = "#d32f2f";
        correctBtn.style.border = "2px dashed #2e7d32";
        correctBtn.style.background = "#f1f8e9";
        feedback.style.background = "#ffebee";
        feedback.style.borderLeft = "5px solid #d32f2f";
        feedback.innerHTML = `<b style="color:#d32f2f; font-size: 1.1em;">❌ วิเคราะห์คลาดเคลื่อน:</b> <br>คำตอบที่ถูกต้องคือ: <b>${quizDataV2[qIdx].options[correct]}</b><br><hr style="border:0; border-top:1px solid #ffcdd2;">${quizDataV2[qIdx].exp}`;
    }
    feedback.style.display = "block";

    if(userAnswersV2.filter(a => a !== null).length === quizDataV2.length) {
        calculateFinalV2();
    }
};

function calculateFinalV2() {
    let score = 0;
    let catScore = { "บุคคล": 0, "นิติกรรม": 0, "ทรัพย์": 0, "หนี้": 0 };
    let catTotal = { "บุคคล": 0, "นิติกรรม": 0, "ทรัพย์": 0, "หนี้": 0 };

    quizDataV2.forEach((item, i) => {
        catTotal[item.cat]++;
        if(userAnswersV2[i] === item.correct) {
            score++;
            catScore[item.cat]++;
        }
    });

    const panel = document.getElementById('result-panel-v2');
    panel.style.display = "block";
    document.getElementById('score-display-v2').innerText = `${score} / 50 คะแนน`;

    let analysis = "<h3 style='margin-top:0; color:#0d47a1;'>🔍 วิเคราะห์แยกหมวดหมู่:</h3><div style='display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;'>";
    for(let cat in catScore) {
        let pct = (catScore[cat] / catTotal[cat]) * 100;
        let color = pct >= 80 ? '#2e7d32' : pct >= 50 ? '#f57c00' : '#d32f2f';
        analysis += `
            <div style='padding:15px; border: 1px solid #ddd; border-radius: 8px; text-align:center;'>
                <b style='font-size:1.1em;'>หมวด${cat}</b><br>
                <span style='font-size:1.5em; color:${color};'>${pct.toFixed(0)}%</span><br>
                <small>(${catScore[cat]}/${catTotal[cat]})</small>
            </div>`;
    }
    analysis += "</div>";
    
    if(score >= 40) {
        analysis += "<p style='margin-top:20px; color:#2e7d32; font-weight:bold; text-align:center;'>🌟 ยอดเยี่ยมมาก! คุณมีความเข้าใจในระดับลึกซึ้ง พร้อมสำหรับการสอบเกียรตินิยมแล้ว</p>";
    } else if (score >= 25) {
        analysis += "<p style='margin-top:20px; color:#f57c00; font-weight:bold; text-align:center;'>📖 ผลคะแนนอยู่ในเกณฑ์ดี แต่ควรเก็บรายละเอียดในหมวดที่คะแนนต่ำกว่า 60% อีกนิดครับ</p>";
    } else {
        analysis += "<p style='margin-top:20px; color:#d32f2f; font-weight:bold; text-align:center;'>✍️ ควรให้เวลากับการอ่านคำอธิบายเฉลยในแต่ละข้อให้เข้าใจ และทบทวนมาตราหลักๆ อีกครั้งครับ</p>";
    }

    document.getElementById('category-analysis-v2').innerHTML = analysis;
    panel.scrollIntoView({ behavior: 'smooth' });
}

loadQuizV2();
</script>
