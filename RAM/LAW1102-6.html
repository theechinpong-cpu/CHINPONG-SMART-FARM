let fullAnswers = new Array(fullExamData.length).fill(null);
const examBody = document.getElementById('exam-body-full');

function renderExam() {
    fullExamData.forEach((item, index) => {
        const div = document.createElement('div');
        div.style = "margin-bottom: 25px; padding: 25px; border-left: 8px solid #1a237e; background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);";
        div.innerHTML = `
            <h3 style="margin-top: 0; color: #1a237e; font-size: 19px;">ข้อที่ ${index + 1}: ${item.q}</h3>
            <div id="full-opts-${index}" style="margin-top: 15px;">
                ${item.options.map((opt, i) => `
                    <button onclick="handleSelect(${index}, ${i})" id="full-btn-${index}-${i}" style="display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 16px;">${opt}</button>
                `).join('')}
            </div>
            <div id="full-exp-${index}" style="display:none; margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 14px; border: 1px dashed #1a237e; line-height: 1.5;"></div>
        `;
        examBody.appendChild(div);
    });
}

window.handleSelect = function(qIdx, sIdx) {
    if(fullAnswers[qIdx] !== null) return;
    fullAnswers[qIdx] = sIdx;
    
    const correct = fullExamData[qIdx].correct;
    const expBox = document.getElementById(`full-exp-${qIdx}`);
    const btns = document.getElementById(`full-opts-${qIdx}`).getElementsByTagName('button');

    for(let b of btns) b.disabled = true;

    if(sIdx === correct) {
        btns[sIdx].style.background = "#e8f5e9";
        btns[sIdx].style.borderColor = "#2e7d32";
        btns[sIdx].style.fontWeight = "bold";
        expBox.style.background = "#f1f8e9";
        expBox.innerHTML = `<b style="color:#2e7d32;">✅ ถูกต้อง:</b> ${fullExamData[qIdx].exp}`;
    } else {
        btns[sIdx].style.background = "#ffebee";
        btns[sIdx].style.borderColor = "#d32f2f";
        btns[correct].style.border = "2px solid #2e7d32";
        btns[correct].style.background = "#f1f8e9";
        expBox.style.background = "#fff5f5";
        expBox.innerHTML = `<b style="color:#d32f2f;">❌ ผิด:</b> คำตอบคือ <b>${fullExamData[qIdx].options[correct]}</b><br><hr>${fullExamData[qIdx].exp}`;
    }
    expBox.style.display = "block";

    if(fullAnswers.filter(a => a !== null).length === fullExamData.length) {
        showFinalResult();
    }
}

function showFinalResult() {
    const report = document.getElementById('result-panel-full');
    const scoreText = document.getElementById('score-text-full');
    const analysisBox = document.getElementById('analysis-full');
    
    let score = fullAnswers.filter((a, i) => a === fullExamData[i].correct).length;
    report.style.display = "block";
    scoreText.innerText = `${score} / 50 คะแนน`;

    let html = "<h3>🔎 บทวิเคราะห์หลังสอบ:</h3>";
    if(score >= 45) {
        html += "<p style='color:#2e7d32;'><b>ระดับหัวกะทิ:</b> พี่ธีมีความแม่นยำในตัวบทกฎหมายแพ่งสูงมาก พร้อมสอบและมีโอกาสได้เกรด A สูงครับ</p>";
    } else if(score >= 35) {
        html += "<p style='color:#1a237e;'><b>ระดับมาตรฐาน:</b> ผ่านเกณฑ์สบายๆ ครับ แต่อาจจะมีบางจุดที่สับสนเรื่องระยะเวลาหรือข้อยกเว้นเล็กน้อย ทบทวนอีกนิดจะดีมากครับ</p>";
    } else {
        html += "<p style='color:#d32f2f;'><b>ระดับควรพัฒนา:</b> แนะนำให้พี่ธีเน้นทบทวนหมวด 'นิติกรรม' และ 'การแสดงเจตนา' (มาตรา 149-193) เพิ่มเติม เพราะเป็นจุดที่หลอกง่ายที่สุดครับ</p>";
    }

    analysisBox.innerHTML = html;
    window.scrollTo({ top: report.offsetTop, behavior: 'smooth' });
}

renderExam();
</script>
