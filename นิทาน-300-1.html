<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English for Grade 5 - My Happy Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', 'Sarabun', sans-serif;
            background-color: #fff4e6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h1 { text-align: center; color: #d35400; }
        .instruction { text-align: center; color: #7f8c8d; margin-bottom: 20px; }
        .sentence-box {
            background: white;
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            border-left: 5px solid #ff9f43;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .sentence-box:hover { background: #fff9f0; transform: scale(1.02); }
        .speaker { margin-right: 12px; font-size: 1.2rem; }
        .vocab { font-weight: bold; color: #2980b9; border-bottom: 1px dashed #2980b9; }
        .thai-sub { display: block; font-size: 0.85rem; color: #95a5a6; margin-top: 4px; }
    </style>
</head>
<body>

    <h1>🏠 My Happy Home</h1>
    <p class="instruction">🎧 Click to listen! (คลิกที่ประโยคเพื่อฟังเสียงอ่าน)</p>

    <div id="story">
        </div>

    <script>
        const lessons = [
            { en: "I put on my <span class='vocab'>Shirt</span>.", th: "ฉันใส่เสื้อเชิ้ต" },
            { en: "I wear my blue <span class='vocab'>Pants</span>.", th: "ฉันสวมกางเกงขายาวสีฟ้า" },
            { en: "My sister wears a pink <span class='vocab'>Dress</span>.", th: "น้องสาวของฉันใส่ชุดกระโปรงสีชมพู" },
            { en: "She has a yellow <span class='vocab'>Skirt</span> too.", th: "เธอมีกระโปรงสีเหลืองด้วย" },
            { en: "I put on a <span class='vocab'>Sock</span> on each foot.", th: "ฉันใส่ถุงเท้าในแต่ละข้าง" },
            { en: "I wear my black <span class='vocab'>Shoe</span>.", th: "ฉันสวมรองเท้าสีดำ" },
            { en: "I wear a <span class='vocab'>Hat</span> and a <span class='vocab'>Coat</span> today.", th: "วันนี้ฉันใส่หมวกและเสื้อคลุม" },
            { en: "I pull my <span class='vocab'>Belt</span> tight.", th: "ฉันดึงเข็มขัดให้แน่น" },
            { en: "I have a small <span class='vocab'>Ring</span> on my finger.", th: "ฉันมีแหวนวงเล็กที่นิ้ว" },
            { en: "I open the <span class='vocab'>Door</span>.", th: "ฉันเปิดประตู" },
            { en: "I look out the <span class='vocab'>Window</span>.", th: "ฉันมองออกไปนอกหน้าต่าง" },
            { en: "I walk on the clean <span class='vocab'>Floor</span>.", th: "ฉันเดินบนพื้นบ้านที่สะอาด" },
            { en: "The <span class='vocab'>Wall</span> is white.", th: "ผนังบ้านเป็นสีขาว" },
            { en: "The <span class='vocab'>Roof</span> is red.", th: "หลังคาบ้านเป็นสีแดง" },
            { en: "I turn on the <span class='vocab'>Lamp</span>.", th: "ฉันเปิดโคมไฟ" },
            { en: "I look at the <span class='vocab'>Mirror</span>.", th: "ฉันส่องกระจก" },
            { en: "I wash my hands with <span class='vocab'>Soap</span>.", th: "ฉันล้างมือด้วยสบู่" },
            { en: "I dry my hands with a <span class='vocab'>Towel</span>.", th: "ฉันเช็ดมือด้วยผ้าเช็ดตัว" },
            { en: "I use a <span class='vocab'>Spoon</span> and a <span class='vocab'>Fork</span>.", th: "ฉันใช้ช้อนและส้อม" },
            { en: "Be careful with the <span class='vocab'>Knife</span>.", th: "ระวังมีดด้วยนะ" },
            { en: "Food is on the <span class='vocab'>Plate</span>.", th: "อาหารอยู่ในจาน" },
            { en: "Soup is in the <span class='vocab'>Bowl</span>.", th: "ซุปอยู่ในชาม" },
            { en: "I drink water from the <span class='vocab'>Glass</span>.", th: "ฉันดื่มน้ำจากแก้ว" }
        ];

        const container = document.getElementById('story');

        lessons.forEach(item => {
            const div = document.createElement('div');
            div.className = 'sentence-box';
            div.innerHTML = `<span class="speaker">🔊</span> <div>${item.en} <span class="thai-sub">${item.th}</span></div>`;
            
            div.onclick = () => {
                window.speechSynthesis.cancel();
                const cleanText = item.en.replace(/<\/?[^>]+(>|$)/g, "");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = 0.8; // อ่านช้าลงเพื่อให้นักเรียนฟังทัน
                window.speechSynthesis.speak(utterance);
            };
            
            container.appendChild(div);
        });
    </script>

</body>
</html>
