<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical House Fairy Tale - Interactive Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', 'Sarabun', sans-serif;
            background-color: #f0f9ff;
            color: #333;
            line-height: 1.8;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .instruction {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 30px;
        }
        .sentence {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }
        .sentence:hover {
            background: #e1f5fe;
            transform: translateX(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .sentence:active {
            transform: scale(0.98);
        }
        .speaker-icon {
            margin-right: 15px;
            font-size: 1.2rem;
        }
        .highlight {
            font-weight: bold;
            color: #e67e22;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>🎬 The Magical House Adventure</h1>
    <p class="instruction">💡 Click on any sentence to hear it read aloud! (คลิกที่ประโยคเพื่อฟังเสียงอ่าน)</p>

    <div id="story-container">
        </div>

    <script>
        const story = [
            "Once upon a time, in a magical house called The Rainbow Cottage, lived a little boy named Bobby.",
            "Today was a special day!",
            "Bobby jumped out of bed and opened his wardrobe.",
            "He put on his favorite blue <span class='highlight'>Shirt</span> and a pair of cool brown <span class='highlight'>Pants</span>.",
            "His sister, Lily, was spinning around in her sparkly pink <span class='highlight'>Dress</span>, while their little cousin wore a fluffy yellow <span class='highlight'>Skirt</span>.",
            "Don't forget your <span class='highlight'>Sock</span>! Mom called out.",
            "Bobby pulled on his soft socks and stepped into his shiny black <span class='highlight'>Shoe</span>.",
            "Since it was sunny, he grabbed his lucky <span class='highlight'>Hat</span>, but he kept his <span class='highlight'>Coat</span> nearby just in case it got chilly.",
            "He buckled his silver <span class='highlight'>Belt</span> and even put on a golden toy <span class='highlight'>Ring</span> to look like a prince.",
            "Bobby ran to the <span class='highlight'>Door</span>, peaking through the glass <span class='highlight'>Window</span> to see the birds.",
            "He hopped across the wooden <span class='highlight'>Floor</span>, past the colorful <span class='highlight'>Wall</span> decorated with his drawings.",
            "Under the sturdy red <span class='highlight'>Roof</span>, the house felt warm and safe.",
            "In the hallway, a bright <span class='highlight'>Lamp</span> sat next to a big <span class='highlight'>Mirror</span>.",
            "Bobby looked at himself and gave a big smile!",
            "But oh no, his hands were sticky from breakfast.",
            "He ran to the sink, scrubbed with bubbly <span class='highlight'>Soap</span>, and dried his hands with a fluffy <span class='highlight'>Towel</span>.",
            "It was lunchtime!",
            "Bobby saw a silver <span class='highlight'>Spoon</span> and a <span class='highlight'>Fork</span> waiting on the table.",
            "Be careful with the <span class='highlight'>Knife</span>, Dad said while cutting the bread.",
            "Bobby placed a big piece of cake on his <span class='highlight'>Plate</span>, sipped some yummy soup from a blue <span class='highlight'>Bowl</span>, and finished with a cold <span class='highlight'>Glass</span> of milk.",
            "Bobby was ready for his big adventure, knowing that every object in his home had a name and a story to tell!"
        ];

        const container = document.getElementById('story-container');

        story.forEach(text => {
            const div = document.createElement('div');
            div.className = 'sentence';
            div.innerHTML = `<span class="speaker-icon">🔊</span> <span>${text}</span>`;
            
            // Function to speak
            div.onclick = () => {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                // Remove HTML tags for clean speech
                const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; // Slightly slower for kids
                window.speechSynthesis.speak(utterance);
            };
            
            container.appendChild(div);
        });
    </script>

</body>
</html>
