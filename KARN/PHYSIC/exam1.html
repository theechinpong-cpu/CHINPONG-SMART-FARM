<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
    .question-container { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .correct { color: green; font-weight: bold; }
    .wrong { color: red; font-weight: bold; }
    .explanation { margin-top: 10px; font-size: 0.9em; display: none; }
</style>
</head>
<body>
    <h2>แบบทดสอบ: การเคลื่อนที่และแรง (10 ข้อ)</h2>
    <div id="quiz"></div>

    <script>
        const questions = [
            { q: "การวัดที่ดีต้องประกอบด้วยสิ่งใดบ้าง?", a: ["ตัวเลขอย่างเดียว", "หน่วยอย่างเดียว", "ตัวเลขและหน่วย", "การประมาณค่า"], correct: 2, tip: "วัดแล้วต้องรู้ว่าได้เท่าไหร่และมีหน่วยอะไรเสมอ!" },
            { q: "ปริมาณใดเป็นปริมาณเวกเตอร์?", a: ["ระยะทาง", "การกระจัด", "อัตราเร็ว", "เวลา"], correct: 1, tip: "เวกเตอร์ต้องบอกทิศทาง การกระจัดบอกจุดเริ่มไปจบ!" },
            { q: "เดินไปทางทิศตะวันออก 4 เมตร แล้วเดินกลับมาทางทิศตะวันตก 3 เมตร การกระจัดเป็นเท่าใด?", a: ["7 เมตร", "4 เมตร", "3 เมตร", "1 เมตร"], correct: 3, tip: "การกระจัดวัดจากจุดเริ่มถึงจบ: 4 - 3 = 1 เมตร (ทิศตะวันออก)" },
            { q: "อัตราเร็วมีความแตกต่างจากความเร็วอย่างไร?", a: ["ใช้หน่วยต่างกัน", "เป็นปริมาณสเกลาร์และเวกเตอร์ตามลำดับ", "คำนวณเหมือนกันทุกประการ", "ความเร็วไม่มีทิศทาง"], correct: 1, tip: "อัตราเร็ว=ระยะทาง/เวลา(สเกลาร์), ความเร็ว=การกระจัด/เวลา(เวกเตอร์)" },
            { q: "ถ้าวัตถุเคลื่อนที่เป็นวงกลมครบ 1 รอบ การกระจัดเป็นเท่าใด?", a: ["เท่ากับเส้นรอบวง", "เป็นศูนย์", "มีค่ามากที่สุด", "ระบุไม่ได้"], correct: 1, tip: "จุดเริ่มและจุดจบอยู่ที่เดียวกัน การกระจัดจึงเป็นศูนย์!" },
            { q: "เครื่องมือวัดมวลควรใช้หน่วยใด?", a: ["mL", "A", "kg", "K"], correct: 2, tip: "มวลคือน้ำหนักเนื้อสาร หน่วยมาตรฐานคือ kg" },
            { q: "หน่วยของกระแสไฟฟ้าคืออะไร?", a: ["K", "A", "mL", "kg"], correct: 1, tip: "กระแสไฟฟ้าหน่วยเป็นแอมแปร์ (A)" },
            { q: "จุดอ้างอิงมีไว้เพื่ออะไร?", a: ["ให้ดูสวยงาม", "วัดความร้อน", "เปรียบเทียบตำแหน่ง", "วัดเวลา"], correct: 2, tip: "ต้องมีจุดเทียบถึงจะบอกได้ว่า 'เคลื่อนที่' หรือ 'อยู่นิ่ง'" },
            { q: "ถ้ารถยนต์วิ่งด้วยอัตราเร็ว 10 m/s ในเวลา 5 s จะได้ระยะทางเท่าใด?", a: ["50 เมตร", "2 เมตร", "15 เมตร", "5 เมตร"], correct: 0, tip: "ระยะทาง = อัตราเร็ว × เวลา" },
            { q: "การคำนวณความเร็วเฉลี่ยใช้สูตรใด?", a: ["ระยะทาง/เวลา", "การกระจัด/เวลา", "เวลา/การกระจัด", "ไม่มีข้อถูก"], correct: 1, tip: "ความเร็ว = การกระจัดรวม / เวลาทั้งหมด" }
        ];

        const quizDiv = document.getElementById('quiz');
        questions.forEach((item, index) => {
            let html = `<div class="question-container"><p>${index+1}. ${item.q} <span style="color:red;">(Clue: ${item.tip})</span></p>`;
            item.a.forEach((opt, i) => {
                html += `<label><input type="radio" name="q${index}" onclick="check(${index}, ${i})"> ${opt}</label><br>`;
            });
            html += `<div id="exp${index}" class="explanation"></div></div>`;
            quizDiv.innerHTML += html;
        });

        function check(qIdx, aIdx) {
            const expDiv = document.getElementById('exp' + qIdx);
            expDiv.style.display = 'block';
            if(aIdx === questions[qIdx].correct) {
                expDiv.innerHTML = '<span class="correct">ถูกต้อง!</span> Tutor\'s Secret Tip: ' + questions[qIdx].tip;
            } else {
                expDiv.innerHTML = '<span class="wrong">ยังไม่ถูกครับ!</span> ลองคิดดูใหม่นะครับ ' + questions[qIdx].tip;
            }
        }
    </script>
</body>
</html>
