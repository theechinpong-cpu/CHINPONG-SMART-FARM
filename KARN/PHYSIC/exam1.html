const quiz = document.getElementById('quiz');
data.forEach((item, i) => {
    let div = document.createElement('div');
    div.className = 'q-box';
    div.innerHTML = `<p><strong>ข้อ ${i+1}: ${item.q}</strong> <span class="clue">(Clue: ${item.tip})</span></p>`;
    item.opt.forEach((o, oi) => {
        div.innerHTML += `<label><input type="radio" name="q${i}" onclick="check(${i}, ${oi}, this)"> ${o}</label><br>`;
    });
    div.innerHTML += `<div id="ans${i}" class="ans-box"></div>`;
    quiz.appendChild(div);
});

function check(qIdx, oIdx, radio) {
    const box = document.getElementById(`ans${qIdx}`);
    const correct = data[qIdx].a;
    const parent = radio.parentElement.parentElement;
    const inputs = parent.querySelectorAll('input');
    
    inputs.forEach(input => input.disabled = true);
    box.style.display = 'block';
    
    if(oIdx === correct) {
        score++;
        document.getElementById('score').innerText = score;
        box.innerHTML = `✅ ถูกต้อง! ${data[qIdx].e}`;
    } else {
        box.innerHTML = `❌ ผิดครับ เฉลยคือ: ${data[qIdx].opt[correct]} (${data[qIdx].e})`;
    }
}
