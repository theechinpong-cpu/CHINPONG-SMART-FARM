<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: sans-serif; padding: 20px; }
    .question-container { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
    .feedback { margin-top: 10px; font-weight: bold; }
    .correct { color: green; }
    .incorrect { color: red; }
</style>
</head>
<body>
    <h2>พระจอมเกล้าติวเตอร์: แบบทดสอบ Unit 1</h2>
    <div id="quiz"></div>

    <script>
        const questions = [
            { id: 1, q: "การวัดที่ดีที่สุดควรมีลักษณะอย่างไร?", a: ["มีตัวเลขเท่านั้น", "มีหน่วยที่ชัดเจนและแม่นยำ", "เป็นการประมาณค่า", "ไม่มีข้อใดถูก"], correct: 1, tip: "หน่วยคือหัวใจของการวัดครับ!" },
            { id: 2, q: "จุดอ้างอิง (Reference Point) มีไว้เพื่ออะไร?", a: ["เพื่อความสวยงาม", "เพื่อบอกว่าวัตถุเคลื่อนที่หรือไม่", "เพื่อกำหนดทิศทางลม", "เพื่อวัดอุณหภูมิ"], correct: 1, tip: "จุดอ้างอิงต้องอยู่นิ่งครับ" },
            { id: 3, q: "ระยะทาง (Distance) แตกต่างจากการกระจัด (Displacement) อย่างไร?", a: ["ระยะทางเป็นเวกเตอร์", "การกระจัดคือเส้นทางจริงที่เดิน", "ระยะทางคือเส้นทางจริง การกระจัดคือเส้นตรงสั้นที่สุด", "ทั้งสองเหมือนกัน"], correct: 2, tip: "นึกถึงเส้นทางเดินจริง vs ทางลัดครับ" },
            { id: 4, q: "หากเดินเป็นวงกลม 1 รอบ การกระจัดจะเป็นเท่าใด?", a: ["มากกว่าศูนย์", "เท่ากับเส้นรอบวง", "เท่ากับศูนย์", "หาค่าไม่ได้"], correct: 2, tip: "จุดเริ่มกับจุดจบอยู่ที่เดียวกัน การกระจัดคือ 0" },
            { id: 5, q: "ปริมาณใดเป็นปริมาณเวกเตอร์?", a: ["ระยะทาง", "อัตราเร็ว", "การกระจัด", "เวลา"], correct: 2, tip: "เวกเตอร์ต้องมีทั้งขนาดและทิศทาง" },
            { id: 6, q: "ความเร็วเฉลี่ย คำนวณจากสูตรใด?", a: ["ระยะทาง / เวลา", "การกระจัด / เวลา", "ระยะทาง x เวลา", "มวล x ความเร่ง"], correct: 1, tip: "ความเร็วคู่กับการกระจัดครับ" },
            { id: 7, q: "กราฟตำแหน่ง-เวลา ความชันของกราฟแสดงถึงอะไร?", a: ["ระยะทาง", "ความเร่ง", "ความเร็ว", "เวลา"], correct: 2, tip: "ความชัน = $\Delta y / \Delta x$ = ตำแหน่ง / เวลา" },
            { id: 8, q: "หน่วยของมวลในระบบ SI คืออะไร?", a: ["กรัม", "มิลลิกรัม", "กิโลกรัม", "นิวตัน"], correct: 2, tip: "อย่าลืม kg นะครับ" },
            { id: 9, q: "หากวัตถุเคลื่อนที่ด้วยความเร็วคงที่ กราฟตำแหน่ง-เวลาจะเป็นอย่างไร?", a: ["เส้นโค้ง", "เส้นตรงเฉียง", "เส้นดิ่ง", "กราฟรูปตัว U"], correct: 1, tip: "ความเร็วคงที่ = ความชันคงที่" },
            { id: 10, q: "อัตราเร็วเฉลี่ย ต่างจาก ความเร็วเฉลี่ย อย่างไร?", a: ["อัตราเร็วไม่มีทิศทาง", "อัตราเร็วใช้การกระจัด", "ความเร็วไม่มีทิศทาง", "ไม่มีข้อใดถูก"], correct: 0, tip: "อัตราเร็วเป็นสเกลาร์ครับ" }
        ];

        function checkAnswer(id, selected, correct, tip) {
            const container = document.getElementById('q'+id);
            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            if (selected == correct) {
                feedback.innerHTML = '<span class="correct">ถูกต้อง!</span><br>Tutor\'s Secret Tip: ' + tip;
            } else {
                feedback.innerHTML = '<span class="incorrect">ผิดครับ!</span><br>เฉลย: ข้อ ' + (correct + 1) + '<br>Tutor\'s Secret Tip: ' + tip;
            }
            container.appendChild(feedback);
        }

        const quizDiv = document.getElementById('quiz');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-container';
            div.id = 'q' + index;
            let options = item.a.map((opt, i) => `<input type="radio" name="q${index}" value="${i}"> ${opt}<br>`).join('');
            div.innerHTML = `<p>${index + 1}. ${item.q} <span style="color:red;">(Clue: คิดถึงความหมายของนิยามในบทเรียน)</span></p>${options}<button onclick="checkAnswer(${index}, document.querySelector('input[name=q${index}]:checked').value, ${item.correct}, '${item.tip}')">ส่งคำตอบ</button>`;
            quizDiv.appendChild(div);
        });
    </script>
</body>
</html>
