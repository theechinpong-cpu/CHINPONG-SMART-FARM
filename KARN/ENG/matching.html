<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Vocab Match: Unit 1 Neighbours</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #eef2f3; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .score-board { font-size: 24px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .game-container { display: flex; gap: 30px; justify-content: center; }
        .column { display: flex; flex-direction: column; gap: 10px; width: 320px; }
        .card { background: white; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 5px; background: #3498db; color: white; transition: 0.2s; }
        .btn-clue { background: #f39c12; }
        .btn-ans { background: #e74c3c; }
        .selected { outline: 3px solid #2ecc71; }
        .matched { background: #27ae60 !important; color: white; cursor: default; }
    </style>
</head>
<body>

    <div class="score-board">คะแนน: <span id="score">0</span></div>
    <h1>🌟 Unit 1: Neighbours Challenge</h1>
    <div class="game-container">
        <div class="column" id="words"></div>
        <div class="column" id="meanings"></div>
    </div>

    <script>
        const vocabData = [
            {w: "Scatterbrain", m: "คนขี้ลืม", clue: "Always forgetting things."},
            {w: "Lazybones", m: "คนขี้เกียจ", clue: "Someone who avoids work."},
            {w: "Chatterbox", m: "คนช่างพูด", clue: "Someone who talks a lot."},
            {w: "Nosey parker", m: "คนชอบยุ่งเรื่องชาวบ้าน", clue: "Always curious about others."},
            {w: "Killjoy", m: "คนทำลายบรรยากาศ", clue: "Ruins other people's fun."},
            {w: "Smart alec", m: "คนอวดฉลาด", clue: "Thinks they know everything."},
            {w: "Silly billy", m: "คนทำตัวงี่เง่า", clue: "Acts foolishly."},
            {w: "High flier", m: "คนทะเยอทะยาน", clue: "Very ambitious person."},
            {w: "Workaholic", m: "คนบ้างาน", clue: "Works all the time."},
            {w: "Troublemaker", m: "คนชอบสร้างปัญหา", clue: "Often causes problems."},
            {w: "Water the plants", m: "รดน้ำต้นไม้", clue: "Giving water to flowers."},
            {w: "Vacuum the carpets", m: "ดูดฝุ่นพรม", clue: "Cleaning the floor with a machine."},
            {w: "Do the washing-up", m: "ล้างจาน", clue: "Washing plates and cups."},
            {w: "Clear the table", m: "เก็บโต๊ะอาหาร", clue: "Removing dishes after eating."},
            {w: "Dust the furniture", m: "ปัดฝุ่นเฟอร์นิเจอร์", clue: "Cleaning off dust."},
            {w: "Put away clothes", m: "จัดเก็บเสื้อผ้า", clue: "Storing clothes in the closet."},
            {w: "Look after", m: "ดูแล", clue: "Taking care of someone."},
            {w: "Take after", m: "หน้าตา/นิสัยเหมือน", clue: "Resembling a family member."},
            {w: "Run after", m: "วิ่งไล่ตาม", clue: "Chasing something."},
            {w: "Sensitive", m: "อ่อนไหว", clue: "Easily hurt or touched."},
            {w: "Ambitious", m: "ทะเยอทะยาน", clue: "Having a strong desire to succeed."},
            {w: "Creative", m: "มีความคิดสร้างสรรค์", clue: "Good at making new things."},
            {w: "Easy-going", m: "สบายๆ", clue: "Relaxed and not easily upset."},
            {w: "Privacy", m: "ความเป็นส่วนตัว", clue: "Being free from being observed."},
            {w: "Annoy", m: "ทำให้รำคาญ", clue: "Making someone feel irritated."}
        ];

        let score = 0;
        let selectedWord = null;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function updateScore(points) {
            score += points;
            document.getElementById('score').innerText = score;
        }

        // ฟังก์ชันสุ่มลำดับ
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        const wDiv = document.getElementById('words');
        const mDiv = document.getElementById('meanings');

        // สุ่มทั้งสองฝั่งแยกกัน
        const shuffledWords = shuffleArray([...vocabData]);
        const shuffledMeanings = shuffleArray([...vocabData]);

        shuffledWords.forEach(item => {
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button onclick="speak('${item.w}'); setSelected(this, ${JSON.stringify(item).replace(/"/g, '&quot;')})">${item.w}</button>
                <button class="btn-clue" onclick="alert('${item.clue}'); updateScore(-2)">Clue</button>
                <button class="btn-ans" onclick="alert('${item.m}'); updateScore(-5)">เฉลย</button>
            `;
            wDiv.appendChild(card);
        });

        function setSelected(btn, item) {
            document.querySelectorAll('#words button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedWord = item;
        }

        shuffledMeanings.forEach(item => {
            let btnM = document.createElement('button');
            btnM.innerText = item.m;
            btnM.onclick = () => {
                if(selectedWord && selectedWord.m === item.m) {
                    btnM.classList.add('matched');
                    updateScore(10);
                    // ล้างการเลือก
                    selectedWord = null;
                    document.querySelectorAll('#words button').forEach(b => b.classList.remove('selected'));
                }
            };
            mDiv.appendChild(btnM);
        });
    </script>
</body>
</html>
