<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Vocab Matching Game - พระจอมเกล้าติวเตอร์</title>
    <style>
        .container { display: flex; gap: 50px; justify-content: center; padding: 20px; }
        .column { display: flex; flex-direction: column; gap: 10px; width: 200px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #ccc; background: #f9f9f9; transition: 0.3s; }
        .selected { background-color: #ffd700; }
        .correct { background-color: #d4edda !important; color: #155724; cursor: default; }
    </style>
</head>
<body>

<h2 style="text-align:center;">Vocab Matching Game: Unit 1</h2>
<div class="container">
    <div class="column" id="words"></div>
    <div class="column" id="meanings"></div>
</div>

<script>
    const vocabData = [
        { word: "Scatterbrain", mean: "คนขี้ลืม/ไม่เป็นระเบียบ" },
        { word: "Lazybones", mean: "คนขี้เกียจ" },
        // ... (ใส่ให้ครบ 25 คำ)
    ];

    let selectedWord = null;

    // ฟังก์ชันสุ่มลำดับ Array
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    const wordsDiv = document.getElementById('words');
    const meaningsDiv = document.getElementById('meanings');

    // สร้างปุ่ม
    vocabData.forEach((item, index) => {
        let btnW = document.createElement('button');
        btnW.innerText = item.word;
        btnW.onclick = () => {
            selectedWord = index;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(item.word));
        };
        wordsDiv.appendChild(btnW);

        let btnM = document.createElement('button');
        btnM.innerText = item.mean;
        btnM.onclick = () => {
            if (selectedWord === index) {
                btnM.classList.add('correct');
                // เพิ่มเสียงเชียร์ที่นี่
            } else {
                alert("ลองใหม่อีกครั้ง!");
            }
        };
        meaningsDiv.appendChild(btnM);
    });
</script>
</body>
</html>
