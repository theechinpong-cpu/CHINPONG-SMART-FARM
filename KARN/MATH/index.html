<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบเลขยกกำลัง - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .question-container { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .options label { display: block; margin: 5px 0; cursor: pointer; }
        .explanation { display: none; margin-top: 10px; padding: 10px; border-radius: 5px; }
        .correct { background-color: #d4edda; color: #155724; }
        .incorrect { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>แบบทดสอบเลขยกกำลัง (10 ข้อ)</h1>
    <div id="quiz"></div>

    <script>
        const questions = [
            { q: "ผลลัพธ์ของ 2^3 × 2^4 มีค่าเท่าใด", a: ["2^7", "2^12", "4^7", "4^12"], correct: 0, clue: "สมบัติเลขยกกำลัง: ฐานเหมือนกันคูณกัน ให้เอาเลขชี้กำลังมาบวกกัน" },
            { q: "ค่าของ (3^2)^3 คือเท่าใด", a: ["3^5", "3^6", "9^3", "3^9"], correct: 1, clue: "สมบัติเลขยกกำลัง: (a^m)^n = a^(m×n)" },
            { q: "ค่าของ 5^0 มีค่าเท่าใด", a: ["0", "1", "5", "ไม่ได้นิยาม"], correct: 1, clue: "เลขยกกำลังที่มีเลขชี้กำลังเป็นศูนย์ มีค่าเท่ากับ 1 เสมอ (เมื่อฐานไม่เป็น 0)" },
            { q: "4^-2 มีค่าเท่ากับเท่าใด", a: ["-16", "1/16", "1/8", "-8"], correct: 1, clue: "a^-n = 1/a^n" },
            { q: "√64 มีค่าเท่ากับเท่าใด", a: ["4", "6", "8", "16"], correct: 2, clue: "รากที่สองของจำนวนที่ยกกำลังสองแล้วได้ 64" },
            { q: "ค่าหลักของรากที่ 3 ของ -27 คือเท่าใด", a: ["-3", "3", "9", "-9"], correct: 0, clue: "เลขคี่สามารถถอดรากที่เลขข้างในติดลบได้" },
            { q: "เขียน 8^(2/3) ให้อยู่ในรูปอย่างง่าย", a: ["2", "4", "8", "16"], correct: 1, clue: "เปลี่ยน 8 เป็น 2^3 แล้วใช้สมบัติเลขชี้กำลัง" },
            { q: "สมการ 3^x = 27 ค่าของ x คือเท่าใด", a: ["2", "3", "4", "9"], correct: 1, clue: "ทำฐานให้เท่ากัน (27 = 3^3)" },
            { q: "√a × √a มีค่าเท่าใด (a > 0)", a: ["a", "2a", "a^2", "√2a"], correct: 0, clue: "รากที่สองของ a คูณกันเอง ย่อมได้ตัวมันเอง" },
            { q: "สังยุคของ 2 + √3 คืออะไร", a: ["2 + √3", "2 - √3", "-2 + √3", "-2 - √3"], correct: 1, clue: "สังยุคเปลี่ยนเครื่องหมายตรงกลางจากบวกเป็นลบ" }
        ];

        const quizDiv = document.getElementById('quiz');
        questions.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = 'question-container';
            container.innerHTML = `<p>${index + 1}. ${item.q} <span style="color:red;">(Clue: ${item.clue})</span></p>`;
            
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            item.a.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = optIndex;
                radio.onclick = () => check(index, optIndex);
                label.appendChild(radio);
                label.appendChild(document.createTextNode(' ' + opt));
                optionsDiv.appendChild(label);
            });
            container.appendChild(optionsDiv);
            const expl = document.createElement('div');
            expl.id = 'expl' + index;
            expl.className = 'explanation';
            container.appendChild(expl);
            quizDiv.appendChild(container);
        });

        function check(qIndex, aIndex) {
            const expl = document.getElementById('expl' + qIndex);
            const correct = questions[qIndex].correct;
            if (aIndex === correct) {
                expl.className = 'explanation correct';
                expl.innerHTML = 'ถูกต้องครับ! Tutor\'s Secret Tip: การจัดฐานให้เท่ากันเป็นหัวใจสำคัญของบทนี้ครับ';
            } else {
                expl.className = 'explanation incorrect';
                expl.innerHTML = 'ยังไม่ถูกต้องครับ ลองทบทวนนิยามใหม่นะ Tutor\'s Secret Tip: สังเกตตัวฐานดีๆ แล้วใช้สมบัติให้ถูกตัวครับ';
            }
            expl.style.display = 'block';
        }
    </script>
</body>
</html>
