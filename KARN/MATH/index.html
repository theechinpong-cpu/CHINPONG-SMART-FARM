<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบเลขยกกำลัง - พระจอมเกล้าติวเตอร์</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .question-container { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; background-color: #fff; }
        .options { margin-top: 10px; }
        .options label { display: block; margin: 8px 0; cursor: pointer; }
        .explanation { display: none; margin-top: 15px; padding: 10px; border-radius: 5px; }
        .correct { background-color: #d4edda; color: #155724; }
        .incorrect { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h1>แบบทดสอบเลขยกกำลัง (10 ข้อ)</h1>
    <div id="quiz"></div>

    <script>
        const questions = [
            { q: "ผลลัพธ์ของ $2^3 \\times 2^4$ มีค่าเท่าใด", a: ["$2^7$", "$2^{12}$", "$4^7$", "$4^{12}$"], correct: 0, clue: "สมบัติ: $a^m \\times a^n = a^{m+n}$" },
            { q: "ค่าของ $(3^2)^3$ คือเท่าใด", a: ["$3^5$", "$3^6$", "$9^3$", "$3^9$"], correct: 1, clue: "สมบัติ: $(a^m)^n = a^{mn}$" },
            { q: "ค่าของ $5^0$ มีค่าเท่าใด", a: ["$0$", "$1$", "$5$", "ไม่ได้นิยาม"], correct: 1, clue: "$a^0 = 1$ (เมื่อ $a \\neq 0$)" },
            { q: "$4^{-2}$ มีค่าเท่ากับเท่าใด", a: ["$-16$", "$\\frac{1}{16}$", "$\\frac{1}{8}$", "$-8$"], correct: 1, clue: "$a^{-n} = \\frac{1}{a^n}$" },
            { q: "$\\sqrt{64}$ มีค่าเท่ากับเท่าใด", a: ["$4$", "$6$", "$8$", "$16$"], correct: 2, clue: "รากที่สองของ $64$ คือ $8$" },
            { q: "ค่าหลักของรากที่ $3$ ของ $-27$ คือเท่าใด", a: ["$-3$", "$3$", "$9$", "$-9$"], correct: 0, clue: "ถอดรากที่ $n$ เป็นเลขคี่ได้ผลลัพธ์เป็นลบ" },
            { q: "เขียน $8^{\\frac{2}{3}}$ ให้อยู่ในรูปอย่างง่าย", a: ["$2$", "$4$", "$8$", "$16$"], correct: 1, clue: "$8 = 2^3$ ดังนั้น $(2^3)^{\\frac{2}{3}} = 2^2 = 4$" },
            { q: "สมการ $3^x = 27$ ค่าของ $x$ คือเท่าใด", a: ["$2$", "$3$", "$4$", "$9$"], correct: 1, clue: "$27 = 3^3$ ดังนั้น $x = 3$" },
            { q: "$\\sqrt{a} \\times \\sqrt{a}$ มีค่าเท่าใด (เมื่อ $a > 0$)", a: ["$a$", "$2a$", "$a^2$", "$\\sqrt{2a}$"], correct: 0, clue: "$\(\sqrt{a}\)^2 = a$" },
            { q: "สังยุคของ $2 + \\sqrt{3}$ คืออะไร", a: ["$2 + \\sqrt{3}$", "$2 - \\sqrt{3}$", "$-2 + \\sqrt{3}$", "$-2 - \\sqrt{3}$"], correct: 1, clue: "เปลี่ยนเครื่องหมายตรงกลาง" }
        ];

        const quizDiv = document.getElementById('quiz');
        questions.forEach((item, index) => {
            const container = document.createElement('div');
            container.className = 'question-container';
            container.innerHTML = `<p>${index + 1}. ${item.q}</p>`;
            
            item.a.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="radio" name="q${index}" onclick="check(${index}, ${optIndex})"> ${opt}`;
                container.appendChild(label);
            });
            
            const expl = document.createElement('div');
            expl.id = 'expl' + index;
            expl.className = 'explanation';
            container.appendChild(expl);
            quizDiv.appendChild(container);
        });

        function check(qIndex, aIndex) {
            const expl = document.getElementById('expl' + qIndex);
            const isCorrect = (aIndex === questions[qIndex].correct);
            expl.className = 'explanation ' + (isCorrect ? 'correct' : 'incorrect');
            expl.innerHTML = isCorrect ? 'ถูกต้อง! ' + questions[qIndex].clue : 'ไม่ถูกต้อง ลองคิดใหม่นะ ' + questions[qIndex].clue;
            expl.style.display = 'block';
            MathJax.typeset(); // สั่งให้ MathJax เรนเดอร์สมการใหม่เมื่อมีการคลิก
        }
    </script>
</body>
</html>
