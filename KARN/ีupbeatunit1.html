        tip: "Influenced by peer pressure + alters opinions = Submissive (หัวอ่อน ยอมคนง่าย)"
    },
    {
        category: "Stative Verbs",
        q: "50. She ________ a lot of money to the local bank, which explains why she is working two jobs.",
        options: ["is owing", "owes", "owe", "has owed"],
        correct: 1,
        explanation: "owe (เป็นหนี้) เป็นกริยาสภาวะผูกพัน (Stative Verb) ไม่สามารถใช้ในรูป Continuous ได้ ประธาน She เป็นเอกพจน์ กริยาเติม s",
        tip: "Owe เป็นหนี้เงินหรือบุญคุณ ถือเป็นสภาวะทางสถานะ ห้ามใช้รูปกำลังเป็นหนี้ (-ing)"
    }

];

// Generate HTML Questions
const container = document.getElementById('quiz-questions');
quizData.forEach((item, index) => {
    let clueText = "";
    if(item.category === "Present Simple vs Continuous") clueText = "วิเคราะห์ว่าเป็นตารางเวลา/ความจริง หรือเหตุการณ์ชั่วคราว/กำลังเปลี่ยน";
    if(item.category === "Stative Verbs") clueText = "เช็กว่าเป็นกริยาแสดงสภาวะจิตใจ/ประสาทสัมผัสที่ห้ามเติม -ing หรือไม่";
    if(item.category === "Vocabulary") clueText = "วิเคราะห์บริบทพฤติกรรมเพื่อหาคำคุณศัพท์นิสัยที่สอดคล้องที่สุด";

    const qDiv = document.createElement('div');
    qDiv.className = 'question-container';
    qDiv.id = `q-box-${index}`;
    
    qDiv.innerHTML = `
        <div class="question-title">${item.q} <span class="clue">(Clue: ${clueText})</span></div>
        <ul class="options">
            ${item.options.map((opt, oIdx) => `
                <li onclick="checkAnswer(${index}, ${oIdx}, this)">
                    <input type="radio" name="q-${index}" id="q-${index}-o-${oIdx}" disabled>
                    <label for="q-${index}-o-${oIdx}">${opt}</label>
                </li>
            `).join('')}
        </ul>
        <div class="feedback" id="feedback-${index}">
            <div id="status-${index}"></div>
            <div style="margin-top:5px;"><strong>คำอธิบาย:</strong> ${item.explanation}</div>
            <div class="secret-tip">💡 Tutor's Secret Tip: ${item.tip}</div>
        </div>
    `;
    container.appendChild(qDiv);
});

let userAnswers = new Array(quizData.length).fill(null);

function checkAnswer(qIdx, oIdx, element) {
    if (userAnswers[qIdx] !== null) return; // Answered already
    
    userAnswers[qIdx] = oIdx;
    const correctIdx = quizData[qIdx].correct;
    const feedbackDiv = document.getElementById(`feedback-${qIdx}`);
    const statusDiv = document.getElementById(`status-${qIdx}`);
    const listItems = element.parentNode.getElementsByTagName('li');
    
    // Check radio button
    element.querySelector('input').checked = true;

    // Reveal correct/incorrect styling instantly
    if (oIdx === correctIdx) {
        element.classList.add('correct-choice');
        statusDiv.innerHTML = "<strong>✅ ถูกต้อง!</strong>";
        feedbackDiv.classList.add('correct-bg');
    } else {
        element.classList.add('incorrect-choice');
        listItems[correctIdx].classList.add('correct-choice'); // Show correct one
        statusDiv.innerHTML = "<strong>❌ ผิดพลาด!</strong>";
        feedbackDiv.classList.add('incorrect-bg');
    }
    
    feedbackDiv.style.display = "block";
}

function calculateResult() {
    let score = 0;
    let categoryStats = {
        "Present Simple vs Continuous": { correct: 0, total: 0 },
        "Stative Verbs": { correct: 0, total: 0 },
        "Vocabulary": { correct: 0, total: 0 }
    };

    quizData.forEach((item, index) => {
        categoryStats[item.category].total++;
        if (userAnswers[index] === item.correct) {
            score++;
            categoryStats[item.category].correct++;
        }
    });

    // Display overall score
    document.getElementById('score-display').innerText = `คุณทำคะแนนได้รวม: ${score} / ${quizData.length} คะแนน`;

    // Generate diagnostic analysis
    let analysisHtml = "<ul>";
    let weaknesses = [];
    let strengths = [];

    for (const [cat, data] of Object.entries(categoryStats)) {
        let percentage = (data.correct / data.total) * 100;
        analysisHtml += `<li><strong>${cat}:</strong> ถูกต้อง ${data.correct} จาก ${data.total} ข้อ (${percentage.toFixed(0)}%)</li>`;
        
        if (percentage < 70) {
            weaknesses.push(cat);
        } else {
            strengths.push(cat);
        }
    }
    analysisHtml += "</ul>";

    analysisHtml += `<div style="margin-top: 15px;">`;
    if (strengths.length > 0) {
        analysisHtml += `<p class="strength-list">🌟 จุดแข็งของคุณ: ${strengths.join(', ')} -> คุณมีความเข้าใจในส่วนนี้ดีมาก ขอให้รักษามาตรฐานการคิดอย่างมีระบบแบบนี้ไว้ครับ!</p>`;
    }
    if (weaknesses.length > 0) {
        analysisHtml += `<p class="weakness-list">⚠️ จุดที่ยังต้องพัฒนาเพิ่มเติม: ${weaknesses.join(', ')} -> แนะนำให้กลับไปทบทวนเทคนิคความจำ (Memory Tricks) และทบทวนโจทย์แนวนี้ซ้ำอีกครั้งเพื่อปิดจุดอ่อนให้สนิทครับ</p>`;
    } else {
        analysisHtml += `<p class="strength-list">🏆 ยอดเยี่ยมระดับท็อป! คุณไม่มีจุดอ่อนในบทเรียนนี้เลย พร้อมลุยข้อสอบแข่งขันจริงแล้วครับ</p>`;
    }
    analysisHtml += `</div>`;

    document.getElementById('analysis-content').innerHTML = analysisHtml;
    document.getElementById('result-box').style.display = "block";
    
    // Scroll to results
    document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
