<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คลังข้อสอบคณิตศาสตร์ขั้นสูง - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; height: 100vh; }
        .main-content { flex: 70%; padding: 20px; overflow-y: auto; }
        .whiteboard { flex: 30%; background: #2c3e50; padding: 20px; color: white; border-left: 5px solid #bdc3c7; display: flex; flex-direction: column; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .summary-box { background: #fff3cd; padding: 15px; border-radius: 8px; border-left: 5px solid #ffc107; margin-bottom: 20px; }
        .question { margin-bottom: 25px; padding: 20px; border: 1px solid #ced4da; border-radius: 10px; background: #f8f9fa; }
        .options button { display: block; width: 100%; margin: 8px 0; padding: 12px; cursor: pointer; border: 1px solid #dee2e6; border-radius: 6px; transition: 0.3s; text-align: left; background-color: white; }
        .options button:hover { background-color: #e2e6ea; }
        .correct { background-color: #28a745 !important; color: white; }
        .wrong { background-color: #dc3545 !important; color: white; }
        .detail { display:none; margin-top:15px; padding:10px; background: #e7f1ff; border-left: 5px solid #007bff; font-size: 0.95em; }
        .clue { color: #6c757d; font-style: italic; margin-top: 5px; }
        textarea { width: 100%; height: 90%; background: transparent; color: #ecf0f1; border: none; font-size: 1.2em; resize: none; outline: none; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <h1>ข้อสอบเรขาคณิตประยุกต์ (ระดับยาก)</h1>
            <div class="summary-box">
                <strong>สรุปบทเรียน:</strong> ฝึกทักษะการมองภาพและใช้พีทาโกรัสช่วยแก้โจทย์... (เนื้อหาสรุป 500+ คำตามมาตรฐานติวเตอร์)
            </div>
            <div id="quiz-area"></div>
        </div>
    </div>
    <div class="whiteboard">
        <h2>Whiteboard</h2>
        <textarea placeholder="ใช้พื้นที่นี้ทดเลขหรือจดบันทึกกระบวนการคิด..."></textarea>
    </div>

    <script>
        const rawQuestions = [
            { q: "รูปสี่เหลี่ยมจัตุรัสขนาด 10x10 ซม. มีวงกลมแนบในพอดี พื้นที่ส่วนที่ไม่อยู่ในวงกลมคือเท่าใด (ใช้ π=3.14)", a: ["21.5 ตร.ซม.", "78.5 ตร.ซม.", "50 ตร.ซม.", "25 ตร.ซม."], correct: "21.5 ตร.ซม.", detail: "พื้นที่สี่เหลี่ยม = 100, พื้นที่วงกลม = 3.14 × 5² = 78.5. ส่วนต่างคือ 100 - 78.5 = 21.5", clue: "หาพื้นที่รูปนอก แล้วหักลบพื้นที่รูปใน" },
            // ... (ใส่ข้อสอบให้ครบ 25 ข้อตามโครงสร้างเดิม)
        ];

        // ระบบสุ่มและแสดงผล
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const questions = rawQuestions.map(q => {
            let options = [...q.a];
            shuffle(options);
            return { q_th: q.q, a: options, correct: options.indexOf(q.correct), detail: q.detail, clue: q.clue };
        });

        function renderQuiz() {
            const container = document.getElementById('quiz-area');
            questions.forEach((q, i) => {
                let html = `<div class="question"><p>${i+1}. ${q.q_th}</p><div class="options">`;
                q.a.forEach((opt, j) => {
                    html += `<button onclick="check(${i}, ${j}, this)">${opt}</button>`;
                });
                html += `</div><div class="detail" id="d${i}"><strong>เฉลย:</strong> ${q.detail}<br><div class="clue">${q.clue}</div></div></div>`;
                container.innerHTML += html;
            });
        }

        function check(q, choice, btn) {
            const isCorrect = choice === questions[q].correct;
            const buttons = btn.parentElement.querySelectorAll('button');
            buttons.forEach(b => b.style.pointerEvents = 'none');
            btn.classList.add(isCorrect ? 'correct' : 'wrong');
            document.getElementById('d'+q).style.display = 'block';
            if(document.querySelectorAll('.correct').length + document.querySelectorAll('.wrong').length === questions.length) {
                alert("ระบบจำลองส่งคะแนนไปที่ thee.chinpong@hmail.com เรียบร้อยแล้ว");
            }
        }
        renderQuiz();
    </script>
</body>
</html>
