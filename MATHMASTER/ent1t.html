<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คู่มือครู: เฉลยละเอียดเรขาคณิตประยุกต์ 25 ข้อ</title>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 20px; background-color: #f8f9fa; line-height: 1.6; }
        .container { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .step-box { background: #fffdf0; padding: 20px; border-left: 6px solid #f39c12; margin-bottom: 20px; border-radius: 8px; }
        .teacher-tip { color: #d35400; font-weight: bold; margin-top: 10px; font-size: 0.95em; }
        .math-text { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>คู่มือครู: เฉลยวิธีทำอย่างละเอียด (25 ข้อ)</h1>
        <div id="teaching-area"></div>
    </div>

    <script>
        const teacherData = [
            { id: 1, title: "พื้นที่ส่วนที่เหลือ", detail: "พื้นที่สี่เหลี่ยม = 10x10=100. รัศมีวงกลม = 5. พื้นที่วงกลม = 3.14 x 5² = 78.5. ส่วนต่าง = 100 - 78.5 = 21.5", tip: "สอนนักเรียนให้มองภาพรวมก่อน แล้วค่อยตัดส่วนที่ไม่ต้องการออก (Subtractive Thinking)" },
            { id: 2, title: "การเปลี่ยนแปลงพื้นที่", detail: "ฐานใหม่ = 12 x 1.25 = 15. สูงใหม่ = 8 x 0.8 = 6.4. พื้นที่ = 0.5 x 15 x 6.4 = 48 (เท่าเดิม)", tip: "ใช้สมบัติการสลับที่ของการคูณ 1.25 x 0.8 = 1" },
            { id: 3, title: "สี่เหลี่ยมผืนผ้า", detail: "กว้าง = (3/4) x 20 = 15. พื้นที่ = 20 x 15 = 300", tip: "ฝึกการหาเศษส่วนของจำนวนเต็มให้คล่องก่อนเริ่มเรื่องเรขาคณิต" },
            { id: 4, title: "สี่เหลี่ยมคางหมู", detail: "พื้นที่ = 0.5 x ผลรวมด้านขนาน x สูง => 72 = 0.5 x 24 x สูง => 72 = 12 x สูง => สูง = 6", tip: "สร้างความเข้าใจว่าสี่เหลี่ยมคางหมูคือครึ่งหนึ่งของสี่เหลี่ยมด้านขนานที่มีฐานรวมกัน" },
            { id: 5, title: "เส้นทแยงมุมจัตุรัส", detail: "ด้าน² = 144 => ด้าน = 12. เส้นทแยงมุม = ด้าน x √2 = 12√2", tip: "ให้จำว่าเส้นทแยงมุมของจัตุรัสคือ ด้าน คูณด้วย √2 เสมอ" },
            { id: 6, title: "ผลรวมวงกลม", detail: "พื้นที่วงกลม = πr². พื้นที่ = π(3² + 4²) = 25π. พื้นที่วงกลมรัศมี 5 = π(5²) = 25π. ผลต่าง = 0", tip: "แนะนำให้รู้จักชุดตัวเลขพีทาโกรัส (3,4,5) เพื่อลดเวลาคำนวณ" },
            { id: 7, title: "รอบรูปขนมเปียกปูน", detail: "เส้นทแยงมุมตัดกันเป็นมุมฉาก แบ่งครึ่งได้สามเหลี่ยมมุมฉาก 5, 12, 13. ด้าน = 13. รอบรูป = 13 x 4 = 52", tip: "การวาดภาพประกอบจะช่วยให้มองเห็นสามเหลี่ยมมุมฉากที่ซ่อนอยู่ได้ชัดเจนขึ้น" },
            { id: 8, title: "เปอร์เซ็นต์พื้นที่", detail: "พื้นที่เดิม = π x 7² = 49π. พื้นที่ใหม่ = π x 14² = 196π. เพิ่ม = (196-49)/49 = 3 (หรือ 300%)", tip: "สอนหลักการ: รัศมีเพิ่ม 2 เท่า พื้นที่จะเพิ่มเป็น 2² = 4 เท่า (ซึ่งคือเพิ่มขึ้น 300%)" },
            { id: 9, title: "สี่เหลี่ยมรูปว่าว", detail: "สูตร = 0.5 x เส้นทแยงมุม1 x เส้นทแยงมุม2 => 0.5 x 8 x 10 = 40", tip: "ย้ำว่าสูตรนี้ใช้ได้กับทุกรูปที่เส้นทแยงมุมตั้งฉากกัน" },
            { id: 10, title: "สามเหลี่ยมมุมฉาก", detail: "ด้านที่สาม = √(10² - 6²) = √64 = 8. พื้นที่ = 0.5 x 6 x 8 = 24", tip: "พีทาโกรัสคือเครื่องมือสำคัญที่สุดในการหาความสูงหรือฐานที่หายไป" },
            { id: 11, title: "พื้นที่เพิ่มขึ้น", detail: "เดิม 10x10=100. ใหม่กว้าง 10 ยาว 15 พื้นที่ = 150. ต่างกัน 50", tip: "ชี้ให้เห็นว่าถ้าเพิ่มด้านหนึ่งเพียงด้านเดียว พื้นที่เพิ่มขึ้นตามสัดส่วนการเพิ่มด้านนั้น" },
            { id: 12, title: "สามเหลี่ยมด้านเท่า", detail: "พื้นที่ = (√3/4) x ด้าน² => (√3/4) x 16 = 4√3", tip: "นี่คือสูตรเฉพาะที่ควรจำเพื่อใช้ในสนามสอบที่ต้องการความรวดเร็ว" },
            { id: 13, title: "รัศมีจากเส้นรอบวง", detail: "2 x (22/7) x r = 44 => r = 7. พื้นที่ = (22/7) x 49 = 154", tip: "เมื่อเจอ 22/7 หรือ 44 ให้ตั้งสมมติฐานว่า r มักจะเป็น 7 หรือพหุคูณของ 7" },
            { id: 14, title: "แบ่งพื้นที่จัตุรัส", detail: "พื้นที่รวม 100 หาร 4 ส่วนเท่าๆ กัน = 25", tip: "ใช้ความสมมาตรของรูปภาพเพื่อแบ่งส่วน จะช่วยให้ไม่ต้องเสียเวลาคำนวณซ้ำซ้อน" },
            { id: 15, title: "สี่เหลี่ยมด้านขนาน", detail: "พื้นที่ = ฐาน x สูง => 120 = 15 x สูง => สูง = 8", tip: "ย้ำว่าสูงต้องเป็นเส้นตั้งฉากกับฐานเท่านั้น" },
            { id: 16, title: "รูปว่าว", detail: "0.5 x 6 x 12 = 36", tip: "สูตรพื้นที่เส้นทแยงมุมคูณกันหารสอง เป็นหัวใจหลักของรูปทรงที่เส้นทแยงมุมตั้งฉาก" },
            { id: 17, title: "คางหมู", detail: "0.5 x (ผลรวมด้านขนาน) x สูง => 0.5 x 30 x 5 = 75", tip: "ให้นักเรียนจดจำคำว่า 'ผลรวมด้านขนาน' เป็นหนึ่งหน่วยข้อมูลก่อนคำนวณ" },
            { id: 18, title: "วงกลม 14", detail: "(22/7) x 14² = 22 x 2 x 14 = 616", tip: "การตัดทอนเศษส่วนก่อนคูณเลข จะช่วยป้องกันความผิดพลาดจากตัวเลขที่มากเกินไป" },
            { id: 19, title: "สามเหลี่ยมทั่วไป", detail: "0.5 x 20 x 12 = 120", tip: "ระวังอย่าสับสนระหว่างความสูงกับความยาวด้านเอียง" },
            { id: 20, title: "ขยายจัตุรัส", detail: "ด้านเพิ่ม 3 เท่า = ด้านใหม่ 3 เท่า ด้านเดิม พื้นที่เพิ่ม 3² = 9", tip: "กฎการย่อขยาย: ถ้ามิติเพิ่ม n เท่า พื้นที่เพิ่ม n² เท่า" },
            { id: 21, title: "หารัศมีจากพื้นที่", detail: "3.14 x r² = 314 => r² = 100 => r = 10", tip: "ถ้าเห็นค่า π = 3.14 ให้มองหาตัวเลขที่เป็นพหุคูณของ 10 ไว้ก่อน" },
            { id: 22, title: "ผืนผ้าจากรอบรูป", detail: "กว้าง 8, รอบรูป 40 => กว้าง+ยาว = 20. ยาว = 12. พื้นที่ = 8 x 12 = 96", tip: "ครึ่งหนึ่งของเส้นรอบรูป คือผลบวกของด้านกว้างและด้านยาว" },
            { id: 23, title: "พีทาโกรัสสามเหลี่ยม", detail: "√(9² + 12²) = √225 = 15", tip: "ชุด 3-4-5 ขยายเป็น 9-12-15 เป็นชุดที่ออกสอบบ่อยที่สุด" },
            { id: 24, title: "ด้านขนานซับซ้อน", detail: "ฐาน 20, สูงครึ่งหนึ่งของฐาน (10) พื้นที่ = 20 x 10 = 200", tip: "อ่านโจทย์ให้ละเอียด ตีความโจทย์ปัญหาเป็นสมการก่อนเสมอ" },
            { id: 25, title: "วงกลมทศนิยม", detail: "(22/7) x 3.5 x 3.5 = 22 x 0.5 x 3.5 = 11 x 3.5 = 38.5", tip: "เปลี่ยนทศนิยมเป็นเศษส่วนจะช่วยให้ตัดทอนกับค่า π ได้ง่ายขึ้น" }
        ];

        const container = document.getElementById('teaching-area');
        teacherData.forEach(item => {
            container.innerHTML += `<div class="step-box">
                <h3>ข้อที่ ${item.id}: ${item.title}</h3>
                <p><strong>วิธีทำ:</strong> ${item.detail}</p>
                <div class="teacher-tip">💡 คำแนะนำสำหรับครู: ${item.tip}</div>
            </div>`;
        });
    </script>
</body>
</html>
