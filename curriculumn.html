<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pronunciation Practice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 40px;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: auto;
        }
        h1 { color: #2c3e50; text-align: center; }
        .instruction { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .sentence {
            padding: 10px 15px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #3498db;
        }
        .sentence:hover {
            background: #e1f5fe;
            transform: translateX(10px);
            border-left: 4px solid #2980b9;
        }
        .sentence:active { background: #b3e5fc; }
        .paragraph-gap { margin-bottom: 25px; }
        .highlight { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎙️ Practice American English</h1>
    <p class="instruction">คลิกที่ประโยคเพื่อฟังสำเนียง American English</p>

    <div id="content">
        </div>

    <script>
        const textData = [
            "Hello everyone!",
            "Are you an expat parent with children studying here in Thailand?",
            "As they hit Grade 5, are you worried about their academic foundation, or perhaps the upcoming entrance exams for Grade 7?",
            "BREAK",
            "At Phra Chom Klao Tutor, we have a special message for you: Your child is more than welcome here!",
            "We’ve designed a Summer Course that doesn’t just teach, but 'bridges' the gap, ensuring your child thrives alongside their Thai peers.",
            "BREAK",
            "Our 6-week intensive program starting March 16th focuses on three pillars:",
            "BREAK",
            "First, English - Rebuild and Converse.",
            "We go back to basics from Grade 1 to 5 to clear up any confusion in grammar and vocabulary.",
            "We turn textbook knowledge into real-life conversations.",
            "BREAK",
            "Second, Science - Academic Excellence.",
            "We dive deep into the Grade 5 curriculum and tackle real entrance exam problems, giving them a massive head start for the new semester.",
            "BREAK",
            "And third, Modern IT and AI Creator.",
            "This is our highlight!",
            "Every day, we teach kids to use world-class AI like Gemini and Grok as study partners.",
            "They’ll also learn to create animations, Line stickers, and even basic content creation.",
            "BREAK",
            "We understand the language barrier can be a concern.",
            "That’s why we provide personalized support, ensuring your child never feels left behind while they learn and socialize with their Thai classmates.",
            "We also use Interactive HTML Testing that analyzes your child’s weaknesses instantly to help them improve faster.",
            "BREAK",
            "The course runs for 6 weeks, Monday to Thursday, from 1:00 PM to 3:00 PM.",
            "That’s 48 hours of high-quality learning for just 2,900 Baht for the entire course.",
            "BREAK",
            "We are located at Nai Mueang, right opposite Ramrome Valley.",
            "BREAK",
            "Give your child the 'AI Advantage' and a rock-solid academic foundation this summer.",
            "Spaces are filling up fast!",
            "You can call or Line us at 0-9-0, 9-0-1, 2-4-2-2, or simply Inbox us right now.",
            "BREAK",
            "At Phra Chom Klao Tutor, we grow together.",
            "See you there!"
        ];

        const container = document.getElementById('content');

        textData.forEach(text => {
            if (text === "BREAK") {
                const gap = document.createElement('div');
                gap.className = 'paragraph-gap';
                container.appendChild(gap);
            } else {
                const div = document.createElement('div');
                div.className = 'sentence';
                div.innerText = text;
                div.onclick = () => speak(text);
                container.appendChild(div);
            }
        });

        function speak(message) {
            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(message);
            
            // Set voice to American English
            const voices = window.speechSynthesis.getVoices();
            // Try to find a US English voice
            const usVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en_US');
            if (usVoice) utterance.voice = usVoice;

            utterance.lang = 'en-US';
            utterance.rate = 0.9; // Slightly slower for clarity
            utterance.pitch = 1;
            
            window.speechSynthesis.speak(utterance);
        }

        // Chrome needs this to load voices correctly
        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Voices loaded");
        };
    </script>
</body>
</html>
