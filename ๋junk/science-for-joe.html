<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบวิทยาศาสตร์ ป.5 (60 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <style>
        :root { --main: #004aad; --sub: #ff9100; --bg: #f0f2f5; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--main); margin-bottom: 30px; padding-bottom: 10px; }
        .q-card { margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; position: relative; }
        .q-text { font-size: 18px; font-weight: bold; color: var(--main); margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn { padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; transition: 0.2s; font-size: 16px; }
        .opt-btn:hover { background: #fdf2e9; border-color: var(--sub); }
        .explain-box { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 15px; border-left: 5px solid; }
        .correct-ans { background: #d4edda; color: #155724; border-color: #28a745; }
        .wrong-ans { background: #f8d7da; color: #721c24; border-color: #dc3545; }
        #score-panel { display: none; text-align: center; background: var(--main); color: white; padding: 40px; border-radius: 15px; margin-top: 30px; }
        .btn-finish { display: block; width: 100%; padding: 20px; background: var(--sub); color: white; border: none; border-radius: 10px; font-size: 22px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧪 ข้อสอบปลายภาค วิทยาศาสตร์ ป.5 (60 ข้อ)</h1>
        <p>จัดทำโดย <b>พระจอมเกล้าติวเตอร์</b> | เขียนโดย CHINPONG SMART FARM</p>
    </div>

    <div id="quiz-list"></div>

    <button class="btn-finish" id="btn-submit" onclick="showResult()">ส่งคำตอบและสรุปคะแนน</button>

    <div id="score-panel">
        <h2>📊 สรุปผลการสอบ</h2>
        <h1 id="total-score" style="font-size: 60px;">0 / 60</h1>
        <div id="weak-point" style="text-align: left; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px;"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">ทำใหม่อีกครั้ง</button>
    </div>
</div>

<script>
const data = [
    // 1-15: การเปลี่ยนแปลงของสาร
    { q: "การทำนาเกลือเป็นการใช้ประโยชน์จากการเปลี่ยนแปลงสถานะใด?", a: ["การหลอมเหลว", "การระเหยแห้ง", "การควบแน่น", "การแข็งตัว"], c: 1, e: "<b>ถูกเพราะ:</b> น้ำทะเลระเหยไปเหลือเพียงเกลือ <br><b>ข้ออื่นผิดเพราะ:</b> ไม่มีการเปลี่ยนสถานะกลับเป็นของแข็งด้วยความเย็น" },
    { q: "ข้อใดเป็นการเปลี่ยนแปลงทางเคมีทั้งหมด?", a: ["จุดธูป, เหล็กเกิดสนิม", "น้ำแข็งละลาย, ต้มน้ำ", "หั่นผัก, ตำพริก", "เกลือละลายน้ำ, ปั้นดินน้ำมัน"], c: 0, e: "<b>ถูกเพราะ:</b> ทั้งการจุดธูปและเกิดสนิมได้สารใหม่ (ขี้เถ้า, สนิม)" },
    { q: "การบูรที่วางไว้ในตู้เสื้อผ้ามีขนาดเล็กลง เกิดจากกระบวนการใด?", a: ["การระเหย", "การระเหิด", "การหลอมเหลว", "การควบแน่น"], c: 1, e: "<b>ถูกเพราะ:</b> การระเหิดคือของแข็งเปลี่ยนเป็นแก๊สโดยไม่ผ่านของเหลว" },
    { q: "เมื่อผสมน้ำส้มสายชูกับผงฟู จะสังเกตเห็นสิ่งใดที่ยืนยันว่าเกิดปฏิกิริยาเคมี?", a: ["สารละลายใสขึ้น", "มีฟองแก๊สเกิดขึ้น", "อุณหภูมิคงที่", "สารรวมเป็นเนื้อเดียว"], c: 1, e: "<b>ถูกเพราะ:</b> ฟองแก๊ส $CO_2$ คือสารใหม่ที่เกิดขึ้น" },
    { q: "ข้อใดคือการเปลี่ยนสถานะแบบ 'ดูดความร้อน'?", a: ["การแข็งตัว", "การควบแน่น", "การระเหิดกลับ", "การหลอมเหลว"], c: 3, e: "<b>ถูกเพราะ:</b> การหลอมเหลวต้องรับความร้อนเข้าไปเพื่อทำลายแรงยึดเหนี่ยว" },
    { q: "การทำไอศกรีมหลอดต้องใช้น้ำแข็งผสมเกลือเพื่อให้ได้ความเย็นจัด เป็นการเปลี่ยนแปลงทางใด?", a: ["กายภาพ", "เคมี", "ชีวภาพ", "นิวเคลียร์"], c: 0, e: "<b>ถูกเพราะ:</b> เป็นเพียงการเปลี่ยนสถานะของน้ำเป็นน้ำแข็ง" },
    { q: "ข้อใดผันกลับ 'ไม่ได้'?", a: ["การหลอมเหลวเทียนไข", "การระเหยของแอลกอฮอล์", "การสุกของมะม่วง", "การละลายของน้ำตาล"], c: 2, e: "<b>ถูกเพราะ:</b> ผลไม้สุกเปลี่ยนองค์ประกอบภายในกลับไปดิบไม่ได้" },
    { q: "ฝนเกิดจากกระบวนการใดในวัฏจักรน้ำ?", a: ["การระเหย", "การควบแน่น", "การแข็งตัว", "การระเหิดกลับ"], c: 1, e: "<b>ถูกเพราะ:</b> ไอน้ำกระทบความเย็นกลายเป็นหยดน้ำ" },
    { q: "ถ้าต้องการให้สารละลายเร็วขึ้น ควรทำอย่างไร?", a: ["ลดอุณหภูมิ", "เพิ่มขนาดสาร", "การคนสาร", "ใช้ภาชนะขนาดเล็ก"], c: 2, e: "<b>ถูกเพราะ:</b> การคนช่วยเพิ่มการสัมผัสระหว่างตัวละลายและตัวทำละลาย" },
    { q: "ข้อใดไม่ใช่สารละลาย?", a: ["น้ำเกลือ", "น้ำเชื่อม", "น้ำแป้งสุก", "น้ำส้มสายชู"], c: 2, e: "<b>ถูกเพราะ:</b> น้ำแป้งสุกเป็นสารแขวนลอยหรือคอลลอยด์ ไม่ใช่สารเนื้อเดียวสมบูรณ์" },
    { q: "การเผาป่าส่งผลเสียต่อสิ่งแวดล้อมเพราะเกิดสารใหม่ชนิดใด?", a: ["แก๊สออกซิเจน", "แก๊สคาร์บอนไดออกไซด์", "ไอน้ำ", "แก๊สไนโตรเจน"], c: 1, e: "<b>ถูกเพราะ:</b> การเผาไหม้สมบูรณ์ให้ $CO_2$ ซึ่งเป็นแก๊สเรือนกระจก" },
    { q: "น้ำแข็งแห้ง (Dry Ice) ทำมาจากแก๊สชนิดใด?", a: ["ออกซิเจน", "ไนโตรเจน", "คาร์บอนไดออกไซด์", "ไฮโดรเจน"], c: 2, e: "<b>ถูกเพราะ:</b> คือ $CO_2$ ในสถานะของแข็ง" },
    { q: "การทำขนมครกเป็นการเปลี่ยนแปลงสถานะแบบใด?", a: ["ของเหลวเป็นของแข็ง", "ของแข็งเป็นของเหลว", "แก๊สเป็นของแข็ง", "ของเหลวเป็นแก๊ส"], c: 0, e: "<b>ถูกเพราะ:</b> แป้งเหลวได้รับความร้อนจนเซตตัวเป็นของแข็ง" },
    { q: "สารในข้อใดละลายน้ำได้ดีที่สุด?", a: ["ทราย", "น้ำมันพืช", "เกลือแกง", "ดินร่วน"], c: 2, e: "<b>ถูกเพราะ:</b> เกลือมีสมบัติแตกตัวเป็นไอออนในน้ำได้ดี" },
    { q: "ข้อใดคือความหมายของ 'ตัวทำละลาย'?", a: ["สารที่มีปริมาณน้อยกว่า", "สารที่มีปริมาณมากกว่า", "สารที่เป็นของแข็งเสมอ", "สารที่เป็นแก๊สเสมอ"], c: 1, e: "<b>ถูกเพราะ:</b> ในสารละลายสถานะเดียวกัน สารที่มีปริมาณมากกว่าคือตัวทำละลาย" },

    // 16-30: แรงและแรงเสียดทาน
    { q: "ถ้าผลรวมของแรงที่กระทำต่อวัตถุที่หยุดนิ่งมีค่าเป็นศูนย์ วัตถุจะเป็นอย่างไร?", a: ["เคลื่อนที่เร็วขึ้น", "เคลื่อนที่ช้าลง", "หยุดนิ่งเหมือนเดิม", "เคลื่อนที่ถอยหลัง"], c: 2, e: "<b>ถูกเพราะ:</b> ตามกฎของนิวตัน แรงลัพธ์เป็นศูนย์วัตถุจะรักษาภาวะเดิม" },
    { q: "หน่วยของแรงคืออะไร?", a: ["กิโลกรัม", "นิวตัน", "เมตร", "วินาที"], c: 1, e: "<b>ถูกเพราะ:</b> ตั้งชื่อเพื่อเป็นเกียรติแก่ เซอร์ ไอแซก นิวตัน" },
    { q: "แรงเสียดทานจะมีทิศทางอย่างไรกับการเคลื่อนที่?", a: ["ทิศเดียวกัน", "ทิศตั้งฉาก", "ทิศตรงข้าม", "ทิศใดก็ได้"], c: 2, e: "<b>ถูกเพราะ:</b> แรงเสียดทานคือแรงที่ต้านทานการเคลื่อนที่" },
    { q: "ถ้าต้องการเพิ่มแรงเสียดทานบนถนนที่ลื่น ควรทำอย่างไร?", a: ["ราดน้ำมัน", "โรยทราย", "ขัดพื้นให้เงา", "ใช้น้ำสบู่ถู"], c: 1, e: "<b>ถูกเพราะ:</b> ทรายช่วยเพิ่มความขรุขระให้ผิวสัมผัส" },
    { q: "วัตถุที่มีมวลมาก จะมีผลต่อการเคลื่อนที่อย่างไร?", a: ["เคลื่อนที่ง่าย", "แรงเสียดทานน้อย", "เคลื่อนที่ยาก", "น้ำหนักน้อย"], c: 2, e: "<b>ถูกเพราะ:</b> มวลมากมีความเฉื่อยมากและมีแรงกดลงบนพื้นมากทำให้แรงเสียดทานมาก" },
    { q: "การใช้น้ำมันหล่อลื่นในเครื่องยนต์มีวัตถุประสงค์เพื่ออะไร?", a: ["เพิ่มความร้อน", "ลดแรงเสียดทาน", "เพิ่มแรงเสียดทาน", "ทำให้เครื่องยนต์หนักขึ้น"], c: 1, e: "<b>ถูกเพราะ:</b> ช่วยให้ชิ้นส่วนโลหะไม่สัมผัสกันโดยตรง" },
    { q: "เด็กสองคนช่วยกันผลักตู้ไปทางขวา คนแรกออกแรง 20N คนที่สอง 30N แรงลัพธ์คือเท่าใด?", a: ["10N", "50Nไปทางขวา", "50Nไปทางซ้าย", "0N"], c: 1, e: "<b>ถูกเพราะ:</b> ทิศเดียวกันนำแรงมาบวกกัน $20 + 30 = 50N$" },
    { q: "ถ้าดึงวัตถุไปทางซ้าย แรงเสียดทานจะไปทางไหน?", a: ["บน", "ล่าง", "ซ้าย", "ขวา"], c: 3, e: "<b>ถูกเพราะ:</b> ต้องสวนทางกับการดึง" },
    { q: "นักกีฬาวิ่งต้องใส่รองเท้ามีตะปูใต้รองเท้า (Spike) เพื่ออะไร?", a: ["ลดแรงเสียดทาน", "เพิ่มความสวยงาม", "เพิ่มแรงเสียดทาน", "ลดน้ำหนักรองเท้า"], c: 2, e: "<b>ถูกเพราะ:</b> ช่วยให้ยึดเกาะลู่วิ่งได้ดี ไม่ลื่นไถล" },
    { q: "ตาชั่งสปริงใช้วัดค่าอะไร?", a: ["มวล", "ปริมาตร", "น้ำหนัก (แรงดึงดูด)", "ความหนาแน่น"], c: 2, e: "<b>ถูกเพราะ:</b> วัดแรงที่โลกดึงดูดวัตถุในหน่วยนิวตัน" },
    { q: "ข้อใดช่วยลดแรงเสียดทาน?", a: ["ใช้รถลากที่มีล้อ", "การทำพื้นบันไดให้ขรุขระ", "การใช้เบรกจักรยาน", "การใส่รองเท้าผ้าใบ"], c: 0, e: "<b>ถูกเพราะ:</b> ล้อเปลี่ยนแรงเสียดทานแบบไถลเป็นแบบกลิ้งซึ่งน้อยกว่า" },
    { q: "ถ้าออกแรง 5N ผลักกำแพงแล้วกำแพงไม่ขยับ แรงลัพธ์ที่กำแพงคือเท่าใด?", a: ["5N", "10N", "0N", "-5N"], c: 2, e: "<b>ถูกเพราะ:</b> วัตถุหยุดนิ่งแสดงว่าแรงลัพธ์ที่มากระทำต่อวัตถุรวมแล้วเป็นศูนย์" },
    { q: "พื้นผิวชนิดใดมีแรงเสียดทานมากที่สุด?", a: ["แผ่นกระจก", "กระเบื้องมัน", "พื้นหญ้าขรุขระ", "โต๊ะไม้ขัดเงา"], c: 2, e: "<b>ถูกเพราะ:</b> ความขรุขระเพิ่มพื้นที่ผิวสัมผัสที่ต้านการเคลื่อนที่" },
    { q: "การปั่นจักรยานบนถนนเปียกทำไมถึงล้มง่าย?", a: ["แรงเสียดทานน้อยเกินไป", "แรงเสียดทานมากเกินไป", "รถเบาลง", "ล้อขยายตัว"], c: 0, e: "<b>ถูกเพราะ:</b> น้ำไปลดแรงเสียดทานระหว่างยางกับถนน" },
    { q: "เครื่องบินถูกออกแบบให้หัวแหลมเพื่ออะไร?", a: ["ให้ดูสวยงาม", "ลดแรงต้านอากาศ", "บรรทุกคนได้มากขึ้น", "บินได้ช้าลง"], c: 1, e: "<b>ถูกเพราะ:</b> ทรงเพรียวลมช่วยให้ผ่านอากาศได้ง่ายขึ้น (ลดแรงเสียดทานของอากาศ)" },

    // 31-45: เสียงและการได้ยิน
    { q: "เสียงเกิดขึ้นได้อย่างไร?", a: ["การเคลื่อนที่ของอากาศ", "การสั่นสะเทือนของวัตถุ", "การสะท้อนของแสง", "การดูดกลืนพลังงาน"], c: 1, e: "<b>ถูกเพราะ:</b> แหล่งกำเนิดต้องสั่นจึงจะเกิดคลื่นเสียง" },
    { q: "ตัวกลางใดเสียงเดินทางได้ 'ช้าที่สุด'?", a: ["เหล็ก", "น้ำ", "อากาศ", "ทองแดง"], c: 2, e: "<b>ถูกเพราะ:</b> อากาศเป็นแก๊ส อนุภาคห่างกันมากที่สุด" },
    { q: "อวัยวะใดรับการสั่นสะเทือนของเสียงในหู?", a: ["ใบหู", "เยื่อแก้วหู", "เส้นประสาท", "รูหู"], c: 1, e: "<b>ถูกเพราะ:</b> เยื่อแก้วหูจะสั่นตามคลื่นเสียงที่เข้ามากระทบ" },
    { q: "หน่วยวัดความดังของเสียงคืออะไร?", a: ["เฮิรตซ์", "เมตร/วินาที", "เดซิเบล", "นิวตัน"], c: 2, e: "<b>ถูกเพราะ:</b> เดซิเบล (dB) ใช้บอกระดับความเข้มเสียง" },
    { q: "เสียงสูงเกิดจากปัจจัยใด?", a: ["แหล่งกำเนิดสั่นช้า", "แหล่งกำเนิดสั่นเร็ว", "แหล่งกำเนิดขนาดใหญ่", "ใช้แรงสั่นมาก"], c: 1, e: "<b>ถูกเพราะ:</b> สั่นเร็ว = ความถี่สูง = เสียงสูง" },
    { q: "ถ้าดีดกีตาร์เส้นที่ 'หนา' กว่าเส้นอื่น จะได้เสียงแบบใด?", a: ["เสียงสูง", "เสียงต่ำ", "เสียงดัง", "เสียงค่อย"], c: 1, e: "<b>ถูกเพราะ:</b> มวลมากสั่นช้าทำให้เกิดเสียงต่ำ" },

let userAnswers = new Array(60).fill(null);

function render() {
    const container = document.getElementById('quiz-list');
    data.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <div class="q-text">${i+1}. ${item.q}</div>
            <div class="options" id="opts-${i}">
                ${item.a.map((opt, idx) => `
                    <button class="opt-btn" onclick="checkAnswer(${i}, ${idx})">${opt}</button>
                `).join('')}
            </div>
            <div id="exp-${i}" class="explain-box"></div>
        `;
        container.appendChild(card);
    });
}

window.checkAnswer = function(qIdx, optIdx) {
    if (userAnswers[qIdx] !== null) return;
    
    userAnswers[qIdx] = optIdx;
    const isCorrect = optIdx === data[qIdx].c;
    const btns = document.getElementById(`opts-${qIdx}`).querySelectorAll('.opt-btn');
    const exp = document.getElementById(`exp-${qIdx}`);
    
    btns[optIdx].classList.add(isCorrect ? 'correct-ans' : 'wrong-ans');
    if (!isCorrect) btns[data[qIdx].c].classList.add('correct-ans');
    
    exp.innerHTML = data[qIdx].e;
    exp.classList.add(isCorrect ? 'correct-ans' : 'wrong-ans');
    exp.style.display = 'block';
}

window.showResult = function() {
    const answered = userAnswers.filter(a => a !== null).length;
    if (answered < 60) {
        alert(`น้องๆ ยังทำไม่ครบครับ! (ทำไปแล้ว ${answered}/60 ข้อ)`);
        return;
    }
    
    let score = 0;
    let catScore = { chem: 0, force: 0, sound: 0, star: 0 };
    
    userAnswers.forEach((ans, i) => {
        if(ans === data[i].c) {
            score++;
        } else {
            if(i < 15) catScore.chem++;
            else if(i < 30) catScore.force++;
            else if(i < 45) catScore.sound++;
            else catScore.star++;
        }
    });
    
    document.getElementById('btn-submit').style.display = 'none';
    const panel = document.getElementById('score-panel');
    panel.style.display = 'block';
    document.getElementById('total-score').innerText = `${score} / 60`;
    
    let analysis = "<b>🔍 วิเคราะห์จุดอ่อนรายบุคคล:</b><br>";
    if(catScore.chem > 3) analysis += "- เรื่อง 'การเปลี่ยนแปลงของสาร' น้องยังสับสนระหว่างกายภาพและเคมีนะ<br>";
    if(catScore.force > 3) analysis += "- เรื่อง 'แรงเสียดทานและแรงลัพธ์' ลองทบทวนทิศทางของแรงดูใหม่นะ<br>";
    if(catScore.sound > 3) analysis += "- เรื่อง 'เสียง' น้องต้องแยกแยะระหว่างความดังและความสูงต่ำให้แม่นนะ<br>";
    if(catScore.star > 3) analysis += "- เรื่อง 'ดาราศาสตร์' อย่าลืมทบทวนการใช้แผนที่ดาวและมุมเงยนะ<br>";
    if(score === 60) analysis = "🌟 <b>สมบูรณ์แบบ!</b> น้องคือสุดยอดนักวิทยาศาสตร์ตัวน้อย เตรียมรับเกรด 4 ได้เลย!";
    
    document.getElementById('weak-point').innerHTML = analysis;
    panel.scrollIntoView({behavior: 'smooth'});
}

render();
</script>
