<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบศิลปะ ป.5 (50 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 10px solid #e67e22; }
        h1 { text-align: center; color: #d35400; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .section-header { background: #e67e22; color: white; padding: 10px 15px; border-radius: 5px; margin: 25px 0 15px 0; font-weight: bold; }
        .q-box { margin-bottom: 20px; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .q-text { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
        .opt-btn { padding: 10px; border: 2px solid #f1f2f6; background: #fff; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { border-color: #e67e22; background: #fff5eb; }
        .correct { background-color: #2ecc71 !important; border-color: #27ae60 !important; color: white; }
        .wrong { background-color: #e74c3c !important; border-color: #c0392b !important; color: white; }
        .ans-note { display: none; margin-top: 10px; padding: 10px; border-left: 4px solid #e67e22; background: #fef9e7; font-size: 0.9em; }
        .submit-btn { display: block; width: 100%; padding: 20px; background: #d35400; color: white; border: none; border-radius: 10px; font-size: 1.4em; cursor: pointer; margin-top: 30px; font-weight: bold; }
        #result-area { display: none; text-align: center; padding: 30px; background: #2c3e50; color: white; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 ข้อสอบวิชาศิลปะ ป.5 (50 ข้อ)</h1>
    <p class="subtitle">ทัศนศิลป์ | ดนตรี | นาฏศิลป์ | โดย พระจอมเกล้าติวเตอร์</p>

    <div class="section-header">ส่วนที่ 1: ทัศนศิลป์ (จังหวะ ตำแหน่ง และความสมดุล)</div>
    
    <script>
        const questions = [
            { q: "การจัดวางองค์ประกอบศิลป์ที่ทำให้ภาพดูไม่เอียงไปด้านใดด้านหนึ่ง เรียกว่าอะไร?", a: ["ความสมดุล", "จังหวะ", "เอกภาพ", "จุดเด่น"], c: 0, n: "ความสมดุล (Balance) คือการจัดวางน้ำหนักในภาพให้เท่ากันครับ" },
            { q: "การวาดภาพดอกไม้เรียงต่อกันไปเรื่อยๆ อย่างสม่ำเสมอ จัดเป็นทัศนธาตุเรื่องใด?", a: ["ตำแหน่ง", "จังหวะ", "ความลึก", "แสงเงา"], c: 1, n: "จังหวะ (Rhythm) เกิดจากการซ้ำกันของรูปทรงหรือเส้นครับ" },
            { q: "ภาพที่มีซ้ายและขวาเหมือนกันทุกประการ เรียกว่าความสมดุลแบบใด?", a: ["สมดุลแบบไม่เท่ากัน", "สมดุลแบบซ้ายขวาเท่ากัน", "สมดุลแบบวงกลม", "สมดุลแบบจุดศูนย์กลาง"], c: 1 },
            { q: "การวาง 'จุดสนใจ' ของภาพไว้บริเวณกึ่งกลางภาพพอดี เกี่ยวข้องกับเรื่องใด?", a: ["ตำแหน่ง", "พื้นผิว", "พื้นที่ว่าง", "เส้น"], c: 0 },
            { q: "หากต้องการวาดภาพให้ดูมีความเคลื่อนไหว ควรเน้นเรื่องใด?", a: ["ความนิ่ง", "จังหวะที่ต่อเนื่อง", "สีโทนเย็น", "เส้นตรงดิ่ง"], c: 1 },
            { q: "ข้อใดคือการจัดตำแหน่งภาพที่ทำให้เกิด 'จุดเด่น'?", a: ["วาดทุกอย่างขนาดเท่ากันหมด", "วางสิ่งที่ต้องการเน้นให้แตกต่างจากส่วนอื่น", "ระบายสีจางๆ ทั้งภาพ", "วาดทับซ้อนกันจนมองไม่เห็นรูปทรง"], c: 1 },
            { q: "การวาดทางรถไฟที่ค่อยๆ เล็กลงจนหายไปที่จุดขอบฟ้า เป็นการใช้เรื่องใด?", a: ["จังหวะ", "ตำแหน่งและความลึก", "ความสมดุลแบบเท่ากัน", "พื้นผิว"], c: 1 },
            { q: "ทัศนศิลป์ในธรรมชาติข้อใดแสดง 'จังหวะ' ได้ชัดเจนที่สุด?", a: ["ก้อนหินก้อนเดียว", "ลวดลายบนตัวม้าลาย", "ท้องฟ้าสีคราม", "พื้นดินแห้งแล้ง"], c: 1 },
            { q: "สีคู่ตรงข้ามของสีแดงคือสีอะไร?", a: ["สีน้ำเงิน", "สีเขียว", "สีเหลือง", "สีส้ม"], c: 1 },
            { q: "การวาดภาพทิวทัศน์ให้มีระยะหน้า ระยะกลาง ระยะหลัง เกี่ยวข้องกับเรื่องใด?", a: ["จังหวะ", "ตำแหน่ง", "สีเอกรงค์", "พื้นผิวขรุขระ"], c: 1 },
            { q: "วัสดุอุปกรณ์ใดใช้ในการสร้างงานปั้น?", a: ["ดินน้ำมัน", "สีไม้", "กระดาษแก้ว", "พู่กัน"], c: 0 },
            { q: "แม่สีมีทั้งหมดกี่สี?", a: ["2 สี", "3 สี", "4 สี", "5 สี"], c: 1 },
            { q: "สีเหลืองผสมกับสีน้ำเงินจะได้สีอะไร?", a: ["สีม่วง", "สีเขียว", "สีส้ม", "สีน้ำตาล"], c: 1 },
            { q: "ข้อใดไม่ใช่ลักษณะของจังหวะในงานทัศนศิลป์?", a: ["จังหวะแบบสม่ำเสมอ", "จังหวะแบบไหลลื่น", "จังหวะแบบกระโดด", "จังหวะแบบไร้ทิศทาง"], c: 3 },
            { q: "ความรู้สึก 'มั่นคง' ในงานศิลปะมักเกิดจากความสมดุลแบบใด?", a: ["สมดุลซ้ายขวาเท่ากัน", "สมดุลซ้ายขวาไม่เท่ากัน", "การใช้สีสดใส", "การวาดภาพขนาดเล็ก"], c: 0 },

            // ตอนที่ 2 ดนตรี
            { q: "เครื่องหมายใดใช้กำหนดระดับเสียงของตัวโน้ตบนบรรทัด 5 เส้น?", a: ["กุญแจซอล", "ตัวหยุด", "เครื่องหมายพยัญชนะ", "เส้นกั้นห้อง"], c: 0, n: "กุญแจซอล (Treble Clef) เป็นตัวระบุว่าโน้ตตัวไหนคือเสียงซอลครับ" },
            { q: "โน้ตตัวกลม (Whole Note) มีค่าเท่ากับกี่จังหวะในอัตราจังหวะ 4/4?", a: ["1 จังหวะ", "2 จังหวะ", "3 จังหวะ", "4 จังหวะ"], c: 3 },
            { q: "สัญลักษณ์ 'ตัวหยุด' (Rest) ในทางดนตรีหมายถึงอะไร?", a: ["ให้ร้องเสียงดัง", "ให้หยุดเสียงชั่วขณะตามค่าตัวโน้ต", "ให้เลิกเล่นดนตรี", "ให้เริ่มบรรเลงใหม่"], c: 1 },
            { q: "โน้ตตัวใดมีค่าน้อยที่สุด?", a: ["ตัวกลม", "ตัวขาว", "ตัวดำ", "ตัวเขบ็ต 1 ชั้น"], c: 3 },
            { q: "บรรทัด 5 เส้น มีไว้เพื่ออะไร?", a: ["ไว้เขียนเนื้อร้อง", "ไว้บันทึกระดับเสียงตัวโน้ต", "ไว้กั้นจังหวะ", "ไว้ตกแต่งเล่มโน้ต"], c: 1 },
            { q: "เสียง 'โด เร มี ฟา ซอล ลา ที' เรียกว่าอะไร?", a: ["บันไดเสียง", "จังหวะ", "ทำนอง", "ประสานเสียง"], c: 0 },
            { q: "ข้อใดคือสัญลักษณ์ของ 'โน้ตตัวดำ'?", a: ["วงกลมโปร่ง", "วงกลมโปร่งมีหาง", "วงกลมทึบมีหาง", "วงกลมทึบมีหางและเบ็ด"], c: 2 },
            { q: "เครื่องดนตรีไทยชนิดใดอยู่ในประเภท 'เครื่องตี'?", a: ["ซอด้วง", "ขลุ่ยเพียงออ", "ระนาดเอก", "จะเข้"], c: 2 },
            { q: "ขลุ่ยเพียงออ จัดเป็นเครื่องดนตรีประเภทใด?", a: ["ดีด", "สี", "ตี", "เป่า"], c: 3 },
            { q: "เครื่องดนตรีสากลชนิดใดอยู่ในกลุ่ม 'เครื่องสาย' (Strings)?", a: ["ไวโอลิน", "ทรัมเป็ต", "เปียโน", "กลองชุด"], c: 0 },
            { q: "ความเร็ว-ช้าของบทเพลง เรียกว่าอะไร?", a: ["ระดับเสียง", "ความเข้มของเสียง", "จังหวะ (Tempo)", "ทำนอง"], c: 2 },
            { q: "เครื่องหมาย 'เส้นกั้นห้อง' มีหน้าที่อะไร?", a: ["แบ่งจังหวะเพลงเป็นห้องๆ", "แบ่งชื่อผู้แต่ง", "แบ่งระดับเสียงสูงต่ำ", "แบ่งเนื้อร้อง"], c: 0 },
            { q: "โน้ตตัวขาว มีค่าเป็นกี่เท่าของโน้ตตัวดำ?", a: ["0.5 เท่า", "2 เท่า", "3 เท่า", "4 เท่า"], c: 1 },
            { q: "อัตราจังหวะ 2 ชั้น หมายถึงจังหวะแบบใดในดนตรีไทย?", a: ["จังหวะช้า", "จังหวะปานกลาง", "จังหวะเร็ว", "จังหวะรัว"], c: 1 },
            { q: "การร้องเพลงร่วมกันโดยมีระดับเสียงต่างกัน เรียกว่าอะไร?", a: ["การร้องเดี่ยว", "การประสานเสียง", "การเอื้อน", "การไล่เสียง"], c: 1 },

            // ตอนที่ 3 นาฏศิลป์
            { q: "ข้อใดคือความหมายของ 'นาฏยศัพท์'?", a: ["คำที่ใช้เรียกชื่อท่ารำ", "คำที่ใช้เรียกคนดู", "ชื่ออาหารของนางรำ", "คำที่ใช้ด่านักแสดง"], c: 0, n: "นาฏยศัพท์ คือศัพท์เฉพาะที่ใช้ในวงการนาฏศิลป์ เช่น จีบ ตั้งวง ครับ" },
            { q: "การใช้นิ้วหัวแม่มือจรดข้อแรกของนิ้วชี้ นิ้วที่เหลือกรีดตึง เรียกว่าท่าอะไร?", a: ["ตั้งวง", "จีบ", "ล่อแก้ว", "ประเท้า"], c: 1 },
            { q: "การแบมือปลายนิ้วตึง โค้งลำแขนให้เป็นรูปครึ่งวงกลม เรียกว่าอะไร?", a: ["การตั้งวง", "การจีบ", "การสลัดมือ", "การคลายมือ"], c: 0 },
            { q: "ถ้าปลายนิ้วมืออยู่ระดับแง่ศีรษะ เรียกว่าการตั้งวงระดับใด?", a: ["ตั้งวงบน", "ตั้งวงกลาง", "ตั้งวงล่าง", "ตั้งวงหน้า"], c: 0 },
            { q: " 'ภาษาท่า' (Gesture) ในทางนาฏศิลป์ใช้เพื่ออะไร?", a: ["เพื่อความสนุกสนานอย่างเดียว", "เพื่อใช้แทนคำพูด อารมณ์ และกิริยา", "เพื่อออกกำลังกาย", "เพื่ออวดชุดแต่งกาย"], c: 1 },
            { q: "ท่ารำที่ใช้มือซ้ายแตะอก มือขวาแบมือไว้ข้างลำตัว หมายถึงตัวเรา (ฉัน) คือท่าใด?", a: ["ท่ารัก", "ท่าตัวเรา", "ท่าโกรธ", "ท่าอาย"], c: 1 },
            { q: "การใช้ฝ่ามือถูที่ใกล้ใบหูแล้วกระชากมือลง หมายถึงอารมณ์ใด?", a: ["ดีใจ", "โกรธ", "เศร้า", "อาย"], c: 1 },
            { q: "นาฏศิลป์ไทยที่เป็นเอกลักษณ์และได้รับยกย่องเป็นมรดกโลกคืออะไร?", a: ["เต้นกำรำเคียว", "โขน", "ฟ้อนเล็บ", "รำวง"], c: 1 },
            { q: " 'จีบหงาย' ต่างจาก 'จีบค่ำ' อย่างไร?", a: ["จีบหงายหันปลายนิ้วขึ้นฟ้า จีบค่ำคว่ำปลายนิ้วลงดิน", "จีบหงายใช้เท้า จีบค่ำใช้มือ", "จีบหงายใช้ข้างซ้าย จีบค่ำใช้ข้างขวา", "ไม่มีความแตกต่างกัน"], c: 0 },
            { q: "การจรดจมูกเท้าลงบนพื้นแล้วยกขึ้น เรียกว่านาฏยศัพท์ข้อใด?", a: ["ประเท้า", "ยกเท้า", "กระทุ้งเท้า", "ก้าวเท้า"], c: 0 },
            { q: "ท่ารำ 'พรหมสี่หน้า' อยู่ในรำมาตรฐานชุดใด?", a: ["รำวงมาตรฐาน", "แม่บทเล็ก", "รำสีนวล", "ฟ้อนเงี้ยว"], c: 1 },
            { q: "การตั้งวงกลาง ปลายนิ้วจะอยู่ระดับใด?", a: ["ระดับไหล่", "ระดับคิ้ว", "ระดับปาก", "ระดับชายพก"], c: 0 },
            { q: "ข้อใดคือมารยาทที่ดีในการชมนาฏศิลป์?", a: ["หัวเราะเยาะเมื่อนักแสดงรำผิด", "ปรบมือให้เกียรติก่อนและหลังการแสดง", "เดินไปหน้าเวทีเพื่อถ่ายรูป", "คุยโทรศัพท์เสียงดัง"], c: 1 },
            { q: "เพลงที่ใช้ประกอบการรำวงมาตรฐานเพลงแรกคือเพลงอะไร?", a: ["งามแสงเดือน", "ชาวไทย", "รำมาซิมารำ", "คืนเดือนหงาย"], c: 0 },
            { q: "ตัวละคร 'ยักษ์' ในการแสดงโขน มักมีลักษณะการตั้งวงแบบใด?", a: ["วงกว้างและกันเข่าออก", "วงแคบๆ", "จีบตลอดเวลา", "ไม่ต้องตั้งวง"], c: 0 },
            { q: "การนั่งคุกเข่าตัวตรง ส้นเท้าชิด ปลายเท้าตั้ง เรียกว่าท่าอะไร?", a: ["นั่งราบ", "นั่งคุกเข่าชุลมุน", "นั่งเทพบุตร/เทพธิดา", "นั่งพับเพียบ"], c: 2 },
            { q: "อวัยวะใดสำคัญที่สุดในการแสดงภาษาท่าทางนาฏศิลป์?", a: ["มือและแขน", "หู", "ผม", "ฟัน"], c: 0 },
            { q: "ระบำสุโขทัยเป็นการแสดงที่เลียนแบบจากสิ่งใด?", a: ["รูปปั้นและภาพสลักสมัยสุโขทัย", "การทำนา", "การต่อสู้", "นกยูง"], c: 0 },
            { q: "การจีบโดยปลายนิ้วชี้และนิ้วโป้งห่างกันเล็กน้อยแล้วสะบัดออก เรียกว่า?", a: ["จีบส่งหลัง", "จีบล่อแก้ว", "สลัดมือ", "คลายมือ"], c: 3 },
            { q: "คุณค่าของการเรียนศิลปะ ดนตรี นาฏศิลป์ คือข้อใด?", a: ["ทำให้ร่างกายแข็งแรงอย่างเดียว", "ช่วยขัดเกลาจิตใจและสืบสานวัฒนธรรม", "ทำให้เป็นคนรวย", "ทำให้กินข้าวอร่อย"], c: 1 }
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((item, index) => {
                let html = `<div class="q-box">
                    <div class="q-text">${index + 1}. ${item.q}</div>
                    <div class="options">`;
                item.a.forEach((opt, optIdx) => {
                    html += `<button class="opt-btn" onclick="checkAnswer(this, ${index}, ${optIdx})">${opt}</button>`;
                });
                html += `</div><div class="ans-note" id="n${index}"><b>เฉลย:</b> ${item.a[item.c]} ${item.n || ''}</div></div>`;
                document.write(html);
            });
        }
        renderQuiz();
    </script>

    <div id="quiz-container"></div>

    <button class="submit-btn" onclick="calculateScore()">ส่งข้อสอบและตรวจคะแนน</button>

    <div id="result-area">
        <h2>📊 สรุปคะแนนศิลปะ</h2>
        <div id="final-score" style="font-size: 3em; color: #f39c12; margin: 10px 0;">0 / 50</div>
        <p id="feedback-text"></p>
        <button onclick="location.reload()" style="background:white; color:#333; padding:10px 20px; border-radius:5px; border:none; cursor:pointer;">ทำใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    let currentScore = 0;
    let answeredCount = 0;

    function checkAnswer(btn, qIdx, choiceIdx) {
        const parent = btn.parentElement;
        const btns = parent.querySelectorAll('.opt-btn');
        if (btns[0].disabled) return;

        btns.forEach(b => b.disabled = true);
        answeredCount++;

        if (choiceIdx === questions[qIdx].c) {
            btn.classList.add('correct');
            currentScore++;
        } else {
            btn.classList.add('wrong');
            btns[questions[qIdx].c].classList.add('correct');
        }
        document.getElementById('n' + qIdx).style.display = 'block';
    }

    function calculateScore() {
        if(answeredCount < 50) {
            if(!confirm("น้องยังทำไม่ครบ 50 ข้อเลย จะส่งเลยไหมครับ?")) return;
        }
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-score').innerText = currentScore + " / 50";
        
        let msg = "";
        if(currentScore >= 45) msg = "สุดยอดศิลปินน้อย! น้องมีความเข้าใจในสุนทรียภาพดีเยี่ยมครับ";
        else if(currentScore >= 30) msg = "เก่งมากครับ! ลองทวนเรื่องนาฏยศัพท์และโน้ตดนตรีอีกนิดจะดีมาก";
        else msg = "พยายามต่อไปนะน้อง ศิลปะคือการฝึกฝนบ่อยๆ พี่เป็นกำลังใจให้ครับ!";
        
        document.getElementById('feedback-text').innerText = msg;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
