<div style="background: #edf2f7; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
    <label>⚡ Quick Import (วางข้อสอบหลายข้อพร้อมกัน)</label>
    <textarea id="bulk-input" rows="5" placeholder="รูปแบบ: 
1. คำถาม? , ตัวเลือก1, ตัวเลือก2, ตัวเลือก3, ตัวเลือก4, คำตอบที่ถูก(1-4)
2. คำถามต่อมา..."></textarea>
    <button class="btn" style="background: #4a5568; color: white; margin-top: 10px;" onclick="importBulk()">ดึงข้อมูลเข้าสู่รายการด้านล่าง</button>
</div>

<script>
    // ฟังก์ชันช่วย Parse ข้อความจำนวนมาก
    function importBulk() {
        const raw = document.getElementById('bulk-input').value;
        const lines = raw.split('\n');
        
        lines.forEach(line => {
            if (line.trim() === "") return;
            
            // แยกด้วยเครื่องหมาย , (Comma)
            const parts = line.split(',');
            if (parts.length >= 6) {
                const question = parts[0].replace(/^\d+\.\s*/, '').trim(); // ลบเลขข้อข้างหน้าออก
                const options = [parts[1].trim(), parts[2].trim(), parts[3].trim(), parts[4].trim()];
                const answer = parts[5].trim();
                
                createNewQuestionRow(question, options, answer);
            }
        });
        document.getElementById('bulk-input').value = ""; // เคลียร์ช่องหลังนำเข้า
    }

    function createNewQuestionRow(q, opts, ans) {
        questionCount++;
        const quizList = document.getElementById('quiz-list');
        const html = `
            <div class="quiz-item" id="q-box-${questionCount}">
                <button class="btn btn-remove" onclick="document.getElementById('q-box-${questionCount}').remove()">ลบ</button>
                <input type="text" class="q-text" value="${q}" placeholder="คำถาม">
                <input type="text" class="q-options" value="${opts.join(', ')}" placeholder="ตัวเลือก 1, 2, 3, 4">
                <input type="number" class="q-ans" value="${ans}" min="1" max="4">
            </div>
        `;
        quizList.insertAdjacentHTML('beforeend', html);
    }
</script>
