<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Vocab 151-300 - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Sarabun&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff7675; --s: #55efc4; --bg: #ffffff; }
        body { font-family: 'Lexend', 'Sarabun', sans-serif; background: #dfe6e9; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        h1 { text-align: center; color: #d63031; font-size: 2.5em; margin-bottom: 5px; }
        .sub { text-align: center; color: #636e72; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 50px; }
        .card { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--p); transform: translateY(-3px); background: #fff5f5; box-shadow: 0 5px 15px rgba(214, 48, 49, 0.1); }
        .card b { font-size: 1.2em; display: block; color: #2d3436; margin-bottom: 3px; }
        .card i { font-size: 0.75em; color: #b2bec3; }
        
        .cat-header { grid-column: 1 / -1; background: #636e72; color: white; padding: 8px 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; font-size: 1em; }

        .footer-challenge { background: #fab1a0; padding: 30px; border-radius: 25px; text-align: center; color: #2d3436; }
        .btn-speak { background: #d63031; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.1em; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 Phonics Challenge 151 - 300</h1>
    <p class="sub">รวบรวมคำศัพท์พื้นฐาน 150 คำใหม่ โดย CHINPONG SMART FARM</p>

    <div class="grid" id="vocab-grid">
        </div>

    <div class="footer-challenge">
        <h2>🎧 Speed Listening Test</h2>
        <p>คุณจำคำศัพท์ทั้ง 300 คำได้แม่นแค่ไหน? กดฟังแล้วพูดตามให้ทัน!</p>
        <button class="btn-speak" onclick="startRandom()">🔊 สุ่มคำศัพท์ 151-300</button>
        <div id="word-reveal" style="font-size: 3em; font-weight: bold; margin-top: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">? ? ?</div>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const wordsRaw = [
        "Shirt","Pants","Dress","Skirt","Sock","Shoe","Hat","Coat","Belt","Ring",
        "Door","Window","Floor","Wall","Roof","Lamp","Mirror","Soap","Towel","Spoon","Fork","Knife","Plate","Bowl","Glass",
        "Angry","Brave","Scared","Tired","Thirsty","Dirty","Clean","Soft","Hard","Heavy","Light","Full","Empty","Rich","Poor",
        "Earth","Sun","Moon","Star","Cloud","Rain","Snow","Storm","Wind","Fire","Water","Land","Sea","Mountain","Cave",
        "Left","Right","Up","Down","Inside","Outside","Between","Behind","Under","Above",
        "Fruit","Animal","Person","Money","Paper","Picture","Music","Song","Sound","Color","Shape","Square","Circle","Triangle","Heart",
        "Beach","Island","River","Lake","Forest","Garden","Farm","Park","City","Town",
        "Apple","Banana","Orange","Grape","Mango","Lemon","Candy","Bread","Butter","Cheese",
        "Doctor","Nurse","Police","Pilot","Chef","Teacher","Farmer","Worker","Driver","Singer",
        "Table","Chair","Desk","Bed","Sofa","Box","Cup","Bottle","Key","Watch",
        "Quiet","Loud","Fast","Slow","Small","Large","Short","Tall","Young","Old",
        "Happy","Sad","Good","Bad","Nice","Cool","Warm","Cold","Hot","New"
    ];

    const grid = document.getElementById('vocab-grid');
    
    // Create categories based on index (simplified for display)
    wordsRaw.forEach((w, i) => {
        if(i % 25 === 0) {
            const h = document.createElement('div');
            h.className = 'cat-header';
            h.innerText = "Group " + (Math.floor(i/25) + 1);
            grid.appendChild(h);
        }
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => {
            const u = new SpeechSynthesisUtterance(w);
            u.lang = 'en-US';
            u.rate = 0.9;
            synth.speak(u);
        };
        card.innerHTML = `<b>${w}</b><i>คลิกฟัง</i>`;
        grid.appendChild(card);
    });

    function startRandom() {
        const rand = wordsRaw[Math.floor(Math.random() * wordsRaw.length)];
        const u = new SpeechSynthesisUtterance(rand);
        u.lang = 'en-US';
        synth.speak(u);
        document.getElementById('word-reveal').innerText = rand;
    }
</script>
</body>
</html>
