const container = document.getElementById('quiz-container');

quizData.forEach((item, index) => {
    let qDiv = document.createElement('div');
    qDiv.className = 'question-block';
    qDiv.innerHTML = `
        <div class="question">${index + 1}. ${item.q}</div>
        <ul class="options">
            ${item.options.map((opt, i) => `
                <li><input type="radio" name="q${index}" value="${i}"> ${opt}</li>
            `).join('')}
        </ul>
        <button onclick="checkAnswer(${index})">ตรวจคำตอบ</button>
        <div id="result${index}" class="explanation"></div>
    `;
    container.appendChild(qDiv);
});

function checkAnswer(idx) {
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const resultDiv = document.getElementById(`result${idx}`);

        return;
    }
