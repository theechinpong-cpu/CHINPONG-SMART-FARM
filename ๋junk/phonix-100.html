<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vocab 51-100 - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Sarabun&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0984e3; --s: #00b894; --a: #fdcb6e; }
        body { font-family: 'Lexend', 'Sarabun', sans-serif; background: #dfe6e9; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--p); font-size: 2.5em; margin-bottom: 5px; }
        .sub { text-align: center; color: #636e72; margin-bottom: 30px; }
        
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 50px; }
        .word-card { background: #f9f9f9; border: 2px solid #eee; padding: 18px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .word-card:hover { border-color: var(--p); transform: translateY(-3px); background: #ebf5ff; }
        .word-card b { font-size: 1.4em; display: block; color: var(--p); }
        .word-card i { font-size: 0.8em; color: #b2bec3; }
        .cat-tag { grid-column: 1 / -1; background: var(--p); color: white; padding: 8px 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 1.1em; }

        .reading-challenge { background: #fff4e6; padding: 25px; border-radius: 20px; border: 2px solid #fab1a0; }
        .btn-speak { background: var(--s); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-speak:hover { background: #00a887; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Vocab 51 - 100 (Level Up)</h1>
    <p class="sub">ยกระดับการอ่านออกเสียง โดย CHINPONG SMART FARM</p>

    <div class="vocab-grid" id="vocab-grid">
        </div>

    <div class="reading-challenge">
        <h2>🎧 Practice Listening</h2>
        <p>กดปุ่มเพื่อฟังเสียงสุ่มจาก 50 คำนี้ แล้วลองทายดูว่าคือคำไหน!</p>
        <button class="btn-speak" onclick="playRandom()">🔊 สุ่มคำศัพท์</button>
        <div id="display-word" style="font-size: 2em; color: var(--p); margin-top: 10px; font-weight: bold;">? ? ?</div>
        <button id="reveal-btn" style="margin-top:10px; display:none;" onclick="reveal()">เฉลยคำศัพท์</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const words = [
        {w:"Head", c:"Body"}, {w:"Nose", c:"Body"}, {w:"Mouth", c:"Body"}, {w:"Teeth", c:"Body"}, {w:"Hand", c:"Body"},
        {w:"Foot", c:"Body"}, {w:"Knee", c:"Body"}, {w:"Ear", c:"Body"}, {w:"Eye", c:"Body"}, {w:"Arm", c:"Body"},
        {w:"Rain", c:"Nature"}, {w:"Snow", c:"Nature"}, {w:"Wind", c:"Nature"}, {w:"Cloud", c:"Nature"}, {w:"Sky", c:"Nature"},
        {w:"Moon", c:"Nature"}, {w:"Star", c:"Nature"}, {w:"River", c:"Nature"}, {w:"Tree", c:"Nature"}, {w:"Flower", c:"Nature"},
        {w:"Father", c:"People"}, {w:"Mother", c:"People"}, {w:"Brother", c:"People"}, {w:"Sister", c:"People"}, {w:"Baby", c:"People"},
        {w:"Friend", c:"People"}, {w:"Teacher", c:"People"}, {w:"Doctor", c:"People"}, {w:"Cook", c:"People"}, {w:"Nurse", c:"People"},
        {w:"Today", c:"Time/Place"}, {w:"Night", c:"Time/Place"}, {w:"Clock", c:"Time/Place"}, {w:"Under", c:"Time/Place"}, {w:"Over", c:"Time/Place"},
        {w:"Near", c:"Time/Place"}, {w:"Far", c:"Time/Place"}, {w:"Front", c:"Time/Place"}, {w:"Back", c:"Time/Place"}, {w:"Inside", c:"Time/Place"},
        {w:"Look", c:"Actions"}, {w:"Help", c:"Actions"}, {w:"Play", c:"Actions"}, {w:"Stop", c:"Actions"}, {w:"Open", c:"Actions"},
        {w:"Close", c:"Actions"}, {w:"Smile", c:"Actions"}, {w:"Cry", c:"Actions"}, {w:"Sleepy", c:"Feelings"}, {w:"Hungry", c:"Feelings"}
    ];

    const grid = document.getElementById('vocab-grid');
    let currentCat = "";
    let lastRandom = "";

    words.forEach(item => {
        if(item.c !== currentCat) {
            currentCat = item.c;
            const h = document.createElement('div');
            h.className = 'cat-tag';
            h.innerText = "Category: " + currentCat;
            grid.appendChild(h);
        }
        const card = document.createElement('div');
        card.className = 'word-card';
        card.onclick = () => {
            const u = new SpeechSynthesisUtterance(item.w);
            u.lang = 'en-US';
            u.rate = 0.8;
            synth.speak(u);
        };
        card.innerHTML = `<b>${item.w}</b><i>Tap to hear</i>`;
        grid.appendChild(card);
    });

    function playRandom() {
        const rand = words[Math.floor(Math.random() * words.length)].w;
        lastRandom = rand;
        const u = new SpeechSynthesisUtterance(rand);
        u.lang = 'en-US';
        synth.speak(u);
        document.getElementById('display-word').innerText = "? ? ?";
        document.getElementById('reveal-btn').style.display = "inline-block";
    }

    function reveal() {
        document.getElementById('display-word').innerText = lastRandom;
        document.getElementById('reveal-btn').style.display = "none";
    }
</script>
</body>
</html>
