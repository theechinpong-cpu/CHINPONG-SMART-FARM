<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>ข้อสอบวิทยาศาสตร์ ป.5 (60 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a5fb4; text-align: center; border-bottom: 3px solid #1a5fb4; padding-bottom: 10px; }
        .author { text-align: center; font-size: 0.9em; color: #666; margin-bottom: 30px; }
        .q-card { margin-bottom: 25px; padding: 20px; border: 1px solid #e1e8ed; border-radius: 12px; background: #fff; }
        .q-title { font-weight: bold; font-size: 1.1em; color: #2c3e50; margin-bottom: 15px; }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 12px 15px; border: 2px solid #d1d9e0; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 1em; transition: 0.3s; }
        .opt-btn:hover { background: #f0f7ff; border-color: #1a5fb4; }
        .correct { background-color: #27ae60 !important; color: white; border-color: #1e8449 !important; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b !important; }
        .feedback { display: none; margin-top: 15px; padding: 15px; background: #fff9db; border-left: 5px solid #f1c40f; border-radius: 5px; }
        #final-score { display: none; text-align: center; margin-top: 30px; padding: 30px; background: #e8f5e9; border-radius: 15px; }
        .btn-submit { display: block; width: 100%; padding: 20px; background: #1a5fb4; color: white; border: none; border-radius: 10px; font-size: 1.3em; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 ข้อสอบวิทยาศาสตร์ ป.5 (60 ข้อ)</h1>
    <p class="author">โดย พระจอมเกล้าติวเตอร์ | เขียนโดย CHINPONG SMART FARM</p>
    
    <div id="quiz-area">
        </div>

    <button class="btn-submit" onclick="showTotal()">ส่งข้อสอบและวิเคราะห์ผล</button>

    <div id="final-score">
        <h2 id="score-text"></h2>
        <div id="analysis"></div>
    </div>
</div>

<script>
const quizData = [
    { q: "1. การปลูกพืชโดยใช้สำลีแทนดินเพื่อศึกษาการงอกของเมล็ด 'สำลี' จัดเป็นตัวแปรชนิดใด?", opts: ["ตัวแปรต้น", "ตัวแปรตาม", "ตัวแปรควบคุม", "ตัวแปรอิสระ"], ans: 2, exp: "เพราะสำลีต้องจัดให้เหมือนกันทุกชุดทดลองเพื่อให้ผลการทดลองน่าเชื่อถือครับ" },
    { q: "2. การทดลองเรื่อง 'ปริมาณแสงมีผลต่อการเจริญเติบโตของพืชหรือไม่' ตัวแปรต้นคืออะไร?", opts: ["ชนิดของพืช", "ปริมาณแสง", "ความสูงของพืช", "ปริมาณน้ำ"], ans: 1, exp: "ตัวแปรต้นคือสิ่งที่เราจัดให้ต่างกัน ในที่นี้คือปริมาณแสงครับ" },
    { q: "3. แรงลัพธ์คืออะไร?", opts: ["แรงที่ทำให้วัตถุหยุดนิ่งเท่านั้น", "ผลรวมของแรงหลายแรงที่กระทำต่อวัตถุ", "แรงที่ต้านการเคลื่อนที่", "แรงดึงดูดของโลก"], ans: 1, exp: "แรงลัพธ์คือผลรวมทั้งหมดของแรงที่กระทำต่อวัตถุหนึ่งๆ ครับ" },
    { q: "4. แรง 20 นิวตัน และ 10 นิวตัน ผลักวัตถุไปทางซ้ายทั้งคู่ แรงลัพธ์จะมีค่าเท่าใด?", opts: ["10 นิวตัน ไปทางซ้าย", "30 นิวตัน ไปทางขวา", "30 นิวตัน ไปทางซ้าย", "10 นิวตัน ไปทางขวา"], ans: 2, exp: "ทิศเดียวกันจับบวกกัน: 20 + 10 = 30 และไปทางทิศเดิมคือซ้ายครับ" },
    { q: "5. หากออกแรง 5 นิวตันไปทางขวา และ 5 นิวตันไปทางซ้าย วัตถุจะเคลื่อนที่อย่างไร?", opts: ["ไปทางขวา", "ไปทางซ้าย", "หยุดนิ่ง", "เคลื่อนที่สลับไปมา"], ans: 2, exp: "แรงเท่ากันแต่ทิศตรงข้าม แรงลัพธ์เป็น 0 วัตถุจึงหยุดนิ่งครับ" },
    { q: "6. พื้นผิวชนิดใดทำให้เกิดแรงเสียดทานน้อยที่สุด?", opts: ["พื้นทราย", "พื้นหญ้า", "พื้นน้ำแข็ง", "พื้นคอนกรีตขรุขระ"], ans: 2, exp: "พื้นน้ำแข็งมีความเรียบลื่นมากที่สุด แรงเสียดทานจึงน้อยที่สุดครับ" },
    { q: "7. การเติมน้ำมันหล่อลื่นในโซ่จักรยาน มีวัตถุประสงค์เพื่ออะไร?", opts: ["เพิ่มแรงเสียดทาน", "ลดแรงเสียดทาน", "เพิ่มความเร็วของล้อ", "ทำให้โซ่สวยงาม"], ans: 1, exp: "น้ำมันช่วยลดแรงเสียดทานระหว่างข้อต่อ ทำให้หมุนได้คล่องขึ้นครับ" },
    { q: "8. เสียงเกิดจากกระบวนการใด?", opts: ["การเคลื่อนที่ของอากาศ", "การสั่นสะเทือนของแหล่งกำเนิดเสียง", "การกระทบกันของแสง", "การขยายตัวของวัตถุ"], ans: 1, exp: "เสียงทุกชนิดเกิดจากการสั่นสะเทือนครับ" },
    { q: "9. ตัวกลางในสถานะใดที่เสียงเดินทางผ่านได้ 'ดีที่สุด'?", opts: ["ของแข็ง", "ของเหลว", "ก๊าซ", "สุญญากาศ"], ans: 0, exp: "ของแข็งมีอนุภาคชิดกันมากที่สุด นำการสั่นสะเทือนได้ดีที่สุดครับ" },
    { q: "10. ความถี่ของเสียงมีผลต่อลักษณะเสียงอย่างไร?", opts: ["ความดัง-ค่อย", "เสียงสูง-ต่ำ", "ความไพเราะ", "ความเร็วเสียง"], ans: 1, exp: "ความถี่สูง = เสียงสูง(แหลม), ความถี่ต่ำ = เสียงต่ำ(ทุ้ม) ครับ" },
    { q: "11. หน่วยที่ใช้ในการวัด 'ระดับความเข้มเสียง' คืออะไร?", opts: ["เฮิรตซ์", "นิวตัน", "เดซิเบล", "เมตร/วินาที"], ans: 2, exp: "เดซิเบล (dB) ใช้บอกความดัง-ค่อยครับ" },
    { q: "12. มนุษย์สามารถได้ยินเสียงที่ระดับความดังสูงสุดต่อเนื่องไม่เกินกี่เดซิเบลเพื่อความปลอดภัย?", opts: ["50 dB", "85 dB", "120 dB", "150 dB"], ans: 1, exp: "มาตรฐานความปลอดภัยกำหนดไว้ไม่เกิน 85 เดซิเบลครับ" },
    { q: "13. การเปลี่ยนสถานะของน้ำจาก 'น้ำแข็ง' กลายเป็น 'น้ำเหลว' เรียกว่าอะไร?", opts: ["การกลายเป็นไอ", "การหลอมเหลว", "การควบแน่น", "การระเหิด"], ans: 1, exp: "ของแข็งกลายเป็นของเหลวคือการหลอมเหลวครับ" },
    { q: "14. ข้อใดคือการเปลี่ยนแปลงทางเคมี?", opts: ["น้ำตาลทรายละลายน้ำ", "การทำไอศกรีม", "กล้วยสุก", "แก้วแตก"], ans: 2, exp: "กล้วยสุกเปลี่ยนสีและรสชาติ เกิดสารใหม่ย้อนกลับไม่ได้ เป็นทางเคมีครับ" },
    { q: "15. การบูรที่หายไปจากถุงวางในตู้เสื้อผ้า เกิดจากกระบวนการใด?", opts: ["การระเหย", "การระเหิด", "การหลอมเหลว", "การแข็งตัว"], ans: 1, exp: "ของแข็งเปลี่ยนเป็นก๊าซโดยไม่ผ่านของเหลวเรียกว่าการระเหิดครับ" },
    { q: "16. เมื่อก๊าซได้รับความเย็นจะเปลี่ยนเป็นของเหลว เรียกว่ากระบวนการใด?", opts: ["การควบแน่น", "การแข็งตัว", "การระเหย", "การหลอมเหลว"], ans: 0, exp: "เช่น การเกิดละอองน้ำบนกระจกครับ" },
    { q: "17. ข้อใด 'ไม่ใช่' การเปลี่ยนแปลงที่ผันกลับได้?", opts: ["การละลายของช็อกโกแลต", "การต้มน้ำจนเดือด", "การเผากระดาษ", "การทำน้ำแข็ง"], ans: 2, exp: "การเผากระดาษเป็นขี้เถ้า กลับมาเป็นกระดาษไม่ได้ครับ" },
    { q: "18. ในวงจรไฟฟ้ากระแสตรง กระแสไฟฟ้าไหลออกจากขั้วใด?", opts: ["ขั้วบวกไปขั้วลบ", "ขั้วลบไปขั้วบวก", "ขั้วบวกไปขั้วบวก", "ขั้วลบไปขั้วลบ"], ans: 0, exp: "กระแสไฟฟ้าไหลจากศักย์สูง (บวก) ไปยังศักย์ต่ำ (ลบ) ครับ" },
    { q: "19. ดาวดวงใดเป็นดาวฤกษ์?", opts: ["ดาวอังคาร", "ดวงอาทิตย์", "ดาวพฤหัสบดี", "ดวงจันทร์"], ans: 1, exp: "ดวงอาทิตย์เป็นดาวฤกษ์ที่มีแสงสว่างในตัวเองครับ" },
    { q: "20. ดาวเคราะห์ลำดับที่ 5 จากดวงอาทิตย์คือดวงใด?", opts: ["โลก", "ดาวอังคาร", "ดาวพฤหัสบดี", "ดาวเสาร์"], ans: 2, exp: "พุธ ศุกร์ โลก อังคาร และพฤหัสบดี ครับ" },
    { q: "21. เมฆที่มีลักษณะคล้ายขนนก สีขาวสะอาด อยู่ชั้นสูงคือเมฆชนิดใด?", opts: ["เซอร์รัส", "สเตรตัส", "คิวลูมัส", "คิว มูโลนิมบัส"], ans: 0, exp: "เซอร์รัส (Cirrus) คือเมฆชั้นสูงรูปร่างคล้ายขนนกครับ" },
    { q: "22. ปรากฏการณ์ใดเกิดจากไอน้ำในอากาศควบแน่นเป็นละอองน้ำลอยอยู่ใกล้พื้นดิน?", opts: ["เมฆ", "หมอก", "ฝน", "หิมะ"], ans: 1, exp: "หมอกคือเมฆที่อยู่ใกล้ระดับพื้นดินครับ" },
    { q: "23. การที่โลกหมุนรอบตัวเองทำให้เกิดปรากฏการณ์ใด?", opts: ["ฤดูกาล", "ข้างขึ้นข้างแรม", "การเกิดกลางวันกลางคืน", "สุริยุปราคา"], ans: 2, exp: "โลกหมุนรอบตัวเอง 1 รอบใช้เวลา 24 ชม. ทำให้เกิดกลางวันกลางคืนครับ" },
    { q: "24. ข้อใดจัดเป็นสารเนื้อเดียว?", opts: ["น้ำเชื่อม", "น้ำคลอง", "พริกเกลือ", "ลอดช่องน้ำกะทิ"], ans: 0, exp: "น้ำเชื่อมมองเห็นเป็นเนื้อเดียวกันตลอดทุกส่วนครับ" },
    { q: "25. การแยกเกลือออกจากทราย ควรใช้วิธีใด?", opts: ["การกรอง", "การละลายน้ำแล้วตามด้วยการกรองและระเหยแห้ง", "การหยิบออก", "การใช้แม่เหล็กดูด"], ans: 1, exp: "เกลือละลายน้ำแต่ทรายไม่ละลาย จึงใช้การกรองและระเหยช่วยครับ" },
    { q: "26. สัตว์ในข้อใดมีการปรับตัวให้เข้ากับสิ่งแวดล้อมในเขตหนาว?", opts: ["อูฐ", "หมีขั้วโลก", "จระเข้", "ยีราฟ"], ans: 1, exp: "หมีขั้วโลกมีขนหนาและชั้นไขมันใต้ผิวหนังมากครับ" },
    { q: "27. ดอกบัวมีก้านที่พองและมีอากาศข้างใน เพื่อประโยชน์ในข้อใด?", opts: ["สะสมอาหาร", "ช่วยในการลอยน้ำ", "ป้องกันศัตรู", "ระบายความร้อน"], ans: 1, exp: "ช่วยพยุงให้ดอกและใบชูพ้นน้ำครับ" },
    { q: "28. 'ห่วงโซ่อาหาร' จุดเริ่มต้นส่วนใหญ่คือสิ่งใด?", opts: ["สัตว์กินพืช", "สัตว์กินเนื้อ", "พืชสีเขียว", "แบคทีเรีย"], ans: 2, exp: "พืชเป็นผู้ผลิตที่เปลี่ยนพลังงานแสงเป็นอาหารครับ" },
    { q: "29. หากในห่วงโซ่อาหารขาด 'ผู้ย่อยสลาย' จะเกิดอะไรขึ้น?", opts: ["พืชจะโตเร็วขึ้น", "โลกจะเต็มไปด้วยซากสิ่งมีชีวิต", "สัตว์จะไม่มีศัตรู", "ไม่มีผลกระทบ"], ans: 1, exp: "ไม่มีใครมาย่อยซากพืชซากสัตว์ให้กลายเป็นแร่ธาตุคืนสู่ดินครับ" },
    { q: "30. เสียงแหลมเกิดจากแหล่งกำเนิดเสียงที่มีลักษณะอย่างไร?", opts: ["มวลมาก สั่นช้า", "มวลน้อย สั่นเร็ว", "มวลมาก สั่นเร็ว", "มวลน้อย สั่นช้า"], ans: 1, exp: "มวลน้อยจะสั่นได้เร็ว ทำให้เกิดความถี่สูงหรือเสียงแหลมครับ" },
    { q: "31. แรงเสียดทานจะมีค่ามากขึ้นเมื่อใด?", opts: ["ใช้วัตถุที่มีน้ำหนักน้อยลง", "ทำให้พื้นผิวเรียบขึ้น", "เพิ่มน้ำหนักของวัตถุ", "ใช้ล้อช่วยเคลื่อนที่"], ans: 2, exp: "น้ำหนักที่กดทับลงบนผิวสัมผัสมากขึ้นจะเพิ่มแรงเสียดทานครับ" },
    { q: "32. ข้อใดคือประโยชน์ของแรงเสียดทาน?", opts: ["ทำให้เครื่องยนต์ร้อน", "ทำให้พื้นรองเท้าสึก", "ทำให้เดินได้โดยไม่ลื่น", "ทำให้ต้องออกแรงผลักของมากขึ้น"], ans: 2, exp: "แรงเสียดทานระหว่างรองเท้ากับพื้นช่วยให้เรายึดเกาะพื้นได้ครับ" },
    { q: "33. เสียงเดินทางผ่าน 'น้ำ' ได้เร็วกว่าตัวกลางชนิดใด?", opts: ["เหล็ก", "ไม้", "อากาศ", "คอนกรีต"], ans: 2, exp: "เสียงเดินทางในของเหลวเร็วกว่าในก๊าซ (อากาศ) ครับ" },

const quizArea = document.getElementById('quiz-area');
let userScore = 0;

// Hard-coded render
function initQuiz() {
    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `q-${index}`;
        card.innerHTML = `
            <div class="q-title">${item.q}</div>
            <div class="options" id="opts-${index}">
                ${item.opts.map((opt, i) => `<button class="opt-btn" onclick="checkAns(${index}, ${i})">${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="fb-${index}">
                <strong>เฉลัย:</strong> ${item.opts[item.ans]}<br>
                <strong>วิธีคิด:</strong> ${item.exp}
            </div>
        `;
        quizArea.appendChild(card);
    });
}

window.checkAns = function(qIdx, optIdx) {
    const fb = document.getElementById(`fb-${qIdx}`);
    if (fb.style.display === 'block') return; // Prevent re-click

    const btns = document.getElementById(`opts-${qIdx}`).getElementsByTagName('button');
    if (optIdx === quizData[qIdx].ans) {
        btns[optIdx].classList.add('correct');
        userScore++;
    } else {
        btns[optIdx].classList.add('wrong');
        btns[quizData[qIdx].ans].classList.add('correct');
    }
    fb.style.display = 'block';
};

window.showTotal = function() {
    const finalDiv = document.getElementById('final-score');
    const scoreText = document.getElementById('score-text');
    const analysis = document.getElementById('analysis');
    
    finalDiv.style.display = 'block';
    scoreText.innerText = `คุณทำได้ ${userScore} จาก 60 คะแนน`;
    
    let comment = "";
    if (userScore >= 54) comment = "🥇 ยอดเยี่ยมที่สุด! น้องเป็นอัจฉริยะวิทยาศาสตร์ ป.5 แล้วครับ!";
    else if (userScore >= 45) comment = "🥈 เก่งมากครับ! มีพื้นฐานแน่นมาก พร้อมสอบปลายภาคแน่นอน";
    else if (userScore >= 30) comment = "🥉 ผ่านเกณฑ์ครับ! แนะนำให้กลับไปทบทวนเรื่อง 'การเปลี่ยนแปลงทางเคมี' และ 'ตัวแปรการทดลอง' อีกนิดนะ";
    else comment = "⚠️ ต้องขยันเพิ่มขึ้นนะลูก! ลองกลับไปอ่านสรุปด้านบนแล้วทำข้อสอบใหม่อีกรอบ พี่เชื่อว่าน้องทำได้!";
    
    analysis.innerHTML = `<h3>วิเคราะห์จุดอ่อนรายบุคคล:</h3><p>${comment}</p><p>เขียนโดย CHINPONG SMART FARM</p>`;
    window.scrollTo(0, document.body.scrollHeight);
};

initQuiz();
</script>
