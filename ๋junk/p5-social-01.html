const container = document.getElementById('exam-content');

// Generate Questions without Loop (Hard-coded injection style)
quizData.forEach((data, index) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-block-${index}`;
    card.innerHTML = `
        <span class="q-title">${data.q}</span>
        <div class="options">
            ${data.o.map(opt => `<button class="opt-btn" onclick="checkAnswer(${index}, '${opt}', this)">${opt}</button>`).join('')}
        </div>
        <div class="explanation" id="ex-${index}">${data.e}</div>
    `;
    container.appendChild(card);
});

let userScore = 0;
let answeredCount = 0;

function checkAnswer(qIdx, selected, btn) {
    const parent = document.getElementById(`q-block-${qIdx}`);
    if(parent.hasAttribute('data-answered')) return;
    
    parent.setAttribute('data-answered', 'true');
    answeredCount++;
    
    const correct = quizData[qIdx].a;
    const exp = document.getElementById(`ex-${qIdx}`);
    exp.style.display = 'block';

    if(selected === correct) {
        btn.classList.add('correct');
        userScore++;
    } else {
        btn.classList.add('wrong');
        const buttons = parent.querySelectorAll('.opt-btn');
        buttons.forEach(b => {
            if(b.innerText === correct) b.classList.add('correct');
        });
    }
}

function calculateScore() {
    if(answeredCount < 50) {
        alert("กรุณาทำข้อสอบให้ครบทั้ง 50 ข้อก่อนส่งครับ!");
        return;
    }
    const panel = document.getElementById('result-panel');
    const scoreText = document.getElementById('score-text');
    const analysis = document.getElementById('analysis-text');
    
    panel.style.display = 'block';
    scoreText.innerText = `คะแนนที่คุณทำได้: ${userScore} / 50`;
    
    let comment = userScore >= 40 ? "สุดยอด! คุณมีความรู้สังคมศึกษาแน่นมาก พร้อมสอบแล้วครับ" : "พยายามอีกนิดนะครับ ลองทบทวนเรื่องภูมิศาสตร์และเศรษฐศาสตร์เพิ่มเติม";
    analysis.innerHTML = `<p>${comment}</p><p>วิเคราะห์ผลโดย: <strong>พระจอมเกล้าติวเตอร์</strong></p>`;
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
