function initQuiz() {
    const container = document.getElementById('quiz-display');
    questions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `
            <div class="q-text">${i + 1}. ${item.q}</div>
            ${item.o.map((opt, oi) => `
                <label class="opt-btn">
                    <input type="radio" name="q${i}" onclick="evaluateQ(${i}, ${oi})"> ${opt}
                </label>
            `).join('')}
            <div id="fb-${i}" class="fb"></div>
        `;
        container.appendChild(div);
    });
}

let score = 0;
let done = 0;
let stats = {};

function evaluateQ(qi, si) {
    const q = questions[qi];
    const fb = document.getElementById(`fb-${qi}`);
    const rds = document.getElementsByName(`q${qi}`);
    for(let r of rds) r.disabled = true;

    fb.style.display = 'block';
    if(si === q.c) {
        fb.className = 'fb correct';
        fb.innerHTML = `<strong>ถูกต้อง! ✅</strong><br><small>${q.exp}</small>`;
        score++;
        stats[q.cat] = (stats[q.cat] || 0) + 1;
    } else {
        fb.className = 'fb incorrect';
        fb.innerHTML = `<strong>ผิด! ❌ (คำตอบคือ: ${q.o[q.c]})</strong><br><small>${q.exp}</small>`;
    }
    done++;
}

function finishExam() {
    if(done < 50) { alert("ทำให้ครบ 50 ข้อก่อนนะครับคุณครู!"); return; }
    document.getElementById('score-text').innerText = score;
    const analysis = document.getElementById('analysis-box');
    analysis.innerHTML = "<h3>📊 การวิเคราะห์จุดอ่อน:</h3>";
    
    const cats = [...new Set(questions.map(q => q.cat))];
    cats.forEach(c => {
        const total = questions.filter(q => q.cat === c).length;
        const s = stats[c] || 0;
        const p = Math.round((s/total)*100);
        analysis.innerHTML += `<p><strong>${c}:</strong> ได้ ${s}/${total} (${p}%) - ${p < 60 ? '⚠️ ควรติวเพิ่ม' : '✅ แม่นยำแล้ว'}</p>`;
    });

    document.getElementById('summary').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}

window.onload = initQuiz;
</script>
