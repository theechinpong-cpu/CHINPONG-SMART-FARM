<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบวิชาการงานอาชีพ ป.5 (45 ข้อ)</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #1976d2;
            --error-color: #d32f2f;
            --bg-color: #f0f2f5;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; }
        
        .sticky-nav { position: sticky; top: 0; background: white; padding: 15px; z-index: 1000; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-reveal { background: var(--secondary-color); color: white; }
        .btn-reset { background: #607d8b; color: white; }

        .q-card { margin-bottom: 25px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 10px; transition: 0.3s; }
        .q-card:hover { border-color: var(--primary-color); }
        .tag { font-size: 12px; color: var(--primary-color); font-weight: bold; margin-bottom: 5px; display: block; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn { 
            padding: 12px; border: 1px solid #ccc; border-radius: 8px; background: #fff; 
            text-align: left; cursor: pointer; font-size: 15px; transition: 0.2s;
        }
        .opt-btn:hover { background: #f1f8e9; }
        
        .explanation { 
            display: none; margin-top: 15px; padding: 15px; border-left: 5px solid var(--secondary-color); 
            background: #e3f2fd; border-radius: 4px; font-size: 14px; 
        }
        .correct-ans { color: var(--primary-color); font-weight: bold; }
        
        /* สไตล์เมื่อคลิกเลือก */
        .selected-correct { background: #c8e6c9 !important; border-color: #4caf50 !important; }
        .selected-wrong { background: #ffcdd2 !important; border-color: #f44336 !important; }

        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ ข้อสอบวิชาการงานอาชีพ ป.5 (45 ข้อ)</h1>
    
    <div class="sticky-nav">
        <button class="btn btn-reveal" onclick="revealAll()">🔓 เฉลยทุกข้อ</button>
        <button class="btn btn-reset" onclick="window.location.reload()">🔄 เริ่มทำใหม่</button>
    </div>

    <div id="quiz-content">
        </div>
</div>

<script>
    const questions = [
        { q: "การวางแผนการทำงานบ้าน 'ล่วงหน้า' มีจุดประสงค์หลักเพื่ออะไร?", a: "ข", opts: ["ก. เพื่อให้บ้านสวยที่สุดในซอย", "ข. เพื่อประหยัดเวลาและลดความซ้ำซ้อนของงาน", "ค. เพื่อให้พ่อแม่ไม่ต้องทำงาน", "ง. เพื่อจัดเตรียมงานเลี้ยง"], exp: "การวางแผนช่วยให้เราจัดลำดับความสำคัญและเตรียมอุปกรณ์ได้ครบถ้วน" },
        { q: "หากพบคราบหินปูนเกาะแน่นที่ก๊อกน้ำ ควรใช้อะไรกำจัดคราบจึงจะปลอดภัยต่อผิวโลหะ?", a: "ค", opts: ["ก. น้ำยาล้างห้องน้ำเข้มข้น", "ข. แปรงลวดขัดแรงๆ", "ค. น้ำส้มสายชูผสมน้ำเช็ดทิ้งไว้", "ง. มีดขูดออก"], exp: "น้ำส้มสายชูเป็นกรดอ่อนๆ ช่วยสลายหินปูนได้โดยไม่ทำลายผิวโครเมียม" },
        { q: "การซักผ้าขาวร่วมกับผ้าสี ผลเสียที่ชัดเจนที่สุดคือข้อใด?", a: "ง", opts: ["ก. ผ้าจะแห้งช้าลง", "ข. เปลืองน้ำยาซักผ้า", "ค. ผ้าขาวจะกลายเป็นสีเทา", "ง. สีจากผ้าสีอาจตกใส่ผ้าขาวทำให้เสียหาย"], exp: "สีจากผ้าสีมักจะหลุดออกมาในน้ำซักและยึดเกาะกับเส้นใยผ้าขาวได้ง่าย" },
        { q: "มารยาทในการจัดโต๊ะอาหารสำหรับผู้ใหญ่ สิ่งใด 'ไม่ควร' ปฏิบัติ?", a: "ก", opts: ["ก. วางแก้วน้ำไว้ด้านซ้ายมือของผู้ทาน", "ข. วางช้อนไว้ทางขวา ส้อมไว้ทางซ้าย", "ค. ใช้ช้อนกลางสำหรับอาหารส่วนรวม", "ง. จัดลำดับจานตามการใช้งาน"], exp: "ตามหลักสากล แก้วน้ำควรวางไว้ทางขวามือด้านบนของปลายช้อน" },
        { q: "ขยะประเภท 'เปลือกผลไม้' ควรทิ้งลงในถังขยะสีใด?", a: "ก", opts: ["ก. สีเขียว", "ข. สีเหลือง", "ค. สีน้ำเงิน", "ง. สีแดง"], exp: "ถังสีเขียวสำหรับขยะเปียกหรือขยะย่อยสลายได้" },
        { q: "เครื่องมือเกษตรชนิดใดใช้สำหรับ 'ย้ายต้นกล้า' ได้เหมาะสมที่สุด?", a: "ค", opts: ["ก. จอบ", "ข. เสียม", "ค. ช้อนปลูก", "ง. พลั่วเหล็ก"], exp: "ช้อนปลูกมีขนาดเล็กและโค้งมน ช่วยให้ตักดินติดรากกล้าได้โดยไม่บอบช้ำ" },
        { q: "การพรวนดินรอบโคนต้นไม้มีประโยชน์อย่างไร?", a: "ข", opts: ["ก. เพื่อให้วัชพืชโตเร็ว", "ข. เพื่อให้ดินโปร่ง ระบายน้ำและอากาศได้ดี", "ค. เพื่อความสวยงามเพียงอย่างเดียว", "ง. เพื่อไล่แมลง"], exp: "ดินที่โปร่งจะช่วยให้รากพืชหายใจและดูดซึมสารอาหารได้ดีขึ้น" },
        { q: "การทำปุ๋ยหมักจากเศษใบไม้ จัดเป็นการจัดการขยะแบบใด?", a: "ค", opts: ["ก. Reduce", "ข. Reuse", "ค. Recycle", "ง. Repair"], exp: "Recycle คือการนำวัสดุมาแปรรูปผ่านกระบวนการ (ในที่นี้คือการหมัก) เพื่อเป็นสิ่งใหม่" },
        { q: "ก่อนเก็บจอบหรือเสียมที่ใช้งานเสร็จแล้ว ควรทำอย่างไรเป็นอันดับแรก?", a: "ข", opts: ["ก. ทาน้ำมันทันที", "ข. ล้างดินออกให้สะอาดและเช็ดให้แห้ง", "ค. พิงไว้ใต้ต้นไม้", "ง. ลับคมใหม่ทุกครั้ง"], exp: "ต้องกำจัดความชื้นและสิ่งสกปรกก่อนเพื่อป้องกันสนิม" },
        { q: "พืชผักสวนครัวชนิดใดควรปลูกในที่ที่มีแสงแดดรำไร?", a: "ง", opts: ["ก. พริก", "ข. มะเขือเทศ", "ค. กระเพรา", "ง. สะระแหน่"], exp: "สะระแหน่ชอบที่ชุ่มชื้นและแดดไม่จัดเกินไป ต่างจากพริกที่ชอบแดดจัด" },
        { q: "การซ่อมแซมเสื้อผ้าที่ 'ตะเข็บปริ' ควรใช้วิธีใด?", a: "ก", opts: ["ก. การด้นถอยหลัง", "ข. การสอยซ่อนด้าย", "ค. การชุน", "ง. การปัก"], exp: "การด้นถอยหลังมีความแข็งแรงทนทานใกล้เคียงกับการเย็บด้วยเครื่องจักร" },
        { q: "หากบานพับประตูมีเสียงดังรบกวน วิธีแก้ไขที่ง่ายและถูกหลักคือข้อใด?", a: "ค", opts: ["ก. ฉีดน้ำใส่บานพับ", "ข. ทาด้วยยาสีฟัน", "ค. หยอดน้ำมันจักรหรือน้ำมันหล่อลื่น", "ง. เปลี่ยนบานพับใหม่"], exp: "น้ำมันช่วยลดแรงเสียดทานระหว่างโลหะที่เสียดสีกัน" },
        { q: "ไขควงที่มีปลายหัวเป็นรูปสี่แฉก เรียกว่าอะไร?", a: "ข", opts: ["ก. ไขควงปากแบน", "ข. ไขควงปากแฉก", "ค. ไขควงลองไฟ", "ง. ไขควงบล็อก"], exp: "ไขควงปากแฉกใช้สำหรับสกรูที่มีร่องสี่แฉกโดยเฉพาะ" },
        { q: "การใช้คีมตัดลวด ควรจับในลักษณะใด?", a: "ก", opts: ["ก. จับที่ด้ามให้กระชับและห่างจากปากคีม", "ข. จับที่ปากคีมเพื่อให้มีแรงกด", "ค. จับด้วยมือทั้งสองข้างที่ปลายด้าม", "ง. จับส่วนที่เป็นโลหะ"], exp: "การจับที่ด้าม (ซึ่งมักมีฉนวน) ช่วยให้มีแรงผ่อนและปลอดภัย" },
        { q: "ความปลอดภัยในการทำงานช่าง ข้อใดสำคัญที่สุด?", a: "ง", opts: ["ก. การแต่งกายตามแฟชั่น", "ข. การทำงานแข่งกับเวลา", "ค. การใช้เครื่องมือที่ราคาแพง", "ง. การตรวจสอบสภาพเครื่องมือก่อนใช้งาน"], exp: "เครื่องมือที่ชำรุดเป็นสาเหตุหลักของอุบัติเหตุในงานช่าง" },
        { q: "การร่างแบบก่อนทำงานประดิษฐ์มีประโยชน์อย่างไร?", a: "ข", opts: ["ก. เพื่อให้คนอื่นเลียนแบบได้", "ข. เพื่อวางแผนสัดส่วนและประหยัดวัสดุ", "ค. เพื่อส่งงานให้ครูตรวจ", "ง. เพื่อเพิ่มราคาสินค้า"], exp: "การร่างแบบช่วยให้เห็นโครงสร้างและคำนวณวัสดุที่ต้องใช้ได้แม่นยำ" },
        { q: "วัสดุในข้อใดมีความทนทานที่สุดในการทำ 'ที่คั่นหนังสือ'?", a: "ง", opts: ["ก. กระดาษทิชชู่", "ข. ใบไม้สด", "ค. กระดาษนิตยสาร", "ง. แผ่นพลาสติกเหลือใช้"], exp: "พลาสติกมีความเหนียวและไม่ฉีกขาดง่ายเมื่อโดนความชื้น" },
        { q: "การเลือกใช้กาวลาเท็กซ์ เหมาะกับงานประเภทใด?", a: "ก", opts: ["ก. งานกระดาษและงานไม้", "ข. งานพลาสติกกับโลหะ", "ค. งานแก้วแตก", "ง. งานท่อประปา"], exp: "กาวลาเท็กซ์ยึดเกาะวัสดุที่มีรูพรุนเช่นกระดาษและไม้ได้ดีมาก" },
        { q: "การนำฝากระป๋องน้ำอัดลมมาประดิษฐ์เป็นของใช้ จัดเป็นความคิดสร้างสรรค์ด้านใด?", a: "ค", opts: ["ก. ความคิดริเริ่ม", "ข. ความคิดคล่องแคล่ว", "ค. ความคิดยืดหยุ่น", "ง. ความคิดละเอียดลออ"], exp: "ความคิดยืดหยุ่นคือการดัดแปลงสิ่งหนึ่งไปใช้ประโยชน์ในอีกรูปแบบหนึ่ง" },
        { q: "การประเมินผลงานประดิษฐ์ ควรทำเมื่อใด?", a: "ง", opts: ["ก. ก่อนเริ่มทำ", "ข. ขณะกำลังร่างแบบ", "ค. เมื่อซื้อวัสดุเสร็จ", "ง. เมื่อชิ้นงานเสร็จสมบูรณ์"], exp: "เพื่อให้ทราบว่าผลงานใช้งานได้จริงตามวัตถุประสงค์ที่ตั้งไว้หรือไม่" },
        { q: "ข้อใดคือความหมายของ 'อาชีพรับจ้าง'?", a: "ข", opts: ["ก. ทำงานให้ตัวเองได้รับกำไร", "ข. ทำงานให้ผู้อื่นและได้รับค่าจ้างเป็นเงินเดือนหรือรายวัน", "ค. การขายของที่ตลาด", "ง. การปลูกผักไว้ทานเอง"], exp: "อาชีพรับจ้างมีลักษณะการทำงานภายใต้คำสั่งของนายจ้างเพื่อแลกเงินค่าตอบแทน" },
        { q: "อาชีพในข้อใดจัดเป็น 'อาชีพอิสระ'?", a: "ค", opts: ["ก. พนักงานบริษัท", "ข. ข้าราชการครู", "ค. เจ้าของร้านกาแฟ", "ง. พนักงานรักษาความปลอดภัย"], exp: "อาชีพอิสระคือการเป็นเจ้าของกิจการเอง จัดการเวลาและผลกำไรเอง" },
        { q: "คุณธรรมข้อใดสำคัญที่สุดสำหรับผู้ที่ทำอาชีพค้าขาย?", a: "ก", opts: ["ก. ความซื่อสัตย์", "ข. ความกล้าหาญ", "ค. ความจำแม่นยำ", "ง. ความรวดเร็ว"], exp: "ความซื่อสัตย์ต่อลูกค้า (ไม่โกงน้ำหนัก/ราคา) จะทำให้ธุรกิจยั่งยืน" },
        { q: "การทำบัญชีรายรับ-รายจ่าย ช่วยเรื่องอาชีพอย่างไร?", a: "ง", opts: ["ก. ทำให้ดูเป็นคนรวย", "ข. เพื่อส่งให้ธนาคารดูเท่านั้น", "ค. เพื่อลดภาษี", "ง. เพื่อให้รู้ผลกำไรขาดทุนและวางแผนการเงิน"], exp: "ช่วยให้เห็นภาพรวมของธุรกิจว่ามั่นคงหรือควรปรับปรุงส่วนใด" },
        { q: "หากต้องการเป็นนักประดิษฐ์มืออาชีพ ควรเริ่มต้นจากสิ่งใด?", a: "ข", opts: ["ก. ซื้อเครื่องจักรราคาแพง", "ข. สังเกตปัญหาในชีวิตประจำวันแล้วหาวิธีแก้", "ค. จ้างคนอื่นออกแบบ", "ง. อ่านประวัติศาสตร์"], exp: "นวัตกรรมส่วนใหญ่เกิดจากการพยายามแก้ปัญหาที่อยู่รอบตัว" },
        { q: "การรีดผ้าสีเข้ม ควรปฏิบัติอย่างไรเพื่อไม่ให้ผ้าขึ้นเงา?", a: "ค", opts: ["ก. รีดด้วยความร้อนสูง", "ข. ฉีดน้ำยาปรับผ้านุ่มเยอะๆ", "ค. รีดด้านในของเสื้อผ้า", "ง. รีดซ้ำๆ หลายครั้ง"], exp: "การรีดด้านในช่วยป้องกันหน้าเตารีดทำลายใยผ้าด้านนอกจนเกิดความเงาที่ไม่สวยงาม" },
        { q: "ปุ๋ยคอก ได้มาจากแหล่งใด?", a: "ง", opts: ["ก. ซากใบไม้หมัก", "ข. สารเคมีในโรงงาน", "ค. หินแร่", "ง. มูลสัตว์ต่างๆ"], exp: "มูลสัตว์ เช่น วัว ควาย ไก่ เมื่อผ่านการย่อยสลายจะเป็นปุ๋ยคอกที่ให้ธาตุอาหารสูง" },
        { q: "การล้างจานที่ถูกต้อง ควรเริ่มจากสิ่งใดก่อน?", a: "ก", opts: ["ก. แก้วน้ำ", "ข. จานใส่ข้าว", "ค. กระทะ", "ง. ช้อนส้อม"], exp: "ควรเริ่มจากสิ่งที่สะอาดที่สุด (แก้วน้ำ) เพื่อไม่ให้ความมันจากจานชามไปเปื้อนฟองน้ำ" },
        { q: "เมื่อพบตะปูโผล่ออกมาที่เก้าอี้ไม้ ควรใช้เครื่องมือใดแก้ไข?", a: "ข", opts: ["ก. เลื่อย", "ข. ค้อน", "ค. คีมปากจิ้งจก", "ง. ไขควง"], exp: "ค้อนใช้สำหรับตอกตะปูให้จมลง หรือใช้ถอนตะปูออกเพื่อความปลอดภัย" },
        { q: "กระดาษทรายเบอร์ 0 กับ เบอร์ 3 ต่างกันอย่างไร?", a: "ค", opts: ["ก. เบอร์ 0 หยาบกว่า", "ข. เบอร์ 3 ละเอียดกว่า", "ค. เบอร์ 0 ละเอียดกว่า", "ง. ไม่ต่างกัน"], exp: "ตัวเลขน้อย (เบอร์ 0) มักหมายถึงความละเอียดที่สูงกว่าในมาตรฐานทั่วไปของกระดาษทรายไม้" },
        { q: "การติดตั้งหลอดไฟใหม่ ควรทำสิ่งใดก่อนเป็นลำดับแรก?", a: "ก", opts: ["ก. ปิดสวิตช์และคัทเอาท์ไฟ", "ข. แกะหลอดเก่าออกทันที", "ค. เตรียมบันได", "ง. สวมถุงมือผ้า"], exp: "ต้องตัดกระแสไฟฟ้าก่อนเพื่อความปลอดภัยต่อชีวิต" },
        { q: "การประดิษฐ์ของใช้จากขวดพลาสติก ช่วยลดปัญหาสิ่งแวดล้อมอย่างไร?", a: "ข", opts: ["ก. ทำให้ขวดมีราคาสูงขึ้น", "ข. ลดปริมาณขยะและลดการใช้ทรัพยากรใหม่", "ค. ทำให้พลาสติกย่อยสลายเร็วขึ้น", "ง. ลดควันพิษ"], exp: "เป็นการยืดอายุการใช้งานวัสดุก่อนจะกลายเป็นขยะ (Reuse)" },
        { q: "การเก็บรักษาเมล็ดพันธุ์พืช ควรเก็บในที่ลักษณะใด?", a: "ง", opts: ["ก. ที่ชื้นและร้อน", "ข. กลางแจ้งแดดจัด", "ค. ในน้ำ", "ง. ที่แห้งและเย็น"], exp: "ความแห้งและความเย็นช่วยชะลอการงอกและป้องกันเชื้อรา" },
        { q: "ข้อใดคือมารยาทที่ดีในการทำงานร่วมกับเพื่อน?", a: "ค", opts: ["ก. สั่งให้คนอื่นทำตามใจเรา", "ข. แอบพักขณะเพื่อนทำงาน", "ค. รับฟังความคิดเห็นและแบ่งหน้าที่กันชัดเจน", "ง. แย่งหน้าที่ที่ง่ายที่สุด"], exp: "การทำงานเป็นทีมต้องอาศัยการสื่อสารและการให้เกียรติกัน" },
        { q: "หากต้องการตัดสายไฟเส้นเล็กๆ ควรใช้เครื่องมือใด?", a: "ข", opts: ["ก. กรรไกรตัดกระดาษ", "ข. คีมตัดลวด", "ค. เลื่อยเหล็ก", "ง. มีดทำครัว"], exp: "คีมตัดถูกออกแบบมาให้ตัดโลหะเส้นเล็กได้คมและปลอดภัยต่อเครื่องมือ" },
        { q: "การใช้สว่านไฟฟ้า สิ่งใดห้ามปฏิบัติเด็ดขาด?", a: "ก", opts: ["ก. สวมถุงมือที่หลวมมากๆ ขณะเจาะ", "ข. มาร์คจุดที่ต้องการเจาะ", "ค. จับด้ามสว่านให้แน่น", "ง. ใช้ดอกสว่านที่ตรงกับวัสดุ"], exp: "ถุงมือที่หลวมอาจถูกดอกสว่านพันและดึงมือเข้าไปทำให้เกิดอุบัติเหตุร้ายแรง" },
        { q: "พืชสวนครัวชนิดใด ใช้ 'เหง้า' ในการขยายพันธุ์?", a: "ค", opts: ["ก. ผักบุ้ง", "ข. คะน้า", "ค. ขิง", "ง. พริก"], exp: "ขิง ข่า ขมิ้น ใช้ส่วนของลำต้นใต้ดินหรือเหง้าในการเจริญเติบโตใหม่" },
        { q: "การจัดเก็บอุปกรณ์การเรียนที่ดีควรทำอย่างไร?", a: "ง", opts: ["ก. ใส่กองรวมกันในกระเป๋า", "ข. วางไว้ใต้โต๊ะเรียน", "ค. แยกประเภทและเก็บในกล่องหรือที่ใส่ปากกา", "ง. ข้อ ค ถูกต้องที่สุด"], exp: "การแยกประเภทช่วยให้ค้นหาง่ายและรักษาอุปกรณ์ไม่ให้เสียหาย" },
        { q: "งานประดิษฐ์ประเภท 'ของตกแต่ง' คือข้อใด?", a: "ข", opts: ["ก. กระเป๋าผ้า", "ข. โมบายเปลือกหอย", "ค. กล่องใส่กระดาษทิชชู่", "ง. ไม้กวาดขนไก่"], exp: "โมบายมีวัตถุประสงค์เพื่อความสวยงามและการประดับตกแต่งสถานที่" },
        { q: "คุณสมบัติของ 'ช่างที่ดี' คือข้อใด?", a: "ง", opts: ["ก. ทำงานเร็วแต่ไม่เรียบร้อย", "ข. ใช้เครื่องมือผิดประเภทเพื่อประหยัด", "ค. คิดราคาแพงเกินจริง", "ง. มีความละเอียดรอบคอบและหมั่นเรียนรู้เทคโนโลยีใหม่"], exp: "ความละเอียดช่วยให้งานออกมาดีและปลอดภัย ส่วนการเรียนรู้ช่วยให้ทำงานได้ฉลาดขึ้น" },
        { q: "หากนักเรียนมีงบประมาณจำกัดในการประดิษฐ์ชิ้นงาน ควรทำอย่างไร?", a: "ก", opts: ["ก. เลือกใช้วัสดุเหลือใช้ในบ้านมาดัดแปลง", "ข. ขอกู้เงินจากเพื่อน", "ค. ยกเลิกการทำ", "ง. ใช้วัสดุราคาถูกแต่ไม่มีคุณภาพ"], exp: "การนำวัสดุเหลือใช้มาใช้คือหัวใจของงานประดิษฐ์ที่ชาญฉลาด" },
        { q: "ข้อใดคือการใช้ 'เวลาว่าง' ให้เกิดประโยชน์ทางอาชีพมากที่สุด?", a: "ข", opts: ["ก. นอนหลับ", "ข. ฝึกทักษะการทำขนมหรือปลูกผัก", "ค. ดูภาพยนตร์ทั้งวัน", "ง. เล่นเกมออนไลน์เพื่อความสนุก"], exp: "การฝึกทักษะช่วยเพิ่มโอกาสในการสร้างรายได้เสริมในอนาคต" },
        { q: "การล้างผักด้วยวิธีใดช่วยลดสารเคมีได้ดีที่สุด?", a: "ค", opts: ["ก. แช่น้ำทิ้งไว้เฉยๆ", "ข. ล้างด้วยน้ำร้อน", "ค. เปิดน้ำไหลผ่านและแช่น้ำผสมเบกกิ้งโซดาหรือน้ำส้มสายชู", "ง. เช็ดด้วยผ้าสะอาด"], exp: "น้ำไหลผ่านช่วยชะล้างสารที่เกาะผิว ส่วนสารละลายบางชนิดช่วยดูดซับสารพิษออก" },
        { q: "เครื่องหมาย 'อย.' บนบรรจุภัณฑ์อาหารย่อมาจากอะไร?", a: "ข", opts: ["ก. อาหารดี", "ข. สำนักงานคณะกรรมการอาหารและยา", "ค. องค์การยารักษาสุขภาพ", "ง. อร่อยยิ่ง"], exp: "เป็นหน่วยงานตรวจสอบความปลอดภัยของผลิตภัณฑ์อาหารและยาในประเทศไทย" },
        { q: "เป้าหมายสำคัญของการเรียนวิชาการงานอาชีพคืออะไร?", a: "ง", opts: ["ก. เพื่อให้ทำงานบ้านเก่งกว่าทุกคน", "ข. เพื่อให้ได้เกรด 4", "ค. เพื่อให้พ่อแม่ภูมิใจ", "ง. เพื่อให้มีทักษะชีวิตและพึ่งพาตนเองได้ในอนาคต"], exp: "วิชานี้เน้นการสร้างพื้นฐานในการดำรงชีวิตและการทำงานอย่างเป็นระบบ" }
    ];

    const quizContent = document.getElementById('quiz-content');

    // Generate Questions
    questions.forEach((item, index) => {
        const qNum = index + 1;
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `q${qNum}`;
        
        card.innerHTML = `
            <span class="tag">ข้อที่ ${qNum}</span>
            <p><strong>${item.q}</strong></p>
            <div class="options">
                ${item.opts.map((opt, i) => {
                    const label = ["ก", "ข", "ค", "ง"][i];
                    return `<button class="opt-btn" onclick="checkAns(${qNum}, '${label}', this)">${opt}</button>`;
                }).join('')}
            </div>
            <div id="exp${qNum}" class="explanation">
                <span class="correct-ans">เฉลย: ${item.a}</span><br>
                ${item.exp}
            </div>
        `;
        quizContent.appendChild(card);
    });

    // Check Answer
    function checkAns(qNum, choice, btn) {
        const item = questions[qNum - 1];
        const expDiv = document.getElementById(`exp${qNum}`);
        const buttons = document.querySelectorAll(`#q${qNum} .opt-btn`);
        
        // Disable all buttons in this question
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (choice === item.a) {
            btn.classList.add('selected-correct');
        } else {
            btn.classList.add('selected-wrong');
            // Show the correct one too
            buttons.forEach((b, i) => {
                if (["ก", "ข", "ค", "ง"][i] === item.a) b.classList.add('selected-correct');
            });
        }
        
        expDiv.style.display = 'block';
    }

    // Reveal All
    function revealAll() {
        questions.forEach((item, index) => {
            const qNum = index + 1;
            const expDiv = document.getElementById(`exp${qNum}`);
            const buttons = document.querySelectorAll(`#q${qNum} .opt-btn`);
            
            expDiv.style.display = 'block';
            buttons.forEach((b, i) => {
                b.style.pointerEvents = 'none';
                if (["ก", "ข", "ค", "ง"][i] === item.a) {
                    b.classList.add('selected-correct');
                }
            });
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
