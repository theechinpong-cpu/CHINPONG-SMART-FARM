<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พระจอมเกล้าติวเตอร์ - สรุปแกรมม่า ป.1-3</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #e8f6f3; padding: 20px; }
        .lesson-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; border: 4px solid #1abc9c; }
        .q-box { border-bottom: 2px solid #eee; padding: 15px 0; }
        .btn { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #fff; }
        .btn:hover { background: #f0f0f0; }
        .feedback { display: none; padding: 10px; border-radius: 5px; margin-top: 5px; font-weight: bold; }
        .right { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        #summary { display: none; text-align: center; margin-top: 20px; padding: 20px; background: #1abc9c; color: white; border-radius: 10px; }
    </style>
</head>
<body>
<div class="lesson-container">
    <h1 style="text-align: center; color: #16a085;">🎓 ข้อสอบวัดระดับแกรมม่า ป.1-3</h1>
    <p style="text-align: center;">โดย <b>พระจอมเกล้าติวเตอร์</b></p>

    <div class="q-box">
        <p><b>1. (บทที่ 1) ฉันมีส้ม 5 ผล ต้องเขียนอย่างไร?</b></p>
        <button class="btn" onclick="check(this, false, 'ผิดจ้า! ส้ม 5 ผล มีมากกว่าหนึ่งต้องเติม s')">A. five orange</button>
        <button class="btn" onclick="check(this, true, 'ถูกต้อง! มากกว่าหนึ่งผลต้องเติม -s กลายเป็น oranges')">B. five oranges</button>
        <div class="feedback"></div>
    </div>

    <div class="q-box">
        <p><b>2. (บทที่ 2) She ______ a doctor. (เธอเป็นหมอ)</b></p>
        <button class="btn" onclick="check(this, true, 'เยี่ยมมาก! She เป็นประธานคนเดียวใช้ is')">A. is</button>
        <button class="btn" onclick="check(this, false, 'ผิดครับ! are ใช้กับประธานหลายคน')">B. are</button>
        <div class="feedback"></div>
    </div>

    <div class="q-box">
        <p><b>3. (บทที่ 3) He ______ milk every morning. (เขาดื่มนมทุกเช้า)</b></p>
        <button class="btn" onclick="check(this, false, 'ผิดจ้า! He คือแก๊งขี้เหงา กริยาต้องมีเพื่อน (s)')">A. drink</button>
        <button class="btn" onclick="check(this, true, 'เก่งมาก! He เป็นเอกพจน์ กริยา drink เลยต้องเติม s')">B. drinks</button>
        <div class="feedback"></div>
    </div>

    <div class="q-box">
        <p><b>4. (บทที่ 4) The bird is ______ the tree. (นกอยู่ใต้ต้นไม้)</b></p>
        <button class="btn" onclick="check(this, true, 'ถูกต้อง! under แปลว่า ใต้')">A. under</button>
        <button class="btn" onclick="check(this, false, 'ผิดครับ! on แปลว่า บน')">B. on</button>
        <div class="feedback"></div>
    </div>

    <div id="summary">
        <h2>คะแนนรวมของคุณคือ</h2>
        <h1 id="score-text">0 / 4</h1>
        <p id="analysis"></p>
        <button onclick="location.reload()" style="background: white; color: #1abc9c; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer;">เริ่มเรียนใหม่</button>
    </div>
</div>

<script>
    let score = 0; let answered = 0;
    function check(btn, isCorrect, msg) {
        const parent = btn.parentElement;
        const feedback = parent.querySelector('.feedback');
        parent.querySelectorAll('.btn').forEach(b => b.disabled = true);
        feedback.style.display = 'block';
        if(isCorrect) { score++; feedback.innerHTML = "✅ " + msg; feedback.className = "feedback right"; }
        else { feedback.innerHTML = "❌ " + msg; feedback.className = "feedback wrong"; }
        answered++;
        if(answered === 4) {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('score-text').innerText = score + " / 4";
            document.getElementById('analysis').innerText = score === 4 ? "วิเคราะห์: พื้นฐาน ป.1-3 ของน้องแน่นเป๊ะ! พร้อมลุย ป.6 แล้ว" : "วิเคราะห์: น้องยังสับสนบางบทเรียน ลองกลับไปอ่านทวนเรื่องนั้นๆ อีกรอบนะครับ";
        }
    }
</script>
</body>
</html>
