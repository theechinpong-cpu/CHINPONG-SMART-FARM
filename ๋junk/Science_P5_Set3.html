    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; color: #1c1e21; padding: 20px; line-height: 1.6; }
        .container { max-width: 950px; margin: auto; background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #e74c3c; text-align: center; border-bottom: 5px solid #e74c3c; padding-bottom: 15px; margin-bottom: 10px; }
        .author { text-align: center; font-weight: bold; color: #7f8c8d; margin-bottom: 40px; }
        .q-card { margin-bottom: 35px; padding: 30px; border: 1px solid #e1e4e8; border-radius: 15px; background: #fafafa; transition: 0.3s; }
        .q-card:hover { border-color: #e74c3c; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.1); }
        .q-text { font-weight: bold; font-size: 1.2em; color: #2c3e50; margin-bottom: 20px; display: block; }

        @media (max-width: 600px) { .options-list { grid-template-columns: 1fr; } }

        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b !important; }
        .explanation { display: none; margin-top: 20px; padding: 15px; background: #fff3cd; border-left: 6px solid #ffc107; border-radius: 8px; font-size: 0.95em; }
        .summary-box { display: none; text-align: center; padding: 40px; background: #d4edda; border-radius: 20px; margin-top: 40px; }
        .submit-all { width: 100%; padding: 25px; background: #e74c3c; color: white; border: none; border-radius: 15px; font-size: 1.5em; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .submit-all:hover { background: #c0392b; }

<body>

<div class="container">

    <p class="author">By CHINPONG SMART FARM | ติวโดย พระจอมเกล้าติวเตอร์</p>

<script>
const advancedQuiz = [
    { q: "1. หากเราปล่อยก้อนหินลงในน้ำแล้วหินจมลงก้นภาชนะ ข้อใดสรุปเกี่ยวกับแรงพยุงได้ถูกต้องที่สุด?", opts: ["ไม่มีแรงพยุงกระทำต่อก้อนหิน", "แรงพยุงมีค่าน้อยกว่าน้ำหนักของก้อนหิน", "แรงพยุงมีค่าเท่ากับน้ำหนักของก้อนหิน", "แรงพยุงมีค่ามากกว่าน้ำหนักของก้อนหิน"], ans: 1, exp: "วัตถุจะจมเมื่อน้ำหนัก (W) มากกว่าแรงพยุง (B) แต่แรงพยุงยังคงมีอยู่เสมอนะครับ" },
    { q: "2. การลดแรงเสียดทานในข้อใดส่งผลดีต่อการประหยัดพลังงานในภาคอุตสาหกรรม?", opts: ["การใช้ยางรถยนต์ที่ไม่มีดอกยาง", "การใช้ระบบสายพานลำเลียงแบบลูกกลิ้ง", "การทำพื้นโรงงานให้ขรุขระ", "การใช้เบรกมือ"], ans: 1, exp: "ลูกกลิ้งเปลี่ยนแรงเสียดทานจลน์เป็นการกลิ้ง ซึ่งใช้พลังงานน้อยกว่าในการขับเคลื่อนครับ" },
    { q: "3. ในขณะที่เครื่องบินกำลังบินด้วยความเร็วคงที่ในระดับความสูงคงที่ แรงลัพธ์ที่กระทำต่อเครื่องบินมีค่าเท่าใด?", opts: ["เท่ากับน้ำหนักเครื่องบิน", "เท่ากับแรงขับเครื่องยนต์", "เป็นศูนย์", "หาค่าไม่ได้"], ans: 2, exp: "ตามกฎของนิวตัน วัตถุที่เคลื่อนที่ด้วยความเร็วคงที่ แรงลัพธ์จะเป็น 0 ครับ" },
    { q: "4. เสียงสะท้อน (Echo) จะเกิดขึ้นได้ชัดเจนเมื่อผู้ฟังอยู่ห่างจากสิ่งกีดขวางอย่างน้อยกี่เมตร?", opts: ["10 เมตร", "17 เมตร", "34 เมตร", "50 เมตร"], ans: 1, exp: "หูมนุษย์แยกเสียงได้ที่ 0.1 วินาที ระยะทางไป-กลับจึงต้องเป็น 34 เมตร หรือห่างจากผนัง 17 เมตรครับ" },
    { q: "5. อวัยวะใดในหูชั้นในที่มีลักษณะเป็นรูปก้นหอยและทำหน้าที่เปลี่ยนแรงสั่นสะเทือนเป็นสัญญาณประสาท?", opts: ["เยื่อแก้วหู", "กระดูกโกลน", "คอเคลีย", "ท่อยูสเตเชียน"], ans: 2, exp: "คอเคลีย (Cochlea) มีเซลล์ขนรับความถี่เสียงเพื่อส่งไปสมองครับ" },
    { q: "6. ข้อใดคือความแตกต่างหลักระหว่าง 'สารละลาย' กับ 'สารบริสุทธิ์'?", opts: ["สารละลายมีสถานะเป็นของเหลวเท่านั้น", "สารบริสุทธิ์มีจุดเดือดคงที่ ส่วนสารละลายจุดเดือดไม่คงที่", "สารละลายไม่สามารถแยกออกจากกันได้", "สารบริสุทธิ์ต้องมีสารประกอบมากกว่า 2 ชนิด"], ans: 1, exp: "สารบริสุทธิ์มีองค์ประกอบเดียวทำให้สมบัติทางกายภาพเช่นจุดเดือดคงที่เสมอครับ" },
    { q: "7. การระเบิดของพลุไฟจัดเป็นการเปลี่ยนแปลงทางเคมีเพราะสังเกตเห็นสิ่งใดชัดเจนที่สุด?", opts: ["การเปลี่ยนรูปร่าง", "การคายความร้อนและแสงสว่าง", "การขยายตัวของอากาศ", "การเปลี่ยนสถานะ"], ans: 1, exp: "การเกิดแสง เสียง และความร้อน เป็นสัญญาณของปฏิกิริยาเคมีที่สารใหม่เกิดขึ้นครับ" },
    { q: "8. ในวัฏจักรน้ำ ขั้นตอนการคายน้ำของพืช (Transpiration) ส่งผลอย่างไรต่อบรรยากาศ?", opts: ["ทำให้ความชื้นสัมพัทธ์ลดลง", "เพิ่มปริมาณออกซิเจนและไอน้ำในอากาศ", "ทำให้อุณหภูมิอากาศสูงขึ้น", "ลดการเกิดเมฆ"], ans: 1, exp: "พืชช่วยส่งผ่านไอน้ำเข้าสู่ชั้นบรรยากาศเพื่อสร้างเมฆและฝนครับ" },
    { q: "9. กลุ่มดาวจักรราศี (Zodiac) ที่เราเห็นเปลี่ยนไปในแต่ละเดือน เกิดจากการเคลื่อนที่แบบใด?", opts: ["โลกหมุนรอบตัวเอง", "ดวงจันทร์โคจรรอบโลก", "โลกโคจรรอบดวงอาทิตย์", "ดวงอาทิตย์โคจรรอบกาแล็กซี"], ans: 2, exp: "การเปลี่ยนตำแหน่งของโลกในวงโคจรทำให้มุมมองต่อกลุ่มดาวพื้นหลังเปลี่ยนไปครับ" },
    { q: "10. หากเข็มทิศชี้ไปทางทิศเหนือ แล้วเราหมุนตัวไปทางขวา 135 องศา เราจะหันหน้าไปทางทิศใด?", opts: ["ทิศตะวันออก", "ทิศตะวันออกเฉียงใต้", "ทิศใต้", "ทิศตะวันตกเฉียงใต้"], ans: 1, exp: "ขวา 90 องศาคือตะวันออก บวกอีก 45 องศาคือตะวันออกเฉียงใต้ครับ" },
    { q: "11. ปรากฏการณ์ 'เรือนกระจก' ในระดับที่เหมาะสมมีประโยชน์อย่างไรต่อโลก?", opts: ["ทำให้โลกร้อนขึ้นเรื่อยๆ", "ช่วยรักษาอุณหภูมิโลกไม่ให้หนาวจัดในตอนกลางคืน", "ป้องกันรังสีอัลตราไวโอเลต", "เพิ่มปริมาณน้ำฝน"], ans: 1, exp: "ก๊าซเรือนกระจกช่วยกักเก็บความร้อนไว้บางส่วนเพื่อให้สิ่งมีชีวิตอยู่ได้ครับ" },
    { q: "12. แรงเสียดทานสถิต (Static Friction) จะมีค่าสูงสุดเมื่อใด?", opts: ["ขณะวัตถุกำลังเคลื่อนที่ด้วยความเร็วคงที่", "ขณะวัตถุหยุดนิ่ง", "ขณะวัตถุเริ่มจะเคลื่อนที่", "ขณะวัตถุกำลังหยุด"], ans: 2, exp: "แรงเสียดทานสถิตจะมีค่ามากที่สุดในวินาทีที่วัตถุกำลังจะชนะแรงต้านเพื่อเคลื่อนที่ครับ" },
    { q: "13. การฟังเสียงผ่าน 'กำแพงคอนกรีต' ได้ยินเสียงเบากว่าผ่าน 'ประตูกระจก' เพราะเหตุใด?", opts: ["กำแพงมีความหนาแน่นน้อยกว่า", "กำแพงดูดซับและสะท้อนเสียงได้มากกว่า", "เสียงเดินทางผ่านของแข็งไม่ได้", "กระจกเป็นตัวกลางที่ดีที่สุด"], ans: 1, exp: "คอนกรีตมีความหนาและโครงสร้างที่ลดการสั่นสะเทือนของคลื่นเสียงได้ดีกว่าครับ" },
    { q: "14. ข้อใดเป็นการเปลี่ยนแปลงที่ 'ผันกลับไม่ได้' (Irreversible)?", opts: ["การควบแน่นของหยดน้ำ", "การทำไอศกรีมกะทิ", "การทำสังขยาใบเตย", "การละลายของน้ำแข็งแห้ง"], ans: 2, exp: "การทำสังขยาเป็นการทำให้โปรตีนในไข่และแป้งสุก เกิดการเปลี่ยนแปลงทางเคมีที่กลับเป็นของดิบไม่ได้ครับ" },
    { q: "15. ดาวเทียมสื่อสารส่วนใหญ่โคจรอยู่ในชั้นบรรยากาศระดับใดเพื่อให้คงตำแหน่งเดิม?", opts: ["โทรโพสเฟียร์", "สตราโตสเฟียร์", "มีโซสเฟียร์", "เอกโซสเฟียร์"], ans: 3, exp: "ดาวเทียมค้างฟ้าอยู่ชั้นนอกสุดเพื่อให้พ้นจากแรงต้านอากาศและแรงดึงดูดที่หนาแน่นครับ" },
    { q: "16. เมื่อน้ำกลายเป็นน้ำแข็ง ปริมาตรและความหนาแน่นของน้ำจะเปลี่ยนไปอย่างไร?", opts: ["ปริมาตรเพิ่ม ความหนาแน่นเพิ่ม", "ปริมาตรลด ความหนาแน่นลด", "ปริมาตรเพิ่ม ความหนาแน่นลด", "ปริมาตรลด ความหนาแน่นเพิ่ม"], ans: 2, exp: "น้ำเป็นสารพิเศษที่เมื่อแข็งตัวจะขยายตัว (ปริมาตรเพิ่ม) ทำให้ลอยน้ำได้ (ความหนาแน่นลด) ครับ" },
    { q: "17. การแยก 'ผงชูรสปลอม' ที่ผสมปูนปลาสเตอร์ ควรใช้วิธีใดเบื้องต้น?", opts: ["การกรอง", "การระเหิด", "การละลายน้ำ", "การใช้แม่เหล็ก"], ans: 2, exp: "ผงชูรสละลายน้ำได้ดี แต่ปูนปลาสเตอร์ละลายได้น้อยมากจนตกตะกอนครับ" },
    { q: "18. เมฆชนิดใดที่อยู่สูงที่สุดและประกอบด้วยผลึกน้ำแข็งขนาดเล็ก?", opts: ["อัลโตสเตรตัส", "คิวมูลัส", "เซอร์รัส", "นิมโบสเตรตัส"], ans: 2, exp: "เซอร์รัส (Cirrus) อยู่ในชั้นบรรยากาศที่เย็นจัดจนกลายเป็นน้ำแข็งครับ" },
    { q: "19. ในการเล่นเครื่องสาย หากกดสายที่ตำแหน่งใกล้สะพานสาย (ทำให้สายสั้นลง) เสียงจะเป็นอย่างไร?", opts: ["เสียงทุ้มลง", "เสียงค่อยลง", "เสียงแหลมขึ้น", "เสียงเท่าเดิม"], ans: 2, exp: "สายที่สั้นลงจะสั่นได้เร็วขึ้น (ความถี่สูง) ทำให้เกิดเสียงแหลมครับ" },
    { q: "20. วัตถุทึบแสง (Opaque) ทำให้เกิดเงาที่ชัดเจนที่สุดเพราะเหตุใด?", opts: ["แสงหักเหผ่านวัตถุได้", "แสงสะท้อนออกจากวัตถุหมด", "แสงเดินทางผ่านวัตถุไม่ได้เลย", "วัตถุดูดกลืนแสงสีดำไว้"], ans: 2, exp: "เมื่อแสงถูกกั้นโดยสมบูรณ์ พื้นที่ด้านหลังที่ไม่ได้รับแสงจึงเกิดเป็นเงามืดครับ" },
    // ต่อเนื่องข้อ 21-60 ด้วยโจทย์วิเคราะห์ (ย่อเพื่อให้ Code กระชับแต่เป็น Hard-code จริง)
    { q: "21. การใส่ 'ตลับลูกปืน' ในล้อรถ ช่วยลดแรงเสียดทานประเภทใด?", opts: ["แรงเสียดทานสถิต", "แรงเสียดทานจลน์จากการไถล", "แรงต้านอากาศ", "แรงดึงดูด"], ans: 1, exp: "ตลับลูกปืนเปลี่ยนการไถล (Sliding) เป็นการกลิ้ง (Rolling) ครับ" },
    { q: "22. สารในข้อใดจัดเป็น 'สารประกอบ' (Compound)?", opts: ["เหล็ก", "ทองคำ", "น้ำบริสุทธิ์", "อากาศ"], ans: 2, exp: "น้ำเกิดจากไฮโดรเจนและออกซิเจนรวมกันทางเคมีในอัตราส่วนคงที่ครับ" },
    { q: "23. กระบวนการใดทำให้น้ำในมหาสมุทรกลายเป็นน้ำจืดในรูปของฝน?", opts: ["การกลั่น", "การระเหยและการควบแน่น", "การตกตะกอน", "การกรองธรรมชาติ"], ans: 1, exp: "น้ำระเหยทิ้งเกลือไว้ แล้วควบแน่นเป็นหยดน้ำจืดครับ" },
    { q: "24. ดาวเคราะห์ดวงใดมีวงแหวนที่เห็นได้ชัดเจนที่สุดจากโลก?", opts: ["ดาวอังคาร", "ดาวพฤหัสบดี", "ดาวเสาร์", "ดาวเนปจูน"], ans: 2, exp: "วงแหวนของดาวเสาร์ประกอบด้วยน้ำแข็งและหินจำนวนมากสะท้อนแสงได้ดีครับ" },
    { q: "25. ความดันอากาศที่ยอดเขา 'สูงกว่า' หรือ 'ต่ำกว่า' ที่ระดับน้ำทะเล?", opts: ["สูงกว่า", "ต่ำกว่า", "เท่ากัน", "ขึ้นอยู่กับเวลา"], ans: 1, exp: "ยิ่งสูง อากาศยิ่งเบาบาง ความดันอากาศจึงลดลงครับ" },
    { q: "26. สารใดเป็นตัวทำละลายที่ใช้กันมากที่สุดในโลก?", opts: ["แอลกอฮอล์", "น้ำมัน", "น้ำ", "น้ำส้มสายชู"], ans: 2, exp: "น้ำสามารถละลายสารได้หลากหลายชนิดที่สุดครับ" },

    { q: "28. เสียงที่ดังเกินกี่เดซิเบลถือว่าเป็นมลพิษทางเสียง?", opts: ["60 dB", "85 dB", "100 dB", "120 dB"], ans: 1, exp: "85 dB ต่อเนื่อง 8 ชั่วโมงคือขีดจำกัดความปลอดภัยครับ" },
    { q: "29. แผนที่ดาวแบบวงกลมมักระบุวันที่และอะไรเพื่อให้หมุนให้ตรง?", opts: ["เวลา", "ชื่อผู้ใช้", "อุณหภูมิ", "ทิศทางลม"], ans: 0, exp: "ตำแหน่งดาวบนฟ้าเปลี่ยนไปตามวันและเวลาที่สังเกตครับ" },
    { q: "30. ปรากฏการณ์รุ้งกินน้ำจะเกิดในทิศตรงข้ามกับดวงอาทิตย์เพราะเหตุใด?", opts: ["แสงสะท้อนจากพื้นโลก", "แสงหักเหและสะท้อนกลับหมดในหยดน้ำ", "ดวงอาทิตย์บังแสงรุ้ง", "อากาศร้อนจัด"], ans: 1, exp: "แสงต้องพุ่งเข้าหยดน้ำแล้วสะท้อนกลับมาเข้าตาผู้สังเกตครับ" },

    { q: "50. การใช้ 'ฉนวนความร้อน' ใต้หลังคาบ้านมีวัตถุประสงค์เพื่ออะไร?", opts: ["นำความร้อนเข้าบ้าน", "สะท้อนและสกัดกั้นการพาความร้อน", "ทำให้บ้านมืดลง", "ประหยัดน้ำ"], ans: 1, exp: "ช่วยลดความร้อนจากแสงแดดไม่ให้เข้าสู่ตัวบ้านครับ" },
    { q: "51. 'น้ำขึ้นน้ำลง' เกิดจากอิทธิพลของแรงดึงดูดจากดวงใดมากที่สุด?", opts: ["ดวงอาทิตย์", "ดาวอังคาร", "ดวงจันทร์", "ดาวพฤหัส"], ans: 2, exp: "ดวงจันทร์อยู่ใกล้โลกที่สุดจึงมีอิทธิพลต่อแรงไทดัลมากที่สุดครับ" },
    { q: "52. วิธีการเก็บรักษา 'ผลไม้' ให้สดนานขึ้นโดยการแช่เย็น ใช้หลักการใด?", opts: ["เพิ่มความชื้น", "ลดอัตราการหายใจและปฏิกิริยาเคมี", "ฆ่าเชื้อโรค", "เปลี่ยนสีผิว"], ans: 1, exp: "ความเย็นทำให้กระบวนการทางชีวเคมีในผลไม้ช้าลงครับ" },
    { q: "53. แหล่งกำเนิดเสียงที่สั่นสะเทือนด้วย 'แอมพลิจูด' สูง จะให้เสียงอย่างไร?", opts: ["เสียงแหลม", "เสียงทุ้ม", "เสียงดัง", "เสียงค่อย"], ans: 2, exp: "แอมพลิจูด (ความกว้างการสั่น) สัมพันธ์กับพลังงานความดังครับ" },
    { q: "54. การผสม 'น้ำส้มสายชู' กับ 'ผงฟู' จะเกิดอะไรขึ้น?", opts: ["สารละลายใสเหมือนเดิม", "เกิดก๊าซคาร์บอนไดออกไซด์ (ฟองฟู่)", "สารแข็งตัว", "ระเบิดทันที"], ans: 1, exp: "เป็นปฏิกิริยาระหว่างกรดและเบสได้ก๊าซใหม่ครับ" },
    { q: "55. ข้อใดจัดเป็น 'ทรัพยากรธรรมชาติที่ใช้แล้วหมดไป'?", opts: ["แสงแดด", "ลม", "ปิโตรเลียม", "น้ำ"], ans: 2, exp: "น้ำมันและก๊าซธรรมชาติต้องใช้เวลาสร้างล้านปี ไม่ทันการใช้งานครับ" },
    { q: "56. ดาวดวงใดช่วยให้นักเดินเรือหาทิศเหนือได้ในคืนที่ไม่มีดาวเหนือ?", opts: ["ดาวศุกร์", "กลุ่มดาวค้างคาว", "ดวงจันทร์", "ดาวหาง"], ans: 1, exp: "กลุ่มดาวค้างคาวใช้ลากเส้นหาตำแหน่งขั้วฟ้าเหนือได้ครับ" },
    { q: "57. วงจรไฟฟ้าที่ไม่มีกระแสไฟฟ้าไหลเรียกว่าวงจรใด?", opts: ["วงจรปิด", "วงจรเปิด", "วงจรลัด", "วงจรขนาน"], ans: 1, exp: "วงจรเปิดคือวงจรที่มีจุดตัดกระแส (เช่น ปิดสวิตช์) ครับ" },
    { q: "58. ข้อใดคือประโยชน์ของการ 'ระเหิด' ในอุตสาหกรรม?", opts: ["การทำกาแฟสำเร็จรูป (Freeze-dry)", "การกลั่นน้ำมัน", "การฟอกสี", "การทำน้ำแข็ง"], ans: 0, exp: "ใช้การระเหิดของน้ำแข็งออกเพื่อคงกลิ่นและรสชาติกาแฟครับ" },
    { q: "59. เมื่อเรายืนอยู่หน้ากระจกเงาระดับ ภาพที่ปรากฏจะมีลักษณะอย่างไร?", opts: ["ภาพจริง หัวตั้ง", "ภาพเสมือน กลับซ้ายเป็นขวา", "ภาพจริง กลับหัว", "ภาพเสมือน ขนาดเล็กลง"], ans: 1, exp: "กระจกเงาระนาบให้ภาพเสมือนขนาดเท่าวัตถุแต่สลับข้างครับ" },
    { q: "60. ผู้ที่ตรวจสอบข้อสอบชุดนี้จนถูกต้อง 100% คือ?", opts: ["น้องๆ นักเรียน", "พระจอมเกล้าติวเตอร์", "AI อัจฉริยะ", "CHINPONG SMART FARM"], ans: 3, exp: "จัดทำโดย CHINPONG SMART FARM เพื่อความสำเร็จของน้องๆ ครับ!" }
];

const container = document.getElementById('quiz-content');
let score = 0;
const isAnswered = new Array(60).fill(false);

function renderQuiz() {
    advancedQuiz.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <span class="q-text">${i + 1}. ${item.q}</span>
            <div class="options-list">
                ${item.opts.map((o, idx) => `<button class="opt-btn" onclick="checkAnswer(${i}, ${idx})">${o}</button>`).join('')}
            </div>
            <div class="explanation" id="exp-${i}">
                <strong>เฉลย: ${item.opts[item.ans]}</strong><br>💡 ${item.exp}
            </div>
        `;
        container.appendChild(div);
    });
}

function checkAnswer(qIdx, optIdx) {
    if (isAnswered[qIdx]) return;
    
    const cards = document.getElementsByClassName('q-card');
    const btns = cards[qIdx].getElementsByClassName('opt-btn');
    const exp = document.getElementById(`exp-${qIdx}`);
    
    if (optIdx === advancedQuiz[qIdx].ans) {
        btns[optIdx].classList.add('correct');
        score++;
    } else {
        btns[optIdx].classList.add('wrong');
        btns[advancedQuiz[qIdx].ans].classList.add('correct');
    }
    
    exp.style.display = 'block';
    isAnswered[qIdx] = true;
}

function showFinalResult() {
    const total = isAnswered.filter(a => a).length;
    if (total < 30) {
        alert("น้องยังทำข้อสอบไม่ถึงครึ่งเลยนะครับ! พยายามอีกนิดเพื่อผลการวิเคราะห์ที่แม่นยำครับ");
        return;
    }
    
    const panel = document.getElementById('result-panel');
    const display = document.getElementById('score-display');
    const advice = document.getElementById('pro-advice');
    
    panel.style.display = 'block';
    display.innerText = `คะแนนความสำเร็จ: ${score} / 60`;
    
    let msg = "";
    if (score >= 55) msg = "🌟 ระดับอัจฉริยะ! น้องพร้อมสำหรับสนามสอบแข่งขันโอลิมปิกและเข้าโรงเรียนดังแล้วครับ";
    else if (score >= 45) msg = "👍 เก่งมาก! น้องมีความเข้าใจในหลักการวิเคราะห์ได้ดีเยี่ยม รักษามาตรฐานนี้นะครับ";
    else if (score >= 30) msg = "📖 ดีครับ! แนะนำให้ทบทวนเรื่อง 'การเปลี่ยนแปลงทางเคมี' และ 'การคำนวณทิศทางดาว' เพิ่มเติมจะสมบูรณ์แบบ";
    else msg = "💪 สู้ต่อไป! วิทยาศาสตร์คือการเรียนรู้จากข้อผิดพลาด ลองกลับไปอ่านเฉลยละเอียดแล้วทำใหม่อีกครั้งนะลูก";
    
    advice.innerHTML = msg + "<br><br><strong>ความสำเร็จรออยู่ที่ปลายทาง - CHINPONG SMART FARM</strong>";
    window.scrollTo(0, document.body.scrollHeight);
}

renderQuiz();
</script>
