<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL EXAM Vol.2 (Hard Mode) - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f4f8; }
        .q-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid #1e3a8a; transition: transform 0.2s; }
        .q-card:hover { transform: translateY(-5px); }
        .opt-btn { width: 100%; text-align: left; padding: 15px; margin-top: 10px; border: 2px solid #e2e8f0; border-radius: 12px; transition: 0.2s; font-weight: 500; }
        .opt-btn:hover { background: #eff6ff; border-color: #3b82f6; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; font-weight: bold; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        .feedback { display: none; margin-top: 15px; padding: 15px; border-radius: 10px; background: #f8fafc; border: 1px dashed #cbd5e1; line-height: 1.6; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-4xl mx-auto">
    <div class="text-center mb-10 bg-white p-8 rounded-[2rem] shadow-xl border-b-8 border-blue-900">
        <h1 class="text-3xl font-black text-blue-900 italic underline">🚀 ข้อสอบจำลองปลายภาคเรียนที่ 2 (ยากพิเศษ)</h1>
        <p class="text-slate-500 mt-2 font-bold uppercase tracking-widest">Mastery Level: Competitive Exam</p>
    </div>

    <div id="quiz-container"></div>

    <button id="submit-btn" onclick="checkCompletion()" class="w-full bg-blue-900 hover:bg-black text-white text-2xl font-black py-6 rounded-2xl shadow-lg transition-all transform hover:scale-105 mb-10">
        ส่งกระดาษคำตอบ & วิเคราะห์ผล
    </button>

    <div id="result-panel" class="hidden bg-slate-900 text-white p-10 rounded-[2.5rem] shadow-2xl text-center mb-20 border-4 border-blue-500">
        <h2 class="text-2xl font-bold text-blue-400">📊 สรุปรายงานการประเมิน</h2>
        <div id="final-score" class="text-8xl font-black my-6 text-white">0 / 60</div>
        <div id="analysis-text" class="text-lg text-slate-300 bg-white/5 p-6 rounded-xl text-left leading-relaxed border border-white/10"></div>
        <button onclick="window.location.reload()" class="mt-8 bg-blue-500 hover:bg-blue-400 text-white px-10 py-4 rounded-full font-bold shadow-lg transition-all">ประลองฝีมืออีกครั้ง</button>
    </div>
</div>

<script>
const quizData = [
    // --- 1. การเปลี่ยนแปลงของสาร (ยาก) ---
    { q: "ถ้านำโซเดียมไฮดรอกไซด์ (โซดาไฟ) ละลายในน้ำ แล้ววัดอุณหภูมิพบว่าอุณหภูมิสูงขึ้น การเปลี่ยนแปลงนี้คืออะไร?", a: ["การเปลี่ยนแปลงทางเคมีประเภทดูดความร้อน", "การเปลี่ยนแปลงทางกายภาพประเภทคายความร้อน", "การเปลี่ยนแปลงทางกายภาพประเภทดูดความร้อน", "การเปลี่ยนแปลงทางเคมีประเภทคายความร้อน"], c: 1, e: "การละลายเป็นทางกายภาพ แต่อุณหภูมิสูงขึ้นแสดงว่ามีการคายความร้อนออกมาสู่สิ่งแวดล้อม" },
    { q: "ต้มน้ำในหม้อจนเดือดพล่าน อุณหภูมิของไอน้ำที่อยู่เหนือผิวน้ำขึ้นไปเล็กน้อยมีค่าเท่าใด?", a: ["น้อยกว่า 100°C", "เท่ากับ 100°C พอดี", "มากกว่า 100°C", "ขึ้นอยู่กับขนาดของหม้อ"], c: 1, e: "ที่ความดันปกติ จุดเดือดของน้ำและอุณหภูมิของไอขณะนั้นจะคงที่ที่ 100°C จนกว่าจะเปลี่ยนสถานะหมด" },
    { q: "สารละลายอิ่มตัวของน้ำตาลทรายที่ 30°C หากนำไปต้มจนถึง 80°C จะเกิดอะไรขึ้น?", a: ["กลายเป็นสารละลายไม่อิ่มตัว", "มีผลึกน้ำตาลแยกตัวออกมา", "สารละลายเปลี่ยนสีเป็นสีน้ำตาล", "น้ำตาลจะระเหยกลายเป็นไอ"], c: 0, e: "การเพิ่มอุณหภูมิโดยปกติจะทำให้ความสามารถในการละลายเพิ่มขึ้น สารละลายที่เคยอิ่มตัวจึงกลายเป็นไม่อิ่มตัวและละลายได้เพิ่มอีก" },
    { q: "ข้อใดคือ 'ระบบปิด' ตามความหมายทางวิทยาศาสตร์ที่ถูกต้องที่สุด?", a: ["แก้วน้ำที่มีฝาปิดสนิท", "ลูกโป่งที่มัดปากถุงไว้", "ขวดน้ำพลาสติกที่เปิดฝาทิ้งไว้", "ถูกทั้ง 1 และ 2"], c: 3, e: "ระบบปิดคือระบบที่ไม่มีการถ่ายเท 'มวล' ออกสู่ภายนอก (แต่พลังงาน/ความร้อนยังผ่านได้)" },
    { q: "การเผาไหม้ของเทียนไข ข้อใดคือการเปลี่ยนแปลงทางกายภาพ?", a: ["การเกิดแก๊สคาร์บอนไดออกไซด์", "การหลอมเหลวของเนื้อเทียน", "การเกิดเขม่าสีดำ", "การสว่างของเปลวไฟ"], c: 1, e: "การหลอมเหลวเป็นการเปลี่ยนสถานะจากของแข็งเป็นของเหลว ซึ่งเป็นกายภาพ ส่วนการเผาไหม้เป็นเคมี" },
    // --- 2. แรงและแรงเสียดทาน (คำนวณ/วิเคราะห์) ---
    { q: "วัตถุหนัก 50 นิวตัน วางนิ่งบนพื้นที่มีแรงเสียดทานสถิตสูงสุด 10 นิวตัน หากใช้แรงดึง 8 นิวตัน วัตถุจะเคลื่อนที่หรือไม่ และมีแรงเสียดทานเท่าใด?", a: ["ไม่เคลื่อนที่, แรงเสียดทาน 10 N", "ไม่เคลื่อนที่, แรงเสียดทาน 8 N", "เคลื่อนที่, แรงเสียดทาน 10 N", "เคลื่อนที่, แรงเสียดทาน 2 N"], c: 1, e: "แรงดึง (8N) น้อยกว่าแรงเสียดทานสถิตสูงสุด (10N) วัตถุจึงไม่เคลื่อนที่ และแรงเสียดทานจะเท่ากับแรงที่มากระทำพอดี" },
    { q: "การเข็นรถยนต์คันเดิมบนพื้นหญ้าเทียบกับพื้นคอนกรีต การเข็นบนพื้นหญ้ายากกว่าเพราะเหตุใด?", a: ["น้ำหนักรถเพิ่มขึ้น", "พื้นหญ้ามีความขรุขระน้อยกว่า", "สัมประสิทธิ์แรงเสียดทานของหญ้าสูงกว่า", "แรงดึงดูดของโลกที่หญ้ามีมากกว่า"], c: 2, e: "พื้นผิวที่นุ่มและขรุขระอย่างหญ้าจะสร้างแรงต้านการเคลื่อนที่ (แรงเสียดทาน) ได้มากกว่าพื้นเรียบแข็ง" },
    { q: "หากต้องการลดแรงเสียดทานในการเคลื่อนย้ายลังขนาดใหญ่โดย 'ไม่ใช้ล้อ' ควรทำอย่างไร?", a: ["เพิ่มมวลลงในลัง", "ชโลมน้ำมันบนพื้นผิวที่ลังจะผ่าน", "ขัดพื้นผิวให้ขรุขระ", "เพิ่มพื้นที่ผิวสัมผัสของลัง"], c: 1, e: "การใช้สารหล่อลื่นเป็นวิธีลดแรงเสียดทานที่มีประสิทธิภาพที่สุดในตัวเลือกนี้" },
    { q: "แรงลัพธ์ของแรงขนาด 5 N และ 12 N ที่กระทำต่อวัตถุในทิศทางตั้งฉากกัน มีค่าเท่าใด?", a: ["7 N", "17 N", "13 N", "60 N"], c: 2, e: "ใช้ทฤษฎีบทพีทาโกรัส: $\\sqrt{5^2 + 12^2} = \\sqrt{25 + 144} = \\sqrt{169} = 13$ N" },
    { q: "ดาวเทียมที่โคจรรอบโลกที่ระดับความสูงคงที่ มีแรงลัพธ์กระทำต่อดาวเทียมหรือไม่?", a: ["ไม่มี เพราะเคลื่อนที่ด้วยความเร็วคงที่", "มี คือแรงดึงดูดของโลกที่ทำหน้าที่เป็นแรงเข้าสู่ศูนย์กลาง", "ไม่มี เพราะอยู่ในอวกาศไม่มีอากาศ", "มี คือแรงผลักจากไอพ่น"], c: 1, e: "ดาวเทียมเคลื่อนที่เป็นวงกลมต้องมีแรงเข้าสู่ศูนย์กลางกระทำตลอดเวลา ไม่อย่างนั้นจะหลุดวงโคจร" },
    // --- 3. เสียง (วิเคราะห์/คำนวณ) ---
    { q: "เสียงเดินทางผ่านน้ำทะเลด้วยความเร็ว 1,500 m/s ถ้าเรือส่งคลื่นโซนาร์ลงไปแล้วได้รับสัญญาณสะท้อนกลับใน 4 วินาที ทะเลตรงนั้นลึกเท่าใด?", a: ["6,000 เมตร", "3,000 เมตร", "1,500 เมตร", "750 เมตร"], c: 1, e: "ระยะทางไป-กลับ = $1,500 \\times 4 = 6,000$ m ดังนั้นความลึกคือครึ่งหนึ่ง $6,000 / 2 = 3,000$ m" },
    { q: "การสั่นของวัตถุที่มี 'มวลน้อย' และ 'ความยาวสั้น' จะส่งผลต่อเสียงอย่างไร?", a: ["เสียงจะดังขึ้น", "เสียงจะเบาลง", "เสียงจะสูงขึ้น", "เสียงจะต่ำลง"], c: 2, e: "วัตถุขนาดเล็กสั้นจะสั่นด้วยความถี่สูง ทำให้เกิดเสียงแหลมหรือเสียงสูง" },
    { q: "หากเราอยู่ในห้องอัดเสียงที่บุผนังด้วยฟองน้ำ เราจะแทบไม่ได้ยินเสียงก้องเลย เพราะสมบัติใด?", a: ["การหักเหของเสียง", "การเลี้ยวเบนของเสียง", "การดูดกลืนพลังงานเสียง", "การสะท้อนกลับหมด"], c: 2, e: "ฟองน้ำมีรูพรุนซึ่งทำหน้าที่เปลี่ยนพลังงานเสียงเป็นพลังงานความร้อน (การดูดกลืนเสียง)" },
    { q: "เสียงที่มีความเข้มเสียงเพิ่มขึ้นทุกๆ 10 เดซิเบล จะมีความรุนแรงของพลังงานเพิ่มขึ้นกี่เท่า?", a: ["2 เท่า", "10 เท่า", "100 เท่า", "เท่าเดิม"], c: 1, e: "มาตราส่วนเดซิเบลเป็นแบบลอการิทึม ทุก 10 dB ที่เพิ่มขึ้น พลังงานจะเข้มข้นขึ้น 10 เท่า" },
    { q: "ปรากฏการณ์ 'คลื่นกระแทก' (Sonic Boom) เกิดจากอะไร?", a: ["แหล่งกำเนิดเสียงสั่นแรงเกินไป", "แหล่งกำเนิดเสียงเคลื่อนที่เร็วกว่าความเร็วเสียง", "เสียงสะท้อนจากภูเขาหลายลูก", "การรวมตัวของพายุ"], c: 1, e: "เมื่อวัตถุเร็วเหนือเสียง (Supersonic) จะเกิดการอัดตัวของหน้าคลื่นเสียงจนเป็นเสียงระเบิดดัง" },
    // --- 4. ดาราศาสตร์ (ยากพิเศษ) ---
    { q: "ดาว A มีอุณหภูมิผิว 25,000 K ดาว B มีอุณหภูมิผิว 4,000 K เมื่อมองจากโลกจะเห็นดาวทั้งสองมีสีต่างกันอย่างไร?", a: ["ดาว A สีแดง, ดาว B สีขาว", "ดาว A สีน้ำเงิน, ดาว B สีแดง", "ดาว A สีเหลือง, ดาว B สีน้ำเงิน", "ดาว A สีส้ม, ดาว B สีเหลือง"], c: 1, e: "อุณหภูมิสูงมาก (25,000K) จะเห็นเป็นสีน้ำเงิน/ขาว ส่วนอุณหภูมิต่ำ (4,000K) จะเห็นเป็นสีส้ม/แดง" },
    { q: "ในคืนวันที่ 15 ค่ำ หากเราเห็นดวงจันทร์อยู่ตรงจุดเหนือศีรษะพอดี แสดงว่าเป็นเวลาประมาณเท่าใด?", a: ["18.00 น.", "21.00 น.", "24.00 น.", "03.00 น."], c: 2, e: "วันเพ็ญดวงจันทร์จะขึ้น 18.00 น. และขึ้นมาสูงที่สุด (Zenith) ในเวลาเที่ยงคืน (24.00 น.)" },
    { q: "ถ้าดาวเหนือมีมุมเงย 13 องศา แสดงว่าผู้สังเกตอยู่ที่จังหวัดใด (โดยประมาณ)?", a: ["เชียงราย", "กรุงเทพฯ", "ภูเก็ต", "ไม่มีข้อมูลเพียงพอ"], c: 1, e: "มุมเงยของดาวเหนือ = ละติจูดของผู้สังเกต กรุงเทพฯ อยู่ที่ประมาณละติจูด 13-14 องศาเหนือ" },
    { q: "ดาวเคราะห์ดวงใดที่มีสมบัติ 'การหมุนรอบตัวเองสวนทางกับดาวดวงอื่น' (ตามเข็มนาฬิกา)?", a: ["ดาวพุธ", "ดาวศุกร์", "ดาวอังคาร", "ดาวพฤหัสบดี"], c: 1, e: "ดาวศุกร์มีการหมุนรอบตัวเองแบบ Retrograde (ตะวันออกไปตะวันตก) ต่างจากโลกและดวงอื่น" },
    { q: "กลุ่มดาวจักรราศีที่ปรากฏบนเส้นสุริยวิถีในเดือนสิงหาคม คือกลุ่มดาวใด?", a: ["กลุ่มดาวสิงห์", "กลุ่มดาวกันย์", "กลุ่มดาวปู", "กลุ่มดาวตุลย์"], c: 0, e: "ชื่อเดือนสัมพันธ์กับกลุ่มดาวที่ดวงอาทิตย์ปรากฏเข้าไปอยู่ (สิงหาคม = ราศีสิงห์)" },
    // --- ข้อ 21-60 (เน้นบทเรียนเทอม 2 ทั้งหมด) ---
    { q: "สารใดต่อไปนี้เป็นสารละลายน้ำ (Aqueous solution) ทั้งหมด?", a: ["น้ำเกลือ น้ำเชื่อม น้ำปูนใส", "น้ำมัน ทองเหลือง อากาศ", "น้ำคลอง นมเย็น น้ำพริก", "เหล็กกล้า เงิน ทองแดง"], c: 0, e: "น้ำเกลือ น้ำเชื่อม น้ำปูนใส มีน้ำเป็นตัวทำละลายชัดเจน" },
    { q: "การทำน้ำแข็งแห้ง (Dry Ice) จากแก๊ส CO2 อาศัยกระบวนการใด?", a: ["คายความร้อนและลดความดัน", "ดูดความร้อนและเพิ่มความดัน", "คายความร้อนและเพิ่มความดัน", "ดูดความร้อนและลดความดัน"], c: 2, e: "การทำให้แก๊สกลายเป็นของแข็งต้องอัดความดันและดึงความร้อนออก (คายความร้อน)" },

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = quizData.map((item, idx) => `
        <div class="q-card" id="q-${idx}">
            <p class="text-xl font-bold text-slate-700 leading-snug">${idx + 1}. ${item.q}</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-5" id="options-${idx}">
                ${item.a.map((opt, i) => `
                    <button class="opt-btn" onclick="verifyChoice(${idx}, ${i})">${opt}</button>
                `).join('')}
            </div>
            <div id="fb-${idx}" class="feedback text-sm italic shadow-inner">
                <span class="inline-block bg-blue-900 text-white px-2 py-1 rounded text-xs not-italic mr-2">ANALYSIS</span> ${item.e}
            </div>
        </div>
    `).join('');
}

let score = 0;
let answeredCount = 0;

window.verifyChoice = function(qIdx, choiceIdx) {
    const feedback = document.getElementById(`fb-${qIdx}`);
    if (feedback.style.display === 'block') return;

    answeredCount++;
    const isCorrect = choiceIdx === quizData[qIdx].c;
    const buttons = document.getElementById(`options-${qIdx}`).querySelectorAll('button');

    if (isCorrect) {
        score++;
        buttons[choiceIdx].classList.add('correct');
    } else {
        buttons[choiceIdx].classList.add('wrong');
        buttons[quizData[qIdx].c].classList.add('correct');
    }

    feedback.style.display = 'block';
};

window.checkCompletion = function() {
    if (answeredCount < 60) {
        alert(`อย่าเพิ่งรีบ! น้องทำไปได้ ${answeredCount} ข้อเองนะ (ขาดอีก ${60 - answeredCount} ข้อ) ทำใจให้สบายแล้วเก็บให้ครบครับ!`);
        return;
    }

    document.getElementById('submit-btn').classList.add('hidden');
    document.getElementById('result-panel').classList.remove('hidden');
    document.getElementById('final-score').innerText = `${score} / 60`;

    let message = "";
    if (score >= 55) message = "💎 <b>เกียรตินิยมอันดับ 1:</b> สุดยอดมาก! น้องก้าวข้ามขีดจำกัดเด็ก ป.5 ทั่วไปแล้ว ข้อสอบชุดนี้เป็นแนวสอบเข้าโรงเรียนสาธิตและจุฬาภรณ์ฯ ถ้าน้องทำได้ขนาดนี้ มั่นใจในตัวเองได้เลย!";
    else if (score >= 45) message = "🌟 <b>ระดับดีเยี่ยม:</b> น้องมีทักษะการวิเคราะห์ที่แข็งแกร่งมาก จุดที่ผิดมักจะเป็นเรื่องการคำนวณแรงและดาราศาสตร์เชิงลึก ทบทวนจุดนั้นอีกนิด น้องจะเป็นที่ 1 ของห้องแน่นอน";
    else if (score >= 30) message = "📈 <b>ระดับมาตรฐาน:</b> ผ่านเกณฑ์มาตรฐานการสอบปลายภาคครับ แต่ถ้าจะไปสอบแข่งขัน น้องต้องเน้นเรื่อง 'เหตุและผล' ของการเปลี่ยนแปลงสถานะสารให้มากกว่านี้ครับ";
    else message = "📚 <b>คำแนะนำจากครู:</b> ไม่ต้องเสียใจครับ ข้อสอบชุดนี้ยากระดับแข่งขัน ให้น้องย้อนกลับไปอ่านเฉลยในข้อที่ผิดให้เข้าใจ 'หัวใจ' ของมัน แล้วลองทำใหม่อีกครั้ง ความสำเร็จอยู่ไม่ไกล!";

    document.getElementById('analysis-text').innerHTML = message;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};

renderQuiz();
</script>
