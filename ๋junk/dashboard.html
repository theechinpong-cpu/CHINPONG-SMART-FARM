<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PHONICS LIVE - CHINPONG</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@800&display=swap" rel="stylesheet">
</head>
<body class="h-screen bg-[#0f172a] flex flex-col items-center justify-center text-white font-['Kanit']">
    <h1 class="text-5xl font-black mb-16 text-yellow-400 italic">PHONICS CHALLENGE LIVE</h1>
    <div class="flex gap-10 w-full max-w-6xl px-10">
        <div class="flex-1 bg-gradient-to-br from-orange-500 to-red-600 rounded-[50px] p-12 text-center shadow-2xl border-4 border-white/20">
            <h2 class="text-4xl mb-4">PLAYER 1</h2>
            <div id="p1-score" class="text-[180px] leading-none font-black">0</div>
        </div>
        <div class="flex-1 bg-gradient-to-br from-green-500 to-emerald-700 rounded-[50px] p-12 text-center shadow-2xl border-4 border-white/20">
            <h2 class="text-4xl mb-4">PLAYER 2</h2>
            <div id="p2-score" class="text-[180px] leading-none font-black">0</div>
        </div>
    </div>
    <button onclick="resetGame()" class="mt-16 px-8 py-3 bg-white/10 rounded-full hover:bg-red-500 transition-all border border-white/20">Reset Score</button>
    <script>
        const firebaseConfig = { databaseURL: "https://t-touch-chinpong-8e1af-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('scores').on('value', (snapshot) => {
            const data = snapshot.val() || { p1: 0, p2: 0 };
            document.getElementById('p1-score').innerText = data.p1 || 0;
            document.getElementById('p2-score').innerText = data.p2 || 0;
            confetti({ particleCount: 30, spread: 60, origin: { y: 0.7 } });
        });

        function resetGame() { if(confirm('Reset?')) db.ref('scores').set({ p1: 0, p2: 0 }); }
    </script>
</body>
</html>
