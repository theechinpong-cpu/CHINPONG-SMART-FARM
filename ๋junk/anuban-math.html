<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบคณิตศาสตร์ ป.5 (50 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f7; padding: 20px; line-height: 1.6; }
        .container { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2e4053; text-align: center; border-bottom: 4px solid #f1c40f; padding-bottom: 10px; }
        .q-card { margin-bottom: 30px; padding: 20px; border: 1px solid #ebedef; border-radius: 12px; background: #fff; }
        .q-text { font-weight: bold; font-size: 1.1em; margin-bottom: 15px; color: #1b2631; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; text-align: left; border: 2px solid #f1c40f; background: #fff; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 0.95em; }
        button:hover { background: #f1c40f; color: #fff; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 0.95em; }
        .correct { background: #d4edda; border-left: 5px solid #28a745; color: #155724; }
        .wrong { background: #f8d7da; border-left: 5px solid #dc3545; color: #721c24; }
        #summary { display: none; margin-top: 50px; padding: 30px; background: #2e4053; color: white; border-radius: 15px; text-align: center; }
        .tag { font-size: 0.8em; color: #d4ac0d; display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📐 ข้อสอบคณิตศาสตร์ ป.5 (ฉบับสมบูรณ์ 50 ข้อ)</h1>
    <p style="text-align: center;"><b>จัดทำโดย: พระจอมเกล้าติวเตอร์</b></p>

    <div id="quiz-area">
        <div id="dynamic-questions"></div>
    </div>

    <div id="summary">
        <h2>📊 ผลการทดสอบเชิงวิเคราะห์</h2>
        <div id="score-text" style="font-size: 2.5em; margin: 20px 0; color: #f1c40f;"></div>
        <div id="analysis" style="text-align: left; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "0.5 × 0.7 มีค่าเท่ากับข้อใด?", a: 2, opts: ["ก. 3.5", "ข. 0.350", "ค. 0.35", "ง. 0.035"], ex: "ทศนิยม 1 ตำแหน่งคูณกับ 1 ตำแหน่ง คำตอบต้องมี 2 ตำแหน่ง (5 × 7 = 35 -> 0.35)" },
        { q: "12.45 ÷ 5 มีค่าเท่ากับเท่าใด?", a: 1, opts: ["ก. 2.41", "ข. 2.49", "ค. 2.51", "ง. 2.59"], ex: "12.45 / 5 = 2.49" },
        { q: "เงิน 500 บาท คิดเป็นร้อยละ 20 ของเงินจำนวนใด?", a: 3, opts: ["ก. 1,000 บาท", "ข. 1,500 บาท", "ค. 2,000 บาท", "ง. 2,500 บาท"], ex: "ถ้า 20% คือ 500 ดังนั้น 100% คือ (500 / 20) × 100 = 2,500" },
        { q: "ซื้อรองเท้ามา 800 บาท ขายไป 1,000 บาท ได้กำไรร้อยละเท่าใด?", a: 1, opts: ["ก. ร้อยละ 20", "ข. ร้อยละ 25", "ค. ร้อยละ 30", "ง. ร้อยละ 15"], ex: "กำไร 200 บาท คิดจากทุน 800: (200 / 800) × 100 = 25%" },
        { q: "รูปสี่เหลี่ยมใดที่ด้านขนานกันเพียงคู่เดียว?", a: 2, opts: ["ก. สี่เหลี่ยมด้านขนาน", "ข. สี่เหลี่ยมรูปว่าว", "ค. สี่เหลี่ยมคางหมู", "ง. สี่เหลี่ยมขนมเปียกปูน"], ex: "นิยามของสี่เหลี่ยมคางหมูคือมีด้านขนานกัน 1 คู่" },
        { q: "สี่เหลี่ยมผืนผ้ากว้าง 5 ซม. ยาว 12 ซม. มีพื้นที่กี่ตารางเซนติเมตร?", a: 3, opts: ["ก. 17", "ข. 34", "ค. 50", "ง. 60"], ex: "พื้นที่สี่เหลี่ยมผืนผ้า = กว้าง × ยาว = 5 × 12 = 60" },
        { q: "กล่องทรงสี่เหลี่ยมมุมฉาก กว้าง 2 ม. ยาว 3 ม. สูง 4 ม. มีปริมาตรกี่ลูกบาศก์เมตร?", a: 2, opts: ["ก. 9", "ข. 12", "ค. 24", "ง. 48"], ex: "ปริมาตร = ก × ย × ส = 2 × 3 × 4 = 24" },
        { q: "0.123 เขียนในรูปเศษส่วนได้ตามข้อใด?", a: 3, opts: ["ก. 123/10", "ข. 123/100", "ค. 12/1000", "ง. 123/1000"], ex: "ทศนิยม 3 ตำแหน่ง ตัวส่วนจะเป็น 1,000" },
        { q: "ค่าเฉลี่ยของ 10, 20, 30, 40 คือเท่าใด?", a: 1, opts: ["ก. 20", "ข. 25", "ค. 30", "ง. 35"], ex: "(10+20+30+40) / 4 = 100 / 4 = 25" },
        { q: "ติดป้ายขายเสื้อ 400 บาท ลดราคา 15% จะต้องจ่ายเงินกี่บาท?", a: 2, opts: ["ก. 60 บาท", "ข. 300 บาท", "ค. 340 บาท", "ง. 385 บาท"], ex: "ลด 15% ของ 400 คือ 60 บาท ดังนั้นราคาขาย = 400 - 60 = 340" },
        { q: "3.14159 ประมาณเป็นทศนิยม 2 ตำแหน่งได้เท่าใด?", a: 1, opts: ["ก. 3.15", "ข. 3.14", "ค. 3.1", "ง. 3.20"], ex: "ตำแหน่งที่ 3 คือเลข 1 ซึ่งน้อยกว่า 5 จึงปัดทิ้ง" },
        { q: "มุมภายในของรูปสี่เหลี่ยมรวมกันได้กี่องศา?", a: 3, opts: ["ก. 90", "ข. 180", "ค. 270", "ง. 360"], ex: "รูปสี่เหลี่ยมแบ่งเป็นสามเหลี่ยมได้ 2 รูป (180 + 180 = 360)" },
        { q: "รูปสี่เหลี่ยมจัตุรัสมีเส้นรอบรูป 20 ซม. จะมีด้านยาวด้านละกี่ซม.?", a: 0, opts: ["ก. 5", "ข. 10", "ค. 15", "ง. 20"], ex: "20 ÷ 4 ด้าน = 5 ซม. ต่อด้าน" },
        { q: "เศษส่วน 4/5 คิดเป็นกี่เปอร์เซ็นต์?", a: 2, opts: ["ก. 40%", "ข. 75%", "ค. 80%", "ง. 90%"], ex: "(4 / 5) × 100 = 80%" },
        { q: "0.9 ÷ 0.3 มีค่าเท่ากับข้อใด?", a: 1, opts: ["ก. 0.3", "ข. 3", "ค. 30", "ง. 0.03"], ex: "เลื่อนจุดเป็น 9 ÷ 3 = 3" },
        { q: "สี่เหลี่ยมขนมเปียกปูนมีฐาน 6 ซม. สูง 4 ซม. พื้นที่คือเท่าใด?", a: 2, opts: ["ก. 10", "ข. 12", "ค. 24", "ง. 48"], ex: "พื้นที่สี่เหลี่ยมขนมเปียกปูน = ฐาน × สูง = 6 × 4 = 24" },
        { q: "ความจุของน้ำ 1 ลิตร เท่ากับกี่ลูกบาศก์เซนติเมตร?", a: 2, opts: ["ก. 10", "ข. 100", "ค. 1,000", "ง. 10,000"], ex: "1 ลิตร = 1,000 ลบ.ซม." },
        { q: "กราฟชนิดใดเหมาะสำหรับการแสดงการเปลี่ยนแปลงของข้อมูลตามเวลา?", a: 1, opts: ["ก. แผนภูมิแท่ง", "ข. กราฟเส้น", "ค. แผนภูมิรูปภาพ", "ง. แผนภูมิวงกลม"], ex: "กราฟเส้นช่วยให้เห็นแนวโน้มการขึ้นลงได้ชัดเจน" },
        { q: "2.5 กิโลกรัม เท่ากับกี่กรัม?", a: 3, opts: ["ก. 25", "ข. 250", "ค. 2,000", "ง. 2,500"], ex: "1 กก. = 1,000 กรัม ดังนั้น 2.5 × 1,000 = 2,500" },
        { q: "ถ้าทุน 1,200 บาท ขาดทุน 10% ขายไปกี่บาท?", a: 1, opts: ["ก. 1,100", "ข. 1,080", "ค. 1,000", "ง. 900"], ex: "ขาดทุน 120 บาท ขายไป 1,200 - 120 = 1,080" },
        { q: "0.08 × 100 มีค่าเท่าใด?", a: 1, opts: ["ก. 0.8", "ข. 8", "ค. 80", "ง. 800"], ex: "คูณ 100 ให้เลื่อนจุดไปทางขวา 2 ตำแหน่ง" },
        { q: "รูปสี่เหลี่ยมด้านขนานมีด้านคู่ขนานกี่คู่?", a: 1, opts: ["ก. 1 คู่", "ข. 2 คู่", "ค. 3 คู่", "ง. ไม่มีเลย"], ex: "นิยามคือด้านตรงข้ามขนานกัน 2 คู่" },
        { q: "เส้นทแยงมุมตัดกันเป็นมุมฉากและยาวเท่ากันคือสี่เหลี่ยมใด?", a: 0, opts: ["ก. จัตุรัส", "ข. ผืนผ้า", "ค. ขนมเปียกปูน", "ง. คางหมู"], ex: "สี่เหลี่ยมจัตุรัสมีเส้นทแยงมุมยาวเท่ากันและตั้งฉากกัน" },
        { q: "น้ำเปล่า 5.5 ลิตร แบ่งใส่ขวด ขวดละ 0.5 ลิตร ได้กี่ขวด?", a: 2, opts: ["ก. 10", "ข. 11", "ค. 12", "ง. 13"], ex: "5.5 / 0.5 = 11" },
        { q: "ร้อยละ 45 ของ 200 คือเท่าใด?", a: 2, opts: ["ก. 45", "ข. 80", "ค. 90", "ง. 100"], ex: "(45 / 100) × 200 = 90" },
        { q: "1.2 + 0.34 + 5 มีค่าเท่าใด?", a: 2, opts: ["ก. 1.54", "ข. 5.34", "ค. 6.54", "ง. 6.34"], ex: "ตั้งหลักทศนิยมให้ตรงกัน: 1.20 + 0.34 + 5.00 = 6.54" },
        { q: "สี่เหลี่ยมรูปว่าวมีเส้นทแยงมุมยาว 10 และ 12 ซม. พื้นที่คือเท่าใด?", a: 1, opts: ["ก. 120", "ข. 60", "ค. 40", "ง. 22"], ex: "พื้นที่รูปว่าว = 1/2 × ผลคูณเส้นทแยงมุม = 1/2 × 10 × 12 = 60" },
        { q: "ลูกบาศก์ที่มีด้านยาว 3 ซม. มีปริมาตรเท่าใด?", a: 3, opts: ["ก. 9", "ข. 12", "ค. 18", "ง. 27"], ex: "3 × 3 × 3 = 27" },
        { q: "7/20 ทำเป็นทศนิยมได้เท่าใด?", a: 1, opts: ["ก. 0.7", "ข. 0.35", "ค. 0.07", "ง. 0.14"], ex: "(7 / 20) × (5 / 5) = 35 / 100 = 0.35" },
        { q: "ส่วนสูงของรูปสี่เหลี่ยมต้องตั้งฉากกับอะไรเสมอ?", a: 0, opts: ["ก. ฐาน", "ข. เส้นทแยงมุม", "ค. ด้านข้าง", "ง. จุดยอด"], ex: "ส่วนสูงต้องวัดจากระยะห่างที่ตั้งฉากกับฐาน" },
        { q: "โจทย์ปัญหา: มีส้ม 10.5 กก. เน่าไป 1.2 กก. ขายไป 5.5 กก. เหลือส้มกี่กก.?", a: 1, opts: ["ก. 4.3", "ข. 3.8", "ค. 4.8", "ง. 3.5"], ex: "10.5 - 1.2 - 5.5 = 3.8" },
        { q: "เปอร์เซ็นต์เขียนแทนด้วยสัญลักษณ์ใด?", a: 2, opts: ["ก. $", "ข. #", "ค. %", "ง. @"], ex: "เครื่องหมายร้อยละคือ %" },
        { q: "0.45 มากกว่า 0.405 อยู่เท่าใด?", a: 0, opts: ["ก. 0.045", "ข. 0.445", "ค. 0.005", "ง. 0.1"], ex: "0.450 - 0.405 = 0.045" },
        { q: "สี่เหลี่ยมผืนผ้ามีเส้นรอบรูป 30 ซม. กว้าง 5 ซม. จะยาวกี่ซม.?", a: 1, opts: ["ก. 5", "ข. 10", "ค. 15", "ง. 20"], ex: "30 - (5+5) = 20, จากนั้น 20 / 2 ด้านที่เหลือ = 10" },
        { q: "20% ของนักเรียน 40 คน คือกี่คน?", a: 1, opts: ["ก. 4", "ข. 8", "ค. 10", "ง. 20"], ex: "(20 / 100) × 40 = 8" },
        { q: "การหาปริมาตร ต้องใช้หน่วยใด?", a: 2, opts: ["ก. ตารางหน่วย", "ข. หน่วย", "ค. ลูกบาศก์หน่วย", "ง. กรัม"], ex: "ปริมาตรมี 3 มิติ จึงใช้คำว่าลูกบาศก์" },
        { q: "6.25 × 0.4 เท่ากับเท่าใด?", a: 1, opts: ["ก. 25.0", "ข. 2.5", "ค. 0.25", "ง. 250"], ex: "625 × 4 = 2500, ทศนิยมรวม 3 ตำแหน่ง = 2.500" },
        { q: "เลข 5 ใน 12.35 อยู่ในหลักใด?", a: 2, opts: ["ก. หลักสิบ", "ข. หลักส่วนสิบ", "ค. หลักส่วนร้อย", "ง. หลักส่วนพัน"], ex: "ทศนิยมตำแหน่งที่ 2 คือหลักส่วนร้อย" },
        { q: "พื้นที่สี่เหลี่ยมด้านขนาน = ฐาน × ?", a: 0, opts: ["ก. สูง", "ข. กว้าง", "ค. ยาว", "ง. เส้นทแยงมุม"], ex: "สูตรคือ ฐาน × สูง" },
        { q: "เงินต้น 1,000 บาท ดอกเบี้ย 2% ต่อปี หนึ่งปีจะได้ดอกเบี้ยกี่บาท?", a: 1, opts: ["ก. 2", "ข. 20", "ค. 200", "ง. 102"], ex: "1,000 × 0.02 = 20" },
        { q: "10 ÷ 0.1 มีค่าเท่าใด?", a: 2, opts: ["ก. 1", "ข. 10", "ค. 100", "ง. 0.1"], ex: "10 / (1/10) = 10 × 10 = 100" },
        { q: "รูปสี่เหลี่ยมใดไม่มีด้านใดขนานกันเลย?", a: 3, opts: ["ก. ผืนผ้า", "ข. คางหมู", "ค. ด้านขนาน", "ง. สี่เหลี่ยมรูปว่าว"], ex: "รูปว่าวมีแค่ด้านประชิดเท่ากัน แต่ไม่มีคู่ขนาน" },
        { q: "ทศนิยม 2.5 เขียนเป็นร้อยละได้เท่าใด?", a: 3, opts: ["ก. 2.5%", "ข. 25%", "ค. 250%", "ง. 0.25%"], ex: "2.5 × 100 = 250%" },
        { q: "บ่อปลาลึก 2 ม. กว้าง 5 ม. ยาว 10 ม. จุน้ำได้กี่ลูกบาศก์เมตร?", a: 2, opts: ["ก. 17", "ข. 50", "ค. 100", "ง. 200"], ex: "2 × 5 × 10 = 100" },
        { q: "ถ้า 1 ดอลลาร์ = 35.50 บาท 10 ดอลลาร์จะเท่ากับกี่บาท?", a: 1, opts: ["ก. 3550", "ข. 355", "ค. 35.5", "ง. 3.55"], ex: "35.50 × 10 = 355" },
        { q: "ค่าเฉลี่ยของคะแนน 5, 5, 5, 5 คือเท่าใด?", a: 0, opts: ["ก. 5", "ข. 10", "ค. 20", "ง. 0"], ex: "ถ้าข้อมูลเท่ากันหมด ค่าเฉลี่ยคือตัวเลขนั้น" },
        { q: "สี่เหลี่ยมจัตุรัสมีพื้นที่ 49 ตร.ซม. จะยาวด้านละกี่ซม.?", a: 1, opts: ["ก. 6", "ข. 7", "ค. 8", "ง. 9"], ex: "7 × 7 = 49" },
        { q: "0.666... ประมาณเป็นทศนิยม 1 ตำแหน่งคือ?", a: 1, opts: ["ก. 0.6", "ข. 0.7", "ค. 0.67", "ง. 1.0"], ex: "ตำแหน่งที่ 2 คือ 6 (มากกว่า 5) จึงปัดขึ้น" },
        { q: "เครื่องพิมพ์ราคา 2,000 บาท ลดเหลือ 1,600 บาท ลดราคากี่เปอร์เซ็นต์?", a: 1, opts: ["ก. 10%", "ข. 20%", "ค. 30%", "ง. 40%"], ex: "ลดไป 400 จาก 2000: (400 / 2000) × 100 = 20%" },
        { q: "มุมฉากมีขนาดกี่องศา?", a: 2, opts: ["ก. 45", "ข. 60", "ค. 90", "ง. 180"], ex: "มุมฉากคือ 90 องศา" }
    ];

    let score = 0;
    let answered = 0;

    function renderQuestions() {
        const container = document.getElementById('dynamic-questions');
        questions.forEach((item, index) => {
            const qNum = index + 1;
            const html = `
                <div class="q-card" id="q${qNum}">
                    <span class="tag">ข้อที่ ${qNum}</span>
                    <div class="q-text">${qNum}. ${item.q}</div>
                    <div class="options">
                        ${item.opts.map((opt, i) => `<button onclick="ans(${qNum}, ${i}, ${i === item.a})">${opt}</button>`).join('')}
                    </div>
                    <div id="ex${qNum}" class="explanation"></div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function ans(id, choice, isCorrect) {
        const ex = document.getElementById('ex' + id);
        if (ex.style.display === 'block') return;

        answered++;
        ex.style.display = 'block';
        
        const explanationText = questions[id-1].ex;

        if (isCorrect) {
            score++;
            ex.className = "explanation correct";
            ex.innerHTML = "🎯 <b>ถูกต้อง!</b> วิธีคิด: " + explanationText;
        } else {
            ex.className = "explanation wrong";
            ex.innerHTML = "💡 <b>เกือบถูกแล้ว...</b> วิธีคิด: " + explanationText;
        }

        if (answered === 50) {
            showSummary();
        }
    }

    function showSummary() {
        const sum = document.getElementById('summary');
        sum.style.display = 'block';
        document.getElementById('score-text').innerText = `คุณทำได้ ${score} / 50 คะแนน`;
        
        let report = "<b>บทวิเคราะห์ทักษะคณิตศาสตร์ (พระจอมเกล้าติวเตอร์):</b><br><br>";
        if (score >= 45) report += "💎 อัจฉริยะคณิตศาสตร์! คุณมีความแม่นยำสูงมากทั้งเรื่องการคำนวณและรูปทรงเรขาคณิต";
        else if (score >= 30) report += "📏 พื้นฐานแน่น: คุณทำเรื่องทศนิยมได้ดี แต่อาจต้องทบทวนสูตรพื้นที่สี่เหลี่ยมและการหาเปอร์เซ็นต์กำไร-ขาดทุนอีกนิด";
        else report += "🖍️ สู้ต่อไป: แนะนำให้ฝึกการคูณ/หารทศนิยม และจำสูตรปริมาตรให้ขึ้นใจ จะช่วยให้คะแนนดีขึ้นแน่นอนครับ";
        
        document.getElementById('analysis').innerHTML = report;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = renderQuestions;
