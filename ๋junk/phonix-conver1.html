<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ron Na Mini Marathon Dialogue - Learning English</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap');
        
        body {
            font-family: 'Poppins', 'Kanit', sans-serif;
            background-color: #f0fdf4; /* เปลี่ยนเป็นโทนสีเขียวสุขภาพ/งานวิ่ง */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { color: #16a34a; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9em; }

        .dialogue-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            position: relative;
            max-width: 85%;
            line-height: 1.5;
        }

        .bubble:hover {
            transform: scale(1.02);
        }

        /* สไตล์ของ นานา (Nana) */
        .nana {
            align-self: flex-start;
            background-color: #f0fdf4;
            border: 2px solid #bbf7d0;
            color: #16a34a;
        }

        .nana::before {
            content: "Nana 🏃‍♀️";
            display: block;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* สไตล์ของ ตาล (Tarn) */
        .tarn {
            align-self: flex-end;
            background-color: #fef9c3;
            border: 2px solid #fef08a;
            color: #a16207;
        }

        .tarn::before {
            content: "Tarn 🏃‍♂️";
            display: block;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .eng-text { font-weight: 600; display: block; }
        .thai-text { font-size: 0.85em; opacity: 0.8; }

        .playing {
            background-color: #fff;
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ron Na Mini Marathon Planning</h1>
        <p class="subtitle">บทสนทนาฝึกภาษาอังกฤษหัวข้อการวิ่งมาราธอน <br> (คลิกที่ประโยคเพื่อฟังเสียงอ่านภาษาอังกฤษ)</p>

        <div class="dialogue-box" id="chat">
            <!-- JavaScript จะนำบทสนทนามาใส่ตรงนี้ -->
        </div>

        <div class="footer">
            Designed for Running Enthusiasts & English Learners
        </div>
    </div>

    <script>
        // ข้อมูลบทสนทนาทั้งหมด 10 ประโยค (คนละ 5 ประโยค)
        const dialogue = [
            { name: "Nana", gender: "female", en: "Hi, Tarn! Are you ready for the Ron Na Mini Marathon next month?", th: "ไฮตาล! พร้อมสำหรับการวิ่งร่อนนามินิมาราธอนเดือนหน้าหรือยังจ๊ะ?" },
            { name: "Tarn", gender: "male", en: "Hello, Nana! I am still a bit worried because I haven't practiced running 10 kilometers yet.", th: "สวัสดีนานา! ยังแอบกังวลนิดหน่อยเลย เพราะฉันยังไม่ได้ซ้อมวิ่งระยะ 10 กิโลเมตรเลยล่ะ" },
            { name: "Nana", gender: "female", en: "Don't worry, we still have time to train together every evening at the park.", th: "ไม่ต้องห่วงนะ เรายังมีเวลาซ้อมด้วยกันทุกเย็นที่สวนสาธารณะนะ" },
            { name: "Tarn", gender: "male", en: "That sounds great! What time should we start our running session today?", th: "ฟังดูดีจัง! วันนี้เราจะเริ่มโปรแกรมวิ่งกันตอนกี่โมงดีล่ะ?" },
            { name: "Nana", gender: "female", en: "Let's meet at 5:30 PM so the weather won't be too hot for us.", th: "เจอกันตอนห้าโมงครึ่งเย็นนะ อากาศจะได้ไม่ร้อนเกินไปสำหรับพวกเรา" },
            { name: "Tarn", gender: "male", en: "Perfect! Should I bring some energy gels or sports drinks for our practice?", th: "เจ๋งเลย! ฉันควรเตรียมเอนเนอร์จี้เจลหรือเครื่องดื่มเกลือแร่ไปเผื่อตอนซ้อมไหม?" },
            { name: "Nana", gender: "female", en: "Yes, please, and don't forget to wear your most comfortable running shoes.", th: "เตรียมมาด้วยก็ดีจ้ะ แล้วก็อย่าลืมใส่รองเท้าวิ่งที่สบายที่สุดมาด้วยนะ" },
            { name: "Tarn", gender: "male", en: "I will definitely do that, and I really want to see the beautiful views at Ron Na.", th: "ได้เลยจ้า ฉันอยากไปเห็นวิวสวยๆ ที่ร่อนนาจะแย่แล้ว" },
            { name: "Nana", gender: "female", en: "The scenery there is amazing, and we will definitely cross the finish line together!", th: "ทัศนียภาพที่นั่นวิเศษมากเลยล่ะ และพวกเราจะต้องเข้าเส้นชัยไปด้วยกันแน่นอน!" },
            { name: "Tarn", gender: "male", en: "Thank you for encouraging me, Nana; let's go change our clothes and get ready!", th: "ขอบคุณที่ช่วยกระตุ้นฉันนะนานา งั้นพวกเราไปเปลี่ยนชุดแล้วเตรียมตัวกันเถอะ!" }
        ];

        const chatContainer = document.getElementById('chat');
        const synth = window.speechSynthesis;

        function speak(text, gender) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.95; // ความเร็วระดับกำลังพอดีสำหรับการฝึกฟัง
            
            // คัดเลือกเสียงระบบ (สุ่มหาเสียงตามเพศตัวละคร)
            const voices = synth.getVoices();
            if (gender === 'female') {
                utter.voice = voices.find(v => v.name.includes('Google US English') && v.name.includes('Female')) || voices.find(v => v.name.includes('Female')) || voices.find(v => v.lang.startsWith('en')) || voices[0];
                utter.pitch = 1.1;
            } else {
                utter.voice = voices.find(v => v.name.includes('Google US English') && v.name.includes('Male')) || voices.find(v => v.name.includes('Male')) || voices.find(v => v.lang.startsWith('en')) || voices[0];
                utter.pitch = 0.95;
            }
            
            synth.speak(utter);
        }

        // วนลูปสร้างกล่องข้อความในหน้าเว็บ
        dialogue.forEach((item, index) => {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${item.name.toLowerCase()}`;
            bubble.innerHTML = `
                <span class="eng-text">${item.en}</span>
                <span class="thai-text">${item.th}</span>
            `;
            
            bubble.onclick = () => {
                // ลบคลาสเล่นเสียงจากทุกกล่องก่อนหน้า
                document.querySelectorAll('.bubble').forEach(b => b.classList.remove('playing'));
                // เพิ่มเอฟเฟกต์ไฮไลต์กล่องที่กำลังเล่นเสียง
                bubble.classList.add('playing');
                // เรียกฟังก์ชั่นส่งเสียง
                speak(item.en, item.gender);
            };
            
            chatContainer.appendChild(bubble);
        });

        // บังคับให้โหลดเสียงบนบางเบราว์เซอร์เตรียมพร้อมไว้
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
