<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - Super Dialogue 32 ประโยค</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --namhom: #e67e22; --guest: #2980b9; --bg: #f8f9fa; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .app-box { max-width: 900px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header-bar { background: linear-gradient(135deg, #2c3e50, #000); color: white; padding: 25px; text-align: center; }
        .header-bar h1 { margin: 0; font-size: 1.6em; }
        .author { font-size: 0.8em; opacity: 0.7; margin-top: 5px; }
        
        .chat-area { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 15px; border-radius: 18px; max-width: 85%; cursor: pointer; transition: 0.2s; position: relative; }
        .msg:active { transform: scale(0.98); }
        
        /* ฝั่งแขก */
        .g-msg { align-self: flex-start; background: #e3f2fd; border: 1px solid #bbdefb; border-bottom-left-radius: 2px; }
        .g-msg::before { content: "👤 Guest"; font-weight: bold; color: var(--guest); display: block; margin-bottom: 5px; font-size: 0.8em; }
        
        /* ฝั่งน้องน้ำหอม */
        .n-msg { align-self: flex-end; background: #fff3e0; border: 1px solid #ffe0b2; border-bottom-right-radius: 2px; }
        .n-msg::before { content: "👧 Namhom"; font-weight: bold; color: var(--namhom); display: block; margin-bottom: 5px; font-size: 0.8em; text-align: right; }

        .en { font-family: 'Poppins', sans-serif; display: block; font-weight: 500; font-size: 1.05em; margin-bottom: 4px; }
        .th { font-size: 0.9em; color: #616161; }
        .sound-icon { position: absolute; top: 10px; right: 10px; font-size: 0.8em; color: #ccc; }
    </style>
</head>
<body>

<div class="app-box">
    <div class="header-bar">
        <h1>ฝึกพูดภาษาอังกฤษ 32 ประโยค (รีสอร์ท & ร้านอาหาร)</h1>
        <div class="author">เขียนโดย CHINPONG SMART FARM</div>
    </div>

    <div class="chat-area" id="chat">
        </div>
</div>

<script>
    const dialogue32 = [
        {r: "G", en: "Excuse me, where is the dining area? We are quite hungry.", th: "ขอโทษครับ ห้องอาหารไปทางไหนครับ? พวกเราหิวกันนิดหน่อยแล้ว"},
        {r: "N", en: "It is right here! Welcome to our riverside restaurant.", th: "ตรงนี้เลยค่ะ! ยินดีต้อนรับสู่ห้องอาหารริมน้ำของเรานะคะ"},
        {r: "G", en: "It looks lovely. Can we have a table for four, please?", th: "ดูดีจังเลย ขอโต๊ะสำหรับ 4 ท่านได้ไหมครับ?"},
        {r: "N", en: "Certainly! Would you like to sit inside or outside on the balcony?", th: "ได้แน่นอนค่ะ คุณลูกค้าอยากนั่งข้างในหรือข้างนอกตรงระเบียงดีคะ?"},
        {r: "G", en: "We prefer the balcony for the fresh air.", th: "พวกเราชอบตรงระเบียงมากกว่าครับ จะได้รับอากาศบริสุทธิ์"},
        {r: "N", en: "Follow me, please. Here is your table and the menus.", th: "เดินตามหนูมาเลยค่ะ นี่คือโต๊ะและเมนูอาหารนะคะ"},
        {r: "G", en: "Thank you. What is your special menu for today?", th: "ขอบคุณครับ เมนูพิเศษของวันนี้คืออะไรเหรอ?"},
        {r: "N", en: "Today we have fresh Sea Bass with Lemon and Spicy Shrimp Soup.", th: "วันนี้เรามีปลากะพงนึ่งมะนาวและต้มยำกุ้งสดค่ะ"},
        {r: "G", en: "I like spicy food. Is the Green Curry very spicy?", th: "ผมชอบกินเผ็ด แกงเขียวหวานเผ็ดมากไหมครับ?"},
        {r: "N", en: "It is medium spicy, but we can make it more spicy for you.", th: "เผ็ดกลางๆ ค่ะ แต่เราสามารถเพิ่มความเผ็ดให้คุณได้นะคะ"},
        {r: "G", en: "Good. I will take Green Curry and one Massaman Curry.", th: "ดีครับ งั้นผมเอาแกงเขียวหวานและมัสมั่นหนึ่งที่"},
        {r: "N", en: "Massaman is great! Do you want it with chicken or beef?", th: "มัสมั่นอร่อยมากค่ะ! คุณลูกค้าจะรับเป็นไก่หรือเนื้อดีคะ?"},
        {r: "G", en: "Chicken, please. Also, do you have any vegetarian dishes?", th: "เอาไก่ครับ แล้วที่นี่มีอาหารมังสวิรัติบ้างไหม?"},
        {r: "N", en: "Yes, we have Stir-fried Mixed Vegetables and Fried Tofu.", th: "มีค่ะ เรามีผัดผักรวมมิตรและเต้าหู้ทอดค่ะ"},
        {r: "G", en: "Perfect. We will take the stir-fried vegetables too.", th: "สมบูรณ์แบบ งั้นเอาผัดผักรวมมาด้วยครับ"},
        {r: "N", en: "Got it. Are you allergic to any ingredients like peanuts or MSG?", th: "รับทราบค่ะ คุณลูกค้าแพ้ส่วนผสมอะไรไหมคะ เช่น ถั่ว หรือ ผงชูรส?"},
        {r: "G", en: "No allergies. What about the drinks?", th: "ไม่แพ้อะไรครับ แล้วเรื่องเครื่องดื่มล่ะ?"},
        {r: "N", en: "We have fresh coconut water, Thai tea, and fruit shakes.", th: "เรามีน้ำมะพร้าวสด ชาไทย และผลไม้ปั่นค่ะ"},
        {r: "G", en: "I want two Thai teas and two fresh coconuts.", th: "ผมเอาชาไทย 2 และมะพร้าวสด 2 ครับ"},
        {r: "N", en: "One moment, please. I will repeat your order.", th: "รอสักครู่นะคะ เดี๋ยวหนูขออนุญาตทวนออเดอร์ค่ะ"},
        {r: "G", en: "Please do. We want to make sure it is correct.", th: "เชิญเลยครับ พวกเราอยากให้แน่ใจว่ามันถูกต้อง"},
        {r: "N", en: "You ordered Green Curry, Massaman Chicken, and Mixed Veggies.", th: "คุณลูกค้าสั่งแกงเขียวหวาน, มัสมั่นไก่ และผัดผักรวมค่ะ"},
        {r: "G", en: "That is correct. How long will it take?", th: "ถูกต้องครับ ต้องรอนานไหม?"},
        {r: "N", en: "About fifteen minutes. Here are your drinks first.", th: "ประมาณ 15 นาทีค่ะ นี่เครื่องดื่มของคุณลูกค้า ได้ก่อนเลยค่ะ"},
        {r: "G", en: "Thank you. This Thai tea tastes wonderful!", th: "ขอบคุณครับ ชาไทยนี่รสชาติยอดเยี่ยมมาก!"},
        {r: "N", en: "I am glad you like it! Here is your food. Enjoy your meal.", th: "ดีใจที่คุณชอบค่ะ! อาหารมาแล้วค่ะ ทานให้อร่อยนะคะ"},
        {r: "G", en: "Excuse me, can we have some more napkins and spoons?", th: "ขอโทษครับ ขอกระดาษทิชชู่และช้อนเพิ่มหน่อยได้ไหม?"},
        {r: "N", en: "Of course! I will bring them to you right away.", th: "ได้เลยค่ะ เดี๋ยวหนูรีบนำมาให้เดี๋ยวนี้เลยค่ะ"},
        {r: "G", en: "Everything was delicious. We are very full now.", th: "ทุกอย่างอร่อยมากครับ ตอนนี้พวกเราอิ่มมากเลย"},
        {r: "N", en: "Thank you. Would you like some Mango Sticky Rice for dessert?", th: "ขอบคุณค่ะ รับข้าวเหนียวมะม่วงเป็นของหวานไหมคะ?"},
        {r: "G", en: "Not today, thank you. Can we have the bill, please?", th: "วันนี้ไม่ล่ะครับ ขอบคุณ ขอใบเสร็จเก็บเงินเลยครับ"},
        {r: "N", en: "Certainly. Here it is. Thank you for visiting us!", th: "ได้เลยค่ะ นี่ค่ะใบเสร็จ ขอบคุณที่แวะมาหาเรานะคะ!"}
    ];

    const chatContainer = document.getElementById('chat');

    dialogue32.forEach(item => {
        const div = document.createElement('div');
        div.className = `msg ${item.r === 'G' ? 'g-msg' : 'n-msg'}`;
        div.onclick = () => speak(item.en);
        div.innerHTML = `
            <span class="en">${item.en}</span>
            <span class="th">${item.th}</span>
            <span class="sound-icon">🔊</span>
        `;
        chatContainer.appendChild(div);
    });

    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
