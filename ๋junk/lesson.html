<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - Smart Learning</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #ddd; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .quiz-card { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); border-radius: 5px; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; background: white; cursor: pointer; }
        .option-btn:hover { background: #f0f7ff; }
        .conversation-box { background: #e8f4fd; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .speaker { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1 id="lesson-title">กำลังโหลดบทเรียน...</h1>
    <p id="subject-info">พระจอมเกล้าติวเตอร์</p>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('pretest')">Pre-test (25 ข้อ)</button>
    <button class="tab-btn" onclick="showTab('content')">เนื้อหาบทเรียน</button>
    <button class="tab-btn" onclick="showTab('posttest')">Post-test (50 ข้อ)</button>
</div>

<div class="container">
    <section id="pretest" class="content-section active">
        <h2>📝 แบบทดสอบก่อนเรียน</h2>
        <div id="pretest-list"></div>
    </section>

    <section id="content" class="content-section">
        <div id="lesson-body"></div>
    </section>

    <section id="posttest" class="content-section">
        <h2>🎓 แบบทดสอบหลังเรียน</h2>
        <div id="posttest-list"></div>
    </section>
</div>

<script>
    // 🌐 เปลี่ยน URL ตรงนี้ให้เป็น Path ของไฟล์ JSON ในเครื่องหรือ GitHub ของคุณ
    const DATA_URL = 'data/english-p5.json'; 

    async function loadData() {
        try {
            const response = await fetch(DATA_URL);
            const data = await response.json();
            
            // 1. Update Title
            document.getElementById('lesson-title').innerText = data.title;
            
            // 2. Render Content
            renderLesson(data.content);
            
            // 3. Render Quizzes
            renderQuiz('pretest-list', data.pretest);
            renderQuiz('posttest-list', data.posttest);

        } catch (error) {
            console.error("Error loading JSON:", error);
            document.getElementById('lesson-title').innerText = "ไม่พบข้อมูลบทเรียน";
        }
    }

    function renderLesson(content) {
        let html = `<p>${content.introduction}</p>`;
        content.sections.forEach(sec => {
            html += `<h3>${sec.title}</h3>`;
            if (sec.type === 'conversation') {
                sec.dialogue.forEach(d => {
                    html += `<div class="conversation-box"><span class="speaker">${d.speaker}:</span> ${d.text}</div>`;
                });
            } else if (sec.type === 'vocabulary' || sec.type === 'memory_tricks') {
                html += `<ul>${(sec.items || sec.tips).map(item => `<li>${item.word || item} ${item.meaning ? ': ' + item.meaning : ''}</li>`).join('')}</ul>`;
            } else {
                html += `<p>${sec.body || sec.description || ''}</p>`;
            }
        });
        document.getElementById('lesson-body').innerHTML = html;
    }

    function renderQuiz(containerId, quizData) {
        const container = document.getElementById(containerId);
        container.innerHTML = quizData.map((q, index) => `
            <div class="quiz-card">
                <p><strong>ข้อที่ ${index + 1}:</strong> ${q.question}</p>
                ${q.options.map((opt, i) => `
                    <button class="option-btn" onclick="checkAnswer(this, ${i}, ${q.answer})">${opt}</button>
                `).join('')}
            </div>
        `).join('');
    }

    function checkAnswer(btn, selected, correct) {
        if (selected === correct) {
            btn.style.background = "#2ecc71";
            btn.style.color = "white";
            alert("ถูกต้องครับ! 🎉");
        } else {
            btn.style.background = "#e74c3c";
            btn.style.color = "white";
            alert("ลองใหม่อีกครั้งนะ");
        }
    }

    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // เริ่มโหลดข้อมูล
    loadData();
</script>

</body>
</html>
