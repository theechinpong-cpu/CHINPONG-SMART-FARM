        { q: "การ 'อ่านจับใจความ' ควรทำสิ่งใดเป็นอันดับแรก?", a: 0, opts: ["ก. อ่านเรื่องอย่างคร่าวๆ จนจบ", "ข. ขีดเส้นใต้ทุกประโยค", "ค. เปิดพจนานุกรมหาคำยาก", "ง. ตั้งคำถามว่าใคร ทำอะไร ที่ไหน เมื่อไร"], ex: "ต้องอ่านให้จบเพื่อเห็นภาพรวมก่อนจะวิเคราะห์" },

        { q: "ประโยค 'ท้องฟ้าวันนี้ดูหม่นหมองเหลือเกิน' เป็นประโยคชนิดใด?", a: 2, opts: ["ก. ประโยคบอกเล่า", "ข. ประโยคคำสั่ง", "ค. ประโยคแสดงความรู้สึก (ข้อคิดเห็น)", "ง. ประโยคปฏิเสธ"], ex: "เป็นการแสดงทัศนคติหรือความรู้สึกส่วนตัว" },

        { q: "คำสุดท้ายของกลอนสุภาพเรียกว่าอะไร?", a: 3, opts: ["ก. คำส่ง", "ข. คำรับ", "ค. คำรอง", "ง. คำสัมผัส"], ex: "เน้นการส่งสัมผัสไปยังบทถัดไป" }
    ];

    let score = 0;
    let answered = 0;

    function renderQuestions() {
        const container = document.getElementById('dynamic-questions');
        questions.forEach((item, index) => {
            const qNum = index + 1;
            const html = `
                <div class="q-card" id="q${qNum}">
                    <span class="tag">ข้อที่ ${qNum}</span>
                    <div class="q-text">${qNum}. ${item.q}</div>
                    <div class="options">
                        ${item.opts.map((opt, i) => `<button onclick="ans(${qNum}, ${i}, ${i === item.a})">${opt}</button>`).join('')}
                    </div>
                    <div id="ex${qNum}" class="explanation"></div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function ans(id, choice, isCorrect) {
        const ex = document.getElementById('ex' + id);
        if (ex.style.display === 'block') return;

        answered++;
        ex.style.display = 'block';
        
        const explanationText = questions[id-1].ex;

        if (isCorrect) {
            score++;
            ex.className = "explanation correct";
            ex.innerHTML = "✨ <b>ถูกต้อง!</b> วิเคราะห์: " + explanationText;
        } else {
            ex.className = "explanation wrong";
            ex.innerHTML = "❌ <b>ยังไม่ถูกนะ...</b> วิเคราะห์: " + explanationText;
        }

        if (answered === 50) {
            showSummary();
        }
    }

    function showSummary() {
        const sum = document.getElementById('summary');
        sum.style.display = 'block';
        document.getElementById('score-text').innerText = `คุณได้คะแนน ${score} / 50`;
        
        let report = "<b>ผลวิเคราะห์โดย พระจอมเกล้าติวเตอร์:</b><br><br>";
        if (score >= 45) report += "🏆 ยอดเยี่ยม! คุณแม่นยำเรื่องหลักภาษาและการวิเคราะห์วรรณคดีมาก พร้อมสอบปลายภาคแล้ว";
        else if (score >= 30) report += "📝 ระดับปานกลาง: ควรทบทวนเรื่องคำราชาศัพท์และที่มาของคำภาษาต่างประเทศเพิ่มเติม";
        else report += "⚠️ ข้อควรระวัง: ทักษะการวิเคราะห์ใจความสำคัญและการสะกดคำยังเป็นจุดอ่อน ควรฝึกอ่านและเขียนบ่อยๆ";
        
        document.getElementById('analysis').innerHTML = report;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = renderQuestions;
</script>
