<script>

        { q: "ปัจจัยการผลิตทางเศรษฐศาสตร์มี 4 อย่าง ได้แก่ ที่ดิน แรงงาน ทุน และอะไร?", a: 0, opts: ["ก. ผู้ประกอบการ", "ข. เครื่องจักร", "ค. เงินตรา", "ง. โรงงาน"], ex: "ผู้ประกอบการคือผู้รวบรวมปัจจัยอีก 3 อย่างมาผลิตสินค้า" },

        { q: "ลักษณะภูมิประเทศแบบ 'ที่ราบลุ่มแม่น้ำ' มักพบมากที่สุดในภูมิภาคใดของไทย?", a: 1, opts: ["ก. ภาคเหนือ", "ข. ภาคกลาง", "ค. ภาคใต้", "ง. ภาคตะวันออกเฉียงเหนือ"], ex: "ภาคกลางเป็นพื้นที่ลุ่มต่ำที่มีแม่น้ำหลายสายไหลผ่าน เหมาะแก่การทำนา" },
        { q: "เขาพระวิหาร ตั้งอยู่ในจังหวัดใด?", a: 3, opts: ["ก. สระแก้ว", "ข. อุบลราชธานี", "ค. บุรีรัมย์", "ง. ศรีสะเกษ"], ex: "เขาพระวิหารตั้งอยู่ในเขตอำเภอกันทรลักษ์ จังหวัดศรีสะเกษ" },
        { q: "ผู้บริหารสูงสุดของ 'องค์การบริหารส่วนตำบล' (อบต.) คือใคร?", a: 2, opts: ["ก. ผู้ใหญ่บ้าน", "ข. กำนัน", "ค. นายก อบต.", "ง. นายอำเภอ"], ex: "นายก อบต. มาจากการเลือกตั้งของประชาชนในเขตตำบลนั้นๆ" },
        { q: "ข้อใดเป็นวัฒนธรรมประเพณีของภาคตะวันออกเฉียงเหนือ?", a: 0, opts: ["ก. ประเพณีแห่เทียนพรรษา", "ข. ประเพณีตักบาตรเทโว", "ค. ประเพณีชักพระ", "ง. ประเพณีลอยกระทงสาย"], ex: "การแห่เทียนพรรษาที่ยิ่งใหญ่ที่สุดอยู่ในจังหวัดอุบลราชธานี" },
        { q: "พุทธศาสนสุภาษิต 'อตฺตา หิ อตฺตโน นาโถ' หมายถึงอะไร?", a: 1, opts: ["ก. ความกตัญญูเป็นเครื่องหมายของคนดี", "ข. ตนเป็นที่พึ่งแห่งตน", "ค. ความอดทนนำมาซึ่งความสุข", "ง. ผู้ให้ย่อมเป็นที่รัก"], ex: "สอนให้เรารู้จักพึ่งพาความสามารถของตนเองก่อนขอความช่วยเหลือจากผู้อื่น" },

        { q: "ทรัพยากรธรรมชาติในข้อใดเป็นประเภท 'ใช้แล้วหมดไป'?", a: 0, opts: ["ก. น้ำมันและแก๊สธรรมชาติ", "ข. ป่าไม้", "ค. ดิน", "ง. แสงแดด"], ex: "น้ำมันต้องใช้เวลาสร้างนานหลายล้านปี เมื่อขุดมาใช้แล้วจะไม่สามารถทดแทนได้ในเวลาอันสั้น" },
        { q: "ภาคใดของประเทศไทยที่มีพื้นที่ส่วนใหญ่เป็น 'ที่ราบสูง'?", a: 3, opts: ["ก. ภาคตะวันออก", "ข. ภาคเหนือ", "ค. ภาคกลาง", "ง. ภาคตะวันออกเฉียงเหนือ"], ex: "มีลักษณะเป็นแอ่งกระทะและที่ราบสูงดินปนทราย" },
        { q: "ศาสนาทุกศาสนามีเป้าหมายสำคัญร่วมกันในเรื่องใด?", a: 1, opts: ["ก. การทำให้ทุกคนรวยเท่ากัน", "ข. การสอนให้ทุกคนเป็นคนดี", "ค. การสอนให้ทุกคนต้องไปบวช", "ง. การสร้างโบสถ์ให้สวยงาม"], ex: "แม้ข้อปฏิบัติจะต่างกัน แต่ทุกศาสนามุ่งหวังให้คนมีจริยธรรมและสันติสุข" },
        { q: "ข้อใดคือการทำหน้าที่พลเมืองดีตามระบอบประชาธิปไตย?", a: 2, opts: ["ก. การไปเที่ยวในวันเลือกตั้ง", "ข. การติดตามข่าวสารดารา", "ค. การไปใช้สิทธิเลือกตั้ง", "ง. การซื้อของราคาถูก"], ex: "การเลือกตั้งคือการมีส่วนร่วมในการปกครองโดยตรง" },
        { q: "เครื่องมือทางภูมิศาสตร์ชนิดใดที่แสดงลักษณะความสูงต่ำของพื้นที่ได้ชัดเจนที่สุด?", a: 3, opts: ["ก. เข็มทิศ", "ข. รูปถ่ายทางอากาศ", "ค. ลูกโลก", "ง. แผนที่ภูมิประเทศ"], ex: "แผนที่ภูมิประเทศจะบอกระดับความสูงผ่านเส้นชั้นความสูง (Contour line)" },

        { q: "เบญจศีล ข้อที่ 4 สอนให้ละเว้นจากการกระทำใด?", a: 1, opts: ["ก. การลักทรัพย์", "ข. การพูดเท็จ", "ค. การดื่มสุรา", "ง. การประพฤติผิดในกาม"], ex: "ศีลข้อ 4 คือ มุสาวาทา เวรมณี (ละเว้นจากการพูดไม่จริง)" },
        { q: "ผู้ที่นำสินค้าจากแหล่งผลิตไปขายให้กับผู้บริโภค เรียกว่าอะไร?", a: 2, opts: ["ก. ผู้รับใช้", "ข. ผู้บริโภค", "ค. พ่อค้าคนกลาง", "ง. เจ้าของปัจจัย"], ex: "พ่อค้าคนกลางช่วยอำนวยความสะดวกในการกระจายสินค้า" },
        { q: "ภาษีที่รัฐเก็บจากรายได้ของบุคคล เรียกว่าภาษีอะไร?", a: 0, opts: ["ก. ภาษีเงินได้บุคคลธรรมดา", "ข. ภาษีมูลค่าเพิ่ม", "ค. ภาษีศุลกากร", "ง. ภาษีโรงเรือน"], ex: "คนที่มีรายได้ถึงเกณฑ์มีหน้าที่ต้องเสียภาษีนี้เพื่อนำเงินไปพัฒนาประเทศ" },
        { q: "การรีไซเคิล (Recycle) ช่วยสิ่งแวดล้อมอย่างไร?", a: 1, opts: ["ก. ทำให้สินค้ามีราคาแพงขึ้น", "ข. ลดปริมาณขยะและใช้ทรัพยากรให้คุ้มค่า", "ค. ทำให้ป่าไม้เพิ่มขึ้นทันที", "ง. ลดการทำงานของมนุษย์"], ex: "เป็นการนำวัสดุที่ใช้แล้วกลับมาแปรรูปใช้ใหม่" },

        { q: "วันสำคัญทางศาสนาใดที่ได้รับการยกย่องเป็น 'วันสากลของโลก'?", a: 2, opts: ["ก. วันมาฆบูชา", "ข. วันอาสาฬหบูชา", "ค. วันวิสาขบูชา", "ง. วันเข้าพรรษา"], ex: "เป็นวันประสูติ ตรัสรู้ และปรินิพพานของพระพุทธเจ้า" },

    ];

    let score = 0;
    let answered = 0;

    function renderQuestions() {
        const container = document.getElementById('dynamic-questions');
        questions.forEach((item, index) => {
            const qNum = index + 1;
            const html = `
                <div class="q-card" id="q${qNum}">
                    <span class="tag">ข้อที่ ${qNum}</span>
                    <div class="q-text">${qNum}. ${item.q}</div>
                    <div class="options">
                        ${item.opts.map((opt, i) => `<button onclick="ans(${qNum}, ${i}, ${i === item.a})">${opt}</button>`).join('')}
                    </div>
                    <div id="ex${qNum}" class="explanation"></div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function ans(id, choice, isCorrect) {
        const ex = document.getElementById('ex' + id);
        if (ex.style.display === 'block') return;

        answered++;
        ex.style.display = 'block';
        
        const explanationText = questions[id-1].ex;

        if (isCorrect) {
            score++;
            ex.className = "explanation correct";
            ex.innerHTML = "✅ <b>ถูกต้อง!</b> คำอธิบาย: " + explanationText;
        } else {
            ex.className = "explanation wrong";
            ex.innerHTML = "❌ <b>ยังไม่ถูกนะ...</b> คำอธิบาย: " + explanationText;
        }

        if (answered === 50) {
            showSummary();
        }
    }

    function showSummary() {
        const sum = document.getElementById('summary');
        sum.style.display = 'block';
        document.getElementById('score-text').innerText = `คะแนนของคุณ: ${score} / 50`;
        
        let report = "<b>บทวิเคราะห์ความเข้าใจ (พระจอมเกล้าติวเตอร์):</b><br><br>";
        if (score >= 45) report += "🏅 ยอดเยี่ยมมาก! คุณมีความเข้าใจในเรื่องหน้าที่พลเมืองและภูมิศาสตร์ไทยอย่างลึกซึ้ง";
        else if (score >= 30) report += "🌱 ระดับดี: คุณเข้าใจพื้นฐานเศรษฐกิจและสังคมได้ดี แต่ควรทบทวนเรื่องทิศและเทือกเขาสำคัญเพิ่มเติม";
        else report += "📚 พยายามอีกนิด: แนะนำให้ทบทวนเรื่องประเภทของสหกรณ์และหลักธรรมทางศาสนาให้แม่นยำขึ้นนะครับ";
        
        document.getElementById('analysis').innerHTML = report;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = renderQuestions;
</script>
