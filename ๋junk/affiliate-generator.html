<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROK UNIFIED PROMPT ENGINE | KING MONGKUT TUTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="library.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f1419; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .copy-area:focus { outline: 2px solid #10b981; }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-20">

    <nav class="p-6 border-b border-white/10 glass-card sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/50">
                    <span class="text-xl">🚀</span>
                </div>
                <h1 class="text-xl font-black italic tracking-tighter text-emerald-400">GROK UNIFIED PROMPT ENGINE</h1>
            </div>
            <button onclick="generateContent()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-6 py-2 rounded-full font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-emerald-500/30">
                🔄 สุ่มสินค้า & สร้าง Prompt
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-10 max-w-4xl">
        <div id="content-output" class="space-y-8">
            </div>
    </main>

    <script>
        function generateContent() {
            // ตรวจสอบฐานข้อมูลใน library.js
            if (typeof shopeeLibrary === 'undefined' || shopeeLibrary.length === 0) {
                document.getElementById('content-output').innerHTML = `
                    <div class="p-10 text-center glass-card rounded-[2.5rem] border-rose-500/50">
                        <p class="text-rose-500 font-bold text-xl">❌ ไม่พบข้อมูลใน library.js</p>
                        <p class="text-slate-400 mt-2">กรุณาเช็คว่ามีตัวแปร const shopeeLibrary = [...] ในไฟล์ library.js</p>
                    </div>`;
                return;
            }

            // สุ่มสินค้า
            const item = shopeeLibrary[Math.floor(Math.random() * shopeeLibrary.length)];
            const container = document.getElementById('content-output');

            // --- สร้าง UNIFIED PROMPT สำหรับ GROK ---
            const unifiedPrompt = `ACT AS A PROFESSIONAL CONTENT CREATOR. 
REFERENCE IMAGE URL: ${item.img || "No image provided - please use high-quality product reference."}

INSTRUCTION: Generate a 6-second vertical 9:16 video, an English caption, and a Thai SSML voice-over for this product:

1. [VIDEO GENERATION PROMPT]:
"Cinematic 4K ultra-realistic vertical 9:16 video. BASED ON REFERENCE IMAGE: ${item.img}. Product: ${item.name}. Key Feature: ${item.highlight}. Scene: Smooth dynamic close-up pan, high-end studio lighting, soft bokeh background, sharp textures, 6 seconds long. NO DISTORTION."

2. [ENGLISH CAPTION]:
"🔥 Don't miss out! Get your ${item.name} today. Experience ${item.highlight} and upgrade your lifestyle! ✨ #MustHave #ShopeeFinds #Affiliate #${item.cat.replace(/ /g, '')}"

3. [THAI VOICE OVER (SSML)]:
<speak><prosody rate="2.9" volume="+0dB" pitch="+0st">สวัสดีครับ <break time="1ms"/> วันนี้ขอเสนอ <break time="1ms"/> ${item.name} <break time="1ms"/> ที่มีจุดเด่นคือ <break time="1ms"/> ${item.highlight} <break time="1ms"/> สินค้าดีที่ต้องมี <break time="1ms"/> สั่งซื้อได้ที่ลิงก์ในคอมเมนต์เลยครับ</prosody></speak>`;

            container.innerHTML = `
                <div class="glass-card p-8 rounded-[2.5rem] border-emerald-500/30 shadow-2xl animate-in fade-in duration-500">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-emerald-400 font-black text-xs uppercase tracking-[0.2em]">✨ Grok Master Prompt (Copy & Paste)</h3>
                        <span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full font-bold border border-emerald-500/50">READY</span>
                    </div>
                    
                    <textarea id="masterCopy" class="w-full h-80 bg-black/40 p-6 rounded-2xl text-sm font-mono text-emerald-100 leading-relaxed border border-white/10 focus:border-emerald-500/50 transition-all select-all outline-none" readonly>${unifiedPrompt.trim()}</textarea>
                    
                    <button onclick="copyToClipboard()" class="w-full mt-4 py-3 bg-white/5 hover:bg-white/10 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                        📋 คัดลอก Prompt ทั้งหมด
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1 glass-card p-4 rounded-[2rem] flex items-center justify-center overflow-hidden">
                        <img src="${item.img || 'https://via.placeholder.com/300?text=No+Image'}" 
                             class="w-full h-48 object-cover rounded-2xl border border-white/10 shadow-lg"
                             onerror="this.src='https://via.placeholder.com/300?text=Image+Not+Found'">
                    </div>
                    <div class="md:col-span-2 glass-card p-8 rounded-[2rem] flex flex-col justify-center">
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest bg-emerald-500/10 px-3 py-1 rounded-full w-fit mb-4">${item.cat}</span>
                        <h2 class="text-2xl font-black italic text-white leading-tight">${item.name}</h2>
                        <p class="text-slate-400 mt-2 italic">"${item.highlight}"</p>
                        <div class="mt-4 flex items-center gap-4">
                            <a href="${item.link}" target="_blank" class="text-xs text-blue-400 underline font-bold">เปิดลิงก์สินค้าจริง</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function copyToClipboard() {
            const copyText = document.getElementById("masterCopy");
            copyText.select();
            document.execCommand("copy");
            alert("คัดลอก Prompt ไปยัง Grok แล้ว! 🚀");
        }

        window.onload = generateContent;
    </script>
</body>
</html>
