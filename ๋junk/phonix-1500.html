        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding: 15px; border: 2px solid #f1f2f6; border-radius: 20px; background: #fff; }
        
        /* Tooltip Logic */
        .card { position: relative; background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 600; color: #2d3436; }
        .card:hover { background: var(--p); color: white; transform: scale(1.05); z-index: 10; }
        
        /* คำแปลเมื่อเอาเมาส์ชี้ */
        .card::after {
            content: attr(data-thai);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #2d3436; color: white; padding: 5px 10px; border-radius: 6px;
            font-size: 0.8em; white-space: nowrap; visibility: hidden; opacity: 0; transition: 0.2s;
            pointer-events: none; font-family: 'Sarabun', sans-serif;
        }
        .card:hover::after { visibility: visible; opacity: 1; bottom: 110%; }

        .practice-box { margin-top: 40px; padding: 30px; background: #f0f3f7; border-radius: 25px; text-align: center; border: 2px dashed var(--p); }
        .word-display { font-size: 3.5em; color: var(--p); font-weight: bold; margin: 10px 0; min-height: 1.2em; }
        .meaning-display { font-size: 1.5em; color: #636e72; margin-bottom: 20px; font-family: 'Sarabun'; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 5px; font-size: 1em; }
        .btn-rand { background: var(--p); color: white; }
        .btn-speak { background: var(--s); color: white; }

    ];

    const grid = document.getElementById('vocabGrid');
    const target = document.getElementById('targetWord');
    const thai = document.getElementById('targetThai');
    let currentItem = null;

    function init() {
        scholarData.sort((a,b) => a.en.localeCompare(b.en)).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = item.en;
            card.setAttribute('data-thai', item.th);
            card.onclick = () => {
                currentItem = item;
                target.innerText = item.en;
                thai.innerText = item.th;
                speak();
            };
            grid.appendChild(card);
        });
    }

    function filter() {
        const val = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function randomWord() {
        currentItem = scholarData[Math.floor(Math.random() * scholarData.length)];
        target.innerText = currentItem.en;
        thai.innerText = currentItem.th;
    }

    function speak() {
        if(!currentItem) return;
        const u = new SpeechSynthesisUtterance(currentItem.en);
        u.lang = 'en-US';
        u.rate = 0.8;
        synth.speak(u);
    }

    init();
</script>
