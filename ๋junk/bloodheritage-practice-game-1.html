<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - Dual Scroll Matcher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap');

        :root { --primary: #00f2ff; --secondary: #7000ff; --bg: #050b18; --text: #ffffff; }

        body {
            background: var(--bg); color: var(--text); font-family: 'Prompt', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { text-align: center; padding: 15px; background: #10192c; width: 100%; border-bottom: 2px solid var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .brand { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 0.7rem; letter-spacing: 2px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; margin: 5px 0; }

        .mission-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            max-width: 1000px; width: 95%; margin-top: 20px;
        }

        .scroll-column {
            background: rgba(16, 25, 44, 0.8); height: 500px; /* ประมาณ 12 บรรทัด */
            overflow-y: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; scrollbar-width: thin; scrollbar-color: var(--primary) #10192c;
        }

        .column-title {
            position: sticky; top: -15px; background: #1a243a; padding: 10px;
            text-align: center; font-weight: bold; color: var(--primary); z-index: 10;
            border-bottom: 1px solid var(--primary); margin-bottom: 10px;
        }

        .draggable-item {
            background: linear-gradient(90deg, var(--secondary), #4a00ff);
            padding: 10px; border-radius: 8px; cursor: grab; text-align: center;
            font-weight: 600; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s; user-select: none;
        }

        .draggable-item.dragging { opacity: 0.3; }

        .drop-target {
            background: rgba(255,255,255,0.05); border: 2px dashed #444;
            padding: 10px; border-radius: 8px; min-height: 40px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .drop-target.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
        .meaning-text { font-size: 0.9rem; color: #ccc; }

        .placed-word {
            background: var(--primary); color: #000; padding: 3px 8px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.85rem;
        }

        .controls { padding: 20px; text-align: center; }
        .btn {
            background: var(--primary); color: #000; border: none; padding: 12px 30px;
            border-radius: 50px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer;
        }

        #score-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">CHINPONG SMART FARM OPS</div>
    <h1>VOCAB DUAL-SCROLL CHALLENGE</h1>
</div>

<div class="mission-container">
    <div class="scroll-column" id="vocab-col">
        <div class="column-title">ENGLISH WORDS</div>
        <div id="source-container"></div>
    </div>

    <div class="scroll-column" id="meaning-col">
        <div class="column-title">THAI MEANINGS</div>
        <div id="target-container"></div>
    </div>
</div>

<div class="controls">
    <button class="btn" onclick="checkMission()">CHECK MISSION ✅</button>
</div>

<div id="score-screen">
    <h2 style="font-family: Orbitron; color: var(--primary);">MISSION REPORT</h2>
    <div style="font-size: 4rem; border: 4px solid var(--primary); padding: 20px 40px; border-radius: 50%; margin: 20px;" id="final-score">0</div>
    <div id="eval-text"></div>
    <button class="btn" style="margin-top:20px" onclick="location.reload()">RE-INITIALIZE</button>
</div>

<script>
    const data = [
        {en: "Winter", th: "ฤดูหนาว"}, {en: "Bone", th: "กระดูก"}, {en: "Yesterday", th: "เมื่อวาน"},
        {en: "Bored", th: "น่าเบื่อ"}, {en: "Young", th: "วัยเยาว์"}, {en: "History", th: "ประวัติศาสตร์"},
        {en: "Future", th: "อนาคต"}, {en: "Library", th: "ห้องสมุด"}, {en: "Laptop", th: "โน้ตบุ๊ก"},
        {en: "Math", th: "คณิตศาสตร์"}, {en: "Geography", th: "ภูมิศาสตร์"}, {en: "Brain", th: "สมอง"},
        {en: "Email", th: "อีเมล"}, {en: "Password", th: "รหัสผ่าน"}, {en: "Mouse", th: "เมาส์"},
        {en: "Battery", th: "แบตเตอรี่"}, {en: "Zero", th: "ศูนย์"}, {en: "Charger", th: "ที่ชาร์จ"},
        {en: "Loudly", th: "อย่างเสียงดัง"}, {en: "Quickly", th: "อย่างรวดเร็ว"}, {en: "Quietly", th: "อย่างเงียบๆ"},
        {en: "Screen", th: "หน้าจอ"}, {en: "Object", th: "วัตถุ"}, {en: "Jungle", th: "ป่าทึบ"},
        {en: "Calendar", th: "ปฏิทิน"}, {en: "Excited", th: "ตื่นเต้น"}, {en: "Heart", th: "หัวใจ"},
        {en: "Notice", th: "สังเกต"}, {en: "Rectangle", th: "สี่เหลี่ยมผืนผ้า"}, {en: "Sphere", th: "ทรงกลม"},
        {en: "Cube", th: "ลูกบาศก์"}, {en: "Game", th: "เกม"}, {en: "Brave", th: "กล้าหาญ"},
        {en: "Careful", th: "ระมัดระวัง"}, {en: "Blood", th: "เลือด"}, {en: "Science", th: "วิทยาศาสตร์"},
        {en: "Hiking", th: "การเดินป่า"}, {en: "Flashlight", th: "ไฟฉาย"}, {en: "Compass", th: "เข็มทิศ"},
        {en: "Medicine", th: "ยา"}, {en: "Sick", th: "ป่วย"}, {en: "Fever", th: "เป็นไข้"},
        {en: "Journey", th: "การเดินทาง"}, {en: "Engineer", th: "วิศวกร"}, {en: "Clinic", th: "คลินิก"},
        {en: "Weather", th: "สภาพอากาศ"}, {en: "Uniform", th: "เครื่องแบบ"}, {en: "Balance", th: "สมดุล"},
        {en: "Airplane", th: "เครื่องบิน"}, {en: "Lightning", th: "ฟ้าผ่า"}, {en: "Reason", th: "เหตุผล"},
        {en: "Message", th: "ข้อความ"}, {en: "Tablet", th: "แท็บเล็ต"}, {en: "Adventure", th: "การผจญภัย"}
    ];

    const source = document.getElementById('source-container');
    const target = document.getElementById('target-container');

    // Init Draggables (Left Side)
    [...data].sort(() => Math.random() - 0.5).forEach(item => {
        const div = document.createElement('div');
        div.className = 'draggable-item';
        div.draggable = true;
        div.innerText = item.en;
        div.id = `w-${item.en}`;
        div.ondragstart = (e) => {
            e.dataTransfer.setData('text', item.en);
            div.classList.add('dragging');
        };
        div.ondragend = () => div.classList.remove('dragging');
        source.appendChild(div);
    });

    // Init Targets (Right Side)
    [...data].sort(() => Math.random() - 0.5).forEach(item => {
        const zone = document.createElement('div');
        zone.className = 'drop-target';
        zone.dataset.ans = item.en;
        zone.innerHTML = `<span class="meaning-text">${item.th}</span>`;
        
        zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('active'); };
        zone.ondragleave = () => zone.classList.remove('active');
        zone.ondrop = (e) => {
            e.preventDefault();
            zone.classList.remove('active');
            const word = e.dataTransfer.getData('text');
            
            if (zone.querySelector('.placed-word')) {
                const old = zone.querySelector('.placed-word').innerText;
                document.getElementById(`w-${old}`).style.display = 'block';
            }
            
            zone.innerHTML = `<span class="meaning-text">${item.th}</span><span class="placed-word">${word}</span>`;
            document.getElementById(`w-${word}`).style.display = 'none';
            
            zone.querySelector('.placed-word').onclick = () => {
                document.getElementById(`w-${word}`).style.display = 'block';
                zone.innerHTML = `<span class="meaning-text">${item.th}</span>`;
            };
        };
        target.appendChild(zone);
    });

    function checkMission() {
        let score = 0;
        document.querySelectorAll('.drop-target').forEach(z => {
            const placed = z.querySelector('.placed-word');
            if (placed && placed.innerText === z.dataset.ans) score++;
        });

        document.getElementById('score-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        document.getElementById('eval-text').innerText = score === data.length ? "EXCELLENT! ALL MATCHED." : "KEEP PRACTICING!";
    }
</script>
</body>
</html>
