<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Conversation Practice (Level 1-5)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .sentence-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .sentence-card:hover {
            transform: scale(1.01);
            border-color: #3498db;
        }
        .text-group {
            flex-grow: 1;
        }
        .english {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2980b9;
            margin: 0;
        }
        .thai {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin: 5px 0 0 0;
        }
        .play-btn {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }
        .play-btn:hover {
            background-color: #2980b9;
        }
        .level-tag {
            font-size: 0.7rem;
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phonics Practice 🗣️</h1>
    <p class="subtitle">ฝึกอ่านและฟังประโยคภาษาอังกฤษ (Level 1-5)</p>

    <div id="practice-list">
        </div>
</div>

<script>
    const exercises = [
        { en: "The cat sat on a mat.", th: "แมวนั่งอยู่บนเสื่อ", lv: "1" },
        { en: "A red hen is in the pen.", th: "แม่ไก่สีแดงอยู่ในเล้า", lv: "1" },
        { en: "The big pig can dig.", th: "หมูตัวใหญ่สามารถขุดดินได้", lv: "1" },
        { en: "I have a blue cup.", th: "ฉันมีแก้วน้ำสีน้ำเงินหนึ่งใบ", lv: "2" },
        { en: "Stop the bus at the shop.", th: "หยุดรถเมล์ที่ร้านค้า", lv: "2" },
        { en: "A frog jumps on a rock.", th: "กบกระโดดบนก้อนหิน", lv: "2" },
        { en: "Look at the black clock.", th: "ดูนาฬิกาสีดำเรือนนั้นสิ", lv: "3" },
        { en: "The ship sails in the rain.", th: "เรือล่องไปในสายฝน", lv: "3" },
        { en: "She has a sweet smile.", th: "เธอมีรอยยิ้มที่หวานมาก", lv: "3" },
        { en: "The train is on the track.", th: "รถไฟอยู่บนราง", lv: "3" },
        { en: "A bright light in the night.", th: "แสงสว่างในยามค่ำคืน", lv: "4" },
        { en: "Close the gate and wait.", th: "ปิดประตูรั้วแล้วรอตรงนั้น", lv: "4" },
        { en: "I like to eat green beans.", th: "ฉันชอบกินถั่วแขกสีเขียว", lv: "4" },
        { en: "The brown cow makes a sound.", th: "วัวสีน้ำตาลทำส่งเสียงร้อง", lv: "4" },
        { en: "Play with the toy in the soil.", th: "เล่นของเล่นบนดิน", lv: "5" },
        { en: "He found a round coin.", th: "เขาพบเหรียญกลมๆ หนึ่งเหรียญ", lv: "5" },
        { en: "The clouds are in the sky.", th: "เมฆอยู่บนท้องฟ้า", lv: "5" },
        { en: "Wash your hands with soap.", th: "ล้างมือด้วยสบู่ด้วยนะ", lv: "5" },
        { en: "The small ball is near the wall.", th: "ลูกบอลลูกเล็กอยู่ใกล้กำแพง", lv: "5" },
        { en: "I saw a hawk in the park.", th: "ฉันเห็นเหยี่ยวในสวนสาธารณะ", lv: "5" }
    ];

    const listContainer = document.getElementById('practice-list');

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // หน่วงความเร็วให้ช้าลงนิดนึงเพื่อให้ฟังชัด
        window.speechSynthesis.speak(utterance);
    }

    exercises.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'sentence-card';
        
        card.innerHTML = `
            <div class="text-group">
                <span class="level-tag">Lv.${item.lv}</span>
                <p class="english">${item.en}</p>
                <p class="thai">${item.th}</p>
            </div>
            <button class="play-btn" onclick="speak('${item.en.replace(/'/g, "\\'")}')">▶️</button>
        `;
        
        listContainer.appendChild(card);
    });
</script>

</body>
</html>
