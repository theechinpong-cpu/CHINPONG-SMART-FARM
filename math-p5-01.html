<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบคณิตศาสตร์ ป.5 ชุดที่ 1 (50 ข้อ) - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 15px solid #1A237E; }
        .header { text-align: center; border-bottom: 3px solid #eee; margin-bottom: 30px; padding-bottom: 20px; }
        .header h1 { color: #D32F2F; margin: 0; font-size: 2em; }
        .q-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .q-text { font-weight: bold; font-size: 1.15em; color: #1a237e; margin-bottom: 15px; display: block; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { padding: 12px; border: 2px solid #cfd8dc; border-radius: 8px; background: #fafafa; cursor: pointer; text-align: left; font-size: 15px; transition: 0.2s; }
        .opt-btn:hover:not([disabled]) { border-color: #1A237E; background: #e8eaf6; }
        .correct { background: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
        .wrong { background: #f44336 !important; color: white !important; border-color: #f44336 !important; }
        .explanation { display: none; margin-top: 12px; padding: 12px; background: #fff9c4; border-radius: 8px; border-left: 5px solid #fbc02d; font-size: 14px; }
        .submit-area { text-align: center; margin-top: 30px; }
        .btn-main { padding: 18px 45px; background: #D32F2F; color: white; border: none; border-radius: 30px; font-size: 1.3em; font-weight: bold; cursor: pointer; }
        #result-panel { display: none; margin-top: 30px; padding: 25px; background: #e1f5fe; border: 2px solid #0288d1; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ข้อสอบเก่าคณิตศาสตร์ ป.5 (ชุดที่ 1)</h1>
        <p>จัดทำโดย <strong>CHINPONG SMART FARM (พระจอมเกล้าติวเตอร์)</strong></p>
        <p><em>วิเคราะห์จากข้อสอบเก่า O-NET และ สพฐ. ย้อนหลัง</em></p>
    </div>

    <div id="quiz-list">
        </div>

    <div class="submit-area">
        <button class="btn-main" onclick="showResults()">ตรวจคำตอบและวิเคราะห์ผล</button>
    </div>

    <div id="result-panel">
        <h2 id="final-score"></h2>
        <div id="weak-points"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "1. ค่าของ (2,500 + 3,500) ÷ 12 มีค่าเท่ากับเท่าใด?", o: ["400", "500", "600", "700"], a: "500", e: "บวกในวงเล็บได้ 6,000 แล้วหารด้วย 12 เท่ากับ 500" },
        { q: "2. เศษส่วนใดมีค่ามากที่สุด?", o: ["1/2", "3/4", "5/8", "2/3"], a: "3/4", e: "ทำส่วนให้เป็น 24 จะได้ 12/24, 18/24, 15/24, 16/24 ดังนั้น 3/4 มากที่สุด" },
        { q: "3. ข้อใดคือทศนิยมของ 7/20?", o: ["0.7", "0.35", "0.14", "0.27"], a: "0.35", e: "7 ÷ 20 หรือ (7x5)/(20x5) = 35/100 = 0.35" },
        { q: "4. มุมตรงมีขนาดกี่องศา?", o: ["90", "180", "270", "360"], a: "180", e: "มุมตรงคือมุมที่มีขนาดสองเท่าของมุมฉาก (90x2=180)" },
        { q: "5. รูปสี่เหลี่ยมจัตุรัสมีด้านยาว 12 ซม. มีความยาวรอบรูปกี่ซม.?", o: ["24", "36", "48", "144"], a: "48", e: "ความยาวรอบรูป = 4 × ด้าน = 4 × 12 = 48" },
        { q: "6. 0.85 เขียนเป็นร้อยละได้เท่าใด?", o: ["ร้อยละ 8.5", "ร้อยละ 85", "ร้อยละ 0.85", "ร้อยละ 850"], a: "ร้อยละ 85", e: "0.85 × 100 = 85%" },
        { q: "7. สี่เหลี่ยมขนมเปียกปูนแตกต่างจากสี่เหลี่ยมจัตุรัสในเรื่องใด?", o: ["ความยาวด้าน", "เส้นทแยงมุม", "มุมภายใน", "จำนวนด้าน"], a: "มุมภายใน", e: "จัตุรัสมุมเป็นมุมฉาก แต่ขนมเปียกปูนมุมไม่จำเป็นต้องเป็นมุมฉาก" },
        { q: "8. 3/5 ของเงิน 2,500 บาท เป็นเงินเท่าใด?", o: ["1,500", "1,200", "1,000", "750"], a: "1,500", e: "2500 × 3 ÷ 5 = 1,500" },
        { q: "9. ตัวเลข 5 ใน 12.578 อยู่ในหลักใด?", o: ["หลักหน่วย", "หลักส่วนสิบ", "หลักส่วนร้อย", "หลักส่วนพัน"], a: "หลักส่วนสิบ", e: "ตัวเลขหลังจุดทศนิยมตัวแรกคือหลักส่วนสิบ" },
        { q: "10. เส้นขนานสองเส้นมีลักษณะอย่างไร?", o: ["ตัดกันเป็นมุมฉาก", "ยาวเท่ากันเสมอ", "มีระยะห่างเท่ากันเสมอ", "รวมกันได้ 180 องศา"], a: "มีระยะห่างเท่ากันเสมอ", e: "นิยามของเส้นขนานคือเส้นที่ไม่ตัดกันและมีระยะห่างคงที่" },
        { q: "11. ผลคูณของ 1.5 × 0.4 คือข้อใด?", o: ["0.6", "6.0", "0.06", "0.66"], a: "0.6", e: "15 x 4 = 60 ใส่ทศนิยม 2 ตำแหน่ง ได้ 0.60" },
        { q: "12. 120 นาที คิดเป็นกี่ชั่วโมง?", o: ["1", "2", "3", "4"], a: "2", e: "60 นาที = 1 ชม. ดังนั้น 120/60 = 2" },
        { q: "13. 4,500 กรัม เท่ากับกี่กิโลกรัม?", o: ["0.45", "4.5", "45", "450"], a: "4.5", e: "1000 กรัม = 1 กก. ดังนั้น 4500/1000 = 4.5" },
        { q: "14. พื้นที่รูปสามเหลี่ยมมีสูตรว่าอย่างไร?", o: ["กว้างxยาว", "ฐานxสูง", "1/2xฐานxสูง", "ด้านxด้าน"], a: "1/2xฐานxสูง", e: "สูตรพื้นที่สามเหลี่ยมมาตรฐาน" },
        { q: "15. (1/2 + 1/4) มีค่าเท่ากับเท่าใด?", o: ["2/6", "1/8", "3/4", "3/8"], a: "3/4", e: "2/4 + 1/4 = 3/4" },
        { q: "16. ทิศตะวันออกเฉียงเหนืออยู่ระหว่างทิศใด?", o: ["เหนือ-ออก", "เหนือ-ตก", "ใต้-ออก", "ใต้-ตก"], a: "เหนือ-ออก", e: "ตามเข็มทิศมาตรฐาน" },
        { q: "17. ข้อใดไม่ใช่สมบัติของสี่เหลี่ยมผืนผ้า?", o: ["ด้านตรงข้ามขนานกัน", "มุมทุกมุมเป็นมุมฉาก", "ด้านทุกด้านยาวเท่ากัน", "เส้นทแยงมุมแบ่งครึ่งซึ่งกันและกัน"], a: "ด้านทุกด้านยาวเท่ากัน", e: "ด้านทุกด้านยาวเท่ากันเป็นสมบัติของจัตุรัส" },
        { q: "18. ราคาป้าย 500 บาท ลดราคา 20% ลดราคากี่บาท?", o: ["20", "50", "100", "200"], a: "100", e: "500 x 0.20 = 100" },
        { q: "19. ปริมาตรน้ำ 1 ลิตร เท่ากับกี่มิลลิลิตร?", o: ["10", "100", "1000", "10000"], a: "1000", e: "1 ลิตร = 1,000 มล." },
        { q: "20. ค่าประมาณเป็นจำนวนเต็มของ 45.67 คือข้อใด?", o: ["45", "46", "45.7", "50"], a: "46", e: "ทศนิยม .6 ต้องปัดขึ้น" },
        { q: "21. 7 x 0.009 = ?", o: ["0.63", "0.063", "0.0063", "6.3"], a: "0.063", e: "7x9=63 ทศนิยม 3 ตำแหน่ง" },
        { q: "22. สี่เหลี่ยมรูปใดเส้นทแยงมุมไม่ตัดกันเป็นมุมฉาก?", o: ["จัตุรัส", "ขนมเปียกปูน", "รูปว่าว", "ผืนผ้า"], a: "ผืนผ้า", e: "ผืนผ้าเส้นทแยงมุมไม่ตัดกันเป็นมุมฉาก" },
        { q: "23. 5/10 + 2/100 เขียนเป็นทศนิยมได้อย่างไร?", o: ["0.52", "0.052", "5.2", "0.7"], a: "0.52", e: "0.5 + 0.02 = 0.52" },
        { q: "24. ระยะทาง 1.2 กม. เท่ากับกี่เมตร?", o: ["120", "1200", "12000", "12"], a: "1200", e: "1.2 x 1000 = 1200" },
        { q: "25. สี่เหลี่ยมด้านขนานมีฐาน 15 ซม. สูง 10 ซม. พื้นที่กี่ตร.ซม.?", o: ["25", "75", "150", "300"], a: "150", e: "15 x 10 = 150" },
        { q: "26. จำนวนใดเป็นจำนวนเฉพาะ?", o: ["1", "2", "4", "9"], a: "2", e: "2 มีตัวประกอบเพียง 1 และตัวมันเอง" },
        { q: "27. ห.ร.ม. ของ 12 และ 18 คือ?", o: ["2", "3", "6", "36"], a: "6", e: "6 เป็นจำนวนที่มากที่สุดที่หารทั้งสองลงตัว" },
        { q: "28. ค.ร.น. ของ 4 และ 6 คือ?", o: ["2", "12", "24", "10"], a: "12", e: "12 เป็นผลคูณร่วมที่น้อยที่สุด" },
        { q: "29. กำไร 10% ของทุน 800 บาท คือกี่บาท?", o: ["10", "80", "110", "880"], a: "80", e: "800 x 0.1 = 80" },
        { q: "30. 1/4 ของชั่วโมง เท่ากับกี่นาที?", o: ["15", "20", "25", "30"], a: "15", e: "60 / 4 = 15" },
        { q: "31. มุมแหลมคือมุมที่มีขนาดเท่าใด?", o: ["90", "มากกว่า 90", "น้อยกว่า 90", "180"], a: "น้อยกว่า 90", e: "นิยามมุมแหลม" },
        { q: "32. เลข 9 ใน 1,920 มีค่าเท่าใด?", o: ["9", "90", "900", "9,000"], a: "900", e: "อยู่ในหลักร้อย" },
        { q: "33. 0.5 ÷ 5 = ?", o: ["0.1", "1", "0.01", "10"], a: "0.1", e: "5/5=1 ทศนิยม 1 ตำแหน่ง" },
        { q: "34. สี่เหลี่ยมรูปว่าวมีด้านที่ติดกันยาวเท่ากันกี่คู่?", o: ["1", "2", "3", "4"], a: "2", e: "สมบัติสี่เหลี่ยมรูปว่าว" },
        { q: "35. 100 x 0.01 = ?", o: ["0.1", "1", "10", "100"], a: "1", e: "เลื่อนจุดทศนิยม 2 ตำแหน่ง" },
        { q: "36. พื้นที่ฐาน 20 ตร.ซม. สูง 5 ซม. ปริมาตรคือ?", o: ["25", "50", "100", "200"], a: "100", e: "20 x 5 = 100" },
        { q: "37. 2/5 ทำเป็นร้อยละได้เท่าใด?", o: ["20%", "40%", "50%", "60%"], a: "40%", e: "2/5 = 4/10 = 40/100" },
        { q: "38. มุมแย้งของเส้นขนานจะมีขนาดเป็นอย่างไร?", o: ["ต่างกัน", "รวมกันได้ 90", "เท่ากัน", "รวมกันได้ 360"], a: "เท่ากัน", e: "สมบัติเส้นขนาน" },
        { q: "39. ผลบวกมุมภายในสี่เหลี่ยมคือ?", o: ["90", "180", "360", "540"], a: "360", e: "สี่เหลี่ยมประกอบด้วยสามเหลี่ยม 2 รูป" },
        { q: "40. ถ้าทุน 100 ขาย 120 กำไรร้อยละเท่าใด?", o: ["10", "20", "30", "120"], a: "20", e: "ส่วนต่าง 20 จากทุน 100" },
        { q: "41. 0.25 x 4 = ?", o: ["0.5", "1.0", "1.25", "10"], a: "1.0", e: "25x4=100 ทศนิยม 2 ตำแหน่ง" },
        { q: "42. 1 กิโลลิตร เท่ากับกี่ลิตร?", o: ["10", "100", "1000", "10000"], a: "1000", e: "Kilo แปลว่าพัน" },
        { q: "43. รูปทรงใดมีด้านหน้าเป็นรูปวงกลม?", o: ["ลูกบาศก์", "ปริซึมสามเหลี่ยม", "ทรงกระบอก", "พีระมิด"], a: "ทรงกระบอก", e: "ฐานเป็นวงกลม" },
        { q: "44. (12 x 5) + (10 ÷ 2) = ?", o: ["60", "65", "70", "35"], a: "65", e: "60 + 5 = 65" },
        { q: "45. 0.08 เขียนเป็นเศษส่วนได้ตามข้อใด?", o: ["8/10", "8/100", "8/1000", "80/100"], a: "8/100", e: "ทศนิยม 2 ตำแหน่งส่วนเป็นร้อย" },
        { q: "46. ส่วนลด 50% ของ 1,000 บาท คือ?", o: ["5", "50", "500", "100"], a: "500", e: "ลดครึ่งราคา" },
        { q: "47. เส้นผ่านศูนย์กลางยาวเป็นกี่เท่าของรัศมี?", o: ["0.5", "1", "2", "4"], a: "2", e: "รัศมี 2 เส้นรวมเป็นเส้นผ่านศูนย์กลาง" },
        { q: "48. 9/9 มีค่าเท่ากับจำนวนใด?", o: ["0", "1", "9", "81"], a: "1", e: "เศษและส่วนเท่ากันมีค่าเป็น 1" },
        { q: "49. 0.1 + 0.11 + 0.111 = ?", o: ["0.3", "0.333", "0.321", "1.321"], a: "0.321", e: "ตั้งจุดให้ตรงกัน 0.100 + 0.110 + 0.111" },
        { q: "50. ขอให้โชคดี! 100 - (20 x 4) = ?", o: ["20", "80", "100", "320"], a: "20", e: "100 - 80 = 20" }
    ];

    const quizList = document.getElementById('quiz-list');
    let userScore = 0;
    let answered = 0;

    questions.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `q${index}`;
        card.innerHTML = `
            <span class="q-text">${item.q}</span>
            <div class="options">
                ${item.o.map(opt => `<button class="opt-btn" onclick="checkAnswer(${index}, '${opt}', this)">${opt}</button>`).join('')}
            </div>
            <div class="explanation" id="ex${index}">${item.e}</div>
        `;
        quizList.appendChild(card);
    });

    function checkAnswer(idx, val, btn) {
        const card = document.getElementById(`q${idx}`);
        if(card.hasAttribute('data-done')) return;
        
        card.setAttribute('data-done', 'true');
        answered++;
        const correct = questions[idx].a;
        const exp = document.getElementById(`ex${idx}`);
        exp.style.display = 'block';

        if(val === correct) {
            btn.classList.add('correct');
            userScore++;
        } else {
            btn.classList.add('wrong');
            const btns = card.querySelectorAll('.opt-btn');
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }
    }

    function showResults() {
        if(answered < 50) { alert("ทำข้อสอบให้ครบ 50 ข้อก่อนนะครับ!"); return; }
        const panel = document.getElementById('result-panel');
        panel.style.display = 'block';
        document.getElementById('final-score').innerText = `คุณได้คะแนน ${userScore} / 50`;
        
        let msg = userScore >= 40 ? "สุดยอดมากครับ! คุณมีความรู้พื้นฐานแน่นมาก" : "พยายามอีกนิดนะครับ ทบทวนเรื่องเศษส่วนและทศนิยมเพิ่มเติมจะดีมากครับ";
        document.getElementById('weak-points').innerHTML = `<p>${msg}</p><p>วิเคราะห์โดย: พระจอมเกล้าติวเตอร์</p>`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
