<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - P.E. Vocab Quiz</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fdf2e9; padding: 20px; }
        .quiz-container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid #e67e22; }
        h1 { color: #d35400; text-align: center; }
        .q-box { margin-bottom: 20px; padding: 15px; border-radius: 10px; background: #fffcf9; }
        .btn-option { display: block; width: 100%; text-align: left; padding: 12px; margin: 5px 0; border: 1px solid #fab1a0; border-radius: 8px; cursor: pointer; background: #fff; }
        .btn-option:hover { background: #ffeaa7; }
        .explanation { display: none; padding: 15px; border-radius: 8px; margin-top: 10px; font-weight: 500; }
        .correct { background: #55efc4; color: #006266; }
        .wrong { background: #ff7675; color: #fff; }
        #result-area { display: none; text-align: center; margin-top: 20px; padding: 20px; background: #d35400; color: white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🏆 P.E. Vocabulary Quiz</h1>
    <p style="text-align: center;">โดย <b>พระจอมเกล้าติวเตอร์</b></p>

    <div class="q-box">
        <p><b>1. ก่อนเริ่มเล่นกีฬา เราควรทำสิ่งใดเพื่อป้องกันการบาดเจ็บ?</b></p>
        <div class="options">
            <button class="btn-option" onclick="ans(this, true, 'ถูกต้อง! Warm up คือการอบอุ่นร่างกายเพื่อเตรียมกล้ามเนื้อครับ')">A. Warm up</button>
            <button class="btn-option" onclick="ans(this, false, 'ผิดจ้า! Sprain คืออาการบาดเจ็บ (ข้อเท้าแพลง)')">B. Sprain</button>
            <button class="btn-option" onclick="ans(this, false, 'ผิดครับ! Sweat คือเหงื่อ ไม่ใช่การเตรียมตัว')">C. Sweat</button>
        </div>
        <div class="explanation"></div>
    </div>

    <div class="q-box">
        <p><b>2. อุปกรณ์ชนิดใดจำเป็นที่สุดสำหรับการเล่น Badminton?</b></p>
        <div class="options">
            <button class="btn-option" onclick="ans(this, false, 'ผิดครับ! Whistle คือนกหวีด ปกติกรรมการหรือครูจะเป็นคนใช้')">A. Whistle</button>
            <button class="btn-option" onclick="ans(this, true, 'เก่งมาก! Racket คือไม้ที่ใช้ตีลูกขนไก่ในกีฬาแบดมินตันครับ')">B. Racket</button>
            <button class="btn-option" onclick="ans(this, false, 'ผิดครับ! Sneakers คือรองเท้าผ้าใบ ถึงสำคัญแต่ Racket เป็นอุปกรณ์เฉพาะทางกว่า')">C. Sneakers</button>
        </div>
        <div class="explanation"></div>
    </div>

    <div id="result-area">
        <h2>สรุปคะแนน</h2>
        <p id="score-display"></p>
        <p id="critique"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">ลองอีกครั้ง</button>
    </div>
</div>

<script>
    let score = 0;
    let count = 0;
    function ans(el, isCorrect, msg) {
        const parent = el.closest('.q-box');
        const feedback = parent.querySelector('.explanation');
        const btns = parent.querySelectorAll('.btn-option');
        
        btns.forEach(b => b.disabled = true);
        feedback.style.display = 'block';
        
        if(isCorrect) {
            score++;
            feedback.className = 'explanation correct';
            feedback.innerHTML = "✨ " + msg;
            el.style.background = '#55efc4';
        } else {
            feedback.className = 'explanation wrong';
            feedback.innerHTML = "❌ " + msg;
            el.style.background = '#ff7675';
        }
        
        count++;
        if(count === 2) {
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('score-display').innerText = "คุณทำได้ " + score + " จาก 2 คะแนน";
            document.getElementById('critique').innerText = score === 2 ? "สุดยอด! น้องคือดาวเด่นในสนามพละ" : "พยายามอีกนิดนะ ทบทวนศัพท์อุปกรณ์กีฬาบ่อยๆ ครับ";
        }
    }
</script>

</body>
</html>
