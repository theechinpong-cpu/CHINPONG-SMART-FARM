<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ - Interactive P.E. Class</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 700px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border: 3px solid var(--primary); }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .chat-box { padding: 20px; height: 500px; overflow-y: auto; background: #fafafa; }
        
        .sentence-row { margin-bottom: 15px; display: flex; align-items: flex-start; animation: fadeIn 0.5s ease; }
        .speaker-a { flex-direction: row; }
        .speaker-b { flex-direction: row-reverse; }
        
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 15px; position: relative; cursor: pointer; transition: 0.3s; }
        .speaker-a .bubble { background: #d1ecf1; border-bottom-left-radius: 2px; margin-left: 10px; }
        .speaker-b .bubble { background: #d4edda; border-bottom-right-radius: 2px; margin-right: 10px; }
        .bubble:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .vocab { font-weight: bold; color: #e67e22; text-decoration: underline dotted; position: relative; }
        
        /* Tooltip Bubble */
        .vocab:hover::after {
            content: attr(data-info);
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: white; padding: 8px 12px; border-radius: 8px;
            font-size: 14px; white-space: pre; z-index: 10; width: 160px; text-align: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .play-btn { background: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .play-btn:hover { background: #eee; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .footer { padding: 15px; text-align: center; font-size: 12px; color: #7f8c8d; background: #eee; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>🏅 วิชาพละหรรษา (P.E. Class)</h2>
        <p>คลิกที่ประโยคเพื่อฟังเสียง / ชี้ที่ตัวส้มเพื่อดูคำแปล</p>
    </div>

    <div class="chat-box" id="chat">
        </div>

    <div class="footer">
        เขียนโดย CHINPONG SMART FARM | ติวโดย พระจอมเกล้าติวเตอร์
    </div>
</div>

<script>
    const conversation = [
        { s: "Pete", t: "Hi Zea, are you ready for our match in the gymnasium?", v: {"gymnasium": "ยิม-เน-เซียม\n(โรงยิม)"} },
        { s: "Zea", t: "I'm ready! But we should warm up our muscles first.", v: {"warm up": "วอร์ม-อัพ\n(อบอุ่นร่างกาย)", "muscles": "มัส-เซิล\n(กล้ามเนื้อ)"} },
        { s: "Pete", t: "Good idea, it helps prevent a painful sprain.", v: {"sprain": "สเปรน\n(ข้อเท้าแพลง)"} },
        { s: "Zea", t: "Did you bring your new racket and sneakers?", v: {"racket": "แร็ก-เกต\n(ไม้เทนนิส/แบด)", "sneakers": "สนีก-เกอร์\n(รองเท้าผ้าใบ)"} },
        { s: "Pete", t: "Yes! Look, the teacher is blowing the whistle now.", v: {"whistle": "วิส-เซิล\n(นกหวีด)"} },
        { s: "Zea", t: "Who will be the referee for our game today?", v: {"referee": "เรฟ-เฟอ-รี\n(ผู้ตัดสิน)"} },
        { s: "Pete", t: "Mark will be the referee. He is very strict.", v: {"strict": "สทริคท์\n(เข้มงวด)"} },
        { s: "Zea", t: "We must follow the rules of the game.", v: {"rules": "รูลส์\n(กฎกติกา)"} },
        { s: "Pete", t: "I hope we can beat our opponents today.", v: {"opponents": "ออพ-โพ-เนินท์ส\n(คู่ต่อสู้)"} },
        { s: "Zea", t: "Just focus! I am already covered in sweat.", v: {"sweat": "สเวท\n(เหงื่อ)"} },
        { s: "Pete", t: "Drink some water to stay hydrated.", v: {"hydrated": "ไฮ-เดร-เทด\n(มีน้ำในร่างกายเพียงพอ)"} },
        { s: "Zea", t: "Thanks! Let's go to the court and play.", v: {"court": "คอร์ท\n(สนามกีฬา)"} },
        { s: "Pete", t: "Show them our great teamwork!", v: {"teamwork": "ทีม-เวิร์ค\n(การทำงานเป็นทีม)"} },
        { s: "Zea", t: "Victory is ours if we play hard!", v: {"Victory": "วิค-ตอ-รี\n(ชัยชนะ)"} },
        { s: "Pete", t: "Don't forget to shake hands after the game.", v: {"shake hands": "เชค-แฮนด์\n(จับมือแสดงสปิริต)"} },
        { s: "Zea", t: "Of course! Sportsmanship is the most important.", v: {"Sportsmanship": "สปอร์ต-แมน-ชิพ\n(น้ำใจนักกีฬา)"} }
    ];

    const chatBox = document.getElementById('chat');

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function renderChat() {
        conversation.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = `sentence-row ${item.s === 'Pete' ? 'speaker-a' : 'speaker-b'}`;
            
            let processedText = item.t;
            for (const [word, info] of Object.entries(item.v)) {
                const reg = new RegExp(`\\b${word}\\b`, 'gi');
                processedText = processedText.replace(reg, `<span class="vocab" data-info="${info}">${word}</span>`);
            }

            row.innerHTML = `
                <button class="play-btn" onclick="speak('${item.t.replace(/'/g, "\\'")}')">▶️</button>
                <div class="bubble" onclick="speak('${item.t.replace(/'/g, "\\'")}')">
                    <strong>${item.s}:</strong> ${processedText}
                </div>
            `;
            chatBox.appendChild(row);
        });
    }

    renderChat();
</script>

</body>
</html>
