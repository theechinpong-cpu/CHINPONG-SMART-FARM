<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบความน่าจะเป็น ม.4 ออนไลน์ (30 ข้อ)</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #2e7d32; --error: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .score-box { position: sticky; top: 10px; background: var(--primary); color: white; padding: 15px; border-radius: 10px; text-align: center; z-index: 1000; font-size: 1.2em; font-weight: bold; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .question-block { margin-bottom: 35px; padding: 25px; border: 1px solid #ddd; border-radius: 12px; background: #fafafa; }
        .question-text { font-weight: bold; font-size: 1.15em; margin-bottom: 20px; display: block; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option { padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; background: white; text-align: left; }
        .option:hover { border-color: var(--primary); background: #e8f0fe; }
        .option.correct { background: #c8e6c9 !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .option.wrong { background: #ffcdd2 !important; border-color: var(--error) !important; color: var(--error); }
        .explanation { display: none; margin-top: 20px; padding: 15px; background: #e3f2fd; border-left: 5px solid var(--primary); border-radius: 5px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-reset { display: block; width: 100%; padding: 15px; background: #555; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 40px; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 คลังข้อสอบความน่าจะเป็น ม.4</h1>
    <div class="score-box" id="scoreDisplay">คะแนนสะสม: 0 / 30</div>

    <div id="quiz-container">
        </div>

    <button class="btn-reset" onclick="location.reload()">ทำข้อสอบใหม่อีกครั้ง</button>
</div>

<script>
    const questions = [
        // ส่วนที่ 1: กฎการนับ
        { q: "มีเสื้อ 3 ตัว และกางเกง 2 ตัว จะแต่งกายได้กี่วิธี?", opt: ["ก. 5 วิธี", "ข. 6 วิธี", "ค. 8 วิธี", "ง. 9 วิธี"], ans: 1, exp: "กฎการคูณ: $3 \\times 2 = 6$" },
        { q: "สร้างเลข 2 หลักจาก 1, 2, 3 (ห้ามซ้ำ) ได้กี่จำนวน?", opt: ["ก. 3", "ข. 6", "ค. 9", "ง. 12"], ans: 1, exp: "หลักสิบเลือกได้ 3, หลักหน่วยเหลือ 2: $3 \\times 2 = 6$" },
        { q: "จัดคน 5 คนยืนเรียงแถวหน้ากระดานได้กี่วิธี?", opt: ["ก. 25", "ข. 60", "ค. 120", "ง. 240"], ans: 2, exp: "เรียงสับเปลี่ยน $5! = 120$" },
        { q: "สลับอักษรคำว่า 'MATH' ได้กี่วิธี?", opt: ["ก. 12", "ข. 24", "ค. 48", "ง. 120"], ans: 1, exp: "$4! = 24$" },
        { q: "มีเก้าอี้ 6 ตัว คน 3 คน นั่งได้กี่วิธี?", opt: ["ก. 18", "ข. 120", "ค. 216", "ง. 720"], ans: 1, exp: "$P_{6,3} = 6 \\times 5 \\times 4 = 120$" },
        { q: "วิ่งแข่ง 8 คน ชิงที่ 1, 2, 3 ได้กี่แบบ?", opt: ["ก. 56", "ข. 336", "ค. 512", "ง. 40320"], ans: 1, exp: "$P_{8,3} = 8 \\times 7 \\times 6 = 336$" },
        { q: "จัดคน 4 คน นั่งรอบโต๊ะกลมได้กี่วิธี?", opt: ["ก. 6", "ข. 12", "ค. 24", "ง. 4"], ans: 0, exp: "วงกลม $(n-1)! = 3! = 6$" },
        { q: "มัดหนังสือเลข 2 เล่มติดกัน จากทั้งหมด 5 เล่ม จัดได้กี่วิธี?", opt: ["ก. 24", "ข. 48", "ค. 120", "ง. 12"], ans: 1, exp: "$4! \\times 2! = 48$" },
        { q: "สร้างเลข 3 หลักจาก 0-9 (ซ้ำได้ ห้ามขึ้นด้วย 0)?", opt: ["ก. 1000", "ข. 900", "ค. 729", "ง. 810"], ans: 1, exp: "$9 \\times 10 \\times 10 = 900$" },
        { q: "ทอดลูกเต๋า 2 ลูกพร้อมกัน มีกี่ผลลัพธ์?", opt: ["ก. 12", "ข. 36", "ค. 18", "ง. 64"], ans: 1, exp: "$6 \\times 6 = 36$" },

        // ส่วนที่ 2: จัดหมู่
        { q: "เลือกคน 2 จาก 10 คน ได้กี่วิธี?", opt: ["ก. 20", "ข. 45", "ค. 90", "ง. 100"], ans: 1, exp: "$C_{10,2} = 45$" },
        { q: "หยิบไพ่ 2 ใบจาก 52 ใบ ได้กี่วิธี?", opt: ["ก. 1326", "ข. 2652", "ค. 104", "ง. 51"], ans: 0, exp: "$C_{52,2} = 1326$" },
        { q: "จุด 5 จุดบนวงกลม สร้างสามเหลี่ยมได้กี่รูป?", opt: ["ก. 60", "ข. 20", "ค. 10", "ง. 5"], ans: 2, exp: "$C_{5,3} = 10$" },
        { q: "ชาย 4 หญิง 3 เลือกกรรมการชาย 2 หญิง 1?", opt: ["ก. 18", "ข. 12", "ค. 24", "ง. 35"], ans: 0, exp: "$C_{4,2} \\times C_{3,1} = 6 \\times 3 = 18$" },
        { q: "ข้อสอบ 10 ข้อ เลือกทำ 8 ข้อ ได้กี่วิธี?", opt: ["ก. 80", "ข. 90", "ค. 45", "ง. 20"], ans: 2, exp: "$C_{10,8} = 45$" },
        { q: "หยิบผลไม้ 1 อย่างขึ้นไปจาก 6 อย่าง ได้กี่วิธี?", opt: ["ก. 6", "ข. 63", "ค. 64", "ง. 128"], ans: 1, exp: "$2^6 - 1 = 63$" },
        { q: "คน 6 คน สัมผัสมือกันทุกคน เกิดกี่ครั้ง?", opt: ["ก. 30", "ข. 15", "ค. 12", "ง. 36"], ans: 1, exp: "$C_{6,2} = 15$" },
        { q: "เลือกตัวอักษร 2 ตัวจาก 'SMILE'?", opt: ["ก. 10", "ข. 20", "ค. 25", "ง. 5"], ans: 0, exp: "$C_{5,2} = 10$" },
        { q: "มีดอกไม้ 5 สี จัดช่อละ 3 สี ได้กี่แบบ?", opt: ["ก. 15", "ข. 10", "ค. 60", "ง. 20"], ans: 1, exp: "$C_{5,3} = 10$" },
        { q: "แจกบอล 5 ลูกต่างกันให้เด็ก 5 คนละลูก?", opt: ["ก. 5", "ข. 25", "ค. 120", "ง. 1"], ans: 2, exp: "$5! = 120$" },

        // ส่วนที่ 3: ความน่าจะเป็น
        { q: "เหรียญ 2 อัน ออกหัวทั้งคู่?", opt: ["ก. 1/2", "ข. 1/4", "ค. 3/4", "ง. 1/8"], ans: 1, exp: "$S=\{HH, HT, TH, TT\}, E=\{HH\} \\rightarrow 1/4$" },
        { q: "เต๋า 1 ลูก ออกเลขคู่?", opt: ["ก. 1/6", "ข. 1/3", "ค. 1/2", "ง. 2/3"], ans: 2, exp: "$E=\{2,4,6\} \\rightarrow 3/6 = 1/2$" },
        { q: "สุ่มเลข 0-9 ได้เลขมากกว่า 7?", opt: ["ก. 2/10", "ข. 3/10", "ค. 1/10", "ง. 4/10"], ans: 0, exp: "$E=\{8,9\} \\rightarrow 2/10$" },
        { q: "เต๋า 2 ลูก ผลรวมแต้มได้ 7?", opt: ["ก. 1/6", "ข. 5/36", "ค. 1/12", "ง. 7/36"], ans: 0, exp: "$E=\{(1,6),(6,1),(2,5),(5,2),(3,4),(4,3)\} \\rightarrow 6/36$" },
        { q: "แดง 3 ขาว 2 สุ่มหยิบ 1 ได้สีแดง?", opt: ["ก. 2/3", "ข. 3/5", "ค. 2/5", "ง. 1/2"], ans: 1, exp: "$P(R) = 3/5$" },
        { q: "หยิบไพ่ 1 ใบ ได้โพดำ?", opt: ["ก. 1/4", "ข. 1/13", "ค. 1/52", "ง. 1/2"], ans: 0, exp: "$13/52 = 1/4$" },
        { q: "เลข 1-20 สุ่ม 1 ใบ หาร 3 ลงตัว?", opt: ["ก. 3/20", "ข. 6/20", "ค. 7/20", "ง. 5/20"], ans: 1, exp: "$E=\{3,6,9,12,15,18\} \\rightarrow 6/20$" },
        { q: "เหรียญ 3 อัน หัวอย่างน้อย 1?", opt: ["ก. 1/8", "ข. 7/8", "ค. 1/2", "ง. 3/8"], ans: 1, exp: "$1 - P(ก้อยหมด) = 1 - 1/8 = 7/8$" },
        { q: "ลูก 2 คน เป็นชาย 1 หญิง 1?", opt: ["ก. 1/4", "ข. 1/2", "ค. 3/4", "ง. 1/3"], ans: 1, exp: "$E=\{BG, GB\} \\rightarrow 2/4 = 1/2$" },
        { q: "เลข 2 หลัก สุ่มได้เลขซ้ำ?", opt: ["ก. 1/9", "ข. 1/10", "ค. 9/100", "ง. 11/90"], ans: 1, exp: "$E=\{11,22,...,99\} \\rightarrow 9/90 = 1/10$" }
    ];

    let score = 0;
    let answeredCount = 0;
    const container = document.getElementById('quiz-container');

    questions.forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'question-block';
        block.innerHTML = `
            <span class="question-text">ข้อที่ ${index + 1}: ${item.q}</span>
            <div class="options" id="opt-container-${index}">
                ${item.opt.map((o, i) => `<div class="option" onclick="check(${index}, ${i})">${o}</div>`).join('')}
            </div>
            <div class="explanation" id="exp-${index}">
                <strong>เฉลย: ${item.opt[item.ans]}</strong><br>
                วิธีทำ: ${item.exp}
            </div>
        `;
        container.appendChild(block);
    });

    function check(qIdx, selectedIdx) {
        const opts = document.getElementById(`opt-container-${qIdx}`).children;
        const exp = document.getElementById(`exp-${qIdx}`);
        
        // ล็อคไม่ให้ตอบซ้ำ
        if (exp.style.display === 'block') return;

        if (selectedIdx === questions[qIdx].ans) {
            opts[selectedIdx].classList.add('correct');
            score++;
        } else {
            opts[selectedIdx].classList.add('wrong');
            opts[questions[qIdx].ans].classList.add('correct');
        }

        exp.style.display = 'block';
        answeredCount++;
        document.getElementById('scoreDisplay').innerText = `คะแนนสะสม: ${score} / 30`;
        MathJax.typeset();
    }
</script>

</body>
</html>
