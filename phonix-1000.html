<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Vocab 501-1000 - พระจอมเกล้าติวเตอร์</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Sarabun:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --dark: #2d3436; }
        body { font-family: 'Lexend', 'Sarabun', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 2.5em; }
        .author { text-align: center; color: #636e72; margin-bottom: 20px; }
        
        .search-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; font-size: 1.1em; margin-bottom: 20px; box-sizing: border-box; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; max-height: 600px; overflow-y: auto; padding: 10px; border: 1px solid #eee; border-radius: 15px; }
        .card { background: white; border: 1px solid #eee; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; font-size: 0.9em; }
        .card:hover { background: var(--primary); color: white; transform: scale(1.05); }
        
        .practice-zone { margin-top: 40px; padding: 30px; background: #f9f9f9; border-radius: 20px; text-align: center; }
        .big-word { font-size: 4em; color: var(--primary); font-weight: bold; margin: 20px 0; min-height: 1.2em; }
        .btn { padding: 15px 30px; font-size: 1.1em; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; margin: 5px; font-weight: bold; }
        .btn-rand { background: var(--primary); color: white; }
        .btn-speak { background: var(--secondary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Phonics Grand Master (501 - 1000)</h1>
    <p class="author">โดย พระจอมเกล้าติวเตอร์ | เขียนโดย CHINPONG SMART FARM</p>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 ค้นหาคำศัพท์ (เช่น Science, Internet...)" onkeyup="filterWords()">

    <div class="grid" id="vocabGrid">
        </div>

    <div class="practice-zone">
        <h2>🎮 Random Practice Zone</h2>
        <p>กดปุ่มสุ่มคำศัพท์แล้วลองฝึกอ่านออกเสียงให้ดังและชัดเจน!</p>
        <div class="big-word" id="displayWord">READY?</div>
        <button class="btn btn-rand" onclick="randomWord()">สุ่มคำใหม่</button>
        <button class="btn btn-speak" onclick="speakCurrent()">🔊 ฟังเสียง</button>
    </div>
</div>

<script>
    // ตัวอย่างคำศัพท์บางส่วน (ในระบบจริงจะใส่ให้ครบ 500 คำ)
    const words = [
        "History", "Science", "Math", "Music", "Art", "Physical", "Geography", "Language", "Library", "Uniform", "Internet", "Website", "Screen", "Keyboard", "Mouse", "Laptop", "Tablet", "Battery", "Charger", "Signal", "Password", "Email", "Camera", "Video", "Game", "Surprised", "Nervous", "Excited", "Bored", "Lonely", "Proud", "Jealous", "Confused", "Patient", "Careful", "Creative", "Honest", "Brave", "Polite", "Jungle", "Desert", "Ocean", "Valley", "Volcano", "Earthquake", "Rainbow", "Lightning", "Season", "Summer", "Winter", "Autumn", "Spring", "Environment", "Healthy", "Sick", "Fever", "Headache", "Stomach", "Medicine", "Vitamin", "Exercise", "Muscle", "Bone", "Heart", "Brain", "Blood", "Dentist", "Clinic", "Engineer", "Artist", "Musician", "Scientist", "Lawyer", "Soldier", "Sailor", "Fireman", "Postman", "Waiter", "Photographer", "Astronaut", "Manager", "Painting", "Cooking", "Traveling", "Fishing", "Camping", "Hiking", "Skating", "Surfing", "Collecting", "Gardening", "Shopping", "Tomorrow", "Yesterday", "Suddenly", "Quickly", "Slowly", "Loudly", "Quietly", "Always", "Never", "Sometimes", "Rectangle", "Oval", "Diamond", "Sphere", "Cone", "Cube", "Length", "Height", "Weight", "Heavy", "Light", "Deep", "Shallow", "Umbrella", "Hammer", "Scissors", "Compass", "Candle", "Flashlight", "Magnet", "Telescope", "Microscope", "Rocket", "Airplane", "Helicopter",
        // ... เพิ่มคำอื่นๆ จนครบ 500 คำ (พี่ใส่ตัวแทนกลุ่มคำสำคัญไว้ให้เพื่อทดสอบระบบ)
        "Adventure", "Balance", "Calendar", "Distance", "Energy", "Future", "Gravity", "History", "Imagine", "Journey", "Kitchen", "Liquid", "Message", "Notice", "Object", "Pattern", "Quality", "Reason", "Safety", "Target", "Useful", "Valley", "Weather", "Xylophone", "Young", "Zero"
    ];

    const grid = document.getElementById('vocabGrid');
    const display = document.getElementById('displayWord');
    let currentWord = "";

    function init() {
        words.sort().forEach(w => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = w;
            div.onclick = () => { currentWord = w; display.innerText = w; speakCurrent(); };
            grid.appendChild(div);
        });
    }

    function filterWords() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            if(card.innerText.toLowerCase().includes(input)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    }

    function randomWord() {
        const rand = words[Math.floor(Math.random() * words.length)];
        currentWord = rand;
        display.innerText = rand;
    }

    function speakCurrent() {
        if(!currentWord) return;
        const u = new SpeechSynthesisUtterance(currentWord);
        u.lang = 'en-US';
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    init();
</script>

</body>
</html>
