<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading Practice - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.8; }
        .story-container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .author { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 30px; }
        .sentence { display: block; margin-bottom: 15px; padding: 12px; border-left: 5px solid #3498db; background: #ebf5fb; cursor: pointer; transition: 0.3s; border-radius: 0 10px 10px 0; }
        .sentence:hover { background: #d6eaf8; transform: translateX(10px); }
        .vocab-highlight { font-weight: bold; color: #e67e22; }
        .instruction { background: #fff3cd; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; font-weight: bold; color: #856404; }
        footer { text-align: center; margin-top: 40px; font-size: 0.8em; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="story-container">
    <h1>📖 The Little Student's Big Discovery</h1>
    <div class="author">Written by CHINPONG SMART FARM</div>
    
    <div class="instruction">💡 Click each sentence to listen to the English pronunciation!</div>

    <div id="story-body"></div>

    <footer>
        Developed by CHINPONG SMART FARM | Tutor: พระจอมเกล้าติวเตอร์
    </footer>
</div>

<script>
const storyData = [
    "It was a sunny <span class='vocab-highlight'>Sunday</span> <span class='vocab-highlight'>morning</span>.",
    "A young <span class='vocab-highlight'>student</span> sat in his <span class='vocab-highlight'>classroom</span>.",
    "He had a <span class='vocab-highlight'>pencil</span>, <span class='vocab-highlight'>paper</span>, and a <span class='vocab-highlight'>ruler</span> on his desk.",
    "He used an <span class='vocab-highlight'>eraser</span> to <span class='vocab-highlight'>clean</span> his mistakes while doing his <span class='vocab-highlight'>homework</span>.",
    "It was a long <span class='vocab-highlight'>lesson</span>, but he liked to <span class='vocab-highlight'>think</span> and <span class='vocab-highlight'>write</span> in his notebook.",
    "In the <span class='vocab-highlight'>afternoon</span>, he went to the <span class='vocab-highlight'>playground</span>.",
    "He saw a <span class='vocab-highlight'>small</span> bird flying <span class='vocab-highlight'>above</span> a <span class='vocab-highlight'>large</span> tree.",
    "He took out his brush to <span class='vocab-highlight'>paint</span> and <span class='vocab-highlight'>draw</span> the <span class='vocab-highlight'>pretty</span> bird.",
    "Then, he went to the <span class='vocab-highlight'>market</span> and a <span class='vocab-highlight'>shop</span> to buy fruit.",
    "On the <span class='vocab-highlight'>street</span>, he saw a <span class='vocab-highlight'>police</span> officer helping a <span class='vocab-highlight'>farmer</span>.",
    "The farmer lived near a <span class='vocab-highlight'>forest</span> with a beautiful <span class='vocab-highlight'>garden</span>.",
    "The student went there to <span class='vocab-highlight'>listen</span> to the wind and <span class='vocab-highlight'>watch</span> the flowers.",
    "He saw a <span class='vocab-highlight'>fast</span> rabbit and a <span class='vocab-highlight'>slow</span> turtle <span class='vocab-highlight'>below</span> a bench.",
    "In the <span class='vocab-highlight'>evening</span>, he went back to his <span class='vocab-highlight'>kitchen</span> at home.",
    "He had to <span class='vocab-highlight'>wash</span> his hands and <span class='vocab-highlight'>brush</span> his teeth.",
    "This <span class='vocab-highlight'>week</span> was busy, but it was his <span class='vocab-highlight'>birthday</span> <span class='vocab-highlight'>month</span>.",
    "It was the <span class='vocab-highlight'>first</span> time he felt <span class='vocab-highlight'>strong</span> in a <span class='vocab-highlight'>year</span>.",
    "He used his <span class='vocab-highlight'>computer</span> to check his <span class='vocab-highlight'>Monday</span> schedule.",
    "He was the <span class='vocab-highlight'>last</span> one to turn off the lights."
];

const container = document.getElementById('story-body');

storyData.forEach(text => {
    const div = document.createElement('div');
    div.className = 'sentence';
    div.innerHTML = `🔊 ${text}`;
    div.onclick = () => {
        const plainText = div.innerText.replace('🔊 ', '');
        speak(plainText);
    };
    container.appendChild(div);
});

function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 0.85; // Slightly slower for students to follow
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
}
</script>

</body>
</html>
