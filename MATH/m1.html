<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Online Examination System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #f8fafc;
        }
        /* แอนิเมชันสำหรับคลาสเฉลยแบบทีละบรรทัด */
        .line-by-line-step {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.25s ease-out;
            max-height: 0;
            overflow: hidden;
        }
        .line-by-line-step.visible {
            opacity: 1;
            transform: translateY(0);
            max-height: 500px;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <header class="bg-gradient-to-r from-purple-700 to-indigo-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-white text-purple-700 p-2 rounded-full font-bold text-xl w-10 h-10 flex items-center justify-center shadow-inner">
                    Q
                </div>
                <div>
                    <h1 class="text-lg font-semibold tracking-wide">ระบบทำข้อสอบออนไลน์จำลอง</h1>
                    <p class="text-xs text-purple-200">Interactive Quiz Solution System Template</p>
                </div>
            </div>
            <div class="mt-3 sm:mt-0 bg-purple-600/50 backdrop-blur-sm border border-purple-500/30 px-4 py-1.5 rounded-lg text-sm text-center">
                <span id="quiz-badge" class="font-medium text-purple-100">โหมดทดสอบความรู้</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="quiz-container" class="space-y-8">
            </div>

        <div id="result-card" class="hidden mt-12 bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center transition-all duration-500">
            <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto text-4xl mb-4 shadow-inner">
                ✓
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2">บันทึกผลคะแนนเสร็จสิ้น</h2>
            <p class="text-slate-500 mb-6">คุณได้ทำข้อสอบครบทุกข้อแล้ว สามารถตรวจทานขั้นตอนวิธีทำเฉลยของแต่ละข้อได้ด้านล่าง</p>
            <div class="inline-block bg-slate-50 px-8 py-4 rounded-xl border border-slate-100">
                <span class="text-sm text-slate-400 block font-medium uppercase tracking-wider">คะแนนสอบรวมของคุณ</span>
                <span id="score-display" class="text-4xl font-extrabold text-indigo-600">0 / 0</span>
            </div>
        </div>
    </main>

    <footer class="max-w-4xl mx-auto text-center py-8 text-xs text-slate-400 border-t border-slate-200/60 mt-12">
        &copy; 2026 Powered by Clean Template Architecture Engine.
    </footer>

    <script>
        /**
         * 📦 คลังข้อมูลข้อสอบ (JSON Data Structure)
         * คุณสามารถนำข้อมูลข้อสอบของคุณมาวางแทนที่ชุดข้อมูลตัวอย่างที่นี่ได้เลยครับ
         */
        const quizData = [
            {
                id: 1,
                question: "ตัวอย่างโจทย์คำถามข้อที่ 1: ใส่เนื้อหาโจทย์คำถามที่คุณต้องการพิมพ์ได้ตรงนี้",
                options: [
                    "ตัวเลือกคำตอบที่ 1",
                    "ตัวเลือกคำตอบที่ 2",
                    "ตัวเลือกคำตอบที่ 3",
                    "ตัวเลือกคำตอบที่ 4"
                ],
                correctAnswer: 0, // ระบุอินเด็กซ์คำตอบที่ถูกต้อง (0 = ข้อ 1), (1 = ข้อ 2), (2 = ข้อ 3), (3 = ข้อ 4)
                explanationSteps: [
                    "💡 <b>เฉลยบรรทัดที่ 1:</b> แสดงแนวคิดภาพรวม หรือสูตรเริ่มต้นคำนวณ",
                    "📊 <b>เฉลยบรรทัดที่ 2:</b> ขั้นตอนแก้สมการ หรือวิธีคิดขั้นตอนกลาง",
                    "📝 <b>เฉลยบรรทัดที่ 3:</b> แทนค่าตัวแปรในโจทย์เพื่อเตรียมหาผลลัพธ์",
                    "🎉 <b>เฉลยบรรทัดที่ 4:</b> สรุปผลคำตอบที่ได้ และชี้จุดว่าทำไมตัวเลือกดังกล่าวจึงถูกต้อง"
                ]
            },
            {
                id: 2,
                question: "ตัวอย่างโจทย์คำถามข้อที่ 2: สามารถคัดลอกรูปแบบบล็อกนี้เพื่อเพิ่มข้อต่อๆ ไปได้แบบไม่จำกัด",
                options: [
                    "ตัวเลือกทดสอบกิมมิค A",
                    "ตัวเลือกทดสอบกิมมิค B (คำตอบที่ถูก)",
                    "ตัวเลือกทดสอบกิมมิค C",
                    "ตัวเลือกทดสอบกิมมิค D"
                ],
                correctAnswer: 1, // ตอบตัวเลือกที่ 2 (อินเด็กซ์คือ 1)
                explanationSteps: [
                    "🧠 <b>ขั้นตอนแรก:</b> ทำการแยกแยะเงื่อนไขในโจทย์",
                    "⚙️ <b>ขั้นตอนถัดมา:</b> ทำการคำนวณตามขั้นตอนระบบ",
                    "🏁 <b>บรรทัดสุดท้าย:</b> ได้รับข้อสรุปที่ต้องการอย่างชัดเจน"
                ]
            }
        ];

        // State Container สำหรับจดจำสถานะของผู้ใช้
        const userAnswers = {};
        const explanationCurrentIndices = {};

        // ฟังก์ชันสำหรับแปลงข้อมูลอาเรย์มาวาดเป็นส่วนประกอบหน้าเว็บ (UI Renderer)
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((q, index) => {
                explanationCurrentIndices[q.id] = 0; // ตั้งค่าสถานะเริ่มต้นการดูเฉลยของข้อนั้นๆ เป็น 0

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-200/80 p-6 sm:p-8 transition-all hover:shadow-md";
                card.id = `question-card-${q.id}`;

                let optionsHtml = '';
                q.options.forEach((option, oIdx) => {
                    optionsHtml += `
                        <label class="flex items-start p-4 my-2.5 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 hover:border-indigo-300 transition-all duration-200" id="label-${q.id}-${oIdx}">
                            <input type="radio" name="q-${q.id}" value="${oIdx}" class="mt-1 mr-3 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300" onchange="handleSelectAnswer(${q.id}, ${oIdx})">
                            <span class="text-sm font-medium text-slate-700">${index + 1}.${oIdx + 1}) ${option}</span>
                        </label>
                    `;
                });

                card.innerHTML = `
                    <div class="flex items-center space-x-2 text-xs font-semibold uppercase tracking-wider text-indigo-600 mb-2">
                        <span>คำถามชุดทดสอบ ข้อที่ ${index + 1}</span>
                    </div>
                    <h3 class="text-base sm:text-lg font-bold text-slate-900 mb-4">${q.question}</h3>
                    <div class="space-y-1">${optionsHtml}</div>
                    
                    <div id="explanation-box-${q.id}" class="hidden mt-6 pt-6 border-t border-slate-100 bg-slate-50/50 p-4 rounded-xl border border-dashed border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-sm font-bold text-slate-800 flex items-center">
                                <span class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></span>
                                วิธีทำแบบละเอียด (Line-by-Line Click)
                            </h4>
                            <span id="badge-${q.id}" class="text-xs px-2.5 py-1 rounded-full font-semibold"></span>
                        </div>
                        
                        <div id="steps-container-${q.id}" class="space-y-1"></div>
                        
                        <button id="btn-next-step-${q.id}" onclick="triggerNextStep(${q.id})" class="mt-4 inline-flex items-center justify-center px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm transition-all focus:ring-2 focus:ring-indigo-500">
                            คลิกเพื่อดูวิธีทำบรรทัดถัดไป ⇩
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ตัวจับเหตุการณ์และประมวลผลเมื่อยูสเซอร์เลือกกดตัวเลือก
        function handleSelectAnswer(questionId, selectedIdx) {
            if (userAnswers[questionId] !== undefined) return; // ล็อคป้องกันการส่งคำตอบซ้ำ

            userAnswers[questionId] = selectedIdx;
            const targetQuestion = quizData.find(q => q.id === questionId);
            const isCorrect = selectedIdx === targetQuestion.correctAnswer;

            const targetLabel = document.getElementById(`label-${questionId}-${selectedIdx}`);
            const correctLabel = document.getElementById(`label-${questionId}-${targetQuestion.correctAnswer}`);
            
            // สั่งปิดการเลือกตัวเลือกอื่นเพิ่มเติม
            const inputs = document.querySelectorAll(`input[name="q-${questionId}"]`);
            inputs.forEach(input => input.disabled = true);

            // แสดงสีสันตรวจสอบคำตอบที่ถูก/ผิด
            if (isCorrect) {
                targetLabel.classList.remove('border-slate-200', 'hover:bg-slate-50');
                targetLabel.classList.add('bg-green-50', 'border-green-500', 'text-green-900');
            } else {
                targetLabel.classList.remove('border-slate-200', 'hover:bg-slate-50');
                targetLabel.classList.add('bg-red-50', 'border-red-500', 'text-red-900');
                
                correctLabel.classList.remove('border-slate-200', 'hover:bg-slate-50');
                correctLabel.classList.add('bg-green-50/70', 'border-green-400', 'text-green-900');
            }

            // เปิดแสดงกล่องจัดการขั้นตอนวิธีทำ
            const expBox = document.getElementById(`explanation-box-${questionId}`);
            const badge = document.getElementById(`badge-${questionId}`);
            
            expBox.classList.remove('hidden');
            if (isCorrect) {
                badge.className = "text-xs px-2.5 py-1 rounded-full font-semibold bg-green-100 text-green-700";
                badge.innerText = "ตอบถูกต้อง";
            } else {
                badge.className = "text-xs px-2.5 py-1 rounded-full font-semibold bg-red-100 text-red-700";
                badge.innerText = "ตอบไม่ถูกต้อง";
            }

            // แสดงคำอธิบายบรรทัดที่ 1 ทันทีเพื่อให้ระบบตอบสนองได้นุ่มนวล
            triggerNextStep(questionId);
            evaluateQuizCompletion();
        }

        // กลไกหลัก: ดึงอาร์เรย์คำอธิบายวิธีทำออกมาแสดงเพิ่ม 1 บรรทัด ทุกครั้งที่มีการคลิกปุ่ม
        function triggerNextStep(questionId) {
            const targetQuestion = quizData.find(q => q.id === questionId);
            const currentIdx = explanationCurrentIndices[questionId];
            const stepsContainer = document.getElementById(`steps-container-${questionId}`);
            const actionBtn = document.getElementById(`btn-next-step-${questionId}`);

            if (currentIdx < targetQuestion.explanationSteps.length) {
                const stepText = targetQuestion.explanationSteps[currentIdx];
                
                const stepEl = document.createElement('div');
                stepEl.className = "line-by-line-step bg-white p-3 rounded-lg border border-slate-100 text-sm text-slate-700 shadow-sm leading-relaxed";
                stepEl.innerHTML = stepText;
                
                stepsContainer.appendChild(stepEl);
                
                // กระตุ้นแอนิเมชันของ CSS ให้ค่อยๆ เลื่อนแสดงผล
                setTimeout(() => stepEl.classList.add('visible'), 20);

                explanationCurrentIndices[questionId]++;
                
                // หากดึงข้อมูลจนครบสเต็ปในอาเรย์เรียบร้อยแล้ว ให้ทำการปรับสถานะปุ่มกดเป็นเสร็จสิ้น
                if (explanationCurrentIndices[questionId] === targetQuestion.explanationSteps.length) {
                    actionBtn.innerText = "สิ้นสุดคำอธิบายวิธีทำสำหรับข้อนี้แล้ว";
                    actionBtn.disabled = true;
                    actionBtn.className = "mt-4 inline-flex items-center justify-center px-4 py-2 text-xs font-medium text-slate-400 bg-slate-100 rounded-lg cursor-not-allowed";
                }
            }
        }

        // ฟังก์ชันประมวลคะแนนสรุปรวมทั้งหมดเมื่อผู้ทำทำการส่งครบถ้วนทุกข้อ
        function evaluateQuizCompletion() {
            const totalQuestions = quizData.length;
            const answeredCount = Object.keys(userAnswers).length;

            if (answeredCount === totalQuestions) {
                let score = 0;
                quizData.forEach(q => {
                    if (userAnswers[q.id] === q.correctAnswer) score++;
                });

                const resultCard = document.getElementById('result-card');
                const scoreDisplay = document.getElementById('score-display');
                
                scoreDisplay.innerText = `${score} / ${totalQuestions}`;
                resultCard.classList.remove('hidden');
                resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // เรียกใช้งานฟังก์ชันเริ่มต้นเมื่อ DOM ถูกโหลดขึ้นมาบนเว็บบราวเซอร์สมบูรณ์
        window.addEventListener('DOMContentLoaded', () => {
            renderQuiz();
        });
    </script>
</body>
</html>
