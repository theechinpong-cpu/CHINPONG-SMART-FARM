<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระจอมเกล้าติวเตอร์ โดย ครูตู่ - แบบทดสอบคณิตศาสตร์ ป.5 (30 ข้อ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fdf6e3; color: #2c3e50; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 5px solid #ffcc00; margin-bottom: 30px; }
        h1 { color: #d35400; }
        .question-card { margin-bottom: 30px; padding: 20px; border: 2px solid #ecf0f1; border-radius: 15px; transition: 0.3s; }
        .question-card:hover { border-color: #3498db; }
        .question-text { font-size: 1.2em; font-weight: bold; color: #2980b9; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border: 2px solid #3498db; background: white; border-radius: 10px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:hover { background: #3498db; color: white; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 10px; line-height: 1.6; }
        .correct { background-color: #d4edda; border-left: 6px solid #28a745; }
        .wrong { background-color: #f8d7da; border-left: 6px solid #dc3545; }
        .trick-box { background-color: #fff3cd; border: 1px dashed #856404; padding: 12px; margin-top: 10px; border-radius: 8px; }
        b { color: #e67e22; }
        .score-board { position: fixed; top: 20px; right: 20px; background: #2ecc71; color: white; padding: 15px; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="score-board">คะแนน: <span id="score">0</span> / 30</div>

<div class="container">
    <header>
        <h1>ครูแมธเซียน (Math Master)</h1>
        <p>ตะลุยโจทย์ 30 ข้อ: รวมพลังติวเตอร์ดัง (จำนวนเต็ม, เศษส่วน, ทศนิยม)</p>
    </header>

    <div id="quiz-area">
        </div>
</div>

<script>
const quizData = [
    { q: "2,540 + 1,260 - 800", a: ["3,000", "3,800", "2,800", "3,100"], c: 0, t: "ทริคพี่แท็ป: สังเกตคู่เลข! 540 + 260 ได้ 800 พอดีเป๊ะ จะเหลือแค่ 2,000 + 1,000 = 3,000 คิดในใจได้เลย!", step: "2,540 + 1,260 = 3,800 จากนั้น 3,800 - 800 = 3,000" },
    { q: "45 x 11", a: ["455", "495", "505", "411"], c: 1, t: "ทริคพี่ปั้น SmartMathPro: คูณด้วย 11 ให้ 'แยกหน้า-แยกหลัง' (4 _ 5) แล้วเอาหน้าบวกหลังมาวางตรงกลาง (4+5=9) ได้ 495 ทันที!", step: "45 x 11 = 495" },
    { q: "3/4 + 1/2", a: ["4/6", "1 1/4", "4/4", "1/4"], c: 1, t: "ทริคครูพี่เต๋อ: มองเศษส่วนเป็นภาพ! 1/2 คือ 2 ส่วนใน 4 ส่วน รวมกับ 3/4 จึงได้ 5/4 หรือ 1 กับอีก 1/4", step: "3/4 + 2/4 = 5/4 = 1 1/4" },
    { q: "0.5 x 0.4", a: ["2.0", "0.02", "0.2", "0.9"], c: 2, t: "ทริคแมธเซียน: คูณเลขปกติ 5 x 4 = 20 แล้วนับตำแหน่งทศนิยมรวมกัน (1+1=2 ตำแหน่ง) ได้ 0.20 หรือ 0.2", step: "0.5 x 0.4 = 0.20" },
    { q: "(100 - 25) ÷ 5", a: ["15", "95", "25", "75"], c: 0, t: "ทริค อ.อรรณพ: ลำดับความสำคัญสำคัญที่สุด! 'วงเล็บ' มาเป็นอันดับหนึ่งเสมอ", step: "75 ÷ 5 = 15" },
    { q: "9,999 + 1", a: ["1,000", "10,000", "9,990", "10,001"], c: 1, t: "ทริคพี่แท็ป: การทดเลขรัวๆ! 9 เจอ 1 กลายเป็น 10 แล้วทดไปเรื่อยๆ จนถึงหลักหมื่น", step: "9,999 + 1 = 10,000" },
    { q: "12 x 12", a: ["124", "142", "144", "132"], c: 2, t: "ทริคพี่ปั้น: เลขยกกำลังสองที่เจอบ่อย (11-15) ควรจำให้ขึ้นใจเพื่อประหยัดเวลา!", step: "12 x 12 = 144" },
    { q: "5/10 ทำเป็นทศนิยม", a: ["5.0", "0.05", "0.5", "5.10"], c: 2, t: "ทริคครูพี่เต๋อ: ส่วน 10 คือทศนิยม 1 ตำแหน่ง (จุดหน้าเลข 5)", step: "5/10 = 0.5" },
    { q: "3,000 - 1,999", a: ["1,001", "1,111", "2,001", "1,000"], c: 0, t: "ทริคแมธเซียน: ลองมองว่า 1,999 ขาดอีก 1 จะครบ 2,000 ดังนั้น 3,000 - 2,000 = 1,000 แล้วบวกคืน 1 เป็น 1,001", step: "3,000 - 1,999 = 1,001" },
    { q: "8 x (4 + 6)", a: ["38", "80", "48", "72"], c: 1, t: "ทริค อ.อรรณพ: จับคู่เลขสิ! 4 + 6 ได้ 10 การคูณด้วย 10 แค่เติม 0 ข้างหลัง", step: "8 x 10 = 80" },
    { q: "25 x 4", a: ["100", "125", "80", "150"], c: 0, t: "ทริคพี่ปั้น: จำคู่เลขสร้าง 100 ให้ดี (25x4, 50x2, 20x5) เจอเมื่อไหร่ยิ้มเลย!", step: "25 x 4 = 100" },
    { q: "1/3 ของ 90", a: ["30", "45", "60", "20"], c: 0, t: "ทริคครูพี่เต๋อ: 'ของ' คือการ 'คูณ' เอา 90 หารด้วย 3 ได้เลย", step: "90 ÷ 3 = 30" },
    { q: "0.1 + 0.11", a: ["0.12", "0.22", "0.21", "1.11"], c: 2, t: "ทริคแมธเซียน: เติม 0 หลัง 0.1 ให้เป็น 0.10 เพื่อให้ตำแหน่งเท่ากัน จะบวกง่ายขึ้น", step: "0.10 + 0.11 = 0.21" },
    { q: "72 ÷ 9", a: ["6", "7", "8", "9"], c: 2, t: "ทริคพี่แท็ป: สูตรคูณแม่ 9 ผลรวมเลขโดดของคำตอบต้องได้ 9 (8+1 ไม่ใช่ ต้องเป็นตัวเลขเดี่ยว)", step: "9 x 8 = 72" },
    { q: "150 x 2", a: ["200", "250", "300", "400"], c: 2, t: "ทริคพี่ปั้น: แบงก์ร้อยห้าสิบ 2 ใบ คือ 300 บาท", step: "150 + 150 = 300" },
    { q: "2/5 + 1/5", a: ["3/10", "3/5", "2/10", "1/5"], c: 1, t: "ทริคครูพี่เต๋อ: ตัวส่วนเท่ากันแล้ว จับตัวเศษบวกกันได้เลย ห้ามเอาส่วนบวกส่วนนะ!", step: "2+1 = 3 ส่วน 5" },
    { q: "0.7 - 0.3", a: ["0.4", "0.04", "4.0", "1.0"], c: 0, t: "ทริคแมธเซียน: มีเงิน 7 หลังจุด หายไป 3 หลังจุด เหลือ 4 หลังจุด", step: "0.7 - 0.3 = 0.4" },
    { q: "1,200 ÷ 100", a: ["120", "12", "1.2", "122"], c: 1, t: "ทริค อ.อรรณพ: หารด้วย 100 คือการตัด 0 ออก 2 ตัว!", step: "ตัด 0 สองตัว เหลือ 12" },
    { q: "9 x 7", a: ["56", "64", "63", "72"], c: 2, t: "ทริคพี่แท็ป: สูตรคูณแม่ 9 นิ้วมือ! หักนิ้วที่ 7 ลง จะเห็น 6 กับ 3 คือ 63", step: "9 x 7 = 63" },
    { q: "เศษส่วนอย่างต่ำของ 10/20", a: ["1/2", "2/4", "5/10", "1/4"], c: 0, t: "ทริคครูพี่เต๋อ: ตัด 0 บน 0 ล่างออกให้หมด เหลือ 1/2 ง่ายๆ เลย", step: "10/20 = 1/2" },
    { q: "0.25 + 0.75", a: ["0.100", "1.0", "0.50", "1.10"], c: 1, t: "ทริคพี่ปั้น: 25 สตางค์ + 75 สตางค์ เท่ากับ 1 บาทพอดี", step: "0.25 + 0.75 = 1.00" },
    { q: "50 x 60", a: ["300", "3,000", "30,000", "110"], c: 1, t: "ทริคแมธเซียน: เอา 5 x 6 = 30 แล้วเติม 0 ที่เหลืออีก 2 ตัวลงไป", step: "30 + 00 = 3,000" },
    { q: "3/8 - 1/8", a: ["2/8", "2/0", "4/8", "1/4"], c: 0, t: "ทริค อ.อรรณพ: ลบกันธรรมดา ได้ 2/8 (หรือตัดทอนได้ 1/4 แต่ข้อนี้ตอบ 2/8 ตามตัวเลือก)", step: "3-1 = 2 ส่วน 8" },
    { q: "10 - 4.5", a: ["6.5", "5.5", "4.5", "5.0"], c: 1, t: "ทริคพี่แท็ป: มีเงิน 10 บาท ซื้อขนม 4 บาทครึ่ง เหลือ 5 บาทครึ่ง", step: "10.0 - 4.5 = 5.5" },
    { q: "11 x 11", a: ["111", "121", "131", "141"], c: 1, t: "ทริคพี่ปั้น: ทริคเลข 11 'แยกหน้าแยกหลัง' (1 _ 1) ตรงกลางคือ (1+1=2) ได้ 121", step: "11 x 11 = 121" },
    { q: "1/2 x 1/2", a: ["1/4", "1/2", "2/4", "1/1"], c: 0, t: "ทริคครูพี่เต๋อ: คูณเศษส่วน ให้ 'บนคูณบน ล่างคูณล่าง' ได้เลย", step: "1x1 / 2x2 = 1/4" },
    { q: "800 ÷ 40", a: ["2", "20", "200", "40"], c: 1, t: "ทริคแมธเซียน: ตัด 0 ออกข้างละตัว เหลือ 80 ÷ 4 = 20", step: "80 ÷ 4 = 20" },
    { q: "0.9 x 10", a: ["0.09", "9", "90", "0.90"], c: 1, t: "ทริค อ.อรรณพ: คูณด้วย 10 ให้ขยับจุดไปทางขวา 1 ตำแหน่ง", step: "0.9 -> 9.0" },
    { q: "1 + 2 + 3 + ... + 10", a: ["45", "50", "55", "60"], c: 2, t: "ทริคพี่แท็ป: สูตรจับคู่ (ต้น+ปลาย)xจำนวนคู่ = (1+10) x 5 = 55", step: "11 x 5 = 55" },
    { q: "5,000 - 1,234", a: ["3,766", "3,866", "4,766", "3,776"], c: 0, t: "ทริคแมธเซียน: ลบด้วย 1 ทั้งคู่! 4,999 - 1,233 = 3,766 ลบง่ายไม่ต้องยืมเลข 0", step: "5,000 - 1,234 = 3,766" }
];

let score = 0;
const quizArea = document.getElementById('quiz-area');

quizData.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `
        <p class="question-text">ข้อที่ ${index + 1}: <b>${item.q}</b></p>
        <div class="options">
            ${item.a.map((opt, i) => `<button onclick="checkAnswer(${index}, ${i}, this)">${opt}</button>`).join('')}
        </div>
        <div id="exp-${index}" class="explanation">
            <p><b>เฉลย: ${item.a[item.c]}</b></p>
            <p><b>วิธีคิด:</b> ${item.step}</p>
            <div class="trick-box">✨ ${item.t}</div>
        </div>
    `;
    quizArea.appendChild(card);
});

function checkAnswer(qIdx, choiceIdx, btn) {
    const card = btn.parentElement.parentElement;
    const buttons = card.querySelectorAll('button');
    const exp = document.getElementById(`exp-${qIdx}`);
    
    // ปิดปุ่มอื่นๆ
    buttons.forEach(b => b.disabled = true);

    if (choiceIdx === quizData[qIdx].c) {
        exp.className = 'explanation correct';
        btn.style.background = '#2ecc71';
        btn.style.color = 'white';
        score++;
        document.getElementById('score').innerText = score;
    } else {
        exp.className = 'explanation wrong';
        btn.style.background = '#e74c3c';
        btn.style.color = 'white';
        buttons[quizData[qIdx].c].style.border = '3px solid #2ecc71';
    }
    exp.style.display = 'block';
}
</script>

</body>
</html>
