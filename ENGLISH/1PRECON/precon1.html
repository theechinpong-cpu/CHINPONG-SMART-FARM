<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบ Present Continuous - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fdfbf7; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .summary-box { background-color: #ebf5fb; padding: 15px; border-radius: 10px; border: 1px solid #aed6f1; margin-bottom: 20px; }
        .question { margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .clue { color: red; font-size: 0.9em; font-weight: bold; }
        .explanation { display: none; margin-top: 10px; padding: 10px; background: #e8f8f5; border-left: 4px solid #27ae60; border-radius: 5px; font-weight: bold; }
        img { max-width: 100%; height: auto; border-radius: 10px; display: block; margin: 20px auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>สรุปเรื่อง Present Continuous Tense - พระจอมเกล้าติวเตอร์</h1>
    
    <img src="https://storage.googleapis.com/generative_ai_storage/image_1b09e2.jpg" alt="Present Continuous Tense Summary">

    <div class="summary-box">
        <p><strong>สรุปเนื้อหา:</strong> ใช้สำหรับเหตุการณ์ที่ "กำลังเกิดขึ้น" โครงสร้างคือ <strong>Subject + is/am/are + V.ing</strong> อย่าลืมดู Keyword (Now, At the moment) และกฎการสะกดคำให้ดีครับ</p>
    </div>

    <form id="quizForm">
        <script>
            const questions = [
                { q: "I ____ (read) a book right now.", clues: "(ใช้ am + V-ing)", options: ["read", "am reading", "is reading", "are reading"], correct: 1, tip: "I คู่กับ am เสมอ" },
                { q: "Look! They ____ (run) to the school.", clues: "(They คือพหูพจน์)", options: ["are running", "is running", "run", "running"], correct: 0, tip: "They ใช้ are" },
                { q: "She ____ (cook) dinner at the moment.", clues: "(She คือเอกพจน์)", options: ["am cooking", "are cooking", "is cooking", "cook"], correct: 2, tip: "She ใช้ is" },
                { q: "What ____ you ____ (do) now?", clues: "(ประโยคคำถามย้าย Verb to be)", options: ["are / doing", "is / doing", "do / do", "am / doing"], correct: 0, tip: "You ใช้ are" },
                { q: "He ____ (not / watch) TV.", clues: "(ปฏิเสธเติม not หลัง is/am/are)", options: ["is not watching", "am not watching", "are not watching", "not watching"], correct: 0, tip: "He ใช้ is" },
                { q: "We ____ (study) English.", clues: "(We คือพวกเรา)", options: ["is studying", "are studying", "am studying", "study"], correct: 1, tip: "We ใช้ are" },
                { q: "It ____ (rain) outside.", clues: "(It คือเอกพจน์)", options: ["is raining", "are raining", "rain", "am raining"], correct: 0, tip: "It ใช้ is" },
                { q: "The cat ____ (sleep) on the sofa.", clues: "(แมวตัวเดียว)", options: ["are sleeping", "is sleeping", "am sleeping", "sleep"], correct: 1, tip: "ประธานเอกพจน์ใช้ is" },
                { q: "Listen! The baby ____ (cry).", clues: "(เด็กกำลังร้อง)", options: ["is crying", "are crying", "am crying", "cry"], correct: 0, tip: "The baby คือเอกพจน์ใช้ is" },
                { q: "My friends ____ (play) games.", clues: "(Friends มี s คือพหูพจน์)", options: ["is playing", "are playing", "am playing", "play"], correct: 1, tip: "พหูพจน์ใช้ are" },
                { q: "I ____ (not / eat) pizza.", clues: "(ปฏิเสธของ I)", options: ["is not eating", "are not eating", "am not eating", "not eating"], correct: 2, tip: "I คู่กับ am" },
                { q: "____ your mom (work) now?", clues: "(ถามประธานคนเดียว)", options: ["Are", "Is", "Am", "Do"], correct: 1, tip: "Mom คือเอกพจน์ใช้ Is" },
                { q: "They ____ (not / dance) at the party.", clues: "(ปฏิเสธพหูพจน์)", options: ["are not dancing", "is not dancing", "am not dancing", "not dancing"], correct: 0, tip: "They ใช้ are" },
                { q: "The sun ____ (shine) brightly.", clues: "(พระอาทิตย์ดวงเดียว)", options: ["are shining", "is shining", "am shining", "shine"], correct: 1, tip: "เอกพจน์ใช้ is" },
                { q: "____ you (listen) to me?", clues: "(ถาม You)", options: ["Is", "Am", "Are", "Do"], correct: 2, tip: "You ใช้คู่กับ Are" },
                { q: "He ____ (write) a letter.", clues: "(ตัด e เติม ing)", options: ["is writing", "is writeing", "are writing", "writeing"], correct: 0, tip: "Write ตัด e ออกแล้วเติม ing" },
                { q: "We ____ (not / sit) here.", clues: "(เบิ้ลตัวสะกด)", options: ["are not sitting", "are not siting", "is not sitting", "not sitting"], correct: 0, tip: "Sit เบิ้ล t แล้วเติม ing" },
                { q: "Look! A bird ____ (fly).", clues: "(นกตัวเดียว)", options: ["are flying", "is flying", "am flying", "fly"], correct: 1, tip: "เอกพจน์ใช้ is" },
                { q: "I ____ (look) for my keys.", clues: "(กำลังค้นหา)", options: ["is looking", "am looking", "are looking", "look"], correct: 1, tip: "I ใช้กับ am" },
                { q: "The kids ____ (jump) on the bed.", clues: "(Kids หลายคน)", options: ["are jumping", "is jumping", "am jumping", "jump"], correct: 0, tip: "พหูพจน์ใช้ are" },
                { q: "____ she (talk) to him?", clues: "(ประโยคคำถาม)", options: ["Is", "Are", "Am", "Do"], correct: 0, tip: "She ใช้กับ Is" },
                { q: "They ____ (not / learn) math.", clues: "(ปฏิเสธพหูพจน์)", options: ["is not learning", "are not learning", "am not learning", "not learning"], correct: 1, tip: "They ใช้ are" },
                { q: "My father ____ (drive) the car.", clues: "(พ่อขับรถ)", options: ["are driving", "is driving", "am driving", "drive"], correct: 1, tip: "พ่อคนเดียวใช้ is" },
                { q: "What ____ she (read)?", clues: "(ถามประธานเอกพจน์)", options: ["is", "are", "am", "do"], correct: 0, tip: "She ใช้ is" },
                { q: "I ____ (not / do) my homework.", clues: "(ปฏิเสธของ I)", options: ["is not doing", "are not doing", "am not doing", "not doing"], correct: 2, tip: "I คู่กับ am" }
            ];

            questions.forEach((item, index) => {
                document.write(`
                    <div class="question">
                        <p>${index + 1}. ${item.q} <span class="clue">${item.clues}</span></p>
                        ${item.options.map((opt, i) => `
                            <label><input type="radio" name="q${index}" value="${i}" onclick="check(${index}, ${i})"> ${opt}</label><br>
                        `).join('')}
                        <div id="exp${index}" class="explanation"></div>
                    </div>
                `);
            });

            function check(qIdx, selected) {
                const item = questions[qIdx];
                const expDiv = document.getElementById('exp' + qIdx);
                expDiv.style.display = 'block';
                if(selected === item.correct) {
                    expDiv.innerHTML = "✅ ถูกต้อง! " + item.tip;
                    expDiv.style.borderLeftColor = "#27ae60";
                } else {
                    expDiv.innerHTML = "❌ ผิดครับ " + item.tip;
                    expDiv.style.borderLeftColor = "#e74c3c";
                }
            }
        </script>
    </form>
</div>
</body>
</html>
