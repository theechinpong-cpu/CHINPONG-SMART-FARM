<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Exam P.5 (50 Questions) - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7ff; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 5px solid #3498db; padding-bottom: 10px; }
        .q-card { margin-bottom: 30px; padding: 25px; border: 1px solid #d1d9e6; border-radius: 12px; background: #ffffff; }
        .q-text { font-weight: bold; font-size: 1.15em; margin-bottom: 15px; color: #1a5276; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 14px; text-align: left; border: 2px solid #3498db; background: #fff; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 1em; }
        button:hover { background: #3498db; color: white; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-size: 0.95em; line-height: 1.6; }
        .correct { background: #d4edda; border-left: 6px solid #28a745; color: #155724; }
        .wrong { background: #f8d7da; border-left: 6px solid #dc3545; color: #721c24; }
        #summary { display: none; margin-top: 50px; padding: 30px; background: #2c3e50; color: white; border-radius: 15px; text-align: center; }
        .tag { font-size: 0.8em; color: #3498db; display: block; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇬🇧 English Final Exam P.5 (50 Questions)</h1>
    <p style="text-align: center;"><b>By: พระจอมเกล้าติวเตอร์</b></p>

    <div id="quiz-area">
        <div id="dynamic-questions"></div>
    </div>

    <div id="summary">
        <h2>📊 Exam Result Analysis</h2>
        <div id="score-text" style="font-size: 3em; margin: 20px 0; color: #f1c40f;"></div>
        <div id="analysis" style="text-align: left; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "What ______ you doing now?", a: 1, opts: ["A. is", "B. are", "C. am", "D. do"], ex: "Subject 'You' uses 'are' in Present Continuous Tense." },
        { q: "She ______ to school by bus yesterday.", a: 2, opts: ["A. go", "B. goes", "C. went", "D. going"], ex: "'Yesterday' indicates Past Simple. The V.2 of 'go' is 'went'." },
        { q: "The elephant is ______ than the tiger.", a: 0, opts: ["A. bigger", "B. biggest", "C. big", "D. more big"], ex: "Comparative degree uses 'adj + er' + 'than'." },
        { q: "A: What's the matter? B: I have a ______.", a: 3, opts: ["A. doctor", "B. hospital", "C. medicine", "D. headache"], ex: "Headache is a health problem (อาการปวดหัว)." },
        { q: "Where does a ______ work? (He works in a hospital.)", a: 2, opts: ["A. teacher", "B. chef", "C. nurse", "D. pilot"], ex: "Nurses and doctors work in a hospital." },
        { q: "I ______ my teeth every morning.", a: 0, opts: ["A. brush", "B. brushes", "C. brushed", "D. brushing"], ex: "Present Simple for daily routine. Subject 'I' uses V.1 without -s." },
        { q: "A: ______ is the restroom? B: It's next to the library.", a: 2, opts: ["A. Who", "B. What", "C. Where", "D. When"], ex: "'Where' is used to ask for locations." },
        { q: "Look! The birds ______ in the sky.", a: 3, opts: ["A. fly", "B. flies", "C. flew", "D. are flying"], ex: "'Look!' indicates an action happening now (Present Continuous)." },
        { q: "This is ______ book in the library.", a: 2, opts: ["A. small", "B. smaller", "C. the smallest", "D. smallest"], ex: "Superlative degree (ขั้นสุด) uses 'the + adj-est'." },
        { q: "He ______ coffee. He likes tea.", "a": 1, "opts": ["A. doesn't like", "B. don't like", "C. not like", "D. isn't like"], "ex": "Subject 'He' uses 'doesn't' for negative sentences." },
        { q: "A: ______ did you go to the zoo? B: Last Sunday.", a: 3, opts: ["A. Why", "B. Who", "C. Where", "D. When"], ex: "'When' asks about time." },
        { q: "Mount Everest is the ______ mountain in the world.", a: 0, opts: ["A. highest", "B. higher", "C. high", "D. most high"], ex: "Superlative degree for 'high' is 'highest'." },
        { q: "We ______ pizza for dinner last night.", a: 2, opts: ["A. eat", "B. eats", "C. ate", "D. eating"], ex: "V.2 of 'eat' is 'ate' (Past Simple)." },
        { q: "There ______ any milk in the fridge.", a: 1, opts: ["A. isn't", "B. aren't", "C. am not", "D. not"], ex: "'Milk' is uncountable (singular), negative uses 'isn't any'." },
        { q: "A: Can you swim? B: ______.", a: 0, opts: ["A. Yes, I can.", "B. No, I'm not.", "C. Yes, I do.", "D. No, I don't."], ex: "Short answer for 'Can' is 'Yes/No, I can/can't'." },
        { q: "The sun ______ in the east.", a: 1, opts: ["A. rise", "B. rises", "C. rose", "D. rising"], ex: "General truth uses Present Simple. 'The sun' (Singular) + V.1 (s/es)." },
        { q: "How ______ is this shirt? (It's 200 baht.)", a: 2, opts: ["A. many", "B. old", "C. much", "D. tall"], ex: "'How much' asks about the price." },
        { q: "My father is a ______. He grows rice.", a: 3, opts: ["A. doctor", "B. barber", "C. sailor", "D. farmer"], ex: "Farmers grow rice and crops." },
        { q: "It is ______ today. Don't forget your umbrella.", a: 1, opts: ["A. sunny", "B. rainy", "C. snowy", "D. windy"], ex: "You need an umbrella when it's rainy." },
        { q: "I'm ______ than my brother.", a: 2, opts: ["A. tall", "B. the tallest", "C. taller", "D. more tall"], ex: "Comparing two people uses 'taller than'." },
        { q: "They ______ football at the park right now.", a: 3, opts: ["A. play", "B. plays", "C. played", "D. are playing"], ex: "'Right now' indicates Present Continuous." },
        { q: "A: ______ are you so happy? B: Because I won the game.", a: 1, opts: ["A. What", "B. Why", "C. How", "D. Who"], ex: "'Why' asks for reasons (Because...)." },
        { q: "Please ______ the door. It's cold.", a: 0, opts: ["A. close", "B. open", "C. break", "D. push"], ex: "Close the door to keep the cold out." },
        { q: "We ______ a movie two days ago.", a: 2, opts: ["A. watch", "B. watches", "C. watched", "D. watching"], ex: "'Ago' indicates Past Simple (V.2)." },
        { q: "A ______ works in a kitchen.", a: 1, opts: ["A. singer", "B. chef", "C. postman", "D. pilot"], ex: "Chefs work in the kitchen." },
        { q: "She is the ______ girl in my class.", a: 3, opts: ["A. beautiful", "B. more beautiful", "C. beauty", "D. most beautiful"], ex: "Superlative for long adjectives uses 'the most'." },
        { q: "Can I ______ a pen, please?", a: 0, opts: ["A. borrow", "B. lend", "C. give", "D. buy"], ex: "'Borrow' means to take something to use and return." },
        { q: "He ______ to the radio every night.", a: 1, opts: ["A. listen", "B. listens", "C. listened", "D. listening"], ex: "Habit/Routine (Every night) uses Present Simple." },
        { q: "The cat is ______ the table.", a: 2, opts: ["A. between", "B. in", "C. under", "D. among"], ex: "Preposition of place: under (ใต้)." },
        { q: "I ______ a new bike next month.", a: 3, opts: ["A. buy", "B. bought", "C. buying", "D. will buy"], ex: "'Next month' indicates Future (will + V.1)." },
        { q: "Is there ______ water in the bottle?", a: 1, opts: ["A. a", "B. any", "C. many", "D. few"], ex: "Question sentences with uncountable nouns use 'any'." },
        { q: "A: How ______ do you go to the gym? B: Twice a week.", a: 0, opts: ["A. often", "B. much", "C. many", "D. long"], ex: "'How often' asks about frequency." },
        { q: "You ______ speak loudly in the library.", a: 1, opts: ["A. should", "B. shouldn't", "C. can", "D. must"], ex: "You should not (shouldn't) make noise in the library." },
        { q: "I ______ my homework at 7 PM yesterday.", a: 2, opts: ["A. do", "B. does", "C. did", "D. doing"], ex: "V.2 of 'do' is 'did'." },
        { q: "A doctor works in a ______.", a: 1, opts: ["A. school", "B. hospital", "C. bank", "D. farm"], ex: "Location of work for a doctor." },
        { q: "______ name is Sarah.", a: 0, opts: ["A. Her", "B. His", "C. My", "D. Your"], ex: "Possessive adjective for a female (Sarah) is 'Her'." },
        { q: "We ______ happy today.", a: 1, opts: ["A. is", "B. are", "C. am", "D. be"], ex: "Subject 'We' uses 'are'." },
        { q: "What is your ______ food? (I like noodles.)", a: 2, opts: ["A. bad", "B. hot", "C. favorite", "D. small"], ex: "'Favorite' means most liked." },
        { q: "I have ______ apple in my bag.", a: 1, opts: ["A. a", "B. an", "C. some", "D. any"], ex: "'Apple' starts with a vowel sound (a, e, i, o, u), so use 'an'." },
        { q: "They ______ to London last year.", a: 2, opts: ["A. fly", "B. flies", "C. flew", "D. flying"], ex: "V.2 of 'fly' is 'flew'." },
        { q: "A ______ flies an airplane.", a: 3, opts: ["A. driver", "B. doctor", "C. nurse", "D. pilot"], ex: "Pilots fly planes." },
        { q: "It's ______ today. Let's go to the beach.", a: 0, opts: ["A. sunny", "B. rainy", "C. snowy", "D. cloudy"], ex: "Sunny weather is good for the beach." },
        { q: "How ______ students are there? (There are 30.)", a: 1, opts: ["A. much", "B. many", "C. old", "D. tall"], ex: "'How many' is used for countable plural nouns." },
        { q: "She ______ her hair every day.", a: 1, opts: ["A. wash", "B. washes", "C. washed", "D. washing"], ex: "Present Simple (She + V.es)." },
        { q: "A: ______ is that boy? B: He is my brother.", a: 2, opts: ["A. What", "B. When", "C. Who", "D. Where"], ex: "'Who' asks about people." },
        { q: "This car is ______ than that one.", a: 2, opts: ["A. expensive", "B. expensiver", "C. more expensive", "D. most expensive"], ex: "Comparison for long adjectives uses 'more + adj'." },
        { q: "I ______ hungry. Can I have some bread?", a: 0, opts: ["A. am", "B. is", "C. are", "D. be"], ex: "I + am." },
        { q: "Where ______ she live?", a: 1, opts: ["A. do", "B. does", "C. is", "D. are"], ex: "Question with 'She' uses 'does'." },
        { q: "______ is the first day of the week.", a: 2, opts: ["A. Monday", "B. Friday", "C. Sunday", "D. Saturday"], ex: "According to the calendar, Sunday is the 1st day." },
        { q: "Thank you very much. - ______.", a: 1, opts: ["A. You're ok.", "B. You're welcome.", "C. Good luck.", "D. Goodbye."], ex: "Polite response to 'Thank you'." }
    ];

    let score = 0;
    let answered = 0;

    function renderQuestions() {
        const container = document.getElementById('dynamic-questions');
        questions.forEach((item, index) => {
            const qNum = index + 1;
            const html = `
                <div class="q-card" id="q${qNum}">
                    <span class="tag">Question ${qNum}</span>
                    <div class="q-text">${qNum}. ${item.q}</div>
                    <div class="options">
                        ${item.opts.map((opt, i) => `<button onclick="ans(${qNum}, ${i}, ${i === item.a})">${opt}</button>`).join('')}
                    </div>
                    <div id="ex${qNum}" class="explanation"></div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function ans(id, choice, isCorrect) {
        const ex = document.getElementById('ex' + id);
        if (ex.style.display === 'block') return;

        answered++;
        ex.style.display = 'block';
        
        const explanationText = questions[id-1].ex;

        if (isCorrect) {
            score++;
            ex.className = "explanation correct";
            ex.innerHTML = "🌟 <b>Correct!</b> Analysis: " + explanationText;
        } else {
            ex.className = "explanation wrong";
            ex.innerHTML = "❌ <b>Wrong...</b> Analysis: " + explanationText;
        }

        if (answered === 50) {
            showSummary();
        }
    }

    function showSummary() {
        const sum = document.getElementById('summary');
        sum.style.display = 'block';
        document.getElementById('score-text').innerText = `${score} / 50`;
        
        let report = "<b>Analysis from พระจอมเกล้าติวเตอร์:</b><br><br>";
        if (score >= 45) report += "🏆 Amazing! You have a great command of English grammar and vocabulary.";
        else if (score >= 30) report += "📝 Good job! You understand the basics, but you should review Tenses and Comparison more.";
        else report += "⚠️ Keep practicing! Focus on Irregular Verbs and Prepositions to improve your score.";
        
        document.getElementById('analysis').innerHTML = report;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.onload = renderQuestions;
</script>

</body>
</html>
