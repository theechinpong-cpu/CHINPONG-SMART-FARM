<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - พระจอมเกล้าติวเตอร์</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--primary); color: white; height: 100vh; padding: 25px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; font-size: 1.4rem; margin-top: 0; }
        .config-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.85rem; }
        .config-box input { background: rgba(255,255,255,0.9); border: none; margin-top: 5px; padding: 8px; }
        
        /* Main Content */
        .main-content { margin-left: 300px; padding: 40px; width: calc(100% - 300px); box-sizing: border-box; }
        .editor-card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        /* Quiz Items */
        .quiz-section { border-top: 2px dashed #edf2f7; padding-top: 20px; }
        .quiz-item { background: #f8fafc; padding: 25px; border-left: 6px solid var(--accent); margin-bottom: 20px; border-radius: 8px; position: relative; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; display: inline-block; }
        .btn-add { background: var(--accent); color: white; margin-bottom: 20px; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 1.2rem; margin-top: 30px; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        .btn-remove { background: var(--danger); color: white; position: absolute; right: 15px; top: 15px; padding: 6px 12px; font-size: 13px; }
        
        .status-msg { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>⚙️ Admin Control</h2>
    <p>เลือกระดับชั้นและวิชา:</p>
    <select id="subject-select" style="margin-bottom: 20px;">
        <option value="english">English (P.5)</option>
        <option value="science">Science (P.5)</option>
        <option value="math">Math (P.5)</option>
    </select>
    
    <div class="config-box">
        <strong>GitHub Settings:</strong><br>
        <label style="color: white; font-size: 12px; margin-top: 10px;">Token (Classic):</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxx">
        <label style="color: white; font-size: 12px; margin-top: 10px;">Username:</label>
        <input type="text" id="gh-user" placeholder="ชื่อ GitHub ของคุณ">
        <label style="color: white; font-size: 12px; margin-top: 10px;">Repo Name:</label>
        <input type="text" id="gh-repo" value="king-mongkut-tutor">
    </div>
</div>

<div class="main-content">
    <div class="editor-card">
        <h1>อัปเดตบทเรียนและข้อสอบ</h1>
        
        <div class="form-group">
            <label>ชื่อบทเรียน (Lesson Title)</label>
            <input type="text" id="lesson-title" placeholder="เช่น Unit 1: At the Smart Farm">
        </div>

        <div class="form-group">
            <label>เนื้อหาบทเรียน (รายละเอียดการสอน)</label>
            <textarea id="lesson-content" rows="8" placeholder="พิมพ์เนื้อหาการสอน หรือวาง HTML ที่นี่..."></textarea>
        </div>

        <div class="quiz-section">
            <h3>📝 จัดการข้อสอบ (Quiz Builder)</h3>
            <div id="quiz-list"></div>
            <button class="btn btn-add" onclick="addQuestion()">+ เพิ่มข้อสอบใหม่</button>
        </div>

        <button class="btn btn-save" onclick="saveToGitHub()">🚀 บันทึกข้อมูลลง GitHub (Auto-Commit)</button>
        <div id="status-display" class="status-msg"></div>
    </div>
</div>

<script>
    let questionCount = 0;

    function addQuestion() {
        questionCount++;
        const quizList = document.getElementById('quiz-list');
        const html = `
            <div class="quiz-item" id="q-box-${questionCount}">
                <button class="btn btn-remove" onclick="document.getElementById('q-box-${questionCount}').remove()">ลบข้อนี้</button>
                <div class="form-group">
                    <label>โจทย์ข้อที่ ${questionCount}</label>
                    <input type="text" class="q-text" placeholder="พิมพ์คำถาม...">
                </div>
                <div class="form-group">
                    <label>ตัวเลือก (แยกด้วยเครื่องหมายคอมม่า ,)</label>
                    <input type="text" class="q-options" placeholder="ตัวเลือก 1, ตัวเลือก 2, ตัวเลือก 3, ตัวเลือก 4">
                </div>
                <div class="form-group">
                    <label>ลำดับคำตอบที่ถูก (1-4)</label>
                    <input type="number" class="q-ans" min="1" max="4" value="1">
                </div>
            </div>
        `;
        quizList.insertAdjacentHTML('beforeend', html);
    }

    async function saveToGitHub() {
        const token = document.getElementById('gh-token').value;
        const user = document.getElementById('gh-user').value;
        const repo = document.getElementById('gh-repo').value;
        const subject = document.getElementById('subject-select').value;
        const status = document.getElementById('status-display');
        
        if (!token || !user) {
            alert("กรุณากรอก GitHub Token และ Username ก่อนบันทึก!");
            return;
        }

        const filePath = `data/${subject}-p5.json`;
        const lessonData = {
            lastUpdated: new Date().toLocaleString('th-TH'),
            title: document.getElementById('lesson-title').value,
            content: document.getElementById('lesson-content').value,
            questions: []
        };

        document.querySelectorAll('.quiz-item').forEach(item => {
            lessonData.questions.push({
                question: item.querySelector('.q-text').value,
                options: item.querySelector('.q-options').value.split(',').map(o => o.trim()),
                answer: parseInt(item.querySelector('.q-ans').value) - 1
            });
        });

        status.style.display = "block";
        status.innerText = "⏳ กำลังเชื่อมต่อ GitHub...";
        status.style.background = "#ebf8ff";
        status.style.color = "#2b6cb0";

        try {
            const url = `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`;
            
            // 1. Get current file SHA
            let sha = "";
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }

            // 2. Prepare content
            const jsonStr = JSON.stringify(lessonData, null, 2);
            const contentBase64 = btoa(unescape(encodeURIComponent(jsonStr)));

            // 3. Update file via GitHub API
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Admin Update: ${lessonData.title}`,
                    content: contentBase64,
                    sha: sha !== "" ? sha : undefined
                })
            });

            if (putRes.ok) {
                status.innerText = "✅ บันทึกและอัปเดตบทเรียนสำเร็จ!";
                status.style.background = "#f0fff4";
                status.style.color = "#2f855a";
            } else {
                throw new Error("Update failed");
            }
        } catch (err) {
            status.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
            status.style.background = "#fff5f5";
            status.style.color = "#c53030";
        }
    }

    // เริ่มต้น 1 ข้อ
    addQuestion();
</script>

</body>
</html>
