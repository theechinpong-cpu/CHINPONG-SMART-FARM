<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - พระจอมเกล้าติวเตอร์</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        
        /* Sidebar Styles */
        .sidebar { width: 280px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; font-size: 1.2rem; }
        
        /* Main Content */
        .main-content { margin-left: 320px; padding: 40px; width: calc(100% - 360px); }
        .editor-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .quiz-item { background: #f9f9f9; padding: 20px; border-left: 5px solid var(--accent); margin-bottom: 15px; border-radius: 4px; position: relative; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; margin-bottom: 20px; }
        .btn-save { background: var(--success); color: white; width: 100%; font-size: 1.1rem; }
        .btn-remove { background: var(--danger); color: white; position: absolute; right: 10px; top: 10px; padding: 5px 10px; font-size: 12px; }

        .json-preview { background: #272822; color: #f8f8f2; padding: 20px; border-radius: 8px; margin-top: 30px; overflow-x: auto; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>⚙️ Content Manager</h2>
    <p>เลือกวิชาที่ต้องการแก้ไข:</p>
    <select id="subject-select">
        <option value="english">English (ภาษาอังกฤษ)</option>
        <option value="science">Science (วิทยาศาสตร์)</option>
        <option value="math">Math (คณิตศาสตร์)</option>
    </select>
    <hr>
    <div style="margin-top: 20px; font-size: 0.9rem; color: #bdc3c7;">
        * หลังจากแก้ไขเสร็จ ให้กด "Generate JSON" เพื่อนำข้อมูลไปอัปเดตใน GitHub
    </div>
</div>

<div class="main-content">
    <div class="editor-card">
        <h1>แก้ไขบทเรียนและข้อสอบ</h1>
        
        <div class="form-group">
            <label>ชื่อบทเรียน (Lesson Title)</label>
            <input type="text" id="lesson-title" placeholder="เช่น Unit 1: At the Smart Farm">
        </div>

        <div class="form-group">
            <label>เนื้อหาบทเรียน (HTML/Markdown Content)</label>
            <textarea id="lesson-content" rows="6" placeholder="ใส่เนื้อหาละเอียดที่นี่..."></textarea>
        </div>

        <hr>

        <h3>📝 จัดการข้อสอบ (Quiz Builder)</h3>
        <div id="quiz-list">
            </div>
        
        <button class="btn btn-add" onclick="addQuestion()">+ เพิ่มข้อสอบ (New Question)</button>

        <hr>

        <button class="btn btn-save" onclick="generateJSON()">💾 Generate JSON for GitHub</button>
        
        <div id="json-output" class="json-preview" style="display:none;"></div>
    </div>
</div>

<script>
    let questionCount = 0;

    // ฟังก์ชันเพิ่มข้อสอบแบบ Dynamic
    function addQuestion() {
        questionCount++;
        const quizList = document.getElementById('quiz-list');
        const questionHtml = `
            <div class="quiz-item" id="q-container-${questionCount}">
                <button class="btn btn-remove" onclick="removeQuestion(${questionCount})">ลบข้อนี้</button>
                <div class="form-group">
                    <label>โจทย์ข้อที่ ${questionCount}</label>
                    <input type="text" class="q-text" placeholder="คำถามคืออะไร?">
                </div>
                <div class="form-group">
                    <label>ตัวเลือก (แยกด้วยเครื่องหมายคอมม่า ,)</label>
                    <input type="text" class="q-options" placeholder="ตัวเลือก 1, ตัวเลือก 2, ตัวเลือก 3, ตัวเลือก 4">
                </div>
                <div class="form-group">
                    <label>ลำดับคำตอบที่ถูกต้อง (1-4)</label>
                    <input type="number" class="q-ans" min="1" max="4" value="1">
                </div>
            </div>
        `;
        quizList.insertAdjacentHTML('beforeend', questionHtml);
    }

    function removeQuestion(id) {
        document.getElementById(`q-container-${id}`).remove();
    }

    // ฟังก์ชันรวมข้อมูลเป็น JSON
    function generateJSON() {
        const lessonData = {
            subject: document.getElementById('subject-select').value,
            title: document.getElementById('lesson-title').value,
            content: document.getElementById('lesson-content').value,
            questions: []
        };

        const questions = document.querySelectorAll('.quiz-item');
        questions.forEach(q => {
            lessonData.questions.push({
                question: q.querySelector('.q-text').value,
                options: q.querySelector('.q-options').value.split(',').map(opt => opt.trim()),
                answer: parseInt(q.querySelector('.q-ans').value) - 1
            });
        });

        const output = document.getElementById('json-output');
        output.innerText = JSON.stringify(lessonData, null, 2);
        output.style.display = 'block';
        
        // Alert ให้ Developer ทราบ
        alert("สร้างไฟล์ JSON สำเร็จ! คุณสามารถ Copy โค้ดด้านล่างไปใส่ในไฟล์ข้อมูลบน GitHub ได้ทันที");
    }

    // เริ่มต้นด้วย 1 ข้อเสมอ
    addQuestion();
</script>

</body>
</html>
