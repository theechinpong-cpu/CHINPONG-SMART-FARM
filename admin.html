<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educator Command Hub - Auto Affiliate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-btn.active { background: #f43f5e !important; color: white !important; box-shadow: 0 0 20px rgba(244, 63, 94, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #60a5fa, #f43f5e, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen">

    <script>
        // ==========================================
        // 🛍️ [ คลังสินค้า Shopee Affiliate ]
        // เพิ่มสินค้าตรงนี้ได้เป็นร้อยรายการเลยครับ
        // ==========================================
        const shopeeLibrary = [
            { name: "กล้องจุลทรรศน์ดิจิทัล 1000x", cat: "Science", link: "https://shope.ee/ตัวอย่าง1", highlight: "ส่องปีกแมลงชัดมาก ต่อเข้ามือถือได้เลย" },
            { name: "ปากกาพูดได้ Reading Pen", cat: "English", link: "https://shope.ee/ตัวอย่าง2", highlight: "สำเนียงเป๊ะมาก ช่วยน้องๆ ฝึกออกเสียง" },
            { name: "คีย์บอร์ด Mechanical มีไฟ RGB", cat: "Computer", link: "https://shope.ee/ตัวอย่าง3", highlight: "พิมพ์สนุก เสียงเพราะ เด็กสายคอมต้องชอบ" },
            { name: "เครื่องคิดเลขวิทยาศาสตร์ Casio", cat: "Math", link: "https://shope.ee/ตัวอย่าง4", highlight: "ฟังชั่นครบ ใช้สอบเข้ามหาลัยได้ยาวๆ" },
            { name: "ชุดของเล่นทดลองปลูกคริสตัล", cat: "Science", link: "https://shope.ee/ตัวอย่าง5", highlight: "ฝึกความอดทนและเรียนรู้วิทยาศาสตร์" }
            // ก๊อปปี้บรรทัดด้านบนแล้วเพิ่มสินค้าลงไปได้เรื่อยๆ ครับ
        ];

        // --- แคปชันสำหรับป้ายยา (สุ่มอัตโนมัติ) ---
        const affCaps = [
            "ชาว [CAT] ต้องมี! [NAME] ตัวนี้ [HIGHLIGHT] แอดคัดมาให้แล้ว พิกัดร้านในคอมเมนต์นะ 👇✨",
            "ไอเทมเด็ดที่เด็กๆ ต้องชอบ! ✨ [NAME] [HIGHLIGHT] แปะลิงก์ร้านที่แอดซื้อประจำไว้ให้แล้ว 👇",
            "ของดีบอกต่อครับ! 😂 [NAME] สวยตรงปก ใช้งานดีมาก [HIGHLIGHT] กดดูได้เลยที่คอมเมนต์ 👇"
        ];
    </script>

    <div class="flex">
        <aside class="w-24 md:w-64 min-h-screen flex flex-col items-center py-8 glass-card border-r border-white/5">
            <div class="w-14 h-14 bg-gradient-to-tr from-blue-600 to-rose-600 rounded-2xl flex items-center justify-center shadow-xl mb-12">
                <i class="fas fa-bolt text-2xl text-white"></i>
            </div>
            <nav class="space-y-4 w-full px-4">
                <button onclick="switchTab('quiz')" id="btn-quiz" class="nav-btn active w-full p-4 rounded-2xl bg-white/5 text-slate-400 flex items-center justify-center md:justify-start">
                    <i class="fas fa-graduation-cap md:mr-4"></i> <span class="hidden md:inline font-bold text-sm">จัดการข้อสอบ</span>
                </button>
                <button onclick="switchTab('affiliate')" id="btn-aff" class="nav-btn w-full p-4 rounded-2xl bg-white/5 text-slate-400 flex items-center justify-center md:justify-start">
                    <i class="fas fa-shopping-cart md:mr-4"></i> <span class="hidden md:inline font-bold text-sm">คลังป้ายยา</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-12 max-w-5xl mx-auto">
            <header class="mb-10">
                <h1 id="main-title" class="text-4xl font-black gradient-text mb-2">Quiz Center</h1>
                <p id="sub-title" class="text-slate-500">จัดการข้อสอบและระบบป้ายยาอัตโนมัติ</p>
            </header>

            <div id="section-quiz" class="space-y-6">
                <div class="glass-card p-8 rounded-[2rem] text-center">
                    <p class="text-slate-400 mb-4">ระบบจัดการข้อสอบพร้อมใช้งาน</p>
                    <button class="bg-blue-600 px-8 py-3 rounded-xl font-bold">สุ่มข้อสอบ</button>
                </div>
            </div>

            <div id="section-aff" class="hidden space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="glass-card p-8 rounded-[2rem]">
                        <h3 class="text-xl font-bold mb-6">สุ่มจากคลังสินค้า</h3>
                        <p class="text-xs text-slate-500 mb-6">ระบบจะเลือกสินค้าจาก Library และสุ่มแคปชันให้ทันที</p>
                        <button onclick="randomAffiliate()" class="w-full py-5 bg-rose-600 rounded-2xl font-black shadow-lg hover:scale-105 transition-all">
                            <i class="fas fa-dice mr-2"></i> สุ่มสินค้าป้ายยา
                        </button>
                    </div>

                    <div id="aff-result" class="glass-card p-8 rounded-[2.5rem] hidden border-t-4 border-rose-500">
                        <div class="mb-6">
                            <span id="res-cat" class="text-[10px] bg-rose-500/20 text-rose-500 px-3 py-1 rounded-full font-black uppercase">CATEGORY</span>
                            <h4 id="res-name" class="text-xl font-bold mt-3 text-white">ชื่อสินค้า</h4>
                        </div>
                        <div id="res-cap" class="text-sm text-slate-300 bg-white/5 p-4 rounded-xl border border-white/10 italic mb-6">
                            แคปชันจะปรากฏที่นี่...
                        </div>
                        <div class="flex gap-3">
                            <button onclick="copyAffContent()" class="flex-1 py-4 bg-white text-black font-black rounded-xl text-sm">COPY โพสต์ & ลิงก์</button>
                            <button onclick="window.open('https://www.facebook.com','_blank')" class="px-4 bg-blue-600 rounded-xl"><i class="fab fa-facebook-f"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentAff = null;

        function switchTab(tab) {
            document.getElementById('section-quiz').classList.add('hidden');
            document.getElementById('section-aff').classList.add('hidden');
            document.getElementById('btn-quiz').classList.remove('active');
            document.getElementById('btn-aff').classList.remove('active');
            
            if(tab === 'quiz') {
                document.getElementById('section-quiz').classList.remove('hidden');
                document.getElementById('btn-quiz').classList.add('active');
                document.getElementById('main-title').innerText = "Quiz Center";
            } else {
                document.getElementById('section-aff').classList.remove('hidden');
                document.getElementById('btn-aff').classList.add('active');
                document.getElementById('main-title').innerText = "Affiliate Library";
            }
        }

        function randomAffiliate() {
            // สุ่มสินค้า
            const item = shopeeLibrary[Math.floor(Math.random() * shopeeLibrary.length)];
            // สุ่มแคปชัน
            const capTemplate = affCaps[Math.floor(Math.random() * affCaps.length)];
            
            const finalCap = capTemplate
                .replace('[NAME]', item.name)
                .replace('[CAT]', item.cat)
                .replace('[HIGHLIGHT]', item.highlight);

            currentAff = { ...item, finalCap: finalCap };

            // แสดงผล UI
            document.getElementById('aff-result').classList.remove('hidden');
            document.getElementById('res-cat').innerText = item.cat;
            document.getElementById('res-name').innerText = item.name;
            document.getElementById('res-cap').innerText = finalCap;
        }

        function copyAffContent() {
            if(!currentAff) return;
            const textToCopy = `${currentAff.finalCap}\n\nพิกัดสั่งซื้อครับ 👇\nLink: ${currentAff.link}`;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("✅ คัดลอกคอนเทนต์ป้ายยาแล้ว! เตรียมไปวางใน Facebook ได้เลย");
            });
        }
    </script>
</body>
</html>
