<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Educator Admin - Multi-Subject Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subject-badge { transition: all 0.3s ease; }
        .active-subject { background: #f43f5e !important; color: white !important; box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex">
        <aside class="w-20 md:w-64 min-h-screen flex flex-col items-center py-8 glass-card">
            <div class="w-14 h-14 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center shadow-xl mb-12">
                <i class="fas fa-graduation-cap text-2xl text-white"></i>
            </div>
            <nav class="space-y-6 w-full px-4">
                <button onclick="filterSubject('All')" class="subject-badge w-full p-4 rounded-2xl bg-white/5 text-slate-400 hover:text-white flex items-center justify-center md:justify-start">
                    <i class="fas fa-th-large md:mr-4"></i> <span class="hidden md:inline font-bold">ทั้งหมด</span>
                </button>
                <button onclick="filterSubject('Science')" class="subject-badge w-full p-4 rounded-2xl bg-white/5 text-slate-400 hover:text-white flex items-center justify-center md:justify-start">
                    <i class="fas fa-flask md:mr-4"></i> <span class="hidden md:inline font-bold">วิทยาศาสตร์</span>
                </button>
                <button onclick="filterSubject('Math')" class="subject-badge w-full p-4 rounded-2xl bg-white/5 text-slate-400 hover:text-white flex items-center justify-center md:justify-start">
                    <i class="fas fa-calculator md:mr-4"></i> <span class="hidden md:inline font-bold">คณิตศาสตร์</span>
                </button>
                <button onclick="filterSubject('English')" class="subject-badge w-full p-4 rounded-2xl bg-white/5 text-slate-400 hover:text-white flex items-center justify-center md:justify-start">
                    <i class="fas fa-language md:mr-4"></i> <span class="hidden md:inline font-bold">ภาษาอังกฤษ</span>
                </button>
                <button onclick="filterSubject('Computer')" class="subject-badge w-full p-4 rounded-2xl bg-white/5 text-slate-400 hover:text-white flex items-center justify-center md:justify-start">
                    <i class="fas fa-laptop-code md:mr-4"></i> <span class="hidden md:inline font-bold">คอมพิวเตอร์</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-12">
            <header class="flex justify-between items-start mb-10">
                <div>
                    <h1 class="text-4xl font-black gradient-text mb-2">Educator Command Center</h1>
                    <p class="text-slate-500 font-medium">จัดการข้อสอบ 4 วิชาหลัก อนุบาล - ม.6</p>
                </div>
                <div class="glass-card p-4 rounded-2xl text-right">
                    <span class="text-[10px] font-black text-rose-500 uppercase tracking-widest block mb-1">FB Aged Account Protection</span>
                    <div class="flex items-center gap-4">
                        <div class="h-2 w-32 bg-white/10 rounded-full overflow-hidden">
                            <div id="pb-bar" class="h-full bg-rose-500" style="width: 0%"></div>
                        </div>
                        <span id="pb-text" class="text-sm font-bold">0/8</span>
                    </div>
                </div>
            </header>

            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass-card p-6 rounded-[2rem]">
                        <h3 class="font-bold mb-4 text-slate-300">ตัวกรองระดับชั้น</h3>
                        <select id="levelSelect" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="All">ทุกระดับชั้น</option>
                            <option value="Kindergarten">อนุบาล</option>
                            <option value="Primary">ประถมศึกษา (ป.1-ป.6)</option>
                            <option value="Secondary">มัธยมศึกษา (ม.1-ม.6)</option>
                        </select>
                        <button onclick="generateContent()" class="w-full mt-4 py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl font-black text-white shadow-lg hover:scale-[1.02] transition-all">
                            สุ่มข้อสอบที่เลือก
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-8 space-y-6">
                    <div class="glass-card p-8 rounded-[2.5rem] relative">
                        <div class="group relative mb-6">
                            <div class="absolute -top-3 left-6 px-3 bg-[#020617] text-blue-400 text-[10px] font-black tracking-widest border border-blue-500/30 rounded-full">FB CAPTION</div>
                            <div id="capBox" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 pt-8 text-lg">
                                กรุณาเลือกวิชาและกดสุ่มข้อสอบ...
                            </div>
                        </div>

                        <div id="quizDisplay" class="bg-slate-900 rounded-3xl p-8 mb-6 border border-white/10 hidden">
                            <span id="tagDisplay" class="text-[10px] font-black px-3 py-1 bg-blue-500 rounded-full mb-4 inline-block uppercase">Science</span>
                            <h2 id="qTitle" class="text-2xl font-bold mb-6 leading-tight"></h2>
                            <div id="optDisplay" class="grid gap-3"></div>
                        </div>

                        <div id="commentDisplay" class="bg-emerald-500/5 border border-emerald-500/20 rounded-2xl p-6 mb-6 hidden">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-emerald-500 text-[10px] font-black uppercase tracking-widest">First Comment (เฉลย)</span>
                                <button onclick="copyComment()" class="text-[10px] bg-emerald-500 text-black font-bold px-3 py-1 rounded-full hover:bg-white transition-all">COPY</button>
                            </div>
                            <p id="ansText" class="text-emerald-200/60 text-sm italic"></p>
                        </div>

                        <button onclick="pushToFB()" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:bg-blue-400 transition-all flex items-center justify-center">
                            <i class="fab fa-facebook mr-3 text-xl"></i> PUSH TO FEED (COPY โจทย์)
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- ฐานข้อมูลข้อสอบตัวอย่าง (คุณสามารถเพิ่มได้อีกมหาศาล) ---
        const db = [
            { subject: 'Science', level: 'Primary', q: 'สัตว์ชนิดใดออกลูกเป็นไข่?', opts: ['แมว', 'วาฬ', 'ไก่', 'สุนัข'], ans: 'ค. ไก่', exp: 'ไก่เป็นสัตว์ปีกที่ออกลูกเป็นไข่ ส่วนที่เหลือเป็นสัตว์เลี้ยงลูกด้วยนมครับ' },
            { subject: 'Math', level: 'Secondary', q: '5 + 5 x 5 มีค่าเท่ากับเท่าใด?', opts: ['50', '30', '25', '100'], ans: 'ข. 30', exp: 'ตามหลักการทางคณิตศาสตร์ ต้องทำเครื่องหมายคูณก่อน (5x5=25) แล้วจึงบวก 5 ครับ' },
            { subject: 'English', level: 'Primary', q: 'Which month comes after June?', opts: ['May', 'July', 'August', 'April'], ans: 'B. July', exp: 'ถัดจากเดือนมิถุนายน (June) คือเดือนกรกฎาคม (July) ครับ' },
            { subject: 'Computer', level: 'Secondary', q: 'อุปกรณ์ใดทำหน้าที่เป็น "สมอง" ของคอมพิวเตอร์?', opts: ['RAM', 'Hard Disk', 'CPU', 'Monitor'], ans: 'ค. CPU', exp: 'CPU หรือ Central Processing Unit ทำหน้าที่ประมวลผลเหมือนสมองมนุษย์ครับ' },
            { subject: 'Science', level: 'Kindergarten', q: 'ท้องฟ้าเวลากลางวันมีสีอะไร?', opts: ['สีแดง', 'สีดำ', 'สีฟ้า'], ans: 'ค. สีฟ้า', exp: 'เวลากลางวันเราจะเห็นท้องฟ้าเป็นสีฟ้าสวยงามครับ' }
        ];

        const caps = [
            "มาลับสมองกันหน่อยครับเด็กๆ! ข้อนี้ใครตอบได้บ้าง? 👇",
            "โจทย์วันนี้ท้าทายมาก! ลองเช็กความรู้กันดู พิมพ์คำตอบไว้เดี๋ยวแอดเฉลย 👇",
            "ข้อสอบวิชา [SUB] ออกสอบบ่อยสุดๆ ใครอยากเก่งต้องลองทำดูครับ 👇",
            "ความรู้รอบตัววันละข้อ! ข้อนี้ให้กี่คะแนนดี? ตอบมาในคอมเมนต์เลย 👇"
        ];

        let selectedSub = 'All';
        let currentQuiz = null;
        let pCount = 0;

        function filterSubject(s) {
            selectedSub = s;
            document.querySelectorAll('.subject-badge').forEach(b => b.classList.remove('active-subject'));
            event.currentTarget.classList.add('active-subject');
        }

        function generateContent() {
            const level = document.getElementById('levelSelect').value;
            let filtered = db;
            if (selectedSub !== 'All') filtered = filtered.filter(i => i.subject === selectedSub);
            if (level !== 'All') filtered = filtered.filter(i => i.level === level);

            if (filtered.length === 0) return alert("ไม่พบข้อสอบในหมวดนี้ กรุณาลองเลือกหมวดอื่น");

            currentQuiz = filtered[Math.floor(Math.random() * filtered.length)];
            
            // Display UI
            document.getElementById('quizDisplay').classList.remove('hidden');
            document.getElementById('commentDisplay').classList.remove('hidden');
            document.getElementById('tagDisplay').innerText = currentQuiz.subject + " | " + currentQuiz.level;
            document.getElementById('qTitle').innerText = currentQuiz.q;
            
            document.getElementById('optDisplay').innerHTML = currentQuiz.opts.map((o,i) => 
                `<div class="p-3 bg-white/5 border border-white/10 rounded-xl text-sm">${String.fromCharCode(65+i)}. ${o}</div>`
            ).join('');

            document.getElementById('ansText').innerText = `เฉลย: ${currentQuiz.ans}\nเพราะ: ${currentQuiz.exp}`;
            
            // Random Caption
            let c = caps[Math.floor(Math.random() * caps.length)];
            document.getElementById('capBox').innerText = c.replace('[SUB]', currentQuiz.subject);
        }

        function pushToFB() {
            if(!currentQuiz) return;
            const text = `${document.getElementById('capBox').innerText}\n\nโจทย์: ${currentQuiz.q}\n${currentQuiz.opts.map((o,i) => String.fromCharCode(65+i)+'. '+o).join('\n')}`;
            navigator.clipboard.writeText(text).then(() => {
                pCount++;
                document.getElementById('pb-bar').style.width = (pCount/8*100)+'%';
                document.getElementById('pb-text').innerText = pCount+'/8';
                alert("คัดลอกโจทย์แล้ว! กำลังไปที่ Facebook...");
                window.open('https://www.facebook.com/', '_blank');
            });
        }

        function copyComment() {
            navigator.clipboard.writeText(document.getElementById('ansText').innerText).then(() => alert("คัดลอกเฉลยแล้ว! ไปวางในคอมเมนต์ได้เลย"));
        }
    </script>
</body>
</html>
