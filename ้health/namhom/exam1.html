<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบสุขศึกษา ป.5 (75 ข้อ)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .exam-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .question-box { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; }
        .btn-option { width: 100%; text-align: left; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; background: #fff; }
        .btn-option:hover { background: #e1f5fe; }
        .correct { background-color: #c8e6c9 !important; border-color: #4caf50 !important; }
        .wrong { background-color: #ffcdd2 !important; border-color: #f44336 !important; }
        .explanation { margin-top: 10px; padding: 10px; background: #fff3e0; border-left: 5px solid #ff9800; display: none; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="exam-container">
    <h1>ข้อสอบสุขศึกษา ป.5 (75 ข้อ)</h1>
    <div id="quiz"></div>
</div>

<script>
    const questions = [
        // ข้อ 1-50 (รวมแล้ว)
        {q: "1. อวัยวะใดทำหน้าที่ผลิตน้ำดีช่วยย่อยไขมัน?", o: ["กระเพาะอาหาร", "ตับ", "ลำไส้เล็ก", "ตับอ่อน"], a: 1, exp: "ตับทำหน้าที่สร้างน้ำดี ซึ่งช่วยในการย่อยไขมันให้แตกตัว"},
        {q: "2. อวัยวะใดทำหน้าที่ดูดซึมสารอาหารเข้าสู่กระแสเลือดมากที่สุด?", o: ["กระเพาะอาหาร", "ลำไส้ใหญ่", "ลำไส้เล็ก", "หลอดอาหาร"], a: 2, exp: "ลำไส้เล็กเป็นส่วนที่มีความยาวมากที่สุดและมีปุ่มเล็กๆ ช่วยดูดซึมสารอาหาร"},
        {q: "3. อาหารประเภทใดควรได้รับเพื่อช่วยในการขับถ่าย?", o: ["เนื้อสัตว์", "ผักและผลไม้", "ไขมัน", "แป้ง"], a: 1, exp: "ใยอาหารจากผักและผลไม้ช่วยเพิ่มกากใยทำให้อุจจาระนุ่มและขับถ่ายสะดวก"},
        {q: "4. การเปลี่ยนแปลงทางร่างกายในข้อใดเด่นชัดในเพศชายวัย 10-12 ปี?", o: ["สะโพกผาย", "เสียงแตกพร่า", "มีประจำเดือน", "หน้าอกขยาย"], a: 1, exp: "เสียงแตกพร่าหรือเสียงห้าวเกิดจากการเปลี่ยนแปลงของกล่องเสียงเนื่องจากฮอร์โมนเพศชาย"},
        {q: "5. หากเพื่อนชวนทำกิจกรรมที่ไม่เหมาะสม ควรปฏิบัติตนอย่างไร?", o: ["ยอมทำตามเพื่อน", "ดุด่าเพื่อน", "ปฏิเสธอย่างสุภาพและเลี่ยงออกมา", "นิ่งเงียบ"], a: 2, exp: "การปฏิเสธอย่างชัดเจนแต่สุภาพเป็นทักษะชีวิตที่สำคัญในการป้องกันภัย"},
        {q: "6. การกลั้นปัสสาวะบ่อยๆ จะส่งผลเสียอย่างไร?", o: ["ไตทำงานดีขึ้น", "กระเพาะปัสสาวะอักเสบ", "ร่างกายแข็งแรง", "ความจำดีขึ้น"], a: 1, exp: "การกลั้นปัสสาวะทำให้เชื้อโรคสะสมและอาจเกิดการอักเสบในทางเดินปัสสาวะได้"},
        {q: "7. อวัยวะใดทำหน้าที่กรองของเสียที่เป็นน้ำออกจากเลือด?", o: ["ไต", "ปอด", "หัวใจ", "ตับ"], a: 0, exp: "ไตทำหน้าที่กรองเลือดและกำจัดของเสียออกมาในรูปแบบของปัสสาวะ"},
        {q: "8. การดูแลสุขภาพจิตที่ดีเมื่อเผชิญปัญหาควรทำอย่างไร?", o: ["เก็บตัวคนเดียว", "ระบายอารมณ์ใส่คนรอบข้าง", "หาเวลาทำกิจกรรมที่ชอบ", "ไม่สนใจปัญหา"], a: 2, exp: "การทำกิจกรรมที่ผ่อนคลายช่วยลดความเครียดและทำให้จิตใจสดใสขึ้น"},
        {q: "9. ทำไมเราต้องเคี้ยวอาหารให้ละเอียดก่อนกลืน?", o: ["เพื่อให้กินได้เยอะขึ้น", "ช่วยกระเพาะอาหารย่อยง่ายขึ้น", "เพื่อเพิ่มรสชาติ", "ป้องกันฟันผุ"], a: 1, exp: "การเคี้ยวละเอียดช่วยลดภาระการทำงานของกระเพาะอาหารและช่วยให้ร่างกายได้รับสารอาหารเร็วขึ้น"},
        {q: "10. ข้อใดคือการปฏิบัติตนต่อเพศตรงข้ามอย่างเหมาะสม?", o: ["ล้อเลียนรูปร่าง", "ไม่พูดคุยด้วย", "ให้เกียรติและมีขอบเขต", "แสดงความสนิทสนมเกินวัย"], a: 2, exp: "การให้เกียรติซึ่งกันและกันเป็นพื้นฐานของการอยู่ร่วมกันในสังคมอย่างมีความสุข"},
        {q: "11. ถ้าเด็ก ป.5 มีอาการท้องผูก ควรแก้ปัญหาอย่างไร?", o: ["กินยาระบายทุกวัน", "ดื่มน้ำน้อยลง", "เพิ่มผักผลไม้และดื่มน้ำมากขึ้น", "หยุดกินอาหาร"], a: 2, exp: "น้ำและใยอาหารเป็นปัจจัยสำคัญที่ช่วยแก้ปัญหาท้องผูกได้อย่างยั่งยืน"},
        {q: "12. ช่วงวัย 10-12 ปี เป็นช่วงเปลี่ยนผ่านไปสู่ช่วงใด?", o: ["วัยทารก", "วัยรุ่น", "วัยผู้ใหญ่", "วัยชรา"], a: 1, exp: "ช่วงอายุดังกล่าวถือเป็นจุดเริ่มต้นของการเข้าสู่วัยรุ่นที่มีการเปลี่ยนแปลงทั้งร่างกายและอารมณ์"},
        {q: "13. โรคกระเพาะอาหารมักเกิดจากพฤติกรรมใด?", o: ["กินอาหารตรงเวลา", "กินอาหารไม่ตรงเวลา", "กินผักผลไม้", "ออกกำลังกาย"], a: 1, exp: "การกินไม่ตรงเวลาทำให้น้ำย่อยที่หลั่งออกมามากัดกระเพาะอาหารตนเอง"},
        {q: "14. ข้อใดคือประโยชน์ของการนอนหลับพักผ่อนที่เพียงพอ?", o: ["ทำให้ร่างกายเติบโตแข็งแรง", "ทำให้สมองล้า", "ทำให้ตัวเตี้ย", "ทำให้หิวบ่อย"], a: 0, exp: "ในขณะหลับ ร่างกายจะหลั่งโกรทฮอร์โมนที่ช่วยให้ร่างกายเจริญเติบโตได้เต็มที่"},
        {q: "15. การดูแลอวัยวะเพศที่ถูกต้องที่สุดคือ?", o: ["ใช้สบู่หอมแรงๆ", "ล้างด้วยน้ำสะอาดและซับให้แห้ง", "ไม่ต้องดูแล", "ใช้แป้งหอมโรยหนาๆ"], a: 1, exp: "ความสะอาดและความแห้งเป็นหัวใจสำคัญในการป้องกันเชื้อราและแบคทีเรีย"},
        {q: "16. เมื่อมีความทุกข์หรืออารมณ์ไม่ดี ควรทำอย่างไร?", o: ["เก็บไว้คนเดียว", "เล่าให้ผู้ปกครองหรือครูฟัง", "ชกต่อยกับเพื่อน", "โกหกทุกคน"], a: 1, exp: "การปรึกษาผู้ใหญ่ที่ไว้ใจได้จะช่วยให้ได้รับคำแนะนำและแก้ปัญหาได้อย่างถูกวิธี"},
        {q: "17. การเจริญเติบโตของร่างกายในวัยนี้ขึ้นอยู่กับปัจจัยใดมากที่สุด?", o: ["การเล่นเกม", "อาหาร การพักผ่อน และการออกกำลังกาย", "การดูโทรทัศน์", "การแต่งตัว"], a: 1, exp: "พฤติกรรมสุขภาพที่ดี 3 ด้าน (กิน นอน เล่น) เป็นรากฐานของการเติบโตที่สมวัย"},
        {q: "18. ไตมีลักษณะรูปร่างคล้ายสิ่งใด?", o: ["เมล็ดถั่ว", "ก้อนหิน", "หัวใจ", "ใบไม้"], a: 0, exp: "ไตของมนุษย์มีรูปร่างคล้ายเมล็ดถั่วแดงและมีสีน้ำตาลแดง"},
        {q: "19. ก่อนรับประทานอาหารควรปฏิบัติตนอย่างไร?", o: ["ล้างมือให้สะอาด", "เล่นซน", "เปลี่ยนชุด", "ดื่มน้ำอัดลม"], a: 0, exp: "มือเป็นแหล่งสะสมเชื้อโรค การล้างมือก่อนกินช่วยป้องกันโรคติดเชื้อทางเดินอาหาร"},
        {q: "20. ลักษณะของเพื่อนที่ดีควรเป็นอย่างไร?", o: ["ชวนไปทำสิ่งที่ผิด", "ช่วยเหลือกันในทางที่ดี", "พูดจาหยาบคาย", "นินทาคนอื่น"], a: 1, exp: "เพื่อนที่ดีจะชวนกันทำกิจกรรมที่ส่งเสริมการเรียนรู้และสุขภาพกายสุขภาพจิต"},
        {q: "21. น้ำย่อยในกระเพาะอาหารมีสภาพเป็นอย่างไร?", o: ["กรด", "ด่าง", "กลาง", "หวาน"], a: 0, exp: "ในกระเพาะอาหารมีกรดไฮโดรคลอริกช่วยย่อยโปรตีนและฆ่าเชื้อโรค"},
        {q: "22. ปริมาณน้ำดื่มที่เหมาะสมในหนึ่งวันคือ?", o: ["2-3 แก้ว", "4-5 แก้ว", "8-10 แก้ว", "20 แก้ว"], a: 2, exp: "ร่างกายควรได้รับน้ำเพียงพอเพื่อใช้ในระบบไหลเวียนโลหิตและระบบขับถ่าย"},
        {q: "23. การเปลี่ยนแปลงอารมณ์ในวัยรุ่นเกิดจากสาเหตุใด?", o: ["สภาพอากาศ", "การทำงานของฮอร์โมน", "สีของเสื้อผ้า", "การเรียนหนังสือ"], a: 1, exp: "ฮอร์โมนเพศที่เพิ่มขึ้นส่งผลโดยตรงต่อการทำงานของระบบประสาทและอารมณ์"},
        {q: "24. สิ่งใดบ่งบอกถึงการมีสุขภาพจิตที่ดี?", o: ["วิตกกังวลตลอดเวลา", "ยิ้มแย้มแจ่มใสและปรับตัวได้", "โกรธง่าย", "เงียบขรึม"], a: 1, exp: "การปรับตัวเข้ากับสถานการณ์และมีความสุขตามวัยคือสัญญาณของสุขภาพจิตที่ดี"},
        {q: "25. ข้อใดกล่าวถูกต้องที่สุดเกี่ยวกับระบบขับถ่าย?", o: ["ช่วยย่อยแป้ง", "กำจัดของเสียออกจากร่างกาย", "ผลิตพลังงาน", "ช่วยดูดซึมวิตามิน"], a: 1, exp: "ระบบขับถ่ายมีหน้าที่หลักในการนำกากอาหารและของเสียออกจากร่างกาย เพื่อไม่ให้สะสมจนเป็นพิษ"},
        {q: "26. หัวใจทำหน้าที่สำคัญที่สุดคือข้อใด?", o: ["ย่อยอาหาร", "สูบฉีดเลือด", "ฟอกอากาศ", "ผลิตฮอร์โมน"], a: 1, exp: "หัวใจทำหน้าที่เป็นปั๊มสูบฉีดเลือดไปเลี้ยงส่วนต่างๆ ของร่างกาย"},
        {q: "27. อาหารหมู่ที่ 1 คือสารอาหารประเภทใด?", o: ["แป้ง", "โปรตีน", "ไขมัน", "วิตามิน"], a: 1, exp: "หมู่ที่ 1 คือ โปรตีน (เนื้อ นม ไข่ ถั่ว) ช่วยซ่อมแซมส่วนที่สึกหรอ"},
        {q: "28. ผลไม้จัดอยู่ในสารอาหารหมู่ที่เท่าใด?", o: ["หมู่ที่ 2", "หมู่ที่ 3", "หมู่ที่ 4", "หมู่ที่ 5"], a: 2, exp: "หมู่ที่ 4 คือ ผลไม้ชนิดต่างๆ ให้วิตามินและแร่ธาตุ"},
        {q: "29. การปฐมพยาบาลเบื้องต้นเมื่อมีแผลถลอกคือ?", o: ["ใส่ยาหม่อง", "ล้างแผลด้วยน้ำสะอาดและใส่ยา", "เอาดินพอก", "ใช้ผ้าพันแผลแน่นๆ"], a: 1, exp: "ต้องล้างสิ่งสกปรกออกก่อนเพื่อป้องกันการติดเชื้อ"},
        {q: "30. อาหารชนิดใดมีไขมันเป็นส่วนประกอบหลัก?", o: ["ผักบุ้ง", "ข้าวสวย", "เนย", "ส้ม"], a: 2, exp: "เนย น้ำมันพืช และกะทิ จัดเป็นอาหารหมู่ที่ 5 (ไขมัน)"},
        {q: "31. วิธีป้องกันโรคไข้เลือดออกที่ดีที่สุดคืออะไร?", o: ["กินยาป้องกัน", "นอนในมุ้งและทำลายแหล่งเพาะพันธุ์ยุง", "ทาแป้ง", "ใส่เสื้อผ้าหนาๆ"], a: 1, exp: "กำจัดแหล่งลูกน้ำยุงลายคือหัวใจสำคัญของการป้องกันไข้เลือดออก"},
        {q: "32. การแปรงฟันก่อนนอนช่วยป้องกันโรคใด?", o: ["ฟันผุ", "ตาแดง", "หวัด", "ท้องร่วง"], a: 0, exp: "เศษอาหารที่ติดค้างเป็นแหล่งอาหารของแบคทีเรียที่ทำให้ฟันผุ"},
        {q: "33. ผักใบเขียวให้สารอาหารประเภทใด?", o: ["คาร์โบไฮเดรต", "โปรตีน", "วิตามินและแร่ธาตุ", "ไขมัน"], a: 2, exp: "ผักใบเขียวเป็นหมู่ที่ 3 ให้วิตามินและแร่ธาตุ ช่วยให้ระบบขับถ่ายทำงานดี"},
        {q: "34. ถ้ามีอาการอาหารเป็นพิษ ควรมีอาการอย่างไร?", o: ["ท้องเสีย อาเจียน", "หูอื้อ", "ผมร่วง", "ตาพร่า"], a: 0, exp: "อาการทั่วไปคือปวดท้อง ท้องเสีย และคลื่นไส้อาเจียนจากการกินของไม่สะอาด"},
        {q: "35. การออกกำลังกายที่เหมาะสมกับเด็ก ป.5 ควรเป็นอย่างไร?", o: ["ยกน้ำหนักมากๆ", "เล่นกีฬาที่ชอบอย่างสม่ำเสมอ", "ไม่ต้องออกกำลังกาย", "นอนออกกำลังกาย"], a: 1, exp: "กีฬาที่เหมาะสมช่วยพัฒนาความแข็งแรงของกล้ามเนื้อและหัวใจ"},
        {q: "36. โรคใดเป็นโรคติดต่อทางลมหายใจ?", o: ["โรคหวัด", "โรคผิวหนัง", "โรคฟันผุ", "ตาแดง"], a: 0, exp: "หวัดติดต่อผ่านการไอ จาม และละอองฝอยในอากาศ"},
        {q: "37. น้ำดื่มสะอาดควรมีลักษณะอย่างไร?", o: ["ใส ไม่มีสี กลิ่น และเชื้อโรค", "มีสีเล็กน้อย", "มีกลิ่นหอม", "ขุ่น"], a: 0, exp: "น้ำสะอาดที่ปลอดภัยต้องไร้สี ไร้กลิ่น และปราศจากเชื้อโรค"},
        {q: "38. หากเพื่อนประสบอุบัติเหตุเลือดไหลไม่หยุด ควรทำอย่างไร?", o: ["ตะโกนเรียกผู้ใหญ่", "ปล่อยไว้เฉยๆ", "เอาปากดูดเลือด", "วิ่งหนี"], a: 0, exp: "การขอความช่วยเหลือจากผู้ใหญ่คือสิ่งที่ควรทำทันที"},
        {q: "39. การกินอาหารที่สุกๆ ดิบๆ เสี่ยงต่อโรคใด?", o: ["พยาธิ", "ตาบอด", "ฟันผุ", "ผมร่วง"], a: 0, exp: "อาหารที่ไม่สุกเป็นแหล่งสะสมของไข่พยาธิและเชื้อแบคทีเรีย"},
        {q: "40. พลังงานในร่างกายเราได้มาจากอาหารหมู่ใดมากที่สุด?", o: ["หมู่ที่ 1", "หมู่ที่ 2", "หมู่ที่ 4", "หมู่ที่ 5"], a: 1, exp: "หมู่ที่ 2 (แป้ง น้ำตาล ข้าว) ให้พลังงานหลักแก่ร่างกาย"},
        {q: "41. การล้างมือก่อนกินข้าวควรทำกี่ขั้นตอนหลัก?", o: ["1 ขั้นตอน", "7 ขั้นตอน", "2 ขั้นตอน", "ไม่ต้องล้าง"], a: 1, exp: "การล้างมือ 7 ขั้นตอนแบบมาตรฐานช่วยกำจัดเชื้อโรคได้สะอาดที่สุด"},
        {q: "42. หากได้รับบาดเจ็บจนกระดูกหัก สิ่งที่ไม่ควรทำคือ?", o: ["ดามให้แน่น", "ขยับแขนขา", "ส่งโรงพยาบาล", "วางไว้เฉยๆ"], a: 1, exp: "การขยับแขนขาจะทำให้กระดูกที่หักทิ่มแทงเนื้อเยื่อบาดเจ็บมากขึ้น"},
        {q: "43. อาหารจานด่วน (Fast Food) มีข้อเสียอย่างไร?", o: ["สารอาหารไม่ครบถ้วน", "ไม่อร่อย", "แพง", "ทำให่อิ่มไว"], a: 0, exp: "มักมีโซเดียมสูง ไขมันเยอะ และขาดวิตามินที่จำเป็น"},
        {q: "44. โรคตาแดงติดต่อได้อย่างไร?", o: ["การสัมผัสใกล้ชิดหรือของใช้ร่วมกัน", "การกินข้าวด้วยกัน", "อากาศ", "ยุงกัด"], a: 0, exp: "ตาแดงติดต่อผ่านการสัมผัสเชื้อที่ติดอยู่ตามมือ ผ้าเช็ดหน้า หรือสิ่งของ"},
        {q: "45. การนอนหลับพักผ่อนส่งผลดีต่อระบบใดมากที่สุด?", o: ["ระบบสืบพันธุ์", "ระบบประสาทและสมอง", "ระบบฟัน", "ระบบการได้ยิน"], a: 1, exp: "สมองได้พักผ่อนและจัดเก็บข้อมูลความจำในขณะที่นอนหลับ"},
        {q: "46. คนที่กินอาหารไม่ครบ 5 หมู่ จะเป็นอย่างไร?", o: ["ร่างกายแข็งแรง", "ขาดสารอาหารและเติบโตช้า", "ฉลาดมาก", "ตัวสูงเร็ว"], a: 1, exp: "ร่างกายต้องการสารอาหารหลากหลายเพื่อใช้ในการทำงานและซ่อมแซมส่วนต่างๆ"},
        {q: "47. วิธีจัดการกับขยะในโรงเรียนที่ดีที่สุด?", o: ["เผาทิ้ง", "ทิ้งลงแม่น้ำ", "แยกขยะก่อนทิ้ง", "เอาไปกองไว้หลังห้อง"], a: 2, exp: "การแยกขยะช่วยให้จัดการของเสียได้ง่ายและลดการสะสมของเชื้อโรค"},
        {q: "48. ใครมีสุขภาพร่างกายที่แข็งแรงที่สุด?", o: ["คนที่กินแต่ขนม", "คนที่กินอาหารครบ 5 หมู่และออกกำลังกาย", "คนที่นอนวันละ 2 ชั่วโมง", "คนที่ไม่กินข้าวเช้า"], a: 1, exp: "พฤติกรรมสุขภาพที่ดีคือปัจจัยสำคัญที่สุดของความแข็งแรง"},
        {q: "49. กีฬาประเภทใดช่วยเสริมสร้างความสามัคคีได้ดีที่สุด?", o: ["ว่ายน้ำคนเดียว", "เล่นกีฬาเป็นทีม", "วิ่งคนเดียว", "อ่านหนังสือ"], a: 1, exp: "การเล่นกีฬาเป็นทีมฝึกการทำงานร่วมกับผู้อื่น"},
        {q: "50. ถ้าเห็นเพื่อนเป็นลม ควรทำอย่างไร?", o: ["พัดให้ลมโกรก", "เอาน้ำราด", "ปล่อยให้เพื่อนตื่นเอง", "ตบหน้าเพื่อน"], a: 0, exp: "ควรจัดให้เพื่อนอยู่ในที่อากาศถ่ายเทสะดวกและคลายเสื้อผ้าให้หายใจสะดวก"},
        // ข้อ 51-75
        {q: "51. การปฐมพยาบาลคนถูกแมลงสัตว์กัดต่อยควรทำอย่างไร?", o: ["เอาดินพอก", "ใช้แอมโมเนียหอมทาบริเวณที่โดนกัด", "เอาเหล้าทา", "ปล่อยไว้เฉยๆ"], a: 1, exp: "แอมโมเนียหอมช่วยบรรเทาอาการปวดแสบปวดร้อนและลดการอักเสบได้"},
        {q: "52. หากเกิดไฟไหม้ภายในอาคาร สิ่งแรกที่ควรทำคืออะไร?", o: ["รีบเก็บของมีค่า", "รีบหนีออกจากอาคารทางบันไดหนีไฟ", "โทรศัพท์หาเพื่อน", "หาที่หลบในตู้"], a: 1, exp: "ความปลอดภัยของชีวิตสำคัญที่สุด ต้องรีบอพยพทันทีผ่านทางออกฉุกเฉิน"},
        {q: "53. การปฏิบัติตนเพื่อป้องกันอุบัติเหตุทางน้ำคือข้อใด?", o: ["ว่ายน้ำคนเดียวในที่ลึก", "ใส่ชูชีพเมื่อลงเรือ", "เล่นน้ำในคลองน้ำไหลเชี่ยว", "ว่ายน้ำตอนกลางคืน"], a: 1, exp: "เสื้อชูชีพช่วยพยุงร่างกายและลดความเสี่ยงจากการจมน้ำ"},
        {q: "54. หากถูกของมีคมบาด ควรทำอย่างไร?", o: ["เอามือจับแผลไว้เฉยๆ", "ล้างแผลและกดแผลเพื่อห้ามเลือด", "เอาเศษผ้าสกปรกพันแผล", "ปล่อยให้เลือดไหลจนหยุดเอง"], a: 1, exp: "การล้างแผลและการกดจะช่วยทำความสะอาดและหยุดการสูญเสียเลือด"},
        {q: "55. ข้อใดเป็นอันตรายจากการใช้เครื่องใช้ไฟฟ้า?", o: ["ไฟฟ้าลัดวงจร", "ไฟสว่างเกินไป", "พัดลมหมุนเร็ว", "เสียงเครื่องยนต์เงียบ"], a: 0, exp: "ไฟฟ้าลัดวงจรอาจทำให้เกิดไฟไหม้หรือไฟฟ้าดูดได้"},
        {q: "56. สารเสพติดให้โทษส่งผลกระทบต่อร่างกายอย่างไรมากที่สุด?", o: ["ทำให้ร่างกายแข็งแรง", "ทำลายระบบประสาทและสมอง", "ทำให้เรียนเก่งขึ้น", "ช่วยให้นอนหลับสบาย"], a: 1, exp: "สารเสพติดทำลายเซลล์ประสาทและทำให้การตัดสินใจผิดพลาด"},
        {q: "57. เพื่อนชวนลองดื่มเครื่องดื่มแอลกอฮอล์ ควรตอบว่าอย่างไร?", o: ["ลองนิดหน่อยไม่เป็นไร", "ไม่เอาดีกว่าเพราะผิดกฎหมายและเสียสุขภาพ", "ลองเพื่อให้รู้รส", "ตามใจเพื่อน"], a: 1, exp: "การปฏิเสธที่หนักแน่นและบอกเหตุผลคือวิธีรักษาตัวจากพฤติกรรมเสี่ยงที่ดีที่สุด"},
        {q: "58. ข้อใดเป็นการป้องกันอุบัติเหตุบนท้องถนน?", o: ["ข้ามถนนทางม้าลาย", "วิ่งตัดหน้ารถ", "ขับรถเร็วเกินกำหนด", "เล่นฟุตบอลบนถนน"], a: 0, exp: "ทางม้าลายและสะพานลอยจัดทำขึ้นเพื่อความปลอดภัยของคนข้ามถนน"},
        {q: "59. เมื่อต้องใช้ยา สิ่งที่สำคัญที่สุดคืออะไร?", o: ["อ่านฉลากและวิธีใช้ให้เข้าใจ", "กินตามเพื่อน", "กินยาให้มากที่สุด", "ไม่ต้องสนใจวันหมดอายุ"], a: 0, exp: "ยาแต่ละชนิดมีวิธีการใช้และขนาดที่แตกต่างกัน ต้องอ่านฉลากก่อนเสมอ"},
        {q: "60. การมีน้ำใจต่อผู้อื่นส่งผลดีอย่างไร?", o: ["ทำให้คนอื่นเกรงใจ", "ช่วยสร้างความสัมพันธ์ที่ดีในสังคม", "ทำให้ไม่มีเวลาส่วนตัว", "ทำให้เสียเปรียบ"], a: 1, exp: "ความมีน้ำใจสร้างมิตรภาพและทำให้การอยู่ร่วมกันมีความสุข"},
        {q: "61. โรคไข้หวัดใหญ่ป้องกันได้ด้วยวิธีใด?", o: ["ฉีดวัคซีนป้องกัน", "กินแต่ขนม", "เล่นน้ำฝน", "ไม่ใส่หน้ากาก"], a: 0, exp: "วัคซีนเป็นวิธีป้องกันที่ได้ผลดีที่สุดในการลดความรุนแรงของโรค"},
        {q: "62. อุปกรณ์ใดช่วยลดการบาดเจ็บจากการขี่จักรยาน?", o: ["หมวกนิรภัย", "รองเท้าแตะ", "ถุงเท้า", "เสื้อแขนยาว"], a: 0, exp: "หมวกนิรภัยช่วยป้องกันการบาดเจ็บรุนแรงที่ศีรษะเมื่อเกิดอุบัติเหตุ"},
        {q: "63. การรับประทานอาหารที่ไม่สะอาดนำไปสู่โรคใด?", o: ["โรคตาแดง", "โรคอุจจาระร่วง", "โรคหอบหืด", "โรคผมร่วง"], a: 1, exp: "เชื้อโรคในอาหารที่ปนเปื้อนเป็นสาเหตุหลักของโรคทางเดินอาหาร"},
        {q: "64. หากรู้สึกมีไข้และปวดศีรษะ ควรปฏิบัติตนอย่างไร?", o: ["นอนพักและกินยาพาราเซตามอล", "วิ่งออกกำลังกายหนักๆ", "ออกไปเดินตากแดด", "กินอาหารรสเผ็ด"], a: 0, exp: "การพักผ่อนและกินยาตามขนาดที่เหมาะสมช่วยให้อาการดีขึ้น"},
        {q: "65. ข้อใดไม่ใช่ปัจจัยที่ส่งผลต่อสุขภาพ?", o: ["พันธุกรรม", "สิ่งแวดล้อม", "พฤติกรรมสุขภาพ", "ยี่ห้อเสื้อผ้า"], a: 3, exp: "ยี่ห้อเสื้อผ้าไม่มีผลต่อการเจริญเติบโตหรือสุขภาพของร่างกาย"},
        {q: "66. ถ้าเพื่อนทะเลาะกันเราควรทำอย่างไร?", o: ["ยุให้สู้กัน", "เดินหนี", "ห้ามปรามหรือตามผู้ใหญ่มาช่วย", "ถ่ายคลิปไว้ประจาน"], a: 2, exp: "การระงับเหตุการณ์ไม่ให้บานปลายคือหน้าที่ของพลเมืองที่ดี"},
        {q: "67. การออกกำลังกายที่หนักเกินไปส่งผลเสียอย่างไร?", o: ["กล้ามเนื้อฉีกขาดและร่างกายล้า", "แข็งแรงเร็วขึ้น", "ฉลาดขึ้น", "ตัวสูงขึ้น"], a: 0, exp: "ควรออกกำลังกายอย่างค่อยเป็นค่อยไปตามสมรรถภาพของตนเอง"},
        {q: "68. อากาศที่บริสุทธิ์มีผลดีต่อระบบใดมากที่สุด?", o: ["ระบบหายใจ", "ระบบย่อยอาหาร", "ระบบขับถ่าย", "ระบบสืบพันธุ์"], a: 0, exp: "อากาศบริสุทธิ์ช่วยให้ปอดแลกเปลี่ยนออกซิเจนได้อย่างมีประสิทธิภาพ"},
        {q: "69. ทำไมเราจึงไม่ควรเล่นประทัดหรือดอกไม้ไฟ?", o: ["เสียงดังเกินไป", "เปลืองเงิน", "เสี่ยงต่อการได้รับบาดเจ็บรุนแรงหรือไฟไหม้", "ไม่มีประโยชน์"], a: 2, exp: "ประทัดเป็นวัตถุอันตรายที่อาจทำให้สูญเสียอวัยวะหรือเกิดอัคคีภัยได้"},
        {q: "70. สุขภาพกายและสุขภาพจิตมีความสัมพันธ์กันอย่างไร?", o: ["ไม่สัมพันธ์กันเลย", "มีผลต่อกันอย่างมาก", "สุขภาพจิตสำคัญกว่า", "สุขภาพกายสำคัญกว่า"], a: 1, exp: "จิตใจที่ดีช่วยให้ร่างกายสดชื่น และร่างกายที่แข็งแรงช่วยให้จิตใจเบิกบาน"},
        {q: "71. การเตรียมตัวก่อนออกกำลังกายทำเพื่ออะไร?", o: ["ให้เพื่อนเห็น", "อบอุ่นร่างกายเพื่อป้องกันการบาดเจ็บ", "ประหยัดเวลา", "ทำให้เหงื่อไม่ออก"], a: 1, exp: "การยืดเหยียดช่วยให้กล้ามเนื้อพร้อมและลดความเสี่ยงต่อการบาดเจ็บ"},
        {q: "72. โรคติดต่อสามารถป้องกันได้ง่ายที่สุดด้วยวิธีใด?", o: ["ล้างมือบ่อยๆ", "กินยาปฏิชีวนะทุกวัน", "ใส่เสื้อผ้าหนาๆ", "ไม่คุยกับใคร"], a: 0, exp: "สุขอนามัยส่วนบุคคลที่ดี เช่น การล้างมือ คือด่านแรกในการป้องกันเชื้อโรค"},
        {q: "73. หากเห็นสายไฟฟ้าขาดบนพื้น สิ่งที่ต้องทำคือ?", o: ["เดินเข้าไปดูใกล้ๆ", "หลีกเลี่ยงให้ห่างและแจ้งผู้ใหญ่ทันที", "เอาไม้เขี่ย", "เอาน้ำราด"], a: 1, exp: "ไฟฟ้าแรงสูงอาจรั่วไหลลงพื้น เป็นอันตรายถึงชีวิตหากเข้าใกล้"},
        {q: "74. แสงแดดจัดในช่วงเที่ยงส่งผลเสียต่อผิวหนังอย่างไร?", o: ["ทำให้ผิวไหม้เกรียม", "ทำให้ผิวขาวขึ้น", "ทำให้ผิวชุ่มชื้น", "ทำให้เหงื่อไม่ออก"], a: 0, exp: "รังสีอัลตราไวโอเลตในแสงแดดสามารถทำลายเซลล์ผิวหนังได้"},
        {q: "75. สุขนิสัยที่ดีในการกินอาหารคืออะไร?", o: ["กินอาหารให้ครบ 5 หมู่", "กินมื้อเดียวอิ่มทั้งวัน", "กินแต่ของที่ชอบ", "รีบกินให้เร็วที่สุด"], a: 0, exp: "โภชนาการที่ครบถ้วนและสมดุลเป็นกุญแจสำคัญของสุขภาพที่ดี"}
    ];

    const quizDiv = document.getElementById('quiz');
    questions.forEach((q, i) => {
        let optionsHTML = q.o.map((opt, oIdx) => 
            `<li onclick="checkAnswer(${i}, ${oIdx})">
                <button class="btn-option" id="btn-${i}-${oIdx}">${String.fromCharCode(65+oIdx)}. ${opt}</button>
            </li>`
        ).join('');
        quizDiv.innerHTML += `<div class="question-box">
            <p><strong>${i+1}. ${q.q}</strong></p>
            <ul class="options">${optionsHTML}</ul>
            <div id="exp-${i}" class="explanation"><strong>เฉลย:</strong> ${q.exp}</div>
        </div>`;
    });

    function checkAnswer(qIdx, oIdx) {
        const correct = questions[qIdx].a;
        const btn = document.getElementById(`btn-${qIdx}-${oIdx}`);
        const exp = document.getElementById(`exp-${qIdx}`);
        
        if (oIdx === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            document.getElementById(`btn-${qIdx}-${correct}`).classList.add('correct');
        }
        exp.style.display = 'block';
    }
</script>
</body>
</html>
