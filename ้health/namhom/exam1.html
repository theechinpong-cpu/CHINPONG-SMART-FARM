<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบสุขศึกษา ป.5 กลางภาค</title>
</head>
<body>
    <h1>ข้อสอบกลางภาค วิชาสุขศึกษา (ป.5) - 25 ข้อ</h1>
    <form id="examForm">
        <div id="questionsContainer"></div>
        <button type="button" onclick="checkAnswers()">ตรวจคำตอบ</button>
    </form>
    <div id="resultArea"></div>

    <script>
        const data = [
            {q: "อวัยวะใดทำหน้าที่ผลิตน้ำดีเพื่อช่วยย่อยไขมัน?", o: ["ตับ", "กระเพาะอาหาร", "ลำไส้เล็ก"], a: 0, exp: "ตับทำหน้าที่ผลิตน้ำดีเพื่อช่วยในการย่อยไขมันให้มีขนาดเล็กลง"},
            {q: "อาหารประเภทใดควรได้รับในปริมาณที่เหมาะสมเพื่อช่วยในการขับถ่าย?", o: ["เนื้อสัตว์", "ผักและผลไม้", "ขนมขบเคี้ยว"], a: 1, exp: "ใยอาหารจากผักและผลไม้ช่วยเพิ่มกากใยให้ระบบขับถ่ายทำงานได้ดี"},
            {q: "การเปลี่ยนแปลงข้อใดที่มักเกิดขึ้นกับเด็กชายเมื่อเข้าสู่วัยรุ่น?", o: ["สะโพกขยาย", "เสียงห้าวขึ้น", "มีประจำเดือน"], a: 1, exp: "เสียงแตกพร่าหรือเสียงห้าวเป็นลักษณะเพศรองของเพศชาย"},
            {q: "หากเพื่อนชวนทำกิจกรรมที่เสี่ยงอันตราย ควรปฏิบัติอย่างไร?", o: ["ทำตามเพื่อความสนุก", "ปฏิเสธและชวนไปทำกิจกรรมอื่น", "นิ่งเฉย"], a: 1, exp: "การปฏิเสธอย่างชัดเจนและเบี่ยงเบนไปในทางที่ปลอดภัยคือทักษะปฏิเสธที่เหมาะสม"},
            {q: "อวัยวะใดทำหน้าที่ดูดซึมสารอาหารเข้าสู่กระแสเลือดมากที่สุด?", o: ["กระเพาะอาหาร", "ลำไส้เล็ก", "ลำไส้ใหญ่"], a: 1, exp: "ลำไส้เล็กเป็นส่วนที่ดูดซึมสารอาหารเข้าสู่ร่างกายมากที่สุด"},
            {q: "อาการท้องผูกมักเกิดจากสาเหตุใดมากที่สุด?", o: ["ดื่มน้ำมากเกินไป", "ขาดกากใยและดื่มน้ำน้อย", "ออกกำลังกายมากเกินไป"], a: 1, exp: "น้ำและกากใยเป็นปัจจัยหลักที่ช่วยให้อุจจาระอ่อนตัวและขับถ่ายสะดวก"},
            {q: "การดูแลระบบสืบพันธุ์ที่ถูกต้องคือข้อใด?", o: ["ใช้สบู่หอมล้างบ่อยๆ", "รักษาความสะอาดและเช็ดให้แห้งเสมอ", "ไม่ต้องทำความสะอาด"], a: 1, exp: "การรักษาความสะอาดภายนอกและทำให้แห้งช่วยลดการสะสมของเชื้อโรค"},
            {q: "เมื่ออารมณ์ไม่ดี วัยรุ่นควรจัดการอย่างไร?", o: ["ระบายใส่เพื่อน", "ทำกิจกรรมที่ผ่อนคลาย", "เก็บกดไว้คนเดียว"], a: 1, exp: "กิจกรรมที่สร้างสรรค์ช่วยจัดการอารมณ์ได้อย่างปลอดภัยและส่งผลดีต่อสุขภาพจิต"},
            {q: "โรคกระเพาะอาหารอักเสบ มักเกิดจากพฤติกรรมใด?", o: ["กินอาหารตรงเวลา", "กินอาหารไม่ตรงเวลา", "กินผักมากเกินไป"], a: 1, exp: "การกินอาหารไม่ตรงเวลาทำให้กระเพาะหลั่งน้ำย่อยออกมาโดยไม่มีอาหารให้ย่อย"},
            {q: "ข้อใดคือประโยชน์ของระบบขับถ่ายปัสสาวะ?", o: ["กำจัดของเสียที่เป็นน้ำ", "ผลิตฮอร์โมน", "ย่อยแป้ง"], a: 0, exp: "ไตและระบบปัสสาวะมีหน้าที่หลักในการขับของเสียที่เป็นน้ำและเกลือแร่เกินออก"},
            {q: "ถ้าเพื่อนล้อเลียนเรื่องร่างกาย เราควรทำอย่างไร?", o: ["ล้อกลับ", "บอกความรู้สึกและขอให้หยุด", "ชกต่อย"], a: 1, exp: "การสื่อสารอย่างตรงไปตรงมาด้วยความสุภาพเป็นวิธีจัดการความขัดแย้งที่ดีที่สุด"},
            {q: "การเจริญเติบโตที่สมวัยของเด็กวัย 10-12 ปี ควรเป็นอย่างไร?", o: ["สูงขึ้นและน้ำหนักเพิ่ม", "หยุดสูงทันที", "น้ำหนักลดลงเรื่อยๆ"], a: 0, exp: "วัยนี้เป็นช่วงก้าวกระโดดของการเจริญเติบโต ทั้งส่วนสูงและน้ำหนัก"},
            {q: "น้ำย่อยในกระเพาะอาหารมีสภาพเป็นอย่างไร?", o: ["กรด", "ด่าง", "กลาง"], a: 0, exp: "น้ำย่อยในกระเพาะอาหารมีสภาพเป็นกรดเพื่อช่วยย่อยโปรตีน"},
            {q: "การดื่มน้ำสะอาดอย่างน้อยวันละกี่แก้วช่วยสุขภาพดี?", o: ["2-3 แก้ว", "8-10 แก้ว", "15 แก้วขึ้นไป"], a: 1, exp: "ปริมาณที่แนะนำสำหรับวัยเรียนคือประมาณ 8-10 แก้วต่อวัน"},
            {q: "ข้อใดคือลักษณะของเพื่อนที่ดี?", o: ["ชวนไปเที่ยวกลางคืน", "มีความซื่อสัตย์และช่วยเหลือกัน", "พูดโกหก"], a: 1, exp: "ความซื่อสัตย์เป็นรากฐานสำคัญของมิตรภาพที่ดี"},
            {q: "อวัยวะใดทำหน้าที่บดเคี้ยวอาหารในขั้นแรก?", o: ["ลิ้น", "ฟัน", "กระเพาะ"], a: 1, exp: "ฟันทำหน้าที่บดเคี้ยวอาหารให้ละเอียดก่อนกลืน"},
            {q: "การกลั้นอุจจาระบ่อยๆ ส่งผลเสียอย่างไร?", o: ["ร่างกายแข็งแรง", "ท้องผูกและอุจจาระแข็ง", "ฉลาดขึ้น"], a: 1, exp: "การกลั้นอุจจาระทำให้ลำไส้ใหญ่ดูดน้ำกลับมากเกินไปจนอุจจาระแข็ง"},
            {q: "การเปลี่ยนแปลงของอารมณ์ในวัยรุ่นเกิดจากสาเหตุใด?", o: ["ฮอร์โมน", "อากาศ", "อาหาร"], a: 0, exp: "ฮอร์โมนเพศที่เพิ่มขึ้นส่งผลโดยตรงต่อการเปลี่ยนแปลงทางอารมณ์"},
            {q: "ข้อใดเป็นการปฏิบัติตนที่ถูกต้องก่อนนอน?", o: ["ออกกำลังกายหนักๆ", "ฟังเพลงเบาๆ หรืออ่านหนังสือ", "เล่นเกมออนไลน์"], a: 1, exp: "กิจกรรมที่ผ่อนคลายช่วยให้หลับสบายและร่างกายพักผ่อนได้เต็มที่"},
            {q: "ทำไมเราจึงต้องเคี้ยวอาหารให้ละเอียด?", o: ["เพื่อความสนุก", "เพื่อช่วยระบบย่อยทำงานง่ายขึ้น", "เพื่อให้กินได้เร็วขึ้น"], a: 1, exp: "การเคี้ยวละเอียดช่วยลดภาระการทำงานของกระเพาะอาหาร"},
            {q: "การเจริญเติบโตของร่างกายขึ้นอยู่กับปัจจัยใด?", o: ["อาหารและการพักผ่อน", "การดูโทรทัศน์", "การนอนดึก"], a: 0, exp: "โภชนาการและการนอนหลับที่เพียงพอเป็นปัจจัยหลักต่อการเติบโต"},
            {q: "ควรเปลี่ยนชุดชั้นในเมื่อใด?", o: ["เมื่อเปื้อน", "ทุกวัน", "สัปดาห์ละครั้ง"], a: 1, exp: "สุขอนามัยที่ดีควรเปลี่ยนชุดชั้นในทุกวันเพื่อป้องกันเชื้อราและแบคทีเรีย"},
            {q: "การอยู่ร่วมกับเพศตรงข้ามควรยึดหลักใด?", o: ["การให้เกียรติและมีขอบเขต", "ความสนิทสนมเกินวัย", "การไม่พูดคุย"], a: 0, exp: "การให้เกียรติคือสิ่งสำคัญที่สุดในการคบเพื่อนต่างเพศ"},
            {q: "ไตมีรูปร่างคล้ายสิ่งใด?", o: ["เมล็ดถั่ว", "หัวใจ", "ก้อนหิน"], a: 0, exp: "ไตทั้งสองข้างของมนุษย์มีรูปร่างคล้ายเมล็ดถั่ว"},
            {q: "หากพบความผิดปกติทางร่างกาย ควรทำอย่างไร?", o: ["ซื้อยากินเอง", "ปรึกษาผู้ปกครองหรือแพทย์", "ปล่อยทิ้งไว้"], a: 1, exp: "การปรึกษาผู้ใหญ่หรือผู้เชี่ยวชาญคือวิธีแก้ปัญหาที่ปลอดภัยที่สุด"}
        ];

        const container = document.getElementById('questionsContainer');
        data.forEach((item, index) => {
            container.innerHTML += `<div style="margin-bottom:15px;"><strong>${index + 1}. ${item.q}</strong><br>
                ${item.o.map((opt, i) => `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`).join('')}
                <div id="exp${index}" style="display:none; color:red; margin-top:5px;">เฉลย: ${item.o[item.a]} - ${item.exp}</div>
            </div>`;
        });

        function checkAnswers() {
            data.forEach((item, index) => {
                document.getElementById('exp' + index).style.display = 'block';
            });
            document.getElementById('resultArea').innerHTML = "<h3>สรุป:</h3><p>ตรวจทานคำตอบแล้ว ศึกษาเหตุผลประกอบเพื่อความเข้าใจที่แม่นยำยิ่งขึ้น</p>";
        }
    </script>
</body>
</html>
