<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบสุขศึกษา ป.5 (25 ข้อ)</title>
</head>
<body>
    <form id="examForm">
        <!-- รายการข้อสอบ 25 ข้อ -->
        <script>
            const questions = [
                {q: "1. ระบบใดมีหน้าที่เปลี่ยนอาหารให้เป็นพลังงาน?", o: ["ระบบย่อยอาหาร", "ระบบขับถ่าย", "ระบบไหลเวียนโลหิต"], a: 0},
                {q: "2. อวัยวะใดเป็นด่านแรกในการย่อยอาหาร?", o: ["กระเพาะอาหาร", "ปาก", "ลำไส้เล็ก"], a: 1},
                {q: "3. อาหารประเภทแป้งจะเริ่มถูกย่อยที่ใด?", o: ["ปาก", "กระเพาะอาหาร", "ลำไส้เล็ก"], a: 0},
                {q: "4. อวัยวะใดทำหน้าที่ดูดซึมสารอาหารมากที่สุด?", o: ["กระเพาะอาหาร", "ลำไส้เล็ก", "ลำไส้ใหญ่"], a: 1},
                {q: "5. น้ำย่อยที่ช่วยย่อยโปรตีนอยู่ในอวัยวะใด?", o: ["ปาก", "กระเพาะอาหาร", "ลำไส้ใหญ่"], a: 1},
                {q: "6. ลำไส้ใหญ่มีหน้าที่สำคัญอย่างไร?", o: ["ย่อยไขมัน", "ดูดซึมน้ำและกากอาหาร", "ย่อยโปรตีน"], a: 1},
                {q: "7. การเคี้ยวอาหารไม่ละเอียดส่งผลเสียอย่างไร?", o: ["ฟันสวย", "กระเพาะทำงานหนัก", "ร่างกายแข็งแรง"], a: 1},
                {q: "8. สิ่งใดช่วยให้ระบบขับถ่ายอุจจาระทำงานได้ดี?", o: ["กินผักผลไม้", "กินขนมหวาน", "ไม่ออกกำลังกาย"], a: 0},
                {q: "9. อวัยวะใดกรองของเสียออกจากเลือดในรูปของปัสสาวะ?", o: ["ตับ", "ไต", "หัวใจ"], a: 1},
                {q: "10. หากกลั้นปัสสาวะบ่อยๆ จะเกิดผลเสียอย่างไร?", o: ["กระเพาะปัสสาวะอักเสบ", "ร่างกายแข็งแรง", "ฉลาดขึ้น"], a: 0},
                {q: "11. พัฒนาการของเด็ก ป.5 เริ่มมีการเปลี่ยนแปลงเข้าสู่ช่วงใด?", o: ["วัยทารก", "วัยรุ่น", "วัยชรา"], a: 1},
                {q: "12. การเปลี่ยนแปลงทางเพศข้อใดเป็นลักษณะเพศชาย?", o: ["หน้าอกขยาย", "เสียงแตกพร่า", "ประจำเดือนมา"], a: 1},
                {q: "13. การเปลี่ยนแปลงทางเพศข้อใดเป็นลักษณะเพศหญิง?", o: ["มีหนวด", "เสียงใหญ่ขึ้น", "สะโพกผายออก"], a: 2},
                {q: "14. เมื่อเข้าสู่วัยรุ่น อารมณ์จะเป็นอย่างไร?", o: ["นิ่งเฉยตลอดเวลา", "เปลี่ยนแปลงง่าย", "ไม่มีอารมณ์"], a: 1},
                {q: "15. การดูแลความสะอาดอวัยวะเพศที่ถูกต้องคือ?", o: ["ล้างด้วยสบู่แรงๆ", "เช็ดให้แห้งเสมอ", "ไม่ต้องทำความสะอาด"], a: 1},
                {q: "16. ชุดชั้นในควรมีลักษณะอย่างไร?", o: ["พอดีตัว สะอาด", "รัดแน่น", "หลวมเกินไป"], a: 0},
                {q: "17. การมีเพื่อนที่ดีควรมีลักษณะอย่างไร?", o: ["ชวนกันไปทำผิด", "ช่วยเหลือกันเรียน", "พูดจาหยาบคาย"], a: 1},
                {q: "18. หากเพื่อนทำตัวไม่เหมาะสม เราควรทำอย่างไร?", o: ["ด่ากลับ", "เตือนด้วยความหวังดี", "เลิกคบทันที"], a: 1},
                {q: "19. ปริมาณน้ำที่ควรดื่มต่อวันเพื่อให้ระบบขับถ่ายดีคือ?", o: ["2-3 แก้ว", "8-10 แก้ว", "ไม่ควรดื่มมาก"], a: 1},
                {q: "20. ข้อใดคือการปฏิบัติตนต่อเพศตรงข้ามอย่างเหมาะสม?", o: ["ให้เกียรติซึ่งกันและกัน", "ล้อเลียนรูปร่าง", "ไม่พูดคุยด้วย"], a: 0},
                {q: "21. อาหารประเภทใดช่วยซ่อมแซมส่วนที่สึกหรอ?", o: ["โปรตีน", "คาร์โบไฮเดรต", "ไขมัน"], a: 0},
                {q: "22. การนอนหลับพักผ่อนที่เพียงพอช่วยเรื่องใด?", o: ["การเจริญเติบโต", "ทำให้ตัวเตี้ย", "ทำให้หิวบ่อย"], a: 0},
                {q: "23. ก่อนรับประทานอาหารควรทำอย่างไร?", o: ["ล้างมือ", "วิ่งเล่น", "ดูทีวี"], a: 0},
                {q: "24. หากท้องผูกบ่อยครั้ง ควรแก้ไขอย่างไร?", o: ["กินยาระบายทุกวัน", "เพิ่มผักผลไม้", "กินแต่แป้ง"], a: 1},
                {q: "25. สุขภาพจิตที่ดีส่งผลต่อร่างกายอย่างไร?", o: ["ทำให้ร่างกายแข็งแรง", "ทำให้เป็นโรค", "ไม่มีผลต่อร่างกาย"], a: 0}
            ];

            questions.forEach((item, index) => {
                document.write(`<div class="question">${index + 1}. ${item.q}</div>`);
                item.o.forEach((opt, oIdx) => {
                    document.write(`<li><input type="radio" name="q${index}" value="${oIdx}"> ${opt}</li>`);
                });
                document.write(`<div class="explanation" id="exp${index}" style="color:red; display:none;">เฉลย: ${item.o[item.a]}</div><br>`);
            });
        </script>
        <button type="button" onclick="showResults()">ตรวจคำตอบ</button>
    </form>
    <div id="resultArea"></div>

    <script>
        function showResults() {
            document.querySelectorAll('.explanation').forEach(el => el.style.display = 'block');
            document.getElementById('resultArea').innerHTML = "<h3>สรุปผล:</h3><p>ตรวจทานความถูกต้องให้ครบทุกข้อ หากข้อใดผิดพลาด ให้กลับไปทบทวนในบทเรียนเรื่องระบบร่างกายและการดูแลตนเอง</p>";
        }
    </script>
</body>
</html>
