<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบ: ความหลากหลายและโครงสร้างหน้าที่ของพืช (50 ข้อ)</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-light: #e8f5e9;
            --secondary-color: #388e3c;
            --text-color: #333;
            --bg-color: #f5f5f5;
            --white: #ffffff;
            --correct-color: #c8e6c9;
            --correct-text: #256029;
            --incorrect-color: #ffcdd2;
            --incorrect-text: #c62828;
            --hint-color: #fff9c4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 10px;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            background: var(--primary-light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .question-card {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: var(--white);
            border: 1px solid #ccc;
            padding: 12px 15px;
            border-radius: 6px;
            text-align: left;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .option-btn:hover {
            background-color: #f0f0f0;
            border-color: #888;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            color: var(--correct-text);
            border-color: #a5d6a7 !important;
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: var(--incorrect-color) !important;
            color: var(--incorrect-text);
            border-color: #ef9a9a !important;
        }

        .disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .hint-btn {
            background: none;
            border: none;
            color: #c62828;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .hint-box {
            display: none;
            background-color: var(--hint-color);
            padding: 10px 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.9em;
            border-left: 4px solid #fbc02d;
        }

        .rationale-box {
            display: none;
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 0.95em;
            background-color: #f1f3f4;
            border-left: 4px solid #78909c;
        }

        .score-section {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: var(--primary-light);
            border-radius: 8px;
        }

        .score-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .score-btn:hover {
            background-color: var(--secondary-color);
        }

        .result-text {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 15px;
            color: var(--primary-color);
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>แบบทดสอบเรื่อง พืชและโครงสร้างหน้าที่</h1>
    <p class="description">หน่วยการเรียนรู้: ความหลากหลายของสิ่งมีชีวิต & โครงสร้างหน้าที่ของส่วนต่างๆ ของพืช</p>
    
    <div class="quiz-info">
        <div>จำนวนข้อสอบ: 50 ข้อ</div>
        <div id="score-counter">คะแนนปัจจุบัน: 0/50</div>
    </div>

    <div id="quiz-wrapper">
        </div>

    <div class="score-section">
        <button class="score-btn" onclick="calculateFinalScore()">ส่งข้อสอบและตรวจคะแนน</button>
        <div id="result-display" class="result-text"></div>
    </div>
</div>

<script>
    const quizData = [
        {

            "options": [
                {"text": "การใช้ดอกในการสืบพันธุ์", "rationale": "การมีดอกเพื่อสร้างเมล็ดในการสืบพันธุ์เป็นเกณฑ์สำคัญที่สุดที่แยกพืชดอกออกจากพืชไม่มีดอก", "isCorrect": true},
                {"text": "แหล่งที่อยู่อาศัยของพืช", "rationale": "พืชทั้งสองกลุ่มสามารถพบได้ทั้งบนบกและในน้ำ จึงไม่ใช้เป็นเกณฑ์หลัก", "isCorrect": false},
                {"text": "ขนาดของลำต้นและความสูง", "rationale": "พืชไม่มีดอกบางชนิด เช่น สน มีลำต้นขนาดใหญ่มาก เกณฑ์นี้จึงใช้แยกไม่ได้", "isCorrect": false},
                {"text": "ลักษณะของรากและใบ", "rationale": "พืชส่วนใหญ่มีรากและใบคล้ายกัน โครงสร้างเหล่านี้จึงไม่ใช่วิธีจำแนกกลุ่มใหญ่", "isCorrect": false}
            ],
            "hint": "คิดถึงโครงสร้างที่พืชใช้ในการขยายพันธุ์และสืบพันธุ์แบบอาศัยเพศ"
        },
        {
            "questionNumber": 2,
            "question": "พืชในข้อใดจัดเป็นพืชไม่มีดอกทั้งหมด",
            "options": [
                {"text": "มอสส์ เฟิน ปรง สนสามใบ", "rationale": "พืชเหล่านี้เป็นพืชชั้นต่ำและพืชเมล็ดเปลือย ซึ่งตลอดชีวิตจะไม่มีการสร้างดอกเลย", "isCorrect": true},
                {"text": "ผักกาด ชายผ้าสีดา จอก แหน", "rationale": "จอกและแหนเป็นพืชดอกขนาดเล็กมาก ส่วนผักกาดเป็นพืชดอก", "isCorrect": false},
                {"text": "กุหลาบ ไผ่ พลูด่าง บัว", "rationale": "ทั้งหมดนี้เป็นพืชดอก แม้บางชนิดจะออกดอกยากก็ตาม", "isCorrect": false},
                {"text": "ทานตะวัน มะพร้าว กล้วยไม้ มะม่วง", "rationale": "พืชเหล่านี้สร้างดอกและผลเพื่อขยายพันธุ์ จึงจัดเป็นพืชดอก", "isCorrect": false}

                {"text": "พืชดอกสังเคราะห์ด้วยแสงไม่ได้", "rationale": "พืชดอกส่วนใหญ่มีสารสีเขียว (คลอโรฟิลล์) และสร้างอาหารเองได้ด้วยการสังเคราะห์ด้วยแสง", "isCorrect": false}
            ],
            "hint": "พิจารณาหน้าที่หลักและวงจรชีวิตของพืชเมื่อเติบโตเต็มวัย"

        {
            "questionNumber": 5,
            "question": "พืชดอกยังสามารถจำแนกออกเป็น 2 กลุ่มย่อย คือข้อใด",

        },
        {
            "questionNumber": 49,
            "question": "เมื่อเด็ดใบของต้นพืชใบเลี้ยงคู่มาสังเกต 'ก้านใบ' เรามักพบข้อเท็จจริงในข้อใดที่ต่างจากใบของพืชใบเลี้ยงเดี่ยว",
            "options": [
                {"text": "มีก้านใบแยกออกมาเด่นชัดติดกับกิ่ง ส่วนใบเลี้ยงเดี่ยวมักเป็นกาบใบหุ้มโอบลำต้นไว้", "rationale": "พืชใบเลี้ยงคู่มีก้านใบเชื่อมระหว่างแผ่นใบกับลำต้นชัดเจน ส่วนใบเลี้ยงเดี่ยว โคนใบจะแผ่เป็นกาบหุ้มข้อลำต้น", "isCorrect": true},
                {"text": "ก้านใบของพืชใบเลี้ยงคู่สามารถหมุนวนรอบตัวเองได้ 360 องศาเพื่อดักแมลง", "rationale": "ก้านใบทำหน้าที่ชูแผ่นใบอยู่กับที่หรือเอนเล็กน้อยตามแสง ไม่สามารถหมุนควงได้แบบนั้น", "isCorrect": false},
                {"text": "ก้านใบพืชใบเลี้ยงคู่ประกอบด้วยกระดูกแข็งทำจากแคลเซียมหนาแน่น", "rationale": "โครงสร้างพืชทำจากสารเซลลูโลสและลิกนินในผนังเซลล์ ไม่ใช่กระดูกแคลเซียมแบบโครงร่างแข็งสัตว์", "isCorrect": false},
                {"text": "ใบเลี้ยงคู่ไม่มีก้านใบ แผ่นใบงอกติดกับรากแก้วโดยตรง", "rationale": "ใบอยู่ส่วนบนของลำต้นและกิ่งก้าน ไม่ได้งอกติดอยู่กับรากแก้วใต้ดินลึก", "isCorrect": false}
            ],
            "hint": "สังเกตวิธีที่โคนใบต้นหญ้าหรือต้นตะไคร้เกาะติดอยู่กับลำต้นเปรียบเทียบกับใบมะม่วง"
        },
        {
            "questionNumber": 50,
            "question": "คุณค่าและความสำคัญที่สุดของ 'ความหลากหลายของสิ่งมีชีวิตในกลุ่มพืช' ต่อสมดุลชั้นบรรยากาศโลกคือข้อใด",
            "options": [
                {"text": "ช่วยรักษาสมดุลโดยการควบคุมและหมุนเวียนแก๊สคาร์บอนไดออกไซด์และออกซิเจนในโลก", "rationale": "กระบวนการสังเคราะห์ด้วยแสงดึงคาร์บอนที่เป็นแก๊สเรือนกระจกมาเก็บไว้ และคายออกซิเจนให้สิ่งมีชีวิตใช้หายใจ เป็นวัฏจักรค้ำจุนโลก", "isCorrect": true},
                {"text": "ช่วยผลิตปุ๋ยเคมีสำเร็จรูปยี่ห้อต่างๆ หล่นลงมาสู่พื้นดินโดยตรง", "rationale": "พืชให้เศษซากใบไม้เป็นอินทรียวัตถุตามธรรมชาติ ไม่ได้ผลิตสารปุ๋ยเคมีสังเคราะห์ตราสินค้า", "isCorrect": false},
                {"text": "ช่วยดูดซับรังสีเอกซ์และรังสีแกมมาทั้งหมดจากอวกาศไม่ให้ตกลงสู่พื้นดิน", "rationale": "ชั้นบรรยากาศและสนามแม่เหล็กโลกทำหน้าที่กรองรังสีคอสมิกจากอวกาศ ไม่ใช่หน้าที่ของใบไม้สีเขียวบนพื้นผิวโลก", "isCorrect": false},
                {"text": "ช่วยทำให้แรงโน้มถ่วงของโลกคงที่และนุ่มนวลขึ้น", "rationale": "แรงโน้มถ่วงเกิดจากมวลของดวงดาว ไม่เกี่ยวข้องกับความหลากหลายหรือปริมาณของสิ่งมีชีวิตกลุ่มพืช", "isCorrect": false}
            ],
            "hint": "นึกถึงบทบาทของป่าไม้สีเขียวที่เป็นเสมือน 'ปอดของโลก' ในการแลกเปลี่ยนอากาศ"
        }
    ];

    let userAnswers = new Array(quizData.length).fill(null);

    function renderQuiz() {
        const wrapper = document.getElementById('quiz-wrapper');
        wrapper.innerHTML = '';

        quizData.forEach((q, qIdx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${qIdx}`;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = `${q.questionNumber}. ${q.question}`;
            card.appendChild(qText);

            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';

            q.options.forEach((opt, oIdx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.id = `opt-${qIdx}-${oIdx}`;
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(qIdx, oIdx);
                optionsContainer.appendChild(btn);
            });

            card.appendChild(optionsContainer);

            // Hint Element
            const hintBtn = document.createElement('button');
            hintBtn.className = 'hint-btn';
            hintBtn.innerText = '💡 ขอคำใบ้หน่อย';
            hintBtn.onclick = () => toggleHint(qIdx);
            card.appendChild(hintBtn);

            const hintBox = document.createElement('div');
            hintBox.className = 'hint-box';
            hintBox.id = `hint-${qIdx}`;
            hintBox.innerText = q.hint;
            card.appendChild(hintBox);

            // Rationale/Explanation Box
            const rationaleBox = document.createElement('div');
            rationaleBox.className = 'rationale-box';
            rationaleBox.id = `rationale-${qIdx}`;
            card.appendChild(rationaleBox);

            wrapper.appendChild(card);
        });
    }

    function selectOption(qIdx, oIdx) {
        // Clear previous selection style in this question card
        const card = document.getElementById(`q-card-${qIdx}`);
        const buttons = card.getElementsByClassName('option-btn');
        
        for (let btn of buttons) {
            btn.style.borderColor = '#ccc';
            btn.style.backgroundColor = '#ffffff';
        }

        // Apply temporary highlight for current selection
        const selectedBtn = document.getElementById(`opt-${qIdx}-${oIdx}`);
        selectedBtn.style.borderColor = 'var(--primary-color)';
        selectedBtn.style.backgroundColor = '#f1f8e9';

        userAnswers[qIdx] = oIdx;
        updateScoreCounter();
    }

    function toggleHint(qIdx) {
        const hintBox = document.getElementById(`hint-${qIdx}`);
        if (hintBox.style.display === 'block') {
            hintBox.style.display = 'none';
        } else {
            hintBox.style.display = 'block';
        }
    }

    function updateScoreCounter() {
        const answeredCount = userAnswers.filter(ans => ans !== null).length;
        document.getElementById('score-counter').innerText = `ตอบแล้ว: ${answeredCount}/50 ข้อ`;
    }

    function calculateFinalScore() {
        let score = 0;
        let unanswed = [];

        quizData.forEach((q, qIdx) => {
            const chosenOptionIdx = userAnswers[qIdx];
            if (chosenOptionIdx === null) {
                unanswed.push(q.questionNumber);
                return;
            }

            const card = document.getElementById(`q-card-${qIdx}`);
            const buttons = card.getElementsByClassName('option-btn');
            
            // Disable all options buttons for this card after submitting
            for (let btn of buttons) {
                btn.classList.add('disabled');
            }

            const rationaleBox = document.getElementById(`rationale-${qIdx}`);
            const chosenOption = q.options[chosenOptionIdx];

            // Highlight chosen answer, show correct answer, and inject rationale
            q.options.forEach((opt, oIdx) => {
                const btn = document.getElementById(`opt-${qIdx}-${oIdx}`);
                if (opt.isCorrect) {
                    btn.classList.add('correct');
                }
                if (chosenOptionIdx === oIdx && !opt.isCorrect) {
                    btn.classList.add('incorrect');
                }
            });

            rationaleBox.innerHTML = `<strong>คำอธิบาย:</strong> ${chosenOption.rationale}`;
            rationaleBox.style.display = 'block';

            if (chosenOption.isCorrect) {
                score++;
            }
        });

        if (unanswed.length > 0) {
            alert(`กรุณาตอบคำถามให้ครบทุกข้อก่อนครับ! (ข้อที่ยังไม่ได้ตอบ: ${unanswed.join(', ')})`);
            return;
        }

        const resultDisplay = document.getElementById('result-display');
        resultDisplay.innerText = `คุณได้คะแนนทั้งหมดของคุณคือ: ${score} / 50 คะแนน!`;
        resultDisplay.style.display = 'block';
        document.getElementById('score-counter').innerText = `คะแนนสุทธิ: ${score}/50`;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Initialize Quiz on load
    window.onload = renderQuiz;
</script>
