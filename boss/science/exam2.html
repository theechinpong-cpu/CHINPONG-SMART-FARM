// ในทางปฏิบัติคุณสามารถนำไปรันเพื่อเล่นจริงได้ทันที โดยระบบสคริปต์ด้านล่างจะสร้าง UI ให้อัตโนมัติ

const container = document.getElementById('quiz-container');

quizData.forEach((item, index) => {
    const qNum = index + 1;
    const quizItem = document.createElement('div');
    quizItem.className = 'quiz-item';
    
    let optionsHtml = '';
    item.options.forEach((opt, optIndex) => {
        optionsHtml += `
            <li class="option-item">
                <label>
                    <input type="radio" name="q${qNum}" value="${optIndex}">
                    ${opt.text}
                </label>
            </li>
        `;
    });

    quizItem.innerHTML = `
        <div class="question">ข้อที่ ${qNum}: ${item.q}</div>
        <div class="hint-box">💡 คำใบ้: ${item.hint}</div>
        <ul class="options">${optionsHtml}</ul>
        <button class="btn-check" onclick="checkAnswer(${qNum}, ${index})">ตรวจคำตอบ</button>
        <div class="result-box" id="result-${qNum}"></div>
    `;
    container.appendChild(quizItem);
});

function checkAnswer(qNum, dataIndex) {
    const selected = document.querySelector(`input[name="q${qNum}"]:checked`);
    const resultBox = document.getElementById(`result-${qNum}`);
    
    if (!selected) {
        alert('กรุณาเลือกคำตอบก่อนตรวจครับ!');
        return;
    }

    const answerIndex = parseInt(selected.value);
    const optionSelected = quizData[dataIndex].options[answerIndex];
    
    resultBox.style.display = 'block';
    if (optionSelected.isCorrect) {
        resultBox.className = 'result-box correct';
        resultBox.innerHTML = `🎉 ถูกต้องครับ! <div class="rationale">${optionSelected.rationale}</div>`;
    } else {
        // หาข้อที่ถูกเพื่อนำมาแสดงแนะแนว
        const correctOpt = quizData[dataIndex].options.find(o => o.isCorrect);
        resultBox.className = 'result-box incorrect';
        resultBox.innerHTML = `❌ ยังไม่ถูกครับ ลองใหม่อีกครั้งนะ! <div class="rationale">คำอธิบายข้อนี้: ${optionSelected.rationale}</div>`;
    }
}
