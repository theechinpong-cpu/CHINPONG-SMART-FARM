            { q: "สารละลายอิ่มตัวคืออะไร?", options: ["ละลายเพิ่มไม่ได้", "ละลายได้อีก", "ไม่ละลาย", "แยกชั้น"], correct: 0, clue: "เต็มแล้ว", explanation: "ละลายต่อไม่ได้", trick: "อิ่ม = เต็ม" },
            { q: "สิ่งมีชีวิตทุกชนิดต้องมีสิ่งนี้?", options: ["นิวเคลียส", "คลอโรพลาสต์", "เซลล์", "ผนังเซลล์"], correct: 2, clue: "หน่วยเล็กที่สุด", explanation: "เซลล์", trick: "มีชีวิต = มีเซลล์" },
            { q: "การสกัดด้วยตัวทำละลายอาศัยหลักการใด?", options: ["ละลายในตัวทำละลายได้ต่างกัน", "จุดเดือด", "การกรอง", "น้ำหนัก"], correct: 0, clue: "การละลาย", explanation: "ละลายต่างกัน", trick: "สกัด = ละลาย" },
            { q: "พืชคายน้ำตอนไหน?", options: ["กลางวัน", "กลางคืน", "ตลอดเวลา", "ตอนฝนตก"], correct: 0, clue: "ตอนเปิดปากใบ", explanation: "กลางวัน", trick: "คาย = เปิดปากใบ" },
            { q: "ข้อใดคือการตั้งสมมติฐาน?", options: ["คำตอบที่คาดเดา", "การสรุป", "การจดบันทึก", "การอ่านผล"], correct: 0, clue: "เดาอย่างมีหลักการ", explanation: "คำตอบที่คาดเดาล่วงหน้า", trick: "เดาแบบฉลาด" },
            { q: "ไซโทพลาซึมคืออะไร?", options: ["ของเหลวในเซลล์", "ส่วนแข็ง", "นิวเคลียส", "ออร์แกเนลล์"], correct: 0, clue: "ส่วนที่เป็นน้ำ", explanation: "ของเหลว", trick: "ไซโท = เจล" },
            { q: "พืชต้องการสารอาหารจากไหน?", options: ["ปุ๋ย", "ดิน", "แสง", "น้ำ"], correct: 1, clue: "รากดูดมา", explanation: "ดิน", trick: "ดิน = แหล่งแร่" },
            { q: "สารใดมีสมบัติเป็นสารเนื้อผสม?", options: ["น้ำเชื่อม", "น้ำกะทิ", "น้ำเปล่า", "น้ำกลั่น"], correct: 1, clue: "มีตะกอนหรือแยกชั้น", explanation: "น้ำกะทิ", trick: "กะทิ = แยกชั้น" },
            { q: "การทดลองวิทยาศาสตร์ต้องสามารถทำอย่างไร?", options: ["ทำซ้ำได้", "ทำครั้งเดียว", "ไม่ต้องบอกใคร", "ทำตามใจ"], correct: 0, clue: "ผลต้องเหมือนเดิม", explanation: "ทำซ้ำและได้ผลเหมือนเดิม", trick: "ซ้ำ = แม่น" }
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            container.innerHTML += `
                <div class="mb-6 p-4 border rounded-xl hover:bg-green-50">
                    <p class="font-bold text-lg mb-2">${i+1}. ${q.q} <span class="clue-text">[Clue: ${q.clue}]</span></p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${q.options.map((opt, idx) => `
                            <label class="flex items-center space-x-2 cursor-pointer p-2 bg-white rounded border">
                                <input type="radio" name="q${i}" value="${idx}"> <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div id="exp${i}" class="explanation">
                        <p class="font-bold text-green-900">เฉลย: ${q.options[q.correct]}</p>
                        <p>${q.explanation}</p>
                        <p class="italic text-red-600 font-semibold">Trick: ${q.trick}</p>
                    </div>
                </div>
            `;
        });

        document.getElementById('submit-btn').onclick = () => {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if(selected && parseInt(selected.value) === q.correct) score++;
                document.getElementById('exp'+i).style.display = 'block';
            });
            document.getElementById('score-display').innerText = `คุณได้คะแนน: ${score} / 50`;
            document.getElementById('result-section').classList.remove('hidden');
        };
    </script>
</body>
</html>
