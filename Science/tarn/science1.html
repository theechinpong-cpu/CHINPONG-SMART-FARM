<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto bg-white p-8 shadow-xl rounded-2xl">
        <h1 class="text-3xl font-bold text-center text-green-800 mb-2">ข้อสอบกลางภาค วิทยาศาสตร์ ม.1 (50 ข้อ)</h1>
        <p class="text-center text-green-600 mb-8 font-semibold">จัดทำโดย: พระจอมเกล้าติวเตอร์</p>
        
        <div id="quiz-container"></div>

        <button id="submit-btn" class="w-full bg-green-700 text-white py-4 mt-8 rounded-xl font-bold hover:bg-green-800 transition duration-300">ส่งข้อสอบและรับคำแนะนำจากติวเตอร์</button>

    <script>
        const questions = [
            { q: "ข้อใดคือขั้นตอนแรกของกระบวนการทางวิทยาศาสตร์?", options: ["การตั้งสมมติฐาน", "การสังเกตและระบุปัญหา", "การรวบรวมข้อมูล", "การสรุปผล"], correct: 1, clue: "เริ่มต้นจากจุดที่เกิดความสงสัย", explanation: "การสังเกตและระบุปัญหาคือจุดสตาร์ท เพราะถ้าเราไม่รู้ว่าปัญหาคืออะไร เราก็ไม่รู้จะทดลองไปเพื่ออะไรครับ", trick: "จำไว้เลยครับ 'ปัญ-ติ-สอบ-วิ-สรุป' คือลำดับศักดิ์สิทธิ์ของการทำงานแบบนักวิทยาศาสตร์!" },
            { q: "หน่วยที่เล็กที่สุดของสิ่งมีชีวิตคืออะไร?", options: ["อะตอม", "เซลล์", "เนื้อเยื่อ", "อวัยวะ"], correct: 1, clue: "สิ่งเล็กๆ ที่ประกอบกันเป็นร่างกาย", explanation: "เซลล์คือหน่วยพื้นฐานที่เล็กที่สุดที่แสดงสมบัติของสิ่งมีชีวิตได้ครับ", trick: "นึกถึงบ้านหนึ่งหลัง เซลล์ก็เหมือนอิฐแต่ละก้อนที่ก่อขึ้นมานั่นเอง" },
            { q: "ออร์แกเนลล์ใดพบในเซลล์พืชแต่ไม่มีในเซลล์สัตว์?", options: ["นิวเคลียส", "ไมโทคอนเดรีย", "ผนังเซลล์", "ไรโบโซม"], correct: 2, clue: "ทำให้พืชมีรูปทรงคงที่", explanation: "ผนังเซลล์ (Cell wall) ทำหน้าที่เสริมความแข็งแรงให้พืชตั้งตรงได้โดยไม่ต้องมีกระดูกเหมือนสัตว์ครับ", trick: "พืชมีผนัง (เหมือนบ้าน) สัตว์ไม่มี (เคลื่อนที่ได้อิสระ)" },
            { q: "ไซเล็ม (Xylem) มีหน้าที่ลำเลียงอะไร?", options: ["น้ำและแร่ธาตุ", "น้ำตาล", "โปรตีน", "ก๊าซออกซิเจน"], correct: 0, clue: "ไสขึ้นน้ำ", explanation: "Xylem มีหน้าที่ลำเลียงน้ำและแร่ธาตุจากรากขึ้นสู่ยอดทางเดียวครับ", trick: "X-ylem = X-น้ำ จำง่ายๆ ว่า 'ไซเล็ม-น้ำ-ขึ้น'" },
            { q: "โฟลเอ็ม (Phloem) มีหน้าที่ลำเลียงอะไร?", options: ["น้ำ", "อาหาร (น้ำตาล)", "ก๊าซคาร์บอนไดออกไซด์", "แร่ธาตุ"], correct: 1, clue: "Flow อาหาร", explanation: "Phloem ลำเลียงอาหารที่พืชสร้างได้จากการสังเคราะห์แสงไปเลี้ยงส่วนต่างๆ ของพืชครับ", trick: "Phloem = Food (โฟลเอ็ม-โฟด) ลำเลียงอาหารไปทุกทิศทาง" },
            { q: "คลอโรฟิลล์พบมากที่ส่วนใดของพืช?", options: ["ราก", "ลำต้น", "ใบ", "ดอก"], correct: 2, clue: "ส่วนที่เปลี่ยนแสงเป็นพลังงาน", explanation: "ใบมีลักษณะแบนและมีคลอโรพลาสต์หนาแน่นที่สุดเพื่อรับแสงให้ได้มากที่สุดครับ", trick: "ใบคือครัวปรุงอาหารของพืช ต้องมีวัตถุดิบเยอะๆ" },
            { q: "สารละลายไอโอดีนใช้ทดสอบอะไร?", options: ["โปรตีน", "ไขมัน", "แป้ง", "น้ำตาล"], correct: 2, clue: "ถ้าเปลี่ยนเป็นสีน้ำเงินเข้มแสดงว่าเจอสารนี้", explanation: "สารละลายไอโอดีนจะเปลี่ยนสีจากน้ำตาลเป็นน้ำเงินเข้มทันทีเมื่อสัมผัสกับแป้ง", trick: "จำสั้นๆ: 'ไอ-แป้ง-ม่วง' (ไอโอดีน+แป้ง=ม่วง/น้ำเงิน)" },
            { q: "การกลั่นคือการแยกสารด้วยวิธีใด?", options: ["การกรอง", "การระเหย", "ความแตกต่างของจุดเดือด", "การละลาย"], correct: 2, clue: "ใช้ความร้อนทำให้กลายเป็นไอ", explanation: "การกลั่นคือการทำให้สารเดือดเป็นไอแล้วควบแน่นกลับมาเป็นของเหลว อาศัยจุดเดือดที่ต่างกันครับ", trick: "กลั่น = เดือดเป็นไอ แล้วควบแน่น" },
            { q: "ธาตุในข้อใดเป็นโลหะ?", options: ["ออกซิเจน", "ไนโตรเจน", "ทองแดง", "ฮีเลียม"], correct: 2, clue: "นำไฟฟ้าได้ดี", explanation: "ทองแดงเป็นโลหะที่มีสมบัตินำไฟฟ้าได้ดีเยี่ยม จึงนิยมนำมาทำสายไฟครับ", trick: "โลหะส่วนใหญ่จะแข็ง นำไฟฟ้าได้ และดัดงอได้" },
            { q: "สารเนื้อเดียวที่มีองค์ประกอบตั้งแต่ 2 ชนิดขึ้นไปคืออะไร?", options: ["ธาตุ", "สารประกอบ", "สารละลาย", "สารแขวนลอย"], correct: 2, clue: "เป็นของผสมที่กลมกลืนกัน", explanation: "สารละลายคือสารที่ละลายรวมเป็นเนื้อเดียวกันจนมองไม่เห็นความต่างครับ", trick: "สารละลาย = เนื้อเดียวเนียนสนิท" },
            { q: "ก๊าซออกซิเจนสำคัญต่อกระบวนการใดของพืช?", options: ["สังเคราะห์ด้วยแสง", "การหายใจ", "การคายน้ำ", "การสืบพันธุ์"], correct: 1, clue: "พืชหายใจคล้ายสัตว์", explanation: "การหายใจคือการเผาผลาญอาหารเพื่อให้ได้พลังงาน ต้องใช้ก๊าซออกซิเจนครับ", trick: "พืชก็หายใจเหมือนคน! หายใจ = ต้องใช้ O2" },
            { q: "การระเหยแห้งใช้แยกสารประเภทใด?", options: ["ของแข็งในของเหลว", "ก๊าซในของเหลว", "ของเหลวในของเหลว", "ของแข็งในของแข็ง"], correct: 0, clue: "เมื่อน้ำระเหยไปจะเหลือของแข็ง", explanation: "เช่นการทำนาเกลือ เราตากน้ำทะเลให้ระเหยไปจนเหลือเกลือครับ", trick: "ระเหยแห้ง = เกลือค้างก้นกระทะ" },
            { q: "กล้องจุลทรรศน์ใช้แสงให้ภาพชนิดใด?", options: ["ภาพจริงหัวตั้ง", "ภาพจริงหัวกลับ", "ภาพเสมือนหัวตั้ง", "ภาพเสมือนหัวกลับ"], correct: 3, clue: "เลนส์นูนทำให้ภาพกลับด้าน", explanation: "ภาพที่ได้จากกล้องจุลทรรศน์แบบใช้แสงจะเป็นภาพเสมือนที่หัวกลับและกลับซ้ายเป็นขวาครับ", trick: "กล้องแสง = กลับหัว-กลับหลัง" },
            { q: "ข้อใดไม่ใช่กระบวนการวิทยาศาสตร์?", options: ["การสังเกต", "การตั้งคำถาม", "การเชื่อตามคนอื่น", "การทดลอง"], correct: 2, clue: "วิทยาศาสตร์ต้องพิสูจน์ได้", explanation: "วิทยาศาสตร์ให้ความสำคัญกับหลักฐานและการทดลอง ไม่ใช่แค่ความเชื่อส่วนบุคคลครับ", trick: "ไม่เห็นด้วยตา ไม่ลองทำ ไม่ใช่ผลลัพธ์!" },
            { q: "นิวเคลียสของเซลล์ทำหน้าที่อะไร?", options: ["สร้างพลังงาน", "ควบคุมกิจกรรม", "เก็บอาหาร", "สังเคราะห์โปรตีน"], correct: 1, clue: "สมองของเซลล์", explanation: "นิวเคลียสบรรจุสารพันธุกรรมและสั่งการเซลล์ทั้งหมดเหมือนผู้จัดการครับ", trick: "นิวเคลียส = บอส/สมอง ของเซลล์" },
            { q: "ไมโทคอนเดรียทำหน้าที่อะไร?", options: ["สังเคราะห์ด้วยแสง", "สร้างพลังงาน", "ย่อยอาหาร", "กำจัดของเสีย"], correct: 1, clue: "โรงงานผลิตพลังงาน", explanation: "ไมโทคอนเดรียเปรียบเสมือนโรงไฟฟ้าที่สร้างพลังงาน ATP ให้เซลล์ใช้ครับ", trick: "ไมโทคอนเดรีย = พลังงาน/โรงไฟฟ้า" },
            { q: "แวคิวโอลในเซลล์พืชมีไว้เพื่ออะไร?", options: ["สะสมน้ำและสาร", "สร้างโปรตีน", "หายใจ", "สังเคราะห์แสง"], correct: 0, clue: "ถุงเก็บของขนาดใหญ่", explanation: "ในพืช แวคิวโอลจะมีขนาดใหญ่มากเพื่อเก็บน้ำและสารต่างๆ ไว้รักษาความเต่งของเซลล์ครับ", trick: "พืชมีแวคิวโอลใหญ่โต ไว้เก็บสะสมสาร" },
            { q: "สารผสมที่มองเห็นไม่เป็นเนื้อเดียวกันคือ?", options: ["สารเนื้อเดียว", "สารเนื้อผสม", "สารบริสุทธิ์", "สารประกอบ"], correct: 1, clue: "แยกส่วนประกอบได้ง่าย", explanation: "สารเนื้อผสม เช่น น้ำพริกหรือดิน ซึ่งเราสามารถแยกองค์ประกอบด้วยตาเปล่าได้ครับ", trick: "ผสม = ไม่เนียน ดูออกว่าเป็นอะไร" },
            { q: "การแยกสารด้วยโครมาโทกราฟีอาศัยสมบัติใด?", options: ["การละลาย", "จุดเดือด", "การระเหย", "ขนาดอนุภาค"], correct: 0, clue: "สีที่เคลื่อนที่ได้ต่างกัน", explanation: "แต่ละสีละลายและดูดซับได้ต่างกัน ทำให้แยกตัวออกมาเป็นชั้นสีได้ครับ", trick: "โครมาฯ = การเคลื่อนที่ของสี" },
            { q: "ธาตุชนิดใดที่เป็นของเหลวที่อุณหภูมิห้อง?", options: ["ทองคำ", "ปรอท", "เงิน", "เหล็ก"], correct: 1, clue: "อยู่ในเทอร์โมมิเตอร์", explanation: "ปรอท (Hg) เป็นธาตุโลหะที่อยู่ในสถานะของเหลวที่อุณหภูมิปกติครับ", trick: "ปรอท = เหลว" },
            { q: "โครงสร้างใดช่วยคายน้ำในพืช?", options: ["ปากใบ", "ลำต้น", "ราก", "ดอก"], correct: 0, clue: "รูเล็กๆ บนใบ", explanation: "ปากใบเปิดปิดเพื่อแลกเปลี่ยนก๊าซและคายน้ำส่วนเกินออกครับ", trick: "คาย = ปากใบ (ช่องทางระบายความชื้น)" },
            { q: "ข้อใดเป็นสารบริสุทธิ์?", options: ["น้ำนม", "น้ำกลั่น", "น้ำเชื่อม", "น้ำส้ม"], correct: 1, clue: "บริสุทธิ์ต้องไม่มีสารอื่นปน", explanation: "น้ำกลั่น (H2O) เป็นสารบริสุทธิ์ที่มีแต่โมเลกุลน้ำครับ", trick: "กลั่น = สะอาดบริสุทธิ์" },
            { q: "ถ้าเปรียบเทียบเซลล์กับโรงงาน สิ่งใดคือประตู?", options: ["ผนังเซลล์", "เยื่อหุ้มเซลล์", "นิวเคลียส", "ไซโทพลาซึม"], correct: 1, clue: "ยอมให้สารเข้าออก", explanation: "เยื่อหุ้มเซลล์ควบคุมการเข้าออกของสารอย่างเข้มงวดครับ", trick: "เยื่อเลือกผ่าน = รปภ. คัดกรองสาร" },
            { q: "การทดลองที่ดีต้องมีกี่ตัวแปรหลัก?", options: ["1", "2", "3", "ไม่จำกัด"], correct: 2, clue: "ต้น ตาม ควบคุม", explanation: "ตัวแปรต้น (ที่จัดทำ), ตัวแปรตาม (ที่วัดผล), ตัวแปรควบคุม (ที่ต้องคงที่) ครับ", trick: "ต้น-ตาม-คุม ท่องให้ขึ้นใจ" },
            { q: "พืชสร้างน้ำตาลอะไรในกระบวนการสังเคราะห์แสง?", options: ["กลูโคส", "ฟรุกโทส", "แล็กโทส", "ซูโครส"], correct: 0, clue: "น้ำตาลโมเลกุลเดี่ยว", explanation: "ผลผลิตแรกจากการสังเคราะห์แสงคือกลูโคสก่อนนำไปเปลี่ยนเป็นแป้งเก็บไว้ครับ", trick: "พืชสร้างกลูโคส = อาหารแรก" },
            { q: "สารเนื้อเดียวที่เกิดจากธาตุรวมกันคือ?", options: ["ธาตุ", "สารประกอบ", "สารละลาย", "คอลลอยด์"], correct: 1, clue: "ต้องรวมกันทางเคมี", explanation: "สารประกอบคือการที่ธาตุสองชนิดมารวมกันเป็นเนื้อเดียว", trick: "สารประกอบ = รวมตัวกันทางเคมี" },
            { q: "ส่วนประกอบใดของกล้องที่ใช้ปรับภาพให้ชัด?", options: ["เลนส์ใกล้ตา", "เลนส์ใกล้วัตถุ", "ปุ่มปรับภาพละเอียด", "จานหมุน"], correct: 2, clue: "ปรับจูนความคมชัด", explanation: "ปุ่มปรับภาพละเอียดช่วยปรับให้เห็นรายละเอียดที่ชัดเจนที่สุดครับ", trick: "ละเอียด = คมชัด" },
            { q: "ก๊าซที่พืชปล่อยออกมาคือ?", options: ["คาร์บอนไดออกไซด์", "ออกซิเจน", "ไนโตรเจน", "ไฮโดรเจน"], correct: 1, clue: "คนต้องใช้ก๊าซนี้", explanation: "พืชปล่อยก๊าซออกซิเจนออกมาเป็นผลพลอยได้จากการสังเคราะห์แสงครับ", trick: "พืชให้ O2 เราหายใจ" },
            { q: "สารใดไม่สามารถแยกด้วยการกรองได้?", options: ["ทรายในน้ำ", "เกลือในน้ำ", "ขี้เลื่อยในน้ำ", "กรวดในน้ำ"], correct: 1, clue: "สารละลายกรองไม่ได้", explanation: "เกลือที่ละลายเป็นสารละลายเนื้อเดียว มันมีขนาดเล็กจนผ่านกระดาษกรองได้ครับ", trick: "ละลาย = กรองไม่ได้" },
            { q: "สิ่งใดควบคุมการสืบพันธุ์ของเซลล์?", options: ["นิวเคลียส", "ไมโทคอนเดรีย", "ผนังเซลล์", "ไรโบโซม"], correct: 0, clue: "มีโครโมโซมอยู่ข้างใน", explanation: "นิวเคลียสเก็บ DNA ซึ่งเป็นรหัสพันธุกรรมไว้สืบทอดต่อไปครับ", trick: "พันธุกรรม = บอส" },
            { q: "การเปลี่ยนจากของแข็งเป็นไอเรียกว่า?", options: ["ระเหิด", "ระเหย", "กลั่น", "หลอมเหลว"], correct: 0, clue: "การบูร พิมเสน", explanation: "ระเหิดคือการที่ของแข็งเปลี่ยนเป็นไอโดยไม่ผ่านของเหลวครับ", trick: "ระเหิด = หายตัวไปในอากาศ" },
            { q: "ข้อใดเป็นเครื่องมือวัดทางวิทยาศาสตร์?", options: ["ไม้บรรทัด", "สมุด", "ดินสอ", "ยางลบ"], correct: 0, clue: "วัดความยาว", explanation: "ไม้บรรทัดใช้เก็บข้อมูลปริมาณทางกายภาพครับ", trick: "เครื่องมือวัด = ตัวเลข" },
            { q: "เยื่อหุ้มเซลล์มีสมบัติอะไร?", options: ["ยอมให้ผ่านทุกอย่าง", "กั้นทุกอย่าง", "เยื่อเลือกผ่าน", "ไม่แน่นอน"], correct: 2, clue: "เลือกรับสาร", explanation: "เยื่อเลือกผ่านคัดกรองว่าสารไหนเข้าได้ สารไหนออกได้ครับ", trick: "เลือกผ่าน = ฉลาดคัดกรอง" },
            { q: "พืชดูดน้ำผ่านทางไหน?", options: ["ใบ", "ลำต้น", "ราก", "ดอก"], correct: 2, clue: "อยู่ในดิน", explanation: "รากและขนรากดูดน้ำจากดินผ่านกระบวนการออสโมซิสครับ", trick: "ราก = ปั๊มน้ำ" },
            { q: "สารบริสุทธิ์แบ่งได้กี่ประเภท?", options: ["1", "2", "3", "4"], correct: 1, clue: "ธาตุ กับ สารประกอบ", explanation: "ธาตุและสารประกอบ คือ 2 ประเภทของสารบริสุทธิ์ครับ", trick: "ธาตุ/ประกอบ = สารบริสุทธิ์" },
            { q: "อะไรเป็นแหล่งพลังงานแสงของพืช?", options: ["หลอดไฟ", "ดวงอาทิตย์", "ความร้อน", "ปุ๋ย"], correct: 1, clue: "พลังงานหลักของโลก", explanation: "ดวงอาทิตย์ให้พลังงานแสงที่พืชนำมาใช้เปลี่ยนเป็นอาหารได้ดีที่สุดครับ", trick: "อาทิตย์ = ชีวิต" },
            { q: "กล้องจุลทรรศน์ต้องใช้แสงอย่างไร?", options: ["แสงสะท้อน", "แสงหักเห", "แสงจากหลอดไฟ/กระจก", "แสงสี"], correct: 2, clue: "กระจกเงา", explanation: "กล้องใช้กระจกสะท้อนแสงจากภายนอกหรือจากหลอดไฟให้ส่องผ่านวัตถุครับ", trick: "แสงผ่านวัตถุ" },
            { q: "ก๊าซที่พืชต้องใช้ในการสังเคราะห์แสง?", options: ["ออกซิเจน", "คาร์บอนไดออกไซด์", "ไนโตรเจน", "ไฮโดรเจน"], correct: 1, clue: "ก๊าซเสียจากคน", explanation: "พืชต้องการ CO2 เพื่อใช้ในวัฏจักรการสร้างน้ำตาลครับ", trick: "เราคาย CO2 = พืชขอบคุณ" },
            { q: "สารใดเป็นคอลลอยด์?", options: ["น้ำเปล่า", "นม", "น้ำเกลือ", "ทองแดง"], correct: 1, clue: "สารแขวนลอยแบบละเอียด", explanation: "นมมีอนุภาคเล็กๆ กระจายตัวอยู่ทำให้มองเห็นเป็นขุ่น ซึ่งเป็นคอลลอยด์ครับ", trick: "นม = คอลลอยด์" },
            { q: "การสรุปผลต้องอ้างอิงจากอะไร?", options: ["ความเชื่อ", "ข้อมูลที่รวบรวมได้", "ความคิดเห็น", "เดา"], correct: 1, clue: "อ้างอิงหลักฐาน", explanation: "ผลสรุปต้องมาจากการวิเคราะห์ข้อมูลจริงที่ทดลองได้เท่านั้นครับ", trick: "สรุป = ข้อมูล+ความจริง" },
            { q: "เซลล์พืชมีรูปร่างอย่างไร?", options: ["กลม", "เหลี่ยม", "ไม่มีรูปร่าง", "รี"], correct: 1, clue: "เป็นกล่อง", explanation: "เพราะมีผนังเซลล์ที่แข็งแรงทำให้คงรูปทรงเหลี่ยมได้ครับ", trick: "พืชกล่อง = แข็งแรง" },
            { q: "สารละลายอิ่มตัวคืออะไร?", options: ["ละลายเพิ่มไม่ได้", "ละลายได้อีก", "ไม่ละลาย", "แยกชั้น"], correct: 0, clue: "เต็มแล้ว", explanation: "สารละลายที่ตัวถูกละลายไม่สามารถละลายเพิ่มได้อีกที่อุณหภูมินั้นๆ ครับ", trick: "อิ่ม = เต็มพิกัด" },
            { q: "สิ่งมีชีวิตทุกชนิดต้องมีสิ่งนี้?", options: ["นิวเคลียส", "คลอโรพลาสต์", "เซลล์", "ผนังเซลล์"], correct: 2, clue: "หน่วยเล็กที่สุด", explanation: "เซลล์เป็นพื้นฐานชีวิต สิ่งมีชีวิตใดจะไม่มีเซลล์ไม่ได้ครับ", trick: "มีชีวิต = มีเซลล์" },
            { q: "การสกัดด้วยตัวทำละลายอาศัยหลักการใด?", options: ["ละลายในตัวทำละลายได้ต่างกัน", "จุดเดือด", "การกรอง", "น้ำหนัก"], correct: 0, clue: "การละลาย", explanation: "เราเลือกตัวทำละลายที่ดึงสารที่เราต้องการออกมาได้ดีกว่าสารอื่นครับ", trick: "สกัด = ละลายต่างกัน" },
            { q: "พืชคายน้ำตอนไหน?", options: ["กลางวัน", "กลางคืน", "ตลอดเวลา", "ตอนฝนตก"], correct: 0, clue: "ตอนเปิดปากใบ", explanation: "ปากใบมักเปิดตอนกลางวันเพื่อรับแสงและแลกเปลี่ยนก๊าซ น้ำจึงระเหยออกมาด้วยครับ", trick: "คายน้ำ = ช่วงกลางวัน" },
            { q: "ข้อใดคือการตั้งสมมติฐาน?", options: ["คำตอบที่คาดเดา", "การสรุป", "การจดบันทึก", "การอ่านผล"], correct: 0, clue: "เดาอย่างมีหลักการ", explanation: "คือการคาดคะเนคำตอบไว้ล่วงหน้าก่อนจะเริ่มทำการทดลองจริงครับ", trick: "เดาแบบฉลาดต้องมีหลักการ" },
            { q: "ไซโทพลาซึมคืออะไร?", options: ["ของเหลวในเซลล์", "ส่วนแข็ง", "นิวเคลียส", "ออร์แกเนลล์"], correct: 0, clue: "ส่วนที่เป็นน้ำ", explanation: "เป็นของเหลวคล้ายวุ้นที่อยู่ภายในเซลล์และเป็นที่อยู่ของออร์แกเนลล์ต่างๆ ครับ", trick: "ไซโท = เจล/วุ้น" },
            { q: "พืชต้องการสารอาหารจากไหน?", options: ["ปุ๋ย", "ดิน", "แสง", "น้ำ"], correct: 1, clue: "รากดูดมา", explanation: "ดินมีธาตุอาหารและแร่ธาตุที่รากพืชดูดซึมขึ้นไปใช้เพื่อการเจริญเติบโตครับ", trick: "ดิน = คลังสมบัติของพืช" },
            { q: "สารใดมีสมบัติเป็นสารเนื้อผสม?", options: ["น้ำเชื่อม", "น้ำกะทิ", "น้ำเปล่า", "น้ำกลั่น"], correct: 1, clue: "มีตะกอนหรือแยกชั้น", explanation: "น้ำกะทิมีอนุภาคไขมันกระจายอยู่ที่ไม่กลมกลืนกับน้ำจนแยกเป็นชั้นได้ครับ", trick: "กะทิ = แยกชั้นไม่เนียน" },
            { q: "การทดลองวิทยาศาสตร์ต้องสามารถทำอย่างไร?", options: ["ทำซ้ำได้", "ทำครั้งเดียว", "ไม่ต้องบอกใคร", "ทำตามใจ"], correct: 0, clue: "ผลต้องเหมือนเดิม", explanation: "ถ้าทดลองกี่ครั้งผลก็ควรได้เท่าเดิม นั่นคือความน่าเชื่อถือทางวิทยาศาสตร์ครับ", trick: "ทำซ้ำ = ยืนยันความถูกต้อง" }
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            container.innerHTML += `
                <div class="mb-6 p-4 border rounded-xl hover:bg-green-50 shadow-sm">
                    <p class="font-bold text-lg mb-2 text-gray-800">${i+1}. ${q.q} <span class="clue-text">[Clue: ${q.clue}]</span></p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${q.options.map((opt, idx) => `
                            <label class="flex items-center space-x-2 cursor-pointer p-3 bg-white rounded-lg border border-gray-200 hover:border-green-400 transition">
                                <input type="radio" name="q${i}" value="${idx}" class="w-4 h-4 text-green-600"> <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div id="exp${i}" class="explanation">
                        <p class="font-bold text-lg text-green-900 border-b pb-2 mb-2">เฉลยข้อที่ ${i+1}: ${q.options[q.correct]}</p>
                        <p class="text-gray-700 mb-2">${q.explanation}</p>
                        <p class="italic text-red-600 font-semibold bg-white p-2 rounded border border-red-200">✨ ติวเตอร์ Trick: ${q.trick}</p>
                    </div>
                </div>
            `;
        });

        document.getElementById('submit-btn').onclick = () => {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const exp = document.getElementById('exp'+i);
                exp.style.display = 'block';
                if(selected && parseInt(selected.value) === q.correct) {
                    score++;
                    exp.classList.add('bg-green-100', 'border-green-500');
                    exp.classList.remove('bg-yellow-50', 'border-orange-500');
                } else {
                    exp.classList.add('bg-red-50', 'border-red-400');
                    exp.classList.remove('bg-yellow-50', 'border-orange-500');
                }
            });
            document.getElementById('score-display').innerText = `คุณทำคะแนนได้: ${score} / 50`;
            document.getElementById('result-section').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('result-section').offsetTop, behavior: 'smooth' });
        };
    </script>
</body>
</html>
