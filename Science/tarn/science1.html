<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ข้อสอบเฉพาะทาง: เซลล์และกล้องจุลทรรศน์ (25 ข้อ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .clue-text { color: #ef4444; font-weight: bold; }
        .explanation { display: none; margin-top: 10px; padding: 15px; background: #fef3c7; border-left: 5px solid #d97706; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto bg-white p-8 shadow-xl rounded-2xl">
        <h1 class="text-3xl font-bold text-center text-green-800 mb-2">เจาะลึก: เซลล์และกล้องจุลทรรศน์ (25 ข้อ)</h1>
        <p class="text-center text-green-600 mb-8 font-semibold">จัดทำโดย: พระจอมเกล้าติวเตอร์</p>
        
        <div id="quiz-container"></div>

        <button id="submit-btn" class="w-full bg-green-700 text-white py-4 mt-8 rounded-xl font-bold hover:bg-green-800 transition duration-300">ส่งข้อสอบและรับคำแนะนำจากติวเตอร์</button>
        
        <div id="result-section" class="hidden mt-8 p-6 bg-blue-100 rounded-xl text-center">
            <h2 id="score-display" class="text-3xl font-bold text-blue-900"></h2>
        </div>
    </div>

    <script>
        const questions = [
            { q: "โครงสร้างใดพบในเซลล์พืชแต่ไม่มีในเซลล์สัตว์?", options: ["นิวเคลียส", "ผนังเซลล์", "ไมโทคอนเดรีย", "เยื่อหุ้มเซลล์"], correct: 1, clue: "ทำให้พืชมีรูปทรงเหลี่ยมคงที่", explanation: "ผนังเซลล์ (Cell Wall) ทำหน้าที่สร้างความแข็งแรงและคงรูปร่างให้กับพืชครับ", trick: "พืชมีผนัง! สัตว์ไม่มีเพราะต้องยืดหยุ่นเคลื่อนที่ได้" },
            { q: "ส่วนใดเปรียบเสมือน 'สมอง' ที่ควบคุมการทำงานของเซลล์?", options: ["ไซโทพลาซึม", "นิวเคลียส", "แวคิวโอล", "ไรโบโซม"], correct: 1, clue: "บรรจุสารพันธุกรรม DNA", explanation: "นิวเคลียสควบคุมกิจกรรมทั้งหมดของเซลล์และเก็บข้อมูลพันธุกรรมครับ", trick: "นิวเคลียส = บอสใหญ่ของเซลล์" },
            { q: "ออร์แกเนลล์ใดสร้างพลังงานให้กับเซลล์?", options: ["ไมโทคอนเดรีย", "คลอโรพลาสต์", "กอลจิบอดี", "เอ็นโดพลาสมิกเรติคูลัม"], correct: 0, clue: "โรงไฟฟ้าของเซลล์", explanation: "ไมโทคอนเดรียเปลี่ยนสารอาหารให้เป็นพลังงาน (ATP) เพื่อใช้ในกิจกรรมต่างๆ ครับ", trick: "ไมโทคอนเดรีย = โรงไฟฟ้า" },
            { q: "ภาพที่ได้จากกล้องจุลทรรศน์ใช้แสงมีลักษณะอย่างไร?", options: ["ภาพจริงหัวตั้ง", "ภาพเสมือนหัวกลับ", "ภาพจริงหัวกลับ", "ภาพเสมือนหัวตั้ง"], correct: 1, clue: "เลนส์นูนทำให้เกิดการกลับด้าน", explanation: "ภาพจะกลับหัวและกลับซ้ายขวาเสมอ เมื่อเทียบกับวัตถุจริงครับ", trick: "กล้องแสง = กลับหัว-กลับหลังเสมอ" },
            { q: "ถ้าต้องการปรับภาพให้ชัดเจนที่สุดควรใช้ปุ่มใด?", options: ["ปุ่มปรับภาพหยาบ", "ปุ่มปรับภาพละเอียด", "จานหมุน", "ที่หนีบสไลด์"], correct: 1, clue: "ปรับจูนความคมชัดสูง", explanation: "ปุ่มปรับภาพละเอียดใช้สำหรับปรับภาพให้คมชัดหลังจากเห็นภาพคร่าวๆ แล้วครับ", trick: "ละเอียด = คมชัดกริบ" },
            { q: "สารสีเขียวในพืชที่ใช้ในการสังเคราะห์แสงคือ?", options: ["แอนโทไซยานิน", "คลอโรฟิลล์", "แคโรทีน", "แซนโทฟิลล์"], correct: 1, clue: "อยู่ในคลอโรพลาสต์", explanation: "คลอโรฟิลล์ทำหน้าที่จับพลังงานแสงเพื่อเปลี่ยนเป็นอาหารครับ", trick: "คลอโรฟิลล์ = ครัวสีเขียว" },
            { q: "เยื่อหุ้มเซลล์มีสมบัติสำคัญคืออะไร?", options: ["ยอมให้สารทุกชนิดผ่าน", "ไม่ยอมให้สารใดผ่าน", "เป็นเยื่อเลือกผ่าน", "เป็นเยื่อกั้นทุกอย่าง"], correct: 2, clue: "เลือกรับเฉพาะสิ่งที่จำเป็น", explanation: "เป็นเยื่อเลือกผ่าน (Semi-permeable membrane) ที่คัดกรองสารเข้า-ออกเซลล์ครับ", trick: "เลือกผ่าน = ฉลาดคัดกรอง" },
            { q: "กล้องจุลทรรศน์แบบใช้แสงชนิดใดที่ให้ภาพ 3 มิติ?", options: ["กล้องเชิงประกอบ", "กล้องสเตอริโอ", "กล้องอิเล็กตรอน", "กล้องธรรมดา"], correct: 1, clue: "เหมาะสำหรับดูวัตถุหนาๆ", explanation: "กล้องสเตอริโอใช้ส่องดูวัตถุที่ทึบแสงและให้ภาพที่มีมิติความลึกครับ", trick: "สเตอริโอ = มีมิติ" },
            { q: "สารที่บรรจุอยู่ในนิวเคลียสคืออะไร?", options: ["โปรตีน", "ไขมัน", "โครโมโซม/DNA", "น้ำตาล"], correct: 2, clue: "รหัสพันธุกรรม", explanation: "นิวเคลียสเก็บสารพันธุกรรมหรือ DNA ไว้ควบคุมลักษณะทางพันธุกรรมครับ", trick: "นิวเคลียส = ตู้เก็บเอกสารพันธุกรรม" },
            { q: "ส่วนใดของกล้องที่ใช้ปรับปริมาณแสง?", options: ["เลนส์ใกล้ตา", "เลนส์ใกล้วัตถุ", "ไดอะแฟรม", "จานหมุน"], correct: 2, clue: "ปรับรูรับแสง", explanation: "ไดอะแฟรมปรับให้แสงเข้ากล้องมากหรือน้อยตามความเหมาะสมครับ", trick: "ไดอะแฟรม = ม่านตาของกล้อง" },
            { q: "เซลล์พืชมีส่วนประกอบใดที่ทำให้คงรูปทรง?", options: ["เยื่อหุ้มเซลล์", "ไซโทพลาซึม", "ผนังเซลล์", "นิวเคลียส"], correct: 2, clue: "โครงสร้างแข็งรอบเซลล์", explanation: "ผนังเซลล์ประกอบด้วยเซลลูโลสที่ให้ความแข็งแรงครับ", trick: "ผนังเซลล์ = โครงสร้างเหล็กของพืช" },
            { q: "ออร์แกเนลล์ใดทำหน้าที่กำจัดสิ่งแปลกปลอมในเซลล์?", options: ["ไลโซโซม", "ไมโทคอนเดรีย", "นิวเคลียส", "ไรโบโซม"], correct: 0, clue: "หน่วยทำลายล้าง", explanation: "ไลโซโซมสร้างเอนไซม์มาย่อยสลายสิ่งแปลกปลอมหรือออร์แกเนลล์ที่เสื่อมสภาพครับ", trick: "ไลโซโซม = ถังขยะ/หน่วยทำลาย" },
            { q: "ถ้ามองผ่านกล้องจุลทรรศน์เห็นภาพค่อนข้างมืด ควรปรับอะไร?", options: ["เลนส์ใกล้วัตถุ", "กระจกเงาหรือไดอะแฟรม", "ลำกล้อง", "ที่หนีบสไลด์"], correct: 1, clue: "ปรับแสงเพิ่ม", explanation: "ปรับกระจกเงาหรือไดอะแฟรมเพื่อให้แสงผ่านวัตถุได้มากขึ้นครับ", trick: "มืด = เพิ่มแสง" },
            { q: "การหา 'กำลังขยายรวม' ของกล้องทำอย่างไร?", options: ["เลนส์ใกล้ตา + เลนส์ใกล้วัตถุ", "เลนส์ใกล้ตา × เลนส์ใกล้วัตถุ", "เลนส์ใกล้ตา ÷ เลนส์ใกล้วัตถุ", "เลนส์ใกล้ตา - เลนส์ใกล้วัตถุ"], correct: 1, clue: "การคูณคือหัวใจ", explanation: "กำลังขยายรวม = กำลังขยายเลนส์ใกล้ตา × กำลังขยายเลนส์ใกล้วัตถุครับ", trick: "ขยาย = คูณ (ยิ่งคูณยิ่งชัด)" },
            { q: "เซลล์สัตว์ไม่มีส่วนประกอบใดที่เซลล์พืชมี?", options: ["นิวเคลียส", "ผนังเซลล์และคลอโรพลาสต์", "เยื่อหุ้มเซลล์", "ไมโทคอนเดรีย"], correct: 1, clue: "สัตว์ไม่ต้องสังเคราะห์แสง", explanation: "สัตว์ไม่มีผนังเซลล์และไม่มีคลอโรพลาสต์ครับ", trick: "พืช = ครัว + ผนัง สัตว์ = ไม่มี" },
            { q: "ไซโทพลาซึมคืออะไร?", options: ["ส่วนของนิวเคลียส", "ของเหลวในเซลล์", "ผนังเซลล์", "รหัสพันธุกรรม"], correct: 1, clue: "วุ้นในเซลล์", explanation: "เป็นของเหลวที่มีออร์แกเนลล์ต่างๆ ลอยอยู่ภายในครับ", trick: "ไซโทพลาซึม = เจลลี่ในเซลล์" },
            { q: "การเตรียมตัวอย่างต้องวางอย่างไรบนสไลด์?", options: ["วางหนาๆ", "ต้องบางที่สุดให้แสงผ่านได้", "ไม่ต้องปิดกระจกปิดสไลด์", "แช่น้ำไว้นานๆ"], correct: 1, clue: "แสงส่องผ่าน", explanation: "ถ้าตัวอย่างหนาเกินไป แสงส่องผ่านไม่ได้ จะมองไม่เห็นอะไรเลยครับ", trick: "บาง = มองเห็นชัด" },
            { q: "อะไรคือหน่วยโครงสร้างของสิ่งมีชีวิต?", options: ["อวัยวะ", "เนื้อเยื่อ", "เซลล์", "ระบบอวัยวะ"], correct: 2, clue: "หน่วยที่เล็กที่สุด", explanation: "เซลล์เป็นพื้นฐานชีวิตทุกชนิดครับ", trick: "ชีวิต = เซลล์" },
            { q: "ออร์แกเนลล์ใดทำหน้าที่สร้างโปรตีน?", options: ["ไรโบโซม", "นิวเคลียส", "คลอโรพลาสต์", "แวคิวโอล"], correct: 0, clue: "โรงงานผลิตโปรตีน", explanation: "ไรโบโซมทำหน้าที่สังเคราะห์โปรตีนครับ", trick: "ไรโบโซม = โรงงานผลิตโปรตีน" },
            { q: "ก่อนนำสไลด์วางที่แท่นวาง ควรปรับเลนส์ใกล้วัตถุอย่างไร?", options: ["เลือกเลนส์กำลังขยายสูงสุด", "เลือกเลนส์กำลังขยายต่ำสุด", "ถอดเลนส์ออก", "ไม่ต้องสน"], correct: 1, clue: "เริ่มจากภาพกว้าง", explanation: "ต้องใช้กำลังขยายต่ำสุดก่อนเพื่อหาวัตถุได้ง่ายครับ", trick: "เริ่มต่ำ = หาภาพง่าย" },
            { q: "อะไรช่วยควบคุมสารเข้า-ออกเซลล์?", options: ["ผนังเซลล์", "เยื่อหุ้มเซลล์", "นิวเคลียส", "ไซโทพลาซึม"], correct: 1, clue: "ประตูเซลล์", explanation: "เยื่อหุ้มเซลล์ทำหน้าที่เลือกผ่านสารที่จำเป็นครับ", trick: "เยื่อเลือกผ่าน = ยามหน้าประตู" },
            { q: "สิ่งใดในเซลล์พืชที่เก็บของเหลว/สารต่างๆ?", options: ["แวคิวโอล", "นิวเคลียส", "ไมโทคอนเดรีย", "คลอโรพลาสต์"], correct: 0, clue: "ถุงเก็บสารขนาดใหญ่", explanation: "แวคิวโอลในพืชใหญ่มาก เพื่อเก็บสารและน้ำครับ", trick: "พืช = ถุงเก็บของใหญ่" },
            { q: "ถ้ามองผ่านกล้องแล้วเจอ 'ฝุ่น' ควรทำอย่างไร?", options: ["เลื่อนสไลด์", "เช็ดเลนส์ด้วยผ้าเช็ดเลนส์", "ขยี้ตา", "เลิกส่อง"], correct: 1, clue: "ความสะอาดเลนส์สำคัญ", explanation: "ควรเช็ดเลนส์ด้วยกระดาษเช็ดเลนส์เฉพาะทางเท่านั้นครับ", trick: "สะอาด = ภาพใส" },
            { q: "กล้องจุลทรรศน์ใช้แสงให้ภาพที่มีกำลังขยายสูงสุดประมาณเท่าไหร่?", options: ["10 เท่า", "100 เท่า", "1,000-2,000 เท่า", "10,000 เท่า"], correct: 2, clue: "หลักพัน", explanation: "โดยทั่วไปกล้องใช้แสงทั่วไปขยายได้สูงสุดประมาณ 1,000-2,000 เท่าครับ", trick: "กล้องแสง = พันเท่า" },
            { q: "การทำสไลด์แบบชั่วคราวต้องใช้สิ่งใดปิด?", options: ["กระจกปิดสไลด์", "กระดาษ", "พลาสติก", "เทปใส"], correct: 0, clue: "แผ่นใสเล็กๆ", explanation: "กระจกปิดสไลด์ (Cover slip) ช่วยป้องกันเลนส์และทำให้ตัวอย่างเรียบครับ", trick: "ปิดสไลด์ = กันเลนส์เปื้อน" }
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            container.innerHTML += `
                <div class="mb-6 p-4 border rounded-xl hover:bg-green-50 shadow-sm">
                    <p class="font-bold text-lg mb-2 text-gray-800">${i+1}. ${q.q} <span class="clue-text">[Clue: ${q.clue}]</span></p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${q.options.map((opt, idx) => `
                            <label class="flex items-center space-x-2 cursor-pointer p-3 bg-white rounded-lg border border-gray-200 hover:border-green-400 transition">
                                <input type="radio" name="q${i}" value="${idx}" class="w-4 h-4 text-green-600"> <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div id="exp${i}" class="explanation">
                        <p class="font-bold text-lg text-green-900 border-b pb-2 mb-2">เฉลยข้อที่ ${i+1}: ${q.options[q.correct]}</p>
                        <p class="text-gray-700 mb-2">${q.explanation}</p>
                        <p class="italic text-red-600 font-semibold bg-white p-2 rounded border border-red-200">✨ ติวเตอร์ Trick: ${q.trick}</p>
                    </div>
                </div>
            `;
        });

        document.getElementById('submit-btn').onclick = () => {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const exp = document.getElementById('exp'+i);
                exp.style.display = 'block';
                if(selected && parseInt(selected.value) === q.correct) {
                    score++;
                    exp.classList.add('bg-green-100', 'border-green-500');
                    exp.classList.remove('bg-yellow-50', 'border-orange-500');
                } else {
                    exp.classList.add('bg-red-50', 'border-red-400');
                    exp.classList.remove('bg-yellow-50', 'border-orange-500');
                }
            });
            document.getElementById('score-display').innerText = `คุณทำคะแนนได้: ${score} / 25`;
            document.getElementById('result-section').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('result-section').offsetTop, behavior: 'smooth' });
        };
    </script>
</body>
</html>
