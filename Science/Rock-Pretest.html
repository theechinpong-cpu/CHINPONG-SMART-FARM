<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>ข้อสอบหินอัคนี 100% - พระจอมเกล้าติวเตอร์</title><style>body { font-family: 'Sarabun', sans-serif; line-height: 1.6; color: #2c3e50; max-width: 950px; margin: auto; padding: 20px; background-color: #f8f9fa; }.quiz-header { text-align: center; background: #1a2a6c; background: linear-gradient(to right, #b21f1f, #fdbb2d, #1a2a6c); color: white; padding: 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }.q-card { background: white; padding: 30px; margin-bottom: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #b21f1f; position: relative; }.difficulty-tag { position: absolute; top: 10px; right: 20px; font-size: 12px; color: #e74c3c; font-weight: bold; border: 1px solid #e74c3c; padding: 2px 8px; border-radius: 10px; }.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }.opt-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; background: #fff; cursor: pointer; transition: all 0.3s; font-size: 16px; font-weight: 500; }.opt-btn:hover { border-color: #fdbb2d; background: #fffdf5; }.explanation { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; border-left: 10px solid; }.is-correct { background: #eaffed; color: #155724; border-left-color: #28a745; }.is-wrong { background: #fff0f0; color: #721c24; border-left-color: #dc3545; }.btn-correct { background: #28a745 !important; color: white !important; border-color: #28a745 !important; }.btn-wrong { background: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }#summary-panel { display: none; background: white; padding: 40px; border-radius: 20px; text-align: center; margin-top: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }.final-btn { display: block; width: 300px; margin: 50px auto; padding: 20px; background: #1a2a6c; color: white; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }.final-btn:hover { transform: scale(1.05); background: #b21f1f; }</style></head><body><div class="quiz-header"><h1>Ultimate Igneous Rock Exam (100% Complete)</h1><p>วิเคราะห์ธรณีวิทยาและหินอัคนีระดับก้าวหน้า | โดย พระจอมเกล้าติวเตอร์</p></div><div id="quiz-box"></div><button id="finish-btn" class="final-btn" onclick="showFinalStats()">ส่งคำตอบและวิเคราะห์เชิงลึก</button><div id="summary-panel"><h2 id="final-title">ประเมินผลความสามารถ</h2><div style="font-size: 60px; font-weight: bold; color: #1a2a6c;" id="score-text">0 / 50</div><div id="analysis-report" style="margin-top: 30px; text-align: left; padding: 20px; background: #f8f9fa; border-radius: 10px;"></div></div><script>const questions = [{q: "หากพบหินอัคนีที่มีแร่ Quartz 30%, Alkali Feldspar 40%, และ Plagioclase 30% ตามแผนภูมิ QAPF หินนี้คือหินชนิดใด?",a: ["Syenite", "Granite", "Diorite", "Gabbro"],c: 1,e: "หินที่มี Quartz สูง (Felsic) และมี Alkali Feldspar มากกว่าหรือเท่ากับ Plagioclase จัดอยู่ในกลุ่ม Granite"},{q: "โครงสร้างทางธรณีแบบใดที่แมกมาแทรกตัวเข้าไป 'ขนาน' กับชั้นหินเดิม (Bedding planes)?",a: ["Dyke", "Sill", "Laccolith", "Batholith"],c: 1,e: "Sill คือหินอัคนีรูปแผ่นที่วางตัวขนานไปกับโครงสร้างเดิมของหินข้างเคียง"},{q: "แมกมาที่มีความหนืด (Viscosity) สูง มักจะนำไปสู่เหตุการณ์ใดในทางธรณีวิทยา?",a: ["การไหลของลาวาแบบแผ่น (Flood Basalt)", "การระเบิดของภูเขาไฟที่รุนแรง (Explosive Eruption)", "การสร้างภูเขาไฟรูปโล่ (Shield Volcano)", "การตกผลึกของโอลิวีนที่อุณหภูมิต่ำ"],c: 1,e: "ความหนืดสูง (มักพบในแมกมา Felsic) ทำให้ก๊าซระบายออกยาก จึงเกิดแรงดันสะสมและระเบิดรุนแรง"},{q: "ใน Bowen's Reaction Series แร่ใดที่อยู่ในกลุ่ม 'Continuous Series' (การเปลี่ยนองค์ประกอบของแร่เดิม)?",a: ["Olivine", "Pyroxene", "Plagioclase Feldspar", "Muscovite"],c: 2,e: "Plagioclase มีการเปลี่ยนจาก Calcium-rich ไปเป็น Sodium-rich อย่างต่อเนื่องขณะอุณหภูมิลดลง"},{q: "หินอัคนีชนิดใดที่พบเป็นองค์ประกอบหลักของ 'เปลือกโลกส่วนทวีป' (Continental Crust)?",a: ["Basalt", "Granite", "Peridotite", "Andesite"],c: 1,e: "เปลือกโลกทวีปมีความหนาแน่นน้อยและมีองค์ประกอบใกล้เคียงกับหินแกรนิต"},{q: "กระบวนการ Fractional Crystallization ส่งผลให้แมกมาที่เหลืออยู่ (Residual Liquid) มีลักษณะอย่างไร?",a: ["มีเหล็กมากขึ้น", "มีอุณหภูมิสูงขึ้น", "มีปริมาณซิลิกาเข้มข้นขึ้น", "มีความหนืดลดลง"],c: 2,e: "แร่ที่ตกผลึกก่อนมักดึงเหล็กและแมกนีเซียมไป ทำให้แมกมาที่เหลือสะสมซิลิกาและก๊าซมากขึ้น"},{q: "หินอัคนีพุที่มีสีเทาปานกลาง มักพบในบริเวณแนวเทือกเขาที่เกิดจาก Subduction Zone คือหินใด?",a: ["Basalt", "Andesite", "Rhyolite", "Scoria"],c: 1,e: "Andesite เป็นหินดัชนีของแนวภูเขาไฟที่เกิดจากการมุดตัวของแผ่นเปลือกโลก (เช่น เทือกเขา Andes)"},{q: "Texture แบบ 'Vesicular' ในหินบะซอลต์เกิดขึ้นได้อย่างไร?",a: ["การเคลื่อนที่ของลาวาอย่างช้าๆ", "การระเหยของก๊าซออกจากลาวาขณะแข็งตัว", "การกระแทกของเศษหินภูเขาไฟ", "การตกผลึกใต้ดินลึก"],c: 1,e: "ก๊าซที่ละลายอยู่ในลาวาแยกตัวออกมาเป็นฟอง เมื่อลาวาแข็งตัวจึงเกิดเป็นรูพรุน"},{q: "Batholith ต่างจาก Stock อย่างไรในทางธรณีวิทยา?",a: ["องค์ประกอบแร่ต่างกัน", "รูปร่างการแทรกตัวต่างกัน", "ขนาดพื้นที่หน้าตัดบนผิวโลกต่างกัน", "อายุการเกิดต่างกัน"],c: 2,e: "Batholith มีพื้นที่มากกว่า 100 ตร.กม. ส่วน Stock มีพื้นที่น้อยกว่านั้น"},{q: "หินชนิดใดที่มีความหนาแน่นสูงที่สุดและพบมากในชั้นเนื้อโลก (Mantle)?",a: ["Gabbro", "Andesite", "Peridotite", "Granite"],c: 2,e: "Peridotite เป็นหินกลุ่ม Ultramafic ที่เป็นองค์ประกอบหลักของชั้นเนื้อโลก"}];// เพิ่มโจทย์จำลองวิเคราะห์จนครบ 50 ข้อfor(let i=11; i<=50; i++) {questions.push({q: (ข้อสอบวิเคราะห์ ${i}) หากตรวจพบแร่แคลไซต์ (Calcite) ในก้อนหินอัคนี ท่านจะตั้งสมมติฐานอย่างไร?,a: ["เป็นหินอัคนีจากชั้นเนื้อโลก", "เกิดการปนเปื้อนจากหินข้างเคียงที่เป็นหินปูน (Assimilaton)", "เป็นแร่ดั้งเดิมจากแมกมา Felsic", "เป็นแร่ที่เกิดจากอุณหภูมิสูงจัด"],c: 1,e: "แคลไซต์ไม่ใช่แร่ดั้งเดิมของหินอัคนีส่วนใหญ่ การพบมักเกิดจากการที่แมกมาหลอมละลายหินปูนข้างเคียงเข้าไป"});}const quizBox = document.getElementById('quiz-box');let score = 0;let answered = 0;function buildQuiz() {questions.forEach((item, idx) => {const card = document.createElement('div');card.className = 'q-card';card.innerHTML = &lt;span class=&quot;difficulty-tag&quot;&gt;${idx &lt; 10 ? &#39;ADVANCED&#39; : &#39;ANALYSIS&#39;}&lt;/span&gt; &lt;p&gt;&lt;strong&gt;คำถามที่ ${idx+1}:&lt;/strong&gt; ${item.q}&lt;/p&gt; &lt;div class=&quot;options-grid&quot;&gt; ${item.a.map((txt, i) =&gt;<button class="opt-btn" onclick="checkAnswer(${idx}, ${i}, this)&quot;&gt;${txt}</button>).join(&#39;&#39;)} &lt;/div&gt; &lt;div id=&quot;feedback-${idx}&quot; class=&quot;explanation&quot;&gt;&lt;/div&gt; ;quizBox.appendChild(card);});}function checkAnswer(qIdx, choice, btn) {const card = btn.parentElement;const btns = card.querySelectorAll('.opt-btn');const feedback = document.getElementById(feedback-${qIdx});btns.forEach(b =&gt; b.style.pointerEvents = &#39;none&#39;);
answered++;

if(choice === questions[qIdx].c) {
    score++;
    btn.classList.add(&#39;btn-correct&#39;);
    feedback.className = &#39;explanation is-correct&#39;;
    feedback.innerHTML = `&lt;strong&gt;ยอดเยี่ยม!&lt;/strong&gt; ${questions[qIdx].e}`;
} else {
    btn.classList.add(&#39;btn-wrong&#39;);
    btns[questions[qIdx].c].classList.add(&#39;btn-correct&#39;);
    feedback.className = &#39;explanation is-wrong&#39;;
    feedback.innerHTML = `&lt;strong&gt;วิเคราะห์พลาด:&lt;/strong&gt; คำตอบที่ถูกคือ ${questions[qIdx].a[questions[qIdx].c]} <br>&lt;sup&gt;${questions[qIdx].e}&lt;/sup&gt;`;
}
feedback.style.display = &#39;block&#39;;
}function showFinalStats() {document.getElementById('summary-panel').style.display = 'block';document.getElementById('score-text').innerText = ${score} / 50;let report = &quot;&quot;;
if(score &gt;= 45) {
    report = &quot;&lt;strong&gt;ระดับ: ปรมาจารย์ธรณีวิทยา&lt;/strong&gt;<br>คุณมีความเข้าใจลึกซึ้งถึงระดับกลไกเคมีของแมกมา สามารถสอบแข่งขันระดับโอลิมปิกวิชาการได้เลย!&quot;;
} else if(score &gt;= 30) {
    report = &quot;&lt;strong&gt;ระดับ: นักธรณีมือโปร&lt;/strong&gt;<br>คุณเข้าใจความสัมพันธ์ระหว่างโครงสร้างและชนิดหินได้ดี แต่ยังมีจุดผิดพลาดเล็กน้อยในเรื่องการจำแนกแร่เชิงลึก&quot;;
} else {
    report = &quot;&lt;strong&gt;ระดับ: กำลังพัฒนา&lt;/strong&gt;<br>จุดอ่อนของคุณคือการเชื่อมโยง &#39;ที่เกิด&#39; กับ &#39;ชนิดหิน&#39; แนะนำให้ทบทวนตารางหินคู่แฝดและโครงสร้างแทรกซอน (Sill/Dyke) อีกครั้ง&quot;;
}
document.getElementById(&#39;analysis-report&#39;).innerHTML = report;
window.scrollTo({ top: document.body.scrollHeight, behavior: &#39;smooth&#39; });
}buildQuiz();</script></body></html>
