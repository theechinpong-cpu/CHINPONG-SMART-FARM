<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อสอบวิทยาศาสตร์ เข้า ม.1 - พระจอมเกล้าติวเตอร์</title>
    <style>
        :root { --primary: #1a5f7a; --secondary: #c88c32; --light: #f4f7f6; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Sarabun', sans-serif; background: var(--light); color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 4px solid var(--secondary); padding-bottom: 10px; }
        .info { text-align: center; font-style: italic; color: #666; margin-bottom: 30px; }
        .q-block { margin-bottom: 40px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fdfdfd; }
        .question { font-weight: bold; font-size: 18px; margin-bottom: 15px; display: block; }
        .options { display: grid; gap: 10px; }
        .btn-opt { padding: 12px 15px; border: 2px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .btn-opt:hover:not([disabled]) { border-color: var(--primary); background: #f0f7ff; }
        .btn-opt:disabled { cursor: not-allowed; }
        .expl { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: 500; border-left: 5px solid; }
        .correct-ans { background: #d4edda; border-color: var(--success); color: #155724; border-left-color: var(--success); }
        .wrong-ans { background: #f8d7da; border-color: var(--danger); color: #721c24; border-left-color: var(--danger); }
        #summary { display: none; text-align: center; background: var(--primary); color: #fff; padding: 40px; border-radius: 15px; margin-top: 30px; }
        .analysis-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; text-align: left; margin-top: 20px; }
        .progress { position: sticky; top: 0; background: #fff; z-index: 10; padding: 10px 0; border-bottom: 1px solid #eee; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 ข้อสอบเข้า ม.1 วิชาวิทยาศาสตร์ (50 ข้อ)</h1>
    <div class="info">โดย พระจอมเกล้าติวเตอร์ | เขียนโดย CHINPONG SMART FARM</div>

    <div class="progress">
        <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;">
            <span>ความคืบหน้า</span>
            <span id="progress-text">0 / 50</span>
        </div>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="quiz-form"></div>

    <div id="summary">
        <h2>📊 ผลคะแนนสอบ</h2>
        <div style="font-size: 60px; font-weight: bold;" id="score-val">0</div>
        <div id="analysis-box" class="analysis-card"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; cursor:pointer; font-weight:bold; border-radius:5px; border:none;">ทำข้อสอบใหม่อีกครั้ง</button>
    </div>
</div>

<script>
const quizData = [
    {q: "1. หากต้องการแยกน้ำมันออกจากน้ำ ควรใช้วิธีใดเหมาะสมที่สุด?", a: ["การกรอง", "การระเหยแห้ง", "การใช้กรวยแยก", "การใช้แม่เหล็กดูด"], c: 2, cat: "สาร", exp: "น้ำมันและน้ำเป็นของเหลวที่ไม่ละลายซึ่งกันและกัน (แยกชั้น) จึงต้องใช้กรวยแยกเพื่อปล่อยของเหลวที่หนาแน่นกว่าออกทางด้านล่าง"},
    {q: "2. ส่วนใดของหัวใจที่ทำหน้าที่สูบฉีดเลือดไปเลี้ยงส่วนต่างๆ ของร่างกาย?", a: ["เอเตรียมขวา", "เวนตริเคิลขวา", "เอเตรียมซ้าย", "เวนตริเคิลซ้าย"], c: 3, cat: "ร่างกาย", exp: "หัวใจห้องล่างซ้าย (Left Ventricle) มีผนังหนาที่สุดเพื่อสร้างแรงดันสูบฉีดเลือดดีไปทั่วร่างกาย"},
    {q: "3. ข้อใดไม่ใช่การเปลี่ยนแปลงทางเคมี?", a: ["เหล็กเป็นสนิม", "น้ำตาลทรายละลายน้ำ", "การสุกของผลไม้", "การเผาฟืน"], c: 1, cat: "สาร", exp: "การละลายของน้ำตาลเป็นการเปลี่ยนแปลงทางกายภาพ เพราะไม่มีสารใหม่เกิดขึ้นและยังคงสมบัติเดิมของน้ำตาลอยู่"},
    {q: "4. เมื่อนำต้นกระบองเพชรไปปลูกในที่ที่มีน้ำขังจะเกิดผลอย่างไร?", a: ["โตเร็วขึ้น", "รากเน่าและตาย", "หนามจะเปลี่ยนเป็นใบ", "คายน้ำได้ดีขึ้น"], c: 1, cat: "พืช", exp: "กระบองเพชรปรับตัวมาให้อยู่ในที่แห้งแล้ง รากจึงไม่ทนต่อสภาพน้ำขังที่ขาดอากาศ ทำให้เน่าเสียได้ง่าย"},
    {q: "5. การทดสอบน้ำตาลในผลไม้รสหวานใช้สารละลายใด?", a: ["สารละลายไอโอดีน", "สารละลายเบเนดิกต์", "สารละลายคอปเปอร์ซัลเฟต", "น้ำปูนใส"], c: 1, cat: "สารอาหาร", exp: "เบเนดิกต์ใช้ทดสอบน้ำตาลโมเลกุลเดี่ยว เมื่อต้มแล้วจะเปลี่ยนจากสีฟ้าเป็นตะกอนสีส้มอิฐ"},
    {q: "6. แหล่งกำเนิดเสียงในมนุษย์คือส่วนใด?", a: ["หลอดลม", "ปอด", "เส้นเสียงในกล่องเสียง", "ลิ้น"], c: 2, cat: "ร่างกาย", exp: "เสียงเกิดจากการสั่นสะเทือนของเส้นเสียง (Vocal cords) ที่อยู่ภายในกล่องเสียงเมื่อลมผ่าน"},
    {q: "7. สัตว์ข้อใดมีการปฏิสนธิภายในแต่ออกลูกเป็นไข่?", a: ["กบ", "ปลาทู", "จระเข้", "สุนัข"], c: 2, cat: "สัตว์", exp: "จระเข้เป็นสัตว์เลื้อยคลาน มีการปฏิสนธิภายในร่างกาย แต่ออกลูกเป็นไข่ที่มีเปลือกหุ้ม"},
    {q: "8. ดาวเคราะห์ดวงใดไม่มีดวงจันทร์เป็นบริวาร?", a: ["ดาวอังคาร", "ดาวเสาร์", "ดาวศุกร์", "ดาวพฤหัสบดี"], c: 2, cat: "ดาราศาสตร์", exp: "ดาวพุธและดาวศุกร์ เป็นดาวเคราะห์สองดวงในระบบสุริยะที่ไม่มีดวงจันทร์บริวาร"},
    {q: "9. ปรากฏการณ์ใดที่ยืนยันว่าแสงเดินทางเป็นเส้นตรง?", a: ["การรุ้งกินน้ำ", "การเกิดเงา", "การเห็นปลาในน้ำตื้นกว่าตัวจริง", "การมองเห็นใบไม้สีเขียว"], c: 1, cat: "ฟิสิกส์", exp: "เมื่อวัตถุทึบแสงกั้นทางเดินแสง แสงไม่สามารถอ้อมผ่านไปได้จึงเกิดพื้นที่มืดหลังวัตถุที่เรียกว่า เงา"},
    {q: "10. ความสัมพันธ์ระหว่าง 'ไลเคน' เป็นความสัมพันธ์แบบใด?", a: ["ได้ประโยชน์ร่วมกัน", "อิงอาศัย", "พึ่งพากัน", "ปรสิต"], c: 2, cat: "สิ่งแวดล้อม", exp: "ไลเคน (รากับสาหร่าย) อยู่แบบพึ่งพากัน (+/+) ซึ่งต้องอยู่ด้วยกันตลอดเวลา แยกจากกันจะตาย"},
    {q: "11. แก๊สชนิดใดที่มีปริมาณมากที่สุดในบรรยากาศโลก?", a: ["ออกซิเจน", "คาร์บอนไดออกไซด์", "ไนโตรเจน", "อาร์กอน"], c: 2, cat: "โลก", exp: "ไนโตรเจนมีปริมาณประมาณ 78% ของบรรยากาศโลกทั้งหมด"},
    {q: "12. วัตถุที่แสงผ่านได้บ้างแต่ไม่ทั้งหมด เรียกว่าอะไร?", a: ["วัตถุทึบแสง", "ตัวกลางโปร่งใส", "ตัวกลางโปร่งแสง", "ตัวกลางสะท้อนแสง"], c: 2, cat: "ฟิสิกส์", exp: "ตัวกลางโปร่งแสง ยอมให้แสงผ่านได้บางส่วน เช่น กระจกฝ้า หรือกระดาษไข"},
    {q: "13. การหมักปุ๋ยชีวภาพเป็นการเปลี่ยนแปลงประเภทใด?", a: ["กายภาพ", "เคมี", "ทางกล", "ไม่มีการเปลี่ยนแปลง"], c: 1, cat: "สาร", exp: "การหมักเกิดจากจุลินทรีย์ย่อยสลายสารอินทรีย์ทำให้เกิดสารใหม่ที่มีสมบัติเปลี่ยนไป จึงเป็นทางเคมี"},
    {q: "14. ข้อใดเป็นผู้ผลิตในโซ่อาหาร?", a: ["ตั๊กแตน", "เห็ด", "หญ้า", "นก"], c: 2, cat: "สิ่งแวดล้อม", exp: "พืชสีเขียว (หญ้า) สามารถสังเคราะห์ด้วยแสงเพื่อสร้างอาหารเองได้ จึงเป็นผู้ผลิต"},
    {q: "15. เครื่องใช้ไฟฟ้าชนิดใดเปลี่ยนพลังงานไฟฟ้าเป็นพลังงานกล?", a: ["เตารีด", "พัดลม", "หลอดไฟ", "วิทยุ"], c: 1, cat: "แรง", exp: "พัดลมมีมอเตอร์ที่เปลี่ยนกระแสไฟฟ้าให้เป็นการหมุนของใบพัด (พลังงานกล)"},
    {q: "16. ดาวฤกษ์ต่างจากดาวเคราะห์อย่างไร?", a: ["มีแสงสว่างในตัวเอง", "ขนาดเล็กกว่า", "เคลื่อนที่เร็วกว่า", "ไม่มีดวงจันทร์บริวาร"], c: 0, cat: "ดาราศาสตร์", exp: "ดาวฤกษ์ (เช่น ดวงอาทิตย์) สามารถสร้างพลังงานและมีแสงสว่างในตัวเองได้"},
    {q: "17. ส่วนประกอบใดของพืชที่ทำหน้าที่ดูดน้ำและแร่ธาตุ?", a: ["ใบ", "ขนราก", "ท่อลำเลียงอาหาร", "ปากใบ"], c: 1, cat: "พืช", exp: "ขนราก (Root hair) เพิ่มพื้นที่ผิวในการดูดซึมน้ำและแร่ธาตุจากดิน"},
    {q: "18. แรงพยุงของน้ำจะเท่ากับสิ่งใดตามหลักอาร์คิมีดีส?", a: ["ปริมาตรของวัตถุ", "น้ำหนักของวัตถุ", "น้ำหนักของน้ำที่ถูกแทนที่", "ความหนาแน่นของวัตถุ"], c: 2, cat: "แรง", exp: "แรงพยุง (Buoyancy) มีค่าเท่ากับน้ำหนักของของเหลวที่ถูกวัตถุนั้นเข้าไปแทนที่"},
    {q: "19. เอนไซม์ในน้ำลายทำหน้าที่ย่อยสารอาหารประเภทใด?", a: ["โปรตีน", "ไขมัน", "แป้ง", "วิตามิน"], c: 2, cat: "ร่างกาย", exp: "อะไมเลส (Amylase) ในน้ำลายเริ่มย่อยแป้งให้เป็นน้ำตาลโมเลกุลคู่"},
    {q: "20. ข้อใดเป็นสถานะของ 'พลาสมา' ในธรรมชาติ?", a: ["น้ำแข็งแห้ง", "น้ำเดือด", "สายฟ้า", "เมฆ"], c: 2, cat: "สาร", exp: "สายฟ้าหรือพลาสม่าคือสถานะที่แก๊สได้รับพลังงานสูงจนแตกตัวเป็นไอออน"},
    {q: "21. การระเหิดคือการเปลี่ยนสถานะจากอะไรเป็นอะไร?", a: ["ของแข็งเป็นแก๊ส", "ของเหลวเป็นแก๊ส", "แก๊สเป็นของแข็ง", "แก๊สเป็นของเหลว"], c: 0, cat: "สาร", exp: "การระเหิด (Sublimation) คือการที่ของแข็งเปลี่ยนเป็นแก๊สโดยไม่ผ่านสถานะของเหลว เช่น ลูกเหม็น"},
    {q: "22. อวัยวะใดทำหน้าที่แลกเปลี่ยนแก๊สในคน?", a: ["จมูก", "หลอดลม", "ถุงลมปอด", "หัวใจ"], c: 2, cat: "ร่างกาย", exp: "ถุงลม (Alveoli) เป็นบริเวณที่มีเส้นเลือดฝอยล้อมรอบเพื่อแลกเปลี่ยน O2 และ CO2"},
    {q: "23. การต่อถ่านไฟฉายหลายก้อนเรียงกันคือการต่อแบบใด?", a: ["แบบขนาน", "แบบอนุกรม", "แบบผสม", "แบบวงจรปิด"], c: 1, cat: "ฟิสิกส์", exp: "การต่อแบบอนุกรม (Series) ช่วยเพิ่มแรงดันไฟฟ้า (Voltage) ให้มากขึ้น"},
    {q: "24. สารใดทำหน้าที่จับพลังงานแสงในกระบวนการสังเคราะห์ด้วยแสง?", a: ["แก๊สออกซิเจน", "คลอโรฟิลล์", "แป้ง", "ไซโทพลาซึม"], c: 1, cat: "พืช", exp: "คลอโรฟิลล์เป็นสารสีเขียวที่อยู่ในคลอโรพลาสต์ ทำหน้าที่รับพลังงานแสงมาสร้างอาหาร"},
    {q: "25. สัตว์ในข้อใดมีกระดูกสันหลัง?", a: ["กุ้ง", "ปลาหมึก", "ม้าน้ำ", "ปะการัง"], c: 2, cat: "สัตว์", exp: "ม้าน้ำจัดเป็นปลากระดูกแข็งชนิดหนึ่ง จึงมีกระดูกสันหลัง"},
    {q: "26. จุดเดือดของน้ำบริสุทธิ์ที่ระดับน้ำทะเลคือเท่าใด?", a: ["0 องศาเซลเซียส", "80 องศาเซลเซียส", "100 องศาเซลเซียส", "120 องศาเซลเซียส"], c: 2, cat: "สาร", exp: "น้ำบริสุทธิ์เดือดที่ 100 องศาเซลเซียส ณ ความดันบรรยากาศปกติ"},
    {q: "27. ปรากฏการณ์เรือนกระจกเกิดจากแก๊สใดเป็นหลัก?", a: ["ไนโตรเจน", "คาร์บอนไดออกไซด์", "ออกซิเจน", "ไฮโดรเจน"], c: 1, cat: "สิ่งแวดล้อม", exp: "CO2 เป็นตัวการสำคัญที่กักเก็บความร้อนไว้ในชั้นบรรยากาศทำให้อุณหภูมิโลกสูงขึ้น"},
    {q: "28. ส่วนใดของดอกทำหน้าที่ล่อแมลง?", a: ["เกสรตัวผู้", "เกสรตัวเมีย", "กลีบเลี้ยง", "กลีบดอก"], c: 3, cat: "พืช", exp: "กลีบดอกมักมีสีสันสวยงามและมีกลิ่นหอมเพื่อดึงดูดแมลงมาช่วยผสมเกสร"},
    {q: "29. แร่ธาตุใดที่ช่วยให้กระดูกและฟันแข็งแรง?", a: ["เหล็ก", "ไอโอดีน", "แคลเซียม", "โซเดียม"], c: 2, cat: "ร่างกาย", exp: "แคลเซียมและฟอสฟอรัสเป็นองค์ประกอบหลักของเนื้อเยื่อกระดูกและฟัน"},
    {q: "30. รุ้งกินน้ำเกิดจากปรากฏการณ์ใดของแสง?", a: ["การสะท้อน", "การหักเหและการกระจาย", "การเลี้ยวเบน", "การแทรกสอด"], c: 1, cat: "ฟิสิกส์", exp: "แสงแดดผ่านละอองน้ำ เกิดการหักเหและกระจายออกเป็น 7 สี"},
    {q: "31. ข้อใดเป็นดาวเคราะห์แก๊ส?", a: ["โลก", "ดาวพุธ", "ดาวอังคาร", "ดาวพฤหัสบดี"], c: 3, cat: "ดาราศาสตร์", exp: "ดาวพฤหัสฯ เป็นดาวเคราะห์ขนาดใหญ่ที่องค์ประกอบส่วนใหญ่เป็นแก๊สไฮโดรเจนและฮีเลียม"},

let userScore = 0;
let answeredCount = 0;
let catStats = {};

function init() {
    const container = document.getElementById('quiz-form');
    quizData.forEach((data, idx) => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.innerHTML = `
            <span class="question">${data.q}</span>
            <div class="options">
                ${data.a.map((opt, i) => `<button class="btn-opt" onclick="check(${idx}, ${i}, this)">${opt}</button>`).join('')}
            </div>
            <div id="expl-${idx}" class="expl"></div>
        `;
        container.appendChild(div);
    });
}

function check(qIdx, choice, btn) {
    const data = quizData[qIdx];
    const explBox = document.getElementById(`expl-${qIdx}`);
    const btns = btn.parentElement.querySelectorAll('.btn-opt');
    
    if (explBox.style.display === 'block') return;

    btns.forEach(b => b.disabled = true);
    answeredCount++;

    if (!catStats[data.cat]) catStats[data.cat] = { total: 0, correct: 0 };
    catStats[data.cat].total++;

    if (choice === data.c) {
        userScore++;
        catStats[data.cat].correct++;
        btn.classList.add('correct-ans');
        explBox.innerHTML = `✅ ถูกต้อง! <br> ${data.exp}`;
        explBox.className = 'expl correct-ans';
    } else {
        btn.classList.add('wrong-ans');
        btns[data.c].classList.add('correct-ans');
        explBox.innerHTML = `❌ ผิดครับ... คำตอบที่ถูกคือ: ${data.a[data.c]} <br> ${data.exp}`;
        explBox.className = 'expl wrong-ans';
    }
    explBox.style.display = 'block';

    const p = (answeredCount / 50) * 100;
    document.getElementById('fill').style.width = p + '%';
    document.getElementById('progress-text').innerText = `${answeredCount} / 50`;

    if (answeredCount === 50) finish();
}

function finish() {
    document.getElementById('quiz-form').style.display = 'none';
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    document.getElementById('score-val').innerText = userScore;

    let analysis = "<strong>วิเคราะห์จุดที่ควรปรับปรุง:</strong><br><br>";
    for (let cat in catStats) {
        const pct = (catStats[cat].correct / catStats[cat].total) * 100;
        let advice = pct < 60 ? "⚠️ ต้องทบทวนด่วน!" : (pct < 80 ? "👍 พอใช้ พยายามอีกนิด" : "🌟 ยอดเยี่ยมมาก!");
        analysis += `• <b>ด้าน${cat}:</b> ทำได้ ${catStats[cat].correct}/${catStats[cat].total} (${pct.toFixed(0)}%) -> ${advice}<br>`;
    }
    document.getElementById('analysis-box').innerHTML = analysis;
    window.scrollTo(0, 0);
}

init();
</script>
