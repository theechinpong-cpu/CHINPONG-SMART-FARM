    examData.forEach((item, index) => {
        let optionsHtml = item.options.map((opt, optIdx) => `
            <button class="opt-button" id="btn-${index}-${optIdx}" onclick="recordAnswer(${index}, ${optIdx})">${opt}</button>
        `).join('');

        qContainer.innerHTML += `
            <div class="q-item">
                <p><strong>ข้อที่ ${index + 1}:</strong> ${item.q}</p>
                <div class="options-grid">${optionsHtml}</div>
                <div id="feedback-${index}" class="feedback-box"></div>
            </div>
        `;
    });

    function recordAnswer(qIdx, sIdx) {
        userAnswers[qIdx] = sIdx;
        const isCorrect = sIdx === examData[qIdx].correct;
        
        // แสดงเฉลยทันทีที่คลิก
        const feedBox = document.getElementById(`feedback-${qIdx}`);
        feedBox.style.display = 'block';
        feedBox.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
        feedBox.innerHTML = `<strong>${isCorrect ? 'ถูกต้อง!' : 'ยังไม่ถูก'}</strong>: ${examData[qIdx].exp}`;
        
        // จัดการสีของปุ่ม
        for (let i = 0; i < 4; i++) {
            document.getElementById(`btn-${qIdx}-${i}`).style.background = (i === sIdx) ? (isCorrect ? '#c3e6cb' : '#f5c6cb') : '#fff';
        }
    }

    function generateAnalysis() {
        let score = 0;
        let cats = { knowledge: 0, meaning: 0, origin: 0, app: 0, structure: 0, analysis: 0 };
        let catTotals = { knowledge: 0, meaning: 0, origin: 0, app: 0, structure: 0, analysis: 0 };

        examData.forEach((item, index) => {
            catTotals[item.cat]++;
            if (userAnswers[index] === item.correct) {
                score++;
                cats[item.cat]++;
            }
        });

        const section = document.getElementById('analysis-section');
        section.style.display = 'block';
        document.getElementById('final-score-display').innerText = `คะแนนที่คุณได้: ${score} / 30`;

        let analysisMsg = "<h3>สรุปจุดเด่นและจุดบกพร่อง:</h3><ul>";
        if (cats.meaning < catTotals.meaning) analysisMsg += "<li>⚠️ <b>ด้านความหมายมงคล:</b> คุณยังจำความหมายบาลี-ไทย สลับกันอยู่ (ทวนข้อ 5, 9, 13, 18)</li>";
        if (cats.app < catTotals.app) analysisMsg += "<li>⚠️ <b>ด้านการประยุกต์ใช้:</b> การวิเคราะห์สถานการณ์จริงยังคลาดเคลื่อน (ทวนข้อ 7, 10, 15, 17)</li>";
        if (cats.structure < catTotals.structure) analysisMsg += "<li>⚠️ <b>ด้านฉันทลักษณ์:</b> ยังจำสัดส่วนของ อินทรวิเชียรฉันท์ และ กาพย์ฉบัง ไม่แม่น (ทวนข้อ 8, 22)</li>";
        if (score >= 25) analysisMsg = "<li>🌟 <b>ผลการวิเคราะห์:</b> ยอดเยี่ยมมาก! คุณมีความเข้าใจในมงคลสูตรคำฉันท์อย่างถ่องแท้ พร้อมสอบแล้วครับ</li>";
        analysisMsg += "</ul>";

        document.getElementById('analysis-detail').innerHTML = analysisMsg;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
