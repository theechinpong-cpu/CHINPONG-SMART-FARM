<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Exam: มงคลสูตรคำฉันท์ 30 ข้อ (ครบถ้วน)</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; padding: 30px; line-height: 1.8; }
        .exam-card { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question-box { margin-bottom: 30px; padding: 20px; border-bottom: 1px solid #eee; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .opt-btn { padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; }
        .opt-btn:hover { background: #e3f2fd; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #analysis-report { display: none; margin-top: 40px; padding: 30px; background: #2c3e50; color: white; border-radius: 10px; }
        .submit-btn { width: 100%; padding: 20px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 22px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="exam-card">
    <h1 style="text-align:center; color:#1a73e8;">ข้อสอบมาตรฐาน: มงคลสูตรคำฉันท์ (30 ข้อ)</h1>
    
    <div id="quiz-area">
        </div>

    <button class="submit-btn" onclick="processAnalysis()">ส่งคำตอบและวิเคราะห์ผลการสอบ</button>

    <div id="analysis-report">
        <h2>📊 บทวิเคราะห์จุดอ่อนรายบุคคล</h2>
        <div id="score-text" style="font-size: 28px; margin-bottom: 20px;"></div>
        <div id="detail-text"></div>
    </div>
</div>

<script>
    const examData = [
        { q: "1. มงคลสูตรคำฉันท์ เป็นพระราชนิพนธ์ในรัชกาลใด?", a: "ก. รัชกาลที่ 4", b: "ข. รัชกาลที่ 5", c: "ค. รัชกาลที่ 6", d: "ง. รัชกาลที่ 7", ans: 2, exp: "รัชกาลที่ 6 (พระมหาธีรราชเจ้า) ทรงพระราชนิพนธ์ขึ้น" },
        { q: "2. มงคลในเรื่องนี้หมายถึงข้อใด?", a: "ก. สิ่งของนำโชค", b: "ข. เหตุแห่งความเจริญ", c: "ค. การสะเดาะเคราะห์", d: "ง. การอ้อนวอนเทพเจ้า", ans: 1, exp: "มงคล คือเหตุที่นำมาซึ่งความสุขและความก้าวหน้าในชีวิต" },
        { q: "3. 'เทวดาและมนุษย์เถียงกันนานกี่ปี' กว่าจะได้ข้อสรุปเรื่องมงคล?", a: "ก. 1 ปี", b: "ข. 10 ปี", c: "ค. 12 ปี", d: "ง. 20 ปี", ans: 2, exp: "เถียงกันนานถึง 12 ปี จนต้องไปถามพระพุทธเจ้า" },
        { q: "4. มงคลสูตรคำฉันท์ใช้คำประพันธ์ชนิดใดเป็นหลัก?", a: "ก. กลอน 8", b: "ข. อินทรวิเชียรฉันท์ 11", c: "ค. ร่ายสุภาพ", d: "ง. กาพย์สุรางคนางค์ 28", ans: 1, exp: "ใช้อินทรวิเชียรฉันท์ 11 สลับกับกาพย์ฉบัง 16" },
        { q: "5. 'อเสวนา จ พาลานํ' คือมงคลข้อใด?", a: "ก. การไม่คบคนพาล", b: "ข. การคบบัณฑิต", c: "ค. การตั้งตนไว้ชอบ", d: "ง. การมีศิลปะ", ans: 0, exp: "หมายถึงการหลีกเลี่ยงคนพาลที่เป็นปัจจัยพาไปทางเสื่อม" },
        { q: "6. 'การอยู่ในถิ่นที่สมควร' (ปฏิรูปเทสวาส) หมายถึงที่ใด?", a: "ก. บ้านเกิด", b: "ข. ที่ที่มีคนรวยเยอะ", c: "ค. ที่ที่มีสิ่งแวดล้อมเอื้อต่อความดี", d: "ง. เมืองนอก", ans: 2, exp: "ที่ที่เหมาะสมกับการประกอบอาชีพและปฏิบัติธรรม" },
        { q: "7. มงคลข้อใดสอนเรื่องการมีวิชาชีพติดตัว?", a: "ก. การเป็นพหูสูต", b: "ข. การมีศิลปวิทยา", c: "ค. การมีวินัย", d: "ง. การกตัญญู", ans: 1, exp: "สิปฺปญฺจ (ศิลปวิทยา) คือความชำนาญในวิชาชีพ" },
        { q: "8. 'ความเป็นพหูสูต' เกิดจากพฤติกรรมใด?", a: "ก. การพูดเก่ง", b: "ข. การฟังและศึกษามาก", c: "ค. การทำงานหนัก", d: "ง. การมีหน้าตาสวยงาม", ans: 1, exp: "พหูสูตคือผู้ที่ได้เรียนรู้และฟังมามาก" },
        { q: "9. 'มาตาปิตุอุปัฏฐานัง' คือมงคลเรื่องใด?", a: "ก. การเลี้ยงดูบุตร", b: "ข. การเลี้ยงดูภรรยา", c: "ค. การบำรุงบิดามารดา", d: "ง. การช่วยญาติ", ans: 2, exp: "การตอบแทนพระคุณพ่อแม่เป็นมงคลที่สูงสุดประการหนึ่ง" },
        { q: "10. ข้อใดคือลักษณะของ 'วาจาสุภาษิต'?", a: "ก. พูดตลก", b: "ข. พูดเรื่องจริง มีประโยชน์ และถูกกาลเทศะ", c: "ค. พูดเอาใจเจ้านาย", d: "ง. พูดคำศัพท์ยากๆ", ans: 1, exp: "ต้องประกอบด้วย ธรรมะ ความจริง และกาลเทศะ" },
        { q: "11. 'วินโย จ สุสิกฺขิโต' เน้นเรื่องใด?", a: "ก. ความเก่ง", b: "ข. ความรวย", c: "ค. ความมีระเบียบวินัย", d: "ง. ความกล้าหาญ", ans: 2, exp: "เน้นการมีวินัยที่ได้รับการฝึกฝนมาอย่างดี" },
        { q: "12. 'อตฺตสมฺมาปณิธิ' คือข้อใด?", a: "ก. การตั้งตนไว้ชอบ", b: "ข. การให้ทาน", c: "ค. การประพฤติธรรม", d: "ง. การทำงานไม่ค้าง", ans: 0, exp: "คือการตั้งเป้าหมายชีวิตในทางที่ถูกต้อง" },
        { q: "13. การที่พนักงาน 'ไม่ทิ้งงานให้คั่งค้าง' ตรงกับมงคลข้อใด?", a: "ก. สัจจะ", b: "ข. อนากุลา จ กมฺมนฺตา", c: "ค. ทานํ", d: "ง. ขันติ", ans: 1, exp: "การทำงานไม่ให้ค้างคาคือทางแห่งความเจริญ" },
        { q: "14. นามปากกาของ ร.6 ที่ใช้แต่งเรื่องนี้คือ?", a: "ก. อัศวพาหุ", b: "ข. นายแก้วนายขวัญ", c: "ค. รามจิตติ", d: "ง. พระขรรค์เพชร", ans: 2, exp: "ทรงใช้ 'รามจิตติ' ในผลงานวรรณคดีส่วนใหญ่" },
        { q: "15. 'การสงเคราะห์บุตร' หมายถึงหน้าที่ของใคร?", a: "ก. ครู", b: "ข. พ่อแม่", c: "ค. รัฐบาล", d: "ง. ตัวบุตรเอง", ans: 1, exp: "ปุตตสังคหะ เป็นมงคลของพ่อแม่ที่พึงปฏิบัติต่อลูก" },
        { q: "16. มงคลสูตรคำฉันท์สอนให้คนไทยเลิกเชื่อเรื่องใด?", a: "ก. เรื่องโชคลางและการอ้อนวอน", b: "ข. เรื่องนรกสวรรค์", c: "ค. เรื่องการทำความดี", d: "ง. เรื่องการศึกษา", ans: 0, exp: "สอนให้เชื่อใน 'กรรม' หรือการกระทำมากกว่าโชคลาภ" },
        { q: "17. 'ทิฏเฐ มงคล' (มงคลจากการเห็น) เป็นความเชื่อดั้งเดิมของใคร?", a: "ก. พระพุทธเจ้า", b: "ข. พราหมณ์และชาวอินเดียยุคนั้น", c: "ค. พระสงฆ์", d: "ง. รัชกาลที่ 6", ans: 1, exp: "เป็นความเชื่อเก่าที่พระพุทธเจ้ามาแก้ให้ถูกต้อง" },
        { q: "18. ในตอนท้ายของเรื่อง ผู้ที่ทำตามมงคลจะได้ผลอย่างไร?", a: "ก. มีชื่อเสียง", b: "ข. ไม่พ่ายแพ้ในที่ทุกสถาน", c: "ค. รวยมหาศาล", d: "ง. มีอายุยืนยาว", ans: 1, exp: "ย่อมประสบความสำเร็จและไม่พ่ายแพ้ต่ออุปสรรค" },
        { q: "19. มงคล 38 ประการเริ่มจากข้อใด?", a: "ก. การให้ทาน", b: "ข. การไม่คบคนพาล", c: "ค. การมีความอดทน", d: "ง. การมีจิตไม่หวั่นไหว", ans: 1, exp: "เริ่มจากพื้นฐานสังคมคือการเลือกคบคน" },
        { q: "20. ข้อใดคือเป้าหมายสูงสุดของมงคลสูตร?", a: "ก. การไปเกิดบนสวรรค์", b: "ข. การมีอำนาจบารมี", c: "ค. ความสงบสุขของจิตใจและความเจริญของสังคม", d: "ง. การเป็นคนรวย", ans: 2, exp: "เน้นความสงบสุขทั้งตนเองและส่วนรวม" },
        { q: "21. 'สิปฺปญฺจ' แปลว่าอะไร?", a: "ก. ปัญญา", b: "ข. ศิลปวิทยา", c: "ค. วาจา", d: "ง. วินัย", ans: 1, exp: "แปลว่าความชำนาญในงานศิลปะหรืองานช่าง" },
        { q: "22. บทประพันธ์ 'อินทรวิเชียรฉันท์ 11' วรรคหน้ามีกี่คำ?", a: "ก. 5 คำ", b: "ข. 6 คำ", c: "ค. 11 คำ", d: "ง. 16 คำ", ans: 0, exp: "หน้า 5 หลัง 6 รวมเป็น 11" },
        { q: "23. การที่นักเรียน 'ไม่ลอกข้อสอบเพื่อน' ตรงกับมงคลใด?", a: "ก. การมีวินัย", b: "ข. การตั้งตนไว้ชอบ", c: "ค. การประพฤติธรรม", d: "ง. ถูกทุกข้อ", ans: 3, exp: "สะท้อนถึงวินัย ความชอบธรรม และการประพฤติดี" },
        { q: "24. 'ปูชา จ ปูชนียานํ' ใครคือบุคคลที่ควรบูชา?", a: "ก. พ่อแม่", b: "ข. ครู", c: "ค. พระพุทธเจ้า", d: "ง. ถูกทุกข้อ", ans: 3, exp: "ผู้มีคุณธรรมและผู้มีพระคุณล้วนควรบูชา" },
        { q: "25. มงคลใดช่วยให้ชีวิต 'มั่นคง' ในเวลาเจอวิกฤต?", a: "ก. การให้ทาน", b: "ข. การมีจิตไม่หวั่นไหวต่อโลกธรรม", c: "ค. การคบบัณฑิต", d: "ง. การอยู่ในถิ่นที่เหมาะ", ans: 1, exp: "โลกธรรม 8 คือ สุข ทุกข์ ลาภ ยศ จิตต้องมั่นคง" },
        { q: "26. ข้อใดเป็นมงคลที่เน้น 'การเสียสละ'?", a: "ก. ทานํ (การให้)", b: "ข. ขันติ (ความอดทน)", c: "ค. สัจจะ (ความจริง)", d: "ง. ปัญญา", ans: 0, exp: "ทานํ คือการให้เพื่อลดความตระหนี่และช่วยเหลือผู้อื่น" },
        { q: "27. วรรณคดีเรื่องนี้แต่งขึ้น ณ สถานที่ใด?", a: "ก. พระราชวังบางปะอิน", b: "ข. พระราชวังพญาไท", c: "ค. วังสวนจิตรลดา", d: "ง. พระบรมมหาราชวัง", ans: 1, exp: "ทรงพระราชนิพนธ์ที่พระราชวังพญาไท" },
        { q: "28. 'ปุพเพ จ กตปุญญตา' หมายถึงอะไร?", a: "ก. การทำบุญไว้วันนี้", b: "ข. การมีบุญวาสนามาแต่ก่อน", c: "ค. การอธิษฐานขอพร", d: "ง. การไปวัดบ่อยๆ", ans: 1, exp: "คือการสั่งสมความดีมาตั้งแต่อดีตส่งผลให้ปัจจุบันดี" },
        { q: "29. มงคลที่เกี่ยวกับ 'ญาติพี่น้อง' คือข้อใด?", a: "ก. ปุตตสังคหะ", b: "ข. ญาตกานัญจะ สังคโห", c: "ค. ทารสังคหะ", d: "ง. อเสวนา", ans: 1, exp: "การสงเคราะห์ญาติพี่น้องให้มีความสุข" },
        { q: "30. ใจความสำคัญที่สุดของเรื่องนี้คืออะไร?", a: "ก. ความประมาทเป็นหนทางแห่งความตาย", b: "ข. การทำดีได้ดี ทำชั่วได้ชั่ว", c: "ค. ความสุขความเจริญเกิดจากการปฏิบัติของตนเอง", d: "ง. การเคารพผู้ใหญ่", ans: 2, exp: "นี่คือแก่นของมงคล 38 ประการ: ตัวเราคือผู้กำหนดมงคล" }
    ];

    const quizArea = document.getElementById('quiz-area');
    let userAnswers = new Array(30).fill(null);

    // Render ทั้ง 30 ข้อในครั้งเดียว
    examData.forEach((item, idx) => {
        quizArea.innerHTML += `
            <div class="question-box">
                <p><strong>ข้อที่ ${idx+1}:</strong> ${item.q}</p>
                <div class="options">
                    <button class="opt-btn" onclick="checkAnswer(${idx}, 0, this)">${item.a}</button>
                    <button class="opt-btn" onclick="checkAnswer(${idx}, 1, this)">${item.b}</button>
                    <button class="opt-btn" onclick="checkAnswer(${idx}, 2, this)">${item.c}</button>
                    <button class="opt-btn" onclick="checkAnswer(${idx}, 3, this)">${item.d}</button>
                </div>
                <div id="exp-${idx}" class="explanation"></div>
            </div>
        `;
    });

    function checkAnswer(qIdx, sIdx, btn) {
        userAnswers[qIdx] = sIdx;
        const isCorrect = sIdx === examData[qIdx].ans;
        const expBox = document.getElementById(`exp-${qIdx}`);
        
        // Reset ปุ่มในแถวเดียวกัน
        const parent = btn.parentElement;
        Array.from(parent.children).forEach(b => b.style.background = "#fff");
        
        btn.style.background = isCorrect ? "#c3e6cb" : "#f5c6cb";
        expBox.style.display = "block";
        expBox.className = "explanation " + (isCorrect ? "correct" : "wrong");
        expBox.innerHTML = `<strong>${isCorrect ? 'ถูกต้อง!' : 'ผิดครับ'}</strong> เฉลย: ${examData[qIdx].exp}`;
    }

    function processAnalysis() {
        let score = 0;
        userAnswers.forEach((ans, i) => { if(ans === examData[i].ans) score++; });

        document.getElementById('analysis-report').style.display = "block";
        document.getElementById('score-text').innerText = `สรุปคะแนน: ${score} / 30`;

        let analysis = "<strong>บทวิเคราะห์:</strong><br>";
        if(score < 15) analysis += "- คุณควรกลับไปทวนความหมายของ <b>มงคลแต่ละข้อ</b> อย่างละเอียดครับ<br>";
        if(score >= 15 && score < 25) analysis += "- คุณมีความเข้าใจพื้นฐานดีแล้ว แต่ยังพลาดในส่วนของ <b>การวิเคราะห์สถานการณ์</b> และ <b>คำประพันธ์</b><br>";
        if(score >= 25) analysis += "- ยอดเยี่ยม! คุณแม่นยำทั้งเนื้อหาและบริบท พร้อมสอบปลายภาคแล้วครับ<br>";
        
        document.getElementById('detail-text').innerHTML = analysis;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
