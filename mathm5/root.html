<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Root Mastery Lab</title>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            startup: { ready() { MathJax.startup.defaultReady(); } }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Sarabun:wght@300;400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'Sarabun', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            overflow: hidden;
            line-height: 1.6;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* ─── LEFT: Quiz panel ─── */
        .quiz-frame {
            flex: 0 0 70%;
            height: 100%;
            overflow-y: auto;
            padding: 36px 44px;
            background: #0d1117;
            border-right: 1px solid #21262d;
            scrollbar-width: thin;
            scrollbar-color: #30363d #0d1117;
        }
        .quiz-frame::-webkit-scrollbar { width: 6px; }
        .quiz-frame::-webkit-scrollbar-track { background: #0d1117; }
        .quiz-frame::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #21262d;
        }
        .header-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #f0883e, #e3b341);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .header-text h1 {
            font-family: 'Kanit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, #f0883e, #e3b341);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-text p {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 2px;
        }

        /* Progress bar */
        .progress-bar-wrap {
            background: #21262d;
            border-radius: 99px;
            height: 6px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f0883e, #e3b341);
            border-radius: 99px;
            transition: width 0.5s ease;
        }
        .progress-text {
            font-size: 0.8rem;
            color: #8b949e;
            text-align: right;
            margin-top: 4px;
            margin-bottom: 20px;
        }

        /* Question card */
        .question-card {
            background: #161b22;
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 24px;
            border: 1px solid #21262d;
            border-left: 4px solid #f0883e;
            transition: border-color 0.2s;
        }
        .question-card.answered { border-left-color: #3fb950; }

        .concept-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(240, 136, 62, 0.12);
            color: #f0883e;
            border: 1px solid rgba(240, 136, 62, 0.25);
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .q-number {
            font-size: 0.75rem;
            color: #8b949e;
            margin-bottom: 6px;
            font-family: 'Kanit', sans-serif;
        }
        .q-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 16px;
            line-height: 1.55;
        }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option {
            background: #0d1117;
            padding: 13px 16px;
            border-radius: 10px;
            border: 1px solid #30363d;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.18s;
            color: #c9d1d9;
        }
        .option:hover:not(.correct):not(.wrong) {
            background: rgba(240, 136, 62, 0.08);
            border-color: #f0883e;
            color: #f0883e;
        }
        .option.selected { border-color: #e3b341; background: rgba(227, 179, 65, 0.1); color: #e3b341; }
        .option.correct  { border-color: #3fb950; background: rgba(63, 185, 80, 0.12); color: #3fb950; font-weight: 600; }
        .option.wrong    { border-color: #f85149; background: rgba(248, 81, 73, 0.1);  color: #f85149; text-decoration: line-through; }

        /* Solution box */
        .solution-box {
            display: none;
            background: #0d1117;
            padding: 16px 20px;
            border-radius: 10px;
            margin-top: 16px;
            border: 1px dashed #30363d;
            font-size: 0.9rem;
            line-height: 1.8;
        }
        .solution-box .label-ans  { color: #58a6ff; font-weight: 600; }
        .solution-box .label-how  { color: #e3b341; font-weight: 600; }
        .solution-box .label-note { color: #8b949e; font-size: 0.82rem; }

        /* Score summary */
        .score-box {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .score-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f0883e, #e3b341);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .score-circle span { font-family: 'Kanit', sans-serif; font-size: 1.5rem; font-weight: 700; color: #0d1117; line-height: 1; }
        .score-circle small { font-size: 0.65rem; color: rgba(13,17,23,0.7); }
        .score-info h3 { font-family: 'Kanit', sans-serif; font-size: 1.1rem; color: #e6edf3; }
        .score-info p  { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }

        /* ─── RIGHT: Whiteboard ─── */
        .whiteboard-frame {
            flex: 0 0 30%;
            height: 100%;
            padding: 20px;
            background: #ffffff;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .wb-header {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            flex-shrink: 0;
        }
        .wb-dot { width: 10px; height: 10px; border-radius: 50%; background: #f0883e; }

        /* Color picker */
        .color-row {
            display: flex; gap: 8px; align-items: center; flex-shrink: 0;
        }
        .color-btn {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.15s;
            flex-shrink: 0;
        }
        .color-btn.active { border-color: #1e293b; transform: scale(1.15); }
        .size-slider { flex: 1; accent-color: #f0883e; }

        canvas {
            flex: 1;
            min-height: 0;
            display: block;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            cursor: crosshair;
            touch-action: none;
        }

        .btn-row { display: flex; gap: 8px; flex-shrink: 0; }
        .btn {
            flex: 1; padding: 10px 0;
            border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.9rem;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-clear { background: #fee2e2; color: #dc2626; }
        .btn-save  { background: #dcfce7; color: #16a34a; }
        .btn-undo  { background: #f1f5f9; color: #475569; }

        /* Hint box (guideline before answering) */
        .hint-box {
            background: rgba(88, 166, 255, 0.07);
            border: 1px solid rgba(88, 166, 255, 0.22);
            border-left: 3px solid #58a6ff;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: #a8c7fa;
            line-height: 1.6;
        }
        .hint-label {
            font-weight: 700;
            color: #58a6ff;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            display: block;
            margin-bottom: 3px;
        }

        /* Trick chip inside solution */
        .trick-box {
            margin-top: 12px;
            background: rgba(227, 179, 65, 0.09);
            border: 1px solid rgba(227, 179, 65, 0.28);
            border-left: 3px solid #e3b341;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #f0c060;
            line-height: 1.65;
        }
        .trick-label {
            font-weight: 700;
            color: #e3b341;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            display: block;
            margin-bottom: 3px;
        }

        /* Scroll reveal anim */
        .question-card { animation: fadeUp 0.3s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- ─── Quiz Panel ─── -->
    <div class="quiz-frame">
        <div class="header">
            <div class="header-icon">√</div>
            <div class="header-text">
                <h1>Square Root Mastery Lab</h1>
                <p>รากที่สอง (Square Root) • ม.2 • 30 ข้อ พร้อมเฉลยอย่างละเอียด</p>
            </div>
        </div>

        <div class="score-box" id="scoreBox" style="display:none;">
            <div class="score-circle">
                <span id="scoreNum">0</span>
                <small>/ 30</small>
            </div>
            <div class="score-info">
                <h3 id="scoreMsg">ยอดเยี่ยม!</h3>
                <p id="scoreDetail">ทำข้อสอบเสร็จแล้ว ตรวจสอบเฉลยด้านล่างได้เลย</p>
            </div>
        </div>

        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">ตอบแล้ว 0 / 30 ข้อ</div>

        <div id="quiz-container">
            <p style="color:#8b949e;">กำลังโหลดข้อสอบ...</p>
        </div>
    </div>

    <!-- ─── Whiteboard ─── -->
    <div class="whiteboard-frame">
        <div class="wb-header">
            <div class="wb-dot"></div>
            ไวท์บอร์ดทดเลข
        </div>

        <div class="color-row">
            <div class="color-btn active" style="background:#1e293b;" data-color="#1e293b" onclick="setColor(this)"></div>
            <div class="color-btn" style="background:#dc2626;" data-color="#dc2626" onclick="setColor(this)"></div>
            <div class="color-btn" style="background:#2563eb;" data-color="#2563eb" onclick="setColor(this)"></div>
            <div class="color-btn" style="background:#16a34a;" data-color="#16a34a" onclick="setColor(this)"></div>
            <div class="color-btn" style="background:#f0883e;" data-color="#f0883e" onclick="setColor(this)"></div>
            <input type="range" min="1" max="12" value="3" class="size-slider" id="brushSize" oninput="setBrushSize(this.value)">
        </div>

        <canvas id="mainCanvas"></canvas>

        <div class="btn-row">
            <button class="btn btn-undo"  onclick="undoCanvas()">↩ ย้อนกลับ</button>
            <button class="btn btn-clear" onclick="clearCanvas()">✕ ล้าง</button>
            <button class="btn btn-save"  onclick="downloadCanvas()">↓ บันทึก</button>
        </div>
    </div>
</div>

<script>
const quizData = [
  {
    id:1, concept:"นิยามพื้นฐาน",
    question:"√25 มีค่าเท่าใด?",
    hint:"💭 ถามตัวเองว่า: มีจำนวนบวกอะไรที่คูณตัวเองแล้วได้ 25? ลองนึก: 4×4=16, 5×5=?, 6×6=36",
    options:["3","4","5","6"],
    answer:3, ansText:"5",
    detail:"$\\sqrt{25} = 5$ เพราะ $5 \\times 5 = 25$ และรากที่สองหลักคือ \"ค่าบวก\" เสมอ",
    trick:"⚡ จำตาราง Perfect Square ให้ขึ้นใจ: $1,4,9,16,\\mathbf{25},36,49,64,81,100$ — เห็น 25 ตอบ 5 ทันที ไม่ต้องคิด"
  },
  {
    id:2, concept:"นิยามพื้นฐาน",
    question:"รากที่สองหลัก (Principal Square Root) ของ 49 คือข้อใด?",
    hint:"💭 สังเกตคำว่า \"หลัก\" (Principal) — นิยามนี้บอกให้เลือกค่า +/− ข้างไหน? และ 14 = 2×7 ≠ √49 ให้ตัดออก",
    options:["−7","7","±7","14"],
    answer:2, ansText:"7",
    detail:"$\\sqrt{49} = 7$ สัญลักษณ์ $\\sqrt{\\phantom{x}}$ หมายถึง \"รากที่สองหลัก\" ซึ่งนิยามให้เป็นค่าบวกเสมอ (−7 เป็นรากที่สองอีกค่า แต่ไม่ใช่ค่าหลัก)",
    trick:"⚡ กฎง่ายๆ: ถ้าโจทย์เขียน $\\sqrt{\\phantom{x}}$ (มีสัญลักษณ์รูท) = ค่าบวกเท่านั้น ถ้าโจทย์เขียน $x^2 = 49$ = มีสองคำตอบ $\\pm 7$"
  },
  {
    id:3, concept:"นิยามพื้นฐาน",
    question:"ข้อใดคือนิยามของ $\\sqrt{x}$ ที่ถูกต้อง?",
    hint:"💭 คำว่า 'สแควรูท' มาจาก Square (กำลังสอง) + Root (ราก) = การถอยกลับจากการยกกำลังสอง ลองนึกว่า 'รูท' ทำ 'ทางกลับ' ของอะไร?",
    options:["จำนวนที่บวกกับตัวเองแล้วได้ x","จำนวนที่คูณตัวเองแล้วได้ x","ครึ่งหนึ่งของ x","x หารด้วย 2"],
    answer:2, ansText:"จำนวนที่คูณตัวเองแล้วได้ x",
    detail:"นิยามอย่างเป็นทางการ: $\\sqrt{x} = a$ เมื่อ $a \\geq 0$ และ $a^2 = x$ นั่นคือ $a$ คือจำนวนที่ 'คูณตัวเอง' แล้วได้ $x$ ข้อ 1 ผิดเพราะบวกไม่ใช่คูณ ข้อ 3-4 ผิดเพราะหาร/ครึ่งหนึ่งไม่ใช่กระบวนการรูท",
    trick:"⚡ จำสั้น: $\\sqrt{x}$ = \"กลับจากการยกกำลัง 2\" เช่น $5^2=25 \\Rightarrow \\sqrt{25}=5$ คิดย้อนทิศเสมอ"
  },
  {
    id:4, concept:"Perfect Square",
    question:"จำนวนใดต่อไปนี้ถอดรากได้ลงตัว?",
    hint:"💭 'ถอดรากลงตัว' = ผลลัพธ์เป็นจำนวนเต็ม ลองถามว่าแต่ละตัวเลือกมีจำนวนเต็มที่ยกกำลังสองแล้วได้พอดีไหม? ลอง 36 = 6×6",
    options:["√2","√7","√36","√15"],
    answer:3, ansText:"√36",
    detail:"$\\sqrt{36} = 6$ เพราะ $6^2 = 36$ — 36 เป็น Perfect Square ส่วน $\\sqrt{2}\\approx1.41$, $\\sqrt{7}\\approx2.65$, $\\sqrt{15}\\approx3.87$ ล้วนได้ทศนิยมไม่รู้จบ",
    trick:"⚡ จำตาราง Perfect Square 1–15: $1,4,9,16,25,36,49,64,81,100,121,144,169,196,225$ — ตัวไหนอยู่ในตาราง = ถอดลงตัว"
  },
  {
    id:5, concept:"Perfect Square",
    question:"ข้อใดไม่ใช่กำลังสองสมบูรณ์ (Perfect Square)?",
    hint:"💭 ลองหาว่าแต่ละตัวเลข = (จำนวนเต็ม)² ได้ไหม: 16=4², 25=5², 81=9² แล้ว 50 ล่ะ?",
    options:["16","25","50","81"],
    answer:3, ansText:"50",
    detail:"$\\sqrt{50} = \\sqrt{25\\times2} = 5\\sqrt{2} \\approx 7.07...$ ไม่ลงตัว เพราะ 50 ไม่ใช่กำลังสองของจำนวนเต็มใดๆ ส่วน $16=4^2$, $25=5^2$, $81=9^2$ ล้วนถอดได้",
    trick:"⚡ วิธีเช็คเร็ว: แยกตัวประกอบ 50 = 2 × 5² — มีเลข 2 ที่ยกกำลังเป็นคี่ (2¹) หมายความว่าถอดไม่หมด ถ้ากำลังทุกตัวประกอบเป็นคู่ = Perfect Square"
  },
  {
    id:6, concept:"การคำนวณ",
    question:"$\\sqrt{144}$ มีค่าเท่าใด?",
    hint:"💭 ลองไล่ตัวเลือก: 11²=121, 12²=?, 13²=169 — ค่าไหนตรงกับ 144?",
    options:["11","12","13","14"],
    answer:2, ansText:"12",
    detail:"$12 \\times 12 = 144$ ดังนั้น $\\sqrt{144} = 12$ (สังเกต: 144 = 12² อยู่ในตาราง Perfect Square)",
    trick:"⚡ จำ 12² = 144 ไว้เลย — ออกข้อสอบบ่อยมาก เพราะเป็นโจ๊กเกอร์ที่หลายคนสับสนกับ 11²=121 และ 13²=169"
  },
  {
    id:7, concept:"การคำนวณ",
    question:"$\\sqrt{0.04}$ มีค่าเท่าใด?",
    hint:"💭 เปลี่ยนทศนิยมเป็นเศษส่วนก่อน: 0.04 = 4/100 จากนั้นถอดรากเศษและส่วนแยกกัน",
    options:["0.002","0.02","0.2","2"],
    answer:3, ansText:"0.2",
    detail:"$\\sqrt{0.04} = \\sqrt{\\dfrac{4}{100}} = \\dfrac{\\sqrt{4}}{\\sqrt{100}} = \\dfrac{2}{10} = 0.2$",
    trick:"⚡ ทริกทศนิยม: จำนวนทศนิยมตัวที่ถอดราก จำนวนตำแหน่งทศนิยมจะ 'ลดครึ่งหนึ่ง' เสมอ เช่น 0.04 (2 ตำแหน่ง) → 0.2 (1 ตำแหน่ง)"
  },
  {
    id:8, concept:"การคำนวณ",
    question:"$\\sqrt{\\dfrac{9}{16}}$ มีค่าเท่าใด?",
    hint:"💭 สมบัติ: $\\sqrt{\\frac{a}{b}} = \\frac{\\sqrt{a}}{\\sqrt{b}}$ — ถอดรากเศษและส่วนแยกกันได้เลย ทั้ง 9 และ 16 เป็น Perfect Square",
    options:["$\\dfrac{1}{2}$","$\\dfrac{3}{4}$","$\\dfrac{3}{8}$","$\\dfrac{9}{4}$"],
    answer:2, ansText:"3/4",
    detail:"$\\sqrt{\\dfrac{9}{16}} = \\dfrac{\\sqrt{9}}{\\sqrt{16}} = \\dfrac{3}{4}$ — ถอดรากเศษส่วนแยกกัน ข้อ 3 ผิดเพราะ 8 ≠ √16 ข้อ 4 ผิดเพราะนำ 9 มาหาร 4 แทน",
    trick:"⚡ เศษส่วนใต้รูท: ถ้าทั้งเศษและส่วนเป็น Perfect Square → ถอดรากแยกทันที ไม่ต้องแปลงเป็นทศนิยม"
  },
  {
    id:9, concept:"ลดรูปรูท",
    question:"$\\sqrt{12}$ เขียนในรูปอย่างต่ำได้เป็น?",
    hint:"💭 หาตัวประกอบที่เป็น Perfect Square ของ 12: 12 = 4 × 3 หรือ 12 = 2 × 6 ตัวไหนมี Perfect Square?",
    options:["$2\\sqrt{3}$","$3\\sqrt{2}$","$4\\sqrt{3}$","$6\\sqrt{2}$"],
    answer:1, ansText:"2√3",

let answered = 0;
let score = 0;

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = quizData.map((q, qi) => `
        <div class="question-card" id="card-${q.id}" style="animation-delay:${qi * 0.04}s">
            <div class="q-number">ข้อ ${q.id} จาก 30</div>
            <span class="concept-tag">⚡ ${q.concept}</span>
            <div class="q-text">${q.question}</div>
            <div class="options-grid">
                ${q.options.map((opt, i) => `
                    <div class="option" id="opt-${q.id}-${i+1}" onclick="checkAnswer(${q.id}, ${i+1})">${i+1}. ${opt}</div>
                `).join('')}
            </div>
            <div id="sol-${q.id}" class="solution-box"></div>
        </div>
    `).join('');

    if (window.MathJax) MathJax.typesetPromise();
}

function checkAnswer(qId, chosen) {
    const q = quizData.find(x => x.id === qId);
    const card = document.getElementById(`card-${qId}`);
    if (card.classList.contains('answered')) return;

    card.classList.add('answered');
    answered++;

    const correct = q.answer;
    for (let i = 1; i <= 4; i++) {
        const el = document.getElementById(`opt-${qId}-${i}`);
        if (i === correct) el.classList.add('correct');
        else if (i === chosen) el.classList.add('wrong');
    }

    if (chosen === correct) score++;

    const sol = document.getElementById(`sol-${qId}`);
    sol.innerHTML = `
        <span class="label-ans">✔ เฉลย:</span> ${q.ansText}<br>
        <span class="label-how">📐 วิธีทำ:</span> ${q.detail}
        ${q.note ? `<br><span class="label-note">💡 ${q.note}</span>` : ''}
    `;
    sol.style.display = 'block';

    updateProgress();
    if (window.MathJax) MathJax.typesetPromise([sol]);

    if (answered === 30) showScore();
}

function updateProgress() {
    const pct = (answered / 30) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `ตอบแล้ว ${answered} / 30 ข้อ`;
}

function showScore() {
    const box = document.getElementById('scoreBox');
    box.style.display = 'flex';
    document.getElementById('scoreNum').textContent = score;
    const pct = Math.round((score / 30) * 100);
    let msg = pct >= 80 ? '🏆 ยอดเยี่ยมมาก!' : pct >= 60 ? '👍 ดีมาก ฝึกต่อไป!' : '💪 ทบทวนแล้วลองใหม่!';
    document.getElementById('scoreMsg').textContent = msg;
    document.getElementById('scoreDetail').textContent = `คะแนน ${score}/30 (${pct}%) — ตรวจเฉลยในแต่ละข้อด้านล่าง`;
    box.scrollIntoView({ behavior: 'smooth' });
}

// ─── Canvas / Whiteboard ───────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
let isDrawing = false;
let currentColor = '#1e293b';
let brushSize = 3;
let snapshots = [];

function initCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.lineWidth   = brushSize;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.strokeStyle = currentColor;
}

function setColor(btn) {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
    ctx.strokeStyle = currentColor;
}

function setBrushSize(val) {
    brushSize = val;
    ctx.lineWidth = val;
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) * (canvas.width  / rect.width),
        y: (src.clientY - rect.top)  * (canvas.height / rect.height)
    };
}

function startDrawing(e) {
    snapshots.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    if (snapshots.length > 30) snapshots.shift();
    isDrawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
}

function draw(e) {
    if (!isDrawing) return;
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
}

function stopDrawing() { isDrawing = false; }

function undoCanvas() {
    if (snapshots.length === 0) return;
    ctx.putImageData(snapshots.pop(), 0, 0);
}

function clearCanvas() {
    snapshots.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function downloadCanvas() {
    const link    = document.createElement('a');
    link.download = 'sqrt-note.png';
    link.href     = canvas.toDataURL();
    link.click();
}

canvas.addEventListener('mousedown',  startDrawing);
canvas.addEventListener('mousemove',  draw);
window.addEventListener('mouseup',    stopDrawing);
canvas.addEventListener('touchstart', e => { startDrawing(e); e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove',  e => { draw(e);         e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend',   stopDrawing);

window.addEventListener('load', () => {
    renderQuiz();
    initCanvas();
    window.addEventListener('resize', initCanvas);
});
</script>
