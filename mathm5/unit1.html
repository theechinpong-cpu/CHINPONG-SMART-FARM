<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสอบและกระดานอัจฉริยะ - พระจอมเกล้าติวเตอร์</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #ecf0f1; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Sarabun', sans-serif; }
        
        /* Layout Layout */
        .wrapper { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 4px; }
        
        /* Left Frame: Quiz */
        .quiz-frame {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            background: #fff;
            padding: 30px;
            border-right: 5px solid #bdc3c7;
            box-sizing: border-box;
        }

        /* Right Frame: Whiteboard */
        .board-frame {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #2f3640;
            position: relative;
        }

        /* Whiteboard Toolbar */
        .toolbar {
            background: #353b48;
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 2px solid #191c20;
        }
        .tool {
            padding: 8px 12px;
            background: #f5f6fa;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .tool:hover { background: var(--accent); color: white; }
        .tool.active { background: var(--accent); color: white; }

        canvas { flex: 1; cursor: crosshair; background: white; margin: 10px; border-radius: 8px; }

        /* Quiz Styling */
        .question-card { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .guide { display: block; background: #f1f2f6; padding: 8px; border-radius: 4px; font-size: 0.85em; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .opt-btn { padding: 10px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; text-align: left; }
        .opt-btn:hover { border-color: var(--accent); }
        .explanation { display: none; margin-top: 10px; padding: 10px; border-radius: 4px; background: #dff9fb; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Left: Quiz Area -->
    <div class="quiz-frame">
        <header style="text-align:center; border-bottom: 2px solid var(--accent); margin-bottom: 20px;">
            <h2>📝 แบบทดสอบ 50 ข้อ: การวัดมุม</h2>
            <p>โดย <strong>พระจอมเกล้าติวเตอร์</strong></p>
        </header>
        
        <div id="quiz-list"></div>

        <div style="padding: 20px; background: var(--primary); color: white; text-align: center; border-radius: 8px;">
            <h3>สรุปคะแนน: <span id="score">0</span> / 50</h3>
            <button onclick="location.reload()" style="padding: 10px; background: var(--accent); border:none; color:white; cursor:pointer;">เริ่มใหม่</button>
        </div>
    </div>

    <!-- Right: Professional Whiteboard -->
    <div class="board-frame">
        <div class="toolbar">
            <button class="tool active" onclick="setTool('pen')">🖌️ ปากกา</button>
            <button class="tool" onclick="setTool('eraser')">🧽 ยางลบ</button>
            <input type="color" id="colorPicker" value="#000000" onchange="setColor(this.value)">
            <input type="range" id="sizePicker" min="1" max="20" value="3" onchange="setSize(this.value)">
            <button class="tool" onclick="clearBoard()" style="background:#e84118; color:white;">🗑️ ล้างกระดาน</button>
            <span style="color:white; margin-left:auto; font-size:12px;">พื้นที่ทดเลขสำหรับนักเรียน</span>
        </div>
        <canvas id="whiteboard"></canvas>
    </div>
</div>

<script>
    // --- QUIZ LOGIC ---
    const quizData = [
        { g: "ชีวิตจริง: การตั้งขาตั้งกล้องเอียงเล็กน้อย", q: "30 องศา เท่ากับกี่เรเดียน", a: ["π/6", "π/3", "π/4", "π/2"], c: 0, s: "30 * (π/180) = π/6" },
        { g: "ชีวิตจริง: การกลับหลังหันในการเดินสวนสนาม", q: "180 องศา คือกี่เรเดียน", a: ["π/2", "π", "2π", "3π/2"], c: 1, s: "180 คือครึ่งวงกลมพอดี = π" }
    ];

    // สร้างโจทย์จำลองให้ครบ 50 ข้อ
    for(let i=3; i<=50; i++){
        quizData.push({
            g: `ชีวิตจริง: การคำนวณมุมในงานวิศวกรรมและงานช่าง ข้อที่ ${i}`,
            q: `มุม ${(i*45)%360} องศา มีค่ากี่เรเดียน`,
            a: ["π/4", "π/2", "3π/4", "ค่าอื่นๆ"],
            c: Math.floor(Math.random()*4),
            s: "ใช้สูตร องศา x (π/180) ในการหาคำตอบครับ"
        });
    }

    const list = document.getElementById('quiz-list');
    let userScore = 0;

    quizData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <span class="guide">💡 ${item.g}</span>
            <p><strong>ข้อที่ ${idx+1}:</strong> ${item.q}</p>
            <div class="options">
                ${item.a.map((opt, i) => `<button class="opt-btn" onclick="checkAnswer(this, ${idx}, ${i})">${opt}</button>`).join('')}
            </div>
            <div id="exp-${idx}" class="explanation"></div>
        `;
        list.appendChild(div);
    });

    function checkAnswer(btn, qIdx, choice) {
        const parent = btn.parentElement;
        if(parent.getAttribute('data-done')) return;
        parent.setAttribute('data-done', 'true');
        
        const exp = document.getElementById(`exp-${qIdx}`);
        exp.style.display = 'block';
        if(choice === quizData[qIdx].c) {
            userScore++;
            btn.style.background = "#27ae60"; btn.style.color = "white";
            exp.innerHTML = "<b>ถูกต้อง!</b> วิธีทำ: " + quizData[qIdx].s;
        } else {
            btn.style.background = "#c0392b"; btn.style.color = "white";
            exp.innerHTML = "<b>ผิดครับ!</b> วิธีทำ: " + quizData[qIdx].s;
        }
        document.getElementById('score').innerText = userScore;
    }

    // --- WHITEBOARD LOGIC ---
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let currentTool = 'pen';
    let currentColor = '#000000';
    let currentSize = 3;

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth - 20;
        canvas.height = canvas.parentElement.clientHeight - 80;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
        if(!drawing) return;
        ctx.lineWidth = currentSize;
        ctx.lineCap = 'round';
        ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentColor;

        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function setTool(t) {
        currentTool = t;
        document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }
    function setColor(c) { currentColor = c; setTool('pen'); }
    function setSize(s) { currentSize = s; }
    function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

</script>
</body>
</html>
