<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังข้อสอบปีทาโกรัส - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; color: #333; margin: 0; background-color: #f0f2f5; }
        .header { background-color: #1a5f7a; color: white; padding: 20px; text-align: center; }
        
        .main-wrapper {
            display: flex;
            max-width: 1400px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 20px;
        }

        .quiz-section { flex: 7.5; min-width: 0; }
        .sidebar-section { flex: 2.5; position: sticky; top: 20px; height: 90vh; min-width: 320px; display: flex; flex-direction: column; }

        .switch-container { display: flex; background: #e9ecef; padding: 5px; border-radius: 10px; margin-bottom: 10px; }
        .switch-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: transparent; color: #495057; }
        .switch-btn.active { background: #1a5f7a; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .panel-content { background: #fff; border: 2px solid #1a5f7a; border-radius: 10px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }

        #nano-banana-panel { display: none; flex-direction: column; height: 100%; }
        .ai-iframe-mock { flex-grow: 1; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 5px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; flex-direction: column; }
        .ai-input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        #scratchpad-panel { display: flex; flex-direction: column; height: 100%; }
        canvas { border: 1px solid #ddd; background-color: #fafafa; cursor: crosshair; width: 100%; flex-grow: 1; touch-action: none; }

        .question { background-color: white; margin-bottom: 30px; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ai-prompt-area { background: #fff9db; border: 1.5px dashed #fab005; padding: 12px; margin: 15px 0; border-radius: 8px; font-size: 0.9em; }
        .copy-btn { background: #495057; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option { background: #fff; border: 2px solid #e0e0e0; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid #28a745; background: #e9f7ef; }
        .btn-submit { width: 100%; padding: 20px; background: #1a5f7a; color: white; border: none; border-radius: 10px; font-size: 1.2em; cursor: pointer; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar-section { position: relative; top: 0; width: 100%; height: 500px; order: -1; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>คลังข้อสอบปีทาโกรัส 30 ข้อ x Nano Banana</h1>
    <p>โดย พระจอมเกล้าติวเตอร์ | CHINPONG SMART FARM</p>
</div>

<div class="main-wrapper">
    <div class="quiz-section">
        <div id="quiz-list"></div>
        <button class="btn-submit" onclick="showSummary()">ประมวลผลคะแนนและวิเคราะห์จุดอ่อน</button>
        <div id="final-analysis" style="display:none; margin-top:20px; padding:20px; background:white; border-radius:10px;"></div>
    </div>

    <div class="sidebar-section">
        <div class="switch-container">
            <button id="btn-scratch" class="switch-btn active" onclick="switchMode('scratch')">กระดานทดเลข</button>
            <button id="btn-ai" class="switch-btn" onclick="switchMode('ai')">AI Nano Banana</button>
        </div>

        <div class="panel-content">
            <div id="scratchpad-panel">
                <div style="margin-bottom:10px;">
                    <button onclick="changeColor('#000')">ดำ</button>
                    <button onclick="changeColor('#f00')">แดง</button>
                    <button onclick="clearCanvas()" style="float:right;">ล้างกระดาน</button>
                </div>
                <canvas id="scratchPad"></canvas>
            </div>

            <div id="nano-banana-panel">
                <div class="ai-iframe-mock">
                    <img src="https://www.gstatic.com/lamda/images/favicon_v2_71f11400e932788e02613.png" width="30" alt="Gemini">
                    <p style="font-size: 0.9em;">วาง Prompt เพื่อสร้างรูปภาพประกอบโจทย์</p>
                    <textarea class="ai-input" rows="4" placeholder="วาง Prompt ที่นี่..."></textarea>
                    <a href="https://gemini.google.com" target="_blank" style="width:100%;"><button style="margin-top:10px; width:100%; padding:10px; background:#4285f4; color:white; border:none; border-radius:5px; cursor:pointer;">คลิกเพื่อเปิด AI ตัวจริง</button></a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- Switch & Canvas Logic ---
function switchMode(mode) {
    const scratchPanel = document.getElementById('scratchpad-panel');
    const aiPanel = document.getElementById('nano-banana-panel');
    const btnScratch = document.getElementById('btn-scratch');
    const btnAi = document.getElementById('btn-ai');
    if (mode === 'scratch') {
        scratchPanel.style.display = 'flex'; aiPanel.style.display = 'none';
        btnScratch.classList.add('active'); btnAi.classList.remove('active');
        resizeCanvas();
    } else {
        scratchPanel.style.display = 'none'; aiPanel.style.display = 'flex';
        btnScratch.classList.remove('active'); btnAi.classList.add('active');
    }
}

const canvas = document.getElementById('scratchPad');
const ctx = canvas.getContext('2d');
let drawing = false;

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight - 40;
    ctx.lineCap = 'round'; ctx.lineWidth = 3;
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

function draw(e) {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}
canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
function changeColor(c) { ctx.strokeStyle = c; }
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

// --- Quiz Data ---
const questions = [
    { q: "สามเหลี่ยมมุมฉากมีด้านประกอบยาว 6 และ 8 ซม. ด้านตรงข้ามมุมฉากยาวเท่าใด?", prompt: "2D math diagram, right triangle, base 6cm, height 8cm, hypotenuse labeled 'c', include right angle symbol, minimalist style, high contrast.", options: ["10 ซม.", "12 ซม.", "14 ซม.", "100 ซม."], correct: 0, exp: "6² + 8² = 36 + 64 = 100. ถอดรากได้ 10" },
    { q: "ถ้า c = 13 และ a = 5 ค่าของ b คือ?", prompt: "Right triangle diagram, hypotenuse 13, one leg 5, other leg labeled 'b', clear font, white background.", options: ["8", "12", "15", "18"], correct: 1, exp: "13² - 5² = 169 - 25 = 144. ถอดรากได้ 12" },
    { q: "บันได 10 ม. พาดกำแพง ปลายบนสูง 8 ม. เชิงบันไดห่างกำแพงเท่าใด?", prompt: "Illustration of a ladder (10m) leaning against a vertical wall. Wall height is 8m. Show ground distance 'x'. Right triangle focus.", options: ["2 ม.", "4 ม.", "6 ม.", "9 ม."], correct: 2, exp: "√ (10² - 8²) = 6 ม." },
    { q: "7, 24, 25 เป็นสามเหลี่ยมชนิดใด?", prompt: "Three sides of a triangle labeled 7, 24, and 25. Show calculation 7^2 + 24^2 = 25^2. Right triangle verification.", options: ["มุมแหลม", "มุมป้าน", "มุมฉาก", "หน้าจั่ว"], correct: 2, exp: "มุมฉาก (7² + 24² = 25²)" },
    { q: "ข้อใดไม่ใช่ชุดตัวเลขปีทาโกรัส?", prompt: "Four sets of numbers: (3,4,5), (5,12,13), (4,5,6), (8,15,17). Comparison of squares.", options: ["3, 4, 5", "5, 12, 13", "4, 5, 6", "8, 15, 17"], correct: 2, exp: "4, 5, 6 (16 + 25 ≠ 36)" },
    { q: "เสาธงสูง 12 ม. เชือกผูกยอดเสาห่างโคนเสา 5 ม. เชือกยาวเท่าใด?", prompt: "Vertical flagpole 12m. Ground distance 5m. Rope connecting top to ground. Hypotenuse labeled 'x'.", options: ["13 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 0, exp: "√ (12² + 5²) = 13 ม." },
    { q: "สี่เหลี่ยมผืนผ้ากว้าง 9 ยาว 12 เส้นทแยงมุมยาวเท่าใด?", prompt: "Rectangle with width 9 and length 12. Diagonal line drawn inside. Labeled dimensions.", options: ["15", "18", "21", "25"], correct: 0, exp: "√ (9² + 12²) = 15" },
    { q: "สามเหลี่ยมที่มีด้าน 1 และ 0.6 อีกด้านหนึ่งยาวเท่าใดจึงเป็นมุมฉาก?", prompt: "Right triangle with leg 0.6 and hypotenuse 1. Find the other leg.", options: ["0.4", "0.8", "0.7", "0.5"], correct: 1, exp: "√ (1² - 0.6²) = 0.8" },
    { q: "ชุดตัวเลข x, 15, 17 (17 ยาวสุด) ค่า x คือ?", prompt: "Triangle legs x and 15, hypotenuse 17. Solve for x.", options: ["7", "8", "9", "10"], correct: 1, exp: "√ (17² - 15²) = 8" },
    { q: "พื้นที่สามเหลี่ยมมุมฉากด้านประกอบยาว 5 และ 12 คือ?", prompt: "Right triangle with sides 5 and 12. Area calculation visualization.", options: ["30", "60", "65", "13"], correct: 0, exp: "(1/2)*5*12 = 30" },
    { q: "รูปสามเหลี่ยมมีด้านยาว 1.5 ซม. และ 2 ซม. ด้านที่สามยาวเท่าใดจึงจะเป็นสามเหลี่ยมมุมฉาก?", prompt: "Right triangle legs 1.5 and 2. Labeled hypotenuse 'c'.", options: ["2.2 ซม.", "2.5 ซม.", "3 ซม.", "3.5 ซม."], correct: 1, exp: "√ (1.5² + 2²) = 2.5" },
    { q: "สี่เหลี่ยมจัตุรัสมีเส้นทแยงมุมยาว √50 ซม. ด้านของสี่เหลี่ยมยาวเท่าใด?", prompt: "Square with diagonal sqrt(50). Side length 's' labeled.", options: ["5 ซม.", "7 ซม.", "10 ซม.", "25 ซม."], correct: 0, exp: "5² + 5² = 50. ด้านยาว 5" },
    { q: "สามเหลี่ยมหน้าจั่วมีฐานยาว 16 ซม. ด้านประกอบยาว 10 ซม. ความสูงเท่าใด?", prompt: "Isosceles triangle, base 16, legs 10. Split into two right triangles to find height.", options: ["4 ซม.", "6 ซม.", "8 ซม.", "10 ซม."], correct: 1, exp: "√(10² - 8²) = 6" },
    { q: "มดเดินไปทางทิศเหนือ 9 ม. เลี้ยวไปทิศตะวันออก 12 ม. มดห่างจากจุดเริ่มต้นเท่าใด?", prompt: "Path tracing: North 9m, then East 12m. Resulting displacement as hypotenuse.", options: ["15 ม.", "21 ม.", "18 ม.", "20 ม."], correct: 0, exp: "√(9² + 12²) = 15" },
    { q: "ด้านตรงข้ามมุมฉากยาว 25 ด้านประกอบหนึ่งยาว 20 อีกด้านหนึ่งยาวเท่าใด?", prompt: "Hypotenuse 25, leg 20. Find missing leg 'b'.", options: ["5", "10", "15", "20"], correct: 2, exp: "15 (3-4-5 ratio x 5)" },
    { q: "สี่เหลี่ยมขนมเปียกปูนมีเส้นทแยงมุมยาว 12 และ 16 ซม. ด้านยาวเท่าใด?", prompt: "Rhombus with diagonals 12 and 16. Right triangle inside (legs 6, 8) to find side.", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "√(6² + 8²) = 10" },
    { q: "วงกลมที่มีคอร์ดยาว 24 ซม. ห่างจากจุดศูนย์กลาง 5 ซม. รัศมียาวเท่าใด?", prompt: "Circle, center point O, chord length 24. Right triangle with legs 5 and 12 (half chord) to find radius.", options: ["11 ซม.", "12 ซม.", "13 ซม.", "15 ซม."], correct: 2, exp: "√(5² + 12²) = 13" },
    { q: "บันได 25 ฟุตพาดกำแพง เชิงบันไดห่างกำแพง 7 ฟุต ถ้าบันไดรูดลงมา 4 ฟุต ปลายบนจะสูงจากพื้นเท่าใด?", prompt: "Complex ladder problem. Initial (25, 7, 24). New height after top slides down 4ft. Calculation diagram.", options: ["20 ฟุต", "21 ฟุต", "24 ฟุต", "15 ฟุต"], correct: 0, exp: "24-4 = 20" },
    { q: "สามเหลี่ยมที่มีด้าน 9, 12, 15 มีพื้นที่เท่าใด?", prompt: "Triangle sides 9, 12, 15. Verify right angle (9-12-15). Area = base * height / 2.", options: ["54", "90", "108", "135"], correct: 0, exp: "0.5 * 9 * 12 = 54" },
    { q: "สี่เหลี่ยมผืนผ้ากว้าง 5 ยาว 12 เส้นทแยงมุมยาวกว่าด้านกว้างเท่าใด?", prompt: "Rectangle 5x12. Diagonal length minus width. Calculation 13 - 5.", options: ["7", "8", "10", "13"], correct: 1, exp: "√ (5² + 12²) = 13. ต่างกัน 13-5 = 8" },
    { q: "กล่องทรงสี่เหลี่ยมกว้าง 3 ยาว 4 สูง 12 ซม. เส้นทแยงมุมภายในกล่องยาวเท่าใด?", prompt: "3D cuboid, dimensions 3, 4, 12. Space diagonal line from corner to opposite corner.", options: ["13 ซม.", "15 ซม.", "17 ซม.", "19 ซม."], correct: 0, exp: "√(3² + 4² + 12²) = 13" },
    { q: "สามเหลี่ยมมุมฉากมีด้านประกอบยาว x และ x+7 ด้านตรงข้ามยาว 13 ค่า x คือ?", prompt: "Right triangle legs x and x+7, hypotenuse 13. Pythagorean equation visualization.", options: ["3", "5", "7", "12"], correct: 1, exp: "5² + 12² = 13². x=5" },
    { q: "สามเหลี่ยมด้านเท่ามีด้านยาว 10 ซม. จะมีความสูงประมาณเท่าใด?", prompt: "Equilateral triangle side 10. Split into (5, h, 10) right triangle. Find h.", options: ["5 ซม.", "7.5 ซม.", "8.66 ซม.", "10 ซม."], correct: 2, exp: "√(10² - 5²) = 8.66" },
    { q: "เรือใบสองลำออกจากจุดเดียวกัน ลำหนึ่งไปทิศเหนือ 12 กม./ชม. อีกลำไปทิศตะวันตก 5 กม./ชม. ผ่านไป 2 ชม. เรือห่างกันเท่าใด?", prompt: "Two ships. Ship A (North 24km), Ship B (West 10km). Distance between them (hypotenuse).", options: ["13 กม.", "20 กม.", "26 กม.", "30 กม."], correct: 2, exp: "√(24² + 10²) = 26" },
    { q: "สี่เหลี่ยมคางหมูมีด้านคู่ขนานยาว 10 และ 16 ซม. ด้านที่ตั้งฉากยาว 8 ซม. อีกด้านยาวเท่าใด?", prompt: "Trapezoid, parallel sides 10 & 16, perpendicular height 8. Find the sloped side using a right triangle.", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "√(8² + (16-10)²) = 10" },
    { q: "จุด A(2,3) และ B(5,7) ห่างกันกี่หน่วย?", prompt: "Coordinate plane. Points A(2,3) and B(5,7). Right triangle legs Δx and Δy to find distance AB.", options: ["4", "5", "6", "7"], correct: 1, exp: "√(3² + 4²) = 5" },
    { q: "รูปสามเหลี่ยมที่มีด้าน 21, 28, 35 มีรัศมีวงกลมล้อมรอบเท่าใด?", prompt: "Right triangle 21, 28, 35. Hypotenuse is the diameter of circumscribed circle. Find radius.", options: ["15", "17.5", "20", "35"], correct: 1, exp: "35 / 2 = 17.5" },
    { q: "พีระมิดฐานจัตุรัสยาวด้านละ 10 ซม. สูงตรง 12 ซม. สูงเอียงยาวเท่าใด?", prompt: "Pyramid, square base side 10, vertical height 12. Slant height as hypotenuse of (5, 12, slant).", options: ["13 ซม.", "15 ซม.", "17 ซม.", "18 ซม."], correct: 0, exp: "√(12² + 5²) = 13" },
    { q: "ถ้าพื้นที่สี่เหลี่ยมจัตุรัสบนด้านประกอบคือ 25 และ 144 ตร.หน่วย เส้นรอบรูปสามเหลี่ยมนี้ยาวเท่าใด?", prompt: "Right triangle with squares on legs (areas 25 and 144). Perimeter calculation.", options: ["30", "35", "40", "60"], correct: 0, exp: "5 + 12 + 13 = 30" },
    { q: "เสาไฟสูง 15 ม. ตึกสูง 30 ม. ห่างกัน 8 ม. สายไฟที่เชื่อมยอดเสาและยอดตึกยาวเท่าใด?", prompt: "Two vertical structures: 15m pole and 30m building, 8m apart. Diagonal wire length.", options: ["10 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 2, exp: "√(8² + (30-15)²) = 17" }
];

let userAnswers = new Array(30).fill(null);

function renderQuiz() {
    const list = document.getElementById('quiz-list');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <div class="q-text"><strong>ข้อที่ ${i+1}:</strong> ${q.q}</div>
            <div class="ai-prompt-area">
                <button class="copy-btn" onclick="copyPrompt('${i}')">Copy Prompt</button>
                <strong style="color:#d4a017;">✨ Prompt สำหรับ Nano Banana:</strong><br>
                <span id="ptext-${i}">${q.prompt}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIdx) => `<button class="option" onclick="check(${i}, ${oIdx}, this)">${opt}</button>`).join('')}
            </div>
            <div id="exp-${i}" class="explanation"></div>
        `;
        list.appendChild(div);
    });
}

function copyPrompt(id) {
    const text = document.getElementById(`ptext-${id}`).innerText;
    navigator.clipboard.writeText(text);
    alert("คัดลอก Prompt แล้ว! อย่าลืมกดสลับไปหน้า AI เพื่อวางและ Gen รูปประกอบนะครับ");
}

function check(qI, oI, btn) {
    if (userAnswers[qI] !== null) return;
    userAnswers[qI] = oI;
    const isCorrect = oI === questions[qI].correct;
    btn.style.background = isCorrect ? '#d4edda' : '#f8d7da';
    btn.style.borderColor = isCorrect ? '#28a745' : '#dc3545';
    const exp = document.getElementById(`exp-${qI}`);
    exp.style.display = 'block';
    exp.innerHTML = `<strong>${isCorrect ? 'ถูกต้อง!' : 'ยังไม่ถูกครับ'}</strong> ${questions[qI].exp}`;
}

function showSummary() {
    let score = userAnswers.filter((a, i) => a === questions[i].correct).length;
    const analysis = document.getElementById('final-analysis');
    analysis.style.display = 'block';
    let text = `<h2>สรุปผลคะแนน: ${score} / 30</h2>`;
    if(score < 15) text += "<p>วิเคราะห์: พื้นฐานปีทาโกรัสยังไม่แน่น ควรเน้นการวาดรูปสามเหลี่ยมมุมฉากประกอบโจทย์</p>";
    else if(score < 25) text += "<p>วิเคราะห์: ทำได้ดีแล้ว แต่ยังมีจุดบกพร่องในโจทย์ประยุกต์ 3 มิติและทิศทาง</p>";
    else text += "<p>วิเคราะห์: ยอดเยี่ยม! คุณมีความเข้าใจในเรื่องทฤษฎีบทปีทาโกรัสในระดับสูง</p>";
    analysis.innerHTML = text;
    window.scrollTo(0, document.body.scrollHeight);
}

renderQuiz();
</script>
</body>
</html>
