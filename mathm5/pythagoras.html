<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagoras Mastery Lab - Full Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Layout & Style --- */
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Sarabun', sans-serif;
            overflow: hidden;
            background-color: #0f172a; color: #f1f5f9;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        .quiz-frame {
            flex: 0 0 70%; height: 100%; overflow-y: auto;
            padding: 40px; box-sizing: border-box;
            background-color: #1e293b; border-right: 3px solid #334155;
        }

        .whiteboard-frame {
            flex: 0 0 30%; height: 100%; overflow-y: auto;
            padding: 20px; box-sizing: border-box;
            background-color: #ffffff; color: #1e293b;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.1);
        }

        /* --- Quiz UI --- */
        .header { border-bottom: 2px solid #38bdf8; padding-bottom: 20px; margin-bottom: 40px; }
        .header h1 { margin: 0; color: #38bdf8; }

        .question-card {
            background: #334155; border-radius: 15px; padding: 25px;
            margin-bottom: 35px; border-left: 6px solid #38bdf8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .concept-tag {
            display: inline-block; background: rgba(56, 189, 248, 0.15);
            color: #7dd3fc; padding: 5px 12px; border-radius: 20px;
            font-size: 0.85rem; margin-bottom: 10px; border: 1px solid #38bdf8;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        .option {
            background: #1e293b; padding: 15px; border-radius: 10px;
            border: 1px solid #475569; cursor: pointer; transition: 0.2s;
        }
        .option:hover { background: #475569; }
        .option.selected { background: #38bdf8 !important; color: #0f172a !important; font-weight: bold; }

        .solution-box {
            display: none; background: #0f172a; padding: 20px;
            border-radius: 10px; margin-top: 20px; border: 1px dashed #38bdf8;
        }

        /* --- Whiteboard UI --- */
        .tool-btn {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
            cursor: pointer; font-weight: bold; color: #475569;
        }
        .tool-btn.active { background: #38bdf8; color: white; }
        canvas { background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 10px; cursor: crosshair; touch-action: none; }
        .cheat-sheet { background: #f8fafc; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="quiz-frame">
        <div class="header">
            <h1>Pythagoras Mastery Lab</h1>
            <p>เลือกตัวเลือกเพื่อดูเฉลยและวิธีทำ</p>
        </div>
        <div id="quiz-container">
            </div>
    </div>

    <div class="whiteboard-frame">

        <button class="tool-btn" onclick="clearCanvas()">🧽 ล้างหน้าจอ</button>
        <button class="tool-btn" onclick="downloadCanvas()">📥 บันทึกภาพ</button>
        
        <canvas id="mainCanvas"></canvas>

    </div>
