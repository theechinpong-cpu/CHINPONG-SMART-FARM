<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังข้อสอบปีทาโกรัส - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; color: #333; margin: 0; background-color: #f0f2f5; }
        .header { background-color: #1a5f7a; color: white; padding: 20px; text-align: center; }
        
        .main-wrapper { display: flex; max-width: 100%; margin: 0; gap: 20px; padding: 20px; box-sizing: border-box; }
        .quiz-section { flex: 7.5; min-width: 0; }
        .sidebar-section { flex: 2.5; position: sticky; top: 20px; height: 90vh; min-width: 320px; display: flex; flex-direction: column; }

        .switch-container { display: flex; background: #e9ecef; padding: 5px; border-radius: 10px; margin-bottom: 10px; }
        .switch-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: transparent; color: #495057; }
        .switch-btn.active { background: #1a5f7a; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .panel-content { background: #fff; border: 2px solid #1a5f7a; border-radius: 10px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }

        #nano-banana-panel { display: none; flex-direction: column; height: 100%; }
        .ai-embedded-box { flex-grow: 1; background: #fff; display: flex; flex-direction: column; overflow-y: auto; }
        .ai-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 0.9em; resize: none; }

        .ai-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-gen { background: #4285f4; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-clear-ai { background: #ea4335; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #scratchpad-panel { display: flex; flex-direction: column; height: 100%; }
        canvas { border: 1px solid #ddd; background-color: #fafafa; cursor: crosshair; width: 100%; flex-grow: 1; touch-action: none; border-radius: 5px; }

        .question { background-color: white; margin-bottom: 30px; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .ai-prompt-area { background: #fff9db; border: 1.5px dashed #fab005; padding: 12px; margin: 15px 0; border-radius: 8px; font-size: 0.85em; }
        .copy-btn { background: #495057; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; float: right; font-size: 0.8em; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option { background: #fff; border: 2px solid #e0e0e0; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
        .option.correct { background: #d4edda !important; border-color: #28a745 !important; }
        .option.wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid #28a745; background: #e9f7ef; }
        .btn-submit { width: 100%; padding: 20px; background: #1a5f7a; color: white; border: none; border-radius: 10px; font-size: 1.2em; cursor: pointer; margin-top: 20px; font-weight: bold; }

        #ai-result-container { margin-top: 15px; width: 100%; min-height: 250px; border: 1px dashed #4285f4; border-radius: 8px; background: #f8fbff; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #generated-image { max-width: 100%; height: auto; display: none; }
        .loading-spinner { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #4285f4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { .main-wrapper { flex-direction: column; } .sidebar-section { position: relative; top: 0; width: 100%; height: 500px; order: -1; } }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">ระบบทดสอบปีทาโกรัส 30 ข้อ สมบูรณ์แบบ</h2>
    <p style="margin:5px 0 0 0;">พระจอมเกล้าติวเตอร์ | CHINPONG SMART FARM</p>
</div>

<div class="main-wrapper">
    <div class="quiz-section" id="quiz-container">
        <div id="quiz-list"></div>
        <button id="final-submit-btn" class="btn-submit" onclick="showSummary()">🚀 ส่งคำตอบและวิเคราะห์ผล</button>
        <div id="final-analysis" style="display:none; margin-top:20px; padding:25px; background:white; border-radius:10px; border: 2px solid #1a5f7a;"></div>
    </div>

    <div class="sidebar-section">
        <div class="switch-container">
            <button id="btn-scratch" class="switch-btn active" onclick="switchMode('scratch')">📝 ทดเลข</button>
            <button id="btn-ai" class="switch-btn" onclick="switchMode('ai')">🍌 Nano Banana</button>
        </div>
        <div class="panel-content">
            <div id="scratchpad-panel">
                <div style="margin-bottom:10px; display:flex; gap:5px;">
                    <button onclick="changeColor('#000')" style="background:#000; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">ดำ</button>
                    <button onclick="changeColor('#f00')" style="background:#f00; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">แดง</button>
                    <button onclick="clearCanvas()" style="margin-left:auto; background:#eee; padding:5px 10px; border-radius:4px; cursor:pointer; border:1px solid #ccc;">ล้างจอ</button>
                </div>
                <canvas id="scratchPad"></canvas>
            </div>

            <div id="nano-banana-panel">
                <div class="ai-embedded-box">
                    <p style="margin:0 0 10px 0; font-size:0.9em;"><strong>ช่องสร้างภาพประกอบ:</strong></p>
                    <textarea id="ai-prompt-input" class="ai-input" rows="3" placeholder="วาง Prompt ที่คัดลอกมาที่นี่..."></textarea>
                    <div class="ai-controls">
                        <button class="btn-gen" onclick="generateImage()">🎨 วาดรูป</button>
                        <button class="btn-clear-ai" onclick="clearAI()">🧹 ล้างรูป</button>
                    </div>
                    <div id="ai-result-container">
                        <div id="ai-loader" class="loading-spinner"></div>
                        <p id="ai-status-text" style="color:#4285f4; font-size:0.8em; text-align:center;">พร้อมรับคำสั่ง...</p>
                        <img id="generated-image" src="" alt="AI Output">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- ข้อมูลข้อสอบ (ครบ 30 ข้อ พร้อม Prompt) ---
const questions = [
    { q: "1. สามเหลี่ยมมุมฉากมีด้านประกอบยาว 6 และ 8 ซม. ด้านตรงข้ามมุมฉากยาวเท่าใด?", prompt: "Right triangle, legs 6 and 8, find hypotenuse, mathematical diagram, 2D line art.", options: ["10 ซม.", "12 ซม.", "14 ซม.", "16 ซม."], correct: 0, exp: "6² + 8² = 36 + 64 = 100. √100 = 10" },
    { q: "2. ถ้า c = 13 และ a = 5 ค่าของ b คือเท่าใด?", prompt: "Right triangle with hypotenuse 13 and one leg 5. Labeled diagram.", options: ["8", "10", "12", "14"], correct: 2, exp: "13² - 5² = 169 - 25 = 144. √144 = 12" },
    { q: "3. บันได 10 ม. พาดกำแพง ปลายบนสูง 8 ม. เชิงบันไดห่างกำแพงเท่าใด?", prompt: "Ladder leaning against a wall, length 10m, height 8m, find ground distance.", options: ["4 ม.", "5 ม.", "6 ม.", "7 ม."], correct: 2, exp: "√(10² - 8²) = √36 = 6" },
    { q: "4. 7, 24, 25 เป็นด้านของสามเหลี่ยมชนิดใด?", prompt: "Triangle with sides 7, 24, 25 labeled. Check for right angle.", options: ["มุมแหลม", "มุมฉาก", "มุมป้าน", "หน้าจั่ว"], correct: 1, exp: "7² + 24² = 49 + 576 = 625 = 25² พอดี" },
    { q: "5. ข้อใดไม่ใช่ชุดตัวเลขปีทาโกรัส?", prompt: "Sets of numbers: (3,4,5), (5,12,13), (4,5,6), (8,15,17). Comparison.", options: ["3, 4, 5", "5, 12, 13", "4, 5, 6", "8, 15, 17"], correct: 2, exp: "4² + 5² = 41 ซึ่งไม่เท่ากับ 6² (36)" },
    { q: "6. เสาธงสูง 12 ม. เชือกผูกยอดเสาห่างโคนเสา 5 ม. เชือกยาวเท่าใด?", prompt: "Vertical flagpole 12m, ground base 5m, hypotenuse rope calculation.", options: ["13 ม.", "14 ม.", "15 ม.", "17 ม."], correct: 0, exp: "√(12² + 5²) = √169 = 13" },
    { q: "7. สี่เหลี่ยมผืนผ้ากว้าง 9 ยาว 12 เส้นทแยงมุมยาวเท่าใด?", prompt: "Rectangle 9x12 with diagonal line. Mathematical sketch.", options: ["14", "15", "16", "18"], correct: 1, exp: "√(9² + 12²) = √225 = 15" },
    { q: "8. สามเหลี่ยมที่มีด้าน 1 และ 0.6 อีกด้านหนึ่งยาวเท่าใดจึงเป็นมุมฉาก?", prompt: "Right triangle with hypotenuse 1 and leg 0.6.", options: ["0.4", "0.5", "0.8", "0.9"], correct: 2, exp: "√(1² - 0.6²) = √0.64 = 0.8" },
    { q: "9. ชุดตัวเลข x, 15, 17 (17 ยาวสุด) ค่า x คือเท่าใด?", prompt: "Triangle leg x, leg 15, hypotenuse 17.", options: ["7", "8", "9", "10"], correct: 1, exp: "√(17² - 15²) = √64 = 8" },
    { q: "10. พื้นที่สามเหลี่ยมมุมฉากที่มีด้านประกอบยาว 5 และ 12 คือเท่าใด?", prompt: "Right triangle with legs 5 and 12. Area calculation visualization.", options: ["30", "60", "65", "70"], correct: 0, exp: "1/2 * 5 * 12 = 30" },
    { q: "11. รูปสามเหลี่ยมมีด้านยาว 1.5 ซม. และ 2 ซม. ด้านที่สามยาวเท่าใดจึงจะเป็นมุมฉาก?", prompt: "Right triangle legs 1.5cm and 2cm. Diagram.", options: ["2.2", "2.5", "3.0", "3.5"], correct: 1, exp: "√(1.5² + 2²) = √6.25 = 2.5" },
    { q: "12. สี่เหลี่ยมจัตุรัสมีเส้นทแยงมุมยาว √50 ซม. ด้านของสี่เหลี่ยมยาวเท่าใด?", prompt: "Square with diagonal sqrt(50). Side length labeled s.", options: ["5 ซม.", "10 ซม.", "25 ซม.", "50 ซม."], correct: 0, exp: "s² + s² = 50 -> 2s² = 50 -> s = 5" },
    { q: "13. สามเหลี่ยมหน้าจั่วมีฐานยาว 16 ซม. ด้านประกอบยาว 10 ซม. ความสูงคือเท่าใด?", prompt: "Isosceles triangle base 16, sides 10, altitude height h.", options: ["4 ซม.", "6 ซม.", "8 ซม.", "10 ซม."], correct: 1, exp: "√(10² - 8²) = 6 (แบ่งครึ่งฐานเหลือ 8)" },
    { q: "14. มดเดินไปทางทิศเหนือ 9 ม. เลี้ยวไปทิศตะวันออก 12 ม. มดห่างจากจุดเริ่มต้นเท่าใด?", prompt: "Vector path: 9m North, 12m East. Displacement hypotenuse.", options: ["15 ม.", "18 ม.", "21 ม.", "25 ม."], correct: 0, exp: "√(9² + 12²) = 15" },
    { q: "15. ด้านตรงข้ามมุมฉากยาว 25 ด้านประกอบหนึ่งยาว 20 อีกด้านหนึ่งยาวเท่าใด?", prompt: "Hypotenuse 25, leg 20, missing leg x.", options: ["5", "10", "15", "20"], correct: 2, exp: "√(25² - 20²) = 15" },
    { q: "16. สี่เหลี่ยมขนมเปียกปูนมีเส้นทแยงมุมยาว 12 และ 16 ซม. ด้านจะยาวเท่าใด?", prompt: "Rhombus with diagonals 12, 16. Right triangle with legs 6, 8.", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "√(6² + 8²) = 10" },
    { q: "17. วงกลมที่มีคอร์ดยาว 24 ซม. ห่างจากจุดศูนย์กลาง 5 ซม. รัศมียาวเท่าใด?", prompt: "Circle center O, chord 24cm, distance 5cm, find radius r.", options: ["11 ซม.", "12 ซม.", "13 ซม.", "15 ซม."], correct: 2, exp: "√(5² + 12²) = 13" },
    { q: "18. บันได 25 ฟุตพาดกำแพง เชิงห่าง 7 ฟุต ถ้าบันไดรูดลง 4 ฟุต ปลายบนสูงเท่าใด?", prompt: "Ladder sliding down 4ft. Calculation diagram.", options: ["20 ฟุต", "21 ฟุต", "22 ฟุต", "24 ฟุต"], correct: 0, exp: "เดิมสูง 24, รูดลง 4 เหลือ 20" },
    { q: "19. สามเหลี่ยมที่มีด้าน 9, 12, 15 มีพื้นที่เท่าใด?", prompt: "Right triangle with sides 9, 12, 15. Area calculation.", options: ["54", "60", "90", "108"], correct: 0, exp: "1/2 * 9 * 12 = 54" },
    { q: "20. สี่เหลี่ยมผืนผ้ากว้าง 5 ยาว 12 เส้นทแยงมุมยาวกว่าด้านกว้างเท่าใด?", prompt: "Rectangle 5x12. Diagonal minus width.", options: ["7", "8", "10", "13"], correct: 1, exp: "13 - 5 = 8" },
    { q: "21. กล่องกว้าง 3 ยาว 4 สูง 12 ซม. เส้นทแยงมุมภายในกล่องยาวเท่าใด?", prompt: "3D box 3x4x12 with space diagonal.", options: ["13 ซม.", "15 ซม.", "17 ซม.", "20 ซม."], correct: 0, exp: "√(3² + 4² + 12²) = 13" },
    { q: "22. สามเหลี่ยมมุมฉากมีด้าน x และ x+7 ด้านตรงข้ามยาว 13 ค่า x คือ?", prompt: "Triangle legs x, x+7, hypotenuse 13. Algebra diagram.", options: ["3", "5", "7", "12"], correct: 1, exp: "ชุดตัวเลข (5, 12, 13) ดังนั้น x = 5" },
    { q: "23. สามเหลี่ยมด้านเท่ามีด้านยาว 10 ซม. จะมีความสูงประมาณเท่าใด?", prompt: "Equilateral triangle side 10, height h calculation.", options: ["5 ซม.", "7.5 ซม.", "8.66 ซม.", "10 ซม."], correct: 2, exp: "√(10² - 5²) ≈ 8.66" },
    { q: "24. เรือลำหนึ่งไปทิศเหนือ 24 กม. อีกลำไปทิศตะวันออก 10 กม. ห่างกันกี่ กม.?", prompt: "Boats distance North 24, East 10.", options: ["26 กม.", "28 กม.", "30 กม.", "34 กม."], correct: 0, exp: "√(24² + 10²) = 26" },
    { q: "25. สี่เหลี่ยมคางหมูมีด้านขนานยาว 10, 16 ซม. สูง 8 ซม. ด้านที่เหลือยาวเท่าใด?", prompt: "Trapezoid with height 8, leg of triangle is 6.", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "√(8² + 6²) = 10" },
    { q: "26. จุด A(2,3) และ B(5,7) ห่างกันกี่หน่วย?", prompt: "Coordinate geometry points A(2,3) B(5,7) distance.", options: ["4", "5", "6", "7"], correct: 1, exp: "√(3² + 4²) = 5" },
    { q: "27. สามเหลี่ยมที่มีด้าน 21, 28, 35 มีรัศมีวงกลมล้อมรอบเท่าใด?", prompt: "Right triangle circumcircle radius for sides 21, 28, 35.", options: ["15", "17.5", "20", "35"], correct: 1, exp: "35 / 2 = 17.5" },
    { q: "28. พีระมิดฐานจัตุรัสยาว 10 ซม. สูงตรง 12 ซม. สูงเอียงยาวเท่าใด?", prompt: "Pyramid slant height s, vertical 12, half-base 5.", options: ["13 ซม.", "14 ซม.", "15 ซม.", "17 ซม."], correct: 0, exp: "√(12² + 5²) = 13" },
    { q: "29. ถ้าพื้นที่จัตุรัสบนด้านประกอบคือ 25 และ 144 เส้นรอบรูปสามเหลี่ยมยาวเท่าใด?", prompt: "Areas 25 and 144 on legs. Find total perimeter.", options: ["30", "40", "50", "60"], correct: 0, exp: "5 + 12 + 13 = 30" },
    { q: "30. เสาไฟสูง 15 ม. ตึกสูง 30 ม. ห่างกัน 8 ม. สายไฟที่เชื่อมยอดทั้งสองยาวเท่าใด?", prompt: "Pole 15, building 30, gap 8. Line length between tops.", options: ["10 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 2, exp: "√(8² + 15²) = 17" }
];

let userAnswers = new Array(30).fill(null);

function renderQuiz() {
    const list = document.getElementById('quiz-list');
    list.innerHTML = ""; // ล้างหน้าจอเก่ากันข้อมูลซ้อน
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.id = `q-block-${i}`;
        div.innerHTML = `
            <div><strong>${q.q}</strong></div>
            <div class="ai-prompt-area">
                <button class="copy-btn" onclick="copyPrompt('${i}')">Copy Prompt</button>
                <span style="color:#856404; font-weight:bold;">Prompt:</span> <span id="ptext-${i}">${q.prompt}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIdx) => `<button class="option" id="opt-${i}-${oIdx}" onclick="check(${i}, ${oIdx})">${opt}</button>`).join('')}
            </div>
            <div id="exp-${i}" class="explanation"></div>
        `;
        list.appendChild(div);
    });
}

function copyPrompt(id) {
    const text = document.getElementById(`ptext-${id}`).innerText;
    navigator.clipboard.writeText(text);
    document.getElementById('ai-prompt-input').value = text;
    alert("คัดลอก Prompt แล้ว! กด 'วาดรูป' ที่แถบ Nano Banana ได้เลย");
}

function check(qI, oI) {
    if (userAnswers[qI] !== null) return;
    userAnswers[qI] = oI;
    const isCorrect = oI === questions[qI].correct;
    
    document.getElementById(`opt-${qI}-${oI}`).className = `option ${isCorrect ? 'correct' : 'wrong'}`;
    const exp = document.getElementById(`exp-${qI}`);
    exp.style.display = 'block';
    exp.innerHTML = `<strong>${isCorrect ? '✅ ถูกต้อง!' : '❌ ผิดครับ'}</strong> ${questions[qI].exp}`;
}

// --- AI Logic (Nano Banana) ---
function generateImage() {
    const prompt = document.getElementById('ai-prompt-input').value;
    const img = document.getElementById('generated-image');
    const status = document.getElementById('ai-status-text');
    const loader = document.getElementById('ai-loader');

    if (!prompt) return;

    status.innerText = "กำลังวาดรูป...";
    status.style.display = "block";
    loader.style.display = "block";
    img.style.display = "none";

    const enhanced = `${prompt}, simple flat 2d line art, math diagram, white background, high resolution`;
    const seed = Math.floor(Math.random() * 1000000);
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(enhanced)}?seed=${seed}&width=512&height=512&nologo=true`;

    img.src = url;
    img.onload = () => {
        status.style.display = "none";
        loader.style.display = "none";
        img.style.display = "block";
    };
    img.onerror = () => {
        status.innerText = "เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง";
        loader.style.display = "none";
    };
}

function clearAI() {
    document.getElementById('ai-prompt-input').value = "";
    document.getElementById('generated-image').style.display = "none";
    document.getElementById('ai-status-text').style.display = "block";
    document.getElementById('ai-status-text').innerText = "พร้อมรับคำสั่ง...";
}

// --- Sidebar Navigation ---
function switchMode(mode) {
    document.getElementById('scratchpad-panel').style.display = mode === 'scratch' ? 'flex' : 'none';
    document.getElementById('nano-banana-panel').style.display = mode === 'ai' ? 'flex' : 'none';
    document.getElementById('btn-scratch').className = `switch-btn ${mode === 'scratch' ? 'active' : ''}`;
    document.getElementById('btn-ai').className = `switch-btn ${mode === 'ai' ? 'active' : ''}`;
    if (mode === 'scratch') resizeCanvas();
}

// --- Canvas Logic ---
const canvas = document.getElementById('scratchPad');
const ctx = canvas.getContext('2d');
let drawing = false;

function resizeCanvas() {
    const parent = canvas.parentElement;
    canvas.width = parent.clientWidth;
    canvas.height = parent.clientHeight - 50;
    ctx.lineCap = 'round'; ctx.lineWidth = 3;
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

function draw(e) {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}
canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
canvas.onmousemove = draw;
canvas.ontouchstart = (e) => { e.preventDefault(); drawing = true; };
canvas.ontouchmove = (e) => { e.preventDefault(); draw(e); };
canvas.ontouchend = () => { drawing = false; ctx.beginPath(); };
function changeColor(c) { ctx.strokeStyle = c; }
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

// --- Summary Analysis ---
function showSummary() {
    const answered = userAnswers.filter(a => a !== null).length;
    if (answered < 30) {
        if (!confirm(`คุณเพิ่งทำไป ${answered}/30 ข้อ ต้องการส่งเลยหรือไม่?`)) return;
    }

    const score = userAnswers.filter((a, i) => a === questions[i].correct).length;
    const analysis = document.getElementById('final-analysis');
    analysis.style.display = 'block';
    
    let report = `<h3>📊 สรุปคะแนน: ${score} / 30</h3>`;
    if (score >= 25) report += "<p><b>วิเคราะห์:</b> ยอดเยี่ยม! คุณเข้าใจทฤษฎีปีทาโกรัสอย่างลึกซึ้ง</p>";
    else if (score >= 15) report += "<p><b>วิเคราะห์:</b> ผ่านเกณฑ์! แต่ควรทบทวนโจทย์ประยุกต์เพิ่มเติม</p>";
    else report += "<p><b>วิเคราะห์:</b> ควรกลับไปทบทวนพื้นฐานการยกกำลังและวาดรูปประกอบครับ</p>";
    
    report += `<button onclick="location.reload()" style="padding:10px 20px; background:#495057; color:white; border:none; border-radius:5px; cursor:pointer;">เริ่มทำใหม่</button>`;
    
    analysis.innerHTML = report;
    analysis.scrollIntoView({ behavior: 'smooth' });
}

renderQuiz();
</script>
