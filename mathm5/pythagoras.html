<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagoras Mastery Lab - Fix</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Sarabun', sans-serif;
            background-color: #0f172a; color: #f1f5f9;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* ฝั่งซ้าย: โจทย์ */
        .quiz-frame {
            flex: 0 0 70%; height: 100%; overflow-y: auto;
            padding: 40px; box-sizing: border-box;
            background-color: #1e293b; border-right: 3px solid #334155;
        }
        
        /* ฝั่งขวา: ไวท์บอร์ด */
        .whiteboard-frame {
            flex: 0 0 30%; height: 100%; padding: 20px;
            box-sizing: border-box; background-color: #ffffff;
            color: #1e293b; display: flex; flex-direction: column;
        }

        .question-card {
            background: #334155; border-radius: 15px; padding: 25px;
            margin-bottom: 30px; border-left: 6px solid #38bdf8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .concept-tag {
            display: inline-block; background: rgba(56, 189, 248, 0.2);
            color: #7dd3fc; padding: 4px 12px; border-radius: 15px;
            font-size: 0.85rem; margin-bottom: 10px;
        }
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;
        }
        .option {
            background: #1e293b; padding: 15px; border-radius: 10px;
            border: 1px solid #475569; cursor: pointer; transition: 0.2s;
        }
        .option:hover { background: #38bdf8; color: #0f172a; }
        .option.selected { background: #38bdf8; color: #0f172a; font-weight: bold; }
        
        .solution-box {
            display: none; background: #0f172a; padding: 20px;
            border-radius: 10px; margin-top: 20px; border: 1px dashed #38bdf8;
        }

        canvas {
            width: 100%; height: 400px; background: #f8fafc;
            border: 2px solid #cbd5e1; border-radius: 10px; cursor: crosshair;
        }
        .btn {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-clear { background: #ef4444; color: white; }
        .btn-save { background: #10b981; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="quiz-frame">
        <h1 style="color: #38bdf8;">Pythagoras Mastery Lab</h1>
        <div id="quiz-container">
            <p style="color: #94a3b8;">กำลังโหลดข้อสอบ...</p>
        </div>
    </div>

    <div class="whiteboard-frame">
        <h2 style="margin-top:0;">ไวท์บอร์ดทดเลข</h2>
        <canvas id="mainCanvas"></canvas>
        <div style="margin-top: 15px;">
            <button class="btn btn-clear" onclick="clearCanvas()">ล้างหน้าจอ</button>
            <button class="btn btn-save" onclick="downloadCanvas()">บันทึกภาพโน้ต</button>
        </div>
    </div>
</div>
