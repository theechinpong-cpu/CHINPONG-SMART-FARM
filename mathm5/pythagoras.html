<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagoras Mastery Lab</title>
    <!-- MathJax สำหรับ render สูตรคณิตศาสตร์ -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            startup: { ready() { MathJax.startup.defaultReady(); } }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
    <style>
        /* แก้ไข: ย้าย line-height และ font-family เข้ามาใน body {} */
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Sarabun', sans-serif;
            background-color: #0f172a; color: #f1f5f9;
            overflow: hidden;
            line-height: 1.6;
        }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        .quiz-frame {
            flex: 0 0 70%; height: 100%; overflow-y: auto;
            padding: 40px; box-sizing: border-box;
            background-color: #1e293b; border-right: 3px solid #334155;
        }

        .whiteboard-frame {
            flex: 0 0 30%; height: 100%; padding: 20px;
            box-sizing: border-box; background-color: #ffffff;
            color: #1e293b; display: flex; flex-direction: column;
        }

        .question-card {
            background: #334155; border-radius: 15px; padding: 25px;
            margin-bottom: 30px; border-left: 6px solid #38bdf8;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .concept-tag {
            display: inline-block; background: rgba(56, 189, 248, 0.2);
            color: #7dd3fc; padding: 4px 12px; border-radius: 15px;
            font-size: 0.85rem; margin-bottom: 10px;
        }
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;
        }
        .option {
            background: #1e293b; padding: 15px; border-radius: 10px;
            border: 1px solid #475569; cursor: pointer; transition: 0.2s;
        }
        .option:hover { background: #38bdf8; color: #0f172a; }
        .option.selected { background: #38bdf8; color: #0f172a; font-weight: bold; }

        .solution-box {
            display: none; background: #0f172a; padding: 20px;
            border-radius: 10px; margin-top: 20px; border: 1px dashed #38bdf8;
            line-height: 1.8;
        }

        /* แก้ไข: canvas ให้แสดงขนาดถูกต้อง */
        canvas {
            width: 100%;
            height: 400px;
            display: block;
            background: #f8fafc;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
        }
        .btn {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
        }
        .btn-clear { background: #ef4444; color: white; }
        .btn-save  { background: #10b981; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="quiz-frame">
        <h1 style="color: #38bdf8;">Pythagoras Mastery Lab</h1>
        <div id="quiz-container">
            <p style="color: #94a3b8;">กำลังโหลดข้อสอบ...</p>
        </div>
    </div>

    <div class="whiteboard-frame">
        <h2 style="margin-top:0;">ไวท์บอร์ดทดเลข</h2>
        <canvas id="mainCanvas"></canvas>
        <div style="margin-top: 15px;">
            <button class="btn btn-clear" onclick="clearCanvas()">ล้างหน้าจอ</button>
            <button class="btn btn-save"  onclick="downloadCanvas()">บันทึกภาพโน้ต</button>
        </div>
    </div>
</div>

<script>
const quizData = [
    { id:1,  question:"ทฤษฎีบทพีทาโกรัสเกี่ยวข้องกับรูปใดมากที่สุด? (แนวคิด: นิยามพื้นฐาน)",       concept:"นิยามพื้นฐาน",   options:["รูปสามเหลี่ยมมุมฉาก","รูปสามเหลี่ยมหน้าจั่ว","รูปสามเหลี่ยมด้านเท่า","รูปสามเหลี่ยมมุมป้าน"],   answer:"1. รูปสามเหลี่ยมมุมฉาก", detail:"ทฤษฎีบทพีทาโกรัสถูกนิยามขึ้นเพื่อใช้หาความยาวด้านของรูปสามเหลี่ยมที่มีมุมหนึ่งเป็นมุมฉาก (90°) เท่านั้น"},
    { id:2,  question:"จากรูปสามเหลี่ยมมุมฉาก ข้อใดถูก? (แนวคิด: สูตรมาตรฐาน)",                   concept:"สูตรมาตรฐาน",    options:["a² + b² = c²","a² + c² = b²","b² + c² = a²","ถูกทุกข้อ"],                                                 answer:"1. a² + b² = c²",         detail:"จากสูตร $a^2 + b^2 = c^2$ โดยที่ $a$ และ $b$ คือด้านประกอบมุมฉาก และ $c$ คือด้านตรงข้ามมุมฉากซึ่งยาวที่สุดเสมอ"},
    { id:3,  question:"ข้อใดกล่าวผิดเกี่ยวกับ b² = a² + c² (เมื่อ b คือด้านตรงข้ามมุมฉาก)? (แนวคิด: ความสัมพันธ์ด้าน)", concept:"ความสัมพันธ์ด้าน", options:["b² - c² = a²","a² + c² = b²","b² = a² + c²","a² - c² = b²"], answer:"4. a² - c² = b²", detail:"ถ้า $b$ เป็นด้านตรงข้ามมุมฉาก สูตรคือ $b^2 = a^2 + c^2$ ดังนั้นเมื่อย้ายข้างจะได้ $b^2 - a^2 = c^2$ หรือ $b^2 - c^2 = a^2$ แต่ $a^2 - c^2$ จะได้ค่าที่ผิดเงื่อนไขเพราะ $a < b$"},
    { id:4,  question:"ด้านประกอบยาว 6 และ 8 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: การคำนวณ)",             concept:"คำนวณ",           options:["9","10","11","12"],                                                                                          answer:"2. 10",                    detail:"วิธีทำ: $c^2 = 6^2 + 8^2 = 36 + 64 = 100$ | $c = \\sqrt{100} = 10$"},
    { id:5,  question:"ด้านตรงข้ามยาว 15 ด้านประกอบยาว 12 อีกด้านยาวเท่าใด? (แนวคิด: การหาด้านประกอบ)", concept:"หาด้านประกอบ", options:["8","9","11","13"],                                                                                         answer:"2. 9",                     detail:"วิธีทำ: $a^2 = 15^2 - 12^2 = 225 - 144 = 81$ | $a = \\sqrt{81} = 9$"},
    { id:6,  question:"ด้านประกอบยาว 12 และ 16 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: การคำนวณ)",             concept:"คำนวณ",           options:["17","18","20","25"],                                                                                         answer:"3. 20",                    detail:"วิธีทำ: $c^2 = 12^2 + 16^2 = 144 + 256 = 400$ | $c = \\sqrt{400} = 20$"},
    { id:7,  question:"ด้านประกอบ 2 และ 1.5 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: ทศนิยม)",                  concept:"ทศนิยม",          options:["2.5","3","3.5","4"],                                                                                         answer:"1. 2.5",                   detail:"วิธีทำ: $c^2 = 2^2 + 1.5^2 = 4 + 2.25 = 6.25$ | $\\sqrt{6.25} = 2.5$"},
    { id:8,  question:"ด้านประกอบ 1 และ 2.4 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: ทศนิยม)",                  concept:"ทศนิยม",          options:["1.5","1.8","2.5","2.6"],                                                                                    answer:"4. 2.6",                   detail:"วิธีทำ: $c^2 = 1 + 5.76 = 6.76$ | $\\sqrt{6.76} = 2.6$ (เพราะ $26^2 = 676$)"},
    { id:9,  question:"ด้านประกอบ 5 และ 5√2 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: ติดรูท)",                  concept:"ติดรูท",          options:["3√5","5√3","6√2","6√3"],                                                                                    answer:"2. 5√3",                   detail:"วิธีทำ: $c^2 = 25 + 50 = 75$ | $\\sqrt{75} = 5\\sqrt{3}$"},
    { id:10, question:"ด้านประกอบ 4√3 และ 2√2 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: ติดรูท)",                concept:"ติดรูท",          options:["2√14","4√5","5√6","6√6"],                                                                                   answer:"1. 2√14",                  detail:"วิธีทำ: $c^2 = 48 + 8 = 56$ | $\\sqrt{56} = 2\\sqrt{14}$"},
    { id:11, question:"ด้านประกอบ 105 และ 140 ด้านตรงข้ามยาวเท่าใด? (แนวคิด: เลขจำนวนมาก)",            concept:"เลขเยอะ",         options:["145","155","165","175"],                                                                                     answer:"4. 175",                   detail:"วิธีทำ: ตัวร่วม 35 → $35^2(3^2+4^2) = 35^2 \\times 25$ | คำตอบ: $35 \\times 5 = 175$"},
    { id:12, question:"ด้านตรงข้าม 156 ด้านประกอบ 144 อีกด้านยาวเท่าใด? (แนวคิด: การหาด้านประกอบ)",    concept:"หาด้านประกอบ",    options:["60","65","70","75"],                                                                                         answer:"1. 60",                    detail:"วิธีทำ: $b^2 = 156^2 - 144^2 = 3600$ | $b = 60$"},
    { id:13, question:"ด้านยาว 15, 20, 24 เป็นสามเหลี่ยมชนิดใด? (แนวคิด: การตรวจสอบชนิด)",             concept:"ตรวจสอบชนิด",    options:["มุมแหลม","มุมป้าน","มุมฉาก","ไม่เป็นสามเหลี่ยม"],                                                              answer:"1. รูปสามเหลี่ยมมุมแหลม", detail:"$24^2=576 < 15^2+20^2=625$ → มุมแหลม"},
    { id:14, question:"ด้านยาว 8, 11, 14 เป็นสามเหลี่ยมชนิดใด? (แนวคิด: การตรวจสอบชนิด)",              concept:"ตรวจสอบชนิด",    options:["มุมแหลม","มุมป้าน","มุมฉาก","ไม่เป็นสามเหลี่ยม"],                                                              answer:"2. รูปสามเหลี่ยมมุมป้าน",  detail:"$14^2=196 > 8^2+11^2=185$ → มุมป้าน"},
    { id:15, question:"ชุดตัวเลขใด ไม่ใช่สามเหลี่ยมมุมฉาก? (แนวคิด: ตัวเลขชุดมาตรฐาน)",               concept:"ตัวเลขชุด",       options:["3, 4, 5","5, 12, 13","7, 24, 25","8, 15, 16"],                                                               answer:"4. 8, 15, 16",             detail:"$8^2+15^2=289 \\neq 16^2=256$ → ไม่ใช่มุมฉาก"},
    { id:16, question:"ชุดตัวเลขใดเป็นสามเหลี่ยมมุมป้าน? (แนวคิด: อสมการพีทาโกรัส)",                    concept:"อสมการ",          options:["3, 4, 4.5","5, 11, 12","6, 8, 11","7, 24, 25"],                                                              answer:"3. 6, 8, 11",              detail:"$11^2=121 > 6^2+8^2=100$ → มุมป้าน"},
    { id:17, question:"รูปสามเหลี่ยมซ้อนกัน CD ยาวกว่า BC กี่หน่วย? (แนวคิด: รูปผสม)",                  concept:"รูปผสม",          options:["20","80","90","100"],                                                                                        answer:"2. 80",                    detail:"ใช้พีทาโกรัสหา BC และ CD จากสามเหลี่ยมย่อย แล้วนำมาลบกัน"},
    { id:18, question:"จากรูปทรงที่กำหนด AB ยาวเท่าใด? (แนวคิด: ระยะห่าง)",                              concept:"ระยะห่าง",        options:["10","11","12","13"],                                                                                         answer:"3. 12",                    detail:"ใช้พีทาโกรัสต่อเนื่อง 2 ครั้งในรูปทรงหลายเหลี่ยม"},
    { id:19, question:"จากพิกัดในโจทย์ AB ยาวเท่าใด? (แนวคิด: ระยะห่าง)",                                concept:"ระยะห่าง",        options:["25","25.5","26","30"],                                                                                       answer:"3. 26",                    detail:"$c^2 = 24^2 + 10^2 = 676$ | $c = 26$"},
    { id:20, question:"สามเหลี่ยม ABC มี AB=25, AC=26, AD⊥BC, BD=7 หา BC? (แนวคิด: เส้นตั้งฉาก)",       concept:"เส้นตั้งฉาก",    options:["10","17","24","31"],                                                                                         answer:"4. 31",                    detail:"AD=24 (จาก $25^2-7^2$), DC=10 (จาก $26^2-24^2$), BC=7+10+14=31"},
    { id:21, question:"พื้นที่สี่เหลี่ยม ABCD ในรูปคือเท่าใด? (แนวคิด: พื้นที่)",                          concept:"พื้นที่",         options:["132","144","288","672"],                                                                                     answer:"2. 144",                   detail:"แบ่งเป็นสามเหลี่ยมมุมฉาก 2 รูป หาพื้นที่แต่ละรูปแล้วรวมกัน"},
    { id:22, question:"สามเหลี่ยมที่มีด้าน 7, 24, 25 เป็นชนิดใด? (แนวคิด: ชนิดรูป)",                     concept:"ชนิดรูป",         options:["มุมแหลม","มุมป้าน","มุมฉาก","หน้าจั่ว"],                                                                       answer:"3. รูปสามเหลี่ยมมุมฉาก", detail:"$7^2+24^2=625=25^2$ → มุมฉากพอดี"},
    { id:23, question:"จงหาค่าความสูง h ในรูป? (แนวคิด: ความสูง)",                                        concept:"ความสูง",         options:["11","12","13","14"],                                                                                         answer:"2. 12",                    detail:"ใช้การเปรียบเทียบพื้นที่สามเหลี่ยมหรือพีทาโกรัสในสามเหลี่ยมย่อย"},
    { id:24, question:"ค่าของ m + n ในรูปคือเท่าใด? (แนวคิด: การรวมด้าน)",                                concept:"รวมด้าน",         options:["43","52","53","61"],                                                                                         answer:"3. 53",                    detail:"คำนวณ $m$ และ $n$ แยกกันจากรูป แล้วนำมาบวกกัน"},
    { id:25, question:"ค่าของ 2x - y คือเท่าใด? (แนวคิด: พีชคณิต)",                                       concept:"พีชคณิต",         options:["12","14","16","18"],                                                                                         answer:"2. 14",                    detail:"หาค่า $x$ และ $y$ จากพีทาโกรัส แล้วแทนค่าใน $2x-y$"},
    { id:26, question:"พื้นที่สี่เหลี่ยมคางหมู ABCD คือเท่าใด? (แนวคิด: พื้นที่)",                         concept:"พื้นที่",         options:["70","95","98","100"],                                                                                        answer:"3. 98",                    detail:"หาความสูง $h$ ด้วยพีทาโกรัส → $\\frac{1}{2}(a+b)h$"},
    { id:27, question:"สี่เหลี่ยมกว้าง 16 ทแยงมุม 34 พื้นที่เท่าใด? (แนวคิด: พื้นที่สี่เหลี่ยม)",          concept:"พื้นที่สี่เหลี่ยม", options:["480","500","520","544"],                                                                                   answer:"1. 480",                   detail:"ยาว: $\\sqrt{34^2-16^2}=\\sqrt{900}=30$ | พื้นที่: $16\\times30=480$"},
    { id:28, question:"เสาธงหักสูงจากพื้น 8 ห่างโคน 15 เสาเดิมสูงเท่าใด? (แนวคิด: โจทย์ปัญหา)",           concept:"โจทย์ปัญหา",      options:["17","20","23","25"],                                                                                         answer:"4. 25",                    detail:"ส่วนที่หัก: $\\sqrt{8^2+15^2}=17$ | ความสูงเดิม: $8+17=25$"},
    { id:29, question:"ตึกห่าง 8 สูง 25 และ 40 สลิงเชื่อมยอดยาวเท่าใด? (แนวคิด: ระยะห่าง)",               concept:"ระยะห่าง",        options:["15","17","20","25"],                                                                                         answer:"2. 17",                    detail:"ฐาน=8, สูง=$40-25=15$ | สลิง: $\\sqrt{64+225}=17$"},
    { id:30, question:"สามเหลี่ยมหน้าจั่วฐาน 20 ด้านข้าง 26 พื้นที่เท่าใด? (แนวคิด: หน้าจั่ว)",            concept:"หน้าจั่ว",        options:["240","260","480","520"],                                                                                     answer:"1. 240",                   detail:"สูง: $\\sqrt{26^2-10^2}=24$ | พื้นที่: $\\frac{1}{2}\\times20\\times24=240$"},
    { id:31, question:"เดินเหนือ 2+2 ตอ. 1+2 ห่างจุดเริ่มเท่าใด? (แนวคิด: ทิศทาง)",                      concept:"ทิศทาง",          options:["5","6","7","8"],                                                                                             answer:"1. 5",                     detail:"เหนือรวม=4, ตอ.รวม=3 | ระยะ: $\\sqrt{16+9}=5$"},
    { id:32, question:"บันได 12 พาดกำแพง ห่างโคน 4 กำแพงสูงเท่าใด? (แนวคิด: โจทย์บันได)",                 concept:"บันได",           options:["10.2","10.8","11.3","11.8"],                                                                                 answer:"3. 11.3",                  detail:"$h=\\sqrt{144-16}=\\sqrt{128}=8\\sqrt{2}\\approx11.31$"},
    { id:33, question:"สามเหลี่ยมรอบรูป 15 ด้านหนึ่ง 6 พื้นที่เท่าใด? (แนวคิด: โจทย์ซับซ้อน)",             concept:"ซับซ้อน",         options:["7.5","8.5","9.5","10"],                                                                                      answer:"1. 7.5",                   detail:"พื้นที่: $\\frac{1}{2}\\times6\\times2.5=7.5$"},
    { id:34, question:"ข้อใดถูก ก.ชุด10,24,26 ข.พื้นที่จัตุรัส ค.ใช้กับทุกสามเหลี่ยม? (แนวคิด: ทฤษฎี)",   concept:"ทฤษฎี",          options:["ก และ ข","ข และ ค","ก ข และ ค","ก เท่านั้น"],                                                                  answer:"1. ก และ ข",               detail:"ก.ถูก ($10^2+24^2=26^2$), ข.ถูก, ค.ผิด (ใช้ได้เฉพาะมุมฉาก)"},
    { id:35, question:"บันได 50 พาดตึก 48 กลับไปพาดกำแพงสูง 14 ห่างกันเท่าใด? (แนวคิด: โจทย์ประยุกต์)",   concept:"โจทย์ประยุกต์",  options:["60","62","64","66"],                                                                                         answer:"2. 62",                    detail:"ห่างตึก: $\\sqrt{2500-2304}=14$ | ห่างกำแพง: $\\sqrt{2500-196}=48$ | รวม: $14+48=62$"},
    { id:36, question:"สามเหลี่ยมด้าน 12√2, 12√2 และ 24 พื้นที่เท่าใด? (แนวคิด: ติดรูท)",                  concept:"ติดรูท",          options:["140","144","150","160"],                                                                                     answer:"2. 144",                   detail:"$(12\\sqrt{2})^2+(12\\sqrt{2})^2=576=24^2$ → มุมฉาก | พื้นที่: $\\frac{1}{2}\\times288=144$"}
];

// ─── สร้างโจทย์ ───────────────────────────────────────────────
function renderQuiz() {
    const container = document.getElementById('quiz-container');
    if (!container) return;

    container.innerHTML = quizData.map(q => `
        <div class="question-card">
            <span class="concept-tag">แนวคิด: ${q.concept}</span>
            <div style="font-size:1.1rem;font-weight:bold;margin-bottom:10px;">${q.id}. ${q.question}</div>
            <div class="options-grid">
                ${q.options.map((opt, i) => `
                    <div class="option" onclick="checkAnswer(this, ${q.id})">${i+1}. ${opt}</div>
                `).join('')}
            </div>
            <div id="sol-${q.id}" class="solution-box">
                <strong style="color:#38bdf8;">เฉลย:</strong> ${q.answer}<br>
                <strong style="color:#facc15;">วิธีทำ:</strong> ${q.detail}
            </div>
        </div>
    `).join('');

    // render สูตรหลังจาก inject HTML เสร็จ
    if (window.MathJax) MathJax.typesetPromise();
}

function checkAnswer(el, qId) {
    el.closest('.question-card').querySelectorAll('.option')
      .forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');

    const sol = document.getElementById(`sol-${qId}`);
    sol.style.display = 'block';
    // render สูตรในกล่องเฉลย
    if (window.MathJax) MathJax.typesetPromise([sol]);
}

// ─── ไวท์บอร์ด ────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
let isDrawing = false;

function initCanvas() {
    // แก้ไข: ใช้ offsetWidth/offsetHeight หลัง layout เสร็จ
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.lineWidth   = 3;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.strokeStyle = '#1e293b';
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) * (canvas.width  / rect.width),
        y: (src.clientY - rect.top)  * (canvas.height / rect.height)
    };
}

function startDrawing(e) {
    isDrawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
}

function draw(e) {
    if (!isDrawing) return;
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
}

function stopDrawing() {
    isDrawing = false;
}

canvas.addEventListener('mousedown',  startDrawing);
canvas.addEventListener('mousemove',  draw);
window.addEventListener('mouseup',    stopDrawing);
canvas.addEventListener('touchstart', e => { startDrawing(e); e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove',  e => { draw(e);         e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend',   stopDrawing);

function clearCanvas()    { ctx.clearRect(0, 0, canvas.width, canvas.height); }
function downloadCanvas() {
    const link     = document.createElement('a');
    link.download  = 'math-note.png';
    link.href      = canvas.toDataURL();
    link.click();
}

// ─── เริ่มต้น ─────────────────────────────────────────────────
window.addEventListener('load', () => {
    renderQuiz();
    initCanvas();
    // รองรับการ resize หน้าต่าง
    window.addEventListener('resize', initCanvas);
});
</script>
