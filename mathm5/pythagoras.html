<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังข้อสอบปีทาโกรัส - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; color: #333; margin: 0; background-color: #f0f2f5; }
        .header { background-color: #1a5f7a; color: white; padding: 20px; text-align: center; }
        
        .main-wrapper {
            display: flex;
            max-width: 100%;
            margin: 0;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-section { flex: 7.5; min-width: 0; }
        .sidebar-section { flex: 2.5; position: sticky; top: 20px; height: 90vh; min-width: 320px; display: flex; flex-direction: column; }

        .switch-container { display: flex; background: #e9ecef; padding: 5px; border-radius: 10px; margin-bottom: 10px; }
        .switch-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: transparent; color: #495057; }
        .switch-btn.active { background: #1a5f7a; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .panel-content { background: #fff; border: 2px solid #1a5f7a; border-radius: 10px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }

        #nano-banana-panel { display: none; flex-direction: column; height: 100%; }
        .ai-embedded-box { flex-grow: 1; background: #fff; border: 2px solid #4285f4; border-radius: 5px; display: flex; align-items: center; justify-content: flex-start; text-align: center; padding: 15px; flex-direction: column; overflow-y: auto; }
        .ai-input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit; font-size: 0.9em; }

        #scratchpad-panel { display: flex; flex-direction: column; height: 100%; }
        canvas { border: 1px solid #ddd; background-color: #fafafa; cursor: crosshair; width: 100%; flex-grow: 1; touch-action: none; border-radius: 5px; }

        .question { background-color: white; margin-bottom: 30px; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .ai-prompt-area { background: #fff9db; border: 1.5px dashed #fab005; padding: 12px; margin: 15px 0; border-radius: 8px; font-size: 0.85em; position: relative; }
        .copy-btn { background: #495057; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; float: right; font-size: 0.8em; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option { background: #fff; border: 2px solid #e0e0e0; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 1em; transition: 0.2s; }
        .option:hover { border-color: #1a5f7a; background: #f8fbff; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid #28a745; background: #e9f7ef; font-size: 0.95em; }
        .btn-submit { width: 100%; padding: 20px; background: #1a5f7a; color: white; border: none; border-radius: 10px; font-size: 1.2em; cursor: pointer; margin-top: 20px; font-weight: bold; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar-section { position: relative; top: 0; width: 100%; height: 500px; order: -1; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">คลังข้อสอบปีทาโกรัส 30 ข้อ x Nano Banana</h2>
    <p style="margin:5px 0 0 0;">โดย พระจอมเกล้าติวเตอร์ | CHINPONG SMART FARM</p>
</div>

<div class="main-wrapper">
    <!-- Quiz Section -->
    <div class="quiz-section">
        <div id="quiz-list"></div>
        <button class="btn-submit" onclick="showSummary()">🚀 ส่งคำตอบและวิเคราะห์ผลการเรียน</button>
        <div id="final-analysis" style="display:none; margin-top:20px; padding:25px; background:white; border-radius:10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #1a5f7a;"></div>
    </div>

    <!-- Sidebar Section -->
    <div class="sidebar-section">
        <div class="switch-container">
            <button id="btn-scratch" class="switch-btn active" onclick="switchMode('scratch')">📝 กระดานทดเลข</button>
            <button id="btn-ai" class="switch-btn" onclick="switchMode('ai')">🍌 Nano Banana AI</button>
        </div>

        <div class="panel-content">
            <!-- Scratchpad -->
            <div id="scratchpad-panel">
                <div style="margin-bottom:10px; display:flex; gap:8px;">
                    <button onclick="changeColor('#000')" style="background:#000; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer;">ดำ</button>
                    <button onclick="changeColor('#f00')" style="background:#f00; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer;">แดง</button>
                    <button onclick="clearCanvas()" style="margin-left:auto; background:#eee; border:1px solid #ccc; padding:5px 12px; border-radius:4px; cursor:pointer;">ล้างจอ</button>
                </div>
                <canvas id="scratchPad"></canvas>
            </div>

            <!-- AI Embedded -->
            <div id="nano-banana-panel">
                <div class="ai-embedded-box">
                    <div style="font-size: 24px; margin-bottom: 5px;">✨</div>
                    <p style="margin:0;"><strong>ระบบสร้างรูปประกอบโจทย์</strong></p>
                    <textarea id="ai-prompt-input" class="ai-input" rows="3" placeholder="คัดลอก Prompt จากโจทย์มาวางที่นี่..."></textarea>
                    
                    <button onclick="generateImage()" style="margin-top:10px; width:100%; padding:12px; background:#4285f4; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">🎨 วาดรูปประกอบเดี๋ยวนี้</button>

                    <div id="ai-result-container" style="margin-top:15px; width:100%; min-height:220px; border:1px dashed #4285f4; display:flex; align-items:center; justify-content:center; overflow:hidden; border-radius:8px; background:#f0f7ff;">
                        <p id="ai-placeholder-text" style="color:#4285f4; font-size:0.85em; padding:15px;">รูปภาพจะปรากฏที่นี่<br>(รองรับ Prompt ภาษาอังกฤษ)</p>
                        <img id="generated-image" src="" style="display:none; width:100%; height:auto; border-radius:5px;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- Quiz Data (ครบ 30 ข้อ) ---
const questions = [
    { q: "สามเหลี่ยมมุมฉากมีด้านประกอบยาว 6 และ 8 ซม. ด้านตรงข้ามมุมฉากยาวเท่าใด?", prompt: "2D math diagram, right triangle, base 6cm, height 8cm, hypotenuse labeled 'c', include right angle symbol, minimalist style, high contrast.", options: ["10 ซม.", "12 ซม.", "14 ซม.", "100 ซม."], correct: 0, exp: "6² + 8² = 36 + 64 = 100. ถอดรากที่สองของ 100 ได้ 10 ซม." },
    { q: "ถ้า c = 13 และ a = 5 ค่าของ b คือเท่าใด?", prompt: "Right triangle diagram, hypotenuse 13, one leg 5, find missing leg 'b', clear math font, white background.", options: ["8", "12", "15", "18"], correct: 1, exp: "13² - 5² = 169 - 25 = 144. ถอดรากที่สองของ 144 ได้ 12" },
    { q: "บันได 10 ม. พาดกำแพง ปลายบนสูง 8 ม. เชิงบันไดห่างกำแพงเท่าใด?", prompt: "Ladder (10m) leaning against a vertical wall. Wall height is 8m. Find ground distance 'x'. Right triangle focus.", options: ["2 ม.", "4 ม.", "6 ม.", "9 ม."], correct: 2, exp: "√ (10² - 8²) = √ (100 - 64) = √36 = 6 ม." },
    { q: "7, 24, 25 เป็นด้านของสามเหลี่ยมชนิดใด?", prompt: "Three sides labeled 7, 24, 25. Check 7^2 + 24^2 = 25^2. Right triangle verification.", options: ["มุมแหลม", "มุมป้าน", "มุมฉาก", "หน้าจั่ว"], correct: 2, exp: "มุมฉาก เพราะ 7² (49) + 24² (576) = 25² (625) พอดี" },
    { q: "ข้อใดไม่ใช่ชุดตัวเลขปีทาโกรัส?", prompt: "Sets of numbers: (3,4,5), (5,12,13), (4,5,6), (8,15,17). Comparison of squares.", options: ["3, 4, 5", "5, 12, 13", "4, 5, 6", "8, 15, 17"], correct: 2, exp: "4, 5, 6 เพราะ 4² + 5² = 16 + 25 = 41 ซึ่งไม่เท่ากับ 6² (36)" },
    { q: "เสาธงสูง 12 ม. เชือกผูกยอดเสาห่างโคนเสา 5 ม. เชือกยาวเท่าใด?", prompt: "Vertical flagpole 12m. Ground distance 5m. Rope connecting top to ground. Hypotenuse labeled 'x'.", options: ["13 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 0, exp: "√ (12² + 5²) = √ (144 + 25) = √169 = 13 ม." },
    { q: "สี่เหลี่ยมผืนผ้ากว้าง 9 ยาว 12 เส้นทแยงมุมยาวเท่าใด?", prompt: "Rectangle width 9, length 12. Diagonal line drawn. Right triangle visualization.", options: ["15", "18", "21", "25"], correct: 0, exp: "√ (9² + 12²) = √ (81 + 144) = √225 = 15" },
    { q: "สามเหลี่ยมที่มีด้าน 1 และ 0.6 อีกด้านหนึ่งยาวเท่าใดจึงเป็นมุมฉาก?", prompt: "Right triangle with leg 0.6 and hypotenuse 1. Find the other leg.", options: ["0.4", "0.8", "0.7", "0.5"], correct: 1, exp: "√ (1² - 0.6²) = √ (1 - 0.36) = √0.64 = 0.8" },
    { q: "ชุดตัวเลข x, 15, 17 (17 ยาวสุด) ค่า x คือเท่าใด?", prompt: "Triangle legs x and 15, hypotenuse 17. Simple 2D math diagram.", options: ["7", "8", "9", "10"], correct: 1, exp: "√ (17² - 15²) = √ (289 - 225) = √64 = 8" },
    { q: "พื้นที่สามเหลี่ยมมุมฉากที่มีด้านประกอบยาว 5 และ 12 คือเท่าใด?", prompt: "Right triangle legs 5 and 12. Calculation visualization.", options: ["30", "60", "65", "13"], correct: 0, exp: "พื้นที่ = (1/2) × ฐาน × สูง = (1/2) × 5 × 12 = 30" },
    { q: "รูปสามเหลี่ยมมีด้านยาว 1.5 ซม. และ 2 ซม. ด้านที่สามยาวเท่าใดจึงจะเป็นมุมฉาก?", prompt: "Right triangle legs 1.5 and 2. Labeled hypotenuse 'c'.", options: ["2.2 ซม.", "2.5 ซม.", "3 ซม.", "3.5 ซม."], correct: 1, exp: "√ (1.5² + 2²) = √ (2.25 + 4) = √6.25 = 2.5" },
    { q: "สี่เหลี่ยมจัตุรัสมีเส้นทแยงมุมยาว √50 ซม. ด้านของสี่เหลี่ยมยาวเท่าใด?", prompt: "Square with diagonal sqrt(50). Side length 's' labeled.", options: ["5 ซม.", "7 ซม.", "10 ซม.", "25 ซม."], correct: 0, exp: "s² + s² = (√50)² -> 2s² = 50 -> s² = 25 -> s = 5" },
    { q: "สามเหลี่ยมหน้าจั่วมีฐานยาว 16 ซม. ด้านประกอบยาว 10 ซม. ความสูงคือเท่าใด?", prompt: "Isosceles triangle, base 16, legs 10. Split into two right triangles.", options: ["4 ซม.", "6 ซม.", "8 ซม.", "10 ซม."], correct: 1, exp: "ใช้ด้าน 8 และ 10 ในปีทาโกรัส: √(10² - 8²) = √36 = 6" },
    { q: "มดเดินไปทางทิศเหนือ 9 ม. เลี้ยวไปทิศตะวันออก 12 ม. มดห่างจากจุดเริ่มต้นเท่าใด?", prompt: "Path: North 9m, then East 12m. Resulting displacement as hypotenuse.", options: ["15 ม.", "21 ม.", "18 ม.", "20 ม."], correct: 0, exp: "√(9² + 12²) = √225 = 15 ม." },
    { q: "ด้านตรงข้ามมุมฉากยาว 25 ด้านประกอบหนึ่งยาว 20 อีกด้านหนึ่งยาวเท่าใด?", prompt: "Hypotenuse 25, leg 20. Find missing leg 'b'.", options: ["5", "10", "15", "20"], correct: 2, exp: "√(25² - 20²) = √ (625 - 400) = √225 = 15" },
    { q: "สี่เหลี่ยมขนมเปียกปูนมีเส้นทแยงมุมยาว 12 และ 16 ซม. ด้านจะยาวเท่าใด?", prompt: "Rhombus with diagonals 12 and 16. Right triangle with legs 6, 8 inside.", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "√(6² + 8²) = √100 = 10" },
    { q: "วงกลมที่มีคอร์ดยาว 24 ซม. ห่างจากจุดศูนย์กลาง 5 ซม. รัศมียาวเท่าใด?", prompt: "Circle, center O, chord 24. Right triangle with legs 5 and 12 (half chord).", options: ["11 ซม.", "12 ซม.", "13 ซม.", "15 ซม."], correct: 2, exp: "รัศมีคือด้านตรงข้ามมุมฉาก: √(5² + 12²) = 13" },
    { q: "บันได 25 ฟุตพาดกำแพง เชิงบันไดห่างกำแพง 7 ฟุต ถ้าบันไดรูดลงมา 4 ฟุต ปลายบนจะสูงเท่าใด?", prompt: "Ladder slides down 4ft. Calculation diagram showing change in height.", options: ["20 ฟุต", "21 ฟุต", "24 ฟุต", "15 ฟุต"], correct: 0, exp: "ความสูงเดิมคือ 24 (√(25²-7²)). รูดลงมา 4 ม. เหลือ 20" },
    { q: "สามเหลี่ยมที่มีด้าน 9, 12, 15 มีพื้นที่เท่าใด?", prompt: "Triangle sides 9, 12, 15. Right triangle check first.", options: ["54", "90", "108", "135"], correct: 0, exp: "(1/2) * ฐาน (9) * สูง (12) = 54" },
    { q: "สี่เหลี่ยมผืนผ้ากว้าง 5 ยาว 12 เส้นทแยงมุมยาวกว่าด้านกว้างเท่าใด?", prompt: "Rectangle 5x12. Diagonal length minus width (13 - 5).", options: ["7", "8", "10", "13"], correct: 1, exp: "เส้นทแยงมุมยาว 13. ต่างจากด้านกว้าง (5) อยู่ 8" },
    { q: "กล่องกว้าง 3 ยาว 4 สูง 12 ซม. เส้นทแยงมุมภายในกล่องยาวเท่าใด?", prompt: "3D cuboid space diagonal line. Dimensions 3, 4, 12.", options: ["13 ซม.", "15 ซม.", "17 ซม.", "19 ซม."], correct: 0, exp: "√(3² + 4² + 12²) = √169 = 13" },
    { q: "สามเหลี่ยมมุมฉากมีด้านประกอบยาว x และ x+7 ด้านตรงข้ามยาว 13 ค่า x คือ?", prompt: "Right triangle legs x and x+7, hypotenuse 13. Algebra visualization.", options: ["3", "5", "7", "12"], correct: 1, exp: "จากชุดตัวเลข (5, 12, 13). ดังนั้น x = 5" },
    { q: "สามเหลี่ยมด้านเท่ามีด้านยาว 10 ซม. จะมีความสูงประมาณเท่าใด?", prompt: "Equilateral triangle side 10. Height 'h' calculation.", options: ["5 ซม.", "7.5 ซม.", "8.66 ซม.", "10 ซม."], correct: 2, exp: "√(10² - 5²) = √75 ≈ 8.66" },
    { q: "เรือลำหนึ่งไปทิศเหนือ 24 กม. อีกลำไปทิศตะวันออก 10 กม. เรือห่างกันกี่ กม.?", prompt: "Two paths: North 24km, East 10km. Distance between ends.", options: ["26 กม.", "30 กม.", "34 กม.", "40 กม."], correct: 0, exp: "√(24² + 10²) = √676 = 26" },
    { q: "สี่เหลี่ยมคางหมูมีด้านขนานยาว 10, 16 ซม. สูง 8 ซม. ด้านที่เหลือยาวเท่าใด?", prompt: "Trapezoid, legs of right triangle are 8 and 6 (16-10).", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "√(8² + 6²) = √100 = 10" },
    { q: "จุด A(2,3) และ B(5,7) ห่างกันกี่หน่วย?", prompt: "Coordinate points A(2,3) B(5,7). Right triangle Δx=3, Δy=4.", options: ["4", "5", "6", "7"], correct: 1, exp: "√(3² + 4²) = 5" },
    { q: "สามเหลี่ยมที่มีด้าน 21, 28, 35 มีรัศมีวงกลมล้อมรอบเท่าใด?", prompt: "Right triangle 21, 28, 35. Radius of circumcircle.", options: ["15", "17.5", "20", "35"], correct: 1, exp: "รัศมี = ครึ่งหนึ่งของด้านตรงข้ามมุมฉาก = 35 / 2 = 17.5" },
    { q: "พีระมิดฐานจัตุรัสยาวด้านละ 10 ซม. สูงตรง 12 ซม. สูงเอียงยาวเท่าใด?", prompt: "Pyramid slant height 's'. Vertical height 12, half-base 5.", options: ["13 ซม.", "15 ซม.", "17 ซม.", "18 ซม."], correct: 0, exp: "√(12² + 5²) = 13" },
    { q: "ถ้าพื้นที่จัตุรัสบนด้านประกอบคือ 25 และ 144 เส้นรอบรูปสามเหลี่ยมยาวเท่าใด?", prompt: "Squares on legs areas 25, 144. Find perimeter of triangle.", options: ["30", "35", "40", "60"], correct: 0, exp: "ด้านคือ 5, 12, 13. เส้นรอบรูป = 5+12+13 = 30" },
    { q: "เสาไฟสูง 15 ม. ตึกสูง 30 ม. ห่างกัน 8 ม. สายไฟที่เชื่อมยอดทั้งสองยาวเท่าใด?", prompt: "Pole 15m, Building 30m, 8m apart. Diagonal wire length.", options: ["10 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 2, exp: "ฐาน 8, สูงต่าง 15. √(8² + 15²) = √289 = 17" }
];

let userAnswers = new Array(30).fill(null);

function renderQuiz() {
    const list = document.getElementById('quiz-list');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <div style="font-size:1.1em; margin-bottom:10px;"><strong>ข้อที่ ${i+1}:</strong> ${q.q}</div>
            <div class="ai-prompt-area">
                <button class="copy-btn" onclick="copyPrompt('${i}')">Copy Prompt</button>
                <strong style="color:#d4a017;">✨ Prompt สำหรับ Nano Banana AI:</strong><br>
                <span id="ptext-${i}">${q.prompt}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIdx) => `<button class="option" onclick="check(${i}, ${oIdx}, this)">${opt}</button>`).join('')}
            </div>
            <div id="exp-${i}" class="explanation"></div>
        `;
        list.appendChild(div);
    });
}

function copyPrompt(id) {
    const text = document.getElementById(`ptext-${id}`).innerText;
    navigator.clipboard.writeText(text);
    alert("คัดลอก Prompt แล้ว! วางที่ช่อง AI ด้านขวาเพื่อดูรูปประกอบได้เลย");
}

function check(qI, oI, btn) {
    if (userAnswers[qI] !== null) return;
    userAnswers[qI] = oI;
    const isCorrect = oI === questions[qI].correct;
    btn.style.background = isCorrect ? '#d4edda' : '#f8d7da';
    btn.style.borderColor = isCorrect ? '#28a745' : '#dc3545';
    const exp = document.getElementById(`exp-${qI}`);
    exp.style.display = 'block';
    exp.innerHTML = `<strong>${isCorrect ? '✅ ถูกต้อง!' : '❌ ยังไม่ถูกครับ'}</strong><br>${questions[qI].exp}`;
}

function generateImage() {
    const promptInput = document.getElementById('ai-prompt-input').value;
    const imgElement = document.getElementById('generated-image');
    const placeholder = document.getElementById('ai-placeholder-text');
    
    if (!promptInput) { alert("กรุณาวาง Prompt ก่อนครับ"); return; }

    placeholder.innerText = "🌀 Nano Banana กำลังวาดรูปให้คุณ...";
    imgElement.style.display = "none";
    placeholder.style.display = "block";

    // ปรับปรุง Prompt ให้ AI วาดรูปได้ตรงกับโจทย์วิชาคณิตศาสตร์มากขึ้น
    const enhancedPrompt = `${promptInput}, 2D simple line art, mathematical illustration, white background, high quality, clear labels.`;
    const seed = Math.floor(Math.random() * 1000000);
    
    imgElement.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(enhancedPrompt)}?seed=${seed}&width=512&height=512&nologo=true`;
    
    imgElement.onload = function() {
        placeholder.style.display = "none";
        imgElement.style.display = "block";
    };
}

function switchMode(mode) {
    const sPanel = document.getElementById('scratchpad-panel');
    const aPanel = document.getElementById('nano-banana-panel');
    const bScratch = document.getElementById('btn-scratch');
    const bAi = document.getElementById('btn-ai');
    if (mode === 'scratch') {
        sPanel.style.display = 'flex'; aPanel.style.display = 'none';
        bScratch.classList.add('active'); bAi.classList.remove('active');
        resizeCanvas();
    } else {
        sPanel.style.display = 'none'; aPanel.style.display = 'flex';
        bScratch.classList.remove('active'); bAi.classList.add('active');
    }
}

// Canvas Logic
const canvas = document.getElementById('scratchPad');
const ctx = canvas.getContext('2d');
let drawing = false;

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight - 60;
    ctx.lineCap = 'round'; ctx.lineWidth = 3;
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

function draw(e) {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}
canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
function changeColor(c) { ctx.strokeStyle = c; }
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function showSummary() {
    let score = userAnswers.filter((a, i) => a === questions[i].correct).length;
    const analysis = document.getElementById('final-analysis');
    analysis.style.display = 'block';
    let text = `<h2 style="color:#1a5f7a; margin-top:0;">📊 สรุปผลคะแนน: ${score} / 30</h2>`;
    
    if(score < 15) {
        text += "<p><strong>วิเคราะห์:</strong> พื้นฐานปีทาโกรัสยังต้องปรับปรุง แนะนำให้ลองวาดภาพประกอบโจทย์ทุกครั้งก่อนเริ่มคำนวณครับ</p>";
    } else if(score < 25) {
        text += "<p><strong>วิเคราะห์:</strong> คุณมีความเข้าใจดีมาก! พลาดเพียงโจทย์ประยุกต์บางส่วน ฝึกฝนเพิ่มอีกนิดจะแม่นยำขึ้นครับ</p>";
    } else {
        text += "<p><strong>วิเคราะห์:</strong> สุดยอด! คุณเป็นผู้เชี่ยวชาญด้านทฤษฎีบทปีทาโกรัสแล้ว</p>";
    }
    
    text += `<button onclick="location.reload()" style="padding:10px 20px; background:#495057; color:white; border:none; border-radius:5px; cursor:pointer;">ทำใหม่อีกครั้ง</button>`;
    
    analysis.innerHTML = text;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

renderQuiz();
