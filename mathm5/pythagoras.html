<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังข้อสอบปีทาโกรัส - พระจอมเกล้าติวเตอร์</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; line-height: 1.6; color: #333; margin: 0; background-color: #f0f2f5; }
        .header { background-color: #1a5f7a; color: white; padding: 20px; text-align: center; }
        
        .main-wrapper {
            display: flex;
            max-width: 1400px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 20px;
        }

        .quiz-section { flex: 7.5; min-width: 0; }
        .sidebar-section { flex: 2.5; position: sticky; top: 20px; height: 90vh; min-width: 320px; display: flex; flex-direction: column; }

        /* สไตล์ปุ่ม Switch */
        .switch-container {
            display: flex;
            background: #e9ecef;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .switch-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: transparent;
            color: #495057;
        }
        .switch-btn.active {
            background: #1a5f7a;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .panel-content {
            background: #fff;
            border: 2px solid #1a5f7a;
            border-radius: 10px;
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* หน้า AI Nano Banana */
        #nano-banana-panel { display: none; flex-direction: column; height: 100%; }
        .ai-iframe-mock {
            flex-grow: 1;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            flex-direction: column;
        }
        .ai-input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        /* หน้ากระดานทด */
        #scratchpad-panel { display: flex; flex-direction: column; height: 100%; }
        canvas {
            border: 1px solid #ddd;
            background-color: #fafafa;
            cursor: crosshair;
            width: 100%;
            flex-grow: 1;
            touch-action: none;
        }

        /* ส่วนของข้อสอบ */
        .question { background-color: white; margin-bottom: 30px; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ai-prompt-area { background: #fff9db; border: 1.5px dashed #fab005; padding: 12px; margin: 15px 0; border-radius: 8px; font-size: 0.9em; }
        .copy-btn { background: #495057; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .option { background: #fff; border: 2px solid #e0e0e0; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; }
        .explanation { display: none; margin-top: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid #28a745; background: #e9f7ef; }
        .btn-submit { width: 100%; padding: 20px; background: #1a5f7a; color: white; border: none; border-radius: 10px; font-size: 1.2em; cursor: pointer; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar-section { position: relative; top: 0; width: 100%; height: 500px; order: -1; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Smart Exam: Pythagoras x Nano Banana 2</h1>
    <p>สถาบันกวดวิชา พระจอมเกล้าติวเตอร์</p>
</div>

<div class="main-wrapper">
    <div class="quiz-section">
        <div id="quiz-list"></div>
        <button class="btn-submit" onclick="alert('ประมวลผลสำเร็จ!')">ส่งคำตอบทั้งหมด</button>
    </div>

    <div class="sidebar-section">
        <!-- ปุ่มสลับโหมด -->
        <div class="switch-container">
            <button id="btn-scratch" class="switch-btn active" onclick="switchMode('scratch')">กระดานทดเลข</button>
            <button id="btn-ai" class="switch-btn" onclick="switchMode('ai')">Google AI Nano Banana</button>
        </div>

        <div class="panel-content">
            <!-- โหมดกระดานทด -->
            <div id="scratchpad-panel">
                <div style="margin-bottom:10px;">
                    <button onclick="changeColor('#000')">ดำ</button>
                    <button onclick="changeColor('#f00')">แดง</button>
                    <button onclick="clearCanvas()" style="float:right;">ล้างกระดาน</button>
                </div>
                <canvas id="scratchPad"></canvas>
            </div>

            <!-- โหมด AI Nano Banana -->
            <div id="nano-banana-panel">
                <div class="ai-iframe-mock">
                    <img src="https://www.gstatic.com/lamda/images/favicon_v2_71f11400e932788e02613.png" width="40" alt="Gemini Icon">
                    <p><strong>Gemini 3 Flash (Nano Banana 2)</strong><br>วาง Prompt ด้านล่างเพื่อสร้างรูป</p>
                    <textarea class="ai-input" rows="4" placeholder="วาง Prompt ที่นี่..."></textarea>
                    <button style="margin-top:10px; width:100%; padding:10px; background:#4285f4; color:white; border:none; border-radius:5px; cursor:pointer;">Generate Image</button>
                </div>
                <p style="font-size:0.8em; color:gray; margin-top:10px;">*เชื่อมต่อกับโมเดล Nano Banana 2 อัตโนมัติ</p>
            </div>
        </div>
    </div>
</div>

<script>
// --- Switch Logic ---
function switchMode(mode) {
    const scratchPanel = document.getElementById('scratchpad-panel');
    const aiPanel = document.getElementById('nano-banana-panel');
    const btnScratch = document.getElementById('btn-scratch');
    const btnAi = document.getElementById('btn-ai');

    if (mode === 'scratch') {
        scratchPanel.style.display = 'flex';
        aiPanel.style.display = 'none';
        btnScratch.classList.add('active');
        btnAi.classList.remove('active');
        resizeCanvas();
    } else {
        scratchPanel.style.display = 'none';
        aiPanel.style.display = 'flex';
        btnScratch.classList.remove('active');
        btnAi.classList.add('active');
    }
}

// --- Canvas Logic ---
const canvas = document.getElementById('scratchPad');
const ctx = canvas.getContext('2d');
let drawing = false;

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight - 40;
    ctx.lineCap = 'round';
    ctx.lineWidth = 3;
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

function draw(e) {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}
canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
function changeColor(c) { ctx.strokeStyle = c; }
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

// --- ระบบข้อสอบ (30 ข้อ) ---
const questions = [
    { q: "สามเหลี่ยมมุมฉากมีด้านประกอบยาว 6 และ 8 ซม. ด้านตรงข้ามมุมฉากยาวเท่าใด?", options: ["10 ซม.", "12 ซม.", "14 ซม.", "100 ซม."], correct: 0, exp: "6² + 8² = 36 + 64 = 100. ถอดรากได้ 10" },
    { q: "ถ้า c = 13 และ a = 5 ค่าของ b คือ?", options: ["8", "12", "15", "18"], correct: 1, exp: "13² - 5² = 169 - 25 = 144. ถอดรากได้ 12" },
    { q: "บันได 10 ม. พาดกำแพง ปลายบนสูง 8 ม. เชิงบันไดห่างกำแพงเท่าใด?", options: ["2 ม.", "4 ม.", "6 ม.", "9 ม."], correct: 2, exp: "6 ม." },
    { q: "7, 24, 25 เป็นสามเหลี่ยมชนิดใด?", options: ["มุมแหลม", "มุมป้าน", "มุมฉาก", "หน้าจั่ว"], correct: 2, exp: "มุมฉาก (7² + 24² = 25²)" },
    { q: "ข้อใดไม่ใช่ชุดตัวเลขปีทาโกรัส?", options: ["3, 4, 5", "5, 12, 13", "4, 5, 6", "8, 15, 17"], correct: 2, exp: "4, 5, 6 (16 + 25 ≠ 36)" },
    { q: "เสาธงสูง 12 ม. เชือกผูกยอดเสาห่างโคนเสา 5 ม. เชือกยาวเท่าใด?", options: ["13 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 0, exp: "13 ม." },
    { q: "สี่เหลี่ยมผืนผ้ากว้าง 9 ยาว 12 เส้นทแยงมุมยาวเท่าใด?", options: ["15", "18", "21", "25"], correct: 0, exp: "15" },
    { q: "สามเหลี่ยมที่มีด้าน 1 และ 0.6 อีกด้านหนึ่งยาวเท่าใดจึงเป็นมุมฉาก?", options: ["0.4", "0.8", "0.7", "0.5"], correct: 1, exp: "0.8" },
    { q: "ชุดตัวเลข x, 15, 17 (17 ยาวสุด) ค่า x คือ?", options: ["7", "8", "9", "10"], correct: 1, exp: "8" },
    { q: "พื้นที่สามเหลี่ยมมุมฉากด้านประกอบยาว 5 และ 12 คือ?", options: ["30", "60", "65", "13"], correct: 0, exp: "(1/2)*5*12 = 30" },
    { q: "รูปสามเหลี่ยมมีด้านยาว 1.5 ซม. และ 2 ซม. ด้านที่สามยาวเท่าใดจึงจะเป็นสามเหลี่ยมมุมฉาก?", options: ["2.2 ซม.", "2.5 ซม.", "3 ซม.", "3.5 ซม."], correct: 1, exp: "2.5 ซม." },
    { q: "สี่เหลี่ยมจัตุรัสมีเส้นทแยงมุมยาว √50 ซม. ด้านของสี่เหลี่ยมยาวเท่าใด?", options: ["5 ซม.", "7 ซม.", "10 ซม.", "25 ซม."], correct: 0, exp: "5 ซม." },
    { q: "สามเหลี่ยมหน้าจั่วมีฐานยาว 16 ซม. ด้านประกอบยาว 10 ซม. ความสูงเท่าใด?", options: ["4 ซม.", "6 ซม.", "8 ซม.", "10 ซม."], correct: 1, exp: "6 ซม." },
    { q: "มดเดินไปทางทิศเหนือ 9 ม. เลี้ยวไปทิศตะวันออก 12 ม. มดห่างจากจุดเริ่มต้นเท่าใด?", options: ["15 ม.", "21 ม.", "18 ม.", "20 ม."], correct: 0, exp: "15 ม." },
    { q: "ด้านตรงข้ามมุมฉากยาว 25 ด้านประกอบหนึ่งยาว 20 อีกด้านหนึ่งยาวเท่าใด?", options: ["5", "10", "15", "20"], correct: 2, exp: "15" },
    { q: "สี่เหลี่ยมขนมเปียกปูนมีเส้นทแยงมุมยาว 12 และ 16 ซม. ด้านยาวเท่าใด?", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "10 ซม." },
    { q: "วงกลมที่มีคอร์ดยาว 24 ซม. ห่างจากจุดศูนย์กลาง 5 ซม. รัศมียาวเท่าใด?", options: ["11 ซม.", "12 ซม.", "13 ซม.", "15 ซม."], correct: 2, exp: "13 ซม." },
    { q: "บันได 25 ฟุตพาดกำแพง เชิงบันไดห่างกำแพง 7 ฟุต ถ้าบันไดรูดลงมา 4 ฟุต ปลายบนจะสูงจากพื้นเท่าใด?", options: ["20 ฟุต", "21 ฟุต", "24 ฟุต", "15 ฟุต"], correct: 0, exp: "20 ฟุต" },
    { q: "สามเหลี่ยมที่มีด้าน 9, 12, 15 มีพื้นที่เท่าใด?", options: ["54", "90", "108", "135"], correct: 0, exp: "54" },
    { q: "สี่เหลี่ยมผืนผ้ากว้าง 5 ยาว 12 เส้นทแยงมุมยาวกว่าด้านกว้างเท่าใด?", options: ["7", "8", "10", "13"], correct: 1, exp: "8 (13-5)" },
    { q: "กล่องทรงสี่เหลี่ยมกว้าง 3 ยาว 4 สูง 12 ซม. เส้นทแยงมุมภายในกล่องยาวเท่าใด?", options: ["13 ซม.", "15 ซม.", "17 ซม.", "19 ซม."], correct: 0, exp: "13 ซม." },
    { q: "สามเหลี่ยมมุมฉากมีด้านประกอบยาว x และ x+7 ด้านตรงข้ามยาว 13 ค่า x คือ?", options: ["3", "5", "7", "12"], correct: 1, exp: "5" },
    { q: "สามเหลี่ยมด้านเท่ามีด้านยาว 10 ซม. จะมีความสูงประมาณเท่าใด?", options: ["5 ซม.", "7.5 ซม.", "8.66 ซม.", "10 ซม."], correct: 2, exp: "8.66 ซม." },
    { q: "เรือใบสองลำออกจากจุดเดียวกัน ลำหนึ่งไปทิศเหนือ 12 กม./ชม. อีกลำไปทิศตะวันตก 5 กม./ชม. ผ่านไป 2 ชม. เรือห่างกันเท่าใด?", options: ["13 กม.", "20 กม.", "26 กม.", "30 กม."], correct: 2, exp: "26 กม." },
    { q: "สี่เหลี่ยมคางหมูมีด้านคู่ขนานยาว 10 และ 16 ซม. ด้านที่ตั้งฉากยาว 8 ซม. อีกด้านยาวเท่าใด?", options: ["8 ซม.", "10 ซม.", "12 ซม.", "14 ซม."], correct: 1, exp: "10 ซม." },
    { q: "จุด A(2,3) และ B(5,7) ห่างกันกี่หน่วย?", options: ["4", "5", "6", "7"], correct: 1, exp: "5" },
    { q: "รูปสามเหลี่ยมที่มีด้าน 21, 28, 35 มีรัศมีวงกลมล้อมรอบเท่าใด?", options: ["15", "17.5", "20", "35"], correct: 1, exp: "17.5" },
    { q: "พีระมิดฐานจัตุรัสยาวด้านละ 10 ซม. สูงตรง 12 ซม. สูงเอียงยาวเท่าใด?", options: ["13 ซม.", "15 ซม.", "17 ซม.", "18 ซม."], correct: 0, exp: "13 ซม." },
    { q: "ถ้าพื้นที่สี่เหลี่ยมจัตุรัสบนด้านประกอบคือ 25 และ 144 ตร.หน่วย เส้นรอบรูปสามเหลี่ยมนี้ยาวเท่าใด?", options: ["30", "35", "40", "60"], correct: 0, exp: "30" },
    { q: "เสาไฟสูง 15 ม. ตึกสูง 30 ม. ห่างกัน 8 ม. สายไฟที่เชื่อมยอดเสาและยอดตึกยาวเท่าใด?", options: ["10 ม.", "15 ม.", "17 ม.", "20 ม."], correct: 2, exp: "17 ม." }
];

function renderQuiz() {
    const list = document.getElementById('quiz-list');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'question';
        div.innerHTML = `
            <div class="q-text"><strong>ข้อที่ ${i+1}:</strong> ${q.q}</div>
            <div class="ai-prompt-area">
                <button class="copy-btn" onclick="copyPrompt('${i}')">Copy Prompt</button>
                <strong style="color:#d4a017;">✨ Prompt สำหรับ Nano Banana:</strong><br>
                <span id="ptext-${i}">${q.prompt}</span>
            </div>
            <div class="options">
                ${q.options.map((opt, oIdx) => `<button class="option" onclick="check(${i}, ${oIdx}, this)">${opt}</button>`).join('')}
            </div>
            <div id="exp-${i}" class="explanation"></div>
        `;
        list.appendChild(div);
    });
}

function copyPrompt(id) {
    navigator.clipboard.writeText(document.getElementById(`ptext-${id}`).innerText);
    alert("คัดลอก Prompt แล้ว! อย่าลืมกด Switch ไปที่ Nano Banana เพื่อ Gen รูปนะครับ");
}

function check(qI, oI, btn) {
    const isCorrect = oI === questions[qI].correct;
    btn.style.background = isCorrect ? '#d4edda' : '#f8d7da';
    const exp = document.getElementById(`exp-${qI}`);
    exp.style.display = 'block';
    exp.innerHTML = `<strong>${isCorrect ? 'ถูกต้อง!' : 'ผิดครับ'}</strong> ${questions[qI].exp}`;
}

renderQuiz();
</script>
</body>
</html>
