<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังข้อสอบและกระดานอัจฉริยะ ม.5 | การลำเลียงสารผ่านเซลล์</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --secondary: #1565c0;
            --secondary-light: #e3f2fd;
            --dark: #263238;
            --light: #ffffff;
            --gray: #f5f7f8;
            --border: #cfd8dc;
            --success: #4caf50;
            --error: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eceff1;
            color: var(--dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout Structure */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .quiz-section {
            flex: 1.2;
            height: 100%;
            overflow-y: auto;
            background-color: var(--light);
            padding: 30px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .board-section {
            flex: 0.8;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            border-left: 4px solid var(--border);
            position: relative;
        }

        /* Header Styles */
        .header {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary-light);
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #546e7a;
            font-size: 14px;
        }

        /* Progress Bar */
        .progress-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--primary), #66bb6a);
            height: 100%;
            width: 3.33%;
            transition: width 0.3s ease;
        }

        /* Quiz UI Components */
        .question-card {
            background: var(--gray);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 6px solid var(--primary);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .question-number {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-item {
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            line-height: 1.5;
            display: flex;
            align-items: center;
        }

        .option-item:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .option-item.selected {
            border-color: var(--secondary);
            background-color: var(--secondary-light);
        }

        .option-item.correct {
            border-color: var(--success) !important;
            background-color: #e8f5e9 !important;
            color: #2e7d32;
            font-weight: bold;
        }

        .option-item.incorrect {
            border-color: var(--error) !important;
            background-color: #ffebee !important;
            color: #c62828;
        }

        .option-item.disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Feedback & Rationale Box */
        .rationale-box {
            background-color: #fff9c4;
            border-left: 4px solid #fbc02d;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }

        /* Navigation Buttons */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #1b5e20;
        }

        .btn-secondary {
            background-color: #cfd8dc;
            color: var(--dark);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: #b0bec5;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Whiteboard Section Styles */
        .board-header {
            background-color: #34495e;
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .board-title {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .board-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .tool-btn {
            background: none;
            border: none;
            color: #b0bec5;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tool-btn:hover, .tool-btn.active {
            color: white;
            background-color: rgba(255,255,255,0.2);
        }

        .color-picker {
            width: 24px;
            height: 24px;
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        #whiteboard {
            flex-grow: 1;
            background-color: #1e272e;
            cursor: crosshair;
            width: 100%;
            height: 100%;
        }

        /* Summary Score View */
        .summary-card {
            text-align: center;
            padding: 40px;
            background: var(--primary-light);
            border-radius: 15px;
            margin: auto;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            font-size: 48px;
            font-weight: bold;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .score-circle span {
            font-size: 16px;
            font-weight: normal;
            opacity: 0.9;
        }

        /* Tips / Hint button */
        .hint-btn {
            background: none;
            border: none;
            color: var(--secondary);
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            margin-bottom: 15px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .hint-text {
            background-color: #e3f2fd;
            border-left: 4px solid #1565c0;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            color: #0d47a1;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Left Panel: Quiz Module -->
    <div class="quiz-section">
        <div class="header">
            <h1>🧬 คลังข้อสอบชีววิทยา ม.5 อัจฉริยะ</h1>
            <p>บทเรียน: การลำเลียงสารเข้าและออกจากเซลล์ (การแพร่, ออสโมซิส, และการลำเลียงแบบใช้พลังงาน)</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div id="quiz-wrapper">
            <!-- Questions dynamically generated here -->
            <div class="question-card">
                <div class="question-number" id="qNum">คำถามข้อที่ 1 / 30</div>
                <div class="question-text" id="qText">Loading question...</div>
                
                <button class="hint-btn" onclick="toggleHint()">💡 ดูคำใบ้เพื่อช่วยคิด</button>
                <div class="hint-text" id="hintBox">คำใบ้จะปรากฏที่นี่...</div>

                <div class="options-list" id="optionsContainer">
                    <!-- Options buttons go here -->
                </div>

                <div class="rationale-box" id="rationaleBox">
                    <strong>วิเคราะห์และคำอธิบาย:</strong> <span id="rationaleText"></span>
                </div>
            </div>
        </div>

        <div class="nav-controls" id="navControls">
            <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>ย้อนกลับ</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>ข้อถัดไป</button>
        </div>
    </div>

    <!-- Right Panel: Smart Scratchpad / Whiteboard -->
    <div class="board-section">
        <div class="board-header">
            <div class="board-title">🖍️ กระดานกระดาษทดดิจิทัล (Scratchpad Whiteboard)</div>
            <div class="board-toolbar">
                <input type="color" class="color-picker" id="brushColor" value="#4caf50">
                <select id="brushSize" style="background:#34495e; color:white; border:1px solid #7f8c8d; border-radius:4px; padding:2px 5px;">
                    <option value="2">เส้นบาง (2px)</option>
                    <option value="5" selected>เส้นปกติ (5px)</option>
                    <option value="10">เส้นหนา (10px)</option>
                </select>
                <button class="tool-btn" onclick="clearBoard()">🗑️ ล้างกระดาน</button>
            </div>
        </div>
        <canvas id="whiteboard"></canvas>
    </div>
</div>

<script>
    // 30 High-Quality biology questions compiled perfectly for M.5 level standard
    const questions = [
        {
            "question": "กระบวนการแพร่ (Diffusion) ของสารเกิดขึ้นเนื่องจากปัจจัยใดเป็นหลัก?",
            "options": [
                "การเคลื่อนที่แบบสุ่มของอนุภาคสารจากบริเวณที่มีความเข้มข้นสูงไปสู่บริเวณที่มีความเข้มข้นต่ำ",
                "การใช้พลังงาน ATP จากเซลล์ในการผลักดันอนุภาคสาร",
                "ความแตกต่างของอุณหภูมิระหว่างภายนอกและภายในเซลล์เท่านั้น",
                "แรงดันเต่งที่เกิดขึ้นภายในไซโทพลาซึม"
            ],
            "correct": 0,
            "hint": "ลองนึกถึงเวลาเราฉีดน้ำหอมในห้อง กลิ่นจะกระจายจากจุดที่หนาแน่นไปทั่วห้องได้อย่างไรโดยไม่ต้องพึ่งพัดลมปั๊มสาร",
            "rationale": "การแพร่เกิดจากพลังงานจลน์ในตัวเองของอนุภาคสาร ทำให้โมเลกุลเกิดการเคลื่อนที่แบบสุ่ม (Random movement) และกระจายจากบริเวณหนาแน่นมากไปหาน้อยจนเข้าสู่สมดุล"
        },
        {
            "question": "การออสโมซิส (Osmosis) มีความแตกต่างจากการแพร่ธรรมดาอย่างไร?",
            "options": [
                "เป็นการเคลื่อนที่ของตัวละลายผ่านเยื่อเลือกผ่านโดยใช้พลังงาน",
                "เกิดขึ้นเฉพาะในเซลล์พืชเท่านั้น ไม่พบในเซลล์สัตว์",
                "เป็นการแพร่ของโมเลกุลน้ำผ่านเยื่อเลือกผ่านจากบริเวณที่มีสารละลายเข้มข้นต่ำไปสูง",
                "สารละลายต้องมีความเข้มข้นเท่ากันจึงจะเกิดการออสโมซิสได้"
            ],
            "correct": 2,
            "hint": "คำสำคัญของการออสโมซิสคือยึดที่ทิศทางและปริมาณของ 'โมเลกุลของน้ำ' เป็นตัวเอกหลัก และต้องผ่านเยื่อบางๆ กั้นกลาง",
            "rationale": "ออสโมซิสเป็นการแพร่ของโมเลกุลน้ำ (ตัวทำละลาย) จากบริเวณที่มีสารละลายเจือจาง (น้ำมาก) ไปยังที่สารละลายเข้มข้นสูง (น้ำน้อย) ผ่านเยื่อเลือกผ่าน"
        },
        {
            "question": "เมื่อนำเซลล์เม็ดเลือดแดงไปแช่ในน้ำกลั่นบริสุทธิ์ (ซึ่งมีสภาพเป็น Hypotonic solution) จะเกิดผลลัพธ์อย่างไรกับเซลล์?",
            "options": [
                "เซลล์จะเหี่ยวเนื่องจากน้ำออสโมซิสออกจากเซลล์",
                "เซลล์จะแตกเนื่องจากน้ำออสโมซิสเข้าสู่เซลล์",
                "เซลล์จะคงรูปเดิมเนื่องจากเกิดภาวะสมดุลสมบูรณ์",
                "เซลล์จะรีบสร้างผนังเซลล์ขึ้นมาหนาขึ้นเพื่อป้องกันแรงดันต้านน้ำ"
            ],
            "correct": 1,
            "hint": "น้ำกลั่นข้างนอกมีความหนาแน่นสารต่ำมาก แต่น้ำเยอะมาก สารละลายภายในเม็ดเลือดแดงเข้มข้นกว่า น้ำภายนอกจะพยายามดันตัวเข้าไปทลายรัง",
            "rationale": "น้ำกลั่นมีแรงดันออสโมซิสต่ำกว่าในเซลล์ (Hypotonic) น้ำภายนอกจะออสโมซิสเข้าเซลล์เม็ดเลือดแดง เนื่องจากเซลล์สัตว์ไม่มีผนังเซลล์ จึงทำให้เซลล์เต่งและแตกออก (Hemolysis)"
        },
        {
            "question": "เหตุใดเซลล์พืชจึงไม่แตกสลายเมื่อนำไปแช่ในสารละลายน้ำกลั่นเหมือนกรณีของเซลล์สัตว์?",
            "options": [
                "เพราะเซลล์พืชมีผนังเซลล์ (Cell wall) ที่แข็งแรงช่วยต้านแรงดันน้ำไว้ภายใน",
                "Because เซลล์พืชมีเยื่อหุ้มเซลล์ที่หนากว่าเซลล์สัตว์มากกว่าสิบเท่าตัว",
                "เพราะน้ำไม่สามารถออสโมซิสผ่านเข้าสู่สารเคลือบผิวเซลล์พืชได้เลย",
                "เพราะเซลล์พืชมีแวคิวโอลขนาดใหญ่คอยปั๊มน้ำสลัดขับถ่ายออกนอกเซลล์ตลอดวินาที"
            ],
            "correct": 0,
            "hint": "มองหาโครงสร้างภายนอกสุดที่เป็นกรอบสี่เหลี่ยม แข็งแรง ทนทาน ทำจากเซลลูโลส ซึ่งเป็นเอกลักษณ์เด่นของอาณาจักรพืช",
            "rationale": "พืชมีผนังเซลล์ (Cell Wall) ที่แข็งแรงมาก ประกอบด้วยเซลลูโลส เมื่อน้ำเข้าแวคิวโอลจะเกิดแรงดันเต่ง (Turgor pressure) ดันต้านกับผนังเซลล์ ทำให้เซลล์พืชเต่งตึงแต่ไม่แตก"
        },
        {
            "question": "การแพร่แบบฟาซิลิเตต (Facilitated diffusion) แตกต่างจากการแพร่ธรรมดา (Simple diffusion) ตรงจุดใด?",
            "options": [
                "ต้องใช้พลังงาน ATP ในการลำเลียงสารสวนทิศทางความเข้มข้นจากต่ำไปสูง",
                "ต้องอาศัยโปรตีนตัวพา (Carrier protein) บนเยื่อหุ้มเซลล์ในการช่วยนำสารข้ามผ่านเนื้อชั้นไขมัน",
                "สารเคลื่อนที่จากบริเวณที่มีความเข้มข้นต่ำไปสู่บริเวณที่มีความเข้มข้นสูงจัด",
                "เกิดขึ้นเฉพาะเจาะจงกับการลำเลียงแก๊สออกซิเจนและแก๊สไนโตรเจนเท่านั้น"
            ],
            "correct": 1,
            "hint": "คำว่า 'Facilitate' แปลว่า ได้รับความช่วยเหลือหรือมีผู้ช่วยอำนวยความสะดวกให้ข้ามฟากไปได้ง่ายขึ้น ผู้ช่วยนี้ฝังตัวอยู่บนเยื่อหุ้มเซลล์",
            "options": [],
            "correct": 1,
            "hint": "ผู้ช่วยอำนวยความสะดวกบนเยื่อหุ้มเซลล์คืออะไร",
            "rationale": "การแพร่แบบฟาซิลิเตตเป็นการเคลื่อนที่ของสารผ่านช่องทางโปรตีน (Channel/Carrier protein) บนเยื่อหุ้มเซลล์ โดยทิศทางยังคงเป็นจากเข้มข้นสูงไปต่ำ และไม่ใช้พลังงาน ATP"
        },
        {
            "question": "ข้อใดต่อไปนี้จัดอยู่ในกลุ่มการลำเลียงสารประเภทสารพลังงาน Active transport?",
            "options": [
                "การขับโซเดียมไอออนออกนอกเซลล์และการนำโพแทสเซียมไอออนเข้าสู่เซลล์ประสาทโดยใช้ ATP",
                "การดูดซึมแก๊สออกซิเจนจากถุงลมปอดเข้าสู่ระบบกระแสเส้นเลือดฝอย",
                "การดูดโมเลกุลน้ำกลับคืนที่บริเวณท่อหน่วยไตส่วนต้นเข้าสู่กระแสเลือด",
                "การกระจายตัวละลายของก้อนน้ำตาลทรายเมื่อหย่อนลงในแก้วน้ำอุ่น"
            ],

                "การลำเลียงเคลื่อนย้ายสารโดยอาศัยพลังงานขับเคลื่อนพ่นฉีดสารไปข้างหน้าทิศเดียวทลวงทุกสิ่ง"
            ],
            "correct": 0,
            "hint": "คิดคำนวณเปรียบเปรยเหมือนการคำนวณ 'กำไรสุทธิ' ของการค้าขาย ที่ต้องนำยอด 'รายรับทั้งหมด' มาตั้งแล้วหักลบออกจากยอด 'รายจ่ายทั้งหมด' ในแต่ละวัน",
            "rationale": "อนุภาคสารสั่นและวิ่งสะเปะสะปะทุกทิศทางตลอดเวลา การแพร่สุทธิ (Net diffusion) คือการหักลบยอดจำนวนอนุภาคที่วิ่งไปข้างหน้าและวิ่งสวนกลับ ทำให้เห็นทิศทางรวมที่แท้จริงของการย้ายสาร"
        },
        {
            "question": "ถ้าเรานำเซลล์เม็ดเลือดที่มีความเข้มข้นภายในเซลล์เท่ากับ 0.9% ไปแช่ในถ้วยแก้วที่มีสารละลายเกลือเข้มข้น 5% สารละลายในถ้วยแก้วนี้มีสภาพเป็นแบบใดเมื่อเทียบกับเซลล์?",
            "options": [
                "Hypotonic solution",
                "Isotonic solution",
                "Hypertonic solution",
                "สารละลายเจือจางยิ่งยวดสภาวะวิกฤต"
            ],
            "correct": 2,
            "hint": "เปรียบเทียบตัวเลขอย่างง่ายดาย: ค่าความเข้มข้น 5% (ข้างนอกเซลล์) มีมูลค่ามากกว่า สูงกว่า หรือต่ำกว่าค่าความเข้มข้น 0.9% (ข้างในเซลล์) แล้วเลือกศัพท์เทคนิคให้ตรง",
            "rationale": "สารละลายภายนอกมีความเข้มข้น 5% ซึ่งมากกว่าความเข้มข้นภายในเซลล์ที่สูงเพียง 0.9% สารละลายภายนอกจึงจัดเป็น Hypertonic solution ส่งผลดึงน้ำให้ไหลออสโมซิสออกจากเซลล์"
        },
        {
            "question": "ข้อใดคือการนำเอาหลักการพื้นฐานเรื่องการแพร่และออสโมซิสของเซลล์สิ่งมีชีวิตมาประยุกต์ใช้อุตสาหกรรมในชีวิตประจำวันได้อย่างเกิดประโยชน์สูงสุด?",
            "options": [
                "กระบวนการถนอมอาหารหมักดองเค็ม (เช่น ไข่เค็ม, สับปะรดกวน, ผักกาดดอง) เพื่อดึงน้ำออกจากเซลล์จุลินทรีย์จนเหี่ยวฝ่อและไม่สามารถเจริญเติบโตทำให้อาหารบูดเสีย",
                "การฉีดพ่นน้ำหอมให้เกาะติดผิวผิวกายยาวนานข้ามคืนโดยพึ่งพาการเหนี่ยวนำด้วยกระแสไฟฟ้าสถิต",
                "การเติมน้ำมันพืชสกัดบริสุทธิ์ลงไปผสมในถังน้ำมันรถยนต์เพื่อเพิ่มอัตราการเร่งแซงของเครื่องยนต์ดีเซล",
                "การเลือกรับประทานผักดิบใบโตเพื่อวัตถุประสงค์ในการเพิ่มจำนวนผนังเซลล์เซลลูโลสเข้าไปช่วยค้ำจุนโครงสร้างผิวหนังมนุษย์"
            ],
            "correct": 0,
            "hint": "ภูมิปัญญาของบรรพบุรุษในการสาดเกลือจำนวนมหาศาลลงบนชิ้นเนื้อสดหรือผักสด เพื่อป้องกันไม่ให้บูดเน่าเน่าเสีย อาศัยหลักการรีดคายน้ำออกจากสิ่งแปลกปลอมอย่างไร",
            "rationale": "การใส่เกลือหรือน้ำตาลปริมาณสูงในการทำอาหารหมักดอง ทำให้สภาพแวดล้อมรอบอาหารเป็น Hypertonic จัด เมื่อแบคทีเรียหรือเชื้อราหลุดเข้ามา น้ำในเซลล์จุลินทรีย์จะออสโมซิสออกจนเซลล์ฝ่อเหี่ยวและตายลง ยืดอายุอาหารได้นาน"
        }
    ];

    let currentIdx = 0;
    let scores = 0;
    let userAnswers = new Array(questions.length).fill(null);

    // Initialize Quiz App
    function initQuiz() {
        renderQuestion(currentIdx);
    }

    function renderQuestion(idx) {
        if (idx >= questions.length) {
            showSummary();
            return;
        }

        // Reset elements view
        document.getElementById('rationaleBox').style.display = 'none';
        document.getElementById('hintBox').style.display = 'none';
        
        // Update stats
        document.getElementById('qNum').innerText = `คำถามข้อที่ ${idx + 1} / ${questions.length}`;
        document.getElementById('qText').innerHTML = questions[idx].question;
        document.getElementById('hintBox').innerText = questions[idx].hint;

        // Progress Bar Calculation
        const progressPercent = ((idx + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progressPercent}%`;

        // Render Options
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';

        questions[idx].options.forEach((opt, oIdx) => {
            const btn = document.createElement('div');
            btn.className = 'option-item';
            btn.innerText = `${String.fromCharCode(65 + oIdx)}. ${opt}`;
            
            // Re-apply states if already answered
            if (userAnswers[idx] !== null) {
                btn.classList.add('disabled');
                if (oIdx === questions[idx].correct) {
                    btn.classList.add('correct');
                }
                if (userAnswers[idx] === oIdx && oIdx !== questions[idx].correct) {
                    btn.classList.add('incorrect');
                }
            } else {
                btn.onclick = () => selectOption(oIdx);
            }
            container.appendChild(btn);
        });

        // Show rationale if already answered
        if (userAnswers[idx] !== null) {
            document.getElementById('rationaleText').innerText = questions[idx].rationale;
            document.getElementById('rationaleBox').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        } else {
            document.getElementById('nextBtn').disabled = true;
        }

        // Prev button state
        document.getElementById('prevBtn').disabled = (idx === 0);
        
        // If last question and answered, update Next button text to 'ดูผลคะแนนสุทธิ'
        if (idx === questions.length - 1) {
            document.getElementById('nextBtn').innerText = 'ตรวจผลคะแนนรวม';
        } else {
            document.getElementById('nextBtn').innerText = 'ข้อถัดไป ➔';
        }
    }

    function selectOption(optIdx) {
        if (userAnswers[currentIdx] !== null) return; // Prevent double submit

        userAnswers[currentIdx] = optIdx;
        if (optIdx === questions[currentIdx].correct) {
            scores++;
        }

        // Refresh view to show correct/incorrect color indicators
        renderQuestion(currentIdx);
    }

    function toggleHint() {
        const box = document.getElementById('hintBox');
        box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion(currentIdx);
        } else {
            showSummary();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion(currentIdx);
        }
    }

    function showSummary() {
        document.getElementById('progressBar').style.width = '100%';
        const wrapper = document.getElementById('quiz-wrapper');
        document.getElementById('navControls').style.display = 'none';
        document.getElementById('qNum').innerText = '🏆 สรุปผลการประเมินความรู้';

        let grade = "";
        let feedbackColor = "";
        const percent = (scores / questions.length) * 100;
        
        if(percent >= 80) {
            grade = "ยอดเยี่ยมระดับอัจฉริยะชีววิทยา! 🧬 คุณเข้าใจกลไกออสโมซิสและการแพร่แบบทะลุปรุโปร่ง พร้อมสำหรับการสอบขันแข่งทุกสนาม";
            feedbackColor = "#2e7d32";
        } else if(percent >= 50) {
            grade = "ผ่านเกณฑ์มาตรฐานดีเยี่ยม! 👍 คุณมีความรู้พื้นฐานโครงสร้างเยื่อหุ้มเซลล์ที่แน่นหนา ทบทวนจุดอ่อนเพิ่มเติมอีกนิดจะก้าวสู่ระดับเซียน";
            feedbackColor = "#1565c0";
        } else {
            grade = "ควรทบทวนเนื้อหาเพิ่มเติม 📚 ลองใช้กระดานทดด้านขวาวาดภาพจำลองชั้นไขมันฟอสโฟลิพิดคู่กับโปรตีนตัวพาเพื่อช่วยเพิ่มความจำนะสู้ๆ";
            feedbackColor = "#c62828";
        }

        wrapper.innerHTML = `
            <div class="summary-card">
                <h2>คุณทำแบบทดสอบเสร็จสิ้นแล้ว!</h2>
                <div class="score-circle">
                    ${scores}
                    <span>จาก ${questions.length} คะแนน</span>
                </div>
                <h3 style="color:${feedbackColor}; margin-bottom:15px;">คิดเป็นเปอร์เซ็นต์: ${percent.toFixed(2)}%</h3>
                <p style="line-height:1.6; color:#37474f;">${grade}</p>
                <button class="btn btn-primary" style="margin-top:25px;" onclick="location.reload()">🔄 เริ่มทำข้อสอบใหม่อีกครั้ง</button>
            </div>
        `;
    }

    // ==========================================
    // INTERACTIVE WHITEBOARD FUNCTIONALITY CODE
    // ==========================================
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Auto resize canvas to fit parent space nicely
    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height - 60; // Subtract header height bar
        
        // Re-init canvas settings after resize
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    window.addEventListener('load', () => {
        resizeCanvas();
        initQuiz();
    });
    window.addEventListener('resize', resizeCanvas);

    // Drawing Events
    canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        ctx.beginPath();
        const pos = getMousePos(e);
        ctx.moveTo(pos.x, pos.y);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const pos = getMousePos(e);
        
        // Read active brush configs
        ctx.strokeStyle = document.getElementById('brushColor').value;
        ctx.lineWidth = document.getElementById('brushSize').value;
        
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    });

    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);

    // Touch Support for iPad/Mobile devices
    canvas.addEventListener('touchstart', (e) => {
        isDrawing = true;
        ctx.beginPath();
        const touch = e.touches[0];
        const pos = getMousePos(touch);
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const touch = e.touches[0];
        const pos = getMousePos(touch);
        ctx.strokeStyle = document.getElementById('brushColor').value;
        ctx.lineWidth = document.getElementById('brushSize').value;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        e.preventDefault();
    });

    canvas.addEventListener('touchend', () => isDrawing = false);

    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    function clearBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>
